<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>金葫娱乐城</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body {
      background: radial-gradient(ellipse at 40% 20%, #1a1a2e, #0a0a14);
      background-attachment: fixed;
      position: relative;
      overflow-x: hidden;
      margin: 0;
      padding: 12px;
      min-height: 100vh;
      color: #ffecb3;
      font-family: 'Segoe UI', 'Poppins', system-ui;
    }
    body::before {
      content: "";
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(255, 180, 50, 0.08), transparent, rgba(180, 100, 255, 0.08), transparent);
      animation: rotateGlow 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes rotateGlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    #app { position: relative; z-index: 1; max-width:560px; margin:0 auto; background:rgba(15,20,35,0.65); backdrop-filter:blur(16px); border-radius:48px; border:1px solid rgba(255,200,80,0.4); overflow:hidden; }
    .auth-panel { padding:28px 20px; background:rgba(0,0,0,0.6); border-radius:40px; margin:20px; }
    .auth-panel h2,.auth-panel h3 { text-align:center; margin-bottom:16px; background:linear-gradient(135deg, #ffd966, #ffaa33); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .auth-input { width:100%; padding:12px; margin:6px 0; background:rgba(0,0,0,0.6); border:1px solid #ffaa33; border-radius:40px; color:#ffd966; outline:none; }
    .auth-btn { background:linear-gradient(135deg, #ffaa33, #ff884d); border:none; border-radius:40px; padding:12px; font-weight:bold; color:#2a1a0a; cursor:pointer; width:100%; }
    .user-section { background:rgba(0,0,0,0.5); padding:12px 16px; border-bottom:1px solid #ffaa33; }
    .user-info-row { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
    #userBalanceDisplay { font-size:1.6rem; font-weight:800; background:linear-gradient(135deg, #ffd966, #ffaa33); -webkit-background-clip:text; background-clip:text; color:transparent; cursor:pointer; }
    .btn-group { display:flex; gap:6px; }
    .btn-sm { background:rgba(255,170,51,0.2); border:1px solid #ffaa33; padding:4px 12px; border-radius:40px; cursor:pointer; }
    .charge-btn,.withdraw-btn { background:linear-gradient(135deg, #ffaa33, #ff884d); padding:6px 16px; border-radius:40px; color:#2a1a0a; font-weight:700; cursor:pointer; border:none; }
    .game-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:20px; }
    .game-card-item { background:rgba(0,0,0,0.5); border-radius:32px; padding:16px; text-align:center; cursor:pointer; border:1px solid #ffaa33; }
    .game-card-item:hover { transform:scale(1.02); background:rgba(255,170,51,0.2); }
    .game-name { font-weight:bold; } .game-desc { font-size:0.7rem; color:#ffd966; }
    .game-card { background:rgba(0,0,0,0.4); border-radius:32px; padding:16px; border:1px solid rgba(255,200,80,0.4); }
    .chip { background:linear-gradient(145deg,#cc8800,#aa6600); display:inline-block; padding:6px 12px; border-radius:36px; margin:3px; cursor:pointer; font-weight:bold; border:1px solid #ffaa33; }
    .chip.selected { background:#ffaa33; color:#2a1a0a; box-shadow:0 0 8px #ffaa33; }
    .exec-btn { background:linear-gradient(135deg,#ffaa33,#ff884d); border:none; border-radius:36px; padding:8px 14px; color:#2a1a0a; font-weight:bold; cursor:pointer; margin:3px; }
    .exec-btn:disabled { opacity:0.45; cursor:not-allowed; pointer-events:none; }
    .countdown-area { text-align:center; margin:6px 0 12px; background:rgba(0,0,0,0.6); border-radius:40px; padding:6px 12px; font-weight:bold; border:1px solid #ffaa33; }
    .fish-dice-cube { width:80px; height:80px; position:relative; transform-style:preserve-3d; transition:transform 0.4s; }
    .fish-dice-face { position:absolute; width:100%; height:100%; background:#2a1e12; border:2px solid #ffaa33; border-radius:16px; display:flex; align-items:center; justify-content:center; backface-visibility:visible; font-size:2rem; }
    .fish-dice-3d-area { display:flex; justify-content:center; gap:48px; margin:24px 0; perspective:900px; }
    @media(max-width:520px){ .fish-dice-3d-area{gap:34px;perspective:750px} }
    @media(max-width:480px){ .fish-dice-cube{width:65px;height:65px} }
    .fish-pattern-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:10px 0; }
    .fish-bet-card,.bet-card { background:rgba(0,0,0,0.5); border-radius:20px; padding:8px 4px; text-align:center; border:1px solid #ffaa33; cursor:pointer; position:relative; }
    .win-flash { animation:redFlash 0.4s 10!important; background-color:#ff3300!important; box-shadow:0 0 25px #ffaa33!important; color:#fff!important; font-weight:bold!important; border:2px solid #fff!important; }
    @keyframes redFlash{ 0%{background-color:rgba(255,50,50,0);color:#fff} 50%{background-color:#ff3300;transform:scale(1.04);color:#fff} 100%{background-color:rgba(255,50,50,0);color:#fff} }
    @keyframes coinFall { 0% { transform: translateY(0) scale(1); opacity:1; } 100% { transform: translateY(-60px) scale(0.5); opacity:0; } }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:1000; }
    .modal-content { background:#2a1e12; border-radius:36px; padding:20px; color:#ffd966; border:1px solid #ffaa33; max-width:90vw; max-height:85vh; overflow-y:auto; }
    .game-top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:6px; }
    .user-vip-card { flex:2; background:rgba(0,0,0,0.7); border:1px solid #ffaa33; border-radius:32px; padding:6px 12px; display:flex; align-items:center; gap:8px; cursor:pointer; }
    .vip-badge { background:linear-gradient(135deg,#ffd700,#ffaa00); color:#1a1a0a; padding:2px 8px; border-radius:20px; font-weight:bold; font-size:0.75rem; margin-left:auto; }
    .back-lobby-btn { flex:1; background:rgba(255,170,51,0.25); border:1px solid #ffaa33; padding:8px 6px; border-radius:32px; text-align:center; font-weight:bold; cursor:pointer; font-size:0.8rem; }
    .online-count { display:inline-block; background:rgba(0,255,100,0.2); border:1px solid #00ff64; border-radius:20px; padding:2px 10px; font-size:0.75rem; color:#00ff64; margin-left:6px; }
    .dealer-panel { background:rgba(255,170,51,0.15); border:1px solid #ffaa33; border-radius:12px; padding:10px; margin-top:12px; display:none; }
    .dealer-panel h4 { margin:0 0 6px 0; color:#ffd966; } .dealer-summary { font-size:0.8rem; }
    body.light-mode { background:radial-gradient(circle at 30% 10%, #f5f0e6, #e8dfd0); color:#3a2a1a; }
    body.light-mode #app { background:rgba(245,240,230,0.85); border-color:rgba(180,130,60,0.5); }
    body.light-mode .auth-panel,body.light-mode .user-section,body.light-mode .game-card,body.light-mode .modal-content { background:rgba(250,245,235,0.9); border-color:#b8860b; color:#3a2a1a; }
    body.light-mode .auth-input,body.light-mode .fish-bet-card,body.light-mode .bet-card,body.light-mode .chip,body.light-mode .exec-btn,body.light-mode .countdown-area { background:rgba(255,250,240,0.8); border-color:#c99a3b; color:#4a3a2a; }
    body.light-mode .chip.selected { background:linear-gradient(145deg,#ffcc77,#e6a822); color:#2a1a0a; }
    body.light-mode .fish-dice-face,.dice-face { background:#fffaf0; border-color:#c99a3b; color:#4a3a2a; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const API = '/api';
const DEV = 'dvc_' + (localStorage._di || (()=>{const i=Math.random().toString(36).slice(2,11);localStorage._di=i;return i})());
let apiOk = false;
async function chkApi(){ try{ await fetch(API+'/ping',{signal:AbortSignal.timeout(2000)}); apiOk=true; console.log('API ON'); }catch(e){apiOk=false} }
async function call(m,p,b=null){
  const o={method:m,headers:{'Content-Type':'application/json'}};
  if(b) o.body=JSON.stringify(b);
  const r=await fetch(API+p,o);
  if(!r.ok){ const e=await r.json().catch(()=>({msg:'fail'})); throw new Error(e.msg) }
  return r.json()
}
let user = null;
function toast(msg,err=false){ const d=document.createElement('div'); d.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:'+(err?'#c33':'#3a3')+';color:#fff;padding:10px 20px;border-radius:20px;z-index:9999'; d.innerText=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),2500) }

const VIP = [
  {lv:0,w:0,upg:0,week:0},{lv:1,w:30000,upg:15,week:0},{lv:2,w:100000,upg:30,week:3},
  {lv:3,w:250000,upg:55,week:5},{lv:4,w:500000,upg:100,week:8},{lv:5,w:1000000,upg:200,week:15},
  {lv:6,w:2000000,upg:400,week:30},{lv:7,w:3000000,upg:550,week:55},{lv:8,w:4000000,upg:700,week:85},
  {lv:9,w:5000000,upg:800,week:110},{lv:10,w:6000000,upg:800,week:130}
];
function getVip(t){ let l=0; for(let i=VIP.length-1;i>=0;i--) if(t>=VIP[i].w){l=VIP[i].lv;break} return VIP.find(v=>v.lv===l)||VIP[0] }
function refreshVip(){
  if(!user||!user.vip)return;
  const b=document.getElementById('vipBadgeDisplay'); if(b)b.innerText='VIP'+(user.vip.level||0);
  const bal=document.getElementById('userBalanceDisplay'); if(bal)bal.innerText=user.balance.toFixed(2)
}

async function recharge(){
  const m = document.createElement('div');
  m.className = 'modal';
  m.innerHTML = `<div class="modal-content" style="max-width:380px; text-align:center;">
    <h3 style="color:#ffaa33;">💎 充值 USDT</h3>
    <p style="font-size:0.9rem;">请扫描下方二维码或向地址转账</p>
    <img src="/img/recharge_qr.png" alt="充值二维码" style="width:200px;height:200px;border-radius:12px;margin:10px auto;" onerror="this.outerHTML='<p style=color:#ffaa33;>请联系客服获取最新二维码</p>'">
    <p style="background:#111;padding:8px;border-radius:8px;word-break:break-all;margin:8px 0;"><code style="color:#ffd966;">TUTyirxSJQyGgFBbKxJHBzAFemQfUtPndW</code></p>
    <p style="font-size:0.75rem;color:#aaa;">转账后请提交充值申请，我们将尽快审核</p>
    <button id="submitRechargeBtn" class="auth-btn" style="background:#ffaa33;margin-top:8px;">📝 我已转账，提交申请</button>
    <button id="closeRechargeModal" class="auth-btn" style="background:#555;margin-top:6px;">关闭</button>
  </div>`;
  document.body.appendChild(m);
  m.querySelector('#closeRechargeModal').onclick = () => m.remove();
  m.addEventListener('click', e => { if(e.target === m) m.remove(); });
  m.querySelector('#submitRechargeBtn').onclick = async () => {
    let amt = parseFloat(prompt("请输入充值金额（USDT）:", "100"));
    if (isNaN(amt) || amt <= 0) return;
    try { await call('POST', '/recharge', { account: user.account, amount: amt }); toast('充值申请已提交'); m.remove(); } catch(e) { toast(e.message, true); }
  };
}

async function withdraw(){
  const m = document.createElement('div');
  m.className = 'modal';
  m.innerHTML = `<div class="modal-content" style="max-width:380px;">
    <h3 style="color:#ffaa33;">💰 提现 USDT</h3>
    <input id="withdrawAmt" class="auth-input" type="number" placeholder="提现金额" style="margin-bottom:10px;">
    <input id="withdrawAddr" class="auth-input" placeholder="USDT收款地址 (BEP20)" style="margin-bottom:14px;">
    <button id="confirmWithdrawBtn" class="auth-btn" style="background:#ffaa33;">确认提现</button>
    <button id="closeWithdrawModal" class="auth-btn" style="background:#555;margin-top:6px;">取消</button>
  </div>`;
  document.body.appendChild(m);
  m.querySelector('#closeWithdrawModal').onclick = () => m.remove();
  m.addEventListener('click', e => { if(e.target === m) m.remove(); });
  m.querySelector('#confirmWithdrawBtn').onclick = async () => {
    const amt = parseFloat(m.querySelector('#withdrawAmt').value);
    const addr = m.querySelector('#withdrawAddr').value.trim();
    if (isNaN(amt) || amt <= 0) { toast('请输入正确金额', true); return; }
    if (user.balance < amt) { toast('余额不足', true); return; }
    if (!addr) { toast('请输入收款地址', true); return; }
    try { await call('POST', '/withdraw', { account: user.account, amount: amt, address: addr }); toast('提现申请已提交'); m.remove(); } catch(e) { toast(e.message, true); }
  };
}

function showVipDetail(){ alert('VIP详情') }
function showService(){ alert('客服微信：jinhui_cs_888') }

const pn = ["鱼","虾","蟹","葫芦","金钱","鸡"];
const dc = [["鱼","虾"],["鱼","蟹"],["鱼","葫芦"],["鱼","金钱"],["鱼","鸡"],["虾","蟹"],["虾","葫芦"],["虾","金钱"],["虾","鸡"],["蟹","葫芦"],["蟹","金钱"],["蟹","鸡"],["葫芦","金钱"],["葫芦","鸡"],["金钱","鸡"]];
let fishDestroy = null;

function initFish(ct){
  if(fishDestroy) fishDestroy();
  ct.innerHTML = `<div class="game-card">
    <div class="game-top-bar"><div class="user-vip-card" id="fishVipCard"><span>👤 ${user?.account||''}</span><span class="vip-badge" id="vipBadgeDisplay">VIP${user?.vip?.level||0}</span></div><div class="back-lobby-btn" id="fishBackLobbyBtn">🏠返回</div></div>
    <div style="display:flex;gap:8px;"><div style="flex:1;text-align:center;">💰余额<div id="fishMyBalance">0</div></div><div style="flex:1;text-align:center;">🎲总押注<div id="fishTotalBet">0</div></div><div style="flex:1;text-align:center;">🏆上局净利<div id="fishLastWin">0</div></div></div>
    <div class="countdown-area" id="fishPhaseHint">🎲 下注阶段</div>
    <div id="dealerBoard" style="display:none;text-align:center;margin:4px 0;padding:6px;background:linear-gradient(145deg,#cc8800,#aa6600);border-radius:20px;color:#2a1a0a;font-weight:bold;">🐉 庄家：<span id="dealerName"></span></div>
    <div id="fishChips"><span class="chip" data-chip="10">10</span><span class="chip" data-chip="50">50</span><span class="chip selected" data-chip="100">100</span><span class="chip" data-chip="500">500</span><span class="chip" data-chip="1000">1000</span></div>
    <div style="display:flex;gap:6px;"><button id="fishClearBtn" class="exec-btn" onclick="window._fishClear && window._fishClear()">清空</button><button id="fishRepeatBtn" class="exec-btn" disabled>续押</button><button id="fishGrabBtn" class="exec-btn">抢庄</button></div>
    <div class="fish-dice-3d-area"><div class="fish-dice-cube" id="fishDice0"></div><div class="fish-dice-cube" id="fishDice1"></div><div class="fish-dice-cube" id="fishDice2"></div></div>
    <div><strong>单选押注</strong></div><div id="fishPatternGrid" class="fish-pattern-grid"></div>
    <div><strong>双押组合</strong></div><div id="fishDoubleGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;"></div>
    <div class="dealer-panel" id="dealerPanel"><h4>🐉 庄家全局 <span id="closeDealerBtn" style="float:right;cursor:pointer;font-size:1.2rem;color:#ffaa33;margin-right:8px;">✕</span></h4><div id="dealerSingleSummary" class="dealer-summary"></div><div id="dealerDoubleSummary" class="dealer-summary"></div><div>玩家数: <span id="dealerTotalPlayers">0</span> | 总注: <span id="dealerTotalBets">0</span></div><div>盈亏: <span id="dealerEstimatedPL">--</span></div></div>
    <div style="display:flex;align-items:center;gap:8px;"><button id="fishRecordBtn" class="exec-btn">📜记录</button><button id="fishRulesBtn" class="exec-btn">📘规则</button><span class="online-count">🟢 <span id="fishOnlineNum">1</span>人</span></div>
  </div>`;

  const dice = [document.getElementById('fishDice0'),document.getElementById('fishDice1'),document.getElementById('fishDice2')];
  const tz = () => innerWidth<=480?27.5:35;
  function build(d){
    d.innerHTML=''; const t=tz();
    const tr=[`translateZ(${t}px)`,`rotateY(180deg) translateZ(${t}px)`,`rotateY(90deg) translateZ(${t}px)`,`rotateY(-90deg) translateZ(${t}px)`,`rotateX(-90deg) translateZ(${t}px)`,`rotateX(90deg) translateZ(${t}px)`];
    const em=["🐟","🦐","🦀","🎃","💰","🐔"];
    for(let i=0;i<6;i++){ const fd=document.createElement('div');fd.className='fish-dice-face';fd.style.transform=tr[i];fd.innerText=em[i];d.appendChild(fd) }
    d.style.transform=`rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`
  }
  dice.forEach(build);

  let bets={single:{},double:{}}; pn.forEach(p=>bets.single[p]=0); dc.forEach(c=>bets.double[c.join(',')]=0);
  let chip=100, grabbed=false, lastWin=0, records=[], timer=null, flashes=[], anim=false, prevBet=null;

  window._fishClear = () => {
    for (let p in bets.single) bets.single[p] = 0;
    for (let k in bets.double) bets.double[k] = 0;
    saveLast();
    ui();
    playBeep(300, 80, 'sine');
  };

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playBeep(freq = 800, duration = 100, type = 'sine') {
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration / 1000);
    } catch(e) {}
  }

  async function place(s,d){
    try{
      const r=await call('POST','/game/bet',{account:user.account,single:s,double:d});
      user.balance=r.balance;
      playBeep(600, 80, 'sine');
      return true;
    }catch(e){ toast(e.message,true); return false }
  }

  async function grab(){
    if(grabbed||user.balance<2000)return;
    try{ const r=await call('POST','/game/grab-dealer',{account:user.account}); user.balance=r.balance; grabbed=true; updDealer(r.betSummary); document.getElementById('dealerPanel').style.display='block'; toast('抢庄成功') }catch(e){toast(e.message,true)}
  }

  function updDealer(s){
    if(!s)return;
    document.getElementById('dealerTotalPlayers').innerText=s.totalPlayers;
    document.getElementById('dealerTotalBets').innerText=s.totalBets;
    let sh=''; for(let p of pn) sh+=`<span>${p}:${s.single[p]||0}</span> `;
    document.getElementById('dealerSingleSummary').innerHTML=sh;
    let dh=''; for(let c of dc){ const k=c.join(','); dh+=`<span>${c[0]}+${c[1]}:${s.double[k]||0}</span> `; }
    document.getElementById('dealerDoubleSummary').innerHTML=dh;
  }

  function setDice(dv,pat){
    let rx=0,ry=0;
    switch(pat){ case'鱼':rx=0;ry=0;break; case'虾':rx=0;ry=180;break; case'蟹':rx=0;ry=-90;break; case'葫芦':rx=0;ry=90;break; case'金钱':rx=90;ry=0;break; case'鸡':rx=-90;ry=0;break; }
    dv.style.transition='transform 1.2s cubic-bezier(0.25,0.1,0.25,1)'; dv.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`;
  }

  async function roll(fin){
    const steps=12, dur=3000;
    for(let s=0;s<steps;s++){ setTimeout(()=>{ dice.forEach(d=>{ d.style.transition='transform 0.1s linear'; d.style.transform=`rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)` }) }, s*(dur/steps)) }
    await new Promise(r=>setTimeout(r,dur));
    for(let i=0;i<3;i++) setDice(dice[i],fin[i]);
    await new Promise(r=>setTimeout(r,1200))
  }

  function ui(wd=null){
    const tot = Object.values(bets.single).reduce((a,b)=>a+b,0)+Object.values(bets.double).reduce((a,b)=>a+b,0);
    document.getElementById('fishTotalBet').innerText=tot;
    document.getElementById('fishLastWin').innerText=lastWin;
    document.getElementById('fishMyBalance').innerText=user?user.balance.toFixed(2):'0';
    for(let p of pn){ const sp=document.getElementById(`fishBet_${p}`); if(sp)sp.innerText=wd?.[p]?.toFixed(2)??bets.single[p] }
    for(let c of dc){ const k=c.join(','); const sp=document.getElementById(`doubleBet_${k.replace(/,/g,'_')}`); if(sp)sp.innerText=wd?.[k]?.toFixed(2)??bets.double[k] }
    const btn=document.getElementById('fishRepeatBtn'); if(btn){ const has=prevBet&&(Object.values(prevBet.single).some(v=>v>0)||Object.values(prevBet.double).some(v=>v>0)); btn.disabled=anim||!has }
    refreshVip()
  }

  async function flashWin(wd){
    flashes.forEach(t=>clearTimeout(t)); flashes=[];
    document.querySelectorAll('.fish-bet-card,.bet-card').forEach(c=>c.classList.remove('win-flash'));
    for(let p of pn){
      const sp=document.getElementById(`fishBet_${p}`);
      if(sp && wd[p]!==undefined){
        sp.innerText=wd[p].toFixed(2);
        const card=sp.closest('.fish-bet-card');
        if(card){
          card.classList.add('win-flash');
          for (let i = 0; i < 8; i++) {
            const particle = document.createElement('span');

        document.getElementById('dealerBoard').style.display = 'block';
        document.getElementById('dealerName').innerText = s.dealer;
      } else {

          document.getElementById('dealerPanel').style.display = 'none';
        }
        flashes.forEach(t => clearTimeout(t));
        flashes = [];
        document.querySelectorAll('.fish-bet-card,.bet-card').forEach(c => c.classList.remove('win-flash'));
        ui();
      }

      if(ph === 1 && !anim && s.results && s.results[0]){
        anim = true;
        playBeep(400, 200, 'triangle');
        await roll(s.results);
        const myR = s.myResult;
        const myB = s.myBets;
        if(myB){
          const ret = myR ? myR.totalReturn : 0;
          lastWin = ret - myB.totalBet;
          records.unshift({
            round: s.round, time: new Date().toLocaleTimeString(), dice: s.results.join(','),
            dealer: s.dealer || '无', bet: myB.totalBet, return: ret,
            result: lastWin >= 0 ? `赢${lastWin.toFixed(2)}` : `输${(-lastWin).toFixed(2)}`
          });
        }
        if(myR && myR.winDetails && Object.keys(myR.winDetails).length > 0){
          playBeep(1200, 150, 'square');
          await flashWin(myR.winDetails);
        } else {
          for(let p in bets.single) bets.single[p] = 0;
          for(let k in bets.double) bets.double[k] = 0;

        for(let p in bets.single) bets.single[p] = 0;
        for(let k in bets.double) bets.double[k] = 0;

      }

      if(grabbed && s.dealerProfit !== undefined){

      }
      try{ const ol = await call('GET','/online'); document.getElementById('fishOnlineNum').innerText = ol.count; }catch(e){}

  const grid=document.getElementById('fishPatternGrid');

  });
  document.querySelectorAll('#fishChips .chip').forEach(c=>c.onclick=()=>{ chip=parseInt(c.dataset.chip); document.querySelectorAll('#fishChips .chip').forEach(cc=>cc.classList.remove('selected')); c.classList.add('selected') });

  function saveLast(){ prevBet={single:{...bets.single},double:{...bets.double}} }
  async function repeatLast(){
    if(!prevBet||anim)return;
    let s={},d={}; for(let p in prevBet.single)if(prevBet.single[p]>0)s[p]=prevBet.single[p]; for(let k in prevBet.double)if(prevBet.double[k]>0)d[k]=prevBet.double[k];
    const tot=Object.values(s).reduce((a,b)=>a+b,0)+Object.values(d).reduce((a,b)=>a+b,0);
    if(tot<=0||tot>user.balance)return;
    if(await place(s,d)){ bets.single={...prevBet.single}; bets.double={...prevBet.double}; ui() }
  }
  document.getElementById('fishRepeatBtn').onclick=repeatLast;
  document.getElementById('fishGrabBtn').onclick=grab;
  document.getElementById('fishVipCard').onclick=showVipDetail;
  document.getElementById('fishBackLobbyBtn').onclick=()=>{ if(fishDestroy)fishDestroy(); renderLobby() };

    m.querySelector('#closeRec').onclick=()=>m.remove(); m.addEventListener('click',e=>{if(e.target===m)m.remove()})
  };
  saveLast(); ui();

  return fishDestroy
}

    const pr = recharges.filter(o=>o.status==='pending');
    document.getElementById('rechargeCount').innerText = pr.length;
    document.getElementById('rechargeList').innerHTML = pr.length===0 ? '<span style="color:#999;">无待审核</span>' : pr.map(o=>`<div class="order-item" style="display:flex;justify-content:space-between;padding:4px 0;"><span>${o.account} 充值 ${o.amount}</span><div><button class="appRech" data-id="${o.id}">✅确认</button><button class="rejRech danger" data-id="${o.id}">❌拒绝</button></div></div>`).join('');
    document.querySelectorAll('.appRech').forEach(b=>b.onclick=async()=>{ await call('PUT','/recharge/'+b.dataset.id,{status:'approved'}); refreshPanel(); });
    document.querySelectorAll('.rejRech').forEach(b=>b.onclick=async()=>{ await call('PUT','/recharge/'+b.dataset.id,{status:'rejected'}); refreshPanel(); });
    const pw = withdraws.filter(o=>o.status==='pending');
    document.getElementById('withdrawCount').innerText = pw.length;
    document.getElementById('withdrawList').innerHTML = pw.length===0 ? '<span style="color:#999;">无待审核</span>' : pw.map(o=>`<div class="order-item" style="display:flex;justify-content:space-between;padding:4px 0;"><span>${o.account} 提现 ${o.amount}</span><div><button class="appWith" data-id="${o.id}">✅已打款</button><button class="rejWith danger" data-id="${o.id}">❌拒绝</button></div></div>`).join('');
    document.querySelectorAll('.appWith').forEach(b=>b.onclick=async()=>{ await call('PUT','/withdraw/'+b.dataset.id,{status:'approved'}); refreshPanel(); });
    document.querySelectorAll('.rejWith').forEach(b=>b.onclick=async()=>{ await call('PUT','/withdraw/'+b.dataset.id,{status:'rejected'}); refreshPanel(); });
  }
  document.getElementById('adminAddBtn').onclick = async () => {
    const acc = document.getElementById('adminUserSelect').value, amt = parseFloat(document.getElementById('adminAmt').value);
    if(!acc || isNaN(amt)|| amt<=0) return;
    const u = users.find(u=>u.account===acc);
    if(u){ u.balance += amt; await call('PUT','/user/'+encodeURIComponent(acc)+'/balance',{balance:u.balance}); refreshPanel(); }
  };
  document.getElementById('adminSubBtn').onclick = async () => {
    const acc = document.getElementById('adminUserSelect').value, amt = parseFloat(document.getElementById('adminAmt').value);
    if(!acc || isNaN(amt)|| amt<=0) return;
    const u = users.find(u=>u.account===acc);
    if(u && u.balance>=amt){ u.balance -= amt; await call('PUT','/user/'+encodeURIComponent(acc)+'/balance',{balance:u.balance}); refreshPanel(); }
  };
  document.getElementById('showRecordsBtn').onclick = async () => {
    const acc = document.getElementById('recordUserSelect').value;
    const area = document.getElementById('adminGameRecords');
    try{
      const res = await call('GET','/user/'+encodeURIComponent(acc)+'/game-records');
      if(!res.records||!res.records.length){ area.innerHTML='暂无记录'; area.style.display='block'; return; }
      let tbl = '<table border="1" cellpadding="4" style="width:100%;border-collapse:collapse;font-size:0.8rem;"><tr style="background:rgba(255,170,51,0.3)"><th>局号</th><th>时间</th><th>庄家</th><th>骰子</th><th>投注</th><th>返奖</th><th>庄家盈亏</th></tr>';
      res.records.forEach(r=>{ tbl+=`<tr><td>${r.round}</td><td>${r.time}</td><td>${r.dealer||'无'}</td><td>${r.dice}</td><td>${(r.bet||0).toFixed(2)}</td><td>${(r.return||0).toFixed(2)}</td><td>${(r.dealerProfit||0).toFixed(2)}</td></tr>`; });
      tbl+='</table>'; area.innerHTML=tbl; area.style.display='block';
    }catch(e){ area.innerHTML='加载失败'; area.style.display='block'; }
  };
  refreshPanel();
}

(async function init(){
  await chkApi();
  const saved=localStorage.curr_acc;
  if(saved&&apiOk){
    try{ const d=await call('GET','/user/'+encodeURIComponent(saved)+'/profile'); user=d.user; sendHb(); renderLobby() }catch(e){renderAuth()}
  } else if(saved){ renderAuth() }
  else renderAuth()
})()
</script>
</body>
</html>
