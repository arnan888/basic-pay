<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>总管理后台</title>
    <style>
        :root { --bg: #0d0d1a; --card: rgba(20,20,40,0.9); --text: #ffd966; --gold: #ffaa33; --red: #ff4444; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui; padding: 20px; }
        .container { max-width: 950px; margin: auto; }
        h1 { text-align: center; margin-bottom: 24px; color: var(--gold); }
        .section { background: var(--card); border: 1px solid var(--gold); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .section h3 { margin-bottom: 12px; color: #ff884d; border-bottom: 1px solid var(--gold); padding-bottom: 6px; }
        .row { display: flex; align-items: center; gap: 10px; margin: 8px 0; flex-wrap: wrap; }
        input, select { padding: 8px 12px; background: #1a1a2e; border: 1px solid var(--gold); border-radius: 8px; color: var(--text); outline: none; }
        button { padding: 8px 16px; background: linear-gradient(135deg, var(--gold), #ff884d); border: none; border-radius: 8px; color: #1a1a0a; font-weight: bold; cursor: pointer; }
        button:hover { opacity: 0.9; }
        button.danger { background: linear-gradient(135deg, #ff4444, #cc2222); color: #fff; }
        .badge { background: var(--gold); color: #1a1a0a; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; }
        .order-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,170,51,0.2); }
        .game-state { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .state-item { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; }
        .state-value { font-size: 1.2rem; font-weight: bold; color: var(--gold); }
        .history-list, .dealer-list { max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 8px; }
        .history-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #333; font-size: 0.85rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; color: #ffecb3; }
        th { background: rgba(255,170,51,0.3); color: #ffd966; padding: 6px; }
        td { padding: 4px; border: 1px solid #333; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏦 金葫娱乐城 · 总管理后台</h1>
    <div id="loginPanel" class="section">
        <h3>🔐 管理员登录</h3>
        <div class="row">
            <input id="adminPwd" type="password" placeholder="请输入管理员密码">
            <button id="loginBtn">登录</button>
        </div>
    </div>
    <div id="mainPanel" style="display:none;">
        <div class="section">
            <h3>🎮 游戏监控</h3>
            <div class="game-state" id="gameStatePanel">
                <div class="state-item">局数 <span class="state-value" id="gRound">-</span></div>
                <div class="state-item">阶段 <span class="state-value" id="gPhase">-</span></div>
                <div class="state-item">剩余秒 <span class="state-value" id="gSeconds">-</span></div>
                <div class="state-item">投注人数 <span class="state-value" id="gPlayers">-</span></div>
                <div class="state-item">总投注额 <span class="state-value" id="gTotalBet">-</span></div>
                <div class="state-item">暂停状态 <span class="state-value" id="gPaused">-</span></div>
            </div>
            <div class="row" style="margin-top:10px;">
                <button id="gameNextBtn">⏭ 下一局</button>
                <button id="gamePauseBtn">⏸ 暂停</button>
                <button id="gameResumeBtn">▶ 恢复</button>
                <button id="gameResetBtn" class="danger">🔄 重置游戏</button>
            </div>
        </div>
        <div class="section">
            <h3>📜 最近500期开奖</h3>
            <div class="history-list" id="historyList">加载中...</div>
        </div>
        <div class="section">
            <h3>🐉 庄家抢庄记录</h3>
            <div class="dealer-list" id="dealerRecords">加载中...</div>
        </div>
        <div class="section">
            <h3>🏦 庄家资金池</h3>
            <div class="row">
                <span>当前资金池：</span>
                <strong id="bankerPool" style="font-size:1.3rem;color:#ff884d;">0</strong>
                <input id="injectAmt" type="number" placeholder="注入金额" style="width:120px;">
                <button id="injectBtn">➕ 注入</button>
            </div>
        </div>
        <div class="section">
            <h3>💰 系统盈利统计</h3>
            <div class="row">
                <span>累计服务费收入：</span>
                <strong id="systemProfit" style="font-size:1.3rem;color:#00ff88;">加载中...</strong>
            </div>
            <div class="row">
                <span>当前资金池余额：</span>
                <strong id="bankerPool2" style="font-size:1.3rem;color:#ff884d;">0</strong>
            </div>
        </div>
        <div class="section">
            <h3>⚙️ 赔付系数 & 概率系数</h3>
            <div class="row">
                <span>赔付系数：</span>
                <input id="adjustFactor" type="number" step="0.01" min="0.5" max="1.5" value="0.98" style="width:100px;">
                <button id="saveFactorBtn">💾 保存</button>
            </div>
            <div class="row">
                <span>概率系数(50正常)：</span>
                <input id="probWeight" type="number" min="10" max="100" value="50" style="width:100px;">
                <button id="saveProbBtn">💾 保存</button>
            </div>
        </div>
        <div class="section">
            <h3>👥 用户管理</h3>
            <div class="row">
                <select id="userSelect" style="flex:1;"></select>
                <input id="scoreAmt" type="number" placeholder="金额" style="width:100px;">
                <button id="addScoreBtn">上分</button>
                <button id="subScoreBtn" class="danger">下分</button>
            </div>
            <div class="row" style="margin-top:8px;">
                <button id="showGameRecordsBtn">📋 游戏对局记录</button>
                <button id="showUserTransactionsBtn">📊 个人交易明细</button>
            </div>
            <div id="gameRecordArea" style="margin-top:8px;max-height:300px;overflow:auto;background:rgba(0,0,0,0.3);border-radius:8px;padding:8px;display:none;"></div>
            <div id="transactionArea" style="margin-top:8px;max-height:300px;overflow:auto;background:rgba(0,0,0,0.3);border-radius:8px;padding:8px;display:none;"></div>
            <div id="userList" style="margin-top:10px;"></div>
        </div>
        <div class="section">
            <h3>💎 充值审核 <span id="rechargeCount" class="badge">0</span></h3>
            <div id="rechargeList"></div>
        </div>
        <div class="section">
            <h3>💰 提现审核 <span id="withdrawCount" class="badge">0</span></h3>
            <div id="withdrawList"></div>
        </div>
        <button id="logoutBtn" class="danger" style="margin-top:12px;">退出后台</button>
    </div>
</div>
<script>
(function() {
  const API_BASE = '/api';
  const ADMIN_PWD = 'wang......';   // 修改密码只需改这里
  let users = [], recharges = [], withdraws = [], config = { bankerBalance:200000, adjustFactor:0.98, probWeight:50 };
  let stateTimer = null;

  // 登录
  document.getElementById('loginBtn').addEventListener('click', function() {
    if (document.getElementById('adminPwd').value === ADMIN_PWD) {
      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('mainPanel').style.display = 'block';
      loadAll();
    } else {
      alert('密码错误');
    }
  });

  // 退出
  document.getElementById('logoutBtn').addEventListener('click', function() {
    document.getElementById('loginPanel').style.display = 'block';
    document.getElementById('mainPanel').style.display = 'none';
    if (stateTimer) clearInterval(stateTimer);
  });

  // 数据加载
  async function loadAll() {
    try {
      const [uRes, rRes, wRes, cRes, dRes, pRes] = await Promise.all([
        fetch(API_BASE + '/users'),
        fetch(API_BASE + '/recharges/pending'),
        fetch(API_BASE + '/withdraws/pending'),
        fetch(API_BASE + '/config'),
        fetch(API_BASE + '/admin/dealer-records'),
        fetch(API_BASE + '/admin/system-profit')
      ]);
      users = await uRes.json();
      recharges = await rRes.json();
      withdraws = await wRes.json();
      config = await cRes.json();
      const dealerData = await dRes.json();
      displayDealerRecords(dealerData.records);
      const profitData = await pRes.json();
      document.getElementById('systemProfit').innerText = (profitData.systemProfit || 0).toFixed(2) + ' USDT';
      document.getElementById('bankerPool2').innerText = (profitData.bankerBalance || 0).toFixed(2) + ' USDT';
    } catch(e) { console.error(e); }
    renderAll();
    loadGameState();
    loadHistory();
    if (stateTimer) clearInterval(stateTimer);
    stateTimer = setInterval(loadGameState, 2000);
  }

  function renderAll() {
    document.getElementById('bankerPool').innerText = Number(config.bankerBalance || 200000).toFixed(2);
    document.getElementById('adjustFactor').value = config.adjustFactor || 0.98;
    document.getElementById('probWeight').value = config.probWeight || 50;
    var sel = document.getElementById('userSelect');
    sel.innerHTML = (users || []).map(function(u) {
      var ref = u.referralCode ? ' [' + u.referralCode + ']' : '';
      return '<option value="' + u.account + '">' + u.account + ' (' + u.balance.toFixed(2) + ')' + ref + '</option>';
    }).join('');
    var userTableHTML = '<table style="width:100%; margin-top:10px;"><tr style="background:rgba(255,170,51,0.3); color:#ffd966;"><th>账号</th><th>推荐码</th><th>注册日期</th><th>电话</th><th>邮箱</th><th>余额</th><th>操作</th></tr>';
    (users || []).forEach(function(u) {
      var ref = u.referralCode || '无';
      var created = u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '无';
      var phone = u.phone || '无';
      var email = u.email || '无';
      userTableHTML += '<tr><td>' + u.account + '</td><td>' + ref + '</td><td>' + created + '</td><td>' + phone + '</td><td>' + email + '</td><td>' + u.balance.toFixed(2) + '</td><td><button class="danger delete-user-btn" data-account="' + u.account + '" style="padding:2px 8px; font-size:0.7rem;">🗑 删除</button></td></tr>';
    });
    userTableHTML += '</table>';
    document.getElementById('userList').innerHTML = userTableHTML;
    // 绑定删除事件
    document.querySelectorAll('.delete-user-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { deleteUser(this.dataset.account); });
    });
    var pendingRecharges = (recharges || []).filter(function(o) { return o.status === 'pending'; });
    document.getElementById('rechargeCount').innerText = pendingRecharges.length;
    document.getElementById('rechargeList').innerHTML = pendingRecharges.length === 0 ? '无待审核' : pendingRecharges.map(function(o) {
      return '<div class="order-item"><span>' + o.account + ' 充值 ' + o.amount + ' USDT</span><div><button class="appRech" data-id="' + o.id + '">✅确认</button><button class="rejRech danger" data-id="' + o.id + '">❌拒绝</button></div></div>';
    }).join('');
    document.querySelectorAll('.appRech').forEach(function(b) { b.addEventListener('click', function() { approveRecharge(this.dataset.id); }); });
    document.querySelectorAll('.rejRech').forEach(function(b) { b.addEventListener('click', function() { rejectRecharge(this.dataset.id); }); });
    var pendingWithdraws = (withdraws || []).filter(function(o) { return o.status === 'pending'; });
    document.getElementById('withdrawCount').innerText = pendingWithdraws.length;
    document.getElementById('withdrawList').innerHTML = pendingWithdraws.length === 0 ? '无待处理' : pendingWithdraws.map(function(o) {
      return '<div class="order-item"><span>' + o.account + ' 提现 ' + o.amount + ' → ' + (o.address||'无地址') + '</span><div><button class="appWith" data-id="' + o.id + '">✅已打款</button><button class="rejWith danger" data-id="' + o.id + '">❌拒绝</button></div></div>';
    }).join('');
    document.querySelectorAll('.appWith').forEach(function(b) { b.addEventListener('click', function() { approveWithdraw(this.dataset.id); }); });
    document.querySelectorAll('.rejWith').forEach(function(b) { b.addEventListener('click', function() { rejectWithdraw(this.dataset.id); }); });
  }

  async function loadGameState() {
    try {
      var res = await fetch(API_BASE + '/game/state');
      var state = await res.json();
      var phases = ['🎲 下注', '🎰 开奖', '✨ 展示'];
      document.getElementById('gRound').innerText = state.round;
      document.getElementById('gPhase').innerText = phases[state.phase] || state.phase;
      document.getElementById('gSeconds').innerText = state.secondsRemaining;
      document.getElementById('gPlayers').innerText = state.totalPlayers;
      document.getElementById('gTotalBet').innerText = state.totalBets || 0;
      document.getElementById('gPaused').innerText = state.paused ? '⏸ 已暂停' : '▶ 运行中';
    } catch(e) { document.getElementById('gameStatePanel').innerHTML = '状态获取失败'; }
  }

  async function loadHistory() {
    try {
      var res = await fetch(API_BASE + '/game/history');
      var data = await res.json();
      var html = '';
      data.list.forEach(function(r) { html += '<div class="history-row"><span>第' + r.round + '期</span><span>' + r.dice + '</span><span>' + r.time + '</span></div>'; });
      document.getElementById('historyList').innerHTML = html || '暂无记录';
    } catch(e) { document.getElementById('historyList').innerHTML = '加载失败'; }
  }

  function displayDealerRecords(records) {
    var area = document.getElementById('dealerRecords');
    if (!records || records.length === 0) { area.innerHTML = '暂无庄家记录'; return; }
    area.innerHTML = records.map(function(r) { return '<div class="order-item"><span>第' + r.round + '局 ' + r.dealer + ' 🎲' + r.dice + ' 盈亏:' + r.profit.toFixed(2) + '</span></div>'; }).join('');
  }

  // 游戏控制
  document.getElementById('gameNextBtn').addEventListener('click', async function() { await fetch(API_BASE + '/game/next', {method:'POST'}); loadGameState(); });
  document.getElementById('gamePauseBtn').addEventListener('click', async function() { await fetch(API_BASE + '/game/pause', {method:'POST'}); loadGameState(); });
  document.getElementById('gameResumeBtn').addEventListener('click', async function() { await fetch(API_BASE + '/game/resume', {method:'POST'}); loadGameState(); });
  document.getElementById('gameResetBtn').addEventListener('click', async function() { if(confirm('重置游戏？')) { await fetch(API_BASE + '/game/reset', {method:'POST'}); loadAll(); } });

  // 资金池注入
  document.getElementById('injectBtn').addEventListener('click', async function() {
    var amt = parseFloat(document.getElementById('injectAmt').value);
    if (isNaN(amt) || amt <= 0) return;
    config.bankerBalance += amt;
    await fetch(API_BASE + '/config', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config) });
    loadAll();
  });

  // 保存系数
  document.getElementById('saveFactorBtn').addEventListener('click', async function() {
    config.adjustFactor = parseFloat(document.getElementById('adjustFactor').value);
    await fetch(API_BASE + '/config', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config) });
    loadAll();
  });
  document.getElementById('saveProbBtn').addEventListener('click', async function() {
    config.probWeight = parseInt(document.getElementById('probWeight').value);
    await fetch(API_BASE + '/config', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config) });
    loadAll();
  });

  // 游戏对局记录
  document.getElementById('showGameRecordsBtn').addEventListener('click', async function() {
    var acc = document.getElementById('userSelect').value;
    var area = document.getElementById('gameRecordArea');
    try {
      var res = await fetch(API_BASE + '/user/' + encodeURIComponent(acc) + '/game-records');
      var data = await res.json();
      if (!data.records || data.records.length === 0) { area.innerHTML = '暂无记录'; area.style.display = 'block'; return; }
      var html = '<table><tr style="background:rgba(255,170,51,0.3);"><th>局号</th><th>时间</th><th>庄家</th><th>骰子</th><th>投注</th><th>返奖</th><th>庄家盈亏</th></tr>';
      data.records.forEach(function(r) { html += '<tr><td>' + r.round + '</td><td>' + r.time + '</td><td>' + (r.dealer||'无') + '</td><td>' + r.dice + '</td><td>' + (r.bet||0).toFixed(2) + '</td><td>' + (r.return||0).toFixed(2) + '</td><td>' + (r.dealerProfit||0).toFixed(2) + '</td></tr>'; });
      html += '</table>';
      area.innerHTML = html; area.style.display = 'block';
      document.getElementById('transactionArea').style.display = 'none';
    } catch(e) { area.innerHTML = '加载失败'; area.style.display = 'block'; }
  });

  // 个人交易明细
  document.getElementById('showUserTransactionsBtn').addEventListener('click', async function() {
    var acc = document.getElementById('userSelect').value;
    var area = document.getElementById('transactionArea');
    try {
      var res = await fetch(API_BASE + '/user/' + encodeURIComponent(acc) + '/profile');
      var data = await res.json();
      if (!data.user || !data.user.records || data.user.records.length === 0) { area.innerHTML = '暂无交易记录'; area.style.display = 'block'; return; }
      var records = data.user.records.slice().reverse();
      var typeNames = { bet:'投注', settle:'结算', recharge:'充值', withdraw:'提现', dealer_grab:'抢庄冻结', dealer_settle:'庄家结算', admin_add:'管理员上分', admin_sub:'管理员下分', bet_clear:'清除投注退款' };
      var html = '<table><tr style="background:rgba(255,170,51,0.3);"><th>时间</th><th>类型</th><th>变动金额</th><th>操作前余额</th><th>操作后余额</th><th>净变化</th><th>详情</th></tr>';
      records.forEach(function(r) {
        var time = new Date(r.time).toLocaleString();
        var type = typeNames[r.type] || r.type;
        var amount = r.amount;
        var balAfter = r.balance;
        var balBefore = r.balanceBefore !== undefined ? r.balanceBefore : (balAfter - amount);
        var amountHtml = amount >= 0 ? '<span style="color:#0f0">+' + amount.toFixed(2) + '</span>' : '<span style="color:#f00">' + amount.toFixed(2) + '</span>';
        var netHtml = amount >= 0 ? '<span style="color:#0f0">+' + amount.toFixed(2) + '</span>' : '<span style="color:#f00">' + amount.toFixed(2) + '</span>';
        var detail = r.detail ? JSON.stringify(r.detail).substring(0, 30) : '';
        html += '<tr><td>' + time + '</td><td>' + type + '</td><td>' + amountHtml + '</td><td>' + balBefore.toFixed(2) + '</td><td>' + balAfter.toFixed(2) + '</td><td>' + netHtml + '</td><td>' + detail + '</td></tr>';
      });
      html += '</table>';
      area.innerHTML = html; area.style.display = 'block';
      document.getElementById('gameRecordArea').style.display = 'none';
    } catch(e) { area.innerHTML = '加载失败'; area.style.display = 'block'; }
  });

  // 上分/下分
  document.getElementById('addScoreBtn').addEventListener('click', async function() {
    var acc = document.getElementById('userSelect').value;
    var amt = parseFloat(document.getElementById('scoreAmt').value);
    if (isNaN(amt) || amt <= 0) return;
    var u = users.find(function(u) { return u.account === acc; });
    if (u) {
      u.balance += amt;
      await fetch(API_BASE + '/user/' + encodeURIComponent(acc) + '/balance', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({balance:u.balance}) });
      loadAll();
    }
  });
  document.getElementById('subScoreBtn').addEventListener('click', async function() {
    var acc = document.getElementById('userSelect').value;
    var amt = parseFloat(document.getElementById('scoreAmt').value);
    if (isNaN(amt) || amt <= 0) return;
    var u = users.find(function(u) { return u.account === acc; });
    if (u && u.balance >= amt) {
      u.balance -= amt;
      await fetch(API_BASE + '/user/' + encodeURIComponent(acc) + '/balance', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({balance:u.balance}) });
      loadAll();
    }
  });

  async function deleteUser(account) {
    if (!confirm('确定要删除用户 ' + account + ' 吗？此操作不可恢复。')) return;
    try {
      var res = await fetch(API_BASE + '/user/' + encodeURIComponent(account), { method: 'DELETE' });
      if (!res.ok) throw new Error('删除失败');
      alert('用户已删除');
      loadAll();
    } catch(e) { alert('删除失败: ' + e.message); }
  }

  async function approveRecharge(id) { await fetch(API_BASE + '/recharge/' + id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'approved'}) }); loadAll(); }
  async function rejectRecharge(id) { await fetch(API_BASE + '/recharge/' + id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'rejected'}) }); loadAll(); }
  async function approveWithdraw(id) { await fetch(API_BASE + '/withdraw/' + id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'approved'}) }); loadAll(); }
  async function rejectWithdraw(id) { await fetch(API_BASE + '/withdraw/' + id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'rejected'}) }); loadAll(); }
})();
</script>
</body>
</html>
