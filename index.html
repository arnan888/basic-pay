<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANTUM_V6_CORE</title>
    <link rel="stylesheet" href="terminal.css">
</head>
<body>
    <div id="app">
        <header class="top-nav">
            <div class="brand">QUANTUM<span>TERMINAL</span></div>
            <div id="net-status" class="online">● API_ACTIVE</div>
        </header>

        <section class="vault-card">
            <div class="label">SECURE_BALANCE (USDT)</div>
            <div id="balance" class="value">0.00</div>
            <div class="decor-line"></div>
        </section>

        <main class="stage">
            <div class="pointer-node"></div>
            <div id="wheel" class="wheel-body"></div>
            <div class="wheel-shadow"></div>
        </main>

        <footer class="control-deck">
            <div class="bet-display">
                <span class="label">STAKE_LEVEL:</span>
                <span id="bet-val" class="num">10.00</span>
            </div>
            <div class="btn-group">
                <button class="btn" data-op="add" data-v="10">+10</button>
                <button class="btn" data-op="add" data-v="100">+100</button>
                <button class="btn btn-alt" data-op="x2">DOUBLE</button>
                <button class="btn btn-warn" data-op="max">MAX</button>
            </div>
            <button id="spin-trigger" class="main-trigger">EXECUTE QUANTUM_SPIN</button>
        </footer>
    </div>
    <script src="engine.js"></script>
</body>
</html>
