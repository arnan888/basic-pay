.fish-dice-3d-area {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
    perspective: 1200px;
}
.fish-dice-cube {
    width: 70px;
    height: 70px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.fish-dice-face {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #2a1e12;
    border: 2px solid #ffaa33;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: visible;
    font-size: 2rem;
    font-weight: bold;
    color: #ffd966;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
}
.fish-front { transform: translateZ(35px); }
.fish-back { transform: rotateY(180deg) translateZ(35px); }
.fish-right { transform: rotateY(90deg) translateZ(35px); }
.fish-left { transform: rotateY(-90deg) translateZ(35px); }
.fish-top { transform: rotateX(90deg) translateZ(35px); }
.fish-bottom { transform: rotateX(-90deg) translateZ(35px); }

    function withdraw() {
        let bal = getUserBalance();
        if (bal <= 0) { showToast("余额不足"); return; }
        let amount = parseFloat(prompt("提现金额 (元)", "10"));
        if (isNaN(amount) || amount <= 0 || amount > bal) { showToast("金额无效"); return; }
        let type = confirm("提现方式：确定=微信，取消=支付宝") ? "微信" : "支付宝";
        let account = prompt("请输入收款账号:");
        if (!account) return;
        setUserBalance(bal - amount);
        let records = JSON.parse(localStorage.getItem('neon_withdraw')) || [];
        records.push({ phone: currentUser.account, amount, type, account, time: new Date().toLocaleString() });
        localStorage.setItem('neon_withdraw', JSON.stringify(records));
        showToast(`提现申请已提交！${amount}元将处理到${type}账号 ${account}`);
    }

        usersData[account].records = rec;
        saveUsers();
