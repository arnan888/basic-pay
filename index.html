<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>双游戏大厅 | 葫芦鱼+骰宝 | 完善后台+抢庄+服务费</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #1a120c; background-image: radial-gradient(circle at 20% 30%, rgba(200,140,70,0.15) 2%, transparent 2.5%); background-size: 28px 28px; font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif; padding: 12px; }
        .app { max-width: 550px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .game-nav { background: linear-gradient(145deg, #2a241e 0%, #1f1a15 100%); border-radius: 60px; padding: 6px; display: flex; gap: 8px; border: 1px solid #ffaa44; flex-wrap: wrap; }
        .game-tab { flex: 1; background: transparent; border: none; padding: 8px 0; border-radius: 50px; font-weight: bold; font-size: 0.85rem; color: #ccaa77; cursor: pointer; transition: 0.2s; text-align: center; }
        .game-tab.active { background: #c47c3a; color: #2f1b0a; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .user-section { background: #1f1711; border-radius: 40px; padding: 8px 16px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
        .user-info-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .user-info-row span { color: #ffdd99; font-size: 0.75rem; }
        .btn-group { display: flex; gap: 8px; }
        .logout-btn, .service-btn { background: #734c2e; border: none; padding: 4px 12px; border-radius: 30px; color: #ffe3b3; font-size: 0.7rem; cursor: pointer; }
        .service-btn { background: #2e7d32; }
        .charge-withdraw-row { display: flex; gap: 10px; justify-content: center; }
        .charge-btn, .withdraw-btn { background: #c47c3a; border: none; padding: 5px 20px; border-radius: 30px; color: #2f1b0a; font-weight: bold; font-size: 0.75rem; cursor: pointer; flex: 1; text-align: center; box-shadow: 0 2px 0 #764e26; }
        .withdraw-btn { background: #734c2e; color: #ffe3b3; box-shadow: 0 2px 0 #3f2a1a; }
        .game-container { background: linear-gradient(145deg, #362a1f 0%, #251e16 100%); border-radius: 48px; box-shadow: 0 12px 25px rgba(0,0,0,0.5); overflow: hidden; min-height: 550px; }
        .auth-panel { background: linear-gradient(145deg, #362a1f 0%, #251e16 100%); border-radius: 48px; padding: 30px 20px; text-align: center; border: 2px solid #ffaa44; }
        .auth-panel h2 { color: #ffdd99; font-size: 1.5rem; margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; background: #2a241e; border: 1px solid #ffaa44; border-radius: 40px; color: white; font-size: 0.9rem; text-align: center; }
        .auth-buttons { display: flex; gap: 12px; margin: 20px 0; }
        .auth-btn { flex: 1; background: #c47c3a; border: none; padding: 10px; border-radius: 40px; color: #2f1b0a; font-weight: bold; cursor: pointer; }
        .auth-note { color: #aa8855; font-size: 0.65rem; }
        /* 葫芦鱼样式 */
        .fish-wrapper .chip { background: #ebbc7e; color: #3a240f; font-weight: bold; font-size: 0.7rem; padding: 3px 10px; border-radius: 35px; cursor: pointer; box-shadow: 0 2px 0 #8b5a2e; display: inline-block; text-align: center; }
        .fish-wrapper .chip.selected { background: #f7c56e; box-shadow: 0 0 0 1px #ffefb0, 0 2px 0 #7a4b22; }
        .fish-wrapper .bet-card { background: #1f1712; border-radius: 28px; padding: 4px 2px; text-align: center; box-shadow: 0 2px 0 #0a0705; border: 1px solid #6f4f34; }
        .fish-wrapper .bet-icon { font-size: 1.4rem; background: #2f231c; width: 36px; height: 36px; line-height: 36px; margin: 0 auto 3px; border-radius: 50%; }
        .fish-wrapper .bet-name { font-size: 0.65rem; font-weight: bold; color: #ffddb0; }
        .fish-wrapper .bet-amount { background: #0c0907; border-radius: 30px; padding: 2px 4px; margin: 4px 3px 0; display: flex; justify-content: space-between; align-items: center; gap: 2px; }
        .fish-wrapper .bet-amount span { color: #ffbc6e; font-size: 0.7rem; background: #2a1c12; padding: 1px 5px; border-radius: 25px; min-width: 32px; }
        .fish-wrapper .btn-chip { background: #523b26; border: none; color: #fce2b4; font-weight: bold; width: 24px; height: 24px; border-radius: 25px; font-size: 0.8rem; cursor: pointer; }
        .fish-wrapper .action-bar { display: flex; justify-content: center; gap: 8px; margin: 0 12px 12px; }
        .fish-wrapper .grab-bar { display: flex; justify-content: center; margin: 8px 12px; }
        .grab-btn { background: #ffaa44; color: #2f1b0a; border: none; padding: 6px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .grab-btn:disabled { background: #888; cursor: not-allowed; }
        .online-count-box { background: #2a1f16; margin: 12px 12px 8px; padding: 8px 12px; border-radius: 40px; text-align: center; font-size: 0.8rem; color: #ffdd99; border: 1px solid #ffaa44; }
        .online-number { font-size: 1.2rem; font-weight: bold; color: #ffaa44; margin-left: 8px; }
        /* 骰宝样式 */
        .dice-wrapper .dice { width: 60px; height: 60px; position: relative; transform-style: preserve-3d; }
        .dice-wrapper .dice-face { position: absolute; width: 60px; height: 60px; background: linear-gradient(145deg, #fffff0, #f5f5dc); border-radius: 12px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; border: 1px solid rgba(200,180,120,0.5); }
        .dice-wrapper .front { transform: translateZ(30px); }
        .dice-wrapper .back { transform: rotateY(180deg) translateZ(30px); }
        .dice-wrapper .right { transform: rotateY(90deg) translateZ(30px); }
        .dice-wrapper .left { transform: rotateY(-90deg) translateZ(30px); }
        .dice-wrapper .top { transform: rotateX(90deg) translateZ(30px); }
        .dice-wrapper .bottom { transform: rotateX(-90deg) translateZ(30px); }
        .dice-wrapper .pip { position: absolute; width: 9px; height: 9px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #e74c3c, #c0392b); }
        .dice-wrapper .chip.selected-chip { box-shadow: 0 0 0 3px #ffaa44; transform: scale(1.02); }
        .dice-wrapper .countdown-warning { animation: warning 0.5s infinite; color: #ff3300 !important; }
        @keyframes warning { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
        .result-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.6); background: linear-gradient(145deg, #ffcc44, #ff9933); color: #1a1a2a; padding: 24px 40px; border-radius: 80px; font-size: 2rem; font-weight: 900; z-index: 2000; opacity: 0; transition: 0.25s; pointer-events: none; }
        .result-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #000000cc; color: #ffaa44; padding: 8px 16px; border-radius: 40px; z-index: 2001; animation: fadeInOut 2s forwards; }
        @keyframes fadeInOut { 0% { opacity:0; transform: translateX(-50%) translateY(20px); } 15% { opacity:1; transform: translateX(-50%) translateY(0); } 85% { opacity:1; } 100% { opacity:0; transform: translateX(-50%) translateY(-20px); } }
        /* 充值弹窗样式 */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: #1a2a1a; border-radius: 48px; padding: 24px; border: 2px solid #ffaa44; width: 85%; max-width: 500px; text-align: center; color: #ffdd99; }
        .qr-img { width: 180px; height: 180px; margin: 10px auto; display: block; background: white; border-radius: 20px; padding: 10px; object-fit: contain; }
        .admin-user-list { max-height: 150px; overflow-y: auto; margin: 12px 0; background: #0a1a0a; border-radius: 12px; padding: 8px; }
        .admin-user { padding: 8px; border-bottom: 1px solid #333; cursor: pointer; }
        .admin-user.selected { background: #ffaa44; color: #1a1a2a; }
        .admin-input { width: 100%; padding: 8px; margin: 8px 0; border-radius: 12px; background: #0a1a0a; border: 1px solid #ffaa44; color: #fff; }
        .admin-btns { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 12px 0; }
        .admin-btn { padding: 6px 12px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
        /* 骰宝桌面平铺样式 */
        .dice-wrapper .section-title { font-size: 0.7rem; color: #ffd49f; margin: 12px 0 6px 4px; border-left: 3px solid #f7b05e; padding-left: 8px; }
        .dice-wrapper .special-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
        .dice-wrapper .points-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
        .dice-wrapper .trio-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
        .dice-wrapper .bet-card { background: #1f1712; border-radius: 28px; padding: 6px 2px; text-align: center; box-shadow: 0 6px 0 #0a0705; border: 1px solid #6f4f34; cursor: pointer; transition: 0.05s linear; }
        .dice-wrapper .bet-card:active { transform: translateY(3px); box-shadow: 0 3px 0 #0a0705; }
        .dice-wrapper .bet-card.selected { background: #c47c3a; transform: translateY(3px); box-shadow: 0 3px 0 #0a0705; }
        .dice-wrapper .bet-name { font-size: 0.7rem; font-weight: bold; color: #ffddb0; }
        .dice-wrapper .bet-odds { font-size: 0.55rem; color: #dba959; }
        .dice-wrapper .bet-amount { font-size: 0.65rem; font-weight: bold; color: #ffdd88; margin-top: 4px; background: rgba(0,0,0,0.5); border-radius: 20px; padding: 2px; }
        .dice-wrapper .chip:active { transform: translateY(3px); box-shadow: 0 1px 0 #0a0705 !important; }
        .dice-wrapper .action-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #0a0705 !important; }
        @media (max-width: 480px) {
            .dice-wrapper .dice { width: 50px; height: 50px; }
            .dice-wrapper .dice-face { width: 50px; height: 50px; }
            .dice-wrapper .front { transform: translateZ(25px); }
            .dice-wrapper .back { transform: rotateY(180deg) translateZ(25px); }
            .dice-wrapper .right { transform: rotateY(90deg) translateZ(25px); }
            .dice-wrapper .left { transform: rotateY(-90deg) translateZ(25px); }
            .dice-wrapper .top { transform: rotateX(90deg) translateZ(25px); }
            .dice-wrapper .bottom { transform: rotateX(-90deg) translateZ(25px); }
            .qr-img { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
    // ==================== 全局用户系统 ====================
    const USERS_KEY = 'double_games_final';
    let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
    let currentUser = null;

    function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0; }
    function setUserBalance(amt) { if(currentUser) { usersData[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#000000cc;backdrop-filter:blur(10px);color:#ffaa44;padding:8px 16px;border-radius:40px;font-size:0.7rem;z-index:2001;border:1px solid #ffaa44;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    function showService() { showToast("📞 客服热线: 400-888-XXXX"); }

    // ==================== 充值二维码（两个同时显示） ====================

const ALIPAY_QR = "mmexport1776247823872.jpg";

// ==================== 客服二维码 ====================

function recharge() { showRechargeModal(); }

    function addBet(type, id, val) {

    }
    function subBet(type, id, val) {
        let target = type === 'pattern' ? patternBets : specialBets;

    function getPointValue(pname) { const m={"鱼":1,"虾":2,"蟹":3,"葫芦":4,"金钱":5,"鸡":6}; return m[pname]||0; }
    
    // 中奖概率控制：仅系统坐庄时降低六门押注中奖概率 20%
    function shouldWinPattern(originalWin) {
        if (!originalWin) return false;
        if (hasGrabbed) return true;
        return Math.random() >= 0.2;
    }
    
    // 开奖记录存储（最多50条）

    async function settleGame(diceNames) {
        let points = diceNames.map(n=>getPointValue(n)), sum = points.reduce((a,b)=>a+b,0);
        let isTriplet = diceNames[0]===diceNames[1] && diceNames[1]===diceNames[2];
        let totalBet = getFishTotalBet();
        if(totalBet===0) { return false; }
        let userBal = getUserBalance();
        if(totalBet > userBal) { return false; }
        
        setUserBalance(userBal - totalBet);
        
        let winAmount = 0;
        let winDetails = [];
        
        for(let [pid, betVal] of Object.entries(patternBets)) {
            if(betVal===0) continue;
            let occur = diceNames.filter(n=> n === patternIdMap[pid]).length;
            let originalWin = occur > 0;
            let finalWin = shouldWinPattern(originalWin);
            
            if (finalWin) {
                let prize = betVal * (occur + 1);
                winAmount += prize;
                winDetails.push(`${patternIdMap[pid]} x${occur}`);
            }
        }
        
        let bigWin=false, smallWin=false, oddWin=false, evenWin=false, allTripletWin=false, doubleWin=false;
        if(!isTriplet) {
            if(sum>=11 && sum<=17) bigWin=true;
            if(sum>=4 && sum<=10) smallWin=true;
            if(sum%2===1) oddWin=true;
            if(sum%2===0) evenWin=true;
        }
        if(isTriplet) allTripletWin=true;
        if(diceNames.includes("鱼") && diceNames.includes("虾")) doubleWin = true;
        
        if(specialBets.big>0 && bigWin) { winAmount += specialBets.big*2; winDetails.push("大"); }
        if(specialBets.small>0 && smallWin) { winAmount += specialBets.small*2; winDetails.push("小"); }
        if(specialBets.odd>0 && oddWin) { winAmount += specialBets.odd*2; winDetails.push("单"); }
        if(specialBets.even>0 && evenWin) { winAmount += specialBets.even*2; winDetails.push("双"); }
        if(specialBets.allTriplets>0 && allTripletWin) { winAmount += specialBets.allTriplets*24; winDetails.push("全围"); }
        if(specialBets.doubleBet>0 && doubleWin) { winAmount += specialBets.doubleBet*4.5; winDetails.push("双押(鱼+虾)"); }
        
        let net = winAmount - totalBet;
        let newBalance = getUserBalance() + winAmount;
        setUserBalance(newBalance);
        
        if (hasGrabbed) {
            playerBankerBalance -= winAmount;
            if (playerBankerBalance < 0) {
                showFishMsg(`⚠️ 庄家余额不足，自动回收庄家权限！`);
                hasGrabbed = false;
                playerBankerBalance = 0;
                localStorage.setItem(getPlayerBankerKey(), 0);
                updateGrabButtonState();
            } else {
                localStorage.setItem(getPlayerBankerKey(), playerBankerBalance);
            }
        }
        
        lastWinAmount = net;
        updateFishUI();
        
        // 记录开奖结果
        let resultText = diceNames.join("、");
        let winText = winAmount > 0 ? `中奖 ${winAmount}` : `未中奖 (输 ${totalBet})`;
        gameRecords.unshift({
            time: new Date().toLocaleTimeString(),
            dice: resultText,
            result: winText,
            winAmount: winAmount
        });
        if (gameRecords.length > 50) gameRecords.pop();
        
        clearAllBets();
        document.getElementById("userBalanceDisplay").innerText = newBalance.toFixed(2);
        
        updateGrabButtonState();
        return true;
    }
    async function onFishRoll() {
        if(isRolling) return;
        let total = getFishTotalBet();

        if(total > getUserBalance()) { showFishMsg("下注总额超过余额，请减少下注"); return; }

        isRolling = false;
    }

        pwdModal.className = 'modal';
        pwdModal.innerHTML = `<div class="modal-content"><h2>🔐 管理员验证</h2><input type="password" id="adminPwdInput" class="password-input" placeholder="请输入管理密码" autocomplete="off"><button id="submitPwdBtn" class="modal-btn">确认</button><button id="cancelPwdBtn" class="modal-btn" style="background:#555; color:#fff;">取消</button></div>`;
        document.body.appendChild(pwdModal);
        const input = pwdModal.querySelector('#adminPwdInput');
        const submitBtn = pwdModal.querySelector('#submitPwdBtn');
        const cancelBtn = pwdModal.querySelector('#cancelPwdBtn');
        const check = () => {
            const adminPwd = localStorage.getItem('admin_pwd') || "admin123";
            if (input.value === adminPwd) {
                pwdModal.remove();
                showFishAdminPanel();
            } else { showToast("密码错误"); input.value = ''; input.focus(); }
        };
        submitBtn.onclick = check;
        cancelBtn.onclick = () => pwdModal.remove();
        input.onkeypress = (e) => { if(e.key === 'Enter') check(); };
        input.focus();
    }

                         </div>`;
        userListHtml += `<button id="adminClose" class="close-modal">关闭后台</button>`;

        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h2>🎛️ 管理员后台</h2>${userListHtml}</div>`;
        document.body.appendChild(modal);

        const getUserSelect = () => modal.querySelector('#adminTargetUser').value;
        const getAmount = () => parseInt(modal.querySelector('#adminAmount').value) || 0;

        // 庄家操作（注意使用房间对应的 key）
        modal.querySelector('.add-banker')?.addEventListener('click', () => {
            fishBalance += 100;
            localStorage.setItem(getBankerKey(), fishBalance);
            updateFishUI();
            showToast(`庄家余额 +100，当前 ${fishBalance}`);
            modal.remove();
            openFishAdminPanel();
        });
        modal.querySelector('.sub-banker')?.addEventListener('click', () => {
            if (fishBalance >= 100) {
                fishBalance -= 100;
                localStorage.setItem(getBankerKey(), fishBalance);
                updateFishUI();
                showToast(`庄家余额 -100，当前 ${fishBalance}`);
            } else showToast("庄家余额不足100");
            modal.remove();
            openFishAdminPanel();
        });
        modal.querySelector('.reset-banker')?.addEventListener('click', () => {
            fishBalance = 10000;
            localStorage.setItem(getBankerKey(), fishBalance);
            updateFishUI();
            showToast("庄家余额重置为 10000");
            modal.remove();
            openFishAdminPanel();
        });

        // 玩家操作（上分/下分/重置，与房间无关，因为是修改玩家自身余额）
        modal.querySelector('#adminAdd').onclick = () => {
            const targetPhone = getUserSelect();
            let amount = getAmount();
            if (isNaN(amount) || amount <= 0) { showToast("请输入大于0的整数金额"); return; }
            usersData[targetPhone].balance += amount;
            saveUsers();
            showToast(`给 ${targetPhone} 上分 +${amount}，新余额 ${usersData[targetPhone].balance.toFixed(2)}`);
            if (targetPhone === currentUser.phone) {
                currentUser.balance = usersData[targetPhone].balance;
                document.getElementById("userBalanceDisplay").innerText = currentUser.balance.toFixed(2);
                updateGrabButtonState();
            }
            modal.remove();
            openFishAdminPanel();
        };

        modal.querySelector('#adminSub').onclick = () => {
            const targetPhone = getUserSelect();
            let amount = getAmount();
            if (isNaN(amount) || amount <= 0) { showToast("请输入大于0的整数金额"); return; }
            let curBalance = usersData[targetPhone].balance;
            if (curBalance >= amount) {
                usersData[targetPhone].balance -= amount;
                saveUsers();
                showToast(`从 ${targetPhone} 下分 -${amount}，新余额 ${usersData[targetPhone].balance.toFixed(2)}`);
                if (targetPhone === currentUser.phone) {
                    currentUser.balance = usersData[targetPhone].balance;
                    document.getElementById("userBalanceDisplay").innerText = currentUser.balance.toFixed(2);
                    updateGrabButtonState();
                }
            } else { showToast(`${targetPhone} 余额不足，无法下分 ${amount}`); }
            modal.remove();
            openFishAdminPanel();
        };

        modal.querySelector('#adminQuery').onclick = () => {
            const targetPhone = getUserSelect();
            showToast(`${targetPhone} 余额: ${usersData[targetPhone].balance.toFixed(2)}`);
        };

        modal.querySelector('#adminReset').onclick = () => {
            const targetPhone = getUserSelect();
            if (confirm(`重置 ${targetPhone} 余额为 1000？`)) {
                usersData[targetPhone].balance = 1000;
                saveUsers();
                showToast(`${targetPhone} 余额已重置为 1000`);
                if (targetPhone === currentUser.phone) {
                    currentUser.balance = 1000;
                    document.getElementById("userBalanceDisplay").innerText = "1000.00";
                    updateGrabButtonState();
                }
                modal.remove();
                openFishAdminPanel();
            }
        };

        modal.querySelector('#adminPwd').onclick = () => {
            let newPwd = prompt("请输入新管理密码 (至少4位):");
            if (newPwd && newPwd.length >= 4) {
                localStorage.setItem('admin_pwd', newPwd);
                showToast("管理密码修改成功！");
            } else if (newPwd) showToast("密码至少4位");
        };

        modal.querySelector('#adminClose').onclick = () => modal.remove();
    }

    // 在线人数模拟
    let onlineCount = 128;
    const onlineSpan = container.querySelector('#onlineCount');
    function updateOnlineCount() {
        let change = Math.floor(Math.random() * 11) - 5;
        let newCount = onlineCount + change;
        if (newCount < 50) newCount = 50;
        if (newCount > 200) newCount = 200;
        onlineCount = newCount;
        onlineSpan.innerText = onlineCount;
    }
    let onlineInterval = setInterval(updateOnlineCount, 30000);
    onlineSpan.innerText = onlineCount;

    fishDestroy = () => {
        if (onlineInterval) clearInterval(onlineInterval);
        container.innerHTML = '';
    };
    return fishDestroy;
    }

    // ========== 游戏逻辑 ==========
    const CONFIG = { countdownSeconds: 25, defaultBalance: 1000, odds: {4:60,5:30,6:18,7:12,8:8,9:7,10:6,11:6,12:7,13:8,14:12,15:18,16:30,17:60,'BIG':2,'SMALL':2,'ODD':2,'EVEN':2,'TRIPLE_1':150,'TRIPLE_2':150,'TRIPLE_3':150,'TRIPLE_4':150,'TRIPLE_5':150,'TRIPLE_6':150,'ALL_TRIPLE':30} };

    let selectedChip = 0, currentBalance = getUserBalance();

    // 生成骰子3D面（必须执行，否则骰子不显示）
    function buildDiceFaces() {
        diceEl.forEach(dice => {

                else if (num === 3) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div>';

                else if (num === 6) pipHtml = '<div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div>';

    buildDiceFaces();

    function setDiceValue(dice, val) {
        const rot = {1:'rotateX(0deg) rotateY(0deg)',2:'rotateX(-90deg) rotateY(0deg)',3:'rotateX(0deg) rotateY(90deg)',4:'rotateX(0deg) rotateY(-90deg)',5:'rotateX(90deg) rotateY(0deg)',6:'rotateX(180deg) rotateY(0deg)'};
        dice.style.transform = rot[val];
    }
    
    async function startRolling(finalVals) {
        return new Promise(resolve => {
            diceEl[0].classList.add('rolling1');
            diceEl[1].classList.add('rolling2');
            diceEl[2].classList.add('rolling3');
            let step = 0, maxStep = 18;
            let iv = setInterval(() => {
                step++;
                diceEl.forEach(d => setDiceValue(d, Math.floor(Math.random() * 6) + 1));
                if (step >= maxStep) {
                    clearInterval(iv);
                    diceEl.forEach(d => d.classList.remove('rolling1','rolling2','rolling3'));
                    diceEl.forEach((d, i) => {
                        setDiceValue(d, finalVals[i]);
                        d.classList.add('land');
                        setTimeout(() => d.classList.remove('land'), 200);
                    });
                    resolve();
                }
            }, 50);
        });
    }
    
    function startRollingNumber(finalAmount) {
        if (rollingAnimation) cancelAnimationFrame(rollingAnimation);
        let startTime = performance.now(), duration = 5000, startVal = 0.01;
        function update(now) {
            let elapsed = now - startTime, progress = Math.min(1, elapsed / duration), ease = 1 - Math.pow(1 - progress, 2);
            let current = startVal + (finalAmount - startVal) * ease;
            rollingWinEl.innerText = current.toFixed(2);
            if (progress < 1) rollingAnimation = requestAnimationFrame(update);
            else { rollingWinEl.innerText = finalAmount.toFixed(2); rollingAnimation = null; }
        }
        rollingAnimation = requestAnimationFrame(update);
    }
    
    function getResultInfo(d1,d2,d3) {
        let total = d1+d2+d3, types = [];
        if (total>=11 && total<=17) types.push('BIG');
        if (total>=4 && total<=10) types.push('SMALL');
        if (total%2===1) types.push('ODD');
        if (total%2===0) types.push('EVEN');
        if (d1===d2 && d2===d3) { types.push('TRIPLE_'+d1); types.push('ALL_TRIPLE'); }
        return { total, types };
    }
    
    function updateUI() {
        container.querySelector('#bet_BIG').innerText = bets['BIG'];
        container.querySelector('#bet_SMALL').innerText = bets['SMALL'];
        container.querySelector('#bet_ODD').innerText = bets['ODD'];
        container.querySelector('#bet_EVEN').innerText = bets['EVEN'];
        for (let i=4;i<=17;i++) { let el = container.querySelector('#bet_'+i); if(el) el.innerText = bets[i]; }
        for (let i=1;i<=6;i++) { let el = container.querySelector('#bet_TRIPLE_'+i); if(el) el.innerText = bets['TRIPLE_'+i]; }
        container.querySelector('#bet_ALL_TRIPLE').innerText = bets['ALL_TRIPLE'];
        let totalBet = Object.values(bets).reduce((a,b)=>a+b,0);
        totalBetEl.innerText = totalBet;
    }
    
    function addBet(type) {
        if (hasGrabbed) {
            showToast("您是庄家，不能下注！");
            return;
        }
        if (selectedChip<=0) { showToast("请先选择筹码"); return; }
        if (selectedChip>currentBalance) { showToast("余额不足"); return; }
        currentBalance -= selectedChip;
        setUserBalance(currentBalance);
        bets[type] += selectedChip;
        updateUI();
        let selector = '';
        if (typeof type === 'string') {
            if (type.startsWith('TRIPLE_')) selector = `.trio-card[data-type="${type}"]`;
            else selector = `.special-card[data-type="${type}"]`;
        } else {
            selector = `.point-card[data-point="${type}"]`;
        }
        let el = container.querySelector(selector);
        if (el) { el.classList.add('selected'); setTimeout(() => el.classList.remove('selected'), 800); }
    }
    
    function clearAllBets() {
        let total = Object.values(bets).reduce((a,b)=>a+b,0);
        currentBalance += total;
        setUserBalance(currentBalance);
        for (let k in bets) bets[k]=0;
        updateUI();
        showToast("已取消所有下注");
    }
    
    function repeatLastBet() {
        if (!lastBet) { showToast("没有可续押的记录"); return; }
        let totalNeed = Object.values(lastBet).reduce((a,b)=>a+b,0);
        if (totalNeed>currentBalance) { showToast("余额不足，无法续押"); return; }
        for (let k in bets) bets[k]=0;
        for (let k in lastBet) bets[k]=lastBet[k];
        currentBalance -= totalNeed;
        setUserBalance(currentBalance);
        updateUI();
        if (!isDrawing && !isBetLocked) drawWithCover();
    }
    
    // 抢庄功能
    const diceGrabBtn = container.querySelector('#diceGrabBtn');

        const curBalance = getUserBalance();
        if (hasGrabbed) {

    async function grabBanker() {
        if (hasGrabbed) {
            showToast("您已经是庄家了！");

        }

    // 开奖记录存储
    let gameRecords = [];
    
    async function drawWithCover() {
        if (isDrawing) return;
        let totalBet = Object.values(bets).reduce((a,b)=>a+b,0);
        if (totalBet===0) { showToast("请先下注"); return; }
        if (totalBet>currentBalance) { showToast("余额不足，无法开奖"); return; }
        isDrawing=true; isBetLocked=true;
        
        // 生成随机点数（1-6）
        let d1 = Math.floor(Math.random() * 6) + 1;
        let d2 = Math.floor(Math.random() * 6) + 1;
        let d3 = Math.floor(Math.random() * 6) + 1;
        
        let {total,types} = getResultInfo(d1,d2,d3);
        let winAmounts = [];
        if (types.includes('BIG') && bets['BIG']>0) winAmounts.push(bets['BIG']*2);
        if (types.includes('SMALL') && bets['SMALL']>0) winAmounts.push(bets['SMALL']*2);
        if (types.includes('ODD') && bets['ODD']>0) winAmounts.push(bets['ODD']*2);
        if (types.includes('EVEN') && bets['EVEN']>0) winAmounts.push(bets['EVEN']*2);
        if (bets[total]>0) winAmounts.push(bets[total]*CONFIG.odds[total]);
        for (let t of types) {
            if (t.startsWith('TRIPLE_') && bets[t]>0) winAmounts.push(bets[t]*CONFIG.odds[t]);
            if (t==='ALL_TRIPLE' && bets['ALL_TRIPLE']>0) winAmounts.push(bets['ALL_TRIPLE']*CONFIG.odds['ALL_TRIPLE']);
        }
        let totalWin = winAmounts.reduce((a,b)=>a+b,0);
        
        startRollingNumber(totalWin);
        await startRolling([d1, d2, d3]);
        totalEl.innerText = total;
        currentBalance += totalWin;
        setUserBalance(currentBalance);
        
        if (hasGrabbed) {
            playerBankerBalance -= totalWin;
            if (playerBankerBalance < 0) {
                showToast(`⚠️ 庄家余额不足，自动回收庄家权限！`);

                    chip.style.opacity = "1";

            }
        }
        
        // 记录开奖结果
        let resultText = `点数和${total}`;
        let winText = totalWin > 0 ? `中奖 ${totalWin}` : `未中奖`;
        gameRecords.unshift({
            time: new Date().toLocaleTimeString(),
            dice: `${d1},${d2},${d3}`,
            result: resultText,
            win: totalWin,
            isWin: totalWin > 0
        });
        if (gameRecords.length > 50) gameRecords.pop();
        
        // 清空下注
        for (let k in bets) bets[k]=0;
        updateUI();
        lastBet = JSON.parse(JSON.stringify(bets));
        
        let winTextPopup = totalWin>0 ? `🎉 恭喜！ 赢 ${totalWin.toFixed(2)} 🎉` : `😭 很遗憾 输 ${totalBet.toFixed(2)} 😭`;
        let pop = document.createElement('div'); pop.className='result-popup '+(totalWin>0?'win':'lose'); pop.textContent=winTextPopup; document.body.appendChild(pop); setTimeout(()=>pop.classList.add('show'),10); setTimeout(()=>{pop.classList.remove('show');setTimeout(()=>pop.remove(),300);},2000);
        
        setTimeout(()=>{ isDrawing=false; isBetLocked=false; startCountdown(CONFIG.countdownSeconds); },5000);
    }
    
    // 开奖记录弹窗（类似葫芦鱼）

    function init() {
        container.querySelectorAll('.chip').forEach(chip => {
            chip.onclick = function() { 
                if (hasGrabbed) { showToast("您是庄家，不能下注！"); return; }
                selectedChip = parseInt(this.dataset.val); 
                container.querySelector('#selectedChip').innerText = selectedChip; 
                container.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected-chip')); 
                this.classList.add('selected-chip'); 
            };
        });
        container.querySelectorAll('.special-card').forEach(card => card.onclick = () => { if (hasGrabbed) { showToast("您是庄家，不能下注！"); return; } addBet(card.dataset.type); });
        container.querySelectorAll('.point-card').forEach(card => card.onclick = () => { if (hasGrabbed) { showToast("您是庄家，不能下注！"); return; } addBet(parseInt(card.dataset.point)); });
        container.querySelectorAll('.trio-card').forEach(card => card.onclick = () => { if (hasGrabbed) { showToast("您是庄家，不能下注！"); return; } addBet(card.dataset.type); });
        container.querySelector('#clearAllBtn').onclick = clearAllBets;
        container.querySelector('#repeatBtn').onclick = repeatLastBet;
        container.querySelector('#refreshBtn').onclick = refreshBalance;
        container.querySelector('#betBtn').onclick = () => { if(!isDrawing && !isBetLocked) drawWithCover(); };
        container.querySelector('#adminEntry').onclick = () => { let pwd=prompt("管理员密码:"); if(pwd===adminPwd) showAdminPanel(); else if(pwd!==null) showToast("密码错误"); };
        
        // 开奖记录按钮
        const historyBtn = container.querySelector('#showDiceHistoryBtn');
        if (historyBtn) historyBtn.onclick = showRecordModal;
        
        // 初始化骰子显示为1点
        diceEl.forEach(d => setDiceValue(d, 1));
        totalEl.innerText = 3;
        updateUI(); startCountdown(CONFIG.countdownSeconds);
    }
    init();

    diceDestroy = () => {
        if (countdownInterval) clearInterval(countdownInterval);
        if (rollingAnimation) cancelAnimationFrame(rollingAnimation);
        container.innerHTML = '';
    };
    return diceDestroy;
} 
    // ==================== 预留游戏三、四 ====================
    function initGame3(container) { container.innerHTML = '<div style="padding:40px;text-align:center;color:#ffdd99;">🎮 游戏3预留位</div>'; return ()=>{}; }
    function initGame4(container) { container.innerHTML = '<div style="padding:40px;text-align:center;color:#ffdd99;">♠️ 游戏4预留位</div>'; return ()=>{}; }

    // ==================== 主界面 ====================
    function renderAuthUI() {
        const savedPhone = localStorage.getItem('saved_phone') || '';
        const savedPwd = localStorage.getItem('saved_password') || '';
        const rememberChecked = localStorage.getItem('remember_me') === 'true';
        const app = document.getElementById('app');
        app.innerHTML = `<div class="auth-panel"><h2>🎲 双游戏大厅</h2><input type="tel" id="regPhone" class="auth-input" placeholder="手机号" maxlength="11" value="${savedPhone}"><input type="password" id="regPassword" class="auth-input" placeholder="密码 (至少4位)" value="${savedPwd}"><div style="display:flex; align-items:center; gap:8px; margin:8px 0;"><input type="checkbox" id="rememberCheckbox" ${rememberChecked ? 'checked' : ''}><label style="color:#ffdd99;">记住账号密码</label></div><div class="auth-buttons"><button id="loginBtn" class="auth-btn">登录</button><button id="registerBtn" class="auth-btn">注册</button></div><div class="auth-note">🎮 测试手机号注册 | 初始1000</div></div>`;
        document.getElementById('loginBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let remember = document.getElementById('rememberCheckbox').checked;
            if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            let user = usersData[phone];
            if(!user) { showToast("手机号未注册"); return; }
            if(user.password !== pwd) { showToast("密码错误"); return; }
            if(remember) { localStorage.setItem('saved_phone', phone); localStorage.setItem('saved_password', pwd); localStorage.setItem('remember_me', 'true'); }
            else { localStorage.removeItem('saved_phone'); localStorage.removeItem('saved_password'); localStorage.setItem('remember_me', 'false'); }
            currentUser = { phone, ...user };
            showToast(`欢迎，${phone}`);
            renderGameLobby();
        };
        document.getElementById('registerBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            if(!/^1[3-9]\d{9}$/.test(phone)) { showToast("请输入有效11位手机号"); return; }
            if(pwd.length < 4) { showToast("密码至少4位"); return; }
            if(usersData[phone]) { showToast("手机号已注册"); return; }
            usersData[phone] = { password: pwd, balance: 1000 };
            saveUsers();
            showToast("注册成功！请登录");
        };
    }

    function renderGameLobby() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="user-section">
                <div class="user-info-row">
                    <span>📱 ${currentUser.phone.substring(0,7)}... | 💰 余额: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span>
                    <div class="btn-group"><button id="serviceBtn" class="service-btn">📞 客服</button><button id="logoutBtn" class="logout-btn">退出</button></div>
                </div>
                <div class="charge-withdraw-row"><button id="rechargeBtn" class="charge-btn">💎 充值</button><button id="withdrawBtn" class="withdraw-btn">💰 提现</button></div>
            </div>
            <div class="game-nav">
                <button class="game-tab active" data-game="fish">🎲 葫芦鱼</button>
                <button class="game-tab" data-game="dice">🎲 至尊骰宝</button>
                <button class="game-tab" data-game="game3">🎮 游戏3</button>
                <button class="game-tab" data-game="game4">♠️ 游戏4</button>
            </div>
            <div class="game-container"><div id="gamePanel"></div></div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showService;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;

        const gameContainer = document.getElementById('gamePanel');
        let currentDestroy = null;
        const gameInits = { fish: initFishGame, dice: initDiceGame, game3: initGame3, game4: initGame4 };

        async function switchGame(gameId) {
            if (currentDestroy) { currentDestroy(); currentDestroy = null; }
            gameContainer.innerHTML = '';
            const initFn = gameInits[gameId];
            if (initFn) {
                const destroy = await initFn(gameContainer);
                if (typeof destroy === 'function') currentDestroy = destroy;
            }
            document.getElementById('userBalanceDisplay').innerText = getUserBalance().toFixed(2);
        }

        document.querySelectorAll('.game-tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchGame(btn.dataset.game);
            };
        });
        switchGame('fish');
    }

    renderAuthUI();
</script>
