      /* 鱼虾蟹骰子 */
.fish-dice-3d-area {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
    perspective: 1200px;
}
.fish-dice-cube {
    width: 70px;
    height: 70px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.fish-dice-face {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #2a1e12;
    border: 2px solid #ffaa33;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: visible;
    font-size: 2rem;
    font-weight: bold;
    color: #ffd966;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
}
.fish-front { transform: translateZ(35px); }
.fish-back { transform: rotateY(180deg) translateZ(35px); }
.fish-right { transform: rotateY(90deg) translateZ(35px); }
.fish-left { transform: rotateY(-90deg) translateZ(35px); }
.fish-top { transform: rotateX(90deg) translateZ(35px); }
.fish-bottom { transform: rotateX(-90deg) translateZ(35px); }

/* 骰宝骰子 */
.dice-3d-area {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
    perspective: 1200px;
}
.dice-cube {
    width: 70px;
    height: 70px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.dice-face {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #2a1e12;
    border: 2px solid #ffaa33;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: visible;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
}
.front { transform: translateZ(35px); }
.back { transform: rotateY(180deg) translateZ(35px); }
.right { transform: rotateY(90deg) translateZ(35px); }
.left { transform: rotateY(-90deg) translateZ(35px); }
.top { transform: rotateX(90deg) translateZ(35px); }
.bottom { transform: rotateX(-90deg) translateZ(35px); }

@media (max-width: 480px) {
    .fish-dice-cube, .dice-cube { width: 60px; height: 60px; }
    .fish-front, .fish-back, .fish-right, .fish-left, .fish-top, .fish-bottom,
    .front, .back, .right, .left, .top, .bottom { transform: translateZ(30px); }
    .fish-back, .back { transform: rotateY(180deg) translateZ(30px); }
    .fish-right, .right { transform: rotateY(90deg) translateZ(30px); }
    .fish-left, .left { transform: rotateY(-90deg) translateZ(30px); }
    .fish-top, .top { transform: rotateX(90deg) translateZ(30px); }
    .fish-bottom, .bottom { transform: rotateX(-90deg) translateZ(30px); }
    .fish-dice-face, .dice-face { font-size: 1.5rem; }
}

        @keyframes dtFlash {
            0% { opacity: 1; text-shadow: 0 0 5px gold; }
            50% { opacity: 0.3; text-shadow: 0 0 30px orange; }
            100% { opacity: 1; text-shadow: 0 0 5px gold; }
        }
        @keyframes dtShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px) scale(1.05); }
            50% { transform: translateX(8px) scale(1.1); }
            75% { transform: translateX(-4px) scale(1.05); }
            100% { transform: translateX(0) scale(1); }
