<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>潮汕葫芦鱼·二十人房 | 骰盅慢启 | 充值提现</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1a120c;
            background-image: radial-gradient(circle at 20% 30%, rgba(200, 140, 70, 0.15) 2%, transparent 2.5%);
            background-size: 28px 28px;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;
            padding: 12px;
        }

        .app {
            max-width: 550px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 登录面板 */
        .auth-panel {
            background: linear-gradient(145deg, #362a1f 0%, #251e16 100%);
            border-radius: 48px;
            padding: 30px 20px;
            margin: 20% 0;
            text-align: center;
            border: 2px solid #ffaa44;
        }
        .auth-panel h2 { color: #ffdd99; font-size: 1.5rem; margin-bottom: 20px; }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a241e;
            border: 1px solid #ffaa44;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            text-align: center;
        }
        .auth-buttons { display: flex; gap: 12px; margin: 20px 0; }
        .auth-btn {
            flex: 1;
            background: #c47c3a;
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: #2f1b0a;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .auth-note { color: #aa8855; font-size: 0.65rem; }

        /* 用户信息栏 + 充值提现按钮 */
        .user-section {
            background: #1f1711;
            border-radius: 40px;
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 8px;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .user-info-row span { color: #ffdd99; font-size: 0.75rem; }
        .user-info-row .btn-group { display: flex; gap: 8px; }
        .logout-btn, .service-btn {
            background: #734c2e;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            color: #ffe3b3;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .service-btn { background: #2e7d32; }
        .charge-withdraw-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .charge-btn, .withdraw-btn {
            background: #c47c3a;
            border: none;
            padding: 5px 20px;
            border-radius: 30px;
            color: #2f1b0a;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            flex: 1;
            text-align: center;
            box-shadow: 0 2px 0 #764e26;
        }
        .withdraw-btn { background: #734c2e; color: #ffe3b3; box-shadow: 0 2px 0 #3f2a1a; }
        .charge-btn:active, .withdraw-btn:active { transform: translateY(2px); box-shadow: none; }

        /* 主游戏卡片 */
        .main-card {
            background: linear-gradient(145deg, #362a1f 0%, #251e16 100%);
            border-radius: 48px;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 210, 120, 0.2);
            overflow: hidden;
        }

        .game-header {
            background: linear-gradient(135deg, #b85a2e, #7a3116);
            padding: 10px 16px;
            text-align: center;
            border-bottom: 3px solid #f7bc6c;
        }
        .game-header h1 { font-size: 1.2rem; font-weight: 800; color: #ffefcf; text-shadow: 2px 2px 0 #56200c; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .sub { font-size: 0.55rem; color: #ffdd99; background: #4e2613b3; display: inline-block; padding: 2px 12px; border-radius: 40px; margin-top: 4px; }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            padding: 8px 12px;
            background: #1f1711;
            border-bottom: 1px solid #644a33;
        }
        .stat-card {
            background: #1a130d;
            border-radius: 30px;
            padding: 4px 8px;
            flex: 1;
            text-align: center;
        }
        .stat-label { font-size: 0.55rem; color: #e2bc89; }
        .stat-value { font-size: 1rem; font-weight: 800; color: #f9d792; line-height: 1.2; font-family: monospace; }

        /* 骰子区域 */
        .dice-area {
            background: #2a211a;
            margin: 12px 12px 8px;
            border-radius: 50px;
            padding: 12px;
            text-align: center;
            box-shadow: inset 0 0 0 2px #5e4230, 0 6px 12px black;
            position: relative;
        }
        .dice-title { font-size: 0.65rem; color: #f5c28e; margin-bottom: 6px; }
        .dice-box { display: flex; justify-content: center; gap: 12px; position: relative; }
        .dice {
            background: #fff2df;
            width: 70px;
            height: 70px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            box-shadow: 0 5px 0 #926b42;
            border: 1px solid #e5b874;
        }
        .dice-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.9), #2c1e14);
            backdrop-filter: blur(6px);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 15;
            transition: all 0.5s cubic-bezier(0.34, 1.1, 0.55, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,215,150,0.3);
            border: 2px solid #cb9e6b;
        }
        .dice-cover span { font-size: 3rem; filter: drop-shadow(2px 4px 6px black); }
        .dice-cover .cover-text { font-size: 0.65rem; background: #00000099; padding: 2px 12px; border-radius: 30px; margin-top: 6px; color: #ffdd99; }
        .dice-cover.open-cover { transform: translateY(-70px) scale(0.6); opacity: 0; visibility: hidden; }
        .dice-cover.hidden-cover { display: none; }

        /* 投注区 */
        .bet-sections { padding: 0 12px 8px; }
        .section-title { font-size: 0.7rem; color: #ffd49f; margin: 8px 0 6px 4px; border-left: 3px solid #f7b05e; padding-left: 8px; }
        .bet-grid, .special-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }
        .bet-card {
            background: #1f1712;
            border-radius: 28px;
            padding: 4px 2px;
            text-align: center;
            box-shadow: 0 2px 0 #0a0705;
            border: 1px solid #6f4f34;
        }
        .bet-icon {
            font-size: 1.4rem;
            background: #2f231c;
            width: 36px;
            height: 36px;
            line-height: 36px;
            margin: 0 auto 3px;
            border-radius: 50%;
        }
        .bet-name { font-size: 0.65rem; font-weight: bold; color: #ffddb0; }
        .bet-odds { font-size: 0.5rem; color: #dba959; }
        .bet-amount {
            background: #0c0907;
            border-radius: 30px;
            padding: 2px 4px;
            margin: 4px 3px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2px;
        }
        .bet-amount span {
            color: #ffbc6e;
            font-size: 0.7rem;
            background: #2a1c12;
            padding: 1px 5px;
            border-radius: 25px;
            min-width: 32px;
        }
        .btn-chip {
            background: #523b26;
            border: none;
            color: #fce2b4;
            font-weight: bold;
            width: 24px;
            height: 24px;
            border-radius: 25px;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 1px 2px black;
        }
        .btn-chip:active { transform: scale(0.92); }

        /* 筹码栏 */
        .chip-bar {
            background: #2a1f16;
            margin: 6px 12px 10px;
            padding: 6px 8px;
            border-radius: 40px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chip {
            background: #ebbc7e;
            color: #3a240f;
            font-weight: bold;
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 2px 0 #8b5a2e;
        }
        .chip.selected { background: #f7c56e; box-shadow: 0 0 0 1px #ffefb0, 0 2px 0 #7a4b22; }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 6px 12px 14px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #734c2e;
            border: none;
            padding: 5px 14px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 35px;
            color: #ffe3b3;
            box-shadow: 0 3px 0 #3f2a1a;
            cursor: pointer;
        }
        .action-btn.primary { background: #c47c3a; color: #2f1b0a; box-shadow: 0 3px 0 #764e26; }
        .action-btn:active { transform: translateY(2px); box-shadow: none; }

        .message-area {
            background: #1c140e;
            margin: 0 12px 12px;
            border-radius: 35px;
            padding: 6px 10px;
            font-size: 0.65rem;
            color: #dbbc8c;
            text-align: center;
            min-height: 48px;
        }

        /* 座位区 */
        .seats-section {
            background: #1e1813;
            border-radius: 48px;
            overflow: hidden;
        }
        .seats-header {
            background: #4a3322;
            padding: 6px 12px;
            text-align: center;
        }
        .seats-header h3 { color: #ffefcf; font-size: 0.8rem; }
        .seats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            padding: 10px;
        }
        .seat-card {
            background: #1a130d;
            border-radius: 16px;
            padding: 4px 2px;
            text-align: center;
            border: 1px solid #6f4f34;
        }
        .seat-card.occupied { background: #2f4127; }
        .seat-number { font-size: 0.5rem; color: #dba24b; }
        .player-name { font-weight: bold; font-size: 0.55rem; margin: 2px 0; color: #ffefcf; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 管理员模态框 */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: #1e1a16;
            border-radius: 48px;
            width: 90%;
            max-width: 420px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid #ffaa44;
        }
        .modal-content h2, .modal-content h3 { color: #ffdd99; text-align: center; margin-bottom: 16px; }
        .password-input {
            width: 100%;
            padding: 12px;
            margin: 16px 0;
            background: #2a241e;
            border: 1px solid #ffaa44;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            text-align: center;
        }
        .modal-btn {
            background: #ffaa44;
            color: #1a1a2a;
            border: none;
            border-radius: 40px;
            padding: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }
        .player-list { max-height: 55vh; overflow-y: auto; margin: 12px 0; }
        .player-item {
            background: #2a241e;
            border-radius: 40px;
            padding: 8px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .player-item .player-name { font-weight: bold; color: #ffdd99; min-width: 90px; font-size: 0.7rem; }
        .player-balance { font-family: monospace; color: #ffaa66; font-weight: bold; font-size: 0.7rem; }
        .player-actions { display: flex; gap: 4px; }
        .player-actions button {
            background: #5f462f;
            border: none;
            border-radius: 25px;
            padding: 3px 8px;
            color: #ffe3b3;
            font-size: 0.6rem;
            cursor: pointer;
        }
        .player-actions .add-btn { background: #2e7d32; }
        .player-actions .sub-btn { background: #c0392b; }
        .player-actions .reset-btn { background: #f39c12; color: #1a1a2a; }
        .admin-global { display: flex; gap: 8px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
        .admin-global button { background: #7a5a3e; border: none; border-radius: 35px; padding: 6px 12px; color: #ffefcf; font-weight: bold; font-size: 0.7rem; cursor: pointer; }
        .close-modal { background: #ffaa44; color: #1a1a2a; width: 100%; margin-top: 16px; padding: 8px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; }
        .self-action { display: flex; gap: 8px; margin: 12px 0; }
        .self-action button { flex: 1; background: #2e7d32; border: none; border-radius: 35px; padding: 6px; color: white; font-weight: bold; font-size: 0.7rem; cursor: pointer; }
        .self-action button:last-child { background: #c0392b; }

        @media (max-width: 480px) {
            .dice { width: 60px; height: 60px; font-size: 2.4rem; }
            .bet-icon { width: 32px; height: 32px; line-height: 32px; font-size: 1.2rem; }
            .btn-chip { width: 22px; height: 22px; font-size: 0.7rem; }
            .seats-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
    // ==================== 用户数据存储 ====================
    const USERS_KEY = 'chaoshan_users_compact_v2';
    let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
    let currentUser = null;

    // 庄家数据
    let bankerBalance = parseInt(localStorage.getItem('chaoshan_banker_balance_compact')) || 10000;
    let adminPassword = localStorage.getItem('chaoshan_admin_password_compact') || "admin123";

    function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersData)); }
    function saveBanker() { localStorage.setItem('chaoshan_banker_balance_compact', bankerBalance); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0; }
    function setUserBalance(amt) { if(currentUser) { usersData[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#000000cc;backdrop-filter:blur(10px);color:#ffaa44;padding:8px 16px;border-radius:40px;font-size:0.7rem;z-index:2001;border:1px solid #ffaa44;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function showService() { showToast("📞 客服热线: 400-888-XXXX (24小时服务)"); }

    // 充值功能（给当前用户）
    function recharge() {
        let amount = prompt("请输入充值金额 (正整数)", "100");
        if(amount === null) return;
        let val = parseInt(amount);
        if(isNaN(val) || val <= 0) { showToast("请输入正整数"); return; }
        let newBal = getUserBalance() + val;
        setUserBalance(newBal);
        showToast(`💎 充值成功！ +${val} 文，当前余额 ${newBal}`);
        const userSpan = document.getElementById("userBalanceDisplay");
        if(userSpan) userSpan.innerText = newBal.toFixed(2);
    }

    // 提现功能（从当前用户扣除）
    function withdraw() {
        let amount = prompt("请输入提现金额 (正整数)", "100");
        if(amount === null) return;
        let val = parseInt(amount);
        if(isNaN(val) || val <= 0) { showToast("请输入正整数"); return; }
        let cur = getUserBalance();
        if(cur >= val) {
            setUserBalance(cur - val);
            showToast(`💰 提现成功！ -${val} 文，当前余额 ${cur - val}`);
            const userSpan = document.getElementById("userBalanceDisplay");
            if(userSpan) userSpan.innerText = (cur - val).toFixed(2);
        } else {
            showToast(`余额不足，当前余额 ${cur}`);
        }
    }

    // 管理员后台（筹码1k连点三下打开）
    let clickCount = 0, clickTimer = null;
    function initHiddenAdmin() {
        const chip1k = document.querySelector('.chip[data-chip="1000"]');
        if(!chip1k) return;
        chip1k.addEventListener('click', () => {
            clickCount++;
            let hint = document.querySelector('.chip-click-hint');
            if(!hint) {
                hint = document.createElement('div');
                hint.className = 'chip-click-hint';
                hint.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#000;color:#ffaa44;padding:4px 12px;border-radius:20px;font-size:0.6rem;z-index:100;';
                document.body.appendChild(hint);
            }
            hint.textContent = `再点击 ${3 - clickCount} 次打开管理后台`;
            hint.style.opacity = '1';
            setTimeout(() => hint.style.opacity = '0', 800);
            if(clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => clickCount = 0, 1000);
            if(clickCount >= 3) {
                clickCount = 0;
                if(clickTimer) clearTimeout(clickTimer);
                verifyAndOpenAdmin();
            }
        });
    }

    function verifyAndOpenAdmin() {
        const pwdModal = document.createElement('div');
        pwdModal.className = 'modal';
        pwdModal.innerHTML = `
            <div class="modal-content">
                <h2>🔐 管理员验证</h2>
                <input type="password" id="adminPwdInput" class="password-input" placeholder="请输入管理密码" autocomplete="off">
                <button id="submitPwdBtn" class="modal-btn">确认</button>
                <button id="cancelPwdBtn" class="modal-btn" style="background:#555; color:#fff;">取消</button>
            </div>
        `;
        document.body.appendChild(pwdModal);
        const input = pwdModal.querySelector('#adminPwdInput');
        const submitBtn = pwdModal.querySelector('#submitPwdBtn');
        const cancelBtn = pwdModal.querySelector('#cancelPwdBtn');
        const checkAndOpen = () => {
            if(input.value === adminPassword) {
                pwdModal.remove();
                openAdminModal();
            } else {
                showToast("密码错误，无权访问后台");
                input.value = '';
                input.focus();
            }
        };
        submitBtn.onclick = checkAndOpen;
        cancelBtn.onclick = () => pwdModal.remove();
        input.onkeypress = (e) => { if(e.key === 'Enter') checkAndOpen(); };
        input.focus();
    }

    function openAdminModal() {
        const allUsers = Object.keys(usersData).map(phone => ({ phone, balance: usersData[phone].balance }));
        let userListHtml = '<div class="player-list">';
        userListHtml += `<div class="player-item" style="background:#3a2a1a;"><div class="player-name">🎲 庄家</div><div class="player-balance">💰 ${Math.floor(bankerBalance)}</div><div class="player-actions"><button class="add-banker">+100</button><button class="sub-banker">-100</button><button class="reset-banker">重置1w</button></div></div>`;
        allUsers.forEach(user => {
            userListHtml += `
                <div class="player-item">
                    <div class="player-name">📱 ${user.phone}</div>
                    <div class="player-balance">💰 ${user.balance.toFixed(2)}</div>
                    <div class="player-actions">
                        <button class="add-user" data-phone="${user.phone}">+100</button>
                        <button class="sub-user" data-phone="${user.phone}">-100</button>
                        <button class="reset-user" data-phone="${user.phone}">重置1k</button>
                    </div>
                </div>
            `;
        });
        userListHtml += '</div>';
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>🎛️ 管理员后台</h2>
                <div style="margin-bottom:8px; text-align:center; color:#ffaa66; font-size:0.7rem;">点击按钮调整余额</div>
                ${userListHtml}
                <div class="self-action">
                    <button id="selfChargeBtn">💎 给自己充值</button>
                    <button id="selfWithdrawBtn">💰 给自己提现</button>
                </div>
                <div class="admin-global">
                    <button id="globalAdd500Btn">➕ 全体玩家+500</button>
                    <button id="globalResetBtn">🔄 全体玩家重置1000</button>
                    <button id="changePwdBtn">🔑 修改管理密码</button>
                </div>
                <button class="close-modal">关闭后台</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        modal.querySelector('.add-banker')?.addEventListener('click', () => {
            bankerBalance += 100;
            saveBanker();
            showToast(`庄家余额 +100，当前 ${bankerBalance}`);
            openAdminModal();
        });
        modal.querySelector('.sub-banker')?.addEventListener('click', () => {
            if(bankerBalance >= 100) { bankerBalance -= 100; saveBanker(); showToast(`庄家余额 -100，当前 ${bankerBalance}`); }
            else showToast("庄家余额不足100");
            openAdminModal();
        });
        modal.querySelector('.reset-banker')?.addEventListener('click', () => {
            bankerBalance = 10000;
            saveBanker();
            showToast("庄家余额重置为 10000");
            openAdminModal();
        });
        
        modal.querySelectorAll('.add-user').forEach(btn => {
            btn.onclick = () => {
                let phone = btn.dataset.phone;
                usersData[phone].balance += 100;
                saveUsers();
                showToast(`玩家 ${phone} +100，余额 ${usersData[phone].balance}`);
                openAdminModal();
            };
        });
        modal.querySelectorAll('.sub-user').forEach(btn => {
            btn.onclick = () => {
                let phone = btn.dataset.phone;
                if(usersData[phone].balance >= 100) {
                    usersData[phone].balance -= 100;
                    saveUsers();

    // ==================== 游戏核心 ====================
    const STORAGE_KEY = 'chaoshan_balance_compact';
    let balance = parseInt(localStorage.getItem(STORAGE_KEY)) || 10000;
    
    const PATTERNS = [
        { id: "fish", name: "鱼", icon: "🐟", value: 1 },
        { id: "shrimp", name: "虾", icon: "🦐", value: 2 },
        { id: "crab", name: "蟹", icon: "🦀", value: 3 },
        { id: "calabash", name: "葫芦", icon: "🏺", value: 4 },
        { id: "coin", name: "金钱", icon: "💰", value: 5 },
        { id: "chicken", name: "鸡", icon: "🐔", value: 6 }
    ];
    const patternIdToName = { fish:"鱼", shrimp:"虾", crab:"蟹", calabash:"葫芦", coin:"金钱", chicken:"鸡" };
    const SPECIALS = [
        { id: "big", name: "大", icon: "🔴", odds: 1 },
        { id: "small", name: "小", icon: "🔵", odds: 1 },
        { id: "odd", name: "单", icon: "⚪", odds: 1 },
        { id: "even", name: "双", icon: "⚫", odds: 1 },
        { id: "allTriplets", name: "全围", icon: "🌀", odds: 24 }
    ];

    let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
    let specialBets = { big:0, small:0, odd:0, even:0, allTriplets:0 };
    let currentChip = 100;
    let lastWinAmount = 0;
    let isRolling = false;
    let isCoverAnimating = false;

    function persistBalance() { localStorage.setItem(STORAGE_KEY, balance); }
    function getTotalBet() {
        let p = Object.values(patternBets).reduce((a,b)=>a+b,0);
        let s = Object.values(specialBets).reduce((a,b)=>a+b,0);
        return p+s;
    }
    
    function updateStatsUI() {
        const balanceSpan = document.getElementById("balanceValue");
        if(balanceSpan) balanceSpan.innerText = Math.floor(balance);
        const totalSpan = document.getElementById("totalBetValue");
        if(totalSpan) totalSpan.innerText = getTotalBet();
        const lastSpan = document.getElementById("lastWin");
        if(lastSpan) lastSpan.innerText = lastWinAmount;
        persistBalance();
    }
    
    function updateAllBetUI() {
        for(let id of Object.keys(patternBets)) {
            let span = document.getElementById(`bet_${id}`);
            if(span) span.innerText = patternBets[id];
        }
        for(let id of Object.keys(specialBets)) {
            let span = document.getElementById(`bet_special_${id}`);
            if(span) span.innerText = specialBets[id];
        }
        updateStatsUI();
    }
    
    let msgTimeout = null;
    function showMsg(msg, duration=2000) {
        const msgDiv = document.getElementById("msgArea");
        if(!msgDiv) return;
        if(msgTimeout) clearTimeout(msgTimeout);
        msgDiv.innerText = msg;
        msgTimeout = setTimeout(() => {
            if(msgDiv.innerText === msg) msgDiv.innerText = "🎲 点击开骰 | 骰盅缓慢开启开奖";
        }, duration);
    }

    function addBet(type, id, val) {
        let target = (type === 'pattern') ? patternBets : specialBets;
        if(target[id] === undefined) return;
        let totalNow = getTotalBet();
        if(totalNow + val > balance) { showMsg(`余额不足，无法加注 ${val}`); return; }
        target[id] += val;
        updateAllBetUI();
        let name = (type === 'pattern') ? patternIdToName[id] : SPECIALS.find(s=>s.id===id)?.name || id;
        showMsg(`➕ ${name} +${val}`, 800);
    }
    
    function subBet(type, id, val) {
        let target = (type === 'pattern') ? patternBets : specialBets;
        if(target[id] === undefined) return;
        let old = target[id];
        let newVal = Math.max(0, old - val);
        if(old !== newVal) {
            target[id] = newVal;
            updateAllBetUI();
            let name = (type === 'pattern') ? patternIdToName[id] : SPECIALS.find(s=>s.id===id)?.name || id;
            showMsg(`➖ ${name} -${val}`, 800);
        }
    }
    
    function clearAllBets() {
        for(let k of Object.keys(patternBets)) patternBets[k]=0;
        for(let k of Object.keys(specialBets)) specialBets[k]=0;
        updateAllBetUI();
        showMsg("清空所有下注");
    }
    
    function resetDiceCover() {
        const diceCover = document.getElementById("diceCover");
        if(diceCover) {
            diceCover.classList.remove("open-cover", "hidden-cover");
            diceCover.style.display = "flex";
            diceCover.style.visibility = "visible";
            diceCover.style.opacity = "1";
            diceCover.style.transform = "translateY(0) scale(1)";
        }
    }
    
    function resetGame() {
        balance = 10000;
        persistBalance();
        clearAllBets();
        lastWinAmount = 0;
        updateStatsUI();
        document.querySelectorAll(".dice").forEach(d => d.innerHTML = "🎲");
        resetDiceCover();
        showMsg("庄家重置，本金 10000 文，骰盅已复位");
    }

    async function animateRolling(finalPatterns) {
        const diceEls = document.querySelectorAll(".dice");
        const iconMap = { "鱼":"🐟","虾":"🦐","蟹":"🦀","葫芦":"🏺","金钱":"💰","鸡":"🐔" };
        for(let step=0; step<8; step++) {
            await new Promise(r=>setTimeout(r, 70));
            for(let i=0;i<3;i++) {
                let rand = PATTERNS[Math.floor(Math.random()*6)];
                diceEls[i].innerHTML = rand.icon;
            }
        }
        for(let i=0;i<3;i++) {
            diceEls[i].innerHTML = iconMap[finalPatterns[i]] || "🎲";
        }
    }

    function getPointValue(pname) { const m={"鱼":1,"虾":2,"蟹":3,"葫芦":4,"金钱":5,"鸡":6}; return m[pname]||0; }
    
    function settleGame(diceNames) {
        let points = diceNames.map(n=>getPointValue(n));
        let sum = points.reduce((a,b)=>a+b,0);
        let isTriplet = diceNames[0]===diceNames[1] && diceNames[1]===diceNames[2];
        let totalBet = getTotalBet();
        if(totalBet===0) { showMsg("没有下注，无法结算"); return false; }
        if(totalBet > balance) { showMsg("下注超额，请检查余额"); return false; }
        balance -= totalBet;
        let winAmount = 0;
        let winDetails = [];
        for(let [pid, betVal] of Object.entries(patternBets)) {
            if(betVal===0) continue;
            let occur = diceNames.filter(n=> n === patternIdToName[pid]).length;
            if(occur>0) {
                let prize = betVal * (occur+1);
                winAmount += prize;
                winDetails.push(`${patternIdToName[pid]} x${occur}`);
            }
        }
        let bigWin=false, smallWin=false, oddWin=false, evenWin=false, allTripletWin=false;
        if(!isTriplet) {
            if(sum>=11 && sum<=17) bigWin=true;
            if(sum>=4 && sum<=10) smallWin=true;
            if(sum%2===1) oddWin=true;
            if(sum%2===0) evenWin=true;
        }
        if(isTriplet) allTripletWin=true;
        if(specialBets.big>0 && bigWin) { winAmount += specialBets.big*2; winDetails.push("大"); }
        if(specialBets.small>0 && smallWin) { winAmount += specialBets.small*2; winDetails.push("小"); }
        if(specialBets.odd>0 && oddWin) { winAmount += specialBets.odd*2; winDetails.push("单"); }
        if(specialBets.even>0 && evenWin) { winAmount += specialBets.even*2; winDetails.push("双"); }
        if(specialBets.allTriplets>0 && allTripletWin) { winAmount += specialBets.allTriplets*25; winDetails.push("全围"); }

        let net = winAmount - totalBet;
        balance += winAmount;
        lastWinAmount = net;
        updateStatsUI();
        let diceShow = diceNames.join("、");
        if(winAmount>0) showMsg(`🎲 ${diceShow} 净赢+${net}  [${winDetails.join(',')}]`, 4500);
        else showMsg(`😢 ${diceShow} 亏损 ${totalBet}`, 3000);
        clearAllBets();
        return true;
    }

    async function onRollWithCover() {
        if(isRolling || isCoverAnimating) return;
        let total = getTotalBet();
        if(total === 0) { showMsg("请先下注再开骰！"); return; }
        if(total > balance) { showMsg("下注总额超过庄家余额，请减少下注"); return; }
        
        const diceCover = document.getElementById("diceCover");
        if(!diceCover) return;
        if(diceCover.classList.contains("hidden-cover") || diceCover.style.display === "none") { resetDiceCover(); }
        
        isRolling = true;
        isCoverAnimating = true;
        const rollBtn = document.getElementById("rollBtn");
        if(rollBtn) rollBtn.disabled = true;
        
        diceCover.classList.add("open-cover");
        await new Promise(resolve => setTimeout(resolve, 550));
        diceCover.classList.add("hidden-cover");
        diceCover.style.display = "none";
        
        const patternList = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        let finalResult = [
            patternList[Math.floor(Math.random()*6)],
            patternList[Math.floor(Math.random()*6)],
            patternList[Math.floor(Math.random()*6)]
        ];
        await animateRolling(finalResult);
        settleGame(finalResult);
        
        await new Promise(r => setTimeout(r, 1500));
        const diceEls = document.querySelectorAll(".dice");
        diceEls.forEach(d => d.innerHTML = "🎲");
        diceCover.style.display = "flex";
        diceCover.classList.remove("open-cover", "hidden-cover");
        diceCover.style.visibility = "visible";
        diceCover.style.opacity = "1";
        diceCover.style.transform = "translateY(0) scale(1)";
        
        isCoverAnimating = false;
        isRolling = false;
        if(rollBtn) rollBtn.disabled = false;
        showMsg("骰盅已复位，可继续下注", 1500);
    }
    
    function buildGameUI() {
        const patternContainer = document.getElementById("patternGrid");
        if(patternContainer) {

        document.querySelector(".special-grid")?.addEventListener("click", (e) => {

        document.querySelectorAll(".chip").forEach(chip => {

            };
        });
        const rollBtn = document.getElementById("rollBtn");
        if(rollBtn) rollBtn.onclick = onRollWithCover;
        const resetBtn = document.getElementById("resetBetBtn");
        if(resetBtn) resetBtn.onclick = clearAllBets;

        if(resetGameBtn) resetGameBtn.onclick = resetGame;
        
        let defaultChip = document.querySelector('.chip[data-chip="100"]');
        if(defaultChip) defaultChip.classList.add("selected");
        currentChip = 100;
        updateAllBetUI();
        resetDiceCover();
        
        initHiddenAdmin();
    }

    let players = [];

    function renderSeats() {
        const container = document.getElementById("seatsGrid");
        if(!container) return;
        container.innerHTML = "";
        for(let i=1; i<=20; i++) {
            const player = players.find(p => p.seatIndex === i);
            const isOccupied = !!player;
            const seatDiv = document.createElement("div");
            seatDiv.className = `seat-card ${isOccupied ? "occupied" : ""}`;
            if(isOccupied) {
                seatDiv.innerHTML = `
                    <div class="seat-number">#${i}</div>
                    <div class="player-name" title="${escapeHtml(player.name)}">${escapeHtml(player.name.length>6?player.name.slice(0,5)+"..":player.name)}</div>
                `;
            } else {
                seatDiv.innerHTML = `<div class="seat-number">#${i}</div><div class="player-name">🔲</div>`;
            }
            container.appendChild(seatDiv);
        }
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function addRandomPlayerToSeat() {
        if(players.length >= 20) return;
        let emptySeats = [];
        for(let i=1;i<=20;i++) if(!players.find(p=>p.seatIndex===i)) emptySeats.push(i);
        if(emptySeats.length===0) return;
        let randomSeat = emptySeats[Math.floor(Math.random()*emptySeats.length)];
        let randomName = namePool[Math.floor(Math.random() * namePool.length)] + (Math.floor(Math.random()*90)+10);
        players.push({ id: nextPlayerId++, name: randomName, seatIndex: randomSeat });
        renderSeats();
    }
    
    setInterval(() => {
        if(players.length < 20 && document.getElementById('seatsGrid')) {
            addRandomPlayerToSeat();
        }
    }, 30000);

                    <button id="registerBtn" class="auth-btn">注册</button>
                </div>
                <div class="auth-note">🎮 测试：任意11位手机号注册，初始余额1000 | 筹码1k连点三下打开管理后台</div>
            </div>
        `;
        
        document.getElementById('loginBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let remember = document.getElementById('rememberCheckbox').checked;
            if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            let user = usersData[phone];
            if(!user) { showToast("手机号未注册"); return; }
            if(user.password !== pwd) { showToast("密码错误"); return; }
            
            if(remember) {
                localStorage.setItem('saved_phone', phone);
                localStorage.setItem('saved_password', pwd);
                localStorage.setItem('remember_me', 'true');
            } else {
                localStorage.removeItem('saved_phone');
                localStorage.removeItem('saved_password');
                localStorage.setItem('remember_me', 'false');
            }
            
            currentUser = { phone, ...user };
            showToast(`欢迎回来，${phone}`);
            renderGameUI();
        };
        
        document.getElementById('registerBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            if(!/^1[3-9]\d{9}$/.test(phone)) { showToast("请输入有效11位手机号"); return; }
            if(pwd.length < 4) { showToast("密码至少4位"); return; }
            if(usersData[phone]) { showToast("手机号已注册，请直接登录"); return; }
            usersData[phone] = { password: pwd, balance: 1000, records: [] };
            saveUsers();
            showToast("注册成功！请登录");
            document.getElementById('regPhone').value = '';
            document.getElementById('regPassword').value = '';
            localStorage.removeItem('saved_phone');
            localStorage.removeItem('saved_password');
            localStorage.setItem('remember_me', 'false');
        };
    }

    renderAuthUI();
</script>
</body>
</html>
