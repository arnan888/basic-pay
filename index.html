<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>金辉娱乐 · 四合一游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #1a120b 0%, #2a1e12 100%);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            padding: 16px;
            min-height: 100vh;
            color: #ffecb3;
        }

        /* 主容器 - 金辉质感 */
        #app {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(30, 20, 12, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            border: 1px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,215,0,0.3);
            overflow: hidden;
        }

        /* 认证面板 */
        .auth-panel {
            padding: 32px 24px;
            background: rgba(20, 12, 6, 0.8);
        }
        .auth-panel h2, .auth-panel h3 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(255,215,0,0.3);
        }
        .auth-input {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffaa33;
            border-radius: 40px;
            color: #ffd966;
            font-size: 1rem;
            outline: none;
        }
        .auth-input:focus {
            border-color: #ffdd77;
            box-shadow: 0 0 0 3px rgba(255,221,119,0.3);
        }
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 12px 0;
        }
        .code-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: #2a1a0a;
            font-weight: 700;
            cursor: pointer;
        }
        .auth-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: bold;
            color: #2a1a0a;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .auth-btn:active, .code-btn:active { transform: scale(0.98); }
        hr {
            margin: 24px 0;
            border-color: #ffaa33;
        }
        .auth-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 16px;
            color: #ffaa33;
        }

        /* 用户栏 */
        .user-section {
            background: rgba(20, 12, 6, 0.7);
            backdrop-filter: blur(8px);
            padding: 16px;
            border-bottom: 1px solid #ffaa33;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        #userBalanceDisplay {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            text-shadow: 0 0 5px rgba(255,215,0,0.5);
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn-sm {
            background: rgba(255,170,51,0.2);
            border: 1px solid #ffaa33;
            padding: 6px 14px;
            border-radius: 40px;
            color: #ffd966;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .charge-btn, .withdraw-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: #2a1a0a;
            font-weight: 700;
            cursor: pointer;
        }
        .lang-switch {
            background: #ffaa33;
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            color: #2a1a0a;
            cursor: pointer;
            margin-left: 8px;
            font-weight: bold;
        }

        /* 游戏导航 */
        .game-nav {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 8px 16px;
            margin: 16px 12px;
            border-radius: 60px;
        }
        .game-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #ffaa33;
            cursor: pointer;
            transition: 0.2s;
        }
        .game-tab.active {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            color: #2a1a0a;
            box-shadow: 0 0 12px #ffaa33;
        }

        /* 游戏卡片 */
        .game-container {
            padding: 12px 16px 24px;
        }
        .game-card {
            background: rgba(20, 12, 6, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 36px;
            padding: 20px;
            border: 1px solid #ffaa33;
            box-shadow: 0 0 15px rgba(255,170,51,0.3);
        }

        /* 筹码按钮 */
        .chip {
            background: linear-gradient(145deg, #cc8800, #aa6600);
            display: inline-block;
            padding: 8px 16px;
            border-radius: 40px;
            margin: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #ffecb3;
            border: 1px solid #ffaa33;
        }
        .chip.selected {
            background: linear-gradient(145deg, #ffaa33, #ff884d);
            color: #2a1a0a;
            box-shadow: 0 0 10px #ffaa33;
        }

        /* 按钮公用 */
        .quick-bet, .clear-bet {
            background: rgba(255,170,51,0.2);
            border: 1px solid #ffaa33;
            border-radius: 30px;
            padding: 6px 14px;
            margin: 4px;
            cursor: pointer;
            color: #ffd966;
            font-weight: 500;
        }
        .exec-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            color: #2a1a0a;
            font-weight: bold;
            cursor: pointer;
            margin: 4px;
        }
        .main-go {
            background: linear-gradient(135deg, #ffcc66, #ffaa33);
            color: #2a1a0a;
            font-weight: 800;
        }

        /* 3D骰子 */
        .dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            perspective: 1000px;
        }
        .dice-cube {
            width: 80px;
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #2a1e12;
            border: 2px solid #ffaa33;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: visible;
            font-size: 2rem;
            font-weight: bold;
            color: #ffd966;
        }
        .front { transform: translateZ(40px); }
        .back { transform: rotateY(180deg) translateZ(40px); }
        .right { transform: rotateY(90deg) translateZ(40px); }
        .left { transform: rotateY(-90deg) translateZ(40px); }
        .top { transform: rotateX(90deg) translateZ(40px); }
        .bottom { transform: rotateX(-90deg) translateZ(40px); }
        @media (max-width: 480px) {
            .dice-cube { width: 65px; height: 65px; }
            .front, .back, .right, .left, .top, .bottom { transform: translateZ(32px); }
            .back { transform: rotateY(180deg) translateZ(32px); }
            .right { transform: rotateY(90deg) translateZ(32px); }
            .left { transform: rotateY(-90deg) translateZ(32px); }
            .top { transform: rotateX(90deg) translateZ(32px); }
            .bottom { transform: rotateX(-90deg) translateZ(32px); }
        }

        /* 鱼虾蟹单选网格 */
        .fish-pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 12px 0;
        }
        .fish-bet-card {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 8px 4px;
            text-align: center;
            border: 1px solid #ffaa33;
        }
        .bet-card {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #ffaa33;
            transition: 0.1s;
        }
        .bet-card:active { background: rgba(255,170,51,0.3); transform: scale(0.96); }

        /* 点数/围骰网格 */
        .points-grid, .trio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 8px;
            margin: 12px 0;
        }

        /* 骰子点数圆点 */
        .pip {
            width: 12px;
            height: 12px;
            background: #ffaa33;
            border-radius: 50%;
            margin: 2px;
            box-shadow: 0 0 4px gold;
        }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 10px; left: 10px; }
        .pip-tr { position: absolute; top: 10px; right: 10px; }
        .pip-bl { position: absolute; bottom: 10px; left: 10px; }
        .pip-br { position: absolute; bottom: 10px; right: 10px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1, .pip-l2, .pip-l3 { position: absolute; left: 10px; }
        .pip-l1 { top: 10px; }
        .pip-l2 { top: 50%; transform: translateY(-50%); }
        .pip-l3 { bottom: 10px; }
        .pip-r1, .pip-r2, .pip-r3 { position: absolute; right: 10px; }
        .pip-r1 { top: 10px; }
        .pip-r2 { top: 50%; transform: translateY(-50%); }
        .pip-r3 { bottom: 10px; }

        /* 历史格子 */
        .history-cell {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,170,51,0.2);
            font-weight: bold;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2a1e12;
            border-radius: 40px;
            padding: 24px;
            max-width: 90%;
            max-height: 85%;
            overflow: auto;
            color: #ffd966;
            border: 1px solid #ffaa33;
            text-align: center;
        }
        .qr-img {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 20px;
            border: 2px solid #ffaa33;
            background: white;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a1a0a;
            color: #ffd966;
            padding: 8px 20px;
            border-radius: 60px;
            z-index: 2000;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid #ffaa33;
        }
        .result-popup {
            position: fixed;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            color: #2a1a0a;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 1500;
            box-shadow: 0 0 20px gold;
        }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .admin-table th, .admin-table td { padding: 8px 4px; border-bottom: 1px solid #ffaa33; text-align: left; }
        .admin-btn { background: #ffaa33; border: none; border-radius: 20px; padding: 4px 8px; margin: 2px; color: #2a1a0a; font-weight: bold; cursor: pointer; }

        /* 龙虎动画 */
        @keyframes dtFlash {
            0% { opacity: 1; text-shadow: 0 0 5px gold; }
            50% { opacity: 0.3; text-shadow: 0 0 30px orange; }
            100% { opacity: 1; text-shadow: 0 0 5px gold; }
        }
        @keyframes dtShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px) scale(1.1); text-shadow: 0 0 10px gold; }
            50% { transform: translateX(10px) scale(1.2); text-shadow: 0 0 20px orange; }
            75% { transform: translateX(-5px) scale(1.1); }
            100% { transform: translateX(0) scale(1); }
        }
        .dt-flash { animation: dtFlash 0.3s 3; }
        .dt-animation-box { animation: dtShake 0.5s ease-in-out; }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== 双语词库 ====================
    const lang = {
        zh: {
            recharge: "💎 充值", withdraw: "💰 提现", service: "📞 客服", logout: "退出", balance: "余额",
            phoneOrEmail: "手机号 / 邮箱", password: "密码 (≥4位)", referralCode: "推荐码 (必填)", remember: "记住账号",
            login: "登录", register: "注册", referralNote: "推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "获取验证码", verifyCode: "验证码", registerNow: "注册新账户",
            gameFish: "🐟 金辉鱼虾蟹", gameDice: "🎲 金辉骰宝", gameDT: "🐉 金辉龙虎斗", game4: "♠️ 游戏4",
            fishRoll: "🎲 开骰", fishClear: "清空", fishGrab: "🎲 抢庄", fishDouble: "🎯 双押",
            diceClear: "清空", diceRepeat: "续押", diceRefresh: "刷新", diceRoll: "🎲 手动掷骰",
            dtFight: "确认投注", dtCancel: "全部取消", dtRepeat: "续押", dtRefresh: "刷新"
        },
        th: {
            recharge: "💎 เติมเงิน", withdraw: "💰 ถอนเงิน", service: "📞 บริการ", logout: "ออก", balance: "ยอดเงิน",
            phoneOrEmail: "เบอร์โทร / อีเมล", password: "รหัสผ่าน (≥4)", referralCode: "รหัสแนะนำ", remember: "จำฉัน",
            login: "เข้าสู่ระบบ", register: "สมัคร", referralNote: "รหัส: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "รับรหัส", verifyCode: "รหัสยืนยัน", registerNow: "สมัครสมาชิก",
            gameFish: "🐟 ปลาหมึกทอง", gameDice: "🎲 เซียนเต๋าทอง", gameDT: "🐉 มังกรเสือทอง", game4: "♠️ เกม4",
            fishRoll: "🎲 เปิด", fishClear: "ล้าง", fishGrab: "🎲 รับเจ้ามือ", fishDouble: "🎯 เดิมพันคู่",
            diceClear: "ล้าง", diceRepeat: "เล่นซ้ำ", diceRefresh: "รีเฟรช", diceRoll: "🎲 ทอยลูกเต๋า",
            dtFight: "ยืนยัน", dtCancel: "ยกเลิก", dtRepeat: "เล่นซ้ำ", dtRefresh: "รีเฟรช"
        }
    };
    let currentLang = 'zh';
    function t(key) { return lang[currentLang][key] || lang.zh[key] || key; }

    // ==================== 全局数据 ====================
    let systemBankerBalance = localStorage.getItem('neon_system_banker') ? parseFloat(localStorage.getItem('neon_system_banker')) : 50000;
    let adjustFactor = localStorage.getItem('neon_adjustFactor') ? parseFloat(localStorage.getItem('neon_adjustFactor')) : 1.0;
    let validReferralCodes = ["VIP666", "888VIP", "GOLD2025", "LUCKY8", "DICE100"];
    let usersData = JSON.parse(localStorage.getItem('neon_users')) || {};
    if (Object.keys(usersData).length === 0) {
        usersData['player1'] = { password: '123', balance: 5000, registerTime: new Date().toLocaleString(), records: [], resultHistory: [] };
        localStorage.setItem('neon_users', JSON.stringify(usersData));
    }
    let currentUser = null;
    let verificationCodes = {};

    function saveUsers() { localStorage.setItem('neon_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.account]?.balance || 0) : 0; }
    function setUserBalance(amount) { if(!currentUser) return; usersData[currentUser.account].balance = Math.max(0, amount); saveUsers(); let span = document.getElementById("userBalanceDisplay"); if(span) span.innerText = getUserBalance().toFixed(2); }
    function showToast(msg) { let t = document.createElement('div'); t.className = 'toast-message'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }

    // ==================== 充值功能（真实二维码 + 凭证码验证） ====================
    function recharge() {
        const voucherCode = Math.floor(100000 + Math.random() * 900000).toString();
        let modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="color:#ffaa33;">💎 金辉充值</h3>
                <div style="display:flex; justify-content:center; gap:20px; margin:15px 0;">
                    <div>
                        <img class="qr-img" alt="微信收款码" src="mmexport1776247819360.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%BE%AE%E4%BF%A1%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'">
                        <p>微信支付</p>
                    </div>
                    <div>
                        <img class="qr-img" alt="支付宝收款码" src="mmexport1776247823872.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E6%94%AF%E4%BB%98%E5%AE%9D%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'">
                        <p>支付宝支付</p>
                    </div>
                </div>
                <div style="background:#1a1008; border-radius:20px; padding:10px; margin:10px 0; text-align:center;">
                    <p>🔐 本次充值凭证码：<strong style="color:#ffaa33; font-size:1.4rem;">${voucherCode}</strong></p>
                    <p style="font-size:0.7rem;">请扫码支付后，输入上方凭证码确认到账</p>
                </div>
                <input type="number" id="rechargeAmount" placeholder="请输入充值金额（元）" style="width:100%; padding:10px; border-radius:40px; background:#1a1008; color:#ffd966; border:1px solid #ffaa33; margin:10px 0;">
                <input type="text" id="voucherInput" placeholder="请输入凭证码" style="width:100%; padding:10px; border-radius:40px; background:#1a1008; color:#ffd966; border:1px solid #ffaa33; margin:10px 0;">
                <button id="confirmRechargeBtn" class="auth-btn" style="background:#ffaa33;">✅ 确认支付（需验证凭证码）</button>
                <button id="cancelRechargeBtn" class="auth-btn" style="background:#ff884d; margin-top:8px;">取消</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#confirmRechargeBtn').onclick = () => {
            let amount = parseFloat(modalDiv.querySelector('#rechargeAmount').value);
            let inputCode = modalDiv.querySelector('#voucherInput').value.trim();
            if (isNaN(amount) || amount <= 0) {
                showToast("请输入正确的金额");
                return;
            }
            if (inputCode !== voucherCode) {
                showToast("凭证码错误，请确认已扫码支付并输入正确凭证码");
                return;
            }
            setUserBalance(getUserBalance() + amount);
            showToast(`💰 充值成功！ +${amount.toFixed(2)} 元`);
            modalDiv.remove();
        };
        modalDiv.querySelector('#cancelRechargeBtn').onclick = () => modalDiv.remove();
    }

    function withdraw() { 
        let bal = getUserBalance(); 
        if(bal <= 0){ showToast("余额不足"); return; } 
        let amount = parseFloat(prompt("提现金额 (元)", "10")); 
        if(isNaN(amount) || amount <= 0 || amount > bal){ showToast("金额无效"); return; } 
        let type = confirm("提现方式：确定=微信，取消=支付宝")?"微信":"支付宝"; 
        let account = prompt("请输入收款账号:"); 
        if(!account) return; 
        setUserBalance(bal - amount); 
        let records = JSON.parse(localStorage.getItem('neon_withdraw'))||[]; 
        records.push({ phone: currentUser.account, amount, type, account, time: new Date().toLocaleString() }); 
        localStorage.setItem('neon_withdraw', JSON.stringify(records)); 
        showToast(`提现申请已提交！${amount}元将处理到${type}账号 ${account}`); 
    }
    function showServiceModal() { alert("客服微信: game_kf_888"); }
    function addGameRecord(account, gameName, betInfo, result, winAmount, betAmount) { if(!usersData[account]) return; let rec = usersData[account].records||[]; rec.unshift({ time: new Date().toLocaleString(), game: gameName, bet: betInfo, result, win: winAmount, amount: betAmount }); if(rec.length>100) rec.pop(); usersData[account].records = rec; saveUsers(); }

    // ==================== 管理员后台 ====================
    let adminPassword = localStorage.getItem('neon_admin_pwd') || "admin888";
    function openAdminModal() {
        let pwd = prompt("管理员密码:");
        if(pwd !== adminPassword) { showToast("密码错误"); return; }
        let allUsers = Object.keys(usersData).map(acc => ({ account: acc, balance: usersData[acc].balance, regTime: usersData[acc].registerTime||'未知' }));
        let modalDiv = document.createElement('div'); modalDiv.className='modal';
        modalDiv.innerHTML = `<div class="modal-content"><h3 style="color:#ffaa33;">🎛️ 金辉管理员后台</h3><select id="adminTargetUser">${allUsers.map(u=>`<option value="${u.account}">${u.account} (${u.balance.toFixed(2)}元)</option>`).join('')}</select><div><input id="adminAmount" placeholder="金额" value="0" style="background:#1a1008; color:#ffd966;"><button id="adminAddBalance" class="admin-btn">上分</button><button id="adminSubBalance" class="admin-btn">下分</button></div><div><label>赔付系数: <input id="adminAdjustFactor" value="${adjustFactor}" step="0.01" style="background:#1a1008; color:#ffd966;"></label><button id="adminSaveFactor" class="admin-btn">保存</button></div><button id="adminCloseBtn" class="auth-btn" style="background:#ffaa33;">关闭</button></div>`;
        document.body.appendChild(modalDiv);
        const getTarget=()=>modalDiv.querySelector('#adminTargetUser').value;
        const getAmt=()=>parseFloat(modalDiv.querySelector('#adminAmount').value)||0;
        modalDiv.querySelector('#adminAddBalance').onclick=()=>{ let t=getTarget(), a=getAmt(); if(a<=0)return; usersData[t].balance+=a; saveUsers(); if(currentUser?.account===t) setUserBalance(usersData[t].balance); showToast(`${t}+${a}`); modalDiv.remove(); openAdminModal(); };
        modalDiv.querySelector('#adminSubBalance').onclick=()=>{ let t=getTarget(), a=getAmt(); if(a<=0||usersData[t].balance<a)return; usersData[t].balance-=a; saveUsers(); if(currentUser?.account===t) setUserBalance(usersData[t].balance); showToast(`${t}-${a}`); modalDiv.remove(); openAdminModal(); };
        modalDiv.querySelector('#adminSaveFactor').onclick=()=>{ let newFac=parseFloat(modalDiv.querySelector('#adminAdjustFactor').value); if(!isNaN(newFac)&&newFac>=0.2&&newFac<=3){ adjustFactor=newFac; localStorage.setItem('neon_adjustFactor',adjustFactor); showToast(`系数 ${adjustFactor}`); } };
        modalDiv.querySelector('#adminCloseBtn').onclick=()=>modalDiv.remove();
    }

    // ==================== 鱼虾蟹（双押15组合+续押+抢庄） ====================
    let fishDestroy = null;
    function initFishGame(container) {
        if(fishDestroy) fishDestroy();
        container.innerHTML = `
            <div class="game-card">
                <div style="display:flex; gap:12px; margin-bottom:16px;">
                    <div style="flex:1; background:rgba(0,0,0,0.5); border-radius:24px; padding:8px;"><div>🏦 庄家余额</div><div id="fishBankerDisplay">∞</div></div>
                    <div style="flex:1; background:rgba(0,0,0,0.5); border-radius:24px; padding:8px;"><div>🎲 总押注</div><div id="fishTotalBet">0</div></div>
                    <div style="flex:1; background:rgba(0,0,0,0.5); border-radius:24px; padding:8px;"><div>🏆 上局净利</div><div id="fishLastWin">0</div></div>
                </div>
                <div id="fishPhaseHint" style="text-align:center; margin-bottom:12px; background:rgba(0,0,0,0.5); border-radius:30px; padding:8px;">🎲 下注阶段 · 25秒</div>
                <div id="fishChips"><span class="chip" data-chip="2">2</span><span class="chip" data-chip="5">5</span><span class="chip selected" data-chip="10">10</span><span class="chip" data-chip="50">50</span><span class="chip" data-chip="100">100</span></div>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <button id="fishRollBtn" class="exec-btn">${t('fishRoll')}</button>
                    <button id="fishClearBtn" class="exec-btn" style="background:#aa6600;">${t('fishClear')}</button>
                    <button id="fishRepeatBtn" class="exec-btn">🔄 续押</button>
                    <button id="fishGrabBtn" class="exec-btn" style="background:#ff884d;">${t('fishGrab')}</button>
                </div>
                <div class="dice-3d-area"><div class="dice-cube" id="fishDice0"></div><div class="dice-cube" id="fishDice1"></div><div class="dice-cube" id="fishDice2"></div></div>
                <div style="margin:8px 0 4px;"><strong>🎲 单选押注</strong></div>
                <div id="fishPatternGrid" class="fish-pattern-grid"></div>
                <div style="margin:16px 0 8px;"><strong>🎯 双押组合（同时出现两个图案）</strong></div>
                <div id="fishDoubleGrid" style="display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom:12px;"></div>
                <button id="fishRecordBtn" class="exec-btn" style="width:100%;">📜 记录</button>
                <div id="fishPlayersPanel" style="margin-top:12px; background:rgba(0,0,0,0.4); border-radius:20px; padding:10px;"><strong>👥 闲家押注</strong><div id="fishPlayerBetsList"></div></div>
            </div>
        `;
        const patternNames = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        const patternEmojis = ["🐟","🦐","🦀","🎃","💰","🐔"];
        const doubleCombos = [
            ["鱼","虾"],["鱼","蟹"],["鱼","葫芦"],["鱼","金钱"],["鱼","鸡"],
            ["虾","蟹"],["虾","葫芦"],["虾","金钱"],["虾","鸡"],
            ["蟹","葫芦"],["蟹","金钱"],["蟹","鸡"],
            ["葫芦","金钱"],["葫芦","鸡"],["金钱","鸡"]
        ];
        function buildFishDice(diceDiv) {
            if(!diceDiv) return;
            diceDiv.innerHTML = '';
            const faces = ['front','back','right','left','top','bottom'];
            faces.forEach((face, idx) => {
                let fd = document.createElement('div');
                fd.className = `dice-face ${face}`;
                fd.style.fontSize = '2rem';
                fd.innerText = patternEmojis[idx % 6];
                diceDiv.appendChild(fd);
            });
            const randX = Math.floor(Math.random() * 360);
            const randY = Math.floor(Math.random() * 360);
            diceDiv.style.transform = `rotateX(${randX}deg) rotateY(${randY}deg)`;
        }
        function setFishDiceValue(diceDiv, patternName) {
            let index = patternNames.indexOf(patternName);
            let rotateX = 0, rotateY = 0;
            switch(index) {
                case 0: rotateX=0; rotateY=0; break;
                case 1: rotateX=0; rotateY=-90; break;
                case 2: rotateX=0; rotateY=180; break;
                case 3: rotateX=0; rotateY=90; break;
                case 4: rotateX=-90; rotateY=0; break;
                case 5: rotateX=90; rotateY=0; break;
            }
            const extraX = 360 * (1 + Math.floor(Math.random() * 2));
            const extraY = 360 * (1 + Math.floor(Math.random() * 2));
            diceDiv.style.transform = `rotateX(${rotateX + extraX}deg) rotateY(${rotateY + extraY}deg)`;
        }
        const fishDice = [document.getElementById('fishDice0'), document.getElementById('fishDice1'), document.getElementById('fishDice2')];
        fishDice.forEach(d => buildFishDice(d));
        let patternBets = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
        let doubleBets = {};
        doubleCombos.forEach(combo => { doubleBets[combo.join(',')] = 0; });
        let currentChip = 10;
        let hasGrabbed = false, playerBankerBalance = 0;
        let gameRecords = [], isRolling = false, roundActive = true, countdownTimer = null, lastWinAmount = 0;
        let playersList = [{ name:"闲家A", bet:0 }, { name:"闲家B", bet:0 }, { name:"闲家C", bet:0 }];
        let lastBetState = null;
        function updateFishUI() {
            for(let p in patternBets) { let span = document.getElementById(`fishBet_${p}`); if(span) span.innerText = patternBets[p]; }
            for(let combo of doubleCombos) { let key = combo.join(','); let span = document.getElementById(`doubleBet_${key.replace(/,/g,'_')}`); if(span) span.innerText = doubleBets[key]; }
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(doubleBets).reduce((a,b)=>a+b,0);
            document.getElementById('fishTotalBet').innerText = total;
            document.getElementById('fishLastWin').innerText = lastWinAmount;
            document.getElementById('fishBankerDisplay').innerText = hasGrabbed ? playerBankerBalance.toFixed(2) : "∞";
            document.getElementById('fishPlayerBetsList').innerHTML = playersList.map(p => `<div>${p.name}: ${p.bet} 元</div>`).join('');
        }
        function saveLastBetState() { lastBetState = { patternBets: {...patternBets}, doubleBets: {...doubleBets} }; }
        function repeatLastBet() {
            if(!lastBetState) { showToast("无上局押注"); return; }
            let total = Object.values(lastBetState.patternBets).reduce((a,b)=>a+b,0) + Object.values(lastBetState.doubleBets).reduce((a,b)=>a+b,0);
            if(total > getUserBalance()) { showToast("余额不足"); return; }
            let oldTotal = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(doubleBets).reduce((a,b)=>a+b,0);
            if(oldTotal>0) setUserBalance(getUserBalance()+oldTotal);
            patternBets = {...lastBetState.patternBets};
            doubleBets = {...lastBetState.doubleBets};
            setUserBalance(getUserBalance()-total);
            updateFishUI();
            showToast("续押成功");
        }
        function addPatternBet(pattern, val) {
            if(hasGrabbed) { showToast("庄家不能下注"); return; }
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(doubleBets).reduce((a,b)=>a+b,0);
            if(val>500 || total+val>2000) { showToast("超过上限"); return; }
            if(val > getUserBalance()) { showToast("余额不足"); return; }
            setUserBalance(getUserBalance()-val);
            patternBets[pattern] += val;
            updateFishUI();
            saveLastBetState();
        }
        function subPatternBet(pattern, val) { let cur=patternBets[pattern]; if(cur<val) val=cur; if(val===0) return; patternBets[pattern]-=val; setUserBalance(getUserBalance()+val); updateFishUI(); saveLastBetState(); }
        function addDoubleBet(comboKey) {
            if(hasGrabbed) { showToast("庄家不能下注"); return; }
            let val = currentChip;
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(doubleBets).reduce((a,b)=>a+b,0);
            if(val>500 || total+val>2000) { showToast("超过上限"); return; }
            if(val > getUserBalance()) { showToast("余额不足"); return; }
            setUserBalance(getUserBalance()-val);
            doubleBets[comboKey] += val;
            updateFishUI();
            saveLastBetState();
        }
        function clearFishBets() {
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(doubleBets).reduce((a,b)=>a+b,0);
            if(total>0) setUserBalance(getUserBalance()+total);
            patternBets = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
            for(let k in doubleBets) doubleBets[k]=0;
            updateFishUI();
            saveLastBetState();
        }
        async function rollFishDiceWithAnimation(finalPatterns) {
            for(let i=0;i<3;i++) { fishDice[i].style.transition = 'none'; const randX=Math.random()*360; const randY=Math.random()*360; fishDice[i].style.transform=`rotateX(${randX}deg) rotateY(${randY}deg)`; }
            await new Promise(r=>setTimeout(r,50));
            for(let i=0;i<3;i++) fishDice[i].style.transition = 'transform 0.5s cubic-bezier(0.4,0,0.2,1)';
            for(let step=0;step<12;step++) {
                for(let i=0;i<3;i++) { const randX=Math.random()*360; const randY=Math.random()*360; fishDice[i].style.transform=`rotateX(${randX}deg) rotateY(${randY}deg)`; }
                await new Promise(r=>setTimeout(r,80));
            }
            for(let i=0;i<3;i++) setFishDiceValue(fishDice[i], finalPatterns[i]);
            await new Promise(r=>setTimeout(r,400));
        }
        async function settleFish() {
            if(isRolling) return;
            let totalBet = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(doubleBets).reduce((a,b)=>a+b,0);
            if(totalBet===0 && !hasGrabbed) { showToast("请先下注"); return; }
            isRolling = true;
            let r1 = patternNames[Math.floor(Math.random()*6)];
            let r2 = patternNames[Math.floor(Math.random()*6)];
            let r3 = patternNames[Math.floor(Math.random()*6)];
            await rollFishDiceWithAnimation([r1,r2,r3]);
            let winAmount = 0;
            let occurs = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
            [r1,r2,r3].forEach(p=>occurs[p]++);
            for(let p in patternBets) { let cnt=occurs[p]; if(cnt>0 && patternBets[p]>0) winAmount += patternBets[p] * (cnt+1); }
            for(let combo of doubleCombos) {
                let key = combo.join(',');
                let betAmt = doubleBets[key];
                if(betAmt>0 && occurs[combo[0]]>0 && occurs[combo[1]]>0) winAmount += betAmt * 4.5;
            }
            winAmount = winAmount * adjustFactor;
            if(totalBet>0) {
                setUserBalance(getUserBalance() + winAmount);
                if(hasGrabbed) {
                    let net = (totalBet - winAmount) * adjustFactor;
                    playerBankerBalance += net;
                    if(playerBankerBalance < 0) { hasGrabbed=false; playerBankerBalance=0; localStorage.removeItem('neon_fish_banker'); showToast("庄家破产"); }
                    else localStorage.setItem('neon_fish_banker', playerBankerBalance);
                }
                lastWinAmount = winAmount - totalBet;
                addGameRecord(currentUser.account,'金辉鱼虾蟹',`单选${Object.entries(patternBets).filter(([k,v])=>v>0).map(([k,v])=>`${k}${v}`).join(',')} 双押${Object.entries(doubleBets).filter(([k,v])=>v>0).map(([k,v])=>`${k}=${v}`).join(',')}`, `${r1},${r2},${r3}`, winAmount, totalBet);
            } else lastWinAmount=0;
            gameRecords.unshift({ time:new Date().toLocaleTimeString(), dice:`${r1},${r2},${r3}`, result:winAmount>0?`赢${winAmount}`:`输${totalBet}` });
            updateFishUI();
            let pop=document.createElement('div'); pop.className='result-popup'; pop.innerText=winAmount>0?`🎉 赢 ${winAmount.toFixed(2)} 🎉`:`😭 输 ${totalBet} 😭`; document.body.appendChild(pop); setTimeout(()=>pop.remove(),2000);
            isRolling=false;
            if(roundActive) startFishRound();
        }
        function startFishRound() {
            if(countdownTimer) clearInterval(countdownTimer);
            let remaining=25;
            let hintDiv=document.getElementById('fishPhaseHint');
            if(hintDiv) hintDiv.innerText = `🎲 下注阶段 · ${remaining}秒`;
            countdownTimer = setInterval(()=>{ remaining--; if(hintDiv) hintDiv.innerText=`🎲 下注阶段 · ${remaining}秒`; if(remaining<=0){ clearInterval(countdownTimer); if(!isRolling && roundActive) settleFish(); } },1000);
        }
        let gridDiv = document.getElementById('fishPatternGrid');
        patternNames.forEach(p => {
            let card = document.createElement('div'); card.className = 'fish-bet-card';
            card.innerHTML = `<div style="font-size:1.2rem;">${patternEmojis[patternNames.indexOf(p)]}</div><div>${p}</div><div><button class="quick-bet sub-pat" data-pat="${p}">-</button><span id="fishBet_${p}" style="margin:0 6px;">0</span><button class="quick-bet add-pat" data-pat="${p}">+</button></div>`;
            gridDiv.appendChild(card);
        });
        let doubleGrid = document.getElementById('fishDoubleGrid');
        doubleCombos.forEach(combo => {
            let key = combo.join(',');
            let btn = document.createElement('div'); btn.className='bet-card'; btn.style.padding='6px';
            btn.innerHTML = `<div>${combo[0]}+${combo[1]}</div><div id="doubleBet_${key.replace(/,/g,'_')}" style="font-weight:bold;">0</div>`;
            btn.onclick = () => addDoubleBet(key);
            doubleGrid.appendChild(btn);
        });
        document.querySelectorAll('#fishChips .chip').forEach(chip=>{ chip.onclick=function(){ currentChip=parseInt(this.dataset.chip); document.querySelectorAll('#fishChips .chip').forEach(c=>c.classList.remove('selected')); this.classList.add('selected'); }; });
        document.getElementById('fishGrabBtn').onclick=()=>{ if(hasGrabbed){ showToast("已是庄家"); return; } if(getUserBalance()>=2001){ setUserBalance(getUserBalance()-2001); playerBankerBalance=2001; hasGrabbed=true; localStorage.setItem('neon_fish_banker', playerBankerBalance); updateFishUI(); showToast("抢庄成功"); } else showToast("余额不足2001"); };
        document.getElementById('fishClearBtn').onclick=clearFishBets;
        document.getElementById('fishRepeatBtn').onclick=repeatLastBet;
        document.getElementById('fishRollBtn').onclick=()=>{ if(!isRolling && roundActive) settleFish(); };
        document.getElementById('fishRecordBtn').onclick=()=>{ if(gameRecords.length===0){ showToast("暂无记录"); return; } let html='<div>'+gameRecords.map(r=>`<div>${r.time} 🎲 ${r.dice} ${r.result}</div>`).join('')+'</div><button id="closeRec" class="auth-btn">关闭</button>'; let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove(); };
        gridDiv.addEventListener('click',(e)=>{ let btn=e.target.closest('.quick-bet'); if(!btn) return; let pat=btn.dataset.pat; if(btn.classList.contains('add-pat')) addPatternBet(pat, currentChip); if(btn.classList.contains('sub-pat')) subPatternBet(pat, currentChip); });
        let saved=localStorage.getItem('neon_fish_banker'); if(saved && parseInt(saved)>0){ hasGrabbed=true; playerBankerBalance=parseInt(saved); }
        updateFishUI();
        startFishRound();
        function updatePlayersBet() { if(hasGrabbed){ playersList.forEach(p=>{ p.bet=Math.floor(Math.random()*500)+50; }); updateFishUI(); } }
        setInterval(()=>{ if(hasGrabbed && roundActive && !isRolling) updatePlayersBet(); }, 10000);
        fishDestroy = () => { roundActive=false; if(countdownTimer) clearInterval(countdownTimer); container.innerHTML=''; };
        window.currentFishReset = ()=>{ hasGrabbed=false; playerBankerBalance=0; localStorage.removeItem('neon_fish_banker'); updateFishUI(); };
        return fishDestroy;
    }

    // ==================== 至尊骰宝（点按加注+动画+手动掷骰） ====================
    let diceDestroy = null;
    function initDiceGame(container) {
        if(diceDestroy) diceDestroy();
        container.innerHTML = `<div class="game-card">
            <div style="display:flex;gap:12px;margin-bottom:16px;">

                <div style="flex:1;background:rgba(0,0,0,0.5);border-radius:24px;padding:8px;"><div>🎲 总押注</div><div id="totalBetDice">0</div></div>

            <div class="dice-3d-area"><div class="dice-cube" id="dice1"></div><div class="dice-cube" id="dice2"></div><div class="dice-cube" id="dice3"></div></div>

            <div style="display:flex;gap:8px;margin:12px 0;"><button id="clearAllBtnDice" class="exec-btn">清空</button><button id="repeatBtnDice" class="exec-btn">续押</button><button id="refreshBtnDice" class="exec-btn">刷新</button><button id="manualRollBtn" class="exec-btn main-go">${t('diceRoll')}</button></div>
            <div id="diceChips"><span class="chip" data-val="10">10</span><span class="chip" data-val="20">20</span><span class="chip" data-val="50">50</span><span class="chip" data-val="100">100</span><span class="chip" data-val="500">500</span></div>

        </div>`;
        let pointsHtml=''; for(let i=4;i<=17;i++) pointsHtml+=`<div class="bet-card point-card" data-point="${i}">${i}点</div>`; document.getElementById('pointsGrid').innerHTML=pointsHtml;
        let trioHtml=''; for(let i=1;i<=6;i++) trioHtml+=`<div class="bet-card trio-card" data-type="TRIPLE_${i}">${i}围</div>`; trioHtml+=`<div class="bet-card trio-card" data-type="ALL_TRIPLE">豹子</div>`; document.getElementById('trioGrid').innerHTML=trioHtml;
        
        function buildDiceCube(diceDiv) {
            if(!diceDiv) return;
            diceDiv.innerHTML='';
            const faces=['front','back','right','left','top','bottom'];
            const valMap={front:1,back:6,right:4,left:3,top:2,bottom:5};
            faces.forEach(face=>{
                let num=valMap[face];
                let fd=document.createElement('div');
                fd.className=`dice-face ${face}`;
                let pipHtml='';
                if(num===1)pipHtml='<div class="pip pip-center"></div>';
                else if(num===2)pipHtml='<div class="pip pip-tl"></div><div class="pip pip-br"></div>';
                else if(num===3)pipHtml='<div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div>';
                else if(num===4)pipHtml='<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                else if(num===5)pipHtml='<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-mid"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                else pipHtml='<div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div>';
                fd.innerHTML=pipHtml;
                diceDiv.appendChild(fd);
            });
            const randX=Math.floor(Math.random()*360);
            const randY=Math.floor(Math.random()*360);
            diceDiv.style.transform=`rotateX(${randX}deg) rotateY(${randY}deg)`;
        }
        function setCubeValue(dice, val) {
            const rot={1:'rotateX(0deg) rotateY(0deg)',2:'rotateX(-90deg) rotateY(0deg)',3:'rotateY(90deg)',4:'rotateY(-90deg)',5:'rotateX(90deg)',6:'rotateX(180deg)'};

        function showMyHistoryDT() { let recs=usersData[currentUser.account]?.records||[]; let html='<div>'+recs.map(r=>`<div>${r.time} 押${r.bet}→${r.result} ${r.win>0?'赢'+r.win:'输'+r.amount}</div>`).join('')+'</div><button id="closeHist" class="auth-btn">关闭</button>'; let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeHist').onclick=()=>m.remove(); }
        function newUserDT() { let newId=prompt("新账号（手机号/邮箱）:"); if(!newId) return; if(usersData[newId]){ showToast("账号已存在"); return; } usersData[newId]={ balance:0, password:"123456", records:[], resultHistory:[], registerTime:new Date().toLocaleString() }; saveUsers(); showToast(`新账号 ${newId} 创建成功，密码123456`); document.getElementById('switchUserIdInputDT').value=newId; switchUserDT(); }
        function switchUserDT() { let newId=document.getElementById('switchUserIdInputDT').value.trim(); if(!newId) return; if(!usersData[newId]){ showToast("账号不存在"); return; } currentUser={ account:newId, ...usersData[newId] }; document.getElementById('currentUserId').innerText=newId; document.getElementById("userBalanceDisplay").innerText=getUserBalance().toFixed(2); updateUIDT(); updateHistoryDisplayDT(); updateRecordDisplayDT(); clearCountdownDT(); startCountdownDT(getCountdownSec()); showToast(`已切换到 ${newId}`); }
        function refreshBalanceDT() { updateUIDT(); showToast("刷新"); }
        document.querySelectorAll('.quick-bet').forEach(btn=>{ btn.onclick=()=>{ let type=btn.dataset.type, amt=parseInt(btn.dataset.amount); if(type && amt) addBetAmount(type,amt); }; });
        document.querySelectorAll('.clear-bet').forEach(btn=>{ btn.onclick=()=>clearBet(btn.dataset.type); });
        document.getElementById('fightBtnDT').onclick=executeBetDT;
        document.getElementById('cancelBtnDT').onclick=cancelAllBetsDT;
        document.getElementById('repeatBtnDT').onclick=repeatLastBetDT;
        document.getElementById('refreshBtnDT').onclick=refreshBalanceDT;
        document.getElementById('myHistoryBtnDT').onclick=showMyHistoryDT;
        document.getElementById('newUserBtnDT').onclick=newUserDT;
        document.getElementById('switchUserBtnDT').onclick=switchUserDT;
        document.querySelectorAll('.speed-btn').forEach(btn=>{ btn.onclick=()=>setSpeedDT(parseInt(btn.dataset.speed)); });
        updateUIDT(); updateHistoryDisplayDT(); updateRecordDisplayDT(); startCountdownDT(30);
        dragonTigerDestroy = () => { if(state.countdownInterval) clearInterval(state.countdownInterval); container.innerHTML=''; };
        return dragonTigerDestroy;
    }

    function initGame4(container) { container.innerHTML=`<div class="game-card" style="text-align:center;padding:40px;">♠️ 游戏4 · 百人牛牛筹备中</div>`; return ()=>{}; }

    // ==================== 认证界面 ====================
    function renderAuthUI() {
        const savedAcc=localStorage.getItem('neon_saved_account')||'';
        const savedPwd=localStorage.getItem('neon_saved_password')||'';
        const remChecked=localStorage.getItem('neon_remember_me')==='true';
        document.getElementById('app').innerHTML = `<div class="auth-panel"><h2>🏆 金辉娱乐城</h2><div><input type="text" id="loginAccount" class="auth-input" placeholder="${t('phoneOrEmail')}" value="${savedAcc}"><input type="password" id="loginPassword" class="auth-input" placeholder="${t('password')}" value="${savedPwd}"><div class="flex-row"><input type="checkbox" id="rememberCheckbox" ${remChecked?'checked':''}> <label>${t('remember')}</label></div><button id="loginBtn" class="auth-btn">${t('login')}</button></div><hr><h3>${t('registerNow')}</h3><input type="text" id="regAccount" class="auth-input" placeholder="${t('phoneOrEmail')}"><div class="flex-row"><input type="text" id="regCode" class="auth-input" placeholder="${t('verifyCode')}"><button id="getCodeBtn" class="code-btn">${t('getCode')}</button></div><input type="password" id="regPassword" class="auth-input" placeholder="${t('password')}"><input type="text" id="regReferral" class="auth-input" placeholder="${t('referralCode')}"><button id="registerBtn" class="auth-btn">${t('register')}</button><div class="auth-note">${t('referralNote')}</div></div>`;
        document.getElementById('loginBtn').onclick=()=>{ let acc=document.getElementById('loginAccount').value.trim(); let pwd=document.getElementById('loginPassword').value; let rem=document.getElementById('rememberCheckbox').checked; if(!acc||!pwd){showToast("请填写账号和密码");return;} let user=usersData[acc]; if(!user||user.password!==pwd){showToast("账号或密码错误");return;} if(rem){localStorage.setItem('neon_saved_account',acc); localStorage.setItem('neon_saved_password',pwd); localStorage.setItem('neon_remember_me','true');}else{localStorage.removeItem('neon_saved_account'); localStorage.removeItem('neon_saved_password'); localStorage.setItem('neon_remember_me','false');} currentUser={account:acc,...user}; showToast(`欢迎 ${acc}`); renderGameLobby(); };
        document.getElementById('getCodeBtn').onclick=()=>{ let acc=document.getElementById('regAccount').value.trim(); if(!acc){showToast("请填写手机号或邮箱");return;} if(usersData[acc]){showToast("账号已注册，请直接登录");return;} let code=Math.floor(100000+Math.random()*900000); verificationCodes[acc]={code:code.toString(), expire:Date.now()+5*60*1000}; alert(`【验证码】您的验证码是：${code}，5分钟内有效。`); showToast("验证码已发送"); };
        document.getElementById('registerBtn').onclick=()=>{ let acc=document.getElementById('regAccount').value.trim(); let code=document.getElementById('regCode').value.trim(); let pwd=document.getElementById('regPassword').value; let ref=document.getElementById('regReferral').value.trim().toUpperCase(); if(!acc||!code||!pwd||!ref){showToast("请填写完整信息");return;} if(!validReferralCodes.includes(ref)){showToast("推荐码无效");return;} if(usersData[acc]){showToast("账号已存在");return;} let v=verificationCodes[acc]; if(!v||v.code!==code||Date.now()>v.expire){showToast("验证码错误或已过期");return;} if(pwd.length<4){showToast("密码至少4位");return;} usersData[acc]={password:pwd, balance:0, referralCode:ref, registerTime:new Date().toLocaleString(), records:[], resultHistory:[]}; saveUsers(); delete verificationCodes[acc]; showToast("注册成功！请登录"); document.getElementById('regAccount').value=''; document.getElementById('regCode').value=''; document.getElementById('regPassword').value=''; document.getElementById('regReferral').value=''; };
    }

    function renderGameLobby() {
        if(!currentUser) { renderAuthUI(); return; }
        document.getElementById('app').innerHTML = `<div class="user-section"><div class="user-info-row"><span>📱 ${currentUser.account} | 💰 ${t('balance')}: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span><div class="btn-group"><button id="serviceBtn" class="btn-sm">${t('service')}</button><button id="logoutBtn" class="btn-sm">${t('logout')}</button><button id="langSwitchBtn" class="lang-switch">ภาษาไทย</button></div></div><div class="charge-withdraw-row" style="margin-top:12px;"><button id="rechargeBtn" class="charge-btn">${t('recharge')}</button><button id="withdrawBtn" class="withdraw-btn">${t('withdraw')}</button></div></div><div class="game-nav"><button class="game-tab active" data-game="fish">${t('gameFish')}</button><button class="game-tab" data-game="dice">${t('gameDice')}</button><button class="game-tab" data-game="dragonTiger">${t('gameDT')}</button><button class="game-tab" data-game="game4">${t('game4')}</button></div><div class="game-container" id="gamePanel"></div>`;
        document.getElementById('logoutBtn').onclick=()=>{ currentUser=null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick=showServiceModal;
        document.getElementById('rechargeBtn').onclick=recharge;
        document.getElementById('withdrawBtn').onclick=withdraw;
        document.getElementById('langSwitchBtn').onclick=()=>{ currentLang=currentLang==='zh'?'th':'zh'; document.getElementById('langSwitchBtn').innerText=currentLang==='zh'?'ภาษาไทย':'中文'; renderGameLobby(); };
        const gamePanel=document.getElementById('gamePanel');
        let currentDestroy=null;
        const inits={ fish:initFishGame, dice:initDiceGame, dragonTiger:initDragonTigerGame, game4:initGame4 };
        async function switchGame(id){ if(currentDestroy) currentDestroy(); gamePanel.innerHTML=''; currentDestroy=await inits[id](gamePanel); }
        document.querySelectorAll('.game-tab').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.game-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
        switchGame('fish');
        let adminClickCount=0;
        document.getElementById('userBalanceDisplay').addEventListener('click',()=>{ adminClickCount++; setTimeout(()=>{adminClickCount=0;},1000); if(adminClickCount>=3){ adminClickCount=0; openAdminModal(); } });
    }

    renderAuthUI();
</script>
