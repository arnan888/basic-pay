<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>四游戏大厅 · 葫芦鱼+十三张+预留位</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #1a120c; background-image: radial-gradient(circle at 20% 30%, rgba(200,140,70,0.15) 2%, transparent 2.5%); background-size: 28px 28px; font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif; padding: 12px; }
        .app { max-width: 550px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .game-nav { background: linear-gradient(145deg, #2a241e 0%, #1f1a15 100%); border-radius: 60px; padding: 6px; display: flex; gap: 8px; border: 1px solid #ffaa44; flex-wrap: wrap; }
        .game-tab { flex: 1; background: transparent; border: none; padding: 8px 0; border-radius: 50px; font-weight: bold; font-size: 0.85rem; color: #ccaa77; cursor: pointer; transition: 0.2s; text-align: center; }
        .game-tab.active { background: #c47c3a; color: #2f1b0a; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .user-section { background: #1f1711; border-radius: 40px; padding: 8px 16px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
        .user-info-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .user-info-row span { color: #ffdd99; font-size: 0.75rem; }
        .btn-group { display: flex; gap: 8px; }
        .logout-btn, .service-btn { background: #734c2e; border: none; padding: 4px 12px; border-radius: 30px; color: #ffe3b3; font-size: 0.7rem; cursor: pointer; }
        .service-btn { background: #2e7d32; }
        .charge-withdraw-row { display: flex; gap: 10px; justify-content: center; }
        .charge-btn, .withdraw-btn { background: #c47c3a; border: none; padding: 5px 20px; border-radius: 30px; color: #2f1b0a; font-weight: bold; font-size: 0.75rem; cursor: pointer; flex: 1; text-align: center; box-shadow: 0 2px 0 #764e26; }
        .withdraw-btn { background: #734c2e; color: #ffe3b3; box-shadow: 0 2px 0 #3f2a1a; }
        .game-container { background: linear-gradient(145deg, #362a1f 0%, #251e16 100%); border-radius: 48px; box-shadow: 0 12px 25px rgba(0,0,0,0.5); overflow: hidden; min-height: 550px; }
        .game-panel { display: none; }
        .game-panel.active { display: block; }
        #poker3d-container { width: 100%; height: 550px; position: relative; overflow: hidden; background: #0a1a1f; border-radius: 40px; }
        .auth-panel { background: linear-gradient(145deg, #362a1f 0%, #251e16 100%); border-radius: 48px; padding: 30px 20px; text-align: center; border: 2px solid #ffaa44; }
        .auth-panel h2 { color: #ffdd99; font-size: 1.5rem; margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; background: #2a241e; border: 1px solid #ffaa44; border-radius: 40px; color: white; font-size: 0.9rem; text-align: center; }
        .auth-buttons { display: flex; gap: 12px; margin: 20px 0; }
        .auth-btn { flex: 1; background: #c47c3a; border: none; padding: 10px; border-radius: 40px; color: #2f1b0a; font-weight: bold; cursor: pointer; }
        .auth-note { color: #aa8855; font-size: 0.65rem; }
        /* 葫芦鱼内部样式 */
        .fish-game-wrapper .chip { background: #ebbc7e; color: #3a240f; font-weight: bold; font-size: 0.7rem; padding: 3px 10px; border-radius: 35px; cursor: pointer; box-shadow: 0 2px 0 #8b5a2e; display: inline-block; text-align: center; }
        .fish-game-wrapper .chip.selected { background: #f7c56e; box-shadow: 0 0 0 1px #ffefb0, 0 2px 0 #7a4b22; }
        .fish-game-wrapper .bet-card { background: #1f1712; border-radius: 28px; padding: 4px 2px; text-align: center; box-shadow: 0 2px 0 #0a0705; border: 1px solid #6f4f34; }
        .fish-game-wrapper .bet-icon { font-size: 1.4rem; background: #2f231c; width: 36px; height: 36px; line-height: 36px; margin: 0 auto 3px; border-radius: 50%; }
        .fish-game-wrapper .bet-name { font-size: 0.65rem; font-weight: bold; color: #ffddb0; }
        .fish-game-wrapper .bet-odds { font-size: 0.5rem; color: #dba959; }
        .fish-game-wrapper .bet-amount { background: #0c0907; border-radius: 30px; padding: 2px 4px; margin: 4px 3px 0; display: flex; justify-content: space-between; align-items: center; gap: 2px; }
        .fish-game-wrapper .bet-amount span { color: #ffbc6e; font-size: 0.7rem; background: #2a1c12; padding: 1px 5px; border-radius: 25px; min-width: 32px; }
        .fish-game-wrapper .btn-chip { background: #523b26; border: none; color: #fce2b4; font-weight: bold; width: 24px; height: 24px; border-radius: 25px; font-size: 0.8rem; cursor: pointer; }
        .fish-game-wrapper .seat-card { background: #1a130d; border-radius: 16px; padding: 4px 2px; text-align: center; border: 1px solid #6f4f34; transition: 0.1s; }
        .fish-game-wrapper .seat-card.occupied { background: #2f4127; border: 1px solid #ffaa55; box-shadow: 0 0 4px #ffaa55; }
        .fish-game-wrapper .seat-number { font-size: 0.5rem; color: #dba24b; }
        .fish-game-wrapper .player-name { font-weight: bold; font-size: 0.55rem; margin: 2px 0; color: #ffefcf; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #1e1a16; border-radius: 48px; width: 90%; max-width: 420px; max-height: 85vh; overflow-y: auto; padding: 20px; border: 1px solid #ffaa44; color: #ffdd99; }
        .modal-content h2, .modal-content h3 { text-align: center; margin-bottom: 16px; }
        .password-input { width: 100%; padding: 12px; margin: 16px 0; background: #2a241e; border: 1px solid #ffaa44; border-radius: 40px; color: white; text-align: center; }
        .modal-btn { background: #ffaa44; color: #1a1a2a; border: none; border-radius: 40px; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .player-list { max-height: 55vh; overflow-y: auto; margin: 12px 0; }
        .player-item { background: #2a241e; border-radius: 40px; padding: 8px 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .player-actions button { background: #5f462f; border: none; border-radius: 25px; padding: 3px 8px; color: #ffe3b3; font-size: 0.6rem; cursor: pointer; }
        .player-actions .add-btn { background: #2e7d32; }
        .player-actions .sub-btn { background: #c0392b; }
        .admin-global button { background: #7a5a3e; border: none; border-radius: 35px; padding: 6px 12px; color: #ffefcf; font-weight: bold; font-size: 0.7rem; cursor: pointer; margin: 4px; }
        .close-modal { background: #ffaa44; color: #1a1a2a; width: 100%; margin-top: 16px; padding: 8px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; }
        .online-count { font-size: 0.65rem; background: #2c2418; display: inline-block; padding: 2px 12px; border-radius: 30px; margin-left: 8px; color: #ffaa66; }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
    // ==================== 全局用户系统 ====================
    const USERS_KEY = 'four_games_users_final';
    let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
    let currentUser = null;
    let adminPassword = localStorage.getItem('admin_pwd') || 'admin123';

    function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0; }
    function setUserBalance(amt) { if(currentUser) { usersData[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#000000cc;backdrop-filter:blur(10px);color:#ffaa44;padding:8px 16px;border-radius:40px;font-size:0.7rem;z-index:2001;border:1px solid #ffaa44;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    function showService() { showToast("📞 客服热线: 400-888-XXXX (24小时服务)"); }
    function recharge() { showToast("💎 充值请联系管理员（筹码1k连点三下进入后台）"); }
    function withdraw() { showToast("💰 提现请联系管理员（筹码1k连点三下进入后台）"); }

    // ==================== 游戏一：潮汕葫芦鱼 (完整 + 新增2中2 + 在线人数显示) ====================
    let fishDestroyFunc = null, fishInterval = null;
    function initFishGame(container) {
        if (fishDestroyFunc) fishDestroyFunc();
        container.innerHTML = '';
        const fishHTML = `
            <div class="fish-game-wrapper">
                <div class="stats-panel" style="display:flex; justify-content:space-between; gap:6px; padding:8px 12px; background:#1f1711; border-bottom:1px solid #644a33;">
                    <div class="stat-card" style="background:#1a130d; border-radius:30px; padding:4px 8px; flex:1; text-align:center;"><div class="stat-label" style="font-size:0.55rem; color:#e2bc89;">💰 庄家余额</div><div class="stat-value" id="fishBalanceValue" style="font-size:1rem; font-weight:800; color:#f9d792;">10000</div></div>
                    <div class="stat-card" style="background:#1a130d; border-radius:30px; padding:4px 8px; flex:1; text-align:center;"><div class="stat-label" style="font-size:0.55rem; color:#e2bc89;">🎲 总押注</div><div class="stat-value" id="totalBetValue">0</div></div>
                    <div class="stat-card" style="background:#1a130d; border-radius:30px; padding:4px 8px; flex:1; text-align:center;"><div class="stat-label" style="font-size:0.55rem; color:#e2bc89;">🏆 上局净利</div><div class="stat-value" id="lastWinValue">0</div></div>
                </div>
                <div class="dice-area" style="background:#2a211a; margin:12px 12px 8px; border-radius:50px; padding:12px; text-align:center; box-shadow:inset 0 0 0 2px #5e4230, 0 6px 12px black; position:relative;">
                    <div class="dice-title" style="font-size:0.65rem; color:#f5c28e; margin-bottom:6px;">⚡ 三骰开彩 · 鱼虾蟹葫芦金钱鸡 ⚡</div>
                    <div class="dice-box" style="display:flex; justify-content:center; gap:12px; position:relative;">
                        <div class="dice" style="background:#fff2df; width:70px; height:70px; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:2.8rem; box-shadow:0 5px 0 #926b42;">🎲</div>
                        <div class="dice" style="background:#fff2df; width:70px; height:70px; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:2.8rem; box-shadow:0 5px 0 #926b42;">🎲</div>
                        <div class="dice" style="background:#fff2df; width:70px; height:70px; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:2.8rem; box-shadow:0 5px 0 #926b42;">🎲</div>
                    </div>
                    <div id="fishDiceCover" style="position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at 30% 30%, rgba(0,0,0,0.9), #2c1e14); backdrop-filter:blur(6px); border-radius:50px; display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:15; transition:all 0.5s cubic-bezier(0.34,1.1,0.55,1); border:2px solid #cb9e6b;">
                        <span style="font-size:3rem;">🏺</span><div class="cover-text" style="font-size:0.65rem; background:#00000099; padding:2px 12px; border-radius:30px; margin-top:6px;">骰盅未开</div>
                    </div>
                </div>
                <div class="bet-sections" style="padding:0 12px 8px;">
                    <div class="section-title" style="font-size:0.7rem; color:#ffd49f; margin:8px 0 6px 4px; border-left:3px solid #f7b05e; padding-left:8px;">🐟 六门押注 (按次数赔)</div>
                    <div class="bet-grid" id="patternGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px;"></div>
                    <div class="section-title" style="font-size:0.7rem; color:#ffd49f; margin:8px 0 6px 4px; border-left:3px solid #f7b05e; padding-left:8px;">🎯 特殊投注</div>
                    <div class="special-grid" id="specialGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px;"></div>
                </div>
                <div class="chip-bar" style="background:#2a1f16; margin:6px 12px 10px; padding:6px 8px; border-radius:40px; display:flex; justify-content:center; gap:8px; flex-wrap:wrap;">
                    <div class="chip" data-chip="20">20</div><div class="chip" data-chip="50">50</div><div class="chip" data-chip="100" class="selected">100</div>
                    <div class="chip" data-chip="500">500</div><div class="chip" data-chip="1000" id="adminTriggerChip" style="background:radial-gradient(#e74c3c, #c0392b); color:#fff;">1k</div>
                </div>
                <div class="action-bar" style="display:flex; justify-content:center; gap:8px; padding:6px 12px 14px; flex-wrap:wrap;">
                    <button id="fishRollBtn" class="action-btn primary" style="background:#c47c3a; border:none; padding:5px 14px; font-size:0.75rem; font-weight:bold; border-radius:35px; color:#2f1b0a; box-shadow:0 3px 0 #764e26; cursor:pointer;">🎲 开骰！</button>
                    <button id="fishResetBetBtn" class="action-btn" style="background:#734c2e; border:none; padding:5px 14px; font-size:0.75rem; font-weight:bold; border-radius:35px; color:#ffe3b3; box-shadow:0 3px 0 #3f2a1a; cursor:pointer;">🧹 清空下注</button>
                    <button id="fishResetGameBtn" class="action-btn" style="background:#734c2e; border:none; padding:5px 14px; font-size:0.75rem; font-weight:bold; border-radius:35px; color:#ffe3b3; box-shadow:0 3px 0 #3f2a1a; cursor:pointer;">💺 重置庄家</button>
                </div>
                <div class="message-area" id="fishMsgArea" style="background:#1c140e; margin:0 12px 12px; border-radius:35px; padding:6px 10px; font-size:0.65rem; color:#dbbc8c; text-align:center; min-height:48px;">庄家坐镇 | 骰盅缓慢开启 → 骰子摇动</div>
                <div class="seats-section" style="background:#1e1813; border-radius:48px; overflow:hidden;">
                    <div class="seats-header" style="background:#4a3322; padding:6px 12px; text-align:center;">
                        <h3 style="color:#ffefcf; font-size:0.8rem;">🎲 二十人座席 <span id="onlineCountDisplay" class="online-count">👥 0/20</span></h3>
                    </div>
                    <div class="seats-grid" id="seatsGrid" style="display:grid; grid-template-columns:repeat(5,1fr); gap:6px; padding:10px;"></div>
                    <footer style="background:transparent; padding:6px; text-align:center; color:#aa8259;">🎮 实时在线玩家 | 筹码1k连点三下打开管理后台</footer>
                </div>
            </div>
        `;
        container.innerHTML = fishHTML;

        // 葫芦鱼逻辑变量
        let fishBalance = parseInt(localStorage.getItem('fish_banker_balance')) || 10000;
        let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
        let specialBets = { big:0, small:0, odd:0, even:0, allTriplets:0, twoInTwo:0 }; // 新增 twoInTwo
        let currentChip = 100;
        let lastWinAmount = 0;
        let isRolling = false;
        let fishPlayers = [];
        let nextPlayerId = 100;
        const namePool = ["阿强","老李","虾妹","蟹叔","金钱哥","鸡姐","小陈","骰子手","好运","锦鲤","鱼神","虾兵","蟹将","葫芦仙","铜钱","凤姐","阿珍","闲人","福仔","潮汕仔"];
        const patternList = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        const patternIdMap = { fish:"鱼", shrimp:"虾", crab:"蟹", calabash:"葫芦", coin:"金钱", chicken:"鸡" };

        function getFishTotalBet() { return Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(specialBets).reduce((a,b)=>a+b,0); }
        function updateFishUI() {
            const balSpan = container.querySelector('#fishBalanceValue'); if(balSpan) balSpan.innerText = fishBalance;
            const totalSpan = container.querySelector('#totalBetValue'); if(totalSpan) totalSpan.innerText = getFishTotalBet();
            const lastSpan = container.querySelector('#lastWinValue'); if(lastSpan) lastSpan.innerText = lastWinAmount;
            for(let id of Object.keys(patternBets)) { let span = container.querySelector(`#bet_${id}`); if(span) span.innerText = patternBets[id]; }
            for(let id of Object.keys(specialBets)) { let span = container.querySelector(`#bet_special_${id}`); if(span) span.innerText = specialBets[id]; }
        }
        function showFishMsg(msg) {
            const msgDiv = container.querySelector('#fishMsgArea');
            if(msgDiv) msgDiv.innerText = msg;
            setTimeout(() => { if(msgDiv && msgDiv.innerText === msg) msgDiv.innerText = "🎲 点击开骰 | 骰盅缓慢开启开奖"; }, 2500);
        }
        function addBet(type, id, val) {
            let target = type === 'pattern' ? patternBets : specialBets;
            if(target[id] === undefined) return;
            let totalNow = getFishTotalBet();
            let userBal = getUserBalance();
            if(totalNow + val > userBal) { showFishMsg(`余额不足，无法加注 ${val}`); return; }
            target[id] += val;
            updateFishUI();
            let name = type === 'pattern' ? patternIdMap[id] : (id === 'twoInTwo' ? '2中2(鱼+虾)' : id);
            showFishMsg(`➕ ${name} +${val}`);
        }
        function subBet(type, id, val) {
            let target = type === 'pattern' ? patternBets : specialBets;
            if(target[id] === undefined) return;
            let old = target[id];
            let newVal = Math.max(0, old - val);
            if(old !== newVal) { target[id] = newVal; updateFishUI(); let name = type === 'pattern' ? patternIdMap[id] : (id === 'twoInTwo' ? '2中2(鱼+虾)' : id); showFishMsg(`➖ ${name} -${val}`); }
        }
        function clearAllBets() {
            for(let k of Object.keys(patternBets)) patternBets[k]=0;
            for(let k of Object.keys(specialBets)) specialBets[k]=0;
            updateFishUI(); showFishMsg("清空所有下注");
        }
        function resetFishGame() {
            fishBalance = 10000; localStorage.setItem('fish_banker_balance', fishBalance);
            clearAllBets(); lastWinAmount = 0; updateFishUI();
            container.querySelectorAll(".dice").forEach(d => d.innerHTML = "🎲");
            const cover = container.querySelector('#fishDiceCover');
            if(cover) { cover.style.display = "flex"; cover.style.transform = "translateY(0) scale(1)"; cover.style.opacity = "1"; cover.style.visibility = "visible"; }
            showFishMsg("庄家重置，本金 10000 文，骰盅已复位");
        }
        async function animateRolling(finalNames) {
            const diceEls = container.querySelectorAll(".dice");
            const iconMap = { "鱼":"🐟","虾":"🦐","蟹":"🦀","葫芦":"🏺","金钱":"💰","鸡":"🐔" };
            for(let step=0; step<8; step++) {
                await new Promise(r=>setTimeout(r, 70));
                for(let i=0;i<3;i++) { let rand = patternList[Math.floor(Math.random()*6)]; diceEls[i].innerHTML = iconMap[rand]; }
            }
            for(let i=0;i<3;i++) diceEls[i].innerHTML = iconMap[finalNames[i]];
        }
        function getPointValue(pname) { const m={"鱼":1,"虾":2,"蟹":3,"葫芦":4,"金钱":5,"鸡":6}; return m[pname]||0; }
        async function settleGame(diceNames) {
            let points = diceNames.map(n=>getPointValue(n)), sum = points.reduce((a,b)=>a+b,0);
            let isTriplet = diceNames[0]===diceNames[1] && diceNames[1]===diceNames[2];
            let totalBet = getFishTotalBet();
            if(totalBet===0) { showFishMsg("没有下注，无法结算"); return false; }
            let userBal = getUserBalance();
            if(totalBet > userBal) { showFishMsg("下注超额，请检查余额"); return false; }
            setUserBalance(userBal - totalBet);
            let winAmount = 0, winDetails = [];
            // 六门赔付
            for(let [pid, betVal] of Object.entries(patternBets)) {
                if(betVal===0) continue;
                let occur = diceNames.filter(n=> n === patternIdMap[pid]).length;
                if(occur>0) { let prize = betVal * (occur+1); winAmount += prize; winDetails.push(`${patternIdMap[pid]} x${occur}`); }
            }
            // 特殊赔率
            let bigWin=false, smallWin=false, oddWin=false, evenWin=false, allTripletWin=false, twoInTwoWin=false;
            if(!isTriplet) {
                if(sum>=11 && sum<=17) bigWin=true;
                if(sum>=4 && sum<=10) smallWin=true;
                if(sum%2===1) oddWin=true;
                if(sum%2===0) evenWin=true;
            }
            if(isTriplet) allTripletWin=true;
            // 2中2：三颗骰子中同时出现“鱼”和“虾”
            if(diceNames.includes("鱼") && diceNames.includes("虾")) twoInTwoWin = true;
            
            if(specialBets.big>0 && bigWin) { winAmount += specialBets.big*2; winDetails.push("大"); }
            if(specialBets.small>0 && smallWin) { winAmount += specialBets.small*2; winDetails.push("小"); }
            if(specialBets.odd>0 && oddWin) { winAmount += specialBets.odd*2; winDetails.push("单"); }
            if(specialBets.even>0 && evenWin) { winAmount += specialBets.even*2; winDetails.push("双"); }
            if(specialBets.allTriplets>0 && allTripletWin) { winAmount += specialBets.allTriplets*25; winDetails.push("全围"); }
            if(specialBets.twoInTwo>0 && twoInTwoWin) { winAmount += specialBets.twoInTwo*5; winDetails.push("2中2(鱼+虾)"); }
            
            let net = winAmount - totalBet;
            let newBalance = getUserBalance() + winAmount;
            setUserBalance(newBalance);
            lastWinAmount = net; updateFishUI();
            let diceShow = diceNames.join("、");
            if(winAmount>0) showFishMsg(`🎲 ${diceShow} 净赢+${net}  [${winDetails.join(',')}]`);
            else showFishMsg(`😢 ${diceShow} 亏损 ${totalBet}`);
            clearAllBets();
            const balanceSpan = document.getElementById("userBalanceDisplay"); if(balanceSpan) balanceSpan.innerText = newBalance.toFixed(2);
            return true;
        }

    async function startRolling(finalVals) {

            let step = 0, maxStep = 18;
            let iv = setInterval(() => {
                step++;
                diceEl.forEach(d => setDiceValue(d, Math.floor(Math.random() * 6) + 1));
                if (step >= maxStep) {
                    clearInterval(iv);
                    diceEl.forEach(d => d.classList.remove('rolling1', 'rolling2', 'rolling3'));
                    diceEl.forEach((d, i) => {
                        setDiceValue(d, finalVals[i]);

                }
            }, 50);

    function startRollingNumber(finalAmount) {
        if (rollingAnimation) cancelAnimationFrame(rollingAnimation);
        let startTime = performance.now();
        let duration = 5000;
        let startVal = 0.01;
        rollingWinEl.classList.add('rolling-animate');
        function update(now) {
            let elapsed = now - startTime;
            let progress = Math.min(1, elapsed / duration);
            let ease = 1 - Math.pow(1 - progress, 2);
            let current = startVal + (finalAmount - startVal) * ease;
            rollingWinEl.innerText = current.toFixed(2);
            if (progress < 1) rollingAnimation = requestAnimationFrame(update);
            else {
                rollingWinEl.innerText = finalAmount.toFixed(2);
                rollingWinEl.classList.remove('rolling-animate');
                rollingAnimation = null;
            }
        }
        rollingAnimation = requestAnimationFrame(update);
    }

    function getResultInfo(d1, d2, d3) {
        let total = d1 + d2 + d3;
        let types = [];
        if (total >= 11 && total <= 17) types.push('BIG');
        if (total >= 4 && total <= 10) types.push('SMALL');
        if (total % 2 === 1) types.push('ODD');
        if (total % 2 === 0) types.push('EVEN');
        if (d1 === d2 && d2 === d3) {
            types.push('TRIPLE_' + d1);
            types.push('ALL_TRIPLE');
        }
        return { total, types };
    }

        currentBalance -= selectedChip;

        if (totalNeed > currentBalance) { showToast("余额不足，无法续押"); return; }

        let d3 = Math.floor(Math.random() * 6) + 1;
        let { total, types } = getResultInfo(d1, d2, d3);
        let winAmounts = [];
        if (types.includes('BIG') && bets['BIG'] > 0) winAmounts.push(bets['BIG'] * 2);
        if (types.includes('SMALL') && bets['SMALL'] > 0) winAmounts.push(bets['SMALL'] * 2);
        if (types.includes('ODD') && bets['ODD'] > 0) winAmounts.push(bets['ODD'] * 2);
        if (types.includes('EVEN') && bets['EVEN'] > 0) winAmounts.push(bets['EVEN'] * 2);
        if (bets[total] > 0) winAmounts.push(bets[total] * CONFIG.odds[total]);
        for (let t of types) {
            if (t.startsWith('TRIPLE_') && bets[t] > 0) winAmounts.push(bets[t] * CONFIG.odds[t]);
            if (t === 'ALL_TRIPLE' && bets['ALL_TRIPLE'] > 0) winAmounts.push(bets['ALL_TRIPLE'] * CONFIG.odds['ALL_TRIPLE']);
        }
        let totalWin = winAmounts.reduce((a, b) => a + b, 0);
        startRollingNumber(totalWin);
        await startRolling([d1, d2, d3]);
        totalEl.innerText = total;
        if (totalWin > 0) {
            totalEl.style.color = '#4caf50';
            setTimeout(() => totalEl.style.color = '#ff3300', 2000);
        } else {
            totalEl.style.color = '#f44336';
            setTimeout(() => totalEl.style.color = '#ff3300', 2000);
        }
        currentBalance += totalWin;
        setUserBalance(currentBalance);
        let betSummary = [];
        for (let k in bets) if (bets[k] > 0) {
            if (k === 'BIG') betSummary.push('大' + bets[k]);
            else if (k === 'SMALL') betSummary.push('小' + bets[k]);
            else if (k === 'ODD') betSummary.push('单' + bets[k]);
            else if (k === 'EVEN') betSummary.push('双' + bets[k]);
            else if (typeof k === 'number') betSummary.push(k + '点' + bets[k]);
            else if (k.startsWith('TRIPLE_')) betSummary.push(k.split('_')[1] + '围' + bets[k]);
            else if (k === 'ALL_TRIPLE') betSummary.push('豹子' + bets[k]);
        }
        let recs = diceUsers[currentUserId].records || [];
        recs.unshift({
            time: new Date().toLocaleTimeString(),
            bets: betSummary.join(' '),
            result: total,
            resultType: types.map(t => t === 'BIG' ? '大' : t === 'SMALL' ? '小' : t === 'ODD' ? '单' : t === 'EVEN' ? '双' : t.startsWith('TRIPLE_') ? t.split('_')[1] + '围' : '豹子').join(','),
            win: totalWin,
            isWin: totalWin > 0
        });
        if (recs.length > 30) recs.pop();
        diceUsers[currentUserId].records = recs;
        saveDiceUsers();
        updateHistory();
        for (let k in bets) bets[k] = 0;
        updateUI();
        if (navigator.vibrate) navigator.vibrate(totalWin > 0 ? [100,50,100] : 80);
        lastBet = JSON.parse(JSON.stringify(bets));
        let winText = totalWin > 0 ? `🎉 恭喜！ 赢 ${totalWin.toFixed(2)} 🎉` : `😭 很遗憾 输 ${totalBet.toFixed(2)} 😭`;
        showBigResult(winText, totalWin > 0);
        setTimeout(() => {
            resetDiceCover();
            isDrawing = false;
            isBetLocked = false;
            startCountdown(CONFIG.countdownSeconds);
        }, 5000);
    }

    function startCountdown(sec) {
        if (countdownInterval) clearInterval(countdownInterval);
        let c = sec;
        let cdSpan = container.querySelector('#countdownNum');
        cdSpan.innerText = c;
        cdSpan.classList.remove('countdown-warning');
        isBetLocked = false;
        countdownInterval = setInterval(() => {
            if (c <= 1) {
                clearInterval(countdownInterval);
                countdownInterval = null;
                isBetLocked = true;
                drawWithCover();
            } else {
                c--;
                cdSpan.innerText = c;
                if (c <= 5) cdSpan.classList.add('countdown-warning');
            }
        }, 1000);
    }

    function updateHistory() {
        let containerHist = container.querySelector('#historyList');
        let recs = diceUsers[currentUserId]?.records || [];
        containerHist.innerHTML = '';
        if (recs.length === 0) {
            containerHist.innerHTML = '<div style="text-align:center;color:#666">暂无记录</div>';
            return;
        }
        recs.slice(0, 10).forEach(r => {
            let div = document.createElement('div');
            div.className = 'history-item';
            div.style.display = 'flex';
            div.style.justifyContent = 'space-between';
            div.style.padding = '4px 6px';
            div.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
            div.style.fontSize = '10px';
            div.style.color = '#ccc';
            div.innerHTML = `<span>${r.time}</span><span>${r.bets}</span><span>开${r.result}(${r.resultType})</span><span class="${r.isWin ? 'win' : 'lose'}" style="color:${r.isWin ? '#4caf50' : '#f44336'}">${r.isWin ? '+' + r.win : ''}</span>`;
            containerHist.appendChild(div);
        });
    }

    function refreshBalance() {
        currentBalance = getUserBalance();
        updateUI();
        showToast("余额已刷新");
    }

    function switchUser() {
        let newId = container.querySelector('#switchId').value.trim();
        if (!newId) return;
        currentUserId = newId;
        if (!diceUsers[currentUserId]) diceUsers[currentUserId] = { records: [] };
        container.querySelector('#currentUserId').innerText = currentUserId;
        currentBalance = getUserBalance();
        for (let k in bets) bets[k] = 0;
        updateUI();
        if (countdownInterval) clearInterval(countdownInterval);
        startCountdown(CONFIG.countdownSeconds);
        updateHistory();
        showToast('已切换到 ' + currentUserId);
    }

    function showHistoryModal() {
        let recs = diceUsers[currentUserId]?.records || [];
        let html = '<div style="max-height:300px;overflow-y:auto">';
        if (recs.length === 0) html += '<p>暂无记录</p>';
        else recs.forEach(r => {
            html += `<div style="padding:8px;border-bottom:1px solid #333;display:flex;justify-content:space-between"><span>${r.time}</span><span>${r.bets}</span><span>开${r.result}点</span><span style="color:${r.isWin ? '#4caf50' : '#f44336'}">${r.isWin ? '+' + r.win : ''}</span></div>`;
        });
        html += '</div><button id="closeModalBtn" style="background:#ff6600;border:none;border-radius:30px;padding:10px 24px;margin-top:16px;color:#fff">关闭</button>';
        let modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = '<div class="modal-content"><h3>📜 投注记录</h3>' + html + '</div>';
        document.body.appendChild(modal);
        modal.querySelector('#closeModalBtn').onclick = () => modal.remove();
    }

    let adminPanel = null;
    function showAdminPanel() {
        if (adminPanel) { adminPanel.remove(); adminPanel = null; return; }
        let panel = document.createElement('div');
        panel.className = 'modal';
        panel.innerHTML = '<div class="modal-content"><h3>🔐 管理员面板</h3><div id="adminUserList" class="admin-user-list"></div><div>当前：<strong id="adminSelectedUser">' + currentUserId + '</strong></div><input type="number" id="adminAmount" class="admin-input" placeholder="金额" value="0"><div class="admin-btns"><button id="adminAdd" class="admin-btn" style="background:#4caf50;color:#fff">上分</button><button id="adminSub" class="admin-btn" style="background:#f44336;color:#fff">下分</button><button id="adminQuery" class="admin-btn" style="background:#2196f3;color:#fff">查询</button><button id="adminReset" class="admin-btn" style="background:#ff9800;color:#fff">重置</button><button id="adminPwd" class="admin-btn" style="background:#9c27b0;color:#fff">改密</button></div><button id="adminClose" style="background:#ffaa44;color:#1a1a2a;padding:8px 24px;border-radius:25px;border:none;margin-top:12px">关闭</button></div>';
        document.body.appendChild(panel);
        adminPanel = panel;
        function refreshList() {
            let listDiv = panel.querySelector('#adminUserList');
            let usersArr = Object.keys(diceUsers);
            listDiv.innerHTML = '';
            usersArr.forEach(uid => {
                let div = document.createElement('div');
                div.className = 'admin-user';
                if (uid === currentUserId) div.classList.add('selected');
                div.textContent = uid + ' (' + getUserBalance().toFixed(2) + ')';
                div.onclick = () => {
                    currentUserId = uid;
                    panel.querySelector('#adminSelectedUser').innerText = currentUserId;
                    refreshList();
                };
                listDiv.appendChild(div);
            });
        }
        refreshList();
        panel.querySelector('#adminAdd').onclick = () => {
            let amt = parseFloat(panel.querySelector('#adminAmount').value);
            if (isNaN(amt) || amt <= 0) { showToast("请输入正数"); return; }
            let cur = getUserBalance();
            setUserBalance(cur + amt);
            currentBalance = getUserBalance();
            updateUI();
            refreshList();
            showToast('给 ' + currentUserId + ' 上分 ' + amt);
        };
        panel.querySelector('#adminSub').onclick = () => {
            let amt = parseFloat(panel.querySelector('#adminAmount').value);
            if (isNaN(amt) || amt <= 0) { showToast("请输入正数"); return; }
            let cur = getUserBalance();
            if (cur < amt) { showToast("余额不足"); return; }
            setUserBalance(cur - amt);
            currentBalance = getUserBalance();
            updateUI();
            refreshList();
            showToast('从 ' + currentUserId + ' 下分 ' + amt);
        };
        panel.querySelector('#adminQuery').onclick = () => showToast(currentUserId + ' 余额: ' + getUserBalance().toFixed(2));
        panel.querySelector('#adminReset').onclick = () => {
            if (confirm('重置 ' + currentUserId + ' 余额为 ' + CONFIG.defaultBalance + '？')) {
                setUserBalance(CONFIG.defaultBalance);
                currentBalance = getUserBalance();
                updateUI();
                refreshList();
                showToast("重置成功");
            }
        };
        panel.querySelector('#adminPwd').onclick = () => {
            let old = prompt("当前密码:");
            if (old !== adminPwd) { showToast("密码错误"); return; }
            let newPwd = prompt("新密码(至少6位):");
            if (!newPwd || newPwd.length < 6) { showToast("密码至少6位"); return; }
            adminPwd = newPwd;
            localStorage.setItem('dice_admin_pwd', newPwd);
            showToast("密码修改成功");
        };
        panel.querySelector('#adminClose').onclick = () => { panel.remove(); adminPanel = null; };
    }

    function createPointsGrid() {
        let grid = container.querySelector('#pointsGrid');
        for (let i = 4; i <= 17; i++) {
            let card = document.createElement('div');
            card.className = 'point-card';
            card.setAttribute('data-point', i);
            card.innerHTML = '<div class="point-value">' + i + '点</div><div class="point-odds">赔 ' + CONFIG.odds[i] + '倍</div><div class="point-bet-amount" id="bet_' + i + '">0</div>';
            card.onclick = (function(p) { return function() { addBet(p); }; })(i);
            grid.appendChild(card);
        }
    }

    function createCombinedGrid() {
        let grid = container.querySelector('#combinedGrid');
        for (let i = 1; i <= 6; i++) {
            let card = document.createElement('div');
            card.className = 'trio-card';
            card.setAttribute('data-type', 'TRIPLE_' + i);
            card.innerHTML = '<div class="trio-name">' + i + '围</div><div class="trio-odds">赔 150倍</div><div class="trio-bet-amount" id="bet_TRIPLE_' + i + '">0</div>';
            card.onclick = (function(p) { return function() { addBet('TRIPLE_' + p); }; })(i);
            grid.appendChild(card);
        }
        let allCard = document.createElement('div');
        allCard.className = 'trio-card';
        allCard.setAttribute('data-type', 'ALL_TRIPLE');
        allCard.innerHTML = '<div class="trio-name">豹子</div><div class="trio-odds">赔 30倍</div><div class="trio-bet-amount" id="bet_ALL_TRIPLE">0</div>';
        allCard.onclick = () => addBet('ALL_TRIPLE');
        grid.appendChild(allCard);
    }

    function initDrawers() {
        container.querySelectorAll('.drawer-header').forEach(header => {
            header.addEventListener('click', function() {
                let drawerId = this.getAttribute('data-drawer');
                let content = container.querySelector('#' + drawerId);
                let icon = this.querySelector('.drawer-icon');
                if (content.classList.contains('open')) {
                    content.classList.remove('open');
                    icon.innerHTML = '▼';
                } else {
                    content.classList.add('open');
                    icon.innerHTML = '▲';
                }
            });
        });
    }

    function init() {
        createPointsGrid();
        createCombinedGrid();
        container.querySelectorAll('.chip').forEach(chip => {
            chip.onclick = function() {
                selectedChip = parseInt(this.dataset.val);
                container.querySelector('#selectedChip').innerText = selectedChip;
                container.querySelectorAll('.chip').forEach(c => c.classList.remove('selected-chip'));
                this.classList.add('selected-chip');
                if (navigator.vibrate) navigator.vibrate(20);
            };
        });
        container.querySelectorAll('.special-card').forEach(card => {
            card.onclick = () => addBet(card.dataset.type);
        });
        container.querySelector('#clearAllBtn').onclick = clearAllBets;
        container.querySelector('#repeatBtn').onclick = repeatLastBet;
        container.querySelector('#refreshBtn').onclick = refreshBalance;
        container.querySelector('#betBtn').onclick = () => { if (!isDrawing && !isBetLocked) drawWithCover(); };
        container.querySelector('#switchBtn').onclick = switchUser;
        container.querySelector('#historyBtn').onclick = showHistoryModal;
        container.querySelector('#adminEntry').onclick = () => {
            let pwd = prompt("管理员密码:");
            if (pwd === adminPwd) showAdminPanel();
            else if (pwd !== null) showToast("密码错误");
        };
        container.querySelector('#newUserBtn').onclick = () => {
            let newId = "player_" + Math.floor(Math.random() * 100000);
            container.querySelector('#switchId').value = newId;
            switchUser();
            showToast("新账户：" + newId + " 初始余额 " + CONFIG.defaultBalance);
        };
        diceEl.forEach(d => {
            for (let i = 0; i < 6; i++) {
                let faceDivs = ['front', 'back', 'right', 'left', 'top', 'bottom'];
                let faceClass = faceDivs[i];
                let valMap = { front: 1, back: 6, right: 4, left: 3, top: 2, bottom: 5 };
                let num = valMap[faceClass];
                let faceDiv = document.createElement('div');
                faceDiv.className = 'dice-face ' + faceClass + ' face-' + num;
                let pipHtml = '';
                if (num === 1) pipHtml = '<div class="pip pip-center"></div>';
                else if (num === 2) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-br"></div>';
                else if (num === 3) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div>';
                else if (num === 4) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                else if (num === 5) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-mid"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                else if (num === 6) pipHtml = '<div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div>';
                faceDiv.innerHTML = pipHtml;
                d.appendChild(faceDiv);
            }
        });
        diceEl.forEach(d => setDiceValue(d, 1));
        totalEl.innerText = 3;
        updateUI();
        updateHistory();
        startCountdown(CONFIG.countdownSeconds);
        let savedPwd = localStorage.getItem('dice_admin_pwd');
        if (savedPwd) adminPwd = savedPwd;
        resetDiceCover();
        initDrawers();
    }

    init();

    destroy = () => {
        if (countdownInterval) clearInterval(countdownInterval);
        if (rollingAnimation) cancelAnimationFrame(rollingAnimation);
        container.innerHTML = '';
    };
    return destroy;
}

            let phone = document.getElementById('regPhone').value.trim();

            if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
