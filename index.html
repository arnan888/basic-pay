<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>至尊骰宝 · 抽屉推拉式主体 | 赌场骰盅版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', sans-serif;
            padding: 12px;
        }
        .game-container {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(145deg, #1a4a2a, #0a2a1a);
            border-radius: 40px;
            padding: 12px;
            border: 1px solid #ffaa44;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .inner {
            background: rgba(0,0,0,0.3);
            border-radius: 32px;
            padding: 10px;
        }
        /* 骰子区域 + 骰盅 */
        .dice-area {
            background: rgba(0,0,0,0.7);
            border-radius: 24px;
            padding: 4px;
            text-align: center;
            perspective: 1000px;
            border: 1px solid rgba(255,170,68,0.3);
            margin-bottom: 14px;
            box-shadow: 0 0 12px rgba(255,170,68,0.6), 0 6px 12px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .dice-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255,220,150,0.25) 0%, rgba(255,220,150,0) 70%);
            pointer-events: none;
            z-index: 0;
            border-radius: 24px;
        }
        .dice-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }
        .dice {
            width: 60px;
            height: 60px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.2,0.8,0.3,1.1);
        }
        .dice-face {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #fffff0, #f5f5dc);
            border-radius: 12px;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.8), 0 5px 12px rgba(0,0,0,0.3);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(200,180,120,0.5);
        }
        .front  { transform: translateZ(30px); }
        .back   { transform: rotateY(180deg) translateZ(30px); }
        .right  { transform: rotateY(90deg) translateZ(30px); }
        .left   { transform: rotateY(-90deg) translateZ(30px); }
        .top    { transform: rotateX(90deg) translateZ(30px); }
        .bottom { transform: rotateX(-90deg) translateZ(30px); }
        .pip { position: absolute; width: 9px; height: 9px; border-radius: 50%; box-shadow: inset 0 1px 2px rgba(255,255,255,0.5), 0 1px 2px rgba(0,0,0,0.2); }
        .face-1 .pip { background: radial-gradient(circle at 35% 35%, #e74c3c, #c0392b); }
        .face-2 .pip { background: radial-gradient(circle at 35% 35%, #3498db, #2980b9); }
        .face-3 .pip-tl, .face-3 .pip-br { background: radial-gradient(circle at 35% 35%, #2ecc71, #27ae60); }
        .face-3 .pip-center { background: radial-gradient(circle at 35% 35%, #e74c3c, #c0392b); }
        .face-3 .pip-tr, .face-3 .pip-bl { background: radial-gradient(circle at 35% 35%, #3498db, #2980b9); }
        .face-4 .pip { background: radial-gradient(circle at 35% 35%, #3498db, #2980b9); }
        .face-5 .pip-tl, .face-5 .pip-br { background: radial-gradient(circle at 35% 35%, #2ecc71, #27ae60); }
        .face-5 .pip-tr, .face-5 .pip-bl { background: radial-gradient(circle at 35% 35%, #3498db, #2980b9); }
        .face-5 .pip-mid { background: radial-gradient(circle at 35% 35%, #e74c3c, #c0392b); }
        .face-6 .pip { background: radial-gradient(circle at 35% 35%, #3498db, #2980b9); }
        .pip-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .pip-tl { top: 20%; left: 20%; }
        .pip-tr { top: 20%; right: 20%; }
        .pip-bl { bottom: 20%; left: 20%; }
        .pip-br { bottom: 20%; right: 20%; }
        .pip-mid { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .pip-l1 { left: 20%; top: 15%; }
        .pip-l2 { left: 20%; top: 50%; transform: translateY(-50%); }
        .pip-l3 { left: 20%; bottom: 15%; }
        .pip-r1 { right: 20%; top: 15%; }
        .pip-r2 { right: 20%; top: 50%; transform: translateY(-50%); }
        .pip-r3 { right: 20%; bottom: 15%; }
        @keyframes roll1 { 0% { transform: rotateX(0deg) rotateY(0deg); } 25% { transform: rotateX(180deg) rotateY(90deg); } 50% { transform: rotateX(360deg) rotateY(180deg); } 75% { transform: rotateX(540deg) rotateY(270deg); } 100% { transform: rotateX(720deg) rotateY(360deg); } }
        @keyframes roll2 { 0% { transform: rotateX(0deg) rotateY(0deg); } 25% { transform: rotateX(90deg) rotateY(180deg); } 50% { transform: rotateX(180deg) rotateY(360deg); } 75% { transform: rotateX(270deg) rotateY(540deg); } 100% { transform: rotateX(360deg) rotateY(720deg); } }
        @keyframes roll3 { 0% { transform: rotateX(0deg) rotateY(0deg); } 25% { transform: rotateX(120deg) rotateY(240deg); } 50% { transform: rotateX(240deg) rotateY(480deg); } 75% { transform: rotateX(360deg) rotateY(720deg); } 100% { transform: rotateX(480deg) rotateY(960deg); } }
        .rolling1 { animation: roll1 0.9s cubic-bezier(0.2,0.9,0.4,1.1); }
        .rolling2 { animation: roll2 0.9s cubic-bezier(0.2,0.9,0.4,1.1); }
        .rolling3 { animation: roll3 0.9s cubic-bezier(0.2,0.9,0.4,1.1); }
        .land { animation: land 0.15s ease-out; }
        @keyframes land { 0% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .total { background: rgba(0,0,0,0.5); border-radius: 30px; padding: 4px; margin-top: 4px; position: relative; z-index: 1; }
        .total-label { font-size: 10px; color: #3399ff; }
        .total-number { font-size: 22px; font-weight: bold; color: #ff3300; font-family: monospace; text-shadow: 0 0 5px rgba(255,51,0,0.5); }

        /* 豪华骰盅 */
        .dice-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, #3a2a1a, #1e140c);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            transition: all 0.55s cubic-bezier(0.34, 1.1, 0.55, 1);
            box-shadow: 0 0 0 3px #dbb45c, inset 0 0 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,215,0,0.7);
            pointer-events: none;
        }
        .dice-cover span:first-child { font-size: 4.2rem; filter: drop-shadow(4px 6px 12px black); animation: breathShake 1.6s infinite ease; }
        .dice-cover .cover-text { font-size: 0.9rem; background: #000000aa; padding: 5px 18px; border-radius: 60px; color: #ffdd99; margin-top: 8px; font-weight: bold; letter-spacing: 2px; border: 1px solid #ffcc66; }
        .dice-cover.open-cover { transform: translateY(-110px) scale(0.7); opacity: 0; visibility: hidden; pointer-events: none; }
        .dice-cover.hidden-cover { display: none; }
        @keyframes breathShake { 0% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.08); opacity: 1; text-shadow: 0 0 15px #ffaa44; } 100% { transform: scale(1); opacity: 0.9; } }

        /* 通用组件 */
        .rolling-win { background: rgba(0,0,0,0.5); border-radius: 30px; padding: 5px 12px; display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
        .rolling-label { font-size: 12px; color: #3399ff; }
        .rolling-number { font-size: 22px; font-weight: bold; color: #ff3300; font-family: monospace; }
        .rolling-animate { animation: rollNumber 0.05s step-end infinite; }
        @keyframes rollNumber { 0% { text-shadow: 0 0 5px #ffaa44; transform: scale(1); } 50% { text-shadow: 0 0 20px #ff6600; color: #ffdd88; transform: scale(1.05); } }
        .user-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .login-row { display: flex; gap: 6px; margin-bottom: 14px; }
        .login-input { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid #ffaa44; border-radius: 40px; padding: 6px 10px; color: #fff; font-size: 12px; }
        .small-btn { background: rgba(255,170,68,0.2); border: 1px solid #ffaa44; border-radius: 40px; padding: 5px 12px; color: #ffaa44; cursor: pointer; font-size: 11px; }
        .small-btn:active { transform: scale(0.95); }
        .info-bar { background: rgba(0,0,0,0.5); border-radius: 30px; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .info-item { text-align: center; flex: 1; }
        .info-label { font-size: 9px; color: #88aa88; }
        .info-value { font-size: 20px; font-weight: bold; color: #ff3300; font-family: monospace; }
        .countdown-warning { animation: warning 0.5s infinite; color: #ff3300 !important; }
        @keyframes warning { 0%,100% { opacity:1; } 50% { opacity:0.5; text-shadow:0 0 10px red; } }
        .action-buttons { display: flex; gap: 8px; margin-bottom: 14px; }
        .action-btn { flex: 1; padding: 8px; border-radius: 50px; text-align: center; font-weight: bold; cursor: pointer; font-size: 12px; border: none; color: #fff; }
        .action-btn:active { transform: scale(0.97); }
        .btn-cancel { background: #e74c3c; }
        .btn-repeat { background: #f39c12; }
        .btn-refresh { background: #2ecc71; }
        .btn-bet { background: #3498db; }
        .balance-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        .balance-card { background: rgba(0,0,0,0.5); border-radius: 20px; padding: 6px; text-align: center; cursor: pointer; }
        .balance-label { font-size: 9px; color: #88aa88; }
        .balance-value { font-size: 18px; font-weight: bold; color: #ff3300; }
        .chips { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; }
        .chip { width: 50px; padding: 5px 0; border-radius: 50px; text-align: center; font-weight: bold; font-size: 13px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .chip:active { transform: scale(0.94); }
        .chip.selected-chip { box-shadow: 0 0 0 3px #ffaa44; transform: scale(1.02); }
        .chip-10 { background: radial-gradient(#4a90d9, #1a4a8a); color:#fff; }
        .chip-20 { background: radial-gradient(#50b86a, #2a6a3a); color:#fff; }
        .chip-50 { background: radial-gradient(#e85d3a, #aa2a1a); color:#fff; }
        .chip-100 { background: radial-gradient(#9b59b6, #6c3483); color:#fff; }
        .chip-500 { background: radial-gradient(#f1c40f, #d4a00a); color:#333; }
        .chip-1000 { background: radial-gradient(#e74c3c, #c0392b); color:#fff; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        .stat-card { background: rgba(0,0,0,0.5); border-radius: 16px; padding: 6px; text-align: center; }
        .stat-label { font-size: 9px; color: #88aa88; }
        .stat-value { font-size: 18px; font-weight: bold; color: #ff3300; }
        .history { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 8px; max-height: 90px; overflow-y: auto; margin-top: 8px; }
        .history-item { display: flex; justify-content: space-between; padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 10px; color: #ccc; }
        .win { color: #4caf50; }
        .lose { color: #f44336; }
        /* 抽屉推拉式面板 */
        .drawer-section {
            margin-bottom: 14px;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
        }
        .drawer-header {
            background: linear-gradient(145deg, #2a5a3a, #1a3a2a);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-radius: 24px;
            transition: all 0.1s;
            border: 1px solid #ffaa44;
        }
        .drawer-header:active { transform: scale(0.99); }
        .drawer-title {
            font-size: 14px;
            font-weight: bold;
            color: #ffdd99;
            letter-spacing: 1px;
        }
        .drawer-icon {
            font-size: 20px;
            color: #ffaa44;
            transition: transform 0.3s ease;
        }
        .drawer-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            background: rgba(0,0,0,0.4);
            border-radius: 0 0 24px 24px;
        }
        .drawer-content.open {
            max-height: 800px; /* 足够容纳内容 */
        }
        .drawer-inner {
            padding: 12px;
        }
        .special-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .special-card {
            border-radius: 14px;
            padding: 6px 2px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,170,68,0.3);
            background: linear-gradient(145deg, #ff5533, #cc2200);
        }
        .special-card[data-type="ODD"], .special-card[data-type="EVEN"] { background: linear-gradient(145deg, #007a42, #003a1a); }
        .special-card.selected { background: linear-gradient(135deg, #ffcc44, #ffaa44); transform: scale(0.97); }
        .special-name { font-size: 16px; font-weight: bold; color: #ffcc44; }
        .special-odds { font-size: 9px; color: #ffdd99; margin-top: 2px; }
        .special-bet-amount { font-size: 11px; font-weight: bold; color: #ffaa44; margin-top: 3px; background: rgba(0,0,0,0.5); border-radius: 20px; padding: 2px; }
        .points-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .point-card { background: linear-gradient(145deg, #d4a017, #b8860b); border-radius: 14px; padding: 6px 2px; text-align: center; cursor: pointer; border: 1px solid rgba(255,215,0,0.6); }
        .point-card.selected { background: linear-gradient(135deg, #ffcc44, #ffaa44); transform: scale(0.97); }
        .point-value { font-size: 14px; font-weight: bold; color: #fff; }
        .point-odds { font-size: 8px; color: #fff9c4; }
        .point-bet-amount { font-size: 11px; font-weight: bold; color: #ffdd88; margin-top: 3px; background: rgba(0,0,0,0.5); border-radius: 20px; padding: 2px; }
        .trio-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .trio-card { background: linear-gradient(145deg, #1e3a8a, #1e40af); border-radius: 14px; padding: 6px 2px; text-align: center; cursor: pointer; border: 1px solid rgba(96,165,250,0.6); }
        .trio-card.selected { background: linear-gradient(135deg, #ffcc44, #ffaa44); transform: scale(0.97); }
        .trio-name { font-size: 14px; font-weight: bold; color: #fff; }
        .trio-odds { font-size: 8px; color: #bfdbfe; }
        .trio-bet-amount { font-size: 11px; font-weight: bold; color: #ffdd88; margin-top: 3px; background: rgba(0,0,0,0.5); border-radius: 20px; padding: 2px; }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); color: #ffaa44; padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: bold; z-index: 2000; border: 1px solid #ffaa44; animation: fadeInOut 2s ease forwards; pointer-events: none; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1a2a1a; border-radius: 32px; padding: 20px; text-align: center; border: 1px solid #ffaa44; width: 85%; max-width: 340px; color: #fff; }
        .admin-user-list { max-height: 150px; overflow-y: auto; margin: 12px 0; background: #0a1a0a; border-radius: 12px; padding: 8px; }
        .admin-user { padding: 8px; border-bottom: 1px solid #333; cursor: pointer; }
        .admin-user.selected { background: #ffaa44; color: #1a1a2a; }
        .admin-input { width: 100%; padding: 8px; margin: 8px 0; border-radius: 12px; background: #0a1a0a; border: 1px solid #ffaa44; color: #fff; }
        .admin-btns { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 12px 0; }
        .admin-btn { padding: 6px 12px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="inner">
        <!-- 骰子区 + 骰盅 -->
        <div class="dice-area">
            <div class="dice-row">
                <div class="dice" id="dice1"></div>
                <div class="dice" id="dice2"></div>
                <div class="dice" id="dice3"></div>
            </div>
            <div class="total">
                <div class="total-label">总 点 数</div>
                <div class="total-number" id="totalPoints">3</div>
            </div>
            <div class="dice-cover" id="diceCover">
                <span>🏺</span>
                <div class="cover-text">骰盅未启 · 下注待开</div>
            </div>
        </div>

        <div class="rolling-win"><div class="rolling-label">🎲 本局中奖</div><div class="rolling-number" id="rollingWinNumber">0.00</div></div>
        <div class="user-row"><div><span style="color:#ffaa44">👤</span> <span id="currentUserId" style="color:#ffaa44; font-weight:bold">player888</span></div><div><button id="historyBtn" class="small-btn">📜 记录</button><button id="newUserBtn" class="small-btn">✨ 新用户</button></div></div>
        <div class="login-row"><input type="text" id="switchId" class="login-input" placeholder="输入ID登录"><button id="switchBtn" class="small-btn">登录</button></div>
        <div class="info-bar"><div class="info-item"><div class="info-label">⏱️ 下注倒计时</div><div class="info-value" id="countdownNum">25</div></div><div class="info-item"><div class="info-label">🎲 当前筹码</div><div class="info-value" id="selectedChip">0</div></div></div>
        <div class="action-buttons"><button class="action-btn btn-cancel" id="clearAllBtn">全部取消</button><button class="action-btn btn-repeat" id="repeatBtn">续押</button><button class="action-btn btn-refresh" id="refreshBtn">刷新余额</button><button class="action-btn btn-bet" id="betBtn">确认投注</button></div>
        <div class="balance-row"><div class="balance-card" id="adminEntry"><div class="balance-label">💰 账户余额</div><div class="balance-value" id="balanceDisplay">1000.00</div></div><div class="balance-card"><div class="balance-label">🎰 奖池累积</div><div class="balance-value" id="poolDisplay">50000.00</div></div></div>
        <div class="chips">
            <div class="chip chip-10" data-val="10">10</div><div class="chip chip-20" data-val="20">20</div><div class="chip chip-50" data-val="50">50</div>
            <div class="chip chip-100" data-val="100">100</div><div class="chip chip-500" data-val="500">500</div><div class="chip chip-1000" data-val="1000">1K</div>
        </div>

        <!-- 抽屉1: 大小单双 -->
        <div class="drawer-section">
            <div class="drawer-header" data-drawer="drawerSpecial">
                <span class="drawer-title">🎲 大小单双 · 赔率2倍</span>
                <span class="drawer-icon">▼</span>
            </div>
            <div class="drawer-content" id="drawerSpecial">
                <div class="drawer-inner">
                    <div class="special-grid">
                        <div class="special-card" data-type="BIG"><div class="special-name">大</div><div class="special-odds">赔 2倍</div><div class="special-bet-amount" id="bet_BIG">0</div></div>
                        <div class="special-card" data-type="SMALL"><div class="special-name">小</div><div class="special-odds">赔 2倍</div><div class="special-bet-amount" id="bet_SMALL">0</div></div>
                        <div class="special-card" data-type="ODD"><div class="special-name">单</div><div class="special-odds">赔 2倍</div><div class="special-bet-amount" id="bet_ODD">0</div></div>
                        <div class="special-card" data-type="EVEN"><div class="special-name">双</div><div class="special-odds">赔 2倍</div><div class="special-bet-amount" id="bet_EVEN">0</div></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 抽屉2: 点数 (4-17) -->
        <div class="drawer-section">
            <div class="drawer-header" data-drawer="drawerPoints">
                <span class="drawer-title">🎲 点数投注 · 4-17点</span>
                <span class="drawer-icon">▼</span>
            </div>
            <div class="drawer-content" id="drawerPoints">
                <div class="drawer-inner">
                    <div class="points-grid" id="pointsGrid"></div>
                </div>
            </div>
        </div>

        <!-- 抽屉3: 围骰/豹子 -->
        <div class="drawer-section">
            <div class="drawer-header" data-drawer="drawerTrio">
                <span class="drawer-title">🎲 围骰 · 豹子 · 高赔率</span>
                <span class="drawer-icon">▼</span>
            </div>
            <div class="drawer-content" id="drawerTrio">
                <div class="drawer-inner">
                    <div class="trio-grid" id="combinedGrid"></div>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card"><div class="stat-label">总押注</div><div class="stat-value" id="totalBet">0</div></div>
            <div class="stat-card"><div class="stat-label">选中点数</div><div class="stat-value" id="selectedPoint">-</div></div>
        </div>
        <div class="history" id="historyList"></div>
    </div>
</div>

<script>
    // ================= 完整功能 + 抽屉推拉式 =================
    function showToast(msg, isError) { var t=document.createElement('div');t.className='toast-message';t.textContent=msg;if(!isError)t.style.color='#4caf50';document.body.appendChild(t);setTimeout(function(){t.remove()},2000);}
    var CONFIG={countdownSeconds:25,defaultBalance:1000,adminPassword:"wang000000",odds:{4:60,5:30,6:18,7:12,8:8,9:7,10:6,11:6,12:7,13:8,14:12,15:18,16:30,17:60,'BIG':2,'SMALL':2,'ODD':2,'EVEN':2,'TRIPLE_1':150,'TRIPLE_2':150,'TRIPLE_3':150,'TRIPLE_4':150,'TRIPLE_5':150,'TRIPLE_6':150,'ALL_TRIPLE':30}};
    var users=JSON.parse(localStorage.getItem('dice_users'))||{}; var currentUser="player888"; if(!users[currentUser])users[currentUser]={balance:CONFIG.defaultBalance,records:[]}; var adminPwd=CONFIG.adminPassword; function saveUsers(){localStorage.setItem('dice_users',JSON.stringify(users));} function getBalance(uid){return users[uid]?.balance||CONFIG.defaultBalance;} function setBalance(uid,amt){if(!users[uid])users[uid]={balance:CONFIG.defaultBalance,records:[]}; users[uid].balance=amt; saveUsers();}
    var bets={'BIG':0,'SMALL':0,'ODD':0,'EVEN':0,4:0,5:0,6:0,7:0,8:0,9:0,10:0,11:0,12:0,13:0,14:0,15:0,16:0,17:0,'TRIPLE_1':0,'TRIPLE_2':0,'TRIPLE_3':0,'TRIPLE_4':0,'TRIPLE_5':0,'TRIPLE_6':0,'ALL_TRIPLE':0};
    var selectedChip=0; var currentBalance=getBalance(currentUser); var diceEl=[document.getElementById('dice1'),document.getElementById('dice2'),document.getElementById('dice3')]; var totalEl=document.getElementById('totalPoints'); var rollingWinEl=document.getElementById('rollingWinNumber'); var lastBet=null; var isDrawing=false,isBetLocked=false,countdownInterval=null;
    function setDiceValue(dice,val){var rot={1:'rotateX(0deg) rotateY(0deg)',2:'rotateX(-90deg) rotateY(0deg)',3:'rotateX(0deg) rotateY(90deg)',4:'rotateX(0deg) rotateY(-90deg)',5:'rotateX(90deg) rotateY(0deg)',6:'rotateX(180deg) rotateY(0deg)'}; dice.style.transform=rot[val];}
    function startRolling(finalVals){return new Promise(resolve=>{diceEl[0].classList.add('rolling1');diceEl[1].classList.add('rolling2');diceEl[2].classList.add('rolling3');totalEl.classList.add('total-blink');var step=0,maxStep=18;var iv=setInterval(function(){step++;diceEl.forEach(d=>setDiceValue(d,Math.floor(Math.random()*6)+1));if(step>=maxStep){clearInterval(iv);diceEl.forEach(d=>d.classList.remove('rolling1','rolling2','rolling3'));totalEl.classList.remove('total-blink');diceEl.forEach((d,i)=>{setDiceValue(d,finalVals[i]);d.classList.add('land');setTimeout(function(){d.classList.remove('land');},200);});resolve();}},50);});}
    function startRollingNumber(finalAmount){if(window.rollingAnimation)cancelAnimationFrame(window.rollingAnimation);var startTime=performance.now(),duration=5000,startVal=0.01;rollingWinEl.classList.add('rolling-animate');function update(now){var elapsed=now-startTime,progress=Math.min(1,elapsed/duration),ease=1-Math.pow(1-progress,2);var current=startVal+(finalAmount-startVal)*ease;rollingWinEl.innerText=current.toFixed(2);if(progress<1)window.rollingAnimation=requestAnimationFrame(update);else{rollingWinEl.innerText=finalAmount.toFixed(2);rollingWinEl.classList.remove('rolling-animate');window.rollingAnimation=null;}}window.rollingAnimation=requestAnimationFrame(update);}
    function getResultInfo(d1,d2,d3){var total=d1+d2+d3;var types=[];if(total>=11&&total<=17)types.push('BIG');if(total>=4&&total<=10)types.push('SMALL');if(total%2===1)types.push('ODD');if(total%2===0)types.push('EVEN');if(d1===d2&&d2===d3){types.push('TRIPLE_'+d1);types.push('ALL_TRIPLE');}return{total:total,types:types};}
    function updateUI(){document.getElementById('bet_BIG').innerText=bets['BIG'];document.getElementById('bet_SMALL').innerText=bets['SMALL'];document.getElementById('bet_ODD').innerText=bets['ODD'];document.getElementById('bet_EVEN').innerText=bets['EVEN'];for(var i=4;i<=17;i++){var el=document.getElementById('bet_'+i);if(el)el.innerText=bets[i];}for(var i=1;i<=6;i++){var el=document.getElementById('bet_TRIPLE_'+i);if(el)el.innerText=bets['TRIPLE_'+i];}document.getElementById('bet_ALL_TRIPLE').innerText=bets['ALL_TRIPLE'];var total=Object.values(bets).reduce((a,b)=>a+b,0);document.getElementById('totalBet').innerText=total;document.getElementById('balanceDisplay').innerText=currentBalance.toFixed(2);var pool=50000+(Math.random()-0.5)*3000;pool=Math.max(40000,Math.min(60000,pool));document.getElementById('poolDisplay').innerText=pool.toFixed(2);}
    function addBet(type){if(selectedChip<=0){showToast("请先选择筹码");return;}if(selectedChip>currentBalance){showToast("余额不足！当前余额："+currentBalance);return;}currentBalance-=selectedChip;setBalance(currentUser,currentBalance);bets[type]+=selectedChip;updateUI();document.querySelectorAll('.special-card, .point-card, .trio-card').forEach(el=>el.classList.remove('selected'));var selector='';if(typeof type==='string'){if(type.startsWith('TRIPLE_'))selector='.trio-card[data-type="'+type+'"]';else selector='.special-card[data-type="'+type+'"]';}else{selector='.point-card[data-point="'+type+'"]';}document.querySelector(selector)?.classList.add('selected');setTimeout(function(){document.querySelectorAll('.special-card, .point-card, .trio-card').forEach(el=>el.classList.remove('selected'));},800);if(navigator.vibrate)navigator.vibrate(30);}
    function clearAllBets(){var total=Object.values(bets).reduce((a,b)=>a+b,0);currentBalance+=total;setBalance(currentUser,currentBalance);for(var k in bets)bets[k]=0;updateUI();if(navigator.vibrate)navigator.vibrate(30);showToast("已取消所有下注",false);}
    function repeatLastBet(){if(!lastBet){showToast("没有可续押的记录");return;}var totalNeed=0;for(var k in lastBet)totalNeed+=lastBet[k];if(totalNeed>currentBalance){showToast("余额不足，无法续押");return;}for(var k in bets)bets[k]=0;for(var k in lastBet)bets[k]=lastBet[k];currentBalance-=totalNeed;setBalance(currentUser,currentBalance);updateUI();for(var k in lastBet){if(lastBet[k]>0){var selector='';if(typeof k==='string'){if(k.startsWith('TRIPLE_'))selector='.trio-card[data-type="'+k+'"]';else selector='.special-card[data-type="'+k+'"]';}else{selector='.point-card[data-point="'+k+'"]';}document.querySelector(selector)?.classList.add('selected');}}setTimeout(function(){document.querySelectorAll('.special-card, .point-card, .trio-card').forEach(el=>el.classList.remove('selected'));},1500);if(navigator.vibrate)navigator.vibrate(50);if(!isDrawing&&!isBetLocked)drawWithCover();}
    var diceCover=document.getElementById('diceCover');function resetDiceCover(){if(diceCover){diceCover.classList.remove('open-cover','hidden-cover');diceCover.style.display='flex';diceCover.style.visibility='visible';diceCover.style.opacity='1';diceCover.style.transform='translateY(0) scale(1)';}}
    async function openCoverAndWait(){if(!diceCover)return;if(diceCover.classList.contains('hidden-cover')||diceCover.style.display==='none')resetDiceCover();diceCover.classList.add('open-cover');await new Promise(r=>setTimeout(r,600));diceCover.classList.add('hidden-cover');diceCover.style.display='none';}
    async function drawWithCover(){if(isDrawing)return;var totalBet=Object.values(bets).reduce((a,b)=>a+b,0);if(totalBet===0){showToast("请先下注");return;}if(totalBet>currentBalance){showToast("余额不足，无法开奖");return;}isDrawing=true;isBetLocked=true;await openCoverAndWait();var d1=Math.floor(Math.random()*6)+1,d2=Math.floor(Math.random()*6)+1,d3=Math.floor(Math.random()*6)+1;var{total,types}=getResultInfo(d1,d2,d3);var winAmounts=[];if(types.includes('BIG')&&bets['BIG']>0)winAmounts.push(bets['BIG']*2);if(types.includes('SMALL')&&bets['SMALL']>0)winAmounts.push(bets['SMALL']*2);if(types.includes('ODD')&&bets['ODD']>0)winAmounts.push(bets['ODD']*2);if(types.includes('EVEN')&&bets['EVEN']>0)winAmounts.push(bets['EVEN']*2);if(bets[total]>0)winAmounts.push(bets[total]*CONFIG.odds[total]);for(var t of types){if(t.startsWith('TRIPLE_')&&bets[t]>0)winAmounts.push(bets[t]*CONFIG.odds[t]);if(t==='ALL_TRIPLE'&&bets['ALL_TRIPLE']>0)winAmounts.push(bets['ALL_TRIPLE']*CONFIG.odds['ALL_TRIPLE']);}var totalWin=winAmounts.reduce((a,b)=>a+b,0);startRollingNumber(totalWin);await startRolling([d1,d2,d3]);totalEl.innerText=total;if(totalWin>0){totalEl.style.color='#4caf50';setTimeout(function(){totalEl.style.color='#ff3300';},2000);}else{totalEl.style.color='#f44336';setTimeout(function(){totalEl.style.color='#ff3300';},2000);}currentBalance+=totalWin;setBalance(currentUser,currentBalance);var betSummary=[];for(var k in bets)if(bets[k]>0){if(k==='BIG')betSummary.push('大'+bets[k]);else if(k==='SMALL')betSummary.push('小'+bets[k]);else if(k==='ODD')betSummary.push('单'+bets[k]);else if(k==='EVEN')betSummary.push('双'+bets[k]);else if(typeof k==='number')betSummary.push(k+'点'+bets[k]);else if(k.startsWith('TRIPLE_'))betSummary.push(k.split('_')[1]+'围'+bets[k]);else if(k==='ALL_TRIPLE')betSummary.push('豹子'+bets[k]);}var recs=users[currentUser].records||[];recs.unshift({time:new Date().toLocaleTimeString(),bets:betSummary.join(' '),result:total,resultType:types.map(t=>t==='BIG'?'大':t==='SMALL'?'小':t==='ODD'?'单':t==='EVEN'?'双':t.startsWith('TRIPLE_')?t.split('_')[1]+'围':'豹子').join(','),win:totalWin,isWin:totalWin>0});if(recs.length>30)recs.pop();users[currentUser].records=recs;saveUsers();updateHistory();for(var k in bets)bets[k]=0;updateUI();if(navigator.vibrate)navigator.vibrate(totalWin>0?[100,50,100]:80);lastBet=JSON.parse(JSON.stringify(bets));setTimeout(function(){resetDiceCover();isDrawing=false;isBetLocked=false;startCountdown(CONFIG.countdownSeconds);},5000);}
    function startCountdown(sec){if(countdownInterval)clearInterval(countdownInterval);var c=sec;var cdSpan=document.getElementById('countdownNum');cdSpan.innerText=c;cdSpan.classList.remove('countdown-warning');isBetLocked=false;countdownInterval=setInterval(function(){if(c<=1){clearInterval(countdownInterval);countdownInterval=null;isBetLocked=true;drawWithCover();}else{c--;cdSpan.innerText=c;if(c<=5)cdSpan.classList.add('countdown-warning');}},1000);}
    function updateHistory(){var container=document.getElementById('historyList');var recs=users[currentUser]?.records||[];container.innerHTML='';if(recs.length===0){container.innerHTML='<div style="text-align:center;color:#666">暂无记录</div>';return;}recs.slice(0,10).forEach(function(r){var div=document.createElement('div');div.className='history-item';div.innerHTML='<span>'+r.time+'</span><span>'+r.bets+'</span><span>开'+r.result+'('+r.resultType+')</span><span class="'+(r.isWin?'win':'lose')+'">'+(r.isWin?'+'+r.win:'')+'</span>';container.appendChild(div);});}
    function refreshBalance(){currentBalance=getBalance(currentUser);updateUI();showToast("余额已刷新",false);}
    function switchUser(){var newId=document.getElementById('switchId').value.trim();if(!newId)return;currentUser=newId;if(!users[currentUser])users[currentUser]={balance:CONFIG.defaultBalance,records:[]};document.getElementById('currentUserId').innerText=currentUser;currentBalance=getBalance(currentUser);for(var k in bets)bets[k]=0;updateUI();if(countdownInterval)clearInterval(countdownInterval);startCountdown(CONFIG.countdownSeconds);updateHistory();document.querySelectorAll('.special-card, .point-card, .trio-card').forEach(el=>el.classList.remove('selected'));showToast('已切换到 '+currentUser,false);}
    function showHistoryModal(){var recs=users[currentUser]?.records||[];var html='<div style="max-height:300px;overflow-y:auto">';if(recs.length===0)html+='<p>暂无记录</p>';else recs.forEach(function(r){html+='<div style="padding:8px;border-bottom:1px solid #333;display:flex;justify-content:space-between"><span>'+r.time+'</span><span>'+r.bets+'</span><span>开'+r.result+'点</span><span style="color:'+(r.isWin?'#4caf50':'#f44336')+'">'+(r.isWin?'+'+r.win:'')+'</span></div>';});html+='</div><button id="closeModalBtn" style="background:#ff6600;border:none;border-radius:30px;padding:10px 24px;margin-top:16px;color:#fff">关闭</button>';var modal=document.createElement('div');modal.className='modal';modal.innerHTML='<div class="modal-content"><h3>📜 投注记录</h3>'+html+'</div>';document.body.appendChild(modal);document.getElementById('closeModalBtn').onclick=function(){modal.remove();};}
    var adminPanel=null,adminSelectedUser=currentUser;
    function showAdminPanel(){if(adminPanel){adminPanel.remove();adminPanel=null;return;}var panel=document.createElement('div');panel.className='modal';panel.innerHTML='<div class="modal-content" style="width:90%;max-width:360px"><h3>🔐 管理员面板</h3><div id="adminUserList" class="admin-user-list"></div><div>当前：<strong id="adminSelectedUser">'+adminSelectedUser+'</strong></div><input type="number" id="adminAmount" class="admin-input" placeholder="金额" value="0"><div class="admin-btns"><button id="adminAdd" class="admin-btn" style="background:#4caf50;color:#fff">上分</button><button id="adminSub" class="admin-btn" style="background:#f44336;color:#fff">下分</button><button id="adminQuery" class="admin-btn" style="background:#2196f3;color:#fff">查询</button><button id="adminReset" class="admin-btn" style="background:#ff9800;color:#fff">重置</button><button id="adminPwd" class="admin-btn" style="background:#9c27b0;color:#fff">改密</button></div><button id="adminClose" style="background:#ffaa44;color:#1a1a2a;padding:8px 24px;border-radius:25px;border:none;margin-top:12px">关闭</button></div>';document.body.appendChild(panel);adminPanel=panel;function refreshList(){var listDiv=document.getElementById('adminUserList');var usersArr=Object.keys(users);listDiv.innerHTML='';usersArr.forEach(function(uid){var div=document.createElement('div');div.className='admin-user';if(uid===adminSelectedUser)div.classList.add('selected');div.textContent=uid+' ('+getBalance(uid).toFixed(2)+')';div.onclick=function(){adminSelectedUser=uid;document.getElementById('adminSelectedUser').innerText=adminSelectedUser;refreshList();};listDiv.appendChild(div);});}refreshList();document.getElementById('adminAdd').onclick=function(){var amt=parseFloat(document.getElementById('adminAmount').value);if(isNaN(amt)||amt<=0){showToast("请输入正数");return;}var cur=getBalance(adminSelectedUser);setBalance(adminSelectedUser,cur+amt);refreshList();if(adminSelectedUser===currentUser){currentBalance=getBalance(currentUser);updateUI();}showToast('给 '+adminSelectedUser+' 上分 '+amt,false);};document.getElementById('adminSub').onclick=function(){var amt=parseFloat(document.getElementById('adminAmount').value);if(isNaN(amt)||amt<=0){showToast("请输入正数");return;}var cur=getBalance(adminSelectedUser);if(cur<amt){showToast("余额不足");return;}setBalance(adminSelectedUser,cur-amt);refreshList();if(adminSelectedUser===currentUser){currentBalance=getBalance(currentUser);updateUI();}showToast('从 '+adminSelectedUser+' 下分 '+amt,false);};document.getElementById('adminQuery').onclick=function(){showToast(adminSelectedUser+' 余额: '+getBalance(adminSelectedUser).toFixed(2),false);};document.getElementById('adminReset').onclick=function(){if(confirm('重置 '+adminSelectedUser+' 余额为'+CONFIG.defaultBalance+'？')){setBalance(adminSelectedUser,CONFIG.defaultBalance);refreshList();if(adminSelectedUser===currentUser){currentBalance=getBalance(currentUser);updateUI();}showToast("重置成功",false);}};document.getElementById('adminPwd').onclick=function(){var old=prompt("当前密码:");if(old!==adminPwd){showToast("密码错误");return;}var newPwd=prompt("新密码(至少6位):");if(!newPwd||newPwd.length<6){showToast("密码至少6位");return;}adminPwd=newPwd;localStorage.setItem('dice_admin_pwd',newPwd);showToast("密码修改成功",false);};document.getElementById('adminClose').onclick=function(){panel.remove();adminPanel=null;};}
    function createPointsGrid(){var grid=document.getElementById('pointsGrid');for(var i=4;i<=17;i++){var card=document.createElement('div');card.className='point-card';card.setAttribute('data-point',i);card.innerHTML='<div class="point-value">'+i+'点</div><div class="point-odds">赔 '+CONFIG.odds[i]+'倍</div><div class="point-bet-amount" id="bet_'+i+'">0</div>';card.onclick=function(p){return function(){addBet(p);};}(i);grid.appendChild(card);}}
    function createCombinedGrid(){var grid=document.getElementById('combinedGrid');for(var i=1;i<=6;i++){var card=document.createElement('div');card.className='trio-card';card.setAttribute('data-type','TRIPLE_'+i);card.innerHTML='<div class="trio-name">'+i+'围</div><div class="trio-odds">赔 150倍</div><div class="trio-bet-amount" id="bet_TRIPLE_'+i+'">0</div>';card.onclick=function(p){return function(){addBet('TRIPLE_'+p);};}(i);grid.appendChild(card);}var allCard=document.createElement('div');allCard.className='trio-card';allCard.setAttribute('data-type','ALL_TRIPLE');allCard.innerHTML='<div class="trio-name">豹子</div><div class="trio-odds">赔 30倍</div><div class="trio-bet-amount" id="bet_ALL_TRIPLE">0</div>';allCard.onclick=function(){addBet('ALL_TRIPLE');};grid.appendChild(allCard);}
    function initDrawers(){document.querySelectorAll('.drawer-header').forEach(header=>{header.addEventListener('click',function(e){var drawerId=this.getAttribute('data-drawer');var content=document.getElementById(drawerId);var icon=this.querySelector('.drawer-icon');if(content.classList.contains('open')){content.classList.remove('open');icon.innerHTML='▼';}else{content.classList.add('open');icon.innerHTML='▲';}});});}
    function init(){createPointsGrid();createCombinedGrid();document.querySelectorAll('.chip').forEach(function(chip){chip.onclick=function(){selectedChip=parseInt(chip.dataset.val);document.getElementById('selectedChip').innerText=selectedChip;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected-chip'));chip.classList.add('selected-chip');if(navigator.vibrate)navigator.vibrate(20);};});document.querySelectorAll('.special-card').forEach(card=>{card.onclick=()=>addBet(card.dataset.type);});document.getElementById('clearAllBtn').onclick=clearAllBets;document.getElementById('repeatBtn').onclick=repeatLastBet;document.getElementById('refreshBtn').onclick=refreshBalance;document.getElementById('betBtn').onclick=function(){if(!isDrawing&&!isBetLocked)drawWithCover();};document.getElementById('switchBtn').onclick=switchUser;document.getElementById('historyBtn').onclick=showHistoryModal;document.getElementById('adminEntry').onclick=function(){var pwd=prompt("管理员密码:");if(pwd===adminPwd)showAdminPanel();else if(pwd!==null)showToast("密码错误");};document.getElementById('newUserBtn').onclick=function(){var newId="player_"+Math.floor(Math.random()*100000);document.getElementById('switchId').value=newId;switchUser();showToast("新账户："+newId+" 初始余额 "+CONFIG.defaultBalance,false);};diceEl.forEach(d=>{for(var i=0;i<6;i++){var faceDivs=['front','back','right','left','top','bottom'];var faceClass=faceDivs[i];var valMap={front:1,back:6,right:4,left:3,top:2,bottom:5};var num=valMap[faceClass];var faceDiv=document.createElement('div');faceDiv.className='dice-face '+faceClass+' face-'+num;var pipHtml='';if(num===1)pipHtml='<div class="pip pip-center"></div>';else if(num===2)pipHtml='<div class="pip pip-tl"></div><div class="pip pip-br"></div>';else if(num===3)pipHtml='<div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div>';else if(num===4)pipHtml='<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';else if(num===5)pipHtml='<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-mid"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';else if(num===6)pipHtml='<div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div>';faceDiv.innerHTML=pipHtml;d.appendChild(faceDiv);}});diceEl.forEach(d=>setDiceValue(d,1));totalEl.innerText=3;updateUI();updateHistory();startCountdown(CONFIG.countdownSeconds);var saved=localStorage.getItem('dice_admin_pwd');if(saved)adminPwd=saved;resetDiceCover();initDrawers();}
    init();
</script>
