<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA · 旗舰量化终端</title>
    <style>
        :root {
            --bg-deep: #050806;
            --panel-hex: #111814;
            --red-main: #ff4d4d;
            --gold-text: #f1c40f;
            --grid-line: rgba(45, 90, 68, 0.12);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--bg-deep); color: #fff; font-family: -apple-system, "Helvetica Neue", sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            /* 45度菱形网格背景 */
            background-image: 
                linear-gradient(45deg, var(--grid-line) 1px, transparent 1px),
                linear-gradient(-45deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* 顶部余额卡片 */
        .balance-card { 
            background: var(--panel-hex); margin: 20px 18px; padding: 30px 10px; border-radius: 20px; 
            border: 1px solid #1d2922; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center;
            position: relative; z-index: 2;
        }
        .label { color: #8aa095; font-size: 13px; margin-bottom: 8px; display: block; }
        .amount { font-size: 68px; color: var(--red-main); font-weight: 800; line-height: 1; font-family: 'Arial Black', sans-serif; }
        .bet-display { color: var(--gold-text); margin-top: 15px; font-size: 15px; font-weight: 500; }

        /* 核心转盘区 */
        .stage { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .pointer { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent; 
            border-top: 22px solid #ff0000; z-index: 10; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        #wheel { 
            width: 310px; height: 310px; border-radius: 50%; border: 12px solid #1a231e;
            background: #141c18; position: relative;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 0 60px rgba(0,0,0,0.7);
        }
        
        /* 转盘内部网格 */
        #wheel::after {
            content: ""; position: absolute; inset: 0; border-radius: 50%;
            background-image: linear-gradient(45deg, rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(-45deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 20px 20px; pointer-events: none;
        }

        .center-hub {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; background: #080c0a; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--red-main); font-weight: bold; font-size: 22px; border: 4px solid #1d2922;
            z-index: 5; writing-mode: vertical-rl; letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(255,77,77,0.1);
        }

        .item {
            position: absolute; width: 100%; height: 100%; text-align: center;
            padding-top: 25px; font-size: 26px; transform-origin: center center;
        }

        /* 底部控制区 */
        .footer-ctrl { 
            background: linear-gradient(to bottom, #2a0a0a, #1a0505); 
            padding: 25px 20px 40px; border-radius: 35px 35px 0 0;
            display: flex; align-items: center; justify-content: space-between; gap: 15px;
            border-top: 1px solid #4a1515;
        }
        .adj-btn { 
            width: 65px; height: 60px; background: #0d0404; border-radius: 12px;
            border: 1px solid #3d1414; color: var(--red-main); font-size: 32px; font-weight: 300;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .adj-btn:active { background: #1a0808; }

        .draw-btn { 
            flex: 1; height: 80px; background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
            border-radius: 40px; border: none; color: #fff; font-size: 26px; font-weight: bold;
            box-shadow: 0 6px 0 #8c1e1e, 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer; position: relative;
        }
        .draw-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #8c1e1e; }
        .draw-btn:disabled { filter: grayscale(1); opacity: 0.6; }

        /* 动画逻辑 */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .loading { animation: blink 0.8s infinite; color: var(--gold-text) !important; }

    </style>
</head>
<body>

    <div class="balance-card">
        <span class="label">💰 可用余额 (USDT)</span>
        <div class="amount" id="balText">990.00</div>
        <div class="bet-display">🔥 单注额度: <span id="betText">10.0</span></div>
    </div>

    <div class="stage">
        <div class="pointer"></div>
        <div id="wheel">
            <div class="center-hub" id="hubText">准备</div>
            <div class="item" style="transform: rotate(0deg)">🦢</div>
            <div class="item" style="transform: rotate(45deg)">🐺</div>
            <div class="item" style="transform: rotate(90deg)">🐢</div>
            <div class="item" style="transform: rotate(135deg)">🦅</div>
            <div class="item" style="transform: rotate(180deg)">🐯</div>
            <div class="item" style="transform: rotate(225deg)">🦄</div>
            <div class="item" style="transform: rotate(270deg)">🐲</div>
            <div class="item" style="transform: rotate(315deg)">🔥</div>
        </div>
    </div>

    <div class="footer-ctrl">
        <div class="adj-btn" onclick="updateBet(-1)">−</div>
        <button class="draw-btn" id="mainBtn" onclick="executeDraw()">
            ▶ 执行抽取
        </button>
        <div class="adj-btn" onclick="updateBet(1)">+</div>
    </div>

    <script>
        let state = {
            balance: 990.00,
            bet: 10.0,
            isRolling: false,
            rotation: 0
        };

        const balEl = document.getElementById('balText');
        const betEl = document.getElementById('betText');
        const hubEl = document.getElementById('hubText');
        const wheelEl = document.getElementById('wheel');
        const btnEl = document.getElementById('mainBtn');

        function updateBet(offset) {
            if (state.isRolling) return;
            state.bet = Math.max(1, state.bet + offset);
            betEl.innerText = state.bet.toFixed(1);
            vibrate(10); // 微震反馈
        }

        function executeDraw() {
            if (state.isRolling || state.balance < state.bet) return;

            state.isRolling = true;
            btnEl.disabled = true;
            
            // 1. 扣费
            state.balance -= state.bet;
            renderBalance();

            // 2. 视觉反馈
            hubEl.innerText = "计算";
            hubEl.classList.add('loading');
            vibrate(30);

            // 3. 随机旋转 (5圈起步 + 随机偏移)
            const extra = Math.floor(Math.random() * 360);
            state.rotation += (360 * 6) + extra;
            wheelEl.style.transform = `rotate(${state.rotation}deg)`;

            // 4. 结算
            setTimeout(() => {
                state.isRolling = false;
                btnEl.disabled = false;
                hubEl.innerText = "准备";
                hubEl.classList.remove('loading');
                
                // 模拟盈利逻辑 (30% 概率中奖 2.5倍)
                if(Math.random() > 0.7) {
                    const win = state.bet * 2.5;
                    state.balance += win;
                    renderBalance();
                    alert(`量化成功！回填盈利: ${win.toFixed(2)} USDT`);
                }
            }, 5000);
        }

        function renderBalance() {
            balEl.innerText = state.balance.toFixed(2);
        }

        function vibrate(ms) {
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(ms);
            }
        }
    </script>
</body>
</html>
