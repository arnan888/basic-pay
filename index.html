<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>СИЅТИИТѕЈтцДтјЁ ┬и УЄ│т░іжф░т«Ю + УЉФУідж▒╝ + жЙЎУЎјТќЌ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #0f0e0c; font-family: system-ui, 'Segoe UI', sans-serif; padding: 12px; color: #ffe6c7; }
        #app { max-width: 560px; margin: 0 auto; background: #1e1b16; border-radius: 48px 48px 32px 32px; box-shadow: 0 20px 35px rgba(0,0,0,0.6); overflow: hidden; }
        .auth-panel, .user-section, .game-nav { padding: 12px 16px; }
        .game-nav { display: flex; gap: 8px; background: #2a241e; border-radius: 60px; margin: 8px 12px; }
        .game-tab { flex: 1; text-align: center; background: transparent; border: none; padding: 10px 0; border-radius: 50px; font-weight: bold; font-size: 0.85rem; color: #dbbc8c; cursor: pointer; transition: 0.2s; }
        .game-tab.active { background: #d49c3f; color: #1f1a12; box-shadow: inset 0 1px 3px #ffeaac, 0 2px 6px black; }
        .user-section { background: #1f1711; border-radius: 32px; margin: 12px; }
        .user-info-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        #userBalanceDisplay { font-size: 1.4rem; font-weight: 900; color: #ffcc44; background: #0a0705; padding: 0 12px; border-radius: 50px; }
        .charge-btn, .withdraw-btn { background: #3f2a1a; border-radius: 40px; padding: 6px 14px; border: none; color: #ffda99; font-weight: bold; cursor: pointer; }
        .logout-btn, .service-btn { background: #2a1f16; border-radius: 30px; padding: 5px 12px; font-size: 0.7rem; font-weight: bold; border: none; color: #ffdd99; cursor: pointer; }
        .charge-withdraw-row { display: flex; gap: 12px; margin-top: 8px; }
        .chips, .fish-chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 12px 0; }
        .chip { background: radial-gradient(circle at 30% 20%, #f5b042, #c46f1a); width: 65px; padding: 8px 0; text-align: center; border-radius: 60px; font-weight: bold; font-size: 1.2rem; color: #2c1a0a; box-shadow: 0 5px 0 #7a3e0e; cursor: pointer; transition: 0.05s linear; border: 1px solid #ffcd94; }
        .chip.selected { background: radial-gradient(circle at 30% 20%, #ffe484, #ffa01e); transform: translateY(-2px); box-shadow: 0 6px 0 #b45f1a; }
        .dice-3d-area { display: flex; justify-content: center; gap: 20px; margin: 12px 0; }
        .dice-cube { width: 70px; height: 70px; position: relative; transform-style: preserve-3d; transition: transform 0.1s linear; }
        .dice-face { position: absolute; width: 100%; height: 100%; background: #faf0cf; border-radius: 14px; border: 2px solid #b97f2e; box-shadow: inset 0 0 8px #ffcf8a; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .front { transform: translateZ(35px); } .back { transform: rotateY(180deg) translateZ(35px); } .right { transform: rotateY(90deg) translateZ(35px); } .left { transform: rotateY(-90deg) translateZ(35px); } .top { transform: rotateX(90deg) translateZ(35px); } .bottom { transform: rotateX(-90deg) translateZ(35px); }
        @media (max-width: 480px) { .dice-cube { width: 55px; height: 55px; } .front, .back, .right, .left, .top, .bottom { transform: translateZ(27px); } .back { transform: rotateY(180deg) translateZ(27px); } .right { transform: rotateY(90deg) translateZ(27px); } .left { transform: rotateY(-90deg) translateZ(27px); } .top { transform: rotateX(90deg) translateZ(27px); } .bottom { transform: rotateX(-90deg) translateZ(27px); } }
        .fish-pattern-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 12px 0; }
        .fish-bet-card { background: #2c1e12; border-radius: 20px; padding: 8px; text-align: center; border: 1px solid #d49c3f; }
        .fish-bet-name { font-size: 1.2rem; font-weight: bold; }
        .fish-bet-amount { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 6px; }
        .btn-chip { background: #ffaa44; border: none; border-radius: 30px; width: 28px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .dragon-tiger-wrapper .multi-bet-item { background: #2a241e; border-radius: 20px; margin-bottom: 16px; padding: 12px; }
        .quick-bet, .clear-bet { background: #c47c3a; border: none; border-radius: 30px; padding: 4px 12px; margin: 4px; cursor: pointer; color: #2f1b0a; font-weight: bold; }
        .exec-btn { background: #3a2a1c; border: none; border-radius: 40px; padding: 8px; color: #ffdd99; cursor: pointer; font-weight: bold; }
        .main-go { background: #d49c3f; color: #1f1a12; }
        .speed-btn { background: #3a2a1c; border: none; border-radius: 30px; padding: 4px 16px; cursor: pointer; }
        .speed-btn.active { background: #d49c3f; color: #1f1a12; }
        .history-grid { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
        .history-cell { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #2b241e; border-radius: 36px; width: 90%; max-width: 500px; padding: 20px; border: 1px solid #d4a373; color: #ffe1b3; max-height: 85vh; overflow-y: auto; }
        .toast-message { position: fixed; bottom: 20%; left: 50%; transform: translateX(-50%); background: #000000cc; color: #ffcc44; padding: 8px 16px; border-radius: 60px; z-index: 3000; font-weight: bold; white-space: nowrap; animation: fadeOut 2s forwards; }
        @keyframes fadeOut { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
        .qr-img { width: 140px; height: 140px; margin: 8px auto; display: block; background: white; border-radius: 20px; object-fit: contain; }
        .admin-table { width: 100%; font-size: 0.7rem; border-collapse: collapse; }
        .admin-table th, .admin-table td { padding: 6px 4px; border-bottom: 1px solid #d4a373; text-align: left; }
        .record-item-detail { margin: 4px 0; padding: 4px; border-left: 3px solid #ffaa44; background: #1e1a14; border-radius: 8px; }
        /* жф░т«ЮСИЊућеуйЉТа╝ */
        .dice-wrapper .points-grid, .dice-wrapper .trio-grid, .dice-wrapper .special-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px; margin: 10px 0; }
        .dice-wrapper .bet-card { background: linear-gradient(145deg, #2c241c, #1f1a14); border-radius: 20px; padding: 8px 4px; text-align: center; cursor: pointer; transition: 0.1s ease; box-shadow: 0 4px 8px rgba(0,0,0,0.3); border: 1px solid rgba(212, 163, 115, 0.4); }
        .dice-wrapper .bet-card:active { transform: scale(0.96); background: #3a2f24; }
        .dice-wrapper .bet-name { font-weight: bold; font-size: 0.85rem; color: #ffdfb3; }
        .dice-wrapper .bet-odds { font-size: 0.7rem; color: #ffb347; background: rgba(0,0,0,0.4); display: inline-block; padding: 0px 6px; border-radius: 40px; margin-top: 2px; }
        .dice-wrapper .bet-amount { font-size: 1rem; font-weight: 800; background: #00000066; border-radius: 40px; margin-top: 5px; padding: 2px 0; color: #f7d44a; }
        .countdown-warning { color: #ff7777; text-shadow: 0 0 4px red; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } }
        .pip { width: 12px; height: 12px; background: #2d1f0c; border-radius: 50%; margin: 3px; box-shadow: inset 0 1px 2px #aa7744; }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 8px; left: 8px; }
        .pip-tr { position: absolute; top: 8px; right: 8px; }
        .pip-bl { position: absolute; bottom: 8px; left: 8px; }
        .pip-br { position: absolute; bottom: 8px; right: 8px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1, .pip-l2, .pip-l3 { position: absolute; left: 6px; }
        .pip-l1 { top: 6px; }
        .pip-l2 { top: 50%; transform: translateY(-50%); }
        .pip-l3 { bottom: 6px; }
        .pip-r1, .pip-r2, .pip-r3 { position: absolute; right: 6px; }
        .pip-r1 { top: 6px; }
        .pip-r2 { top: 50%; transform: translateY(-50%); }
        .pip-r3 { bottom: 6px; }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== тЁет▒ђТЋ░ТЇ« ====================
    let systemBankerBalance = localStorage.getItem('system_banker_balance') ? parseFloat(localStorage.getItem('system_banker_balance')) : 50000;
    let adjustFactor = localStorage.getItem('adjustFactor') ? parseFloat(localStorage.getItem('adjustFactor')) : 1.0;
    let validReferralCodes = ["VIP666", "888VIP", "GOLD2025", "LUCKY8", "DICE100"];
    let usersData = JSON.parse(localStorage.getItem('dice_users')) || {};
    let currentUser = null;
    let withdrawRecords = JSON.parse(localStorage.getItem('withdraw_records')) || [];

    function saveUsers() { localStorage.setItem('dice_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 0) : 0; }
    function setUserBalance(amount) {
        if (!currentUser) return;
        usersData[currentUser.phone].balance = Math.max(0, amount);
        saveUsers();
        let balSpan = document.getElementById("userBalanceDisplay");
        if (balSpan) balSpan.innerText = getUserBalance().toFixed(2);
    }
    function showToast(msg) {
        let t = document.createElement('div'); t.className = 'toast-message'; t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    function updateAllBalance() {
        let balSpan = document.getElementById("userBalanceDisplay");
        if (balSpan) balSpan.innerText = getUserBalance().toFixed(2);
    }
    // тЁЁтђ╝№╝џ1тЁЃ = 1000ТќЄ
    function recharge() {
        let yuan = prompt("­Ъњј тЁЁтђ╝жЄЉжбЮ (тЁЃ)\n1тЁЃ = 1000ТќЄ", "10");
        if (!yuan) return;
        let yuanNum = parseFloat(yuan);
        if (isNaN(yuanNum) || yuanNum <= 0) { showToast("У»иУЙЊтЁЦТГБТЋ░"); return; }
        let addAmount = yuanNum * 1000;
        setUserBalance(getUserBalance() + addAmount);
        showToast(`тЁЁтђ╝ТѕљтіЪ +${addAmount.toFixed(0)}ТќЄ`);
        updateAllBalance();
    }
    // ТЈљуј░№╝џ1тЁЃ = 1rmb
    function withdraw() {
        let bal = getUserBalance();
        if (bal <= 0) { showToast("СйЎжбЮСИЇУХ│"); return; }
        let wen = prompt("ТЈљуј░жЄЉжбЮ \n1rmb = 1тЁЃ", "1");
        if (!wen) return;
        let wenNum = parseFloat(wen);
        if (isNaN(wenNum) || wenNum <= 0 || wenNum > bal) { showToast("жЄЉжбЮТЌаТЋѕ"); return; }
        let yuan = wenNum / 1;
        let type = confirm("ТЈљуј░Тќ╣т╝Ј№╝џ\nуА«т«џ=тЙ«С┐А№╝їтЈќТХѕ=Тћ»С╗ўт«Ю") ? "тЙ«С┐А" : "Тћ»С╗ўт«Ю";
        let account = prompt("У»иУЙЊтЁЦТћХТгЙУ┤дтЈи:");
        if (!account) return;
        setUserBalance(bal - wenNum);
        let record = { phone: currentUser.phone, amount: wenNum, yuan: yuan.toFixed(2), type, account, time: new Date().toLocaleString(), status: "тЙЁтцёуљє" };
        withdrawRecords.push(record);
        localStorage.setItem('withdraw_records', JSON.stringify(withdrawRecords));
        showToast(`ТЈљуј░ућ│У»ити▓ТЈљС║ц№╝Ђ${wenNum}ТќЄ (${yuan}тЁЃ) т░єтцёуљєтѕ░${type}У┤дтЈи ${account}`);
    }
    function showServiceModal() {
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-content"><h3>­ЪЊъ т«бТюЇ</h3><img class="qr-img" src="kefu_qr.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 fill=%22%23999%22%3E%E5%AE%A2%E6%9C%8D%E5%BE%AE%E4%BF%A1%3C/text%3E%3C/svg%3E'"><p>тЙ«С┐АтЈи: game_kf_888</p><button id="closeSvc">тЁ│жЌГ</button></div>`;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#closeSvc').onclick = () => modalDiv.remove();
    }

    // ==================== у«АуљєтЉўтљјтЈ░№╝ѕтбът╝║№╝џтЈ»ТЪЦуюІТ»ЈСИфућеТѕиуџёТИИТѕЈУ«░тйЋ№╝Ѕ ====================
    let adminClickCount = 0, adminClickTimer = null;
    let adminPassword = "admin888";
    function openAdminModal() {
        let pwd = prompt("у«АуљєтЉўт»єуаЂ:");
        if (pwd !== adminPassword) { showToast("т»єуаЂжћЎУ»»"); return; }
        let allUsers = Object.keys(usersData).map(phone => ({ phone, balance: usersData[phone].balance, regTime: usersData[phone].registerTime || 'ТюфуЪЦ' }));
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">­ЪјЏ№ИЈ у«АуљєтЉўтљјтЈ░ ┬и ућеТѕиу«Ауљє</h3>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <input type="text" id="adminSearchInput" placeholder="Тљюу┤бТЅІТю║тЈи" style="flex:2; background:#1a1a1a; border:1px solid #d49c3f; border-radius:40px; padding:6px;">
                    <button id="adminSearchBtn" style="background:#2980b9; border-radius:40px; padding:6px 12px;">­ЪћЇ Тљюу┤б</button>
                    <button id="adminResetSearch" style="background:#555; border-radius:40px; padding:6px 12px;">жЄЇуй«</button>
                </div>
                <div style="max-height:240px; overflow-y:auto; margin-bottom:12px;">
                    <table class="admin-table">
                        <thead><tr><th>ТЅІТю║тЈи</th><th>СйЎжбЮ</th><th>Т│етєїТЌХжЌ┤</th><th>ТЊЇСйю</th></tr></thead>
                        <tbody id="adminUserTableBody"></tbody>
                    </table>
                </div>
                <select id="adminTargetUser" style="width:100%; margin:8px 0; padding:6px; border-radius:40px; background:#1a1a1a; color:#ffdd99;">
                    ${allUsers.map(u => `<option value="${u.phone}">${u.phone} (${u.balance.toFixed(2)})</option>`).join('')}
                </select>
                <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                    <input type="number" id="adminAmount" placeholder="жЄЉжбЮ" value="0" style="flex:1; border-radius:40px; padding:6px;">
                    <button id="adminAddBalance" style="background:#2e7d32; border-radius:40px; padding:6px 12px;">РъЋ СИітѕє</button>
                    <button id="adminSubBalance" style="background:#c0392b; border-radius:40px; padding:6px 12px;">Ръќ СИІтѕє</button>
                    <button id="adminResetBalance" style="background:#f39c12; border-radius:40px; padding:6px 12px;">­Ъћё жЄЇуй«1000</button>
                </div>
                <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                    <button id="adminViewWithdraw" style="background:#16a085; border-radius:40px; padding:6px 12px;">­ЪЊІ ТЈљуј░У«░тйЋ</button>
                    <button id="adminSetBanker" style="background:#e67e22; border-radius:40px; padding:6px 12px;">­ЪЈд У«Йуй«т║ёт«Х</button>
                    <button id="adminChangePwd" style="background:#9b59b6; border-radius:40px; padding:6px 12px;">­ЪћЉ Тћ╣т»є</button>
                    <button id="adminSaveFactor" style="background:#e67e22; border-radius:40px; padding:6px 12px;">­Ъњ╣ С┐ЮтГўу│╗ТЋ░</button>
                </div>
                <div style="margin:12px 0; display:flex; align-items:center; gap:8px;">
                    <span>­ЪјЏ№ИЈ тЁет▒ђУхћС╗ўу│╗ТЋ░: <input id="adminAdjustFactor" step="0.01" value="${adjustFactor}" style="width:80px; border-radius:40px; padding:4px;"></span>
                </div>
                <button id="adminCloseBtn" style="margin-top:12px; width:100%; background:#734c2e; border-radius:40px; padding:8px;">тЁ│жЌГтљјтЈ░</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        
        function renderUserTable(searchKeyword = '') {
            let filtered = searchKeyword ? allUsers.filter(u => u.phone.includes(searchKeyword)) : allUsers;
            let tbody = modalDiv.querySelector('#adminUserTableBody');
            if (!tbody) return;
            tbody.innerHTML = filtered.map(u => `
                <tr>
                    <td>${u.phone}</td>
                    <td>­Ъњ░ ${u.balance.toFixed(2)}</td>
                    <td>${u.regTime}</td>
                    <td><button class="viewUserRecordBtn" data-phone="${u.phone}" style="background:#d49c3f; border:none; border-radius:30px; padding:4px 8px;">­ЪЊю У«░тйЋ</button></td>
                </tr>
            `).join('');
            document.querySelectorAll('.viewUserRecordBtn').forEach(btn => {
                btn.onclick = () => {
                    let phone = btn.dataset.phone;
                    showUserGameRecords(phone);
                };
            });
        }
        renderUserTable();
        
        function showUserGameRecords(phone) {
            let user = usersData[phone];
            if (!user) { showToast("ућеТѕиСИЇтГўтюе"); return; }
            let records = user.records || [];
            if (records.length === 0) {
                showToast(`${phone} ТџѓТЌаТИИТѕЈУ«░тйЋ`);
                return;
            }
            let html = `<div style="max-height:400px; overflow-y:auto;"><h3>­ЪЊю ${phone} уџёТИИТѕЈУ«░тйЋ</h3>`;
            records.slice(0, 100).forEach(rec => {
                let gameName = rec.game || (rec.bet ? (rec.bet.includes('ж▒╝') || rec.bet.includes('УЎЙ') ? 'УЉФУідж▒╝' : 'жЙЎУЎјТќЌ') : 'жф░т«Ю');
                let winColor = rec.win > 0 ? '#4caf50' : '#f44336';
                html += `<div class="record-item-detail">
                            <div>­ЪЋњ ${rec.time}</div>
                            <div>­Ъј« ${gameName}</div>
                            <div>­ЪЊї СИІТ│е: ${rec.bet || rec.betType || 'ТюфуЪЦ'} | т╝ђтЦќ: ${rec.result || '?'}</div>
                            <div>­Ъњ░ СИІТ│ежЄЉжбЮ: ${rec.amount || 0} | <span style="color:${winColor}">УЙЊУхб: ${rec.win > 0 ? `+${rec.win}` : `-${rec.amount || 0}`}</span></div>
                         </div>`;
            });
            html += `<button id="closeRecordModal" style="margin-top:12px; background:#d49c3f; border-radius:40px; padding:6px; width:100%;">тЁ│жЌГ</button></div>`;
            let recModal = document.createElement('div'); recModal.className = 'modal';
            recModal.innerHTML = `<div class="modal-content">${html}</div>`;
            document.body.appendChild(recModal);
            recModal.querySelector('#closeRecordModal').onclick = () => recModal.remove();
        }
        
        modalDiv.querySelector('#adminSearchBtn').onclick = () => {
            let kw = modalDiv.querySelector('#adminSearchInput').value.trim();
            renderUserTable(kw);
        };
        modalDiv.querySelector('#adminResetSearch').onclick = () => {
            modalDiv.querySelector('#adminSearchInput').value = '';
            renderUserTable('');
        };
        
        const getTarget = () => modalDiv.querySelector('#adminTargetUser').value;
        const getAmt = () => parseInt(modalDiv.querySelector('#adminAmount').value) || 0;
        
        modalDiv.querySelector('#adminAddBalance').onclick = () => {
            let t = getTarget(), a = getAmt();
            if (a <= 0) { showToast("жЄЉжбЮ>0"); return; }
            usersData[t].balance += a;
            saveUsers();
            showToast(`${t} +${a}`);
            if (currentUser?.phone === t) setUserBalance(usersData[t].balance);
            modalDiv.remove(); openAdminModal();
        };
        modalDiv.querySelector('#adminSubBalance').onclick = () => {
            let t = getTarget(), a = getAmt();
            if (a <= 0 || usersData[t].balance < a) { showToast("жЄЉжбЮТЌаТЋѕТѕќСйЎжбЮСИЇУХ│"); return; }
            usersData[t].balance -= a;
            saveUsers();
            showToast(`${t} -${a}`);
            if (currentUser?.phone === t) setUserBalance(usersData[t].balance);
            modalDiv.remove(); openAdminModal();
        };
        modalDiv.querySelector('#adminResetBalance').onclick = () => {
            let t = getTarget();
            if (confirm(`жЄЇуй« ${t} СйЎжбЮСИ║1000№╝Ъ`)) {
                usersData[t].balance = 1000;
                saveUsers();
                showToast(`${t} ти▓жЄЇуй«СИ║1000`);
                if (currentUser?.phone === t) setUserBalance(1000);
                modalDiv.remove(); openAdminModal();
            }
        };
        modalDiv.querySelector('#adminViewWithdraw').onclick = () => {
            let records = JSON.parse(localStorage.getItem('withdraw_records')) || [];
            if (records.length === 0) { alert("ТџѓТЌаТЈљуј░У«░тйЋ"); return; }

    function addGameRecord(phone, gameName, betInfo, result, winAmount, betAmount) {
        if (!usersData[phone]) usersData[phone] = { balance: 1000, records: [], resultHistory: [] };
        let rec = usersData[phone].records || [];
        rec.unshift({
            time: new Date().toLocaleString(),
            game: gameName,
            bet: betInfo,
            result: result,
            win: winAmount,
            amount: betAmount
        });
        if (rec.length > 100) rec.pop();
        usersData[phone].records = rec;
        saveUsers();
    }
