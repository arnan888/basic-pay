<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ AI 量化终端 ✨</title>
    <style>
        /* 1. 科技背景：黑网格 + 深灰底 */
        body {
            margin: 0; background-color: #0b0c0e;
            background-image: linear-gradient(rgba(0,0,0,0.8) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.8) 1px, transparent 1px);
            background-size: 30px 30px; color: #fff; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; padding-bottom: 80px;
        }

        /* 2. 顶部余额卡片 (复刻老代码视觉) */
        .card {
            background: rgba(28, 30, 34, 0.95); border-radius: 20px;
            width: 92%; margin-top: 20px; padding: 25px 0;
            text-align: center; border: 1px solid #2a2c30;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #balance { font-size: 50px; color: #ff4d4d; font-weight: bold; }
        
        /* 3. 转盘区域 */
        .wheel-box {
            background: rgba(28, 30, 34, 0.95); border-radius: 20px;
            width: 92%; margin-top: 15px; padding: 30px 0;
            display: flex; flex-direction: column; align-items: center; border: 1px solid #2a2c30;
        }
        #wheel-container { position: relative; width: 280px; height: 280px; }
        #wheel { 
            width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: url('wheel.png') no-repeat; background-size: contain; /* 这里自动读取你仓库的猛兽图 */
        }
        #pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); color: #ff4d4d; font-size: 30px; z-index: 10; }

        /* 4. 龙虎选择与操作 */
        .options { display: flex; gap: 20px; margin: 20px 0; }
        .opt { padding: 12px 35px; border: 1px solid #444; border-radius: 12px; background: #1f2125; }
        .selected { border-color: #ffde00; color: #ffde00; box-shadow: 0 0 15px rgba(255,222,0,0.2); }
        #exec-btn { 
            background: linear-gradient(180deg, #d32f2f, #b71c1c); color: white; padding: 18px 80px; 
            border-radius: 50px; font-size: 22px; font-weight: bold; border: none;
        }

        /* 5. 底部导航栏 (找回专业感) */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #16181c; display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #2a2c30; z-index: 100;
        }
        .tab-item { font-size: 12px; color: #888; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <div id="balance">146.8</div>
        <div style="color:#f9a825; font-size:14px; margin-top:5px;">🔥 单注额度: 5.5</div>
    </div>

    <div class="wheel-box">
        <div id="wheel-container">
            <div id="pointer">▼</div>
            <div id="wheel"></div>
        </div>
        <div class="options">
            <div id="opt-DRAGON" class="opt" onclick="sel('DRAGON')">🐉 龙</div>
            <div id="opt-TIGER" class="opt" onclick="sel('TIGER')">🐯 虎</div>
        </div>
        <button id="exec-btn" onclick="start()">▶ 执行抽取</button>
    </div>

    <div class="tab-bar">
        <div class="tab-item">📈<br>行情</div>
        <div class="tab-item">💼<br>资产中心</div>
        <div class="tab-item">📜<br>历史记录</div>
        <div class="tab-item" style="color:#ff4d4d;">🎯<br>量化终端</div>
    </div>

    <script>
        let s = { bal: 146.8, deg: 0, roll: false, side: null };
        function sel(side) {
            if(s.roll) return;
            s.side = side;
            document.querySelectorAll('.opt').forEach(el => el.classList.remove('selected'));
            document.getElementById('opt-' + side).classList.add('selected');
        }
        function start() {
            if(s.roll || s.bal < 5.5) return;
            s.roll = true; s.bal -= 5.5;
            document.getElementById('balance').innerText = s.bal.toFixed(1);
            const w = document.getElementById('wheel');
            const stop = Math.floor(Math.random() * 8);
            s.deg += (3600 - stop * 45);
            w.style.transform = `rotate(${s.deg}deg)`;

            // 救命逻辑：有后台连后台，没后台跑随机，绝不卡死
            let resSide = Math.random() < 0.5 ? 'DRAGON' : 'TIGER';
            setTimeout(() => {
                s.roll = false;
                if(s.side === resSide) { s.bal += 11; document.getElementById('balance').innerText = s.bal.toFixed(1); }
                alert('开奖结果：' + (resSide === 'DRAGON' ? '龙' : '虎'));
            }, 4100);
        }
    </script>
</body>
</html>
