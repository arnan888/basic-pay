 <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA_QUANT_FINAL_PRO</title>
    <style>
        :root {
            --dark-green-border: #0f382c; /* 墨绿色包边 */
            --light-green-accent: #1a4a3d;
            --grid-gray: #2c2c2c; /* 暗灰色背景 */
            --active-green: #82e0aa;
            --text-gold: #f1c40f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #0a0a0a; 
            color: #e0e0e0; 
            font-family: "Segoe UI", sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }

        /* 核心容器：2.8mm 平面立体包边 */
        .main-container {
            width: 375px; height: 720px;
            border: 12px solid var(--dark-green-border); /* 模拟2.8mm立体包边 */
            border-radius: 24px;
            background: var(--grid-gray);
            /* 暗灰色双层网格内陷模式 */
            background-image: 
                linear-gradient(rgba(0,0,0,0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.4) 1px, transparent 1px);
            background-size: 25px 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; position: relative;
        }

        /* 顶部量化面板 */
        .top-stats {
            height: 100px; display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; padding: 15px; background: rgba(15, 56, 44, 0.4);
            border-bottom: 2px solid var(--dark-green-border);
        }
        .stat-box { text-align: center; }
        .label { font-size: 11px; color: #8aa095; display: block; margin-bottom: 2px; }
        .value { font-size: 20px; color: var(--active-green); font-weight: bold; font-family: 'Consolas'; }

        /* 转盘舞台区 */
        .stage {
            flex: 1; display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        /* 物理指针 */
        .pointer {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 50; width: 0; height: 0;
            border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 25px solid #ff4d4d;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.5));
            transition: 0.3s;
        }
        .pointer.active { transform: translateX(-50%) scale(1.1); filter: drop-shadow(0 0 10px #ff4d4d); }

        /* 转盘主体 */
        #wheel {
            width: 300px; height: 300px; border-radius: 50%;
            border: 10px solid var(--dark-green-border);
            background: #1e1e1e; position: relative;
            transition: transform 5s cubic-bezier(0.15, 0, 0, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* 内部网格底纹 */
        #wheel::after {
            content: ""; position: absolute; inset: 0; border-radius: 50%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        .slot {
            position: absolute; width: 100%; height: 100%;
            text-align: center; padding-top: 20px; font-size: 28px;
        }

        /* 底部控制区：按压质感 */
        .control-area {
            background: #3d0e0e; /* 暗红底色配合图中风格 */
            padding: 30px 20px 50px; border-radius: 40px 40px 0 0;
            border-top: 2px solid #631b1b;
        }

        .main-btn {
            width: 100%; height: 80px; 
            background: linear-gradient(180deg, #d63031 0%, #a01a1a 100%);
            border-radius: 40px; border: none; color: #fff;
            font-size: 24px; font-weight: bold;
            box-shadow: 0 8px 0 #701010; cursor: pointer;
            transition: all 0.1s;
        }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #701010; }
        .main-btn:disabled { filter: grayscale(1); opacity: 0.6; }

        /* 中奖提示 */
        #msg { text-align: center; color: var(--text-gold); margin-top: 15px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="top-stats">
            <div class="stat-box">
                <span class="label">投入次数</span>
                <div class="value" id="count-in">0</div>
            </div>
            <div class="stat-box">
                <span class="label">实时余额</span>
                <div class="value" id="ui-bal">89,123.00</div>
            </div>
            <div class="stat-box">
                <span class="label">产出积分</span>
                <div class="value" id="count-out">0</div>
            </div>
            <div class="stat-box">
                <span class="label">返还率</span>
                <div class="value" id="count-rtp">0.0%</div>
            </div>
        </div>

        <div class="stage">
            <div class="pointer" id="pointer"></div>
            <div id="wheel">
                <div class="slot" style="transform: rotate(0deg)">🦁</div>
                <div class="slot" style="transform: rotate(45deg)">🐺</div>
                <div class="slot" style="transform: rotate(90deg)">🐢</div>
                <div class="slot" style="transform: rotate(135deg)">🦅</div>
                <div class="slot" style="transform: rotate(180deg)">🐯</div>
                <div class="slot" style="transform: rotate(225deg)">🦄</div>
                <div class="slot" style="transform: rotate(270deg)">🐲</div>
                <div class="slot" style="transform: rotate(315deg)">🔥</div>
            </div>
        </div>

        <div class="control-area">
            <button class="main-btn" id="btn-go" onclick="App.run()">▶ 执行抽取</button>
            <div id="msg"></div>
        </div>
    </div>

    <script>
        const App = {
            state: {
                bal: 89123.0,
                in: 0,
                out: 0,
                isRolling: false,
                deg: 0
            },

            run() {
                if(this.state.isRolling || this.state.bal < 100) return;

                // 1. 状态锁定
                this.state.isRolling = true;
                this.state.bal -= 100;
                this.state.in += 1;
                this.updateUI();

                // 2. 视觉反馈
                document.getElementById('btn-go').disabled = true;
                document.getElementById('pointer').classList.add('active');
                document.getElementById('msg').innerText = "量化计算中...";

                // 3. 物理旋转 (8圈基础 + 随机45度倍数对齐)
                const targetIdx = Math.floor(Math.random() * 8);
                const extraDeg = targetIdx * 45;
                this.state.deg += (360 * 10) + (360 - (this.state.deg % 360)) + extraDeg;
                
                document.getElementById('wheel').style.transform = `rotate(${this.state.deg}deg)`;

                // 4. 结算回调
                setTimeout(() => {
                    this.state.isRolling = false;
                    document.getElementById('btn-go').disabled = false;
                    document.getElementById('pointer').classList.remove('active');
                    
                    // 模拟中奖逻辑
                    const rewards = [500, 0, 100, 0, 200, 0, 1000, 50];
                    const win = rewards[targetIdx];
                    
                    if(win > 0) {
                        this.state.bal += win;
                        this.state.out += win;
                        document.getElementById('msg').innerText = `恭喜获得 ${win} 积分！`;
                    } else {
                        document.getElementById('msg').innerText = "同步完成，未发现溢出";
                    }
                    
                    this.updateUI();
                }, 5000);
            },

            updateUI() {
                document.getElementById('ui-bal').innerText = this.state.bal.toLocaleString('en-US', {minimumFractionDigits: 2});
                document.getElementById('count-in').innerText = this.state.in;
                document.getElementById('count-out').innerText = this.state.out;
                const rtp = this.state.in > 0 ? ((this.state.out / (this.state.in * 100)) * 100).toFixed(1) : "0.0";
                document.getElementById('count-rtp').innerText = rtp + "%";
            }
        };

        App.updateUI();
    </script>
</body>
</html>
