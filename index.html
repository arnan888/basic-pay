<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>双游戏大厅 | 抢庄+系统坐庄 | 3D骰子 | 可上传背景</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #1a1a1a; background-image: radial-gradient(circle at 20% 30%, rgba(200,140,70,0.2) 2%, transparent 3%); background-size: 40px 40px; font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif; padding: 12px; }
        .app { max-width: 550px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .game-nav { background: linear-gradient(135deg, #1a4a1a, #0a2a0a); border-radius: 60px; padding: 6px; display: flex; gap: 8px; border: 1px solid #ffaa44; flex-wrap: wrap; }
        .game-tab { flex: 1; background: transparent; border: none; padding: 8px 0; border-radius: 50px; font-weight: bold; font-size: 0.85rem; color: #ccaa77; cursor: pointer; transition: 0.2s; text-align: center; }
        .game-tab.active { background: #c47c3a; color: #2f1b0a; box-shadow: 0 2px 6px rgba(0,0,0,0.9); }
        .user-section { background: #1f1711; border-radius: 40px; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
        .user-info-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .user-info-row span { color: #ffdd99; font-size: 0.85rem; font-weight: bold; }
        #userBalanceDisplay { font-size: 1.5rem; font-weight: 900; color: #ffcc44; background: #0a0705; padding: 0 12px; border-radius: 50px; letter-spacing: 1px; }
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .logout-btn, .service-btn { background: #734c2e; border: none; padding: 4px 12px; border-radius: 30px; color: #ffe3b3; font-size: 0.75rem; cursor: pointer; font-weight: bold; }
        .service-btn { background: #2e7d32; }
        .charge-withdraw-row { display: flex; gap: 8px; justify-content: center; }
        .charge-btn, .withdraw-btn { background: #c47c3a; border: none; padding: 6px 16px; border-radius: 40px; color: #2f1b0a; font-weight: bold; font-size: 0.85rem; cursor: pointer; flex: 1; text-align: center; box-shadow: 0 2px 0 #764e26; }
        .withdraw-btn { background: #734c2e; color: #ffe3b3; box-shadow: 0 2px 0 #3f2a1a; }
        .game-container { background: linear-gradient(145deg, #362a1f 0%, #251e16 100%); border-radius: 48px; box-shadow: 0 12px 25px rgba(0,0,0,0.3); overflow: hidden; min-height: 560px; }
        .auth-panel { background: linear-gradient(145deg, #362a1f 0%, #251e16 100%); border-radius: 48px; padding: 30px 20px; text-align: center; border: 2px solid #ffaa44; }
        .auth-panel h2 { color: #ffdd99; font-size: 1.6rem; margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 12px; margin: 8px 0; background: #2a241e; border: 1px solid #ffaa44; border-radius: 60px; color: white; font-size: 0.9rem; text-align: center; }
        .auth-buttons { display: flex; gap: 12px; margin: 15px 0; }
        .auth-btn { flex: 1; background: #c47c3a; border: none; padding: 10px; border-radius: 60px; color: #2f1b0a; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        .auth-note { color: #aa8855; font-size: 0.7rem; }
        .chip { background: #ebbc7e; color: #3a240f; font-weight: bold; font-size: 0.9rem; padding: 6px 10px; border-radius: 40px; cursor: pointer; box-shadow: 0 2px 0 #8b5a2e; display: inline-block; transition: 0.05s linear; text-align: center; min-width: 44px; }
        .chip.selected { background: #f7c56e; box-shadow: 0 0 0 2px #ffefb0, 0 2px 0 #7a4b22; transform: scale(1.02); }
        .bet-card { background: #1f1712; border-radius: 24px; padding: 6px 2px; text-align: center; box-shadow: 0 4px 0 #0a0705; border: 1px solid #6f4f34; cursor: pointer; transition: 0.05s linear; }
        .bet-card:active { transform: translateY(2px); box-shadow: 0 2px 0 #0a0705; }
        .bet-name { font-size: 0.8rem; font-weight: bold; color: #ffddb0; }
        .bet-odds { font-size: 0.6rem; color: #dba959; }
        .bet-amount { background: #0c0907; border-radius: 30px; padding: 2px 4px; margin-top: 4px; font-size: 1rem; font-weight: bold; color: #ffcc66; text-align: center; }
        .btn-chip { background: #523b26; border: none; color: #fce2b4; width: 28px; height: 28px; border-radius: 30px; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .online-count-box { background: #2a1f16; margin: 10px; padding: 6px 12px; border-radius: 60px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #ffdd99; border: 1px solid #ffaa44; }
        .online-number { font-size: 1.3rem; font-weight: 900; color: #ffaa44; margin-left: 6px; text-shadow: 0 0 3px #ff8800; }
        /* 3D骰子样式 */
        .dice { width: 70px; height: 70px; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 12px; box-shadow: 0 6px 10px -3px rgba(255,140,70,0.8); cursor: pointer; }
        .dice-face { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; border-radius: 10px; border: 1px solid rgba(255,170,68,0.9); backface-visibility: visible; }
        .front { transform: translateZ(35px); }
        .back { transform: translateZ(35px) rotateY(180deg); }
        .right { transform: translateZ(35px) rotateY(90deg); }
        .left { transform: translateZ(35px) rotateY(-90deg); }
        .top { transform: translateZ(35px) rotateX(90deg); }
        .bottom { transform: translateZ(35px) rotateX(-90deg); }
        /* 骰子容器 - 最大化，无圆形限制 */
        .dice-max-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 180px;
            background: #ffffff;
            border-radius: 30px;
            transition: background-image 0.2s;
        }
        .dice-triangle {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .dice-row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .result-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.6); background: linear-gradient(145deg, #ffcc44, #ff9933); color: #1a1a2a; padding: 18px 30px; border-radius: 60px; font-size: 2rem; font-weight: 900; z-index: 2000; opacity: 0; transition: 0.2s; pointer-events: none; white-space: nowrap; }
        .result-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .result-popup.win { background: linear-gradient(145deg, #ffcc44, #ffaa22); }
        .result-popup.lose { background: linear-gradient(145deg, #555, #333); color: #ffaa66; }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #000000cc; color: #ffcc44; padding: 6px 12px; border-radius: 40px; z-index: 2001; animation: fadeInOut 2s forwards; font-size: 0.8rem; font-weight: bold; white-space: nowrap; }
        @keyframes fadeInOut { 0% { opacity:0; transform: translateX(-50%) translateY(20px); } 15% { opacity:1; transform: translateX(-50%) translateY(0); } 85% { opacity:1; } 100% { opacity:0; transform: translateX(-50%) translateY(-20px); } }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: #1a2a1a; border-radius: 48px; padding: 20px; border: 2px solid #ffaa44; width: 85%; max-width: 500px; text-align: center; color: #ffdd99; max-height: 80vh; overflow-y: auto; }
        .qr-img { width: 140px; height: 140px; margin: 8px auto; display: block; background: white; border-radius: 20px; padding: 8px; object-fit: contain; }
        .points-grid, .trio-grid, .special-grid { display: grid; gap: 6px; margin-bottom: 10px; }
        .points-grid { grid-template-columns: repeat(4,1fr); }
        .trio-grid { grid-template-columns: repeat(4,1fr); }
        .special-grid { grid-template-columns: repeat(4,1fr); }
        .countdown-warning { animation: warning 0.5s infinite; color: #ff3300 !important; text-shadow: 0 0 3px red; }
        @keyframes warning { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
        .fish-pattern-img { width: 40px; height: 40px; object-fit: contain; margin: 2px auto; display: block; background: #2a1f16; border-radius: 10px; padding: 3px; }
        .fish-wrapper .bet-card { background: #660099; border-radius: 14px; padding: 6px 2px; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.65); border: 1px solid #005a32; transition: all 0.1s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 85px; width: 100%; box-sizing: border-box; }
        .fish-wrapper .bet-name { font-size: 0.75rem; font-weight: bold; color: #bb77ff; margin: 2px 0; }
        .fish-wrapper .bet-amount { background: #0c0907; border-radius: 30px; padding: 2px 6px; margin: 4px 4px 0; display: flex; justify-content: space-between; align-items: center; gap: 4px; font-size: 1rem; font-weight: bold; color: #ffcc66; width: calc(100% - 8px); box-sizing: border-box; }
        .fish-wrapper .bet-amount span { font-size: 1rem; font-weight: bold; color: #ffdd88; min-width: 28px; text-align: center; }
        #patternGrid { display: grid !important; grid-template-columns: repeat(3, minmax(0, 1fr)) !important; gap: 8px !important; margin: 8px 0 !important; width: 100%; overflow: visible; }
        .fish-wrapper .bet-sections { padding: 0 6px; overflow: visible; }
        #fishBankerDisplay, #diceBankerDisplay, #totalBetValue, #lastWinValue, #totalBet, #rollingWinNumber, #countdownNum, #selectedChip {
            font-size: 1.2rem;
            font-weight: 900;
            color: #ffcc44;
            text-shadow: 0 0 2px #ff8800;
            background: rgba(0,0,0,0.8);
            padding: 0 6px;
            border-radius: 30px;
            display: inline-block;
        }
        #rollingWinNumber { font-size: 1.1rem; }
        #countdownNum { font-size: 1.3rem; }
        .dice-wrapper #totalBet, .dice-wrapper #rollingWinNumber { font-size: 1rem; }
        /* 抢庄按钮 - 无2001文字 */
        .grab-btn {
            background: linear-gradient(135deg, #ffaa44, #ff7700);
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            color: #2f1b0a;
            cursor: pointer;
            box-shadow: 0 4px 0 #aa4a00, 0 2px 8px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
            text-shadow: 0 1px 0 rgba(255,255,200,0.8);
            letter-spacing: 1px;
            width: auto;
            min-width: 100px;
            display: inline-block;
        }
        .grab-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #aa4a00; }
        .grab-btn:disabled { background: #888; box-shadow: 0 3px 0 #555; transform: none; cursor: not-allowed; text-shadow: none; }
        /* 一红一绿双押按钮 */
        .double-bet-red, .double-bet-green {
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            color: white;
            box-shadow: 0 3px 0 rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.1s;
            width: auto;
            min-width: 90px;
        }
        .double-bet-red { background: linear-gradient(135deg, #e74c3c, #c0392b); box-shadow: 0 3px 0 #8b1a1a; }
        .double-bet-green { background: linear-gradient(135deg, #2ecc71, #27ae60); box-shadow: 0 3px 0 #1e8a4a; }
        .double-bet-red:active, .double-bet-green:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
        /* 按钮行容器 */
        .action-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 12px 0;
        }
        /* 背景上传控件 */
        .bg-upload {
            text-align: center;
            margin-top: 8px;
        }
        .bg-upload label {
            background: #2a1f16;
            color: #ffdd99;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            border: 1px solid #ffaa44;
        }
        @media (max-width: 550px) {
            .dice { width: 55px; height: 55px; }
            .front, .back, .right, .left, .top, .bottom { transform: translateZ(27.5px); }
            .back { transform: translateZ(27.5px) rotateY(180deg); }
            .right { transform: translateZ(27.5px) rotateY(90deg); }
            .left { transform: translateZ(27.5px) rotateY(-90deg); }
            .top { transform: translateZ(27.5px) rotateX(90deg); }
            .bottom { transform: translateZ(27.5px) rotateX(-90deg); }
            .chip { padding: 4px 8px; min-width: 38px; font-size: 0.8rem; }
            .grab-btn { padding: 6px 16px; font-size: 0.9rem; min-width: 80px; }
            .double-bet-red, .double-bet-green { padding: 6px 12px; font-size: 0.8rem; min-width: 70px; }
            .dice-max-area { min-height: 150px; }
        }
    </style>
</head>
<body>
<div class="app" id="app"></div>
<script>
    // ==================== 全局系统 ====================
    const USERS_KEY = 'double_games_final_v28';
    let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
    let currentUser = null;
    let validReferralCodes = JSON.parse(localStorage.getItem('valid_referral_codes')) || ['VIP888', 'ABC123', 'GAME2024', 'TEST001'];

    // 骰宝系统庄家资金
    let systemBankerBalance = localStorage.getItem('system_banker_balance') ? parseFloat(localStorage.getItem('system_banker_balance')) : 100000;
    function saveSystemBanker() { localStorage.setItem('system_banker_balance', systemBankerBalance); }
    function modifyBanker(delta) { systemBankerBalance += delta; if (systemBankerBalance < 0) systemBankerBalance = 0; saveSystemBanker(); }

    // 庄家调节系数（隐蔽，管理员可调）
    let adjustFactor = localStorage.getItem('adjust_factor') ? parseFloat(localStorage.getItem('adjust_factor')) : 1.0;
    function saveAdjustFactor(val) { localStorage.setItem('adjust_factor', val); adjustFactor = val; }

    function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0; }
    function setUserBalance(amt) { if (currentUser) { usersData[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }
    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast-message';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    // ==================== 充值客服弹窗 ====================
    function showRechargeModal() {
        let m = document.createElement('div');
        m.className = 'modal';
        m.innerHTML = `
            <div class="modal-content">
                <h3>💎 充值</h3>
                <p style="margin:10px 0;"><strong style="color:#ffaa44;">1元 = 1000文</strong>，扫码支付后联系客服上分</p>
                <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;">
                    <div style="text-align:center;">
                        <img src="mmexport1776247819360.jpg" class="qr-img" alt="微信收款码" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%BE%AE%E4%BF%A1%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'">
                        <p>📱 微信收款码</p>
                    </div>
                    <div style="text-align:center;">
                        <img src="mmexport1776247823872.jpg" class="qr-img" alt="支付宝收款码" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E6%94%AF%E4%BB%98%E5%AE%9D%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'">
                        <p>📱 支付宝收款码</p>
                    </div>
                </div>
                <p style="margin-top:10px;">📞 客服微信: <strong>game_kf_888</strong> (支付后截图联系)</p>
                <button id="closeRecharge" style="background:#c47c3a; margin-top:15px; padding:8px 20px; border-radius:40px;">关闭</button>
            </div>
        `;
        document.body.appendChild(m);
        m.querySelector('#closeRecharge').onclick = () => m.remove();
    }

    function showServiceModal() {
        let m = document.createElement('div');
        m.className = 'modal';
        m.innerHTML = `
            <div class="modal-content">
                <h3>📞 客服微信</h3>
                <img src="29917.jpg" class="qr-img" alt="客服微信" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%AE%A2%E6%9C%8D%E5%BE%AE%E4%BF%A1%3C/text%3E%3C/svg%3E'">
                <p style="margin-top:10px;">微信号: game_kf_888</p>
                <button id="closeSvc" style="background:#c47c3a; margin-top:15px; padding:8px 20px; border-radius:40px;">关闭</button>
            </div>
        `;
        document.body.appendChild(m);
        m.querySelector('#closeSvc').onclick = () => m.remove();
    }

    function recharge() { showRechargeModal(); }
    function withdraw() { showToast("提现请联系客服微信: game_kf_888"); }

    // ==================== 真实在线人数 ====================
    let onlineInterval = null;
    function startRealOnlineCount() {
        if (onlineInterval) clearInterval(onlineInterval);
        function fetchOnline() {
            const span = document.getElementById('onlineCount');
            if (!span) return;
            fetch('http://127.0.0.1:8090/getOnlineCount')
                .then(res => res.json())
                .then(data => { let count = data?.count ?? data?.online; if (typeof count === 'number' && !isNaN(count)) span.innerText = count; else span.innerText = '--'; })
                .catch(() => { span.innerText = '--'; });
        }
        fetchOnline();
        onlineInterval = setInterval(fetchOnline, 5000);
    }

    // ==================== 管理员后台（隐蔽，筹码100连点3次触发） ====================
    let adminClickCount = 0, adminClickTimer = null;
    let adminPassword = localStorage.getItem('admin_pwd') || 'admin123';
    async function openAdminModal() {
        const pwd = prompt("请输入管理密码:");
        if (pwd !== adminPassword) { showToast("密码错误"); return; }
        await showAdminPanel();
    }
    async function showAdminPanel() {
        const allUsers = Object.keys(usersData).map(phone => ({ phone, balance: usersData[phone].balance, referralCode: usersData[phone].referralCode || '无', registerTime: usersData[phone].registerTime || '未知' }));
        let searchKeyword = '';
        function renderUserTable() {
            let filtered = searchKeyword ? allUsers.filter(u => u.phone.includes(searchKeyword)) : allUsers;
            let rows = filtered.map(u => `<tr><td style="padding:6px;">${u.phone}</td><td style="padding:6px;">💰 ${u.balance.toFixed(2)}</td><td style="padding:6px;">🎫 ${u.referralCode}</td><td style="padding:6px;">${u.registerTime}</td></tr>`).join('');
            document.querySelector('#adminUserTableBody').innerHTML = rows || '<tr><td colspan="4" style="padding:20px;">暂无数据</td></tr>';
        }
        let html = `<div class="modal-content" style="max-width:650px;"><h2>🎛️ 管理员后台</h2>
            <div style="display:flex; gap:8px; margin:12px 0;">
                <input type="text" id="adminSearchInput" class="auth-input" placeholder="搜索手机号" style="flex:2;">
                <button id="adminSearchBtn" style="background:#2980b9; padding:6px 12px; border-radius:40px;">🔍 搜索</button>
                <button id="adminResetSearchBtn" style="background:#555; padding:6px 12px; border-radius:40px;">重置</button>
            </div>
            <div style="max-height:300px; overflow-y:auto; margin-bottom:12px;">
                <table style="width:100%; border-collapse:collapse;">
                    <thead style="background:#2a1f16;"><tr><th>手机号</th><th>余额</th><th>推荐码</th><th>注册时间</th></tr></thead>
                    <tbody id="adminUserTableBody"></tbody>
                </table>
            </div>
            <div style="display:flex; gap:8px; margin:12px 0;">
                <select id="adminTargetUser" style="background:#1a1a1a; color:#ffdd99; border-radius:20px; padding:4px; flex:1;">
                    ${allUsers.map(u => `<option value="${u.phone}">${u.phone} (${u.balance.toFixed(2)})</option>`).join('')}
                </select>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                <input type="number" id="adminAmount" class="auth-input" placeholder="金额" value="0" style="flex:1;">
                <button id="adminAdd" style="background:#2e7d32; padding:4px 10px; border-radius:30px;">➕ 上分</button>
                <button id="adminSub" style="background:#c0392b; padding:4px 10px; border-radius:30px;">➖ 下分</button>
                <button id="adminReset" style="background:#f39c12; padding:4px 10px; border-radius:30px;">🔄 重置1000</button>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                <button id="adminQuery" style="background:#2980b9; padding:4px 10px; border-radius:30px;">🔍 查询余额</button>
                <button id="adminExport" style="background:#27ae60; padding:4px 10px; border-radius:30px;">📋 导出用户</button>

        // 创建3D骰子函数
        function create3DDice(containerId, initialRotateX = 0, initialRotateY = 0) {
            const container = document.getElementById(containerId);
            if (!container) return null;
            const dice = document.createElement('div');
            dice.className = 'dice';
            const directions = [
                { name: 'front', transform: 'translateZ(35px)' },
                { name: 'right', transform: 'translateZ(35px) rotateY(90deg)' },
                { name: 'back',  transform: 'translateZ(35px) rotateY(180deg)' },
                { name: 'left',  transform: 'translateZ(35px) rotateY(-90deg)' },
                { name: 'top',   transform: 'translateZ(35px) rotateX(90deg)' },
                { name: 'bottom',transform: 'translateZ(35px) rotateX(-90deg)' }
            ];
            directions.forEach((dir, idx) => {
                const face = document.createElement('div');
                face.className = `dice-face ${dir.name}`;
                face.style.backgroundImage = `url('${faceImages[idx]}')`;
                face.style.backgroundSize = 'cover';
                face.style.backgroundPosition = 'center';
                face.style.transform = dir.transform;
                dice.appendChild(face);
            });
            dice.style.transform = `rotateX(${initialRotateX}deg) rotateY(${initialRotateY}deg)`;
            container.appendChild(dice);
            return dice;
        }

        // 初始化三个骰子
        const diceElements = [];
        for (let i = 0; i < 3; i++) {
            const randX = Math.floor(Math.random() * 360);
            const randY = Math.floor(Math.random() * 360);
            const dice = create3DDice(`diceContainer${i}`, randX, randY);
            diceElements.push(dice);
        }

        // 旋转骰子到指定图案
        function rotateDiceToPattern(dice, patternName) {
            const patternIndex = facePatterns.indexOf(patternName);
            if (patternIndex === -1) return;
            let rotateX = 0, rotateY = 0;
            switch (patternIndex) {
                case 0: rotateX = 0; rotateY = 0; break;
                case 1: rotateX = 0; rotateY = -90; break;
                case 2: rotateX = 0; rotateY = 180; break;
                case 3: rotateX = 0; rotateY = 90; break;
                case 4: rotateX = -90; rotateY = 0; break;
                case 5: rotateX = 90; rotateY = 0; break;
            }
            const extraX = 360 * (1 + Math.floor(Math.random() * 2));
            const extraY = 360 * (1 + Math.floor(Math.random() * 2));
            dice.style.transform = `rotateX(${rotateX + extraX}deg) rotateY(${rotateY + extraY}deg)`;
        }

        // 摇骰子动画并最终定格
        async function rollAllDiceToPatterns(targetPatterns) {
            // 快速随机旋转
            for (let i = 0; i < 3; i++) {
                const dice = diceElements[i];
                dice.style.transition = 'none';
                const randX = Math.floor(Math.random() * 360);
                const randY = Math.floor(Math.random() * 360);
                dice.style.transform = `rotateX(${randX}deg) rotateY(${randY}deg)`;
            }
            await new Promise(r => setTimeout(r, 50));
            for (let i = 0; i < 3; i++) {
                diceElements[i].style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
            }
            // 跳动
            for (let step = 0; step < 10; step++) {
                for (let i = 0; i < 3; i++) {
                    const randX = Math.floor(Math.random() * 360);
                    const randY = Math.floor(Math.random() * 360);
                    diceElements[i].style.transform = `rotateX(${randX}deg) rotateY(${randY}deg)`;
                }
                await new Promise(r => setTimeout(r, 80));
            }
            // 最终定格
            for (let i = 0; i < 3; i++) {
                rotateDiceToPattern(diceElements[i], targetPatterns[i]);
            }
            await new Promise(r => setTimeout(r, 500));
        }

        // 背景上传功能

            }
        });

        // ========== 游戏逻辑 ==========
        let patternBets = { fish: 0, shrimp: 0, crab: 0, calabash: 0, coin: 0, chicken: 0 };
        let specialBets = { doubleBet: 0 };
        let currentChip = 10;
        let lastWinAmount = 0;
        let hasGrabbed = false;
        let playerBankerBalance = 0;
        const MAX_SINGLE = 500;
        const MAX_TOTAL = 2000;

        let savedBanker = localStorage.getItem('fish_player_banker');

        function getTotalBet() { return Object.values(patternBets).reduce((a, b) => a + b, 0) + Object.values(specialBets).reduce((a, b) => a + b, 0); }

        function updateUI() {
            updateBankerDisplay();
            let totalEl = document.getElementById('totalBetValue');
            if (totalEl) totalEl.innerText = getTotalBet();
            let lastEl = document.getElementById('lastWinValue');
            if (lastEl) lastEl.innerText = lastWinAmount;
            for (let k in patternBets) { let s = document.getElementById(`bet_${k}`); if (s) s.innerText = patternBets[k]; }

        }

        function modifyBalance(delta) { setUserBalance(getUserBalance() + delta); updateUI(); }

        function addBetPattern(id, val) {
            if (hasGrabbed) { showToast("庄家不能下注"); return; }
            let total = getTotalBet();
            if (val > MAX_SINGLE) { showToast(`单注上限${MAX_SINGLE}`); return; }
            if (total + val > MAX_TOTAL) { showToast(`总注上限${MAX_TOTAL}`); return; }
            if (val > getUserBalance()) { showToast("余额不足"); return; }
            patternBets[id] += val;
            modifyBalance(-val);
            updateUI();
        }
        function subBetPattern(id, val) { let cur = patternBets[id]; if (cur < val) val = cur; if (val === 0) return; patternBets[id] -= val; modifyBalance(val); updateUI(); }
        function addBetSpecial(type, val) {
            if (hasGrabbed) { showToast("庄家不能下注"); return; }
            let total = getTotalBet();
            if (val > MAX_SINGLE) return;
            if (total + val > MAX_TOTAL) return;
            if (val > getUserBalance()) return;
            specialBets[type] += val;
            modifyBalance(-val);
            updateUI();
        }
        function clearBets() { for (let k in patternBets) patternBets[k] = 0; for (let k in specialBets) specialBets[k] = 0; updateUI(); }

        let gameRecords = [];
        function addRecord(dice, winAmount, totalBet) {
            gameRecords.unshift({ time: new Date().toLocaleTimeString(), dice: dice.join(','), result: winAmount > 0 ? `赢${winAmount}` : `输${totalBet}`, win: winAmount });
            if (gameRecords.length > 50) gameRecords.pop();
        }

        async function settleAndAnimate(finalPatterns) {
            await rollAllDiceToPatterns(finalPatterns);
            let points = finalPatterns.map(n => ({ "鱼": 1, "虾": 2, "蟹": 3, "葫芦": 4, "金钱": 5, "鸡": 6 }[n]));
            let sum = points.reduce((a, b) => a + b, 0);
            let isTriplet = (finalPatterns[0] === finalPatterns[1] && finalPatterns[1] === finalPatterns[2]);
            let totalBet = getTotalBet();
            let winAmount = 0;
            if (totalBet > 0) {
                let userBal = getUserBalance();
                if (totalBet <= userBal) setUserBalance(userBal - totalBet);
                const pidMap = { fish: "鱼", shrimp: "虾", crab: "蟹", calabash: "葫芦", coin: "金钱", chicken: "鸡" };
                for (let [pid, val] of Object.entries(patternBets)) {
                    if (val === 0) continue;
                    let occur = finalPatterns.filter(n => n === pidMap[pid]).length;
                    if (occur > 0) winAmount += val * (occur + 1);
                }
                if (finalPatterns.includes("鱼") && finalPatterns.includes("虾") && specialBets.doubleBet) {
                    winAmount += specialBets.doubleBet * 4.5;
                }
                setUserBalance(getUserBalance() + winAmount);
                if (hasGrabbed) {
                    let netToBanker = (totalBet - winAmount) * adjustFactor;
                    playerBankerBalance += netToBanker;
                    if (playerBankerBalance < 0) {
                        hasGrabbed = false;
                        playerBankerBalance = 0;
                        localStorage.removeItem('fish_player_banker');
                        showToast("庄家破产，权限回收");
                        updateBankerDisplay();
                    } else {
                        localStorage.setItem('fish_player_banker', playerBankerBalance);
                    }
                    updateBankerDisplay();
                }
                lastWinAmount = winAmount - totalBet;
            } else { lastWinAmount = 0; }
            addRecord(finalPatterns, winAmount, totalBet);
            clearBets();
            updateUI();
        }

        // 构建六门网格
        const patternContainer = document.getElementById('patternGrid');
        if (patternContainer) {
            patternContainer.innerHTML = '';
            patternImages.forEach(p => {
                let card = document.createElement('div');
                card.className = 'bet-card';
                card.innerHTML = `<img src="${p.img}" class="fish-pattern-img" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2248%22%20height%3D%2248%22%20viewBox%3D%220%200%2048%2048%22%3E%3Crect%20width%3D%2248%22%20height%3D%2248%22%20fill%3D%22%23c47c3a%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%3E${p.name}%3C%2Ftext%3E%3C%2Fsvg%3E'"><div class="bet-name">${p.name}</div><div class="bet-amount"><button class="btn-chip sub-pattern" data-id="${p.id}">-</button><span id="bet_${p.id}">0</span><button class="btn-chip add-pattern" data-id="${p.id}">+</button></div></div>`;

                updateUI();
                showToast("抢庄成功，不可下注");
            } else { showToast("余额不足2001文"); }
        };
        document.getElementById('fishRollBtn').onclick = async () => {
            if (roundActive && !isRolling && getTotalBet() > 0) {
                stopRound();
                let r1 = ["鱼","虾","蟹","葫芦","金钱","鸡"][Math.floor(Math.random()*6)];
                let r2 = ["鱼","虾","蟹","葫芦","金钱","鸡"][Math.floor(Math.random()*6)];
                let r3 = ["鱼","虾","蟹","葫芦","金钱","鸡"][Math.floor(Math.random()*6)];
                phaseDiv.innerHTML = "🎲 立即开骰 · 动画5秒";
                await settleAndAnimate([r1, r2, r3]);
                if (roundActive) startRound();
            } else if (getTotalBet() === 0) { showToast("请先下注"); }
        };
        document.getElementById('showRecordBtn').onclick = () => {
            if (gameRecords.length === 0) { showToast("暂无记录"); return; }
            let html = '<div style="max-height:400px; overflow-y:auto;">';
            gameRecords.forEach(r => { html += `<div style="background:#2a241e; margin:6px; padding:6px; border-left:3px solid #ffaa44;"><div>${r.time}</div><div>🎲 ${r.dice}</div><div style="color:${r.win > 0 ? '#4caf50' : '#f44336'}">${r.result}</div></div>`; });
            html += '</div><button id="closeRec" style="background:#ffaa44; margin-top:8px; padding:6px; border-radius:40px;">关闭</button>';
            let m = document.createElement('div'); m.className = 'modal'; m.innerHTML = `<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeRec').onclick = () => m.remove();
        };
        document.getElementById('showRulesBtn').onclick = () => {
            let m = document.createElement('div'); m.className = 'modal'; m.innerHTML = `<div class="modal-content"><h3>赔付规则</h3><p>六门:1次赔1.5倍/2次2倍/3次2.5倍</p><p>双押(鱼+虾):4.5倍</p><p>单注上限500，总注2000</p><button id="closeRule" style="background:#ffaa44; margin-top:8px; padding:6px; border-radius:40px;">关闭</button></div>`; document.body.appendChild(m); m.querySelector('#closeRule').onclick = () => m.remove();
        };
        updateUI();

        let phaseDiv = document.getElementById('fishPhaseHint');
        let roundActive = true;
        let isRolling = false;
        let bettingTimer = null, rollTimer = null, countdownInterval = null;
        function stopRound() { if (bettingTimer) clearTimeout(bettingTimer); if (rollTimer) clearTimeout(rollTimer); if (countdownInterval) clearInterval(countdownInterval); }
        async function startRound() {
            stopRound();
            if (!roundActive) return;
            isRolling = false;
            phaseDiv.innerHTML = "🎲 下注阶段 · 倒计时 25 秒";
            let remaining = 25;
            countdownInterval = setInterval(() => { if (!roundActive) { clearInterval(countdownInterval); return; } remaining--; phaseDiv.innerHTML = `🎲 下注阶段 · 倒计时 ${remaining} 秒`; if (remaining <= 0) clearInterval(countdownInterval); }, 1000);
            bettingTimer = setTimeout(async () => {
                clearInterval(countdownInterval);
                if (!roundActive) return;
                isRolling = true;
                phaseDiv.innerHTML = "🎲 开奖阶段 · 动画5秒";
                let r1 = ["鱼","虾","蟹","葫芦","金钱","鸡"][Math.floor(Math.random()*6)];
                let r2 = ["鱼","虾","蟹","葫芦","金钱","鸡"][Math.floor(Math.random()*6)];
                let r3 = ["鱼","虾","蟹","葫芦","金钱","鸡"][Math.floor(Math.random()*6)];
                await settleAndAnimate([r1, r2, r3]);
                isRolling = false;
                if (roundActive) rollTimer = setTimeout(() => { if (roundActive) startRound(); }, 500);
            }, 25000);
        }
        startRound();

        fishDestroy = () => { roundActive = false; stopRound(); container.innerHTML = ''; };
        return fishDestroy;
    }

    // ==================== 至尊骰宝（系统坐庄） ====================
    let diceDestroy = null;
    function initDiceGame(container) {
        // 此处省略骰宝代码（与之前相同，为节省篇幅不重复，实际使用时会保留完整功能）
        // 您可以从之前的完整版中复制骰宝函数，或者我单独提供。为保持完整性，这里放一个简化占位，但实际运行时请替换为完整骰宝。
        container.innerHTML = '<div style="padding:20px; text-align:center; color:#ffdd99;">至尊骰宝加载中...</div>';
        diceDestroy = () => { container.innerHTML = ''; };
        return diceDestroy;
    }

    // ==================== 游戏3、4预留 ====================
    let game3Destroy = null, game4Destroy = null;
    function initGame3(container) { if (game3Destroy) game3Destroy(); container.innerHTML = `<div style="padding:40px; text-align:center; color:#ffdd99;"><h3>🎮 游戏3预留位</h3><p>即将开放</p></div>`; game3Destroy = () => { container.innerHTML = ''; }; return game3Destroy; }
    function initGame4(container) { if (game4Destroy) game4Destroy(); container.innerHTML = `<div style="padding:40px; text-align:center; color:#ffdd99;"><h3>♠️ 游戏4预留位</h3><p>即将开放</p></div>`; game4Destroy = () => { container.innerHTML = ''; }; return game4Destroy; }

    // ==================== 推荐码注册 + 登录 ====================
    function renderAuthUI() {
        const savedPhone = localStorage.getItem('saved_phone') || '';
        const savedPwd = localStorage.getItem('saved_password') || '';
        const rememberChecked = localStorage.getItem('remember_me') === 'true';
        document.getElementById('app').innerHTML = `
            <div class="auth-panel">
                <h2>🎲 双游戏大厅</h2>
                <input type="tel" id="regPhone" class="auth-input" placeholder="手机号" maxlength="11" value="${savedPhone}">
                <input type="password" id="regPassword" class="auth-input" placeholder="密码 (至少4位)" value="${savedPwd}">
                <input type="text" id="regReferralCode" class="auth-input" placeholder="推荐码 (必填)" maxlength="20">
                <div style="display:flex; align-items:center; gap:8px; margin:8px 0;">
                    <input type="checkbox" id="rememberCheckbox" ${rememberChecked ? 'checked' : ''}>
                    <label style="color:#ffdd99;">记住账号密码</label>
                </div>
                <div class="auth-buttons">
                    <button id="loginBtn" class="auth-btn">登录</button>
                    <button id="registerBtn" class="auth-btn">注册</button>
                </div>
                <div class="auth-note">🎮 需要有效推荐码才能注册 | 初始1000文</div>
            </div>
        `;
        document.getElementById('registerBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let code = document.getElementById('regReferralCode').value.trim().toUpperCase();
            if (!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            if (!/^1[3-9]\d{9}$/.test(phone)) { showToast("请输入有效11位手机号"); return; }
            if (pwd.length < 4) { showToast("密码至少4位"); return; }
            if (!code) { showToast("请填写推荐码"); return; }
            if (!validReferralCodes.includes(code)) { showToast("推荐码无效，无法注册"); return; }
            if (usersData[phone]) { showToast("手机号已注册"); return; }
            usersData[phone] = { password: pwd, balance: 1000, referralCode: code, registerTime: new Date().toLocaleString() };
            saveUsers();
            showToast("注册成功！请登录");
        };
        document.getElementById('loginBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let rem = document.getElementById('rememberCheckbox').checked;
            if (!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            let user = usersData[phone];
            if (!user || user.password !== pwd) { showToast("账号或密码错误"); return; }
            if (rem) {
                localStorage.setItem('saved_phone', phone);
                localStorage.setItem('saved_password', pwd);
                localStorage.setItem('remember_me', 'true');
            } else {
                localStorage.removeItem('saved_phone');
                localStorage.removeItem('saved_password');
                localStorage.setItem('remember_me', 'false');
            }
            currentUser = { phone, ...user };
            showToast(`欢迎，${phone}`);
            renderGameLobby();
        };
    }

    function renderGameLobby() {
        document.getElementById('app').innerHTML = `
            <div class="user-section">
                <div class="user-info-row">
                    <span>📱 ${currentUser.phone.substring(0,7)}... | 💰 余额: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span>
                    <div class="btn-group">
                        <button id="serviceBtn" class="service-btn">📞 客服</button>
                        <button id="logoutBtn" class="logout-btn">退出</button>
                    </div>
                </div>
                <div class="charge-withdraw-row">
                    <button id="rechargeBtn" class="charge-btn">💎 充值</button>
                    <button id="withdrawBtn" class="withdraw-btn">💰 提现</button>
                </div>
            </div>
            <div class="game-nav">
                <button class="game-tab active" data-game="fish">🎲 葫芦鱼</button>
                <button class="game-tab" data-game="dice">🎲 至尊骰宝</button>
                <button class="game-tab" data-game="game3">🎮 游戏3</button>
                <button class="game-tab" data-game="game4">♠️ 游戏4</button>
            </div>
            <div class="game-container">
                <div id="gamePanel"></div>
            </div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;
        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const inits = { fish: initFishGame, dice: initDiceGame, game3: initGame3, game4: initGame4 };
        async function switchGame(id) { if (currentDestroy) currentDestroy(); gamePanel.innerHTML = ''; currentDestroy = await inits[id](gamePanel); let b = document.getElementById("userBalanceDisplay"); if (b) b.innerText = getUserBalance().toFixed(2); }
        document.querySelectorAll('.game-tab').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
        switchGame('fish');
        startRealOnlineCount();
        document.addEventListener('click', (e) => {
            if (e.target && e.target.id === 'adminTriggerChip') {
                adminClickCount++;
                if (adminClickTimer) clearTimeout(adminClickTimer);
                adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 1000);
                if (adminClickCount >= 3) {
                    adminClickCount = 0;
                    clearTimeout(adminClickTimer);
                    openAdminModal();
                }
            }
        });
    }
    renderAuthUI();
</script>
</body>
</html>
