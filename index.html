<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙虎争霸·史诗对决</title>
    <style>
        :root {
            --jade: #4a7c64; --jade-l: #6b9a85; --jade-d: #2c4a3b;
            --stone: #6b737e; --inner: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            --gold: #f1c40f; --red: #ff4d4d; --blue: #3498db; --tiger: #e67e22; --tie: #9b59b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { background: #0c0c0c; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* 整体外框 */
        .container-outer {
            width: 100vw; height: 100vh; max-width: 480px;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%;
            animation: outerRotate 15s linear infinite;
            padding: 6px; border-radius: 18px;
            box-shadow: 0 0 50px rgba(255,255,255,0.6);
        }
        @keyframes outerRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 内部容器 */
        .container {
            width: 100%; height: 100%;
            background: var(--jade);
            border-radius: 15px;
            display: flex; flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* 状态栏 */
        .header { height: 8%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 8px 12px; }
        .box { background: var(--stone); border: 2px solid var(--jade-d); box-shadow: var(--inner); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px;
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        .box span:first-child { font-size: 12px; color: #ccc; font-weight: bold; letter-spacing: 1px; }
        .box span:last-child { font-size: 20px; color: var(--gold); text-shadow: 0 0 6px var(--gold); font-weight: bold; }

        /* ================== 史诗龙虎对决区 ================== */
        .battle-scene { 
            height: 38%; margin: 4px 10px;
            border: 3px solid var(--jade-d); border-radius: 12px;
            position: relative; overflow: hidden;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }
        /* 背景层 */
        .scene-bg {
            position: absolute; width: 100%; height: 100%;
            background: url("https://picsum.photos/id/1036/800/400") center/cover no-repeat;
            opacity: 0.3;
        }
        /* 山峦远景 */
        .mountains {
            position: absolute; width: 100%; height: 100%;
            background: url("https://picsum.photos/id/1018/800/400") bottom/cover no-repeat;
            opacity: 0.6;
        }
        /* 云雾特效 */
        .fog {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, transparent 100%);
            animation: fogFlow 20s linear infinite;
        }
        @keyframes fogFlow {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }
        /* 龙元素 */
        .dragon {
            position: absolute; left: 50px; top: 50%; transform: translateY(-50%);
            width: 120px; height: 120px;
            z-index: 10;
        }
        .dragon img {
            width: 100%; height: 100%;
            content: url("https://picsum.photos/id/1003/200/200");
            filter: drop-shadow(0 0 15px var(--blue)) drop-shadow(0 0 30px rgba(52,152,219,0.6));
            animation: dragonMove 8s ease-in-out infinite;
        }
        @keyframes dragonMove {
            0% { transform: rotate(-5deg) translateY(0); }
            25% { transform: rotate(5deg) translateY(-5px); }
            50% { transform: rotate(-5deg) translateY(0); }
            75% { transform: rotate(5deg) translateY(5px); }
            100% { transform: rotate(-5deg) translateY(0); }
        }
        /* 虎元素 */
        .tiger {
            position: absolute; right: 50px; top: 50%; transform: translateY(-50%);
            width: 120px; height: 120px;
            z-index: 10;
        }
        .tiger img {
            width: 100%; height: 100%;
            content: url("https://picsum.photos/id/1005/200/200");
            filter: drop-shadow(0 0 15px var(--tiger)) drop-shadow(0 0 30px rgba(230,126,34,0.6));
            animation: tigerMove 6s ease-in-out infinite;
        }
        @keyframes tigerMove {
            0% { transform: rotate(5deg) translateY(0); }
            25% { transform: rotate(-5deg) translateY(-5px); }
            50% { transform: rotate(5deg) translateY(0); }
            75% { transform: rotate(-5deg) translateY(5px); }
            100% { transform: rotate(5deg) translateY(0); }
        }
        /* 对决光效 */
        .clash-light {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,0,0.8), rgba(255,0,0,0.8));
            filter: blur(20px);
            opacity: 0;
            z-index: 5;
        }
        .clash-light.active { animation: clashFlash 1.5s ease-out forwards; }
        @keyframes clashFlash {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
        }
        /* 胜利光效 */
        .win-light {
            position: absolute; width: 150px; height: 150px;
            border-radius: 50%; filter: blur(30px);
            opacity: 0; z-index: 5;
        }
        .win-light.dragon { left: 50px; top: 50%; transform: translateY(-50%); background: rgba(52,152,219,0.8); }
        .win-light.tiger { right: 50px; top: 50%; transform: translateY(-50%); background: rgba(230,126,34,0.8); }
        .win-light.tie { left: 50%; top: 50%; transform: translate(-50%, -50%); background: rgba(155,89,182,0.8); }
        .win-light.active { animation: winGlow 2s ease-in-out infinite; }
        @keyframes winGlow {
            0% { opacity: 0.5; transform: translateY(-50%) scale(1); }
            50% { opacity: 1; transform: translateY(-50%) scale(1.2); }
            100% { opacity: 0.5; transform: translateY(-50%) scale(1); }
        }
        /* 结果文字 */
        .result-text {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            font-size: 20px; color: #fff; font-weight: bold;
            text-shadow: 0 0 10px var(--gold), 0 0 20px rgba(241,196,15,0.8);
            z-index: 20;
            background: rgba(0,0,0,0.5); padding: 2px 15px; border-radius: 10px;
        }
        /* ===================================================== */

        /* 操作区 */
        .play-section {
            flex: 1; display: flex; flex-direction: column;
            background: var(--stone); box-shadow: var(--inner); border: 3px solid var(--jade-d); 
            border-radius: 12px; margin: 4px 10px 8px 10px; padding: 12px;
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        /* 龙虎和选择 */
        .choice-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .choice-btn {
            background: rgba(0,0,0,0.35); border: 3px solid var(--jade-d); border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; font-weight: 900; cursor: pointer;
            transition: all 0.2s;
        }
        .choice-btn.dragon { color: var(--blue); text-shadow: 0 0 15px var(--blue); }
        .choice-btn.tiger { color: var(--tiger); text-shadow: 0 0 15px var(--tiger); }
        .choice-btn.tie { color: var(--tie); text-shadow: 0 0 15px var(--tie); }
        .choice-btn.active { border-color: var(--gold); background: rgba(255,255,255,0.1); transform: scale(0.97); }
        /* 数据显示 */
        .data-row { display: grid; grid-template-rows: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        .data-item { background: rgba(0,0,0,0.6); border: 2px solid var(--jade-d); border-radius: 8px; padding: 0 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .data-item label { color: #ccc; font-size: 12px; font-weight: bold; }
        .data-item span { color: var(--gold); font-size: 18px; font-weight: bold; text-shadow: 0 0 6px var(--gold); }
        /* 押注金额 */
        .bet-txt { text-align: center; color: #eee; font-size: 16px; font-weight: bold; margin: 8px 0; }
        .bet-txt span { color: var(--gold); font-size: 20px; text-shadow: 0 0 8px var(--gold); }
        /* 功能按键 */
        .btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn {
            flex: 1; height: 52px; background: var(--jade); border: 3px solid var(--jade-d); border-radius: 10px;
            color: #fff; font-size: 22px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .btn:active { transform: translateY(2px); }
        .main-btn { background: linear-gradient(180deg, #e53935, #b71c1c); border: none; box-shadow: 0 5px 0 #7f0000; }
        .main-btn:active { box-shadow: 0 1px 0 #7f0000; }
        /* 模式选择 */
        .mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mode-btn {
            background: rgba(0,0,0,0.4); border: 2px solid var(--jade-d); border-radius: 8px;
            color: #aaa; font-size: 16px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .mode-btn.active { border-color: var(--gold); color: #fff; }
        .speed-btn { display: flex; gap: 5px; }
        .speed-btn span { width: 33%; height: 100%; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .speed-btn span.active { background: var(--gold); color: #000; }
    </style>
</head>
<body>
<div class="container-outer">
    <div class="container">
        <!-- 状态栏 -->
        <div class="header">
            <div class="box"><span>账户余额</span><span>857.80</span></div>
            <div class="box"><span>奖池累积</span><span>84291.50</span></div>
        </div>

        <!-- 史诗对决区 -->
        <div class="battle-scene">
            <div class="scene-bg"></div>
            <div class="mountains"></div>
            <div class="fog"></div>
            <div class="dragon"><img alt="龙"></div>
            <div class="tiger"><img alt="虎"></div>
            <div class="clash-light"></div>
            <div class="win-light dragon"></div>
            <div class="win-light tiger"></div>
            <div class="win-light tie"></div>
            <div class="result-text">龙虎争霸·一触即发</div>
        </div>

        <!-- 操作区 -->
        <div class="play-section">
            <div class="choice-row">
                <div class="choice-btn dragon" onclick="setChoice('dragon')">龙</div>
                <div class="choice-btn tie" onclick="setChoice('tie')">和</div>
                <div class="choice-btn tiger" onclick="setChoice('tiger')">虎</div>
            </div>

            <div class="data-row">
                <div class="data-item"><label>当前押注</label><span>0.00</span></div>
                <div class="data-item"><label>预计奖金</label><span>0.00</span></div>
                <div class="data-item"><label>当前选择</label><span>未选择</span></div>
            </div>

            <div class="bet-txt">押注金额：<span>100</span> USDT</div>
            
            <div class="btn-row">
                <button class="btn" onclick="changeBet(-1)">-</button>
                <button class="btn main-btn" onclick="startBattle()">确认投注</button>
                <button class="btn" onclick="changeBet(1)">+</button>
            </div>

            <div class="mode-row">
                <div class="mode-btn" onclick="toggleAuto()">自动投注</div>
                <div class="mode-btn speed-btn">
                    <span class="active">1X</span>
                    <span>2X</span>
                    <span>3X</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let balance = 857.8;
let betAmounts = [10, 50, 100, 500, 1000];
let currentBet = 2;
let selected = null;
let isRunning = false;
let autoMode = false;
let speed = 1;

// 设置投注选择
function setChoice(type) {
    if(isRunning) return;
    selected = type;
    document.querySelectorAll('.choice-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.choice-btn.${type}`).classList.add('active');
    document.querySelector('.data-item:last-child span').textContent = type === 'dragon' ? '龙' : type === 'tiger' ? '虎' : '和';
}

// 调整押注金额
function changeBet(dir) {
    if(isRunning) return;
    currentBet = Math.max(0, Math.min(betAmounts.length-1, currentBet + dir));
    document.querySelector('.bet-txt span').textContent = betAmounts[currentBet];
}

// 开始对决
function startBattle() {
    if(isRunning) { alert('对决进行中，请稍候'); return; }
    if(!selected) { alert('请先选择投注项'); return; }
    
    const betVal = betAmounts[currentBet];
    if(balance < betVal) { alert('余额不足'); return; }

    isRunning = true;
    balance -= betVal;
    document.querySelector('.box:first-child span:last-child').textContent = balance.toFixed(2);
    document.querySelector('.data-item:first-child span').textContent = betVal.toFixed(2);
    
    const winVal = betVal * (selected === 'tie' ? 8 : 1);
    document.querySelector('.data-item:nth-child(2) span').textContent = winVal.toFixed(2);

    // 触发对决特效
    const clashLight = document.querySelector('.clash-light');
    clashLight.classList.add('active');
    
    // 随机判定结果
    const result = ['dragon','tiger','tie'][Math.floor(Math.random()*3)];
    let resultTxt = '';
    if(result === 'dragon') {
        resultTxt = '龙威盖世·大胜而归';
        document.querySelector('.win-light.dragon').classList.add('active');
    } else if(result === 'tiger') {
        resultTxt = '虎啸山林·力压群雄';
        document.querySelector('.win-light.tiger').classList.add('active');
    } else {
        resultTxt = '势均力敌·握手言和';
        document.querySelector('.win-light.tie').classList.add('active');
    }
    document.querySelector('.result-text').textContent = resultTxt;

    // 结算
    setTimeout(() => {
        isRunning = false;
        if(result === selected) {
            balance += winVal;
            document.querySelector('.box:first-child span:last-child').textContent = balance.toFixed(2);
        }
        
        // 重置特效
        clashLight.classList.remove('active');
        document.querySelectorAll('.win-light').forEach(l => l.classList.remove('active'));
        
        // 自动模式继续
        if(autoMode) setTimeout(startBattle, speed === 3 ? 1500 : speed === 2 ? 2500 : 3500);
    }, speed === 3 ? 1000 : speed === 2 ? 2000 : 3000);
}

// 自动模式
function toggleAuto() {
    autoMode = !autoMode;
    const btn = document.querySelector('.mode-btn:first-child');
    btn.classList.toggle('active');
    btn.textContent = autoMode ? '关闭自动' : '自动投注';
}

// 切换速度
function toggleSpeed() {
    speed = (speed % 3) + 1;
    document.querySelectorAll('.speed-btn span').forEach(s => s.classList.remove('active'));
    document.querySelector(`.speed-btn span:nth-child(${speed})`).classList.add('active');
}
</script>
</body>
</html>
