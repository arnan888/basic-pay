<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>龙虎斗 · 管理版</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    padding: 16px;
}

/* 外框 - 沉稳内敛光效 */
.container-outer {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    background: linear-gradient(145deg, #0f0f17, #08080c);
    border-radius: 32px;
    padding: 14px;
    box-shadow: 0 20px 35px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
}

/* 静态熔岩光晕 */
.container-outer::after {
    content: '';
    position: absolute;
    top: -3px;
    left: -3px;
    right: -3px;
    bottom: -3px;
    background: radial-gradient(circle at 30% 20%, rgba(255, 80, 40, 0.55), rgba(255, 50, 30, 0.2), transparent 70%);
    border-radius: 34px;
    z-index: -1;
    animation: none;
    filter: blur(18px);
    opacity: 0.65;
}

.container {
    background: #0f0f16;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.5), inset 0 0 4px rgba(255,255,255,0.05);
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
}

.battle-scene {
    position: relative;
    margin: 18px;
    border-radius: 24px;
    overflow: hidden;
    background: #030308;
    height: 32vh;
    min-height: 200px;
    flex-shrink: 0;
    box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 0 40px rgba(255,80,40,0.2);
}
.scene-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 40%, #1a1218, #050508);
    z-index: 1;
}
.dragon-word, .tiger-word {
    position: absolute;
    bottom: 20px;
    font-size: 64px;
    font-weight: 900;
    text-shadow: 0 0 20px currentColor, 0 0 40px currentColor, 6px 6px 0 rgba(0,0,0,0.5);
    z-index: 15;
    transition: all 0.12s cubic-bezier(0.34, 1.2, 0.64, 1);
    opacity: 0.98;
    letter-spacing: 4px;
}
.dragon-word { left: 18px; color: #ff3366; text-shadow: 0 0 20px #ff3366, 0 0 40px #ff1144; }
.tiger-word { right: 18px; color: #33aaff; text-shadow: 0 0 20px #33aaff, 0 0 40px #0088ff; }
.highlight-win {
    transform: scale(1.35);
    text-shadow: 0 0 55px currentColor, 0 0 90px currentColor, 8px 8px 0 rgba(0,0,0,0.4);
    opacity: 1;
    filter: drop-shadow(0 0 12px gold);
}
.battle-result {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,10,20,0.85);
    backdrop-filter: blur(12px);
    padding: 6px 24px;
    border-radius: 60px;
    color: #ffcc88;
    font-weight: bold;
    font-size: 20px;
    z-index: 25;
    white-space: nowrap;
    border: 1px solid #ffaa55;
    box-shadow: 0 0 30px rgba(255,170,85,0.5);
    transition: all 0.1s ease;
    pointer-events: none;
    font-family: monospace;
    letter-spacing: 2px;
}
.battle-result.pop {
    transform: translateX(-50%) scale(1.15);
    background: rgba(255,180,60,0.95);
    color: #120f1a;
    box-shadow: 0 0 45px #ffcc44;
}
.flash-gold {
    animation: goldFlash 0.28s ease-out;
}
@keyframes goldFlash {
    0% { box-shadow: 0 0 0 0 #ffcc33, background-color: transparent; }
    40% { box-shadow: 0 0 0 14px rgba(255,200,0,0.7); background-color: rgba(255,210,0,0.2); }
    100% { box-shadow: 0 0 0 0 rgba(255,200,0,0); background-color: transparent; }
}

.bet-section {
    background: #0c0c14;
    margin: 16px 18px 20px 18px;
    border-radius: 28px;
    padding: 18px 14px;
    box-shadow: inset 2px 2px 6px rgba(0,0,0,0.5), inset -2px -2px 4px rgba(255,255,255,0.02), 0 8px 18px rgba(0,0,0,0.4);
    max-height: calc(100vh - 280px);
    overflow-y: auto;
}

.account-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #09090f;
    border-radius: 40px;
    padding: 10px 20px;
    margin-bottom: 24px;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.6), inset 0 0 2px rgba(255,255,255,0.05), 0 6px 12px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: 0.1s;
}
.account-bar:active { transform: scale(0.99); }
.account-info {
    font-size: 15px;
    color: #c0c0e0;
    font-weight: 500;
}
.account-info span {
    color: #ffcc66;
    font-weight: bold;
    text-shadow: 0 0 6px #ffaa33;
    font-size: 18px;
}
.btn-group {
    display: flex;
    gap: 10px;
}
.btn-sm {
    background: #1e1e2c;
    border: none;
    border-radius: 40px;
    padding: 6px 18px;
    color: #ffecb3;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 3px 4px 8px rgba(0,0,0,0.6), -1px -1px 2px rgba(255,255,255,0.05);
    transition: 0.03s linear;
}
.btn-sm:active {
    transform: translateY(2px);
    box-shadow: inset 2px 2px 5px rgba(0,0,0,0.6);
}

.multi-bet-item {
    flex: 1;
    min-width: 120px;
    background: #13131c;
    border-radius: 32px;
    padding: 14px 8px;
    text-align: center;
    box-shadow: 6px 6px 12px rgba(0,0,0,0.5), -3px -3px 6px rgba(255,255,255,0.02), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: all 0.08s linear;
    margin-bottom: 18px;
    border: 1px solid rgba(255,170,100,0.15);
}
.multi-bet-item.selected {
    background: linear-gradient(135deg, #ffaa44, #ff8844);
    color: #121212;
    transform: scale(0.98);
    box-shadow: 0 0 25px #ffaa44;
    border-color: #ffdd99;
}
.multi-bet-name {
    font-size: 32px;
    font-weight: 900;
    margin-bottom: 10px;
    letter-spacing: 3px;
}
.multi-bet-name.dragon { color: #ff6688; text-shadow: 0 0 6px #ff3366; }
.multi-bet-name.tiger { color: #66aaff; text-shadow: 0 0 6px #33aaff; }
.multi-bet-name.tie { color: #cc88ff; text-shadow: 0 0 6px #aa66ff; }
.multi-bet-item.selected .multi-bet-name { color: #2a1f0a; text-shadow: none; }

.bet-amount-wrapper {
    background: rgba(0,0,0,0.55);
    margin: 12px 0 10px;
    padding: 8px 6px;
    border-radius: 36px;
    border: 1px solid rgba(255,180,70,0.4);
}
.bet-label-text {
    font-size: 12px;
    color: #ffdd99;
    letter-spacing: 2px;
}
.multi-bet-amount {
    font-size: 38px;
    font-weight: 900;
    color: #ffcc66;
    line-height: 1.1;
    text-shadow: 0 0 8px #ffaa33;
}
.multi-bet-item.selected .multi-bet-amount {
    color: #2c2400;
    text-shadow: none;
}
.multi-bet-control {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 12px 0 8px;
}
.multi-bet-control button {
    background: #1a1a28;
    border: none;
    border-radius: 36px;
    padding: 6px 18px;
    color: #ffcc77;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 2px 3px 6px black, -1px -1px 2px rgba(255,255,255,0.05);
    transition: 0.03s linear;
}
.multi-bet-control button:active {
    transform: translateY(2px);
    box-shadow: inset 1px 1px 4px black;
}
.quick-bet-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 12px;
    flex-wrap: wrap;
}
.quick-bet {
    background: #181826;
    border: none;
    border-radius: 40px;
    padding: 6px 18px;
    color: #ffcc77;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 2px 3px 5px black;
}
.quick-bet:active {
    transform: translateY(2px);
    box-shadow: inset 1px 1px 3px black;
}

.data-stack {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 20px 0 16px;
}
.data-item {
    background: #0e0e18;
    border-radius: 28px;
    padding: 14px 8px;
    text-align: center;
    box-shadow: inset 2px 2px 6px rgba(0,0,0,0.6), inset -1px -1px 3px rgba(255,255,255,0.02), 5px 5px 12px black;
}
.data-item label {
    font-size: 14px;
    color: #aa99dd;
}
.data-item value {
    font-size: 32px;
    font-weight: bold;
    color: #ffcc66;
    display: block;
    text-shadow: 0 0 6px #ffaa44;
}
.stake-txt {
    text-align: center;
    font-size: 14px;
    background: #0a0a12;
    display: inline-block;
    width: auto;
    margin: 0 auto 14px;
    padding: 5px 20px;
    border-radius: 36px;
    color: #ffcc99;
}
.timer-text {
    text-align: center;
    font-size: 24px;
    color: #ffdd88;
    margin: 10px 0 10px;
    font-weight: bold;
    text-shadow: 0 0 10px #ff8844;
}
.speed-select {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 10px 0 12px;
}
.speed-btn {
    background: #18182a;
    border: none;
    border-radius: 60px;
    padding: 6px 28px;
    color: #aaaacc;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 3px 3px 6px black;
}
.speed-btn.active {
    background: #ffaa44;
    color: #121212;
    box-shadow: 0 0 15px #ffaa44;
}

.history-area {
    background: #0b0b12;
    border-radius: 32px;
    padding: 16px;
    margin: 16px 0;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.6), 0 4px 12px black;
}
.history-title {
    font-size: 15px;
    color: #ffcc77;
    text-align: center;
    margin-bottom: 14px;
}
.history-grid {
    display: grid;
    grid-template-columns: repeat(10, 34px);
    gap: 8px;
    justify-content: center;
    margin-bottom: 18px;
}
.history-cell {
    width: 34px;
    height: 34px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: bold;
    background: #1a1a28;
    box-shadow: inset 1px 1px 3px black, inset -1px -1px 2px rgba(255,255,255,0.05);
}
.history-cell.dragon { background: #ff3366; color: white; box-shadow: 0 0 12px #ff3366; }
.history-cell.tiger { background: #33aaff; color: white; box-shadow: 0 0 12px #33aaff; }
.history-cell.tie { background: #aa66ff; color: white; box-shadow: 0 0 12px #aa66ff; }
.record-list {
    max-height: 130px;
    overflow-y: auto;
    font-size: 13px;
}
.record-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 15px;
    border-bottom: 1px solid rgba(255,200,100,0.15);
    color: #ddd;
}
.record-win { color: #88ffaa; font-weight: bold; text-shadow: 0 0 3px #00cc66; }
.record-lose { color: #ff8888; font-weight: bold; }

.exec-row {
    display: flex;
    gap: 20px;
    margin: 20px 0 20px;
}
.exec-btn {
    flex: 1;
    padding: 16px 8px;
    border-radius: 50px;
    font-weight: bold;
    font-size: 18px;
    text-align: center;
    cursor: pointer;
    background: #1f1f30;
    color: #f5f0e0;
    border: none;
    box-shadow: 5px 7px 12px rgba(0,0,0,0.6), -2px -2px 4px rgba(255,255,255,0.02);
    transition: 0.04s linear;
}
.exec-btn:active {
    transform: translateY(3px);
    box-shadow: inset 3px 3px 6px black;
}
.main-go {
    background: linear-gradient(135deg, #ff6644, #dd4422);
    color: #fff6cf;
    text-shadow: 0 0 6px #ff8844;
    box-shadow: 0 0 15px #ff6644;
}
.my-history-btn {
    background: #1f5a3e;
    box-shadow: 0 0 8px #44dd88;
}
.bottom-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-top: 18px;
    margin-bottom: 8px;
}
.stat-card {
    background: #12121e;
    border-radius: 30px;
    padding: 12px 8px;
    text-align: center;
    box-shadow: 6px 6px 12px black, -2px -2px 5px rgba(255,255,255,0.02);
}
.stat-card span:first-child {
    display: block;
    font-size: 13px;
    color: #bbaaff;
}
.stat-card span:last-child {
    font-size: 28px;
    font-weight: bold;
    color: #ffcc66;
    text-shadow: 0 0 8px #ffaa44;
}

/* 管理员面板样式 */
.admin-modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
}
.admin-panel {
    background: #12121f;
    width: 90%;
    max-width: 400px;
    border-radius: 48px;
    padding: 24px 20px;
    border: 1px solid #ffaa55;
    box-shadow: 0 0 50px rgba(255,170,0,0.3);
}
.admin-panel h3 {
    color: #ffcc77;
    text-align: center;
    margin-bottom: 20px;
    font-size: 24px;
}
.admin-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 16px 0;
    gap: 12px;
    flex-wrap: wrap;
}
.admin-row label {
    color: #ddd;
    font-weight: bold;
    min-width: 90px;
}
.admin-row input, .admin-row select {
    flex: 1;
    background: #1e1e30;
    border: 1px solid #ffaa66;
    border-radius: 40px;
    padding: 10px 16px;
    color: #ffdd99;
    font-size: 16px;
    outline: none;
}
.admin-row button {
    background: #ffaa44;
    border: none;
    border-radius: 40px;
    padding: 10px 20px;
    font-weight: bold;
    cursor: pointer;
}
.admin-close {
    width: 100%;
    margin-top: 20px;
    background: #333355;
    color: white;
}
.force-result-group {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 12px;
}
.force-btn {
    background: #2a2a4a;
    border: none;
    border-radius: 30px;
    padding: 8px 20px;
    color: #ffcc88;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>
<body>
<div class="container-outer">
    <div class="container">
        <div class="battle-scene">
            <div class="scene-bg"></div>
            <div class="dragon-word" id="dragonWord">龍</div>
            <div class="tiger-word" id="tigerWord">虎</div>
            <div class="battle-result" id="battleResult">⚔️ 霓虹战域 ⚔️</div>
        </div>

        <div class="bet-section">
            <!-- 管理员入口：双击余额栏 -->
            <div class="account-bar" id="adminEntrance">
                <div class="account-info">💰 灵蕴 <span id="balanceAmount">10000</span></div>
                <div class="btn-group">
                    <button class="btn-sm" id="resetGameBtn">重燃</button>
                </div>
            </div>

            <div style="display: flex; gap: 14px; flex-wrap: wrap; justify-content: space-between;">
                <div class="multi-bet-item" data-bet="dragon" id="betDragonItem">
                    <div class="multi-bet-name dragon">🐉 龙</div>
                    <div class="bet-amount-wrapper">
                        <div class="bet-label-text">注码</div>
                        <div class="multi-bet-amount" id="dragonAmount">0</div>
                    </div>
                    <div class="multi-bet-control">
                        <button class="decBet" data-type="dragon">-</button>
                        <button class="incBet" data-type="dragon">+</button>
                    </div>
                    <div class="quick-bet-row">
                        <button class="quick-bet" data-type="dragon" data-val="100">+100</button>
                        <button class="quick-bet" data-type="dragon" data-val="500">+500</button>
                        <button class="quick-bet" data-type="dragon" data-val="1000">+1k</button>
                    </div>
                </div>
                <div class="multi-bet-item" data-bet="tiger" id="betTigerItem">
                    <div class="multi-bet-name tiger">🐅 虎</div>
                    <div class="bet-amount-wrapper">
                        <div class="bet-label-text">注码</div>
                        <div class="multi-bet-amount" id="tigerAmount">0</div>
                    </div>
                    <div class="multi-bet-control">
                        <button class="decBet" data-type="tiger">-</button>
                        <button class="incBet" data-type="tiger">+</button>
                    </div>
                    <div class="quick-bet-row">
                        <button class="quick-bet" data-type="tiger" data-val="100">+100</button>
                        <button class="quick-bet" data-type="tiger" data-val="500">+500</button>
                        <button class="quick-bet" data-type="tiger" data-val="1000">+1k</button>
                    </div>
                </div>
                <div class="multi-bet-item" data-bet="tie" id="betTieItem">
                    <div class="multi-bet-name tie">⚖️ 和</div>
                    <div class="bet-amount-wrapper">
                        <div class="bet-label-text">注码</div>
                        <div class="multi-bet-amount" id="tieAmount">0</div>
                    </div>
                    <div class="multi-bet-control">
                        <button class="decBet" data-type="tie">-</button>
                        <button class="incBet" data-type="tie">+</button>
                    </div>
                    <div class="quick-bet-row">
                        <button class="quick-bet" data-type="tie" data-val="100">+100</button>
                        <button class="quick-bet" data-type="tie" data-val="500">+500</button>
                        <button class="quick-bet" data-type="tie" data-val="1000">+1k</button>
                    </div>
                </div>
            </div>

            <div class="data-stack">
                <div class="data-item"><label>🌀 总下注</label><value id="totalBetAmount">0</value></div>
                <div class="data-item"><label>⚡ 最高连胜</label><value id="maxStreak">0</value></div>
            </div>

            <div class="stake-txt">✨ 流光注码 ✨</div>
            <div class="timer-text" id="timerDisplay">⏱️ 1.5s</div>
            <div class="speed-select">
                <button class="speed-btn" data-speed="1">🐢 1x</button>
                <button class="speed-btn active" data-speed="2">⚡ 2x</button>
                <button class="speed-btn" data-speed="3">🔥 3x</button>
            </div>

            <div class="history-area">
                <div class="history-title">📜 灵境回响</div>
                <div class="history-grid" id="historyGrid"></div>
                <div class="record-list" id="recordList"><div style="text-align:center; color:#aaa;">✨ 无痕 ✨</div></div>
            </div>

            <div class="exec-row">
                <button class="exec-btn main-go" id="startBattleBtn">🐉⚔️🐅 龙虎裁决</button>
                <button class="exec-btn my-history-btn" id="clearStatsBtn">🌊 清空印记</button>
            </div>

            <div class="bottom-stats">
                <div class="stat-card"><span>🏆 总场次</span><span id="totalRounds">0</span></div>
                <div class="stat-card"><span>📈 胜率</span><span id="winRate">0%</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 游戏核心 ----------
    let balance = 10000;
    let dragonBet = 0, tigerBet = 0, tieBet = 0;
    let totalRounds = 0, winCount = 0, currentStreak = 0, maxStreak = 0;
    let historyResults = [];
    let roundRecords = [];
    let currentSpeed = 2;
    let battleTimeout = null;
    let isBattling = false;
    let forceNextResult = null;   // 管理员强制结果 '龙','虎','和'

    // DOM
    const balanceSpan = document.getElementById('balanceAmount');
    const dragonAmountSpan = document.getElementById('dragonAmount');
    const tigerAmountSpan = document.getElementById('tigerAmount');
    const tieAmountSpan = document.getElementById('tieAmount');
    const totalBetSpan = document.getElementById('totalBetAmount');
    const timerDisplay = document.getElementById('timerDisplay');
    const historyGridDiv = document.getElementById('historyGrid');
    const recordListDiv = document.getElementById('recordList');
    const totalRoundsSpan = document.getElementById('totalRounds');
    const winRateSpan = document.getElementById('winRate');
    const maxStreakSpan = document.getElementById('maxStreak');
    const battleResultDiv = document.getElementById('battleResult');
    const dragonWord = document.getElementById('dragonWord');
    const tigerWord = document.getElementById('tigerWord');

    function updateUI() {
        balanceSpan.innerText = Math.floor(balance);
        dragonAmountSpan.innerText = dragonBet;
        tigerAmountSpan.innerText = tigerBet;
        tieAmountSpan.innerText = tieBet;
        totalBetSpan.innerText = dragonBet + tigerBet + tieBet;
        document.querySelectorAll('.multi-bet-item').forEach(el => el.classList.remove('selected'));
        if(dragonBet > 0) document.getElementById('betDragonItem')?.classList.add('selected');
        if(tigerBet > 0) document.getElementById('betTigerItem')?.classList.add('selected');
        if(tieBet > 0) document.getElementById('betTieItem')?.classList.add('selected');
        totalRoundsSpan.innerText = totalRounds;
        let winRateVal = totalRounds === 0 ? 0 : ((winCount / totalRounds)*100).toFixed(1);
        winRateSpan.innerText = winRateVal + '%';
        maxStreakSpan.innerText = maxStreak;
    }

    function updateHistoryVisual() {
        historyGridDiv.innerHTML = '';
        [...historyResults].slice(-10).reverse().forEach(res => {
            let cell = document.createElement('div');
            cell.classList.add('history-cell');
            if(res === '龙') { cell.classList.add('dragon'); cell.innerText = '龍'; }
            else if(res === '虎') { cell.classList.add('tiger'); cell.innerText = '虎'; }
            else if(res === '和') { cell.classList.add('tie'); cell.innerText = '和'; }
            else cell.innerText = '?';
            historyGridDiv.appendChild(cell);
        });
        recordListDiv.innerHTML = roundRecords.length === 0 ? '<div style="text-align:center; color:#aaa;">✨ 无痕 ✨</div>' : '';
        roundRecords.slice().reverse().forEach(rec => {
            let div = document.createElement('div');
            div.className = 'record-item';
            div.innerHTML = `<span>${rec.time}</span><span class="${rec.status === 'win' ? 'record-win' : 'record-lose'}">${rec.status === 'win' ? '✓ +' + rec.profit : '✗ -' + rec.loss}</span>`;
            recordListDiv.appendChild(div);
        });
    }

    function addHistoryRecord(result) { historyResults.unshift(result); if(historyResults.length > 10) historyResults.pop(); updateHistoryVisual(); }
    function addRoundRecord(isWin, profitOrLoss, amount) {
        let timeStr = new Date().toLocaleTimeString().slice(0,8);
        roundRecords.unshift({ time: timeStr, status: isWin ? 'win' : 'lose', profit: profitOrLoss, loss: amount });
        if(roundRecords.length > 15) roundRecords.pop();
        updateHistoryVisual();
    }
    function modifyBet(type, delta) {
        if(isBattling) return;
        let newVal = Math.max(0, (type==='dragon'? dragonBet : type==='tiger'? tigerBet : tieBet) + delta);
        let totalOther = (type!=='dragon'? dragonBet:0) + (type!=='tiger'? tigerBet:0) + (type!=='tie'? tieBet:0);
        if(totalOther + newVal > balance) return;
        if(type === 'dragon') dragonBet = newVal;
        else if(type === 'tiger') tigerBet = newVal;
        else tieBet = newVal;
        updateUI();
    }
    function setQuickBet(type, amount) {
        if(isBattling) return;
        let oldVal = type==='dragon'? dragonBet : type==='tiger'? tigerBet : tieBet;
        let newVal = oldVal + amount;
        let totalOther = (type!=='dragon'? dragonBet:0) + (type!=='tiger'? tigerBet:0) + (type!=='tie'? tieBet:0);
        if(totalOther + newVal > balance) return;
        if(type === 'dragon') dragonBet = newVal;
        else if(type === 'tiger') tigerBet = newVal;
        else tieBet = newVal;
        updateUI();
    }

    function getBattleInterval() { return currentSpeed === 1 ? 2000 : currentSpeed === 2 ? 1500 : 1000; }

    function startBattle() {
        if(isBattling) return;
        let totalBet = dragonBet + tigerBet + tieBet;
        if(totalBet === 0) { battleResultDiv.innerText = '⚠️ 凝注灵蕴 ⚠️'; setTimeout(() => { if(battleResultDiv.innerText === '⚠️ 凝注灵蕴 ⚠️') battleResultDiv.innerText = '⚔️ 霓虹战域 ⚔️'; }, 800); return; }
        if(totalBet > balance) { battleResultDiv.innerText = '❌ 灵蕴不足 ❌'; return; }
        isBattling = true;
        balance -= totalBet;
        updateUI();

        let result = forceNextResult;
        if(!result) {
            let rand = Math.random() * 100;
            if(rand < 45) result = '龙';
            else if(rand < 90) result = '虎';
            else result = '和';
        } else { forceNextResult = null; } // 消耗强制结果

        let winAmount = 0, isPlayerWin = false;
        if(result === '龙' && dragonBet > 0) { winAmount = dragonBet * 2; isPlayerWin = true; }
        else if(result === '虎' && tigerBet > 0) { winAmount = tigerBet * 2; isPlayerWin = true; }
        else if(result === '和' && tieBet > 0) { winAmount = tieBet * 8; isPlayerWin = true; }

        if(isPlayerWin) { balance += winAmount; winCount++; currentStreak++; if(currentStreak > maxStreak) maxStreak = currentStreak; addRoundRecord(true, winAmount, 0); battleResultDiv.innerText = `✨ ${result} 胜 · +${winAmount} ✨`; }
        else { currentStreak = 0; let lossTotal = result === '龙'? dragonBet : (result==='虎'? tigerBet : tieBet); addRoundRecord(false, 0, lossTotal); battleResultDiv.innerText = `🌑 ${result} 噬光 · 败 🌑`; }
        totalRounds++; maxStreak = Math.max(maxStreak, currentStreak);
        addHistoryRecord(result);
        if(result === '龙') { dragonWord.classList.add('highlight-win'); setTimeout(() => dragonWord.classList.remove('highlight-win'), 300); }
        else if(result === '虎') { tigerWord.classList.add('highlight-win'); setTimeout(() => tigerWord.classList.remove('highlight-win'), 300); }
        else { dragonWord.classList.add('highlight-win'); tigerWord.classList.add('highlight-win'); setTimeout(() => { dragonWord.classList.remove('highlight-win'); tigerWord.classList.remove('highlight-win'); }, 300); }
        document.getElementById('battleResult').classList.add('pop'); setTimeout(() => document.getElementById('battleResult').classList.remove('pop'), 200);
        updateUI();
        dragonBet = 0; tigerBet = 0; tieBet = 0; updateUI();
        if(battleTimeout) clearTimeout(battleTimeout);
        battleTimeout = setTimeout(() => { isBattling = false; if(totalRounds >= 0) battleResultDiv.innerText = '⚔️ 霓虹战域 ⚔️'; battleTimeout = null; }, 1500);
    }

    function resetGame() { if(isBattling) return; balance = 10000; dragonBet = tigerBet = tieBet = 0; totalRounds = winCount = currentStreak = maxStreak = 0; historyResults = []; roundRecords = []; updateUI(); updateHistoryVisual(); battleResultDiv.innerText = '✨ 灵蕴重生 ✨'; setTimeout(() => { if(battleResultDiv.innerText === '✨ 灵蕴重生 ✨') battleResultDiv.innerText = '⚔️ 霓虹战域 ⚔️'; }, 1200); if(battleTimeout) clearTimeout(battleTimeout); isBattling = false; }
    function clearStatsOnly() { if(isBattling) return; totalRounds = winCount = currentStreak = maxStreak = 0; historyResults = []; roundRecords = []; updateUI(); updateHistoryVisual(); battleResultDiv.innerText = '🌊 印记归零 🌊'; setTimeout(() => { if(battleResultDiv.innerText === '🌊 印记归零 🌊') battleResultDiv.innerText = '⚔️ 霓虹战域 ⚔️'; }, 1000); }

    // ---------- 管理员面板 ----------
    function showAdminModal() {
        let modal = document.createElement('div');
        modal.className = 'admin-modal';
        modal.innerHTML = `
            <div class="admin-panel">
                <h3>🔐 管理员控制台</h3>
                <div class="admin-row"><label>余额修改</label><input type="number" id="adminBalance" value="${Math.floor(balance)}"><button id="setBalanceBtn">设置</button></div>
                <div class="admin-row"><label>龙赔率(倍数)</label><input type="number" id="dragonOdds" value="2" step="0.5" disabled style="opacity:0.7;"><span style="color:#aaa;">固定2倍</span></div>
                <div class="admin-row"><label>虎赔率</label><input type="number" id="tigerOdds" value="2" disabled></div>
                <div class="admin-row"><label>和赔率</label><input type="number" id="tieOdds" value="8" disabled></div>
                <div class="admin-row"><label>🎲 强制开牌</label>
                    <div class="force-result-group">
                        <button class="force-btn" data-force="龙">🐉 龙</button>
                        <button class="force-btn" data-force="虎">🐅 虎</button>
                        <button class="force-btn" data-force="和">⚖️ 和</button>
                        <button class="force-btn" data-force="null">🚫 取消强制</button>
                    </div>
                </div>
                <div class="admin-row"><label>📊 总场次: ${totalRounds}</label><label>胜率: ${totalRounds===0?0:((winCount/totalRounds)*100).toFixed(1)}%</label></div>
                <button class="admin-close" id="closeAdminBtn">关闭面板</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('setBalanceBtn')?.addEventListener('click', () => {
            let newBal = parseInt(document.getElementById('adminBalance').value);
            if(!isNaN(newBal) && newBal >= 0) { balance = newBal; updateUI(); battleResultDiv.innerText = '⚙️ 余额已修改'; setTimeout(() => { if(battleResultDiv.innerText === '⚙️ 余额已修改') battleResultDiv.innerText = '⚔️ 霓虹战域 ⚔️'; }, 1200); }
            modal.remove();
        });
        modal.querySelectorAll('.force-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let forceVal = btn.getAttribute('data-force');
                if(forceVal === 'null') forceNextResult = null;
                else forceNextResult = forceVal;
                battleResultDiv.innerText = forceNextResult ? `🔮 已强制: ${forceNextResult}` : `🔮 取消强制`;
                setTimeout(() => { if(battleResultDiv.innerText.includes('强制')) battleResultDiv.innerText = '⚔️ 霓虹战域 ⚔️'; }, 1500);
                modal.remove();
            });
        });
        document.getElementById('closeAdminBtn')?.addEventListener('click', () => modal.remove());
    }

    // 入口: 双击余额栏 或 Ctrl+Shift+A
    document.getElementById('adminEntrance')?.addEventListener('dblclick', showAdminModal);
    window.addEventListener('keydown', (e) => { if(e.ctrlKey && e.shiftKey && e.key === 'A') { e.preventDefault(); showAdminModal(); } });

     // 事件绑定
    document.querySelectorAll('.decBet').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); modifyBet(btn.getAttribute('data-type'), -100); }));
    document.querySelectorAll('.incBet').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); modifyBet(btn.getAttribute('data-type'), 100); }));
    document.querySelectorAll('.quick-bet').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); setQuickBet(btn.getAttribute('data-type'), parseInt(btn.getAttribute('data-val'))); }));
    document.getElementById('startBattleBtn')?.addEventListener('click', startBattle);
    document.getElementById('resetGameBtn')?.addEventListener('click', resetGame);
    document.getElementById('clearStatsBtn')?.addEventListener('click', clearStatsOnly);
    document.querySelectorAll('.speed-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentSpeed = parseInt(btn.getAttribute('data-speed')); timerDisplay.innerText = `⏱️ ${(getBattleInterval()/1000).toFixed(1)}s`; }));
    updateUI(); updateHistoryVisual();
</script>
</body>
</html>
