<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虎对决15秒视频版</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            /* 给所有元素加“身份证”，方便定位 */
            position: relative;
        }
        body { 
            background: #000; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        /* 主容器：给个固定大小，锁死！ */
        .game-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 800px;
            background: #4a7c64;
            border-radius: 15px;
            padding: 6px;
            border: 3px solid #2c4a3b;
            display: flex;
            flex-direction: column;
            /* 外层大锁，谁也别想跑 */
            overflow: hidden;
        }

        /* 顶部栏：焊死！ */
        .top-bar {
            height: 8%;
            display: flex;
            gap: 10px;
            padding: 8px 12px;
        }
        .info-card {
            flex: 1;
            background: #6b737e;
            box-shadow: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            border: 2px solid #2c4a3b;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }
        .info-card label { font-size: 12px; color: #ccc; }
        .info-card span { font-size: 20px; color: #f1c40f; text-shadow: 0 0 6px #f1c40f; }

        /* 中间对决区：焊死在这！ */
        .battle-section {
            height: 38%;
            margin: 4px 10px;
            border: 3px solid #2c4a3b;
            border-radius: 12px;
            overflow: hidden;
            /* 锁死位置 */
            position: relative;
            top: 0;
            left: 0;
        }
        /* 视频：钉死在对决区里 */
        #dragonTigerVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 焊死，动都别想动 */
            transform: none !important;
        }
        /* 网格遮罩：也钉死 */
        .grid-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
            z-index: 2;
        }
        /* 结果文字：钉在上面 */
        .result-text {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 2px 15px;
            border-radius: 10px;
        }

        /* 底部操作区：整体锁死 */
        .control-section {
            flex: 1;
            margin: 0 10px 8px 10px;
            background: #6b737e;
            border: 3px solid #2c4a3b;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
        }
        /* 选择区：锁成三列 */
        .choice-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .choice-btn {
            height: 70px;
            background: #333;
            border: 2px solid #2c4a3b;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: bold;
            cursor: pointer;
        }
        .choice-btn.dragon { color: #3498db; text-shadow: 0 0 10px #3498db; }
        .choice-btn.tiger { color: #e67e22; text-shadow: 0 0 10px #e67e22; }
        .choice-btn.tie { color: #9b59b6; text-shadow: 0 0 10px #9b59b6; }
        .choice-btn.active { border-color: #f1c40f; background: #222; }

        /* 数据区：锁成三行 */
        .data-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
        }
        .data-item {
            background: #333;
            border: 2px solid #2c4a3b;
            border-radius: 8px;
            padding: 0 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
        }
        .data-item label { font-size: 12px; color: #ccc; }
        .data-item span { font-size: 18px; color: #f1c40f; text-shadow: 0 0 6px #f1c40f; }

        /* 押注文字：居中锁死 */
        .bet-text {
            text-align: center;
            color: #fff;
            margin: 10px 0;
        }
        .bet-text span { color: #f1c40f; text-shadow: 0 0 8px #f1c40f; }

        /* 按键区：横向锁死 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .func-btn {
            width: 50px;
            height: 50px;
            background: #4a7c64;
            border: 2px solid #2c4a3b;
            border-radius: 8px;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        .main-btn {
            flex: 1;
            background: linear-gradient(#e53935, #b71c1c);
            border: none;
            border-radius: 25px;
            font-size: 20px;
            box-shadow: 0 5px 0 #7f0000;
        }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #7f0000; }

        /* 模式区：分成两列锁死 */
        .mode-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .mode-btn {
            height: 40px;
            background: #333;
            border: 2px solid #2c4a3b;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }
        .mode-btn.active { border-color: #f1c40f; color: #f1c40f; }
        .speed-btn { display: flex; gap: 5px; }
        .speed-btn span { flex: 1; display: flex; justify-content: center; align-items: center; }
        .speed-btn span.active { background: #f1c40f; color: #000; }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 顶部栏：焊死 -->
        <div class="top-bar">
            <div class="info-card">
                <label>账户余额</label>
                <span id="balance">857.80</span>
            </div>
            <div class="info-card">
                <label>奖池累积</label>
                <span>84291.50</span>
            </div>
        </div>

        <!-- 中间对决区：焊死在这 -->
        <div class="battle-section">
            <video id="dragonTigerVideo" autoplay muted loop playsinline>
                <source src="your_dragon_tiger_video.mp4" type="video/mp4">
            </video>
            <div class="grid-mask"></div>
            <div class="result-text">龙虎争霸 · 15秒决胜负</div>
        </div>

        <!-- 底部操作区：焊死 -->
        <div class="control-section">
            <div class="choice-group">
                <div class="choice-btn dragon" onclick="setChoice('dragon')">龙</div>
                <div class="choice-btn tie" onclick="setChoice('tie')">和</div>
                <div class="choice-btn tiger" onclick="setChoice('tiger')">虎</div>
            </div>

            <div class="data-group">
                <div class="data-item">
                    <label>当前押注</label>
                    <span id="currentBet">100.00</span>
                </div>
                <div class="data-item">
                    <label>预计奖金</label>
                    <span id="expectWin">800.00</span>
                </div>
                <div class="data-item">
                    <label>当前选择</label>
                    <span id="currentChoice">未选择</span>
                </div>
            </div>

            <div class="bet-text">押注金额：<span id="betAmount">100</span> USDT</div>

            <div class="btn-group">
                <button class="func-btn" onclick="changeBet(-1)">-</button>
                <button class="func-btn main-btn" onclick="startGame()">确认投注</button>
                <button class="func-btn" onclick="changeBet(1)">+</button>
            </div>

            <div class="mode-group">
                <button class="mode-btn" onclick="toggleAuto()">自动投注</button>
                <div class="mode-btn speed-btn">
                    <span class="active" onclick="setSpeed(1)">1X</span>
                    <span onclick="setSpeed(2)">2X</span>
                    <span onclick="setSpeed(3)">3X</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let balance = 857.8;
        let betLevels = [10,50,100,500,1000];
        let currentBet = 2;
        let selected = null;
        let isRunning = false;
        let autoMode = false;
        let speed = 1;

        function setChoice(type) {
            selected = type;
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.choice-btn.${type}`).classList.add('active');
            document.getElementById('currentChoice').textContent = type==='dragon'?'龙':type==='tiger'?'虎':'和';
            updateWin();
        }

        function changeBet(dir) {
            currentBet = Math.max(0, Math.min(4, currentBet + dir));
            document.getElementById('betAmount').textContent = betLevels[currentBet];
            document.getElementById('currentBet').textContent = betLevels[currentBet].toFixed(2);
            updateWin();
        }

        function updateWin() {
            let win = betLevels[currentBet] * (selected === 'tie' ? 8 : 1);
            document.getElementById('expectWin').textContent = win.toFixed(2);
        }

        function startGame() {
            if(isRunning) return;
            if(!selected) { alert('请选择投注项'); return; }
            
            let bet = betLevels[currentBet];
            if(balance < bet) { alert('余额不足'); return; }

            isRunning = true;
            balance -= bet;
            document.getElementById('balance').textContent = balance.toFixed(2);
            
            document.querySelector('.result-text').textContent = '对决开始 · 风云变幻';
            
            // 15秒后出结果
            setTimeout(() => {
                let res = ['dragon','tiger','tie'][Math.floor(Math.random()*3)];
                let txt = res==='dragon'?'龙威盖世':'tiger'?'虎啸山林':'势均力敌';
                document.querySelector('.result-text').textContent = txt;
                
                if(res === selected) {
                    balance += betLevels[currentBet] * (res==='tie'?8:1);
                    document.getElementById('balance').textContent = balance.toFixed(2);
                }
                isRunning = false;
                if(autoMode) setTimeout(startGame, speed*1000);
            }, 15000);
        }

        function toggleAuto() {
            autoMode = !autoMode;
            let btn = document.querySelector('.mode-btn:first-child');
            btn.classList.toggle('active');
            btn.textContent = autoMode?'关闭自动':'自动投注';
            if(autoMode && !isRunning) startGame();
        }

        function setSpeed(s) {
            speed = s;
            document.querySelectorAll('.speed-btn span').forEach(sp => sp.classList.remove('active'));
            document.querySelector(`.speed-btn span:nth-child(${s})`).classList.add('active');
        }
    </script>
</body>
</html>
