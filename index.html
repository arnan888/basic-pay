<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>双游戏大厅 | 葫芦鱼 + 至尊骰宝</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #1a120c; background-image: radial-gradient(circle at 20% 30%, rgba(200,140,70,0.15) 2%, transparent 2.5%); background-size: 28px 28px; font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif; padding: 12px; }
        .app { max-width: 550px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .game-nav { background: linear-gradient(145deg, #2a241e 0%, #1f1a15 100%); border-radius: 60px; padding: 6px; display: flex; gap: 8px; border: 1px solid #ffaa44; flex-wrap: wrap; }
        .game-tab { flex: 1; background: transparent; border: none; padding: 8px 0; border-radius: 50px; font-weight: bold; font-size: 0.85rem; color: #ccaa77; cursor: pointer; transition: 0.2s; text-align: center; }
        .game-tab.active { background: #c47c3a; color: #2f1b0a; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .user-section { background: #1f1711; border-radius: 40px; padding: 8px 16px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
        .user-info-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .user-info-row span { color: #ffdd99; font-size: 0.75rem; }
        .btn-group { display: flex; gap: 8px; }
        .logout-btn, .service-btn { background: #734c2e; border: none; padding: 4px 12px; border-radius: 30px; color: #ffe3b3; font-size: 0.7rem; cursor: pointer; }
        .service-btn { background: #2e7d32; }
        .charge-withdraw-row { display: flex; gap: 10px; justify-content: center; }
        .charge-btn, .withdraw-btn { background: #c47c3a; border: none; padding: 5px 20px; border-radius: 30px; color: #2f1b0a; font-weight: bold; font-size: 0.75rem; cursor: pointer; flex: 1; text-align: center; box-shadow: 0 2px 0 #764e26; }
        .withdraw-btn { background: #734c2e; color: #ffe3b3; box-shadow: 0 2px 0 #3f2a1a; }
        .game-container { background: linear-gradient(145deg, #362a1f 0%, #251e16 100%); border-radius: 48px; box-shadow: 0 12px 25px rgba(0,0,0,0.5); overflow: hidden; min-height: 550px; }
        .game-panel { display: none; }
        .game-panel.active { display: block; }
        .auth-panel { background: linear-gradient(145deg, #362a1f 0%, #251e16 100%); border-radius: 48px; padding: 30px 20px; text-align: center; border: 2px solid #ffaa44; }
        .auth-panel h2 { color: #ffdd99; font-size: 1.5rem; margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; background: #2a241e; border: 1px solid #ffaa44; border-radius: 40px; color: white; font-size: 0.9rem; text-align: center; }
        .auth-buttons { display: flex; gap: 12px; margin: 20px 0; }
        .auth-btn { flex: 1; background: #c47c3a; border: none; padding: 10px; border-radius: 40px; color: #2f1b0a; font-weight: bold; cursor: pointer; }
        .auth-note { color: #aa8855; font-size: 0.65rem; }
        /* 葫芦鱼样式 */
        .fish-wrapper .chip { background: #ebbc7e; color: #3a240f; font-weight: bold; font-size: 0.7rem; padding: 3px 10px; border-radius: 35px; cursor: pointer; box-shadow: 0 2px 0 #8b5a2e; display: inline-block; text-align: center; }
        .fish-wrapper .chip.selected { background: #f7c56e; box-shadow: 0 0 0 1px #ffefb0, 0 2px 0 #7a4b22; }
        .fish-wrapper .bet-card { background: #1f1712; border-radius: 28px; padding: 4px 2px; text-align: center; box-shadow: 0 2px 0 #0a0705; border: 1px solid #6f4f34; }
        .fish-wrapper .bet-icon { font-size: 1.4rem; background: #2f231c; width: 36px; height: 36px; line-height: 36px; margin: 0 auto 3px; border-radius: 50%; }
        .fish-wrapper .bet-name { font-size: 0.65rem; font-weight: bold; color: #ffddb0; }
        .fish-wrapper .bet-amount { background: #0c0907; border-radius: 30px; padding: 2px 4px; margin: 4px 3px 0; display: flex; justify-content: space-between; align-items: center; gap: 2px; }
        .fish-wrapper .bet-amount span { color: #ffbc6e; font-size: 0.7rem; background: #2a1c12; padding: 1px 5px; border-radius: 25px; min-width: 32px; }
        .fish-wrapper .btn-chip { background: #523b26; border: none; color: #fce2b4; font-weight: bold; width: 24px; height: 24px; border-radius: 25px; font-size: 0.8rem; cursor: pointer; }
        .fish-wrapper .seat-card { background: #1a130d; border-radius: 16px; padding: 4px 2px; text-align: center; border: 1px solid #6f4f34; }
        .fish-wrapper .seat-card.occupied { background: #2f4127; border: 1px solid #ffaa55; }
        .fish-wrapper .seat-number { font-size: 0.5rem; color: #dba24b; }
        /* 骰宝样式 */
        .dice-wrapper .dice { width: 60px; height: 60px; position: relative; transform-style: preserve-3d; }
        .dice-wrapper .dice-face { position: absolute; width: 60px; height: 60px; background: linear-gradient(145deg, #fffff0, #f5f5dc); border-radius: 12px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; border: 1px solid rgba(200,180,120,0.5); }
        .dice-wrapper .front { transform: translateZ(30px); }
        .dice-wrapper .back { transform: rotateY(180deg) translateZ(30px); }
        .dice-wrapper .right { transform: rotateY(90deg) translateZ(30px); }
        .dice-wrapper .left { transform: rotateY(-90deg) translateZ(30px); }
        .dice-wrapper .top { transform: rotateX(90deg) translateZ(30px); }
        .dice-wrapper .bottom { transform: rotateX(-90deg) translateZ(30px); }
        .dice-wrapper .pip { position: absolute; width: 9px; height: 9px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #e74c3c, #c0392b); }
        .dice-wrapper .chip.selected-chip { box-shadow: 0 0 0 3px #ffaa44; transform: scale(1.02); }
        .dice-wrapper .countdown-warning { animation: warning 0.5s infinite; color: #ff3300 !important; }
        @keyframes warning { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
        .result-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.6); background: linear-gradient(145deg, #ffcc44, #ff9933); color: #1a1a2a; padding: 24px 40px; border-radius: 80px; font-size: 2rem; font-weight: 900; z-index: 2000; opacity: 0; transition: 0.25s; pointer-events: none; }
        .result-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #000000cc; color: #ffaa44; padding: 8px 16px; border-radius: 40px; z-index: 2001; animation: fadeInOut 2s forwards; }
        @keyframes fadeInOut { 0% { opacity:0; transform: translateX(-50%) translateY(20px); } 15% { opacity:1; transform: translateX(-50%) translateY(0); } 85% { opacity:1; } 100% { opacity:0; transform: translateX(-50%) translateY(-20px); } }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: #1a2a1a; border-radius: 32px; padding: 20px; border: 1px solid #ffaa44; width: 85%; max-width: 340px; color: #fff; }
        @media (max-width: 480px) {
            .dice-wrapper .dice { width: 50px; height: 50px; }
            .dice-wrapper .dice-face { width: 50px; height: 50px; }
            .dice-wrapper .front { transform: translateZ(25px); }
            .dice-wrapper .back { transform: rotateY(180deg) translateZ(25px); }
            .dice-wrapper .right { transform: rotateY(90deg) translateZ(25px); }
            .dice-wrapper .left { transform: rotateY(-90deg) translateZ(25px); }
            .dice-wrapper .top { transform: rotateX(90deg) translateZ(25px); }
            .dice-wrapper .bottom { transform: rotateX(-90deg) translateZ(25px); }
        }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
    // ==================== 全局用户系统 ====================
    const USERS_KEY = 'double_games_final';
    let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
    let currentUser = null;

    function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0; }
    function setUserBalance(amt) { if(currentUser) { usersData[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#000000cc;backdrop-filter:blur(10px);color:#ffaa44;padding:8px 16px;border-radius:40px;font-size:0.7rem;z-index:2001;border:1px solid #ffaa44;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    function showService() { showToast("📞 客服热线: 400-888-XXXX"); }
    function recharge() { showToast("💎 充值请联系管理员"); }
    function withdraw() { showToast("💰 提现请联系管理员"); }

    // ==================== 游戏一：潮汕葫芦鱼（完整） ====================
    let fishDestroy = null, fishInterval = null;
    function initFishGame(container) {
        if (fishDestroy) fishDestroy();
        container.innerHTML = '';
        const fishHTML = `
            <div class="fish-wrapper">
                <div class="stats-panel" style="display:flex; justify-content:space-between; gap:6px; padding:8px 12px; background:#1f1711; border-bottom:1px solid #644a33;">
                    <div class="stat-card" style="background:#1a130d; border-radius:30px; padding:4px 8px; flex:1; text-align:center;"><div class="stat-label" style="font-size:0.55rem; color:#e2bc89;">💰 庄家余额</div><div class="stat-value" id="fishBalanceValue" style="font-size:1rem; font-weight:800; color:#f9d792;">10000</div></div>
                    <div class="stat-card" style="background:#1a130d; border-radius:30px; padding:4px 8px; flex:1; text-align:center;"><div class="stat-label" style="font-size:0.55rem; color:#e2bc89;">🎲 总押注</div><div class="stat-value" id="totalBetValue">0</div></div>
                    <div class="stat-card" style="background:#1a130d; border-radius:30px; padding:4px 8px; flex:1; text-align:center;"><div class="stat-label" style="font-size:0.55rem; color:#e2bc89;">🏆 上局净利</div><div class="stat-value" id="lastWinValue">0</div></div>
                </div>
                <div class="dice-area" style="background:#2a211a; margin:12px 12px 8px; border-radius:50px; padding:12px; text-align:center; box-shadow:inset 0 0 0 2px #5e4230, 0 6px 12px black; position:relative;">
                    <div class="dice-title" style="font-size:0.65rem; color:#f5c28e; margin-bottom:6px;">⚡ 三骰开彩 · 鱼虾蟹葫芦金钱鸡 ⚡</div>
                    <div class="dice-box" style="display:flex; justify-content:center; gap:12px; position:relative;">
                        <div class="dice" style="background:#fff2df; width:70px; height:70px; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:2.8rem; box-shadow:0 5px 0 #926b42;">🎲</div>
                        <div class="dice" style="background:#fff2df; width:70px; height:70px; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:2.8rem; box-shadow:0 5px 0 #926b42;">🎲</div>
                        <div class="dice" style="background:#fff2df; width:70px; height:70px; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:2.8rem; box-shadow:0 5px 0 #926b42;">🎲</div>
                    </div>
                    <div id="fishDiceCover" style="position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at 30% 30%, rgba(0,0,0,0.9), #2c1e14); backdrop-filter:blur(6px); border-radius:50px; display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:15; transition:all 0.5s; border:2px solid #cb9e6b;">
                        <span style="font-size:3rem;">🏺</span><div class="cover-text" style="font-size:0.65rem; background:#00000099; padding:2px 12px; border-radius:30px; margin-top:6px;">骰盅未开</div>
                    </div>
                </div>
                <div class="bet-sections" style="padding:0 12px 8px;">
                    <div class="section-title" style="font-size:0.7rem; color:#ffd49f; margin:8px 0 6px 4px; border-left:3px solid #f7b05e; padding-left:8px;">🐟 六门押注 (按次数赔)</div>
                    <div class="bet-grid" id="patternGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px;"></div>
                    <div class="section-title" style="font-size:0.7rem; color:#ffd49f; margin:8px 0 6px 4px; border-left:3px solid #f7b05e; padding-left:8px;">🎯 特殊投注</div>
                    <div class="special-grid" id="specialGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px;"></div>
                </div>
                <div class="chip-bar" style="background:#2a1f16; margin:6px 12px 10px; padding:6px 8px; border-radius:40px; display:flex; justify-content:center; gap:8px; flex-wrap:wrap;">
                    <div class="chip" data-chip="20">20</div><div class="chip" data-chip="50">50</div><div class="chip" data-chip="100" class="selected">100</div>
                    <div class="chip" data-chip="500">500</div><div class="chip" data-chip="1000" id="adminTriggerChip" style="background:radial-gradient(#e74c3c, #c0392b); color:#fff;">1k</div>
                </div>
                <div class="action-bar" style="display:flex; justify-content:center; gap:8px; padding:6px 12px 14px; flex-wrap:wrap;">
                    <button id="fishRollBtn" class="action-btn primary" style="background:#c47c3a; border:none; padding:5px 14px; border-radius:35px; color:#2f1b0a; box-shadow:0 3px 0 #764e26; cursor:pointer;">🎲 开骰！</button>
                    <button id="fishResetBetBtn" class="action-btn" style="background:#734c2e; border:none; padding:5px 14px; border-radius:35px; color:#ffe3b3; cursor:pointer;">🧹 清空下注</button>
                    <button id="fishResetGameBtn" class="action-btn" style="background:#734c2e; border:none; padding:5px 14px; border-radius:35px; color:#ffe3b3; cursor:pointer;">💺 重置庄家</button>
                </div>
                <div class="message-area" id="fishMsgArea" style="background:#1c140e; margin:0 12px 12px; border-radius:35px; padding:6px 10px; font-size:0.65rem; color:#dbbc8c; text-align:center; min-height:48px;">庄家坐镇 | 骰盅缓慢开启 → 骰子摇动</div>
                <div class="seats-section" style="background:#1e1813; border-radius:48px; overflow:hidden;">
                    <div class="seats-header" style="background:#4a3322; padding:6px 12px; text-align:center;"><h3 style="color:#ffefcf; font-size:0.8rem;">🎲 二十人座席 <span id="onlineCountDisplay" style="font-size:0.65rem; background:#2c2418; display:inline-block; padding:2px 12px; border-radius:30px;">👥 0/20</span></h3></div>
                    <div class="seats-grid" id="seatsGrid" style="display:grid; grid-template-columns:repeat(5,1fr); gap:6px; padding:10px;"></div>
                </div>
            </div>
        `;
        container.innerHTML = fishHTML;

        let fishBalance = parseInt(localStorage.getItem('fish_banker_balance')) || 10000;
        let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
        let specialBets = { big:0, small:0, odd:0, even:0, allTriplets:0 };
        let currentChip = 100;
        let lastWinAmount = 0;
        let isRolling = false;
        let fishPlayers = [];
        let nextPlayerId = 100;
        const namePool = ["阿强","老李","虾妹","蟹叔","金钱哥","鸡姐","小陈","骰子手","好运","锦鲤","鱼神","虾兵","蟹将","葫芦仙","铜钱","凤姐","阿珍","闲人","福仔","潮汕仔"];
        const patternList = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        const patternIdMap = { fish:"鱼", shrimp:"虾", crab:"蟹", calabash:"葫芦", coin:"金钱", chicken:"鸡" };

        function getFishTotalBet() { return Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(specialBets).reduce((a,b)=>a+b,0); }
        function updateFishUI() {
            container.querySelector('#fishBalanceValue').innerText = fishBalance;
            container.querySelector('#totalBetValue').innerText = getFishTotalBet();
            container.querySelector('#lastWinValue').innerText = lastWinAmount;
            for(let id of Object.keys(patternBets)) { let span = container.querySelector(`#bet_${id}`); if(span) span.innerText = patternBets[id]; }
            for(let id of Object.keys(specialBets)) { let span = container.querySelector(`#bet_special_${id}`); if(span) span.innerText = specialBets[id]; }
        }
        function showFishMsg(msg) {
            const msgDiv = container.querySelector('#fishMsgArea');
            msgDiv.innerText = msg;
            setTimeout(() => { if(msgDiv.innerText === msg) msgDiv.innerText = "🎲 点击开骰 | 骰盅缓慢开启开奖"; }, 2500);
        }
        function addBet(type, id, val) {
            let target = type === 'pattern' ? patternBets : specialBets;
            if(target[id] === undefined) return;
            let totalNow = getFishTotalBet();
            let userBal = getUserBalance();
            if(totalNow + val > userBal) { showFishMsg(`余额不足，无法加注 ${val}`); return; }
            target[id] += val;
            updateFishUI();
            let name = type === 'pattern' ? patternIdMap[id] : id;
            showFishMsg(`➕ ${name} +${val}`);
        }
        function subBet(type, id, val) {
            let target = type === 'pattern' ? patternBets : specialBets;
            if(target[id] === undefined) return;
            let old = target[id];
            let newVal = Math.max(0, old - val);
            if(old !== newVal) { target[id] = newVal; updateFishUI(); showFishMsg(`➖ ${name} -${val}`); }
        }
        function clearAllBets() {
            for(let k of Object.keys(patternBets)) patternBets[k]=0;
            for(let k of Object.keys(specialBets)) specialBets[k]=0;
            updateFishUI(); showFishMsg("清空所有下注");
        }
        function resetFishGame() {
            fishBalance = 10000; localStorage.setItem('fish_banker_balance', fishBalance);
            clearAllBets(); lastWinAmount = 0; updateFishUI();
            container.querySelectorAll(".dice").forEach(d => d.innerHTML = "🎲");
            const cover = container.querySelector('#fishDiceCover');
            if(cover) { cover.style.display = "flex"; cover.style.transform = "translateY(0) scale(1)"; cover.style.opacity = "1"; cover.style.visibility = "visible"; }
            showFishMsg("庄家重置，本金 10000 文，骰盅已复位");
        }
        async function animateRolling(finalNames) {
            const diceEls = container.querySelectorAll(".dice");
            const iconMap = { "鱼":"🐟","虾":"🦐","蟹":"🦀","葫芦":"🏺","金钱":"💰","鸡":"🐔" };
            for(let step=0; step<8; step++) {
                await new Promise(r=>setTimeout(r, 70));
                for(let i=0;i<3;i++) { let rand = patternList[Math.floor(Math.random()*6)]; diceEls[i].innerHTML = iconMap[rand]; }
            }
            for(let i=0;i<3;i++) diceEls[i].innerHTML = iconMap[finalNames[i]];
        }
        function getPointValue(pname) { const m={"鱼":1,"虾":2,"蟹":3,"葫芦":4,"金钱":5,"鸡":6}; return m[pname]||0; }
        async function settleGame(diceNames) {
            let points = diceNames.map(n=>getPointValue(n)), sum = points.reduce((a,b)=>a+b,0);
            let isTriplet = diceNames[0]===diceNames[1] && diceNames[1]===diceNames[2];
            let totalBet = getFishTotalBet();
            if(totalBet===0) { showFishMsg("没有下注，无法结算"); return false; }
            let userBal = getUserBalance();
            if(totalBet > userBal) { showFishMsg("下注超额，请检查余额"); return false; }
            setUserBalance(userBal - totalBet);
            let winAmount = 0, winDetails = [];
            for(let [pid, betVal] of Object.entries(patternBets)) {
                if(betVal===0) continue;
                let occur = diceNames.filter(n=> n === patternIdMap[pid]).length;
                if(occur>0) { let prize = betVal * (occur+1); winAmount += prize; winDetails.push(`${patternIdMap[pid]} x${occur}`); }
            }
            let bigWin=false, smallWin=false, oddWin=false, evenWin=false, allTripletWin=false;
            if(!isTriplet) { if(sum>=11 && sum<=17) bigWin=true; if(sum>=4 && sum<=10) smallWin=true; if(sum%2===1) oddWin=true; if(sum%2===0) evenWin=true; }
            if(isTriplet) allTripletWin=true;
            if(specialBets.big>0 && bigWin) { winAmount += specialBets.big*2; winDetails.push("大"); }
            if(specialBets.small>0 && smallWin) { winAmount += specialBets.small*2; winDetails.push("小"); }
            if(specialBets.odd>0 && oddWin) { winAmount += specialBets.odd*2; winDetails.push("单"); }
            if(specialBets.even>0 && evenWin) { winAmount += specialBets.even*2; winDetails.push("双"); }
            if(specialBets.allTriplets>0 && allTripletWin) { winAmount += specialBets.allTriplets*25; winDetails.push("全围"); }
            let net = winAmount - totalBet;
            let newBalance = getUserBalance() + winAmount;
            setUserBalance(newBalance);
            lastWinAmount = net; updateFishUI();
            let diceShow = diceNames.join("、");
            if(winAmount>0) showFishMsg(`🎲 ${diceShow} 净赢+${net}  [${winDetails.join(',')}]`);
            else showFishMsg(`😢 ${diceShow} 亏损 ${totalBet}`);
            clearAllBets();
            document.getElementById("userBalanceDisplay").innerText = newBalance.toFixed(2);
            return true;
        }
        async function onFishRoll() {
            if(isRolling) return;
            let total = getFishTotalBet();
            if(total === 0) { showFishMsg("请先下注再开骰！"); return; }
            if(total > getUserBalance()) { showFishMsg("下注总额超过余额，请减少下注"); return; }
            const diceCover = container.querySelector('#fishDiceCover');
            if(!diceCover) return;
            isRolling = true;
            diceCover.style.transform = "translateY(-70px) scale(0.6)";
            diceCover.style.opacity = "0";
            await new Promise(r=>setTimeout(r, 550));
            diceCover.style.display = "none";
            let finalResult = [ patternList[Math.floor(Math.random()*6)], patternList[Math.floor(Math.random()*6)], patternList[Math.floor(Math.random()*6)] ];
            await animateRolling(finalResult);
            await settleGame(finalResult);
            await new Promise(r=>setTimeout(r, 1500));
            container.querySelectorAll(".dice").forEach(d => d.innerHTML = "🎲");
            diceCover.style.display = "flex";
            diceCover.style.transform = "translateY(0) scale(1)";
            diceCover.style.opacity = "1";
            diceCover.style.visibility = "visible";
            isRolling = false;
            showFishMsg("骰盅已复位，可继续下注");
        }
        function renderSeats() {
            const seatsGrid = container.querySelector('#seatsGrid');
            const onlineSpan = container.querySelector('#onlineCountDisplay');
            seatsGrid.innerHTML = "";
            let occupiedCount = 0;
            for(let i=1;i<=20;i++) {
                const player = fishPlayers.find(p => p.seatIndex === i);
                const isOccupied = !!player;
                if(isOccupied) occupiedCount++;
                const seatDiv = document.createElement("div");
                seatDiv.className = `seat-card ${isOccupied ? "occupied" : ""}`;
                if(isOccupied) seatDiv.innerHTML = `<div class="seat-number">#${i}</div><div class="player-name">${player.name}</div>`;
                else seatDiv.innerHTML = `<div class="seat-number">#${i}</div><div class="player-name">🔲</div>`;
                seatsGrid.appendChild(seatDiv);
            }
            onlineSpan.innerText = `👥 ${occupiedCount}/20`;
        }
        function addRandomPlayer() {
            if(fishPlayers.length >= 20) return;
            let emptySeats = [];
            for(let i=1;i<=20;i++) if(!fishPlayers.find(p=>p.seatIndex===i)) emptySeats.push(i);
            if(emptySeats.length===0) return;
            let randomSeat = emptySeats[Math.floor(Math.random()*emptySeats.length)];
            let randomName = namePool[Math.floor(Math.random() * namePool.length)] + (Math.floor(Math.random()*90)+10);
            fishPlayers.push({ id: nextPlayerId++, name: randomName, seatIndex: randomSeat });
            renderSeats();
        }
        // 构建下注网格
        const patternContainer = container.querySelector('#patternGrid');
        if(patternContainer) {
            const PATTERNS = [{ id:"fish", name:"鱼", icon:"🐟" },{ id:"shrimp", name:"虾", icon:"🦐" },{ id:"crab", name:"蟹", icon:"🦀" },{ id:"calabash", name:"葫芦", icon:"🏺" },{ id:"coin", name:"金钱", icon:"💰" },{ id:"chicken", name:"鸡", icon:"🐔" }];
            patternContainer.innerHTML = "";
            PATTERNS.forEach(p=>{
                let card = document.createElement("div"); card.className="bet-card";
                card.innerHTML = `<div class="bet-icon">${p.icon}</div><div class="bet-name">${p.name}</div><div class="bet-odds">1~3倍</div>
                <div class="bet-amount"><button class="btn-chip sub-pattern" data-id="${p.id}">-</button><span id="bet_${p.id}">0</span><button class="btn-chip add-pattern" data-id="${p.id}">+</button></div>`;
                patternContainer.appendChild(card);
            });
        }
        const specialContainer = container.querySelector('#specialGrid');
        if(specialContainer) {
            const SPECIALS = [{ id:"big", name:"大", icon:"🔴" },{ id:"small", name:"小", icon:"🔵" },{ id:"odd", name:"单", icon:"⚪" },{ id:"even", name:"双", icon:"⚫" },{ id:"allTriplets", name:"全围", icon:"🌀" }];
            specialContainer.innerHTML = "";
            SPECIALS.forEach(s=>{
                let card = document.createElement("div"); card.className="bet-card";
                card.innerHTML = `<div class="bet-icon">${s.icon}</div><div class="bet-name">${s.name}</div><div class="bet-odds">${s.id==="allTriplets"?"1:24":"1:1"}</div>
                <div class="bet-amount"><button class="btn-chip sub-special" data-id="${s.id}">-</button><span id="bet_special_${s.id}">0</span><button class="btn-chip add-special" data-id="${s.id}">+</button></div>`;
                specialContainer.appendChild(card);
            });
        }
        container.querySelector('.bet-grid')?.addEventListener('click', (e) => {
            let btn = e.target.closest(".btn-chip");
            if(!btn) return;
            let id = btn.dataset.id;
            if(btn.classList.contains("add-pattern")) addBet('pattern', id, currentChip);
            if(btn.classList.contains("sub-pattern")) subBet('pattern', id, currentChip);
        });
        container.querySelector('.special-grid')?.addEventListener('click', (e) => {
            let btn = e.target.closest(".btn-chip");
            if(!btn) return;
            let id = btn.dataset.id;
            if(btn.classList.contains("add-special")) addBet('special', id, currentChip);
            if(btn.classList.contains("sub-special")) subBet('special', id, currentChip);
        });
        container.querySelectorAll(".chip").forEach(chip => {
            chip.onclick = () => { let val = parseInt(chip.dataset.chip); if(!isNaN(val)) { currentChip=val; container.querySelectorAll(".chip").forEach(c=>c.classList.remove("selected")); chip.classList.add("selected"); showFishMsg(`筹码 ${val}`); } };
        });
        container.querySelector('#fishRollBtn').onclick = onFishRoll;
        container.querySelector('#fishResetBetBtn').onclick = clearAllBets;
        container.querySelector('#fishResetGameBtn').onclick = resetFishGame;
        for(let i=1;i<=6;i++) { let name = namePool[(i-1)%namePool.length] + Math.floor(Math.random()*100); fishPlayers.push({ id: nextPlayerId++, name: name, seatIndex: i }); }
        renderSeats();
        fishInterval = setInterval(addRandomPlayer, 30000);
        updateFishUI();

        fishDestroy = () => { if(fishInterval) clearInterval(fishInterval); container.innerHTML = ''; };
        return fishDestroy;
    }

<script>
    // ======================= 自定义提示 =======================
    function showToast(msg, isError = true) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = msg;
        if (!isError) {
            toast.style.color = '#4caf50';
            toast.style.borderColor = '#4caf50';
        } else {
            toast.style.color = '#ffaa44';
            toast.style.borderColor = '#ffaa44';
        }
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // ======================= 配置 =======================
    const CONFIG = {
        countdownSeconds: 25,
        defaultBalance: 1000,
        adminPassword: "wang000000",
        odds: {
            4:60,5:30,6:18,7:12,8:8,9:7,10:6,11:6,12:7,13:8,14:12,15:18,16:30,17:60,
            'BIG':2, 'SMALL':2, 'ODD':2, 'EVEN':2,
            'TRIPLE_1':150, 'TRIPLE_2':150, 'TRIPLE_3':150,
            'TRIPLE_4':150, 'TRIPLE_5':150, 'TRIPLE_6':150,
            'ALL_TRIPLE':30
        }
    };

    // ======================= 用户系统 =======================
    let users = JSON.parse(localStorage.getItem('dice_users')) || {};
    let currentUser = "player888";
    if (!users[currentUser]) users[currentUser] = { balance: CONFIG.defaultBalance, records: [] };
    let adminPwd = CONFIG.adminPassword;
    function saveUsers() { localStorage.setItem('dice_users', JSON.stringify(users)); }
    function getBalance(uid) { return users[uid]?.balance || CONFIG.defaultBalance; }
    function setBalance(uid, amt) { if (!users[uid]) users[uid] = { balance: CONFIG.defaultBalance, records: [] }; users[uid].balance = amt; saveUsers(); }

    // ======================= 下注对象 =======================
    let bets = {
        'BIG':0, 'SMALL':0, 'ODD':0, 'EVEN':0,
        4:0,5:0,6:0,7:0,8:0,9:0,10:0,11:0,12:0,13:0,14:0,15:0,16:0,17:0,
        'TRIPLE_1':0, 'TRIPLE_2':0, 'TRIPLE_3':0, 'TRIPLE_4':0, 'TRIPLE_5':0, 'TRIPLE_6':0,
        'ALL_TRIPLE':0
    };
    let selectedChip = 0;
    let currentBalance = getBalance(currentUser);
    const diceEl = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
    const totalEl = document.getElementById('totalPoints');
    const rollingWinEl = document.getElementById('rollingWinNumber');
    let lastBet = null;

    // 3D骰子旋转设置
    function setDiceValue(dice, val) {
        const rot = {
            1: 'rotateX(0deg) rotateY(0deg)',
            2: 'rotateX(-90deg) rotateY(0deg)',
            3: 'rotateX(0deg) rotateY(90deg)',
            4: 'rotateX(0deg) rotateY(-90deg)',
            5: 'rotateX(90deg) rotateY(0deg)',
            6: 'rotateX(180deg) rotateY(0deg)'
        };
        dice.style.transform = rot[val];
    }

    function startRolling(finalVals) {
        return new Promise(resolve => {
            diceEl[0].classList.add('rolling1');
            diceEl[1].classList.add('rolling2');
            diceEl[2].classList.add('rolling3');
            totalEl.classList.add('total-blink');
            let step = 0, maxStep = 18;
            let iv = setInterval(() => {
                step++;
                diceEl.forEach(d => setDiceValue(d, Math.floor(Math.random() * 6) + 1));
                if (step >= maxStep) {
                    clearInterval(iv);
                    diceEl.forEach(d => d.classList.remove('rolling1', 'rolling2', 'rolling3'));
                    totalEl.classList.remove('total-blink');
                    diceEl.forEach((d, i) => {
                        setDiceValue(d, finalVals[i]);
                        d.classList.add('land');
                        setTimeout(() => d.classList.remove('land'), 200);
                    });
                    resolve();
                }
            }, 50);
        });
    }

    let rollingAnimation = null;
    function startRollingNumber(finalAmount) {
        if (rollingAnimation) cancelAnimationFrame(rollingAnimation);
        const startTime = performance.now();
        const duration = 5000;
        const startVal = 0.01;
        rollingWinEl.classList.add('rolling-animate');
        function update(now) {
            const elapsed = now - startTime;
            const progress = Math.min(1, elapsed / duration);
            const ease = 1 - Math.pow(1 - progress, 2);
            let current = startVal + (finalAmount - startVal) * ease;
            rollingWinEl.innerText = current.toFixed(2);
            if (progress < 1) {
                rollingAnimation = requestAnimationFrame(update);
            } else {
                rollingWinEl.innerText = finalAmount.toFixed(2);
                rollingWinEl.classList.remove('rolling-animate');
                rollingAnimation = null;
            }
        }
        rollingAnimation = requestAnimationFrame(update);
    }

    function getResultInfo(d1,d2,d3) {
        let total = d1+d2+d3;
        let types = [];
        if (total >= 11 && total <= 17) types.push('BIG');
        if (total >= 4 && total <= 10) types.push('SMALL');
        if (total % 2 === 1) types.push('ODD');
        if (total % 2 === 0) types.push('EVEN');
        if (d1 === d2 && d2 === d3) {
            types.push(`TRIPLE_${d1}`);
            types.push('ALL_TRIPLE');
        }
        return { total, types };
    }

    function updateUI() {
        document.getElementById('bet_BIG').innerText = bets['BIG'];
        document.getElementById('bet_SMALL').innerText = bets['SMALL'];
        document.getElementById('bet_ODD').innerText = bets['ODD'];
        document.getElementById('bet_EVEN').innerText = bets['EVEN'];
        for (let i=4;i<=17;i++) {
            let el = document.getElementById(`bet_${i}`);
            if (el) el.innerText = bets[i];
        }
        for (let i=1;i<=6;i++) {
            let el = document.getElementById(`bet_TRIPLE_${i}`);
            if (el) el.innerText = bets[`TRIPLE_${i}`];
        }
        document.getElementById('bet_ALL_TRIPLE').innerText = bets['ALL_TRIPLE'];
        let total = Object.values(bets).reduce((a,b)=>a+b,0);
        document.getElementById('totalBet').innerText = total;
        document.getElementById('balanceDisplay').innerText = currentBalance.toFixed(2);
        let pool = 50000 + (Math.random() - 0.5) * 3000;
        pool = Math.max(40000, Math.min(60000, pool));
        document.getElementById('poolDisplay').innerText = pool.toFixed(2);
    }

    function addBet(type) {
        if (selectedChip <= 0) { showToast("请先选择筹码"); return; }
        if (selectedChip > currentBalance) { showToast("余额不足！当前余额：" + currentBalance); return; }
        currentBalance -= selectedChip;
        setBalance(currentUser, currentBalance);
        bets[type] += selectedChip;
        updateUI();
        document.querySelectorAll('.special-card, .point-card, .trio-card').forEach(el => el.classList.remove('selected'));
        let selector = '';
        if (typeof type === 'string') {
            if (type.startsWith('TRIPLE_')) selector = `.trio-card[data-type="${type}"]`;
            else selector = `.special-card[data-type="${type}"]`;
        } else {
            selector = `.point-card[data-point="${type}"]`;
        }
        document.querySelector(selector)?.classList.add('selected');
        setTimeout(() => {
            document.querySelectorAll('.special-card, .point-card, .trio-card').forEach(el => el.classList.remove('selected'));
        }, 800);
        if (navigator.vibrate) navigator.vibrate(30);
    }

    function clearAllBets() {
        let total = Object.values(bets).reduce((a,b)=>a+b,0);
        currentBalance += total;
        setBalance(currentUser, currentBalance);
        for (let k in bets) bets[k] = 0;
        updateUI();
        if (navigator.vibrate) navigator.vibrate(30);
        showToast("已取消所有下注", false);
    }

    function repeatLastBet() {
        if (!lastBet) { showToast("没有可续押的记录"); return; }
        let totalNeed = 0;
        for (let k in lastBet) totalNeed += lastBet[k];
        if (totalNeed > currentBalance) { showToast("余额不足，无法续押"); return; }
        for (let k in bets) bets[k] = 0;
        for (let k in lastBet) bets[k] = lastBet[k];
        currentBalance -= totalNeed;
        setBalance(currentUser, currentBalance);
        updateUI();
        for (let k in lastBet) {
            if (lastBet[k] > 0) {
                let selector = '';
                if (typeof k === 'string') {
                    if (k.startsWith('TRIPLE_')) selector = `.trio-card[data-type="${k}"]`;
                    else selector = `.special-card[data-type="${k}"]`;
                } else {
                    selector = `.point-card[data-point="${k}"]`;
                }
                document.querySelector(selector)?.classList.add('selected');
            }
        }
        setTimeout(() => {
            document.querySelectorAll('.special-card, .point-card, .trio-card').forEach(el => el.classList.remove('selected'));
        }, 1500);
        if (navigator.vibrate) navigator.vibrate(50);
        if (!isDrawing && !isBetLocked) draw();
    }

    let isDrawing = false, isBetLocked = false, countdownInterval = null;
    async function draw() {
        if (isDrawing) return;
        let totalBet = Object.values(bets).reduce((a,b)=>a+b,0);
        if (totalBet === 0) { showToast("请先下注"); return; }
        lastBet = JSON.parse(JSON.stringify(bets));
        isDrawing = true;
        isBetLocked = true;
        const d1 = Math.floor(Math.random() * 6) + 1;
        const d2 = Math.floor(Math.random() * 6) + 1;
        const d3 = Math.floor(Math.random() * 6) + 1;
        const { total, types } = getResultInfo(d1,d2,d3);
        let winAmounts = [];
        if (types.includes('BIG') && bets['BIG']>0) winAmounts.push(bets['BIG'] * 2);
        if (types.includes('SMALL') && bets['SMALL']>0) winAmounts.push(bets['SMALL'] * 2);
        if (types.includes('ODD') && bets['ODD']>0) winAmounts.push(bets['ODD'] * 2);
        if (types.includes('EVEN') && bets['EVEN']>0) winAmounts.push(bets['EVEN'] * 2);
        if (bets[total] > 0) winAmounts.push(bets[total] * CONFIG.odds[total]);
        for (let t of types) {
            if (t.startsWith('TRIPLE_') && bets[t] > 0) winAmounts.push(bets[t] * CONFIG.odds[t]);
            if (t === 'ALL_TRIPLE' && bets['ALL_TRIPLE'] > 0) winAmounts.push(bets['ALL_TRIPLE'] * CONFIG.odds['ALL_TRIPLE']);
        }
        let totalWin = winAmounts.reduce((a,b)=>a+b,0);
        startRollingNumber(totalWin);
        await startRolling([d1,d2,d3]);
        totalEl.innerText = total;
        if (totalWin > 0) {
            totalEl.style.color = '#4caf50';
            setTimeout(() => totalEl.style.color = '#ff3300', 2000);
        } else {
            totalEl.style.color = '#f44336';
            setTimeout(() => totalEl.style.color = '#ff3300', 2000);
        }
        currentBalance += totalWin;
        setBalance(currentUser, currentBalance);
        let betSummary = [];
        for (let k in bets) if (bets[k] > 0) {
            if (k === 'BIG') betSummary.push(`大${bets[k]}`);
            else if (k === 'SMALL') betSummary.push(`小${bets[k]}`);
            else if (k === 'ODD') betSummary.push(`单${bets[k]}`);
            else if (k === 'EVEN') betSummary.push(`双${bets[k]}`);
            else if (typeof k === 'number') betSummary.push(`${k}点${bets[k]}`);
            else if (k.startsWith('TRIPLE_')) betSummary.push(`${k.split('_')[1]}围${bets[k]}`);
            else if (k === 'ALL_TRIPLE') betSummary.push(`豹子${bets[k]}`);
        }
        let recs = users[currentUser].records || [];
        recs.unshift({
            time: new Date().toLocaleTimeString(),
            bets: betSummary.join(' '),
            result: total,
            resultType: types.map(t=>t==='BIG'?'大':t==='SMALL'?'小':t==='ODD'?'单':t==='EVEN'?'双':t.startsWith('TRIPLE_')?t.split('_')[1]+'围':'豹子').join(','),
            win: totalWin,
            isWin: totalWin>0
        });
        if (recs.length>30) recs.pop();
        users[currentUser].records = recs;
        saveUsers();
        updateHistory();
        for (let k in bets) bets[k] = 0;
        updateUI();
        if (navigator.vibrate) navigator.vibrate(totalWin>0?[100,50,100]:80);
        setTimeout(() => {
            isDrawing = false;
            isBetLocked = false;
            startCountdown(CONFIG.countdownSeconds);
        }, 5000);
    }

    function startCountdown(sec) {
        if (countdownInterval) clearInterval(countdownInterval);
        let c = sec;
        const cdSpan = document.getElementById('countdownNum');
        cdSpan.innerText = c;
        cdSpan.classList.remove('countdown-warning');
        isBetLocked = false;
        countdownInterval = setInterval(() => {
            if (c <= 1) {
                clearInterval(countdownInterval);
                countdownInterval = null;
                isBetLocked = true;
                draw();
            } else {
                c--;
                cdSpan.innerText = c;
                if (c <= 5) cdSpan.classList.add('countdown-warning');
            }
        }, 1000);
    }

    function updateHistory() {
        const container = document.getElementById('historyList');
        const recs = users[currentUser]?.records || [];
        container.innerHTML = '';
        if (recs.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#666">暂无记录</div>';
            return;
        }
        recs.slice(0,10).forEach(r => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${r.time}</span><span>${r.bets}</span><span>开${r.result}(${r.resultType})</span><span class="${r.isWin?'win':'lose'}">${r.isWin?'+'+r.win:''}</span>`;
            container.appendChild(div);
        });
    }

    function refreshBalance() { currentBalance = getBalance(currentUser); updateUI(); showToast("余额已刷新", false); }
    function switchUser() {
        let newId = document.getElementById('switchId').value.trim();
        if (!newId) return;
        currentUser = newId;
        if (!users[currentUser]) users[currentUser] = { balance: CONFIG.defaultBalance, records: [] };
        document.getElementById('currentUserId').innerText = currentUser;
        currentBalance = getBalance(currentUser);
        for (let k in bets) bets[k] = 0;
        updateUI();
        if (countdownInterval) clearInterval(countdownInterval);
        startCountdown(CONFIG.countdownSeconds);
        updateHistory();
        document.querySelectorAll('.special-card, .point-card, .trio-card').forEach(el => el.classList.remove('selected'));
        showToast(`已切换到 ${currentUser}`, false);
    }

    function showHistoryModal() {
        const recs = users[currentUser]?.records || [];
        let html = '<div style="max-height:300px;overflow-y:auto">';
        if (recs.length === 0) html += '<p>暂无记录</p>';
        else recs.forEach(r => { html += `<div style="padding:8px;border-bottom:1px solid #333;display:flex;justify-content:space-between"><span>${r.time}</span><span>${r.bets}</span><span>开${r.result}点</span><span style="color:${r.isWin?'#4caf50':'#f44336'}">${r.isWin?'+'+r.win:''}</span></div>`; });
        html += '</div><button id="closeModalBtn" style="background:#ff6600;border:none;border-radius:30px;padding:10px 24px;margin-top:16px;color:#fff">关闭</button>';
        const modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = `<div class="modal-content"><h3>📜 投注记录</h3>${html}</div>`;
        document.body.appendChild(modal);
        document.getElementById('closeModalBtn').onclick = () => modal.remove();
    }

    // 管理员面板
    let adminPanel = null, adminSelectedUser = currentUser;
    function showAdminPanel() {
        if (adminPanel) { adminPanel.remove(); adminPanel = null; return; }
        const panel = document.createElement('div'); panel.className = 'modal';
        panel.innerHTML = `
            <div class="modal-content" style="width:90%;max-width:360px">
                <h3>🔐 管理员面板</h3>
                <div id="adminUserList" class="admin-user-list"></div>
                <div>当前：<strong id="adminSelectedUser">${adminSelectedUser}</strong></div>
                <input type="number" id="adminAmount" class="admin-input" placeholder="金额" value="0">
                <div class="admin-btns">
                    <button id="adminAdd" class="admin-btn" style="background:#4caf50;color:#fff">上分</button>
                    <button id="adminSub" class="admin-btn" style="background:#f44336;color:#fff">下分</button>
                    <button id="adminQuery" class="admin-btn" style="background:#2196f3;color:#fff">查询</button>
                    <button id="adminReset" class="admin-btn" style="background:#ff9800;color:#fff">重置</button>
                    <button id="adminPwd" class="admin-btn" style="background:#9c27b0;color:#fff">改密</button>
                </div>
                <button id="adminClose" style="background:#ffaa44;color:#1a1a2a;padding:8px 24px;border-radius:25px;border:none;margin-top:12px">关闭</button>
            </div>
        `;
        document.body.appendChild(panel); adminPanel = panel;
        function refreshList() {
            const listDiv = document.getElementById('adminUserList');
            const usersArr = Object.keys(users);
            listDiv.innerHTML = '';
            usersArr.forEach(uid => {
                const div = document.createElement('div'); div.className = 'admin-user'; if (uid === adminSelectedUser) div.classList.add('selected');
                div.textContent = `${uid} (${getBalance(uid).toFixed(2)})`;
                div.onclick = () => { adminSelectedUser = uid; document.getElementById('adminSelectedUser').innerText = adminSelectedUser; refreshList(); };
                listDiv.appendChild(div);
            });
        }
        refreshList();
        document.getElementById('adminAdd').onclick = () => {
            let amt = parseFloat(document.getElementById('adminAmount').value);
            if (isNaN(amt)||amt<=0) { showToast("请输入正数"); return; }
            let cur = getBalance(adminSelectedUser);
            setBalance(adminSelectedUser, cur+amt);
            refreshList();
            if (adminSelectedUser===currentUser) { currentBalance=getBalance(currentUser); updateUI(); }
            showToast(`给 ${adminSelectedUser} 上分 ${amt}`, false);
        };
        document.getElementById('adminSub').onclick = () => {
            let amt = parseFloat(document.getElementById('adminAmount').value);
            if (isNaN(amt)||amt<=0) { showToast("请输入正数"); return; }
            let cur = getBalance(adminSelectedUser);
            if (cur<amt) { showToast("余额不足"); return; }
            setBalance(adminSelectedUser, cur-amt);
            refreshList();
            if (adminSelectedUser===currentUser) { currentBalance=getBalance(currentUser); updateUI(); }
            showToast(`从 ${adminSelectedUser} 下分 ${amt}`, false);
        };
        document.getElementById('adminQuery').onclick = () => {
            showToast(`${adminSelectedUser} 余额: ${getBalance(adminSelectedUser).toFixed(2)}`, false);
        };
        document.getElementById('adminReset').onclick = () => {
            if (confirm(`重置 ${adminSelectedUser} 余额为${CONFIG.defaultBalance}？`)) {
                setBalance(adminSelectedUser, CONFIG.defaultBalance);
                refreshList();
                if (adminSelectedUser===currentUser) { currentBalance=getBalance(currentUser); updateUI(); }
                showToast("重置成功", false);
            }
        };
        document.getElementById('adminPwd').onclick = () => {
            let old = prompt("当前密码:");
            if (old !== adminPwd) { showToast("密码错误"); return; }
            let newPwd = prompt("新密码(至少6位):");
            if (!newPwd || newPwd.length<6) { showToast("密码至少6位"); return; }
            adminPwd = newPwd;
            localStorage.setItem('dice_admin_pwd', newPwd);
            showToast("密码修改成功", false);
        };
        document.getElementById('adminClose').onclick = () => { panel.remove(); adminPanel = null; };
    }

    function createPointsGrid() {
        const grid = document.getElementById('pointsGrid');
        for (let i=4;i<=17;i++) {
            const card = document.createElement('div');
            card.className = 'point-card';
            card.setAttribute('data-point', i);
            card.innerHTML = `<div class="point-value">${i}点</div><div class="point-odds">赔 ${CONFIG.odds[i]}倍</div><div class="point-bet-amount" id="bet_${i}">0</div>`;
            card.onclick = () => addBet(i);
            grid.appendChild(card);
        }
    }

    function createCombinedGrid() {
        const grid = document.getElementById('combinedGrid');
        for (let i=1;i<=6;i++) {
            const card = document.createElement('div');
            card.className = 'trio-card';
            card.setAttribute('data-type', `TRIPLE_${i}`);
            card.innerHTML = `<div class="trio-name">${i}围</div><div class="trio-odds">赔 150倍</div><div class="trio-bet-amount" id="bet_TRIPLE_${i}">0</div>`;
            card.onclick = () => addBet(`TRIPLE_${i}`);
            grid.appendChild(card);
        }
        const allCard = document.createElement('div');
        allCard.className = 'trio-card';
        allCard.setAttribute('data-type', 'ALL_TRIPLE');
        allCard.innerHTML = `<div class="trio-name">豹子</div><div class="trio-odds">赔 30倍</div><div class="trio-bet-amount" id="bet_ALL_TRIPLE">0</div>`;
        allCard.onclick = () => addBet('ALL_TRIPLE');
        grid.appendChild(allCard);
    }

    function init() {
        createPointsGrid();
        createCombinedGrid();
        document.querySelectorAll('.chip').forEach(chip => {
            chip.onclick = () => {
                selectedChip = parseInt(chip.dataset.val);
                document.getElementById('selectedChip').innerText = selectedChip;
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected-chip'));
                chip.classList.add('selected-chip');
                if (navigator.vibrate) navigator.vibrate(20);
            };
        });
        document.querySelectorAll('.special-card').forEach(card => {
            card.onclick = () => addBet(card.dataset.type);
        });
        document.getElementById('clearAllBtn').onclick = clearAllBets;
        document.getElementById('repeatBtn').onclick = repeatLastBet;
        document.getElementById('refreshBtn').onclick = refreshBalance;
        document.getElementById('betBtn').onclick = draw;
        document.getElementById('switchBtn').onclick = switchUser;
        document.getElementById('historyBtn').onclick = showHistoryModal;
        document.getElementById('adminEntry').onclick = () => {
            let pwd = prompt("管理员密码:");
            if (pwd === adminPwd) showAdminPanel();
            else if (pwd !== null) showToast("密码错误");
        };
        document.getElementById('newUserBtn').onclick = () => {
            let newId = "player_" + Math.floor(Math.random() * 100000);
            document.getElementById('switchId').value = newId;
            switchUser();
            showToast(`新账户：${newId} 初始余额 ${CONFIG.defaultBalance}`, false);
        };
        diceEl.forEach(d => setDiceValue(d, 1));
        totalEl.innerText = 3;
        updateUI();
        updateHistory();
        startCountdown(CONFIG.countdownSeconds);
        let saved = localStorage.getItem('dice_admin_pwd');
        if (saved) adminPwd = saved;
    }
    init();
</script>
</body>
</html>
