<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA_旗舰终端_V45</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; }
        body { 
            margin: 0; background: #050505; color: #fff; 
            font-family: 'Arial Black', sans-serif; 
            height: 100vh; overflow: hidden; perspective: 1000px;
            /* 将你提供的星空图设为全屏背景，类似电视屏幕 */
            background: url('https://img.freepik.com/free-vector/abstract-technology-particle-background_23-2148426649.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
        }
        
        /* 电视屏幕光晕滤镜 */
        body::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }

        /* 顶部余额 HUD */
        .hud { 
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%); 
            width: 75%; background: rgba(0,242,255,0.08); 
            border: 1px solid rgba(0,242,255,0.4); border-radius: 12px; 
            padding: 10px; text-align: center; z-index: 100;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(0,242,255,0.2);
        }
        .hud b { font-size: 24px; text-shadow: 0 0 10px var(--neon); color: #fff; }

        /* 核心：置顶转盘，带有电视屏幕悬浮感 */
        .wheel-box { 
            position: absolute; top: 125px; left: 50%; 
            transform: translateX(-50%) rotateX(12deg); 
            z-index: 50;
        }
        
        .wheel { 
            width: 270px; height: 270px; border-radius: 50%; 
            border: 8px solid #0a0a0a;
            background: conic-gradient(from 0deg, #ff0055 0 60deg, #111 60deg 120deg, #00f2ff 120deg 180deg, #111 180deg 240deg, #ffcc00 240deg 300deg, #111 300deg 360deg);
            /* 电视屏幕发光效果 */
            box-shadow: 0 0 40px rgba(0,242,255,0.3), inset 0 0 30px rgba(0,0,0,0.7);
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            display: flex; align-items: center; justify-content: center;
        }
        
        .item { position: absolute; font-size: 28px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        .i1 { transform: rotate(30deg) translateY(-100px); } .i2 { transform: rotate(90deg) translateY(-100px); } .i3 { transform: rotate(150deg) translateY(-100px); } .i4 { transform: rotate(210deg) translateY(-100px); } .i5 { transform: rotate(270deg) translateY(-100px); } .i6 { transform: rotate(330deg) translateY(-100px); }
        
        .btn { 
            position: absolute; width: 65px; height: 65px; background: #000; 
            border: 3px solid var(--pink); border-radius: 50%; 
            color: #fff; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 10; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 25px var(--pink); 
        }
        
        .pointer { 
            position: absolute; top: -18px; left: 50%; transform: translateX(-50%); 
            border-left: 18px solid transparent; border-right: 18px solid transparent; 
            border-top: 28px solid #fff; z-index: 20; filter: drop-shadow(0 0 10px var(--neon));
        }

        .ovl { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(10px); }
        #m-btn { position: fixed; bottom: 30px; right: 30px; font-size: 30px; cursor: pointer; opacity: 0.6; z-index: 300; }
    </style>
</head>
<body>
    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
    <div id="m-btn" onclick="toggleM()">🎵</div>
    <div class="hud">BALANCE: <b id="bal">1,000</b></div>
    <div class="wheel-box">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"><div class="item i1">💎</div><div class="item i2">💀</div><div class="item i3">💰</div><div class="item i4">💀</div><div class="item i5">🎁</div><div class="item i6">💀</div><div class="btn" onclick="spin()">SPIN</div></div>
    </div>
    <div class="ovl" id="ovl"><div id="res-txt" style="font-size:50px; font-weight:900;"></div><button style="margin-top:40px; padding:15px 40px; background:linear-gradient(to right, var(--neon), var(--pink)); border:none; border-radius:8px; color:#fff; font-weight:bold; font-size:18px;" onclick="location.reload()">AGAIN</button></div>
    <script>
        let b=1000, r=0, m=document.getElementById('bgm');
        function toggleM(){ if(m.paused){m.play(); document.getElementById('m-btn').style.opacity=1;} else {m.pause(); document.getElementById('m-btn').style.opacity=0.6;} }
        function spin(){ 
            if(m.paused) m.play();
            if(b<50)return alert('余额不足'); b-=50; document.getElementById('bal').innerText=b; 
            let add=2160+Math.floor(Math.random()*360); r+=add; 
            document.getElementById('wheel').style.transform="rotate("+r+"deg)";
            setTimeout(()=>{ 
                let win=[0,100,0,200,0,500][Math.floor(Math.random()*6)]; b+=win; 
                document.getElementById('bal').innerText=b; document.getElementById('ovl').style.display='flex'; 
                document.getElementById('res-txt').innerText=win>0?"WIN: "+win:"LOSE"; document.getElementById('res-txt').style.color=win>0?var(--neon):var(--pink); 
            },4000); 
        }
    </script>
</body>
</html>
