    // ========== 游戏1：鱼虾蟹老虎机 ==========
    let fishDestroy=null;
    function initFishGame(container) {
        if(fishDestroy) fishDestroy();

        const PATTERN_ICON={"鱼":"🐟","虾":"🦐","蟹":"🦀","葫芦":"🥒","金钱":"💰","鸡":"🐔"};
        const PATTERN_COLOR={"鱼":"#2e86c1","虾":"#e67e22","蟹":"#e74c3c","葫芦":"#27ae60","金钱":"#f1c40f","鸡":"#e84393"};
        let currentSymbols=["鱼","虾","蟹"], currentBet=10, isSpinning=false, autoActive=false, autoTimer=null, soundEnabled=true;
        let reelIntervals=[null,null,null], reelSteps=[0,0,0], reelCurrentStep=[0,0,0], spinTargets=["鱼","鱼","鱼"];
        let patternBets={fish:0,shrimp:0,crab:0,calabash:0,coin:0,chicken:0}, specialBets={doubleBet:0}, lastWinAmount=0, hasGrabbed=false, playerBankerBalance=0;

        let savedBanker=localStorage.getItem('fish_player_banker');
        if(savedBanker && parseInt(savedBanker)>0){ hasGrabbed=true; playerBankerBalance=parseInt(savedBanker); }
        container.innerHTML=`<div class="mahjong-slot"><div class="reels-luxury"><div class="card-frame"><canvas id="fishReel0" class="mahjong-canvas" width="300" height="400"></canvas><div class="card-label">天</div></div><div class="card-frame"><canvas id="fishReel1" class="mahjong-canvas" width="300" height="400"></canvas><div class="card-label">地</div></div><div class="card-frame"><canvas id="fishReel2" class="mahjong-canvas" width="300" height="400"></canvas><div class="card-label">人</div></div></div><div class="slot-controls"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><div><span style="color:#ffdd99;">🏦 庄家余额</span><br><span id="fishBankerDisplay" style="color:#ffaa44;">∞</span></div><div><span style="color:#ffdd99;">🎲 总押注</span><br><span id="totalBetValue">0</span></div><div><span style="color:#ffdd99;">🏆 上局净利</span><br><span id="lastWinValue">0</span></div></div><div class="bet-row"><span class="bet-label">💰 下注金额</span><div class="bet-value" id="betAmountFish">10</div></div><div class="chip-select" id="chipSelectFish"><div class="chip-item" data-bet="10">10</div><div class="chip-item selected" data-bet="10">10</div><div class="chip-item" data-bet="50">50</div><div class="chip-item" data-bet="100">100</div><div class="chip-item" data-bet="200">200</div><div class="chip-item" data-bet="500">500</div></div><div id="patternGridFish" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><span style="color:#ffdd99;">🎯 双押 (鱼+虾)</span><span id="bet_special_doubleBet" style="background:#1e1710;padding:4px 12px;border-radius:30px;color:#ffaa44;">0</span></div><div class="action-row"><button id="fishSpinBtn" class="slot-btn">🎲 开牌</button><button id="fishAutoBtn" class="slot-btn">⚡ 自动</button><button id="fishSoundBtn" class="slot-btn sound">🔊 音效</button></div><div class="action-row"><button id="fishClearBetBtn" class="slot-btn">清空下注</button><button id="fishGrabBtn" class="slot-btn">🎲 抢庄</button><button id="fishResetBankerBtn" class="slot-btn">重置庄家</button></div></div><div class="pay-table"><div>🐟鱼 1次:1.5倍<br>2次:2倍<br>3次:2.5倍</div><div>🦐虾 1次:1.5倍<br>2次:2倍<br>3次:2.5倍</div><div>🦀蟹 1次:1.5倍<br>2次:2倍<br>3次:2.5倍</div><div>🥒葫芦 1次:1.5倍<br>2次:2倍<br>3次:2.5倍</div><div>💰金钱 1次:1.5倍<br>2次:2倍<br>3次:2.5倍</div><div>🐔鸡 1次:1.5倍<br>2次:2倍<br>3次:2.5倍</div><div style="grid-column:span 3;">🎯 双押(鱼+虾) 4.5倍</div></div><div class="info-area" id="fishInfoMsg">✨ 抢庄可坐庄，押注上限单门500总注2000 ✨</div></div>`;
        const canvases=[document.getElementById('fishReel0'),document.getElementById('fishReel1'),document.getElementById('fishReel2')];
        const ctxs=canvases.map(c=>c.getContext('2d'));

        const clearBetBtn=document.getElementById('fishClearBetBtn'), grabBtn=document.getElementById('fishGrabBtn'), resetBankerBtn=document.getElementById('fishResetBankerBtn');

        function drawPatternTile(ctx,pattern,w,h){ ctx.clearRect(0,0,w,h); ctx.fillStyle="#FFF9EF"; ctx.fillRect(0,0,w,h); ctx.strokeStyle="#D4AF5A"; ctx.lineWidth=3; ctx.strokeRect(6,6,w-12,h-12); ctx.strokeStyle="#9B6E3C"; ctx.lineWidth=1.5; ctx.strokeRect(12,12,w-24,h-24); ctx.font=`bold ${Math.min(h*0.45,90)}px "Segoe UI Emoji"`; ctx.fillStyle=PATTERN_COLOR[pattern]||"#D6402A"; ctx.fillText(PATTERN_ICON[pattern], w/2-40, h/2+15); ctx.font=`bold ${Math.min(h*0.16,30)}px "Poppins"`; ctx.fillStyle="#A6702E"; ctx.fillText(pattern, w/2-30, h-22); }
        function updateReels(){ for(let i=0;i<3;i++) drawPatternTile(ctxs[i], currentSymbols[i], canvases[i].width, canvases[i].height); }
        function getRandomPattern(){ return PATTERNS[Math.floor(Math.random()*6)]; }
