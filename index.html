<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>ULTIMATE_DJ_V30030</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --neon: #00ff88; }
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: space-around; overflow: hidden; }
        .header { border: 4px solid var(--gold); padding: 10px 50px; border-radius: 50px; box-shadow: 0 0 30px var(--gold); background: #111; }
        #balance { font-size: 45px; color: var(--gold); text-shadow: 0 0 20px gold; }
        
        /* 🎡 实体转盘 */
        .wheel-box { width: 320px; height: 320px; border: 12px solid #333; border-radius: 50%; position: relative; overflow: hidden; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: radial-gradient(circle, #222, #000); box-shadow: 0 0 60px rgba(0,255,136,0.3); }
        .line { position: absolute; width: 4px; height: 100%; background: #000; left: 50%; margin-left: -2px; transform-origin: center; }
        .symbol { position: absolute; width: 60px; height: 60px; font-size: 45px; left: 50%; top: 50%; margin: -30px; display: flex; align-items: center; justify-content: center; }
        .s1 { transform: rotate(22.5deg) translateY(-110px); } .s2 { transform: rotate(67.5deg) translateY(-110px); } .s3 { transform: rotate(112.5deg) translateY(-110px); } .s4 { transform: rotate(157.5deg) translateY(-110px); }
        .s5 { transform: rotate(202.5deg) translateY(-110px); } .s6 { transform: rotate(247.5deg) translateY(-110px); } .s7 { transform: rotate(292.5deg) translateY(-110px); } .s8 { transform: rotate(337.5deg) translateY(-110px); }
        
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid red; z-index: 50; filter: drop-shadow(0 0 10px red); }
        .spin-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95px; height: 95px; border-radius: 50%; background: var(--neon); border: 5px solid #004422; color: #000; font-size: 20px; font-weight: 900; z-index: 100; box-shadow: 0 0 30px var(--neon); cursor: pointer; }

        .footer { width: 95%; background: #111; padding: 20px; border-radius: 30px; border: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
        .bet-ctrl { display: flex; align-items: center; gap: 10px; }
        .b-btn { width: 45px; height: 45px; background: #333; color: #fff; border: none; border-radius: 10px; font-size: 24px; }
    </style>
</head>
<body>
    <audio id="dj-bgm" src="https://www.soundjay.com/free-music/iron-man-1.mp3" loop preload="auto">
    <audio id="spin-snd" src="https://www.soundjay.com/mechanical/mechanical-clanking-1.mp3" preload="auto">
    <audio id="win-snd" src="https://www.soundjay.com/misc/coins-spilled-1.mp3" preload="auto">

    <div class="header"><div id="balance">0</div></div>
    <div style="position:relative;">
        <div class="pointer"></div>
        <div class="wheel-box" id="wheel">
            <div class="line" style="transform: rotate(0deg)"></div><div class="line" style="transform: rotate(45deg)"></div><div class="line" style="transform: rotate(90deg)"></div><div class="line" style="transform: rotate(135deg)"></div>
            <div class="symbol s1">🦁</div><div class="symbol s2">🐯</div><div class="symbol s3">💎</div><div class="symbol s4">💰</div>
            <div class="symbol s5">👑</div><div class="symbol s6">7️⃣</div><div class="symbol s7">🦅</div><div class="symbol s8">🎰</div>
        </div>
        <button class="spin-btn" onclick="play()">SPIN</button>
    </div>
    <div class="footer">
        <div class="bet-ctrl">
            <button class="b-btn" onclick="change(-100)">-</button>
            <span id="bet" style="font-size:30px; color:var(--gold); min-width:80px; text-align:center;">100</span>
            <button class="b-btn" onclick="change(100)">+</button>
        </div>
        <div id="win" style="color:var(--neon); font-size:30px; font-weight:900;">WIN: 0</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let bal = 88888; let bet = 100; let rot = 0; let isDJ = false;
        document.getElementById('balance').innerText = bal.toLocaleString();

        function change(v) { if(bet+v>=100){ bet+=v; document.getElementById('bet').innerText=bet; tg.HapticFeedback.impactOccurred('light'); } }

        function play() {
            if(bal < bet) { tg.showAlert("余额不足"); return; }
            
            // 第一次点击：炸裂 DJ 开始！
            if(!isDJ) { 
                const bgm = document.getElementById('dj-bgm');
                bgm.volume = 1.0; bgm.play(); isDJ = true; 
            }

            bal -= bet; document.getElementById('balance').innerText = bal.toLocaleString();
            document.getElementById('win').innerText = "WIN: 0";
            
            const wheel = document.getElementById('wheel');
            const spinSnd = document.getElementById('spin-snd');
            spinSnd.currentTime = 0; spinSnd.play();

            rot += 1800 + Math.floor(Math.random() * 360);
            wheel.style.transform = `rotate(${rot}deg)`;
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                let win = Math.random() > 0.7 ? bet * 10 : 0;
                if(win > 0) {
                    bal += win;
                    document.getElementById('win').innerText = "WIN: " + win;
                    document.getElementById('win-snd').play();
                    tg.HapticFeedback.notificationOccurred('success');
                }
                document.getElementById('balance').innerText = bal.toLocaleString();
            }, 4000);
        }
    </script>
</body>
</html>
