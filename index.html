<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ AI 量化终端 ✨</title>
    <style>
        /* 1. 复刻 27425 的深色底+微弱网格 */
        body {
            margin: 0; padding: 0; background-color: #050a0a;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px; color: #fff; font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; padding-bottom: 90px;
        }

        /* 2. 圆角卡片容器 (Neumorphism 质感) */
        .glass-card {
            background: #161a1d; border-radius: 28px; width: 92%; margin-top: 15px;
            padding: 20px 0; border: 1px solid #252a2e; box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; align-items: center;
        }

        #balance { font-size: 58px; color: #ff5252; font-weight: 800; letter-spacing: -1px; }
        .label { color: #889096; font-size: 13px; margin-top: 5px; }

        /* 3. 转盘视觉修复：找回以前的大图 */
        #wheel-container { position: relative; width: 300px; height: 300px; margin: 15px 0; }
        #wheel { 
            width: 100%; height: 100%; transition: transform 4.5s cubic-bezier(0.1, 0, 0.1, 1);
            background: url('wheel.png') no-repeat center; background-size: contain;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }
        #pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; 
                   border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ff5252; z-index: 10; }

        /* 4. 龙虎选项 (复刻老图 27500 的简洁感) */
        .bet-area { display: flex; gap: 20px; margin: 15px 0; width: 100%; justify-content: center; }
        .bet-btn { 
            background: #1f2327; border: 1px solid #333; border-radius: 15px; width: 120px; height: 50px;
            display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .bet-btn.active { border-color: #ffde00; background: rgba(255,222,0,0.15); box-shadow: 0 0 15px rgba(255,222,0,0.2); color: #ffde00; }

        /* 5. 核心：那个红色的“执行抽取”大按钮 */
        #main-btn {
            background: linear-gradient(180deg, #e53935 0%, #b71c1c 100%);
            width: 80%; padding: 18px 0; border-radius: 40px; font-size: 22px; font-weight: bold;
            border: none; color: #fff; cursor: pointer; box-shadow: 0 6px 20px rgba(183, 28, 28, 0.4);
            transition: transform 0.1s; display: flex; align-items: center; justify-content: center;
        }
        #main-btn:active { transform: scale(0.96); }

        /* 6. 底部导航栏 (1:1 复刻 27425 效果) */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 75px; background: #0c0e11;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #1e2124; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { text-align: center; font-size: 11px; color: #6e767d; }
        .nav-item.active { color: #ff5252; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div id="balance">146.8</div>
        <div class="label">🔥 单注额度: 5.5</div>
    </div>

    <div class="glass-card" style="margin-top: 20px; padding: 25px 0;">
        <div id="wheel-container">
            <div id="pointer"></div>
            <div id="wheel"></div>
        </div>
        
        <div class="bet-area">
            <div id="b-DRAGON" class="bet-btn" onclick="select('DRAGON')">🐉 龙</div>
            <div id="b-TIGER" class="bet-btn" onclick="select('TIGER')">🐯 虎</div>
        </div>

        <button id="main-btn" onclick="launch()">▶ 执行抽取</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item">📈<br>行情</div>
        <div class="nav-item">💼<br>资产中心</div>
        <div class="nav-item">📜<br>历史记录</div>
        <div class="nav-item active">🎯<br>量化终端</div>
    </div>

    <script>
        let state = { bal: 146.8, deg: 0, rolling: false, side: null };

        function select(s) {
            if(state.rolling) return;
            state.side = s;
            document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('b-'+s).classList.add('active');
        }

        async function launch() {
            if(state.rolling || state.bal < 5.5) return;
            
            // 1. 视觉立刻点火
            state.rolling = true;
            state.bal -= 5.5;
            document.getElementById('balance').innerText = state.bal.toFixed(1);

            const wheel = document.getElementById('wheel');
            const targetIdx = Math.floor(Math.random() * 8); // 随机一个猛兽位置
            state.deg += (360 * 10) - (targetIdx * 45); 
            wheel.style.transform = `rotate(${state.deg}deg)`;

            // 2. 逻辑保底 (后台挂了也照转不误)
            let finalResult = Math.random() < 0.52 ? 'TIGER' : 'DRAGON';

            // 3. 落地判奖
            setTimeout(() => {
                state.rolling = false;
                if(state.side === finalResult) {
                    state.bal += 11;
                    document.getElementById('balance').innerText = state.bal.toFixed(1);
                    alert('🎉 预测成功！');
                } else {
                    alert('下次好运，开出：' + (finalResult === 'TIGER' ? '虎' : '龙'));
                }
            }, 4600);
        }
    </script>
</body>
</html>
