<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>奥林匹斯之门老虎机</title>
    <style>
        body {
            font-family: "Arial Black", Gadget, sans-serif;
            background: linear-gradient(#1a2a6c, #b21f1f, #fdbb2d);
            color: #fff;
            text-align: center;
            padding-top: 30px;
            margin: 0;
        }
        .machine {
            display: inline-block;
            background: #2c2c2c;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(253, 187, 45, 0.5);
        }
        .reels {
            display: grid;
            grid-template-columns: repeat(5, 80px);
            gap: 10px;
            margin-bottom: 25px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 10px;
        }
        .symbol {
            width: 80px;
            height: 80px;
            background: #fff;
            color: #1a2a6c;
            font-size: 30px;
            line-height: 80px;
            text-align: center;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .zeus-symbol {
            background: #fdbb2d;
            color: #1a1a1a;
            font-weight: bold;
        }
        .win-symbol {
            background: #ff2d55;
            color: #fff;
            transform: scale(1.05);
        }
        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #fdbb2d;
            border: none;
            border-radius: 8px;
            color: #1a2a6c;
            font-weight: bold;
            cursor: pointer;
            margin: 0 10px;
        }
        .btn:disabled {
            background: #888;
            cursor: not-allowed;
        }
        .status {
            font-size: 24px;
            margin: 15px 0;
            text-shadow: 0 0 5px #fdbb2d;
        }
    </style>
</head>
<body>
    <div class="status">当前余额：<span id="balance">1000</span> 金币</div>
    <div class="machine">
        <div class="reels" id="reelsContainer"></div>
        <button class="btn" id="spinBtn">下注5金币 转动</button>
        <div id="winInfo" class="status"></div>
    </div>

    <script>
        // 符号配置
        const SYMBOLS = [
            {name: "⚡宙斯", type: "zeus", weight: 0.05, multi: 100},
            {name: "🏛雅典娜", type: "normal", weight: 0.1, multi: 50},
            {name: "⚔阿瑞斯", type: "normal", weight: 0.15, multi: 20},
            {name: "🦉猫头鹰", type: "normal", weight: 0.2, multi: 10},
            {name: "🍇葡萄", type: "normal", weight: 0.25, multi: 5},
            {name: "🍎苹果", type: "normal", weight: 0.25, multi: 2}
        ];
        const REEL_COLS = 5; // 5列
        const REEL_ROWS = 3; // 3行
        let balance = 1000;
        let isSpinning = false;
        const balanceEl = document.getElementById('balance');
        const reelsContainer = document.getElementById('reelsContainer');
        const spinBtn = document.getElementById('spinBtn');
        const winInfoEl = document.getElementById('winInfo');


        // 初始化卷轴
        function initReels() {
            reelsContainer.innerHTML = '';
            for (let col = 0; col < REEL_COLS; col++) {
                for (let row = 0; row < REEL_ROWS; row++) {
                    const symEl = document.createElement('div');
                    symEl.className = 'symbol';
                    symEl.dataset.col = col;
                    symEl.dataset.row = row;
                    reelsContainer.appendChild(symEl);
                }
            }
        }


        // 按权重获取符号
        function getRandomSymbol() {
            const totalWeight = SYMBOLS.reduce((sum, s) => sum + s.weight, 0);
            let rand = Math.random() * totalWeight;
            let currentWeight = 0;

            for (const sym of SYMBOLS) {
                currentWeight += sym.weight;
                if (rand <= currentWeight) {
                    return sym;
                }
            }
            return SYMBOLS[SYMBOLS.length - 1];
        }


        // 转动卷轴动画
        async function animateReels() {
            const allSymEls = document.querySelectorAll('.symbol');
            winInfoEl.textContent = '';

            // 先随机滚动所有符号
            let rollTimes = 0;
            const rollInterval = setInterval(() => {
                allSymEls.forEach(el => {
                    const randSym = getRandomSymbol();
                    el.textContent = randSym.name;
                    el.className = randSym.type === 'zeus' ? 'symbol zeus-symbol' : 'symbol';
                });
                rollTimes++;
                if (rollTimes >= 20) clearInterval(rollInterval);
            }, 60);

            await new Promise(resolve => setTimeout(resolve, 20 * 60));

            // 生成最终结果
            const finalReels = [];
            for (let col = 0; col < REEL_COLS; col++) {
                const colSyms = [];
                for (let row = 0; row < REEL_ROWS; row++) {
                    const sym = getRandomSymbol();
                    colSyms.push(sym);
                    const el = document.querySelector(`[data-col="${col}"][data-row="${row}"]`);
                    el.textContent = sym.name;
                    el.className = sym.type === 'zeus' ? 'symbol zeus-symbol' : 'symbol';
                }
                finalReels.push(colSyms);
                await new Promise(resolve => setTimeout(resolve, 200));
            }

            return finalReels;
        }


        // 滚动胜利机制：中奖符号消失，新符号落下
        async function rollingWin(reels, bet) {
            let totalWin = 0;
            let hasWin = true;

            while (hasWin) {
                hasWin = false;
                const winPositions = new Set();

                // 检查所有可能的支付线（3个及以上相同符号）
                for (let row = 0; row < REEL_ROWS; row++) {
                    let currentSym = null;
                    let matchCount = 0;
                    let startCol = -1;

                    for (let col = 0; col < REEL_COLS; col++) {
                        const sym = reels[col][row];
                        
                        // 宙斯符号可以代替任何符号
                        const compareSym = sym.type === 'zeus' ? currentSym || sym : sym;

                        if (currentSym === null || compareSym.name === currentSym.name) {
                            currentSym = compareSym;
                            matchCount++;
                            if (startCol === -1) startCol = col;
                        } else {
                            if (matchCount >= 3) {
                                // 标记中奖位置
                                for (let c = startCol; c < startCol + matchCount; c++) {
                                    winPositions.add(`${c}-${row}`);
                                }
                                const winMulti = currentSym.multi * matchCount;
                                const winAmount = bet * winMulti;
                                totalWin += winAmount;
                                hasWin = true;
                            }
                            currentSym = compareSym;
                            matchCount = 1;
                            startCol = col;
                        }
                    }

                    // 检查最后一列是否完成匹配
                    if (matchCount >= 3) {
                        for (let c = startCol; c < startCol + matchCount; c++) {
                            winPositions.add(`${c}-${row}`);
                        }
                        const winMulti = currentSym.multi * matchCount;
                        const winAmount = bet * winMulti;
                        totalWin += winAmount;
                        hasWin = true;
                    }
                }

                // 显示中奖符号并替换
                if (hasWin) {
                    // 标记中奖样式
                    winPositions.forEach(pos => {
                        const [col, row] = pos.split('-');
                        const el = document.querySelector(`[data-col="${col}"][data-row="${row}"]`);
                        el.classList.add('win-symbol');
                    });

                    winInfoEl.textContent = `🎉 当前累计奖励：${totalWin}金币！继续滚动...`;
                    await new Promise(resolve => setTimeout(resolve, 1000));

                    // 替换中奖符号为新符号
                    winPositions.forEach(pos => {
                        const [col, row] = pos.split('-');
                        const newSym = getRandomSymbol();
                        reels[col][row] = newSym;
                        const el = document.querySelector(`[data-col="${col}"][data-row="${row}"]`);
                        el.textContent = newSym.name;
                        el.className = newSym.type === 'zeus' ? 'symbol zeus-symbol' : 'symbol';
                    });

                    await new Promise(resolve => setTimeout(resolve, 500));
                }
            }

            return totalWin;
        }


        // 主转动逻辑
        async function spin() {
            if (isSpinning || balance < 5) {
                winInfoEl.textContent = balance < 5 ? "⚠ 余额不足！" : "⏳ 正在转动中...";
                return;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            balance -= 5;
            balanceEl.textContent = balance;
            winInfoEl.textContent = "⚡ 宙斯之力正在觉醒...";

            // 动画转动
            const finalReels = await animateReels();

            // 滚动胜利结算
            const totalWin = await rollingWin(finalReels, 5);
            if (totalWin > 0) {
                balance += totalWin;
                balanceEl.textContent = balance;
                winInfoEl.textContent = `💰 最终奖励：${totalWin}金币！余额：${balance}金币`;
            } else {
                winInfoEl.textContent = "😮‍💨 这次没触发宙斯之力，下次加油！";
            }

            isSpinning = false;
            spinBtn.disabled = false;
        }


        // 初始化
        initReels();
        spinBtn.addEventListener('click', spin);
    </script>
</body>
</html>
