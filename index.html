<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙虎对决 · 本地实战版</title>
    <style>
        /* 基础样式复刻 */
        * { margin: 0; padding: 0; box-sizing: border-box; position: relative; }
        body { 
            background: #1a1a1a; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: sans-serif;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background: #2c4a3b; /* 墨绿色背景 */
            display: flex;
            flex-direction: column;
            border: 2px solid #111;
        }

        /* 顶部状态栏 */
        .top-bar {
            height: 80px;
            display: flex;
            gap: 10px;
            padding: 10px;
        }
        .info-box {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 8px;
            border: 1px solid #4a7c64;
        }
        .info-box label { font-size: 12px; color: #aaa; display: block; }
        .info-box span { font-size: 18px; color: #f1c40f; font-weight: bold; }

        /* 视频对决区 */
        .battle-area {
            height: 280px;
            background: #000;
            overflow: hidden;
            border-top: 3px solid #f1c40f;
            border-bottom: 3px solid #f1c40f;
        }
        #dragonTigerVideo {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 确保视频铺满区域 */
        }
        .overlay-text {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 5px 20px;
            border-radius: 20px; font-size: 14px; white-space: nowrap;
            z-index: 10; border: 1px solid #f1c40f;
        }

        /* 投注操作区 */
        .control-area {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .bet-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        .btn {
            height: 80px;
            border-radius: 15px;
            font-size: 30px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 4px solid #111;
            transition: 0.1s;
        }
        .btn-dragon { background: #2980b9; color: #fff; box-shadow: 0 5px #1a5276; }
        .btn-tie { background: #8e44ad; color: #fff; box-shadow: 0 5px #5b2c6f; }
        .btn-tiger { background: #d35400; color: #fff; box-shadow: 0 5px #873600; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn.selected { border-color: #fff; transform: scale(1.05); }

        .data-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            color: #eee;
        }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .data-row span { color: #f1c40f; font-weight: bold; }

        .confirm-btn {
            background: linear-gradient(#e74c3c, #c0392b);
            color: white;
            height: 60px;
            border-radius: 30px;
            border: none;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 5px #7b241c;
            cursor: pointer;
        }
        .confirm-btn:active { transform: translateY(3px); box-shadow: 0 2px #7b241c; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="top-bar">
        <div class="info-box">
            <label>余额 (USDT)</label>
            <span id="balance">857.80</span>
        </div>
        <div class="info-box">
            <label>当前奖池</label>
            <span>84291.50</span>
        </div>
    </div>

    <div class="battle-area">
        <div class="overlay-text" id="statusLabel">龙虎争霸 · 等待开局</div>
        <video id="dragonTigerVideo" muted playsinline preload="auto">
            <source src="1.mp4" type="video/mp4">
            您的浏览器不支持本地视频播放。
        </video>
    </div>

    <div class="control-area">
        <div class="bet-buttons">
            <div class="btn btn-dragon" onclick="choose('龙', this)">龙</div>
            <div class="btn btn-tie" onclick="choose('和', this)">和</div>
            <div class="btn btn-tiger" onclick="choose('虎', this)">虎</div>
        </div>

        <div class="data-panel">
            <div class="data-row">当前选择: <span id="choice-text">未选择</span></div>
            <div class="data-row">下注金额: <span>100.00</span></div>
            <div class="data-row">预计奖金: <span id="win-text">0.00</span></div>
        </div>

        <button class="confirm-btn" onclick="playGame()">确认投注</button>
    </div>
</div>

<script>
    let currentBalance = 857.80;
    let selected = null;
    let isPlaying = false;
    const video = document.getElementById('dragonTigerVideo');

    function choose(type, el) {
        if(isPlaying) return;
        selected = type;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('choice-text').textContent = type;
        document.getElementById('win-text').textContent = (type === '和' ? 800 : 200).toFixed(2);
    }

    function playGame() {
        if(isPlaying) return;
        if(!selected) return alert("请先选择投注目标！");
        if(currentBalance < 100) return alert("余额不足！");

        isPlaying = true;
        currentBalance -= 100;
        document.getElementById('balance').textContent = currentBalance.toFixed(2);
        document.getElementById('statusLabel').textContent = "对决开始！胜负揭晓中...";

        // 核心逻辑：播放本地 1.mp4 视频
        video.currentTime = 0;
        let playPromise = video.play();

        if (playPromise !== undefined) {
            playPromise.catch(error => {
                console.log("自动播放拦截:", error);
                document.getElementById('statusLabel').textContent = "点击屏幕以加载视频";
            });
        }

        // 15秒后结算结果（匹配你的视频长度）
        setTimeout(() => {
            const results = ['龙', '虎', '和'];
            const win = results[Math.floor(Math.random() * 3)];
            
            document.getElementById('statusLabel').textContent = `本局结果：【${win}】`;
            
            if(selected === win) {
                let prize = (win === '和' ? 800 : 200);
                currentBalance += prize;
                document.getElementById('balance').textContent = currentBalance.toFixed(2);
                alert("恭喜！你赢了 " + prize + " USDT");
            }

            isPlaying = false;
            video.pause();
        }, 15000);
    }
</script>

</body>
</html>
