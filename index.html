    async function settleGame(diceNames) {
        let points = diceNames.map(n=>getPointValue(n)), sum = points.reduce((a,b)=>a+b,0);

        let totalBet = getFishTotalBet();
        if(totalBet===0) { return false; }
        let userBal = getUserBalance();
        if(totalBet > userBal) { return false; }
        
        setUserBalance(userBal - totalBet);
        
        let winAmount = 0;
        let winDetails = [];
        
        for(let [pid, betVal] of Object.entries(patternBets)) {
            if(betVal===0) continue;
            let occur = diceNames.filter(n=> n === patternIdMap[pid]).length;
            let originalWin = occur > 0;
            let finalWin = shouldWinPattern(originalWin);
            
            if (finalWin) {
                let prize = betVal * (occur + 1);
                winAmount += prize;
                winDetails.push(`${patternIdMap[pid]} x${occur}`);
            }
        }
        
        let bigWin=false, smallWin=false, oddWin=false, evenWin=false, allTripletWin=false, doubleWin=false;
        if(!isTriplet) {
            if(sum>=11 && sum<=17) bigWin=true;
            if(sum>=4 && sum<=10) smallWin=true;
            if(sum%2===1) oddWin=true;
            if(sum%2===0) evenWin=true;
        }
        if(isTriplet) allTripletWin=true;
        if(diceNames.includes("鱼") && diceNames.includes("虾")) doubleWin = true;
        
        if(specialBets.big>0 && bigWin) { winAmount += specialBets.big*2; winDetails.push("大"); }
        if(specialBets.small>0 && smallWin) { winAmount += specialBets.small*2; winDetails.push("小"); }
        if(specialBets.odd>0 && oddWin) { winAmount += specialBets.odd*2; winDetails.push("单"); }
        if(specialBets.even>0 && evenWin) { winAmount += specialBets.even*2; winDetails.push("双"); }
        if(specialBets.allTriplets>0 && allTripletWin) { winAmount += specialBets.allTriplets*24; winDetails.push("全围"); }
        if(specialBets.doubleBet>0 && doubleWin) { winAmount += specialBets.doubleBet*4.5; winDetails.push("双押(鱼+虾)"); }
        
        let net = winAmount - totalBet;
        let newBalance = getUserBalance() + winAmount;
        setUserBalance(newBalance);
        
        if (hasGrabbed) {
            playerBankerBalance -= winAmount;
            if (playerBankerBalance < 0) {

        return true;

    function openAdminModal() {
        let pwdModal = document.createElement('div'); pwdModal.className='modal'; pwdModal.innerHTML=`<div class="modal-content"><h2>🔐 管理员验证</h2><input type="password" id="adminPwdInput" class="auth-input" placeholder="管理密码"><div style="display:flex; gap:12px; margin-top:20px;"><button id="submitPwdBtn" style="background:#c47c3a; padding:8px 20px; border-radius:40px;">确认</button><button id="cancelPwdBtn" style="background:#734c2e; padding:8px 20px; border-radius:40px;">取消</button></div></div>`;

    function showAdminPanel() {

tton id="adminChangePwd" style="background:#9b59b6; padding:6px 12px; border-radius:30px;">🔑 改密</button></div><button id="adminClose" style="background:#734c2e; padding:8px; border-radius:40px; width:100%;">关闭后台</button></div>`;
        let modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = modalHtml; document.body.appendChild(modal);
        renderUserTable();
        document.querySelector('#adminSearchBtn').onclick = () => { searchKeyword = document.querySelector('#adminSearchInput').value.trim(); renderUserTable(); };
        document.querySelector('#adminResetSearchBtn').onclick = () => { searchKeyword = ''; document.querySelector('#adminSearchInput').value = ''; renderUserTable(); };
        document.querySelector('#adminExport').onclick = () => { let data = allUsers.map(u => `${u.phone},${u.balance},${u.referralCode},${u.registerTime}`).join('\n'); navigator.clipboard.writeText("手机号,余额,推荐码,注册时间\n" + data).then(() => showToast(`已复制 ${allUsers.length} 条用户数据`)).catch(() => showToast("复制失败")); };
        document.querySelector('#adminAddCode').onclick = () => { let newCode = prompt("请输入新的推荐码（大写字母+数字）:"); if(newCode && newCode.trim()) { let code = newCode.trim().toUpperCase(); if(!validReferralCodes.includes(code)) { validReferralCodes.push(code); localStorage.setItem('valid_referral_codes', JSON.stringify(validReferralCodes)); showToast(`推荐码 ${code} 已添加`); } else showToast("推荐码已存在"); } };
        document.querySelector('#adminListCodes').onclick = () => { alert(`当前有效推荐码：\n${validReferralCodes.join(', ')}`); };
        let getUserSelect = () => modal.querySelector('#adminTargetUser').value;
        let getAmount = () => parseInt(modal.querySelector('#adminAmount').value) || 0;
        modal.querySelector('#adminAdd').onclick = () => { let target = getUserSelect(), amt = getAmount(); if(amt <= 0){ showToast("金额必须大于0"); return; } usersData[target].balance += amt; saveUsers(); showToast(`${target} +${amt}，新余额 ${usersData[target].balance.toFixed(2)}`); if(target === currentUser.phone){ currentUser.balance = usersData[target].balance; let balSpan = document.getElementById("userBalanceDisplay"); if(balSpan) balSpan.innerText = currentUser.balance.toFixed(2); } modal.remove(); showAdminPanel(); };
        modal.querySelector('#adminSub').onclick = () => { let target = getUserSelect(), amt = getAmount(); if(amt <= 0){ showToast("金额必须大于0"); return; } if(usersData[target].balance < amt){ showToast("余额不足"); return; } usersData[target].balance -= amt; saveUsers(); showToast(`${target} -${amt}，新余额 ${usersData[target].balance.toFixed(2)}`); if(target === currentUser.phone){ currentUser.balance = usersData[target].balance; let balSpan = document.getElementById("userBalanceDisplay"); if(balSpan) balSpan.innerText = currentUser.balance.toFixed(2); } modal.remove(); showAdminPanel(); };
        // 【修复】重置余额为1000文
        modal.querySelector('#adminReset').onclick = () => { if(confirm("重置余额为1000文？")){ let target = getUserSelect(); usersData[target].balance = 1000; saveUsers(); showToast(`${target} 余额已重置为1000文`); if(target === currentUser.phone){ currentUser.balance = 1000; let balSpan = document.getElementById("userBalanceDisplay"); if(balSpan) balSpan.innerText = "1000.00"; } modal.remove(); showAdminPanel(); } };
        modal.querySelector('#adminQuery').onclick = () => { let target = getUserSelect(); showToast(`${target} 余额: ${usersData[target].balance.toFixed(2)}`); };
        modal.querySelector('#adminChangePwd').onclick = () => { let old = prompt("请输入当前管理密码:"); if(old !== adminPassword){ showToast("当前密码错误"); return; } let newPwd = prompt("请输入新密码（至少4位）:"); if(newPwd && newPwd.length >= 4){ adminPassword = newPwd; localStorage.setItem('admin_pwd', newPwd); showToast("管理密码修改成功"); } else if(newPwd){ showToast("密码至少4位"); } };
        modal.querySelector('#adminClose').onclick = () => modal.remove();
    }
    
    fishDestroy = () => { container.innerHTML = ''; };
    return fishDestroy;
}

let diceDestroy = null;

    if(diceDestroy) diceDestroy();

                <div style="display:flex; justify-content:space-between; background:rgba(0,0,0,0.5); border-radius:30px; padding:8px; margin-bottom:12px;"><div>⏱️ 下注倒计时 <span id="countdownNum">30</span></div><div>🎲 筹码 <span id="selectedChip">0</span></div></div>
                <div style="display:flex; gap:8px; margin-bottom:12px;">

                <div class="chips" style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:12px;">
                    <div class="chip" data-val="10">10</div><div class="chip" data-val="20">20</div><div class="chip" data-val="50">50</div>
                    <div class="chip" data-val="100">100</div><div class="chip" data-val="500">500</div><div class="chip" data-val="1000">1K</div>
                </div>
                <div style="font-size:0.7rem; color:#ffd49f;">🎲 大小单双 · 赔率2倍</div>
                <div class="special-grid"><div class="bet-card special-card" data-type="BIG">大<div id="bet_BIG">0</div></div><div class="bet-card special-card" data-type="SMALL">小<div id="bet_SMALL">0</div></div><div class="bet-card special-card" data-type="ODD">单<div id="bet_ODD">0</div></div><div class="bet-card special-card" data-type="EVEN">双<div id="bet_EVEN">0</div></div></div>
                <div style="font-size:0.7rem; color:#ffd49f;">🎲 点数投注 · 4-17点</div>
                <div class="points-grid">${pointsHtml}</div>
                <div style="font-size:0.7rem; color:#ffd49f;">🎲 围骰 · 豹子</div>
                <div class="trio-grid">${trioHtml}</div>
                <button id="showDiceHistoryBtn" style="width:100%; background:#2a1f16; border:1px solid #ffaa44; border-radius:40px; padding:8px; margin-top:8px;">📜 开奖记录查询</button>
            </div>
        </div>
    `;
    container.innerHTML = diceHTML;
    let bets = {'BIG':0,'SMALL':0,'ODD':0,'EVEN':0,4:0,5:0,6:0,7:0,8:0,9:0,10:0,11:0,12:0,13:0,14:0,15:0,16:0,17:0,'TRIPLE_1':0,'TRIPLE_2':0,'TRIPLE_3':0,'TRIPLE_4':0,'TRIPLE_5':0,'TRIPLE_6':0,'ALL_TRIPLE':0};
    let selectedChip = 0, currentBalance = getUserBalance(), isDrawing = false, isBetLocked = false, countdownInterval = null, rollingAnimation = null, lastBet = null, hasGrabbed = false, playerBankerBalance = 0, roundActive = true;
    const diceEl = [document.getElementById('dice1'),document.getElementById('dice2'),document.getElementById('dice3')];
    const totalEl = document.getElementById('totalPoints'), rollingWinEl = document.getElementById('rollingWinNumber'), totalBetEl = document.getElementById('totalBet');
    function buildDiceFaces() { diceEl.forEach(dice=>{ if(!dice)return; dice.innerHTML=''; ['front','back','right','left','top','bottom'].forEach(face=>{ let fd=document.createElement('div'); fd.className=`dice-face ${face}`; fd.innerHTML='<div class="pip pip-center"></div>'; dice.appendChild(fd); }); }); } buildDiceFaces();
    function setDiceValue(dice,val){ if(!dice)return; const rot={1:'rotateX(0deg)',2:'rotateX(-90deg)',3:'rotateY(90deg)',4:'rotateY(-90deg)',5:'rotateX(90deg)',6:'rotateX(180deg)'}; dice.style.transform=rot[val]; }
    async function startRollingLong(finalVals,duration=10000){ return new Promise(resolve=>{ let steps=60, step=0, interval=duration/steps; let iv=setInterval(()=>{ diceEl.forEach(d=>setDiceValue(d,Math.floor(Math.random()*6)+1)); step++; if(step>=steps){ clearInterval(iv); diceEl.forEach((d,i)=>setDiceValue(d,finalVals[i])); resolve(); } },interval); }); }
    function startRollingNumber(finalAmount){ if(rollingAnimation) cancelAnimationFrame(rollingAnimation); let start=performance.now(), startVal=parseFloat(rollingWinEl.innerText)||0; function update(now){ let p=Math.min(1,(now-start)/10000), cur=startVal+(finalAmount-startVal)*p; rollingWinEl.innerText=cur.toFixed(2); if(p<1) rollingAnimation=requestAnimationFrame(update); else rollingWinEl.innerText=finalAmount.toFixed(2); } rollingAnimation=requestAnimationFrame(update); }
    function getResultInfo(d1,d2,d3){ let total=d1+d2+d3, types=[]; if(total>=11&&total<=17) types.push('BIG'); if(total>=4&&total<=10) types.push('SMALL'); if(total%2===1) types.push('ODD'); if(total%2===0) types.push('EVEN'); if(d1===d2&&d2===d3){ types.push(`TRIPLE_${d1}`); types.push('ALL_TRIPLE'); } return {total,types}; }
    function updateUI(){ for(let k in bets){ let el=document.getElementById(`bet_${k}`); if(el) el.innerText=bets[k]; } totalBetEl.innerText=Object.values(bets).reduce((a,b)=>a+b,0); }
    function addBet(type){ if(hasGrabbed){ showToast("庄家不能下注"); return; } if(selectedChip<=0){ showToast("请先选择筹码"); return; } if(selectedChip>currentBalance){ showToast("余额不足"); return; } if(isBetLocked){ showToast("正在开奖，请等待"); return; } currentBalance-=selectedChip; setUserBalance(currentBalance); bets[type]+=selectedChip; updateUI(); }
    function clearAllBets(){ let total=Object.values(bets).reduce((a,b)=>a+b,0); currentBalance+=total; setUserBalance(currentBalance); for(let k in bets) bets[k]=0; updateUI(); showToast("已清空所有下注"); }
    function repeatLastBet(){ if(!lastBet){ showToast("无续押记录"); return; } let need=Object.values(lastBet).reduce((a,b)=>a+b,0); if(need>currentBalance){ showToast("余额不足"); return; } for(let k in bets) bets[k]=0; for(let k in lastBet) bets[k]=lastBet[k]; currentBalance-=need; setUserBalance(currentBalance); updateUI(); if(!isDrawing && !isBetLocked && roundActive) startAutoDraw(); }
    let gameRecords=[];
    function addRecord(d1,d2,d3,winAmount,totalBet){ gameRecords.unshift({ time:new Date().toLocaleTimeString(), dice:`${d1},${d2},${d3}`, result:winAmount>0?`赢${winAmount}`:`输${totalBet}`, win:winAmount }); if(gameRecords.length>50) gameRecords.pop(); }
    async function startAutoDraw(){ if(isDrawing || !roundActive) return; let totalBetVal=Object.values(bets).reduce((a,b)=>a+b,0); isDrawing=true; isBetLocked=true; let d1=Math.floor(Math.random()*6)+1, d2=Math.floor(Math.random()*6)+1, d3=Math.floor(Math.random()*6)+1; let {total,types}=getResultInfo(d1,d2,d3); let winAmount=0; if(totalBetVal>0){ if(types.includes('BIG') && bets['BIG']) winAmount+=bets['BIG']*2; if(types.includes('SMALL') && bets['SMALL']) winAmount+=bets['SMALL']*2; if(types.includes('ODD') && bets['ODD']) winAmount+=bets['ODD']*2; if(types.includes('EVEN') && bets['EVEN']) winAmount+=bets['EVEN']*2; if(bets[total]) winAmount+=bets[total]*oddsMap[total]; for(let t of types){ if(t.startsWith('TRIPLE_') && bets[t]) winAmount+=bets[t]*150; if(t==='ALL_TRIPLE' && bets['ALL_TRIPLE']) winAmount+=bets['ALL_TRIPLE']*30; } } startRollingNumber(winAmount); await startRollingLong([d1,d2,d3],10000); totalEl.innerText=total; if(totalBetVal>0){ if(winAmount>0) currentBalance+=winAmount; setUserBalance(currentBalance); if(hasGrabbed){ playerBankerBalance-=winAmount; if(playerBankerBalance<0){ hasGrabbed=false; playerBankerBalance=0; localStorage.setItem('dice_player_banker',0); updateGrabBtn(); showToast("庄家破产，权限回收"); } else localStorage.setItem('dice_player_banker',playerBankerBalance); } } addRecord(d1,d2,d3,winAmount,totalBetVal); for(let k in bets) bets[k]=0; lastBet=JSON.parse(JSON.stringify(bets)); updateUI(); let pop=document.createElement('div'); pop.className='result-popup '+(winAmount>0?'win':'lose'); pop.textContent=winAmount>0?`🎉 赢 ${winAmount} 🎉`:(totalBetVal>0?`😭 输 ${totalBetVal} 😭`:`🎲 点数 ${total} 无人下注`); document.body.appendChild(pop); setTimeout(()=>pop.classList.add('show'),10); setTimeout(()=>{ pop.classList.remove('show'); setTimeout(()=>pop.remove(),300); },2000); isDrawing=false; isBetLocked=false; if(roundActive) startCountdown(30); }
    function startCountdown(sec){ if(countdownInterval) clearInterval(countdownInterval); let c=sec; let cdSpan=document.getElementById('countdownNum'); cdSpan.innerText=c; isBetLocked=false; countdownInterval=setInterval(()=>{ if(!roundActive){ clearInterval(countdownInterval); return; } if(c<=1){ clearInterval(countdownInterval); countdownInterval=null; isBetLocked=true; startAutoDraw(); } else{ c--; cdSpan.innerText=c; if(c<=5) cdSpan.classList.add('countdown-warning'); else cdSpan.classList.remove('countdown-warning'); } },1000); }
    function refreshBalance(){ currentBalance=getUserBalance(); updateUI(); showToast("余额已刷新"); }
    function updateGrabBtn(){ let btn=document.getElementById('diceGrabBtn'); let bal=getUserBalance(); if(hasGrabbed){ btn.disabled=true; btn.textContent='🏆 已抢庄'; } else if(bal>=2001){ btn.disabled=false; btn.textContent='🎲 抢庄 (需2001文)'; } else{ btn.disabled=true; btn.textContent='🎲 抢庄 (余额不足)'; } }
    async function manualDraw(){ if(isDrawing){ showToast("正在开奖中"); return; } if(!roundActive) return; if(countdownInterval) clearInterval(countdownInterval); isBetLocked=true; startAutoDraw(); }
    document.getElementById('diceGrabBtn').onclick=()=>{ if(hasGrabbed) return; if(getUserBalance()>=2001){ setUserBalance(getUserBalance()-2001); currentBalance=getUserBalance(); playerBankerBalance=2001; hasGrabbed=true; localStorage.setItem('dice_player_banker',playerBankerBalance); updateGrabBtn(); showToast("抢庄成功，不可下注"); document.querySelectorAll('.dice-wrapper .chip').forEach(c=>c.style.pointerEvents='none'); } else showToast("余额不足2001"); };
    let savedBanker=localStorage.getItem('dice_player_banker'); if(savedBanker && parseInt(savedBanker)>0){ hasGrabbed=true; playerBankerBalance=parseInt(savedBanker); updateGrabBtn(); document.querySelectorAll('.dice-wrapper .chip').forEach(c=>c.style.pointerEvents='none'); }
    document.querySelectorAll('.dice-wrapper .chip').forEach(chip=>{ chip.onclick=function(){ if(hasGrabbed){ showToast("庄家不能下注"); return; } selectedChip=parseInt(this.dataset.val); document.getElementById('selectedChip').innerText=selectedChip; document.querySelectorAll('.dice-wrapper .chip').forEach(c=>c.classList.remove('selected')); this.classList.add('selected'); }; });
    document.querySelectorAll('.special-card').forEach(c=>{ c.onclick=()=>{ if(!hasGrabbed) addBet(c.dataset.type); }; });
    document.querySelectorAll('.point-card').forEach(c=>{ c.onclick=()=>{ if(!hasGrabbed) addBet(parseInt(c.dataset.point)); }; });
    document.querySelectorAll('.trio-card').forEach(c=>{ c.onclick=()=>{ if(!hasGrabbed) addBet(c.dataset.type); }; });
    document.getElementById('clearAllBtn').onclick=clearAllBets; document.getElementById('repeatBtn').onclick=repeatLastBet; document.getElementById('refreshBtn').onclick=refreshBalance; document.getElementById('diceManualBtn').onclick=manualDraw;
    document.getElementById('showDiceHistoryBtn').onclick=()=>{ if(!gameRecords.length){ showToast("暂无记录"); return; } let html='<div style="max-height:400px; overflow-y:auto;">'+gameRecords.map(r=>`<div style="background:#2a241e; margin:8px; padding:8px; border-left:3px solid #ffaa44;"><div>${r.time}</div><div>🎲 ${r.dice}</div><div style="color:${r.win>0?'#4caf50':'#f44336'}">${r.result}</div></div>`).join('')+'</div><button id="closeRec" style="background:#ffaa44; margin-top:12px; padding:8px 20px; border-radius:40px;">关闭</button>'; let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content"><h3>📜 开奖记录</h3>${html}</div>`; document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove(); };
    diceEl.forEach(d=>setDiceValue(d,1)); totalEl.innerText=3; updateUI(); startCountdown(30);
    diceDestroy=()=>{ roundActive=false; if(countdownInterval) clearInterval(countdownInterval); if(rollingAnimation) cancelAnimationFrame(rollingAnimation); container.innerHTML=''; };
    return diceDestroy;
}

function initGame4(c){ if(window.game4Destroy) window.game4Destroy(); c.innerHTML='<div style="padding:60px 20px; text-align:center; color:#ffdd99;"><h3>♠️ 游戏4预留位</h3><p>即将开放</p></div>'; window.game4Destroy=()=>{ c.innerHTML=''; }; return window.game4Destroy; }

// ==================== 全局在线人数（对接真实后端，只初始化一次）====================
(function() {
    let onlineSpan = null;
    let intervalId = null;
    function getOnlineSpan() {
        if (!onlineSpan || !document.body.contains(onlineSpan)) {
            onlineSpan = document.getElementById('onlineCount');
        }
        return onlineSpan;
    }
    function updateOnlineCount() {
        const span = getOnlineSpan();
        if (!span) return;
        fetch('http://127.0.0.1:8090/getOnlineCount')
            .then(res => res.json())
            .then(data => {
                const count = data?.count ?? data?.online;
                if (typeof count === 'number') {
                    span.innerText = count;
                } else {
                    span.innerText = '--';
                }
            })
            .catch(err => {
                console.error('在线人数接口失败:', err);
                span.innerText = '--';
            });
    }
    if (!intervalId) {
        updateOnlineCount();
        intervalId = setInterval(updateOnlineCount, 5000);
    }
    window.addEventListener('beforeunload', () => {
        if (intervalId) clearInterval(intervalId);
    });
})();

// ==================== 注册登录界面（推荐码必填）====================
function renderAuthUI(){
    const savedPhone = localStorage.getItem('saved_phone') || '';
    const savedPwd = localStorage.getItem('saved_password') || '';
    const rememberChecked = localStorage.getItem('remember_me') === 'true';
    const validReferralCodes = ['VIP888', 'ABC123', 'GAME2024', 'TEST001'];
    document.getElementById('app').innerHTML = `<div class="auth-panel"><h2>🎲 双游戏大厅</h2><input type="tel" id="regPhone" class="auth-input" placeholder="手机号" maxlength="11" value="${savedPhone}"><input type="password" id="regPassword" class="auth-input" placeholder="密码 (至少4位)" value="${savedPwd}"><input type="text" id="regReferralCode" class="auth-input" placeholder="推荐码 (必填)" maxlength="20"><div style="display:flex; align-items:center; gap:8px; margin:8px 0;"><input type="checkbox" id="rememberCheckbox" ${rememberChecked ? 'checked' : ''}><label style="color:#ffdd99;">记住账号密码</label></div><div class="auth-buttons"><button id="loginBtn" class="auth-btn">登录</button><button id="registerBtn" class="auth-btn">注册</button></div><div class="auth-note">🎮 需要有效推荐码才能注册 | 初始1000文</div></div>`;
    document.getElementById('registerBtn').onclick = () => { let phone = document.getElementById('regPhone').value.trim(); let pwd = document.getElementById('regPassword').value; let referralCode = document.getElementById('regReferralCode').value.trim().toUpperCase(); if(!phone || !pwd){ showToast("请填写手机号和密码"); return; } if(!/^1[3-9]\d{9}$/.test(phone)){ showToast("请输入有效11位手机号"); return; } if(pwd.length < 4){ showToast("密码至少4位"); return; } if(!referralCode){ showToast("请填写推荐码"); return; } if(!validReferralCodes.includes(referralCode)){ showToast("推荐码无效，无法注册"); return; } if(usersData[phone]){ showToast("手机号已注册"); return; } usersData[phone] = { password: pwd, balance: 1000, referralCode: referralCode, registerTime: new Date().toLocaleString() }; saveUsers(); showToast("注册成功！请登录"); };
    document.getElementById('loginBtn').onclick = () => { let phone = document.getElementById('regPhone').value.trim(); let pwd = document.getElementById('regPassword').value; let rem = document.getElementById('rememberCheckbox').checked; if(!phone || !pwd){ showToast("请填写手机号和密码"); return; } let user = usersData[phone]; if(!user || user.password !== pwd){ showToast("账号或密码错误"); return; } if(rem){ localStorage.setItem('saved_phone', phone); localStorage.setItem('saved_password', pwd); localStorage.setItem('remember_me', 'true'); }else{ localStorage.removeItem('saved_phone'); localStorage.removeItem('saved_password'); localStorage.setItem('remember_me', 'false'); } currentUser = { phone, ...user }; showToast(`欢迎，${phone}`); renderGameLobby(); };
}

// ==================== 游戏大厅 ====================
function renderGameLobby(){
    document.getElementById('app').innerHTML = `<div class="user-section"><div class="user-info-row"><span>📱 ${currentUser.phone.substring(0,7)}... | 💰 余额: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span><div class="btn-group"><button id="serviceBtn" class="service-btn">📞 客服</button><button id="logoutBtn" class="logout-btn">退出</button></div></div><div class="charge-withdraw-row"><button id="rechargeBtn" class="charge-btn">💎 充值</button><button id="withdrawBtn" class="withdraw-btn">💰 提现</button></div></div><div class="game-nav"><button class="game-tab active" data-game="fish">🎲 葫芦鱼</button><button class="game-tab" data-game="dice">🎲 至尊骰宝</button><button class="game-tab" data-game="game3">🎮 游戏3</button><button class="game-tab" data-game="game4">♠️ 游戏4</button></div><div class="game-container"><div id="gamePanel"></div></div>`;
    document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
    document.getElementById('serviceBtn').onclick = () => showService();
    document.getElementById('rechargeBtn').onclick = recharge;
    document.getElementById('withdrawBtn').onclick = withdraw;
    const gamePanel = document.getElementById('gamePanel');
    let currentDestroy = null;
    const gameInits = { fish: initFishGame, dice: initDiceGame, game3: initGame3, game4: initGame4 };
    async function switchGame(gameId) { if(currentDestroy){ currentDestroy(); currentDestroy = null; } gamePanel.innerHTML = ''; const initFn = gameInits[gameId]; if(initFn) currentDestroy = await initFn(gamePanel); let balSpan = document.getElementById("userBalanceDisplay"); if(balSpan) balSpan.innerText = getUserBalance().toFixed(2); }
    document.querySelectorAll('.game-tab').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
    switchGame('fish');
}

renderAuthUI();
</script>
