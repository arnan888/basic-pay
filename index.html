<!DOCTYPE html>

<body>
<div class="app" id="app"></div>
<script>
    // ==================== 全局用户系统 ====================
    const USERS_KEY = 'double_games_final';
    let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
    let currentUser = null;
    function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0; }
    function setUserBalance(amt) { if(currentUser) { usersData[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }
    function showToast(msg) { let t=document.createElement('div'); t.textContent=msg; t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#000000cc;backdrop-filter:blur(10px);color:#ffaa44;padding:8px 16px;border-radius:40px;font-size:0.7rem;z-index:2001;border:1px solid #ffaa44;'; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }

    function showServiceModal() { const modal=document.createElement('div'); modal.className='modal'; modal.innerHTML=`<div class="modal-content"><h3>📞 客服</h3><img src="29917.jpg" class="qr-img" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=客服微信'"><button id="closeSvc">关闭</button></div>`; document.body.appendChild(modal); modal.querySelector('#closeSvc').onclick=()=>modal.remove(); }
    function recharge() { showRechargeModal(); }
    function withdraw() { showToast("提现请联系客服"); }
    
    // ==================== 游戏1：葫芦鱼（全自动循环，无人抢庄/无下注均开奖）====================
    let fishDestroy = null, fishAutoTimer = null, fishPhaseTimer = null, fishIsRolling = false;
    async function animateRollingLong(diceEls, finalNames, iconMap, durationMs=5000) {
        const steps = 30, interval = durationMs / steps;
        for(let i=0;i<steps;i++) {
            await new Promise(r=>setTimeout(r, interval));
            for(let d=0;d<3;d++) { let rand = ["鱼","虾","蟹","葫芦","金钱","鸡"][Math.floor(Math.random()*6)]; diceEls[d].innerHTML = iconMap[rand]; }
        }
        for(let i=0;i<3;i++) diceEls[i].innerHTML = iconMap[finalNames[i]];
    }
    function initFishGame(container) {
        if (fishDestroy) fishDestroy();
        container.innerHTML = '';
        const fishHTML = `

                    <div class="stat-card" style="background:#1a130d; border-radius:30px; padding:4px 8px; flex:1; text-align:center;"><div style="font-size:0.55rem;">🎲 总押注</div><div id="totalBetValue">0</div></div>
                    <div class="stat-card" style="background:#1a130d; border-radius:30px; padding:4px 8px; flex:1; text-align:center;"><div style="font-size:0.55rem;">🏆 上局净利</div><div id="lastWinValue">0</div></div>
                </div>
                <div class="grab-bar" style="display:flex; justify-content:center; margin:8px 12px;"><button id="grabBtn" class="grab-btn">🎲 抢庄 (需2001文)</button></div>
                <div class="room-selector" style="display:flex; justify-content:center; margin:8px 12px;"><label style="color:#ffdd99;">🏠 房间：</label><select id="roomSelect"><option value="room1">初级房</option><option value="room2">中级房</option><option value="room3">高级房</option></select></div>
                <div class="dice-area" style="background:#2a211a; margin:12px; border-radius:50px; padding:12px; text-align:center; position:relative;">
                    <div class="dice-title">⚡ 三骰开彩 ⚡</div>
                    <div class="dice-box" style="display:flex; justify-content:center; gap:12px;"><div class="dice" style="background:#fff2df; width:70px;height:70px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;">🎲</div><div class="dice" style="background:#fff2df; width:70px;height:70px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;">🎲</div><div class="dice" style="background:#fff2df; width:70px;height:70px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;">🎲</div></div>
                    <div id="fishDiceCover" style="position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle, rgba(0,0,0,0.9), #2c1e14); backdrop-filter:blur(6px); border-radius:50px; display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:15;"><span style="font-size:3rem;">🏺</span><div class="cover-text" style="background:#00000099; padding:2px 12px; border-radius:30px;">骰盅未开</div></div>

                <div id="fishPhaseHint" style="text-align:center; background:#00000088; margin:8px 12px; border-radius:30px; padding:4px; font-size:0.7rem; color:#ffaa66;">⏳ 等待开局...</div>
            </div>
        `;
        container.innerHTML = fishHTML;
        let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
        let specialBets = { big:0, small:0, odd:0, even:0, allTriplets:0, doubleBet:0 };
        let currentChip = 100, lastWinAmount = 0, hasGrabbed = false, playerBankerBalance = 0;
        let currentRoom = "room1";
        function getBankerKey() { return `fish_banker_balance_${currentRoom}`; }
        function getPlayerBankerKey() { return `player_banker_balance_${currentRoom}`; }
        let fishBalance = parseInt(localStorage.getItem(getBankerKey())) || 10000;
        let savedPlayer = parseInt(localStorage.getItem(getPlayerBankerKey())) || 0;

        function subBet(type, id, val) { let target=type==='pattern'?patternBets:specialBets; if(target[id]===undefined) return; target[id]=Math.max(0,target[id]-val); updateFishUI(); }
        function clearAllBets() { for(let k in patternBets) patternBets[k]=0; for(let k in specialBets) specialBets[k]=0; updateFishUI(); }
        function resetGameState() { clearAllBets(); lastWinAmount=0; updateFishUI(); container.querySelectorAll(".dice").forEach(d=>d.innerHTML="🎲"); const cover=container.querySelector('#fishDiceCover'); if(cover) { cover.style.display="flex"; cover.style.transform=""; cover.style.opacity="1"; } }

        async function settleAndAnimate(finalNames) {

            fishIsRolling=true;
            const diceEls=container.querySelectorAll(".dice"); const iconMap={"鱼":"🐟","虾":"🦐","蟹":"🦀","葫芦":"🏺","金钱":"💰","鸡":"🐔"};

            await animateRollingLong(diceEls, finalNames, iconMap, 5000);
            let points=finalNames.map(n=>{let m={"鱼":1,"虾":2,"蟹":3,"葫芦":4,"金钱":5,"鸡":6}; return m[n];}); let sum=points.reduce((a,b)=>a+b,0); let isTriplet=finalNames[0]===finalNames[1]&&finalNames[1]===finalNames[2];
            let totalBet=getFishTotalBet(); let winAmount=0, winDetails=[];
            if(totalBet>0) {
                let userBal=getUserBalance(); if(totalBet<=userBal) setUserBalance(userBal-totalBet);
                for(let [pid,val] of Object.entries(patternBets)) { if(val===0) continue; let occur=finalNames.filter(n=>n===patternIdMap[pid]).length; if(occur>0) { let prize=val*(occur+1); winAmount+=prize; } }
                if(!isTriplet) { if(sum>=11&&sum<=17 && specialBets.big) winAmount+=specialBets.big*2; if(sum>=4&&sum<=10 && specialBets.small) winAmount+=specialBets.small*2; if(sum%2===1 && specialBets.odd) winAmount+=specialBets.odd*2; if(sum%2===0 && specialBets.even) winAmount+=specialBets.even*2; }
                if(isTriplet && specialBets.allTriplets) winAmount+=specialBets.allTriplets*24;
                if(finalNames.includes("鱼")&&finalNames.includes("虾") && specialBets.doubleBet) winAmount+=specialBets.doubleBet*4.5;
                let newBalance=getUserBalance()+winAmount; setUserBalance(newBalance);
                if(hasGrabbed) { playerBankerBalance-=winAmount; if(playerBankerBalance<0) { hasGrabbed=false; playerBankerBalance=0; localStorage.setItem(getPlayerBankerKey(),0); updateGrabButtonState(); showToast("庄家破产，权限回收"); } else localStorage.setItem(getPlayerBankerKey(),playerBankerBalance); }
                lastWinAmount=winAmount-totalBet;
                document.getElementById("userBalanceDisplay").innerText=newBalance.toFixed(2);

            addRecord(finalNames, winAmount, totalBet);

    function renderGameLobby() {
        const app = document.getElementById('app');
        app.innerHTML = `<div class="user-section"><div class="user-info-row"><span>📱 ${currentUser.phone.substring(0,7)}... | 💰 余额: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span><div class="btn-group"><button id="serviceBtn" class="service-btn">📞 客服</button><button id="logoutBtn" class="logout-btn">退出</button></div></div><div class="charge-withdraw-row"><button id="rechargeBtn" class="charge-btn">💎 充值</button><button id="withdrawBtn" class="withdraw-btn">💰 提现</button></div></div><div class="game-nav"><button class="game-tab active" data-game="fish">🎲 葫芦鱼</button><button class="game-tab" data-game="dice">🎲 至尊骰宝</button><button class="game-tab" data-game="game3">🎮 游戏3</button><button class="game-tab" data-game="game4">♠️ 游戏4</button></div><div class="game-container"><div id="gamePanel"></div></div>`;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;
        const gameContainer = document.getElementById('gamePanel');
        let currentDestroy = null;
        const gameInits = { fish: initFishGame, dice: initDiceGame, game3: initGame3, game4: initGame4 };
        async function switchGame(gameId) { if(currentDestroy) { currentDestroy(); currentDestroy=null; } gameContainer.innerHTML=''; const initFn=gameInits[gameId]; if(initFn) { const destroy=await initFn(gameContainer); if(typeof destroy==='function') currentDestroy=destroy; } document.getElementById('userBalanceDisplay').innerText=getUserBalance().toFixed(2); }
        document.querySelectorAll('.game-tab').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.game-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
        switchGame('fish');
    }
    renderAuthUI();
</script>
</body>
</html>
