<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D龙虎斗·科技感多选版</title>
    <style>
        :root {
            --jade: #4a7c64; --jade-l: #6b9a85; --jade-d: #2c4a3b;
            --stone: #6b737e; --inner: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            --gold: #f1c40f; --red: #ff4d4d; --blue: #00aaff; --tiger: #ff6600; --tie: #aa66ff;
            --cyber-glow: 0 0 20px rgba(0,255,255,0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0c0c0c; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .container-outer {
            width: 100vw; height: 100vh; max-width: 480px;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%;
            animation: outerNeonRotate 15s linear infinite;
            padding: 6px;
            border-radius: 18px;
            box-shadow: 0 0 50px rgba(255,255,255,0.6);
        }
        @keyframes outerNeonRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%; height: 100%;
            background: var(--jade);
            border-radius: 15px;
            display: flex; flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .header { height: 8%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 8px 12px; }
        .box { background: var(--stone); border: 2px solid var(--jade-d); box-shadow: var(--inner); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px;
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        .box span:first-child { font-size: 12px; color: #ccc; letter-spacing: 1px; font-weight: bold; }
        .box span:last-child { font-size: 20px; font-weight: bold; color: var(--gold); text-shadow: 0 0 6px var(--gold); }

        /* 3D科技感战场 */
        .battle-scene { 
            height: 38%; 
            margin: 4px 10px;
            position: relative; 
            overflow: hidden;
            border-radius: 12px;
            border: 2px solid rgba(0,255,255,0.5);
            box-shadow: 0 0 20px rgba(0,255,255,0.3), inset 0 0 20px rgba(0,0,0,0.5);
            background: radial-gradient(circle at 30% 40%, #0a1520, #010105);
        }
        
        /* 网格地面 - 科技感 */
        .grid-floor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: repeating-linear-gradient(90deg, rgba(0,255,255,0.2) 0px, rgba(0,255,255,0.2) 2px, transparent 2px, transparent 40px),
                        repeating-linear-gradient(0deg, rgba(0,255,255,0.2) 0px, rgba(0,255,255,0.2) 2px, transparent 2px, transparent 40px);
            transform: perspective(400px) rotateX(60deg);
            transform-origin: bottom;
            animation: gridMove 8s linear infinite;
        }
        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }
        
        /* 3D龙容器 */
        .dragon-3d {
            position: absolute;
            left: 10%;
            bottom: 25%;
            transform-style: preserve-3d;
            transform: rotateY(0deg) rotateX(10deg);
            transition: all 0.05s linear;
            z-index: 10;
            filter: drop-shadow(0 0 15px #00aaff);
        }
        .dragon-3d.attacking {
            animation: dragon3dCharge 0.35s cubic-bezier(0.2, 1.2, 0.8, 1) forwards;
        }
        @keyframes dragon3dCharge {
            0% { left: 10%; transform: rotateY(0deg) scale(1); filter: drop-shadow(0 0 15px #00aaff); }
            40% { left: 42%; transform: rotateY(30deg) scale(1.5); filter: drop-shadow(0 0 40px #ff6600); }
            100% { left: 10%; transform: rotateY(0deg) scale(1); filter: drop-shadow(0 0 15px #00aaff); }
        }
        
        /* 3D虎容器 */
        .tiger-3d {
            position: absolute;
            right: 10%;
            bottom: 25%;
            transform-style: preserve-3d;
            transform: rotateY(0deg) rotateX(10deg);
            transition: all 0.05s linear;
            z-index: 10;
            filter: drop-shadow(0 0 15px #ff6600);
        }
        .tiger-3d.attacking {
            animation: tiger3dCharge 0.35s cubic-bezier(0.2, 1.2, 0.8, 1) forwards;
        }
        @keyframes tiger3dCharge {
            0% { right: 10%; transform: rotateY(0deg) scale(1); filter: drop-shadow(0 0 15px #ff6600); }
            40% { right: 42%; transform: rotateY(-30deg) scale(1.5); filter: drop-shadow(0 0 40px #ff3300); }
            100% { right: 10%; transform: rotateY(0deg) scale(1); filter: drop-shadow(0 0 15px #ff6600); }
        }
        
        /* 3D立体图标 */
        .dragon-3d .icon {
            font-size: 80px;
            display: block;
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.5));
            animation: float3d 3s ease-in-out infinite;
        }
        .tiger-3d .icon {
            font-size: 80px;
            display: block;
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.5));
            animation: float3d 3s ease-in-out infinite reverse;
        }
        @keyframes float3d {
            0% { transform: translateY(0px) rotateZ(0deg); }
            50% { transform: translateY(-8px) rotateZ(3deg); }
            100% { transform: translateY(0px) rotateZ(0deg); }
        }
        
        /* 科技光环 */
        .tech-ring {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid cyan;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 0 20px cyan;
        }
        .tech-ring.active {
            animation: ringPulse 0.6s ease-out forwards;
        }
        @keyframes ringPulse {
            0% { width: 40px; height: 40px; opacity: 1; border-width: 3px; }
            100% { width: 180px; height: 180px; opacity: 0; border-width: 1px; }
        }
        
        /* 数字粒子效果 */
        .digital-particle {
            position: absolute;
            font-size: 12px;
            font-family: monospace;
            color: cyan;
            pointer-events: none;
            z-index: 20;
            text-shadow: 0 0 5px cyan;
            font-weight: bold;
        }
        
        .win-effect-3d {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            white-space: nowrap;
            left: 50%;
            top: 40%;
            transform: translateX(-50%);
            opacity: 0;
            pointer-events: none;
            z-index: 25;
            text-shadow: 0 0 10px gold;
        }
        .win-effect-3d.show {
            animation: winTextFlash 1.5s ease-out forwards;
        }
        @keyframes winTextFlash {
            0% { opacity: 0; transform: translateX(-50%) scale(0.5); }
            20% { opacity: 1; transform: translateX(-50%) scale(1.2); text-shadow: 0 0 20px orange; }
            80% { opacity: 1; transform: translateX(-50%) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) scale(1.5); }
        }
        
        .battle-result {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            font-size: 14px; font-weight: bold;
            color: #0ff; text-shadow: 0 0 8px cyan;
            z-index: 20;
            padding: 4px 12px;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid cyan;
            white-space: nowrap;
        }

        .play-section {
            flex: 1; display: flex; flex-direction: column;
            background: var(--stone); box-shadow: var(--inner); border: 3px solid var(--jade-d); 
            border-radius: 12px; margin: 4px 10px 8px 10px; padding: 12px;
        }

        /* 多选押注区域 - 科技感边框 */
        .multi-bet-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            justify-content: space-between;
        }
        .multi-bet-item {
            flex: 1;
            background: rgba(0,0,0,0.6);
            border: 2px solid #00aaff;
            border-radius: 12px;
            padding: 10px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 0 5px rgba(0,170,255,0.3);
        }
        .multi-bet-item.selected {
            border-color: var(--gold);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 15px rgba(241,196,15,0.6);
        }
        .multi-bet-name {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .multi-bet-name.dragon { color: #00aaff; text-shadow: 0 0 8px #00aaff; }
        .multi-bet-name.tiger { color: #ff6600; text-shadow: 0 0 8px #ff6600; }
        .multi-bet-name.tie { color: #aa66ff; text-shadow: 0 0 8px #aa66ff; }
        .multi-bet-amount {
            font-size: 18px;
            color: var(--gold);
            font-weight: bold;
        }
        .multi-bet-control {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 6px;
        }
        .multi-bet-control button {
            background: rgba(0,0,0,0.7);
            border: 1px solid cyan;
            border-radius: 20px;
            width: 32px;
            height: 32px;
            color: cyan;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 5px cyan;
        }

        .data-stack { display: grid; grid-template-rows: repeat(3, 1fr); gap: 6px; margin: 0 6px; }
        .data-item { background: rgba(0,0,0,0.6); border: 2px solid cyan; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; box-shadow: 0 0 5px cyan; }
        .data-item label { font-size: 12px; color: #0ff; font-weight: bold; }
        .data-item value { font-size: 18px; color: var(--gold); font-weight: 900; text-shadow: 0 0 6px var(--gold); }

        .stake-txt { text-align: center; color: #0ff; font-size: 16px; font-weight: bold; margin: 8px 0; text-shadow: 0 0 5px cyan; }
        .stake-txt span { color: var(--gold); text-shadow: 0 0 6px var(--gold); }

        .exec-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .step-btn { width: 52px; height: 52px; background: linear-gradient(145deg, #2a5a4a, #1a3a2a); border: 2px solid cyan; border-radius: 10px; color: cyan; font-size: 28px; font-weight: bold; cursor: pointer; box-shadow: 0 0 8px cyan; }
        .main-go { flex: 1; height: 52px; background: linear-gradient(180deg, #ff4400, #aa2200); border: none; border-radius: 30px; color: #fff; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 0 15px #ff4400; }
        .main-go:active { transform: translateY(2px); }

        .mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mode-btn { height: 42px; background: rgba(0,0,0,0.6); border: 2px solid cyan; border-radius: 8px; color: cyan; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 5px cyan; }
        .mode-btn.active { border-color: var(--gold); color: #fff; background: var(--jade-d); box-shadow: 0 0 12px gold; }
        .speed-btn { display: flex; gap: 8px; }
        .speed-btn span { width: 33%; height: 100%; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .speed-btn span.active { background: var(--gold); color: #000; font-weight: bold; box-shadow: 0 0 10px gold; }
</style>
</head>
<body>

<div class="container-outer">
    <div class="container">
        <div class="header">
            <div class="box"><span>余额</span><span id="balanceDisplay">857.80</span></div>
            <div class="box"><span>奖池</span><span id="poolDisplay">84291.50</span></div>
        </div>

        <!-- 3D科技感战场 -->
        <div class="battle-scene" id="battleScene">
            <div class="grid-floor"></div>
            <div class="dragon-3d" id="dragon3d">
                <div class="icon">🐉</div>
            </div>
            <div class="tiger-3d" id="tiger3d">
                <div class="icon">🐯</div>
            </div>
            <div class="battle-result" id="battle-result">⚡ 3D 龙虎争霸 ⚡</div>
        </div>

        <div class="play-section">
            <div class="multi-bet-row">
                <div class="multi-bet-item" id="multiDragon" data-type="DRAGON">
                    <div class="multi-bet-name dragon">🐉 龙</div>
                    <div class="multi-bet-amount" id="betDragonAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="DRAGON">-</button>
                        <button class="bet-inc" data-type="DRAGON">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" id="multiTie" data-type="TIE">
                    <div class="multi-bet-name tie">⚖️ 和</div>
                    <div class="multi-bet-amount" id="betTieAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="TIE">-</button>
                        <button class="bet-inc" data-type="TIE">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" id="multiTiger" data-type="TIGER">
                    <div class="multi-bet-name tiger">🐯 虎</div>
                    <div class="multi-bet-amount" id="betTigerAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="TIGER">-</button>
                        <button class="bet-inc" data-type="TIGER">+</button>
                    </div>
                </div>
            </div>

            <div class="data-stack">
                <div class="data-item"><label>⚡ 总押注</label><value id="totalBetAmount">0.00</value></div>
                <div class="data-item"><label>🎯 预计奖金</label><value id="val-win">0.00</value></div>
                <div class="data-item"><label>🔮 模式</label><value id="val-pick">多选押注</value></div>
            </div>

            <div class="stake-txt">单注步长：<span id="stepValue">10</span> USDT</div>

            <div class="exec-row">
                <button class="step-btn" id="stepMinus">-</button>
                <button class="main-go" id="fightBtn">⚡ 3D 碰撞 ⚡</button>
                <button class="step-btn" id="stepPlus">+</button>
            </div>

            <div class="mode-row">
                <div id="btn-auto" class="mode-btn">🤖 自动模式</div>
                <div class="mode-btn speed-btn" id="speedSelector">
                    <span id="speed-1" class="active">1X</span>
                    <span id="speed-2">2X</span>
                    <span id="speed-3">3X</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let state = {
    balance: 857.8,
    betStep: 10,
    bets: { DRAGON: 0, TIGER: 0, TIE: 0 },
    betRolling: false,
    autoMode: false,
    speed: 1,
    pool: 84291.5
};

const ODDS = { DRAGON: 2, TIGER: 2, TIE: 8 };

function updateUI() {
    document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
    document.getElementById('poolDisplay').innerText = state.pool.toFixed(2);
    document.getElementById('betDragonAmount').innerText = state.bets.DRAGON;
    document.getElementById('betTigerAmount').innerText = state.bets.TIGER;
    document.getElementById('betTieAmount').innerText = state.bets.TIE;
    const total = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
    document.getElementById('totalBetAmount').innerText = total.toFixed(2);
    
    let maxWin = 0;
    if(state.bets.DRAGON > 0) maxWin = Math.max(maxWin, state.bets.DRAGON * ODDS.DRAGON);
    if(state.bets.TIGER > 0) maxWin = Math.max(maxWin, state.bets.TIGER * ODDS.TIGER);
    if(state.bets.TIE > 0) maxWin = Math.max(maxWin, state.bets.TIE * ODDS.TIE);
    document.getElementById('val-win').innerText = maxWin.toFixed(2);
    
    document.getElementById('multiDragon').classList.toggle('selected', state.bets.DRAGON > 0);
    document.getElementById('multiTiger').classList.toggle('selected', state.bets.TIGER > 0);
    document.getElementById('multiTie').classList.toggle('selected', state.bets.TIE > 0);
}

function adjustBet(type, delta) {
    if(state.betRolling) return;
    let newVal = state.bets[type] + delta;
    if(newVal < 0) newVal = 0;
    state.bets[type] = newVal;
    updateUI();
}

function adjustStep(dir) {
    let newStep = state.betStep + dir * 10;
    if(newStep < 10) newStep = 10;
    if(newStep > 500) newStep = 500;
    state.betStep = newStep;
    document.getElementById('stepValue').innerText = state.betStep;
}

function createTechRing() {
    const scene = document.getElementById('battleScene');
    const ring = document.createElement('div');
    ring.className = 'tech-ring';
    scene.appendChild(ring);
    setTimeout(() => ring.classList.add('active'), 10);
    setTimeout(() => ring.remove(), 600);
}

function createDigitalParticles() {
    const scene = document.getElementById('battleScene');
    for(let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'digital-particle';
        particle.innerText = ['01','10','11','00','⚡','💠'][Math.floor(Math.random()*6)];
        particle.style.left = (Math.random() * 80 + 10) + '%';
        particle.style.top = (Math.random() * 60 + 20) + '%';
        scene.appendChild(particle);
        setTimeout(() => particle.remove(), 500);
    }
}

function showWinText(winner, amount) {
    const scene = document.getElementById('battleScene');
    const winDiv = document.createElement('div');
    winDiv.className = 'win-effect-3d';
    if(winner === 'DRAGON') winDiv.innerText = '🐉 龙威震天 +' + amount.toFixed(2);
    else if(winner === 'TIGER') winDiv.innerText = '🐯 虎啸山林 +' + amount.toFixed(2);
    else winDiv.innerText = '⚖️ 和局至尊 +' + amount.toFixed(2);
    scene.appendChild(winDiv);
    setTimeout(() => winDiv.classList.add('show'), 10);
    setTimeout(() => winDiv.remove(), 1500);
}

function executeBet() {
    if(state.betRolling) { alert('战斗中，请稍后'); return; }
    
    const totalBet = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
    if(totalBet <= 0) { alert('请至少押注一个选项'); return; }
    if(state.balance < totalBet) { alert('余额不足'); return; }

    state.betRolling = true;
    state.balance -= totalBet;
    updateUI();

    const dragon = document.getElementById('dragon3d');
    const tiger = document.getElementById('tiger3d');
    
    document.getElementById('battle-result').textContent = '💥 3D 能量碰撞 💥';
    createTechRing();
    createDigitalParticles();
    
    dragon.classList.add('attacking');
    tiger.classList.add('attacking');

    const delay = state.speed === 3 ? 1000 : state.speed === 2 ? 1600 : 2200;
    setTimeout(() => {
        dragon.classList.remove('attacking');
        tiger.classList.remove('attacking');
        
        const rand = Math.random();
        let winType = '';
        if(rand < 0.45) winType = 'DRAGON';
        else if(rand < 0.9) winType = 'TIGER';
        else winType = 'TIE';
        
        let winAmount = 0;
        let resultText = '';
        
        if(winType === 'DRAGON') {
            resultText = '🐉 龙威盖世！';
            if(state.bets.DRAGON > 0) winAmount = state.bets.DRAGON * ODDS.DRAGON;
        } else if(winType === 'TIGER') {
            resultText = '🐯 虎啸山林！';
            if(state.bets.TIGER > 0) winAmount = state.bets.TIGER * ODDS.TIGER;
        } else {
            resultText = '⚖️ 势均力敌！';
            if(state.bets.TIE > 0) winAmount = state.bets.TIE * ODDS.TIE;
        }
        
        if(winAmount > 0) {
            state.balance += winAmount;
            updateUI();
            showWinText(winType, winAmount);
            resultText += ` +${winAmount.toFixed(2)}`;
            createTechRing();
        } else {
            resultText += ' 未押注';
        }
        
        document.getElementById('battle-result').textContent = resultText;
        
        setTimeout(() => {
            if(!state.autoMode) {
                document.getElementById('battle-result').textContent = '⚡ 3D 龙虎争霸 ⚡';
            }
        }, 2000);
        
        state.betRolling = false;
        
        if(state.autoMode) {
            setTimeout(() => {
                if(state.autoMode && !state.betRolling) executeBet();
            }, state.speed === 3 ? 1200 : state.speed === 2 ? 1800 : 2500);
        }
    }, delay);
}

function toggleAuto() {
    state.autoMode = !state.autoMode;
    const btn = document.getElementById('btn-auto');
    btn.classList.toggle('active');
    btn.innerText = state.autoMode ? '🔴 关闭自动' : '🤖 自动模式';
}

function setSpeed(speed) {
    state.speed = speed;
    document.querySelectorAll('.speed-btn span').forEach(s => s.classList.remove('active'));
    document.getElementById(`speed-${speed}`).classList.add('active');
}

function toggleSpeed() {
    let newSpeed = state.speed % 3 + 1;
    setSpeed(newSpeed);
}

document.getElementById('stepMinus').onclick = () => adjustStep(-1);
document.getElementById('stepPlus').onclick = () => adjustStep(1);
document.getElementById('fightBtn').onclick = executeBet;
document.getElementById('btn-auto').onclick = toggleAuto;
document.getElementById('speedSelector').onclick = toggleSpeed;

document.querySelectorAll('.bet-dec').forEach(btn => {
    btn.onclick = (e) => {
        e.stopPropagation();
        adjustBet(btn.dataset.type, -state.betStep);
    };
});
document.querySelectorAll('.bet-inc').forEach(btn => {
    btn.onclick = (e) => {
        e.stopPropagation();
        adjustBet(btn.dataset.type, state.betStep);
    };
});

updateUI();
</script>
</body>
</html>
