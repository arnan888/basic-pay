<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>龙虎斗 · 至尊版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            padding: 16px;
        }
        .container-outer {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            border-radius: 32px;
            padding: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .container {
            background: linear-gradient(135deg, #1e1e2e, #151520);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .battle-scene {
            position: relative;
            margin: 16px;
            border-radius: 24px;
            overflow: hidden;
            background: #0a0a0a;
            height: 42vh;
            min-height: 380px;
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(255,51,0,0.2), inset 0 0 50px rgba(0,0,0,0.5);
        }
        .scene-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2a2a2a, #111);
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        .premium-wheel-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            cursor: pointer;
            z-index: 15;
        }
        .premium-wheel-container::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3300, #ffaa44, #ff3300);
            opacity: 0.4;
            filter: blur(20px);
            z-index: -1;
            animation: pulseGlow 2s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        .premium-wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255,51,0,0.5), inset 0 0 15px rgba(0,0,0,0.3);
            transition: box-shadow 0.3s;
        }
        .premium-wheel-pointer {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 40px solid #ffcc44;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
            z-index: 16;
        }
        .premium-wheel-pointer::after {
            content: '⚡';
            position: absolute;
            top: -38px;
            left: -10px;
            font-size: 20px;
            color: #ffaa44;
            text-shadow: 0 0 10px #ff3300;
        }
        .premium-wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #ffcc44, #ff8800);
            border-radius: 50%;
            z-index: 17;
            box-shadow: 0 0 20px rgba(255,204,68,0.8), inset 0 2px 4px rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            animation: centerPulse 1.5s ease-in-out infinite;
        }
        @keyframes centerPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.08); }
        }
        .premium-spin-btn {
            position: absolute;
            bottom: -45px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff3300, #cc2200);
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            z-index: 18;
            box-shadow: 0 8px 20px rgba(255,51,0,0.4);
            transition: all 0.2s;
        }
        .premium-spin-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        .premium-wheel-toast {
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffaa44;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            z-index: 19;
            opacity: 0;
            transition: 0.3s;
            border: 1px solid rgba(255,170,68,0.5);
        }
        .energy-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 2px solid rgba(255,51,0,0.3);
            pointer-events: none;
            z-index: 14;
            animation: rotateRing 10s linear infinite;
        }
        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .dragon-word, .tiger-word {
            position: absolute;
            bottom: 20px;
            font-size: 48px;
            font-weight: 900;
            text-shadow: 0 0 20px currentColor, 4px 4px 0 rgba(0,0,0,0.5);
            z-index: 10;
            transition: all 0.2s ease;
        }
        .dragon-word { left: 20px; color: #ff5555; text-shadow: 0 0 20px #ff0000; }
        .tiger-word { right: 20px; color: #55aaff; text-shadow: 0 0 20px #0088ff; }
        .highlight-win {
            transform: scale(1.2);
            text-shadow: 0 0 40px currentColor, 0 0 20px white;
        }
        .battle-result {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 6px 20px;
            border-radius: 30px;
            color: #ffaa44;
            font-weight: bold;
            font-size: 14px;
            z-index: 20;
            white-space: nowrap;
            border: 1px solid #ff3300;
        }
        .bet-section {
            background: rgba(0,90,50,0.3);
            margin: 16px;
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            max-height: calc(100vh - 280px);
            overflow-y: auto;
        }
        .account-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,90,50,0.5);
            border-radius: 12px;
            padding: 8px 16px;
            margin-bottom: 20px;
        }
        .account-info { font-size: 14px; color: #ffaa44; }
        .account-info span { color: #ffaa44; font-weight: bold; }
        .btn-group { display: flex; gap: 8px; }
        .btn-sm {
            background: #1e1e2e;
            border: none;
            border-radius: 8px;
            padding: 6px 16px;
            color: #ffaa44;
            font-size: 12px;
            cursor: pointer;
        }
        .multi-bet-item {
            background: rgba(0,90,50,0.5);
            border-radius: 16px;
            padding: 20px 16px;
            text-align: center;
            margin-bottom: 16px;
        }
        .multi-bet-item.selected { background: rgba(255,51,0,0.6); transform: scale(0.98); }
        .multi-bet-name { font-size: 26px; font-weight: bold; margin-bottom: 8px; }
        .multi-bet-name.dragon { color: #ff5555; }
        .multi-bet-name.tiger { color: #55aaff; }
        .multi-bet-name.tie { color: #aa66ff; }
        .bet-amount-wrapper {
            background: rgba(0,0,0,0.5);
            margin: 8px 0;
            padding: 10px;
            border-radius: 12px;
        }
        .multi-bet-amount { font-size: 32px; font-weight: 900; color: #ffaa44; }
        .multi-bet-control { display: flex; justify-content: center; gap: 12px; margin: 10px 0; }
        .multi-bet-control button { background: #1e1e2e; border: none; border-radius: 8px; padding: 6px 12px; color: #ffaa44; cursor: pointer; }
        .quick-bet-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .quick-bet { background: #1e1e2e; border: none; border-radius: 8px; padding: 4px 12px; color: #ffaa44; cursor: pointer; }
        .quick-bet:disabled, .clear-bet:disabled, #fightBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        .data-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0; }
        .data-item { background: rgba(0,90,50,0.5); border-radius: 12px; padding: 12px; text-align: center; }
        .data-item label { font-size: 13px; color: #ffaa44; }
        .data-item value { font-size: 28px; font-weight: bold; color: #ffaa44; display: block; }
        .timer-text { text-align: center; font-size: 20px; color: #ffaa44; margin: 12px 0; font-weight: bold; }
        .timer-text span { display: inline-block; }
        .countdown-warning { animation: warningBlink 0.5s ease-in-out infinite; color: #ff3300 !important; }
        @keyframes warningBlink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
        .speed-select { display: flex; justify-content: center; gap: 16px; margin: 12px 0; }
        .speed-btn { background: #1e1e2e; border: none; border-radius: 20px; padding: 6px 24px; color: #aaa; font-weight: bold; cursor: pointer; }
        .speed-btn.active { background: #ff3300; color: #fff; }
        .history-area { background: rgba(0,90,50,0.5); border-radius: 12px; padding: 16px; margin: 16px 0; }
        .history-title { font-size: 13px; color: #ffaa44; text-align: center; margin-bottom: 12px; }
        .history-grid { display: grid; grid-template-columns: repeat(10, 32px); gap: 6px; justify-content: center; margin-bottom: 16px; }
        .history-cell { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: #1e1e2e; }
        .history-cell.dragon { background: #ff3300; }
        .history-cell.tiger { background: #005a32; }
        .history-cell.tie { background: #aa66ff; }
        .record-list { max-height: 120px; overflow-y: auto; font-size: 12px; }
        .record-item { display: flex; justify-content: space-between; padding: 6px 12px; border-bottom: 1px solid rgba(255,255,255,0.1); color: #ddd; }
        .record-win { color: #4caf50; }
        .record-lose { color: #f44336; }
        .exec-row { display: flex; gap: 12px; margin-top: 16px; }
        .exec-btn { flex: 1; padding: 12px; border-radius: 12px; font-weight: bold; text-align: center; cursor: pointer; background: #1e1e2e; color: #ffaa44; border: none; }
        .main-go { background: linear-gradient(135deg, #ff3300, #cc2200); color: white; }
        .bottom-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
        .stat-card { background: rgba(0,90,50,0.5); border-radius: 12px; padding: 12px; text-align: center; }
        .stat-card span:first-child { display: block; font-size: 12px; color: #ffaa44; }
        .stat-card span:last-child { font-size: 26px; font-weight: bold; color: #ffaa44; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1e1e2e; width: 85%; max-width: 360px; border-radius: 16px; padding: 24px; text-align: center; color: white; }
        .modal-content button { background: #ffaa44; border: none; border-radius: 8px; padding: 10px 24px; margin-top: 16px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container-outer">
    <div class="container">
        <div class="battle-scene" id="battleScene">
            <div class="scene-bg" id="sceneBg"></div>
            <div class="premium-wheel-container" id="premiumWheelContainer">
                <canvas id="premiumWheelCanvas" class="premium-wheel-canvas" width="500" height="500"></canvas>
                <div class="premium-wheel-pointer"></div>
                <div class="premium-wheel-center">⚡</div>
                <button class="premium-spin-btn" id="premiumSpinBtn">🎰 灵龙转盘</button>
                <div class="premium-wheel-toast" id="premiumWheelToast">✨</div>
            </div>
            <div class="energy-ring"></div>
            <div class="energy-ring" style="width: 350px; height: 350px; animation-duration: 15s; opacity: 0.5;"></div>
            <div class="dragon-word" id="dragonWord">龍</div>
            <div class="tiger-word" id="tigerWord">虎</div>
            <div class="battle-result" id="battleResult">⚔️ 龙虎相争 ⚔️</div>
        </div>
        <div class="bet-section">
            <div class="account-bar">
                <div class="account-info">👤 账户：<span id="currentUserId">wang8888</span></div>
                <div class="btn-group">
                    <button id="myHistoryBtn" class="btn-sm">📜 我的记录</button>
                    <button id="newUserBtn" class="btn-sm">✨ 新用户</button>
                </div>
            </div>
            <div class="account-bar" style="margin-top: 8px;">
                <div style="display: flex; gap: 8px; width:100%;">
                    <input type="text" id="switchUserIdInput" placeholder="登录用户ID" style="flex:2; background:#1e1e2e; border:1px solid #ffaa44; border-radius:8px; padding:8px 16px; color:white;">
                    <button id="switchUserBtn" class="btn-sm">登录</button>
                </div>
            </div>
            <div class="multi-bet-item" data-type="DRAGON">
                <div class="multi-bet-name dragon">🐉 龙</div>
                <div class="bet-amount-wrapper"><div class="multi-bet-amount" id="betDragonAmount">0 TRX</div></div>
                <div class="multi-bet-control"><button class="clear-bet" data-type="DRAGON">🧹 清空</button></div>
                <div class="quick-bet-row">
                    <button class="quick-bet" data-type="DRAGON" data-amount="10">+10</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="20">+20</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="50">+50</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="100">+100</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="500">+500</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="1000">+1000</button>
                </div>
            </div>
            <div class="multi-bet-item" data-type="TIE">
                <div class="multi-bet-name tie">⚖️ 和</div>
                <div class="bet-amount-wrapper"><div class="multi-bet-amount" id="betTieAmount">0 TRX</div></div>
                <div class="multi-bet-control"><button class="clear-bet" data-type="TIE">🧹 清空</button></div>
                <div class="quick-bet-row">
                    <button class="quick-bet" data-type="TIE" data-amount="10">+10</button>
                    <button class="quick-bet" data-type="TIE" data-amount="20">+20</button>
                    <button class="quick-bet" data-type="TIE" data-amount="50">+50</button>
                    <button class="quick-bet" data-type="TIE" data-amount="100">+100</button>
                    <button class="quick-bet" data-type="TIE" data-amount="500">+500</button>
                    <button class="quick-bet" data-type="TIE" data-amount="1000">+1000</button>
                </div>
            </div>
            <div class="multi-bet-item" data-type="TIGER">
                <div class="multi-bet-name tiger">🐯 虎</div>
                <div class="bet-amount-wrapper"><div class="multi-bet-amount" id="betTigerAmount">0 TRX</div></div>
                <div class="multi-bet-control"><button class="clear-bet" data-type="TIGER">🧹 清空</button></div>
                <div class="quick-bet-row">
                    <button class="quick-bet" data-type="TIGER" data-amount="10">+10</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="20">+20</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="50">+50</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="100">+100</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="500">+500</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="1000">+1000</button>
                </div>
            </div>
            <div class="data-stack">
                <div class="data-item"><label>📊 总押注</label><value id="totalBetAmount">0.00</value></div>
                <div class="data-item"><label>🏆 预计奖金</label><value id="valWin">0.00</value></div>
            </div>
            <div class="timer-text">⏱️ 下一局: <span id="countdownNum">30</span> 秒</div>
            <div class="speed-select">
                <span class="speed-btn active" data-speed="1">1X</span>
                <span class="speed-btn" data-speed="2">2X</span>
                <span class="speed-btn" data-speed="3">3X</span>
            </div>
            <div class="history-area">
                <div class="history-title">📈 最近10局开奖</div>
                <div class="history-grid" id="historyGrid"></div>
                <div class="history-title">📋 开奖记录</div>
                <div class="record-list" id="recordList"></div>
            </div>
            <div class="exec-row">
                <button class="exec-btn" id="refreshBtn">🔄 刷新</button>
                <button class="exec-btn" id="repeatBtn">🔁 续押</button>
                <button class="exec-btn" id="cancelBtn">❌ 全部取消</button>
                <button class="exec-btn main-go" id="fightBtn">🎲 确认投注</button>
            </div>
            <div class="bottom-stats">
                <div class="stat-card"><span>💰 余额</span><span id="balanceDisplay">0.00</span></div>
                <div class="stat-card"><span>🎰 彩金池</span><span id="poolDisplay">50000.00</span></div>
            </div>
        </div>
    </div>
</div>

<script>
(function(){
    // ========== 语音 ==========
    let speechEnabled = false;
    function enableSpeech() { if (!speechEnabled) speechEnabled = true; }
    document.body.addEventListener('click', enableSpeech, { once: true });
    function speak(text) {
        if (speechEnabled && window.speechSynthesis) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 1.2;
            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }
    }

    // ========== 用户数据 ==========
    let users = JSON.parse(localStorage.getItem('dragon_tiger_users')) || {};
    let CURRENT_USER_ID = "wang8888";
    if (!users[CURRENT_USER_ID]) {
        users[CURRENT_USER_ID] = { balance: 1000.00, records: [], resultHistory: [] };
        localStorage.setItem('dragon_tiger_users', JSON.stringify(users));
    }
    let ADMIN_PASSWORD = localStorage.getItem('dragon_tiger_password') || "wang000000";
    
    function saveUsers() { localStorage.setItem('dragon_tiger_users', JSON.stringify(users)); }
    function getBalance(uid) { if (!users[uid]) users[uid] = { balance: 1000.00, records: [], resultHistory: [] }; return users[uid].balance; }
    function setBalance(uid, amt) { if (!users[uid]) users[uid] = { balance: 1000.00, records: [], resultHistory: [] }; users[uid].balance = amt; saveUsers(); }
    function addBalance(uid, delta) { setBalance(uid, getBalance(uid) + delta); }
    function getUserList() { return Object.keys(users); }
    function generateRandomId() { return "user_" + Math.floor(Math.random() * 1000000); }

    function showModal(msg, btnText) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>📢 提示</h3><p>${msg}</p><button id="modalCloseBtn">${btnText}</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('modalCloseBtn').onclick = () => modal.remove();
    }

    function showMyHistory() {
        const recs = users[CURRENT_USER_ID]?.records || [];
        let html = `<div style="max-height:300px; overflow-y:auto; text-align:left;">`;
        if (recs.length === 0) html += "<p>暂无记录</p>";
        else {
            recs.slice(0, 30).forEach(r => {
                const isWin = r.win > 0;
                html += `<div style="padding:6px; border-bottom:1px solid #555; display:flex; justify-content:space-between;">
                            <span>${r.time}</span>
                            <span>押 ${r.bet} → ${r.result}</span>
                            <span style="color:${isWin?'#4caf50':'#f44336'}">${isWin ? `+${r.win}` : `-${r.amount}`}</span>
                         </div>`;
            });
        }
        html += `</div><button id="closeHistoryBtn" style="margin-top:12px;">关闭</button>`;
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>📜 我的历史记录</h3>${html}</div>`;
        document.body.appendChild(modal);
        document.getElementById('closeHistoryBtn').onclick = () => modal.remove();
    }
    document.getElementById('myHistoryBtn').onclick = showMyHistory;
    document.getElementById('newUserBtn').onclick = () => {
        const newId = generateRandomId();
        document.getElementById('switchUserIdInput').value = newId;
        switchUser();
        showModal(`✅ 新账户：${newId}\n初始余额：1000.00 TRX`, "开始游戏");
    };

    function getResultHistory(uid) { return users[uid]?.resultHistory || []; }
    function pushResult(uid, res) {
        if (!users[uid]) users[uid] = { balance: 1000.00, records: [], resultHistory: [] };
        let arr = users[uid].resultHistory || [];
        arr.unshift(res);
        if (arr.length > 10) arr.pop();
        users[uid].resultHistory = arr;
        saveUsers();
        if (uid === CURRENT_USER_ID) updateHistoryGrid();
    }
    
    function updateHistoryGrid() {
        const grid = document.getElementById('historyGrid');
        if (!grid) return;
        const hist = getResultHistory(CURRENT_USER_ID);
        grid.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            const cell = document.createElement('div');
            cell.className = 'history-cell';
            if (i < hist.length) {
                const r = hist[i];
                cell.classList.add(r === '龙' ? 'dragon' : (r === '虎' ? 'tiger' : 'tie'));
                cell.textContent = r === '龙' ? '🐉' : (r === '虎' ? '🐯' : '⚖️');
            } else {
                cell.textContent = '?';
            }
            grid.appendChild(cell);
        }
    }

    function addRecord(uid, betType, result, win, betAmt) {
        if (!users[uid]) users[uid] = { balance: 1000.00, records: [], resultHistory: [] };
        let recs = users[uid].records || [];
        recs.unshift({ time: new Date().toLocaleTimeString(), bet: betType, result: result, win: win, amount: betAmt });
        if (recs.length > 50) recs.pop();
        users[uid].records = recs;
        saveUsers();
        if (uid === CURRENT_USER_ID) refreshRecordDisplay();
    }
    
    function refreshRecordDisplay() {
        const container = document.getElementById('recordList');
        if (!container) return;
        const recs = users[CURRENT_USER_ID]?.records || [];
        container.innerHTML = '';
        if (recs.length === 0) { container.innerHTML = '<div style="text-align:center; color:#aaa;">暂无记录</div>'; return; }
        recs.slice(0, 10).forEach(r => {
            const div = document.createElement('div');
            div.className = 'record-item';
            const isWin = r.win > 0;
            div.innerHTML = `<span>${r.time}</span><span>押 ${r.bet} → ${r.result}</span><span class="${isWin ? 'record-win' : 'record-lose'}">${isWin ? `+${r.win}` : `-${r.amount}`}</span>`;
            container.appendChild(div);
        });
    }

    // ========== 动画 ==========
    let isAnimating = false;
    function showResultAnimation(result, winAmount, betAmount, callback) {
        if (isAnimating) return;
        isAnimating = true;
        const btns = document.querySelectorAll('.quick-bet, .clear-bet, #fightBtn, #repeatBtn, #cancelBtn, .speed-btn, #switchUserBtn, #newUserBtn, #refreshBtn');
        btns.forEach(btn => btn.disabled = true);

        const overlay = document.createElement('div');
        overlay.style.position = 'fixed';
        overlay.style.left = '0';
        overlay.style.top = '0';
        overlay.style.width = '100%';
        overlay.style.height = '100%';
        overlay.style.backgroundColor = 'rgba(0,0,0,0.85)';
        overlay.style.backdropFilter = 'blur(8px)';
        overlay.style.display = 'flex';
        overlay.style.alignItems = 'center';
        overlay.style.justifyContent = 'center';
        overlay.style.zIndex = '10000';
        overlay.style.flexDirection = 'column';

        const box = document.createElement('div');
        box.style.background = '#1e1e2e';
        box.style.padding = '40px 60px';
        box.style.textAlign = 'center';
        box.style.boxShadow = '0 0 50px rgba(255,215,0,0.8)';
        box.style.borderRadius = '20px';

        const icon = document.createElement('div');
        icon.style.fontSize = '100px';
        icon.style.marginBottom = '20px';
        icon.style.animation = 'roll 0.6s ease-out';
        if (result === '龙') icon.textContent = '🐉';
        else if (result === '虎') icon.textContent = '🐯';
        else icon.textContent = '⚖️';
        icon.style.color = result === '龙' ? '#ff5555' : (result === '虎' ? '#55aaff' : '#bb77ff');

        const resultText = document.createElement('div');
        resultText.style.fontSize = '48px';
        resultText.style.fontWeight = 'bold';
        resultText.style.color = '#ffaa44';
        resultText.style.marginTop = '20px';
        resultText.textContent = result;

        const info = document.createElement('div');
        info.style.marginTop = '16px';
        info.style.fontSize = '28px';
        info.style.fontWeight = 'bold';
        info.style.color = winAmount > 0 ? '#ffaa44' : '#ff8888';
        info.textContent = winAmount > 0 ? `🎉 恭喜中奖 +${winAmount} TRX` : '😞 未中奖';
        box.appendChild(icon);
        box.appendChild(resultText);
        box.appendChild(info);
        overlay.appendChild(box);

        const style = document.createElement('style');
        style.textContent = `@keyframes roll { 0% { transform: rotate(0deg); } 50% { transform: rotate(360deg); } 100% { transform: rotate(720deg); } }`;
        document.head.appendChild(style);

        document.body.appendChild(overlay);
        speak(result);

        setTimeout(() => {
            overlay.remove();
            style.remove();
            isAnimating = false;
            btns.forEach(btn => btn.disabled = false);
            if (callback) callback();
        }, 2000);
    }
