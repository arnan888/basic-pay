<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_JADE_ULTIMATE</title>
    <style>
        :root {
            --jade-main: #4a7c64;
            --jade-light: #6b9a85;
            --jade-dark: #2c4a3b;
            --stone-grey: #6b737e;
            --inner-shadow: inset 8px 8px 16px rgba(0,0,0,0.5), inset -4px -4px 8px rgba(255,255,255,0.05);
            --gold: #f1c40f;
            --red-num: #ff4d4d;
            --blue-dragon: #3498db;
            --orange-tiger: #e67e22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #1a1a1a; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .phone-container {
            width: 100vw; height: 100vh; max-width: 480px;
            background: var(--jade-main); border: 15px solid var(--jade-main); 
            border-image: linear-gradient(135deg, var(--jade-light), var(--jade-dark)) 15;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.6); display: flex; flex-direction: column;
        }

        .divider { height: 8px; background: var(--jade-dark); border-top: 2px solid var(--jade-light); border-bottom: 2px solid #000; width: 100%; }

        /* 顶部余额区 - 保持OK部分 */
        .header-section { height: 12%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; }
        .inset-box { background: var(--stone-grey); border: 3px solid var(--jade-dark); box-shadow: var(--inner-shadow); border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .val { font-size: 18px; font-weight: bold; }

        /* 转盘区 - 保持上移 */
        .wheel-section { height: 40%; display: flex; justify-content: center; align-items: center; position: relative; background: var(--stone-grey); box-shadow: var(--inner-shadow); border: 5px solid var(--jade-dark); border-radius: 15px; margin: 0 10px; }
        .pointer { position: absolute; top: 6%; z-index: 10; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--red-num); filter: drop-shadow(0 0 8px red); }
        #wheel { width: 250px; height: 250px; border-radius: 50%; border: 10px solid var(--jade-main); background: #2a2a2a; position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1.1); }
        .slot { position: absolute; width: 100%; height: 100%; text-align: center; padding-top: 20px; font-size: 28px; }
        .hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 65px; height: 65px; background: var(--jade-dark); border-radius: 50%; border: 2px solid var(--jade-light); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 14px; font-weight: bold; }

        /* 底部沉底紧凑区 */
        .footer-section {
            flex: 1; display: flex; flex-direction: column; justify-content: flex-end; 
            padding: 12px; background: var(--stone-grey); box-shadow: var(--inner-shadow);
            border: 5px solid var(--jade-dark); border-radius: 15px; margin: 8px 10px 12px 10px;
        }

        /* 龙虎斗格 - 四块布局 */
        .bet-grid { display: grid; grid-template-columns: 1fr 0.7fr 1fr; gap: 8px; margin-bottom: 12px; }
        .bet-side { 
            height: 90px; background: rgba(0,0,0,0.2); border: 3px solid var(--jade-dark); border-radius: 12px;
            box-shadow: var(--inner-shadow); display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; font-size: 28px; cursor: pointer; transition: 0.2s;
        }
        .bet-side.selected { border-color: var(--gold); background: rgba(255,255,255,0.05); transform: scale(0.98); }
        .dragon { color: var(--blue-dragon); text-shadow: 0 0 10px var(--blue-dragon); }
        .tiger { color: var(--orange-tiger); text-shadow: 0 0 10px var(--orange-tiger); }
        
        /* 获胜爆亮特效 */
        @keyframes win-dragon { 50% { box-shadow: inset 0 0 40px var(--blue-dragon), 0 0 20px var(--blue-dragon); border-color: #fff; } }
        @keyframes win-tiger { 50% { box-shadow: inset 0 0 40px var(--orange-tiger), 0 0 20px var(--orange-tiger); border-color: #fff; } }
        .win-dragon-act { animation: win-dragon 0.5s ease 4; }
        .win-tiger-act { animation: win-tiger 0.5s ease 4; }

        .bet-middle { display: grid; grid-template-rows: repeat(3, 1fr); gap: 4px; }
        .bet-mid-box { background: rgba(0,0,0,0.3); border: 1.5px solid var(--jade-dark); border-radius: 6px; box-shadow: var(--inner-shadow); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--gold); font-weight: bold; }

        /* 按键紧凑组 */
        .stake-info { text-align: center; color: #fff; font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        .main-action { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .side-btn { width: 50px; height: 50px; background: var(--jade-main); border: 3px solid var(--jade-dark); border-radius: 10px; color: white; font-size: 24px; font-weight: bold; }
        .execute-btn { flex: 1; height: 60px; background: linear-gradient(180deg, #e53935, #b71c1c); border: none; border-radius: 30px; color: white; font-size: 20px; font-weight: bold; box-shadow: 0 6px 0 #7f0000; }
        .sub-action { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .func-btn { background: rgba(0,0,0,0.4); border: 2px solid var(--jade-dark); height: 40px; border-radius: 8px; color: #eee; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .func-btn.active { border-color: var(--gold); background: var(--jade-dark); }
        
        .blur { filter: blur(4px); }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header-section">
        <div class="inset-box"><span style="font-size:10px;color:#ccc">BALANCE</span><span class="val" id="ui-bal" style="color:var(--red-num)">146.80</span></div>
        <div class="inset-box"><span style="font-size:10px;color:#ccc">NETWORK POOL</span><span class="val" id="ui-pool" style="color:var(--gold)">84291.50</span></div>
    </div>
    <div class="divider"></div>
    <div class="wheel-section">
        <div class="pointer"></div>
        <div id="wheel"></div>
        <div class="hub" id="ui-hub">READY</div>
    </div>
    <div class="divider"></div>
    <div class="footer-section">
        <div class="bet-grid">
            <div id="bet-dragon" class="bet-side dragon" onclick="selectSide('DRAGON')">龙</div>
            <div class="bet-middle">
                <div class="bet-mid-box">和</div>
                <div class="bet-mid-box">小</div>
                <div class="bet-mid-box">大</div>
            </div>
            <div id="bet-tiger" class="bet-side tiger" onclick="selectSide('TIGER')">虎</div>
        </div>
        <div class="stake-info">STAKE: <span id="ui-bet" style="color:var(--gold)">5.5</span> USDT</div>
        <div class="main-action">
            <button class="side-btn" onclick="App.adjBet(-1)">−</button>
            <button class="execute-btn" onclick="App.roll()" id="btn-go">EXECUTE</button>
            <button class="side-btn" onclick="App.adjBet(1)">+</button>
        </div>
        <div class="sub-action">
            <div class="func-btn" id="opt-auto" onclick="App.toggleAuto()">🤖 AUTO: OFF</div>
            <div class="func-btn" id="opt-speed" onclick="App.toggleSpeed()">⚡ SPEED: 1X</div>
        </div>
    </div>
</div>

<script>
let currentSide = null;
function selectSide(side) {
    if(App.state.isRolling) return;
    document.querySelectorAll('.bet-side').forEach(el => el.classList.remove('selected'));
    currentSide = side;
    document.getElementById('bet-' + side.toLowerCase()).classList.add('selected');
}

const App = {
    bets: [5.5, 10.0, 20.0, 50.0, 100.0],
    icons: ['💎','💊','⚡','🔥','💰','🦁','🏆','🎲'],
    state: { bal: 146.80, betIdx: 0, deg: 0, isRolling: false, auto: false, speed: 1 },
    init() {
        const wheel = document.getElementById('wheel');
        this.icons.forEach((s, i) => {
            const el = document.createElement('div');
            el.className = 'slot'; el.style.transform = `rotate(${i * 45}deg)`; el.innerText = s;
            wheel.appendChild(el);
        });
        this.updateUI();
    },
    adjBet(dir) {
        if(this.state.isRolling) return;
        this.state.betIdx = Math.max(0, Math.min(this.bets.length-1, this.state.betIdx + dir));
        this.updateUI();
    },
    toggleSpeed() {
        this.state.speed = (this.state.speed % 3) + 1;
        document.getElementById('wheel').style.transitionDuration = {1:'4s', 2:'2s', 3:'0.8s'}[this.state.speed];
        this.updateUI();
    },
    toggleAuto() {
        this.state.auto = !this.state.auto;
        if(this.state.auto && !this.state.isRolling) this.roll();
        this.updateUI();
    },
    async roll() {
        const cost = this.bets[this.state.betIdx];
        if(this.state.isRolling || this.state.bal < cost || !currentSide) return;

        this.state.isRolling = true;
        this.state.bal -= cost;
        document.getElementById('ui-hub').innerText = "CALC...";
        document.getElementById('wheel').classList.add('blur');
        document.querySelectorAll('.bet-side').forEach(el => el.classList.remove('win-dragon-act', 'win-tiger-act'));
        this.updateUI();

        // 联动逻辑：0-3号位属龙，4-7号位属虎
        const winIdx = Math.floor(Math.random() * 8); 
        const resultSide = (winIdx <= 3) ? 'DRAGON' : 'TIGER';
        const targetDeg = (360 - (this.state.deg % 360)) + (this.state.speed === 1 ? 8 : 4) * 360 - (winIdx * 45);
        this.state.deg += targetDeg;
        document.getElementById('wheel').style.transform = `rotate(${this.state.deg}deg)`;

        setTimeout(() => {
            document.getElementById('wheel').classList.remove('blur');
            this.state.isRolling = false;
            
            if(currentSide === resultSide) {
                this.state.bal += cost * 2; // 赔率设定
                document.getElementById('ui-hub').innerText = "SUCCESS";
                document.getElementById('bet-' + resultSide.toLowerCase()).classList.add('win-' + resultSide.toLowerCase() + '-act');
            } else {
                document.getElementById('ui-hub').innerText = "FAILED";
            }
            this.updateUI();
            if(this.state.auto) setTimeout(() => this.roll(), 1000);
        }, {1:4000, 2:2000, 3:800}[this.state.speed]);
    },
    updateUI() {
        document.getElementById('ui-bal').innerText = this.state.bal.toFixed(2);
        document.getElementById('ui-bet').innerText = this.bets[this.state.betIdx].toFixed(1);
        document.getElementById('opt-auto').className = this.state.auto ? "func-btn active" : "func-btn";
        document.getElementById('opt-auto').innerText = "🤖 AUTO: " + (this.state.auto ? "ON" : "OFF");
        document.getElementById('opt-speed').innerText = "⚡ SPEED: " + this.state.speed + "X";
        document.getElementById('btn-go').disabled = this.state.isRolling;
    }
};
App.init();
</script>
</body>
</html>
