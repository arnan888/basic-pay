<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_BEAST_ULTRA</title>
    <style>
        :root {
            --jade: #4a7c64; --jade-l: #6b9a85; --jade-d: #2c4a3b;
            --stone: #6b737e; --inner: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            --gold: #f1c40f; --red: #ff4d4d; --blue: #3498db; --tiger: #e67e22; --tie: #9b59b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0c0c0c; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .container-outer {
            width: 100vw; height: 100vh; max-width: 480px;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%;
            animation: outerNeonRotate 15s linear infinite;
            padding: 6px;
            border-radius: 18px;
            box-shadow: 0 0 50px rgba(255,255,255,0.6);
        }
        @keyframes outerNeonRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%; height: 100%;
            background: var(--jade);
            border-radius: 15px;
            display: flex; flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .header { height: 8%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 8px 12px; }
        .box { background: var(--stone); border: 2px solid var(--jade-d); box-shadow: var(--inner); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px;
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        .box span:first-child { font-size: 12px; color: #ccc; letter-spacing: 1px; font-weight: bold; }
        .box span:last-child { font-size: 20px; font-weight: bold; color: var(--gold); text-shadow: 0 0 6px var(--gold); }

        /* ========== 优化：3D战场区域 ========== */
        .battle-scene { 
            height: 38%; display: flex; justify-content: center; align-items: center; 
            background: #0a0a0a; border: 3px solid var(--jade-d); 
            border-radius: 12px; margin: 4px 10px;
            position: relative; overflow: hidden;
            perspective: 800px; /* 开启3D透视 */
        }
        .scene-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 1;
        }
        .scene-light {
            position: absolute; width: 150px; height: 150px;
            border-radius: 50%; filter: blur(50px);
            animation: lightPulse 3s ease infinite alternate;
            z-index: 2;
        }
        .light-left { left: 30px; top: 50%; transform: translateY(-50%); background: rgba(52,152,219,0.4); }
        .light-right { right: 30px; top: 50%; transform: translateY(-50%); background: rgba(230,126,34,0.4); }
        @keyframes lightPulse {
            0% { opacity: 0.3; transform: translateY(-50%) scale(1); }
            100% { opacity: 0.8; transform: translateY(-50%) scale(1.2); }
        }

        /* ========== 新增：3D地面和天空盒 ========== */
        .scene-ground {
            position: absolute; bottom: 0; width: 100%; height: 40%;
            background: linear-gradient(to top, #2c4a3b 0%, transparent 100%);
            transform: rotateX(60deg);
            transform-origin: bottom center;
            z-index: 3;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .scene-sky {
            position: absolute; top: 0; width: 100%; height: 60%;
            background: radial-gradient(circle at center top, rgba(52,152,219,0.2) 0%, transparent 80%);
            z-index: 2;
        }
        .scene-grid {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(to right, rgba(255,255,255,0.1) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: rotateX(60deg);
            transform-origin: bottom center;
            z-index: 4;
            animation: gridMove 8s linear infinite;
        }
        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 30px 30px; }
        }

        /* ========== 优化：3D角色 ========== */
        .dragon {
            position: absolute; left: 20px; bottom: 20px;
            width: 100px; height: 100px;
            z-index: 10;
            transform-style: preserve-3d; /* 开启3D模式 */
            animation: dragonIdle 4s ease infinite;
        }
        .dragon-icon { 
            font-size: 70px; color: var(--blue); 
            filter: drop-shadow(0 0 10px var(--blue));
            transform: translateZ(10px); /* 3D偏移 */
        }
        @keyframes dragonIdle {
            0% { left: 20px; transform: translateY(0) rotateY(0deg) rotate(0deg); }
            25% { transform: translateY(-10px) rotateY(10deg) rotate(5deg); }
            50% { transform: translateY(0) rotateY(0deg) rotate(0deg); }
            75% { transform: translateY(-5px) rotateY(-10deg) rotate(-5deg); }
            100% { left: 20px; transform: translateY(0) rotateY(0deg) rotate(0deg); }
        }
        .dragon.attack { animation: dragonAttack 0.6s ease forwards; }
        @keyframes dragonAttack {
            0% { left: 20px; transform: translateY(0) scale(1) rotateY(0deg); }
            40% { left: 45%; transform: translateY(-20px) scale(1.4) rotateY(30deg) rotate(10deg); 
                  filter: drop-shadow(0 0 20px #ff6600); }
            100% { left: 20px; transform: translateY(0) scale(1) rotateY(0deg); }
        }
        .dragon.win { animation: dragonWin 1.5s ease infinite; }
        @keyframes dragonWin {
            0% { transform: translateY(0) scale(1) translateZ(10px); }
            50% { transform: translateY(-20px) scale(1.3) translateZ(20px); 
                  filter: drop-shadow(0 0 20px gold); }
            100% { transform: translateY(0) scale(1) translateZ(10px); }
        }

        .tiger {
            position: absolute; right: 20px; bottom: 20px;
            width: 100px; height: 100px;
            z-index: 10;
            transform-style: preserve-3d;
            animation: tigerIdle 4s ease infinite;
        }
        .tiger-icon { 
            font-size: 70px; color: var(--tiger); 
            filter: drop-shadow(0 0 10px var(--tiger));
            transform: translateZ(10px);
        }
        @keyframes tigerIdle {
            0% { right: 20px; transform: translateY(0) rotateY(0deg) rotate(0deg); }
            25% { transform: translateY(-5px) rotateY(-10deg) rotate(-5deg); }
            50% { transform: translateY(0) rotateY(0deg) rotate(0deg); }
            75% { transform: translateY(-10px) rotateY(10deg) rotate(5deg); }
            100% { right: 20px; transform: translateY(0) rotateY(0deg) rotate(0deg); }
        }
        .tiger.attack { animation: tigerAttack 0.6s ease forwards; }
        @keyframes tigerAttack {
            0% { right: 20px; transform: translateY(0) scale(1) rotateY(0deg); }
            40% { right: 45%; transform: translateY(-20px) scale(1.4) rotateY(-30deg) rotate(-10deg); 
                  filter: drop-shadow(0 0 20px #ff6600); }
            100% { right: 20px; transform: translateY(0) scale(1) rotateY(0deg); }
        }
        .tiger.win { animation: tigerWin 1.5s ease infinite; }
        @keyframes tigerWin {
            0% { transform: translateY(0) scale(1) translateZ(10px); }
            50% { transform: translateY(-20px) scale(1.3) translateZ(20px); 
                  filter: drop-shadow(0 0 20px gold); }
            100% { transform: translateY(0) scale(1) translateZ(10px); }
        }

        /* ========== 优化：特效 ========== */
        .fight-effect {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,100,0,0.9), rgba(255,0,0,0.9));
            filter: blur(20px);
            opacity: 0;
            z-index: 5;
        }
        .fight-effect.flash { animation: shockBlast 0.6s ease-out forwards; }
        @keyframes shockBlast {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(3); }
        }

        .win-effect {
            position: absolute; width: 180px; height: 180px;
            border-radius: 50%;
            filter: blur(30px);
            opacity: 0;
            z-index: 5;
        }
        .win-effect.show { animation: winShine 1.5s ease infinite; }
        @keyframes winShine {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
            100% { opacity: 0.5; transform: scale(1); }
        }
        .win-effect.dragon { background: rgba(52,152,219,0.8); left: 20px; bottom: 20px; transform: translateY(-50%); }
        .win-effect.tiger { background: rgba(230,126,34,0.8); right: 20px; bottom: 20px; transform: translateY(-50%); }
        .win-effect.tie { background: rgba(155,89,182,0.8); left: 50%; bottom: 30%; transform: translate(-50%, -50%); }

        /* ========== 新增：3D开奖牌 ========== */
        .result-card {
            position: absolute; left: 50%; top: 30%;
            transform: translate(-50%, -50%) rotateY(0deg);
            width: 80px; height: 100px;
            background: linear-gradient(135deg, #fff 0%, #eee 100%);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
            z-index: 15;
            opacity: 0;
            transform-style: preserve-3d;
            transition: all 0.8s ease;
        }
        .result-card.show {
            opacity: 1;
            transform: translate(-50%, -50%) rotateY(360deg);
        }
        .result-card-inner {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            font-size: 40px;
            font-weight: bold;
            color: #000;
            transform: translateZ(5px);
        }
        .result-card.dragon .result-card-inner { color: var(--blue); text-shadow: 0 0 10px var(--blue); }
        .result-card.tiger .result-card-inner { color: var(--tiger); text-shadow: 0 0 10px var(--tiger); }
        .result-card.tie .result-card-inner { color: var(--tie); text-shadow: 0 0 10px var(--tie); }

        /* ========== 优化：结果显示 ========== */
        .battle-result {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            font-size: 16px; font-weight: bold;
            color: #fff; text-shadow: 0 0 8px var(--gold);
            z-index: 20;
            padding: 4px 15px;
            background: rgba(0,0,0,0.7);
            border-radius: 15px;
            animation: resultFade 0.5s ease forwards;
        }
        @keyframes resultFade {
            0% { opacity: 0; transform: translateX(-50%) scale(0.8); }
            100% { opacity: 1; transform: translateX(-50%) scale(1); }
        }

        /* ========== 新增：数据统计面板 ========== */
        .stats-panel {
            position: absolute; bottom: 5px; left: 5px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
            font-size: 10px;
            color: #ccc;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 5px;
        }
        .stats-panel span { color: var(--gold); }

        .play-section {
            flex: 1; display: flex; flex-direction: column;
            background: var(--stone); box-shadow: var(--inner); border: 3px solid var(--jade-d); 
            border-radius: 12px; margin: 4px 10px 8px 10px; padding: 12px;
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        .multi-bet-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            justify-content: space-between;
        }
        .multi-bet-item {
            flex: 1;
            background: rgba(0,0,0,0.45);
            border: 2px solid var(--jade-d);
            border-radius: 12px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease; /* 新增过渡动画 */
        }
        .multi-bet-item.selected {
            border-color: var(--gold);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 8px rgba(241,196,15,0.5);
            transform: translateY(-2px); /* 选中时上浮 */
        }
        .multi-bet-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .multi-bet-name.dragon { color: var(--blue); text-shadow: 0 0 8px var(--blue); }
        .multi-bet-name.tiger { color: var(--tiger); text-shadow: 0 0 8px var(--tiger); }
        .multi-bet-name.tie { color: var(--tie); text-shadow: 0 0 8px var(--tie); }
        .multi-bet-amount {
            font-size: 16px;
            color: var(--gold);
            font-weight: bold;
        }
        .multi-bet-control {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 6px;
        }
        .multi-bet-control button {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--gold);
            border-radius: 20px;
            width: 28px;
            height: 28px;
            color: var(--gold);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease; /* 新增点击过渡 */
        }
        .multi-bet-control button:active {
            background: var(--gold);
            color: #000;
            transform: scale(0.9);
        }

        .data-stack { display: grid; grid-template-rows: repeat(3, 1fr); gap: 6px; margin: 0 6px; }
        .data-item { background: rgba(0,0,0,0.6); border: 2px solid var(--jade-d); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; }
        .data-item label { font-size: 12px; color: #ccc; font-weight: bold; }
        .data-item value { font-size: 18px; color: var(--gold); font-weight: 900; }

        .stake-txt { text-align: center; color: #eee; font-size: 16px; font-weight: bold; margin: 8px 0; }
        .stake-txt span { color: var(--gold); }

        /* ========== 优化：按键手感 ========== */
        .exec-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .step-btn { width: 52px; height: 52px; background: var(--jade); border: 3px solid var(--jade-d); border-radius: 10px; color: #fff; font-size: 28px; font-weight: bold; cursor: pointer;
            transition: all 0.15s ease; /* 新增过渡 */
        }
        .step-btn:active {
            background: var(--jade-l);
            transform: translateY(2px);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }
        .refresh-btn { background: #3498db; font-size: 24px; }
        .main-go { flex: 1; height: 52px; background: linear-gradient(180deg, #e53935, #b71c1c); border: none; border-radius: 30px; color: #fff; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 #7f0000;
            transition: all 0.15s ease; /* 优化过渡 */
        }
        .main-go:active { transform: translateY(2px); box-shadow: 0 2px 0 #7f0000; }
        .main-go:disabled {
            background: linear-gradient(180deg, #666, #444);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mode-btn { height: 42px; background: rgba(0,0,0,0.4); border: 2px solid var(--jade-d); border-radius: 8px; color: #aaa; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        .mode-btn.active { border-color: var(--gold); color: #fff; background: var(--jade-d); }
        .speed-btn { display: flex; gap: 8px; }
        .speed-btn span { width: 33%; height: 100%; display: flex; align-items: center; justify-content: center; border-radius: 6px;
            transition: all 0.2s ease;
        }
        .speed-btn span.active { background: var(--gold); color: #000; font-weight: bold; }
    </style>
</head>
<body>
<div class="container-outer">
    <div class="container">
        <div class="header">
            <div class="box"><span>余额</span><span id="balanceDisplay">0.00</span></div>
            <div class="box"><span>奖池</span><span id="poolDisplay">84291.50</span></div>
        </div>

        <div class="battle-scene">
            <div class="scene-bg"></div>
            <div class="scene-sky"></div>
            <div class="scene-ground"></div>
            <div class="scene-grid"></div>
            <div class="scene-light light-left"></div>
            <div class="scene-light light-right"></div>
            <div class="win-effect dragon" id="win-dragon"></div>
            <div class="win-effect tiger" id="win-tiger"></div>
            <div class="win-effect tie" id="win-tie"></div>
            <div class="fight-effect" id="fight-effect"></div>
            <div class="dragon" id="dragon"><div class="dragon-icon">🐉</div></div>
            <div class="tiger" id="tiger"><div class="tiger-icon">🐯</div></div>
            <div class="battle-result" id="battle-result">龙虎相争·一触即发</div>
            <!-- 新增3D开奖牌 -->
            <div class="result-card" id="result-card"><div class="result-card-inner"></div></div>
            <!-- 新增数据统计面板 -->
            <div class="stats-panel">
                <div>龙胜率：<span id="dragon-rate">0%</span></div>
                <div>虎胜率：<span id="tiger-rate">0%</span></div>
                <div>和率：<span id="tie-rate">0%</span></div>
                <div>连开：<span id="last-result">无</span></div>
            </div>
        </div>

        <div class="play-section">
            <div class="multi-bet-row">
                <div class="multi-bet-item" id="multiDragon" data-type="DRAGON">
                    <div class="multi-bet-name dragon">🐉 龙</div>
                    <div class="multi-bet-amount" id="betDragonAmount">
