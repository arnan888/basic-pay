<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_TECH_PRO</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); color:#FFED00; font-family:sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        
        .hud { position:fixed; top:0; width:100%; height:50px; background:rgba(0,0,0,0.9); display:flex; justify-content:space-around; align-items:center; border-bottom:2px solid #FFED00; z-index:100; font-size:12px; }
        .bal-val { font-size:75px; font-weight:900; color:#FFED00; text-shadow:0 0 30px #f00; }

        /* 技术控制区：自动与加速 */
        .tech-ctrls { display:flex; gap:15px; margin:10px 0; }
        .t-btn { padding:5px 15px; border:1px solid #FFED00; border-radius:5px; font-size:12px; cursor:pointer; background:none; color:#FFED00; transition:0.3s; }
        .t-btn.active { background:#FFED00; color:#000; box-shadow:0 0 10px #FFED00; }

        .wheel-container { position:relative; width:300px; height:300px; border:10px solid #FFED00; border-radius:50%; box-shadow:0 0 40px #f40; background:#222; margin:15px 0; }
        .wheel-inner { width:100%; height:100%; border-radius:50%; transition:transform 5s cubic-bezier(0.15, 0, 0.15, 1); position:relative; background: repeating-conic-gradient(from 0deg, #111 0deg 45deg, #222 45deg 90deg); }
        .wheel-center { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:60px; height:60px; background:#FFED00; border-radius:50%; z-index:50; box-shadow:0 0 20px #FFED00; display:flex; align-items:center; justify-content:center; color:#000; font-weight:bold; }
        .pointer { position:absolute; top:-35px; left:50%; transform:translateX(-50%); border-left:15px solid transparent; border-right:15px solid transparent; border-top:45px solid #f00; z-index:100; }
        .slot { position:absolute; width:100%; height:100%; text-align:center; padding-top:20px; font-weight:900; font-size:16px; color:#fff; }

        /* 操作区 */
        .op-area { display:flex; align-items:center; gap:15px; margin-bottom:100px; z-index:100; }
        .btn-adj { width:55px; height:55px; background:#333; border:2px solid #FFED00; border-radius:50%; color:#FFED00; font-size:30px; font-weight:bold; display:flex; align-items:center; justify-content:center; }
        .main-btn { width:180px; padding:18px; background:linear-gradient(180deg, #f00, #900); border:none; border-radius:50px; color:#fff; font-size:26px; font-weight:900; box-shadow:0 5px 20px rgba(255,0,0,0.6); }

        .bot-nav { position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; padding:15px 5px; border-top:1px solid #444; }
        .nav-item { flex:1; text-align:center; font-size:12px; color:#FFED00; cursor:pointer; }
    </style>
</head>
<body>

    <div class="hud">
        <div>IN: <b id="st_in" style="color:#0f0">0.0</b></div>
        <div style="font-size:10px; color:#0f0; border:1px solid #0f0; padding:1px 4px;">TECH_AUTO_V1</div>
        <div>OUT: <b id="st_out" style="color:#f00">0.0</b></div>
    </div>

    <div class="bal-val" id="ui_bal">100.0</div>
    <div style="color:#888; font-size:14px;">BET: <span id="ui_bet" style="color:#0f0">0.5</span></div>

    <!-- 技术控制开关 -->
    <div class="tech-ctrls">
        <button id="auto_btn" class="t-btn" onclick="toggleAuto()">自动选择: OFF</button>
        <button id="speed_btn" class="t-btn" onclick="toggleSpeed()">加速: 1X</button>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel-center">AI</div>
        <div id="ui_wheel" class="wheel-inner">
            <div class="slot" style="transform:rotate(0deg)">🍀 1.5X</div>
            <div class="slot" style="transform:rotate(45deg)">💀 0X</div>
            <div class="slot" style="transform:rotate(90deg)">🔥 120X</div>
            <div class="slot" style="transform:rotate(135deg)">👑 JACK</div>
            <div class="slot" style="transform:rotate(180deg)">💰 88X</div>
            <div class="slot" style="transform:rotate(225deg)">💎 50X</div>
            <div class="slot" style="transform:rotate(270deg)">✨ 20X</div>
            <div class="slot" style="transform:rotate(315deg)">💀 0X</div>
        </div>
    </div>

    <div class="op-area">
        <div class="btn-adj" onclick="changeBet(-0.5)">－</div>
        <button id="go_btn" class="main-btn" onclick="go()">祝 贺</button>
        <div class="btn-adj" onclick="changeBet(0.5)">＋</div>
    </div>

    <div class="bot-nav">
        <div class="nav-item">🔍 查询</div>
        <div class="nav-item">📥 上分</div>
        <div class="nav-item">📤 下分</div>
        <div class="nav-item" style="color:#f0f; font-weight:bold;">✨ 全攻</div>
    </div>

    <script>
        let balance = 100.0, bet = 0.5, totalIn = 0.0, totalOut = 0.0, rot = 0, busy = false;
        let isAuto = false;
        let speedMode = 1; // 1: 正常, 2: 加速

        function toggleAuto() {
            isAuto = !isAuto;
            const btn = document.getElementById('auto_btn');
            btn.innerText = `自动选择: ${isAuto ? 'ON' : 'OFF'}`;
            btn.className = isAuto ? 't-btn active' : 't-btn';
            if(isAuto && !busy) go();
        }

        function toggleSpeed() {
            speedMode = (speedMode === 1) ? 2 : 1;
            const btn = document.getElementById('speed_btn');
            btn.innerText = `加速: ${speedMode === 1 ? '1X' : '2X'}`;
            btn.className = speedMode === 2 ? 't-btn active' : 't-btn';
            // 物理修改转盘过渡时间
            document.getElementById('ui_wheel').style.transitionDuration = speedMode === 1 ? '5s' : '1.5s';
        }

        function changeBet(val) {
            if (busy) return;
            let n = bet + val;
            if (n >= 0.5) { bet = n; document.getElementById('ui_bet').innerText = bet.toFixed(1); }
        }

        function go() {
            if (busy || balance < bet) {
                isAuto = false; // 余额不足自动停止
                document.getElementById('auto_btn').className = 't-btn';
                document.getElementById('auto_btn').innerText = '自动选择: OFF';
                return;
            }
            busy = true;
            document.getElementById('go_btn').style.opacity = "0.5";

            // 90% RTP 锁死算法
            const r = Math.floor(Math.random() * 1000);
            let idx = 1; 
            if (r < 2) idx = 3; else if (r < 10) idx = 2; else if (r < 30) idx = 4;
            else if (r < 480) idx = 1; else if (r < 950) idx = 0; else if (r < 995) idx = 7;
            else if (r < 998) idx = 5; else idx = 6;

            const targetAngle = idx * 45;
            const extraSpins = (Math.floor(Math.random() * 5) + 12) * 360;
            rot += extraSpins + (360 - targetAngle - (rot % 360)) + 360;
            document.getElementById('ui_wheel').style.transform = `rotate(${rot}deg)`;

            // 根据速度档位决定结算时间
            const waitTime = speedMode === 1 ? 5000 : 1500;

            setTimeout(() => {
                const multis = [1.5, 0, 120, 500, 88, 50, 20, 0];
                const prize = multis[idx] * bet;
                balance = (balance - bet) + prize;
                totalIn += bet; totalOut += prize;
                
                document.getElementById('ui_bal').innerText = balance.toFixed(1);
                document.getElementById('st_in').innerText = totalIn.toFixed(1);
                document.getElementById('st_out').innerText = totalOut.toFixed(1);

                busy = false;
                document.getElementById('go_btn').style.opacity = "1";

                // 自动模式续杯
                if(isAuto) setTimeout(go, 1000);
            }, waitTime);
        }
    </script>
</body>
</html>
