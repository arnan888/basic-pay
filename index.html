<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA 旗舰量化终端</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* 🔒 翡翠绿发光包边遮罩 (2.8mm厚) */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; 
        }
        
        .login-box { 
            background: #1c221e; padding: 50px 30px; border-radius: 25px; 
            border: 11px solid #00ff88; /* 2.8mm 翡翠绿 */
            box-shadow: 0 0 40px rgba(0,255,136,0.6); 
            text-align: center; width: 85%; max-width: 360px; box-sizing: border-box; 
        }
        
        .login-box h2 { color: #fff; font-size: 28px; font-weight: bold; margin-bottom: 30px; letter-spacing: 3px; }
        
        /* 🏮 白底黑字 ID 框 */
        #user-id-input { 
            width: 100%; padding: 18px; border: 3px solid #ff3333; border-radius: 12px; 
            background: #ffffff; color: #000; outline: none; margin-bottom: 30px; 
            text-align: center; font-size: 26px; font-weight: bold; box-sizing: border-box; 
        }
        
        /* 🔴 红色内陷按键 - 必须要点这个才进 */
        .btn-login { 
            width: 100%; padding: 20px; border: none; border-radius: 12px; 
            background: #ff0000; color: #fff; font-weight: bold; font-size: 22px; 
            cursor: pointer;
            box-shadow: inset 8px 8px 16px #800000, inset -8px -8px 16px #ff4d4d; 
            transition: 0.1s;
        }

        .btn-login:active {
            box-shadow: inset 12px 12px 25px #500000;
            transform: scale(0.96);
        }

        .hint { color: #00ff88; font-size: 14px; margin-top: 20px; font-weight: bold; }

        /* 🎮 游戏主界面 (带 ID 后显示) */
        #game-content { display: none; text-align: center; width: 100%; }
        .balance-card { background: #161a18; margin: 20px; padding: 50px 20px; border-radius: 15px; border: 1px solid #333; box-shadow: inset 0 0 20px #000; }
        .balance-num { font-size: 60px; color: #ff4d4d; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>终端激活</h2>
            <input type="text" id="user-id-input" readonly>
            <button class="btn-login" onclick="handleConfirm()">确认进入</button>
            <p class="hint">● 系统已自动分配激活序列号</p>
        </div>
    </div>

    <div id="game-content">
        <div class="balance-card">
            <div style="color:#888; font-size:16px;">可用余额 (USDT)</div>
            <div class="balance-num" id="display-balance">0.00</div>
            <div style="color:#444; font-size:12px;">终端序列: <span id="display-id">--</span></div>
        </div>
        <button class="btn-login" style="width:80%; background:#00ff88; color:#000; box-shadow:none;">开始量化执行</button>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const uid = urlParams.get('user_id');

            // 如果链接里已经有 ID 了（说明已经点过确认了）
            if (uid) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('game-content').style.display = 'block';
                document.getElementById('display-id').innerText = uid;
            } else {
                // 否则：生成一个随机 ID 显示在白框里
                const randomId = Math.floor(100000 + Math.random() * 900000);
                document.getElementById('user-id-input').value = randomId;
            }
        }

        // 核心跳转：只有点击按钮才会触发
        function handleConfirm() {
            const val = document.getElementById('user-id-input').value;
            const currentPath = window.location.origin + window.location.pathname;
            // 带着 ID 重新加载页面
            window.location.href = currentPath + "?user_id=" + val;
        }
    </script>
</body>
</html>
