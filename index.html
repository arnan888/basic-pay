<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>潮汕葫芦鱼·二十人房 | 手机号注册/登录 | 完整版</title>
    <style>
        /* ========== 完整样式 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #1a120c;
            background-image: radial-gradient(circle at 20% 30%, rgba(200, 140, 70, 0.15) 2%, transparent 2.5%);
            background-size: 28px 28px;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .app {
            max-width: 550px;
            width: 100%;
            height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            padding: 10px;
            box-sizing: border-box;
        }
        /* 登录面板 */
        .auth-panel {
            background: linear-gradient(145deg, #362a1f 0%, #251e16 100%);
            border-radius: 48px;
            padding: 30px 20px;
            margin: auto;
            text-align: center;
            border: 2px solid #ffaa44;
            width: 100%;
        }
        .auth-panel h2 { color: #ffdd99; font-size: 1.5rem; margin-bottom: 24px; }
        .auth-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #2a241e;
            border: 1px solid #ffaa44;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            text-align: center;
        }
        .auth-buttons { display: flex; gap: 15px; margin: 20px 0; }
        .auth-btn {
            flex: 1;
            background: #c47c3a;
            border: none;
            padding: 12px;
            border-radius: 50px;
            color: #2f1b0a;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #764e26;
        }
        .auth-btn:active { transform: translateY(2px); }
        .auth-note { color: #aa8855; font-size: 0.7rem; }
        /* 游戏卡片样式 - 完整保留 */
        .game-card {
            background: linear-gradient(145deg, #362a1f 0%, #251e16 100%);
            border-radius: 48px;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 210, 120, 0.2);
            overflow: hidden;
        }
        .game-header {
            background: linear-gradient(135deg, #b85a2e, #7a3116);
            padding: 12px 16px;
            text-align: center;
            border-bottom: 3px solid #f7bc6c;
        }
        .game-header h1 { font-size: 1.4rem; font-weight: 800; color: #ffefcf; text-shadow: 2px 2px 0 #56200c; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .sub { font-size: 0.6rem; color: #ffdd99; background: #4e2613b3; display: inline-block; padding: 2px 12px; border-radius: 40px; margin-top: 4px; }
        .stats-panel { display: flex; justify-content: space-between; gap: 8px; padding: 10px 16px; background: #1f1711; border-bottom: 1px solid #644a33; }
        .stat-card { background: #1a130d; border-radius: 40px; padding: 4px 10px; flex: 1; text-align: center; }
        .stat-label { font-size: 0.6rem; color: #e2bc89; }
        .stat-value { font-size: 1.3rem; font-weight: 800; color: #f9d792; line-height: 1.2; font-family: monospace; }
        .dice-area {
            background: #2a211a;
            margin: 12px 16px;
            border-radius: 50px;
            padding: 12px;
            text-align: center;
            box-shadow: inset 0 0 0 2px #5e4230, 0 6px 12px black;
            position: relative;
        }
        .dice-title { font-size: 0.7rem; color: #f5c28e; margin-bottom: 8px; }
        .dice-box { display: flex; justify-content: center; gap: 12px; position: relative; }
        .dice { background: #fff2df; width: 65px; height: 65px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 2.6rem; box-shadow: 0 5px 0 #926b42; border: 1px solid #e5b874; }
        .dice-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.85), #2c1e14);
            backdrop-filter: blur(6px); border-radius: 60px; display: flex; align-items: center;
            justify-content: center; flex-direction: column; z-index: 15;
            transition: all 0.5s cubic-bezier(0.34, 1.1, 0.55, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,215,150,0.3);
            border: 2px solid #cb9e6b;
        }
        .dice-cover span { font-size: 2.8rem; filter: drop-shadow(2px 4px 6px black); }
        .dice-cover .cover-text { font-size: 0.7rem; background: #00000099; padding: 2px 12px; border-radius: 30px; margin-top: 6px; color: #ffdd99; }
        .dice-cover.open-cover { transform: translateY(-80px) scale(0.6); opacity: 0; visibility: hidden; }
        .dice-cover.hidden-cover { display: none; }
        .bet-sections { padding: 0 12px 8px 12px; }
        .section-title { font-size: 0.75rem; color: #ffd49f; margin: 8px 0 6px 4px; border-left: 4px solid #f7b05e; padding-left: 8px; }
        .bet-grid, .special-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .bet-card { background: #1f1712; border-radius: 28px; padding: 6px 4px; text-align: center; box-shadow: 0 3px 0 #0a0705; border: 1px solid #6f4f34; }
        .bet-icon { font-size: 1.8rem; background: #2f231c; width: 45px; height: 45px; line-height: 45px; margin: 0 auto 4px; border-radius: 50%; }
        .bet-name { font-size: 0.7rem; font-weight: bold; color: #ffddb0; }
        .bet-odds { font-size: 0.55rem; color: #dba959; }
        .bet-amount { background: #0c0907; border-radius: 40px; padding: 2px 4px; margin: 5px 4px 0; display: flex; justify-content: space-between; align-items: center; gap: 2px; }
        .bet-amount span { color: #ffbc6e; font-size: 0.75rem; background: #2a1c12; padding: 2px 5px; border-radius: 30px; min-width: 35px; }
        .btn-chip { background: #523b26; border: none; color: #fce2b4; font-weight: bold; width: 28px; height: 28px; border-radius: 30px; font-size: 1rem; cursor: pointer; box-shadow: 0 1px 2px black; }
        .btn-chip:active { transform: scale(0.92); }
        .chip-bar { background: #2a1f16; margin: 6px 16px 12px; padding: 8px 10px; border-radius: 50px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .chip { background: #ebbc7e; color: #3a240f; font-weight: bold; font-size: 0.75rem; padding: 4px 12px; border-radius: 40px; cursor: pointer; box-shadow: 0 2px 0 #8b5a2e; }
        .chip:active { transform: translateY(2px); }
        .chip.selected { background: #f7c56e; box-shadow: 0 0 0 1px #ffefb0, 0 2px 0 #7a4b22; }
        .action-bar { display: flex; justify-content: center; gap: 10px; padding: 8px 16px 18px; flex-wrap: wrap; }
        .action-btn { background: #734c2e; border: none; padding: 6px 16px; font-size: 0.8rem; font-weight: bold; border-radius: 40px; color: #ffe3b3; box-shadow: 0 3px 0 #3f2a1a; cursor: pointer; }
        .action-btn.primary { background: #c47c3a; color: #2f1b0a; box-shadow: 0 3px 0 #764e26; }
        .action-btn:active { transform: translateY(2px); }
        .message-area { background: #1c140e; margin: 0 16px 16px; border-radius: 40px; padding: 8px 12px; font-size: 0.7rem; color: #dbbc8c; text-align: center; min-height: 55px; }
        .user-info-bar { background: #1f1711; border-radius: 40px; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .user-info { color: #ffdd99; font-size: 0.75rem; }
        .logout-btn { background: #734c2e; border: none; padding: 4px 12px; border-radius: 30px; color: #ffe3b3; font-size: 0.7rem; cursor: pointer; }
        /* 管理面板 */
        .admin-card { background: #1e1813; border-radius: 48px; box-shadow: 0 12px 20px rgba(0, 0, 0, 0.4); overflow: hidden; }
        .admin-header { background: #4a3322; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .admin-header h3 { color: #ffefcf; font-size: 1rem; display: flex; align-items: center; gap: 6px; }
        .toggle-btn { background: #7a5a3e; border: none; color: white; padding: 3px 12px; border-radius: 30px; font-size: 0.7rem; cursor: pointer; }
        .admin-content { padding: 12px; transition: 0.2s; }
        .admin-content.collapsed { display: none; }
        .capacity-row { background: #1f1712; border-radius: 40px; padding: 8px 12px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .capacity-control { display: flex; align-items: center; gap: 8px; }
        .capacity-control label { font-size: 0.7rem; color: #f5cf9b; }
        #maxSeatsInput { width: 55px; padding: 4px; border-radius: 30px; background: #35281d; color: #ffdfb3; text-align: center; border: none; font-size: 0.8rem; }
        .stat-badge { background: #00000066; padding: 3px 10px; border-radius: 30px; font-size: 0.7rem; color: #ffd68a; }
        .seats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0; }
        .seat-card { background: #1a130d; border-radius: 20px; padding: 6px 3px; text-align: center; border: 1px solid #6f4f34; }
        .seat-card.occupied { background: #2f4127; border-color: #b9a06a; }
        .seat-number { font-size: 0.6rem; color: #dba24b; background: #00000055; display: inline-block; padding: 1px 6px; border-radius: 20px; }
        .player-name { font-weight: bold; font-size: 0.7rem; margin: 4px 0; color: #ffefcf; white-space: nowrap; overflow-x: hidden; text-overflow: ellipsis; }
        .seat-action { background: #5f3e28; border: none; color: #ffddb0; padding: 3px 8px; border-radius: 30px; font-size: 0.6rem; cursor: pointer; margin-top: 2px; }
        .admin-buttons { display: flex; justify-content: space-between; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .admin-btn { background: #5f462f; border: none; padding: 5px 12px; border-radius: 40px; color: #ffe3b3; font-size: 0.7rem; font-weight: bold; flex: 1; text-align: center; cursor: pointer; }
        footer { font-size: 0.55rem; text-align: center; padding: 8px; color: #aa8259; }
        @media (max-width: 480px) {
            .dice { width: 55px; height: 55px; font-size: 2rem; }
            .bet-icon { width: 38px; height: 38px; line-height: 38px; font-size: 1.5rem; }
            .btn-chip { width: 26px; height: 26px; font-size: 0.8rem; }
            .seats-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ==================== 用户数据存储 ====================
const USERS_KEY = 'chaoshan_users_full';
let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
let currentUser = null;

// 庄家数据
let bankerBalance = parseInt(localStorage.getItem('chaoshan_banker_balance_full')) || 10000;
let currentBanker = localStorage.getItem('chaoshan_banker_name_full') || "系统庄家";

function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersData)); }
function saveBanker() {
    localStorage.setItem('chaoshan_banker_balance_full', bankerBalance);
    localStorage.setItem('chaoshan_banker_name_full', currentBanker);
}
function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0; }
function setUserBalance(amt) { if(currentUser) { usersData[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }
function addUserBalance(delta) { setUserBalance(getUserBalance() + delta); }

function showToast(msg) {
    let toast = document.createElement('div');
    toast.textContent = msg;
    toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#000000cc;backdrop-filter:blur(10px);color:#ffaa44;padding:10px 20px;border-radius:50px;font-size:0.8rem;z-index:2000;border:1px solid #ffaa44;';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

// ==================== 游戏核心 ====================
const PATTERNS = [
    { id: "fish", name: "鱼", icon: "🐟", value: 1 },
    { id: "shrimp", name: "虾", icon: "🦐", value: 2 },
    { id: "crab", name: "蟹", icon: "🦀", value: 3 },
    { id: "calabash", name: "葫芦", icon: "🏺", value: 4 },
    { id: "coin", name: "金钱", icon: "💰", value: 5 },
    { id: "chicken", name: "鸡", icon: "🐔", value: 6 }
];
const patternIdToName = { fish:"鱼", shrimp:"虾", crab:"蟹", calabash:"葫芦", coin:"金钱", chicken:"鸡" };
const SPECIALS = [
    { id: "big", name: "大", icon: "🔴", odds: 1 },
    { id: "small", name: "小", icon: "🔵", odds: 1 },
    { id: "odd", name: "单", icon: "⚪", odds: 1 },
    { id: "even", name: "双", icon: "⚫", odds: 1 },
    { id: "allTriplets", name: "全围", icon: "🌀", odds: 24 }
];

let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
let specialBets = { big:0, small:0, odd:0, even:0, allTriplets:0 };
let currentChip = 100;
let lastWinAmount = 0;
let isRolling = false;
let isCoverAnimating = false;
let countdownInterval = null;

function getTotalBet() {
    let p = Object.values(patternBets).reduce((a,b)=>a+b,0);
    let s = Object.values(specialBets).reduce((a,b)=>a+b,0);
    return p+s;
}

function updateUI() {
    const balanceSpan = document.getElementById("userBalanceDisplay");
    if(balanceSpan) balanceSpan.innerText = getUserBalance().toFixed(2);
    const bankerSpan = document.getElementById("bankerBalanceDisplay");
    if(bankerSpan) bankerSpan.innerText = Math.floor(bankerBalance);
    const bankerNameSpan = document.getElementById("bankerNameDisplay");
    if(bankerNameSpan) bankerNameSpan.innerText = currentBanker;
    const totalSpan = document.getElementById("totalBetValue");
    if(totalSpan) totalSpan.innerText = getTotalBet();
    const lastSpan = document.getElementById("lastWinValue");
    if(lastSpan) lastSpan.innerText = lastWinAmount;
    
    for(let id of Object.keys(patternBets)) {
        let span = document.getElementById(`bet_${id}`);
        if(span) span.innerText = patternBets[id];
    }
    for(let id of Object.keys(specialBets)) {
        let span = document.getElementById(`bet_special_${id}`);
        if(span) span.innerText = specialBets[id];
    }
}

function showMsg(msg, duration=2000) {
    const msgDiv = document.getElementById("msgArea");
    if(!msgDiv) return;
    if(window.msgTimeout) clearTimeout(window.msgTimeout);
    msgDiv.innerText = msg;
    window.msgTimeout = setTimeout(() => {
        if(msgDiv.innerText === msg) msgDiv.innerText = "🎲 点击开骰 | 骰盅缓慢开启";
    }, duration);
}

function addBet(type, id, val) {
    let target = (type === 'pattern') ? patternBets : specialBets;
    if(target[id] === undefined) return;
    let totalNow = getTotalBet();
    let userBal = getUserBalance();
    if(totalNow + val > userBal) { showMsg(`余额不足，无法加注 ${val}`); return; }
    target[id] += val;
    updateUI();
    let name = (type === 'pattern') ? patternIdToName[id] : SPECIALS.find(s=>s.id===id)?.name || id;
    showMsg(`➕ ${name} +${val}`, 800);
}

function subBet(type, id, val) {
    let target = (type === 'pattern') ? patternBets : specialBets;
    if(target[id] === undefined) return;
    let old = target[id];
    let newVal = Math.max(0, old - val);
    if(old !== newVal) {
        target[id] = newVal;
        updateUI();
        let name = (type === 'pattern') ? patternIdToName[id] : SPECIALS.find(s=>s.id===id)?.name || id;
        showMsg(`➖ ${name} -${val}`, 800);
    }
}

function clearAllBets() {
    for(let k of Object.keys(patternBets)) patternBets[k]=0;
    for(let k of Object.keys(specialBets)) specialBets[k]=0;
    updateUI();
    showMsg("清空所有下注");
}

function resetDiceCover() {
    const cover = document.getElementById("diceCover");
    if(cover) {
        cover.classList.remove("open-cover", "hidden-cover");
        cover.style.display = "flex";
        cover.style.visibility = "visible";
        cover.style.opacity = "1";
        cover.style.transform = "translateY(0) scale(1)";
    }
}

async function animateRolling(finalPatterns) {
    const diceEls = document.querySelectorAll(".dice");
    const iconMap = { "鱼":"🐟","虾":"🦐","蟹":"🦀","葫芦":"🏺","金钱":"💰","鸡":"🐔" };
    for(let step=0; step<8; step++) {
        await new Promise(r=>setTimeout(r, 70));
        for(let i=0;i<3;i++) {
            let rand = PATTERNS[Math.floor(Math.random()*6)];
            diceEls[i].innerHTML = rand.icon;
        }
    }
    for(let i=0;i<3;i++) {
        diceEls[i].innerHTML = iconMap[finalPatterns[i]] || "🎲";
    }
}

function getPointValue(pname) { const m={"鱼":1,"虾":2,"蟹":3,"葫芦":4,"金钱":5,"鸡":6}; return m[pname]||0; }

function settleGame(diceNames) {
    let points = diceNames.map(n=>getPointValue(n));
    let sum = points.reduce((a,b)=>a+b,0);
    let isTriplet = diceNames[0]===diceNames[1] && diceNames[1]===diceNames[2];
    let totalBet = getTotalBet();
    if(totalBet===0) { showMsg("没有下注，无法结算"); return false; }
    if(totalBet > bankerBalance) { showMsg("庄家余额不足，无法开奖"); return false; }
    if(totalBet > getUserBalance()) { showMsg("用户余额不足"); return false; }
    
    setUserBalance(getUserBalance() - totalBet);
    bankerBalance -= totalBet;
    
    let winAmount = 0;
    let winDetails = [];
    for(let [pid, betVal] of Object.entries(patternBets)) {
        if(betVal===0) continue;
        let occur = diceNames.filter(n=> n === patternIdToName[pid]).length;
        if(occur>0) {
            let prize = betVal * (occur+1);
            winAmount += prize;
            winDetails.push(`${patternIdToName[pid]} x${occur}`);
        }
    }
    let bigWin=false, smallWin=false, oddWin=false, evenWin=false, allTripletWin=false;
    if(!isTriplet) {
        if(sum>=11 && sum<=17) bigWin=true;
        if(sum>=4 && sum<=10) smallWin=true;
        if(sum%2===1) oddWin=true;
        if(sum%2===0) evenWin=true;
    }
    if(isTriplet) allTripletWin=true;
    if(specialBets.big>0 && bigWin) { winAmount += specialBets.big*2; winDetails.push("大"); }
    if(specialBets.small>0 && smallWin) { winAmount += specialBets.small*2; winDetails.push("小"); }
    if(specialBets.odd>0 && oddWin) { winAmount += specialBets.odd*2; winDetails.push("单"); }
    if(specialBets.even>0 && evenWin) { winAmount += specialBets.even*2; winDetails.push("双"); }
    if(specialBets.allTriplets>0 && allTripletWin) { winAmount += specialBets.allTriplets*25; winDetails.push("全围"); }

    let net = winAmount - totalBet;
    bankerBalance += winAmount;
    setUserBalance(getUserBalance() + winAmount);
    lastWinAmount = net;
    saveBanker();
    updateUI();
    
    let diceShow = diceNames.join("、");
    if(winAmount>0) showMsg(`🎲 ${diceShow} 净赢+${net}  [${winDetails.join(',')}]`, 4500);
    else showMsg(`😢 ${diceShow} 亏损 ${totalBet}`, 3000);
    
    // 记录历史
    if(currentUser) {
        let recs = usersData[currentUser.phone].records || [];
        recs.unshift({ time: new Date().toLocaleTimeString(), result: diceShow, win: net });
        if(recs.length > 30) recs.pop();
        usersData[currentUser.phone].records = recs;
        saveUsers();
    }
    clearAllBets();
    return true;
}

async function onRollWithCover() {
    if(isRolling || isCoverAnimating) return;
    let total = getTotalBet();
    if(total === 0) { showMsg("请先下注再开骰！"); return; }
    if(total > bankerBalance) { showMsg("庄家余额不足，请减少下注"); return; }
    if(total > getUserBalance()) { showMsg("用户余额不足"); return; }
    
    const diceCover = document.getElementById("diceCover");
    if(!diceCover) return;
    if(diceCover.classList.contains("hidden-cover") || diceCover.style.display === "none") resetDiceCover();
    
    isRolling = true;
    isCoverAnimating = true;
    const rollBtn = document.getElementById("rollBtn");
    if(rollBtn) rollBtn.disabled = true;
    
    diceCover.classList.add("open-cover");
    await new Promise(resolve => setTimeout(resolve, 550));
    diceCover.classList.add("hidden-cover");
    diceCover.style.display = "none";
    
    const patternList = ["鱼","虾","蟹","葫芦","金钱","鸡"];
    let finalResult = [
        patternList[Math.floor(Math.random()*6)],
        patternList[Math.floor(Math.random()*6)],
        patternList[Math.floor(Math.random()*6)]
    ];
    await animateRolling(finalResult);
    settleGame(finalResult);
    
    await new Promise(r => setTimeout(r, 1500));
    const diceEls = document.querySelectorAll(".dice");
    diceEls.forEach(d => d.innerHTML = "🎲");
    diceCover.style.display = "flex";
    diceCover.classList.remove("open-cover", "hidden-cover");
    diceCover.style.visibility = "visible";
    diceCover.style.opacity = "1";
    diceCover.style.transform = "translateY(0) scale(1)";
    
    isCoverAnimating = false;
    isRolling = false;
    if(rollBtn) rollBtn.disabled = false;
    showMsg("骰盅已复位，可继续下注", 1500);
}

// ==================== 二十人座位管理（简化版保留核心功能）====================
let players = [];
let nextPlayerId = 100;
const namePool = ["阿强","老李","虾妹","蟹叔","金钱哥","鸡姐","小陈","骰子手","好运","锦鲤","鱼神","虾兵","蟹将","葫芦仙","铜钱","凤姐","阿珍","闲人","福仔","潮汕仔"];
let playerBalances = JSON.parse(localStorage.getItem('chaoshan_player_balances_full')) || {};
function savePlayerBalances() { localStorage.setItem('chaoshan_player_balances_full', JSON.stringify(playerBalances)); }
function getPlayerBalance(name) { return playerBalances[name] || 1000; }
function setPlayerBalance(name, amt) { playerBalances[name] = Math.max(0, amt); savePlayerBalances(); }

let maxSeats = 20;
function renderSeats() {
    const container = document.getElementById("seatsGrid");
    if(!container) return;
    container.innerHTML = "";
    for(let i=1; i<=maxSeats; i++) {
        const player = players.find(p => p.seatIndex === i);
        const isOccupied = !!player;
        const seatDiv = document.createElement("div");
        seatDiv.className = `seat-card ${isOccupied ? "occupied" : "empty-seat"}`;
        if(isOccupied) {
            let bal = getPlayerBalance(player.name);
            seatDiv.innerHTML = `
                <div class="seat-number">#${i}</div>
                <div class="player-name" title="${escapeHtml(player.name)}">${escapeHtml(player.name.length>6?player.name.slice(0,5)+"..":player.name)}<br><span style="font-size:0.55rem;">💰${bal}</span></div>
                <button class="seat-action remove-player" data-seat="${i}">移除</button>
            `;
        } else {
            seatDiv.innerHTML = `<div class="seat-number">#${i}</div><div class="player-name">🔲 空闲</div><button class="seat-action add-to-seat" data-seat="${i}">邀请</button>`;
        }
        container.appendChild(seatDiv);
    }
    document.getElementById("roomStats").innerHTML = `👥 ${players.length} / ${maxSeats}`;
    document.querySelectorAll(".remove-player").forEach(btn => {
        btn.addEventListener("click", (e) => { let seat = parseInt(btn.dataset.seat); removePlayerBySeat(seat); });
    });
    document.querySelectorAll(".add-to-seat").forEach(btn => {
        btn.addEventListener("click", (e) => { let seat = parseInt(btn.dataset.seat); addPlayerToSeat(seat); });
    });
}

function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
function addPlayerToSeat(seatIndex) {
    if(players.find(p=>p.seatIndex===seatIndex)) { showMsg(`座位 ${seatIndex} 已占用`, 1000); return; }
    if(players.length >= maxSeats) { showMsg(`房间已满 (最大${maxSeats}人)`, 1000); return; }
    let randomName = namePool[Math.floor(Math.random() * namePool.length)] + (Math.floor(Math.random()*90)+10);
    if(!playerBalances[randomName]) setPlayerBalance(randomName, 1000);
    players.push({ id: nextPlayerId++, name: randomName, seatIndex: seatIndex });
    renderSeats();
    showMsg(`✨ ${randomName} 入座 ${seatIndex} 号`, 1200);
}
function removePlayerBySeat(seatIndex) {
    let idx = players.findIndex(p=>p.seatIndex===seatIndex);
    if(idx !== -1) {
        let removed = players[idx];
        players.splice(idx,1);
        renderSeats();
        showMsg(`🚪 ${removed.name} 离开 ${seatIndex} 号`, 1200);
    }
}
function addRandomPlayer() {
    if(players.length >= maxSeats) { showMsg(`房间已满`, 1000); return; }
    let emptySeats = [];
    for(let i=1;i<=maxSeats;i++) if(!players.find(p=>p.seatIndex===i)) emptySeats.push(i);
    if(emptySeats.length===0) return;
    let randomSeat = emptySeats[Math.floor(Math.random()*emptySeats.length)];
    addPlayerToSeat(randomSeat);
}
function clearAllPlayers() { players = []; renderSeats(); showMsg(`清空所有玩家`, 1000); }
function fillExamplePlayers() {
    clearAllPlayers();
    let count = Math.min(8, maxSeats);
    let usedSeats = new Set();
    for(let i=0;i<count;i++) {
        let seat = 1;
        while(usedSeats.has(seat)) seat = (seat % maxSeats) + 1;
        usedSeats.add(seat);
        let name = namePool[i % namePool.length] + (Math.floor(Math.random()*100));
        if(!playerBalances[name]) setPlayerBalance(name, 1000);
        players.push({ id: nextPlayerId++, name: name, seatIndex: seat });
    }
    renderSeats();
    showMsg(`示例填充 ${players.length} 位玩家`, 1200);
}
function applyMaxCapacity() {
    let newMax = parseInt(document.getElementById("maxSeatsInput").value);
    if(isNaN(newMax)) newMax=20;
    newMax = Math.min(20, Math.max(1, newMax));
    maxSeats = newMax;
    players = players.filter(p => p.seatIndex <= maxSeats);
    renderSeats();
    showMsg(`最大座位调整为 ${maxSeats}`, 1000);
}

// ==================== 游戏界面渲染 ====================
function buildGameUI() {
    const patternContainer = document.getElementById("patternGrid");
    if(patternContainer) {
        patternContainer.innerHTML="";
        PATTERNS.forEach(p=>{
            let card = document.createElement("div"); card.className="bet-card";
            card.innerHTML = `<div class="bet-icon">${p.icon}</div><div class="bet-name">${p.name}</div><div class="bet-odds">1~3倍</div>
            <div class="bet-amount"><button class="btn-chip sub-pattern" data-id="${p.id}">-</button><span id="bet_${p.id}">0</span><button class="btn-chip add-pattern" data-id="${p.id}">+</button></div>`;
            patternContainer.appendChild(card);
        });
    }
    const specialContainer = document.getElementById("specialGrid");
    if(specialContainer) {
        specialContainer.innerHTML="";
        SPECIALS.forEach(s=>{
            let card = document.createElement("div"); card.className="bet-card";
            card.innerHTML = `<div class="bet-icon">${s.icon}</div><div class="bet-name">${s.name}</div><div class="bet-odds">${s.odds===1?"1:1":"1:24"}</div>
            <div class="bet-amount"><button class="btn-chip sub-special" data-id="${s.id}">-</button><span id="bet_special_${s.id}">0</span><button class="btn-chip add-special" data-id="${s.id}">+</button></div>`;
            specialContainer.appendChild(card);
        });
    }
    
    // 事件委托绑定加减按钮
    document.querySelector(".bet-grid")?.addEventListener("click", (e) => {
        let btn = e.target.closest(".btn-chip");
        if(!btn) return;
        let id = btn.dataset.id;
        if(btn.classList.contains("add-pattern")) addBet('pattern', id, currentChip);
        if(btn.classList.contains("sub-pattern")) subBet('pattern', id, currentChip);
    });
    document.querySelector(".special-grid")?.addEventListener("click", (e) => {
        let btn = e.target.closest(".btn-chip");
        if(!btn) return;
        let id = btn.dataset.id;
        if(btn.classList.contains("add-special")) addBet('special', id, currentChip);
        if(btn.classList.contains("sub-special")) subBet('special', id, currentChip);
    });
    
    document.querySelectorAll(".chip").forEach(chip => {
        chip.onclick = () => {
            let val = parseInt(chip.dataset.chip);
            if(!isNaN(val)) { currentChip=val; document.querySelectorAll(".chip").forEach(c=>c.classList.remove("selected")); chip.classList.add("selected"); showMsg(`筹码 ${val}`,500); }
        };
    });
    document.getElementById("rollBtn").onclick = onRollWithCover;
    document.getElementById("resetBetBtn").onclick = clearAllBets;
    document.getElementById("resetGameBtn").onclick = () => {
        bankerBalance = 10000;
        currentBanker = "系统庄家";
        saveBanker();
        clearAllBets();
        lastWinAmount = 0;
        updateUI();
        showMsg("庄家重置，本金 10000 文");
    };
    
    let defaultChip = document.querySelector('.chip[data-chip="100"]');
    if(defaultChip) defaultChip.classList.add("selected");
    currentChip = 100;
    updateUI();
    resetDiceCover();
}

    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="user-info-bar">
            <span class="user-info">📱 ${currentUser.phone} | 💰 余额: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span>
            <button id="logoutBtn" class="logout-btn">退出登录</button>
        </div>
        <div class="game-card">
            <div class="game-header"><h1><span>🎲</span> 潮汕葫芦鱼 · 二十人房 <span>🦐</span></h1><div class="sub">六门 | 大小单双 | 全围24倍 | 骰盅慢启</div></div>

        </div>

            <div class="admin-header" id="adminHeader"><h3>🎛️ 二十人座席管理</h3><button class="toggle-btn" id="toggleAdminBtn">▼ 收起</button></div>
            <div class="admin-content" id="adminContent">
                <div class="capacity-row">
                    <div class="capacity-control"><label>🏠 最大座位</label><input type="number" id="maxSeatsInput" min="1" max="20" value="20" step="1"><button class="admin-btn" id="applyCapacityBtn" style="padding: 3px 10px;">设置</button></div>
                    <div class="stat-badge" id="roomStats">👥 0 / 20</div>
                </div>
                <div class="seats-grid" id="seatsGrid"></div>
                <div class="admin-buttons">
                    <button class="admin-btn" id="addRandomPlayerBtn">➕ 随机加入</button>
                    <button class="admin-btn" id="clearAllPlayersBtn">🗑️ 清空</button>
                    <button class="admin-btn" id="fillExampleBtn">🎲 示例8人</button>
                </div>
                <footer>点击座位「邀请入座」/「移除」自由管理</footer>
            </div>

    `;
    
    document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
    document.getElementById("applyCapacityBtn").onclick = applyMaxCapacity;
    document.getElementById("addRandomPlayerBtn").onclick = addRandomPlayer;
    document.getElementById("clearAllPlayersBtn").onclick = clearAllPlayers;
    document.getElementById("fillExampleBtn").onclick = fillExamplePlayers;
    
    let collapsed = false;
    const adminContent = document.getElementById("adminContent");
    const toggleBtn = document.getElementById("toggleAdminBtn");
    toggleBtn.onclick = () => {
        collapsed = !collapsed;
        if(collapsed) adminContent.classList.add("collapsed");
        else adminContent.classList.remove("collapsed");
    };
    
    buildGameUI();
    renderSeats();
    fillExamplePlayers();
}

// ==================== 登录/注册界面 ====================
function renderAuthUI() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="auth-panel">
            <h2>🎲 潮汕葫芦鱼</h2>
            <input type="tel" id="regPhone" class="auth-input" placeholder="手机号" maxlength="11">
            <input type="password" id="regPassword" class="auth-input" placeholder="密码 (至少4位)">
            <div class="auth-buttons">
                <button id="loginBtn" class="auth-btn">登录</button>
                <button id="registerBtn" class="auth-btn">注册</button>
            </div>
            <div class="auth-note">🎮 测试：任意11位手机号注册，初始余额1000，所有数据本地保存</div>
        </div>
    `;
    
    document.getElementById('loginBtn').onclick = () => {
        let phone = document.getElementById('regPhone').value.trim();
        let pwd = document.getElementById('regPassword').value;
        if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
        let user = usersData[phone];
        if(!user) { showToast("手机号未注册"); return; }
        if(user.password !== pwd) { showToast("密码错误"); return; }
        currentUser = { phone, ...user };
        showToast(`欢迎回来，${phone}`);
        renderGameUI();
    };
    
    document.getElementById('registerBtn').onclick = () => {
        let phone = document.getElementById('regPhone').value.trim();
        let pwd = document.getElementById('regPassword').value;
        if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
        if(!/^1[3-9]\d{9}$/.test(phone)) { showToast("请输入有效11位手机号"); return; }
        if(pwd.length < 4) { showToast("密码至少4位"); return; }
        if(usersData[phone]) { showToast("手机号已注册，请直接登录"); return; }
        usersData[phone] = { password: pwd, balance: 1000, records: [] };
        saveUsers();
        showToast("注册成功！请登录");
        document.getElementById('regPhone').value = '';
        document.getElementById('regPassword').value = '';
    };
}

// 启动
renderAuthUI();
