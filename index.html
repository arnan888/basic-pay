<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>双游戏大厅 | 自动循环抢庄+服务费 | 葫芦鱼+骰宝</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #1a120c; font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif; padding: 12px; }
        .app { max-width: 550px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .game-nav { background: linear-gradient(145deg, #2a241e, #1f1a15); border-radius: 60px; padding: 6px; display: flex; gap: 8px; border: 1px solid #ffaa44; }
        .game-tab { flex: 1; background: none; border: none; padding: 8px 0; border-radius: 50px; font-weight: bold; color: #ccaa77; cursor: pointer; text-align: center; }
        .game-tab.active { background: #c47c3a; color: #2f1b0a; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .user-section { background: #1f1711; border-radius: 40px; padding: 8px 16px; display: flex; flex-direction: column; gap: 8px; }
        .user-info-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .btn-group { display: flex; gap: 8px; }
        .logout-btn, .service-btn { background: #734c2e; border: none; padding: 4px 12px; border-radius: 30px; color: #ffe3b3; cursor: pointer; }
        .service-btn { background: #2e7d32; }
        .charge-withdraw-row { display: flex; gap: 10px; }
        .charge-btn, .withdraw-btn { background: #c47c3a; border: none; padding: 5px 20px; border-radius: 30px; color: #2f1b0a; font-weight: bold; flex: 1; text-align: center; cursor: pointer; }
        .withdraw-btn { background: #734c2e; color: #ffe3b3; }
        .game-container { background: linear-gradient(145deg, #362a1f, #251e16); border-radius: 48px; overflow: hidden; min-height: 550px; }
        .auth-panel { background: linear-gradient(145deg, #362a1f, #251e16); border-radius: 48px; padding: 30px 20px; text-align: center; border: 2px solid #ffaa44; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; background: #2a241e; border: 1px solid #ffaa44; border-radius: 40px; color: white; text-align: center; }
        .auth-buttons { display: flex; gap: 12px; margin: 20px 0; }
        .auth-btn { flex: 1; background: #c47c3a; border: none; padding: 10px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .chip { background: #ebbc7e; padding: 3px 10px; border-radius: 35px; cursor: pointer; display: inline-block; box-shadow: 0 2px 0 #8b5a2e; transition: 0.05s linear; }
        .chip.selected { background: #f7c56e; box-shadow: 0 0 0 1px #ffefb0, 0 2px 0 #7a4b22; }
        .bet-card { background: #1f1712; border-radius: 28px; padding: 4px 2px; text-align: center; box-shadow: 0 6px 0 #0a0705; border: 1px solid #6f4f34; cursor: pointer; transition: 0.05s linear; }
        .bet-card:active { transform: translateY(3px); box-shadow: 0 3px 0 #0a0705; }
        .grab-btn { background: #ffaa44; border: none; padding: 6px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .grab-btn:disabled { background: #888; cursor: not-allowed; }
        .dice { width: 60px; height: 60px; position: relative; transform-style: preserve-3d; }
        .dice-face { position: absolute; width: 60px; height: 60px; background: linear-gradient(145deg, #fffff0, #f5f5dc); border-radius: 12px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; border: 1px solid rgba(200,180,120,0.5); }
        .front { transform: translateZ(30px); } .back { transform: rotateY(180deg) translateZ(30px); }
        .right { transform: rotateY(90deg) translateZ(30px); } .left { transform: rotateY(-90deg) translateZ(30px); }
        .top { transform: rotateX(90deg) translateZ(30px); } .bottom { transform: rotateX(-90deg) translateZ(30px); }
        .pip { position: absolute; width: 9px; height: 9px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #e74c3c, #c0392b); }
        .result-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.6); background: linear-gradient(145deg, #ffcc44, #ff9933); color: #1a1a2a; padding: 24px 40px; border-radius: 80px; font-size: 2rem; font-weight: 900; z-index: 2000; opacity: 0; transition: 0.25s; pointer-events: none; }
        .result-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #000000cc; color: #ffaa44; padding: 8px 16px; border-radius: 40px; z-index: 2001; animation: fadeOut 2s forwards; }
        @keyframes fadeOut { 0% { opacity:0; transform: translateX(-50%) translateY(20px); } 15% { opacity:1; transform: translateX(-50%) translateY(0); } 85% { opacity:1; } 100% { opacity:0; transform: translateX(-50%) translateY(-20px); } }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: #1a2a1a; border-radius: 48px; padding: 24px; border: 2px solid #ffaa44; width: 85%; max-width: 500px; text-align: center; color: #ffdd99; }
        .countdown-warning { animation: pulse 0.5s infinite; color: #ff3300; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .fish-pattern-img { width: 36px; height: 36px; object-fit: contain; margin: 0 auto 3px; display: block; }
        @media (max-width: 480px) { .dice { width: 50px; height: 50px; } .dice-face { width: 50px; height: 50px; } .front { transform: translateZ(25px); } .fish-pattern-img { width: 30px; height: 30px; } }
    </style>
</head>
<body>
<div class="app" id="app"></div>
<script>
    // ==================== 全局用户系统 ====================
    const USERS_KEY = 'double_games_final_v2';
    let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
    let currentUser = null;
    function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0; }
    function setUserBalance(amt) { if(currentUser) { usersData[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }
    function showToast(msg) { let t=document.createElement('div'); t.className='toast-message'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    // 充值/客服弹窗
    function showRechargeModal() { let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content"><h3>💎 充值</h3><p>充值比例 1元=1000文</p><p>请联系客服微信: game_kf_888</p><button id="closeRecharge" style="background:#734c2e; padding:8px; border-radius:40px;">关闭</button></div>`; document.body.appendChild(m); m.querySelector('#closeRecharge').onclick=()=>m.remove(); }
    function showServiceModal() { let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content"><h3>📞 客服</h3><p>微信: game_kf_888</p><p>电话: 400-888-XXXX</p><button id="closeSvc">关闭</button></div>`; document.body.appendChild(m); m.querySelector('#closeSvc').onclick=()=>m.remove(); }
    function recharge() { showRechargeModal(); }
    function withdraw() { showToast("提现请联系客服"); }
// ==================== 游戏2：至尊骰宝（全自动30秒循环，25秒下注+5秒开骰） ====================
let diceDestroy = null;
function initDiceGame(container) {
    if(diceDestroy) diceDestroy();
    container.innerHTML = '';
    const oddsMap = {4:60,5:30,6:18,7:12,8:8,9:7,10:6,11:6,12:7,13:8,14:12,15:18,16:30,17:60};
    let pointsHtml = '';
    for(let i=4;i<=17;i++) pointsHtml += `<div class="bet-card point-card" data-point="${i}"><div class="bet-name">${i}点</div><div class="bet-odds">${oddsMap[i]}倍</div><div id="bet_${i}" class="bet-amount">0</div></div>`;
    let trioHtml = '';
    for(let i=1;i<=6;i++) trioHtml += `<div class="bet-card trio-card" data-type="TRIPLE_${i}"><div class="bet-name">${i}围</div><div class="bet-odds">150倍</div><div id="bet_TRIPLE_${i}" class="bet-amount">0</div></div>`;
    trioHtml += `<div class="bet-card trio-card" data-type="ALL_TRIPLE"><div class="bet-name">豹子</div><div class="bet-odds">30倍</div><div id="bet_ALL_TRIPLE" class="bet-amount">0</div></div>`;
    
    container.innerHTML = `
        <div class="dice-wrapper">
            <div style="max-width:500px; background:linear-gradient(145deg,#1a4a2a,#0a2a1a); border-radius:40px; padding:12px;">
                <div style="display:flex; justify-content:center; margin-bottom:12px;">
                    <button id="diceGrabBtn" class="grab-btn">🎲 抢庄 (需2001文)</button>
                </div>
                <div class="dice-area" style="background:rgba(0,0,0,0.7); border-radius:24px; padding:8px; text-align:center;">
                    <div style="display:flex; justify-content:center; gap:12px;">
                        <div class="dice" id="dice1"></div><div class="dice" id="dice2"></div><div class="dice" id="dice3"></div>
                    </div>
                    <div style="margin-top:6px;"><span id="totalPoints" style="font-size:22px; font-weight:bold; color:#ff3300;">3</span></div>
                </div>
                <div style="display:flex; justify-content:space-between; margin:12px 0; background:rgba(0,0,0,0.5); border-radius:30px; padding:8px;">
                    <div>总押注:<span id="totalBet">0</span></div>
                    <div>🎲 本局中奖:<span id="rollingWinNumber">0.00</span></div>
                </div>
                <div style="display:flex; justify-content:space-between; background:rgba(0,0,0,0.5); border-radius:30px; padding:8px; margin-bottom:12px;">
                    <div>⏱️ 下注倒计时 <span id="countdownNum" style="font-weight:bold;">25</span></div>
                    <div>🎲 筹码 <span id="selectedChip">0</span></div>
                </div>
                <div style="display:flex; gap:8px; margin-bottom:12px;">
                    <button id="clearAllBtn" style="flex:1; background:#e74c3c; border:none; border-radius:50px; padding:8px;">全部取消</button>
                    <button id="repeatBtn" style="flex:1; background:#f39c12; border:none; border-radius:50px; padding:8px;">续押</button>
                    <button id="refreshBtn" style="flex:1; background:#2ecc71; border:none; border-radius:50px; padding:8px;">刷新余额</button>
                    <button disabled style="flex:1; background:#3498db; border:none; border-radius:50px; padding:8px;">⏳ 等待自动开奖</button>
                </div>
                <div class="chips" style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:12px;">
                    <div class="chip" data-val="10">10</div><div class="chip" data-val="20">20</div><div class="chip" data-val="50">50</div>
                    <div class="chip" data-val="100">100</div><div class="chip" data-val="500">500</div><div class="chip" data-val="1000">1K</div>
                </div>
                <div style="font-size:0.7rem; color:#ffd49f; margin:8px 0;">🎲 大小单双 · 赔率2倍</div>
                <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px;">
                    <div class="bet-card special-card" data-type="BIG">大<div id="bet_BIG">0</div></div>
                    <div class="bet-card special-card" data-type="SMALL">小<div id="bet_SMALL">0</div></div>
                    <div class="bet-card special-card" data-type="ODD">单<div id="bet_ODD">0</div></div>
                    <div class="bet-card special-card" data-type="EVEN">双<div id="bet_EVEN">0</div></div>
                </div>
                <div style="font-size:0.7rem; color:#ffd49f; margin:8px 0;">🎲 点数投注 · 4-17点</div>
                <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px;">${pointsHtml}</div>
                <div style="font-size:0.7rem; color:#ffd49f; margin:8px 0;">🎲 围骰 · 豹子</div>
                <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px;">${trioHtml}</div>
                <button id="showDiceHistoryBtn" style="width:100%; background:#2a1f16; border:1px solid #ffaa44; border-radius:40px; padding:8px; margin-top:8px;">📜 开奖记录查询</button>
            </div>
        </div>
    `;
    
    let bets = { 'BIG':0,'SMALL':0,'ODD':0,'EVEN':0,4:0,5:0,6:0,7:0,8:0,9:0,10:0,11:0,12:0,13:0,14:0,15:0,16:0,17:0,'TRIPLE_1':0,'TRIPLE_2':0,'TRIPLE_3':0,'TRIPLE_4':0,'TRIPLE_5':0,'TRIPLE_6':0,'ALL_TRIPLE':0 };
    let selectedChip = 0, currentBalance = getUserBalance(), isDrawing = false, isBetLocked = false, countdownInterval = null, rollingAnimation = null, lastBet = null, hasGrabbed = false, playerBankerBalance = 0;
    const diceEl = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
    const totalEl = document.getElementById('totalPoints'), rollingWinEl = document.getElementById('rollingWinNumber'), totalBetEl = document.getElementById('totalBet');
    
    function buildDiceFaces() {
        diceEl.forEach(dice => {
            dice.innerHTML = '';
            const faces = ['front','back','right','left','top','bottom'];
            const valMap = {front:1, back:6, right:4, left:3, top:2, bottom:5};
            faces.forEach(face => {
                let num = valMap[face];
                let faceDiv = document.createElement('div');
                faceDiv.className = `dice-face ${face} face-${num}`;
                let pipHtml = '';
                if(num===1) pipHtml = '<div class="pip pip-center"></div>';
                else if(num===2) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-br"></div>';
                else if(num===3) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div>';
                else if(num===4) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                else if(num===5) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-mid"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                else if(num===6) pipHtml = '<div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div>';
                faceDiv.innerHTML = pipHtml;
                dice.appendChild(faceDiv);
            });
        });
    }
    buildDiceFaces();
    function setDiceValue(dice, val) {
        const rot = {1:'rotateX(0deg)',2:'rotateX(-90deg)',3:'rotateY(90deg)',4:'rotateY(-90deg)',5:'rotateX(90deg)',6:'rotateX(180deg)'};
        dice.style.transform = rot[val];
    }
    async function startRollingLong(finalVals, duration=5000) {
        return new Promise(resolve => {
            let steps = 30, step = 0, interval = duration / steps;
            let iv = setInterval(() => {
                diceEl.forEach(d => setDiceValue(d, Math.floor(Math.random()*6)+1));
                step++;
                if(step >= steps) {
                    clearInterval(iv);
                    diceEl.forEach((d,i) => setDiceValue(d, finalVals[i]));
                    resolve();
                }
            }, interval);
        });
    }
    function startRollingNumber(finalAmount) {
        if(rollingAnimation) cancelAnimationFrame(rollingAnimation);
        let start = performance.now(), startVal = parseFloat(rollingWinEl.innerText) || 0;
        function update(now) {
            let p = Math.min(1, (now-start)/5000);
            let ease = 1 - Math.pow(1-p, 2);
            let cur = startVal + (finalAmount - startVal) * ease;
            rollingWinEl.innerText = cur.toFixed(2);
            if(p < 1) rollingAnimation = requestAnimationFrame(update);
            else { rollingWinEl.innerText = finalAmount.toFixed(2); rollingAnimation = null; }
        }
        rollingAnimation = requestAnimationFrame(update);
    }
    function getResultInfo(d1,d2,d3) {
        let total = d1+d2+d3, types = [];
        if(total>=11 && total<=17) types.push('BIG');
        if(total>=4 && total<=10) types.push('SMALL');
        if(total%2===1) types.push('ODD');
        if(total%2===0) types.push('EVEN');
        if(d1===d2 && d2===d3) { types.push(`TRIPLE_${d1}`); types.push('ALL_TRIPLE'); }
        return { total, types };
    }
    function updateUI() {
        for(let k in bets) {
            let el = document.getElementById(`bet_${k}`);
            if(el) el.innerText = bets[k];
        }
        totalBetEl.innerText = Object.values(bets).reduce((a,b)=>a+b,0);
    }
    function addBet(type) {
        if(hasGrabbed) { showToast("庄家不能下注"); return; }
        if(selectedChip<=0) { showToast("请先选择筹码"); return; }
        if(selectedChip > currentBalance) { showToast("余额不足"); return; }
        currentBalance -= selectedChip;
        setUserBalance(currentBalance);
        bets[type] += selectedChip;
        updateUI();
    }
    function clearAllBets() {
        let total = Object.values(bets).reduce((a,b)=>a+b,0);
        currentBalance += total;
        setUserBalance(currentBalance);
        for(let k in bets) bets[k]=0;
        updateUI();
        showToast("已清空所有下注");
    }
    function repeatLastBet() {
        if(!lastBet) { showToast("无续押记录"); return; }
        let need = Object.values(lastBet).reduce((a,b)=>a+b,0);
        if(need > currentBalance) { showToast("余额不足，无法续押"); return; }
        for(let k in bets) bets[k]=0;
        for(let k in lastBet) bets[k]=lastBet[k];
        currentBalance -= need;
        setUserBalance(currentBalance);
        updateUI();
        if(!isDrawing && !isBetLocked) startAutoDraw();
    }
    let gameRecords = [];
    function addRecord(d1,d2,d3, winAmount, totalBet) {
        gameRecords.unshift({
            time: new Date().toLocaleTimeString(),
            dice: `${d1},${d2},${d3}`,
            result: winAmount>0 ? `赢${winAmount}` : `输${totalBet}`,
            win: winAmount
        });
        if(gameRecords.length>50) gameRecords.pop();
    }
    async function startAutoDraw() {
        if(isDrawing) return;
        let totalBetVal = Object.values(bets).reduce((a,b)=>a+b,0);
        isDrawing = true;
        isBetLocked = true;
        let d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1, d3 = Math.floor(Math.random()*6)+1;
        let { total, types } = getResultInfo(d1,d2,d3);
        let winAmount = 0;
        if(types.includes('BIG') && bets['BIG']) winAmount += bets['BIG'] * 2;
        if(types.includes('SMALL') && bets['SMALL']) winAmount += bets['SMALL'] * 2;
        if(types.includes('ODD') && bets['ODD']) winAmount += bets['ODD'] * 2;
        if(types.includes('EVEN') && bets['EVEN']) winAmount += bets['EVEN'] * 2;
        if(bets[total]) winAmount += bets[total] * oddsMap[total];
        for(let t of types) {
            if(t.startsWith('TRIPLE_') && bets[t]) winAmount += bets[t] * 150;
            if(t === 'ALL_TRIPLE' && bets['ALL_TRIPLE']) winAmount += bets['ALL_TRIPLE'] * 30;
        }
        startRollingNumber(winAmount);
        await startRollingLong([d1,d2,d3], 5000);
        totalEl.innerText = total;
        if(totalBetVal > 0) {
            if(winAmount > 0) currentBalance += winAmount;
            setUserBalance(currentBalance);
            if(hasGrabbed) {
                playerBankerBalance -= winAmount;
                if(playerBankerBalance < 0) {
                    hasGrabbed = false;
                    playerBankerBalance = 0;
                    localStorage.setItem('dice_player_banker', 0);
                    updateGrabBtn();
                    showToast("庄家破产，权限回收");
                } else {
                    localStorage.setItem('dice_player_banker', playerBankerBalance);
                }
            }
        }
        addRecord(d1,d2,d3, winAmount, totalBetVal);
        for(let k in bets) bets[k]=0;
        lastBet = JSON.parse(JSON.stringify(bets));
        updateUI();
        let pop = document.createElement('div');
        pop.className = 'result-popup ' + (winAmount>0 ? 'win' : 'lose');
        pop.textContent = winAmount>0 ? `🎉 赢 ${winAmount} 🎉` : `😭 输 ${totalBetVal} 😭`;
        document.body.appendChild(pop);
        setTimeout(()=>pop.classList.add('show'),10);
        setTimeout(()=>{ pop.classList.remove('show'); setTimeout(()=>pop.remove(),300); },2000);
        isDrawing = false;
        isBetLocked = false;
        startCountdown(25);
    }
    function startCountdown(sec) {
        if(countdownInterval) clearInterval(countdownInterval);
        let c = sec, cdSpan = document.getElementById('countdownNum');
        cdSpan.innerText = c;
        isBetLocked = false;
        countdownInterval = setInterval(() => {
            if(c <= 1) {
                clearInterval(countdownInterval);
                countdownInterval = null;
                isBetLocked = true;
                startAutoDraw();
            } else {
                c--;
                cdSpan.innerText = c;
                if(c <= 5) cdSpan.classList.add('countdown-warning');
                else cdSpan.classList.remove('countdown-warning');
            }
        }, 1000);
    }
    function refreshBalance() { currentBalance = getUserBalance(); updateUI(); showToast("余额已刷新"); }
    function updateGrabBtn() {
        let btn = document.getElementById('diceGrabBtn');
        let bal = getUserBalance();
        if(hasGrabbed) { btn.disabled=true; btn.textContent='🏆 已抢庄'; }
        else if(bal>=2001) { btn.disabled=false; btn.textContent='🎲 抢庄 (需2001文)'; }
        else { btn.disabled=true; btn.textContent='🎲 抢庄 (余额不足)'; }
    }
    document.getElementById('diceGrabBtn').onclick = () => {
        if(hasGrabbed) return;
        if(getUserBalance() >= 2001) {
            setUserBalance(getUserBalance() - 2001);
            playerBankerBalance = 2001;
            hasGrabbed = true;
            localStorage.setItem('dice_player_banker', playerBankerBalance);
            currentBalance = getUserBalance();
            updateUI();
            updateGrabBtn();
            showToast("抢庄成功，不可下注");
            document.querySelectorAll('.dice-wrapper .chip').forEach(c => c.style.pointerEvents = 'none');
        } else showToast("余额不足2001");
    };
    let savedBanker = localStorage.getItem('dice_player_banker');
    if(savedBanker && parseInt(savedBanker)>0) {
        hasGrabbed = true;
        playerBankerBalance = parseInt(savedBanker);
        updateGrabBtn();
        document.querySelectorAll('.dice-wrapper .chip').forEach(c => c.style.pointerEvents = 'none');
    }
    document.querySelectorAll('.dice-wrapper .chip').forEach(chip => {
        chip.onclick = function() {
            if(hasGrabbed) { showToast("庄家不能下注"); return; }
            selectedChip = parseInt(this.dataset.val);
            document.getElementById('selectedChip').innerText = selectedChip;
            document.querySelectorAll('.dice-wrapper .chip').forEach(c => c.classList.remove('selected'));
            this.classList.add('selected');
        };
    });
    document.querySelectorAll('.special-card').forEach(c => c.onclick = () => { if(!hasGrabbed) addBet(c.dataset.type); });
    document.querySelectorAll('.point-card').forEach(c => c.onclick = () => { if(!hasGrabbed) addBet(parseInt(c.dataset.point)); });
    document.querySelectorAll('.trio-card').forEach(c => c.onclick = () => { if(!hasGrabbed) addBet(c.dataset.type); });
    document.getElementById('clearAllBtn').onclick = clearAllBets;
    document.getElementById('repeatBtn').onclick = repeatLastBet;
    document.getElementById('refreshBtn').onclick = refreshBalance;
    document.getElementById('showDiceHistoryBtn').onclick = () => {
        if(gameRecords.length===0) { showToast("暂无记录"); return; }
        let html = '<div style="max-height:400px; overflow-y:auto;">' + gameRecords.map(r => `
            <div style="background:#2a241e; margin:8px; padding:8px; border-left:3px solid #ffaa44;">
                <div>${r.time}</div><div>🎲 ${r.dice}</div>
                <div style="color:${r.win>0?'#4caf50':'#f44336'}">${r.result}</div>
            </div>
        `).join('') + '</div><button id="closeRec" style="margin-top:12px; padding:8px; background:#ffaa44; border-radius:40px;">关闭</button>';
        let m = document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`;
        document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove();
    };
    diceEl.forEach(d => setDiceValue(d, 1));
    totalEl.innerText = 3;
    updateUI();
    startCountdown(25);
    diceDestroy = () => { if(countdownInterval) clearInterval(countdownInterval); if(rollingAnimation) cancelAnimationFrame(rollingAnimation); container.innerHTML=''; };
    return diceDestroy;
}

// ==================== 管理员后台（点击筹码1k三次触发） ====================
let adminClickCount = 0, adminClickTimer = null;
// 管理员密码（默认admin123，可修改）
let adminPassword = localStorage.getItem('admin_pwd') || 'admin123';
function openFishAdminModal() {
    const pwdModal = document.createElement('div');
    pwdModal.className = 'modal';
    pwdModal.innerHTML = `<div class="modal-content"><h2>🔐 管理员验证</h2><input type="password" id="adminPwdInput" class="auth-input" placeholder="请输入管理密码" autocomplete="off"><div style="display:flex; gap:12px; margin-top:16px;"><button id="submitPwdBtn" style="background:#c47c3a; padding:8px; border-radius:40px;">确认</button><button id="cancelPwdBtn" style="background:#734c2e; padding:8px; border-radius:40px;">取消</button></div></div>`;
    document.body.appendChild(pwdModal);
    const input = pwdModal.querySelector('#adminPwdInput');
    const submit = () => {
        if(input.value === adminPassword) {
            pwdModal.remove();
            showAdminPanel();
        } else { showToast("密码错误"); input.value = ''; input.focus(); }
    };
    pwdModal.querySelector('#submitPwdBtn').onclick = submit;
    pwdModal.querySelector('#cancelPwdBtn').onclick = () => pwdModal.remove();
    input.onkeypress = (e) => { if(e.key === 'Enter') submit(); };
    input.focus();
}
function showAdminPanel() {
    const allUsers = Object.keys(usersData).map(phone => ({ phone, balance: usersData[phone].balance }));
    let userListHtml = '<div style="max-height:200px; overflow-y:auto; margin-bottom:12px;">';
    userListHtml += `<div style="background:#3a2a1a; padding:8px; margin-bottom:8px; border-radius:12px;">
                        <div>👤 当前用户: ${currentUser.phone}</div>
                        <div>💰 ${currentUser.balance.toFixed(2)}</div>
                     </div>`;
    userListHtml += `<div style="margin-bottom:8px;">
                        <label>选择玩家：</label>
                        <select id="adminTargetUser" style="background:#1a1a1a; color:#ffdd99; border:1px solid #ffaa44; border-radius:20px; padding:4px; width:100%;">
                            ${allUsers.map(u => `<option value="${u.phone}" ${u.phone === currentUser.phone ? 'selected' : ''}>${u.phone} (${u.balance.toFixed(2)})</option>`).join('')}
                        </select>
                     </div>`;
    userListHtml += '</div>';
    userListHtml += `<input type="number" id="adminAmount" class="auth-input" placeholder="输入金额" value="0" step="1">`;
    userListHtml += `<div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                        <button id="adminAdd" style="background:#2e7d32; padding:6px 12px; border-radius:30px;">➕ 上分</button>
                        <button id="adminSub" style="background:#c0392b; padding:6px 12px; border-radius:30px;">➖ 下分</button>
                        <button id="adminQuery" style="background:#2980b9; padding:6px 12px; border-radius:30px;">🔍 查询</button>
                        <button id="adminReset" style="background:#f39c12; padding:6px 12px; border-radius:30px;">🔄 重置1000</button>
                        <button id="adminChangePwd" style="background:#9b59b6; padding:6px 12px; border-radius:30px;">🔑 改密</button>
                     </div>`;
    userListHtml += `<button id="adminClose" style="background:#734c2e; padding:8px; border-radius:40px; width:100%;">关闭后台</button>`;
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<div class="modal-content"><h2>🎛️ 管理员后台</h2>${userListHtml}</div>`;
    document.body.appendChild(modal);
    
    const getUserSelect = () => modal.querySelector('#adminTargetUser').value;
    const getAmount = () => parseInt(modal.querySelector('#adminAmount').value) || 0;
    
    modal.querySelector('#adminAdd').onclick = () => {
        let target = getUserSelect();
        let amt = getAmount();
        if(amt <= 0) { showToast("请输入大于0的金额"); return; }
        usersData[target].balance += amt;
        saveUsers();
        showToast(`给 ${target} 上分 +${amt}，新余额 ${usersData[target].balance.toFixed(2)}`);
        if(target === currentUser.phone) {
            currentUser.balance = usersData[target].balance;
            document.getElementById("userBalanceDisplay").innerText = currentUser.balance.toFixed(2);
        }
        modal.remove();
        showAdminPanel();
    };
    modal.querySelector('#adminSub').onclick = () => {
        let target = getUserSelect();
        let amt = getAmount();
        if(amt <= 0) { showToast("请输入大于0的金额"); return; }
        let cur = usersData[target].balance;
        if(cur < amt) { showToast(`${target} 余额不足，无法下分`); return; }
        usersData[target].balance = cur - amt;
        saveUsers();
        showToast(`从 ${target} 下分 -${amt}，新余额 ${usersData[target].balance.toFixed(2)}`);
        if(target === currentUser.phone) {
            currentUser.balance = usersData[target].balance;
            document.getElementById("userBalanceDisplay").innerText = currentUser.balance.toFixed(2);
        }
        modal.remove();
        showAdminPanel();
    };
    modal.querySelector('#adminQuery').onclick = () => {
        let target = getUserSelect();
        showToast(`${target} 余额: ${usersData[target].balance.toFixed(2)}`);
    };
    modal.querySelector('#adminReset').onclick = () => {
        let target = getUserSelect();
        if(confirm(`重置 ${target} 余额为 1000 文？`)) {
            usersData[target].balance = 1000;
            saveUsers();
            showToast(`${target} 余额已重置为 1000`);
            if(target === currentUser.phone) {
                currentUser.balance = 1000;
                document.getElementById("userBalanceDisplay").innerText = "1000.00";
            }
            modal.remove();
            showAdminPanel();
        }
    };
    modal.querySelector('#adminChangePwd').onclick = () => {
        let oldPwd = prompt("请输入当前管理密码:");
        if(oldPwd !== adminPassword) { showToast("当前密码错误"); return; }
        let newPwd = prompt("请输入新密码（至少4位）:");
        if(newPwd && newPwd.length >= 4) {
            adminPassword = newPwd;
            localStorage.setItem('admin_pwd', newPwd);
            showToast("管理密码修改成功");
        } else if(newPwd) showToast("密码至少4位");
    };
    modal.querySelector('#adminClose').onclick = () => modal.remove();
}

// 监听管理员触发筹码（1k筹码点击三次）
document.addEventListener('click', (e) => {
    if(e.target && e.target.id === 'adminTriggerChip') {
        adminClickCount++;
        if(adminClickTimer) clearTimeout(adminClickTimer);
        adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 1000);
        if(adminClickCount >= 3) {
            adminClickCount = 0;
            clearTimeout(adminClickTimer);
            openFishAdminModal();
        }
    }
});
// ==================== 主界面渲染 ====================
    function renderAuthUI() {
        const savedPhone = localStorage.getItem('saved_phone') || '';
        const savedPwd = localStorage.getItem('saved_password') || '';
        const rememberChecked = localStorage.getItem('remember_me') === 'true';
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="auth-panel">
                <h2>🎲 双游戏大厅</h2>
                <input type="tel" id="regPhone" class="auth-input" placeholder="手机号" maxlength="11" value="${savedPhone}">
                <input type="password" id="regPassword" class="auth-input" placeholder="密码 (至少4位)" value="${savedPwd}">
                <div style="display:flex; align-items:center; gap:8px; margin:8px 0;">
                    <input type="checkbox" id="rememberCheckbox" ${rememberChecked ? 'checked' : ''}>
                    <label style="color:#ffdd99;">记住账号密码</label>
                </div>
                <div class="auth-buttons">
                    <button id="loginBtn" class="auth-btn">登录</button>
                    <button id="registerBtn" class="auth-btn">注册</button>
                </div>
                <div class="auth-note">🎮 测试手机号注册 | 初始1000文</div>
            </div>
        `;
        document.getElementById('loginBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let remember = document.getElementById('rememberCheckbox').checked;
            if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            let user = usersData[phone];
            if(!user) { showToast("手机号未注册"); return; }
            if(user.password !== pwd) { showToast("密码错误"); return; }
            if(remember) {
                localStorage.setItem('saved_phone', phone);
                localStorage.setItem('saved_password', pwd);
                localStorage.setItem('remember_me', 'true');
            } else {
                localStorage.removeItem('saved_phone');
                localStorage.removeItem('saved_password');
                localStorage.setItem('remember_me', 'false');
            }
            currentUser = { phone, ...user };
            showToast(`欢迎，${phone}`);
            renderGameLobby();
        };
        document.getElementById('registerBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            if(!/^1[3-9]\d{9}$/.test(phone)) { showToast("请输入有效11位手机号"); return; }
            if(pwd.length < 4) { showToast("密码至少4位"); return; }
            if(usersData[phone]) { showToast("手机号已注册"); return; }
            usersData[phone] = { password: pwd, balance: 1000 };
            saveUsers();
            showToast("注册成功！请登录");
        };
    }

    function renderGameLobby() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="user-section">
                <div class="user-info-row">
                    <span>📱 ${currentUser.phone.substring(0,7)}... | 💰 余额: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span>
                    <div class="btn-group">
                        <button id="serviceBtn" class="service-btn">📞 客服</button>
                        <button id="logoutBtn" class="logout-btn">退出</button>
                    </div>
                </div>
                <div class="charge-withdraw-row">
                    <button id="rechargeBtn" class="charge-btn">💎 充值</button>
                    <button id="withdrawBtn" class="withdraw-btn">💰 提现</button>
                </div>
            </div>
            <div class="game-nav">
                <button class="game-tab active" data-game="fish">🎲 葫芦鱼</button>
                <button class="game-tab" data-game="dice">🎲 至尊骰宝</button>
                <button class="game-tab" data-game="game3">🎮 游戏3</button>
                <button class="game-tab" data-game="game4">♠️ 游戏4</button>
            </div>
            <div class="game-container">
                <div id="gamePanel"></div>
            </div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;
        
        const gameContainer = document.getElementById('gamePanel');
        let currentDestroy = null;
        const gameInits = { fish: initFishGame, dice: initDiceGame, game3: initGame3, game4: initGame4 };
        
        async function switchGame(gameId) {
            if(currentDestroy) { currentDestroy(); currentDestroy = null; }
            gameContainer.innerHTML = '';
            const initFn = gameInits[gameId];
            if(initFn) {
                const destroy = await initFn(gameContainer);
                if(typeof destroy === 'function') currentDestroy = destroy;
            }
            document.getElementById('userBalanceDisplay').innerText = getUserBalance().toFixed(2);
        }
        
        document.querySelectorAll('.game-tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchGame(btn.dataset.game);
            };
        });
        switchGame('fish');
        
        // 模拟在线人数（仅葫芦鱼页面显示，不影响功能）
        let onlineCount = 128;
        const updateOnline = () => {
            let onlineSpan = document.getElementById('onlineCount');
            if(onlineSpan) {
                let change = Math.floor(Math.random() * 11) - 5;
                let newCount = onlineCount + change;
                if(newCount < 50) newCount = 50;
                if(newCount > 200) newCount = 200;
                onlineCount = newCount;
                onlineSpan.innerText = onlineCount;
            }
        };
        let onlineInterval = setInterval(updateOnline, 30000);
        // 保存原destroy以便清理
        const originalDestroy = currentDestroy;
        currentDestroy = () => {
            clearInterval(onlineInterval);
            if(originalDestroy) originalDestroy();
        };
    }
    
    // 启动应用
    renderAuthUI();
</script>
