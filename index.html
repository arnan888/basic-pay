<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>双游戏大厅 | 葫芦鱼+骰宝 | 稳定自动开奖版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a120c; font-family: 'Segoe UI', sans-serif; padding: 12px; }
        .app { max-width: 550px; margin: 0 auto; }
        .game-nav { background: #2a241e; border-radius: 60px; padding: 6px; display: flex; gap: 8px; border: 1px solid #ffaa44; margin-bottom: 12px; }
        .game-tab { flex: 1; background: transparent; border: none; padding: 8px; border-radius: 50px; font-weight: bold; color: #ccaa77; cursor: pointer; }
        .game-tab.active { background: #c47c3a; color: #2f1b0a; }
        .user-section { background: #1f1711; border-radius: 40px; padding: 8px 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; color: #ffdd99; }
        .charge-withdraw-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .charge-btn, .withdraw-btn { flex: 1; background: #c47c3a; border: none; padding: 5px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .game-container { background: #251e16; border-radius: 48px; overflow: hidden; min-height: 550px; }
        .auth-panel { background: #362a1f; border-radius: 48px; padding: 30px 20px; text-align: center; border: 2px solid #ffaa44; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; background: #2a241e; border: 1px solid #ffaa44; border-radius: 40px; color: white; text-align: center; }
        .auth-buttons { display: flex; gap: 12px; margin: 20px 0; }
        .auth-btn { flex: 1; background: #c47c3a; border: none; padding: 10px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .fish-wrapper .chip, .dice-wrapper .chip { background: #ebbc7e; color: #3a240f; padding: 3px 10px; border-radius: 35px; cursor: pointer; display: inline-block; margin: 2px; }
        .fish-wrapper .bet-card, .dice-wrapper .bet-card { background: #1f1712; border-radius: 28px; padding: 6px 2px; text-align: center; border: 1px solid #6f4f34; cursor: pointer; margin: 4px; }
        .fish-wrapper .bet-icon { font-size: 1.4rem; }
        .action-bar { display: flex; justify-content: center; gap: 8px; margin: 12px; }
        .action-bar button, .dice-wrapper .action-buttons button { background: #c47c3a; border: none; padding: 5px 14px; border-radius: 35px; font-weight: bold; cursor: pointer; }
        .dice-area { background: #2a211a; border-radius: 50px; padding: 12px; text-align: center; margin-bottom: 12px; position: relative; }
        .dice { background: #fff2df; width: 70px; height: 70px; border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; font-size: 2.8rem; margin: 0 6px; box-shadow: 0 5px 0 #926b42; }
        .dice-wrapper .dice { width: 60px; height: 60px; position: relative; transform-style: preserve-3d; }
        .dice-wrapper .dice-face { position: absolute; width: 60px; height: 60px; background: #fffff0; border-radius: 12px; }
        .dice-wrapper .front { transform: translateZ(30px); }
        .dice-wrapper .back { transform: rotateY(180deg) translateZ(30px); }
        .dice-wrapper .right { transform: rotateY(90deg) translateZ(30px); }
        .dice-wrapper .left { transform: rotateY(-90deg) translateZ(30px); }
        .dice-wrapper .top { transform: rotateX(90deg) translateZ(30px); }
        .dice-wrapper .bottom { transform: rotateX(-90deg) translateZ(30px); }
        .dice-wrapper .pip { position: absolute; width: 9px; height: 9px; border-radius: 50%; background: #e74c3c; }
        .rolling1 { animation: roll1 0.9s; }
        .rolling2 { animation: roll2 0.9s; }
        .rolling3 { animation: roll3 0.9s; }
        @keyframes roll1 { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(720deg) rotateY(360deg); } }
        @keyframes roll2 { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(360deg) rotateY(720deg); } }
        @keyframes roll3 { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(480deg) rotateY(960deg); } }
        .land { animation: land 0.15s; }
        @keyframes land { 0% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .info-bar { background: rgba(0,0,0,0.5); border-radius: 30px; padding: 8px; display: flex; justify-content: space-between; margin: 12px 0; }
        .history { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 8px; max-height: 90px; overflow-y: auto; margin-top: 8px; font-size: 10px; }
        .history-item { display: flex; justify-content: space-between; padding: 4px; border-bottom: 1px solid #333; color: #ccc; }
        .win { color: #4caf50; }
        .lose { color: #f44336; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: #1a2a1a; border-radius: 48px; padding: 24px; border: 2px solid #ffaa44; max-width: 450px; width: 90%; color: #ffdd99; text-align: center; }
        .qr-img { width: 180px; height: 180px; margin: 10px auto; display: block; background: white; border-radius: 20px; padding: 10px; }
        .result-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.6); background: #ffcc44; color: #1a1a2a; padding: 24px 40px; border-radius: 80px; font-size: 2rem; font-weight: 900; z-index: 2000; opacity: 0; transition: 0.25s; pointer-events: none; }
        .result-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #000; color: #ffaa44; padding: 8px 16px; border-radius: 40px; z-index: 2001; animation: fadeInOut 2s forwards; }
        @keyframes fadeInOut { 0% { opacity:0; } 15% { opacity:1; } 85% { opacity:1; } 100% { opacity:0; } }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
    // ==================== 全局用户系统 ====================
    const USERS_KEY = 'double_games_final';
    let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
    let currentUser = null;

    function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0; }
    function setUserBalance(amt) { if(currentUser) { usersData[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    function showService() { showToast("📞 客服热线: 400-888-XXXX"); }

    // ==================== 充值二维码 ====================
    const ALIPAY_QR = "alipay.jpg";
    const WECHAT_QR = "wechat.jpg";

    function showRechargeModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>💎 充值</h3>
                <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                    <div><div style="background:#1677FF; color:white; padding:5px 10px; border-radius:30px;">支付宝</div><img src="${ALIPAY_QR}" class="qr-img"></div>
                    <div><div style="background:#2DC100; color:white; padding:5px 10px; border-radius:30px;">微信支付</div><img src="${WECHAT_QR}" class="qr-img"></div>
                </div>
                <p>💰 充值比例 1元 = 1000 文</p>
                <button id="closeRechargeModal" style="background:#ffaa44; border:none; padding:8px 16px; border-radius:40px; margin-top:12px;">关闭</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('#closeRechargeModal').onclick = () => modal.remove();
    }
    function recharge() { showRechargeModal(); }
    function withdraw() { showToast("💰 提现请联系客服处理"); }

    // ==================== 游戏一：潮汕葫芦鱼（自动开奖+50条记录） ====================
    let fishDestroy = null;
    function initFishGame(container) {
        if (fishDestroy) fishDestroy();
        container.innerHTML = `
            <div class="fish-wrapper">
                <div class="stats-panel" style="display:flex; justify-content:space-between; gap:6px; padding:8px; background:#1f1711;">
                    <div style="background:#1a130d; border-radius:30px; padding:4px; flex:1; text-align:center;"><div>💰 庄家余额</div><div id="fishBalanceValue">∞</div></div>
                    <div style="background:#1a130d; border-radius:30px; padding:4px; flex:1; text-align:center;"><div>🎲 总押注</div><div id="totalBetValue">0</div></div>
                    <div style="background:#1a130d; border-radius:30px; padding:4px; flex:1; text-align:center;"><div>🏆 上局净利</div><div id="lastWinValue">0</div></div>
                </div>
                <div class="dice-area">
                    <div class="dice">🎲</div><div class="dice">🎲</div><div class="dice">🎲</div>
                    <div id="fishDiceCover" style="position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at 30% 30%, rgba(0,0,0,0.9), #2c1e14); backdrop-filter:blur(6px); border-radius:50px; display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:15; transition:all 0.5s; border:2px solid #cb9e6b;">
                        <span style="font-size:3rem;">🏺</span><div class="cover-text">骰盅未开</div>
                    </div>
                </div>
                <div class="chip-bar" style="display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin:8px;">
                    <div class="chip" data-chip="20">20</div><div class="chip" data-chip="50">50</div><div class="chip" data-chip="100" class="selected">100</div>
                    <div class="chip" data-chip="500">500</div><div class="chip" data-chip="1000">1k</div>
                </div>
                <div class="action-bar">
                    <button id="fishRollBtn">🎲 开骰！</button>
                    <button id="fishResetBetBtn">🧹 清空下注</button>
                    <button id="fishResetGameBtn">💺 重置庄家</button>
                </div>
                <div class="bet-sections">
                    <div class="section-title">🐟 六门押注 (按次数赔)</div>
                    <div class="bet-grid" id="patternGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px;"></div>
                    <div class="section-title">🎯 特殊投注</div>
                    <div class="special-grid" id="specialGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px;"></div>
                </div>
                <div class="info-bar"><div>⏱️ 下注倒计时</div><div id="countdownFish">25</div><div>🎲 当前筹码</div><div id="selectedChipFish">100</div></div>
                <div class="history" id="historyFish"></div>
                <div style="margin-top:8px;"><button id="showFishRecordBtn" style="background:#2a1f16; border:1px solid #ffaa44; border-radius:40px; padding:8px; width:100%; color:#ffdd99;">📜 开奖记录查询</button></div>
            </div>
        `;

        // 游戏变量
        let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
        let specialBets = { big:0, small:0, odd:0, even:0, allTriplets:0, doubleBet:0 };
        let currentChip = 100;
        let lastWinAmount = 0;
        let isRolling = false;
        let countdownInterval = null;
        let gameRecords = JSON.parse(localStorage.getItem('fish_records')) || [];

        const patternList = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        const patternIdMap = { fish:"鱼", shrimp:"虾", crab:"蟹", calabash:"葫芦", coin:"金钱", chicken:"鸡" };
        const iconMap = { "鱼":"🐟","虾":"🦐","蟹":"🦀","葫芦":"🏺","金钱":"💰","鸡":"🐔" };

        function getTotalBet() { return Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(specialBets).reduce((a,b)=>a+b,0); }
        function updateUI() {
            document.getElementById('totalBetValue').innerText = getTotalBet();
            document.getElementById('lastWinValue').innerText = lastWinAmount;
            for(let id of Object.keys(patternBets)) { let span = document.getElementById(`bet_${id}`); if(span) span.innerText = patternBets[id]; }
            for(let id of Object.keys(specialBets)) { let span = document.getElementById(`bet_special_${id}`); if(span) span.innerText = specialBets[id]; }
        }
        function showMsg(msg) { 
            let msgDiv = document.createElement('div'); msgDiv.className='toast-message'; msgDiv.textContent=msg; document.body.appendChild(msgDiv); setTimeout(()=>msgDiv.remove(),2000);
        }
        function addBet(type, id, val) {
            let target = type==='pattern'?patternBets:specialBets;
            if(target[id]===undefined) return;
            let totalNow = getTotalBet();
            let userBal = getUserBalance();
            if(totalNow+val > userBal) { showMsg(`余额不足`); return; }
            target[id] += val;
            updateUI();
        }
        function subBet(type, id, val) {
            let target = type==='pattern'?patternBets:specialBets;
            if(target[id]===undefined) return;
            let old = target[id];
            let newVal = Math.max(0, old-val);
            if(old !== newVal) target[id]=newVal;
            updateUI();
        }
        function clearAllBets() {
            for(let k in patternBets) patternBets[k]=0;
            for(let k in specialBets) specialBets[k]=0;
            updateUI();
        }
        function resetGame() {
            clearAllBets(); lastWinAmount=0; updateUI();
            document.querySelectorAll(".dice").forEach(d=>d.innerHTML="🎲");
            let cover = document.getElementById('fishDiceCover');
            if(cover) { cover.style.display="flex"; cover.style.transform="translateY(0) scale(1)"; cover.style.opacity="1"; cover.style.visibility="visible"; }
            showMsg("游戏已重置");
        }
        async function animateRolling(finalNames) {
            let diceEls = document.querySelectorAll(".dice");
            for(let step=0;step<8;step++) {
                await new Promise(r=>setTimeout(r,70));
                for(let i=0;i<3;i++) diceEls[i].innerHTML = iconMap[patternList[Math.floor(Math.random()*6)]];
            }
            for(let i=0;i<3;i++) diceEls[i].innerHTML = iconMap[finalNames[i]];
        }
        function getPointValue(pname) { const m={"鱼":1,"虾":2,"蟹":3,"葫芦":4,"金钱":5,"鸡":6}; return m[pname]||0; }
        async function settleGame(diceNames) {
            let points=diceNames.map(n=>getPointValue(n)), sum=points.reduce((a,b)=>a+b,0);
            let isTriplet=diceNames[0]===diceNames[1]&&diceNames[1]===diceNames[2];
            let totalBet=getTotalBet();
            if(totalBet===0) return false;
            let userBal=getUserBalance();
            if(totalBet>userBal) return false;
            setUserBalance(userBal-totalBet);
            let winAmount=0, winDetails=[];
            for(let [pid,betVal] of Object.entries(patternBets)){
                if(betVal===0) continue;
                let occur=diceNames.filter(n=>n===patternIdMap[pid]).length;
                if(occur>0){ let prize=betVal*(occur+1); winAmount+=prize; winDetails.push(`${patternIdMap[pid]} x${occur}`); }
            }
            let bigWin=false,smallWin=false,oddWin=false,evenWin=false,allTripletWin=false,doubleWin=false;
            if(!isTriplet){
                if(sum>=11&&sum<=17) bigWin=true;
                if(sum>=4&&sum<=10) smallWin=true;
                if(sum%2===1) oddWin=true;
                if(sum%2===0) evenWin=true;
            }
            if(isTriplet) allTripletWin=true;
            if(diceNames.includes("鱼")&&diceNames.includes("虾")) doubleWin=true;
            if(specialBets.big>0&&bigWin) winAmount+=specialBets.big*2;
            if(specialBets.small>0&&smallWin) winAmount+=specialBets.small*2;
            if(specialBets.odd>0&&oddWin) winAmount+=specialBets.odd*2;
            if(specialBets.even>0&&evenWin) winAmount+=specialBets.even*2;
            if(specialBets.allTriplets>0&&allTripletWin) winAmount+=specialBets.allTriplets*25;
            if(specialBets.doubleBet>0&&doubleWin) winAmount+=specialBets.doubleBet*5;
            let net=winAmount-totalBet;
            let newBalance=getUserBalance()+winAmount;
            setUserBalance(newBalance);
            lastWinAmount=net;
            updateUI();
            let diceShow=diceNames.join("、");
            if(winAmount>0) showMsg(`🎲 ${diceShow} 净赢+${net}`);
            else showMsg(`😢 ${diceShow} 亏损 ${totalBet}`);
            // 记录
            gameRecords.unshift({ time:new Date().toLocaleTimeString(), dice:diceShow, result:winAmount>0?`赢 ${winAmount}`:`输 ${totalBet}`, winAmount:winAmount });
            if(gameRecords.length>50) gameRecords.pop();
            localStorage.setItem('fish_records', JSON.stringify(gameRecords));
            updateHistory();
            clearAllBets();
            document.getElementById("userBalanceDisplay").innerText=newBalance.toFixed(2);
            return true;
        }
        async function onRoll() {
            if(isRolling) return;
            let total=getTotalBet();
            if(total===0){ showMsg("请先下注"); return; }
            if(total>getUserBalance()){ showMsg("余额不足"); return; }
            let cover = document.getElementById('fishDiceCover');
            if(!cover) return;
            isRolling=true;
            cover.style.transform="translateY(-70px) scale(0.6)";
            cover.style.opacity="0";
            await new Promise(r=>setTimeout(r,550));
            cover.style.display="none";
            let finalResult=[patternList[Math.floor(Math.random()*6)],patternList[Math.floor(Math.random()*6)],patternList[Math.floor(Math.random()*6)]];
            await animateRolling(finalResult);
            await settleGame(finalResult);
            await new Promise(r=>setTimeout(r,1500));
            document.querySelectorAll(".dice").forEach(d=>d.innerHTML="🎲");
            cover.style.display="flex";
            cover.style.transform="translateY(0) scale(1)";
            cover.style.opacity="1";
            cover.style.visibility="visible";
            isRolling=false;
            startCountdown(25);
        }
        function startCountdown(sec) {
            if(countdownInterval) clearInterval(countdownInterval);
            let c=sec;
            let cdSpan=document.getElementById('countdownFish');
            cdSpan.innerText=c;
            countdownInterval=setInterval(()=>{
                if(c<=1){
                    clearInterval(countdownInterval);
                    if(!isRolling) onRoll();
                }else{
                    c--;
                    cdSpan.innerText=c;
                }
            },1000);
        }
        function updateHistory() {
            let histDiv = document.getElementById('historyFish');
            if(!histDiv) return;
            histDiv.innerHTML = '';
            if(gameRecords.length===0){ histDiv.innerHTML='<div style="text-align:center;">暂无记录</div>'; return; }
            gameRecords.slice(0,10).forEach(r=>{
                let div=document.createElement('div'); div.className='history-item';
                div.innerHTML=`<span>${r.time}</span><span>${r.dice}</span><span class="${r.winAmount>0?'win':'lose'}">${r.result}</span>`;
                histDiv.appendChild(div);
            });
        }
        function showRecordModal() {
            if(gameRecords.length===0){ showMsg("暂无开奖记录"); return; }
            let html='<div style="max-height:400px;overflow-y:auto;padding:8px;">';
            gameRecords.forEach(rec=>{
                html+=`<div style="background:#2a241e;margin-bottom:8px;padding:8px;border-radius:12px;border-left:3px solid #ffaa44;"><div style="display:flex;justify-content:space-between;font-size:0.7rem;">${rec.time}</div><div style="font-size:1rem;font-weight:bold;">🎲 ${rec.dice}</div><div style="color:${rec.winAmount>0?'#4caf50':'#f44336'}">${rec.result}</div></div>`;
            });
            html+=`</div><button id="closeRecordModal" style="background:#ffaa44;border:none;padding:8px;border-radius:30px;margin-top:12px;">关闭</button>`;
            let modal=document.createElement('div');modal.className='modal';modal.innerHTML=`<div class="modal-content"><h3>📜 开奖记录</h3>${html}</div>`;
            document.body.appendChild(modal);
            modal.querySelector('#closeRecordModal').onclick=()=>modal.remove();
        }

        // 构建下注网格
        const patternContainer=document.getElementById('patternGrid');
        if(patternContainer){
            const PATTERNS=[{id:"fish",name:"鱼",icon:"🐟"},{id:"shrimp",name:"虾",icon:"🦐"},{id:"crab",name:"蟹",icon:"🦀"},{id:"calabash",name:"葫芦",icon:"🏺"},{id:"coin",name:"金钱",icon:"💰"},{id:"chicken",name:"鸡",icon:"🐔"}];
            patternContainer.innerHTML="";
            PATTERNS.forEach(p=>{
                let card=document.createElement("div");card.className="bet-card";
                card.innerHTML=`<div class="bet-icon">${p.icon}</div><div class="bet-name">${p.name}</div><div class="bet-odds">1~3倍</div><div class="bet-amount"><button class="btn-chip sub-pattern" data-id="${p.id}">-</button><span id="bet_${p.id}">0</span><button class="btn-chip add-pattern" data-id="${p.id}">+</button></div>`;
                patternContainer.appendChild(card);
            });
        }
        const specialContainer=document.getElementById('specialGrid');
        if(specialContainer){
            const SPECIALS=[{id:"big",name:"大",icon:"🔴"},{id:"small",name:"小",icon:"🔵"},{id:"odd",name:"单",icon:"⚪"},{id:"even",name:"双",icon:"⚫"},{id:"allTriplets",name:"全围",icon:"🌀"},{id:"doubleBet",name:"双押(鱼+虾)",icon:"🐟🦐"}];
            specialContainer.innerHTML="";
            SPECIALS.forEach(s=>{
                let card=document.createElement("div");card.className="bet-card";
                card.innerHTML=`<div class="bet-icon">${s.icon}</div><div class="bet-name">${s.name}</div><div class="bet-odds">${s.id==="allTriplets"?"25倍":s.id==="doubleBet"?"5倍":"2倍"}</div><div class="bet-amount"><button class="btn-chip sub-special" data-id="${s.id}">-</button><span id="bet_special_${s.id}">0</span><button class="btn-chip add-special" data-id="${s.id}">+</button></div>`;
                specialContainer.appendChild(card);
            });
        }
        document.querySelector('.bet-grid')?.addEventListener('click',(e)=>{
            let btn=e.target.closest(".btn-chip"); if(!btn) return;
            let id=btn.dataset.id;
            if(btn.classList.contains("add-pattern")) addBet('pattern',id,currentChip);
            if(btn.classList.contains("sub-pattern")) subBet('pattern',id,currentChip);
        });
        document.querySelector('.special-grid')?.addEventListener('click',(e)=>{
            let btn=e.target.closest(".btn-chip"); if(!btn) return;
            let id=btn.dataset.id;
            if(btn.classList.contains("add-special")) addBet('special',id,currentChip);
            if(btn.classList.contains("sub-special")) subBet('special',id,currentChip);
        });
        document.querySelectorAll(".chip").forEach(chip=>{
            chip.onclick=()=>{ let val=parseInt(chip.dataset.chip); if(!isNaN(val)) currentChip=val; document.getElementById('selectedChipFish').innerText=val; document.querySelectorAll(".chip").forEach(c=>c.classList.remove("selected")); chip.classList.add("selected"); };
        });
        document.getElementById('fishRollBtn').onclick=onRoll;
        document.getElementById('fishResetBetBtn').onclick=clearAllBets;
        document.getElementById('fishResetGameBtn').onclick=resetGame;

        let selectedChip=100;
        let currentBalance=getUserBalance();
        let isDrawing=false,isBetLocked=false,countdownInterval=null,rollingAnimation=null,lastBet=null;
        let gameRecords=JSON.parse(localStorage.getItem('dice_records'))||[];
        const diceEl=[document.getElementById('dice1'),document.getElementById('dice2'),document.getElementById('dice3')];
        const totalEl=document.getElementById('totalPoints');
        const rollingWinEl=document.getElementById('rollingWinNumber');
        const totalBetEl=document.getElementById('totalBetDice');
        const CONFIG={countdownSeconds:25,odds:{4:60,5:30,6:18,7:12,8:8,9:7,10:6,11:6,12:7,13:8,14:12,15:18,16:30,17:60,'BIG':2,'SMALL':2,'ODD':2,'EVEN':2,'TRIPLE_1':150,'TRIPLE_2':150,'TRIPLE_3':150,'TRIPLE_4':150,'TRIPLE_5':150,'TRIPLE_6':150,'ALL_TRIPLE':30}};

        function buildDiceFaces(){
            diceEl.forEach(dice=>{
                dice.innerHTML='';
                for(let i=0;i<6;i++){
                    let faceDivs=['front','back','right','left','top','bottom'];
                    let faceClass=faceDivs[i];
                    let valMap={front:1,back:6,right:4,left:3,top:2,bottom:5};
                    let num=valMap[faceClass];
                    let faceDiv=document.createElement('div');
                    faceDiv.className='dice-face '+faceClass+' face-'+num;
                    let pipHtml='';
                    if(num===1) pipHtml='<div class="pip pip-center"></div>';
                    else if(num===2) pipHtml='<div class="pip pip-tl"></div><div class="pip pip-br"></div>';
                    else if(num===3) pipHtml='<div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div>';
                    else if(num===4) pipHtml='<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                    else if(num===5) pipHtml='<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-mid"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                    else if(num===6) pipHtml='<div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div>';
                    faceDiv.innerHTML=pipHtml;
                    dice.appendChild(faceDiv);
                }
            });
        }
        buildDiceFaces();

        function setDiceValue(dice,val){
            const rot={1:'rotateX(0deg) rotateY(0deg)',2:'rotateX(-90deg) rotateY(0deg)',3:'rotateX(0deg) rotateY(90deg)',4:'rotateX(0deg) rotateY(-90deg)',5:'rotateX(90deg) rotateY(0deg)',6:'rotateX(180deg) rotateY(0deg)'};
            dice.style.transform=rot[val];
        }
        async function startRolling(finalVals){
            return new Promise(resolve=>{
                diceEl[0].classList.add('rolling1');diceEl[1].classList.add('rolling2');diceEl[2].classList.add('rolling3');
                let step=0,maxStep=18;
                let iv=setInterval(()=>{
                    step++;
                    diceEl.forEach(d=>setDiceValue(d,Math.floor(Math.random()*6)+1));
                    if(step>=maxStep){
                        clearInterval(iv);
                        diceEl.forEach(d=>d.classList.remove('rolling1','rolling2','rolling3'));
                        diceEl.forEach((d,i)=>{setDiceValue(d,finalVals[i]);d.classList.add('land');setTimeout(()=>d.classList.remove('land'),200);});
                        resolve();
                    }
                },50);
            });
        }
        function startRollingNumber(finalAmount){
            if(rollingAnimation) cancelAnimationFrame(rollingAnimation);
            let startTime=performance.now(),duration=5000,startVal=0.01;
            function update(now){
                let elapsed=now-startTime,progress=Math.min(1,elapsed/duration),ease=1-Math.pow(1-progress,2);
                let current=startVal+(finalAmount-startVal)*ease;
                rollingWinEl.innerText=current.toFixed(2);
                if(progress<1) rollingAnimation=requestAnimationFrame(update);
                else {rollingWinEl.innerText=finalAmount.toFixed(2);rollingAnimation=null;}
            }
            rollingAnimation=requestAnimationFrame(update);
        }
        function getResultInfo(d1,d2,d3){
            let total=d1+d2+d3,types=[];
            if(total>=11&&total<=17) types.push('BIG');
            if(total>=4&&total<=10) types.push('SMALL');
            if(total%2===1) types.push('ODD');
            if(total%2===0) types.push('EVEN');
            if(d1===d2&&d2===d3){types.push('TRIPLE_'+d1);types.push('ALL_TRIPLE');}
            return {total,types};
        }
        function updateUI(){
            for(let k of ['BIG','SMALL','ODD','EVEN']) document.getElementById(`bet_${k}`).innerText=bets[k];
            for(let i=4;i<=17;i++){let el=document.getElementById(`bet_${i}`);if(el) el.innerText=bets[i];}
            for(let i=1;i<=6;i++){let el=document.getElementById(`bet_TRIPLE_${i}`);if(el) el.innerText=bets[`TRIPLE_${i}`];}
            document.getElementById('bet_ALL_TRIPLE').innerText=bets['ALL_TRIPLE'];
            let totalBet=Object.values(bets).reduce((a,b)=>a+b,0);
            totalBetEl.innerText=totalBet;
        }
        function addBet(type){
            if(selectedChip<=0){showToast("请先选择筹码");return;}
            if(selectedChip>currentBalance){showToast("余额不足");return;}
            currentBalance-=selectedChip;
            setUserBalance(currentBalance);
            bets[type]+=selectedChip;
            updateUI();
            let selector='';
            if(typeof type==='string'){
                if(type.startsWith('TRIPLE_')) selector=`[data-type="${type}"]`;
                else selector=`[data-type="${type}"]`;
            } else selector=`[data-point="${type}"]`;
            let el=document.querySelector(selector);
            if(el){el.classList.add('selected');setTimeout(()=>el.classList.remove('selected'),800);}
        }
        function clearAllBets(){
            let total=Object.values(bets).reduce((a,b)=>a+b,0);
            currentBalance+=total;
            setUserBalance(currentBalance);
            for(let k in bets) bets[k]=0;
            updateUI();
            showToast("已取消所有下注");
        }
        function repeatLastBet(){
            if(!lastBet){showToast("没有可续押的记录");return;}
            let totalNeed=Object.values(lastBet).reduce((a,b)=>a+b,0);
            if(totalNeed>currentBalance){showToast("余额不足");return;}
            for(let k in bets) bets[k]=0;
            for(let k in lastBet) bets[k]=lastBet[k];
            currentBalance-=totalNeed;
            setUserBalance(currentBalance);
            updateUI();
            if(!isDrawing&&!isBetLocked) drawWithCover();
        }
        async function drawWithCover(){
            if(isDrawing) return;
            let totalBet=Object.values(bets).reduce((a,b)=>a+b,0);
            if(totalBet===0){showToast("请先下注");return;}
            if(totalBet>currentBalance){showToast("余额不足");return;}
            isDrawing=true;isBetLocked=true;
            let d1=Math.floor(Math.random()*6)+1;
            let d2=Math.floor(Math.random()*6)+1;
            let d3=Math.floor(Math.random()*6)+1;
            let {total,types}=getResultInfo(d1,d2,d3);
            let winAmounts=[];
            if(types.includes('BIG')&&bets['BIG']>0) winAmounts.push(bets['BIG']*2);
            if(types.includes('SMALL')&&bets['SMALL']>0) winAmounts.push(bets['SMALL']*2);
            if(types.includes('ODD')&&bets['ODD']>0) winAmounts.push(bets['ODD']*2);
            if(types.includes('EVEN')&&bets['EVEN']>0) winAmounts.push(bets['EVEN']*2);
            if(bets[total]>0) winAmounts.push(bets[total]*CONFIG.odds[total]);
            for(let t of types){
                if(t.startsWith('TRIPLE_')&&bets[t]>0) winAmounts.push(bets[t]*CONFIG.odds[t]);
                if(t==='ALL_TRIPLE'&&bets['ALL_TRIPLE']>0) winAmounts.push(bets['ALL_TRIPLE']*CONFIG.odds['ALL_TRIPLE']);
            }
            let totalWin=winAmounts.reduce((a,b)=>a+b,0);
            startRollingNumber(totalWin);
            await startRolling([d1,d2,d3]);
            totalEl.innerText=total;
            currentBalance+=totalWin;
            setUserBalance(currentBalance);
            // 记录
            gameRecords.unshift({ time:new Date().toLocaleTimeString(), dice:`${d1},${d2},${d3}`, result:totalWin>0?`赢 ${totalWin}`:`输 ${totalBet}`, winAmount:totalWin });
            if(gameRecords.length>50) gameRecords.pop();
            localStorage.setItem('dice_records',JSON.stringify(gameRecords));
            updateHistory();
            for(let k in bets) bets[k]=0;
            updateUI();
            lastBet=JSON.parse(JSON.stringify(bets));
            let winText=totalWin>0?`🎉 恭喜！赢 ${totalWin.toFixed(2)}`:`😭 输 ${totalBet.toFixed(2)}`;
            let pop=document.createElement('div');pop.className='result-popup '+(totalWin>0?'win':'lose');pop.textContent=winText;document.body.appendChild(pop);setTimeout(()=>pop.classList.add('show'),10);setTimeout(()=>{pop.classList.remove('show');setTimeout(()=>pop.remove(),300);},2000);
            setTimeout(()=>{isDrawing=false;isBetLocked=false;startCountdown(25);},5000);
        }
        function startCountdown(sec){
            if(countdownInterval) clearInterval(countdownInterval);
            let c=sec;
            let cdSpan=document.getElementById('countdownNum');
            cdSpan.innerText=c;
            countdownInterval=setInterval(()=>{
                if(c<=1){
                    clearInterval(countdownInterval);
                    if(!isDrawing&&!isBetLocked) drawWithCover();
                }else{
                    c--;
                    cdSpan.innerText=c;
                }
            },1000);
        }
        function updateHistory(){
            let histDiv=document.getElementById('historyDice');
            histDiv.innerHTML='';
            if(gameRecords.length===0){histDiv.innerHTML='<div style="text-align:center;">暂无记录</div>';return;}
            gameRecords.slice(0,10).forEach(r=>{
                let div=document.createElement('div');div.className='history-item';
                div.innerHTML=`<span>${r.time}</span><span>🎲 ${r.dice}</span><span class="${r.winAmount>0?'win':'lose'}">${r.result}</span>`;
                histDiv.appendChild(div);
            });
        }
        function showRecordModal(){
            if(gameRecords.length===0){showToast("暂无开奖记录");return;}
            let html='<div style="max-height:400px;overflow-y:auto;padding:8px;">';
            gameRecords.forEach(rec=>{
                html+=`<div style="background:#2a241e;margin-bottom:8px;padding:8px;border-radius:12px;border-left:3px solid #ffaa44;"><div>${rec.time}</div><div>🎲 ${rec.dice}</div><div style="color:${rec.winAmount>0?'#4caf50':'#f44336'}">${rec.result}</div></div>`;
            });
            html+=`</div><button id="closeRecordModal" style="background:#ffaa44;border:none;padding:8px;border-radius:30px;margin-top:12px;">关闭</button>`;
            let modal=document.createElement('div');modal.className='modal';modal.innerHTML=`<div class="modal-content"><h3>📜 开奖记录</h3>${html}</div>`;
            document.body.appendChild(modal);
            modal.querySelector('#closeRecordModal').onclick=()=>modal.remove();
        }
        function refreshBalance(){currentBalance=getUserBalance();updateUI();showToast("余额已刷新");}
        function init(){
            document.querySelectorAll('.chip').forEach(chip=>{
                chip.onclick=function(){selectedChip=parseInt(this.dataset.val);document.getElementById('selectedChipDice').innerText=selectedChip;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));this.classList.add('selected');};
            });
            document.querySelectorAll('.special-card').forEach(card=>card.onclick=()=>addBet(card.dataset.type));
            document.querySelectorAll('.point-card').forEach(card=>card.onclick=()=>addBet(parseInt(card.dataset.point)));
            document.querySelectorAll('.trio-card').forEach(card=>card.onclick=()=>addBet(card.dataset.type));
            document.getElementById('clearAllBtn').onclick=clearAllBets;
            document.getElementById('repeatBtn').onclick=repeatLastBet;
            document.getElementById('refreshBtn').onclick=refreshBalance;
            document.getElementById('betBtn').onclick=()=>{if(!isDrawing&&!isBetLocked)drawWithCover();};
            document.getElementById('showDiceRecordBtn').onclick=showRecordModal;
            diceEl.forEach(d=>setDiceValue(d,1));
            totalEl.innerText=3;
            updateUI();
            updateHistory();
            startCountdown(25);
        }
        init();
        diceDestroy=()=>{if(countdownInterval)clearInterval(countdownInterval);if(rollingAnimation)cancelAnimationFrame(rollingAnimation);container.innerHTML='';};
        return diceDestroy;
    }

    // ==================== 主界面 ====================
    function renderAuthUI() {
        const savedPhone = localStorage.getItem('saved_phone') || '';
        const savedPwd = localStorage.getItem('saved_password') || '';
        const rememberChecked = localStorage.getItem('remember_me') === 'true';
        const app = document.getElementById('app');
        app.innerHTML = `<div class="auth-panel"><h2>🎲 双游戏大厅</h2><input type="tel" id="regPhone" class="auth-input" placeholder="手机号" maxlength="11" value="${savedPhone}"><input type="password" id="regPassword" class="auth-input" placeholder="密码 (至少4位)" value="${savedPwd}"><div><input type="checkbox" id="rememberCheckbox" ${rememberChecked ? 'checked' : ''}> <label>记住账号密码</label></div><div class="auth-buttons"><button id="loginBtn" class="auth-btn">登录</button><button id="registerBtn" class="auth-btn">注册</button></div><div class="auth-note">🎮 测试手机号注册 | 初始1000</div></div>`;
        document.getElementById('loginBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let remember = document.getElementById('rememberCheckbox').checked;
            if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            let user = usersData[phone];
            if(!user) { showToast("手机号未注册"); return; }
            if(user.password !== pwd) { showToast("密码错误"); return; }
            if(remember) { localStorage.setItem('saved_phone', phone); localStorage.setItem('saved_password', pwd); localStorage.setItem('remember_me', 'true'); }
            else { localStorage.removeItem('saved_phone'); localStorage.removeItem('saved_password'); localStorage.setItem('remember_me', 'false'); }
            currentUser = { phone, ...user };
            showToast(`欢迎，${phone}`);
            renderGameLobby();
        };
        document.getElementById('registerBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            if(!/^1[3-9]\d{9}$/.test(phone)) { showToast("请输入有效11位手机号"); return; }
            if(pwd.length < 4) { showToast("密码至少4位"); return; }
            if(usersData[phone]) { showToast("手机号已注册"); return; }
            usersData[phone] = { password: pwd, balance: 1000 };
            saveUsers();
            showToast("注册成功！请登录");
        };
    }

    function renderGameLobby() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="user-section">
                <span>📱 ${currentUser.phone.substring(0,7)}... | 💰 余额: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span>
                <div><button id="serviceBtn">📞 客服</button><button id="logoutBtn">退出</button></div>
            </div>
            <div class="charge-withdraw-row"><button id="rechargeBtn">💎 充值</button><button id="withdrawBtn">💰 提现</button></div>
            <div class="game-nav"><button class="game-tab active" data-game="fish">🎲 葫芦鱼</button><button class="game-tab" data-game="dice">🎲 至尊骰宝</button></div>
            <div class="game-container"><div id="gamePanel"></div></div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showService;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;

        const gameContainer = document.getElementById('gamePanel');
        let currentDestroy = null;
        const gameInits = { fish: initFishGame, dice: initDiceGame };

        async function switchGame(gameId) {
            if (currentDestroy) { currentDestroy(); currentDestroy = null; }
            gameContainer.innerHTML = '';
            const initFn = gameInits[gameId];
            if (initFn) {
                const destroy = await initFn(gameContainer);
                if (typeof destroy === 'function') currentDestroy = destroy;
            }
            document.getElementById('userBalanceDisplay').innerText = getUserBalance().toFixed(2);
        }

        document.querySelectorAll('.game-tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchGame(btn.dataset.game);
            };
        });
        switchGame('fish');
    }

    renderAuthUI();
</script>
</body>
</html>
