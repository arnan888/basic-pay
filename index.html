<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>йҮ‘иҫүеЁұд№җеҹҺ В· иҮіе°ҠзүҲ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%); font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif; padding: 12px; min-height: 100vh; color: #ffecb3; }
        #app { max-width: 560px; margin: 0 auto; background: rgba(18,25,45,0.8); backdrop-filter: blur(12px); border-radius: 48px; border: 1px solid rgba(255,215,0,0.3); overflow: hidden; }
        .auth-panel { padding: 28px 20px; background: rgba(20,12,6,0.8); }

        .auth-input { width: 100%; padding: 12px 16px; margin: 6px 0; background: rgba(0,0,0,0.6); border: 1px solid #ffaa33; border-radius: 40px; color: #ffd966; font-size: 0.95rem; outline: none; }
        .flex-row { display: flex; gap: 10px; align-items: center; margin: 10px 0; }
        .code-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; border-radius: 40px; padding: 10px 18px; color: #2a1a0a; font-weight: 700; cursor: pointer; }
        .auth-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; border-radius: 40px; padding: 12px; font-weight: bold; color: #2a1a0a; cursor: pointer; width: 100%; margin-top: 10px; font-size: 0.95rem; }
        hr { margin: 20px 0; border-color: #ffaa33; }

        .btn-group { display: flex; gap: 6px; }
        .btn-sm { background: rgba(255,170,51,0.2); border: 1px solid #ffaa33; padding: 4px 12px; border-radius: 40px; color: #ffd966; cursor: pointer; font-size: 0.75rem; }
        .charge-btn, .withdraw-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; padding: 6px 16px; border-radius: 40px; color: #2a1a0a; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .lang-switch, .theme-switch { background: #ffaa33; border: none; border-radius: 30px; padding: 4px 10px; color: #2a1a0a; cursor: pointer; font-size: 0.75rem; font-weight: bold; margin-left: 4px; }
        .game-nav { display: flex; gap: 6px; background: rgba(0,0,0,0.4); padding: 6px 12px; margin: 12px 12px; border-radius: 60px; }
        .game-tab { flex: 1; background: transparent; border: none; padding: 8px 0; border-radius: 40px; font-weight: 700; font-size: 0.8rem; color: #ffaa33; cursor: pointer; }
        .game-tab.active { background: linear-gradient(135deg, #ffaa33, #ff884d); color: #2a1a0a; box-shadow: 0 0 8px #ffaa33; }
        .game-container { padding: 8px 12px 20px; }
        .game-card { background: rgba(20,12,6,0.7); backdrop-filter: blur(8px); border-radius: 32px; padding: 16px; border: 1px solid #ffaa33; }

        .chip.selected { background: linear-gradient(145deg, #ffaa33, #ff884d); color: #2a1a0a; }
        .quick-bet, .clear-bet { background: rgba(255,170,51,0.2); border: 1px solid #ffaa33; border-radius: 30px; padding: 4px 10px; margin: 3px; cursor: pointer; color: #ffd966; font-weight: 500; font-size: 0.75rem; }
        .exec-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; border-radius: 36px; padding: 8px 14px; color: #2a1a0a; font-weight: bold; cursor: pointer; margin: 3px; font-size: 0.85rem; }
        .main-go { background: linear-gradient(135deg, #ffcc66, #ffaa33); font-weight: 800; }
        .countdown-area { text-align: center; margin: 6px 0 12px 0; background: rgba(0,0,0,0.5); border-radius: 40px; padding: 6px 12px; font-weight: bold; font-size: 0.9rem; color: #ffaa33; }
        .fish-dice-3d-area, .dice-3d-area { display: flex; justify-content: center; gap: 20px; margin: 20px 0; perspective: 1200px; }
        .fish-dice-cube, .dice-cube { width: 70px; height: 70px; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.2,0.9,0.4,1.1); }
        .fish-dice-face, .dice-face { position: absolute; width: 100%; height: 100%; background: #2a1e12; border: 2px solid #ffaa33; border-radius: 16px; display: flex; align-items: center; justify-content: center; backface-visibility: visible; font-size: 2rem; font-weight: bold; color: #ffd966; }
        .fish-front { transform: translateZ(35px); } .fish-back { transform: rotateY(180deg) translateZ(35px); } .fish-right { transform: rotateY(90deg) translateZ(35px); } .fish-left { transform: rotateY(-90deg) translateZ(35px); } .fish-top { transform: rotateX(90deg) translateZ(35px); } .fish-bottom { transform: rotateX(-90deg) translateZ(35px); }
        .front { transform: translateZ(35px); } .back { transform: rotateY(180deg) translateZ(35px); } .right { transform: rotateY(90deg) translateZ(35px); } .left { transform: rotateY(-90deg) translateZ(35px); } .top { transform: rotateX(90deg) translateZ(35px); } .bottom { transform: rotateX(-90deg) translateZ(35px); }
        @media (max-width:480px){ .fish-dice-cube, .dice-cube{width:60px;height:60px;} .fish-front,.fish-back,.fish-right,.fish-left,.fish-top,.fish-bottom,.front,.back,.right,.left,.top,.bottom{transform:translateZ(30px);} .fish-dice-face{font-size:1.5rem;} }
        .pip { width: 10px; height: 10px; background: #ffaa33; border-radius: 50%; margin: 2px; }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 8px; left: 8px; } .pip-tr { position: absolute; top: 8px; right: 8px; }
        .pip-bl { position: absolute; bottom: 8px; left: 8px; } .pip-br { position: absolute; bottom: 8px; right: 8px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1,.pip-l2,.pip-l3 { position: absolute; left: 8px; } .pip-l1 { top: 8px; } .pip-l2 { top: 50%; transform: translateY(-50%); } .pip-l3 { bottom: 8px; }
        .pip-r1,.pip-r2,.pip-r3 { position: absolute; right: 8px; } .pip-r1 { top: 8px; } .pip-r2 { top: 50%; transform: translateY(-50%); } .pip-r3 { bottom: 8px; }
        .fish-pattern-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin: 10px 0; }
        .fish-bet-card { background: rgba(0,0,0,0.5); border-radius: 16px; padding: 6px 2px; text-align: center; border: 1px solid #ffaa33; }
        .bet-card { background: rgba(0,0,0,0.5); border-radius: 18px; padding: 6px; text-align: center; cursor: pointer; border: 1px solid #ffaa33; font-size: 0.8rem; }
        .points-grid, .trio-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(58px,1fr)); gap: 6px; margin: 10px 0; }
        .history-cell { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(255,170,51,0.2); font-weight: bold; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #2a1e12; border-radius: 36px; padding: 20px; max-width: 90%; max-height: 85%; overflow: auto; color: #ffd966; border: 1px solid #ffaa33; text-align: center; }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2a1a0a; color: #ffd966; padding: 6px 16px; border-radius: 40px; z-index: 2000; font-weight: bold; white-space: nowrap; border: 1px solid #ffaa33; font-size: 0.8rem; }
        .result-popup { position: fixed; bottom: 40%; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg,#ffaa33,#ff884d); color: #2a1a0a; padding: 10px 24px; border-radius: 50px; font-weight: bold; font-size: 1rem; z-index: 1500; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .admin-table th, .admin-table td { padding: 6px 4px; border-bottom: 1px solid #ffaa33; text-align: left; }
        .admin-btn { background: #ffaa33; border: none; border-radius: 20px; padding: 4px 8px; margin: 2px; color: #2a1a0a; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .niu-card { width: 55px; height: 75px; background: white; border-radius: 8px; display: inline-flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; font-size: 1rem; margin: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.3); flex-shrink: 0; color: #2a1a0a; }
        .niu-card[data-suit="вҷҘ"], .niu-card[data-suit="вҷҰ"] { color: #c33; }
        .niu-card[data-suit="вҷЈ"], .niu-card[data-suit="вҷ "] { color: #333; }
        .niu-hand { display: flex; flex-direction: row; flex-wrap: nowrap; overflow-x: auto; justify-content: center; gap: 8px; min-height: 100px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 20px; margin: 8px 0; }
        @media (max-width:480px){ .niu-card{width:48px;height:65px;font-size:0.85rem;} }
        body.light-mode { background: linear-gradient(145deg,#f5f0e6 0%,#e8dfd0 100%); color: #3a2a1a; }
        body.light-mode #app { background: rgba(245,240,230,0.85); border-color: rgba(180,130,60,0.5); }
        body.light-mode .auth-panel, body.light-mode .user-section, body.light-mode .game-card, body.light-mode .modal-content { background: rgba(250,245,235,0.9); border-color: #b8860b; color: #3a2a1a; }
        body.light-mode .auth-input, body.light-mode .fish-bet-card, body.light-mode .bet-card, body.light-mode .chip, body.light-mode .quick-bet, body.light-mode .exec-btn, body.light-mode .countdown-area { background: rgba(255,250,240,0.8); border-color: #c99a3b; color: #4a3a2a; }
        body.light-mode .chip.selected { background: linear-gradient(145deg,#ffcc77,#e6a822); color: #2a1a0a; }
        body.light-mode .fish-dice-face, body.light-mode .dice-face, body.light-mode .niu-card { background: #fffaf0; border-color: #c99a3b; color: #4a3a2a; }
        body.light-mode .toast-message { background: #fff9ef; color: #b8860b; border-color: #b8860b; }
        body.light-mode .result-popup { background: linear-gradient(135deg,#ffcc77,#e6a822); color: #2a1a0a; }
        body.light-mode .admin-table th, body.light-mode .admin-table td { border-bottom-color: #dbb45c; }
        body.light-mode .admin-btn { background: #e6a822; color: #2a1a0a; }
        body.light-mode .lang-switch, body.light-mode .theme-switch { background: #e6a822; color: #2a1a0a; }
        body.light-mode .charge-btn, body.light-mode .withdraw-btn { background: linear-gradient(135deg,#e6a822,#c9881c); color: #2a1a0a; }
        body.light-mode #userBalanceDisplay { background: linear-gradient(135deg,#c9881c,#a56b0f); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:3000; backdrop-filter:blur(4px); }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // е…ЁеұҖй…ҚзҪ®пјҲзӣёеҜ№и·Ҝеҫ„пјҢж— зЎ¬зј–з Ғпјү
    const API_BASE = '/api';
    let token = localStorage.getItem('jwt_token');
    let currentUser = null;

    function showToast(msg, isError=false) {
        let t = document.createElement('div');
        t.className = 'toast-message';
        t.innerText = msg;
        t.style.borderLeftColor = isError ? '#ff6b6b' : '#ffaa33';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    function showLoading(show, text="еӨ„зҗҶдёӯ...") {
        let existing = document.querySelector('.loading-overlay');
        if(show){
            if(existing) existing.remove();
            let div = document.createElement('div');
            div.className = 'loading-overlay';
            div.innerHTML = `<div style="background:#2a1e12; padding:16px 24px; border-radius:40px; border:1px solid #ffaa33;">вҸі ${text}</div>`;
            document.body.appendChild(div);
        } else if(existing) existing.remove();
    }

    async function apiFetch(path, options={}) {
        const url = API_BASE + path;
        const headers = { 'Content-Type': 'application/json' };
        if(token) headers['Authorization'] = `Bearer ${token}`;
        const res = await fetch(url, {...options, headers});
        if(res.status === 401 && path !== '/login' && path !== '/register') {
            localStorage.removeItem('jwt_token');
            token = null;
            currentUser = null;
            renderAuthUI();
            showToast("зҷ»еҪ•е·ІиҝҮжңҹпјҢиҜ·йҮҚж–°зҷ»еҪ•", true);
            throw new Error('unauthorized');
        }
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || 'иҜ·жұӮеӨұиҙҘ');
        return data;
    }

    async function fetchUser() {
        if(!token) return null;
        try {
            const user = await apiFetch('/user');
            currentUser = user;
            return user;
        } catch(e) { return null; }
    }

    async function gameSettle(totalBet, winAmount) {
        if(!currentUser) return false;
        showLoading(true, 'з»“з®—дёӯ...');
        try {
            const result = await apiFetch('/game/settle', {
                method: 'POST',
                body: JSON.stringify({ totalBet, winAmount })
            });
            if(result.success) {
                currentUser.balance = result.newBalance;
                const balanceSpan = document.getElementById('userBalanceDisplay');
                if(balanceSpan) balanceSpan.innerText = currentUser.balance.toFixed(2);
                showToast(`з»“з®—е®ҢжҲҗпјҢдҪҷйўқ ${currentUser.balance.toFixed(2)}`);
                return true;
            } else {
                showToast(result.error || 'з»“з®—еӨұиҙҘ', true);
                return false;
            }
        } catch(e) {
            showToast(e.message, true);
            return false;
        } finally {
            showLoading(false);
        }
    }
    // ==================== йұјиҷҫиҹ№жёёжҲҸ ====================
    let fishDestroy = null;
    function initFishGame(container) {
        if(fishDestroy) fishDestroy();
        container.innerHTML = `
            <div class="game-card">
                <div style="display:flex; gap:8px; margin-bottom:10px;">
                    <div style="flex:1; background:rgba(0,0,0,0.5); border-radius:20px; padding:6px; text-align:center;"><div style="font-size:0.7rem;">рҹ’° жҲ‘зҡ„дҪҷйўқ</div><div id="fishMyBalance">0</div></div>
                    <div style="flex:1; background:rgba(0,0,0,0.5); border-radius:20px; padding:6px; text-align:center;"><div style="font-size:0.7rem;">рҹҺІ жҖ»жҠјжіЁ</div><div id="fishTotalBet">0</div></div>
                    <div style="flex:1; background:rgba(0,0,0,0.5); border-radius:20px; padding:6px; text-align:center;"><div style="font-size:0.7rem;">рҹҸҶ дёҠеұҖеҮҖеҲ©</div><div id="fishLastWin">0</div></div>
                </div>
                <div class="countdown-area" id="fishPhaseHint">рҹҺІ дёӢжіЁйҳ¶ж®ө В· 25з§’</div>
                <div id="fishChips" style="margin:6px 0;"><span class="chip" data-chip="2">2</span><span class="chip" data-chip="5">5</span><span class="chip selected" data-chip="10">10</span><span class="chip" data-chip="50">50</span><span class="chip" data-chip="100">100</span></div>
                <div style="display:flex; gap:6px;"><button id="fishRollBtn" class="exec-btn">ејҖйӘ°</button><button id="fishClearBtn" class="exec-btn">жё…з©ә</button><button id="fishRepeatBtn" class="exec-btn">з»ӯжҠј</button><button id="fishGrabBtn" class="exec-btn">жҠўеә„</button></div>
                <div class="fish-dice-3d-area"><div class="fish-dice-cube" id="fishDice0"></div><div class="fish-dice-cube" id="fishDice1"></div><div class="fish-dice-cube" id="fishDice2"></div></div>
                <div><strong>рҹҺІ еҚ•йҖүжҠјжіЁ</strong></div><div id="fishPatternGrid" class="fish-pattern-grid"></div>
                <div><strong>рҹҺҜ еҸҢжҠјз»„еҗҲ</strong></div><div id="fishDoubleGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;"></div>
                <button id="fishRecordBtn" class="exec-btn">рҹ“ң и®°еҪ•</button>
                <div id="fishPlayersPanel" style="margin-top:8px;"><strong>рҹ‘Ҙ й—Іе®¶жҠјжіЁ</strong><div id="fishPlayerBetsList"></div></div>
            </div>
        `;
        const patternNames = ["йұј","иҷҫ","иҹ№","и‘«иҠҰ","йҮ‘й’ұ","йёЎ"];
        const patternEmojis = ["рҹҗҹ","рҹҰҗ","рҹҰҖ","рҹҺғ","рҹ’°","рҹҗ”"];
        const doubleCombos = [["йұј","иҷҫ"],["йұј","иҹ№"],["йұј","и‘«иҠҰ"],["йұј","йҮ‘й’ұ"],["йұј","йёЎ"],["иҷҫ","иҹ№"],["иҷҫ","и‘«иҠҰ"],["иҷҫ","йҮ‘й’ұ"],["иҷҫ","йёЎ"],["иҹ№","и‘«иҠҰ"],["иҹ№","йҮ‘й’ұ"],["иҹ№","йёЎ"],["и‘«иҠҰ","йҮ‘й’ұ"],["и‘«иҠҰ","йёЎ"],["йҮ‘й’ұ","йёЎ"]];
        function buildFishDice(diceDiv) {
            diceDiv.innerHTML='';
            const faces=['fish-front','fish-back','fish-right','fish-left','fish-top','fish-bottom'];
            faces.forEach((fc,idx)=>{ let fd=document.createElement('div'); fd.className=`fish-dice-face ${fc}`; fd.innerText=patternEmojis[idx%6]; diceDiv.appendChild(fd); });
            diceDiv.style.transform=`rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`;
        }
        function setFishDiceValue(diceDiv,pat){
            let idx=patternNames.indexOf(pat);
            let rx=0,ry=0;
            if(idx===0){rx=0;ry=0;}else if(idx===1){rx=0;ry=-90;}else if(idx===2){rx=0;ry=180;}else if(idx===3){rx=0;ry=90;}else if(idx===4){rx=-90;ry=0;}else if(idx===5){rx=90;ry=0;}
            diceDiv.style.transform=`rotateX(${rx+360*(1+Math.floor(Math.random()*2))}deg) rotateY(${ry+360*(1+Math.floor(Math.random()*2))}deg)`;
        }
        let fishDice = [document.getElementById('fishDice0'),document.getElementById('fishDice1'),document.getElementById('fishDice2')];
        fishDice.forEach(buildFishDice);
        let patternBets={йұј:0,иҷҫ:0,иҹ№:0,и‘«иҠҰ:0,йҮ‘й’ұ:0,йёЎ:0};
        let doubleBets={}; doubleCombos.forEach(c=>doubleBets[c.join(',')]=0);
        let currentChip=10, isGrabbed=false, playerBankerBalance=0, gameRecords=[], isRolling=false, roundActive=true, countdownTimer=null, lastWinAmount=0;
        let playersList=[{name:"й—Іе®¶A",bet:0},{name:"й—Іе®¶B",bet:0},{name:"й—Іе®¶C",bet:0}];
        let lastBetState=null, clearTimer=null;

        function updateFishUI(){
            for(let p in patternBets){ let sp=document.getElementById(`fishBet_${p}`); if(sp) sp.innerText=patternBets[p]; }
            for(let c of doubleCombos){ let key=c.join(','); let sp=document.getElementById(`doubleBet_${key.replace(/,/g,'_')}`); if(sp) sp.innerText=doubleBets[key]; }
            let total=Object.values(patternBets).reduce((a,b)=>a+b,0)+Object.values(doubleBets).reduce((a,b)=>a+b,0);
            document.getElementById('fishTotalBet').innerText=total;
            document.getElementById('fishLastWin').innerText=lastWinAmount;
            document.getElementById('fishMyBalance').innerText=currentUser ? currentUser.balance.toFixed(2) : '0';
            document.getElementById('fishPlayerBetsList').innerHTML=playersList.map(p=>`<div>${p.name}: ${p.bet}</div>`).join('');
            let grabBtn = document.getElementById('fishGrabBtn');
            if(grabBtn) grabBtn.disabled = (isGrabbed || (currentUser && currentUser.balance < 2000));
        }
        function saveLastBetState(){ lastBetState={patternBets:{...patternBets}, doubleBets:{...doubleBets}}; }
        async function repeatLastBet(){
            if(!lastBetState) return showToast("ж— дёҠеұҖжҠјжіЁ");
            let total=Object.values(lastBetState.patternBets).reduce((a,b)=>a+b,0)+Object.values(lastBetState.doubleBets).reduce((a,b)=>a+b,0);
            let bal=currentUser.balance;
            if(total>bal) return showToast("дҪҷйўқдёҚи¶і");
            let oldTotal=Object.values(patternBets).reduce((a,b)=>a+b,0)+Object.values(doubleBets).reduce((a,b)=>a+b,0);
            if(oldTotal>0) await gameSettle(-oldTotal, 0);
            patternBets={...lastBetState.patternBets}; doubleBets={...lastBetState.doubleBets};
            await gameSettle(total, 0);
            updateFishUI(); showToast("з»ӯжҠјжҲҗеҠҹ");
        }
        async function addPatternBet(p,v){
            if(isGrabbed) { showToast("еә„е®¶дёҚиғҪдёӢжіЁ"); return; }
            let total=Object.values(patternBets).reduce((a,b)=>a+b,0)+Object.values(doubleBets).reduce((a,b)=>a+b,0);

    // з®ЎзҗҶе‘ҳеҗҺеҸ°пјҲзӮ№еҮ»дҪҷйўқ3ж¬ЎпјҢеҜҶз Ғ admin888 д»ҺеҗҺз«Ҝж ЎйӘҢпјү
    async function openAdminModal() {
        let pwd = prompt("з®ЎзҗҶе‘ҳеҜҶз Ғ:");
        if(!pwd) return;
        try {
            let adminRes = await fetch(API_BASE + '/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) });
            let adminData = await adminRes.json();
            if(!adminData.success) throw new Error('еҜҶз Ғй”ҷиҜҜ');
            let adminToken = adminData.token;
            let users = await fetch(API_BASE + '/api/admin/users', { headers: { 'Authorization': `Bearer ${adminToken}` } }).then(r=>r.json());
            let rechargeOrders = await fetch(API_BASE + '/api/admin/recharge_orders', { headers: { 'Authorization': `Bearer ${adminToken}` } }).then(r=>r.json());
            let withdrawOrders = await fetch(API_BASE + '/api/admin/withdraw_orders', { headers: { 'Authorization': `Bearer ${adminToken}` } }).then(r=>r.json());
            let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
            modalDiv.innerHTML = `<div class="modal-content" style="max-width:650px;">
                <h3>рҹҺӣпёҸ з®ЎзҗҶе‘ҳеҗҺеҸ°</h3>
                <div><strong>рҹ“Ҙ е……еҖјз”іиҜ·</strong><div id="rechargeListAdmin"></div></div>
                <div><strong>рҹ“Ө жҸҗзҺ°з”іиҜ·</strong><div id="withdrawListAdmin"></div></div>
                <div><strong>рҹ‘Ҙ з”ЁжҲ·з®ЎзҗҶ</strong><select id="userSelect">${users.map(u=>`<option value="${u.id}">${u.account} (дҪҷйўқ ${u.balance})</option>`).join('')}</select>
                <input id="amountInput" placeholder="йҮ‘йўқ" type="number"><button id="addBalanceBtn">вһ• дёҠеҲҶ</button><button id="subBalanceBtn">вһ– дёӢеҲҶ</button></div>
                <button id="closeAdminBtn">е…ій—ӯ</button></div>`;
            document.body.appendChild(modalDiv);
            function renderRecharge(){
                let container = modalDiv.querySelector('#rechargeListAdmin');
                if(rechargeOrders.length===0) { container.innerHTML='<div>ж— еҫ…е®Ўж ёе……еҖј</div>'; return; }
                container.innerHTML = rechargeOrders.map(o=>`<div>${o.account} з”іиҜ·е……еҖј ${o.amount} USDT<br><button class="admin-btn approveRecharge" data-id="${o.id}">вң… йҖҡиҝҮ</button><button class="admin-btn rejectRecharge" data-id="${o.id}">вқҢ жӢ’з»қ</button></div>`).join('');
                document.querySelectorAll('.approveRecharge').forEach(btn=>{
                    btn.onclick = async () => { await fetch(API_BASE + '/api/admin/approve_recharge', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` }, body: JSON.stringify({ orderId: btn.dataset.id }) }); showToast("е·ІйҖҡиҝҮ"); modalDiv.remove(); openAdminModal(); };
                });
                document.querySelectorAll('.rejectRecharge').forEach(btn=>{
                    btn.onclick = async () => { await fetch(API_BASE + '/api/admin/reject_recharge', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` }, body: JSON.stringify({ orderId: btn.dataset.id }) }); showToast("е·ІжӢ’з»қ"); modalDiv.remove(); openAdminModal(); };
                });
            }
            function renderWithdraw(){
                let container = modalDiv.querySelector('#withdrawListAdmin');
                if(withdrawOrders.length===0) { container.innerHTML='<div>ж— еҫ…еӨ„зҗҶжҸҗзҺ°</div>'; return; }
                container.innerHTML = withdrawOrders.map(o=>`<div>${o.account} з”іиҜ·жҸҗзҺ° ${o.amount} USDT<br><button class="admin-btn approveWithdraw" data-id="${o.id}">вң… зЎ®и®Өжү“ж¬ҫ</button><button class="admin-btn rejectWithdraw" data-id="${o.id}">вқҢ жӢ’з»қ</button></div>`).join('');
                document.querySelectorAll('.approveWithdraw').forEach(btn=>{
                    btn.onclick = async () => { await fetch(API_BASE + '/api/admin/approve_withdraw', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` }, body: JSON.stringify({ orderId: btn.dataset.id }) }); showToast("е·ІзЎ®и®Ө"); modalDiv.remove(); openAdminModal(); };
                });
                document.querySelectorAll('.rejectWithdraw').forEach(btn=>{
                    btn.onclick = async () => { await fetch(API_BASE + '/api/admin/reject_withdraw', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` }, body: JSON.stringify({ orderId: btn.dataset.id }) }); showToast("е·ІжӢ’з»қ"); modalDiv.remove(); openAdminModal(); };
                });
            }
            renderRecharge(); renderWithdraw();
            modalDiv.querySelector('#addBalanceBtn').onclick = () => showToast("иҜ·йҖҡиҝҮе……еҖјз”іиҜ·еҠҹиғҪдёҠеҲҶ", true);
            modalDiv.querySelector('#subBalanceBtn').onclick = () => showToast("иҜ·йҖҡиҝҮжҸҗзҺ°е®Ўж ёдёӢеҲҶ", true);
            modalDiv.querySelector('#closeAdminBtn').onclick = () => modalDiv.remove();
        } catch(e) { showToast(e.message, true); }
    }

    // ==================== жёёжҲҸеӨ§еҺ… ====================
    async function renderGameLobby() {
        if (!currentUser) { renderAuthUI(); return; }
        document.getElementById('app').innerHTML = `
            <div style="text-align:center; padding:16px 12px 8px; background:linear-gradient(135deg,#2a1e12,#1a120b); border-bottom:2px solid #ffaa33;">
                <div><h1 style="font-size:1.6rem;">йҮ‘иҫүеЁұд№җеҹҺ</h1><p>иҮіе°ҠзүҲВ·е…ЁжёёжҲҸеҗҢжӯҘ</p></div>
            </div>
            <div class="user-section">
                <div class="user-info-row">
                    <span>рҹ“ұ ${currentUser.account} | рҹ’° дҪҷйўқ: <span id="userBalanceDisplay">${currentUser.balance.toFixed(2)}</span></span>
                    <div class="btn-group">
                        <button id="serviceBtn" class="btn-sm">рҹ“һ е®ўжңҚ</button>
                        <button id="logoutBtn" class="btn-sm">рҹҡӘ йҖҖеҮә</button>
                        <button id="langSwitchBtn" class="lang-switch">аё аёІаё©аёІа№„аё—аёў</button>
                        <button id="themeToggleBtn" class="theme-switch">рҹҢҷ еӨңй—ҙ</button>
                    </div>
                </div>
                <div style="margin-top:8px;">
                    <button id="rechargeBtn" class="charge-btn">рҹ’Һ е……еҖј</button>
                    <button id="withdrawBtn" class="withdraw-btn">рҹ’° жҸҗзҺ°</button>
                </div>
            </div>
            <div class="game-nav">
                <button class="game-tab active" data-game="fish">рҹҗҹ жҪ®жұ•и‘«иҠҰйұј</button>
                <button class="game-tab" data-game="dice">рҹҺІ 3DйӘ°е®қ</button>
                <button class="game-tab" data-game="dragonTiger">рҹҗү йҫҷиҷҺж–—</button>
                <button class="game-tab" data-game="game4">рҹҗ® зҷҫе®¶д№җзүӣзүӣ</button>
            </div>
            <div class="game-container" id="gamePanel"></div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; token = null; localStorage.removeItem('jwt_token'); renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;
        document.getElementById('langSwitchBtn').onclick = () => { currentLang = currentLang === 'zh' ? 'th' : 'zh'; renderGameLobby(); };
        const themeBtn = document.getElementById('themeToggleBtn');
        const savedTheme = localStorage.getItem('neon_theme');
        if(savedTheme === 'light'){ document.body.classList.add('light-mode'); themeBtn.innerHTML='вҳҖпёҸ ж—Ҙй—ҙ'; }
        themeBtn.onclick = () => { document.body.classList.toggle('light-mode'); let isLight=document.body.classList.contains('light-mode'); localStorage.setItem('neon_theme',isLight?'light':'dark'); themeBtn.innerHTML=isLight?'вҳҖпёҸ ж—Ҙй—ҙ':'рҹҢҷ еӨңй—ҙ'; };
        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const inits = { fish: initFishGame, dice: initDiceGame, dragonTiger: initDragonTigerGame, game4: initGame4 };
        async function switchGame(id){ if(currentDestroy) currentDestroy(); gamePanel.innerHTML = ''; currentDestroy = await inits[id](gamePanel); }
        document.querySelectorAll('.game-tab').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.game-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
        switchGame('fish');
        let adminClickCount=0;
        document.getElementById('userBalanceDisplay').addEventListener('click',()=>{ adminClickCount++; setTimeout(()=>{ adminClickCount=0; },1000); if(adminClickCount>=3){ adminClickCount=0; openAdminModal(); } });
    }

    // ==================== еҸҢиҜӯ ====================
    const lang = {
        zh: { recharge:"рҹ’Һ е……еҖј", withdraw:"рҹ’° жҸҗзҺ°", service:"рҹ“һ е®ўжңҚ", logout:"йҖҖеҮә", balance:"дҪҷйўқ", phoneOrEmail:"иҙҰеҸ·", password:"еҜҶз Ғ (вүҘ4дҪҚ)", referralCode:"жҺЁиҚҗз Ғ", remember:"и®°дҪҸиҙҰеҸ·", login:"зҷ»еҪ•", register:"жіЁеҶҢ", referralNote:"жҺЁиҚҗз Ғ: VIP666,888VIP,GOLD2025,LUCKY8,DICE100", getCode:"иҺ·еҸ–йӘҢиҜҒз Ғ", verifyCode:"йӘҢиҜҒз Ғ", registerNow:"жіЁеҶҢж–°иҙҰжҲ·" },
        th: { recharge:"рҹ’Һ а№Җаё•аёҙаёЎа№ҖаёҮаёҙаёҷ", withdraw:"рҹ’° аё–аёӯаёҷа№ҖаёҮаёҙаёҷ", service:"рҹ“һ аёҡаёЈаёҙаёҒаёІаёЈ", logout:"аёӯаёӯаёҒ", balance:"аёўаёӯаё”а№ҖаёҮаёҙаёҷ", phoneOrEmail:"аёҡаёұаёҚаёҠаёө", password:"аёЈаё«аёұаёӘаёңа№ҲаёІаёҷ (вүҘ4)", referralCode:"аёЈаё«аёұаёӘа№Ғаёҷаё°аёҷаёі", remember:"аёҲаёіаёүаёұаёҷ", login:"а№ҖаёӮа№үаёІаёӘаё№а№ҲаёЈаё°аёҡаёҡ", register:"аёӘаёЎаёұаё„аёЈ", referralNote:"аёЈаё«аёұаёӘ: VIP666,888VIP,GOLD2025,LUCKY8,DICE100", getCode:"аёЈаёұаёҡаёЈаё«аёұаёӘ", verifyCode:"аёЈаё«аёұаёӘаёўаё·аёҷаёўаёұаёҷ", registerNow:"аёӘаёЎаёұаё„аёЈаёӘаёЎаёІаёҠаёҙаёҒ" }
    };
    let currentLang = 'zh';
    function t(key) { return lang[currentLang][key] || lang.zh[key] || key; }

    // ==================== зҷ»еҪ•жіЁеҶҢз•Ңйқў ====================
    function renderAuthUI() {
        const savedAcc = localStorage.getItem('neon_saved_account') || '';
        const savedPwd = localStorage.getItem('neon_saved_password') || '';
        const remChecked = localStorage.getItem('neon_remember_me') === 'true';
        document.getElementById('app').innerHTML = `<div class="auth-panel"><h2>рҹҸҶ йҮ‘иҫүеЁұд№җеҹҺ</h2><div><input type="text" id="loginAccount" class="auth-input" placeholder="${t('phoneOrEmail')}" value="${savedAcc}"><input type="password" id="loginPassword" class="auth-input" placeholder="${t('password')}" value="${savedPwd}"><div class="flex-row"><input type="checkbox" id="rememberCheckbox" ${remChecked ? 'checked' : ''}> <label>${t('remember')}</label></div><button id="loginBtn" class="auth-btn">${t('login')}</button></div><hr><h3>${t('registerNow')}</h3><input type="text" id="regAccount" class="auth-input" placeholder="${t('phoneOrEmail')}"><div class="flex-row"><input type="text" id="regCode" class="auth-input" placeholder="${t('verifyCode')}"><button id="getCodeBtn" class="code-btn">${t('getCode')}</button></div><input type="password" id="regPassword" class="auth-input" placeholder="${t('password')}"><input type="text" id="regReferral" class="auth-input" placeholder="${t('referralCode')}"><button id="registerBtn" class="auth-btn">${t('register')}</button><div class="auth-note">${t('referralNote')}</div></div>`;
        document.getElementById('loginBtn').onclick = async () => {
            let acc = document.getElementById('loginAccount').value.trim();
            let pwd = document.getElementById('loginPassword').value;
            let rem = document.getElementById('rememberCheckbox').checked;
            if (!acc || !pwd) { showToast("иҜ·еЎ«еҶҷиҙҰеҸ·е’ҢеҜҶз Ғ", true); return; }
            showLoading(true, "зҷ»еҪ•дёӯ...");
            try {
                const data = await apiFetch('/login', { method: 'POST', body: JSON.stringify({ account: acc, password: pwd }) });
                token = data.token;
                localStorage.setItem('jwt_token', token);
                currentUser = { account: data.account, balance: data.balance };
                if (rem) {
                    localStorage.setItem('neon_saved_account', acc);
                    localStorage.setItem('neon_saved_password', pwd);
                    localStorage.setItem('neon_remember_me', 'true');
                } else {
                    localStorage.removeItem('neon_saved_account');
                    localStorage.removeItem('neon_saved_password');
                    localStorage.setItem('neon_remember_me', 'false');
                }
                showToast(`ж¬ўиҝҺ ${acc}`);
                renderGameLobby();
            } catch(e) {
                showToast(e.message, true);
            } finally {
                showLoading(false);
            }
        };
        document.getElementById('getCodeBtn').onclick = () => {
            let acc = document.getElementById('regAccount').value.trim();
            if (!acc) { showToast("иҜ·еЎ«еҶҷжүӢжңәеҸ·жҲ–йӮ®з®ұ", true); return; }
            let code = Math.floor(100000 + Math.random() * 900000);
            window.tempCode = { acc, code, expire: Date.now() + 5*60*1000 };
            alert(`гҖҗйӘҢиҜҒз ҒгҖ‘жӮЁзҡ„йӘҢиҜҒз ҒжҳҜпјҡ${code}пјҢ5еҲҶй’ҹеҶ…жңүж•ҲгҖӮ`);
            showToast("йӘҢиҜҒз Ғе·ІеҸ‘йҖҒ");
        };
        document.getElementById('registerBtn').onclick = async () => {
            let acc = document.getElementById('regAccount').value.trim();
            let code = document.getElementById('regCode').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let ref = document.getElementById('regReferral').value.trim().toUpperCase();
            if (!acc || !code || !pwd || !ref) { showToast("иҜ·еЎ«еҶҷе®Ңж•ҙдҝЎжҒҜ", true); return; }
            if (!['VIP666','888VIP','GOLD2025','LUCKY8','DICE100'].includes(ref)) { showToast("жҺЁиҚҗз Ғж— ж•Ҳ", true); return; }
            if (!window.tempCode || window.tempCode.acc !== acc || window.tempCode.code != code || Date.now() > window.tempCode.expire) { showToast("йӘҢиҜҒз Ғй”ҷиҜҜжҲ–е·ІиҝҮжңҹ", true); return; }
            if (pwd.length < 4) { showToast("еҜҶз ҒиҮіе°‘4дҪҚ", true); return; }
            showLoading(true, "жіЁеҶҢдёӯ...");
            try {
                await apiFetch('/register', { method: 'POST', body: JSON.stringify({ account: acc, password: pwd }) });
                showToast("жіЁеҶҢжҲҗеҠҹпјҒиҜ·зҷ»еҪ•");
                document.getElementById('regAccount').value = '';
                document.getElementById('regCode').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regReferral').value = '';
            } catch(e) {
                showToast(e.message, true);
            } finally {
                showLoading(false);
            }
        };
    }

    // еҗҜеҠЁеә”з”Ё
    (async () => {
        if(token) {
            try {
                const user = await fetchUser();
                if(user) {
                    currentUser = user;
                    renderGameLobby();
                    return;
                }
            } catch(e) {}
        }
        renderAuthUI();
    })();
</script>
