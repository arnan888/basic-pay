<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA 旗舰量化终端</title>
    <style>
        body { background: #0b0f0d; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* 🔒 翡翠绿重型激活框 (复刻 27447.jpg) */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #1c221e; padding: 40px 25px; border-radius: 20px; border: 11px solid #00ff88; box-shadow: 0 0 40px #00ff8888; text-align: center; width: 85%; max-width: 350px; }
        .id-input { width: 100%; padding: 15px; background: #fff; color: #000; font-size: 32px; font-weight: bold; border-radius: 10px; border: 3px solid #ff3333; margin: 20px 0; box-sizing: border-box; text-align: center; }
        .btn-red { width: 100%; padding: 18px; background: #ff0000; color: #fff; border: none; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: inset 5px 5px 10px #800; }

        /* 🎮 游戏主界面 (复刻 27444.jpg) */
        #game-page { display: none; width: 100%; height: 100vh; flex-direction: column; background: #121a16; }
        .top-card { background: #1a251f; margin: 12px; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #2d3e34; box-shadow: inset 0 0 15px #000; }
        .bal-val { font-size: 52px; color: #ff6b6b; font-weight: bold; }
        
        /* 🎡 永不黑屏转盘 - 纯代码自绘 (解决 27451.jpg 问题) */
        .wheel-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .wheel-outer { width: 300px; height: 300px; border-radius: 50%; border: 12px solid #233129; background: #1a251f; position: relative; overflow: hidden; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#ff4d4d 0 45deg, #f1c40f 45deg 90deg, #3498db 90deg 135deg, #9b59b6 135deg 180deg, #2ecc71 180deg 225deg, #e67e22 225deg 270deg, #1abc9c 270deg 315deg, #444 315deg 360deg); transition: transform 4s cubic-bezier(0.1, 0.9, 0.3, 1); }
        .pointer { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #fff; z-index: 10; }

        /* 底部控制台 (复刻 27444.jpg) */
        .controls { background: #4a1414; padding: 20px; text-align: center; }
        .btn-spin { background: #ff4d4d; color: #fff; padding: 15px 60px; border-radius: 35px; font-size: 22px; font-weight: bold; border: none; box-shadow: 0 4px 0 #b33636; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin:0;">终端激活</h2>
            <div class="id-input">179245</div>
            <button class="btn-red" onclick="start()">确认进入</button>
            <p style="color:#00ff88; font-size:13px; margin-top:15px; font-weight:bold;">● 系统已自动分配激活序列号</p>
        </div>
    </div>

    <div id="game-page">
        <div style="text-align:center; padding:10px; color:#f1c40f; font-size:12px;">⚡ 量化终端 · 公平游戏 ⚡</div>
        <div class="top-card">
            <div style="color:#8aa095; font-size:14px;">💰 可用余额 (USDT)</div>
            <div class="bal-val" id="money">1000.00</div>
            <div style="color:#f1c40f; font-size:13px; margin-top:5px;">🔥 单注额度: 10.0</div>
        </div>

        <div class="wheel-wrap">
            <div class="pointer"></div>
            <div class="wheel-outer"><div id="wheel"></div></div>
        </div>

        <div class="controls">
            <button class="btn-spin" onclick="play()">▶ 执行抽取</button>
        </div>
    </div>

    <script>
        // 如果链接里有 ID，跳过激活直进游戏
        if (window.location.search.includes('user_id')) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('game-page').style.display = 'flex';
        }

        function start() {
            // 固定初始码 179245，不再乱变
            window.location.href = window.location.origin + window.location.pathname + "?user_id=179245";
        }

        let bal = 1000.00;
        function play() {
            if (bal < 10) return alert("余额不足");
            bal -= 10;
            document.getElementById('money').innerText = bal.toFixed(2);
            const deg = Math.floor(3600 + Math.random() * 3600);
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;
        }
    </script>
</body>
</html>
