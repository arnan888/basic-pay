                    `${playerTypeObj.display} ${playerTypeObj.multiplier>1?`(赔率${playerTypeObj.multiplier})`:''}`;
                document.getElementById('bankerType').innerHTML =
                    `${bankerTypeObj.display} ${bankerTypeObj.multiplier>1?`(赔率${bankerTypeObj.multiplier})`:''}`;
                let result = '',
                    winAmount = 0;
                let pScore = playerTypeObj.multiplier === 0 ? 0 : (playerTypeObj.multiplier === 1 ? 1 : playerTypeObj
                    .multiplier);
                let bScore = bankerTypeObj.multiplier === 0 ? 0 : (bankerTypeObj.multiplier === 1 ? 1 : bankerTypeObj
                    .multiplier);
                if (pScore > bScore) result = 'PLAYER';
                else if (bScore > pScore) result = 'BANKER';
                else result = 'TIE';
                let winDetails = {};
                if (result === 'PLAYER' && bets.PLAYER > 0) { winAmount += bets.PLAYER * 2;
                    winDetails['PLAYER'] = bets.PLAYER * 3; }
                if (result === 'BANKER' && bets.BANKER > 0) { winAmount += bets.BANKER * 2;
                    winDetails['BANKER'] = bets.BANKER * 3; }
                if (result === 'TIE' && bets.TIE > 0) { winAmount += bets.TIE * 8;
                    winDetails['TIE'] = bets.TIE * 9; }
                if (playerTypeObj.type === '牛牛' && bets.NIU_NIU > 0) { let mul = playerTypeObj.multiplier + 1;
                    winAmount += bets.NIU_NIU * mul;
                    winDetails['NIU_NIU'] = bets.NIU_NIU * (mul + 1); }
                if (playerTypeObj.type === '五花牛' && bets.WU_HUA > 0) { let mul = playerTypeObj.multiplier + 1;
                    winAmount += bets.WU_HUA * mul;
                    winDetails['WU_HUA'] = bets.WU_HUA * (mul + 1); }
                winAmount *= systemConfig.adjustFactor;
                for (let k in winDetails) winDetails[k] *= systemConfig.adjustFactor;
                let profit = winAmount - totalBet;
                await gameSettle(totalBet, winAmount);
                document.getElementById('niuWinAmount').innerText = winAmount.toFixed(2);
                document.getElementById('niuProfitLoss').innerText = profit.toFixed(2);
                let resultText = '';
                if (result === 'PLAYER') resultText = '闲家赢';
                else if (result === 'BANKER') resultText = '庄家赢';
                else resultText = '和局';
                document.getElementById('niuResultMsg').innerHTML =
                    `${playerTypeObj.display} vs ${bankerTypeObj.display}<br>${resultText} ${profit>0?` 赢得 ${profit.toFixed(2)}`:''}`;
                let resultDiv = document.getElementById('niuResult3D');
                resultDiv.style.visibility = 'visible';
                resultDiv.style.backgroundColor = '#ffaa33';
                resultDiv.style.color = '#2a1a0a';
                resultDiv.style.textShadow = '0 0 5px #fff';
                resultDiv.innerText = resultText;
                setTimeout(() => { resultDiv.style.visibility = 'hidden'; }, 3000);
                let betTypes = ['PLAYER', 'BANKER', 'TIE', 'NIU_NIU', 'WU_HUA'];
                for (let bt of betTypes) {
                    let sp = document.getElementById(`bet_${bt}`);
                    if (sp) {
                        if (winDetails[bt] !== undefined) {
                            sp.innerText = winDetails[bt];
                            let card = sp.closest('.bet-card');
                            if (card) card.classList.add('win-flash');
                            setTimeout(() => { if (card) card.classList.remove('win-flash');
                                sp.innerText = "0"; }, 3000);
                        } else { sp.innerText = "0"; }
                    }
                }
                let recordStr =
                    `${playerTypeObj.display} vs ${bankerTypeObj.display} → ${resultText} 盈亏:${profit.toFixed(2)}`;
                gameRecordsNiu.unshift({ time: new Date().toLocaleTimeString(), result: recordStr });
                if (gameRecordsNiu.length > 50) gameRecordsNiu.pop();
                for (let k in bets) bets[k] = 0;
                updateUI();
                saveLastBet();
                isRolling = false;
                startCountdown(25);
            }

            function startCountdown(sec) {
                if (countdownTimer) clearInterval(countdownTimer);
                remainingSec = sec;
                let cd = document.getElementById('niuCountdownNum');
                cd.innerText = remainingSec;
                countdownTimer = setInterval(() => {
                    if (remainingSec <= 1) { clearInterval(countdownTimer);
                        countdownTimer = null; if (!isRolling) autoDrawGame(); } else { remainingSec--;
                        cd.innerText = remainingSec; }
                }, 1000);
            }
            async function refreshBalance() { await updateUI(); }

            function showRecordModal() {
                if (gameRecordsNiu.length === 0) return;
                let html = '<div style="max-height:200px; overflow:auto;">' + gameRecordsNiu.map(r =>
                    `<div>${r.time} ${r.result}</div>`).join('') +
                    '</div><button id="closeRec" class="auth-btn">关闭</button>';
                let m = document.createElement('div');
                m.className = 'modal';
                m.innerHTML = `<div class="modal-content">${html}</div>`;
                document.body.appendChild(m);
                m.querySelector('#closeRec').onclick = () => m.remove();
            }
            document.querySelectorAll('#niuChips .chip').forEach(c => { c.onclick = function() { selectedChip =
                        parseInt(this.dataset.chip);
                    document.querySelectorAll('#niuChips .chip').forEach(cc => cc.classList.remove(
                        'selected'));
                    this.classList.add('selected'); }; });
            document.querySelectorAll('.bet-card[data-bet]').forEach(c => { c.onclick = () => addBet(c.dataset.bet); });
            document.getElementById('niuClearBtn').onclick = clearAllBets;
            document.getElementById('niuRepeatBtn').onclick = repeatLastBet;
            document.getElementById('niuRefreshBtn').onclick = refreshBalance;
            document.getElementById('niuRecordBtn').onclick = showRecordModal;
            updateUI();
            startCountdown(25);
            saveLastBet();
            niuNiuDestroy = () => { if (countdownTimer) clearInterval(countdownTimer);
                container.innerHTML = ''; };
            return niuNiuDestroy;
        }

        // ==================== 游戏大厅 & 路由 ====================
        let currentGameDestroy = null;
        async function renderGameLobby() {
            if (!currentUser) { renderAuthUI(); return; }
            document.getElementById('app').innerHTML =
                `<div style="text-align:center;padding:16px 12px 8px;background:linear-gradient(135deg,#2a1e12,#1a120b);border-bottom:2px solid #ffaa33;"><h1>金辉娱乐城</h1><p>选择游戏</p></div><div class="user-section"><div class="user-info-row"><span>📱${currentUser.account}</span><span>💰余额:<span id="userBalanceDisplay" style="cursor:pointer;">${currentUser.balance.toFixed(2)}</span></span><div class="btn-group"><button id="serviceBtn" class="btn-sm">📞客服</button><button id="logoutBtn" class="btn-sm">🚪退出</button><button id="langSwitchBtn" class="lang-switch">ภาษาไทย</button><button id="themeToggleBtn" class="theme-switch">🌙夜间</button></div></div><div style="margin-top:8px;"><button id="rechargeBtn" class="charge-btn">💎充值</button><button id="withdrawBtn" class="withdraw-btn">💰提现</button></div></div><div class="game-grid"><div class="game-card-item" data-game="fish"><div class="game-name">潮汕葫芦鱼</div><div class="game-desc">3D骰子·葫芦赔率</div></div><div class="game-card-item" data-game="dice"><div class="game-name">3D骰宝</div><div class="game-desc">自动开奖·大小单双</div></div><div class="game-card-item" data-game="dragonTiger"><div class="game-name">龙虎斗</div><div class="game-desc">1.95倍抽水</div></div><div class="game-card-item" data-game="game4"><div class="game-name">百家乐牛牛</div><div class="game-desc">闲庄和·特殊赔率</div></div></div>`;
            document.getElementById('logoutBtn').onclick = () => { currentUser = null;
                localStorage.removeItem('curr_acc');
                renderAuthUI(); };
            document.getElementById('serviceBtn').onclick = showServiceModal;
            document.getElementById('rechargeBtn').onclick = applyRecharge;
            document.getElementById('withdrawBtn').onclick = applyWithdraw;
            document.getElementById('langSwitchBtn').onclick = () => { currentLang = currentLang === 'zh' ? 'th' : 'zh';
                renderGameLobby(); };
            const themeBtn = document.getElementById('themeToggleBtn');
            const savedTheme = localStorage.getItem('neon_theme');
            if (savedTheme === 'light') { document.body.classList.add('light-mode');
                themeBtn.innerHTML = '☀️日间'; } else themeBtn.innerHTML = '🌙夜间';
            themeBtn.onclick = () => { document.body.classList.toggle('light-mode'); let isLight = document.body.classList
                    .contains('light-mode');
                localStorage.setItem('neon_theme', isLight ? 'light' : 'dark');
                themeBtn.innerHTML = isLight ? '☀️日间' : '🌙夜间'; };
            document.querySelectorAll('.game-card-item').forEach(el => { el.onclick = () => switchToGame(el.dataset
                    .game); });
            let adminClick = 0;
            document.getElementById('userBalanceDisplay').addEventListener('click', () => { adminClick++;
                setTimeout(() => { adminClick = 0; }, 1000); if (adminClick >= 3) { adminClick = 0;
                    openAdminModal(); } });
        }
        async function switchToGame(gid) { if (currentGameDestroy) currentGameDestroy();
            document.getElementById('app').innerHTML =
                `<div style="padding:12px;"><div style="display:flex;justify-content:space-between;margin-bottom:12px;"><button id="backToLobbyBtn" class="exec-btn">🏠返回大厅</button></div><div id="singleGameContainer"></div></div>`;
            const gc = document.getElementById('singleGameContainer');
            const inits = { fish: initFishGame, dice: initDiceGame, dragonTiger: initDragonTigerGame, game4: initGame4 }; if (
                inits[gid]) currentGameDestroy = await inits[gid](gc);
            document.getElementById('backToLobbyBtn').onclick = () => { if (currentGameDestroy) currentGameDestroy();
                renderGameLobby(); }; }
        const lang = {
            zh: { phoneOrEmail: "账号", password: "密码", referralCode: "推荐码", remember: "记住", login: "登录",
                register: "注册", getCode: "获取验证码", verifyCode: "验证码", registerNow: "注册",
                referralNote: "推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100" },
            th: { phoneOrEmail: "บัญชี", password: "รหัส", referralCode: "รหัสแนะนำ", remember: "จำ", login: "เข้าสู่",
                register: "สมัคร", getCode: "รับรหัส", verifyCode: "รหัส", registerNow: "สมัคร",
                referralNote: "VIP666,888VIP,GOLD2025,LUCKY8,DICE100" }
        };
        let currentLang = 'zh';

        function t(k) { return lang[currentLang][k] || lang.zh[k] || k; }

        function renderAuthUI() {
            const sa = localStorage.getItem('neon_saved_account') || '',
                sp = localStorage.getItem('neon_saved_password') || '',
                rc = localStorage.getItem('neon_remember_me') === 'true';
            document.getElementById('app').innerHTML =
                `<div class="auth-panel"><h2>🏆金辉娱乐城</h2><div><input type="text" id="loginAccount" class="auth-input" placeholder="${t('phoneOrEmail')}" value="${sa}"><input type="password" id="loginPassword" class="auth-input" placeholder="${t('password')}" value="${sp}"><div class="flex-row"><input type="checkbox" id="rememberCheckbox" ${rc?'checked':''}><label>${t('remember')}</label></div><button id="loginBtn" class="auth-btn">${t('login')}</button></div><hr><h3>${t('registerNow')}</h3><input type="text" id="regAccount" class="auth-input" placeholder="${t('phoneOrEmail')}"><div class="flex-row"><input type="text" id="regCode" class="auth-input" placeholder="${t('verifyCode')}"><button id="getCodeBtn" class="code-btn">${t('getCode')}</button></div><input type="password" id="regPassword" class="auth-input" placeholder="${t('password')}"><input type="text" id="regReferral" class="auth-input" placeholder="${t('referralCode')}"><button id="registerBtn" class="auth-btn">${t('register')}</button><div class="auth-note">${t('referralNote')}</div></div>`;
            document.getElementById('loginBtn').onclick = async () => { let a = document.getElementById('loginAccount')
                    .value.trim(),
                    p = document.getElementById('loginPassword').value,
                    rem = document.getElementById('rememberCheckbox').checked; let res = await login(a, p); if (res
                    .success) { if (rem) { localStorage.setItem('neon_saved_account', a);
                        localStorage.setItem('neon_saved_password', p);
                        localStorage.setItem('neon_remember_me', 'true'); } else { localStorage.removeItem(
                            'neon_saved_account');
                        localStorage.removeItem('neon_saved_password');
                        localStorage.setItem('neon_remember_me', 'false'); }
                    renderGameLobby(); } };
            document.getElementById('getCodeBtn').onclick = () => { let a = document.getElementById('regAccount').value
                    .trim(); if (!a) return; let code = Math.floor(100000 + Math.random() * 900000);
                window.tempCode = { acc: a, code: code, expire: Date.now() + 5 * 60 * 1000 };
                alert(`【验证码】您的验证码是：${code}，5分钟内有效。`); };
            document.getElementById('registerBtn').onclick = async () => { let a = document.getElementById('regAccount')
                    .value.trim(),
                    c = document.getElementById('regCode').value.trim(),
                    p = document.getElementById('regPassword').value,
                    ref = document.getElementById('regReferral').value.trim().toUpperCase(); if (!a || !c || !p || !
                    ref) return; if (!['VIP666', '888VIP', 'GOLD2025', 'LUCKY8', 'DICE100'].includes(ref))
                return; if (!window.tempCode || window.tempCode.acc !== a || window.tempCode.code != c || Date
                    .now() > window.tempCode.expire) return; if (p.length < 4) return; let res = await register(
                    a, p, ref); if (res.success) { document.getElementById('regAccount').value = '';
                    document.getElementById('regCode').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regReferral').value = ''; } };
        }

        // ==================== 初始化 ====================
        async function init() {
            await checkApi();
            await loadConfig();
            let su = localStorage.getItem('curr_acc');
            if (su) {
                let u = (await loadUsers()).find(u => u.account === su);
                if (u) { currentUser = u;
                    renderGameLobby(); } else renderAuthUI();
            } else renderAuthUI();
        }
        init();
    </script>
</body>
