        #app {

            border: 1px solid rgba(255, 200, 80, 0.4);
            overflow: hidden;

        .auth-panel {

        .auth-input {

            font-weight: bold;
            cursor: pointer;
            margin: 3px;

            margin: 6px 0 12px;
            background: rgba(0, 0, 0, 0.6);

            padding: 6px 12px;
            font-weight: bold;
            border: 1px solid #ffaa33;

            width: 80px;
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;

        .fish-dice-face,
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #005a32;
            border: 2px solid #ffaa33;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: visible;
            font-size: 2rem;

        .fish-dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin: 24px 0;
            perspective: 900px;
            flex-wrap: nowrap;

        .fish-dice-cube {
            margin: 0 8px;
            flex-shrink: 0;
        }

                gap: 34px;

                margin: 0 5px;

        .dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            perspective: 700px;
        }
        @media (max-width:480px) {

            .dice-cube {

                height: 65px;

            height: 10px;
            background: #ffaa33;
            border-radius: 50%;
            margin: 2px;
            position: absolute;

        .pip-l2,
        .pip-l3 {
            left: 12px;
        }
        .pip-r1,
        .pip-r2,
        .pip-r3 {
            right: 12px;
        }
        .pip-l1,
        .pip-r1 {
            top: 12px;
        }
        .pip-l2,
        .pip-r2 {
            top: 50%;
            transform: translateY(-50%);
        }
        .pip-l3,
        .pip-r3 {
            bottom: 12px;
        }
        .pip-center {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .pip-tl {
            top: 8px;
            left: 8px;
        }
        .pip-tr {
            top: 8px;
            right: 8px;
        }
        .pip-bl {
            bottom: 8px;
            left: 8px;
        }
        .pip-br {
            bottom: 8px;
            right: 8px;
        }
        .pip-mid {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

            border: 1px solid #ffaa33;

            grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));

            margin: 10px 0;

            height: 32px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 170, 51, 0.2);
            margin: 2px;

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;

            padding: 20px;
            color: #ffd966;
            border: 1px solid #ffaa33;

            max-height: 85vh;
            overflow-y: auto;

            animation: redFlash 0.4s 10 !important;
            background-color: #ff3300 !important;
            box-shadow: 0 0 25px #ffaa33 !important;
            color: #ffffff !important;
            font-weight: bold !important;
            border: 2px solid #ffffff !important;
        }
        @keyframes redFlash {
            0% {
                background-color: rgba(255, 50, 50, 0);
                color: #ffffff;
            }
            50% {
                background-color: #ff3300;
                transform: scale(1.04);
                color: #ffffff;
            }
            100% {
                background-color: rgba(255, 50, 50, 0);
                color: #ffffff;
            }
        }
        .balance-bling {
            animation: balanceGlow 0.4s 3;
        }
        @keyframes balanceGlow {
            0% {
                text-shadow: 0 0 0;
            }
            50% {
                text-shadow: 0 0 12px #ff5500;
            }
        }

            background: linear-gradient(145deg, #fff8f0, #f0e6d8);
            width: 75px;
            height: 100px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;

            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-style: preserve-3d;
            cursor: pointer;

        .quick-bet {
            background: rgba(255, 170, 51, 0.2);
            border: 1px solid #ffaa33;
            border-radius: 20px;
            padding: 4px 10px;
            cursor: pointer;
            color: #ffd966;
            font-size: 0.75rem;
        }
        .clear-bet {
            background: rgba(255, 100, 50, 0.2);

            padding: 4px 10px;

            color: #ff8866;

        }
        .game-top-bar {
            display: flex;

            gap: 6px;
        }
        .user-vip-card {

            font-size: 0.75rem;

        .back-lobby-btn {

        .vip-progress-bar {

        .vip-progress-fill {

            color: #00ff64;
            margin-left: 6px;
        }
        .lobby-title {
            cursor: pointer;
            user-select: none;
        }

            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();

            async function poll() {
                try {
                    const s = await call('GET', '/game/state?account=' + encodeURIComponent(currentUser.account));
                    const ph = s.phase, sec = s.secondsRemaining;
                    const phaseText = ph === 0 ? t('betPhase') : (ph === 1 ? t('opening') : t('showing'));
                    document.getElementById('fishPhaseHint').innerText = `${phaseText} · ${sec}s`;
                    if (s.dealer) { document.getElementById('dealerBoard').style.display = 'block'; document.getElementById('dealerName').innerText = s.dealer; } else { document.getElementById('dealerBoard').style.display = 'none'; }
                    if (ph === 0 && !anim) {
                        if (!s.dealer && grabbed) { grabbed = false; document.getElementById('dealerPanel').style.display = 'none'; }
                        const grabBtn = document.getElementById('fishGrabBtn'); if (grabBtn) grabBtn.disabled = grabbed || anim || (currentUser && currentUser.balance < 2000);
                        if (grabbed && s.betSummary) { updDealer(s.betSummary); document.getElementById('dealerPanel').style.display = 'block'; } else if (!grabbed) { document.getElementById('dealerPanel').style.display = 'none'; }
                        flashes.forEach(t => clearTimeout(t)); flashes = []; document.querySelectorAll('.fish-bet-card,.bet-card').forEach(c => c.classList.remove('win-flash')); ui();
                    }
                    if (ph === 1 && !anim && s.results && s.results[0]) {
                        anim = true; playBeep(400, 200, 'triangle'); await roll(s.results);
                        const myR = s.myResult, myB = s.myBets;
                        if (myB) {
                            const ret = myR ? myR.totalReturn : 0;
                            lastWin = ret - myB.totalBet;
                            records.unshift({ round: s.round, time: new Date().toLocaleTimeString(), dice: s.results.join(','), dealer: s.dealer || '无', bet: myB.totalBet, return: ret, result: lastWin >= 0 ? `赢${lastWin.toFixed(2)}` : `输${(-lastWin).toFixed(2)}` });
                        }
                        if (myR && myR.winDetails && Object.keys(myR.winDetails).length > 0) { playBeep(1200, 150, 'square'); await flashWin(myR.winDetails); }
                        else { for (let p in bets.single) bets.single[p] = 0; for (let k in bets.double) bets.double[k] = 0; ui(); }
                        try { const bal = await call('GET', '/user/' + encodeURIComponent(currentUser.account) + '/balance'); currentUser.balance = bal.balance; } catch (e) {}
                        for (let p in bets.single) bets.single[p] = 0; for (let k in bets.double) bets.double[k] = 0;
                        setTimeout(() => { anim = false; }, 1000);
                    }
                    if (grabbed && s.dealerProfit !== undefined) { document.getElementById('dealerEstimatedPL').innerText = s.dealerProfit.toFixed(2) + ' USDT'; }
                    try { const ol = await call('GET', '/online'); document.getElementById('fishOnlineNum').innerText = ol.count; } catch (e) {}
                } catch (e) { console.warn('poll', e); }
            }

            const grid = document.getElementById('fishPatternGrid');
            pn.forEach(p => {
                const div = document.createElement('div');
                div.className = 'fish-bet-card';
                div.innerHTML = `<div>${p}</div><div><span id="fishBet_${p}">0</span></div>`;
                div.onclick = async () => { if (!currentUser || anim) return; if (await place({ [p]: chip })) { bets.single[p] += chip; saveLast(); ui(); } };
                grid.appendChild(div);
            });
            const dgrid = document.getElementById('fishDoubleGrid');
            dc.forEach(c => {
                const k = c.join(',');
                const div = document.createElement('div');
                div.className = 'bet-card';
                div.innerHTML = `<div>${c[0]}+${c[1]}</div><div id="doubleBet_${k.replace(/,/g, '_')}">0</div>`;
                div.onclick = async () => { if (!currentUser || anim) return; if (await place(null, { [k]: chip })) { bets.double[k] += chip; saveLast(); ui(); } };
                dgrid.appendChild(div);
            });
            document.querySelectorAll('#fishChips .chip').forEach(c => {
                c.onclick = () => {
                    chip = parseInt(c.dataset.chip);
                    document.querySelectorAll('#fishChips .chip').forEach(cc => cc.classList.remove('selected'));
                    c.classList.add('selected');
                };
            });

            document.getElementById('fishClearBtn').addEventListener('click', doClear);
            document.getElementById('closeDealerBtn').onclick = () => { grabbed = false; document.getElementById('dealerPanel').style.display = 'none'; };

            function saveLast() { prevBet = { single: { ...bets.single }, double: { ...bets.double } }; }
            async function repeatLast() {
                if (!prevBet || anim) return;
                let s = {}, d = {};
                for (let p in prevBet.single) if (prevBet.single[p] > 0) s[p] = prevBet.single[p];
                for (let k in prevBet.double) if (prevBet.double[k] > 0) d[k] = prevBet.double[k];
                const tot = Object.values(s).reduce((a, b) => a + b, 0) + Object.values(d).reduce((a, b) => a + b, 0);
                if (tot <= 0 || tot > currentUser.balance) return;
                if (await place(s, d)) { bets.single = { ...prevBet.single }; bets.double = { ...prevBet.double }; ui(); }
            }
            document.getElementById('fishRepeatBtn').onclick = repeatLast;
            document.getElementById('fishGrabBtn').onclick = grab;
            document.getElementById('fishVipCard').onclick = showVipDetailModal;
            document.getElementById('fishBackLobbyBtn').onclick = () => { if (fishDestroy) fishDestroy(); renderLobby(); };
            document.getElementById('fishRulesBtn').onclick = () => {

                document.body.appendChild(m);
                m.querySelector('#closeRulesBtn').onclick = () => m.remove();
                m.addEventListener('click', e => { if (e.target === m) m.remove(); });

            document.getElementById('fishHistoryBtn').onclick = async () => {

                        return;
                    }
                    let html = '<div style="max-height:420px;overflow:auto;font-size:0.8rem;">';
                    html += `<table border="1" cellpadding="4" style="width:100%;border-collapse:collapse;color:#ffecb3;">
                        <tr style="background:#333;">
                            <th>${currentLang === 'zh' ? '局号' : 'รอบ'}</th>
                            <th>${currentLang === 'zh' ? '时间' : 'เวลา'}</th>
                            <th>${currentLang === 'zh' ? '庄家' : 'เจ้ามือ'}</th>

                        </tr>`;
                    list.forEach(r => {
                        html += `<tr>
                            <td>${r.round}</td>

                            <td>${r.dice}</td>

                    html += '</table></div><button id="closeHistBtn" class="auth-btn">' + (currentLang === 'zh' ? '关闭' : 'ปิด') + '</button>';
                    const modal = document.createElement('div'); modal.className = 'modal';
                    modal.innerHTML = `<div class="modal-content">${html}</div>`;
                    document.body.appendChild(modal);
                    modal.querySelector('#closeHistBtn').onclick = () => modal.remove();
                    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
                } catch (e) { toast(currentLang === 'zh' ? '获取记录失败' : 'โหลดประวัติไม่สำเร็จ', true); }
            };

            document.getElementById('fishRecordBtn').onclick = () => {
                if (!records || records.length === 0) {
                    const m = document.createElement('div'); m.className = 'modal';
                    m.innerHTML = `<div class="modal-content"><div style="text-align:center;padding:20px;color:#999;">${currentLang === 'zh' ? '暂无记录' : 'ไม่มีบันทึก'}</div><button id="closeRec" class="auth-btn">${currentLang === 'zh' ? '关闭' : 'ปิด'}</button></div>`;
                    document.body.appendChild(m);
                    m.querySelector('#closeRec').onclick = () => m.remove();
                    m.addEventListener('click', e => { if (e.target === m) m.remove(); });
                    return;
                }
                let html = '<div style="max-height:400px;overflow:auto;">';
                html += `<table border="1" cellpadding="4" style="width:100%;border-collapse:collapse;font-size:0.8rem;color:#ffecb3;">
                    <tr style="background:#333;">
                        <th>${currentLang === 'zh' ? '局号' : 'รอบ'}</th>
                        <th>${currentLang === 'zh' ? '时间' : 'เวลา'}</th>
                        <th>🎲${currentLang === 'zh' ? '骰子' : 'ลูกเต๋า'}</th>
                        <th>${currentLang === 'zh' ? '投注' : 'เดิมพัน'}</th>
                        <th>${currentLang === 'zh' ? '返奖' : 'รางวัล'}</th>
                        <th>${currentLang === 'zh' ? '净盈亏' : 'กำไร/ขาดทุน'}</th>
                    </tr>`;
                records.forEach(r => {
                    const round = r.round || '-';
                    const time = r.time || '-';
                    const dice = r.dice || '-';
                    const bet = (r.bet || 0).toFixed(2);
                    const retAmt = (r.return || 0).toFixed(2);
                    const net = (retAmt - bet).toFixed(2);
                    const netClass = parseFloat(net) >= 0 ? 'color:#0f0' : 'color:#f00';
                    html += `<tr>
                        <td>${round}</td>
                        <td>${time}</td>
                        <td>${dice}</td>
                        <td>${bet}</td>
                        <td>${retAmt}</td>
                        <td><span style="${netClass}">${parseFloat(net) >= 0 ? '+' + net : net}</span></td>
                    </tr>`;
                });
                html += '</table></div><button id="closeRec" class="auth-btn">' + (currentLang === 'zh' ? '关闭' : 'ปิด') + '</button>';
                const m = document.createElement('div'); m.className = 'modal'; m.innerHTML = `<div class="modal-content">${html}</div>`;
                document.body.appendChild(m);
                m.querySelector('#closeRec').onclick = () => m.remove();
                m.addEventListener('click', e => { if (e.target === m) m.remove(); });
            };

            saveLast(); ui(); timer = setInterval(poll, 1000); poll();
            fishDestroy = () => { clearInterval(timer); flashes.forEach(t => clearTimeout(t)); ct.innerHTML = ''; };
            return fishDestroy;
        }

        // ==================== 骰宝 (Dice) ====================
        let diceDestroy = null;
        function initDice(container) {
            if (diceDestroy) diceDestroy();
            container.innerHTML = `<div class="game-card">
            <div class="game-top-bar">
              <div class="user-vip-card" id="diceVipCard">
                <span>👤 ${currentUser?currentUser.account:'用户'}</span>
                <span class="vip-badge" id="vipBadgeDisplay">VIP${(currentUser&&currentUser.vip)?currentUser.vip.level:0}</span>
              </div>
              <div class="back-lobby-btn" id="diceBackLobbyBtn">🏠返回</div>
            </div>
            <div style="display:flex;gap:8px;"><div style="flex:1;text-align:center;">🏦 庄家<div id="diceBankerDisplay">${systemConfig.bankerBalance.toFixed(2)}</div></div><div style="flex:1;text-align:center;">🎲 总押注<div id="totalBetDice">0</div></div></div>
            <div class="countdown-area" id="countdownAreaDice">⏱️ 下注 <span id="countdownNumDice">25</span> s</div>
            <div class="dice-3d-area"><div class="dice-cube" id="dice1"></div><div class="dice-cube" id="dice2"></div><div class="dice-cube" id="dice3"></div></div>
            <div style="text-align:center;font-size:1.2rem;">总点数: <span id="totalPoints">3</span></div>
            <div><span>🎲 本局中奖: <span id="rollingWinNumber">0</span></span><span>📊 盈亏: <span id="diceProfitLoss">0</span></span></div>
            <div><button id="clearAllBtnDice" class="exec-btn">清空</button><button id="repeatBtnDice" class="exec-btn" disabled>续押</button><button id="refreshBtnDice" class="exec-btn">刷新</button></div>
            <div id="diceChips"><span class="chip" data-val="10">10</span><span class="chip" data-val="50">50</span><span class="chip selected" data-val="100">100</span><span class="chip" data-val="500">500</span><span class="chip" data-val="1000">1000</span></div>
            <div><strong>大小单双</strong></div><div style="display:flex;gap:8px;"><div class="bet-card" data-type="BIG">大<br><span id="bet_BIG">0</span></div><div class="bet-card" data-type="SMALL">小<br><span id="bet_SMALL">0</span></div><div class="bet-card" data-type="ODD">单<br><span id="bet_ODD">0</span></div><div class="bet-card" data-type="EVEN">双<br><span id="bet_EVEN">0</span></div></div>
            <div><strong>点数4-17</strong></div><div id="pointsGrid" class="points-grid"></div>
            <div><strong>围骰/豹子</strong></div><div id="trioGrid" class="trio-grid"></div>
            <button id="diceHistoryBtn" class="exec-btn">📜 记录</button>
          </div>`;

            for (let i = 4; i <= 17; i++) {
                document.getElementById('pointsGrid').innerHTML += `<div class="bet-card point-card" data-point="${i}">${i}点<br><span id="bet_${i}">0</span></div>`;
            }
            for (let i = 1; i <= 6; i++) {
                document.getElementById('trioGrid').innerHTML += `<div class="bet-card trio-card" data-type="TRIPLE_${i}">${i}围<br><span id="bet_TRIPLE_${i}">0</span></div>`;
            }
            document.getElementById('trioGrid').innerHTML += `<div class="bet-card trio-card" data-type="ALL_TRIPLE">豹子<br><span id="bet_ALL_TRIPLE">0</span></div>`;

            function buildDiceCube(d) {
                d.innerHTML = '';
                const tz = getDiceTranslateZ();
                const transforms = [
                    `translateZ(${tz}px)`,
                    `rotateY(180deg) translateZ(${tz}px)`,
                    `rotateY(90deg) translateZ(${tz}px)`,
                    `rotateY(-90deg) translateZ(${tz}px)`,
                    `rotateX(90deg) translateZ(${tz}px)`,
                    `rotateX(-90deg) translateZ(${tz}px)`
                ];
                const pipHtml = {
                    1: '<div class="pip pip-center"></div>',
                    2: '<div class="pip pip-tl"></div><div class="pip pip-br"></div>',
                    3: '<div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div>',
                    4: '<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>',
                    5: '<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-mid"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>',
                    6: '<div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div>'
                };
                const faces = [1, 6, 4, 3, 2, 5]; // front, back, right, left, top, bottom
                for (let i = 0; i < 6; i++) {
                    const fd = document.createElement('div');
                    fd.className = 'dice-face';
                    fd.style.transform = transforms[i];
                    fd.innerHTML = pipHtml[faces[i]];
                    d.appendChild(fd);
                }
                d.style.transform = `rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`;
            }

            function setCubeValue(d, val) {
                let rx = 0, ry = 0;
                if (val === 1) { rx = 0; ry = 0; }
                else if (val === 2) { rx = -90; ry = 0; }
                else if (val === 3) { rx = 0; ry = 90; }
                else if (val === 4) { rx = 0; ry = -90; }
                else if (val === 5) { rx = 90; ry = 0; }
                else if (val === 6) { rx = 180; ry = 0; }
                const extraX = 360 * (2 + Math.floor(Math.random() * 2));
                const extraY = 360 * (2 + Math.floor(Math.random() * 2));
                d.style.transition = 'transform 0.5s cubic-bezier(0.2,0.9,0.4,1.1)';
                d.style.transform = `rotateX(${rx + extraX}deg) rotateY(${ry + extraY}deg)`;
            }

            let diceEls = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
            diceEls.forEach(buildDiceCube);

            let bets = { BIG: 0, SMALL: 0, ODD: 0, EVEN: 0 };
            for (let i = 4; i <= 17; i++) bets[i] = 0;
            for (let i = 1; i <= 6; i++) bets[`TRIPLE_${i}`] = 0;
            bets['ALL_TRIPLE'] = 0;
            let selectedChip = 100, isBetLocked = false, countdownInterval = null, lastBetSnapshot = null;
            let diceFlashTimeouts = [], diceFlashActiveSpans = new Set();
            let gameRecordsDice = [];

            function clearDiceFlashTimeouts() {
                diceFlashTimeouts.forEach(t => clearTimeout(t));
                diceFlashTimeouts = [];
                diceFlashActiveSpans.clear();
            }

            function updateUIDice(skipFlashing = false) {
                if (!skipFlashing) {
                    for (let k in bets) {
                        let el = document.getElementById(`bet_${k}`);
                        if (el && !diceFlashActiveSpans.has(`bet_${k}`)) el.innerText = bets[k];
                    }
                } else {
                    for (let k in bets) { let el = document.getElementById(`bet_${k}`); if (el) el.innerText = bets[k]; }
                }
                document.getElementById('totalBetDice').innerText = Object.values(bets).reduce((a, b) => a + b, 0);
                document.getElementById('diceBankerDisplay').innerText = systemConfig.bankerBalance.toFixed(2);
                if (currentUser) document.getElementById("userBalanceDisplay").innerText = currentUser.balance.toFixed(2);
                document.getElementById('repeatBtnDice').disabled = isBetLocked || !lastBetSnapshot;
                refreshVipDisplay();
            }

            function saveLastBet() { lastBetSnapshot = JSON.parse(JSON.stringify(bets)); }

            function getResultInfo(d1, d2, d3) {
                let total = d1 + d2 + d3;
                let types = [];
                if (total >= 11 && total <= 17) types.push('BIG');
                else types.push('SMALL');
                if (total % 2 === 1) types.push('ODD');
                else types.push('EVEN');
                if (d1 === d2 && d2 === d3) { types.push(`TRIPLE_${d1}`); types.push('ALL_TRIPLE'); }
                return { total, types };
            }

            async function addBetDice(type) {
                if (isBetLocked || selectedChip > (currentUser ? currentUser.balance : 0)) return;
                await gameSettle(selectedChip, 0);
                bets[type] += selectedChip;
                updateUIDice();
                saveLastBet();
            }

            async function clearAllBetsDice() {
                if (isBetLocked) return;
                let total = Object.values(bets).reduce((a, b) => a + b, 0);
                if (total > 0) await gameSettle(-total, 0);
                for (let k in bets) bets[k] = 0;
                updateUIDice();
                saveLastBet();
            }

            async function repeatLastBetDice() {
                if (isBetLocked || !lastBetSnapshot) return;
                let need = Object.values(lastBetSnapshot).reduce((a, b) => a + b, 0);
                if (need > (currentUser ? currentUser.balance : 0)) return;
                let oldTotal = Object.values(bets).reduce((a, b) => a + b, 0);
                if (oldTotal > 0) await gameSettle(-oldTotal, 0);
                for (let k in bets) bets[k] = 0;
                for (let k in lastBetSnapshot) bets[k] = lastBetSnapshot[k];
                await gameSettle(need, 0);
                updateUIDice();
            }

            async function startAutoDrawDice() {
                if (isBetLocked) return;
                let totalBetVal = Object.values(bets).reduce((a, b) => a + b, 0);
                isBetLocked = true;
                if (countdownInterval) clearInterval(countdownInterval);
                clearDiceFlashTimeouts();
                updateUIDice();
                let d1 = Math.floor(Math.random() * 6) + 1, d2 = Math.floor(Math.random() * 6) + 1, d3 = Math.floor(Math.random() * 6) + 1;
                let { total, types } = getResultInfo(d1, d2, d3);
                let winAmount = 0, winDetails = {};
                let effectiveAdj = getEffectiveAdjustFactor();
                if (totalBetVal > 0) {
                    const oddsMap = { 4:60, 5:30, 6:18, 7:12, 8:8, 9:7, 10:6, 11:6, 12:7, 13:8, 14:12, 15:18, 16:30, 17:60 };
                    if (types.includes('BIG') && bets.BIG) { let w = bets.BIG * 2 * effectiveAdj; winAmount += w; winDetails['BIG'] = bets.BIG + w; }
                    if (types.includes('SMALL') && bets.SMALL) { let w = bets.SMALL * 2 * effectiveAdj; winAmount += w; winDetails['SMALL'] = bets.SMALL + w; }
                    if (types.includes('ODD') && bets.ODD) { let w = bets.ODD * 2 * effectiveAdj; winAmount += w; winDetails['ODD'] = bets.ODD + w; }
                    if (types.includes('EVEN') && bets.EVEN) { let w = bets.EVEN * 2 * effectiveAdj; winAmount += w; winDetails['EVEN'] = bets.EVEN + w; }
                    if (bets[total]) { let w = bets[total] * oddsMap[total] * effectiveAdj; winAmount += w; winDetails[total] = bets[total] + w; }
                    for (let t of types) {
                        if (t.startsWith('TRIPLE_') && bets[t]) { let w = bets[t] * 150 * effectiveAdj; winAmount += w; winDetails[t] = bets[t] + w; }
                        if (t === 'ALL_TRIPLE' && bets.ALL_TRIPLE) { let w = bets.ALL_TRIPLE * 30 * effectiveAdj; winAmount += w; winDetails['ALL_TRIPLE'] = bets.ALL_TRIPLE + w; }
                    }
                }
                let profit = winAmount - totalBetVal;
                let steps = 20;
                for (let i = 0; i < steps; i++) {
                    setTimeout(() => {
                        diceEls.forEach(d => { d.style.transition = 'transform 0.08s linear'; setCubeValue(d, Math.floor(Math.random() * 6) + 1); });
                    }, i * 100);
                }
                setTimeout(async () => {
                    for (let i = 0; i < 3; i++) setCubeValue(diceEls[i], [d1, d2, d3][i]);
                    document.getElementById('totalPoints').innerText = total;
                    gameRecordsDice.unshift({ time: new Date().toLocaleTimeString(), dice: `${d1},${d2},${d3}`, result: winAmount > 0 ? `赢${winAmount.toFixed(2)}` : `输${totalBetVal.toFixed(2)}`, profit });
                    if (gameRecordsDice.length > 50) gameRecordsDice.pop();
                    document.getElementById('diceProfitLoss').innerText = profit.toFixed(2);
                    document.getElementById('rollingWinNumber').innerText = winAmount.toFixed(2);
                    await gameSettle(totalBetVal, winAmount);
                    for (let k in bets) bets[k] = 0;
                    saveLastBet();
                    diceFlashActiveSpans.clear();
                    for (let k in bets) {
                        let el = document.getElementById(`bet_${k}`);
                        if (el) {
                            if (winDetails[k] !== undefined) {
                                el.innerText = winDetails[k].toFixed(2);
                                diceFlashActiveSpans.add(`bet_${k}`);
                                let card = el.closest('.bet-card');
                                if (card) card.classList.add('win-flash');
                                let tid = setTimeout(() => { if (card) card.classList.remove('win-flash'); el.innerText = "0"; diceFlashActiveSpans.delete(`bet_${k}`); }, 4000);
                                diceFlashTimeouts.push(tid);
                            } else { el.innerText = "0"; }
                        }
                    }
                    updateUIDice();
                    let settleTid = setTimeout(() => { diceFlashActiveSpans.clear(); isBetLocked = false; updateUIDice(); startCountdownDice(25); }, 4000);
                    diceFlashTimeouts.push(settleTid);
                }, steps * 100 + 100);
            }

                if (result === 'PLAYER' && bets.PLAYER > 0) { let w = bets.PLAYER * 2 * effectiveAdj; winAmount += w; winDetails['PLAYER'] = bets.PLAYER + w; }
                if (result === 'BANKER' && bets.BANKER > 0) { let w = bets.BANKER * 2 * effectiveAdj; winAmount += w; winDetails['BANKER'] = bets.BANKER + w; }
                if (result === 'TIE' && bets.TIE > 0) { let w = bets.TIE * 8 * effectiveAdj; winAmount += w; winDetails['TIE'] = bets.TIE + w; }
                if (playerTypeObj.type === '牛牛' && bets.NIU_NIU > 0) { let w = bets.NIU_NIU * (playerTypeObj.multiplier + 1) * effectiveAdj; winAmount += w; winDetails['NIU_NIU'] = bets.NIU_NIU + w; }
                if (playerTypeObj.type === '五花牛' && bets.WU_HUA > 0) { let w = bets.WU_HUA * (playerTypeObj.multiplier + 1) * effectiveAdj; winAmount += w; winDetails['WU_HUA'] = bets.WU_HUA + w; }
                let profit = winAmount - totalBet;
                await gameSettle(totalBet, winAmount);
                document.getElementById('niuWinAmount').innerText = winAmount.toFixed(2);
                document.getElementById('niuProfitLoss').innerText = profit.toFixed(2);
                let resultText = result === 'PLAYER' ? '闲家赢' : (result === 'BANKER' ? '庄家赢' : '和局');
                document.getElementById('niuResultMsg').innerHTML = `${playerTypeObj.display} vs ${bankerTypeObj.display}<br>${resultText} ${profit>0?' 赢得 '+profit.toFixed(2):''}`;
                let resultDiv = document.getElementById('niuResult3D');
                resultDiv.style.visibility = 'visible'; resultDiv.style.backgroundColor = '#ffaa33'; resultDiv.style.color = '#2a1a0a'; resultDiv.innerText = resultText;
                setTimeout(() => { resultDiv.style.visibility = 'hidden'; }, 3000);
                for (let k in bets) bets[k] = 0;
                saveLastBet();
                niuFlashActiveSpans.clear();
                for (let bt of ['PLAYER','BANKER','TIE','NIU_NIU','WU_HUA']) {
                    let sp = document.getElementById(`bet_${bt}`);
                    if (sp) {
                        if (winDetails[bt] !== undefined) {
                            sp.innerText = winDetails[bt].toFixed(2);
                            niuFlashActiveSpans.add(`bet_${bt}`);
                            let card = sp.closest('.bet-card'); if (card) card.classList.add('win-flash');
                            let tid = setTimeout(() => { if (card) card.classList.remove('win-flash'); sp.innerText = "0"; niuFlashActiveSpans.delete(`bet_${bt}`); }, 4000);
                            niuFlashTimeouts.push(tid);
                        } else { sp.innerText = "0"; }
                    }
                }
                updateUI();
                gameRecordsNiu.unshift({ time: new Date().toLocaleTimeString(), result: recordStr });
                if (gameRecordsNiu.length > 50) gameRecordsNiu.pop();
                let settleTid = setTimeout(() => { niuFlashActiveSpans.clear(); isRolling = false; updateUI(); startCountdown(25); }, 4000);
                niuFlashTimeouts.push(settleTid);
            }

            function startCountdown(sec) {
                if (countdownTimer) clearInterval(countdownTimer);
                remainingSec = sec;
                document.getElementById('niuCountdownNum').innerText = remainingSec;
                countdownTimer = setInterval(() => {
                    if (remainingSec <= 1) { clearInterval(countdownTimer); countdownTimer = null; if (!isRolling) autoDrawGame(); }
                    else { remainingSec--; document.getElementById('niuCountdownNum').innerText = remainingSec; }
                }, 1000);
            }

            document.querySelectorAll('#niuChips .chip').forEach(c => { c.onclick = () => { selectedChip = parseInt(c.dataset.chip); document.querySelectorAll('#niuChips .chip').forEach(cc => cc.classList.remove('selected')); c.classList.add('selected'); playBeep(800, 50, 'sine'); }; });
            document.querySelectorAll('.bet-card[data-bet]').forEach(c => { c.onclick = () => addBet(c.dataset.bet); });
            document.getElementById('niuClearBtn').onclick = clearAllBets;
            document.getElementById('niuRepeatBtn').onclick = repeatLastBet;
            document.getElementById('niuRefreshBtn').onclick = () => updateUI();
            document.getElementById('niuRecordBtn').onclick = () => {
                if (gameRecordsNiu.length === 0) return;
                let html = '<div style="max-height:200px; overflow:auto;">' + gameRecordsNiu.map(r => `<div>${r.time} ${r.result}</div>`).join('') + '</div><button id="closeRec" class="auth-btn">关闭</button>';
                let m = document.createElement('div'); m.className = 'modal'; m.innerHTML = `<div class="modal-content">${html}</div>`;
                document.body.appendChild(m); m.querySelector('#closeRec').onclick = () => m.remove();
            };
            document.getElementById('niuVipCard').onclick = showVipDetailModal;
            document.getElementById('niuBackLobbyBtn').onclick = () => { if (niuNiuDestroy) niuNiuDestroy(); renderLobby(); };

            updateUI(); startCountdown(25); saveLastBet();
            niuNiuDestroy = () => { if (countdownTimer) clearInterval(countdownTimer); clearNiuFlashTimeouts(); container.innerHTML = ''; };
            return niuNiuDestroy;
        }

        // ==================== 大厅与路由 ====================
        function renderLobby() {
            if (fishDestroy) { fishDestroy(); fishDestroy = null; }
            if (diceDestroy) { diceDestroy(); diceDestroy = null; }
            if (dragonTigerDestroy) { dragonTigerDestroy(); dragonTigerDestroy = null; }
            if (niuNiuDestroy) { niuNiuDestroy(); niuNiuDestroy = null; }
            if (!currentUser) { renderAuth(); return; }
            startHeartbeat();
            document.getElementById('app').innerHTML = `<div style="text-align:center;padding:16px;background:linear-gradient(135deg,#2a1e12,#1a120b);border-bottom:2px solid #ffaa33"><h1 id="lobbyTitle">${t('lobbyTitle')}</h1><p>${t('chooseGame')}</p></div>
            <div class="user-section">
              <div class="user-info-row">
                <span>📱${currentUser.account}</span>
                <span>💰${t('balance')}: <span id="userBalanceDisplay">${currentUser.balance.toFixed(2)}</span></span>
                <div class="btn-group">
                  <button id="vipBtn" class="btn-sm">👑${t('vip')}${currentUser.vip?.level || 0}</button>
                  <button id="svcBtn" class="btn-sm">📞${t('service')}</button>
                  <button id="reportBtn" class="btn-sm">📊${t('report')}</button>
                  <button id="logoutBtn" class="btn-sm">🚪${t('logout')}</button>
                  <button id="themeBtn" class="theme-switch">🌙夜间</button>
                  <button id="langSwitchBtn" class="lang-switch">${currentLang === 'zh' ? 'ไทย' : '中文'}</button>
                </div>
              </div>
              <div style="margin-top:8px">
                <button id="rechargeBtn" class="charge-btn">💎${t('recharge')}</button>
                <button id="withdrawBtn" class="withdraw-btn">💰${t('withdraw')}</button>
              </div>
            </div>
            <div class="game-grid">
              <div class="game-card-item" data-game="fish"><div class="game-name">${t('fishGame')}</div><div class="game-desc">${t('fishDesc')}</div></div>
              <div class="game-card-item" data-game="dice"><div class="game-name">3D骰宝</div><div class="game-desc">自动开奖·大小单双</div></div>
              <div class="game-card-item" data-game="dragonTiger"><div class="game-name">龙虎斗</div><div class="game-desc">龙虎斗</div></div>
              <div class="game-card-item" data-game="game4"><div class="game-name">百家乐牛牛</div><div class="game-desc">闲庄和·特殊赔率</div></div>
            </div>`;
            document.getElementById('logoutBtn').onclick = () => { stopHeartbeat(); currentUser = null; localStorage.removeItem('curr_acc'); renderAuth(); };
            document.getElementById('svcBtn').onclick = showServiceModal;
            document.getElementById('rechargeBtn').onclick = applyRecharge;
            document.getElementById('withdrawBtn').onclick = applyWithdraw;
            document.getElementById('vipBtn').onclick = showVipDetailModal;
            document.getElementById('reportBtn').onclick = showReport;
            document.getElementById('langSwitchBtn').onclick = () => { setLang(currentLang === 'zh' ? 'th' : 'zh'); };
            const themeBtn = document.getElementById('themeBtn');
            const savedTheme = localStorage.getItem('neon_theme');
            if (savedTheme === 'light') { document.body.classList.add('light-mode'); themeBtn.innerHTML = '☀️日间'; } else themeBtn.innerHTML = '🌙夜间';
            themeBtn.onclick = () => { document.body.classList.toggle('light-mode'); const l = document.body.classList.contains('light-mode'); localStorage.neon_theme = l ? 'light' : 'dark'; themeBtn.innerHTML = l ? '☀️日间' : '🌙夜间'; };
            document.querySelectorAll('.game-card-item').forEach(el => el.onclick = () => switchGame(el.dataset.game));
            let clicks = 0;
            document.getElementById('lobbyTitle').onclick = () => { clicks++; if (clicks >= 5) { clicks = 0; openAdmin(); } setTimeout(() => clicks = 0, 2000); };
            refreshVipDisplay();
        }

        function switchGame(gid) {
            // 销毁当前游戏
            if (fishDestroy) { fishDestroy(); fishDestroy = null; }
            if (diceDestroy) { diceDestroy(); diceDestroy = null; }
            if (dragonTigerDestroy) { dragonTigerDestroy(); dragonTigerDestroy = null; }
            if (niuNiuDestroy) { niuNiuDestroy(); niuNiuDestroy = null; }
            document.getElementById('app').innerHTML = '<div style="padding:12px"><div id="singleGameContainer"></div></div>';
            const gc = document.getElementById('singleGameContainer');
            const inits = { fish: initFish, dice: initDice, dragonTiger: initDragonTiger, game4: initGame4 };
            if (inits[gid]) {
                const destroyFn = inits[gid](gc);
                // 将返回的销毁函数存储到对应变量
                if (gid === 'fish') fishDestroy = destroyFn;
                else if (gid === 'dice') diceDestroy = destroyFn;
                else if (gid === 'dragonTiger') dragonTigerDestroy = destroyFn;
                else if (gid === 'game4') niuNiuDestroy = destroyFn;
            }
        }

        // ==================== 登录/注册 ====================
        async function login(acc, pwd) {
            try {
                const r = await call('POST', '/login', { account: acc, password: pwd, deviceId: DEV });
                if (r.success) {
                    currentUser = r.user;
                    if (!currentUser.vip) currentUser.vip = { level: 0, totalWager: 0 };
                    localStorage.curr_acc = acc;
                    startHeartbeat();
                    return r;
                } else {
                    toast(r.msg || '登录失败', true);
                    return { success: false };
                }
            } catch (e) {
                toast(e.message || '网络错误，请重试', true);
                return { success: false };
            }
        }

        async function register(acc, pwd, ref, phone, email, captchaToken, captchaInput) {
            try {
                const r = await call('POST', '/register', {
                    account: acc, password: pwd, referralCode: ref,
                    phone: phone || '', email: email || '',
                    captchaToken, captchaInput
                });
                currentUser = r.user;
                if (!currentUser.vip) currentUser.vip = { level: 0, totalWager: 0 };
                localStorage.curr_acc = acc;
                startHeartbeat();
                return r;
            } catch (e) {
                toast(e.message, true);
                return { success: false };
            }
        }

        // ==================== 认证界面 ====================
        function renderAuth() {
            stopHeartbeat();
            const savedAcc = localStorage.getItem('saved_account');
            const savedPwd = localStorage.getItem('saved_password');
            const rememberMe = localStorage.getItem('remember_me') === 'true';
            document.getElementById('app').innerHTML = `<div class="auth-panel" style="background:linear-gradient(145deg,#1a1a2e,#0d0d1a);border:1px solid #ffaa33;border-radius:24px;padding:30px 24px;margin:30px 16px;">
            <div style="text-align:center;margin-bottom:20px;"><h2 style="font-size:2rem;background:linear-gradient(135deg,#ffd966,#ff884d);-webkit-background-clip:text;color:transparent;margin:0;">${t('title')}</h2><p style="color:#ffd966;margin-top:4px;">${t('subtitle')}</p></div>
            <div id="authForm">
              <div style="display:flex;gap:0;margin-bottom:16px;">
                <button id="loginTab" class="auth-tab active" style="flex:1;background:transparent;border:1px solid #ffaa33;border-bottom:none;color:#ffaa33;padding:10px;border-radius:20px 20px 0 0;font-weight:bold;">${t('login')}</button>
                <button id="regTab" class="auth-tab" style="flex:1;background:transparent;border:1px solid #ffaa33;border-bottom:none;color:#888;padding:10px;border-radius:20px 20px 0 0;">${t('register')}</button>
              </div>
              <div id="loginForm">
                <input id="loginAccount" class="auth-input" style="margin-bottom:12px;" placeholder="${t('accountPhoneEmail')}" value="${savedAcc && rememberMe ? savedAcc : ''}">
                <input id="loginPassword" type="password" class="auth-input" style="margin-bottom:12px;" placeholder="${t('password')}" value="${savedPwd && rememberMe ? savedPwd : ''}">
                <div style="display:flex;align-items:center;margin-bottom:16px;color:#ffd966;font-size:0.85rem;">
                  <input type="checkbox" id="rememberMe" style="accent-color:#ffaa33;width:16px;height:16px;margin-right:6px;" ${rememberMe ? 'checked' : ''}>
                  <label for="rememberMe" style="cursor:pointer;">${t('remember')}</label>
                </div>
                <button id="loginBtn" class="auth-btn" style="background:linear-gradient(135deg,#ffaa33,#ff884d);width:100%;">${t('login')}</button>
              </div>
              <div id="regForm" style="display:none;">
                <input id="regAccount" class="auth-input" style="margin-bottom:8px;" placeholder="${t('setAccount')}">
                <input id="regPhone" class="auth-input" style="margin-bottom:8px;" placeholder="${t('phoneRequired')}">
                <input id="regEmail" class="auth-input" style="margin-bottom:8px;" placeholder="${t('emailOptional')}">
                <input id="regPassword" type="password" class="auth-input" style="margin-bottom:8px;" placeholder="${t('setPassword')}">
                <input id="regReferral" class="auth-input" style="margin-bottom:12px;" placeholder="${t('referralCode')}">
                <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">
                  <input id="captchaInput" class="auth-input" style="width:100px;margin:0;" placeholder="${t('captcha')}" maxlength="4">
                  <img id="captchaImg" src="" alt="Captcha" style="height:42px;border-radius:8px;cursor:pointer;" onclick="loadCaptcha()" title="点击刷新">
                </div>
                <button id="registerBtn" class="auth-btn" style="background:linear-gradient(135deg,#ff884d,#cc5500);width:100%;">${t('register')}</button>
              </div>
            </div>
            <div class="auth-note" style="margin-top:16px;font-size:0.7rem;color:#999;">${t('referralNote')}</div>
          </div>`;

            let captchaToken = '', captchaSvg = '';
            window.loadCaptcha = async function() {
                try {
                    const res = await call('GET', '/captcha');
                    captchaToken = res.token;
                    captchaSvg = 'data:image/svg+xml;base64,' + res.svg;
                    const img = document.getElementById('captchaImg');
                    if (img) img.src = captchaSvg;
                } catch (e) {}
            };

            document.getElementById('loginTab').onclick = () => {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('regForm').style.display = 'none';
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('regTab').classList.remove('active');
            };
            document.getElementById('regTab').onclick = () => {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('regForm').style.display = 'block';
                document.getElementById('regTab').classList.add('active');
                document.getElementById('loginTab').classList.remove('active');
                window.loadCaptcha();
            };
            document.getElementById('loginBtn').onclick = async () => {
                const a = document.getElementById('loginAccount').value.trim();
                const p = document.getElementById('loginPassword').value;
                const rem = document.getElementById('rememberMe').checked;
                if (!a || !p) { toast(t('fillAll'), true); return; }
                const res = await login(a, p);
                if (res.success) {
                    if (rem) {
                        localStorage.setItem('saved_account', a);
                        localStorage.setItem('saved_password', p);
                        localStorage.setItem('remember_me', 'true');
                    } else {
                        localStorage.removeItem('saved_account');
                        localStorage.removeItem('saved_password');
                        localStorage.setItem('remember_me', 'false');
                    }
                    renderLobby();
                } else toast(res.msg, true);
            };
            document.getElementById('registerBtn').onclick = async () => {
                const account = document.getElementById('regAccount').value.trim();
                const phone = document.getElementById('regPhone').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value;
                const referral = document.getElementById('regReferral').value.trim();
                const captcha = document.getElementById('captchaInput').value.trim();
                if (!account || !password || !referral || !captcha) { toast(t('fillAll'), true); return; }
                if (!phone && !email) { toast(t('phoneOrEmail'), true); return; }
                const res = await register(account, password, referral, phone, email, captchaToken, captcha);
                if (res.success) {
                    toast(t('regSuccess'));
                    renderLobby();
                } else {
                    toast(res.msg || t('regSuccess'), true);
                    window.loadCaptcha();
                }
            };
            // 初始加载验证码
            window.loadCaptcha();
        }

        // ==================== 管理员面板 (点击标题5次) ====================
        async function openAdmin() {
            const pwd = prompt('管理员密码');
            if (pwd !== 'guowang2026') return;
            let html = `<div class="modal-content" style="max-width:720px;background:linear-gradient(145deg,#1e1e36,#0a0a14);border:1px solid #ffaa33;"><h3 style="text-align:center;color:#ffaa33;">🔧 管理员面板</h3><hr style="border-color:#ffaa33;"><div style="margin:12px 0;"><strong>🏦 庄家资金池：</strong><span id="adminBanker">加载中...</span></div><div style="margin:12px 0;"><strong>👤 用户管理</strong><div class="row" style="margin-top:6px;"><select id="adminUserSelect" style="flex:1;"><option>加载中...</option></select><input id="adminAmt" type="number" placeholder="金额" style="width:100px;"><button id="adminAddBtn">上分</button><button id="adminSubBtn" class="danger">下分</button></div></div><div style="margin:12px 0;"><strong>💎 充值审核 <span id="rechargeCount" style="background:#ffaa33;color:#000;padding:2px 8px;border-radius:10px;">0</span></strong><div id="rechargeList" style="max-height:150px;overflow:auto;background:rgba(0,0,0,0.3);border-radius:8px;padding:8px;margin-top:4px;">加载中...</div></div><div style="margin:12px 0;"><strong>💰 提现审核 <span id="withdrawCount" style="background:#ffaa33;color:#000;padding:2px 8px;border-radius:10px;">0</span></strong><div id="withdrawList" style="max-height:150px;overflow:auto;background:rgba(0,0,0,0.3);border-radius:8px;padding:8px;margin-top:4px;">加载中...</div></div><button id="closeAdminBtn" class="auth-btn" style="margin-top:12px;">关闭</button></div>`;
            const m = document.createElement('div'); m.className = 'modal'; m.innerHTML = html; document.body.appendChild(m);
            m.querySelector('#closeAdminBtn').onclick = () => m.remove();
            m.addEventListener('click', e => { if (e.target === m) m.remove(); });
            let users = [], recharges = [], withdraws = [];
            async function refreshPanel() {
                try {
                    if (apiOk) {
                        const [uRes, rRes, wRes] = await Promise.all([
                            call('GET', '/users'),
                            call('GET', '/recharges/pending'),
                            call('GET', '/withdraws/pending')
                        ]);
                        users = uRes; recharges = rRes; withdraws = wRes;
                    }
                } catch (e) { toast('加载失败', true); }
                document.getElementById('adminBanker').innerText = systemConfig.bankerBalance.toFixed(2) + ' USDT';
                const opts = users.map(u => `<option value="${u.account}">${u.account} (${u.balance.toFixed(2)})</option>`).join('');
                document.getElementById('adminUserSelect').innerHTML = opts || '<option>暂无用户</option>';
                const pr = recharges.filter(o => o.status === 'pending');
                document.getElementById('rechargeCount').innerText = pr.length;
                document.getElementById('rechargeList').innerHTML = pr.length === 0 ? '<span style="color:#999;">无待审核</span>' : pr.map(o => `<div style="display:flex;justify-content:space-between;padding:4px 0;"><span>${o.account} 充值 ${o.amount}</span><div><button class="appRech" data-id="${o.id}">✅确认</button><button class="rejRech danger" data-id="${o.id}">❌拒绝</button></div></div>`).join('');
                document.querySelectorAll('.appRech').forEach(b => b.onclick = async () => { await call('PUT', '/recharge/' + b.dataset.id, { status: 'approved' }); refreshPanel(); });
                document.querySelectorAll('.rejRech').forEach(b => b.onclick = async () => { await call('PUT', '/recharge/' + b.dataset.id, { status: 'rejected' }); refreshPanel(); });
                const pw = withdraws.filter(o => o.status === 'pending');
                document.getElementById('withdrawCount').innerText = pw.length;
                document.getElementById('withdrawList').innerHTML = pw.length === 0 ? '<span style="color:#999;">无待审核</span>' : pw.map(o => `<div style="display:flex;justify-content:space-between;padding:4px 0;"><span>${o.account} 提现 ${o.amount}</span><div><button class="appWith" data-id="${o.id}">✅已打款</button><button class="rejWith danger" data-id="${o.id}">❌拒绝</button></div></div>`).join('');
                document.querySelectorAll('.appWith').forEach(b => b.onclick = async () => { await call('PUT', '/withdraw/' + b.dataset.id, { status: 'approved' }); refreshPanel(); });
                document.querySelectorAll('.rejWith').forEach(b => b.onclick = async () => { await call('PUT', '/withdraw/' + b.dataset.id, { status: 'rejected' }); refreshPanel(); });
            }
            document.getElementById('adminAddBtn').onclick = async () => {
                const acc = document.getElementById('adminUserSelect').value;
                const amt = parseFloat(document.getElementById('adminAmt').value);
                if (!acc || isNaN(amt) || amt <= 0) return;
                const u = users.find(u => u.account === acc);
                if (u) { u.balance += amt; await call('PUT', '/user/' + encodeURIComponent(acc) + '/balance', { balance: u.balance, admin: true }); refreshPanel(); }
            };
            document.getElementById('adminSubBtn').onclick = async () => {
                const acc = document.getElementById('adminUserSelect').value;
                const amt = parseFloat(document.getElementById('adminAmt').value);
                if (!acc || isNaN(amt) || amt <= 0) return;
                const u = users.find(u => u.account === acc);
                if (u && u.balance >= amt) { u.balance -= amt; await call('PUT', '/user/' + encodeURIComponent(acc) + '/balance', { balance: u.balance, admin: true }); refreshPanel(); }
            };
            refreshPanel();
        }

        // ==================== 初始化 ====================
        (async function init() {
            await chkApi();
            const saved = localStorage.curr_acc;
            if (saved && apiOk) {
                try {
                    const d = await call('GET', '/user/' + encodeURIComponent(saved) + '/profile');
                    currentUser = d.user;
                    if (!currentUser.vip) currentUser.vip = { level: 0, totalWager: 0 };
                    // 应用保存的语言设置
                    const savedLang = localStorage.getItem('lang') || 'zh';
                    setLang(savedLang);
                    startHeartbeat();
                    renderLobby();
                } catch (e) {
                    renderAuth();
                }
            } else {
                const savedLang = localStorage.getItem('lang') || 'zh';
                setLang(savedLang);
                renderAuth();
            }
        })();
    </script>
