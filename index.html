<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>三游戏大厅 · 至尊骰宝 + 葫芦鱼 + 龙虎斗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0f0e0c;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 12px;
            color: #ffe6c7;
        }
        #app {
            max-width: 560px;
            margin: 0 auto;
            background: #1e1b16;
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        /* 公共样式 */
        .auth-panel, .user-section, .game-nav { padding: 12px 16px; }
        .game-nav {
            display: flex;
            gap: 8px;
            background: #2a241e;
            border-radius: 60px;
            margin: 8px 12px;
        }
        .game-tab {
            flex: 1;
            text-align: center;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #dbbc8c;
            cursor: pointer;
            transition: 0.2s;
        }
        .game-tab.active {
            background: #d49c3f;
            color: #1f1a12;
            box-shadow: inset 0 1px 3px #ffeaac, 0 2px 6px black;
        }
        .user-section {
            background: #1f1711;
            border-radius: 32px;
            margin: 12px;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        #userBalanceDisplay {
            font-size: 1.4rem;
            font-weight: 900;
            color: #ffcc44;
            background: #0a0705;
            padding: 0 12px;
            border-radius: 50px;
        }
        .charge-btn, .withdraw-btn {
            background: #3f2a1a;
            border-radius: 40px;
            padding: 6px 14px;
            border: none;
            color: #ffda99;
            font-weight: bold;
            cursor: pointer;
        }
        .logout-btn, .service-btn {
            background: #2a1f16;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            border: none;
            color: #ffdd99;
            cursor: pointer;
        }
        .charge-withdraw-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        /* 至尊骰宝盒子布局 (略，与之前相同) */
        .dice-wrapper .points-grid,
        .dice-wrapper .trio-grid,
        .dice-wrapper .special-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 8px;
            margin: 10px 0;
        }
        .dice-wrapper .bet-card {
            background: linear-gradient(145deg, #2c241c, #1f1a14);
            border-radius: 20px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 163, 115, 0.4);
        }
        .dice-wrapper .bet-card:active { transform: scale(0.96); background: #3a2f24; }
        .dice-wrapper .bet-name { font-weight: bold; font-size: 0.85rem; color: #ffdfb3; }
        .dice-wrapper .bet-odds { font-size: 0.7rem; color: #ffb347; background: rgba(0,0,0,0.4); display: inline-block; padding: 0px 6px; border-radius: 40px; margin-top: 2px; }
        .dice-wrapper .bet-amount { font-size: 1rem; font-weight: 800; background: #00000066; border-radius: 40px; margin-top: 5px; padding: 2px 0; color: #f7d44a; }
        .chips, .fish-chips, .game3-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 12px 0;
        }
        .chip {
            background: radial-gradient(circle at 30% 20%, #f5b042, #c46f1a);
            width: 65px;
            padding: 8px 0;
            text-align: center;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #2c1a0a;
            box-shadow: 0 5px 0 #7a3e0e;
            cursor: pointer;
            transition: 0.05s linear;
            border: 1px solid #ffcd94;
        }
        .chip.selected {
            background: radial-gradient(circle at 30% 20%, #ffe484, #ffa01e);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #b45f1a;
        }
        .chip:active { transform: translateY(2px); box-shadow: 0 2px 0 #7a3e0e; }
        .countdown-warning { color: #ff7777; text-shadow: 0 0 4px red; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } }
        .dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .dice-cube {
            width: 70px;
            height: 70px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s linear;
            cursor: default;
        }
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #faf0cf;
            border-radius: 14px;
            border: 2px solid #b97f2e;
            box-shadow: inset 0 0 8px #ffcf8a;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .pip {
            width: 12px;
            height: 12px;
            background: #2d1f0c;
            border-radius: 50%;
            margin: 3px;
            box-shadow: inset 0 1px 2px #aa7744;
        }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 8px; left: 8px; }
        .pip-tr { position: absolute; top: 8px; right: 8px; }
        .pip-bl { position: absolute; bottom: 8px; left: 8px; }
        .pip-br { position: absolute; bottom: 8px; right: 8px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1, .pip-l2, .pip-l3 { position: absolute; left: 6px; }
        .pip-l1 { top: 6px; }
        .pip-l2 { top: 50%; transform: translateY(-50%); }
        .pip-l3 { bottom: 6px; }
        .pip-r1, .pip-r2, .pip-r3 { position: absolute; right: 6px; }
        .pip-r1 { top: 6px; }
        .pip-r2 { top: 50%; transform: translateY(-50%); }
        .pip-r3 { bottom: 6px; }
        .front { transform: translateZ(35px); }
        .back { transform: rotateY(180deg) translateZ(35px); }
        .right { transform: rotateY(90deg) translateZ(35px); }
        .left { transform: rotateY(-90deg) translateZ(35px); }
        .top { transform: rotateX(90deg) translateZ(35px); }
        .bottom { transform: rotateX(-90deg) translateZ(35px); }
        @media (max-width: 480px) {
            .dice-cube { width: 55px; height: 55px; }
            .front, .back, .right, .left, .top, .bottom { transform: translateZ(27px); }
            .back { transform: rotateY(180deg) translateZ(27px); }
            .right { transform: rotateY(90deg) translateZ(27px); }
            .left { transform: rotateY(-90deg) translateZ(27px); }
            .top { transform: rotateX(90deg) translateZ(27px); }
            .bottom { transform: rotateX(-90deg) translateZ(27px); }
            .pip { width: 9px; height: 9px; }
            .chip { width: 55px; font-size: 1rem; }
        }
        .fish-wrapper .fish-pattern-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin: 4px auto;
            display: block;
            background: #2a1f16;
            border-radius: 12px;
            padding: 4px;
        }
        .fish-wrapper .bet-card {
            background: #2c1e12;
            border-radius: 20px;
            padding: 8px;
            text-align: center;
            border: 1px solid #d49c3f;
        }
        .fish-wrapper .bet-amount {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }
        .btn-chip {
            background: #ffaa44;
            border: none;
            border-radius: 30px;
            width: 28px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .online-count-box {
            background: #2a1f16;
            margin: 10px;
            padding: 8px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
        }
        .result-popup {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: #1e2a1c;
            padding: 14px 28px;
            border-radius: 80px;
            font-weight: bold;
            font-size: 1.4rem;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            box-shadow: 0 0 25px gold;
            border-left: 6px solid gold;
            color: #ffeaac;
            white-space: nowrap;
        }
        .result-popup.win { background: #1f3d1a; border-left-color: #6eff00; }
        .result-popup.show { opacity: 1; transform: translateX(-50%) scale(1); }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: #2b241e;
            border-radius: 36px;
            width: 90%;
            max-width: 480px;
            padding: 20px;
            border: 1px solid #d4a373;
            color: #ffe1b3;
            max-height: 85vh;
            overflow-y: auto;
        }
        .toast-message {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            color: #ffcc44;
            padding: 8px 16px;
            border-radius: 60px;
            z-index: 3000;
            font-weight: bold;
            white-space: nowrap;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        .qr-img {
            width: 140px;
            height: 140px;
            margin: 8px auto;
            display: block;
            background: white;
            border-radius: 20px;
            padding: 8px;
            object-fit: contain;
        }
        .admin-table {
            width: 100%;
            font-size: 0.7rem;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 6px 4px;
            border-bottom: 1px solid #d4a373;
            text-align: left;
        }
        .withdraw-input, .withdraw-select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 40px;
            background: #1a1a1a;
            border: 1px solid #d49c3f;
            color: #ffdd99;
        }
        .confirm-btn {
            background: #d49c3f;
            border: none;
            border-radius: 40px;
            padding: 8px;
            width: 100%;
            margin-top: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        /* 龙虎斗样式覆盖，保持统一风格 */
        .dragon-tiger-wrapper {
            padding: 12px;
        }
        .dragon-tiger-wrapper .multi-bet-item {
            background: #2a241e;
            border-radius: 20px;
            margin-bottom: 16px;
        }
        .dragon-tiger-wrapper .multi-bet-name {
            font-size: 1.5rem;
        }
        .dragon-tiger-wrapper .bet-amount-wrapper {
            background: #1a1a1a;
            border-radius: 30px;
        }
        .dragon-tiger-wrapper .quick-bet, .dragon-tiger-wrapper .clear-bet {
            background: #c47c3a;
            color: #2f1b0a;
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            margin: 4px;
        }
        .dragon-tiger-wrapper .exec-btn {
            background: #3a2a1c;
            color: #ffdd99;
        }
        .dragon-tiger-wrapper .main-go {
            background: #d49c3f;
            color: #1f1a12;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ======================== 全局数据 ========================
    let systemBankerBalance = localStorage.getItem('system_banker_balance') ? parseFloat(localStorage.getItem('system_banker_balance')) : 50000;
    let adjustFactor = localStorage.getItem('adjustFactor') ? parseFloat(localStorage.getItem('adjustFactor')) : 1.0;
    let validReferralCodes = ["VIP666", "888VIP", "GOLD2025", "LUCKY8", "DICE100"];
    let usersData = JSON.parse(localStorage.getItem('dice_users')) || {};
    let currentUser = null;
    let withdrawRecords = JSON.parse(localStorage.getItem('withdraw_records')) || [];

    function saveUsers() { localStorage.setItem('dice_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 0) : 0; }
    function setUserBalance(amount) {
        if (!currentUser) return;
        usersData[currentUser.phone].balance = Math.max(0, amount);
        saveUsers();
        let balSpan = document.getElementById("userBalanceDisplay");
        if (balSpan) balSpan.innerText = getUserBalance().toFixed(2);
    }
    function modifyBanker(delta) {
        systemBankerBalance = Math.max(0, systemBankerBalance + delta);
        localStorage.setItem('system_banker_balance', systemBankerBalance);
        let bankerEl = document.getElementById('diceBankerDisplay');
        if (bankerEl) bankerEl.innerText = systemBankerBalance.toFixed(2);
    }
    function showToast(msg) {
        let t = document.createElement('div'); t.className = 'toast-message'; t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    function updateAllBalance() {
        let balSpan = document.getElementById("userBalanceDisplay");
        if (balSpan) balSpan.innerText = getUserBalance().toFixed(2);
        let bankerSpan = document.getElementById('diceBankerDisplay');
        if (bankerSpan) bankerSpan.innerText = systemBankerBalance.toFixed(2);
    }
    // 充值弹窗（微信+支付宝收款码）
    function showRechargeModal() {
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">💎 充值</h3>
                <p style="margin:10px 0; text-align:center;"><strong>1元 = 1000文</strong>，扫码支付后联系客服上分</p>
                <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;">
                    <div style="text-align:center;">
                        <img class="qr-img" alt="微信收款码" src="mmexport1776247819360.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%BE%AE%E4%BF%A1%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'">
                        <p>📱 微信收款码</p>
                    </div>
                    <div style="text-align:center;">
                        <img class="qr-img" alt="支付宝收款码" src="mmexport1776247823872.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E6%94%AF%E4%BB%98%E5%AE%9D%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'">
                        <p>📱 支付宝收款码</p>
                    </div>
                </div>
                <p style="margin-top:10px; text-align:center;">📞 客服微信: <strong>game_kf_888</strong> (支付后截图联系)</p>
                <button id="closeRecharge" style="background:#c47c3a; margin-top:15px; padding:8px; border-radius:40px; width:100%;">关闭</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#closeRecharge').onclick = () => modalDiv.remove();
    }
    function showServiceModal() {
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">📞 客服微信</h3>
                <img class="qr-img" alt="客服微信二维码" src="kefu_qr.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%AE%A2%E6%9C%8D%E5%BE%AE%E4%BF%A1%E4%BA%8C%E7%BB%B4%E7%A0%81%3C/text%3E%3C/svg%3E'">
                <p style="margin-top:10px; text-align:center;">微信号: game_kf_888</p>
                <button id="closeSvc" style="background:#c47c3a; margin-top:15px; padding:8px; border-radius:40px; width:100%;">关闭</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#closeSvc').onclick = () => modalDiv.remove();
    }
    function recharge() { showRechargeModal(); }
    function withdraw() {
        let currentBalance = getUserBalance();
        if (currentBalance <= 0) { showToast("余额为0，无法提现"); return; }
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">💰 提现申请</h3>
                <div style="margin:12px 0;"><label>当前余额: <strong style="color:#ffcc44;">${currentBalance.toFixed(2)} 文</strong></label></div>
                <div><input type="number" id="withdrawAmount" class="withdraw-input" placeholder="提现金额" min="1" max="${currentBalance}" step="1"></div>
                <div><select id="withdrawType" class="withdraw-select"><option value="微信">微信</option><option value="支付宝">支付宝</option></select></div>
                <div><input type="text" id="withdrawAccount" class="withdraw-input" placeholder="收款账号" required></div>
                <button id="confirmWithdraw" class="confirm-btn">确认提现</button>
                <button id="cancelWithdraw" style="background:#734c2e; margin-top:8px; padding:8px; border-radius:40px; width:100%;">取消</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const amountInput = modalDiv.querySelector('#withdrawAmount');
        const typeSelect = modalDiv.querySelector('#withdrawType');
        const accountInput = modalDiv.querySelector('#withdrawAccount');
        const confirmBtn = modalDiv.querySelector('#confirmWithdraw');
        const cancelBtn = modalDiv.querySelector('#cancelWithdraw');
        confirmBtn.onclick = () => {
            let amount = parseFloat(amountInput.value);
            let account = accountInput.value.trim();
            let payType = typeSelect.value;
            if (isNaN(amount) || amount <= 0) { showToast("请输入有效金额"); return; }
            if (amount > currentBalance) { showToast("金额超过余额"); return; }
            if (!account) { showToast("请填写收款账号"); return; }
            setUserBalance(currentBalance - amount);
            let record = { phone: currentUser.phone, amount, type: payType, account, time: new Date().toLocaleString(), status: "待处理" };
            withdrawRecords.push(record);
            localStorage.setItem('withdraw_records', JSON.stringify(withdrawRecords));
            showToast(`提现申请已提交！${amount}文将处理到您的${payType}账号 ${account}`);
            modalDiv.remove();
            updateAllBalance();
        };
        cancelBtn.onclick = () => modalDiv.remove();
    }

    // 管理员后台（全局）
    let adminClickCount = 0, adminClickTimer = null;
    let adminPassword = "admin888";
    function openAdminModal() {
        let pwd = prompt("管理员后台密码:");
        if (pwd !== adminPassword) { showToast("密码错误"); return; }
        let allUsers = Object.keys(usersData).map(phone => ({ phone, balance: usersData[phone].balance, code: usersData[phone].referralCode || '无', regTime: usersData[phone].registerTime || '未知' }));
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">🎛️ 管理员后台</h3>
                <div style="display:flex; gap:8px;"><input id="adminSearchInput" placeholder="搜索手机号" style="flex:2; background:#1a1a1a; border:1px solid #d49c3f; border-radius:40px; padding:6px;"><button id="adminSearchBtn">🔍</button><button id="adminResetSearch">重置</button></div>
                <div style="max-height:200px; overflow-y:auto;"><table class="admin-table"><thead><tr><th>手机号</th><th>余额</th><th>推荐码</th></tr></thead><tbody id="adminUserTableBody"></tbody></table></div>
                <select id="adminTargetUser" style="width:100%; margin:8px 0;">${allUsers.map(u => `<option value="${u.phone}">${u.phone} (${u.balance.toFixed(2)})</option>`).join('')}</select>
                <div style="display:flex; gap:8px;"><input id="adminAmount" placeholder="金额" value="0" style="flex:1;"><button id="adminAddBalance">上分</button><button id="adminSubBalance">下分</button><button id="adminResetBalance">重置1000</button></div>
                <div style="display:flex; gap:8px; margin-top:8px;"><button id="adminViewWithdraw">提现记录</button><button id="adminSetBanker">设置庄家</button><button id="adminChangePwd">改密</button></div>
                <div><label>全局赔付系数: <input id="adminAdjustFactor" step="0.01" value="${adjustFactor}" style="width:80px;"></label><button id="adminSaveFactor">保存</button></div>
                <button id="adminCloseBtn" style="margin-top:12px;">关闭</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        function renderUserTable(search='') {
            let filtered = search ? allUsers.filter(u=>u.phone.includes(search)) : allUsers;
            document.getElementById('adminUserTableBody').innerHTML = filtered.map(u => `<tr><td>${u.phone}</td><td>💰${u.balance}</td><td>${u.code}</td></tr>`).join('') || '<tr><td colspan="3">无数据</td></tr>';
        }
        renderUserTable();

        function showResultAnimation(result, winAmount, callback){
            let overlay=document.createElement('div'); overlay.className='modal'; overlay.style.background='rgba(0,0,0,0.85)'; overlay.style.backdropFilter='blur(8px)';
            overlay.innerHTML=`<div class="modal-content" style="text-align:center;"><div style="font-size:80px;">${result==='龙'?'🐉':(result==='虎'?'🐯':'⚖️')}</div><div style="font-size:32px;">${result}</div><div style="font-size:24px;">${winAmount>0?`🎉 中奖 +${winAmount}`:'😞 未中奖'}</div><button id="closeAnim">关闭</button></div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('#closeAnim').onclick=()=>{overlay.remove(); if(callback)callback();};
            speak(result);
        }
        function placeBet(type, amount){
            if(state.betRolling) return;
            state.betRolling=true;
            let outcomes=['龙','虎','和'];
            let result=outcomes[Math.floor(Math.random()*3)];
            let win=0;
            if((type==='DRAGON' && result==='龙')||(type==='TIGER' && result==='虎')||(type==='TIE' && result==='和')) win=amount * (result==='和'?8:2);
            let newBalance = getUserBalance() - amount + win;
            setUserBalance(newBalance);
            // 记录
            let rec = usersData[currentUser.phone].records || [];
            rec.unshift({time:new Date().toLocaleTimeString(), bet:type, result:result, win:win, amount:amount});
            if(rec.length>50) rec.pop();
            usersData[currentUser.phone].records=rec;
            saveUsers();
            // 历史格子
            let hist = usersData[currentUser.phone].resultHistory || [];
            hist.unshift(result);
            if(hist.length>10) hist.pop();
            usersData[currentUser.phone].resultHistory=hist;
            saveUsers();
            updateHistoryDisplay();
            updateRecordDisplay();
            let battleResultDiv=document.getElementById('battleResult');
            if(battleResultDiv) battleResultDiv.innerText=`🎲 开奖: ${result}  ${win>0?'✅ 中奖 +'+win:'❌ 未中奖'}`;
            showResultAnimation(result, win, ()=>{
                state.betRolling=false;
                if(state.countdownInterval) clearInterval(state.countdownInterval);
                startCountdown(getCountdownSec());
            });
            state.bets={DRAGON:0,TIGER:0,TIE:0};
            updateUI();
        }
        function executeBet(){
            if(state.betRolling) return;
            let selected=null, maxAmt=0;
            if(state.bets.DRAGON>maxAmt){ selected='DRAGON'; maxAmt=state.bets.DRAGON; }
            if(state.bets.TIGER>maxAmt){ selected='TIGER'; maxAmt=state.bets.TIGER; }
            if(state.bets.TIE>maxAmt){ selected='TIE'; maxAmt=state.bets.TIE; }
            if(!selected) return;
            if(maxAmt>getUserBalance()){ showToast("余额不足"); cancelAllBets(); return; }
            lastBet={type:selected, amount:maxAmt};
            clearCountdown();
            placeBet(selected, maxAmt);
        }
        function repeatLastBet(){ if(lastBet && !state.betRolling) placeBet(lastBet.type, lastBet.amount); }
        function startCountdown(sec){
            if(state.countdownInterval) clearInterval(state.countdownInterval);
            state.countdown=sec;
            document.getElementById('countdownNum').innerText=state.countdown;
            state.countdownInterval=setInterval(()=>{
                if(state.countdown<=1){
                    clearInterval(state.countdownInterval);
                    state.countdownInterval=null;
                    let total=state.bets.DRAGON+state.bets.TIGER+state.bets.TIE;
                    if(total>0) executeBet();
                    else startCountdown(getCountdownSec());
                }else{
                    state.countdown--;
                    document.getElementById('countdownNum').innerText=state.countdown;
                }
            },1000);
        }
        function clearCountdown(){ if(state.countdownInterval){ clearInterval(state.countdownInterval); state.countdownInterval=null; } }
        function setSpeed(speed){ state.speed=speed; clearCountdown(); startCountdown(getCountdownSec()); document.querySelectorAll('.speed-btn').forEach(btn=>{if(parseInt(btn.dataset.speed)===speed) btn.classList.add('active'); else btn.classList.remove('active');});}
        function updateHistoryDisplay(){
            let hist=usersData[currentUser.phone]?.resultHistory||[];
            let grid=document.getElementById('historyGrid');
            if(!grid) return;
            grid.innerHTML='';
            for(let i=0;i<10;i++){
                let cell=document.createElement('div');
                cell.style.width='32px'; cell.style.height='32px'; cell.style.borderRadius='8px'; cell.style.display='flex'; cell.style.alignItems='center'; cell.style.justifyContent='center';
                if(i<hist.length){
                    let r=hist[i];
                    cell.style.background=r==='龙'?'#ff5555':(r==='虎'?'#55aaff':'#bb77ff');
                    cell.textContent=r==='龙'?'🐉':(r==='虎'?'🐯':'⚖️');
                }else{ cell.style.background='#444'; cell.textContent='?'; }
                grid.appendChild(cell);
            }
        }
        function updateRecordDisplay(){
            let recs=usersData[currentUser.phone]?.records||[];
            let listDiv=document.getElementById('recordList');
            if(!listDiv) return;
            listDiv.innerHTML='';
            recs.slice(0,10).forEach(r=>{
                let div=document.createElement('div'); div.className='record-item';
                let isWin=r.win>0;
                div.innerHTML=`<span>${r.time}</span><span>押 ${r.bet} → ${r.result}</span><span style="color:${isWin?'#4caf50':'#f44336'}">${isWin?`+${r.win}`:`-${r.amount}`}</span>`;
                listDiv.appendChild(div);
            });
        }
        function showMyHistory(){
            let recs=usersData[currentUser.phone]?.records||[];
            let html='<div style="max-height:300px; overflow-y:auto;">'+recs.map(r=>`<div>${r.time} 押${r.bet}→${r.result} ${r.win>0?'赢'+r.win:'输'+r.amount}</div>`).join('')+'</div><button id="closeHist">关闭</button>';
            let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeHist').onclick=()=>m.remove();
        }
        function newUser(){
            let newId='user_'+Math.floor(Math.random()*1000000);
            if(!usersData[newId]) usersData[newId]={balance:1000, password:'', referralCode:'', registerTime:new Date().toLocaleString(), records:[], resultHistory:[]};
            document.getElementById('switchUserIdInput').value=newId;
            switchUser();
        }
        function switchUser(){
            let newId=document.getElementById('switchUserIdInput').value.trim();
            if(!newId) return;
            if(!usersData[newId]) usersData[newId]={balance:1000, records:[], resultHistory:[]};
            currentUser={phone:newId, ...usersData[newId]};
            document.getElementById('currentUserId').innerText=newId;
            document.getElementById("userBalanceDisplay").innerText=getUserBalance().toFixed(2);
            updateUI();
            updateHistoryDisplay();
            updateRecordDisplay();
            clearCountdown();
            startCountdown(getCountdownSec());
            showToast(`已切换到 ${newId}`);
        }
        function refreshBalance(){ updateUI(); showToast("余额已刷新"); }
        // 事件绑定
        document.querySelectorAll('.quick-bet').forEach(btn=>{btn.onclick=()=>{let type=btn.dataset.type; let amt=parseInt(btn.dataset.amount); addBetAmount(type,amt);};});
        document.querySelectorAll('.clear-bet').forEach(btn=>{btn.onclick=()=>{clearBet(btn.dataset.type);};});
        document.getElementById('fightBtn').onclick=executeBet;
        document.getElementById('cancelBtn').onclick=cancelAllBets;
        document.getElementById('repeatBtn').onclick=repeatLastBet;
        document.getElementById('refreshBtn').onclick=refreshBalance;
        document.getElementById('myHistoryBtn').onclick=showMyHistory;
        document.getElementById('newUserBtn').onclick=newUser;
        document.getElementById('switchUserBtn').onclick=switchUser;
        document.querySelectorAll('.speed-btn').forEach(btn=>{btn.onclick=()=>setSpeed(parseInt(btn.dataset.speed));});
        updateUI();
        updateHistoryDisplay();
        updateRecordDisplay();
        startCountdown(30);
        dragonTigerDestroy = () => { if(state.countdownInterval) clearInterval(state.countdownInterval); container.innerHTML=''; };
        return dragonTigerDestroy;
    }

    // 游戏4占位
    let game4Destroy = null;
    function initGame4(container) { if(game4Destroy) game4Destroy(); container.innerHTML=`<div style="padding:60px; text-align:center;">♠️ 游戏4 · 百人牛牛筹备中</div>`; game4Destroy=()=>container.innerHTML=''; return game4Destroy; }

    // ==================== 认证大厅 & 游戏总控 ====================
    function renderAuthUI() {
        const savedPhone = localStorage.getItem('saved_phone') || '';
        const savedPwd = localStorage.getItem('saved_password') || '';
        const rememberChecked = localStorage.getItem('remember_me') === 'true';
        document.getElementById('app').innerHTML = `
            <div class="auth-panel" style="padding: 30px 20px;">
                <h2 style="text-align:center;">🎲 三游戏大厅</h2>
                <input type="tel" id="regPhone" placeholder="手机号" maxlength="11" value="${savedPhone}" style="width:100%; margin:8px 0; padding:12px; border-radius:60px; background:#2a241e;">
                <input type="password" id="regPassword" placeholder="密码 (≥4位)" value="${savedPwd}" style="width:100%; margin:8px 0; padding:12px; border-radius:60px;">
                <input type="text" id="regReferralCode" placeholder="推荐码 (必填)" maxlength="20" style="width:100%; margin:8px 0; padding:12px; border-radius:60px;">
                <div style="display:flex; gap:12px;"><input type="checkbox" id="rememberCheckbox" ${rememberChecked ? 'checked' : ''}> <label>记住账号</label></div>
                <div style="display:flex; gap:12px;"><button id="loginBtn" style="flex:1; background:#d49c3f; border-radius:60px; padding:10px;">登录</button><button id="registerBtn" style="flex:1; background:#3f6a47; border-radius:60px;">注册</button></div>
                <div class="auth-note" style="font-size:0.7rem; text-align:center;">有效推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100 | 送1000文</div>
            </div>
        `;
        document.getElementById('registerBtn').onclick = () => {
            let phone=document.getElementById('regPhone').value.trim(), pwd=document.getElementById('regPassword').value, code=document.getElementById('regReferralCode').value.trim().toUpperCase();
            if(!phone||!pwd) return showToast("填写完整");
            if(!/^1[3-9]\d{9}$/.test(phone)) return showToast("手机号无效");
            if(pwd.length<4) return showToast("密码≥4位");
            if(!code||!validReferralCodes.includes(code)) return showToast("推荐码无效");
            if(usersData[phone]) return showToast("已注册");
            usersData[phone]={password:pwd, balance:1000, referralCode:code, registerTime:new Date().toLocaleString(), records:[], resultHistory:[]};
            saveUsers(); showToast("注册成功！请登录");
        };
        document.getElementById('loginBtn').onclick = () => {
            let phone=document.getElementById('regPhone').value.trim(), pwd=document.getElementById('regPassword').value, rem=document.getElementById('rememberCheckbox').checked;
            if(!phone||!pwd) return showToast("填写账号密码");
            let user=usersData[phone];
            if(!user||user.password!==pwd) return showToast("账号或密码错误");
            if(rem){ localStorage.setItem('saved_phone',phone); localStorage.setItem('saved_password',pwd); localStorage.setItem('remember_me','true'); }
            else{ localStorage.removeItem('saved_phone'); localStorage.removeItem('saved_password'); localStorage.setItem('remember_me','false'); }
            currentUser={phone, ...user};
            showToast(`欢迎 ${phone}`);
            renderGameLobby();
        };
    }
    function renderGameLobby() {
        document.getElementById('app').innerHTML = `
            <div class="user-section"><div class="user-info-row"><span>📱 ${currentUser.phone.substring(0,7)}*** | 💰 余额: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span><div class="btn-group"><button id="serviceBtn" class="service-btn">📞 客服</button><button id="logoutBtn" class="logout-btn">退出</button></div></div><div class="charge-withdraw-row"><button id="rechargeBtn" class="charge-btn">💎 充值</button><button id="withdrawBtn" class="withdraw-btn">💰 提现</button></div></div>
            <div class="game-nav"><button class="game-tab active" data-game="fish">🐟 葫芦鱼</button><button class="game-tab" data-game="dice">🎲 至尊骰宝</button><button class="game-tab" data-game="dragonTiger">🐉 龙虎斗</button><button class="game-tab" data-game="game4">♠️ 游戏4</button></div>
            <div class="game-container"><div id="gamePanel"></div></div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;
        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const inits = { fish: initFishGame, dice: initDiceGame, dragonTiger: initDragonTigerGame, game4: initGame4 };
        async function switchGame(id) { if(currentDestroy) currentDestroy(); gamePanel.innerHTML=''; currentDestroy = await inits[id](gamePanel); updateAllBalance(); }
        document.querySelectorAll('.game-tab').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.game-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
        switchGame('dragonTiger');
        document.addEventListener('click', (e) => { if(e.target && (e.target.id === 'adminTriggerChip' || e.target.id === 'fishAdminTrigger')) { adminClickCount++; if(adminClickTimer) clearTimeout(adminClickTimer); adminClickTimer = setTimeout(()=>{ adminClickCount=0; }, 1000); if(adminClickCount>=3){ adminClickCount=0; clearTimeout(adminClickTimer); openAdminModal(); } } });
    }
    renderAuthUI();
</script>
