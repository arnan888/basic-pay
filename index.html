<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_PRO_V2</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color:#FFED00; font-family:sans-serif; height:100vh; overflow:hidden; 
            display:flex; flex-direction:column; align-items:center; justify-content:center; 
        }
        
        /* 顶部监控 */
        .hud { position:fixed; top:0; width:100%; height:50px; background:rgba(20,20,20,0.9); display:flex; justify-content:space-around; align-items:center; border-bottom:2px solid #FFED00; z-index:100; font-size:14px; }
        
        /* 资产大数 */
        .bal-val { font-size:80px; font-weight:900; color:#FFED00; text-shadow:0 0 30px rgba(255,237,0,0.5); margin-bottom:5px; }
        
        /* 转盘物理结构：消除黑洞 */
        .wheel-container { 
            position:relative; width:320px; height:320px; 
            border:12px solid #FFED00; border-radius:50%; 
            box-shadow:0 0 50px rgba(255,68,0,0.4), inset 0 0 30px rgba(0,0,0,1); 
            background:#222; margin:15px 0; 
        }
        
        /* 转盘内部填充：实心感 */
        .wheel-inner { 
            width:100%; height:100%; border-radius:50%; 
            transition:transform 5s cubic-bezier(0.15, 0, 0.15, 1); 
            position:relative; 
            background: conic-gradient(from 0deg, #111, #222, #111, #222, #111, #222, #111, #222); /* 模拟金属切割线 */
        }

        /* 转盘中心轴点：彻底封死黑洞 */
        .wheel-center {
            position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
            width:60px; height:60px; background:#FFED00; border-radius:50%;
            z-index:50; box-shadow:0 0 20px #FFED00, inset 0 0 10px #000;
            display:flex; align-items:center; justify-content:center;
            color:#000; font-weight:bold; font-size:12px;
        }

        .pointer { position:absolute; top:-35px; left:50%; transform:translateX(-50%); border-left:18px solid transparent; border-right:18px solid transparent; border-top:48px solid #f00; z-index:100; filter:drop-shadow(0 0 10px #f00); }
        
        .slot { position:absolute; width:100%; height:100%; text-align:center; padding-top:25px; font-weight:900; font-size:16px; color:#fff; text-shadow:0 2px 4px #000; }

        /* 底部导航 */
        .bot-nav { position:fixed; bottom:0; width:100%; background:#0a0a0a; display:flex; justify-content:space-around; padding:15px 5px; border-top:1px solid #333; }
        .nav-item { flex:1; text-align:center; font-size:12px; color:#FFED00; opacity:0.8; }
        
        /* 祝贺按钮 */
        .main-btn { 
            width:260px; padding:20px; background: linear-gradient(180deg, #f00 0%, #900 100%); 
            border:none; border-radius:50px; color:#fff; font-size:30px; font-weight:900; 
            box-shadow:0 8px 25px rgba(255,0,0,0.5); margin-bottom:100px; z-index:100; 
            letter-spacing:5px;
        }
    </style>
</head>
<body>

    <div class="hud">
        <div>IN: <b id="st_in" style="color:#0f0">0.0</b></div>
        <div style="font-size:10px; color:#0f0; border:1px solid #0f0; padding:1px 4px;">90% RTP LOCKED</div>
        <div>OUT: <b id="st_out" style="color:#f00">0.0</b></div>
    </div>

    <div class="bal-val" id="ui_bal">100.0</div>
    <div style="color:#888; font-size:14px; margin-bottom:10px;">BET: <span id="ui_bet" style="color:#0f0">0.5</span></div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel-center">AI</div>
        <div id="ui_wheel" class="wheel-inner">
            <div class="slot" style="transform:rotate(0deg)">🍀 1.5X</div>
            <div class="slot" style="transform:rotate(45deg)">💀 0X</div>
            <div class="slot" style="transform:rotate(90deg)">🔥 120X</div>
            <div class="slot" style="transform:rotate(135deg)">👑 JACK</div>
            <div class="slot" style="transform:rotate(180deg)">💰 88X</div>
            <div class="slot" style="transform:rotate(225deg)">💎 50X</div>
            <div class="slot" style="transform:rotate(270deg)">✨ 20X</div>
            <div class="slot" style="transform:rotate(315deg)">💀 0X</div>
        </div>
    </div>

    <button class="main-btn" onclick="handleStart()">祝 贺</button>

    <div class="bot-nav">
        <div class="nav-item">🔍 查询</div>
        <div class="nav-item">📥 上分</div>
        <div class="nav-item">📤 下分</div>
        <div class="nav-item" style="color:#f0f; font-weight:bold;">✨ 全攻</div>
    </div>

    <script>
        const sounds = {
            idle: new Audio('https://assets.mixkit.co/music/preview/mixkit-arcade-retro-changing-games-233.mp3'),
            spin: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-mechanical-spin-wheel-1533.mp3'),
            win: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3'),
            lose: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-funny-fail-low-tone-2856.mp3')
        };

        let isAudioUnlocked = false;
        let balance = 100.0, bet = 0.5, totalIn = 0.0, totalOut = 0.0, rot = 0, busy = false;

        function handleStart() {
            if (!isAudioUnlocked) {
                Object.values(sounds).forEach(s => { s.play().then(() => s.pause()); });
                isAudioUnlocked = true;
                sounds.idle.loop = true; sounds.idle.volume = 0.3; sounds.idle.play();
            }
            if (!busy) go();
        }

        function go() {
            if (balance < bet) return;
            busy = true;
            sounds.idle.pause();
            sounds.spin.currentTime = 0;
            sounds.spin.play();

            const r = Math.floor(Math.random() * 1000);
            let idx = 1; 
            if (r < 2) idx = 3; else if (r < 10) idx = 2; else if (r < 30) idx = 4;
            else if (r < 480) idx = 1; else if (r < 950) idx = 0; else if (r < 995) idx = 7;
            else if (r < 998) idx = 5; else idx = 6;

            const targetAngle = idx * 45;
            const extraSpins = (Math.floor(Math.random() * 5) + 12) * 360;
            rot += extraSpins + (360 - targetAngle - (rot % 360)) + 360;
            document.getElementById('ui_wheel').style.transform = `rotate(${rot}deg)`;

            setTimeout(() => {
                const multis = [1.5, 0, 120, 500, 88, 50, 20, 0];
                const prize = multis[idx] * bet;
                balance = (balance - bet) + prize;
                totalIn += bet; totalOut += prize;
                
                sounds.spin.pause();
                if (multis[idx] > 0) sounds.win.play(); else sounds.lose.play();

                document.getElementById('ui_bal').innerText = balance.toFixed(1);
                document.getElementById('st_in').innerText = totalIn.toFixed(1);
                document.getElementById('st_out').innerText = totalOut.toFixed(1);

                busy = false;
                setTimeout(() => { if(!busy) sounds.idle.play(); }, 2000);
            }, 5000);
        }
    </script>
</body>
</html>
