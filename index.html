<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>潮汕葫芦鱼 | 手机号注册登录 + 完整游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a120c;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', sans-serif;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .app {
            max-width: 550px;
            width: 100%;
            height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            padding: 10px;
            box-sizing: border-box;
        }
        /* 登录面板 */
        .auth-panel {
            background: linear-gradient(145deg, #362a1f 0%, #251e16 100%);
            border-radius: 48px;
            padding: 30px 20px;
            margin: auto;
            text-align: center;
            border: 2px solid #ffaa44;
            width: 100%;
        }
        .auth-panel h2 { color: #ffdd99; font-size: 1.5rem; margin-bottom: 24px; }
        .auth-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #2a241e;
            border: 1px solid #ffaa44;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            text-align: center;
        }
        .auth-buttons { display: flex; gap: 15px; margin: 20px 0; }
        .auth-btn {
            flex: 1;
            background: #c47c3a;
            border: none;
            padding: 12px;
            border-radius: 50px;
            color: #2f1b0a;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        .auth-note { color: #aa8855; font-size: 0.7rem; }
        /* 游戏界面 */
        .user-info-bar {
            background: #1f1711;
            border-radius: 40px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-info { color: #ffdd99; font-size: 0.8rem; }
        .logout-btn {
            background: #734c2e;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: #ffe3b3;
            cursor: pointer;
        }
        .game-card {
            background: linear-gradient(145deg, #362a1f 0%, #251e16 100%);
            border-radius: 48px;
            overflow: hidden;
        }
        .game-header {
            background: linear-gradient(135deg, #b85a2e, #7a3116);
            padding: 12px;
            text-align: center;
        }
        .game-header h1 { font-size: 1.2rem; color: #ffefcf; }
        .stats-panel {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            background: #1f1711;
        }
        .stat-card {
            background: #1a130d;
            border-radius: 40px;
            padding: 6px 8px;
            flex: 1;
            text-align: center;
        }
        .stat-label { font-size: 0.55rem; color: #e2bc89; }
        .stat-value { font-size: 1rem; font-weight: 800; color: #f9d792; }
        .dice-area {
            background: #2a211a;
            margin: 12px;
            border-radius: 50px;
            padding: 15px;
            text-align: center;
            position: relative;
        }
        .dice-box { display: flex; justify-content: center; gap: 15px; }
        .dice {
            background: #fff2df;
            width: 65px;
            height: 65px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 5px 0 #926b42;
        }
        .dice-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.9), #2c1e14);
            backdrop-filter: blur(6px);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 15;
            transition: all 0.5s ease;
            border: 2px solid #cb9e6b;
        }
        .dice-cover span { font-size: 2.5rem; }
        .dice-cover .cover-text { font-size: 0.7rem; background: #00000099; padding: 4px 12px; border-radius: 30px; margin-top: 8px; color: #ffdd99; }
        .dice-cover.open-cover { transform: translateY(-80px) scale(0.6); opacity: 0; visibility: hidden; }
        .dice-cover.hidden-cover { display: none; }
        .bet-sections { padding: 0 12px 8px; }
        .section-title { font-size: 0.7rem; color: #ffd49f; margin: 8px 0 6px 4px; border-left: 4px solid #f7b05e; padding-left: 8px; }
        .bet-grid, .special-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .bet-card {
            background: #1f1712;
            border-radius: 28px;
            padding: 6px 4px;
            text-align: center;
            border: 1px solid #6f4f34;
        }
        .bet-icon { font-size: 1.6rem; background: #2f231c; width: 42px; height: 42px; line-height: 42px; margin: 0 auto 4px; border-radius: 50%; }
        .bet-name { font-size: 0.7rem; font-weight: bold; color: #ffddb0; }
        .bet-odds { font-size: 0.5rem; color: #dba959; }
        .bet-amount {
            background: #0c0907;
            border-radius: 40px;
            padding: 2px 6px;
            margin: 5px 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bet-amount span { color: #ffbc6e; font-size: 0.75rem; background: #2a1c12; padding: 2px 8px; border-radius: 30px; }
        .btn-chip {
            background: #523b26;
            border: none;
            color: #fce2b4;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
        }
        .chip-bar {
            background: #2a1f16;
            margin: 6px 12px 12px;
            padding: 8px;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .chip {
            background: #ebbc7e;
            color: #3a240f;
            font-weight: bold;
            font-size: 0.75rem;
            padding: 5px 14px;
            border-radius: 40px;
            cursor: pointer;
        }
        .chip.selected { background: #f7c56e; box-shadow: 0 0 0 2px #ffefb0; }
        .action-bar { display: flex; justify-content: center; gap: 10px; padding: 8px 16px 16px; }
        .action-btn {
            background: #734c2e;
            border: none;
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 40px;
            color: #ffe3b3;
            cursor: pointer;
        }
        .action-btn.primary { background: #c47c3a; color: #2f1b0a; }
        .message-area {
            background: #1c140e;
            margin: 0 12px 16px;
            border-radius: 40px;
            padding: 8px 12px;
            font-size: 0.7rem;
            color: #dbbc8c;
            text-align: center;
            min-height: 50px;
        }
        .admin-card {
            background: #1e1813;
            border-radius: 48px;
            overflow: hidden;
        }
        .admin-header {
            background: #4a3322;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .admin-header h3 { color: #ffefcf; font-size: 0.9rem; }
        .toggle-btn { background: #7a5a3e; border: none; color: white; padding: 3px 12px; border-radius: 30px; cursor: pointer; }
        .admin-content { padding: 12px; }
        .admin-content.collapsed { display: none; }
        .seats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 12px 0;
        }
        .seat-card {
            background: #1a130d;
            border-radius: 20px;
            padding: 6px 3px;
            text-align: center;
            border: 1px solid #6f4f34;
        }
        .admin-btn {
            background: #5f462f;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            color: #ffe3b3;
            font-size: 0.7rem;
            cursor: pointer;
        }
        footer { font-size: 0.5rem; text-align: center; padding: 8px; color: #aa8259; }
        @media (max-width: 480px) {
            .dice { width: 50px; height: 50px; font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
    // ==================== 数据存储 ====================
    const USERS_KEY = 'fish_users';
    let users = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
    let currentUser = null;
    let bankerBalance = parseInt(localStorage.getItem('fish_banker')) || 10000;
    
    // 游戏状态
    let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
    let specialBets = { big:0, small:0, odd:0, even:0, allTriplets:0 };
    let currentChip = 100;
    let lastWin = 0;
    let isRolling = false;
    
    const PATTERNS = [
        { id: "fish", name: "鱼", icon: "🐟" },
        { id: "shrimp", name: "虾", icon: "🦐" },
        { id: "crab", name: "蟹", icon: "🦀" },
        { id: "calabash", name: "葫芦", icon: "🏺" },
        { id: "coin", name: "金钱", icon: "💰" },
        { id: "chicken", name: "鸡", icon: "🐔" }
    ];
    const SPECIALS = [
        { id: "big", name: "大", icon: "🔴" },
        { id: "small", name: "小", icon: "🔵" },
        { id: "odd", name: "单", icon: "⚪" },
        { id: "even", name: "双", icon: "⚫" },
        { id: "allTriplets", name: "全围", icon: "🌀" }
    ];
    
    function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
    function saveBanker() { localStorage.setItem('fish_banker', bankerBalance); }
    function getUserBalance() { return currentUser ? (users[currentUser.phone]?.balance || 1000) : 0; }
    function setUserBalance(amt) { if(currentUser) { users[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }
    
    function showToast(msg) {
        let toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#000000cc;color:#ffaa44;padding:10px 20px;border-radius:50px;font-size:0.8rem;z-index:2000;border:1px solid #ffaa44;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function showMsg(msg) { 
        let el = document.getElementById('msgArea'); 
        if(el) el.innerText = msg;
        setTimeout(() => { if(el && el.innerText === msg) el.innerText = "🎲 点击开骰"; }, 2500);
    }
    
    function updateUI() {
        let balanceSpan = document.getElementById('userBalance');
        if(balanceSpan) balanceSpan.innerText = getUserBalance().toFixed(2);
        let bankerSpan = document.getElementById('bankerBalance');
        if(bankerSpan) bankerSpan.innerText = Math.floor(bankerBalance);
        let totalSpan = document.getElementById('totalBet');
        if(totalSpan) {
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(specialBets).reduce((a,b)=>a+b,0);
            totalSpan.innerText = total;
        }
        let lastSpan = document.getElementById('lastWin');
        if(lastSpan) lastSpan.innerText = lastWin;
        
        PATTERNS.forEach(p => { let s = document.getElementById(`bet_${p.id}`); if(s) s.innerText = patternBets[p.id]; });
        SPECIALS.forEach(s => { let span = document.getElementById(`bet_${s.id}`); if(span) span.innerText = specialBets[s.id]; });
    }
    
    function addBet(type, id) {
        let target = type === 'pattern' ? patternBets : specialBets;
        if(target[id] === undefined) return;
        let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(specialBets).reduce((a,b)=>a+b,0);
        if(total + currentChip > getUserBalance()) { showToast("余额不足"); return; }
        target[id] += currentChip;
        updateUI();
        showToast(`➕ ${id} +${currentChip}`);
    }
    
    function subBet(type, id) {
        let target = type === 'pattern' ? patternBets : specialBets;
        if(target[id] === undefined) return;
        if(target[id] >= currentChip) {
            target[id] -= currentChip;
            updateUI();
            showToast(`➖ ${id} -${currentChip}`);
        }
    }
    
    function clearAllBets() {
        PATTERNS.forEach(p => patternBets[p.id] = 0);
        SPECIALS.forEach(s => specialBets[s.id] = 0);
        updateUI();
        showMsg("已清空所有下注");
    }
    
    async function rollDice() {
        if(isRolling) return;
        let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(specialBets).reduce((a,b)=>a+b,0);
        if(total === 0) { showMsg("请先下注"); return; }
        if(total > getUserBalance()) { showMsg("余额不足"); return; }
        if(total > bankerBalance) { showMsg("庄家余额不足"); return; }
        
        isRolling = true;
        let rollBtn = document.getElementById('rollBtn');
        if(rollBtn) rollBtn.disabled = true;
        
        // 开盅动画
        let cover = document.getElementById('diceCover');
        if(cover) {
            cover.classList.remove('hidden-cover');
            cover.classList.add('open-cover');
            await new Promise(r => setTimeout(r, 550));
            cover.classList.add('hidden-cover');
        }
        
        // 骰子滚动动画
        let diceEls = document.querySelectorAll('.dice');
        let icons = ["🐟","🦐","🦀","🏺","💰","🐔"];
        let names = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        for(let step=0; step<8; step++) {
            await new Promise(r => setTimeout(r, 70));
            diceEls.forEach(d => d.innerHTML = icons[Math.floor(Math.random()*6)]);
        }
        
        // 随机结果
        let results = [names[Math.floor(Math.random()*6)], names[Math.floor(Math.random()*6)], names[Math.floor(Math.random()*6)]];
        for(let i=0; i<3; i++) diceEls[i].innerHTML = icons[names.indexOf(results[i])];
        
        // 结算
        let points = results.map(r => { let m={鱼:1,虾:2,蟹:3,葫芦:4,金钱:5,鸡:6}; return m[r]; });
        let sum = points.reduce((a,b)=>a+b,0);
        let isTriplet = results[0]===results[1] && results[1]===results[2];
        
        // 扣除押注
        setUserBalance(getUserBalance() - total);
        bankerBalance -= total;
        
        let winAmount = 0;
        let winDetails = [];
        
        // 六门结算
        for(let p of PATTERNS) {
            let bet = patternBets[p.id];
            if(bet > 0) {
                let occur = results.filter(r => r === p.name).length;
                if(occur > 0) {
                    let prize = bet * (occur + 1);
                    winAmount += prize;
                    winDetails.push(`${p.name}x${occur}`);
                }
            }
        }
        
        // 特殊结算
        let isBig = (sum>=11 && sum<=17 && !isTriplet);
        let isSmall = (sum>=4 && sum<=10 && !isTriplet);
        let isOdd = (sum%2===1 && !isTriplet);
        let isEven = (sum%2===0 && !isTriplet);
        
        if(specialBets.big>0 && isBig) { winAmount += specialBets.big * 2; winDetails.push("大"); }
        if(specialBets.small>0 && isSmall) { winAmount += specialBets.small * 2; winDetails.push("小"); }
        if(specialBets.odd>0 && isOdd) { winAmount += specialBets.odd * 2; winDetails.push("单"); }
        if(specialBets.even>0 && isEven) { winAmount += specialBets.even * 2; winDetails.push("双"); }
        if(specialBets.allTriplets>0 && isTriplet) { winAmount += specialBets.allTriplets * 25; winDetails.push("全围"); }
        
        let net = winAmount - total;
        bankerBalance += winAmount;
        setUserBalance(getUserBalance() + winAmount);
        lastWin = net;
        saveBanker();
        updateUI();
        
        showMsg(`🎲 ${results.join("、")} ${net>=0 ? `净赢+${net}` : `亏损${total}`} ${winDetails.length?`[${winDetails.join(",")}]`:""}`);
        
        // 记录历史
        if(currentUser) {
            let recs = users[currentUser.phone].records || [];
            recs.unshift({ time: new Date().toLocaleTimeString(), result: results.join(","), win: net });
            if(recs.length > 20) recs.pop();
            users[currentUser.phone].records = recs;
            saveUsers();
        }
        
        // 清空下注
        clearAllBets();
        
        // 复位骰盅
        await new Promise(r => setTimeout(r, 1500));
        if(cover) {
            cover.classList.remove('open-cover', 'hidden-cover');
            cover.style.display = "flex";
            cover.style.visibility = "visible";
            cover.style.opacity = "1";
        }
        diceEls.forEach(d => d.innerHTML = "🎲");
        
        isRolling = false;
        if(rollBtn) rollBtn.disabled = false;
    }
    
    // ==================== 页面渲染 ====================
    function renderAuth() {
        document.getElementById('app').innerHTML = `
            <div class="auth-panel">
                <h2>🎲 潮汕葫芦鱼</h2>
                <input type="tel" id="phone" class="auth-input" placeholder="手机号" maxlength="11">
                <input type="password" id="pwd" class="auth-input" placeholder="密码 (至少4位)">
                <div class="auth-buttons">
                    <button id="loginBtn" class="auth-btn">登录</button>
                    <button id="registerBtn" class="auth-btn">注册</button>
                </div>
                <div class="auth-note">🎮 测试：任意11位手机号+密码即可注册，初始1000</div>
            </div>
        `;
        document.getElementById('loginBtn').onclick = () => {
            let phone = document.getElementById('phone').value.trim();
            let pwd = document.getElementById('pwd').value;
            if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            let user = users[phone];
            if(!user) { showToast("手机号未注册"); return; }
            if(user.password !== pwd) { showToast("密码错误"); return; }
            currentUser = { phone, ...user };
            showToast(`欢迎回来，${phone}`);
            renderGame();
        };
        document.getElementById('registerBtn').onclick = () => {
            let phone = document.getElementById('phone').value.trim();
            let pwd = document.getElementById('pwd').value;
            if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            if(!/^1[3-9]\d{9}$/.test(phone)) { showToast("请输入有效手机号"); return; }
            if(pwd.length < 4) { showToast("密码至少4位"); return; }
            if(users[phone]) { showToast("手机号已注册"); return; }
            users[phone] = { password: pwd, balance: 1000, records: [] };
            saveUsers();
            showToast("注册成功，请登录");
        };
    }
    
    function renderGame() {
        // 生成六门HTML
        let patternsHtml = '';
        PATTERNS.forEach(p => {
            patternsHtml += `
                <div class="bet-card">
                    <div class="bet-icon">${p.icon}</div>
                    <div class="bet-name">${p.name}</div>
                    <div class="bet-odds">1~3倍</div>
                    <div class="bet-amount">
                        <button class="btn-chip sub" data-type="pattern" data-id="${p.id}">-</button>
                        <span id="bet_${p.id}">0</span>
                        <button class="btn-chip add" data-type="pattern" data-id="${p.id}">+</button>
                    </div>
                </div>
            `;
        });
        
        let specialsHtml = '';
        SPECIALS.forEach(s => {
            let oddsText = s.id === 'allTriplets' ? '25倍' : '2倍';
            specialsHtml += `
                <div class="bet-card">
                    <div class="bet-icon">${s.icon}</div>
                    <div class="bet-name">${s.name}</div>
                    <div class="bet-odds">${oddsText}</div>
                    <div class="bet-amount">
                        <button class="btn-chip sub" data-type="special" data-id="${s.id}">-</button>
                        <span id="bet_${s.id}">0</span>
                        <button class="btn-chip add" data-type="special" data-id="${s.id}">+</button>
                    </div>
                </div>
            `;
        });
        
        document.getElementById('app').innerHTML = `
            <div class="user-info-bar">
                <span class="user-info">📱 ${currentUser.phone} | 💰 余额: <span id="userBalance">${getUserBalance().toFixed(2)}</span></span>
                <button id="logoutBtn" class="logout-btn">退出登录</button>
            </div>
            <div class="game-card">
                <div class="game-header"><h1>🎲 潮汕葫芦鱼 · 二十人房 🦐</h1></div>
                <div class="stats-panel">
                    <div class="stat-card"><div class="stat-label">👑 庄家</div><div class="stat-value">系统庄家</div></div>
                    <div class="stat-card"><div class="stat-label">💰 庄家余额</div><div class="stat-value" id="bankerBalance">${Math.floor(bankerBalance)}</div></div>
                    <div class="stat-card"><div class="stat-label">🏆 上局净利</div><div class="stat-value" id="lastWin">0</div></div>
                </div>
                <div class="dice-area">
                    <div class="dice-box">
                        <div class="dice">🎲</div><div class="dice">🎲</div><div class="dice">🎲</div>
                    </div>
                    <div class="dice-cover" id="diceCover"><span>🏺</span><div class="cover-text">骰盅未开</div></div>
                </div>
                <div class="bet-sections">
                    <div class="section-title">🐟 六门押注</div>
                    <div class="bet-grid" id="patternGrid">${patternsHtml}</div>
                    <div class="section-title">🎯 特殊投注</div>
                    <div class="special-grid" id="specialGrid">${specialsHtml}</div>
                </div>
                <div class="chip-bar" id="chipBar">
                    <div class="chip" data-chip="20">20</div><div class="chip" data-chip="50">50</div>
                    <div class="chip" data-chip="100">100</div><div class="chip" data-chip="500">500</div>
                    <div class="chip" data-chip="1000">1k</div>
                </div>
                <div class="action-bar">
                    <button id="rollBtn" class="action-btn primary">🎲 开骰！</button>
                    <button id="clearBtn" class="action-btn">🧹 清空下注</button>
                </div>
                <div class="message-area" id="msgArea">庄家坐镇 | 点击开骰</div>
            </div>
            <div class="admin-card">
                <div class="admin-header" id="adminHeader">
                    <h3>🎛️ 二十人座席</h3>
                    <button id="toggleAdmin" class="toggle-btn">▼ 收起</button>
                </div>
                <div class="admin-content" id="adminContent">
                    <div class="seats-grid">
                        <div style="grid-column:1/-1; text-align:center; color:#aa8855; padding:20px;">🎲 抢庄功能开发中</div>
                    </div>
                    <footer>点击座位可邀请玩家</footer>
                </div>
            </div>
        `;
        
        // 绑定事件 (使用事件委托确保动态元素也能响应)
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuth(); };
        document.getElementById('rollBtn').onclick = rollDice;
        document.getElementById('clearBtn').onclick = clearAllBets;
        
        // 筹码选择
        document.querySelectorAll('.chip').forEach(chip => {
            chip.onclick = () => {
                currentChip = parseInt(chip.dataset.chip);
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
                chip.classList.add('selected');
                showToast(`筹码 ${currentChip}`);
            };
        });
        
        // 加减按钮 (使用事件委托，因为按钮是动态的)
        document.querySelector('.bet-grid')?.addEventListener('click', (e) => {
            let btn = e.target.closest('.btn-chip');
            if(!btn) return;
            let type = btn.dataset.type;
            let id = btn.dataset.id;
            if(btn.classList.contains('add')) addBet(type, id);
            if(btn.classList.contains('sub')) subBet(type, id);
        });
        document.querySelector('.special-grid')?.addEventListener('click', (e) => {
            let btn = e.target.closest('.btn-chip');
            if(!btn) return;
            let type = btn.dataset.type;
            let id = btn.dataset.id;
            if(btn.classList.contains('add')) addBet(type, id);
            if(btn.classList.contains('sub')) subBet(type, id);
        });
        
        // 默认选中100筹码
        let defaultChip = document.querySelector('.chip[data-chip="100"]');
        if(defaultChip) defaultChip.classList.add('selected');
        currentChip = 100;
        
        // 折叠功能
        let collapsed = false;
        let toggleBtn = document.getElementById('toggleAdmin');
        let adminContent = document.getElementById('adminContent');
        toggleBtn.onclick = () => {
            collapsed = !collapsed;
            if(collapsed) adminContent.classList.add('collapsed');
            else adminContent.classList.remove('collapsed');
        };
        
        updateUI();
    }
    
    // 启动
    renderAuth();
</script>
</body>
</html>
