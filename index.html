<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>龙虎对决 · 纯动画版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a1f1a; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'PingFang SC', sans-serif;
            padding: 12px;
        }
        .game-container {
            max-width: 500px;
            width: 100%;
            background: #2d5e48;
            border-radius: 36px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        /* 视频区 - 纯 Canvas 动画，无外部文件 */
        .battle-stage {
            margin: 12px 16px;
            border-radius: 28px;
            background: #000;
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border: 2px solid #f1c40f;
        }
        #battleCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .result-floating {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 6px 20px;
            border-radius: 40px;
            color: #ffe6b3;
            font-weight: bold;
            font-size: 14px;
            z-index: 3;
            white-space: nowrap;
            border-left: 3px solid #f1c40f;
            border-right: 3px solid #f1c40f;
            pointer-events: none;
        }
        .control-panel {
            margin: 8px 16px 20px;
            background: #1f4236;
            border-radius: 32px;
            padding: 16px;
        }
        /* 其他样式保持原有... */
        .top-bar {
            display: flex;
            gap: 12px;
            padding: 16px 18px;
            background: #1e3a2f;
        }
        .info-card {
            flex: 1;
            background: #0f2c22;
            border-radius: 28px;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
        }
        .info-card span { color: #f5b042; font-size: 20px; font-weight: bold; }
        .info-card label { color: #cbd5e0; font-size: 12px; }
        .choice-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .choice-card {
            background: #1a2e27;
            border-radius: 48px;
            text-align: center;
            padding: 12px 0;
            font-size: 36px;
            cursor: pointer;
            border: 2px solid #2f6b54;
        }
        .choice-card.active { border-color: #ffd966; background: #2f4e42; }
        .choice-card.dragon { color: #4aa3ff; }
        .choice-card.tiger { color: #ff8c42; }
        .choice-card.tie { color: #c084fc; }
        .stats-box {
            background: #0e2a20;
            border-radius: 28px;
            padding: 6px 12px;
            margin-bottom: 16px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            border-bottom: 1px solid #3d6e58;
        }
        .stat-item span { color: #ffda88; font-size: 20px; }
        .bet-amount-row { text-align: center; margin: 12px 0; color: #e9f5ef; }
        .bet-amount-row span { color: #f5c542; font-size: 26px; }
        .action-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .adjust-btn {
            background: #2e4e40;
            width: 58px;
            border-radius: 30px;
            font-size: 32px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .confirm-btn {
            flex: 1;
            background: linear-gradient(145deg, #dd3b2f, #a51f14);
            border: none;
            border-radius: 60px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .mode-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .mode-btn, .speed-option {
            background: #1e3a2f;
            border-radius: 48px;
            padding: 12px 0;
            text-align: center;
            cursor: pointer;
            color: #efe3c9;
        }
        .mode-btn.active, .speed-option.active {
            background: #f1c40f;
            color: #1e3a2f;
        }
        .speed-group { display: flex; gap: 4px; background: #1e3a2f; border-radius: 48px; padding: 4px; }
        .speed-option { flex: 1; padding: 8px 0; }
        .disabled-click { pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="info-card"><label>账户余额</label><span id="balanceDisplay">1000.00</span></div>
        <div class="info-card"><label>奖池累积</label><span id="jackpotDisplay">84291.50</span></div>
    </div>

    <!-- 纯 Canvas 动画区，无任何视频文件！ -->
    <div class="battle-stage">
        <canvas id="battleCanvas" width="800" height="450"></canvas>
        <div class="result-floating" id="battleResultMsg">⚔️ 龙虎对决 · 15秒决胜 ⚔️</div>
    </div>

    <div class="control-panel">
        <div class="choice-row">
            <div class="choice-card dragon" data-choice="dragon">🐉 龙</div>
            <div class="choice-card tie" data-choice="tie">⚖️ 和</div>
            <div class="choice-card tiger" data-choice="tiger">🐅 虎</div>
        </div>
        <div class="stats-box">
            <div class="stat-item"><label>💰 当前押注</label><span id="currentBetVal">100.00</span></div>
            <div class="stat-item"><label>🏆 预计奖金</label><span id="expectedWin">100.00</span></div>
            <div class="stat-item"><label>🎯 当前选择</label><span id="selectedChoiceText">未选择</span></div>
        </div>
        <div class="bet-amount-row">🎲 押注金额：<span id="betAmountSpan">100</span> USDT</div>
        <div class="action-buttons">
            <button class="adjust-btn" id="decreaseBet">−</button>
            <button class="confirm-btn" id="confirmBetBtn">⚡ 确认投注</button>
            <button class="adjust-btn" id="increaseBet">+</button>
        </div>
        <div class="mode-bar">
            <div class="mode-btn" id="autoModeBtn">🔁 自动投注</div>
            <div class="speed-group">
                <div class="speed-option" data-speed="1">1X</div>
                <div class="speed-option active" data-speed="2">2X</div>
                <div class="speed-option" data-speed="3">3X</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== 游戏逻辑 ==========
    let balance = 1000.00;
    const betOptions = [10, 50, 100, 500, 1000];
    let currentBetIndex = 2;
    let selectedOption = null;
    let isGameInProgress = false;
    let autoMode = false;
    let currentSpeed = 2;
    let autoTimer = null;
    let gameTimeout = null;

    const balanceSpan = document.getElementById('balanceDisplay');
    const currentBetSpan = document.getElementById('currentBetVal');
    const expectedWinSpan = document.getElementById('expectedWin');
    const selectedChoiceSpan = document.getElementById('selectedChoiceText');
    const betAmountSpan = document.getElementById('betAmountSpan');
    const resultMsgDiv = document.getElementById('battleResultMsg');

    function updateUI() {
        balanceSpan.textContent = balance.toFixed(2);
        const bet = betOptions[currentBetIndex];
        currentBetSpan.textContent = bet.toFixed(2);
        betAmountSpan.textContent = bet;
        let winMulti = (selectedOption === 'tie') ? 8 : 1;
        expectedWinSpan.textContent = (bet * winMulti).toFixed(2);
        if(selectedOption === 'dragon') selectedChoiceSpan.textContent = '🐉 龙';
        else if(selectedOption === 'tiger') selectedChoiceSpan.textContent = '🐅 虎';
        else if(selectedOption === 'tie') selectedChoiceSpan.textContent = '⚖️ 和';
        else selectedChoiceSpan.textContent = '未选择';
    }

    function setSelected(choice) {
        if(isGameInProgress) { resultMsgDiv.textContent = '对局中，请稍后再选'; return; }
        selectedOption = choice;
        document.querySelectorAll('.choice-card').forEach(c => c.classList.remove('active'));
        document.querySelector(`.choice-card.${choice}`).classList.add('active');
        updateUI();
    }

    function changeBet(delta) {
        if(isGameInProgress) return;
        let newIdx = currentBetIndex + delta;
        if(newIdx >= 0 && newIdx < betOptions.length) {
            currentBetIndex = newIdx;
            updateUI();
        }
    }

    function getResult() {
        const r = Math.random();
        if(r < 0.45) return 'dragon';
        if(r < 0.9) return 'tiger';
        return 'tie';
    }

    function startBattle() {
        if(isGameInProgress) return;
        if(!selectedOption) { resultMsgDiv.textContent = '请选择押注项'; return; }
        const bet = betOptions[currentBetIndex];
        if(balance < bet) { resultMsgDiv.textContent = '余额不足'; return; }
        
        balance -= bet;
        updateUI();
        isGameInProgress = true;
        document.querySelector('.control-panel').classList.add('disabled-click');
        resultMsgDiv.textContent = '⚔️ 龙争虎斗 · 15秒揭晓 ⚔️';
        
        if(gameTimeout) clearTimeout(gameTimeout);
        gameTimeout = setTimeout(() => {
            const result = getResult();
            let win = 0;
            let msg = '';
            if(result === 'dragon') msg = '🐉 青龙降世，龙威大胜！';
            else if(result === 'tiger') msg = '🐅 猛虎出山，虎啸震天！';
            else msg = '⚖️ 势均力敌 · 和局收场 ⚖️';
            
            if(result === selectedOption) {
                const multi = (selectedOption === 'tie') ? 8 : 1;
                win = bet * multi;
                balance += win;
                resultMsgDiv.innerHTML = `✨ 命中！ ${msg} 赢得 ${win.toFixed(2)} USDT ✨`;
            } else {
                resultMsgDiv.innerHTML = `💔 惜败！ ${msg} 再接再厉 💔`;
            }
            updateUI();
            isGameInProgress = false;
            document.querySelector('.control-panel').classList.remove('disabled-click');
            
            if(autoMode && !isGameInProgress && balance >= betOptions[currentBetIndex]) {
                if(autoTimer) clearTimeout(autoTimer);
                autoTimer = setTimeout(() => startBattle(), currentSpeed * 1000);
            }
            gameTimeout = null;
        }, 15000);
    }

    function toggleAuto() {
        if(isGameInProgress) { resultMsgDiv.textContent = '请等待对局结束'; return; }
        autoMode = !autoMode;
        autoModeBtn.classList.toggle('active');
        autoModeBtn.textContent = autoMode ? '⏸️ 关闭自动' : '🔁 自动投注';
        if(autoMode && !isGameInProgress && selectedOption && balance >= betOptions[currentBetIndex]) {
            if(autoTimer) clearTimeout(autoTimer);
            autoTimer = setTimeout(() => startBattle(), 200);
        }
    }

    function setSpeed(s) {
        currentSpeed = s;
        document.querySelectorAll('.speed-option').forEach(opt => opt.classList.remove('active'));
        document.querySelector(`.speed-option[data-speed="${s}"]`).classList.add('active');
    }

    document.querySelectorAll('.choice-card').forEach(c => {
        c.onclick = () => setSelected(c.getAttribute('data-choice'));
    });
    document.getElementById('decreaseBet').onclick = () => changeBet(-1);
    document.getElementById('increaseBet').onclick = () => changeBet(1);
    document.getElementById('confirmBetBtn').onclick = () => { if(autoMode) toggleAuto(); startBattle(); };
    document.getElementById('autoModeBtn').onclick = toggleAuto;
    document.querySelectorAll('.speed-option').forEach(opt => {
        opt.onclick = () => setSpeed(parseInt(opt.getAttribute('data-speed')));
    });
    updateUI();

    // ========== 纯 Canvas 动画（无视频文件，永远小于 1MB！）==========
    const canvas = document.getElementById('battleCanvas');
    let ctx = canvas.getContext('2d');
    let animFrame;
    
    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    let frame = 0;
    function drawAnimation() {
        if (!ctx) return;
        const w = canvas.width, h = canvas.height;
        if (w === 0 || h === 0) { animFrame = requestAnimationFrame(drawAnimation); return; }
        
        frame++;
        const t = Date.now() / 1000;
        const cycle = t % 15;
        const intensity = 0.5 + 0.5 * Math.sin(cycle * Math.PI * 2);
        
        // 背景
        const grad = ctx.createLinearGradient(0, 0, w, h);
        grad.addColorStop(0, '#0a1f2a');
        grad.addColorStop(1, '#1f3b30');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        
        // 网格
        ctx.strokeStyle = `rgba(210, 180, 70, ${0.2 + intensity * 0.2})`;
        ctx.lineWidth = 1;
        for(let i = 0; i <= 18; i++) {
            ctx.beginPath();
            ctx.moveTo(i * w/18, 0);
            ctx.lineTo(i * w/18, h);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * h/12);
            ctx.lineTo(w, i * h/12);
            ctx.stroke();
        }
        
        // 龙虎图腾（动态跳动）
        ctx.font = `${Math.min(70, w * 0.12)}px "Segoe UI Emoji"`;
        ctx.fillStyle = `rgba(80, 180, 255, ${0.85 + Math.sin(t*8)*0.15})`;
        ctx.fillText("🐉", w * 0.2, h * 0.55 + Math.sin(t*10)*5);
        ctx.fillStyle = `rgba(255, 140, 60, ${0.85 + Math.cos(t*8)*0.15})`;
        ctx.fillText("🐅", w * 0.72, h * 0.58 + Math.cos(t*9)*5);
        
        // 倒计时
        const remain = (15 - (cycle % 15)).toFixed(1);
        ctx.font = `bold ${Math.min(22, w*0.045)}px monospace`;
        ctx.fillStyle = "#ffcc66";
        ctx.fillText(`⏱️ ${remain}s`, w - 75, 40);
        
        // 标题
        ctx.font = `bold ${Math.min(24, w*0.05)}px "PingFang SC"`;
        ctx.fillStyle = "#f5cd6d";
        ctx.fillText("龙虎争霸 · 15秒决胜", w/2 - 115, 38);
        
        if (isGameInProgress) {
            ctx.font = `bold ${Math.min(28, w*0.07)}px monospace`;
            ctx.fillStyle = "#ff8866";
            ctx.fillText("⚡ 激战正酣 ⚡", w/2 - 85, h - 28);
        }
        
        animFrame = requestAnimationFrame(drawAnimation);
    }
    drawAnimation();
</script>
</body>
</html>
