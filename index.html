<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_JADE_PRO</title>
    <style>
        :root {
            --jade-green: #387c64;      /* 玉石绿主体 */
            --jade-light: #4ea88a;      /* 玉石绿高光 */
            --jade-dark: #1e4537;       /* 玉石绿深色边 */
            --stone-grey: #6b737e;      /* 样品灰色背景 */
            --inner-bg: #5a626d;        /* 内陷深灰 */
            --gold: #f1c40f;
            --red-num: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #222; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }

        /* 3mm 墨绿色（玉石绿）平行立体外包围 */
        .phone-container {
            width: 100vw;
            height: 100vh;
            max-width: 450px; /* 模拟手机宽度 */
            border: 6px solid var(--jade-dark); /* 约3mm厚度感 */
            outline: 2px solid var(--jade-light);
            background: var(--stone-grey);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 2mm 墨绿色隔离横条 */
        .divider {
            height: 4px;
            background: var(--jade-dark);
            border-top: 1px solid var(--jade-light);
            border-bottom: 1px solid #000;
            width: 100%;
        }

        /* 上方 1/8：内陷功能键 */
        .header-section {
            height: 12%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 10px;
        }
        .inset-box {
            background: var(--inner-bg);
            border: 2px solid var(--jade-dark);
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.4);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .label { font-size: 10px; color: #ccc; letter-spacing: 1px; }
        .val { font-size: 16px; font-weight: bold; }

        /* 中间 4/8：转盘（大幅上移，压缩垂直空间） */
        .wheel-section {
            height: 45%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-image: radial-gradient(var(--inner-bg) 1px, transparent 1px);
            background-size: 15px 15px; /* 网格感 */
        }
        .pointer { 
            position: absolute; top: 5%; z-index: 10; 
            width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; 
            border-top: 20px solid var(--red-num); filter: drop-shadow(0 0 5px red);
        }
        #wheel { 
            width: 260px; height: 260px; border-radius: 50%; 
            border: 8px solid var(--jade-green);
            background: #333; position: relative; 
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1.1);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .slot { position: absolute; width: 100%; height: 100%; text-align: center; padding-top: 20px; font-size: 26px; }
        .hub { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 65px; height: 65px; background: var(--jade-dark); border-radius: 50%; 
            border: 2px solid var(--jade-light); z-index: 5; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--gold); font-weight: bold; font-size: 12px;
        }

        /* 底部操作区 */
        .footer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 15px;
            justify-content: space-around;
        }
        .main-action {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .side-btn { 
            width: 50px; height: 50px; background: var(--jade-green); 
            border: 2px solid var(--jade-dark); border-radius: 10px; 
            color: white; font-size: 24px; font-weight: bold;
        }
        .execute-btn { 
            flex: 1; height: 60px; background: linear-gradient(180deg, #d32f2f, #b71c1c);
            border: none; border-radius: 30px; color: white; font-size: 20px; font-weight: bold;
            box-shadow: 0 5px 0 #7f0000;
        }
        .execute-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #7f0000; }

        .sub-action {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .func-btn { 
            background: var(--inner-bg); border: 1px solid var(--jade-dark); 
            height: 40px; border-radius: 8px; color: #ddd; font-size: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .func-btn.active { border-color: var(--gold); background: var(--jade-dark); }

        .blur { filter: blur(3px); }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header-section">
        <div class="inset-box">
            <span class="label">BALANCE</span>
            <span class="val" id="ui-bal" style="color:var(--red-num)">146.80</span>
        </div>
        <div class="inset-box">
            <span class="label">NETWORK POOL</span>
            <span class="val" id="ui-pool" style="color:var(--gold)">84291.50</span>
        </div>
    </div>

    <div class="divider"></div>

    <div class="wheel-section">
        <div class="pointer"></div>
        <div id="wheel"></div>
        <div class="hub" id="ui-hub">READY</div>
    </div>

    <div class="divider"></div>

    <div class="footer-section">
        <div style="text-align: center; color: #fff; font-size: 14px; font-weight: bold;">
            STAKE: <span id="ui-bet" style="color:var(--gold)">5.5</span> USDT
        </div>

        <div class="main-action">
            <button class="side-btn" onclick="App.adjBet(-1)">−</button>
            <button class="execute-btn" onclick="App.roll()" id="btn-go">EXECUTE</button>
            <button class="side-btn" onclick="App.adjBet(1)">+</button>
        </div>

        <div class="sub-action">
            <div class="func-btn" id="opt-auto" onclick="App.toggleAuto()">🤖 AUTO: <b>OFF</b></div>
            <div class="func-btn" id="opt-speed" onclick="App.toggleSpeed()">⚡ SPEED: <b>1X</b></div>
        </div>
    </div>
</div>

<script>
const App = {
    bets: [5.5, 10.0, 20.0, 50.0, 100.0],
    icons: ['💎','💊','⚡','🔥','💰','🦁','🏆','🎲'],
    state: { bal: 146.80, betIdx: 0, deg: 0, isRolling: false, auto: false, speed: 1 },

    init() {
        const wheel = document.getElementById('wheel');
        this.icons.forEach((s, i) => {
            const el = document.createElement('div');
            el.className = 'slot';
            el.style.transform = `rotate(${i * 45}deg)`;
            el.innerText = s;
            wheel.appendChild(el);
        });
        this.updateUI();
    },

    adjBet(dir) {
        if(this.state.isRolling) return;
        this.state.betIdx = Math.max(0, Math.min(this.bets.length-1, this.state.betIdx + dir));
        this.updateUI();
    },

    toggleSpeed() {
        this.state.speed = (this.state.speed % 3) + 1;
        const dur = {1: '4s', 2: '2s', 3: '0.8s'}[this.state.speed];
        document.getElementById('wheel').style.transitionDuration = dur;
        this.updateUI();
    },

    toggleAuto() {
        this.state.auto = !this.state.auto;
        if(this.state.auto && !this.state.isRolling) this.roll();
        this.updateUI();
    },

    async roll() {
        const cost = this.bets[this.state.betIdx];
        if(this.state.isRolling || this.state.bal < cost) {
            this.state.auto = false; this.updateUI(); return;
        }

        this.state.isRolling = true;
        this.state.bal -= cost;
        document.getElementById('ui-hub').innerText = "SPINNING";
        document.getElementById('wheel').classList.add('blur');
        this.updateUI();

        const winIdx = Math.floor(Math.random() * 8);
        const rounds = this.state.speed === 1 ? 8 : (this.state.speed === 2 ? 5 : 3);
        const targetDeg = (360 - (this.state.deg % 360)) + (rounds * 360) - (winIdx * 45);
        this.state.deg += targetDeg;
        
        document.getElementById('wheel').style.transform = `rotate(${this.state.deg}deg)`;

        const times = {1: 4000, 2: 2000, 3: 800};
        setTimeout(() => {
            document.getElementById('wheel').classList.remove('blur');
            this.state.isRolling = false;
            const isWin = Math.random() > 0.7;
            if(isWin) {
                this.state.bal += cost * 3;
                document.getElementById('ui-hub').innerText = "WIN!";
            } else {
                document.getElementById('ui-hub').innerText = "LOSE";
            }
            this.updateUI();
            if(this.state.auto) setTimeout(() => this.roll(), 800);
        }, times[this.state.speed]);
    },

    updateUI() {
        document.getElementById('ui-bal').innerText = this.state.bal.toFixed(2);
        document.getElementById('ui-bet').innerText = this.bets[this.state.betIdx].toFixed(1);
        document.getElementById('opt-auto').className = this.state.auto ? "func-btn active" : "func-btn";
        document.getElementById('opt-auto').querySelector('b').innerText = this.state.auto ? "ON" : "OFF";
        document.getElementById('opt-speed').querySelector('b').innerText = this.state.speed + "X";
        document.getElementById('btn-go').disabled = this.state.isRolling;
    }
};

App.init();
</script>
</body>
</html>
