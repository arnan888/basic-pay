<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>金辉四游戏 · 完整版（含全组合双押+收款码）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #fef9e6 0%, #fff5e0 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 16px;
            min-height: 100vh;
            color: #2c2b28;
        }
        #app {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(255, 248, 235, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(255, 215, 140, 0.6);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,200,0.8);
            overflow: hidden;
        }
        .auth-panel {
            padding: 32px 24px;
            background: rgba(255, 248, 235, 0.9);
        }
        .auth-panel h2, .auth-panel h3 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #c47c3a, #e09d32);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-input {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            background: white;
            border: 1px solid #ffd9a5;
            border-radius: 32px;
            color: #3a2a1a;
            font-size: 1rem;
            outline: none;
        }
        .auth-input:focus {
            border-color: #e09d32;
            box-shadow: 0 0 0 3px rgba(224, 157, 50, 0.2);
        }
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 12px 0;
        }
        .code-btn {
            background: linear-gradient(135deg, #c47c3a, #e09d32);
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .auth-btn {
            background: linear-gradient(135deg, #e09d32, #c47c3a);
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            font-size: 1rem;
        }
        .auth-btn:active, .code-btn:active { transform: scale(0.98); }
        hr {
            margin: 24px 0;
            border-color: #ffd9a5;
        }
        .auth-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 16px;
            color: #b97f2e;
        }
        .user-section {
            background: rgba(255, 245, 225, 0.9);
            padding: 16px;
            border-bottom: 1px solid #ffdfb0;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        #userBalanceDisplay {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c47c3a, #f5b042);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn-sm {
            background: #fff0e0;
            border: 1px solid #ffd9a5;
            padding: 6px 14px;
            border-radius: 40px;
            color: #8b5a2b;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .charge-btn, .withdraw-btn {
            background: linear-gradient(135deg, #f5b042, #e09d32);
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .lang-switch {
            background: #c47c3a;
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            color: white;
            cursor: pointer;
            margin-left: 8px;
        }
        .game-nav {
            display: flex;
            gap: 8px;
            background: #fff0e0;
            padding: 8px 16px;
            margin: 16px 12px;
            border-radius: 60px;
        }
        .game-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #8b5a2b;
            cursor: pointer;
            transition: 0.2s;
        }
        .game-tab.active {
            background: linear-gradient(135deg, #e09d32, #c47c3a);
            color: white;
            box-shadow: 0 4px 12px rgba(192, 124, 58, 0.3);
        }
        .game-container {
            padding: 12px 16px 24px;
        }
        .game-card {
            background: rgba(255, 248, 235, 0.8);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #ffdfb0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .chip {
            background: linear-gradient(145deg, #f5e6d3, #ffe8cc);
            display: inline-block;
            padding: 8px 16px;
            border-radius: 40px;
            margin: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #8b5a2b;
            border: 1px solid #ffd9a5;
        }
        .chip.selected {
            background: linear-gradient(145deg, #e09d32, #c47c3a);
            color: white;
            border-color: #e09d32;
        }
        .quick-bet, .clear-bet {
            background: #fff0e0;
            border: 1px solid #ffd9a5;
            border-radius: 30px;
            padding: 6px 14px;
            margin: 4px;
            cursor: pointer;
            color: #b97f2e;
            font-weight: 500;
        }
        .exec-btn {
            background: linear-gradient(135deg, #c47c3a, #e09d32);
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 4px;
        }
        .main-go {
            background: linear-gradient(135deg, #e94560, #c23b22);
        }
        .dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            perspective: 800px;
        }
        .dice-cube {
            width: 80px;
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
        }
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fef0df;
            border-radius: 16px;
            border: 2px solid #c47c3a;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            backface-visibility: visible;
        }
        .pip {
            width: 14px;
            height: 14px;
            background: #c47c3a;
            border-radius: 50%;
            margin: 3px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 12px; left: 12px; }
        .pip-tr { position: absolute; top: 12px; right: 12px; }
        .pip-bl { position: absolute; bottom: 12px; left: 12px; }
        .pip-br { position: absolute; bottom: 12px; right: 12px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1, .pip-l2, .pip-l3 { position: absolute; left: 12px; }
        .pip-l1 { top: 12px; }
        .pip-l2 { top: 50%; transform: translateY(-50%); }
        .pip-l3 { bottom: 12px; }
        .pip-r1, .pip-r2, .pip-r3 { position: absolute; right: 12px; }
        .pip-r1 { top: 12px; }
        .pip-r2 { top: 50%; transform: translateY(-50%); }
        .pip-r3 { bottom: 12px; }
        .dice-face-text {
            font-size: 2.5rem;
            text-shadow: 0 0 2px #c47c3a;
        }
        .front { transform: translateZ(40px); }
        .back { transform: rotateY(180deg) translateZ(40px); }
        .right { transform: rotateY(90deg) translateZ(40px); }
        .left { transform: rotateY(-90deg) translateZ(40px); }
        .top { transform: rotateX(90deg) translateZ(40px); }
        .bottom { transform: rotateX(-90deg) translateZ(40px); }
        @media (max-width: 480px) {
            .dice-cube { width: 65px; height: 65px; }
            .front, .back, .right, .left, .top, .bottom { transform: translateZ(32px); }
            .back { transform: rotateY(180deg) translateZ(32px); }
            .right { transform: rotateY(90deg) translateZ(32px); }
            .left { transform: rotateY(-90deg) translateZ(32px); }
            .top { transform: rotateX(90deg) translateZ(32px); }
            .bottom { transform: rotateX(-90deg) translateZ(32px); }
            .dice-face-text { font-size: 2rem; }
            .pip { width: 10px; height: 10px; }
        }
        .fish-pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
        }
        .fish-bet-card {
            background: rgba(255, 248, 235, 0.9);
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            border: 1px solid #ffdfb0;
        }
        .pair-bet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 12px 0;
            max-height: 260px;
            overflow-y: auto;
            background: rgba(255, 245, 225, 0.5);
            border-radius: 24px;
            padding: 8px;
        }
        .pair-bet-item {
            background: rgba(255, 248, 235, 0.9);
            border-radius: 20px;
            padding: 6px;
            text-align: center;
            border: 1px solid #ffdfb0;
            font-size: 0.8rem;
        }
        .pair-bet-item span {
            display: inline-block;
            margin: 2px;
        }
        .bet-card {
            background: rgba(255, 248, 235, 0.9);
            border-radius: 20px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #ffdfb0;
        }
        .bet-card:active { background: #ffe8cc; transform: scale(0.96); }
        .history-cell {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff0e0;
            font-weight: bold;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff8f0;
            border-radius: 32px;
            padding: 24px;
            max-width: 90%;
            max-height: 85%;
            overflow: auto;
            color: #3a2a1a;
            border: 1px solid #ffd9a5;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2b28;
            color: #ffd9a5;
            padding: 8px 20px;
            border-radius: 60px;
            z-index: 2000;
            font-weight: bold;
            white-space: nowrap;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        .result-popup {
            position: fixed;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #e09d32, #c47c3a);
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 1500;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .points-grid, .trio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 8px;
            margin: 12px 0;
        }
        button { cursor: pointer; }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .admin-table th, .admin-table td {
            padding: 8px 4px;
            border-bottom: 1px solid #ffd9a5;
            text-align: left;
        }
        .admin-btn {
            background: #e09d32;
            border: none;
            border-radius: 20px;
            padding: 4px 8px;
            margin: 2px;
            color: white;
            font-weight: bold;
        }
        .qr-img {
            width: 140px;
            height: 140px;
            margin: 8px auto;
            display: block;
            background: white;
            border-radius: 20px;
            padding: 8px;
            object-fit: contain;
        }
        .donation-area {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding: 16px 12px;
            background: rgba(255, 245, 225, 0.8);
            border-radius: 32px;
            border-top: 1px solid #ffdfb0;
        }
        .qr-card {
            text-align: center;
            background: #fff8f0;
            border-radius: 28px;
            padding: 8px 12px;
            width: 150px;
        }
        .niuniu-cards {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .card {
            width: 70px;
            height: 100px;
            background: white;
            border-radius: 12px;
            border: 1px solid #c47c3a;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #c47c3a;
            position: relative;
            transition: transform 0.3s;
            opacity: 0;
            transform: scale(0.8);
            animation: cardAppear 0.2s forwards;
        }
        @keyframes cardAppear {
            to { opacity: 1; transform: scale(1); }
        }
        .card span.suit {
            font-size: 2rem;
        }
        .card .rank {
            font-size: 1.3rem;
            margin-top: 5px;
        }
        .niuniu-area {
            text-align: center;
            margin: 16px 0;
        }
        .niuniu-result {
            font-size: 1.4rem;
            font-weight: bold;
            color: #e09d32;
            margin: 8px 0;
        }
        .multiplier-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 12px 0;
        }
        .multiplier-btn {
            background: linear-gradient(145deg, #f5e6d3, #ffe8cc);
            border: 1px solid #ffd9a5;
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: bold;
            color: #8b5a2b;
            cursor: pointer;
            transition: 0.1s;
        }
        .multiplier-btn.selected {
            background: linear-gradient(135deg, #e09d32, #c47c3a);
            color: white;
            border-color: #e09d32;
        }
        @keyframes dtShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px) scale(1.1); text-shadow: 0 0 10px gold; }
            50% { transform: translateX(10px) scale(1.2); text-shadow: 0 0 20px orange; }
            75% { transform: translateX(-5px) scale(1.1); }
            100% { transform: translateX(0) scale(1); }
        }
        @keyframes dtFlash {
            0% { opacity: 1; text-shadow: 0 0 5px white; }
            50% { opacity: 0.3; text-shadow: 0 0 30px gold; }
            100% { opacity: 1; text-shadow: 0 0 5px white; }
        }
        .dt-flash { animation: dtFlash 0.3s 3; }
        .dt-animation-box { animation: dtShake 0.5s ease-in-out; }
        @media (max-width: 480px) {
            .card { width: 55px; height: 80px; }
            .card span.suit { font-size: 1.5rem; }
            .card .rank { font-size: 1rem; }
            .qr-img { width: 100px; height: 100px; }
            .donation-area { gap: 20px; }
            .pair-bet-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== 后端 API 封装 ====================
    const API_BASE = "http://192.168.100.24:3000";
    let authToken = sessionStorage.getItem('authToken');
    let currentUserAccount = null;
    let currentBalance = 0;
    let adjustFactor = 1.0;
    let systemBankerBalance = 50000;
    let validReferralCodes = ["VIP666","888VIP","GOLD2025","LUCKY8","DICE100"];

    function setAuthToken(token) { authToken = token; sessionStorage.setItem('authToken', token); }
    function setCurrentUser(account) { currentUserAccount = account; sessionStorage.setItem('currentUser', account); }
    function getCurrentUser() { return currentUserAccount || sessionStorage.getItem('currentUser'); }

    async function request(url, options = {}) {
        const fullUrl = url.startsWith('/api') ? url : '/api' + url;
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (authToken) headers['Authorization'] = authToken;
        const res = await fetch(API_BASE + fullUrl, { ...options, headers });
        return res.json();
    }
    async function apiLogin(account, password) {
        const data = await request('/login', { method: 'POST', body: JSON.stringify({ account, password }) });
        if (data.success) { setAuthToken(data.token); setCurrentUser(data.account); currentBalance = data.balance; updateBalanceDisplay(); }
        return data;
    }
    async function apiRegister(account, password, referralCode, verificationCode) {
        return request('/register', { method: 'POST', body: JSON.stringify({ account, password, referralCode, verificationCode }) });
    }
    async function apiGetUser() {
        return request('/user');
    }
    async function apiSettle(betAmount, winAmount, betInfo, result, gameName) {
        return request('/settle', { method: 'POST', body: JSON.stringify({ token: authToken, betAmount, winAmount, betInfo, result, gameName }) });
    }
    async function apiAdminGetUsers() {
        return request('/admin/users', { headers: { 'adminToken': 'admin888' } });
    }
    async function apiAdminUpdateBalance(targetAccount, amount, action) {
        return request('/admin/balance', { method: 'POST', body: JSON.stringify({ adminToken: 'admin888', targetAccount, amount, action }) });
    }
    async function apiRecharge(amount) {
        return request('/recharge', { method: 'POST', body: JSON.stringify({ token: authToken, amount }) });
    }
    async function apiWithdraw(amount, type, account) {
        return request('/withdraw', { method: 'POST', body: JSON.stringify({ token: authToken, amount, type, account }) });
    }
    async function apiGetSystem() {
        return request('/system');
    }
    async function apiAdminSetSystem(banker, factor) {
        return request('/admin/system', { method: 'POST', body: JSON.stringify({ adminToken: 'admin888', systemBankerBalance: banker, adjustFactor: factor }) });
    }

    function updateBalanceDisplay() {
        const span = document.getElementById("userBalanceDisplay");
        if (span) span.innerText = currentBalance.toFixed(2);
    }
    function showToast(msg) {
        let t = document.createElement('div'); t.className = 'toast-message'; t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    async function refreshBalance() {
        if (!authToken) return;
        const res = await apiGetUser();
        if (res.success) { currentBalance = res.balance; updateBalanceDisplay(); }
    }

    function recharge() {
        let yuan = prompt("请输入充值金额（元）", "10");
        if (!yuan) return;
        let yuanNum = parseFloat(yuan);
        if (isNaN(yuanNum) || yuanNum <= 0) { showToast("请输入正数"); return; }
        apiRecharge(yuanNum).then(res => {
            if (res.success) {
                let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
                modalDiv.innerHTML = `<div class="modal-content" style="text-align:center;"><h3>💎 充值 ${yuanNum} 元</h3><p>请使用微信或支付宝扫码支付，支付后联系客服上分</p><div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin:16px 0;"><div style="text-align:center;"><img class="qr-img" src="mmexport1776247819360.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 fill=%22%23999%22%3E%E5%BE%AE%E4%BF%A1%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'"><p>📱 微信收款码</p></div><div style="text-align:center;"><img class="qr-img" src="mmexport1776247823872.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 fill=%22%23999%22%3E%E6%94%AF%E4%BB%98%E5%AE%9D%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'"><p>📱 支付宝收款码</p></div></div><p style="margin-top:10px;">📞 客服微信: <strong>game_kf_888</strong> (支付后截图联系，提供充值账号)</p><button id="closeRecharge" class="auth-btn" style="margin-top:16px;">关闭</button></div>`;
                document.body.appendChild(modalDiv);
                modalDiv.querySelector('#closeRecharge').onclick = () => modalDiv.remove();
            } else { showToast(res.message || "充值失败"); }
        });
    }

    function withdraw() {
        if (currentBalance <= 0) { showToast("余额不足"); return; }
        let amount = parseFloat(prompt("提现金额 (元)", "10"));
        if (isNaN(amount) || amount <= 0 || amount > currentBalance) { showToast("金额无效"); return; }
        let type = confirm("提现方式：确定=微信，取消=支付宝") ? "微信" : "支付宝";
        let account = prompt("请输入收款账号:");
        if (!account) return;
        apiWithdraw(amount, type, account).then(res => {
            if (res.success) { showToast(`提现申请已提交！${amount}元将处理到${type}账号 ${account}，客服审核后到账`); refreshBalance(); }
            else { showToast(res.message || "提现失败"); }
        });
    }

    function showServiceModal() {

    // ==================== 葫芦鱼游戏（全组合双押版） ====================

        // 所有组合（15种）
        const allPairs = [];
        for (let i = 0; i < patternNames.length; i++) {

        }
        // 存储每个组合的下注金额

        let currentChip = 100;
        let hasGrabbed = false;
        let playerBankerBalance = 0;
        let gameRecords = [];
        let isRolling = false, roundActive = true, countdownTimer = null;
        let lastWinAmount = 0;

        container.innerHTML = `
            <div class="game-card">

                    <div style="flex:1; background:#fff0e0; border-radius:24px; padding:8px; text-align:center;"><div>🎲 总押注</div><div id="fishTotalBet">0</div></div>
                    <div style="flex:1; background:#fff0e0; border-radius:24px; padding:8px; text-align:center;"><div>🏆 上局净利</div><div id="fishLastWin">0</div></div>
                </div>
                <div class="chips-row" style="display:flex; justify-content:space-between; align-items:center; margin:12px 0; flex-wrap:wrap; gap:12px;">
                    <div class="chips-group" style="display:flex; flex-wrap:wrap; gap:8px;">
                        <span class="chip" data-chip="10">10</span>
                        <span class="chip" data-chip="50">50</span>
                        <span class="chip selected" data-chip="100">100</span>
                        <span class="chip" data-chip="500">500</span>
                        <span class="chip" data-chip="1000">1000</span>
                    </div>
                    <div class="timer-box" style="background:#fff0e0; border-radius:40px; padding:6px 16px; border:1px solid #ffd9a5; font-weight:bold;">⏱️ 下注 <span id="fishPhaseTimer">25</span> 秒</div>
                </div>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <button id="fishRollBtn" class="exec-btn">🎲 开骰</button>
                    <button id="fishClearBtn" class="exec-btn" style="background:#c23b22;">清空全部</button>
                    <button id="fishGrabBtn" class="exec-btn" style="background:#f59e0b;">🎲 抢庄</button>
                </div>
                <div class="dice-3d-area">
                    <div class="dice-cube" id="fishDice0"></div>
                    <div class="dice-cube" id="fishDice1"></div>
                    <div class="dice-cube" id="fishDice2"></div>
                </div>
                <div id="fishPatternGrid" class="fish-pattern-grid"></div>
                <!-- 双押组合区域：所有对子 -->
                <div style="margin: 8px 0 4px; font-weight:bold;">🎯 对子双押（5倍）</div>
                <div id="pairBetsGrid" class="pair-bet-grid"></div>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <button id="fishClearPairsBtn" class="exec-btn" style="background:#c23b22;">清空所有对子</button>
                </div>
                <button id="fishRecordBtn" class="exec-btn" style="width:100%; margin-top:8px;">📜 记录</button>
                <div id="fishPhaseHint" style="text-align:center; margin-top:12px; background:#fff0e0; border-radius:30px; padding:8px;">🎲 下注阶段 · 25秒</div>
            </div>
        `;

        // 构建骰子
        function buildFishDice(diceDiv) {
            if (!diceDiv) return;
            diceDiv.innerHTML = '';
            const faces = ['front', 'back', 'right', 'left', 'top', 'bottom'];
            const facePatterns = patternEmojis;
            faces.forEach((face, idx) => {
                let fd = document.createElement('div');
                fd.className = `dice-face ${face}`;
                fd.style.background = "#fef0df";
                fd.style.display = "flex";
                fd.style.alignItems = "center";
                fd.style.justifyContent = "center";
                fd.style.fontSize = "2.5rem";
                fd.style.fontWeight = "bold";
                fd.style.color = "#c47c3a";
                fd.innerText = facePatterns[idx % facePatterns.length];
                diceDiv.appendChild(fd);
            });
            const randX = Math.floor(Math.random() * 360);
            const randY = Math.floor(Math.random() * 360);
            diceDiv.style.transform = `rotateX(${randX}deg) rotateY(${randY}deg)`;
        }
        function setFishDiceValue(diceDiv, patternName) {
            const index = patternNames.indexOf(patternName);
            let rotateX = 0, rotateY = 0;
            switch(index) {
                case 0: rotateX=0; rotateY=0; break;
                case 1: rotateX=0; rotateY=-90; break;
                case 2: rotateX=0; rotateY=180; break;
                case 3: rotateX=0; rotateY=90; break;
                case 4: rotateX=-90; rotateY=0; break;
                case 5: rotateX=90; rotateY=0; break;
            }
            const extraX = 360 * (1 + Math.floor(Math.random() * 2));
            const extraY = 360 * (1 + Math.floor(Math.random() * 2));
            diceDiv.style.transform = `rotateX(${rotateX + extraX}deg) rotateY(${rotateY + extraY}deg)`;
        }
        const fishDice = [document.getElementById('fishDice0'), document.getElementById('fishDice1'), document.getElementById('fishDice2')];
        fishDice.forEach(d => buildFishDice(d));

        function updateFishUI() {
            for (let p in patternBets) { let span = document.getElementById(`fishBet_${p}`); if(span) span.innerText = patternBets[p]; }
            for (let pair of allPairs) {
                let span = document.getElementById(`pairBet_${pair.key}`);
                if (span) span.innerText = pairBets[pair.key];
            }
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(pairBets).reduce((a,b)=>a+b,0);
            document.getElementById('fishTotalBet').innerText = total;
            document.getElementById('fishLastWin').innerText = lastWinAmount;
            let bankerSpan = document.getElementById('fishBankerDisplay');
            if (bankerSpan) bankerSpan.innerText = hasGrabbed ? playerBankerBalance.toFixed(2) : "∞";
        }

        function addPatternBet(pattern, val) {
            if (hasGrabbed) { showToast("庄家不能下注"); return; }
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(pairBets).reduce((a,b)=>a+b,0);
            if (val > 500) { showToast("单注上限500"); return; }
            if (total+val > 2000) { showToast("总注上限2000"); return; }
            if (val > currentBalance) { showToast("余额不足"); return; }
            currentBalance -= val;
            updateBalanceDisplay();
            patternBets[pattern] += val;
            updateFishUI();
        }
        function subPatternBet(pattern, val) {
            let cur = patternBets[pattern];
            if (cur < val) val = cur;
            if (val===0) return;
            patternBets[pattern] -= val;
            currentBalance += val;
            updateBalanceDisplay();
            updateFishUI();
        }
        function addPairBet(pairKey, val) {
            if (hasGrabbed) { showToast("庄家不能下注"); return; }
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(pairBets).reduce((a,b)=>a+b,0);
            if (val > 500) { showToast("单注上限500"); return; }
            if (total+val > 2000) { showToast("总注上限2000"); return; }
            if (val > currentBalance) { showToast("余额不足"); return; }
            currentBalance -= val;
            updateBalanceDisplay();
            pairBets[pairKey] += val;
            updateFishUI();
        }
        function subPairBet(pairKey, val) {
            let cur = pairBets[pairKey];
            if (cur < val) val = cur;
            if (val===0) return;
            pairBets[pairKey] -= val;
            currentBalance += val;
            updateBalanceDisplay();
            updateFishUI();
        }
        function clearAllBets() {
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(pairBets).reduce((a,b)=>a+b,0);
            if (total>0) { currentBalance += total; updateBalanceDisplay(); }
            patternBets = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
            for (let p of allPairs) pairBets[p.key] = 0;
            updateFishUI();
        }
        function clearPairsOnly() {
            let totalPairs = Object.values(pairBets).reduce((a,b)=>a+b,0);
            if (totalPairs>0) { currentBalance += totalPairs; updateBalanceDisplay(); }
            for (let p of allPairs) pairBets[p.key] = 0;
            updateFishUI();
        }

        async function rollFishDiceWithAnimation(finalPatterns) {
            for (let i=0;i<3;i++) {
                fishDice[i].style.transition = 'none';
                const randX = Math.floor(Math.random() * 360);
                const randY = Math.floor(Math.random() * 360);
                fishDice[i].style.transform = `rotateX(${randX}deg) rotateY(${randY}deg)`;
            }
            await new Promise(r => setTimeout(r, 50));
            for (let i=0;i<3;i++) fishDice[i].style.transition = 'transform 0.5s cubic-bezier(0.4,0,0.2,1)';
            for (let step=0; step<12; step++) {
                for (let i=0;i<3;i++) {
                    const randX = Math.random() * 360;
                    const randY = Math.random() * 360;
                    fishDice[i].style.transform = `rotateX(${randX}deg) rotateY(${randY}deg)`;
                }
                await new Promise(r => setTimeout(r, 80));
            }
            for (let i=0;i<3;i++) setFishDiceValue(fishDice[i], finalPatterns[i]);
            await new Promise(r => setTimeout(r, 400));
        }

        async function settleFish() {
            if (isRolling) return;
            let totalBet = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(pairBets).reduce((a,b)=>a+b,0);
            if (totalBet === 0) { showToast("请先下注"); return; }
            isRolling = true;
            let r1 = patternNames[Math.floor(Math.random()*6)];
            let r2 = patternNames[Math.floor(Math.random()*6)];
            let r3 = patternNames[Math.floor(Math.random()*6)];
            await rollFishDiceWithAnimation([r1,r2,r3]);
            let winAmount = 0;
            let occurs = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
            [r1,r2,r3].forEach(p=>occurs[p]++);
            // 单图案赔付
            for (let p in patternBets) {
                let cnt = occurs[p];
                if (cnt>0 && patternBets[p]>0) winAmount += patternBets[p] * (cnt+1);
            }
            // 对子双押赔付：如果同时包含两种图案，赔率5倍
            for (let pair of allPairs) {
                let betAmt = pairBets[pair.key];
                if (betAmt > 0 && occurs[pair.p1] > 0 && occurs[pair.p2] > 0) {
                    winAmount += betAmt * 5;
                }
            }
            winAmount = winAmount * adjustFactor;
            const settleRes = await apiSettle(totalBet, winAmount, JSON.stringify({bets: patternBets, pairs: pairBets}), `${r1},${r2},${r3}`, '葫芦鱼');
            if (settleRes.success) {
                currentBalance = settleRes.newBalance;
                updateBalanceDisplay();
                lastWinAmount = winAmount - totalBet;
            } else {
                showToast(settleRes.message || "结算失败");
                await refreshBalance();
            }
            gameRecords.unshift({ time:new Date().toLocaleTimeString(), dice:`${r1},${r2},${r3}`, result:winAmount>0?`赢${winAmount.toFixed(2)}`:`输${totalBet}` });
            clearAllBets(); // 自动清空所有下注
            let pop = document.createElement('div'); pop.className='result-popup'; pop.innerText = winAmount>0?`🎉 赢 ${winAmount.toFixed(2)} 🎉`:`😭 输 ${totalBet} 😭`; document.body.appendChild(pop); setTimeout(()=>pop.remove(), 2000);
            isRolling=false;
            if(roundActive) startFishRound();
        }

        function startFishRound() {
            if (countdownTimer) clearInterval(countdownTimer);
            let remaining=25;
            let hintDiv = document.getElementById('fishPhaseHint');
            let timerSpan = document.getElementById('fishPhaseTimer');
            if(hintDiv) hintDiv.innerText = `🎲 下注阶段 · ${remaining}秒`;
            if(timerSpan) timerSpan.innerText = remaining;
            countdownTimer = setInterval(()=>{
                remaining--;
                if(hintDiv) hintDiv.innerText = `🎲 下注阶段 · ${remaining}秒`;
                if(timerSpan) timerSpan.innerText = remaining;
                if(remaining<=0){
                    clearInterval(countdownTimer);
                    if(!isRolling && roundActive) settleFish();
                }
            },1000);
        }

        // 构建单图案网格
        let gridDiv = document.getElementById('fishPatternGrid');
        patternNames.forEach(p => {
            let card = document.createElement('div'); card.className = 'fish-bet-card';
            let emoji = patternEmojis[patternNames.indexOf(p)];
            card.innerHTML = `<div style="font-size:1.6rem; margin-bottom:4px;">${emoji}</div><div>${p}</div><div><button class="quick-bet sub-pat" data-pat="${p}">-</button><span id="fishBet_${p}" style="margin:0 12px; font-weight:bold;">0</span><button class="quick-bet add-pat" data-pat="${p}">+</button></div>`;
            gridDiv.appendChild(card);
        });
        // 构建双押网格
        let pairGrid = document.getElementById('pairBetsGrid');
        allPairs.forEach(pair => {
            let item = document.createElement('div'); item.className = 'pair-bet-item';
            item.innerHTML = `<span>${pair.p1}${patternEmojis[patternNames.indexOf(pair.p1)]}+${pair.p2}${patternEmojis[patternNames.indexOf(pair.p2)]}</span><br>
                <button class="quick-bet sub-pair" data-pair="${pair.key}">-</button>
                <span id="pairBet_${pair.key}" style="margin:0 8px; font-weight:bold;">0</span>
                <button class="quick-bet add-pair" data-pair="${pair.key}">+</button>`;
            pairGrid.appendChild(item);
        });

        document.querySelectorAll('.chip').forEach(chip=>{
            chip.onclick=function(){ currentChip=parseInt(this.dataset.chip); document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected')); this.classList.add('selected'); };
        });
        document.getElementById('fishGrabBtn').onclick=()=>{
            if(hasGrabbed){ showToast("已是庄家"); return; }
            if(currentBalance>=2001){
                currentBalance -= 2001;
                updateBalanceDisplay();
                playerBankerBalance=2001;
                hasGrabbed=true;
                localStorage.setItem('gold_fish_banker', playerBankerBalance);
                updateFishUI();
                showToast("抢庄成功，不可下注");
            } else showToast("余额不足2001");
        };
        document.getElementById('fishClearBtn').onclick = clearAllBets;
        document.getElementById('fishClearPairsBtn').onclick = clearPairsOnly;
        document.getElementById('fishRollBtn').onclick=()=>{ if(!isRolling && roundActive) settleFish(); };
        document.getElementById('fishRecordBtn').onclick=()=>{
            if(gameRecords.length===0){ showToast("暂无记录"); return; }
            let html = '<div>' + gameRecords.map(r=>`<div>${r.time} 🎲 ${r.dice} ${r.result}</div>`).join('') + '</div><button id="closeRec" class="auth-btn">关闭</button>';
            let m = document.createElement('div'); m.className='modal'; m.innerHTML = `<div class="modal-content">${html}</div>`;
            document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove();
        };
        // 事件委托
        gridDiv.addEventListener('click',(e)=>{
            let btn = e.target.closest('.quick-bet');
            if(!btn) return;
            let pat = btn.dataset.pat;
            if(btn.classList.contains('add-pat')) addPatternBet(pat, currentChip);
            if(btn.classList.contains('sub-pat')) subPatternBet(pat, currentChip);
        });
        pairGrid.addEventListener('click',(e)=>{
            let btn = e.target.closest('.quick-bet');
            if(!btn) return;
            let pairKey = btn.dataset.pair;
            if(btn.classList.contains('add-pair')) addPairBet(pairKey, currentChip);
            if(btn.classList.contains('sub-pair')) subPairBet(pairKey, currentChip);
        });
        let saved = localStorage.getItem('gold_fish_banker');
        if(saved && parseInt(saved)>0){ hasGrabbed=true; playerBankerBalance=parseInt(saved); }
        updateFishUI();
        startFishRound();
        fishDestroy = () => { roundActive=false; if(countdownTimer) clearInterval(countdownTimer); container.innerHTML=''; };
        return fishDestroy;
    }

            <div class="user-section">
                <div class="user-info-row">
                    <span>📱 ${getCurrentUser()} | 💰 余额: <span id="userBalanceDisplay">${currentBalance.toFixed(2)}</span></span>
                    <div class="btn-group">
                        <button id="serviceBtn" class="btn-sm">📞 客服</button>
                        <button id="logoutBtn" class="btn-sm">退出</button>
                        <button id="langSwitchBtn" class="lang-switch">ภาษาไทย</button>
                    </div>
                </div>
                <div class="charge-withdraw-row" style="margin-top:12px;">
                    <button id="rechargeBtn" class="charge-btn">💎 充值</button>
                    <button id="withdrawBtn" class="withdraw-btn">💰 提现</button>
                </div>
            </div>
            <div class="game-nav">
                <button class="game-tab active" data-game="fish">🐟 葫芦鱼</button>
                <button class="game-tab" data-game="dice">🎲 至尊骰宝</button>
                <button class="game-tab" data-game="dragonTiger">🐉 龙虎斗</button>
                <button class="game-tab" data-game="niuniu">🃏 至尊牛牛</button>
            </div>
            <div class="game-container" id="gamePanel"></div>
            <!-- 全局收款码区块，展示微信+支付宝 -->
            <div class="donation-area">
                <div class="qr-card">
                    <img class="qr-img" alt="微信收款码" src="mmexport1776247819360.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 fill=%22%23999%22%3E%E5%BE%AE%E4%BF%A1%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'">
                    <p>📱 微信收款码</p>
                </div>
                <div class="qr-card">
                    <img class="qr-img" alt="支付宝收款码" src="mmexport1776247823872.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 fill=%22%23999%22%3E%E6%94%AF%E4%BB%98%E5%AE%9D%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'">
                    <p>📱 支付宝收款码</p>
                </div>
            </div>
        `;
        document.getElementById('logoutBtn').onclick = () => { authToken = null; sessionStorage.clear(); currentUserAccount = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;
        document.getElementById('langSwitchBtn').onclick = () => { alert("双语切换暂未实现"); };
        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const inits = { fish: initFishGame, dice: initDiceGame, dragonTiger: initDragonTigerGame, niuniu: initNiuNiuGame };
        async function switchGame(id) { if (currentDestroy) currentDestroy(); gamePanel.innerHTML = ''; currentDestroy = await inits[id](gamePanel); }
        document.querySelectorAll('.game-tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchGame(btn.dataset.game);
            };
        });
        switchGame('fish');
        let adminClickCount = 0;
        document.getElementById('userBalanceDisplay').addEventListener('click', () => {
            adminClickCount++;
            setTimeout(() => { adminClickCount = 0; }, 1000);
            if (adminClickCount >= 3) { adminClickCount = 0; openAdminModal(); }
        });
    }

    (async () => {
        if (authToken) {
            const res = await apiGetUser();
            if (res.success) {
                currentBalance = res.balance;
                updateBalanceDisplay();
                renderGameLobby();
            } else {
                renderAuthUI();
            }
        } else {
            renderAuthUI();
        }
        const sysRes = await apiGetSystem();
        if (sysRes.success) { adjustFactor = sysRes.adjustFactor; systemBankerBalance = sysRes.systemBankerBalance; }
    })();
</script>
</body>
</html>
