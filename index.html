<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V45_OVERLOAD_SYSTEM</title>
    <style>
        body, html { margin: 0; background: #000; overflow: hidden; height: 100vh; font-family: 'Courier New', monospace; color: #0f0; }
        .v-active { display: flex !important; animation: shake 0.05s infinite; }
        @keyframes shake { 0% { transform: translate(0,0); } 25% { transform: translate(-3px, 2px); filter: hue-rotate(90deg); } 50% { transform: translate(3px, -2px); } 100% { transform: translate(0,0); } }
        .view { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,20,0,0.8); }
        .plate { border: 4px double #0f0; padding: 40px; background: #000; box-shadow: 0 0 30px #0f0; text-align: center; }
        .num { font-size: 80px; font-weight: 900; color: #fff; text-shadow: 3px 3px #f00; }
        .spin { animation: rotate 0.2s linear infinite; border-radius: 50%; border-color: #ff00ff; }
        @keyframes rotate { from { transform: rotate(0deg) scale(1.2); } to { transform: rotate(360deg) scale(1.2); } }
        button { background: #000; border: 2px solid #fff; color: #fff; padding: 15px 30px; margin-top: 30px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body onclick="A()">
    <div id="v1" class="view v-active">
        <div class="plate"><div style="color:#0f0">SYNC_STATUS_V45</div><div class="num" id="n1">1000</div></div>
        <button onclick="G(2)">进入 45 级转转乐</button>
    </div>
    <div id="v2" class="view">
        <div class="plate spin"><div style="color:#ff00ff">LUCKY_OVERLOAD</div><div class="num" id="n2">777</div></div>
        <button onclick="G(1)">返回监测</button>
    </div>
    <script>
        let ac=null; function G(i){document.querySelectorAll('.view').forEach(v=>v.classList.remove('v-active'));document.getElementById('v'+i).classList.add('v-active');if(ac)P();}
        setInterval(()=>{document.getElementById('n1').innerText=Math.floor(Math.random()*50)+950;document.getElementById('n2').innerText=['777','888','999','WIN'][Math.floor(Math.random()*4)];},50);
        function A(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();}
        function P(){let o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.setValueAtTime(200+Math.random()*600,ac.currentTime);g.gain.setValueAtTime(0.1,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.1);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.1);}
    </script>
</body>
</html>
