<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>金辉娱乐城 · 四合一完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1a120b 0%, #2a1e12 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            color: #ffecb3;
            transition: background 0.3s, color 0.3s;
        }
        #app {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(30, 20, 12, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(255, 215, 0, 0.5);
            overflow: hidden;
        }
        /* 认证面板 */
        .auth-panel {
            padding: 28px 20px;
            background: rgba(20, 12, 6, 0.8);
        }
        .auth-panel h2, .auth-panel h3 {
            text-align: center;
            margin-bottom: 16px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-input {
            width: 100%;
            padding: 12px 16px;
            margin: 6px 0;
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffaa33;
            border-radius: 40px;
            color: #ffd966;
            font-size: 0.95rem;
            outline: none;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 10px 0;
        }
        .code-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            color: #2a1a0a;
            font-weight: 700;
            cursor: pointer;
        }
        .auth-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: bold;
            color: #2a1a0a;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-size: 0.95rem;
        }
        hr {
            margin: 20px 0;
            border-color: #ffaa33;
        }
        .auth-note {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 12px;
            color: #ffaa33;
        }
        /* 用户栏 */
        .user-section {
            background: rgba(20, 12, 6, 0.7);
            padding: 12px 16px;
            border-bottom: 1px solid #ffaa33;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        #userBalanceDisplay {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 6px;
        }
        .btn-sm {
            background: rgba(255,170,51,0.2);
            border: 1px solid #ffaa33;
            padding: 4px 12px;
            border-radius: 40px;
            color: #ffd966;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .charge-btn, .withdraw-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: #2a1a0a;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .lang-switch, .theme-switch {
            background: #ffaa33;
            border: none;
            border-radius: 30px;
            padding: 4px 10px;
            color: #2a1a0a;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 4px;
        }
        /* 游戏导航 */
        .game-nav {
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            margin: 12px 12px;
            border-radius: 60px;
        }
        .game-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.8rem;
            color: #ffaa33;
            cursor: pointer;
        }
        .game-tab.active {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            color: #2a1a0a;
            box-shadow: 0 0 8px #ffaa33;
        }
        .game-container {
            padding: 8px 12px 20px;
        }
        .game-card {
            background: rgba(20, 12, 6, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 16px;
            border: 1px solid #ffaa33;
        }
        /* 通用组件 */
        .chip {
            background: linear-gradient(145deg, #cc8800, #aa6600);
            display: inline-block;
            padding: 6px 14px;
            border-radius: 36px;
            margin: 3px;
            cursor: pointer;
            font-weight: bold;
            color: #ffecb3;
            border: 1px solid #ffaa33;
            font-size: 0.85rem;
        }
        .chip.selected {
            background: linear-gradient(145deg, #ffaa33, #ff884d);
            color: #2a1a0a;
        }
        .quick-bet, .clear-bet {
            background: rgba(255,170,51,0.2);
            border: 1px solid #ffaa33;
            border-radius: 30px;
            padding: 4px 10px;
            margin: 3px;
            cursor: pointer;
            color: #ffd966;
            font-weight: 500;
            font-size: 0.75rem;
        }
        .exec-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 36px;
            padding: 8px 14px;
            color: #2a1a0a;
            font-weight: bold;
            cursor: pointer;
            margin: 3px;
            font-size: 0.85rem;
        }
        .main-go {
            background: linear-gradient(135deg, #ffcc66, #ffaa33);
            font-weight: 800;
        }
        .countdown-area {
            text-align: center;
            margin: 6px 0 12px 0;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 6px 12px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #ffaa33;
        }
        /* ========== 鱼虾蟹专用3D骰子 ========== */
        .fish-dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            perspective: 1000px;
        }
        .fish-dice-cube {
            width: 70px;
            height: 70px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fish-dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #2a1e12;
            border: 2px solid #ffaa33;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: visible;
            font-size: 2rem;
            font-weight: bold;
            color: #ffd966;
        }
        .fish-front { transform: translateZ(35px); }
        .fish-back { transform: rotateY(180deg) translateZ(35px); }
        .fish-right { transform: rotateY(90deg) translateZ(35px); }
        .fish-left { transform: rotateY(-90deg) translateZ(35px); }
        .fish-top { transform: rotateX(90deg) translateZ(35px); }
        .fish-bottom { transform: rotateX(-90deg) translateZ(35px); }
        @media (max-width: 480px) {
            .fish-dice-cube { width: 60px; height: 60px; }
            .fish-front, .fish-back, .fish-right, .fish-left, .fish-top, .fish-bottom { transform: translateZ(30px); }
            .fish-back { transform: rotateY(180deg) translateZ(30px); }
            .fish-right { transform: rotateY(90deg) translateZ(30px); }
            .fish-left { transform: rotateY(-90deg) translateZ(30px); }
            .fish-top { transform: rotateX(90deg) translateZ(30px); }
            .fish-bottom { transform: rotateX(-90deg) translateZ(30px); }
            .fish-dice-face { font-size: 1.5rem; }
        }
        /* ========== 骰宝专用3D骰子 ========== */
        .dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            perspective: 1000px;
        }
        .dice-cube {
            width: 70px;
            height: 70px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #2a1e12;
            border: 2px solid #ffaa33;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: visible;
        }
        .front { transform: translateZ(35px); }
        .back { transform: rotateY(180deg) translateZ(35px); }
        .right { transform: rotateY(90deg) translateZ(35px); }
        .left { transform: rotateY(-90deg) translateZ(35px); }
        .top { transform: rotateX(90deg) translateZ(35px); }
        .bottom { transform: rotateX(-90deg) translateZ(35px); }
        @media (max-width: 480px) {
            .dice-cube { width: 60px; height: 60px; }
            .front, .back, .right, .left, .top, .bottom { transform: translateZ(30px); }
            .back { transform: rotateY(180deg) translateZ(30px); }
            .right { transform: rotateY(90deg) translateZ(30px); }
            .left { transform: rotateY(-90deg) translateZ(30px); }
            .top { transform: rotateX(90deg) translateZ(30px); }
            .bottom { transform: rotateX(-90deg) translateZ(30px); }
        }
        .pip {
            width: 10px;
            height: 10px;
            background: #ffaa33;
            border-radius: 50%;
            margin: 2px;
        }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 8px; left: 8px; }
        .pip-tr { position: absolute; top: 8px; right: 8px; }
        .pip-bl { position: absolute; bottom: 8px; left: 8px; }
        .pip-br { position: absolute; bottom: 8px; right: 8px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1, .pip-l2, .pip-l3 { position: absolute; left: 8px; }
        .pip-l1 { top: 8px; }
        .pip-l2 { top: 50%; transform: translateY(-50%); }
        .pip-l3 { bottom: 8px; }
        .pip-r1, .pip-r2, .pip-r3 { position: absolute; right: 8px; }
        .pip-r1 { top: 8px; }
        .pip-r2 { top: 50%; transform: translateY(-50%); }
        .pip-r3 { bottom: 8px; }
        /* 鱼虾蟹单选网格 */
        .fish-pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin: 10px 0;
        }
        .fish-bet-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 6px 2px;
            text-align: center;
            border: 1px solid #ffaa33;
        }
        .bet-card {
            background: rgba(0,0,0,0.5);
            border-radius: 18px;
            padding: 6px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #ffaa33;
            font-size: 0.8rem;
        }
        .points-grid, .trio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
            gap: 6px;
            margin: 10px 0;
        }
        .history-cell {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,170,51,0.2);
            font-weight: bold;
        }
        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2a1e12;
            border-radius: 36px;
            padding: 20px;
            max-width: 90%;
            max-height: 85%;
            overflow: auto;
            color: #ffd966;
            border: 1px solid #ffaa33;
            text-align: center;
        }
        .qr-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 16px;
            border: 2px solid #ffaa33;
            background: white;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a1a0a;
            color: #ffd966;
            padding: 6px 16px;
            border-radius: 40px;
            z-index: 2000;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid #ffaa33;
            font-size: 0.8rem;
        }
        .result-popup {
            position: fixed;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            color: #2a1a0a;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            z-index: 1500;
        }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .admin-table th, .admin-table td { padding: 6px 4px; border-bottom: 1px solid #ffaa33; text-align: left; }
        .admin-btn { background: #ffaa33; border: none; border-radius: 20px; padding: 4px 8px; margin: 2px; color: #2a1a0a; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        /* 龙虎动画 */
        @keyframes dtFlash {
            0% { opacity: 1; text-shadow: 0 0 5px gold; }
            50% { opacity: 0.3; text-shadow: 0 0 30px orange; }
            100% { opacity: 1; text-shadow: 0 0 5px gold; }
        }
        @keyframes dtShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px) scale(1.05); }
            50% { transform: translateX(8px) scale(1.1); }
            75% { transform: translateX(-4px) scale(1.05); }
            100% { transform: translateX(0) scale(1); }
        }
        .dt-flash { animation: dtFlash 0.3s 3; }
        .dt-animation-box { animation: dtShake 0.5s ease-in-out; }
        /* 牛牛横排 */
        .niu-card {
            width: 55px;
            height: 75px;
            background: white;
            border-radius: 8px;
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1rem;
            margin: 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            flex-shrink: 0;
            color: #2a1a0a;
        }
        .niu-card[data-suit="♥"], .niu-card[data-suit="♦"] { color: #c33; }
        .niu-card[data-suit="♣"], .niu-card[data-suit="♠"] { color: #333; }
        .niu-hand {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            overflow-x: auto;
            justify-content: center;
            gap: 8px;
            min-height: 100px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin: 8px 0;
        }
        @media (max-width: 480px) {
            .niu-card { width: 48px; height: 65px; font-size: 0.85rem; }
        }
        /* 浅色主题 */
        body.light-mode {
            background: linear-gradient(145deg, #f5f0e6 0%, #e8dfd0 100%);
            color: #3a2a1a;
        }
        body.light-mode #app {
            background: rgba(245, 240, 230, 0.85);
            border-color: rgba(180, 130, 60, 0.5);
        }
        body.light-mode .auth-panel,
        body.light-mode .user-section,
        body.light-mode .game-card,
        body.light-mode .modal-content {
            background: rgba(250, 245, 235, 0.9);
            border-color: #b8860b;
            color: #3a2a1a;
        }
        body.light-mode .auth-input,
        body.light-mode .fish-bet-card,
        body.light-mode .bet-card,
        body.light-mode .chip,
        body.light-mode .quick-bet,
        body.light-mode .exec-btn,
        body.light-mode .countdown-area {
            background: rgba(255, 250, 240, 0.8);
            border-color: #c99a3b;
            color: #4a3a2a;
        }
        body.light-mode .chip.selected {
            background: linear-gradient(145deg, #ffcc77, #e6a822);
            color: #2a1a0a;
        }
        body.light-mode .fish-dice-face,
        body.light-mode .dice-face {
            background: #fffaf0;
            border-color: #c99a3b;
            color: #4a3a2a;
        }
        body.light-mode .niu-card {
            background: #fffaf0;
            border-color: #c99a3b;
            color: #4a3a2a;
        }
        body.light-mode .toast-message {
            background: #fff9ef;
            color: #b8860b;
            border-color: #b8860b;
        }
        body.light-mode .result-popup {
            background: linear-gradient(135deg, #ffcc77, #e6a822);
            color: #2a1a0a;
        }
        body.light-mode .admin-table th,
        body.light-mode .admin-table td {
            border-bottom-color: #dbb45c;
        }
        body.light-mode .admin-btn {
            background: #e6a822;
            color: #2a1a0a;
        }
        body.light-mode .lang-switch,
        body.light-mode .theme-switch {
            background: #e6a822;
            color: #2a1a0a;
        }
        body.light-mode .charge-btn,
        body.light-mode .withdraw-btn {
            background: linear-gradient(135deg, #e6a822, #c9881c);
            color: #2a1a0a;
        }
        body.light-mode #userBalanceDisplay {
            background: linear-gradient(135deg, #c9881c, #a56b0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* 名牌浅色适配 */
        body.light-mode #app > div:first-child {
            background: linear-gradient(135deg, #f5e6d3, #e8d8c0);
            border-bottom-color: #b8860b;
        }
        body.light-mode #app > div:first-child h1 {
            background: linear-gradient(135deg, #c9881c, #a56b0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.light-mode #app > div:first-child p {
            color: #b8860b;
        }
        body.light-mode #app > div:first-child div:last-child {
            background: #b8860b;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== 双语 ====================
    const lang = {
        zh: {
            recharge: "💎 充值", withdraw: "💰 提现", service: "📞 客服", logout: "退出", balance: "余额",
            phoneOrEmail: "手机号 / 邮箱", password: "密码 (≥4位)", referralCode: "推荐码 (必填)", remember: "记住账号",
            login: "登录", register: "注册", referralNote: "推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "获取验证码", verifyCode: "验证码", registerNow: "注册新账户",
            gameFish: "🐟 金辉鱼虾蟹", gameDice: "🎲 金辉骰宝", gameDT: "🐉 金辉龙虎斗", game4: "🐮 金辉牛牛"
        },
        th: {
            recharge: "💎 เติมเงิน", withdraw: "💰 ถอนเงิน", service: "📞 บริการ", logout: "ออก", balance: "ยอดเงิน",
            phoneOrEmail: "เบอร์โทร / อีเมล", password: "รหัสผ่าน (≥4)", referralCode: "รหัสแนะนำ", remember: "จำฉัน",
            login: "เข้าสู่ระบบ", register: "สมัคร", referralNote: "รหัส: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "รับรหัส", verifyCode: "รหัสยืนยัน", registerNow: "สมัครสมาชิก",
            gameFish: "🐟 ปลาหมึกทอง", gameDice: "🎲 เซียนเต๋าทอง", gameDT: "🐉 มังกรเสือทอง", game4: "🐮 กระบือทอง"
        }
    };
    let currentLang = 'zh';
    function t(key) { return lang[currentLang][key] || lang.zh[key] || key; }

    // ==================== 全局数据 ====================
    let systemBankerBalance = localStorage.getItem('neon_system_banker') ? parseFloat(localStorage.getItem('neon_system_banker')) : 50000;
    let adjustFactor = localStorage.getItem('neon_adjustFactor') ? parseFloat(localStorage.getItem('neon_adjustFactor')) : 1.0;
    let validReferralCodes = ["VIP666","888VIP","GOLD2025","LUCKY8","DICE100"];
    let usersData = JSON.parse(localStorage.getItem('neon_users')) || {};
    if (Object.keys(usersData).length === 0) {
        usersData['player1'] = { password: '123', balance: 5000, registerTime: new Date().toLocaleString(), records: [], resultHistory: [] };
        localStorage.setItem('neon_users', JSON.stringify(usersData));
    }
    let currentUser = null;
    let verificationCodes = {};

    function saveUsers() { localStorage.setItem('neon_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.account]?.balance || 0) : 0; }
    function setUserBalance(amount) { if(!currentUser) return; usersData[currentUser.account].balance = Math.max(0, amount); saveUsers(); let span = document.getElementById("userBalanceDisplay"); if(span) span.innerText = getUserBalance().toFixed(2); }
    function showToast(msg) { let t = document.createElement('div'); t.className = 'toast-message'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }

    // ==================== 充值 ====================
    function recharge() {
    let modalDiv = document.createElement('div');
    modalDiv.className = 'modal';
    modalDiv.innerHTML = `
        <div class="modal-content">

    function updateFishUI() {

        let panelDiv = document.getElementById('fishPlayerBetsList');

    function saveLastBetState() { lastBetState = { patternBets: {...patternBets}, doubleBets: {...doubleBets} }; }
    function repeatLastBet() {
        if(!lastBetState) { showToast("无上局押注"); return; }
        let total = Object.values(lastBetState.patternBets).reduce((a,b)=>a+b,0) + Object.values(lastBetState.doubleBets).reduce((a,b)=>a+b,0);
        if(total > getUserBalance()) { showToast("余额不足"); return; }
        let oldTotal = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(doubleBets).reduce((a,b)=>a+b,0);
        if(oldTotal>0) setUserBalance(getUserBalance()+oldTotal);
        patternBets = {...lastBetState.patternBets};
        doubleBets = {...lastBetState.doubleBets};
        setUserBalance(getUserBalance()-total);
        updateFishUI();
        showToast("续押成功");
    }
    function addPatternBet(pattern, val) {
        if(hasGrabbed) { showToast("庄家不能下注"); return; }
        let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(doubleBets).reduce((a,b)=>a+b,0);
        if(val>500 || total+val>2000) { showToast("超上限"); return; }
        if(val > getUserBalance()) { showToast("余额不足"); return; }
        setUserBalance(getUserBalance()-val);
        patternBets[pattern] += val;
        updateFishUI();
        saveLastBetState();
    }
    function subPatternBet(pattern, val) { let cur=patternBets[pattern]; if(cur<val) val=cur; if(val===0) return; patternBets[pattern]-=val; setUserBalance(getUserBalance()+val); updateFishUI(); saveLastBetState(); }
    function addDoubleBet(comboKey) {
        if(hasGrabbed) { showToast("庄家不能下注"); return; }
        let val = currentChip;
        let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(doubleBets).reduce((a,b)=>a+b,0);
        if(val>500 || total+val>2000) { showToast("超上限"); return; }
        if(val > getUserBalance()) { showToast("余额不足"); return; }
        setUserBalance(getUserBalance()-val);
        doubleBets[comboKey] += val;
        updateFishUI();
        saveLastBetState();
    }
    function clearFishBets() {
        let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(doubleBets).reduce((a,b)=>a+b,0);

        patternBets = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
        for(let k in doubleBets) doubleBets[k]=0;
        updateFishUI();
        saveLastBetState();
    }
    async function rollFishDiceWithAnimation(finalPatterns) {
        for(let i=0;i<3;i++) { fishDice[i].style.transition = 'none'; const randX=Math.random()*360; const randY=Math.random()*360; fishDice[i].style.transform=`rotateX(${randX}deg) rotateY(${randY}deg)`; }
        await new Promise(r=>setTimeout(r,40));
        for(let i=0;i<3;i++) fishDice[i].style.transition = 'transform 0.4s cubic-bezier(0.4,0,0.2,1)';
        for(let step=0;step<10;step++){ for(let i=0;i<3;i++){ const randX=Math.random()*360; const randY=Math.random()*360; fishDice[i].style.transform=`rotateX(${randX}deg) rotateY(${randY}deg)`; } await new Promise(r=>setTimeout(r,60)); }
        for(let i=0;i<3;i++) setFishDiceValue(fishDice[i], finalPatterns[i]);
        await new Promise(r=>setTimeout(r,300));
    }
    async function settleFish() {
        if(isRolling) return;
        let totalBet = Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(doubleBets).reduce((a,b)=>a+b,0);
        if(totalBet===0 && !hasGrabbed) { showToast("请先下注"); return; }
        isRolling = true;
        let r1 = patternNames[Math.floor(Math.random()*6)];
        let r2 = patternNames[Math.floor(Math.random()*6)];
        let r3 = patternNames[Math.floor(Math.random()*6)];
        await rollFishDiceWithAnimation([r1,r2,r3]);
        
        let occursRaw = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
        [r1,r2,r3].forEach(p=>occursRaw[p]++);
        // 虾蟹互换
        let occursEffective = { ...occursRaw };
        let shrimpCount = occursRaw["虾"];
        let crabCount = occursRaw["蟹"];
        occursEffective["虾"] = crabCount;
        occursEffective["蟹"] = shrimpCount;
        
        let winAmount = 0;
        for(let p in patternBets) {
            let cnt = occursEffective[p];
            if(cnt>0 && patternBets[p]>0) {
                winAmount += patternBets[p] * (cnt+1);
            }
        }
        for(let combo of doubleCombos) {
            let key = combo.join(',');
            let betAmt = doubleBets[key];
            if(betAmt>0) {
                let a = combo[0];
                let b = combo[1];
                let effA = (a === "虾") ? "蟹" : (a === "蟹") ? "虾" : a;
                let effB = (b === "虾") ? "蟹" : (b === "蟹") ? "虾" : b;
                if(occursEffective[effA] > 0 && occursEffective[effB] > 0) {
                    winAmount += betAmt * 4.5;
                }
            }
        }
        winAmount = winAmount * adjustFactor;
        
        // 判断赢家：玩家是闲家还是庄家？
        let isPlayerWin = (winAmount > totalBet);
        let serviceFee = 0;
        if (isPlayerWin) {
            // 闲家赢，服务费1%
            serviceFee = winAmount * 0.01;
        } else {
            // 庄家赢，服务费2%（仅当玩家作为庄家时）
            if (hasGrabbed) {
                serviceFee = winAmount * 0.02;
            }
        }
        let finalWin = winAmount - serviceFee;
        let netProfit = finalWin - totalBet;
        lastWinAmount = netProfit;
        
        let pop = document.createElement('div'); 
        pop.className='result-popup'; 
        pop.innerText = finalWin>0 ? `🎉 赢 ${finalWin.toFixed(2)}` : `😭 输 ${totalBet}`;
        document.body.appendChild(pop); 
        setTimeout(()=>pop.remove(), 1800);
        
        // 记录包含服务费
        gameRecords.unshift({ 
            time: new Date().toLocaleTimeString(), 
            dice: `${r1},${r2},${r3}`, 
            result: finalWin>0 ? `赢${finalWin.toFixed(2)}` : `输${totalBet}`,
            fee: serviceFee.toFixed(2)
        });
        updateFishUI();
        
        let wasGrabbed = hasGrabbed;
        let bankerBalanceSnapshot = playerBankerBalance;
        
        if (clearTimer) clearTimeout(clearTimer);
        clearTimer = setTimeout(() => {
            setUserBalance(getUserBalance() + finalWin);
            patternBets = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
            for(let k in doubleBets) doubleBets[k]=0;
            updateFishUI();
            saveLastBetState();
            
            if (wasGrabbed) {
                let bankerNet = (totalBet - finalWin) * adjustFactor;
                playerBankerBalance += bankerNet;
                if (playerBankerBalance !== 0) {
                    setUserBalance(getUserBalance() + playerBankerBalance);
                    showToast(`庄家结算 ${playerBankerBalance>0 ? '盈利' : '亏损'} ${Math.abs(playerBankerBalance).toFixed(2)} 元`);
                }
                hasGrabbed = false;
                playerBankerBalance = 0;
                localStorage.removeItem('neon_fish_banker');
                updateFishUI();
            }
            addGameRecord(currentUser.account, '金辉鱼虾蟹', 
                `单选${Object.entries(patternBets).filter(([k,v])=>v>0).map(([k,v])=>`${k}${v}`).join(',')} 双押${Object.entries(doubleBets).filter(([k,v])=>v>0).map(([k,v])=>`${k}=${v}`).join(',')}`, 
                `${r1},${r2},${r3}`, finalWin, totalBet);
            if(roundActive) startFishRound();
        }, 3000);
        
        isRolling = false;
        if (countdownTimer) clearInterval(countdownTimer);
    }
    function startFishRound() {
        if(countdownTimer) clearInterval(countdownTimer);
        let remaining=25;
        let hintDiv=document.getElementById('fishPhaseHint');

        countdownTimer = setInterval(()=>{

            if(remaining<=0){ 
                clearInterval(countdownTimer); 
                if(!isRolling && roundActive) settleFish();

        },1000);
    }

    document.getElementById('fishGrabBtn').onclick=()=>{ 
        if(hasGrabbed){ showToast("已是庄家"); return; } 
        if(getUserBalance()>=2001){ 
            setUserBalance(getUserBalance()-2001);

            hasGrabbed=true; 
            localStorage.setItem('neon_fish_banker', playerBankerBalance); 
            updateFishUI(); 
            showToast("抢庄成功，不可下注");

        } else showToast("余额不足2001"); 
    };
    document.getElementById('fishClearBtn').onclick=clearFishBets;
    document.getElementById('fishRepeatBtn').onclick=repeatLastBet;
    document.getElementById('fishRollBtn').onclick=()=>{ if(!isRolling && roundActive) settleFish(); };
    document.getElementById('fishRecordBtn').onclick=()=>{ 
        if(gameRecords.length===0){ showToast("暂无记录"); return; } 
        let html = '<div style="max-height:200px; overflow-y:auto;">';
        gameRecords.forEach(r => {
            html += `<div style="border-bottom:1px solid #ffaa33; padding:6px;">${r.time} 🎲 ${r.dice} ${r.result} ${r.fee>0 ? `<span style="color:#ff884d;">服务费:${r.fee}元</span>` : ''}</div>`;
        });
        html += '</div><button id="closeRec" class="auth-btn">关闭</button>';
        let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove(); 
    };
    gridDiv.addEventListener('click',(e)=>{ let btn=e.target.closest('.quick-bet'); if(!btn) return; let pat=btn.dataset.pat; if(btn.classList.contains('add-pat')) addPatternBet(pat, currentChip); if(btn.classList.contains('sub-pat')) subPatternBet(pat, currentChip); });
    let saved=localStorage.getItem('neon_fish_banker'); if(saved && parseInt(saved)>0){ hasGrabbed=true; playerBankerBalance=parseInt(saved); }
    updateFishUI();
    startFishRound();
    function updatePlayersBet() { if(hasGrabbed){ playersList.forEach(p=>{ p.bet=Math.floor(Math.random()*500)+50; }); updateFishUI(); } }
    setInterval(()=>{ if(hasGrabbed && roundActive && !isRolling) updatePlayersBet(); }, 10000);
    fishDestroy = () => { 
        if(clearTimer) clearTimeout(clearTimer);
        roundActive=false; 
        if(countdownTimer) clearInterval(countdownTimer); 
        container.innerHTML=''; 
    };
    window.currentFishReset = ()=>{ hasGrabbed=false; playerBankerBalance=0; localStorage.removeItem('neon_fish_banker'); updateFishUI(); };
    return fishDestroy;
}

        function shuffle(deck) { for (let i = deck.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [deck[i], deck[j]] = [deck[j], deck[i]]; } return deck; }
        function calcNiuType(cards) { let points = cards.map(c => c.points); let total = points.reduce((a,b)=>a+b,0); let hasNiu = false; let niuValue = 0; for (let i = 0; i < 5; i++) { for (let j = i+1; j < 5; j++) { for (let k = j+1; k < 5; k++) { let sum = points[i] + points[j] + points[k]; if (sum % 10 === 0) { let restSum = total - sum; niuValue = restSum % 10; hasNiu = true; break; } } if (hasNiu) break; } if (hasNiu) break; } if (!hasNiu) return { type: '无牛', multiplier: 0, display: '无牛' }; if (niuValue === 0) { let hasFiveTen = points.every(p => p === 10); if (hasFiveTen) return { type: '五花牛', multiplier: 5, display: '五花牛' }; let countMap = {}; points.forEach(p => countMap[p] = (countMap[p]||0)+1); if (Object.values(countMap).some(c => c === 4)) return { type: '四炸', multiplier: 8, display: '四炸' }; return { type: '牛牛', multiplier: 3, display: '牛牛' }; } return { type: `牛${niuValue}`, multiplier: 1, display: `牛${niuValue}` }; }
        container.innerHTML = `<div class="game-card"><div style="background:rgba(0,0,0,0.4); border-radius:24px; padding:8px; margin-bottom:12px;"><div style="font-size:0.8rem; margin-bottom:4px;">🏦 庄家（电脑）</div><div id="bankerHand" class="niu-hand">🃟 🃟 🃟 🃟 🃟</div><div id="bankerType" style="text-align:center; font-size:0.8rem;">?</div></div><div style="background:rgba(0,0,0,0.4); border-radius:24px; padding:8px; margin-bottom:12px;"><div style="font-size:0.8rem; margin-bottom:4px;">👤 闲家（您）</div><div id="playerHand" class="niu-hand">🃟 🃟 🃟 🃟 🃟</div><div id="playerType" style="text-align:center; font-size:0.8rem;">?</div></div><div class="countdown-area" id="niuCountdownArea">⏱️ 下注 <span id="niuCountdownNum">25</span> s</div><div style="display:flex; justify-content:space-between; margin:6px 0;"><span>🎲 本局中奖: <span id="niuWinAmount">0</span></span><span>📊 盈亏: <span id="niuProfitLoss">0</span></span></div><div id="niuChips"><span class="chip" data-chip="10">10</span><span class="chip" data-chip="20">20</span><span class="chip selected" data-chip="50">50</span><span class="chip" data-chip="100">100</span><span class="chip" data-chip="500">500</span></div><div style="display:flex; gap:8px; margin:10px 0;"><div class="bet-card" data-bet="PLAYER" style="flex:1; text-align:center;">闲家赢<br><span id="bet_PLAYER" style="color:#ffaa33;">0</span></div><div class="bet-card" data-bet="BANKER" style="flex:1; text-align:center;">庄家赢<br><span id="bet_BANKER" style="color:#ffaa33;">0</span></div><div class="bet-card" data-bet="TIE" style="flex:1; text-align:center;">和<br><span id="bet_TIE" style="color:#ffaa33;">0</span></div></div><div style="display:flex; gap:8px; margin:10px 0;"><div class="bet-card" data-bet="NIU_NIU" style="flex:1; text-align:center;">闲家牛牛<br><span id="bet_NIU_NIU" style="color:#ffaa33;">0</span></div><div class="bet-card" data-bet="WU_HUA" style="flex:1; text-align:center;">闲家五花牛<br><span id="bet_WU_HUA" style="color:#ffaa33;">0</span></div></div><div style="display:flex; gap:6px; margin:8px 0;"><button id="niuClearBtn" class="exec-btn">清空</button><button id="niuRepeatBtn" class="exec-btn">续押</button><button id="niuRefreshBtn" class="exec-btn">刷新</button><button id="niuDealBtn" class="exec-btn main-go">🐮 发牌</button></div><div style="display:flex; gap:8px; margin-top:8px;"><div>💰 余额: <span id="niuBalance">${getUserBalance().toFixed(2)}</span></div><div>📊 总押注: <span id="niuTotalBet">0</span></div></div><div id="niuResultMsg" style="margin-top:8px; text-align:center; background:rgba(0,0,0,0.5); border-radius:20px; padding:6px;"></div></div>`;
        let bets = { PLAYER: 0, BANKER: 0, TIE: 0, NIU_NIU: 0, WU_HUA: 0 };
        let selectedChip = 50;
        let currentBalance = getUserBalance();
        let isRolling = false;
        let countdownTimer = null;
        let lastBetSnapshot = null;
        let remainingSec = 25;
        function updateUI() { for (let k in bets) { let span = document.getElementById(`bet_${k}`); if (span) span.innerText = bets[k]; } let total = Object.values(bets).reduce((a,b)=>a+b,0); document.getElementById('niuTotalBet').innerText = total; document.getElementById('niuBalance').innerText = getUserBalance().toFixed(2); }
        function saveLastBet() { lastBetSnapshot = JSON.parse(JSON.stringify(bets)); }
        function clearAllBets() { let total = Object.values(bets).reduce((a,b)=>a+b,0); if (total > 0) setUserBalance(getUserBalance() + total); for (let k in bets) bets[k] = 0; updateUI(); saveLastBet(); showToast("已清空押注"); }
        function repeatLastBet() { if (!lastBetSnapshot) { showToast("无续押记录"); return; } let need = Object.values(lastBetSnapshot).reduce((a,b)=>a+b,0); if (need > getUserBalance()) { showToast("余额不足"); return; } let oldTotal = Object.values(bets).reduce((a,b)=>a+b,0); if (oldTotal > 0) setUserBalance(getUserBalance() + oldTotal); for (let k in bets) bets[k] = 0; for (let k in lastBetSnapshot) bets[k] = lastBetSnapshot[k]; setUserBalance(getUserBalance() - need); updateUI(); showToast("续押成功"); }
        function addBet(betType) { if (isRolling) { showToast("开奖中"); return; } if (selectedChip <= 0) { showToast("选筹码"); return; } if (selectedChip > getUserBalance()) { showToast("余额不足"); return; } setUserBalance(getUserBalance() - selectedChip); bets[betType] += selectedChip; updateUI(); saveLastBet(); showToast(`+${selectedChip} ${betType}`); }
        async function revealCards(handDiv, cards, delay = 150) { handDiv.innerHTML = ''; for (let card of cards) { let cardDiv = document.createElement('div'); cardDiv.className = 'niu-card'; cardDiv.setAttribute('data-suit', card.suit); cardDiv.style.transform = 'rotateY(90deg)'; cardDiv.style.transition = 'transform 0.2s'; cardDiv.innerText = card.value + card.suit; handDiv.appendChild(cardDiv); setTimeout(() => { cardDiv.style.transform = 'rotateY(0deg)'; }, 30); await new Promise(r => setTimeout(r, delay)); } }
        async function startGame() { if (isRolling) return; let totalBet = Object.values(bets).reduce((a,b)=>a+b,0); if (totalBet === 0) { showToast("请先下注"); return; } if (totalBet > getUserBalance()) { showToast("余额不足，请重新下注"); return; } isRolling = true; if (countdownTimer) clearInterval(countdownTimer); let deck = shuffle(createDeck()); let playerCards = deck.slice(0, 5); let bankerCards = deck.slice(5, 10); let playerType = calcNiuType(playerCards); let bankerType = calcNiuType(bankerCards); await revealCards(document.getElementById('playerHand'), playerCards, 120); await revealCards(document.getElementById('bankerHand'), bankerCards, 120); document.getElementById('playerType').innerHTML = `${playerType.display} ${playerType.multiplier>1 ? `(赔率${playerType.multiplier})` : ''}`; document.getElementById('bankerType').innerHTML = `${bankerType.display} ${bankerType.multiplier>1 ? `(赔率${bankerType.multiplier})` : ''}`; let result = ''; let winAmount = 0; let playerScore = playerType.multiplier === 0 ? 0 : (playerType.multiplier === 1 ? 1 : playerType.multiplier); let bankerScore = bankerType.multiplier === 0 ? 0 : (bankerType.multiplier === 1 ? 1 : bankerType.multiplier); if (playerScore > bankerScore) result = 'PLAYER'; else if (bankerScore > playerScore) result = 'BANKER'; else result = 'TIE'; if (result === 'PLAYER' && bets.PLAYER > 0) winAmount += bets.PLAYER * 2; if (result === 'BANKER' && bets.BANKER > 0) winAmount += bets.BANKER * 2; if (result === 'TIE' && bets.TIE > 0) winAmount += bets.TIE * 8; if (playerType.type === '牛牛' && bets.NIU_NIU > 0) winAmount += bets.NIU_NIU * (playerType.multiplier + 1); if (playerType.type === '五花牛' && bets.WU_HUA > 0) winAmount += bets.WU_HUA * (playerType.multiplier + 1); winAmount = winAmount * adjustFactor; let profit = winAmount - totalBet; setUserBalance(getUserBalance() + winAmount); document.getElementById('niuWinAmount').innerText = winAmount.toFixed(2); document.getElementById('niuProfitLoss').innerText = profit.toFixed(2); document.getElementById('niuResultMsg').innerHTML = `${playerType.display} vs ${bankerType.display}<br>${result === 'PLAYER' ? '闲家胜' : (result === 'BANKER' ? '庄家胜' : '和局')} ${winAmount>0 ? ` 赢得 ${winAmount.toFixed(2)}` : ''}`; addGameRecord(currentUser.account, '金辉牛牛', `总注${totalBet}`, `${playerType.display} vs ${bankerType.display}`, winAmount, totalBet); for (let k in bets) bets[k] = 0; updateUI(); saveLastBet(); isRolling = false; startCountdown(25); }
        function startCountdown(sec) { if (countdownTimer) clearInterval(countdownTimer); remainingSec = sec; let cdSpan = document.getElementById('niuCountdownNum'); cdSpan.innerText = remainingSec; countdownTimer = setInterval(() => { if (remainingSec <= 1) { clearInterval(countdownTimer); countdownTimer = null; if (!isRolling) startGame(); } else { remainingSec--; cdSpan.innerText = remainingSec; } }, 1000); }
        function refreshBalance() { updateUI(); showToast("刷新"); }
        document.querySelectorAll('#niuChips .chip').forEach(chip => { chip.onclick = function() { selectedChip = parseInt(this.dataset.chip); document.querySelectorAll('#niuChips .chip').forEach(c => c.classList.remove('selected')); this.classList.add('selected'); }; });
        document.querySelectorAll('.bet-card[data-bet]').forEach(card => { card.onclick = () => addBet(card.dataset.bet); });
        document.getElementById('niuClearBtn').onclick = clearAllBets;
        document.getElementById('niuRepeatBtn').onclick = repeatLastBet;
        document.getElementById('niuRefreshBtn').onclick = refreshBalance;
        document.getElementById('niuDealBtn').onclick = () => { if (!isRolling) startGame(); };
        updateUI(); startCountdown(25); saveLastBet();
        niuNiuDestroy = () => { if (countdownTimer) clearInterval(countdownTimer); container.innerHTML = ''; };
        return niuNiuDestroy;
    }

    // ==================== 认证与游戏大厅 ====================
    function renderAuthUI() {
        const savedAcc = localStorage.getItem('neon_saved_account') || '';
        const savedPwd = localStorage.getItem('neon_saved_password') || '';
        const remChecked = localStorage.getItem('neon_remember_me') === 'true';
        document.getElementById('app').innerHTML = `<div class="auth-panel"><h2>🏆 金辉娱乐城</h2><div><input type="text" id="loginAccount" class="auth-input" placeholder="${t('phoneOrEmail')}" value="${savedAcc}"><input type="password" id="loginPassword" class="auth-input" placeholder="${t('password')}" value="${savedPwd}"><div class="flex-row"><input type="checkbox" id="rememberCheckbox" ${remChecked ? 'checked' : ''}> <label>${t('remember')}</label></div><button id="loginBtn" class="auth-btn">${t('login')}</button></div><hr><h3>${t('registerNow')}</h3><input type="text" id="regAccount" class="auth-input" placeholder="${t('phoneOrEmail')}"><div class="flex-row"><input type="text" id="regCode" class="auth-input" placeholder="${t('verifyCode')}"><button id="getCodeBtn" class="code-btn">${t('getCode')}</button></div><input type="password" id="regPassword" class="auth-input" placeholder="${t('password')}"><input type="text" id="regReferral" class="auth-input" placeholder="${t('referralCode')}"><button id="registerBtn" class="auth-btn">${t('register')}</button><div class="auth-note">${t('referralNote')}</div></div>`;
        document.getElementById('loginBtn').onclick = () => { let acc = document.getElementById('loginAccount').value.trim(); let pwd = document.getElementById('loginPassword').value; let rem = document.getElementById('rememberCheckbox').checked; if (!acc || !pwd) { showToast("请填写账号和密码"); return; } let user = usersData[acc]; if (!user || user.password !== pwd) { showToast("账号或密码错误"); return; } if (rem) { localStorage.setItem('neon_saved_account', acc); localStorage.setItem('neon_saved_password', pwd); localStorage.setItem('neon_remember_me', 'true'); } else { localStorage.removeItem('neon_saved_account'); localStorage.removeItem('neon_saved_password'); localStorage.setItem('neon_remember_me', 'false'); } currentUser = { account: acc, ...user }; showToast(`欢迎 ${acc}`); renderGameLobby(); };
        document.getElementById('getCodeBtn').onclick = () => { let acc = document.getElementById('regAccount').value.trim(); if (!acc) { showToast("请填写手机号或邮箱"); return; } if (usersData[acc]) { showToast("账号已注册，请直接登录"); return; } let code = Math.floor(100000 + Math.random() * 900000); verificationCodes[acc] = { code: code.toString(), expire: Date.now() + 5 * 60 * 1000 }; alert(`【验证码】您的验证码是：${code}，5分钟内有效。`); showToast("验证码已发送"); };
        document.getElementById('registerBtn').onclick = () => { let acc = document.getElementById('regAccount').value.trim(); let code = document.getElementById('regCode').value.trim(); let pwd = document.getElementById('regPassword').value; let ref = document.getElementById('regReferral').value.trim().toUpperCase(); if (!acc || !code || !pwd || !ref) { showToast("请填写完整信息"); return; } if (!validReferralCodes.includes(ref)) { showToast("推荐码无效"); return; } if (usersData[acc]) { showToast("账号已存在"); return; } let v = verificationCodes[acc]; if (!v || v.code !== code || Date.now() > v.expire) { showToast("验证码错误或已过期"); return; } if (pwd.length < 4) { showToast("密码至少4位"); return; } usersData[acc] = { password: pwd, balance: 0, referralCode: ref, registerTime: new Date().toLocaleString(), records: [], resultHistory: [] }; saveUsers(); delete verificationCodes[acc]; showToast("注册成功！请登录"); document.getElementById('regAccount').value = ''; document.getElementById('regCode').value = ''; document.getElementById('regPassword').value = ''; document.getElementById('regReferral').value = ''; };
    }

    function renderGameLobby() {
        if (!currentUser) { renderAuthUI(); return; }
        document.getElementById('app').innerHTML = `
            <div style="text-align: center; padding: 16px 12px 8px; background: linear-gradient(135deg, #2a1e12, #1a120b); border-bottom: 2px solid #ffaa33;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <span style="font-size: 2rem;">🎰</span>
                    <div>
                        <h1 style="font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #ffd966, #ffaa33); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 2px;">金辉娱乐城</h1>
                        <p style="font-size: 0.65rem; color: #ffaa33;">JINHUI CASINO · 诚信公平</p>
                    </div>
                    <span style="font-size: 2rem;">🎲</span>
                </div>
                <div style="height: 2px; width: 80px; background: #ffaa33; margin: 8px auto 0; border-radius: 2px;"></div>
            </div>
            <div class="user-section">
                <div class="user-info-row">
                    <span>📱 ${currentUser.account} | 💰 ${t('balance')}: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span>
                    <div class="btn-group">
                        <button id="serviceBtn" class="btn-sm">${t('service')}</button>
                        <button id="logoutBtn" class="btn-sm">${t('logout')}</button>
                        <button id="langSwitchBtn" class="lang-switch">ภาษาไทย</button>
                        <button id="themeToggleBtn" class="theme-switch">🌙 夜间</button>
                    </div>
                </div>
                <div class="charge-withdraw-row" style="margin-top:8px;">
                    <button id="rechargeBtn" class="charge-btn">${t('recharge')}</button>
                    <button id="withdrawBtn" class="withdraw-btn">${t('withdraw')}</button>
                </div>
            </div>
            <div class="game-nav">
                <button class="game-tab active" data-game="fish">${t('gameFish')}</button>
                <button class="game-tab" data-game="dice">${t('gameDice')}</button>
                <button class="game-tab" data-game="dragonTiger">${t('gameDT')}</button>
                <button class="game-tab" data-game="game4">${t('game4')}</button>
            </div>
            <div class="game-container" id="gamePanel"></div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;
        document.getElementById('langSwitchBtn').onclick = () => { currentLang = currentLang === 'zh' ? 'th' : 'zh'; document.getElementById('langSwitchBtn').innerText = currentLang === 'zh' ? 'ภาษาไทย' : '中文'; renderGameLobby(); };
        // 主题切换
        const themeBtn = document.getElementById('themeToggleBtn');
        const savedTheme = localStorage.getItem('neon_theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            themeBtn.innerHTML = '☀️ 日间';
        }
        themeBtn.onclick = () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('neon_theme', isLight ? 'light' : 'dark');
            themeBtn.innerHTML = isLight ? '☀️ 日间' : '🌙 夜间';
        };
        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const inits = { fish: initFishGame, dice: initDiceGame, dragonTiger: initDragonTigerGame, game4: initGame4 };
        async function switchGame(id) { if (currentDestroy) currentDestroy(); gamePanel.innerHTML = ''; currentDestroy = await inits[id](gamePanel); }
        document.querySelectorAll('.game-tab').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
        switchGame('fish');
        let adminClickCount = 0;
        document.getElementById('userBalanceDisplay').addEventListener('click', () => { adminClickCount++; setTimeout(() => { adminClickCount = 0; }, 1000); if (adminClickCount >= 3) { adminClickCount = 0; openAdminModal(); } });
    }

    renderAuthUI();
</script>
