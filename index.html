<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, 
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #fef9e6 0%, #fff5e0 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 16px;
            min-height: 100vh;
            color: #2c2b28;
        }
        /* 主容器 - 暖光玻璃 */
        #app {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(255, 248, 235, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(255, 215, 140, 0.6);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,200,0.8);
            overflow: hidden;
        }
        /* 登录/注册面板 */
        .auth-panel {
            padding: 32px 24px;
            background: rgba(255, 248, 235, 0.9);
        }
        .auth-panel h2, .auth-panel h3 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #c47c3a, #e09d32);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-input {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            background: white;
            border: 1px solid #ffd9a5;
            border-radius: 32px;
            color: #3a2a1a;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        .auth-input:focus {
            border-color: #e09d32;
            box-shadow: 0 0 0 3px rgba(224, 157, 50, 0.2);
        }
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 12px 0;
        }
        .code-btn {
            background: linear-gradient(135deg, #c47c3a, #e09d32);
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .auth-btn {
            background: linear-gradient(135deg, #e09d32, #c47c3a);
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            font-size: 1rem;
        }
        .auth-btn:active, .code-btn:active { transform: scale(0.98); }
        hr {
            margin: 24px 0;
            border-color: #ffd9a5;
        }
        .auth-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 16px;
            color: #b97f2e;
        }
        /* 用户栏 */
        .user-section {
            background: rgba(255, 245, 225, 0.9);
            backdrop-filter: blur(8px);
            padding: 16px;
            border-bottom: 1px solid #ffdfb0;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        #userBalanceDisplay {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c47c3a, #f5b042);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn-sm {
            background: #fff0e0;
            border: 1px solid #ffd9a5;
            padding: 6px 14px;
            border-radius: 40px;
            color: #8b5a2b;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .charge-btn, .withdraw-btn {
            background: linear-gradient(135deg, #f5b042, #e09d32);
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .lang-switch {
            background: #c47c3a;
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            color: white;
            cursor: pointer;
            margin-left: 8px;
        }
        /* 游戏导航 */
        .game-nav {
            display: flex;
            gap: 8px;
            background: #fff0e0;
            padding: 8px 16px;
            margin: 16px 12px;
            border-radius: 60px;
        }
        .game-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #8b5a2b;
            cursor: pointer;
        }
        .game-tab.active {
            background: linear-gradient(135deg, #e09d32, #c47c3a);
            color: white;
            box-shadow: 0 4px 12px rgba(192, 124, 58, 0.3);
        }
        .game-container {
            padding: 12px 16px 24px;
        }
        /* 游戏卡片 */
        .game-card {
            background: rgba(255, 248, 235, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #ffdfb0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .chip {
            background: linear-gradient(145deg, #f5e6d3, #ffe8cc);
            display: inline-block;
            padding: 8px 16px;
            border-radius: 40px;
            margin: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #8b5a2b;
            border: 1px solid #ffd9a5;
        }
        .chip.selected {
            background: linear-gradient(145deg, #e09d32, #c47c3a);
            color: white;
            border-color: #e09d32;
        }
        .quick-bet, .clear-bet {
            background: #fff0e0;
            border: 1px solid #ffd9a5;
            border-radius: 30px;
            padding: 6px 14px;
            margin: 4px;
            cursor: pointer;
            color: #b97f2e;
            font-weight: 500;
        }
        .exec-btn {
            background: linear-gradient(135deg, #c47c3a, #e09d32);
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 4px;
        }
        .main-go {
            background: linear-gradient(135deg, #e94560, #c23b22);
        }
        .dice-cube {
            width: 70px;
            height: 70px;
            background: #fef0df;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #b97f2e;
            border: 1px solid #ffd9a5;
            box-shadow: 0 6px 10px rgba(0,0,0,0.05);
        }
        .fish-pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
        }
        .fish-bet-card {
            background: rgba(255, 248, 235, 0.9);
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            border: 1px solid #ffdfb0;
        }
        .bet-card {
            background: rgba(255, 248, 235, 0.9);
            border-radius: 20px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #ffdfb0;
        }
        .bet-card:active { background: #ffe8cc; transform: scale(0.96); }
        .history-cell {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff0e0;
            font-weight: bold;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff8f0;
            border-radius: 32px;
            padding: 24px;
            max-width: 90%;
            max-height: 80%;
            overflow: auto;
            color: #3a2a1a;
            border: 1px solid #ffd9a5;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2b28;
            color: #ffd9a5;
            padding: 8px 20px;
            border-radius: 60px;
            z-index: 2000;
            font-weight: bold;
            white-space: nowrap;
        }
        .result-popup {
            position: fixed;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #e09d32, #c47c3a);
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 1500;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .points-grid, .trio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 8px;
            margin: 12px 0;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== 双语词库 ====================
    const lang = {
        zh: {
            recharge: "💎 充值", withdraw: "💰 提现", service: "📞 客服", logout: "退出", balance: "余额",
            phoneOrEmail: "手机号 / 邮箱", password: "密码 (≥4位)", referralCode: "推荐码 (必填)", remember: "记住账号",
            login: "登录", register: "注册", referralNote: "推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "获取验证码", verifyCode: "验证码", registerNow: "注册新账户",
            gameFish: "🐟 葫芦鱼", gameDice: "🎲 至尊骰宝", gameDT: "🐉 龙虎斗", game4: "♠️ 游戏4",
            fishRoll: "🎲 开骰", fishClear: "清空", fishGrab: "🎲 抢庄", fishDouble: "🎯 双押",
            diceClear: "清空", diceRepeat: "续押", diceRefresh: "刷新", dtFight: "确认投注", dtCancel: "全部取消", dtRepeat: "续押", dtRefresh: "刷新"
        },
        th: {
            recharge: "💎 เติมเงิน", withdraw: "💰 ถอนเงิน", service: "📞 บริการ", logout: "ออก", balance: "ยอดเงิน",
            phoneOrEmail: "เบอร์โทร / อีเมล", password: "รหัสผ่าน (≥4)", referralCode: "รหัสแนะนำ", remember: "จำฉัน",
            login: "เข้าสู่ระบบ", register: "สมัคร", referralNote: "รหัส: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "รับรหัส", verifyCode: "รหัสยืนยัน", registerNow: "สมัครสมาชิก",
            gameFish: "🐟 ปลาหมึก", gameDice: "🎲 เซียนเต๋า", gameDT: "🐉 มังกรเสือ", game4: "♠️ เกม4",
            fishRoll: "🎲 เปิด", fishClear: "ล้าง", fishGrab: "🎲 รับเจ้ามือ", fishDouble: "🎯 เดิมพันคู่",
            diceClear: "ล้าง", diceRepeat: "เล่นซ้ำ", diceRefresh: "รีเฟรช", dtFight: "ยืนยัน", dtCancel: "ยกเลิก", dtRepeat: "เล่นซ้ำ", dtRefresh: "รีเฟรช"
        }
    };
    let currentLang = 'zh';
    function t(key) { return lang[currentLang][key] || lang.zh[key] || key; }

    // ==================== 全局数据 ====================
    let systemBankerBalance = 50000;
    let adjustFactor = 1.0;
    let validReferralCodes = ["VIP666", "888VIP", "GOLD2025", "LUCKY8", "DICE100"];
    let usersData = JSON.parse(localStorage.getItem('gold_users')) || {};
    let currentUser = null;
    let verificationCodes = {};

    function saveUsers() { localStorage.setItem('gold_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.account]?.balance || 0) : 0; }
    function setUserBalance(amount) {
        if (!currentUser) return;
        usersData[currentUser.account].balance = Math.max(0, amount);
        saveUsers();
        let span = document.getElementById("userBalanceDisplay");
        if (span) span.innerText = getUserBalance().toFixed(2);
    }
    function showToast(msg) {
        let t = document.createElement('div'); t.className = 'toast-message'; t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    function recharge() {
        let yuan = prompt(t('recharge') + " (1元 = 1余额)", "10");
        if (!yuan) return;
        let num = parseFloat(yuan);
        if (isNaN(num) || num <= 0) { showToast("请输入正数"); return; }
        setUserBalance(getUserBalance() + num);
        showToast(`${t('recharge')} +${num.toFixed(2)} 元`);
    }
    function withdraw() {
        let bal = getUserBalance();
        if (bal <= 0) { showToast("余额不足"); return; }
        let amount = parseFloat(prompt("提现金额 (元)", "10"));
        if (isNaN(amount) || amount <= 0 || amount > bal) { showToast("金额无效"); return; }
        let type = confirm("提现方式：确定=微信，取消=支付宝") ? "微信" : "支付宝";
        let account = prompt("请输入收款账号:");
        if (!account) return;
        setUserBalance(bal - amount);
        showToast(`提现申请已提交！${amount}元将处理到${type}账号 ${account}`);
    }
    function showServiceModal() { alert("客服微信: game_kf_888"); }

    // 管理员后台（完整功能）
    let adminPassword = "admin888";
    function openAdminModal() {
        let pwd = prompt("管理员密码:");
        if (pwd !== adminPassword) { showToast("密码错误"); return; }
        let allUsers = Object.keys(usersData).map(acc => ({ account: acc, balance: usersData[acc].balance, regTime: usersData[acc].registerTime || '未知' }));
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center; color:#c47c3a;">🎛️ 管理员后台</h3>
                <div style="max-height:200px; overflow-y:auto; margin:12px 0;">
                    <table style="width:100%; border-collapse:collapse;">
                        <thead><tr><th>账号</th><th>余额</th><th>注册时间</th><th>记录</th></tr></thead>
                        <tbody id="adminUserTableBody"></tbody>
                    </table>
                </div>
                <select id="adminTargetUser" style="width:100%; margin:8px 0; padding:8px; border-radius:40px; border:1px solid #ffd9a5;">
                    ${allUsers.map(u => `<option value="${u.account}">${u.account} (${u.balance.toFixed(2)})</option>`).join('')}
                </select>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <input id="adminAmount" placeholder="金额" value="0" style="flex:1; padding:8px; border-radius:40px; border:1px solid #ffd9a5;">
                    <button id="adminAddBalance" style="background:#c47c3a; border:none; border-radius:40px; padding:8px 12px; color:white;">➕ 上分</button>
                    <button id="adminSubBalance" style="background:#c47c3a; border:none; border-radius:40px; padding:8px 12px; color:white;">➖ 下分</button>
                    <button id="adminResetBalance" style="background:#c47c3a; border:none; border-radius:40px; padding:8px 12px; color:white;">🔄 重置0</button>
                </div>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <button id="adminViewWithdraw" style="background:#8b5a2b; border:none; border-radius:40px; padding:6px 12px; color:white;">📋 提现记录</button>
                    <button id="adminSetBanker" style="background:#8b5a2b; border:none; border-radius:40px; padding:6px 12px; color:white;">🏦 设置庄家</button>
                    <button id="adminChangePwd" style="background:#8b5a2b; border:none; border-radius:40px; padding:6px 12px; color:white;">🔑 改密</button>
                    <button id="adminSaveFactor" style="background:#8b5a2b; border:none; border-radius:40px; padding:6px 12px; color:white;">💹 保存系数</button>
                </div>
                <div style="margin:12px 0;">
                    <label>🎛️ 全局赔付系数: <input id="adminAdjustFactor" value="${adjustFactor}" step="0.01" style="width:80px; padding:4px;"></label>
                </div>
                <button id="adminCloseBtn" class="auth-btn" style="background:#d4a373;">关闭</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        function renderUserTable() {
            let tbody = modalDiv.querySelector('#adminUserTableBody');
            tbody.innerHTML = allUsers.map(u => `
                <tr>
                    <td>${u.account}</td><td>💰 ${u.balance.toFixed(2)}</td><td>${u.regTime}</td>
                    <td><button class="viewRecordBtn" data-account="${u.account}" style="background:#e09d32; border:none; border-radius:20px; padding:2px 8px;">📜</button></td>
                </tr>
            `).join('');
            document.querySelectorAll('.viewRecordBtn').forEach(btn => {
                btn.onclick = () => {
                    let acc = btn.dataset.account;
                    let records = usersData[acc]?.records || [];
                    let html = '<div>' + records.map(r => `<div style="padding:4px; border-bottom:1px solid #eee;">${r.time} ${r.game} ${r.bet}→${r.result} ${r.win>0?'+'+r.win:'-'+r.amount}</div>`).join('') + '</div><button id="closeRec" class="auth-btn">关闭</button>';
                    let m = document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove();
                };
            });
        }
        renderUserTable();
        const getTarget = () => modalDiv.querySelector('#adminTargetUser').value;
        const getAmt = () => parseFloat(modalDiv.querySelector('#adminAmount').value) || 0;
        modalDiv.querySelector('#adminAddBalance').onclick = () => { let t=getTarget(), a=getAmt(); if(a>0){ usersData[t].balance+=a; saveUsers(); if(currentUser?.account===t) setUserBalance(usersData[t].balance); showToast(`${t} +${a}`); modalDiv.remove(); openAdminModal(); } else showToast("金额>0"); };
        modalDiv.querySelector('#adminSubBalance').onclick = () => { let t=getTarget(), a=getAmt(); if(a>0 && usersData[t].balance>=a){ usersData[t].balance-=a; saveUsers(); if(currentUser?.account===t) setUserBalance(usersData[t].balance); showToast(`${t} -${a}`); modalDiv.remove(); openAdminModal(); } else showToast("无效"); };
        modalDiv.querySelector('#adminResetBalance').onclick = () => { let t=getTarget(); usersData[t].balance=0; saveUsers(); if(currentUser?.account===t) setUserBalance(0); showToast(`${t} 重置为0`); modalDiv.remove(); openAdminModal(); };
        modalDiv.querySelector('#adminViewWithdraw').onclick = () => { let records = JSON.parse(localStorage.getItem('withdraw_records'))||[]; alert(records.map(r=>`${r.phone} ${r.amount}元 ${r.type} ${r.account} ${r.time}`).join('\n')); };
        modalDiv.querySelector('#adminSetBanker').onclick = () => { let newAmt=parseFloat(prompt("骰宝庄家新余额:", systemBankerBalance)); if(!isNaN(newAmt) && newAmt>=0){ systemBankerBalance=newAmt; localStorage.setItem('system_banker_balance',systemBankerBalance); showToast(`庄家余额 ${newAmt}`); } };
        modalDiv.querySelector('#adminChangePwd').onclick = () => { let old=prompt("当前密码:"); if(old!==adminPassword){ showToast("密码错误"); return; } let newPwd=prompt("新密码(≥4):"); if(newPwd && newPwd.length>=4){ adminPassword=newPwd; localStorage.setItem('admin_pwd',newPwd); showToast("修改成功"); } };
        modalDiv.querySelector('#adminSaveFactor').onclick = () => { let newFac=parseFloat(modalDiv.querySelector('#adminAdjustFactor').value); if(!isNaN(newFac) && newFac>=0.2 && newFac<=3.0){ adjustFactor=newFac; localStorage.setItem('adjustFactor',adjustFactor); showToast(`系数 ${adjustFactor}`); } };
        modalDiv.querySelector('#adminCloseBtn').onclick = () => modalDiv.remove();
    }

    // 添加游戏记录
    function addGameRecord(account, gameName, betInfo, result, winAmount, betAmount) {
        if (!usersData[account]) return;
        let rec = usersData[account].records || [];
        rec.unshift({ time: new Date().toLocaleString(), game: gameName, bet: betInfo, result, win: winAmount, amount: betAmount });
        if (rec.length > 100) rec.pop();
        usersData[account].records = rec;
        saveUsers();
    }

    // ==================== 葫芦鱼（完整） ====================
    let fishDestroy = null;
    function initFishGame(container) {
        if (fishDestroy) fishDestroy();
        container.innerHTML = `
            <div class="game-card">
                <div style="display:flex; gap:12px; margin-bottom:16px;">
                    <div style="flex:1; background:#fff0e0; border-radius:24px; padding:8px; text-align:center;"><div>🏦 庄家余额</div><div id="fishBankerDisplay">∞</div></div>
                    <div style="flex:1; background:#fff0e0; border-radius:24px; padding:8px; text-align:center;"><div>🎲 总押注</div><div id="fishTotalBet">0</div></div>
                    <div style="flex:1; background:#fff0e0; border-radius:24px; padding:8px; text-align:center;"><div>🏆 上局净利</div><div id="fishLastWin">0</div></div>
                </div>
                <div id="fishChips" style="margin:8px 0;">
                    <span class="chip" data-chip="2">2</span><span class="chip" data-chip="5">5</span><span class="chip selected" data-chip="10">10</span><span class="chip" data-chip="50">50</span><span class="chip" data-chip="100">100</span>
                </div>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <button id="fishRollBtn" class="exec-btn">${t('fishRoll')}</button>
                    <button id="fishClearBtn" class="exec-btn" style="background:#c23b22;">${t('fishClear')}</button>
                    <button id="fishGrabBtn" class="exec-btn" style="background:#f59e0b;">${t('fishGrab')}</button>
                    <button id="fishDoubleBtn" class="exec-btn" style="background:#f97316;">${t('fishDouble')}</button>
                </div>
                <div class="dice-3d-area" style="display:flex; gap:16px; justify-content:center; margin:16px 0;">
                    <div class="dice-cube" id="fishDice0">🎲</div>
                    <div class="dice-cube" id="fishDice1">🎲</div>
                    <div class="dice-cube" id="fishDice2">🎲</div>
                </div>
                <div id="fishPatternGrid" class="fish-pattern-grid"></div>
                <button id="fishRecordBtn" class="exec-btn" style="width:100%; margin-top:8px;">📜 记录</button>
