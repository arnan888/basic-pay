<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>金辉骰宝 · 独立版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1a120b 0%, #2a1e12 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            color: #ffecb3;
            transition: background 0.3s, color 0.3s;
        }
        #app {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(30, 20, 12, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(255, 215, 0, 0.5);
            overflow: hidden;
        }
        .auth-panel {
            padding: 28px 20px;
            background: rgba(20, 12, 6, 0.8);
        }
        .auth-panel h2, .auth-panel h3 {
            text-align: center;
            margin-bottom: 16px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-input {
            width: 100%;
            padding: 12px 16px;
            margin: 6px 0;
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffaa33;
            border-radius: 40px;
            color: #ffd966;
            font-size: 0.95rem;
            outline: none;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 10px 0;
        }
        .code-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            color: #2a1a0a;
            font-weight: 700;
            cursor: pointer;
        }
        .auth-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: bold;
            color: #2a1a0a;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-size: 0.95rem;
        }
        hr {
            margin: 20px 0;
            border-color: #ffaa33;
        }
        .auth-note {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 12px;
            color: #ffaa33;
        }
        .user-section {
            background: rgba(20, 12, 6, 0.7);
            padding: 12px 16px;
            border-bottom: 1px solid #ffaa33;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        #userBalanceDisplay {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 6px;
        }
        .btn-sm {
            background: rgba(255,170,51,0.2);
            border: 1px solid #ffaa33;
            padding: 4px 12px;
            border-radius: 40px;
            color: #ffd966;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .charge-btn, .withdraw-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: #2a1a0a;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .lang-switch, .theme-switch {
            background: #ffaa33;
            border: none;
            border-radius: 30px;
            padding: 4px 10px;
            color: #2a1a0a;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 4px;
        }
        .game-nav {
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            margin: 12px 12px;
            border-radius: 60px;
        }
        .game-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.8rem;
            color: #ffaa33;
            cursor: pointer;
        }
        .game-tab.active {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            color: #2a1a0a;
            box-shadow: 0 0 8px #ffaa33;
        }
        .game-container {
            padding: 8px 12px 20px;
        }
        .game-card {
            background: rgba(20, 12, 6, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 16px;
            border: 1px solid #ffaa33;
        }
        .chip {
            background: linear-gradient(145deg, #cc8800, #aa6600);
            display: inline-block;
            padding: 6px 14px;
            border-radius: 36px;
            margin: 3px;
            cursor: pointer;
            font-weight: bold;
            color: #ffecb3;
            border: 1px solid #ffaa33;
            font-size: 0.85rem;
        }
        .chip.selected {
            background: linear-gradient(145deg, #ffaa33, #ff884d);
            color: #2a1a0a;
        }
        .quick-bet, .clear-bet {
            background: rgba(255,170,51,0.2);
            border: 1px solid #ffaa33;
            border-radius: 30px;
            padding: 4px 10px;
            margin: 3px;
            cursor: pointer;
            color: #ffd966;
            font-weight: 500;
            font-size: 0.75rem;
        }
        .exec-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 36px;
            padding: 8px 14px;
            color: #2a1a0a;
            font-weight: bold;
            cursor: pointer;
            margin: 3px;
            font-size: 0.85rem;
        }
        .main-go {
            background: linear-gradient(135deg, #ffcc66, #ffaa33);
            font-weight: 800;
        }
        .countdown-area {
            text-align: center;
            margin: 6px 0 12px 0;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 6px 12px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #ffaa33;
        }
        /* 骰宝专用3D骰子 */
        .dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            perspective: 1000px;
        }
        .dice-cube {
            width: 70px;
            height: 70px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #2a1e12;
            border: 2px solid #ffaa33;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: visible;
            font-size: 2rem;
            font-weight: bold;
            color: #ffd966;
        }
        .front { transform: translateZ(35px); }
        .back { transform: rotateY(180deg) translateZ(35px); }
        .right { transform: rotateY(90deg) translateZ(35px); }
        .left { transform: rotateY(-90deg) translateZ(35px); }
        .top { transform: rotateX(90deg) translateZ(35px); }
        .bottom { transform: rotateX(-90deg) translateZ(35px); }
        @media (max-width: 480px) {
            .dice-cube { width: 60px; height: 60px; }
            .front, .back, .right, .left, .top, .bottom { transform: translateZ(30px); }
            .back { transform: rotateY(180deg) translateZ(30px); }
            .right { transform: rotateY(90deg) translateZ(30px); }
            .left { transform: rotateY(-90deg) translateZ(30px); }
            .top { transform: rotateX(90deg) translateZ(30px); }
            .bottom { transform: rotateX(-90deg) translateZ(30px); }
            .dice-face { font-size: 1.5rem; }
        }
        .points-grid, .trio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
            gap: 6px;
            margin: 10px 0;
        }
        .bet-card {
            background: rgba(0,0,0,0.5);
            border-radius: 18px;
            padding: 6px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #ffaa33;
            font-size: 0.8rem;
        }
        .pip {
            width: 10px;
            height: 10px;
            background: #ffaa33;
            border-radius: 50%;
            margin: 2px;
        }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 8px; left: 8px; }
        .pip-tr { position: absolute; top: 8px; right: 8px; }
        .pip-bl { position: absolute; bottom: 8px; left: 8px; }
        .pip-br { position: absolute; bottom: 8px; right: 8px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1, .pip-l2, .pip-l3 { position: absolute; left: 8px; }
        .pip-l1 { top: 8px; }
        .pip-l2 { top: 50%; transform: translateY(-50%); }
        .pip-l3 { bottom: 8px; }
        .pip-r1, .pip-r2, .pip-r3 { position: absolute; right: 8px; }
        .pip-r1 { top: 8px; }
        .pip-r2 { top: 50%; transform: translateY(-50%); }
        .pip-r3 { bottom: 8px; }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2a1e12;
            border-radius: 36px;
            padding: 20px;
            max-width: 90%;
            max-height: 85%;
            overflow: auto;
            color: #ffd966;
            border: 1px solid #ffaa33;
            text-align: center;
        }
        .qr-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 16px;
            border: 2px solid #ffaa33;
            background: white;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a1a0a;
            color: #ffd966;
            padding: 6px 16px;
            border-radius: 40px;
            z-index: 2000;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid #ffaa33;
            font-size: 0.8rem;
        }
        .result-popup {
            position: fixed;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            color: #2a1a0a;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            z-index: 1500;
        }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .admin-table th, .admin-table td { padding: 6px 4px; border-bottom: 1px solid #ffaa33; text-align: left; }
        .admin-btn { background: #ffaa33; border: none; border-radius: 20px; padding: 4px 8px; margin: 2px; color: #2a1a0a; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        /* 浅色主题 */
        body.light-mode {
            background: linear-gradient(145deg, #f5f0e6 0%, #e8dfd0 100%);
            color: #3a2a1a;
        }
        body.light-mode #app {
            background: rgba(245, 240, 230, 0.85);
            border-color: rgba(180, 130, 60, 0.5);
        }
        body.light-mode .auth-panel,
        body.light-mode .user-section,
        body.light-mode .game-card,
        body.light-mode .modal-content {
            background: rgba(250, 245, 235, 0.9);
            border-color: #b8860b;
            color: #3a2a1a;
        }
        body.light-mode .auth-input,
        body.light-mode .bet-card,
        body.light-mode .chip,
        body.light-mode .quick-bet,
        body.light-mode .exec-btn,
        body.light-mode .countdown-area {
            background: rgba(255, 250, 240, 0.8);
            border-color: #c99a3b;
            color: #4a3a2a;
        }
        body.light-mode .chip.selected {
            background: linear-gradient(145deg, #ffcc77, #e6a822);
            color: #2a1a0a;
        }
        body.light-mode .dice-face {
            background: #fffaf0;
            border-color: #c99a3b;
            color: #4a3a2a;
        }
        body.light-mode .toast-message {
            background: #fff9ef;
            color: #b8860b;
            border-color: #b8860b;
        }
        body.light-mode .result-popup {
            background: linear-gradient(135deg, #ffcc77, #e6a822);
            color: #2a1a0a;
        }
        body.light-mode .admin-table th,
        body.light-mode .admin-table td {
            border-bottom-color: #dbb45c;
        }
        body.light-mode .admin-btn {
            background: #e6a822;
            color: #2a1a0a;
        }
        body.light-mode .lang-switch,
        body.light-mode .theme-switch {
            background: #e6a822;
            color: #2a1a0a;
        }
        body.light-mode .charge-btn,
        body.light-mode .withdraw-btn {
            background: linear-gradient(135deg, #e6a822, #c9881c);
            color: #2a1a0a;
        }
        body.light-mode #userBalanceDisplay {
            background: linear-gradient(135deg, #c9881c, #a56b0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* 名牌适配 */
        body.light-mode #app > div:first-child {
            background: linear-gradient(135deg, #f5e6d3, #e8d8c0);
            border-bottom-color: #b8860b;
        }
        body.light-mode #app > div:first-child h1 {
            background: linear-gradient(135deg, #c9881c, #a56b0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.light-mode #app > div:first-child p {
            color: #b8860b;
        }
        body.light-mode #app > div:first-child div:last-child {
            background: #b8860b;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // 双语
    const lang = {
        zh: {
            recharge: "💎 充值", withdraw: "💰 提现", service: "📞 客服", logout: "退出", balance: "余额",
            phoneOrEmail: "手机号 / 邮箱", password: "密码 (≥4位)", referralCode: "推荐码 (必填)", remember: "记住账号",
            login: "登录", register: "注册", referralNote: "推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "获取验证码", verifyCode: "验证码", registerNow: "注册新账户",
            gameDice: "🎲 金辉骰宝"
        },
        th: {
            recharge: "💎 เติมเงิน", withdraw: "💰 ถอนเงิน", service: "📞 บริการ", logout: "ออก", balance: "ยอดเงิน",
            phoneOrEmail: "เบอร์โทร / อีเมล", password: "รหัสผ่าน (≥4)", referralCode: "รหัสแนะนำ", remember: "จำฉัน",
            login: "เข้าสู่ระบบ", register: "สมัคร", referralNote: "รหัส: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "รับรหัส", verifyCode: "รหัสยืนยัน", registerNow: "สมัครสมาชิก",
            gameDice: "🎲 เซียนเต๋าทอง"
        }
    };
    let currentLang = 'zh';
    function t(key) { return lang[currentLang][key] || lang.zh[key] || key; }

    // 全局数据
    let systemBankerBalance = localStorage.getItem('neon_system_banker') ? parseFloat(localStorage.getItem('neon_system_banker')) : 50000;
    let adjustFactor = localStorage.getItem('neon_adjustFactor') ? parseFloat(localStorage.getItem('neon_adjustFactor')) : 1.0;
    let validReferralCodes = ["VIP666","888VIP","GOLD2025","LUCKY8","DICE100"];
    let usersData = JSON.parse(localStorage.getItem('neon_users')) || {};
    if (Object.keys(usersData).length === 0) {
        usersData['player1'] = { password: '123', balance: 5000, registerTime: new Date().toLocaleString(), records: [] };
        localStorage.setItem('neon_users', JSON.stringify(usersData));
    }
    let currentUser = null;
    let verificationCodes = {};

    function saveUsers() { localStorage.setItem('neon_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.account]?.balance || 0) : 0; }
    function setUserBalance(amount) { if(!currentUser) return; usersData[currentUser.account].balance = Math.max(0, amount); saveUsers(); let span = document.getElementById("userBalanceDisplay"); if(span) span.innerText = getUserBalance().toFixed(2); }
    function showToast(msg) { let t = document.createElement('div'); t.className = 'toast-message'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }

    // 充值
    function recharge() {
        const voucherCode = Math.floor(100000 + Math.random() * 900000).toString();
        let modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="color:#ffaa33;">💎 金辉充值</h3>
                <div style="display:flex; justify-content:center; gap:15px; margin:12px 0;">
                    <div><img class="qr-img" alt="微信收款码" src="mmexport1776247819360.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%BE%AE%E4%BF%A1%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'"><p>微信支付</p></div>
                    <div><img class="qr-img" alt="支付宝收款码" src="mmexport1776247823872.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E6%94%AF%E4%BB%98%E5%AE%9D%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'"><p>支付宝支付</p></div>
                </div>
                <div style="background:#1a1008; border-radius:18px; padding:8px; margin:8px 0;"><p>🔐 本次凭证码：<strong style="color:#ffaa33; font-size:1.2rem;">${voucherCode}</strong></p><p style="font-size:0.6rem;">扫码支付后输入凭证码确认</p></div>
                <input type="number" id="rechargeAmount" placeholder="金额（元）" style="width:100%; padding:8px; border-radius:40px; background:#1a1008; color:#ffd966; border:1px solid #ffaa33; margin:8px 0;">
                <input type="text" id="voucherInput" placeholder="凭证码" style="width:100%; padding:8px; border-radius:40px; background:#1a1008; color:#ffd966; border:1px solid #ffaa33; margin:8px 0;">
                <button id="confirmRechargeBtn" class="auth-btn" style="background:#ffaa33;">✅ 确认到账</button>
                <button id="cancelRechargeBtn" class="auth-btn" style="background:#ff884d; margin-top:6px;">取消</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#confirmRechargeBtn').onclick = () => {
            let amount = parseFloat(modalDiv.querySelector('#rechargeAmount').value);
            let inputCode = modalDiv.querySelector('#voucherInput').value.trim();
            if (isNaN(amount) || amount <= 0) { showToast("金额错误"); return; }
            if (inputCode !== voucherCode) { showToast("凭证码错误"); return; }
            setUserBalance(getUserBalance() + amount);
            showToast(`💰 充值成功 +${amount.toFixed(2)}元`);
            modalDiv.remove();
        };
        modalDiv.querySelector('#cancelRechargeBtn').onclick = () => modalDiv.remove();
    }

    function withdraw() { 
        let bal = getUserBalance(); 
        if(bal <= 0){ showToast("余额不足"); return; } 
        let amount = parseFloat(prompt("提现金额 (元)", "10")); 
        if(isNaN(amount) || amount <= 0 || amount > bal){ showToast("金额无效"); return; } 
        let type = confirm("提现方式：确定=微信，取消=支付宝")?"微信":"支付宝"; 
        let account = prompt("收款账号:"); 
        if(!account) return; 
        setUserBalance(bal - amount); 
        let records = JSON.parse(localStorage.getItem('neon_withdraw'))||[]; 
        records.push({ phone: currentUser.account, amount, type, account, time: new Date().toLocaleString() }); 
        localStorage.setItem('neon_withdraw', JSON.stringify(records)); 
        showToast(`提现申请已提交！${amount}元将处理到${type}账号 ${account}`); 
    }
    function showServiceModal() { alert("客服微信: game_kf_888"); }
    function addGameRecord(account, gameName, betInfo, result, winAmount, betAmount) { if(!usersData[account]) return; let rec = usersData[account].records||[]; rec.unshift({ time: new Date().toLocaleString(), game: gameName, bet: betInfo, result, win: winAmount, amount: betAmount }); if(rec.length>100) rec.pop(); usersData[account].records = rec; saveUsers(); }

    // 管理员后台
    let adminPassword = localStorage.getItem('neon_admin_pwd') || "admin888";
    function openAdminModal() {
        let pwd = prompt("管理员密码:");
        if (pwd !== adminPassword) { showToast("密码错误"); return; }
        let allUsers = Object.keys(usersData).map(acc => ({ account: acc, balance: usersData[acc].balance, regTime: usersData[acc].registerTime || '未知' }));
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-content"><h3>🎛️ 管理员后台</h3><select id="adminTargetUser">${allUsers.map(u=>`<option value="${u.account}">${u.account} (${u.balance.toFixed(2)}元)</option>`).join('')}</select><div><input id="adminAmount" placeholder="金额" value="0"><button id="adminAddBalance">上分</button><button id="adminSubBalance">下分</button></div><div><label>赔付系数: <input id="adminAdjustFactor" value="${adjustFactor}" step="0.01"></label><button id="adminSaveFactor">保存</button></div><button id="adminCloseBtn">关闭</button></div>`;

        function setCubeValue(dice, val) {
            const rot={1:'rotateX(0deg) rotateY(0deg)',2:'rotateX(-90deg) rotateY(0deg)',3:'rotateY(90deg)',4:'rotateY(-90deg)',5:'rotateX(90deg)',6:'rotateX(180deg)'};
            let rotateX=0,rotateY=0;
            if(rot[val].includes('rotateX')){ let match=rot[val].match(/rotateX\(([-\d]+)deg\)/); if(match) rotateX=parseInt(match[1]); }
            if(rot[val].includes('rotateY')){ let match=rot[val].match(/rotateY\(([-\d]+)deg\)/); if(match) rotateY=parseInt(match[1]); }
            const extraX=360*(1+Math.floor(Math.random()*2));

        }
        const diceEls=[document.getElementById('dice1'),document.getElementById('dice2'),document.getElementById('dice3')];

        function updateUIDice(){ for(let k in bets){ let el=document.getElementById(`bet_${k}`); if(el) el.innerText=bets[k]; } totalBetEl.innerText=Object.values(bets).reduce((a,b)=>a+b,0); document.getElementById('diceBankerDisplay').innerText=systemBankerBalance.toFixed(2); document.getElementById("userBalanceDisplay").innerText=getUserBalance().toFixed(2); }
        function saveLastBet(){ lastBetSnapshot=JSON.parse(JSON.stringify(bets)); }
        async function startRollingLong(finalVals, duration=2200) {
            return new Promise(resolve=>{
                let steps=20, step=0, interval=duration/steps;
                let iv=setInterval(()=>{
                    diceEls.forEach(d=>{ const randVal=Math.floor(Math.random()*6)+1; setCubeValue(d,randVal); });
                    step++;
                    if(step>=steps){
                        clearInterval(iv);
                        diceEls.forEach((d,i)=>setCubeValue(d,finalVals[i]));
                        resolve();
                    }
                }, interval);
            });
        }
        function startRollingNumber(finalAmount){

        function getResultInfo(d1,d2,d3){

        async function addBetDice(type){

        }
        async function startAutoDrawDice(){
            if(isBetLocked) return;
            let totalBetVal=Object.values(bets).reduce((a,b)=>a+b,0);
            isBetLocked=true;
            let d1=Math.floor(Math.random()*6)+1, d2=Math.floor(Math.random()*6)+1, d3=Math.floor(Math.random()*6)+1;
            let {total, types}=getResultInfo(d1,d2,d3);

                if(types.includes('BIG') && bets.BIG) winAmount+=bets.BIG*2;

                    </div>
                    <span style="font-size: 2rem;">🎲</span>
                </div>
                <div style="height: 2px; width: 80px; background: #ffaa33; margin: 8px auto 0; border-radius: 2px;"></div>
            </div>
            <div class="user-section">
                <div class="user-info-row">
                    <span>📱 ${currentUser.account} | 💰 ${t('balance')}: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span>
                    <div class="btn-group">
                        <button id="serviceBtn" class="btn-sm">${t('service')}</button>
                        <button id="logoutBtn" class="btn-sm">${t('logout')}</button>
                        <button id="langSwitchBtn" class="lang-switch">ภาษาไทย</button>
                        <button id="themeToggleBtn" class="theme-switch">🌙 夜间</button>
                    </div>
                </div>
                <div class="charge-withdraw-row" style="margin-top:8px;">
                    <button id="rechargeBtn" class="charge-btn">${t('recharge')}</button>
                    <button id="withdrawBtn" class="withdraw-btn">${t('withdraw')}</button>
                </div>
            </div>
            <div class="game-nav">
                <button class="game-tab active" data-game="dice">${t('gameDice')}</button>
            </div>
            <div class="game-container" id="gamePanel"></div>
        `;
        document.getElementById('logoutBtn').onclick=()=>{ currentUser=null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick=showServiceModal;
        document.getElementById('rechargeBtn').onclick=recharge;
        document.getElementById('withdrawBtn').onclick=withdraw;
        document.getElementById('langSwitchBtn').onclick=()=>{ currentLang=currentLang==='zh'?'th':'zh'; document.getElementById('langSwitchBtn').innerText=currentLang==='zh'?'ภาษาไทย':'中文'; renderGameLobby(); };
        // 主题切换
        const themeBtn = document.getElementById('themeToggleBtn');
        const savedTheme = localStorage.getItem('neon_theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            themeBtn.innerHTML = '☀️ 日间';
        }
        themeBtn.onclick = () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('neon_theme', isLight ? 'light' : 'dark');
            themeBtn.innerHTML = isLight ? '☀️ 日间' : '🌙 夜间';
        };
        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const inits = { dice: initDiceGame };
        async function switchGame(id){ if(currentDestroy) currentDestroy(); gamePanel.innerHTML=''; currentDestroy=await inits[id](gamePanel); }
        document.querySelectorAll('.game-tab').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.game-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
        switchGame('dice');
        let adminClickCount=0;
        document.getElementById('userBalanceDisplay').addEventListener('click',()=>{ adminClickCount++; setTimeout(()=>{adminClickCount=0;},1000); if(adminClickCount>=3){ adminClickCount=0; openAdminModal(); } });
    }

    renderAuthUI();
</script>
</body>
</html>
