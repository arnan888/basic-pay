<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>潮汕葫芦鱼·四方赌桌版 | 骰盅慢启 + 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a2a1a;
            background-image: radial-gradient(circle at 20% 30%, rgba(200, 140, 70, 0.2) 2%, transparent 2.5%);
            background-size: 28px 28px;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;
            padding: 12px;
        }

        .app {
            max-width: 650px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 登录面板 (保持不变) */
        .auth-panel {
            background: linear-gradient(145deg, #362a1f 0%, #251e16 100%);
            border-radius: 48px;
            padding: 30px 20px;
            margin: 20% 0;
            text-align: center;
            border: 2px solid #ffaa44;
        }
        .auth-panel h2 { color: #ffdd99; font-size: 1.5rem; margin-bottom: 20px; }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a241e;
            border: 1px solid #ffaa44;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            text-align: center;
        }
        .auth-buttons { display: flex; gap: 12px; margin: 20px 0; }
        .auth-btn {
            flex: 1;
            background: #c47c3a;
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: #2f1b0a;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .auth-note { color: #aa8855; font-size: 0.65rem; }

        /* 用户信息栏 */
        .user-bar {
            background: #1f1711;
            border-radius: 40px;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .user-bar span { color: #ffdd99; font-size: 0.75rem; }
        .user-bar .btn-group { display: flex; gap: 8px; }
        .logout-btn, .service-btn {
            background: #734c2e;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            color: #ffe3b3;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .service-btn { background: #2e7d32; }

        /* 核心赌桌布局：网格容器 */
        .table-container {
            background: linear-gradient(145deg, #2c5a2a, #1a3a1a);
            border-radius: 60px;
            padding: 16px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,215,150,0.3);
            border: 1px solid #cb9e6b;
        }

        /* 四方桌网格 */
        .square-table {
            display: grid;
            grid-template-areas:
                "top-left    top-center    top-right"
                "middle-left    center      middle-right"
                "bottom-left bottom-center bottom-right";
            grid-template-columns: 1fr auto 1fr;
            grid-template-rows: auto auto auto;
            gap: 12px;
            align-items: center;
            justify-items: center;
        }

        /* 中央骰子区 */
        .center-dice {
            grid-area: center;
            width: 100%;
            min-width: 180px;
        }
        .dice-area {
            background: #2a211a;
            border-radius: 60px;
            padding: 16px 12px;
            text-align: center;
            box-shadow: inset 0 0 0 2px #5e4230, 0 12px 25px black;
            position: relative;
        }
        .dice-title { font-size: 0.7rem; color: #f5c28e; margin-bottom: 10px; }
        .dice-box { display: flex; justify-content: center; gap: 16px; position: relative; }
        .dice {
            background: #fff2df;
            width: 75px;
            height: 75px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            box-shadow: 0 6px 0 #926b42;
            border: 2px solid #e5b874;
        }
        .dice-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.9), #2c1e14);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 15;
            transition: all 0.5s cubic-bezier(0.34, 1.1, 0.55, 1);
            border: 3px solid #cb9e6b;
        }
        .dice-cover span { font-size: 3rem; filter: drop-shadow(2px 4px 6px black); }
        .dice-cover .cover-text { font-size: 0.7rem; background: #00000099; padding: 4px 16px; border-radius: 30px; margin-top: 8px; color: #ffdd99; }
        .dice-cover.open-cover { transform: translateY(-80px) scale(0.6); opacity: 0; visibility: hidden; }
        .dice-cover.hidden-cover { display: none; }

        /* 四方投注区块 */
        .bet-corner {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 10px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(4px);
            border: 1px solid #ffaa66;
        }
        .bet-corner .corner-title {
            font-size: 0.8rem;
            font-weight: bold;
            color: #ffdd99;
            margin-bottom: 8px;
            background: #00000066;
            display: inline-block;
            padding: 2px 12px;
            border-radius: 30px;
        }
        .corner-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .corner-bet {
            background: #1f1712;
            border-radius: 30px;
            padding: 6px 12px;
            text-align: center;
            min-width: 70px;
            cursor: pointer;
            border: 1px solid #6f4f34;
            transition: 0.05s;
        }
        .corner-bet:active { transform: scale(0.96); }
        .corner-bet .bet-icon { font-size: 1.3rem; display: block; }
        .corner-bet .bet-name { font-size: 0.6rem; font-weight: bold; color: #ffddb0; }
        .corner-bet .bet-amount { font-size: 0.6rem; color: #ffbc6e; background: #0c0907; border-radius: 20px; padding: 2px 4px; margin-top: 4px; }

        /* 四个方位位置 */
        .top-left { grid-area: top-left; }
        .top-right { grid-area: top-right; }
        .bottom-left { grid-area: bottom-left; }
        .bottom-right { grid-area: bottom-right; }
        .middle-left { grid-area: middle-left; }
        .middle-right { grid-area: middle-right; }
        .top-center { grid-area: top-center; width: 100%; }
        .bottom-center { grid-area: bottom-center; width: 100%; }

        /* 额外投注面板（大小单双等）放在下方 */
        .extra-bets {
            background: #1e1813;
            border-radius: 48px;
            padding: 12px;
            margin-top: 8px;
        }
        .extra-title {
            font-size: 0.7rem;
            color: #ffd49f;
            margin-bottom: 8px;
            text-align: center;
        }
        .special-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .special-item {
            background: #1f1712;
            border-radius: 28px;
            padding: 6px 2px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #6f4f34;
        }
        .special-item .bet-icon { font-size: 1.2rem; display: block; }
        .special-item .bet-name { font-size: 0.6rem; font-weight: bold; }
        .special-item .bet-amount { font-size: 0.6rem; color: #ffbc6e; }

        /* 筹码栏 */
        .chip-bar {
            background: #2a1f16;
            margin: 8px 0;
            padding: 6px 10px;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chip {
            background: #ebbc7e;
            color: #3a240f;
            font-weight: bold;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 2px 0 #8b5a2e;
        }
        .chip.selected { background: #f7c56e; box-shadow: 0 0 0 2px #ffefb0; }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 12px 0;
        }
        .action-btn {
            background: #734c2e;
            border: none;
            padding: 6px 16px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 40px;
            color: #ffe3b3;
            cursor: pointer;
        }
        .action-btn.primary { background: #c47c3a; color: #2f1b0a; }
        .message-area {
            background: #1c140e;
            border-radius: 40px;
            padding: 8px 12px;
            font-size: 0.65rem;
            color: #dbbc8c;
            text-align: center;
            margin: 8px 0;
        }

        /* 座位区环绕在最外圈，体现四方 */
        .seats-section {
            background: #1e1813;
            border-radius: 48px;
            overflow: hidden;
        }
        .seats-header {
            background: #4a3322;
            padding: 8px 12px;
            text-align: center;
        }
        .seats-header h3 { color: #ffefcf; font-size: 0.85rem; }
        .seats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            padding: 12px;
        }
        .seat-card {
            background: #1a130d;
            border-radius: 20px;
            padding: 5px 2px;
            text-align: center;
            border: 1px solid #6f4f34;
        }
        .seat-card.occupied { background: #2f4127; }
        .seat-number { font-size: 0.55rem; color: #dba24b; }
        .player-name { font-weight: bold; font-size: 0.6rem; margin: 3px 0; color: #ffefcf; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 模态框样式略 (与原代码相同) */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:2000; }
        .modal-content { background:#1e1a16; border-radius:48px; width:90%; max-width:420px; max-height:85vh; overflow-y:auto; padding:20px; border:1px solid #ffaa44; }
        .modal-content h2 { color:#ffdd99; text-align:center; margin-bottom:16px; }
        .password-input { width:100%; padding:12px; margin:16px 0; background:#2a241e; border:1px solid #ffaa44; border-radius:40px; color:white; text-align:center; }
        .modal-btn { background:#ffaa44; color:#1a1a2a; border:none; border-radius:40px; padding:10px; width:100%; font-weight:bold; cursor:pointer; margin-top:8px; }
        .player-list { max-height:55vh; overflow-y:auto; margin:12px 0; }
        .player-item { background:#2a241e; border-radius:40px; padding:8px 12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px; }
        .player-actions button { background:#5f462f; border:none; border-radius:25px; padding:3px 8px; color:#ffe3b3; font-size:0.6rem; cursor:pointer; }
        .admin-global { display:flex; gap:8px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
        .admin-global button { background:#7a5a3e; border:none; border-radius:35px; padding:6px 12px; color:#ffefcf; font-size:0.7rem; cursor:pointer; }
        .close-modal { background:#ffaa44; color:#1a1a2a; width:100%; margin-top:16px; padding:8px; border-radius:40px; border:none; font-weight:bold; cursor:pointer; }
        .self-action { display:flex; gap:8px; margin:12px 0; }
        .self-action button { flex:1; background:#2e7d32; border:none; border-radius:35px; padding:6px; color:white; font-weight:bold; font-size:0.7rem; cursor:pointer; }

        @media (max-width: 550px) {
            .square-table { gap: 8px; }
            .dice { width: 60px; height: 60px; font-size: 2.2rem; }
            .corner-bet { min-width: 55px; padding: 4px 6px; }
            .seats-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
    // ==================== 用户数据存储 (与原代码完全一致) ====================
    const USERS_KEY = 'chaoshan_users_full_v6';
    let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
    let currentUser = null;
    let bankerBalance = parseInt(localStorage.getItem('chaoshan_banker_balance_full')) || 10000;
    let adminPassword = localStorage.getItem('chaoshan_admin_password') || "admin123";

    function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersData)); }
    function saveBanker() { localStorage.setItem('chaoshan_banker_balance_full', bankerBalance); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0; }
    function setUserBalance(amt) { if(currentUser) { usersData[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }

    function showToast(msg) {
        let t = document.createElement('div');
        t.textContent = msg;
        t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#000000cc;backdrop-filter:blur(10px);color:#ffaa44;padding:8px 16px;border-radius:40px;font-size:0.7rem;z-index:2001;border:1px solid #ffaa44;';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    function showService() { showToast("📞 客服热线: 400-888-XXXX (24小时服务)"); }

    // 管理员后台 (筹码1k连点三下打开，与原代码相同)
    let clickCount = 0, clickTimer = null;
    function initHiddenAdmin() {
        const chip1k = document.querySelector('.chip[data-chip="1000"]');
        if(!chip1k) return;
        chip1k.addEventListener('click', () => {
            clickCount++;
            let hint = document.querySelector('.chip-click-hint') || (()=>{let h=document.createElement('div');h.className='chip-click-hint';h.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#000;color:#ffaa44;padding:4px 12px;border-radius:20px;font-size:0.6rem;z-index:100;';document.body.appendChild(h);return h;})();
            hint.textContent = `再点击 ${3-clickCount} 次打开管理后台`;
            hint.style.opacity = '1';
            setTimeout(() => hint.style.opacity = '0', 800);
            if(clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => clickCount = 0, 1000);
            if(clickCount >= 3) { clickCount=0; if(clickTimer) clearTimeout(clickTimer); verifyAndOpenAdmin(); }
        });
    }
    function verifyAndOpenAdmin() {
        const pwdModal = document.createElement('div'); pwdModal.className = 'modal';
        pwdModal.innerHTML = `<div class="modal-content"><h2>🔐 管理员验证</h2><input type="password" id="adminPwdInput" class="password-input" placeholder="请输入管理密码" autocomplete="off"><button id="submitPwdBtn" class="modal-btn">确认</button><button id="cancelPwdBtn" class="modal-btn" style="background:#555; color:#fff;">取消</button></div>`;
        document.body.appendChild(pwdModal);
        const input = pwdModal.querySelector('#adminPwdInput');
        const check = () => {
            if(input.value === adminPassword) { pwdModal.remove(); openAdminModal(); }
            else { showToast("密码错误"); input.value=''; input.focus(); }
        };
        pwdModal.querySelector('#submitPwdBtn').onclick = check;
        pwdModal.querySelector('#cancelPwdBtn').onclick = () => pwdModal.remove();
        input.onkeypress = (e) => { if(e.key === 'Enter') check(); };
        input.focus();
    }
    function openAdminModal() {
        const allUsers = Object.keys(usersData).map(phone => ({ phone, balance: usersData[phone].balance }));
        let userListHtml = '<div class="player-list">';
        userListHtml += `<div class="player-item" style="background:#3a2a1a;"><div>🎲 庄家</div><div>💰 ${Math.floor(bankerBalance)}</div><div><button class="add-banker">+100</button><button class="sub-banker">-100</button><button class="reset-banker">重置1w</button></div></div>`;
        allUsers.forEach(user => {
            userListHtml += `<div class="player-item"><div>📱 ${user.phone}</div><div>💰 ${user.balance.toFixed(2)}</div><div><button class="add-user" data-phone="${user.phone}">+100</button><button class="sub-user" data-phone="${user.phone}">-100</button><button class="reset-user" data-phone="${user.phone}">重置1k</button></div></div>`;
        });
        userListHtml += '</div>';
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h2>🎛️ 管理员后台</h2>${userListHtml}<div class="self-action"><button id="selfChargeBtn">💎 给自己充值</button><button id="selfWithdrawBtn">💰 给自己提现</button></div><div class="admin-global"><button id="globalAdd500Btn">➕ 全体玩家+500</button><button id="globalResetBtn">🔄 全体玩家重置1000</button><button id="changePwdBtn">🔑 修改管理密码</button></div><button class="close-modal">关闭</button></div>`;
        document.body.appendChild(modal);
        // 事件绑定略 (与原代码相同，为保证简洁，使用监听器)
        modal.querySelector('.add-banker')?.addEventListener('click',()=>{ bankerBalance+=100; saveBanker(); showToast(`庄家余额 +100`); openAdminModal(); });
        modal.querySelector('.sub-banker')?.addEventListener('click',()=>{ if(bankerBalance>=100) bankerBalance-=100; saveBanker(); showToast(`庄家余额 -100`); openAdminModal(); });
        modal.querySelector('.reset-banker')?.addEventListener('click',()=>{ bankerBalance=10000; saveBanker(); showToast("庄家重置为10000"); openAdminModal(); });
        modal.querySelectorAll('.add-user').forEach(btn=>btn.onclick=()=>{ let p=btn.dataset.phone; usersData[p].balance+=100; saveUsers(); showToast(`玩家 ${p} +100`); openAdminModal(); });
        modal.querySelectorAll('.sub-user').forEach(btn=>btn.onclick=()=>{ let p=btn.dataset.phone; if(usersData[p].balance>=100) usersData[p].balance-=100; saveUsers(); showToast(`玩家 ${p} -100`); openAdminModal(); });
        modal.querySelectorAll('.reset-user').forEach(btn=>btn.onclick=()=>{ let p=btn.dataset.phone; usersData[p].balance=1000; saveUsers(); showToast(`玩家 ${p} 重置为1000`); openAdminModal(); });
        document.getElementById('selfChargeBtn')?.addEventListener('click',()=>{ let amt=prompt("充值金额","100"); if(amt){ let v=parseInt(amt); if(!isNaN(v)&&v>0){ setUserBalance(getUserBalance()+v); showToast(`充值 +${v}`); openAdminModal(); } } });
        document.getElementById('selfWithdrawBtn')?.addEventListener('click',()=>{ let amt=prompt("提现金额","100"); if(amt){ let v=parseInt(amt); if(!isNaN(v)&&v>0&&getUserBalance()>=v){ setUserBalance(getUserBalance()-v); showToast(`提现 -${v}`); openAdminModal(); } else showToast("余额不足或金额无效"); } });
        document.getElementById('globalAdd500Btn')?.addEventListener('click',()=>{ Object.keys(usersData).forEach(p=>usersData[p].balance+=500); saveUsers(); showToast("全体+500"); openAdminModal(); });
        document.getElementById('globalResetBtn')?.addEventListener('click',()=>{ Object.keys(usersData).forEach(p=>usersData[p].balance=1000); saveUsers(); showToast("全体重置1000"); openAdminModal(); });
        document.getElementById('changePwdBtn')?.addEventListener('click',()=>{ let np=prompt("新密码(≥4位)"); if(np && np.length>=4){ adminPassword=np; localStorage.setItem('chaoshan_admin_password',adminPassword); showToast("密码已修改"); modal.remove(); } });
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        const userSpan = document.getElementById("userBalanceDisplay");
        if(userSpan) userSpan.innerText = getUserBalance().toFixed(2);
    }

    // ==================== 游戏核心逻辑 ====================
    const STORAGE_KEY = 'chaoshan_balance';
    let balance = parseInt(localStorage.getItem(STORAGE_KEY)) || 10000;
    const PATTERNS = [
        { id: "fish", name: "鱼", icon: "🐟" },{ id: "shrimp", name: "虾", icon: "🦐" },
        { id: "crab", name: "蟹", icon: "🦀" },{ id: "calabash", name: "葫芦", icon: "🏺" },
        { id: "coin", name: "金钱", icon: "💰" },{ id: "chicken", name: "鸡", icon: "🐔" }
    ];
    const patternIdToName = { fish:"鱼", shrimp:"虾", crab:"蟹", calabash:"葫芦", coin:"金钱", chicken:"鸡" };
    const SPECIALS = [
        { id: "big", name: "大", icon: "🔴" },{ id: "small", name: "小", icon: "🔵" },
        { id: "odd", name: "单", icon: "⚪" },{ id: "even", name: "双", icon: "⚫" },
        { id: "allTriplets", name: "全围", icon: "🌀" }
    ];
    let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
    let specialBets = { big:0, small:0, odd:0, even:0, allTriplets:0 };
    let currentChip = 100;
    let lastWinAmount = 0;
    let isRolling = false, isCoverAnimating = false;

    function getTotalBet() { return Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(specialBets).reduce((a,b)=>a+b,0); }
    function updateStatsUI() {
        document.getElementById("balanceValue") && (document.getElementById("balanceValue").innerText = Math.floor(balance));
        document.getElementById("totalBetValue") && (document.getElementById("totalBetValue").innerText = getTotalBet());
        document.getElementById("lastWin") && (document.getElementById("lastWin").innerText = lastWinAmount);
        localStorage.setItem(STORAGE_KEY, balance);
    }
    function updateAllBetUI() {
        for(let id of Object.keys(patternBets)) { let span = document.getElementById(`bet_${id}`); if(span) span.innerText = patternBets[id]; }
        for(let id of Object.keys(specialBets)) { let span = document.getElementById(`bet_special_${id}`); if(span) span.innerText = specialBets[id]; }
        updateStatsUI();
        // 同时更新四方投注显示
        document.querySelectorAll('.corner-bet').forEach(el => {
            let type = el.dataset.type;
            let amt = patternBets[type] || specialBets[type] || 0;
            let amountSpan = el.querySelector('.bet-amount');
            if(amountSpan) amountSpan.innerText = amt;
        });
        document.querySelectorAll('.special-item').forEach(el => {
            let type = el.dataset.type;
            let amt = specialBets[type] || 0;
            let span = el.querySelector('.bet-amount');
            if(span) span.innerText = amt;
        });
    }
    function showMsg(msg, duration=2000) {
        let msgDiv = document.getElementById("msgArea");
        if(!msgDiv) return;
        if(window.msgTimeout) clearTimeout(window.msgTimeout);
        msgDiv.innerText = msg;
        window.msgTimeout = setTimeout(() => { if(msgDiv.innerText === msg) msgDiv.innerText = "🎲 点击开骰 | 四方投注"; }, duration);
    }
    function addBet(type, id, val) {
        let target = (type === 'pattern') ? patternBets : specialBets;
        if(target[id] === undefined) return;
        let totalNow = getTotalBet();
        if(totalNow + val > balance) { showMsg(`余额不足，无法加注 ${val}`); return; }
        target[id] += val;
        updateAllBetUI();
        let name = (type === 'pattern') ? patternIdToName[id] : SPECIALS.find(s=>s.id===id)?.name || id;
        showMsg(`➕ ${name} +${val}`, 800);
    }
    function subBet(type, id, val) {
        let target = (type === 'pattern') ? patternBets : specialBets;
        if(target[id] === undefined) return;
        let old = target[id];
        let newVal = Math.max(0, old - val);
        if(old !== newVal) {
            target[id] = newVal;
            updateAllBetUI();
            let name = (type === 'pattern') ? patternIdToName[id] : SPECIALS.find(s=>s.id===id)?.name || id;
            showMsg(`➖ ${name} -${val}`, 800);
        }
    }
    function clearAllBets() {
        for(let k of Object.keys(patternBets)) patternBets[k]=0;
        for(let k of Object.keys(specialBets)) specialBets[k]=0;
        updateAllBetUI();
        showMsg("清空所有下注");
    }
    function resetDiceCover() {
        const cover = document.getElementById("diceCover");
        if(cover) { cover.classList.remove("open-cover","hidden-cover"); cover.style.display="flex"; cover.style.visibility="visible"; cover.style.opacity="1"; cover.style.transform="translateY(0) scale(1)"; }
    }
    function resetGame() { balance=10000; persistBalance(); clearAllBets(); lastWinAmount=0; updateStatsUI(); document.querySelectorAll(".dice").forEach(d=>d.innerHTML="🎲"); resetDiceCover(); showMsg("庄家重置，本金10000文"); }
    function persistBalance() { localStorage.setItem(STORAGE_KEY, balance); }
    async function animateRolling(finalPatterns) {
        const diceEls = document.querySelectorAll(".dice");
        const iconMap = { "鱼":"🐟","虾":"🦐","蟹":"🦀","葫芦":"🏺","金钱":"💰","鸡":"🐔" };
        for(let step=0; step<8; step++) {
            await new Promise(r=>setTimeout(r,70));
            for(let i=0;i<3;i++) { let rand = PATTERNS[Math.floor(Math.random()*6)]; diceEls[i].innerHTML = rand.icon; }
        }
        for(let i=0;i<3;i++) diceEls[i].innerHTML = iconMap[finalPatterns[i]] || "🎲";
    }
    function getPointValue(pname) { const m={"鱼":1,"虾":2,"蟹":3,"葫芦":4,"金钱":5,"鸡":6}; return m[pname]||0; }
    function settleGame(diceNames) {
        let points = diceNames.map(n=>getPointValue(n));
        let sum = points.reduce((a,b)=>a+b,0);
        let isTriplet = diceNames[0]===diceNames[1] && diceNames[1]===diceNames[2];
        let totalBet = getTotalBet();
        if(totalBet===0) { showMsg("没有下注"); return false; }
        if(totalBet > balance) { showMsg("庄家余额不足"); return false; }
        balance -= totalBet;
        let winAmount = 0, winDetails = [];
        for(let [pid, betVal] of Object.entries(patternBets)) {
            if(betVal===0) continue;
            let occur = diceNames.filter(n=> n === patternIdToName[pid]).length;
            if(occur>0) { winAmount += betVal * (occur+1); winDetails.push(`${patternIdToName[pid]} x${occur}`); }
        }
        let bigWin=false, smallWin=false, oddWin=false, evenWin=false, allTripletWin=false;
        if(!isTriplet) { if(sum>=11&&sum<=17) bigWin=true; if(sum>=4&&sum<=10) smallWin=true; if(sum%2===1) oddWin=true; if(sum%2===0) evenWin=true; }
        if(isTriplet) allTripletWin=true;
        if(specialBets.big>0 && bigWin) { winAmount += specialBets.big*2; winDetails.push("大"); }
        if(specialBets.small>0 && smallWin) { winAmount += specialBets.small*2; winDetails.push("小"); }
        if(specialBets.odd>0 && oddWin) { winAmount += specialBets.odd*2; winDetails.push("单"); }
        if(specialBets.even>0 && evenWin) { winAmount += specialBets.even*2; winDetails.push("双"); }
        if(specialBets.allTriplets>0 && allTripletWin) { winAmount += specialBets.allTriplets*25; winDetails.push("全围"); }
        let net = winAmount - totalBet;
        balance += winAmount;
        lastWinAmount = net;
        updateStatsUI();
        let diceShow = diceNames.join("、");
        if(winAmount>0) showMsg(`🎲 ${diceShow} 净赢+${net} [${winDetails.join(',')}]`, 4500);
        else showMsg(`😢 ${diceShow} 亏损 ${totalBet}`, 3000);
        clearAllBets();
        return true;
    }
    async function onRollWithCover() {
        if(isRolling || isCoverAnimating) return;
        let total = getTotalBet();
        if(total === 0) { showMsg("请先下注"); return; }
        if(total > balance) { showMsg("庄家余额不足"); return; }
        const diceCover = document.getElementById("diceCover");
        if(!diceCover) return;
        if(diceCover.classList.contains("hidden-cover") || diceCover.style.display === "none") resetDiceCover();
        isRolling = true; isCoverAnimating = true;
        const rollBtn = document.getElementById("rollBtn");
        if(rollBtn) rollBtn.disabled = true;
        diceCover.classList.add("open-cover");
        await new Promise(r=>setTimeout(r,550));
        diceCover.classList.add("hidden-cover");
        diceCover.style.display = "none";
        const patternList = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        let finalResult = [patternList[Math.floor(Math.random()*6)], patternList[Math.floor(Math.random()*6)], patternList[Math.floor(Math.random()*6)]];
        await animateRolling(finalResult);
        settleGame(finalResult);
        await new Promise(r=>setTimeout(r,1500));
        document.querySelectorAll(".dice").forEach(d=>d.innerHTML="🎲");
        diceCover.style.display = "flex";
        diceCover.classList.remove("open-cover","hidden-cover");
        diceCover.style.visibility = "visible";
        diceCover.style.opacity = "1";
        diceCover.style.transform = "translateY(0) scale(1)";
        isCoverAnimating = false; isRolling = false;
        if(rollBtn) rollBtn.disabled = false;
        showMsg("骰盅已复位，可继续下注",1500);
    }

     // 座位管理
    let players = [], nextPlayerId = 100, maxSeats=20;
    const namePool = ["阿强","老李","虾妹","蟹叔","金钱哥","鸡姐","小陈","骰子手","好运","锦鲤","鱼神","虾兵","蟹将","葫芦仙","铜钱","凤姐","阿珍","闲人","福仔","潮汕仔"];
    function renderSeats() {
        const container = document.getElementById("seatsGrid");
        if(!container) return;
        container.innerHTML = "";
        for(let i=1; i<=maxSeats; i++) {
            const player = players.find(p => p.seatIndex === i);
            const seatDiv = document.createElement("div");
            seatDiv.className = `seat-card ${player ? "occupied" : ""}`;
            if(player) seatDiv.innerHTML = `<div class="seat-number">#${i}</div><div class="player-name">${player.name.length>6?player.name.slice(0,5)+"..":player.name}</div>`;
            else seatDiv.innerHTML = `<div class="seat-number">#${i}</div><div class="player-name">🔲</div>`;
            container.appendChild(seatDiv);
        }
    }
    function addRandomPlayerToSeat() {
        if(players.length >= maxSeats) return;
        let empty = [];
        for(let i=1;i<=maxSeats;i++) if(!players.find(p=>p.seatIndex===i)) empty.push(i);
        if(empty.length===0) return;
        let seat = empty[Math.floor(Math.random()*empty.length)];
        let name = namePool[Math.floor(Math.random()*namePool.length)] + Math.floor(Math.random()*100);
        players.push({ id: nextPlayerId++, name, seatIndex: seat });
        renderSeats();
    }
    setInterval(() => { if(document.getElementById('seatsGrid') && players.length<maxSeats) addRandomPlayerToSeat(); }, 30000);

    // 渲染主界面（四方桌布局）
    function renderGameUI() {
        const app = document.getElementById('app');
        // 四方投注快捷按钮（选取四个主要六门：鱼、虾、蟹、金钱）
        const cornerItems = [
            { id: "fish", name: "鱼", icon: "🐟", type: "pattern" },
            { id: "shrimp", name: "虾", icon: "🦐", type: "pattern" },
            { id: "crab", name: "蟹", icon: "🦀", type: "pattern" },
            { id: "coin", name: "金钱", icon: "💰", type: "pattern" }
        ];
        let cornersHtml = '';
        cornerItems.forEach(item => {
            cornersHtml += `<div class="corner-bet" data-type="${item.type}" data-id="${item.id}">
                <div class="bet-icon">${item.icon}</div>
                <div class="bet-name">${item.name}</div>
                <div class="bet-amount" id="corner_bet_${item.id}">0</div>
            </div>`;
        });
        // 特殊投注区
        let specialsHtml = '';
        SPECIALS.forEach(s => {
            specialsHtml += `<div class="special-item" data-type="special" data-id="${s.id}">
                <div class="bet-icon">${s.icon}</div>
                <div class="bet-name">${s.name}</div>
                <div class="bet-amount" id="special_bet_${s.id}">0</div>
            </div>`;
        });

        app.innerHTML = `
            <div class="user-bar">
                <span>📱 ${currentUser.phone.substring(0,7)}... | 💰 余额: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span>
                <div class="btn-group"><button id="serviceBtn" class="service-btn">📞 客服热线</button><button id="logoutBtn" class="logout-btn">退出登录</button></div>
            </div>
            <div class="table-container">
                <div class="square-table">
                    <div class="top-left bet-corner"><div class="corner-title">⚡ 东</div><div class="corner-buttons" id="cornerTL">${cornersHtml.slice(0,2)}</div></div>
                    <div class="top-center bet-corner"><div class="corner-title">⚡ 北</div><div class="corner-buttons" id="cornerTC">${cornersHtml.slice(2)}</div></div>
                    <div class="top-right bet-corner"><div class="corner-title">⚡ 西</div><div class="corner-buttons" id="cornerTR">${cornersHtml.slice(0,2)}</div></div>
                    <div class="middle-left bet-corner"><div class="corner-title">⚡ 南</div><div class="corner-buttons" id="cornerML">${cornersHtml.slice(2)}</div></div>
                    <div class="center-dice">
                        <div class="dice-area">
                            <div class="dice-title">⚡ 三骰开彩 · 鱼虾蟹葫芦金钱鸡 ⚡</div>
                            <div class="dice-box"><div class="dice">🎲</div><div class="dice">🎲</div><div class="dice">🎲</div></div>
                            <div class="dice-cover" id="diceCover"><span>🏺</span><div class="cover-text">骰盅未开</div></div>
                        </div>
                    </div>
                    <div class="middle-right bet-corner"><div class="corner-title">⚡ 北</div><div class="corner-buttons" id="cornerMR">${cornersHtml.slice(0,2)}</div></div>
                    <div class="bottom-left bet-corner"><div class="corner-title">⚡ 西</div><div class="corner-buttons" id="cornerBL">${cornersHtml.slice(2)}</div></div>
                    <div class="bottom-center bet-corner"><div class="corner-title">⚡ 南</div><div class="corner-buttons" id="cornerBC">${cornersHtml.slice(0,2)}</div></div>
                    <div class="bottom-right bet-corner"><div class="corner-title">⚡ 东</div><div class="corner-buttons" id="cornerBR">${cornersHtml.slice(2)}</div></div>
                </div>
            </div>
            <div class="extra-bets">
                <div class="extra-title">🎯 特殊投注 (大小单双全围)</div>
                <div class="special-grid" id="specialGrid">${specialsHtml}</div>
            </div>
            <div class="chip-bar" id="chipBar">
                <div class="chip" data-chip="20">20</div><div class="chip" data-chip="50">50</div>
                <div class="chip" data-chip="100">100</div><div class="chip" data-chip="500">500</div>
                <div class="chip" data-chip="1000" style="background:radial-gradient(#e74c3c,#c0392b); color:#fff;">1k</div>
            </div>
            <div class="action-bar">
                <button class="action-btn primary" id="rollBtn">🎲 开骰！</button>
                <button class="action-btn" id="resetBetBtn">🧹 清空下注</button>
                <button class="action-btn" id="resetGameBtn">💺 重置庄家</button>
            </div>
            <div class="message-area" id="msgArea">庄家坐镇 | 四方投注 | 骰盅慢启</div>
            <div class="seats-section">
                <div class="seats-header"><h3>🎲 二十人座席 (四方环绕)</h3></div>
                <div class="seats-grid" id="seatsGrid"></div>
            </div>
        `;

        // 事件绑定
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showService;
        document.getElementById('rollBtn').onclick = onRollWithCover;
        document.getElementById('resetBetBtn').onclick = clearAllBets;
        document.getElementById('resetGameBtn').onclick = resetGame;
        // 筹码选择
        document.querySelectorAll('.chip').forEach(chip => {
            chip.onclick = () => { currentChip = parseInt(chip.dataset.chip); document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected')); chip.classList.add('selected'); showMsg(`筹码 ${currentChip}`,500); };
        });
        document.querySelector('.chip[data-chip="100"]')?.classList.add('selected');
        currentChip = 100;
        // 四方投注事件委托
        document.querySelectorAll('.corner-bet').forEach(el => {
            el.onclick = (e) => {
                let type = el.dataset.type;
                let id = el.dataset.id;
                if(type === 'pattern') addBet('pattern', id, currentChip);
                else addBet('special', id, currentChip);
            };
        });
        // 特殊投注事件
        document.querySelectorAll('.special-item').forEach(el => {
            el.onclick = () => {
                let id = el.dataset.id;
                addBet('special', id, currentChip);
            };
        });
        // 初始化座位
        if(players.length === 0) {
            for(let i=1;i<=6;i++) { let name = namePool[(i-1)%namePool.length] + Math.floor(Math.random()*100); players.push({ id: nextPlayerId++, name, seatIndex: i }); }
        }
        renderSeats();
        updateAllBetUI();
        resetDiceCover();
        const userBalanceSpan = document.getElementById("userBalanceDisplay");
        if(userBalanceSpan) userBalanceSpan.innerText = getUserBalance().toFixed(2);
        initHiddenAdmin();
    }

    // 登录注册界面
    function renderAuthUI() {
        const savedPhone = localStorage.getItem('saved_phone') || '';
        const savedPwd = localStorage.getItem('saved_password') || '';
        const rememberChecked = localStorage.getItem('remember_me') === 'true';
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="auth-panel">
                <h2>🎲 潮汕葫芦鱼</h2>
                <input type="tel" id="regPhone" class="auth-input" placeholder="手机号" maxlength="11" value="${savedPhone}">
                <input type="password" id="regPassword" class="auth-input" placeholder="密码 (至少4位)" value="${savedPwd}">
                <div style="display: flex; align-items: center; justify-content: flex-start; gap: 8px; margin: 8px 0;">
                    <input type="checkbox" id="rememberCheckbox" style="width: 18px; height: 18px; cursor: pointer;" ${rememberChecked ? 'checked' : ''}>
                    <label for="rememberCheckbox" style="color: #ffdd99; font-size: 0.7rem; cursor: pointer;">记住账号密码</label>
                </div>
                <div class="auth-buttons"><button id="loginBtn" class="auth-btn">登录</button><button id="registerBtn" class="auth-btn">注册</button></div>
                <div class="auth-note">🎮 测试：任意11位手机号注册，初始余额1000 | 筹码1k连点三下打开管理后台</div>
            </div>
        `;
        document.getElementById('loginBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let remember = document.getElementById('rememberCheckbox').checked;
            if(!phone||!pwd) { showToast("请填写手机号和密码"); return; }
            let user = usersData[phone];
            if(!user) { showToast("手机号未注册"); return; }
            if(user.password !== pwd) { showToast("密码错误"); return; }
            if(remember) { localStorage.setItem('saved_phone',phone); localStorage.setItem('saved_password',pwd); localStorage.setItem('remember_me','true'); }
            else { localStorage.removeItem('saved_phone'); localStorage.removeItem('saved_password'); localStorage.setItem('remember_me','false'); }
            currentUser = { phone, ...user };
            showToast(`欢迎回来，${phone}`);
            renderGameUI();
        };
        document.getElementById('registerBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            if(!phone||!pwd) { showToast("请填写手机号和密码"); return; }
            if(!/^1[3-9]\d{9}$/.test(phone)) { showToast("请输入有效11位手机号"); return; }
            if(pwd.length<4) { showToast("密码至少4位"); return; }
            if(usersData[phone]) { showToast("手机号已注册，请直接登录"); return; }
            usersData[phone] = { password: pwd, balance: 1000, records: [] };
            saveUsers();
            showToast("注册成功！请登录");
            document.getElementById('regPhone').value = '';
            document.getElementById('regPassword').value = '';
            localStorage.removeItem('saved_phone'); localStorage.removeItem('saved_password'); localStorage.setItem('remember_me','false');
        };
    }

    renderAuthUI();
</script>
</body>
</html>
