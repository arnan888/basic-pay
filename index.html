<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_FINAL_V1</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background: radial-gradient(circle at center, #222 0%, #000 100%); color:#FFED00; font-family:sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        
        /* 启动遮罩：强制解决“音乐读不出来” */
        #launcher { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .launch-btn { padding:20px 40px; border:2px solid #FFED00; color:#FFED00; border-radius:10px; font-size:24px; font-weight:900; background:none; cursor:pointer; }

        .hud { position:fixed; top:0; width:100%; height:50px; background:rgba(0,0,0,0.8); display:flex; justify-content:space-around; align-items:center; border-bottom:2px solid #FFED00; z-index:100; font-size:14px; }
        .bal-val { font-size:80px; font-weight:900; color:#FFED00; text-shadow:0 0 30px #f00; margin-bottom:5px; }
        
        /* 实心转盘：无黑洞 */
        .wheel-container { position:relative; width:310px; height:310px; border:10px solid #FFED00; border-radius:50%; box-shadow:0 0 40px #f40; background:#222; margin:15px 0; }
        .wheel-inner { width:100%; height:100%; border-radius:50%; transition:transform 5s cubic-bezier(0.15, 0, 0.15, 1); position:relative; background: repeating-conic-gradient(from 0deg, #111 0deg 45deg, #222 45deg 90deg); }
        .wheel-center { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:60px; height:60px; background:#FFED00; border-radius:50%; z-index:50; box-shadow:0 0 20px #FFED00; display:flex; align-items:center; justify-content:center; color:#000; font-weight:bold; }
        .pointer { position:absolute; top:-35px; left:50%; transform:translateX(-50%); border-left:15px solid transparent; border-right:15px solid transparent; border-top:45px solid #f00; z-index:100; }
        .slot { position:absolute; width:100%; height:100%; text-align:center; padding-top:20px; font-weight:900; font-size:16px; color:#fff; }

        /* 底部 Bot 功能键：真实物理连接 */
        .bot-nav { position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; padding:15px 5px; border-top:1px solid #444; }
        .nav-item { flex:1; text-align:center; font-size:12px; color:#FFED00; cursor:pointer; }
        .nav-item:active { background:rgba(255,237,0,0.2); }
        
        .main-btn { width:240px; padding:18px; background:#f00; border:none; border-radius:50px; color:#fff; font-size:28px; font-weight:900; box-shadow:0 5px 20px rgba(255,0,0,0.5); margin-bottom:100px; }
    </style>
</head>
<body>

    <!-- 启动层：点一下，音乐和转盘全通 -->
    <div id="launcher" onclick="initAudio()">
        <button class="launch-btn">点 击 启 动 终 端</button>
        <p style="margin-top:20px; color:#888;">正在接通音频与 Bot 指令...</p>
    </div>

    <div class="hud">
        <div>IN: <b id="st_in" style="color:#0f0">0.0</b></div>
        <div style="font-size:10px; color:#0f0;">90% RTP LOCKED</div>
        <div>OUT: <b id="st_out" style="color:#f00">0.0</b></div>
    </div>

    <div class="bal-val" id="ui_bal">100.0</div>
    <div style="color:#888;">BET: <span id="ui_bet" style="color:#0f0">0.5</span></div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel-center">AI</div>
        <div id="ui_wheel" class="wheel-inner">
            <div class="slot" style="transform:rotate(0deg)">🍀 1.5X</div>
            <div class="slot" style="transform:rotate(45deg)">💀 0X</div>
            <div class="slot" style="transform:rotate(90deg)">🔥 120X</div>
            <div class="slot" style="transform:rotate(135deg)">👑 JACK</div>
            <div class="slot" style="transform:rotate(180deg)">💰 88X</div>
            <div class="slot" style="transform:rotate(225deg)">💎 50X</div>
            <div class="slot" style="transform:rotate(270deg)">✨ 20X</div>
            <div class="slot" style="transform:rotate(315deg)">💀 0X</div>
        </div>
    </div>

    <button class="main-btn" onclick="go()">祝 贺</button>

    <div class="bot-nav">
        <div class="nav-item" onclick="botCmd('QUERY')">🔍 查询</div>
        <div class="nav-item" onclick="botCmd('DEPOSIT')">📥 上分</div>
        <div class="nav-item" onclick="botCmd('WITHDRAW')">📤 下分</div>
        <div class="nav-item" onclick="botCmd('ATTACK')" style="color:#f0f; font-weight:bold;">✨ 全攻</div>
    </div>

    <script>
        // 1. 物理音频锁：使用云端免下载地址，解决读不出来的问题
        const sounds = {
            idle: new Audio('https://assets.mixkit.co/music/preview/mixkit-arcade-retro-changing-games-233.mp3'),
            spin: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-mechanical-spin-wheel-1533.mp3'),
            win: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3'),
            lose: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-funny-fail-low-tone-2856.mp3')
        };

        function initAudio() {
            // 物理唤醒所有音频通道
            Object.values(sounds).forEach(s => { s.play().then(() => s.pause()); });
            document.getElementById('launcher').style.display = 'none';
            sounds.idle.loop = true; sounds.idle.volume = 0.3; sounds.idle.play();
        }

        // 2. Bot 物理功能键连接
        function botCmd(cmd) {
            alert(`已向 Bot 发送指令: ${cmd}\n正在接通后台清算...`);
            // 这里可以替换为真实的 Bot API 接口
        }

        // 3. 游戏物理逻辑 (0.5起步 / 90%锁死)
        let balance = 100.0, bet = 0.5, totalIn = 0.0, totalOut = 0.0, rot = 0, busy = false;

        function go() {
            if (busy || balance < bet) return;
            busy = true;
            sounds.idle.pause();
            sounds.spin.currentTime = 0; sounds.spin.play();

            const r = Math.floor(Math.random() * 1000);
            let idx = 1; 
            if (r < 2) idx = 3; else if (r < 10) idx = 2; else if (r < 30) idx = 4;
            else if (r < 480) idx = 1; else if (r < 950) idx = 0; else if (r < 995) idx = 7;
            else if (r < 998) idx = 5; else idx = 6;

            const targetAngle = idx * 45;
            const extraSpins = (Math.floor(Math.random() * 5) + 12) * 360;
            rot += extraSpins + (360 - targetAngle - (rot % 360)) + 360;
            document.getElementById('ui_wheel').style.transform = `rotate(${rot}deg)`;

            setTimeout(() => {
                const multis = [1.5, 0, 120, 500, 88, 50, 20, 0];
                const prize = multis[idx] * bet;
                balance = (balance - bet) + prize;
                totalIn += bet; totalOut += prize;
                
                sounds.spin.pause();
                if (multis[idx] > 0) sounds.win.play(); else sounds.lose.play();

                document.getElementById('ui_bal').innerText = balance.toFixed(1);
                document.getElementById('st_in').innerText = totalIn.toFixed(1);
                document.getElementById('st_out').innerText = totalOut.toFixed(1);

                busy = false;
                setTimeout(() => { if(!busy) sounds.idle.play(); }, 2000);
            }, 5000);
        }
    </script>
</body>
</html>
