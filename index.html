<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA_五兽至尊_旗舰终端_V58</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --gold: #ffcc00; --bg: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: #fff; 
            font-family: 'Arial Black', sans-serif; height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        /* 顶部 HUD：余额与下注 */
        .hud {
            width: 95%; margin-top: 15px; z-index: 100;
            background: rgba(0,0,0,0.85); border: 2px solid var(--neon);
            border-radius: 15px; padding: 12px; text-align: center;
            box-shadow: 0 0 20px rgba(0,242,255,0.2);
        }
        .bal-txt { font-size: 24px; color: var(--neon); margin-bottom: 8px; text-shadow: 0 0 10px var(--neon); }
        .bet-row { display: flex; align-items: center; justify-content: center; gap: 15px; border-top: 1px solid #333; padding-top: 10px; }
        .btn-ctrl { width: 45px; height: 45px; background: #222; border: 1.5px solid var(--gold); color: var(--gold); border-radius: 10px; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .btn-ctrl:active { transform: scale(0.9); background: var(--gold); color: #000; }
        .bet-val { font-size: 22px; color: var(--gold); min-width: 100px; font-weight: 900; }

        /* 转盘主容器 */
        .wheel-box { margin-top: 40px; position: relative; width: 350px; height: 350px; z-index: 50; }
        .wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 12px solid #1a1a1a;
            position: relative; overflow: hidden; transition: transform 4.5s cubic-bezier(0.15, 0, 0.1, 1);
            background: #000; box-shadow: 0 0 60px rgba(0,0,0,1), inset 0 0 30px rgba(0,242,255,0.1);
        }

        /* 6扇区裁剪 (60度) */
        .sector {
            position: absolute; width: 100%; height: 100%;
            clip-path: polygon(50% 50%, 100% 21%, 100% 79%); transform-origin: center;
        }
        .sector img { width: 115%; height: 115%; object-fit: cover; filter: brightness(0.7) contrast(1.1); }
        .sector .label {
            position: absolute; top: 50%; right: 10px; transform: translateY(-50%) rotate(-90deg);
            background: var(--pink); color: #fff; padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: bold; border: 1px solid #fff; white-space: nowrap;
        }

        /* 初始角度排列 */
        .s0{transform:rotate(-90deg)} .s1{transform:rotate(-30deg)} .s2{transform:rotate(30deg)} 
        .s3{transform:rotate(90deg)} .s4{transform:rotate(150deg)} .s5{transform:rotate(210deg)}

        .pointer { 
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; 
            border-top: 38px solid #fff; z-index: 70; filter: drop-shadow(0 0 10px var(--neon));
        }

        .center-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; background: #000; border: 5px solid var(--pink);
            border-radius: 50%; color: #fff; font-size: 20px; font-weight: bold; cursor: pointer; z-index: 80;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px var(--pink); transition: 0.1s;
        }
        .center-btn:active { transform: translate(-50%, -50%) scale(0.9); box-shadow: 0 0 10px var(--pink); }

        /* 结算弹窗 */
        .ovl { position: fixed; inset: 0; background: rgba(0,0,0,0.97); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .res-mul { color: var(--gold); font-size: 28px; margin-top: 15px; font-weight: bold; }
        .res-btn { margin-top: 40px; padding: 15px 50px; background: var(--neon); color: #000; border: none; border-radius: 12px; font-weight: bold; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hud">
        <div class="bal-txt">BALANCE: <b id="bal">1,000</b></div>
        <div class="bet-row">
            <button class="btn-ctrl" onclick="changeBet(-50)">-</button>
            <div class="bet-val">BET: <span id="bet">50</span></div>
            <button class="btn-ctrl" onclick="changeBet(50)">+</button>
        </div>
    </div>

    <div class="wheel-box">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <!-- 图片路径请替换为你Git仓库中的真实路径 -->
            <div class="sector s0"><img src="全家福.jpg"><div class="label">MAX x100</div></div>
            <div class="sector s1"><img src="狮子.jpg"><div class="label">x10-x30</div></div>
            <div class="sector s2"><img src="老虎.jpg"><div class="label">x5-x15</div></div>
            <div class="sector s3"><img src="豹子.jpg"><div class="label">x2-x10</div></div>
            <div class="sector s4"><img src="狼.jpg"><div class="label">x0.5-x5</div></div>
            <div class="sector s5"><img src="狗.jpg"><div class="label">x0.1-x1</div></div>
        </div>
        <div class="center-btn" onclick="spin()">SPIN</div>
    </div>

    <div class="ovl" id="ovl">
        <div id="res-txt" style="font-size:55px; font-weight:900;">WIN</div>
        <div id="res-mul" class="res-mul">x 0.0</div>
        <button class="res-btn" onclick="closeOvl()">CONTINUE</button>
    </div>

    <script>
        // --- 商业核心逻辑控制 ---
        let b = parseFloat(localStorage.getItem('u_gold') || '1000'); 
        let totalIn = parseFloat(localStorage.getItem('u_in') || '1000'); // 实际充值本金
        let totalOut = parseFloat(localStorage.getItem('u_out') || '0');  // 总派彩额
        const TARGET_RTP = 0.92; // 锁定 92% 返还率 (8% 抽水)

        let currentBet = 50; let r = 0; let spinning = false;

        const config = [
            { id: 0, name: "全家福", min: 30, max: 100, weight: 1.5 },
            { id: 1, name: "狮子", min: 10, max: 30, weight: 6.5 },
            { id: 2, name: "老虎", min: 5, max: 15, weight: 12 },
            { id: 3, name: "豹子", min: 2, max: 10, weight: 20 },
            { id: 4, name: "狼", min: 0.5, max: 5, weight: 25 },
            { id: 5, name: "狗", min: 0.1, max: 1, weight: 35 }
        ];

        function updateUI() {
            document.getElementById('bal').innerText = Math.floor(b).toLocaleString();
            document.getElementById('bet').innerText = currentBet;
            localStorage.setItem('u_gold', b);
            localStorage.setItem('u_in', totalIn);
            localStorage.setItem('u_out', totalOut);

            // 实时水位监控 (开发者模式 F12 查看)
            let rtp = totalIn > 0 ? (totalOut / totalIn) : 0;
            console.log(`[水位监控] RTP: ${(rtp*100).toFixed(2)}% | 剩余赔付空间: ${(totalIn * TARGET_RTP - totalOut).toFixed(2)}`);
        }

        // --- 核心：92% 控杀平衡算法 ---
        function getSmartTarget() {
            let rtp = totalOut / totalIn;
            let n = Math.random() * 100;
            let netLoss = totalIn - totalOut;

            // 1. 【补偿逻辑】亏损过万且运气好，触发全家福
            if (netLoss > 10000 && n < 15) return 0; 

            // 2. 【高位控杀】如果派彩超标 (超过92%)，强制收割
            if (rtp >= TARGET_RTP) {
                if (n < 80) return 5; // 80% 给狗 (x0.1)
                return 4;             // 20% 给狼 (x0.5)
            }

            // 3. 【常规权重】
            let acc = 0;
            for(let i=0; i<config.length; i++) {
                acc += config[i].weight;
                if(n <= acc) return i;
            }
            return 5;
        }

        window.changeBet = (v) => {
            if (spinning) return;
            currentBet = Math.max(50, Math.min(b, currentBet + v));
            updateUI();
        };

        function spin() {
            if (spinning || b < currentBet) return;
            spinning = true;
            b -= currentBet; // 仅扣除余额，不计入 totalIn (totalIn 仅由充值触发)
            updateUI();

            const idx = getSmartTarget();
            r += (2160 + idx * 60); 
            document.getElementById('wheel').style.transform = `rotate(-${r}deg)`;

            setTimeout(() => {
                let item = config[idx];
                let m = (Math.random() * (item.max - item.min) + item.min);
                
                // 最终防御：防止单次中奖瞬间击穿 96%
                let win = Math.floor(currentBet * m);
                if ((totalOut + win) / totalIn > 0.96) {
                    win = Math.floor(currentBet * 0.5); 
                    m = 0.5;
                }

                b += win;
                totalOut += win; 
                updateUI();

                document.getElementById('ovl').style.display = 'flex';
                document.getElementById('res-txt').innerText = m >= 5 ? "MEGA WIN!" : (m >= 1 ? "WINNER" : "LUCK NEXT TIME");
                document.getElementById('res-txt').style.color = m >= 10 ? '#ffcc00' : (m >= 1 ? '#00f2ff' : '#ff0055');
                document.getElementById('res-mul').innerText = "Multiplier: x" + m.toFixed(1);
                spinning = false;
            }, 4500);
        }

        // --- 运营接口 ---
        // 充值加赠逻辑：syncGold(1000) 实际充值1000，到账1030
        window.syncGold = (n) => {
            let gift = n * 0.03; // 3% 充值活动
            b += (n + gift);
            totalIn += n; // 控杀逻辑依然按照原始 1000 算，保证 8% 纯抽水
            updateUI();
            console.log(`[充值成功] 到账:${n+gift} | 控杀基准已同步`);
        };

        window.closeOvl = () => { document.getElementById('ovl').style.display = 'none'; };
        updateUI();
    </script>
</body>
</html>
