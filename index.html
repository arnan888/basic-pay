<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙虎争霸·史诗对决</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { background: #0c0c0c; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* 整体外框 */
        .main-box {
            width: 100vw; height: 100vh; max-width: 480px;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%;
            animation: outerGlow 15s linear infinite;
            padding: 6px; border-radius: 18px;
            box-shadow: 0 0 50px rgba(255,255,255,0.6);
        }
        @keyframes outerGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 主容器 */
        .container {
            width: 100%; height: 100%;
            background: #4a7c64; border-radius: 15px;
            display: flex; flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* 顶部状态栏 */
        .top-bar {
            height: 8%; display: flex; gap: 10px; padding: 8px 12px;
        }
        .info-card {
            flex: 1; background: #6b737e; border: 2px solid #2c4a3b; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center; padding: 0 10px;
        }
        .info-card label { font-size: 12px; color: #ccc; font-weight: bold; }
        .info-card span { font-size: 20px; color: #f1c40f; text-shadow: 0 0 6px #f1c40f; }

        /* ===================== 核心龙虎对决区 ===================== */
        .battle-area {
            height: 38%; margin: 4px 10px;
            border: 3px solid #2c4a3b; border-radius: 12px;
            position: relative; overflow: hidden;
            background: #000;
        }
        /* 史诗对决背景视频/图片 */
        .battle-bg {
            width: 100%; height: 100%;
            background: url("https://picsum.photos/id/1015/1000/500") center/cover no-repeat;
            position: absolute; top: 0; left: 0;
        }
        /* 光影遮罩 */
        .battle-mask {
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.5) 100%);
            position: absolute; top: 0; left: 0;
        }
        /* 龙虎主体 */
        .dragon-figure {
            position: absolute; left: 30px; top: 50%; transform: translateY(-50%);
            width: 100px; height: 100px;
            background: url("https://picsum.photos/id/1003/200/200") center/cover no-repeat;
            filter: drop-shadow(0 0 10px #3498db);
            animation: dragonFloat 6s ease-in-out infinite;
        }
        .tiger-figure {
            position: absolute; right: 30px; top: 50%; transform: translateY(-50%);
            width: 100px; height: 100px;
            background: url("https://picsum.photos/id/1005/200/200") center/cover no-repeat;
            filter: drop-shadow(0 0 10px #e67e22);
            animation: tigerStance 5s ease-in-out infinite;
        }
        @keyframes dragonFloat {
            0% { transform: translateY(-50%) rotate(-2deg); }
            50% { transform: translateY(-55%) rotate(2deg); }
            100% { transform: translateY(-50%) rotate(-2deg); }
        }
        @keyframes tigerStance {
            0% { transform: translateY(-50%) rotate(2deg); }
            50% { transform: translateY(-45%) rotate(-2deg); }
            100% { transform: translateY(-50%) rotate(2deg); }
        }
        /* 对决特效 */
        .battle-effect {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border-radius: 50%;
            background: radial-gradient(circle, #ffff00, #ff0000);
            filter: blur(15px); opacity: 0;
        }
        .battle-effect.show { animation: effectFlash 1s ease-out forwards; }
        @keyframes effectFlash {
            0% { opacity: 0; scale: 0.5; }
            50% { opacity: 1; scale: 1.5; }
            100% { opacity: 0; scale: 2; }
        }
        /* 结果提示 */
        .result-box {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            font-size: 18px; color: #fff; font-weight: bold;
            text-shadow: 0 0 8px #f1c40f;
            background: rgba(0,0,0,0.7); padding: 3px 12px; border-radius: 10px;
        }
        /* ========================================================== */

        /* 操作区 */
        .control-area {
            flex: 1; margin: 4px 10px 8px 10px;
            background: #6b737e; border: 3px solid #2c4a3b; border-radius: 12px;
            padding: 12px; display: flex; flex-direction: column;
        }
        /* 龙虎和选择 */
        .choice-group {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px;
        }
        .choice-btn {
            height: 80px; background: rgba(0,0,0,0.3); border: 3px solid #2c4a3b; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; font-weight: bold; cursor: pointer;
        }
        .choice-btn.dragon { color: #3498db; text-shadow: 0 0 10px #3498db; }
        .choice-btn.tiger { color: #e67e22; text-shadow: 0 0 10px #e67e22; }
        .choice-btn.tie { color: #9b59b6; text-shadow: 0 0 10px #9b59b6; }
        .choice-btn.active { border-color: #f1c40f; background: rgba(0,0,0,0.5); }
        /* 数据显示 */
        .data-group {
            display: grid; grid-template-rows: repeat(3, 1fr); gap: 6px; margin-bottom: 12px;
        }
        .data-item {
            background: rgba(0,0,0,0.6); border: 2px solid #2c4a3b; border-radius: 8px;
            padding: 0 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .data-item label { font-size: 12px; color: #ccc; }
        .data-item span { font-size: 18px; color: #f1c40f; text-shadow: 0 0 6px #f1c40f; }
        /* 押注金额 */
        .bet-txt {
            text-align: center; color: #fff; font-size: 16px; font-weight: bold;
            margin-bottom: 10px;
        }
        .bet-txt span { color: #f1c40f; text-shadow: 0 0 8px #f1c40f; }
        /* 功能按键 */
        .btn-group {
            display: flex; gap: 10px; margin-bottom: 10px;
        }
        .func-btn {
            width: 52px; height: 52px; background: #4a7c64; border: 3px solid #2c4a3b; border-radius: 10px;
            color: #fff; font-size: 28px; font-weight: bold; cursor: pointer;
        }
        .main-btn {
            flex: 1; height: 52px; background: linear-gradient(#e53935, #b71c1c); border: none; border-radius: 30px;
            color: #fff; font-size: 22px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 #7f0000;
        }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #7f0000; }
        /* 模式选择 */
        .mode-group {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .mode-btn {
            height: 42px; background: rgba(0,0,0,0.4); border: 2px solid #2c4a3b; border-radius: 8px;
            color: #fff; font-size: 16px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .mode-btn.active { border-color: #f1c40f; background: rgba(0,0,0,0.6); }
        .speed-btn {
            display: flex; gap: 5px;
        }
        .speed-btn span {
            width: 33%; height: 100%; display: flex; align-items: center; justify-content: center;
            border-radius: 6px;
        }
        .speed-btn span.active { background: #f1c40f; color: #000; }
    </style>
</head>
<body>
<div class="main-box">
    <div class="container">
        <!-- 顶部状态栏 -->
        <div class="top-bar">
            <div class="info-card">
                <label>账户余额</label>
                <span id="balance">857.80</span>
            </div>
            <div class="info-card">
                <label>奖池累积</label>
                <span>84291.50</span>
            </div>
        </div>

        <!-- 史诗龙虎对决区 -->
        <div class="battle-area">
            <div class="battle-bg"></div>
            <div class="battle-mask"></div>
            <div class="dragon-figure"></div>
            <div class="tiger-figure"></div>
            <div class="battle-effect"></div>
            <div class="result-box" id="result">龙虎争霸·一触即发</div>
        </div>

        <!-- 操作区 -->
        <div class="control-area">
            <div class="choice-group">
                <div class="choice-btn dragon" onclick="setChoice('dragon')">龙</div>
                <div class="choice-btn tie" onclick="setChoice('tie')">和</div>
                <div class="choice-btn tiger" onclick="setChoice('tiger')">虎</div>
            </div>

            <div class="data-group">
                <div class="data-item">
                    <label>当前押注</label>
                    <span id="current-bet">0.00</span>
                </div>
                <div class="data-item">
                    <label>预计奖金</label>
                    <span id="win-amount">0.00</span>
                </div>
                <div class="data-item">
                    <label>当前选择</label>
                    <span id="current-choice">未选择</span>
                </div>
            </div>

            <div class="bet-txt">押注金额：<span id="bet-val">100</span> USDT</div>
            
            <div class="btn-group">
                <button class="func-btn" onclick="changeBet(-1)">-</button>
                <button class="main-btn" onclick="startGame()">确认投注</button>
                <button class="func-btn" onclick="changeBet(1)">+</button>
            </div>

            <div class="mode-group">
                <div class="mode-btn" id="auto-btn" onclick="toggleAuto()">自动投注</div>
                <div class="mode-btn speed-btn" onclick="toggleSpeed()">
                    <span class="active" id="speed-1">1X</span>
                    <span id="speed-2">2X</span>
                    <span id="speed-3">3X</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// 全局状态
let state = {
    balance: 857.8,
    betLevels: [10, 50, 100, 500, 1000],
    currentBetIdx: 2,
    selected: null,
    isRunning: false,
    autoMode: false,
    speed: 1
};

// 设置投注选择
function setChoice(type) {
    if(state.isRunning) return;
    state.selected = type;
    document.querySelectorAll('.choice-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.choice-btn.${type}`).classList.add('active');
    document.getElementById('current-choice').textContent = type === 'dragon' ? '龙' : type === 'tiger' ? '虎' : '和';
}

// 调整押注金额
function changeBet(dir) {
    if(state.isRunning) return;
    state.currentBetIdx = Math.max(0, Math.min(state.betLevels.length-1, state.currentBetIdx + dir));
    document.getElementById('bet-val').textContent = state.betLevels[state.currentBetIdx];
}

// 开始游戏对决
function startGame() {
    if(state.isRunning) { alert('对决进行中，请稍候'); return; }
    if(!state.selected) { alert('请先选择投注项'); return; }
    
    const betVal = state.betLevels[state.currentBetIdx];
    if(state.balance < betVal) { alert('余额不足'); return; }

    // 更新状态
    state.isRunning = true;
    state.balance -= betVal;
    document.getElementById('balance').textContent = state.balance.toFixed(2);
    document.getElementById('current-bet').textContent = betVal.toFixed(2);
    
    const winVal = betVal * (state.selected === 'tie' ? 8 : 1);
    document.getElementById('win-amount').textContent = winVal.toFixed(2);

    // 触发对决特效
    document.getElementById('result').textContent = '龙虎激战·胜负即分';
    document.querySelector('.battle-effect').classList.add('show');

    // 15秒内完成对决（分阶段展示）
    const stages = [
        { time: 3000, txt: '龙抬首·吐碧光' },
        { time: 6000, txt: '虎振爪·啸山林' },
        { time: 9000, txt: '风云变·天地惊' },
        { time: 12000, txt: '力碰撞·气浪翻' },
        { time: 15000, txt: '' }
    ];

    stages.forEach(stage => {
        setTimeout(() => {
            if(stage.txt) document.getElementById('result').textContent = stage.txt;
        }, stage.time);
    });

    // 15秒后判定结果
    setTimeout(() => {
        const result = ['dragon','tiger','tie'][Math.floor(Math.random()*3)];
        let resultTxt = '';
        
        if(result === 'dragon') {
            resultTxt = '龙威盖世·大胜而归';
        } else if(result === 'tiger') {
            resultTxt = '虎啸山林·力压群雄';
        } else {
            resultTxt = '势均力敌·握手言和';
        }
        
        document.getElementById('result').textContent = resultTxt;
        
        // 结算奖金
        if(result === state.selected) {
            state.balance += winVal;
            document.getElementById('balance').textContent = state.balance.toFixed(2);
        }

        state.isRunning = false;
        // 自动模式继续
        if(state.autoMode) setTimeout(startGame, state.speed === 3 ? 1500 : state.speed === 2 ? 2500 : 3500);
    }, 15000);
}

// 切换自动模式
function toggleAuto() {
    state.autoMode = !state.autoMode;
    const btn = document.getElementById('auto-btn');
    btn.classList.toggle('active');
    btn.textContent = state.autoMode ? '关闭自动' : '自动投注';
}

// 切换速度
function toggleSpeed() {
    state.speed = (state.speed % 3) + 1;
    document.querySelectorAll('.speed-btn span').forEach(s => s.classList.remove('active'));
    document.getElementById(`speed-${state.speed}`).classList.add('active');
}
</script>
</body>
</html>
