<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙虎斗 - 链上终端</title>
    <style>
        :root {
            --jade: #4a7c64; --jade-l: #6b9a85; --jade-d: #2c4a3b;
            --stone: #6b737e; --inner: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            --gold: #f1c40f; --red: #ff4d4d; --blue: #3498db; --tiger: #e67e22; --tie: #9b59b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background: #0c0c0c; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .container-outer { width: 100vw; height: 100vh; max-width: 480px; display: flex; justify-content: center; align-items: center; background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff); background-size: 600% 600%; animation: outerNeonRotate 15s linear infinite; padding: 6px; border-radius: 18px; box-shadow: 0 0 50px rgba(255,255,255,0.6); }
        @keyframes outerNeonRotate { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .container { width: 100%; height: 100%; background: var(--jade); border-radius: 15px; display: flex; flex-direction: column; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .header { height: 8%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 8px 12px; }
        .box { background: var(--stone); border: 2px solid var(--jade-d); box-shadow: var(--inner); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; }
        .box span:last-child { font-size: 20px; font-weight: bold; color: var(--gold); text-shadow: 0 0 6px var(--gold); }
        .battle-scene { height: 38%; display: flex; justify-content: center; align-items: center; background: #0a0a0a; border: 3px solid var(--jade-d); border-radius: 12px; margin: 4px 10px; position: relative; overflow: visible; }
        .dragon, .tiger { position: absolute; top: 50%; transform: translateY(-50%); width: 100px; height: 100px; z-index: 10; transition: all 0.3s; }
        .dragon { left: 20px; } .tiger { right: 20px; }
        .dragon-icon, .tiger-icon { font-size: 70px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        .dragon.attack { animation: dragonAtk 0.4s ease; }
        .tiger.attack { animation: tigerAtk 0.4s ease; }
        @keyframes dragonAtk { 0% { left: 20px; } 50% { left: 40%; transform: translateY(-50%) scale(1.2); } 100% { left: 20px; } }
        @keyframes tigerAtk { 0% { right: 20px; } 50% { right: 40%; transform: translateY(-50%) scale(1.2); } 100% { right: 20px; } }
        .play-section { flex: 1; display: flex; flex-direction: column; background: var(--stone); box-shadow: var(--inner); border: 3px solid var(--jade-d); border-radius: 12px; margin: 4px 10px 8px 10px; padding: 12px; }
        .multi-bet-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .multi-bet-item { flex: 1; background: rgba(0,0,0,0.45); border: 2px solid var(--jade-d); border-radius: 12px; padding: 8px 4px; text-align: center; transition: 0.2s; }
        .multi-bet-item.selected { border-color: var(--gold); background: rgba(255,255,255,0.1); }
        .multi-bet-name { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
        .multi-bet-amount { font-size: 18px; color: var(--gold); font-weight: bold; }
        .multi-bet-control { display: flex; justify-content: center; gap: 15px; margin-top: 8px; }
        .multi-bet-control button { background: #222; border: 1px solid var(--gold); border-radius: 50%; width: 32px; height: 32px; color: var(--gold); font-size: 20px; cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; }
        .multi-bet-control button:active { transform: scale(0.85); background: var(--gold); color: #000; }
        .data-stack { display: grid; grid-template-rows: repeat(3, 1fr); gap: 6px; }
        .data-item { background: rgba(0,0,0,0.6); border: 1px solid var(--jade-d); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; height: 35px; }
        .exec-row { display: flex; gap: 10px; margin: 10px 0; }
        .main-go { flex: 1; height: 50px; background: linear-gradient(180deg, #e53935, #b71c1c); border: none; border-radius: 25px; color: #fff; font-size: 20px; font-weight: 900; box-shadow: 0 4px 0 #7f0000; }
        .step-btn { width: 50px; height: 50px; background: var(--jade); border: 2px solid var(--jade-d); border-radius: 10px; color: #fff; font-size: 24px; }
        .mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mode-btn { height: 40px; background: rgba(0,0,0,0.4); border: 1px solid var(--jade-d); border-radius: 8px; color: #ccc; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .mode-btn.active { background: var(--jade-d); color: #fff; border-color: var(--gold); }
        .battle-result { position: absolute; top: 10px; color: #fff; font-weight: bold; background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 20px; z-index: 20; }
    </style>
</head>
<body>
<div class="container-outer">
    <div class="container">
        <div class="header">
            <div class="box"><span>余额</span><span id="balanceDisplay">0.00</span></div>
            <div class="box"><span>奖池</span><span id="poolDisplay">84291.50</span></div>
        </div>
        <div class="battle-scene">
            <div class="battle-result" id="battle-result">准备就绪</div>
            <div class="dragon" id="dragon"><div class="dragon-icon">🐉</div></div>
            <div class="tiger" id="tiger"><div class="tiger-icon">🐯</div></div>
        </div>
        <div class="play-section">
            <div class="multi-bet-row">
                <div class="multi-bet-item" id="item-DRAGON">
                    <div class="multi-bet-name" style="color:var(--blue)">龙</div>
                    <div class="multi-bet-amount" id="bet-DRAGON">0</div>
                    <div class="multi-bet-control">
                        <button onclick="handleAdjust('DRAGON', -1)">-</button>
                        <button onclick="handleAdjust('DRAGON', 1)">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" id="item-TIE">
                    <div class="multi-bet-name" style="color:var(--tie)">和</div>
                    <div class="multi-bet-amount" id="bet-TIE">0</div>
                    <div class="multi-bet-control">
                        <button onclick="handleAdjust('TIE', -1)">-</button>
                        <button onclick="handleAdjust('TIE', 1)">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" id="item-TIGER">
                    <div class="multi-bet-name" style="color:var(--tiger)">虎</div>
                    <div class="multi-bet-amount" id="bet-TIGER">0</div>
                    <div class="multi-bet-control">
                        <button onclick="handleAdjust('TIGER', -1)">-</button>
                        <button onclick="handleAdjust('TIGER', 1)">+</button>
                    </div>
                </div>
            </div>
            <div class="data-stack">
                <div class="data-item"><label>总投注</label><span id="totalBet">0</span></div>
                <div class="data-item"><label>单注步长</label><span id="stepVal" style="color:var(--gold)">10</span></div>
            </div>
            <div class="exec-row">
                <button class="step-btn" onclick="changeStep(-10)">-</button>
                <button class="main-go" onclick="startFight()">确认投注</button>
                <button class="step-btn" onclick="changeStep(10)">+</button>
            </div>
            <div class="mode-row">
                <div class="mode-btn" id="autoBtn" onclick="toggleAuto()">自动投注: 关</div>
                <div class="mode-btn" onclick="syncBalance()">🔄 刷新余额</div>
            </div>
        </div>
    </div>
</div>

<script>
const USER_ID = "6685731895";
const API_URL = "http://127.0.0.1:8080";

let state = {
    balance: 0,
    step: 10,
    bets: { DRAGON: 0, TIGER: 0, TIE: 0 },
    isRolling: false,
    isAuto: false
};

// 初始化
window.onload = () => {
    syncBalance();
    updateUI();
};

async function syncBalance() {
    try {
        const res = await fetch(`${API_URL}/balance?user_id=${USER_ID}`);
        const data = await res.json();
        state.balance = data.balance || 0;
        updateUI();
    } catch(e) {
        showMsg("网络连接失败");
    }
}

function handleAdjust(type, dir) {
    if(state.isRolling) return;
    
    // 如果是增加押注，先清空其他两项（实现单选，如果需要多选请删掉下面循环）
    if(dir > 0) {
        Object.keys(state.bets).forEach(k => { if(k !== type) state.bets[k] = 0; });
    }

    let next = state.bets[type] + (dir * state.step);
    state.bets[type] = Math.max(0, next);
    updateUI();
}

function changeStep(val) {
    state.step = Math.max(10, Math.min(500, state.step + val));
    updateUI();
}

function updateUI() {
    document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
    document.getElementById('stepVal').innerText = state.step;
    
    let total = 0;
    for(let key in state.bets) {
        document.getElementById(`bet-${key}`).innerText = state.bets[key];
        document.getElementById(`item-${key}`).classList.toggle('selected', state.bets[key] > 0);
        total += state.bets[key];
    }
    document.getElementById('totalBet').innerText = total;
}

function showMsg(txt) {
    document.getElementById('battle-result').innerText = txt;
}

async function startFight() {
    if(state.isRolling) return;
    
    // 找到当前有注的项目
    let type = Object.keys(state.bets).find(k => state.bets[k] > 0);
    let amt = type ? state.bets[type] : 0;

    if(amt <= 0) return showMsg("请先选择押注项目");
    if(amt > state.balance) return showMsg("余额不足");

    const typeNameMap = { DRAGON: "龙", TIGER: "虎", TIE: "和" };
    
    state.isRolling = true;
    showMsg("正在开牌...");
    
    // 动画效果
    document.getElementById('dragon').classList.add('attack');
    document.getElementById('tiger').classList.add('attack');

    try {
        const res = await fetch(`${API_URL}/bet`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                user_id: USER_ID,
                type: typeNameMap[type],
                amount: amt
            })
        });
        const data = await res.json();
        
        setTimeout(() => {
            document.getElementById('dragon').classList.remove('attack');
            document.getElementById('tiger').classList.remove('attack');
            
            if(data.error) {
                showMsg(data.error);
            } else {
                state.balance = data.balance;
                showMsg(`${data.result}！赢项：${data.win > 0 ? '✅ +'+data.win : '❌'}`);
                if(!state.isAuto) state.bets[type] = 0; // 非自动模式清空
                updateUI();
            }
            state.isRolling = false;
            
            if(state.isAuto) setTimeout(startFight, 1500);
        }, 600);

    } catch(e) {
        showMsg("通信异常");
        state.isRolling = false;
        document.getElementById('dragon').classList.remove('attack');
        document.getElementById('tiger').classList.remove('attack');
    }
}

function toggleAuto() {
    state.isAuto = !state.isAuto;
    const btn = document.getElementById('autoBtn');
    btn.classList.toggle('active', state.isAuto);
    btn.innerText = `自动投注: ${state.isAuto ? '开' : '关'}`;
    if(state.isAuto && !state.isRolling) startFight();
}
</script>
</body>
</html>
