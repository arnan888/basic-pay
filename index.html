<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Paijiu Table</title>
<style>
html,body{
  margin:0;
  background:#0b0f0d;
  overflow:hidden;
}
canvas{
  display:block;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize',resize);
resize();

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawTable(){
  const w = canvas.width;
  const h = canvas.height;

  // 木框
  ctx.fillStyle = '#3a2414';
  ctx.fillRect(0,0,w,h);

  // 桌布
  ctx.fillStyle = '#1f6b4a';
  roundRect(40,40,w-80,h-80,40);
  ctx.fill();

  // 内暗边
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 8;
  ctx.stroke();

  // 中央庄位
  ctx.fillStyle = '#1a5a3f';
  roundRect(w/2-120,h/2-120,240,240,30);
  ctx.fill();

  ctx.fillStyle = '#d6b36a';
  ctx.font = 'bold 72px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('庄',w/2,h/2+5);
}

function drawDomino(x,y){
  // 阴影
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fillRect(x+6,y+10,70,100);

  // 骨牌
  ctx.fillStyle='#f4f1ec';
  ctx.fillRect(x,y,70,100);

  ctx.strokeStyle='#ccc';
  ctx.strokeRect(x,y,70,100);

  // 分隔线
  ctx.beginPath();
  ctx.moveTo(x,y+50);
  ctx.lineTo(x+70,y+50);
  ctx.strokeStyle='#aaa';
  ctx.stroke();

  // 点
  function pip(px,py){
    ctx.beginPath();
    ctx.arc(px,py,4,0,Math.PI*2);
    ctx.fillStyle='#5a2a1a';
    ctx.fill();
  }

  pip(x+20,y+25);
  pip(x+50,y+25);
  pip(x+35,y+75);
}

function drawChips(x,y,value,color){
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.ellipse(x,y-i*4,26,8,0,0,Math.PI*2);
    ctx.fillStyle=color;
    ctx.fill();
    ctx.strokeStyle='#fff';
    ctx.stroke();
  }
  ctx.fillStyle='#fff';
  ctx.font='bold 14px sans-serif';
  ctx.textAlign='center';
  ctx.fillText(value,x,y-8);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawTable();

  // 上排骨牌
  drawDomino(canvas.width*0.25,canvas.height*0.25);
  drawDomino(canvas.width*0.25+90,canvas.height*0.25);

  drawDomino(canvas.width*0.65,canvas.height*0.25);
  drawDomino(canvas.width*0.65+90,canvas.height*0.25);

  // 下排骨牌
  drawDomino(canvas.width*0.25,canvas.height*0.6);
  drawDomino(canvas.width*0.25+90,canvas.height*0.6);

  drawDomino(canvas.width*0.65,canvas.height*0.6);
  drawDomino(canvas.width*0.65+90,canvas.height*0.6);

  // 筹码
  drawChips(canvas.width*0.75,canvas.height*0.55,'100','#1e90ff');
  drawChips(canvas.width*0.8,canvas.height*0.58,'500','#8a2be2');
}

draw();
</script>
</body>
</html>
