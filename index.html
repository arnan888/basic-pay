<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Quantum Terminal Pro</title>
    <style>
        :root { --red: #ff4d4d; --dark-red: #8a1515; --green: #2e7d5c; --bg: #0b1112; --panel: #232d34; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .iphone { width: 100%; max-width: 414px; padding: 20px; display: flex; flex-direction: column; }

        /* 顶部余额 - 磨砂质感 */
        .card {
            background: var(--panel);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 15px 35px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            border: 1px solid rgba(0,0,0,0.2);
        }
        .label { color: #8a969e; font-size: 13px; letter-spacing: 1px; }
        .bal { color: var(--red); font-size: 58px; font-weight: bold; margin: 10px 0; letter-spacing: -2px; }
        .bet-row { font-size: 16px; color: #8a969e; }
        .bet-num { color: #ffb344; font-weight: bold; margin-left: 5px; }

        /* 转盘区域 - 严谨对齐 */
        .wheel-box {
            background: #1e262c;
            border-radius: 30px;
            padding: 50px 10px;
            position: relative;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1.5px, transparent 1.5px);
            background-size: 22px 22px;
            display: flex;
            justify-content: center;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }
        .pointer {
            position: absolute;
            top: 35px;
            z-index: 100;
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--red);
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5));
        }
        .plate {
            width: 250px; height: 250px;
            border-radius: 50%;
            background: var(--green);
            border: 12px solid #141a1f;
            position: relative;
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            box-shadow: 0 0 0 2px #2d3842, 0 15px 40px rgba(0,0,0,0.7);
        }
        .icon {
            position: absolute;
            width: 100%; height: 100%;
            text-align: center;
            font-size: 32px;
            padding-top: 20px;
            transform-origin: 50% 50%;
        }

        /* 控制按钮 - 3D 触感 */
        .btns { display: flex; align-items: center; gap: 12px; }
        .side {
            width: 60px; height: 60px;
            background: var(--panel);
            border: none;
            border-radius: 20px;
            color: #ffb344;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0d1213, 0 8px 15px rgba(0,0,0,0.4);
        }
        .side:active { transform: translateY(3px); box-shadow: 0 3px 0 #0d1213; }
        
        .main {
            flex: 1;
            background: linear-gradient(180deg, #ff4d4d 0%, #a51d1d 100%);
            border: none;
            border-radius: 40px;
            color: white;
            height: 65px;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--dark-red), 0 10px 20px rgba(0,0,0,0.3);
            text-shadow: 0 2px 2px rgba(0,0,0,0.3);
        }
        .main:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--dark-red); }
        .main:disabled { opacity: 0.7; cursor: not-allowed; }

        /* 底部历史小点 (可选) */
        .history { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #2d3842; }
        .dot.win { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
    </style>
</head>
<body>

<div class="iphone">
    <div class="card">
        <div class="label">💰 可用余额 (USDT)</div>
        <div id="balance" class="bal">146.80</div>
        <div class="bet-row">🔥 单注额度: <span id="betAmt" class="bet-num">5.5</span></div>
    </div>

    <div class="wheel-box">
        <div class="pointer"></div>
        <div id="plate" class="plate">
            <!-- 对应 0, 45, 90... 度的赔率结果 -->
            <div class="icon" style="transform: rotate(0deg)">🦢</div> <!-- x2 -->
            <div class="icon" style="transform: rotate(45deg)">🐺</div> <!-- x0 -->
            <div class="icon" style="transform: rotate(90deg)">🐯</div> <!-- x3 -->
            <div class="icon" style="transform: rotate(135deg)">🐢</div> <!-- x0 -->
            <div class="icon" style="transform: rotate(180deg)">🦌</div> <!-- x5 -->
            <div class="icon" style="transform: rotate(225deg)">🐲</div> <!-- x0 -->
            <div class="icon" style="transform: rotate(270deg)">🔥</div> <!-- x10 -->
            <div class="icon" style="transform: rotate(315deg)">🦅</div> <!-- x0 -->
        </div>
    </div>

    <div class="btns">
        <button class="side" onclick="adj(-0.5)">−</button>
        <button id="drawBtn" class="main" onclick="execute()">
            <span>▶</span> 执行抽取
        </button>
        <button class="side" onclick="adj(0.5)">+</button>
    </div>

    <div id="hist" class="history">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
</div>

<script>
    // 严谨逻辑控制
    let balance = 146.80;
    let bet = 5.5;
    let rotation = 0;
    let isRunning = false;
    
    // 赔率映射 (对应 HTML 中的图标顺序)
    const odds = [2, 0, 3, 0, 5, 0, 10, 0];

    function adj(v) {
        if(isRunning) return;
        bet = Math.max(0.5, bet + v);
        document.getElementById('betAmt').innerText = bet.toFixed(1);
    }

    function execute() {
        if(isRunning || balance < bet) return;

        isRunning = true;
        document.getElementById('drawBtn').disabled = true;

        // 1. 扣除余额
        balance -= bet;
        updateUI();

        // 2. 计算随机中奖索引 (0-7)
        const prizeIndex = Math.floor(Math.random() * 8);
        
        // 3. 计算旋转角度 (转5圈 + 偏移角)
        // 逆时针偏移计算：(360 - prizeIndex * 45)
        const targetDeg = (360 - prizeIndex * 45);
        rotation += (360 * 5) + targetDeg - (rotation % 360);
        
        const plate = document.getElementById('plate');
        plate.style.transform = `rotate(${rotation}deg)`;

        // 4. 等待动画结束 (4秒)
        setTimeout(() => {
            const winMul = odds[prizeIndex];
            const winAmt = bet * winMul;
            
            balance += winAmt;
            updateUI();
            
            // 更新历史小点
            addHistory(winMul > 0);

            isRunning = false;
            document.getElementById('drawBtn').disabled = false;
        }, 4000);
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance.toFixed(2);
    }

    function addHistory(isWin) {
        const dots = document.querySelectorAll('.dot');
        const lastDot = dots[dots.length - 1];
        lastDot.remove();
        
        const newDot = document.createElement('div');
        newDot.className = isWin ? 'dot win' : 'dot';
        document.getElementById('hist').prepend(newDot);
    }
</script>

</body>
</html>
