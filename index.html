<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>互动转盘演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* 转盘外框 */
        .turntable-container {
            width: 500px;
            height: 500px;
            border: 10px solid #FFD700; 
            box-shadow: 0 0 20px rgba(255,215,0,0.6), inset 0 0 10px #000;
            border-radius: 50%;
            position: relative;
            padding: 8px;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 1px, transparent 1px, transparent 5px);
        }
        /* 转盘盘面 */
        .turntable {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transform-origin: center center;
        }
        /* 奖项格子 */
        .prize-item {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: bottom right;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #d4af37;
            font-size: 20px;
            font-weight: bold;
        }
        .prize-item:nth-child(odd) {
            background: radial-gradient(circle at center, #c01f1f, #000);
        }
        .prize-item:nth-child(even) {
            background: radial-gradient(circle at center, #000, #c01f1f);
        }
        /* 3D按钮（已修改） */
        .spin-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #d4af37;
            box-shadow: 0 8px 0 #8B4513, 0 15px 20px rgba(0,0,0,0.5);
            border: 2px solid #FFF;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .spin-btn:active {
            transform: translate(-50%, -50%) translateY(8px);
            box-shadow: 0 2px 0 #8B4513, 0 8px 10px rgba(0,0,0,0.5);
        }
        /* 档位选择 */
        .speed-select {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }
        .speed-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background-color: #d4af37;
            cursor: pointer;
            transition: all 0.2s;
        }
        .speed-btn.active {
            background-color: #fffbf0;
            color: #856c00;
        }
        /* 数值显示 */
        .score {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            color: #d4af37;
            text-shadow: 0 0 5px #fff;
        }
        .score-animate {
            animation: scoreBreathe 0.5s infinite alternate;
        }
        @keyframes scoreBreathe {
            from { transform: translateX(-50%) scale(1); }
            to { transform: translateX(-50%) scale(1.2); }
        }
        /* 中奖反馈 */
        .prize-highlight {
            position: absolute;
            border: 4px solid #ffff00;
            border-radius: 50%;
            animation: blink 0.1s infinite alternate;
            display: none;
        }
        @keyframes blink {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="turntable-container">
        <div class="turntable" id="turntable">
            <div class="prize-item" style="transform: rotate(0deg) skewY(-45deg);">一等奖</div>
            <div class="prize-item" style="transform: rotate(45deg) skewY(-45deg);">二等奖</div>
            <div class="prize-item" style="transform: rotate(90deg) skewY(-45deg);">三等奖</div>
            <div class="prize-item" style="transform: rotate(135deg) skewY(-45deg);">谢谢参与</div>
            <div class="prize-item" style="transform: rotate(180deg) skewY(-45deg);">四等奖</div>
            <div class="prize-item" style="transform: rotate(225deg) skewY(-45deg);">五等奖</div>
            <div class="prize-item" style="transform: rotate(270deg) skewY(-45deg);">六等奖</div>
            <div class="prize-item" style="transform: rotate(315deg) skewY(-45deg);">谢谢参与</div>
            <div class="prize-highlight" id="highlight" style="width: 500px; height: 500px;"></div>
        </div>
        <div class="spin-btn" id="spinBtn">开始抽奖</div>
    </div>
    <div class="speed-select">
        <button class="speed-btn active" data-speed="1">标准档</button>
        <button class="speed-btn" data-speed="2">快速档</button>
        <button class="speed-btn" data-speed="3">极速档</button>
    </div>
    <div class="score" id="score">0</div>

    <script>
        const turntable = document.getElementById('turntable');
        const spinBtn = document.getElementById('spinBtn');
        const speedBtns = document.querySelectorAll('.speed-btn');
        const score = document.getElementById('score');
        const highlight = document.getElementById('highlight');
        let selectedSpeed = 1;
        let isSpinning = false;

        speedBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                speedBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedSpeed = parseInt(btn.dataset.speed);
            });
        });

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            highlight.style.display = 'none';
            
            let duration, timingFunc, reboundDeg;
            switch(selectedSpeed) {
                case 1:
                    duration = 2500;
                    timingFunc = 'cubic-bezier(0.2, 0.8, 0.2, 1)';
                    reboundDeg = 5;
                    break;
                case 2:
                    duration = 1200;
                    timingFunc = 'linear';
                    reboundDeg = 2;
                    break;
                case 3:
                    duration = 500;
                    timingFunc = 'cubic-bezier(0.8, 0, 1, 0)';
                    reboundDeg = 0;
                    turntable.style.filter = 'blur(2px)';
                    setTimeout(() => {
                        turntable.style.filter = 'none';
                    }, 400);
                    break;
            }

            const targetDeg = 360 * 5 + Math.floor(Math.random() * 360);
            turntable.style.transition = `transform ${duration}ms ${timingFunc}`;
            turntable.style.transform = `rotate(${targetDeg}deg)`;

            setTimeout(() => {
                if (reboundDeg > 0) {
                    // 修改回弹过渡曲线
                    turntable.style.transition = 'transform 300ms cubic-bezier(0.15, 0, 0.15, 1.2)';
                    turntable.style.transform = `rotate(${targetDeg + reboundDeg}deg)`;
                    setTimeout(() => {
                        // 修改回弹后复位的曲线
                        turntable.style.transition = 'transform 200ms cubic-bezier(0.15, 0, 0.15, 1.2)';
                        turntable.style.transform = `rotate(${targetDeg}deg)`;
                        finishSpin(targetDeg);
                    }, 300);
                } else {
                    finishSpin(targetDeg);
                }
            }, duration);
        });

        function finishSpin(deg) {
            const realDeg = deg % 360;
            const prizeIndex = Math.floor(realDeg / 45);
            const randomScore = Math.floor(Math.random() * 1000);
            score.textContent = '0';
            score.classList.add('score-animate');
            let count = 0;
            const scoreTimer = setInterval(() => {
                count += Math.ceil(randomScore / 20);
                if (count >= randomScore) {
                    count = randomScore;
                    clearInterval(scoreTimer);
                    score.classList.remove('score-animate');
                }
                score.textContent = count;
            }, 30);
            highlight.style.display = 'block';
            isSpinning = false;
        }
    </script>
</body>
</html>
