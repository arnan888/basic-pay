<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRITICAL_OVERLOAD_V45</title>
    <style>
        body, html { margin: 0; background: #000; overflow: hidden; height: 100vh; font-family: 'Courier New', monospace; color: #0f0; }
        .v-active { display: flex !important; animation: shake45 0.04s infinite; }
        @keyframes shake45 {
            0% { transform: translate(0,0); filter: contrast(1); }
            25% { transform: translate(-4px, 2px); filter: contrast(1.5) hue-rotate(10deg); }
            50% { transform: translate(4px, -2px); filter: invert(0.1); }
            100% { transform: translate(0,0); }
        }
        .view { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .plate { border: 3px solid #0f0; padding: 40px; background: rgba(0,30,0,0.9); box-shadow: 0 0 25px #0f0; position: relative; text-align: center; }
        .tag { position: absolute; top: -15px; left: 15px; background: #000; color: #fff; border: 1px solid #0f0; padding: 2px 10px; font-weight: bold; font-size: 14px; }
        .num { font-size: 90px; font-weight: 900; color: #fff; text-shadow: 4px 0 #f00, -4px 0 #00f; }
        .spin-mode { animation: spin 0.3s linear infinite !important; border-radius: 50% !important; border-color: #ff00ff !important; }
        @keyframes spin { from { transform: rotate(0deg) scale(1.1); } to { transform: rotate(360deg) scale(1.1); } }
        .tri { width: 0; height: 0; border-left: 60px solid transparent; border-right: 60px solid transparent; border-top: 100px solid #fff; margin: 40px 0; filter: drop-shadow(0 0 20px #fff); }
        .btns { margin-top: 40px; display: flex; gap: 20px; z-index: 100; }
        button { background: transparent; border: 2px solid #fff; color: #fff; padding: 12px 30px; font-size: 18px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body onclick="initAudio()">
    <div id="v1" class="view v-active">
        <div class="plate">
            <div class="tag">SYNC_OVERLOAD_V45</div>
            <div class="num" id="n1">1000</div>
        </div>
        <div class="tri"></div>
        <div class="btns">
            <button onclick="go(2)">进入幸运转转乐</button>
            <button onclick="go(3)">自毁协议</button>
        </div>
    </div>
    <div id="v2" class="view">
        <div class="plate spin-mode">
            <div class="tag" style="color:#ff00ff; border-color:#ff00ff">LUCKY_SEQUENCE</div>
            <div class="num" id="n2" style="text-shadow: 0 0 20px #ff00ff;">777</div>
        </div>
        <div class="btns"><button onclick="go(1)">返回监测层</button></div>
    </div>
    <div id="v3" class="view" style="background:#f00; animation: shake45 0.02s infinite;">
        <h1 style="font-size: 60px; color:#fff;">SYSTEM_FAILURE</h1>
        <div class="num" id="n3" style="color:#fff;">ERR</div>
        <button onclick="go(1)" style="margin-top:50px; border-color:#fff;">紧急中止</button>
    </div>
    <script>
        const vs = [document.getElementById('v1'), document.getElementById('v2'), document.getElementById('v3')];
        const ns = [document.getElementById('n1'), document.getElementById('n2'), document.getElementById('n3')];
        let ac = null;
        function go(id) {
            vs.forEach(v => v.classList.remove('v-active'));
            document.getElementById('v' + id).classList.add('v-active');
            if(ac) playSfx(id);
        }
        setInterval(() => {
            ns[0].innerText = Math.floor(Math.random() * 80) + 960;
            ns[1].innerText = [777, 888, 999, "WIN"][Math.floor(Math.random()*4)];
            ns[2].innerText = Math.floor(Math.random()*9999);
        }, 50);
        function initAudio() { if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSfx(type) {
            const o = ac.createOscillator(), g = ac.createGain();
            o.type = type === 2 ? 'sine' : 'sawtooth';
            o.frequency.setValueAtTime(type === 3 ? 80 : 400 + Math.random()*400, ac.currentTime);
            g.gain.setValueAtTime(0.08, ac.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
            o.connect(g); g.connect(ac.destination);
            o.start(); o.stop(ac.currentTime + 0.2);
        }
    </script>
</body>
</html>
