<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>五兽至尊_V200_GOD_MODE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --n: #00f2ff; --p: #ff0055; --g: #ffcc00; --bg: #020408; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        /* 1. V200 极致动态背景：赛博粒子流 */
        body { 
            margin: 0; background: var(--bg); color: #fff; font-family: 'Arial Black', sans-serif; 
            height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; overflow: hidden;
            background: radial-gradient(circle at center, #0a1e30 0%, #020408 100%);
        }
        body::before {
            content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-linear-gradient(rgba(0,242,255,0.05) 0px, transparent 1px),
                        repeating-linear-gradient(90deg, rgba(0,242,255,0.05) 0px, transparent 1px);
            background-size: 40px 40px; transform: perspective(500px) rotateX(60deg);
            animation: grid-move 5s linear infinite; z-index: -1;
        }
        @keyframes grid-move { 0% { transform: perspective(500px) rotateX(60deg) translateY(0); } 100% { transform: perspective(500px) rotateX(60deg) translateY(40px); } }

        /* 2. 极致余额显示：激光切割质感 */
        .header { width: 100%; height: 18%; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .bal-wrap { 
            background: rgba(255,255,255,0.05); border: 2px solid var(--n); border-radius: 20px;
            padding: 15px 40px; backdrop-filter: blur(20px); box-shadow: 0 0 30px rgba(0,242,255,0.3), inset 0 0 20px rgba(0,242,255,0.1);
        }
        .bal-val { font-size: 48px; font-weight: 900; text-shadow: 0 0 20px var(--n); letter-spacing: -2px; }

        /* 3. V200 机械转盘：金属厚度 + 霓虹灯 */
        .main-game { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .wheel-shell {
            position: relative; width: 92vw; max-width: 380px; aspect-ratio: 1/1; 
            border-radius: 50%; padding: 10px;
            background: linear-gradient(135deg, #333, #000, #444);
            box-shadow: 0 30px 60px rgba(0,0,0,1), 0 0 20px var(--n);
        }
        .wheel-shell::after {
            content: ""; position: absolute; inset: 0; border-radius: 50%;
            border: 4px dashed var(--p); opacity: 0.5; animation: spin-slow 15s linear infinite;
        }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }

        .wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 12px solid #111;
            background: conic-gradient(from 0deg, #111 0%, #222 25%, #111 50%, #222 75%, #111 100%);
            transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); position: relative; overflow: hidden;
        }
        
        .sector { position: absolute; width: 100%; height: 100%; clip-path: polygon(50% 50%, 100% 17%, 100% 83%); transform-origin: center; display: flex; align-items: center; justify-content: flex-end; padding-right: 7%; }
        
        /* 图案：巨型、发光、呼吸 */
        .item { transform: rotate(90deg) translateY(-32px); display: flex; flex-direction: column; align-items: center; }
        .item b { font-size: 85px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.6)); animation: glow 2s infinite ease-in-out; }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 10px #fff); transform: scale(1); } 50% { filter: drop-shadow(0 0 30px var(--n)); transform: scale(1.1); } }

        .pointer { 
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent; border-top: 65px solid #fff; 
            z-index: 100; filter: drop-shadow(0 0 20px var(--n));
        }
        
        .spin-btn { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90px; height: 90px; background: radial-gradient(#222, #000); 
            border: 4px solid var(--p); border-radius: 50%; z-index: 110;
            color: var(--p); font-size: 24px; font-weight: 900; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 40px var(--p), inset 0 0 20px var(--p); text-shadow: 0 0 10px var(--p);
        }

        /* 4. 控制区：全透明悬浮质感 */
        .footer { width: 100%; height: 20%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; z-index: 10; }
        .bet-ui { 
            display: flex; align-items: center; gap: 40px; background: rgba(255,255,255,0.08); 
            padding: 12px 35px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px);
        }
        .btn-ui { width: 50px; height: 50px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 32px; font-weight: bold; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        #msg { color: var(--g); font-weight: 900; font-size: 28px; text-shadow: 0 0 15px #000; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-wrap"><div class="bal-val">🪙 <span id="bal">1,000</span></div></div>
    </div>

    <div class="main-game">
        <div class="wheel-shell">
            <div class="pointer"></div>
            <div id="wheel" class="wheel">
                <div class="sector" style="background:rgba(255,215,0,0.25); transform:rotate(-90deg)"><div class="item"><b>👑</b></div></div>
                <div class="sector" style="background:rgba(255,0,0,0.2); transform:rotate(-30deg)"><div class="item"><b>🦁</b></div></div>
                <div class="sector" style="background:rgba(255,165,0,0.25); transform:rotate(30deg)"><div class="item"><b>🐯</b></div></div>
                <div class="sector" style="background:rgba(0,255,0,0.2); transform:rotate(90deg)"><div class="item"><b>🦅</b></div></div>
                <div class="sector" style="background:rgba(147,112,219,0.25); transform:rotate(150deg)"><div class="item"><b>🐺</b></div></div>
                <div class="sector" style="background:rgba(240,230,140,0.2); transform:rotate(210deg)"><div class="item"><b>🐕</b></div></div>
            </div>
            <div class="spin-btn" onclick="spin()">SPIN</div>
        </div>
    </div>

    <div class="footer">
        <div class="bet-ui">
            <button class="btn-ui" onclick="adj(-10)">-</button>
            <div style="font-size:38px; font-weight:900; color:#fff; min-width:90px; text-align:center;"><span id="bet">1</span></div>
            <button class="btn-ui" onclick="adj(10)">+</button>
        </div>
        <div id="msg">MEGA JACKPOT AWAITS</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let b = 1000, bet = 1, r = 0, isS = false, audioCtx;

        // 🎵 V200 狂暴电子节奏：模拟顶级赌场提神背景音
        function initMusic() {
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const master = audioCtx.createGain(); master.gain.setValueAtTime(0.06, audioCtx.currentTime); master.connect(audioCtx.destination);
                
                const beat = () => {
                    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(60, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                    osc.connect(g); g.connect(master);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                    
                    // 高频碎拍
                    if(Math.random() > 0.6) {
                        const hi = audioCtx.createOscillator(); hi.type = 'triangle';
                        hi.frequency.setValueAtTime(800 + Math.random()*1000, audioCtx.currentTime);
                        const hg = audioCtx.createGain(); hg.gain.setValueAtTime(0.05, audioCtx.currentTime);
                        hg.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                        hi.connect(hg); hg.connect(master);
                        hi.start(); hi.stop(audioCtx.currentTime + 0.05);
                    }
                    setTimeout(beat, 300); // 120BPM 强劲节奏
                };
                beat();
            }
        }

        function sfx(f, d, t='sine', v=0.1) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.01);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function adj(v) {
            initMusic();
            if(!isS) { 
                bet = Math.max(1, Math.min(b, bet+v)); 
                document.getElementById('bet').innerText = bet;
                tg.HapticFeedback.selectionChanged();
                sfx(1500, 0.1, 'square', 0.04); 
            }
        }

        function spin() {
            initMusic();
            if(isS || b < bet) return;
            isS = true; b -= bet; document.getElementById('bal').innerText = b.toLocaleString();
            tg.HapticFeedback.impactOccurred('heavy');
            
            let tick = setInterval(() => { if(isS) sfx(300 + Math.random()*500, 0.08, 'sawtooth', 0.02); }, 100);
            
            let idx = Math.floor(Math.random()*6);
            r += (3600 + idx*60);
            document.getElementById('wheel').style.transform = `rotate(-${r}deg)`;
            document.getElementById('msg').innerText = "RACING THE ODDS...";

            setTimeout(() => {
                clearInterval(tick);
                const multi = [88, 15, 10, 5, 2, 0];
                let win = Math.floor(bet * multi[idx]);
                b += win; document.getElementById('bal').innerText = b.toLocaleString();
                
                if(win > 0) {
                    document.getElementById('msg').innerText = "HUGE WIN: " + win + "!";
                    for(let i=0; i<15; i++) setTimeout(()=>sfx(400+i*120, 0.3, '
