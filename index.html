<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>五兽至尊_V7000_LIGHTSPEED</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --pink: #ff0055; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; height: 100vh; overflow: hidden; }

        /* 全屏流光画布 */
        #warpCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        .ui-layer { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 0; pointer-events: none; }
        .ui-layer * { pointer-events: auto; }

        /* 融合两张图优点的余额卡：磨砂+发光 */
        .bal-card {
            background: rgba(255, 255, 255, 0.05); border: 2px solid var(--neon);
            padding: 15px 50px; border-radius: 25px; backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3), inset 0 0 15px rgba(0, 242, 255, 0.2);
            display: flex; align-items: center; gap: 15px;
        }
        .bal-val { font-size: 52px; font-weight: 900; letter-spacing: -1px; text-shadow: 0 0 15px var(--neon); }

        /* 核心：放射流光转盘 */
        .wheel-box { position: relative; width: 90vw; max-width: 400px; aspect-ratio: 1/1; }
        
        /* 激光指针：发光感拉满 */
        .pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 60px; background: #fff; box-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon); z-index: 50;
        }

        .wheel-main {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #222 0%, #000 70%);
            border: 5px solid #111; position: relative;
            transition: transform 7s cubic-bezier(0.1, 0, 0, 1);
            overflow: hidden; box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        /* 放射背景线条 */
        .ray { position: absolute; width: 100%; height: 100%; background: conic-gradient(from 0deg, transparent, rgba(0,242,255,0.1) 10deg, transparent 20deg); transform-origin: center; }

        .sector { position: absolute; width: 100%; height: 100%; transform-origin: center; display: flex; align-items: center; justify-content: flex-end; padding-right: 8%; }
        .icon { font-size: 80px; transform: rotate(90deg); filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); }

        /* 启动中心 */
        .run-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; border-radius: 50%; background: #000;
            border: 3px solid var(--pink); display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 22px; color: var(--pink); text-shadow: 0 0 10px var(--pink);
            box-shadow: 0 0 40px var(--pink); cursor: pointer; z-index: 100;
        }

        /* 底部：VICTORY 提示效果 */
        .footer { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .bet-bar { display: flex; align-items: center; gap: 60px; }
        .adj { font-size: 44px; font-weight: 100; color: #fff; opacity: 0.4; width: 40px; text-align: center; }
        .bet-num { font-size: 56px; font-weight: 900; color: #fff; min-width: 120px; text-align: center; }
        #win-msg { font-size: 28px; font-weight: 900; color: var(--gold); letter-spacing: 2px; height: 35px; text-shadow: 0 0 20px rgba(255,204,0,0.5); }
    </style>
</head>
<body onclick="initFX()">

    <canvas id="warpCanvas"></canvas>

    <div class="ui-layer">
        <div class="bal-card">
            <div style="font-size:35px">💎</div>
            <div class="bal-val" id="bal">1,000</div>
        </div>

        <div class="wheel-box">
            <div class="pointer"></div>
            <div id="wheel" class="wheel-main">
                <!-- 生成放射射线 -->
                <script>
                    for(let i=0; i<12; i++) document.write(`<div class="ray" style="transform:rotate(${i*30}deg)"></div>`);
                </script>
                <div class="sector" style="transform:rotate(-90deg)"><b class="icon">👑</b></div>
                <div class="sector" style="transform:rotate(-30deg)"><b class="icon">🦁</b></div>
                <div class="sector" style="transform:rotate(30deg)"><b class="icon">🐯</b></div>
                <div class="sector" style="transform:rotate(90deg)"><b class="icon">🦅</b></div>
                <div class="sector" style="transform:rotate(150deg)"><b class="icon">🐺</b></div>
                <div class="sector" style="transform:rotate(210deg)"><b class="icon">🐕</b></div>
            </div>
            <div class="run-core" onclick="go()">RUN</div>
        </div>

        <div class="footer">
            <div id="win-msg">READY TO FLY</div>
            <div class="bet-bar">
                <div class="adj" onclick="altBet(-10)">-</div>
                <div class="bet-num" id="bet">1</div>
                <div class="adj" onclick="altBet(10)">+</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let bal = 1000, bet = 1, rot = 0, isSpin = false, ctx, aCtx, lines = [];

        function initFX() {
            if(ctx) return;
            const cvs = document.getElementById('warpCanvas');
            ctx = cvs.getContext('2d');
            cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            aCtx = new (window.AudioContext || window.webkitAudioContext)();
            for(let i=0; i<80; i++) lines.push({x: Math.random()*cvs.width, y: Math.random()*cvs.height, l: Math.random()*20, v: Math.random()*5+2});
            render();
        }

        function render() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,ctx.canvas.width, ctx.canvas.height);
            lines.forEach(p => {
                p.y += isSpin ? p.v * 10 : p.v;
                if(p.y > ctx.canvas.height) p.y = -20;
                ctx.strokeStyle = isSpin ? '#00f2ff' : '#333';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y + p.l); ctx.stroke();
            });
            requestAnimationFrame(render);
        }

        function playSfx(f, d) {
            if(!aCtx) return;
            const o = aCtx.createOscillator(); const g = aCtx.createGain();
            o.frequency.exponentialRampToValueAtTime(f, aCtx.currentTime + d);
            g.gain.setTargetAtTime(0.1, aCtx.currentTime, 0.01);
            g.gain.exponentialRampToValueAtTime(0.0001, aCtx.currentTime + d);
            o.connect(g); g.connect(aCtx.destination);
            o.start(); o.stop(aCtx.currentTime + d);
        }

        function altBet(v) {
            if(isSpin) return;
            bet = Math.max(1, Math.min(bal, bet+v));
            document.getElementById('bet').innerText = bet;
            tg.HapticFeedback.selectionChanged();
        }

        function go() {
            if(isSpin || bal < bet) return;
            isSpin = true; bal -= bet;
            document.getElementById('bal').innerText = bal.toLocaleString();
            document.getElementById('win-msg').innerText = "Warp Speed...";
            tg.HapticFeedback.impactOccurred('heavy');

            // 引擎升空声
            for(let i=0; i<5; i++) setTimeout(() => playSfx(100 + i*200, 0.5), i*100);

            let idx = Math.floor(Math.random()*6);
            rot += (3600 + idx*60);
            document.getElementById('wheel').style.transform = `rotate(-${rot}deg)`;

            setTimeout(() => {
                const m = [88, 15, 10, 5, 2, 0];
                let w = Math.floor(bet * m[idx]);
                bal += w;
                document.getElementById('bal').innerText = bal.toLocaleString();
                
                if(w > 0) {
                    document.getElementById('win-msg').innerText = "VICTORY: +" + w;
                    tg.HapticFeedback.notificationOccurred('success');
                    playSfx(1200, 0.8);
                } else {
                    document.getElementById('win-msg').innerText = "SYSTEM REBOOT";
                }
                isSpin = false;
            }, 7000);
        }
    </script>
</body>
</html>
