<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>五兽至尊_V11000_ULTIMATE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --gold: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; height: 100vh; overflow: hidden; }

        /* 背景流光：飞逝感粒子 */
        #warp { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.6; }

        .ui-root { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 0; }

        /* 截图同款：霓虹余额框 */
        .bal-box {
            background: rgba(0,0,0,0.8); border: 2px solid var(--neon);
            padding: 10px 50px; border-radius: 20px; backdrop-filter: blur(10px);
            box-shadow: 0 0 25px var(--neon), inset 0 0 10px var(--neon);
            display: flex; align-items: center; gap: 15px;
        }
        .bal-val { font-size: 52px; font-weight: 900; letter-spacing: -1px; text-shadow: 0 0 15px var(--neon); }

        /* 核心区：3D 悬浮轮盘 */
        .stage { position: relative; width: 90vw; max-width: 400px; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; }
        
        /* 截图同款：白色发光指针 */
        .needle { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            width: 3px; height: 65px; background: #fff; box-shadow: 0 0 20px var(--neon); z-index: 50; 
        }

        .wheel {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #222, #000);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative; transition: transform 7s cubic-bezier(0.1, 0, 0, 1);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .sector { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 10%; transform-origin: center; }
        .sector b { font-size: 78px; transform: rotate(90deg); filter: drop-shadow(0 0 15px rgba(255,255,255,0.2)); transition: 0.3s; }

        /* 截图同款：中心渐变 RUN 按钮 */
        .core-btn {
            position: absolute; width: 105px; height: 105px; border-radius: 50%;
            background: #000; border: 3px solid var(--pink); color: var(--pink);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 900; cursor: pointer; z-index: 100;
            box-shadow: 0 0 30px var(--pink); transition: 0.1s;
        }
        .core-btn:active { transform: scale(0.9); box-shadow: 0 0 10px var(--pink); }

        /* 底部：VICTORY 提示区 */
        .footer { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #win-msg { font-size: 30px; font-weight: 900; color: var(--gold); letter-spacing: 2px; text-shadow: 0 0 15px rgba(255,204,0,0.4); height: 40px; }
        
        /* 极简下注控制台 */
        .bet-bar { display: flex; align-items: center; gap: 60px; }
        .adj { font-size: 44px; color: rgba(255,255,255,0.3); width: 40px; text-align: center; cursor: pointer; }
        .bet-val { font-size: 64px; font-weight: 900; min-width: 120px; text-align: center; }

        /* 震动动画 */
        .bass-shake { animation: shake 0.1s infinite; }
        @keyframes shake { 0%{transform:translate(2px,2px)} 50%{transform:translate(-2px,-2px)} 100%{transform:translate(1px,-1px)} }
    </style>
</head>
<body onclick="initFX()">

    <canvas id="warp"></canvas>

    <div class="ui-root" id="main-ui">
        <div class="bal-box">
            <div style="font-size:32px">💎</div>
            <div class="bal-val" id="bal">1,000</div>
        </div>

        <div class="stage">
            <div class="needle"></div>
            <div id="wheel" class="wheel">
                <div class="sector" style="transform:rotate(-90deg)"><b>👑</b></div>
                <div class="sector" style="transform:rotate(-30deg)"><b>🦁</b></div>
                <div class="sector" style="transform:rotate(30deg)"><b>🐯</b></div>
                <div class="sector" style="transform:rotate(90deg)"><b>🦅</b></div>
                <div class="sector" style="transform:rotate(150deg)"><b>🐺</b></div>
                <div class="sector" style="transform:rotate(210deg)"><b>🐕</b></div>
            </div>
            <div class="core-btn" onclick="run()">RUN</div>
        </div>

        <div class="footer">
            <div id="win-msg">READY</div>
            <div class="bet-bar">
                <div class="adj" onclick="adjBet(-10)">-</div>
                <div class="bet-val" id="bet">1</div>
                <div class="adj" onclick="adjBet(10)">+</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let bal = 1000, bet = 1, r = 0, active = false, ctx;

        function initFX() {
            if(ctx) return;
            const cvs = document.getElementById('warp');
            ctx = cvs.getContext('2d');
            cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            let p = [];
            for(let i=0; i<70; i++) p.push({x:Math.random()*cvs.width, y:Math.random()*cvs.height, v:Math.random()*4+2, l:Math.random()*40});
            function draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,cvs.width, cvs.height);
                p.forEach(s => {
                    s.y += active ? s.v * 12 : s.v;
                    if(s.y > cvs.height) s.y = -50;
                    ctx.strokeStyle = active ? '#ff0055' : '#00f2ff';
                    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        function adjBet(v) {
            if(active) return;
            bet = Math.max(1, Math.min(bal, bet+v));
            document.getElementById('bet').innerText = bet;
            tg.HapticFeedback.selectionChanged();
        }

        function run() {
            if(active || bal < bet) return;
            active = true; bal -= bet;
            document.getElementById('bal').innerText = bal.toLocaleString
