<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>龙虎斗 · Dola AI 风格 | 抽屉加速版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* 主容器 - 玻璃质感 */
        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(18, 25, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            padding: 20px 18px 24px;
        }

        /* 账户栏 */
        .account-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 20px;
        }
        .account-info {
            color: #ffecb3;
            font-weight: bold;
            font-size: 14px;
            background: #00000066;
            padding: 6px 16px;
            border-radius: 40px;
        }
        .switch-area {
            display: flex;
            gap: 8px;
        }
        .switch-id-input {
            background: #2a2e3a;
            border: 1px solid #ffaa44;
            border-radius: 40px;
            padding: 6px 12px;
            width: 130px;
            color: #ffdd99;
            font-size: 12px;
        }
        .switch-btn {
            background: #ffaa44;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        .switch-btn:active { transform: scale(0.96); }

        /* 龙虎对决特效区域 */
        .arena {
            position: relative;
            background: linear-gradient(135deg, #1e2a2e, #0f1a1f);
            border-radius: 32px;
            height: 260px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 1px rgba(255,215,0,0.2), 0 8px 20px rgba(0,0,0,0.4);
        }
        .dragon, .tiger {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 68px;
            background: radial-gradient(circle, rgba(255,255,200,0.3), rgba(0,0,0,0.6));
            backdrop-filter: blur(4px);
            box-shadow: 0 0 25px currentColor;
            transition: all 0.1s;
        }
        .dragon {
            left: -40%;
            background: radial-gradient(circle, #00ffff33, #003344cc);
            color: #0cf;
            border: 2px solid #0cf;
        }
        .tiger {
            right: -40%;
            background: radial-gradient(circle, #ffcc0033, #552200cc);
            color: #fc0;
            border: 2px solid #fc0;
        }
        @keyframes dragonFly {
            to { left: 10%; transform: translateY(-50%) rotate(-5deg) scale(1.1); }
        }
        @keyframes tigerFly {
            to { right: 10%; transform: translateY(-50%) rotate(5deg) scale(1.1); }
        }
        .dragon.animate { animation: dragonFly 0.7s cubic-bezier(0.2,0.9,0.4,1.2) forwards; }
        .tiger.animate { animation: tigerFly 0.7s cubic-bezier(0.2,0.9,0.4,1.2) forwards; }
        .impact-flash {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #fff, #ffaa66);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            z-index: 30;
            pointer-events: none;
        }
        .impact-flash.active {
            animation: impactBlast 0.6s ease-out forwards;
        }
        @keyframes impactBlast {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
            25% { opacity: 1; transform: translate(-50%, -50%) scale(12); box-shadow: 0 0 40px 30px #ffaa55; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(30); }
        }
        .result-area {
            position: absolute;
            bottom: 15%;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 25;
            pointer-events: none;
        }
        .result-text {
            display: inline-block;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 6px;
            padding: 6px 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            opacity: 0;
            transform: scale(0.8);
            transition: 0.2s;
            color: gold;
        }
        .result-text.show {
            opacity: 1;
            transform: scale(1.2);
            transition: transform 0.3s cubic-bezier(0.34, 1.3, 0.6, 1);
        }
        .shake-effect {
            animation: arenaShake 0.2s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        @keyframes arenaShake {
            0% { transform: translate(0,0); }
            25% { transform: translate(5px, -3px); }
            50% { transform: translate(-4px, 4px); }
            75% { transform: translate(3px, 2px); }
            100% { transform: translate(0,0); }
        }

        /* 下注卡片 */
        .bet-options {
            display: flex;
            gap: 12px;
            margin: 20px 0 16px;
        }
        .bet-card {
            flex: 1;
            background: #0f1a1f;
            border-radius: 28px;
            text-align: center;
            padding: 12px 0;
            cursor: pointer;
            border: 1px solid #ffaa4455;
            transition: 0.1s;
            backdrop-filter: blur(4px);
        }
        .bet-card.active {
            background: #ffaa3322;
            border-color: #ffaa44;
            transform: scale(1.02);
            box-shadow: 0 0 12px #ffaa4488;
        }
        .bet-card h3 { font-size: 28px; margin-bottom: 6px; color: #ffecb3; }
        .bet-amount { font-size: 20px; font-weight: bold; color: #ffaa44; }

        /* 信息栏 */
        .info-bar {
            display: flex;
            justify-content: space-between;
            background: #0a0e16;
            border-radius: 48px;
            padding: 12px 18px;
            margin: 16px 0;
            color: #ffecb3;
            font-weight: bold;
        }
        .mode-badge {
            background: #ffaa3322;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }
        .timer-block {
            background: #00000066;
            padding: 4px 12px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 20px;
        }
        .speed-hint {
            font-size: 12px;
            background: #ffaa44;
            color: #1e2a2e;
            border-radius: 20px;
            padding: 2px 10px;
            margin-left: 8px;
        }

        /* 抽屉面板 */
        .drawer-container {
            margin-top: 12px;
            border-radius: 28px;
            background: #0f1a1faa;
            backdrop-filter: blur(8px);
            overflow: hidden;
        }
        .drawer-handle {
            background: #ffaa3322;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffdd99;
            border-top: 1px solid #ffaa4455;
        }
        .drawer-handle .arrow { font-size: 20px; transition: transform 0.3s; }
        .drawer-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }
        .drawer-content.open {
            max-height: 300px;
            transition: max-height 0.5s ease-in;
        }
        .function-grid {
            padding: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .func-btn {
            background: #1e2a2e;
            border: 1px solid #ffaa66;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: bold;
            color: #ffdd99;
            cursor: pointer;
            transition: 0.1s;
        }
        .func-btn:active { transform: scale(0.96); background: #ffaa3355; }
        .speed-group {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #00000055;
            padding: 6px 16px;
            border-radius: 48px;
        }
        .speed-btn {
            background: #2a3a3e;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            color: #ffdd99;
        }
        .speed-btn.active {
            background: #ff8800;
            color: #1e1a0e;
        }
        .history-list {
            margin: 8px 12px 12px;
            background: #00000066;
            border-radius: 24px;
            padding: 10px;
            max-height: 110px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #ffaa4455;
            font-size: 12px;
            color: #ffecb3;
        }

        /* 余额彩金池 */
        .balance-footer {
            display: flex;
            justify-content: space-between;
            background: #0a0e16;
            margin-top: 18px;
            padding: 12px 20px;
            border-radius: 32px;
            font-weight: bold;
            color: #ffecb3;
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- 账户栏 -->
    <div class="account-bar">
        <div class="account-info">当前账户：<span id="currentAccountId">6685731895</span></div>
        <div class="switch-area">
            <input type="text" id="switchUserId" class="switch-id-input" placeholder="用户ID" value="6685731895">
            <button class="switch-btn" id="switchUserBtn">切换</button>
        </div>
    </div>

    <!-- 特效区 -->
    <div class="arena" id="arena">
        <div class="dragon" id="dragon">🐉</div>
        <div class="tiger" id="tiger">🐅</div>
        <div class="impact-flash" id="impactFlash"></div>
        <div class="result-area" id="resultArea">
            <div class="result-text" id="resultText">龙 胜</div>
        </div>
    </div>

    <!-- 下注选项 -->
    <div class="bet-options">
        <div class="bet-card" data-bet="dragon">
            <h3>🐉 龙</h3>
            <div class="bet-amount" id="dragonBet">0</div>
        </div>
        <div class="bet-card" data-bet="draw">
            <h3>⚖️ 和</h3>
            <div class="bet-amount" id="drawBet">0</div>
        </div>
        <div class="bet-card" data-bet="tiger">
            <h3>🐅 虎</h3>
            <div class="bet-amount" id="tigerBet">0</div>
        </div>
    </div>

    <!-- 信息栏 -->
    <div class="info-bar">
        <div>总押注: <strong id="totalStake">0.00</strong></div>
        <div>预计奖金: <strong id="expectedWin">0.00</strong></div>
        <div class="mode-badge">⚡ 自动开奖</div>
    </div>
    <div class="info-bar" style="justify-content: space-between; margin-top: -8px;">
        <div>单注步长：<strong>10</strong> USDT</div>
        <div class="timer-block">下一局：<span id="countdown">10</span>秒 <span id="speedIndicator" class="speed-hint">1X</span></div>
    </div>

    <!-- 抽屉式底部面板 -->
    <div class="drawer-container">
        <div class="drawer-handle" id="drawerHandle">
            <span>⚙️ 功能菜单 (更多操作)</span>
            <span class="arrow">▲</span>
        </div>
        <div class="drawer-content" id="drawerContent">
            <div class="function-grid">
                <div class="speed-group">
                    <span>⏩ 加速：</span>
                    <div class="speed-btn" data-speed="1">1X</div>
                    <div class="speed-btn" data-speed="2">2X</div>
                    <div class="speed-btn" data-speed="3">3X</div>
                </div>
                <button class="func-btn" id="repeatBetBtn">🔄 续押</button>
                <button class="func-btn" id="clearBetBtn">🗑️ 取消</button>
                <button class="func-btn" id="confirmBetBtn">✅ 确认投注</button>
            </div>
            <div id="recentHistoryPanel">
                <div style="font-weight:bold; margin-left: 12px; color:#ffdd99;">📜 最近开奖</div>
                <div id="recentHistoryList" class="history-list">
                    <div class="history-item">暂无记录</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 余额彩金池 -->
    <div class="balance-footer">
        <span>💰 余额: <strong id="userBalance">10000.00</strong></span>
        <span>🎰 彩金池: <strong id="jackpotPool">50000.00</strong></span>
    </div>
</div>

<script>
    // ======================== 龙虎斗完整逻辑 + 加速功能 (1X/2X/3X 加速倒计时) ========================
    // 模拟数据
    let currentUserId = "6685731895";
    let userBalance = 10000.00;
    let jackpot = 50000.00;
    const STEP = 10;          // 单注步长固定 10 USDT
    let bets = { dragon: 0, tiger: 0, draw: 0 };
    let countdown = 10;       // 剩余秒数 (初始10秒)
    let timerInterval = null;
    let isAnimating = false;
    let isGameLocked = false;
    let lastBet = null;       // 存储上一次下注 { type, amount }
    
    // 加速倍率 (1,2,3)  影响倒计时减少的速度
    let speedMultiplier = 1;
    // 记录真实剩余秒数（不受加速影响，用于加速切换时重新计算）
    let realRemainingSeconds = 10;
    
    // 赔率
    const ODDS = { dragon: 1.9, tiger: 1.9, draw: 8.0 };
    
    // 开奖历史 (最多10条)
    let historyRecords = [];
    
    // DOM 元素
    const dragonBetSpan = document.getElementById('dragonBet');
    const tigerBetSpan = document.getElementById('tigerBet');
    const drawBetSpan = document.getElementById('drawBet');
    const totalStakeSpan = document.getElementById('totalStake');
    const expectedWinSpan = document.getElementById('expectedWin');
    const countdownSpan = document.getElementById('countdown');
    const speedIndicatorSpan = document.getElementById('speedIndicator');
    const userBalanceSpan = document.getElementById('userBalance');
    const jackpotPoolSpan = document.getElementById('jackpotPool');
    const arenaDiv = document.getElementById('arena');
    const dragonElem = document.getElementById('dragon');
    const tigerElem = document.getElementById('tiger');
    const impactFlash = document.getElementById('impactFlash');
    const resultTextDiv = document.getElementById('resultText');
    const resultAreaDiv = document.getElementById('resultArea');
    const recentHistoryListDiv = document.getElementById('recentHistoryList');
    const currentAccountIdSpan = document.getElementById('currentAccountId');
    
    // 辅助函数
    function updateUI() {
        dragonBetSpan.innerText = bets.dragon.toFixed(2);
        tigerBetSpan.innerText = bets.tiger.toFixed(2);
        drawBetSpan.innerText = bets.draw.toFixed(2);
        let total = bets.dragon + bets.tiger + bets.draw;
        totalStakeSpan.innerText = total.toFixed(2);
        let maxWin = 0;
        if (bets.dragon > 0) maxWin = Math.max(maxWin, bets.dragon * ODDS.dragon);
        if (bets.tiger > 0) maxWin = Math.max(maxWin, bets.tiger * ODDS.tiger);
        if (bets.draw > 0) maxWin = Math.max(maxWin, bets.draw * ODDS.draw);
        expectedWinSpan.innerText = maxWin.toFixed(2);
        userBalanceSpan.innerText = userBalance.toFixed(2);
        jackpotPoolSpan.innerText = jackpot.toFixed(2);
    }
    
    // 更新历史显示
    function updateHistoryDisplay() {
        if (historyRecords.length === 0) {
            recentHistoryListDiv.innerHTML = '<div class="history-item">暂无记录</div>';
            return;
        }
        recentHistoryListDiv.innerHTML = '';
        historyRecords.slice().reverse().forEach(rec => {
            const div = document.createElement('div');
            div.className = 'history-item';
            let winnerText = rec.winner === 'dragon' ? '🐉 龙胜' : (rec.winner === 'tiger' ? '🐅 虎胜' : '⚖️ 和局');
            div.innerHTML = `<span>${winnerText}</span><span>${rec.time}</span>`;
            recentHistoryListDiv.appendChild(div);
        });
    }
    
    function addHistoryRecord(winner) {
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
        historyRecords.unshift({ winner, time: timeStr });
        if (historyRecords.length > 10) historyRecords.pop();
        updateHistoryDisplay();
    }
    
    // 下注核心 (扣除余额并增加下注额)
    function placeBetAction(betType, amount) {
        if (isGameLocked) { alert("本局即将开奖，无法下注"); return false; }
        if (isAnimating) { alert("开奖特效中，请稍后"); return false; }
        if (amount <= 0) { alert("下注金额必须大于0"); return false; }
        if (userBalance < amount) { alert("余额不足"); return false; }
        userBalance -= amount;
        bets[betType] += amount;
        lastBet = { type: betType, amount: amount };
        updateUI();
        return true;
    }
    
    // 续押
    function repeatLastBet() {
        if (!lastBet) { alert("没有上次下注记录"); return; }
        placeBetAction(lastBet.type, lastBet.amount);
    }
    
    // 取消下注 (清空所有下注，退还余额)
    function cancelAllBets() {
        if (isGameLocked) { alert("即将开奖，无法取消"); return; }
        let total = bets.dragon + bets.tiger + bets.draw;
        if (total > 0) {
            userBalance += total;
            bets = { dragon: 0, tiger: 0, draw: 0 };
            updateUI();
        } else {
            alert("当前没有下注");
        }
    }
    
    // 确认投注
    function confirmBet() {
        let total = bets.dragon + bets.tiger + bets.draw;
        if (total === 0) alert("请先下注");
        else alert(`已确认下注 ${total} USDT，等待开奖`);
    }
    
    // 下注 (使用当前选中的下注类型 + 固定步长)
    let selectedBetType = 'dragon';
    document.querySelectorAll('.bet-card').forEach(card => {
        card.addEventListener('click', () => {
            selectedBetType = card.getAttribute('data-bet');
            document.querySelectorAll('.bet-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
        });
    });
    document.querySelector('.bet-card[data-bet="dragon"]').classList.add('active');
    
    function quickPlace() {
        placeBetAction(selectedBetType, STEP);
    }
    
    // 开奖特效 + 结算
    async function performLotteryWithResult(winner) {
        if (isAnimating) return;
        isAnimating = true;
        isGameLocked = true;
        
        // 重置动画位置
        dragonElem.classList.remove('animate');
        tigerElem.classList.remove('animate');
        void dragonElem.offsetWidth;
        dragonElem.style.left = '-40%';
        tigerElem.style.right = '-40%';
        resultTextDiv.classList.remove('show');
        impactFlash.classList.remove('active');
        arenaDiv.classList.remove('shake-effect');
        
        dragonElem.classList.add('animate');
        tigerElem.classList.add('animate');
        await new Promise(r => setTimeout(r, 700));
        
        impactFlash.classList.add('active');
        arenaDiv.classList.add('shake-effect');
        await new Promise(r => setTimeout(r, 350));
        
        let display = '';
        if (winner === 'dragon') display = '🐉 龙 胜';
        else if (winner === 'tiger') display = '🐅 虎 胜';
        else display = '⚖️ 和 局';
        resultTextDiv.innerText = display;
        resultTextDiv.classList.add('show');
        
        // 结算
        let totalLose = bets.dragon + bets.tiger + bets.draw;
        let winAmount = 0;
        if (winner === 'dragon') winAmount = bets.dragon * ODDS.dragon;
        else if (winner === 'tiger') winAmount = bets.tiger * ODDS.tiger;
        else if (winner === 'draw') winAmount = bets.draw * ODDS.draw;
        
        userBalance += winAmount;
        let platformProfit = totalLose - winAmount;
        jackpot += platformProfit;
        
        addHistoryRecord(winner);
        
        // 清空下注
        bets = { dragon: 0, tiger: 0, draw: 0 };
        updateUI();
        
        setTimeout(() => {
            arenaDiv.classList.remove('shake-effect');
            impactFlash.classList.remove('active');
        }, 400);
        
        await new Promise(r => setTimeout(r, 800));
        isAnimating = false;
        isGameLocked = false;
    }
    
    // 自动开奖 (随机结果，可对接真实API)
    async function autoOpenLottery() {
        if (isAnimating) return;
        let r = Math.random() * 100;
        let winner = 'dragon';
        if (r < 45) winner = 'dragon';
        else if (r < 90) winner = 'tiger';
        else winner = 'draw';
        await performLotteryWithResult(winner);
        // 重置倒计时 (真实剩余秒数重置为10)
        realRemainingSeconds = 10;
        countdown = 10;
        countdownSpan.innerText = countdown;
        if (timerInterval) clearInterval(timerInterval);
        startCountdown();
    }
    
    // 倒计时逻辑 (支持加速)
    function startCountdown() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (isAnimating) return;
            if (realRemainingSeconds <= 0.1) {
                clearInterval(timerInterval);
                autoOpenLottery();
            } else {
                // 根据加速倍率减少真实剩余秒数
                let decrement = 0.1 * speedMultiplier;
                realRemainingSeconds = Math.max(0, realRemainingSeconds - decrement);
                // 显示剩余秒数（向上取整显示整数，但保留小数逻辑）
                let displaySeconds = Math.ceil(realRemainingSeconds);
                if (displaySeconds < 0) displaySeconds = 0;
                countdownSpan.innerText = displaySeconds;
                // 最后2秒锁下注
                isGameLocked = (realRemainingSeconds <= 2);
            }
        }, 100);
    }
    
    // 切换加速倍率
    function setSpeed(mult) {
        speedMultiplier = mult;
        speedIndicatorSpan.innerText = mult + "X";
        // 更新UI按钮激活样式
        document.querySelectorAll('.speed-btn').forEach(btn => {
            if (parseInt(btn.getAttribute('data-speed')) === mult) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        // 无需重启倒计时，加速效果立即生效（下一次tick会用新倍率）
    }
    
    // 抽屉控制
    const drawerHandle = document.getElementById('drawerHandle');
    const drawerContent = document.getElementById('drawerContent');
    let drawerOpen = false;
    drawerHandle.addEventListener('click', () => {
        drawerOpen = !drawerOpen;
        if (drawerOpen) {
            drawerContent.classList.add('open');
            drawerHandle.querySelector('.arrow').innerHTML = '▼';
        } else {
            drawerContent.classList.remove('open');
            drawerHandle.querySelector('.arrow').innerHTML = '▲';
        }
    });
    
    // 账户切换
    document.getElementById('switchUserBtn').addEventListener('click', () => {
        let newId = document.getElementById('switchUserId').value.trim();
        if (newId) {
            currentUserId = newId;
            currentAccountIdSpan.innerText = currentUserId;
            // 切换用户重置余额 (演示)
            userBalance = 10000.00;
            updateUI();
            alert(`已切换到用户 ${currentUserId}，余额重置为 10000 USDT`);
        }
    });
    
    // 绑定功能按钮
    document.getElementById('repeatBetBtn').addEventListener('click', repeatLastBet);
    document.getElementById('clearBetBtn').addEventListener('click', cancelAllBets);
    document.getElementById('confirmBetBtn').addEventListener('click', confirmBet);
    // 投注按钮直接调用 quickPlace (在功能菜单外部可以加，但截图没有单独投注按钮，我们在抽屉里添加一个？截图有“确认投注”，已经添加。但下注需要快捷方式：点击龙虎和卡片即可下注)
    // 为了让操作符合截图：点击下注卡片直接下注（使用步长）
    document.querySelectorAll('.bet-card').forEach(card => {
        card.addEventListener('click', (e) => {
            e.stopPropagation();
            quickPlace();
        });
    });
    
    // 加速按钮绑定
    document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            let spd = parseInt(btn.getAttribute('data-speed'));
            setSpeed(spd);
        });
    });
    
    // 初始化
    setSpeed(1);
    updateUI();
    startCountdown();
    updateHistoryDisplay();
</script>
</body>
</html>
