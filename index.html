<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SLIM_WHEEL</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; }
        body { margin: 0; background: #050505; color: #fff; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; perspective: 1000px; }
        .hud { width: 60%; background: rgba(255,255,255,0.05); border: 1px solid var(--neon); border-radius: 6px; padding: 8px; text-align: center; margin-bottom: 30px; }
        .wheel-box { position: relative; transform: rotateX(15deg); }
        .wheel { width: 240px; height: 240px; border-radius: 50%; border: 6px solid #1a1a1a; background: conic-gradient(#ff0055 0 60deg, #222 60deg 120deg, #00f2ff 120deg 180deg, #222 180deg 240deg, #ffcc00 240deg 300deg, #222 300deg 360deg); box-shadow: 0 10px 30px rgba(0,0,0,0.8); transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); display: flex; align-items: center; justify-content: center; }
        .item { position: absolute; font-size: 22px; }
        .i1 { transform: rotate(30deg) translateY(-85px); } .i2 { transform: rotate(90deg) translateY(-85px); } .i3 { transform: rotate(150deg) translateY(-85px); } .i4 { transform: rotate(210deg) translateY(-85px); } .i5 { transform: rotate(270deg) translateY(-85px); } .i6 { transform: rotate(330deg) translateY(-85px); }
        .btn { position: absolute; width: 55px; height: 55px; background: #111; border: 3px solid var(--pink); border-radius: 50%; font-size: 12px; font-weight: bold; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px var(--pink); }
        .pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 20px solid #fff; z-index: 20; }
        .ovl { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <div class="hud">BALANCE: <b id="bal">1,000</b></div>
    <div class="wheel-box"><div class="pointer"></div><div class="wheel" id="wheel"><div class="item i1">💎</div><div class="item i2">💀</div><div class="item i3">💰</div><div class="item i4">💀</div><div class="item i5">🎁</div><div class="item i6">💀</div><div class="btn" onclick="spin()">SPIN</div></div></div>
    <div class="ovl" id="ovl"><div style="font-size:40px; font-weight:900;" id="res-txt"></div><button style="margin-top:30px; padding:12px 30px; background:var(--neon); border:none; border-radius:5px; font-weight:bold;" onclick="location.reload()">AGAIN</button></div>
    <script>
        let b=1000, r=0;
        function spin(){ if(b<50)return alert('余额不足'); b-=50; document.getElementById('bal').innerText=b; let add=1800+Math.floor(Math.random()*360); r+=add; document.getElementById('wheel').style.transform="rotate("+r+"deg)";
        setTimeout(()=>{ let win=[0, 100, 0, 200, 0, 500][Math.floor(Math.random()*6)]; b+=win; document.getElementById('bal').innerText=b; document.getElementById('ovl').style.display='flex'; document.getElementById('res-txt').innerText=win>0?"WIN: "+win:"LOSE"; document.getElementById('res-txt').style.color=win>0?'#00f2ff':'#ff0055'; },4000); }
    </script>
</body>
</html>
