
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>至尊骰宝 · 3D骰子</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 16px;
        }
        
        .casino-table {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a4a2a, #0a2a1a);
            border-radius: 40px;
            padding: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        .gold-border {
            background: linear-gradient(135deg, #1e3a2e, #0a2a1a);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .dice-stage {
            background: linear-gradient(135deg, #0a1a0a, #051005);
            margin: 16px;
            border-radius: 28px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 10px 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,215,0,0.2);
            position: relative;
        }
        .dice-stage::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffaa44, #ffdd88, #ffaa44, transparent);
        }
        .dice-title {
            font-size: 12px;
            color: #ffaa44;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 300;
        }
        
        /* ========== 真正的3D骰子 ========== */
        .three-dice {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
            perspective: 800px;
        }
        .dice-3d {
            width: 75px;
            height: 75px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
        }
        /* 骰子每个面 */
        .dice-face {
            position: absolute;
            width: 75px;
            height: 75px;
            background: linear-gradient(145deg, #f8f8f8, #e8e8e8);
            border-radius: 14px;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.8), 0 3px 8px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: bold;
            color: #c0392b;
            border: 1px solid #ffaa44;
        }
        /* 面1 - 正面 */
        .face-front { transform: translateZ(37.5px); background: radial-gradient(circle at 30% 30%, #fff, #e0e0e0); }
        /* 面2 - 背面 */
        .face-back { transform: rotateY(180deg) translateZ(37.5px); background: radial-gradient(circle at 30% 30%, #fafafa, #ddd); }
        /* 面3 - 右面 */
        .face-right { transform: rotateY(90deg) translateZ(37.5px); background: radial-gradient(circle at 30% 30%, #fefefe, #e5e5e5); }
        /* 面4 - 左面 */
        .face-left { transform: rotateY(-90deg) translateZ(37.5px); background: radial-gradient(circle at 30% 30%, #f5f5f5, #dcdcdc); }
        /* 面5 - 上面 */
        .face-top { transform: rotateX(90deg) translateZ(37.5px); background: radial-gradient(circle at 30% 30%, #ffffff, #e8e8e8); }
        /* 面6 - 下面 */
        .face-bottom { transform: rotateX(-90deg) translateZ(37.5px); background: radial-gradient(circle at 30% 30%, #f0f0f0, #d5d5d5); }
        
        /* 骰子面上的点数（使用点阵） */
        .dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #c0392b, #8b1a1a);
            border-radius: 50%;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), 0 1px 2px rgba(0,0,0,0.3);
        }
        /* 1点 */
        .dot-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        /* 2点 */
        .dot-tl { top: 20%; left: 20%; }
        .dot-br { bottom: 20%; right: 20%; }
        /* 3点 */
        .dot-tr { top: 20%; right: 20%; }
        .dot-bl { bottom: 20%; left: 20%; }
        /* 4点 */
        .dot-tl2 { top: 20%; left: 20%; }
        .dot-tr2 { top: 20%; right: 20%; }
        .dot-bl2 { bottom: 20%; left: 20%; }
        .dot-br2 { bottom: 20%; right: 20%; }
        /* 5点 */
        .dot-mid { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        /* 6点 */
        .dot-l1 { left: 20%; top: 20%; }
        .dot-l2 { left: 20%; top: 50%; transform: translateY(-50%); }
        .dot-l3 { left: 20%; bottom: 20%; }
        .dot-r1 { right: 20%; top: 20%; }
        .dot-r2 { right: 20%; top: 50%; transform: translateY(-50%); }
        .dot-r3 { right: 20%; bottom: 20%; }
        
        /* 滚动动画 */
        .dice-rolling-3d {
            animation: diceSpin 0.1s infinite linear;
        }
        @keyframes diceSpin {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            25% { transform: rotateX(180deg) rotateY(90deg) rotateZ(180deg); }
            50% { transform: rotateX(360deg) rotateY(180deg) rotateZ(360deg); }
            75% { transform: rotateX(540deg) rotateY(270deg) rotateZ(540deg); }
            100% { transform: rotateX(720deg) rotateY(360deg) rotateZ(720deg); }
        }
        
        /* 兼容手机：如果3D太卡，降级显示 */
        @media (max-width: 500px) {
            .dice-3d { width: 60px; height: 60px; }
            .dice-face { width: 60px; height: 60px; font-size: 32px; }
            .face-front { transform: translateZ(30px); }
            .face-back { transform: rotateY(180deg) translateZ(30px); }
            .face-right { transform: rotateY(90deg) translateZ(30px); }
            .face-left { transform: rotateY(-90deg) translateZ(30px); }
            .face-top { transform: rotateX(90deg) translateZ(30px); }
            .face-bottom { transform: rotateX(-90deg) translateZ(30px); }
            .dot { width: 8px; height: 8px; }
        }
        
        .total-area {
            text-align: center;
            margin-top: 10px;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            border: 1px solid rgba(255,170,68,0.3);
        }
        .total-label {
            font-size: 12px;
            color: #ffaa88;
            letter-spacing: 2px;
        }
        .total-number {
            font-size: 56px;
            font-weight: 900;
            color: #ffcc44;
            text-shadow: 0 0 15px #ff6600, 0 0 5px rgba(0,0,0,0.5);
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
        }
        .rolling-animation {
            animation: totalGlow 0.05s step-end infinite;
        }
        @keyframes totalGlow {
            0% { text-shadow: 0 0 5px #ffaa44; transform: scale(1); }
            50% { text-shadow: 0 0 25px #ff6600, 0 0 10px #ffcc00; color: #ffdd88; transform: scale(1.05); }
            100% { text-shadow: 0 0 5px #ffaa44; transform: scale(1); }
        }
        
        .bet-panel {
            background: rgba(0,0,0,0.4);
            margin: 16px;
            border-radius: 24px;
            padding: 16px;
            backdrop-filter: blur(8px);
        }
        
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,170,68,0.3);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #ffaa44, #ff6600);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .user-name {
            font-size: 14px;
            color: #ffaa44;
            font-weight: bold;
        }
        .btn-icon {
            background: rgba(255,170,68,0.2);
            border: 1px solid rgba(255,170,68,0.5);
            border-radius: 30px;
            padding: 6px 16px;
            color: #ffaa44;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.1s;
        }
        .btn-icon:active { transform: scale(0.95); background: rgba(255,170,68,0.4); }
        
        .points-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .point-card {
            background: linear-gradient(145deg, #1a2a1a, #0a1a0a);
            border-radius: 20px;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.08s linear;
            border: 1px solid rgba(255,170,68,0.3);
            position: relative;
            overflow: hidden;
        }
        .point-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,170,68,0.2), transparent);
            transition: left 0.3s;
        }
        .point-card:hover::before { left: 100%; }
        .point-card.selected {
            background: linear-gradient(145deg, #ff6600, #cc3300);
            transform: scale(0.97);
            border-color: #ffdd88;
            box-shadow: 0 0 15px rgba(255,102,0,0.5);
        }
        .point-value {
            font-size: 22px;
            font-weight: 900;
            color: #ffcc44;
        }
        .point-card.selected .point-value { color: #fff; }
        .point-odds {
            font-size: 11px;
            color: #88aa88;
            margin-top: 5px;
        }
        .point-card.selected .point-odds { color: #ffdd99; }
        
        .chips-area {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .chip {
            width: 65px;
            padding: 10px 0;
            background: radial-gradient(circle at 30% 30%, #ffcc44, #cc8800);
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.08s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5);
            border: 1px solid #ffdd88;
        }
        .chip:active { transform: scale(0.94); }
        .chip.chip-10 { background: radial-gradient(circle at 30% 30%, #4a90d9, #1a4a8a); }
        .chip.chip-20 { background: radial-gradient(circle at 30% 30%, #50b86a, #2a6a3a); }
        .chip.chip-50 { background: radial-gradient(circle at 30% 30%, #e85d3a, #aa2a1a); }
        .chip.chip-100 { background: radial-gradient(circle at 30% 30%, #9b59b6, #6c3483); }
        .chip.chip-500 { background: radial-gradient(circle at 30% 30%, #f1c40f, #d4a00a); color: #333; }
        .chip.chip-1000 { background: radial-gradient(circle at 30% 30%, #e74c3c, #c0392b); }
        
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }
        .stat-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255,170,68,0.2);
        }
        .stat-label {
            font-size: 11px;
            color: #88aa88;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffcc44;
            font-family: monospace;
        }
        
        .countdown-area {
            text-align: center;
            margin: 16px 0;
        }
        .countdown-label {
            font-size: 11px;
            color: #88aa88;
            letter-spacing: 2px;
        }
        .countdown-number {
            font-size: 32px;
            font-weight: bold;
            color: #ffaa44;
            font-family: monospace;
        }
        .countdown-warning {
            animation: countdownFlash 0.5s ease-in-out infinite;
            color: #ff3300 !important;
        }
        @keyframes countdownFlash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; text-shadow: 0 0 10px #ff3300; }
        }
        
        .history-area {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 12px;
            margin: 16px 0;
        }
        .history-header {
            font-size: 11px;
            color: #ffaa44;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .history-list {
            max-height: 100px;
            overflow-y: auto;
            font-size: 11px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            color: #ccc;
        }
        .history-win { color: #4caf50; font-weight: bold; }
        .history-lose { color: #f44336; }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .action-btn {
            flex: 1;
            padding: 14px;
            border-radius: 50px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            color: #ffaa44;
            border: 1px solid rgba(255,170,68,0.3);
            font-size: 14px;
            transition: all 0.08s;
        }
        .action-btn:active { transform: scale(0.97); }
        .action-btn-primary {
            background: linear-gradient(135deg, #ff6600, #cc3300);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(255,51,0,0.3);
        }
        
        .balance-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        .balance-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255,170,68,0.2);
        }
        .balance-label {
            font-size: 10px;
            color: #88aa88;
        }
        .balance-value {
            font-size: 22px;
            font-weight: bold;
            color: #ffcc44;
            font-family: monospace;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: linear-gradient(145deg, #1a2a1a, #0a1a0a);
            width: 85%;
            max-width: 340px;
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            color: white;
            border: 1px solid #ffaa44;
        }
        .modal-content button {
            background: linear-gradient(135deg, #ff6600, #cc3300);
            border: none;
            border-radius: 50px;
            padding: 10px 24px;
            margin-top: 16px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        .btn-highlight {
            animation: btnFlash 0.1s ease-out;
        }
        @keyframes btnFlash {
            0% { transform: scale(1); }
            50% { transform: scale(0.92); }
            100% { transform: scale(1); }
        }
        
        .history-list::-webkit-scrollbar {
            width: 3px;
        }
        .history-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #ffaa44;
            border-radius: 3px;
        }
    </style>
</head>
<body>
<div class="casino-table">
    <div class="gold-border">
        <div class="dice-stage">
            <div class="dice-title">⚡ SIC BO · 3D 骰 宝 ⚡</div>
            <div class="three-dice" id="diceContainer">
                <!-- 骰子1 -->
                <div class="dice-3d" id="dice1">
                    <div class="dice-face face-front"><div class="dot dot-center"></div></div>
                    <div class="dice-face face-back"><div class="dot dot-tl"></div><div class="dot dot-br"></div></div>
                    <div class="dice-face face-right"><div class="dot dot-tl"></div><div class="dot dot-center"></div><div class="dot dot-br"></div></div>
                    <div class="dice-face face-left"><div class="dot dot-tl"></div><div class="dot dot-tr"></div><div class="dot dot-bl"></div><div class="dot dot-br"></div></div>
                    <div class="dice-face face-top"><div class="dot dot-tl"></div><div class="dot dot-tr"></div><div class="dot dot-center"></div><div class="dot dot-bl"></div><div class="dot dot-br"></div></div>
                    <div class="dice-face face-bottom"><div class="dot dot-tl"></div><div class="dot dot-tr"></div><div class="dot dot-l2"></div><div class="dot dot-r2"></div><div class="dot dot-bl"></div><div class="dot dot-br"></div></div>
                </div>
                <!-- 骰子2 -->
                <div class="dice-3d" id="dice2">
                    <div class="dice-face face-front"><div class="dot dot-center"></div></div>
                    <div class="dice-face face-back"><div class="dot dot-tl"></div><div class="dot dot-br"></div></div>
                    <div class="dice-face face-right"><div class="dot dot-tl"></div><div class="dot dot-center"></div><div class="dot dot-br"></div></div>
                    <div class="dice-face face-left"><div class="dot dot-tl"></div><div class="dot dot-tr"></div><div class="dot dot-bl"></div><div class="dot dot-br"></div></div>
                    <div class="dice-face face-top"><div class="dot dot-tl"></div><div class="dot dot-tr"></div><div class="dot dot-center"></div><div class="dot dot-bl"></div><div class="dot dot-br"></div></div>
                    <div class="dice-face face-bottom"><div class="dot dot-tl"></div><div class="dot dot-tr"></div><div class="dot dot-l2"></div><div class="dot dot-r2"></div><div class="dot dot-bl"></div><div class="dot dot-br"></div></div>
                </div>
                <!-- 骰子3 -->
                <div class="dice-3d" id="dice3">
                    <div class="dice-face face-front"><div class="dot dot-center"></div></div>
                    <div class="dice-face face-back"><div class="dot dot-tl"></div><div class="dot dot-br"></div></div>
                    <div class="dice-face face-right"><div class="dot dot-tl"></div><div class="dot dot-center"></div><div class="dot dot-br"></div></div>
                    <div class="dice-face face-left"><div class="dot dot-tl"></div><div class="dot dot-tr"></div><div class="dot dot-bl"></div><div class="dot dot-br"></div></div>
                    <div class="dice-face face-top"><div class="dot dot-tl"></div><div class="dot dot-tr"></div><div class="dot dot-center"></div><div class="dot dot-bl"></div><div class="dot dot-br"></div></div>
                    <div class="dice-face face-bottom"><div class="dot dot-tl"></div><div class="dot dot-tr"></div><div class="dot dot-l2"></div><div class="dot dot-r2"></div><div class="dot dot-bl"></div><div class="dot dot-br"></div></div>

            </div>
            <div class="total-area">

                <div class="total-number" id="totalPoints">3</div>

        </div>

        <div class="bet-panel">
            <div class="user-bar">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-name" id="currentUserId">player888</div>

                    <button id="myHistoryBtn" class="btn-icon">📜 记录</button>
                    <button id="newUserBtn" class="btn-icon">✨ 新户</button>

            <div class="user-bar" style="margin-top: 0; padding: 6px 12px;">
                <input type="text" id="switchUserIdInput" placeholder="输入ID登录" style="flex:1; background:rgba(0,0,0,0.5); border:1px solid #ffaa44; border-radius:30px; padding:8px 12px; color:white; font-size:12px;">
                <button id="switchUserBtn" class="btn-icon" style="margin-left:8px;">登录</button>
            </div>

            <div class="points-grid" id="pointsGrid"></div>

            <div class="chips-area">
                <div class="chip chip-10" data-amount="10">10</div>
                <div class="chip chip-20" data-amount="20">20</div>

            <div class="stats-row">

                <div class="stat-card">
                    <div class="stat-label">选中点数</div>
                    <div class="stat-value" id="selectedPoint">-</div>
                </div>
            </div>

            <div class="countdown-area">
                <div class="countdown-label">下注倒计时</div>
                <div class="countdown-number" id="countdownNum">25</div>

            <div class="history-area">
                <div class="history-header">📋 最近开奖记录</div>
                <div class="history-list" id="historyList"></div>
            </div>

            <div class="action-buttons">
                <button class="action-btn" id="cancelBtn">取消</button>
                <button class="action-btn" id="refreshBtn">刷新</button>
                <button class="action-btn action-btn-primary" id="fightBtn">确认投注</button>
            </div>

            <div class="balance-bar">
                <div class="balance-card">
                    <div class="balance-label">💰 账户余额</div>
                    <div class="balance-value" id="balanceDisplay">1000.00</div>
                </div>
                <div class="balance-card">
                    <div class="balance-label">🎰 奖池累积</div>
                    <div class="balance-value" id="poolDisplay">50000.00</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function(){
    // 赔率表
    const oddsMap = {
        4: 60, 5: 30, 6: 18, 7: 12, 8: 8, 9: 7, 10: 6,
        11: 6, 12: 7, 13: 8, 14: 12, 15: 18, 16: 30, 17: 60
    };
    
    // 用户数据
    let users = JSON.parse(localStorage.getItem('sicbo_users')) || {};
    let CURRENT_USER_ID = "player888";
    if (!users[CURRENT_USER_ID]) {
        users[CURRENT_USER_ID] = { balance: 1000.00, records: [] };
        localStorage.setItem('sicbo_users', JSON.stringify(users));
    }
    
    function saveUsers() { localStorage.setItem('sicbo_users', JSON.stringify(users)); }
    function getBalance(uid) { if (!users[uid]) users[uid] = { balance: 1000.00, records: [] }; return users[uid].balance; }
    function setBalance(uid, amt) { if (!users[uid]) users[uid] = { balance: 1000.00, records: [] }; users[uid].balance = amt; saveUsers(); }
    function generateRandomId() { return "player_" + Math.floor(Math.random() * 1000000); }

    // 游戏状态
    let state = {
        balance: getBalance(CURRENT_USER_ID),
        selectedPoint: null,
        betAmount: 0,
        countdown: 25,
        countdownInterval: null,
        isDrawing: false
    };
    let isBetLocked = false;
    
    // 获取骰子元素
    const diceElements = [
        document.getElementById('dice1'),
        document.getElementById('dice2'),
        document.getElementById('dice3')
    ];
    
    // 骰子面配置：每个数字对应的旋转角度
    // 为了让指定数字朝上，需要设置骰子的旋转
    function setDiceValue(diceEl, value) {
        // 根据骰子值设置不同的旋转角度，让对应数字的面朝上
        // 默认正面是1点
        const rotations = {
            1: 'rotateX(0deg) rotateY(0deg)',           // 1点朝上
            2: 'rotateX(-90deg) rotateY(0deg)',          // 2点朝上
            3: 'rotateX(0deg) rotateY(90deg)',           // 3点朝上
            4: 'rotateX(0deg) rotateY(-90deg)',          // 4点朝上
            5: 'rotateX(90deg) rotateY(0deg)',           // 5点朝上
            6: 'rotateX(180deg) rotateY(0deg)'           // 6点朝上
        };
        diceEl.style.transform = rotations[value] || rotations[1];
    }
    
    // 随机滚动动画
    let rollingInterval = null;
    function startDiceRolling(final1, final2, final3, finalTotal, winAmount) {
        const totalEl = document.getElementById('totalPoints');
        
        if (rollingInterval) clearInterval(rollingInterval);
        
        // 添加滚动类
        diceElements.forEach(el => el.classList.add('dice-rolling-3d'));
        totalEl.classList.add('rolling-animation');
        
        let step = 0;
        const steps = 25;
        
        rollingInterval = setInterval(() => {
            step++;
            // 随机显示点数
            const r1 = Math.floor(Math.random() * 6) + 1;
            const r2 = Math.floor(Math.random() * 6) + 1;
            const r3 = Math.floor(Math.random() * 6) + 1;
            setDiceValue(diceElements[0], r1);
            setDiceValue(diceElements[1], r2);
            setDiceValue(diceElements[2], r3);
            totalEl.innerText = r1 + r2 + r3;
            
            if (step >= steps) {
                clearInterval(rollingInterval);
                rollingInterval = null;
                diceElements.forEach(el => el.classList.remove('dice-rolling-3d'));
                totalEl.classList.remove('rolling-animation');
                
                // 显示最终结果
                setDiceValue(diceElements[0], final1);
                setDiceValue(diceElements[1], final2);
                setDiceValue(diceElements[2], final3);
                totalEl.innerText = finalTotal;
                
                if (winAmount > 0) {
                    totalEl.style.color = '#4caf50';
                    totalEl.style.textShadow = '0 0 20px #4caf50';
                    setTimeout(() => {
                        totalEl.style.color = '#ffcc44';
                        totalEl.style.textShadow = '0 0 15px #ff6600';
                    }, 2000);
                } else {
                    totalEl.style.color = '#f44336';
                    setTimeout(() => {
                        totalEl.style.color = '#ffcc44';
                    }, 2000);
                }
            }
        }, 60);
    }

    // 开奖
    function executeDraw() {
        if (state.isDrawing) return;
        state.isDrawing = true;
        isBetLocked = true;
        
        const d1 = Math.floor(Math.random() * 6) + 1;
        const d2 = Math.floor(Math.random() * 6) + 1;
        const d3 = Math.floor(Math.random() * 6) + 1;
        const total = d1 + d2 + d3;
        
        let win = 0;
        let isWin = false;
        if (state.selectedPoint !== null && state.selectedPoint === total) {
            const odds = oddsMap[total];
            win = state.betAmount * odds;
            isWin = true;
        }
        
        startDiceRolling(d1, d2, d3, total, win);
        
        const newBalance = state.balance - state.betAmount + win;
        setBalance(CURRENT_USER_ID, newBalance);
        state.balance = newBalance;
        
        let recs = users[CURRENT_USER_ID].records || [];
        recs.unshift({
            time: new Date().toLocaleTimeString(),
            point: state.selectedPoint,
            bet: state.betAmount,
            result: total,
            win: win,
            isWin: isWin
        });
        if (recs.length > 30) recs.pop();
        users[CURRENT_USER_ID].records = recs;
        saveUsers();
        refreshHistory();
        updateUI();
        
        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(isWin ? [100, 50, 100] : 80);
        
        setTimeout(() => {
            state.selectedPoint = null;
            state.betAmount = 0;
            state.isDrawing = false;
            updateUI();
            document.querySelectorAll('.point-card').forEach(c => c.classList.remove('selected'));
            startCountdown(25);
        }, 4800);
    }

    function placeBet() {
        if (state.isDrawing || isBetLocked) {
            showModal("开奖进行中，请稍候...", "好的");
            return;
        }
        if (state.selectedPoint === null) {
            showModal("请先选择一个点数下注", "好的");
            return;
        }
        if (state.betAmount <= 0) {
            showModal("请先选择筹码金额", "好的");
            return;
        }
        if (state.betAmount > state.balance) {
            showModal("余额不足！当前余额：" + state.balance.toFixed(2), "知道了");
            return;
        }
        
        clearCountdown();
        executeDraw();
    }

    function addBet(amount) {
        if (state.isDrawing || isBetLocked) return;
        state.betAmount += amount;
        if (state.betAmount < 0) state.betAmount = 0;
        updateUI();
        flashButton(document.querySelector(`.chip[data-amount="${amount}"]`));
    }

    function selectPoint(point) {
        if (state.isDrawing || isBetLocked) return;
        state.selectedPoint = point;
        updateUI();
        document.querySelectorAll('.point-card').forEach(card => {
            if (parseInt(card.dataset.point) === point) {
                card.classList.add('selected');
            } else {
                card.classList.remove('selected');
            }
        });
        flashButton(document.querySelector(`.point-card[data-point="${point}"]`));
    }

    function cancelBet() {
        if (state.isDrawing || isBetLocked) return;
        state.selectedPoint = null;
        state.betAmount = 0;
        updateUI();
        document.querySelectorAll('.point-card').forEach(c => c.classList.remove('selected'));
        flashButton(document.getElementById('cancelBtn'));
    }

    function refreshBalance() {
        state.balance = getBalance(CURRENT_USER_ID);
        updateUI();
        flashButton(document.getElementById('refreshBtn'));
    }

    function updateUI() {
        document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
        document.getElementById('currentBetAmount').innerText = state.betAmount;
        document.getElementById('selectedPoint').innerText = state.selectedPoint !== null ? state.selectedPoint : '-';
        let pool = 50000 + (Math.random() - 0.5) * 3000;
        pool = Math.max(40000, Math.min(60000, pool));
        document.getElementById('poolDisplay').innerText = pool.toFixed(2);
    }

    function refreshHistory() {
        const container = document.getElementById('historyList');
        if (!container) return;
        const recs = users[CURRENT_USER_ID]?.records || [];
        container.innerHTML = '';
        if (recs.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#666; padding:10px;">暂无记录</div>';
            return;
        }
        recs.slice(0, 12).forEach(r => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${r.time}</span>
                            <span>押${r.point}点 ${r.bet}</span>
                            <span>开${r.result}点</span>
                            <span class="${r.isWin ? 'history-win' : 'history-lose'}">${r.isWin ? `+${r.win}` : `-${r.bet}`}</span>`;
            container.appendChild(div);
        });
    }

    function startCountdown(sec) {
        if(state.countdownInterval) clearInterval(state.countdownInterval);
        state.countdown = sec;
        const cdSpan = document.getElementById('countdownNum');
        cdSpan.innerText = state.countdown;
        cdSpan.classList.remove('countdown-warning');
        
        isBetLocked = false;
        
        state.countdownInterval = setInterval(() => {
            if(state.countdown <= 1){
                clearInterval(state.countdownInterval);
                state.countdownInterval = null;
                isBetLocked = true;
                if (state.selectedPoint !== null && state.betAmount > 0 && state.betAmount <= state.balance) {
                    placeBet();
                } else {
                    startCountdown(25);
                }
            } else {
                state.countdown--;
                cdSpan.innerText = state.countdown;
                if(state.countdown <= 5) {
                    cdSpan.classList.add('countdown-warning');
                }
            }
        }, 1000);
    }

    function clearCountdown() { if(state.countdownInterval){ clearInterval(state.countdownInterval); state.countdownInterval=null; } }

    function switchUser() {
        if(state.isDrawing) return;
        const newId = document.getElementById('switchUserIdInput').value.trim();
        if(!newId) return;
        CURRENT_USER_ID = newId;
        if (!users[CURRENT_USER_ID]) { users[CURRENT_USER_ID] = { balance: 1000.00, records: [] }; saveUsers(); }
        document.getElementById('currentUserId').innerText = CURRENT_USER_ID;
        state.balance = getBalance(CURRENT_USER_ID);
        state.selectedPoint = null;
        state.betAmount = 0;
        state.isDrawing = false;
        isBetLocked = false;
        updateUI();
        clearCountdown();
        startCountdown(25);
        refreshHistory();
        document.querySelectorAll('.point-card').forEach(c => c.classList.remove('selected'));
    }

    function showModal(msg, btnText) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>🎲 至尊骰宝</h3><p style="margin:15px 0;">${msg}</p><button id="modalCloseBtn">${btnText}</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('modalCloseBtn').onclick = () => modal.remove();
    }

    function flashButton(btn) {
        if(!btn) return;
        btn.classList.add('btn-highlight');
        setTimeout(() => btn.classList.remove('btn-highlight'), 150);
        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(15);
    }

    function showHistory() {
        const recs = users[CURRENT_USER_ID]?.records || [];
        let html = `<div style="max-height:350px; overflow-y:auto; text-align:left;">`;
        if (recs.length === 0) html += "<p style='text-align:center;'>暂无记录</p>";
        else {
            recs.slice(0, 40).forEach(r => {
                html += `<div style="padding:8px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
                            <span>${r.time}</span>
                            <span>押${r.point}点 ${r.bet}</span>
                            <span>开${r.result}点</span>
                            <span style="color:${r.isWin?'#4caf50':'#f44336'}">${r.isWin ? `+${r.win}` : `-${r.bet}`}</span>
                         </div>`;
            });
        }
        html += `</div><button id="closeHistoryBtn" style="margin-top:16px;">关闭</button>`;
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>📜 投注记录</h3>${html}</div>`;
        document.body.appendChild(modal);
        document.getElementById('closeHistoryBtn').onclick = () => modal.remove();
    }

    function createPointsGrid() {
        const grid = document.getElementById('pointsGrid');
        grid.innerHTML = '';
        for (let i = 4; i <= 17; i++) {
            const odds = oddsMap[i];
            const card = document.createElement('div');
            card.className = 'point-card';
            card.dataset.point = i;
            card.innerHTML = `<div class="point-value">${i}</div>
                             <div class="point-odds">赔 ${odds}倍</div>`;
            card.onclick = () => selectPoint(i);
            grid.appendChild(card);
        }
    }

    function bindEvents() {
        document.getElementById('refreshBtn').onclick = refreshBalance;
        document.getElementById('cancelBtn').onclick = cancelBet;
        document.getElementById('fightBtn').onclick = placeBet;
        document.getElementById('switchUserBtn').onclick = switchUser;
        document.getElementById('myHistoryBtn').onclick = showHistory;
        document.getElementById('newUserBtn').onclick = () => {
            const newId = generateRandomId();
            document.getElementById('switchUserIdInput').value = newId;
            switchUser();
            showModal(`新账户创建成功！<br>ID: ${newId}<br>初始余额: 1000.00`, "开始游戏");
        };
        
        document.querySelectorAll('.chip').forEach(chip => {
            chip.onclick = () => {
                const amount = parseInt(chip.dataset.amount);
                addBet(amount);
            };
        });
    }

    // 初始化骰子为1点
    function initDice() {
        setDiceValue(diceElements[0], 1);
        setDiceValue(diceElements[1], 1);
        setDiceValue(diceElements[2], 1);
    }

    function init() {
        initDice();
        createPointsGrid();
        bindEvents();
        updateUI();
        refreshHistory();
        startCountdown(25);
        
        if (!localStorage.getItem('sicbo_first')) {
            localStorage.setItem('sicbo_first', 'true');
            setTimeout(() => {
                showModal("🎲 3D至尊骰宝\n\n• 4-17点可选，不同点数赔率不同\n• 4点和17点赔率最高60倍\n• 25秒下注时间\n• 开奖有3D骰子旋转动画\n\n祝您好运！", "进入游戏");
            }, 500);
        }
    }
    
    init();
})();
</script>
</body>
</html>
