<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_STRUCTURE_FINAL</title>
    <style>
        :root {
            --dark-green: #1a261f;   /* 墨绿色 */
            --green-border: #2d3e34; /* 边框墨绿 */
            --stone-grey: #2c322f;  /* 清石灰 */
            --grid-line: rgba(255,255,255,0.03);
            --red-num: #ff3e3e;
            --gold: #f1c40f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { 
            background: var(--dark-green); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        /* 3mm 墨绿色平行立体外包围 */
        .outer-frame {
            width: 100vw;
            height: 100vh;
            border: 3px solid var(--green-border);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            background: var(--stone-grey);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            /* 网格布局布局覆盖整个内陷背景 */
            background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 2mm 墨绿色隔离横条 */
        .divider {
            height: 2px;
            background: var(--green-border);
            box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            width: 100%;
        }

        /* 上方八分之一区域 */
        .top-section {
            height: 12.5%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px;
            align-items: center;
        }
        .inset-panel {
            background: #1e2421;
            border: 1px solid #111;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
            border-radius: 8px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10px;
        }
        .label { font-size: 10px; color: #668877; }
        .val { font-size: 18px; color: var(--red-num); font-weight: bold; }
        .pool { color: var(--gold) !important; }

        /* 中间八分之四区域：转盘 */
        .mid-section {
            height: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .pointer { 
            position: absolute; top: 10px; z-index: 10; 
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ff0000;
        }
        #wheel { 
            width: 280px; height: 280px; border-radius: 50%; border: 10px solid var(--dark-green);
            background: #1a221e; position: relative; transition: transform 4s cubic-bezier(0.15, 0, 0.2, 1.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .slot { position: absolute; width: 100%; height: 100%; text-align: center; padding-top: 25px; font-size: 24px; }
        .hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; background: #0a0e0c; border-radius: 50%; border: 2px solid var(--green-border); z-index: 5; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 14px; font-weight: bold; }

        /* 下方操作区域 */
        .bottom-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 15px;
            background: rgba(0,0,0,0.2);
        }
        .main-btn-row {
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            gap: 10px;
            height: 60px;
        }
        .btn-adj { background: var(--dark-green); border: 1px solid var(--green-border); border-radius: 10px; color: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        .btn-go { background: linear-gradient(180deg, #c0392b, #8e2121); border: none; border-radius: 30px; color: #fff; font-size: 20px; font-weight: bold; box-shadow: 0 4px 0 #5e1616; }
        
        .sub-btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            height: 50px;
        }
        .btn-func { background: #1a221e; border: 1px solid var(--green-border); border-radius: 8px; color: #8aa095; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .active { border-color: var(--gold); color: #fff; box-shadow: 0 0 10px rgba(241,196,15,0.2); }

        .blur { filter: blur(2px); }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="top-section">
        <div class="inset-panel">
            <span class="label">BALANCE (USDT)</span>
            <span class="val" id="ui-bal">146.80</span>
        </div>
        <div class="inset-panel">
            <span class="label">NETWORK POOL</span>
            <span class="val pool" id="ui-pool">84,291.50</span>
        </div>
    </div>

    <div class="divider"></div>

    <div class="mid-section">
        <div class="pointer"></div>
        <div id="wheel"></div>
        <div class="hub" id="ui-hub">READY</div>
    </div>

    <div class="divider"></div>

    <div class="bottom-section">
        <div class="main-btn-row">
            <div class="btn-adj" onclick="App.adjBet(-1)">−</div>
            <button class="btn-go" onclick="App.roll()" id="btn-go">EXECUTE</button>
            <div class="btn-adj" onclick="App.adjBet(1)">+</div>
        </div>
        
        <div style="text-align: center; color: var(--gold); font-size: 12px; font-weight: bold;">
            STAKE: <span id="ui-bet">5.5</span>
        </div>

        <div class="sub-btn-row">
            <div class="btn-func" onclick="App.toggleAuto()" id="opt-auto">🤖 AUTO: <b>OFF</b></div>
            <div class="btn-func" onclick="App.toggleSpeed()" id="opt-speed">⚡ SPEED: <b>1X</b></div>
        </div>
    </div>
</div>

<script>
const App = {
    bets: [5.5, 10.0, 50.0, 100.0, 500.0],
    icons: ['💎','💊','⚡','🔥','💰','🦁','🏆','🎲'],
    state: { bal: 146.80, betIdx: 0, deg: 0, isRolling: false, auto: false, speed: 1 },

    init() {
        const wheel = document.getElementById('wheel');
        this.icons.forEach((s, i) => {
            const el = document.createElement('div');
            el.className = 'slot';
            el.style.transform = `rotate(${i * 45}deg)`;
            el.innerText = s;
            wheel.appendChild(el);
        });
        setInterval(() => { // 联网彩金池跳动
            const pool = parseFloat(document.getElementById('ui-pool').innerText.replace(',',''));
            document.getElementById('ui-pool').innerText = (pool + Math.random()).toLocaleString(undefined, {minimumFractionDigits: 2});
        }, 3000);
        this.updateUI();
    },

    adjBet(dir) {
        if(this.state.isRolling) return;
        this.state.betIdx = Math.max(0, Math.min(this.bets.length-1, this.state.betIdx + dir));
        this.updateUI();
    },

    toggleSpeed() {
        this.state.speed = (this.state.speed % 3) + 1; // 1X, 2X, 3X
        const dur = {1: '4s', 2: '2s', 3: '0.8s'}[this.state.speed];
        document.getElementById('wheel').style.transitionDuration = dur;
        this.updateUI();
    },

    toggleAuto() {
        this.state.auto = !this.state.auto;
        if(this.state.auto && !this.state.isRolling) this.roll();
        this.updateUI();
    },

    async roll() {
        const cost = this.bets[this.state.betIdx];
        if(this.state.isRolling || this.state.bal < cost) {
            this.state.auto = false; this.updateUI(); return;
        }

        this.state.isRolling = true;
        this.state.bal -= cost;
        document.getElementById('ui-hub').innerText = "ROLLING";
        document.getElementById('wheel').classList.add('blur');
        this.updateUI();

        const winIdx = Math.floor(Math.random() * 8);
        const rounds = this.state.speed === 1 ? 8 : (this.state.speed === 2 ? 5 : 3);
        const targetDeg = (360 - (this.state.deg % 360)) + (rounds * 360) - (winIdx * 45);
        this.state.deg += targetDeg;
        
        document.getElementById('wheel').style.transform = `rotate(${this.state.deg}deg)`;

        const times = {1: 4000, 2: 2000, 3: 800};
        setTimeout(() => {
            document.getElementById('wheel').classList.remove('blur');
            this.state.isRolling = false;
            const isWin = Math.random() > 0.7;
            if(isWin) {
                this.state.bal += cost * 2.5;
                document.getElementById('ui-hub').innerText = "WIN";
            } else {
                document.getElementById('ui-hub').innerText = "X0";
            }
            this.updateUI();
            if(this.state.auto) setTimeout(() => this.roll(), 500);
        }, times[this.state.speed]);
    },

    updateUI() {
        document.getElementById('ui-bal').innerText = this.state.bal.toFixed(2);
        document.getElementById('ui-bet').innerText = this.bets[this.state.betIdx].toFixed(1);
        document.getElementById('opt-auto').className = this.state.auto ? "btn-func active" : "btn-func";
        document.getElementById('opt-auto').querySelector('b').innerText = this.state.auto ? "ON" : "OFF";
        document.getElementById('opt-speed').querySelector('b').innerText = this.state.speed + "X";
        document.getElementById('btn-go').disabled = this.state.isRolling;
    }
};

App.init();
</script>
</body>
</html>
