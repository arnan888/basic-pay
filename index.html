<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA 旗舰量化终端</title>
    <style>
        /* 1. 全局科技网格背景 */
        body { 
            background: #0b0f0d; color: #fff; font-family: sans-serif; margin: 0; 
            background-image: linear-gradient(rgba(45, 62, 52, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(45, 62, 52, 0.2) 1px, transparent 1px);
            background-size: 25px 25px; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 2. 0.00 余额展示区 */
        .card { background: #161b22; margin: 15px; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #30363d; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .bal-title { color: #8b949e; font-size: 13px; margin-bottom: 10px; }
        .bal-val { font-size: 60px; color: #ff5a5a; font-weight: bold; }
        .bet-info { color: #f1c40f; font-size: 13px; margin-top: 5px; }

        /* 3. 8奖项转盘复刻 */
        .wheel-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #wheel { 
            width: 310px; height: 310px; border-radius: 50%; border: 12px solid #233129;
            background: conic-gradient(#ff4d4d 0 45deg, #f1c40f 45deg 90deg, #3498db 90deg 135deg, #9b59b6 135deg 180deg, #2ecc71 180deg 225deg, #e67e22 225deg 270deg, #1abc9c 270deg 315deg, #444 315deg 360deg);
            transition: transform 5s cubic-bezier(0.1, 0.9, 0.3, 1); position: relative;
        }
        #wheel::after { content: "X0"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 75px; height: 75px; background: #161b22; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ff5a5a; font-weight: bold; font-size: 22px; border: 4px solid #233129; }
        .pointer { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 30px solid #ff0000; z-index: 10; }
        .tag { position: absolute; width: 100%; height: 100%; text-align: center; font-size: 11px; font-weight: bold; padding-top: 25px; box-sizing: border-box; color: #fff; text-shadow: 1px 1px 2px #000; }

        /* 4. 底部执行按钮 */
        .footer { background: #4a1414; padding: 25px; text-align: center; border-top: 2px solid #631b1b; }
        .btn-play { background: #ff4d4d; color: #fff; padding: 18px 85px; border-radius: 40px; font-size: 24px; font-weight: bold; border: none; box-shadow: 0 5px 0 #b33636; }
        .nav { display: flex; justify-content: space-around; padding: 12px; background: #000; font-size: 11px; color: #8aa095; }
    </style>
</head>
<body>

    <div class="card">
        <div class="bal-title">💰 可用余额 (USDT)</div>
        <div class="bal-val">0.00</div>
        <div class="bet-info">🔥 单注额度: 5.5</div>
    </div>

    <div class="wheel-area">
        <div class="pointer"></div>
        <div id="wheel">
            <div class="tag" style="transform:rotate(22.5deg)">🐺 孤狼</div>
            <div class="tag" style="transform:rotate(67.5deg)">🦢 仙鹤</div>
            <div class="tag" style="transform:rotate(112.5deg)">🐢 玄武</div>
            <div class="tag" style="transform:rotate(157.5deg)">🦅 大鹏</div>
            <div class="tag" style="transform:rotate(202.5deg)">🐯 猛虎</div>
            <div class="tag" style="transform:rotate(247.5deg)">🦄 麒麟</div>
            <div class="tag" style="transform:rotate(292.5deg)">🐲 神龙</div>
            <div class="tag" style="transform:rotate(337.5deg)">🔥 凤凰</div>
        </div>
    </div>

    <div class="footer"><button class="btn-play" onclick="alert('余额不足，请联系客服')">▶ 执行抽取</button></div>
    <div class="nav"><span>📈 行情</span><span>💹 资产中心</span><span>📜 历史记录</span><span style="color:#fff">🎚️ 量化终端</span></div>

</body>
</html>
