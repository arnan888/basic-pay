<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>双游戏大厅 | 系统坐庄+自动开奖 | 真实在线人数</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #1a120c; background-image: radial-gradient(circle at 20% 30%, rgba(200,140,70,0.15) 10%, transparent 5.5%); background-size: 28px 28px; font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif; padding: 12px; }
        .app { max-width: 550px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .game-nav { background: linear-gradient(145deg, #2a241e 5%, #1f1a15 100%); border-radius: 60px; padding: 6px; display: flex; gap: 8px; border: 1px solid #ffaa44; flex-wrap: wrap; }
        .game-tab { flex: 1; background: transparent; border: none; padding: 10px 0; border-radius: 50px; font-weight: bold; font-size: 0.9rem; color: #ccaa77; cursor: pointer; transition: 0.2s; text-align: center; }
        .game-tab.active { background: #c47c3a; color: #2f1b0a; box-shadow: 0 2px 6px rgba(0,0,0,0.9); }
        .user-section { background: #1f1711; border-radius: 40px; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
        .user-info-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .user-info-row span { color: #ffdd99; font-size: 0.9rem; font-weight: bold; }
        #userBalanceDisplay { font-size: 1.5rem; font-weight: 800; color: #ffaa44; background: #0a0705; padding: 2px 12px; border-radius: 40px; letter-spacing: 1px; }
        .btn-group { display: flex; gap: 8px; }
        .logout-btn, .service-btn { background: #734c2e; border: none; padding: 6px 14px; border-radius: 30px; color: #ffe3b3; font-size: 0.8rem; cursor: pointer; font-weight: bold; }
        .service-btn { background: #2e7d32; }
        .charge-withdraw-row { display: flex; gap: 10px; justify-content: center; }
        .charge-btn, .withdraw-btn { background: #c47c3a; border: none; padding: 8px 20px; border-radius: 40px; color: #2f1b0a; font-weight: bold; font-size: 0.9rem; cursor: pointer; flex: 1; text-align: center; box-shadow: 0 2px 0 #764e26; }
        .withdraw-btn { background: #734c2e; color: #ffe3b3; box-shadow: 0 2px 0 #3f2a1a; }
        .game-container { background: linear-gradient(145deg, #362a1f 0%, #251e16 100%); border-radius: 48px; box-shadow: 0 12px 25px rgba(0,0,0,0.3); overflow: hidden; min-height: 580px; }
        .auth-panel { background: linear-gradient(145deg, #362a1f 0%, #251e16 100%); border-radius: 48px; padding: 30px 20px; text-align: center; border: 2px solid #ffaa44; }
        .auth-panel h2 { color: #ffdd99; font-size: 1.8rem; margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 14px; margin: 10px 0; background: #2a241e; border: 1px solid #ffaa44; border-radius: 60px; color: white; font-size: 1rem; text-align: center; }
        .auth-buttons { display: flex; gap: 12px; margin: 20px 0; }
        .auth-btn { flex: 1; background: #c47c3a; border: none; padding: 12px; border-radius: 60px; color: #2f1b0a; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .auth-note { color: #aa8855; font-size: 0.75rem; }
        .chip { background: #ebbc7e; color: #3a240f; font-weight: bold; font-size: 1rem; padding: 6px 16px; border-radius: 40px; cursor: pointer; box-shadow: 0 2px 0 #8b5a2e; display: inline-block; transition: 0.05s linear; }
        .chip.selected { background: #f7c56e; box-shadow: 0 0 0 2px #ffefb0, 0 2px 0 #7a4b22; transform: scale(1.02); }
        .bet-card { background: #1f1712; border-radius: 28px; padding: 8px 4px; text-align: center; box-shadow: 0 2px 0 #0a0705; border: 1px solid #6f4f34; cursor: pointer; }
        .bet-name { font-size: 0.9rem; font-weight: bold; color: #ffddb0; }
        .bet-odds { font-size: 0.7rem; color: #dba959; }
        .bet-amount { background: #0c0907; border-radius: 40px; padding: 4px 6px; margin-top: 6px; font-size: 1rem; font-weight: bold; color: #ffaa44; text-align: center; }
        .btn-chip { background: #523b26; border: none; color: #fce2b4; width: 32px; height: 32px; border-radius: 30px; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        .grab-btn { background: #ffaa44; color: #2f1b0a; border: none; padding: 8px 24px; border-radius: 40px; font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .online-count-box { background: #2a1f16; margin: 12px; padding: 10px 16px; border-radius: 60px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; color: #ffdd99; border: 1px solid #ffaa44; }
        .online-number { font-size: 1.3rem; font-weight: bold; color: #ffaa44; margin-left: 8px; }
        .dice { width: 60px; height: 60px; position: relative; transform-style: preserve-3d; }
        .dice-face { position: absolute; width: 60px; height: 60px; background: linear-gradient(145deg, #fffff0, #f5f5dc); border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(200,180,120,0.5); }
        .front { transform: translateZ(30px); }
        .back { transform: rotateY(180deg) translateZ(30px); }
        .right { transform: rotateY(90deg) translateZ(30px); }
        .left { transform: rotateY(-90deg) translateZ(30px); }
        .top { transform: rotateX(90deg) translateZ(30px); }
        .bottom { transform: rotateX(-90deg) translateZ(30px); }
        .pip { position: absolute; width: 10px; height: 10px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #e74c3c, #c0392b); }
        .pip-center { top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { top: 20%; left: 20%; }
        .pip-tr { top: 20%; right: 20%; }
        .pip-bl { bottom: 20%; left: 20%; }
        .pip-br { bottom: 20%; right: 20%; }
        .pip-mid { top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1 { left: 20%; top: 15%; }
        .pip-l2 { left: 20%; top: 50%; transform: translateY(-50%); }
        .pip-l3 { left: 20%; bottom: 15%; }
        .pip-r1 { right: 20%; top: 15%; }
        .pip-r2 { right: 20%; top: 50%; transform: translateY(-50%); }
        .pip-r3 { right: 20%; bottom: 15%; }
        .result-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.6); background: linear-gradient(145deg, #ffcc44, #ff9933); color: #1a1a2a; padding: 20px 40px; border-radius: 80px; font-size: 2rem; font-weight: 900; z-index: 2000; opacity: 0; transition: 0.2s; pointer-events: none; white-space: nowrap; }
        .result-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .result-popup.win { background: linear-gradient(145deg, #ffcc44, #ffaa22); }
        .result-popup.lose { background: linear-gradient(145deg, #555, #333); color: #ffaa66; }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #000000cc; color: #ffaa44; padding: 10px 20px; border-radius: 50px; z-index: 2001; animation: fadeInOut 2s forwards; font-size: 0.9rem; font-weight: bold; }
        @keyframes fadeInOut { 0% { opacity:0; transform: translateX(-50%) translateY(20px); } 15% { opacity:1; transform: translateX(-50%) translateY(0); } 85% { opacity:1; } 100% { opacity:0; transform: translateX(-50%) translateY(-20px); } }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: #1a2a1a; border-radius: 48px; padding: 24px; border: 2px solid #ffaa44; width: 90%; max-width: 600px; text-align: center; color: #ffdd99; max-height: 80vh; overflow-y: auto; }
        .qr-img { width: 160px; height: 160px; margin: 10px auto; display: block; background: white; border-radius: 20px; padding: 8px; object-fit: contain; }
        .points-grid, .trio-grid, .special-grid { display: grid; gap: 10px; margin-bottom: 15px; }
        .points-grid { grid-template-columns: repeat(4,1fr); }
        .trio-grid { grid-template-columns: repeat(4,1fr); }
        .special-grid { grid-template-columns: repeat(4,1fr); }
        .countdown-warning { animation: warningPulse 0.5s infinite; color: #ff3300 !important; }
        @keyframes warningPulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
        .fish-dice-item { background: #fff2df; width: 70px; height: 70px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; box-shadow: 0 4px 0 #aa8b60; }
        .fish-wrapper .bet-icon { font-size: 1.8rem; background: #2f231c; width: 48px; height: 48px; line-height: 48px; margin: 0 auto 6px; border-radius: 50%; }
        .fish-wrapper .bet-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
        @media (max-width: 480px) { .dice { width: 50px; height: 50px; } .dice-face { width: 50px; height: 50px; } .front { transform: translateZ(25px); } .back { transform: rotateY(180deg) translateZ(25px); } .right { transform: rotateY(90deg) translateZ(25px); } .left { transform: rotateY(-90deg) translateZ(25px); } .top { transform: rotateX(90deg) translateZ(25px); } .bottom { transform: rotateX(-90deg) translateZ(25px); } .fish-dice-item { width: 55px; height: 55px; font-size: 2.2rem; } #userBalanceDisplay { font-size: 1.2rem; } }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ==================== 全局存储 ====================
const USERS_KEY = 'game_hall_v8';
let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
let currentUser = null;
let validReferralCodes = JSON.parse(localStorage.getItem('valid_referral_codes')) || ['VIP888', 'ABC123', 'GAME2024', 'TEST001'];
let adminPassword = localStorage.getItem('admin_pwd') || 'admin123';

// 系统庄家资金（独立存储）
let systemBankerBalance = localStorage.getItem('system_banker_balance') ? parseFloat(localStorage.getItem('system_banker_balance')) : 100000;

function saveSystemBanker() { localStorage.setItem('system_banker_balance', systemBankerBalance); }
function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersData)); }
function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0; }
function setUserBalance(amt) { if(currentUser) { usersData[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }
function showToast(msg) {
    let t = document.createElement('div');
    t.className = 'toast-message';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}

// ==================== 真实在线人数（对接后端8090）====================
let onlineInterval = null;
function startRealOnlineCount() {
    if (onlineInterval) clearInterval(onlineInterval);
    const updateOnline = () => {
        const span = document.getElementById('onlineCount');
        if (!span) return;
        fetch('http://127.0.0.1:8090/getOnlineCount', {
            method: 'GET',
            mode: 'cors',
            cache: 'no-cache'
        })
        .then(res => res.json())
        .then(data => {
            let count = data?.count ?? data?.online;
            if (typeof count === 'number' && !isNaN(count)) {
                span.innerText = count;
            } else {
                span.innerText = '--';
            }
        })
        .catch(err => {
            console.warn('获取在线人数失败:', err);
            span.innerText = '--';
        });
    };
    updateOnline();
    onlineInterval = setInterval(updateOnline, 5000);
}

// ==================== 客服与充值弹窗（使用您的二维码图片）====================
function showServiceModal() {
    let m = document.createElement('div');
    m.className = 'modal';
    m.innerHTML = `
        <div class="modal-content">
            <h3>📞 客服微信</h3>
            <img src="mmexport1776247823872.jpg" class="qr-img" alt="客服微信" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%AE%A2%E6%9C%8D%E5%BE%AE%E4%BF%A1%3C/text%3E%3C/svg%3E'">
            <p style="margin-top:10px;">微信号: game_kf_888</p>
            <button id="closeSvc" style="background:#c47c3a; margin-top:15px; padding:8px 20px; border-radius:40px;">关闭</button>
        </div>
    `;
    document.body.appendChild(m);
    m.querySelector('#closeSvc').onclick = () => m.remove();
}

function showRechargeModal() {
    let m = document.createElement('div');
    m.className = 'modal';
    m.innerHTML = `
        <div class="modal-content">
            <h3>💎 充值</h3>
            <p style="margin:10px 0;"><strong style="color:#ffaa44;">1元 = 1000文</strong>，扫码支付后联系客服上分</p>
            <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;">
                <div style="text-align:center;">
                    <img src="mmexport1776247819360.jpg" class="qr-img" alt="收款码" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'">
                    <p>💰 收款码</p>
                </div>
                <div style="text-align:center;">
                    <img src="mmexport1776247823872.jpg" class="qr-img" alt="客服微信" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%AE%A2%E6%9C%8D%3C/text%3E%3C/svg%3E'">
                    <p>📱 客服微信</p>
                </div>
            </div>
            <button id="closeRecharge" style="background:#c47c3a; margin-top:20px; padding:8px 20px; border-radius:40px;">关闭</button>
        </div>
    `;
    document.body.appendChild(m);
    m.querySelector('#closeRecharge').onclick = () => m.remove();
}
function recharge() { showRechargeModal(); }
function withdraw() { showToast("提现请联系客服微信: game_kf_888"); }

// ==================== 管理员后台（葫芦鱼内1k筹码连点3次触发）====================
let adminClickCount = 0, adminClickTimer = null;
function openAdminModal() {
    let pwdModal = document.createElement('div');
    pwdModal.className = 'modal';
    pwdModal.innerHTML = `<div class="modal-content"><h2>🔐 管理员验证</h2><input type="password" id="adminPwdInput" class="auth-input" placeholder="管理密码"><div style="display:flex; gap:12px; margin-top:20px;"><button id="submitPwdBtn" style="background:#c47c3a; padding:8px 20px; border-radius:40px;">确认</button><button id="cancelPwdBtn" style="background:#734c2e; padding:8px 20px; border-radius:40px;">取消</button></div></div>`;
    document.body.appendChild(pwdModal);
    let input = pwdModal.querySelector('#adminPwdInput');
    let submit = () => {
        if (input.value === adminPassword) {
            pwdModal.remove();
            showAdminPanel();
        } else {
            showToast("密码错误");
            input.value = '';
            input.focus();
        }
    };
    pwdModal.querySelector('#submitPwdBtn').onclick = submit;
    pwdModal.querySelector('#cancelPwdBtn').onclick = () => pwdModal.remove();
    input.onkeypress = e => { if (e.key === 'Enter') submit(); };
    input.focus();
}
function showAdminPanel() {
    let allUsers = Object.keys(usersData).map(phone => ({ phone, balance: usersData[phone].balance, referralCode: usersData[phone].referralCode || '无', registerTime: usersData[phone].registerTime || '未知' }));
    let searchKeyword = '';
    function renderUserTable() {
        let filtered = searchKeyword ? allUsers.filter(u => u.phone.includes(searchKeyword)) : allUsers;
        let rows = filtered.map(u => `<tr><td style="padding:8px;">${u.phone}</td><td style="padding:8px;">💰 ${u.balance.toFixed(2)}</td><td style="padding:8px;">🎫 ${u.referralCode}</td><td style="padding:8px;">${u.registerTime}</td></tr>`).join('');
        document.querySelector('#adminUserTableBody').innerHTML = rows || '<tr><td colspan="4" style="padding:20px;">暂无数据</td></tr>';
    }
    let modalHtml = `<div class="modal-content" style="max-width:650px;"><h2>🎛️ 管理员后台</h2><div style="display:flex; gap:8px; margin:12px 0;"><input type="text" id="adminSearchInput" class="auth-input" placeholder="搜索手机号" style="flex:2;"><button id="adminSearchBtn" style="background:#2980b9; padding:8px 16px; border-radius:40px;">🔍 搜索</button><button id="adminResetSearchBtn" style="background:#555; padding:8px 16px; border-radius:40px;">重置</button></div><div style="max-height:300px; overflow-y:auto; margin-bottom:12px;"><table style="width:100%; border-collapse:collapse;"><thead style="background:#2a1f16;"><tr><th>手机号</th><th>余额</th><th>推荐码</th><th>注册时间</th></tr></thead><tbody id="adminUserTableBody"></tbody></table></div><div style="display:flex; gap:8px; margin:12px 0;"><select id="adminTargetUser" style="background:#1a1a1a; color:#ffdd99; border-radius:20px; padding:6px; flex:1;">${allUsers.map(u => `<option value="${u.phone}">${u.phone} (${u.balance.toFixed(2)})</option>`).join('')}</select></div><div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;"><input type="number" id="adminAmount" class="auth-input" placeholder="金额" value="0" style="flex:1;"><button id="adminAdd" style="background:#2e7d32; padding:6px 12px; border-radius:30px;">➕ 上分</button><button id="adminSub" style="background:#c0392b; padding:6px 12px; border-radius:30px;">➖ 下分</button><button id="adminReset" style="background:#f39c12; padding:6px 12px; border-radius:30px;">🔄 重置1000</button></div><div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;"><button id="adminQuery" style="background:#2980b9; padding:6px 12px; border-radius:30px;">🔍 查询余额</button><button id="adminExport" style="background:#27ae60; padding:6px 12px; border-radius:30px;">📋 导出用户</button><button id="adminAddCode" style="background:#8e44ad; padding:6px 12px; border-radius:30px;">➕ 新增推荐码</button><button id="adminListCodes" style="background:#16a085; padding:6px 12px; border-radius:30px;">📜 查看推荐码</button><button id="adminChangePwd" style="background:#9b59b6; padding:6px 12px; border-radius:30px;">🔑 改密</button><button id="adminSetBanker" style="background:#e67e22; padding:6px 12px; border-radius:30px;">🏦 设置庄家余额</button></div><button id="adminClose" style="background:#734c2e; padding:8px; border-radius:40px; width:100%;">关闭后台</button></div>`;
    let modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = modalHtml;
    document.body.appendChild(modal);
    renderUserTable();
    document.querySelector('#adminSearchBtn').onclick = () => { searchKeyword = document.querySelector('#adminSearchInput').value.trim(); renderUserTable(); };
    document.querySelector('#adminResetSearchBtn').onclick = () => { searchKeyword = ''; document.querySelector('#adminSearchInput').value = ''; renderUserTable(); };
    document.querySelector('#adminExport').onclick = () => { let data = allUsers.map(u => `${u.phone},${u.balance},${u.referralCode},${u.registerTime}`).join('\n'); navigator.clipboard.writeText("手机号,余额,推荐码,注册时间\n" + data).then(() => showToast(`已复制 ${allUsers.length} 条用户数据`)).catch(() => showToast("复制失败")); };
    document.querySelector('#adminAddCode').onclick = () => { let newCode = prompt("请输入新的推荐码（大写字母+数字）:"); if(newCode && newCode.trim()) { let code = newCode.trim().toUpperCase(); if(!validReferralCodes.includes(code)) { validReferralCodes.push(code); localStorage.setItem('valid_referral_codes', JSON.stringify(validReferralCodes)); showToast(`推荐码 ${code} 已添加`); } else showToast("推荐码已存在"); } };
    document.querySelector('#adminListCodes').onclick = () => { alert(`当前有效推荐码：\n${validReferralCodes.join(', ')}`); };
    document.querySelector('#adminSetBanker').onclick = () => {
        let newAmt = parseFloat(prompt("请输入系统庄家新余额（数字）:", systemBankerBalance));
        if (!isNaN(newAmt) && newAmt >= 0) {
            systemBankerBalance = newAmt;
            saveSystemBanker();
            showToast(`庄家余额已设为 ${systemBankerBalance.toFixed(2)} 文`);
            let bankerSpan = document.getElementById('systemBankerDisplay');
            if (bankerSpan) bankerSpan.innerText = systemBankerBalance.toFixed(2);
        } else showToast("无效金额");
    };
    let getUserSelect = () => modal.querySelector('#adminTargetUser').value;
    let getAmount = () => parseInt(modal.querySelector('#adminAmount').value) || 0;
    modal.querySelector('#adminAdd').onclick = () => { let target = getUserSelect(), amt = getAmount(); if(amt <= 0){ showToast("金额必须大于0"); return; } usersData[target].balance += amt; saveUsers(); showToast(`${target} +${amt}，新余额 ${usersData[target].balance.toFixed(2)}`); if(target === currentUser.phone){ currentUser.balance = usersData[target].balance; let balSpan = document.getElementById("userBalanceDisplay"); if(balSpan) balSpan.innerText = currentUser.balance.toFixed(2); } modal.remove(); showAdminPanel(); };
    modal.querySelector('#adminSub').onclick = () => { let target = getUserSelect(), amt = getAmount(); if(amt <= 0){ showToast("金额必须大于0"); return; } if(usersData[target].balance < amt){ showToast("余额不足"); return; } usersData[target].balance -= amt; saveUsers(); showToast(`${target} -${amt}，新余额 ${usersData[target].balance.toFixed(2)}`); if(target === currentUser.phone){ currentUser.balance = usersData[target].balance; let balSpan = document.getElementById("userBalanceDisplay"); if(balSpan) balSpan.innerText = currentUser.balance.toFixed(2); } modal.remove(); showAdminPanel(); };
    modal.querySelector('#adminReset').onclick = () => { if(confirm("重置余额为1000文？")){ let target = getUserSelect(); usersData[target].balance = 1000; saveUsers(); showToast(`${target} 余额已重置为1000文`); if(target === currentUser.phone){ currentUser.balance = 1000; let balSpan = document.getElementById("userBalanceDisplay"); if(balSpan) balSpan.innerText = "1000.00"; } modal.remove(); showAdminPanel(); } };
    modal.querySelector('#adminQuery').onclick = () => { let target = getUserSelect(); showToast(`${target} 余额: ${usersData[target].balance.toFixed(2)}`); };
    modal.querySelector('#adminChangePwd').onclick = () => { let old = prompt("请输入当前管理密码:"); if(old !== adminPassword){ showToast("当前密码错误"); return; } let newPwd = prompt("请输入新密码（至少4位）:"); if(newPwd && newPwd.length >= 4){ adminPassword = newPwd; localStorage.setItem('admin_pwd', newPwd); showToast("管理密码修改成功"); } else if(newPwd){ showToast("密码至少4位"); } };
    modal.querySelector('#adminClose').onclick = () => modal.remove();
}

// ==================== 游戏1：葫芦鱼（系统坐庄+自动开奖） ====================
function initFishGame(container) {
    const patternList = ["鱼","虾","蟹","葫芦","金钱","鸡"];
    const patternMap = { fish:"鱼", shrimp:"虾", crab:"蟹", calabash:"葫芦", coin:"金钱", chicken:"鸡" };
    const PATTERNS = [{ id:"fish", name:"鱼", icon:"🐟" },{ id:"shrimp", name:"虾", icon:"🦐" },{ id:"crab", name:"蟹", icon:"🦀" },{ id:"calabash", name:"葫芦", icon:"🏺" },{ id:"coin", name:"金钱", icon:"💰" },{ id:"chicken", name:"鸡", icon:"🐔" }];
    let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
    let specialBets = { big:0, small:0, doubleBet:0 };
    let currentChip = 100;
    let isRolling = false;
    let autoTimer = null, countdownInterval = null;
    let remainingSeconds = 25;
    let roundActive = true;
    const MAX_SINGLE = 500, MAX_TOTAL = 2000;

    function getTotalBet() { return Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(specialBets).reduce((a,b)=>a+b,0); }
    function updateUI() {
        for(let k in patternBets) { let el = document.getElementById(`bet_${k}`); if(el) el.innerText = patternBets[k]; }
        for(let k in specialBets) { let el = document.getElementById(`bet_special_${k}`); if(el) el.innerText = specialBets[k]; }
        let totalEl = document.getElementById('totalBetValue');
        if(totalEl) totalEl.innerText = getTotalBet();
        let balSpan = document.getElementById("userBalanceDisplay");
        if(balSpan) balSpan.innerText = getUserBalance().toFixed(2);
        let bankerSpan = document.getElementById('systemBankerDisplay');
        if(bankerSpan) bankerSpan.innerText = systemBankerBalance.toFixed(2);
        let phaseHint = document.getElementById('fishPhaseHint');
        if(phaseHint && roundActive && !isRolling) phaseHint.innerHTML = `🎲 下注中 · ${remainingSeconds}秒`;
    }
    function modifyBalance(delta) { let nb = getUserBalance() + delta; setUserBalance(nb); updateUI(); }
    function modifyBanker(delta) { systemBankerBalance += delta; if(systemBankerBalance < 0) systemBankerBalance = 0; saveSystemBanker(); updateUI(); }
    function addBetPattern(id,val) {
        let total = getTotalBet();
        if(val > MAX_SINGLE) { showToast(`单注上限${MAX_SINGLE}文`); return; }
        if(total + val > MAX_TOTAL) { showToast(`总注上限${MAX_TOTAL}文`); return; }
        if(val > getUserBalance()) { showToast("余额不足"); return; }
        patternBets[id] += val; modifyBalance(-val); updateUI();
    }
    function subBetPattern(id,val) { let cur = patternBets[id]; if(cur < val) val = cur; if(val === 0) return; patternBets[id] -= val; modifyBalance(val); updateUI(); }
    function addBetSpecial(type,val) {
        let total = getTotalBet();
        if(val > MAX_SINGLE) return;
        if(total + val > MAX_TOTAL) return;
        if(val > getUserBalance()) return;
        specialBets[type] += val; modifyBalance(-val); updateUI();
    }
    function clearAllBets() { for(let k in patternBets) patternBets[k]=0; for(let k in specialBets) specialBets[k]=0; updateUI(); showToast("已清空下注"); }

    async function settleGame(diceNames) {
        let totalBet = getTotalBet();
        if(totalBet === 0) return false;
        if(totalBet > getUserBalance()) return false;
        // 计算玩家赢金
        let winAmount = 0;
        for(let [pid, val] of Object.entries(patternBets)) {
            if(val === 0) continue;
            let occur = diceNames.filter(n => n === patternMap[pid]).length;
            if(occur > 0) winAmount += val * (occur + 1);
        }
        let sum = diceNames.map(n => ["鱼","虾","蟹","葫芦","金钱","鸡"].indexOf(n)+1).reduce((a,b)=>a+b,0);
        let isTriplet = diceNames[0] === diceNames[1] && diceNames[1] === diceNames[2];
        if(!isTriplet) {
            if(sum >= 11 && specialBets.big) winAmount += specialBets.big * 2;
            if(sum <= 10 && specialBets.small) winAmount += specialBets.small * 2;
        }
        if(diceNames.includes("鱼") && diceNames.includes("虾") && specialBets.doubleBet) winAmount += specialBets.doubleBet * 4.5;
        
        // 玩家赢金到账
        if(winAmount > 0) modifyBalance(winAmount);
        
        // 系统庄家结算：庄家净收入 = 总下注 - 赢金
        let netToBanker = totalBet - winAmount;
        modifyBanker(netToBanker);
        
        // 显示结果
        let pop = document.createElement('div');
        pop.className = `result-popup ${winAmount > 0 ? 'win' : 'lose'}`;
        pop.textContent = winAmount > 0 ? `🎉 赢 ${winAmount} 🎉` : `😭 输 ${totalBet} 😭`;
        document.body.appendChild(pop);
        setTimeout(() => pop.classList.add('show'), 10);
        setTimeout(() => { pop.classList.remove('show'); setTimeout(() => pop.remove(), 300); }, 2000);
        
        clearAllBets();
        return true;
    }

    async function rollDice() {
        if(isRolling) return;
        if(getTotalBet() === 0) { showToast("请先下注"); if(roundActive) startAutoTimer(); return; }
        isRolling = true;
        let phaseHint = document.getElementById('fishPhaseHint');
        if(phaseHint) phaseHint.innerHTML = "🎲 开奖中...";
        let finalResult = [ patternList[Math.floor(Math.random()*6)], patternList[Math.floor(Math.random()*6)], patternList[Math.floor(Math.random()*6)] ];
        const diceDivs = document.querySelectorAll('.fish-dice-item');
        const iconMap = { "鱼":"🐟","虾":"🦐","蟹":"🦀","葫芦":"🏺","金钱":"💰","鸡":"🐔" };
        for(let step=0; step<12; step++) {
            await new Promise(r=>setTimeout(r,70));
            for(let i=0;i<3;i++) diceDivs[i].innerHTML = iconMap[patternList[Math.floor(Math.random()*6)]];
        }
        for(let i=0;i<3;i++) diceDivs[i].innerHTML = iconMap[finalResult[i]];
        await settleGame(finalResult);
        isRolling = false;
        if(roundActive) startAutoTimer();
    }

    function startAutoTimer() {
        if(autoTimer) clearTimeout(autoTimer);
        if(countdownInterval) clearInterval(countdownInterval);
        remainingSeconds = 25;
        let phaseHint = document.getElementById('fishPhaseHint');
        if(phaseHint) phaseHint.innerHTML = `🎲 下注中 · ${remainingSeconds}秒`;
        countdownInterval = setInterval(() => {
            if(!roundActive) { clearInterval(countdownInterval); return; }
            if(!isRolling) {
                remainingSeconds--;
                if(phaseHint) phaseHint.innerHTML = `🎲 下注中 · ${remainingSeconds}秒`;
                if(remainingSeconds <= 0) {
                    clearInterval(countdownInterval);
                    if(roundActive && !isRolling) rollDice();
                }
            }
        }, 1000);
        autoTimer = setTimeout(() => {
            if(roundActive && !isRolling && getTotalBet()>0) rollDice();
            else if(roundActive && !isRolling && getTotalBet()===0) {
                if(countdownInterval) clearInterval(countdownInterval);
                startAutoTimer();
            }
        }, 25000);
    }

    // 渲染界面
    const html = `
        <div class="fish-wrapper">
            <div style="display:flex; gap:12px; padding:12px; background:#1f1711;">
                <div style="flex:1; background:#0a0705; border-radius:40px; padding:8px; text-align:center;">
                    <div style="font-size:0.7rem;">🏦 系统庄家余额</div>
                    <div id="systemBankerDisplay" style="font-size:1.3rem; font-weight:800;">${systemBankerBalance.toFixed(2)}</div>
                </div>
                <div style="flex:1; background:#0a0705; border-radius:40px; padding:8px; text-align:center;">
                    <div style="font-size:0.7rem;">🎲 总押注</div>
                    <div id="totalBetValue" style="font-size:1.3rem; font-weight:800;">0</div>
                </div>
            </div>
            <div style="background:#2a211a; margin:12px; border-radius:50px; padding:12px; text-align:center;">
                <div id="fishPhaseHint" style="color:#ffaa66; font-size:0.9rem; margin-bottom:8px;">🎲 下注中 · 25秒</div>
                <div style="display:flex; justify-content:center; gap:15px;">
                    <div class="fish-dice-item">🎲</div>
                    <div class="fish-dice-item">🎲</div>
                    <div class="fish-dice-item">🎲</div>
                </div>
            </div>
            <div style="display:flex; justify-content:center; gap:12px; margin:8px 12px; flex-wrap:wrap;">
                <div class="chip ${currentChip===20?'selected':''}" data-chip="20">20</div>
                <div class="chip ${currentChip===50?'selected':''}" data-chip="50">50</div>
                <div class="chip ${currentChip===100?'selected':''}" data-chip="100">100</div>
                <div class="chip ${currentChip===500?'selected':''}" data-chip="500">500</div>
                <div class="chip" data-chip="1000" id="adminTriggerChip">1k</div>
            </div>
            <div style="display:flex; gap:12px; justify-content:center; margin:0 12px 12px;">
                <button id="fishRollBtn" class="grab-btn" style="background:#c47c3a;">🎲 立即开骰</button>
                <button id="fishResetBetBtn" class="grab-btn" style="background:#734c2e;">🧹 清空下注</button>
            </div>
            <div style="padding:0 12px;">
                <div style="font-size:0.85rem; color:#ffd49f;">🐟 六门押注</div>
                <div id="patternGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:8px 0;"></div>
                <div style="font-size:0.85rem; color:#ffd49f;">🎯 特殊</div>
                <div id="specialGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:8px 0;"></div>
            </div>
            <div class="online-count-box">
                <span>🎮 在线人数 <span id="onlineCount" class="online-number">--</span></span>
                <button id="showRulesBtn" style="background:#ffaa44; border:none; border-radius:30px; padding:6px 16px;">📋 规则</button>
            </div>
        </div>
    `;
    container.innerHTML = html;

    // 构建六门下注区
    const patternGrid = document.getElementById('patternGrid');
    PATTERNS.forEach(p => {
        let card = document.createElement('div');
        card.className = 'bet-card';
        card.innerHTML = `
            <div class="bet-icon">${p.icon}</div>
            <div class="bet-name">${p.name}</div>
            <div class="bet-amount">
                <button class="btn-chip sub-pattern" data-id="${p.id}">-</button>
                <span id="bet_${p.id}" style="margin:0 8px;">0</span>
                <button class="btn-chip add-pattern" data-id="${p.id}">+</button>
            </div>
        `;
        patternGrid.appendChild(card);
    });
    const specialGrid = document.getElementById('specialGrid');
    specialGrid.innerHTML = `
        <div class="bet-card" data-type="big"><div class="bet-name">大</div><div class="bet-amount" id="bet_special_big">0</div></div>
        <div class="bet-card" data-type="small"><div class="bet-name">小</div><div class="bet-amount" id="bet_special_small">0</div></div>
        <div class="bet-card" data-type="doubleBet"><div class="bet-name">双押(鱼+虾)</div><div class="bet-amount" id="bet_special_doubleBet">0</div></div>
    `;

    // 事件绑定
    patternGrid.addEventListener('click', (e) => {
        let btn = e.target.closest('.btn-chip');
        if(!btn) return;
        let id = btn.dataset.id;
        if(btn.classList.contains('add-pattern')) addBetPattern(id, currentChip);
        if(btn.classList.contains('sub-pattern')) subBetPattern(id, currentChip);
    });
    specialGrid.querySelectorAll('.bet-card').forEach(card => {
        card.onclick = () => { let type = card.getAttribute('data-type'); if(type) addBetSpecial(type, currentChip); };
    });
    document.querySelectorAll('.chip').forEach(chip => {
        chip.onclick = () => { currentChip = parseInt(chip.dataset.chip); document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected')); chip.classList.add('selected'); };
    });
    document.getElementById('fishRollBtn').onclick = () => { if(!isRolling && roundActive) rollDice(); };
    document.getElementById('fishResetBetBtn').onclick = clearAllBets;
    document.getElementById('showRulesBtn').onclick = () => alert("六门：1次赔1.5倍，2次赔2倍，3次赔2.5倍\n大/小：2倍\n双押(鱼+虾同时出现)：4.5倍");

    // 管理员入口：1k筹码连点3次
    const adminChip = document.getElementById('adminTriggerChip');
    if(adminChip) {
        adminChip.addEventListener('click', () => {
            adminClickCount++;
            if(adminClickTimer) clearTimeout(adminClickTimer);
            adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 1000);
            if(adminClickCount >= 3) {
                adminClickCount = 0;
                clearTimeout(adminClickTimer);
                openAdminModal();
            }
        });
    }

    updateUI();
    startAutoTimer();
    return () => { roundActive = false; if(autoTimer) clearTimeout(autoTimer); if(countdownInterval) clearInterval(countdownInterval); container.innerHTML = ''; };
}

// ==================== 游戏2：至尊骰宝（系统坐庄+自动开奖，无管理员按钮） ====================
function initDiceGame(container) {
    const oddsMap = {4:60,5:30,6:18,7:12,8:8,9:7,10:6,11:6,12:7,13:8,14:12,15:18,16:30,17:60};
    let bets = {'BIG':0,'SMALL':0,'ODD':0,'EVEN':0,4:0,5:0,6:0,7:0,8:0,9:0,10:0,11:0,12:0,13:0,14:0,15:0,16:0,17:0,'TRIPLE_1':0,'TRIPLE_2':0,'TRIPLE_3':0,'TRIPLE_4':0,'TRIPLE_5':0,'TRIPLE_6':0,'ALL_TRIPLE':0};
    let selectedChip = 100;
    let isDrawing = false, isBetLocked = false;
    let countdownInterval = null;
    let roundActive = true;

    function updateUI() {
        for(let k in bets){ let el=container.querySelector(`#bet_${k}`); if(el) el.innerText=bets[k]; }
        let total=Object.values(bets).reduce((a,b)=>a+b,0);
        if(container.querySelector('#totalBet')) container.querySelector('#totalBet').innerText=total;
        let balSpan = document.getElementById("userBalanceDisplay");
        if(balSpan) balSpan.innerText = getUserBalance().toFixed(2);
        let bankerSpan = document.getElementById('diceBankerDisplay');
        if(bankerSpan) bankerSpan.innerText = systemBankerBalance.toFixed(2);
    }
    function modifyBalance(delta) { let nb = getUserBalance() + delta; setUserBalance(nb); updateUI(); }
    function modifyBanker(delta) { systemBankerBalance += delta; if(systemBankerBalance < 0) systemBankerBalance = 0; saveSystemBanker(); updateUI(); }
    function addBet(type){
        if(isBetLocked){ showToast("开奖中请等待"); return; }
        if(selectedChip<=0) return;
        if(selectedChip>getUserBalance()){ showToast("余额不足"); return; }
        modifyBalance(-selectedChip);
        bets[type] += selectedChip;
        updateUI();
    }
    function clearAllBets(){
        let total=Object.values(bets).reduce((a,b)=>a+b,0);
        modifyBalance(total);
        for(let k in bets) bets[k]=0;
        updateUI();
        showToast("已清空");
    }
    async function startDraw(){
        if(isDrawing) return;
        let totalBet=Object.values(bets).reduce((a,b)=>a+b,0);
        if(totalBet===0){ showToast("请先下注"); startCountdown(20); return; }
        if(totalBet>getUserBalance()){ showToast("余额不足"); startCountdown(20); return; }
        isDrawing=true; isBetLocked=true;
        let cdSpan = container.querySelector('#countdownNum');
        if(cdSpan) cdSpan.innerText = "开奖";
        let d1=Math.floor(Math.random()*6)+1, d2=Math.floor(Math.random()*6)+1, d3=Math.floor(Math.random()*6)+1;
        let total=d1+d2+d3;
        let types=[];
        if(total>=11) types.push('BIG'); else types.push('SMALL');
        if(total%2===1) types.push('ODD'); else types.push('EVEN');
        if(d1===d2 && d2===d3){ types.push(`TRIPLE_${d1}`); types.push('ALL_TRIPLE'); }
        let winAmount=0;
        if(types.includes('BIG') && bets['BIG']) winAmount+=bets['BIG']*2;
        if(types.includes('SMALL') && bets['SMALL']) winAmount+=bets['SMALL']*2;
        if(types.includes('ODD') && bets['ODD']) winAmount+=bets['ODD']*2;
        if(types.includes('EVEN') && bets['EVEN']) winAmount+=bets['EVEN']*2;
        if(bets[total]) winAmount+=bets[total]*oddsMap[total];
        if(types.includes('ALL_TRIPLE') && bets['ALL_TRIPLE']) winAmount+=bets['ALL_TRIPLE']*30;
        for(let i=1;i<=6;i++){ if(types.includes(`TRIPLE_${i}`) && bets[`TRIPLE_${i}`]) winAmount+=bets[`TRIPLE_${i}`]*150; }
        
        if(winAmount>0) modifyBalance(winAmount);
        // 庄家结算
        let netToBanker = totalBet - winAmount;
        modifyBanker(netToBanker);
        
        let pop=document.createElement('div'); pop.className=`result-popup ${winAmount>0?'win':'lose'}`; pop.textContent=winAmount>0?`🎉 赢 ${winAmount} 🎉`:`😭 输 ${totalBet} 😭`; document.body.appendChild(pop); setTimeout(()=>pop.classList.add('show'),10); setTimeout(()=>{ pop.classList.remove('show'); setTimeout(()=>pop.remove(),300); },2000);
        
        const diceEl = [container.querySelector('#dice1'), container.querySelector('#dice2'), container.querySelector('#dice3')];
        const rotMap = {1:'rotateX(0deg) rotateY(0deg)',2:'rotateX(-90deg) rotateY(0deg)',3:'rotateX(0deg) rotateY(90deg)',4:'rotateX(0deg) rotateY(-90deg)',5:'rotateX(90deg) rotateY(0deg)',6:'rotateX(180deg) rotateY(0deg)'};
        diceEl.forEach((d,i)=>{ if(d) d.style.transform = rotMap[[d1,d2,d3][i]]; });
        let totalEl = container.querySelector('#totalPoints');
        if(totalEl) totalEl.innerText = total;
        
        clearAllBets();
        isDrawing=false; isBetLocked=false;
        if(roundActive) startCountdown(20);
    }
    function startCountdown(sec){
        if(countdownInterval) clearInterval(countdownInterval);
        let c=sec;
        let cdSpan=container.querySelector('#countdownNum');
        if(cdSpan) cdSpan.innerText=c;
        isBetLocked=false;
        countdownInterval=setInterval(()=>{
            if(!roundActive){clearInterval(countdownInterval); return;}
            if(c<=1){ clearInterval(countdownInterval); startDraw(); }
            else{ c--; if(cdSpan) cdSpan.innerText=c; if(c<=3) cdSpan?.classList.add('countdown-warning'); else cdSpan?.classList.remove('countdown-warning'); }
        },1000);
    }
    let pointsHtml=''; for(let i=4;i<=17;i++) pointsHtml+=`<div class="bet-card point-card" data-point="${i}"><div class="bet-name">${i}点</div><div class="bet-odds">${oddsMap[i]}倍</div><div id="bet_${i}" class="bet-amount">0</div></div>`;
    let trioHtml=''; for(let i=1;i<=6;i++) trioHtml+=`<div class="bet-card trio-card" data-type="TRIPLE_${i}"><div class="bet-name">${i}围</div><div class="bet-odds">150倍</div><div id="bet_TRIPLE_${i}" class="bet-amount">0</div></div>`;
    trioHtml+=`<div class="bet-card trio-card" data-type="ALL_TRIPLE"><div class="bet-name">豹子</div><div class="bet-odds">30倍</div><div id="bet_ALL_TRIPLE" class="bet-amount">0</div></div>`;
    container.innerHTML = `<div style="background:linear-gradient(145deg,#1a4a2a,#0a2a1a); border-radius:40px; padding:15px;">
        <div style="display:flex; gap:12px; margin-bottom:12px;">
            <div style="flex:1; background:#0a0705; border-radius:40px; padding:6px; text-align:center;">
                <div style="font-size:0.7rem;">🏦 系统庄家</div>

            </div>
            <div style="flex:1; background:#0a0705; border-radius:40px; padding:6px; text-align:center;">
                <div style="font-size:0.7rem;">🎲 总押注</div>

            <div class="chip ${selectedChip===1000?'selected-chip':''}" data-val="1000">1K</div>
        </div>
        <div style="display:flex; gap:10px; margin:12px 0;"><button id="clearAllBtn" style="flex:1; background:#e74c3c; padding:10px; border-radius:40px;">清空</button><button id="betBtn" style="flex:1; background:#3498db; padding:10px; border-radius:40px;">确认投注</button></div>
        <div class="special-grid" style="grid-template-columns:repeat(4,1fr);"><div class="bet-card" data-type="BIG">大<div id="bet_BIG">0</div></div><div class="bet-card" data-type="SMALL">小<div id="bet_SMALL">0</div></div><div class="bet-card" data-type="ODD">单<div id="bet_ODD">0</div></div><div class="bet-card" data-type="EVEN">双<div id="bet_EVEN">0</div></div></div>
        <div class="points-grid">${pointsHtml}</div>
        <div class="trio-grid">${trioHtml}</div>
        <div class="online-count-box" style="margin-top:12px;">
            <span>🎮 在线人数 <span id="onlineCount" class="online-number">--</span></span>
            <button id="diceRulesBtn" style="background:#ffaa44; border:none; border-radius:30px; padding:6px 16px;">📋 规则</button>
        </div>
    </div>`;
    function initDice3D(){
        const diceEls=[container.querySelector('#dice1'),container.querySelector('#dice2'),container.querySelector('#dice3')];
        const faces=['front','back','right','left','top','bottom']; const valMap={front:1,back:6,right:4,left:3,top:2,bottom:5};
        diceEls.forEach(dice=>{ if(!dice) return; dice.innerHTML=''; faces.forEach(face=>{ let num=valMap[face]; let fd=document.createElement('div'); fd.className=`dice-face ${face} face-${num}`; let pipHtml=''; if(num===1)pipHtml='<div class="pip pip-center"></div>'; else if(num===2)pipHtml='<div class="pip pip-tl"></div><div class="pip pip-br"></div>'; else if(num===3)pipHtml='<div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div>'; else if(num===4)pipHtml='<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>'; else if(num===5)pipHtml='<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-mid"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>'; else pipHtml='<div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div>'; fd.innerHTML=pipHtml; dice.appendChild(fd); }); dice.style.transform='rotateX(0deg) rotateY(0deg)'; });
    }
    initDice3D();
    container.querySelectorAll('.chip').forEach(chip=>{ chip.onclick=()=>{ selectedChip=parseInt(chip.dataset.val); container.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected-chip')); chip.classList.add('selected-chip'); let span=container.querySelector('#selectedChip'); if(span) span.innerText=selectedChip; }; });
    container.querySelectorAll('.special-card, .point-card, .trio-card').forEach(el=>{ el.onclick=()=>{ let type=el.dataset.type||el.dataset.point; if(type) addBet(type); }; });
    container.querySelector('#clearAllBtn').onclick=clearAllBets;
    container.querySelector('#betBtn').onclick=()=>{ if(!isDrawing && !isBetLocked) startDraw(); };
    container.querySelector('#diceRulesBtn').onclick = () => alert("大小单双赔2倍\n点数4~17按赔率表\n围骰150倍，豹子30倍");
    startCountdown(20);
    return () => { roundActive=false; if(countdownInterval) clearInterval(countdownInterval); container.innerHTML=''; };
}

function initGame3(c){ c.innerHTML='<div style="padding:40px; text-align:center; color:#ffdd99;">🎮 游戏3 即将开放</div>'; return ()=>{}; }
function initGame4(c){ c.innerHTML='<div style="padding:40px; text-align:center; color:#ffdd99;">♠️ 游戏4 即将开放</div>'; return ()=>{}; }

// ==================== 登录/注册 ====================
function renderAuthUI() {
    const savedPhone = localStorage.getItem('saved_phone') || '';
    const savedPwd = localStorage.getItem('saved_password') || '';
    const remember = localStorage.getItem('remember_me') === 'true';
    document.getElementById('app').innerHTML = `<div class="auth-panel"><h2>🎲 双游戏大厅</h2><input type="tel" id="regPhone" class="auth-input" placeholder="手机号" value="${savedPhone}"><input type="password" id="regPassword" class="auth-input" placeholder="密码 (≥4位)" value="${savedPwd}"><input type="text" id="regReferralCode" class="auth-input" placeholder="推荐码 (必填)"><div style="display:flex; align-items:center; gap:8px; margin:8px 0;"><input type="checkbox" id="rememberCheckbox" ${remember?'checked':''}><label style="color:#ffdd99;">记住账号</label></div><div class="auth-buttons"><button id="loginBtn" class="auth-btn">登录</button><button id="registerBtn" class="auth-btn">注册</button></div><div class="auth-note">有效推荐码: ${validReferralCodes.join(', ')}<br>注册即送1000文</div></div>`;
    document.getElementById('registerBtn').onclick = () => {
        let phone = document.getElementById('regPhone').value.trim(), pwd = document.getElementById('regPassword').value, code = document.getElementById('regReferralCode').value.trim().toUpperCase();
        if(!phone || !pwd) return showToast("手机号和密码必填");
        if(!/^1[3-9]\d{9}$/.test(phone)) return showToast("手机号格式错误");
        if(pwd.length<4) return showToast("密码至少4位");
        if(!code) return showToast("请填写推荐码");
        if(!validReferralCodes.includes(code)) return showToast("推荐码无效");
        if(usersData[phone]) return showToast("手机号已注册");
        usersData[phone] = { password:pwd, balance:1000, referralCode:code, registerTime:new Date().toLocaleString() };
        saveUsers(); showToast("注册成功，请登录");
    };
    document.getElementById('loginBtn').onclick = () => {
        let phone = document.getElementById('regPhone').value.trim(), pwd = document.getElementById('regPassword').value, rem = document.getElementById('rememberCheckbox').checked;
        if(!usersData[phone] || usersData[phone].password !== pwd) return showToast("账号或密码错误");
        if(rem){ localStorage.setItem('saved_phone',phone); localStorage.setItem('saved_password',pwd); localStorage.setItem('remember_me','true'); }
        else{ localStorage.removeItem('saved_phone'); localStorage.removeItem('saved_password'); localStorage.setItem('remember_me','false'); }
        currentUser = { phone, ...usersData[phone] };
        showToast(`欢迎 ${phone}`);
        renderGameLobby();
    };
}

function renderGameLobby() {
    document.getElementById('app').innerHTML = `<div class="user-section"><div class="user-info-row"><span>📱 ${currentUser.phone.substring(0,7)}... | 余额 </span><span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span><div class="btn-group"><button id="serviceBtn" class="service-btn">客服</button><button id="logoutBtn" class="logout-btn">退出</button></div></div><div class="charge-withdraw-row"><button id="rechargeBtn" class="charge-btn">💎 充值</button><button id="withdrawBtn" class="withdraw-btn">💰 提现</button></div></div><div class="game-nav"><button class="game-tab active" data-game="fish">葫芦鱼</button><button class="game-tab" data-game="dice">至尊骰宝</button><button class="game-tab" data-game="game3">游戏3</button><button class="game-tab" data-game="game4">游戏4</button></div><div class="game-container"><div id="gamePanel"></div></div>`;
    document.getElementById('logoutBtn').onclick = () => { currentUser=null; renderAuthUI(); };
    document.getElementById('serviceBtn').onclick = showServiceModal;
    document.getElementById('rechargeBtn').onclick = recharge;
    document.getElementById('withdrawBtn').onclick = withdraw;
    const gamePanel = document.getElementById('gamePanel');
    let currentDestroy = null;
    const inits = { fish:initFishGame, dice:initDiceGame, game3:initGame3, game4:initGame4 };
    async function switchGame(id){ if(currentDestroy) currentDestroy(); gamePanel.innerHTML=''; currentDestroy=await inits[id](gamePanel); let balSpan=document.getElementById("userBalanceDisplay"); if(balSpan) balSpan.innerText=getUserBalance().toFixed(2); }
    document.querySelectorAll('.game-tab').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.game-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
    switchGame('fish');
    startRealOnlineCount();  // 启动真实在线人数轮询
}

renderAuthUI();
</script>
