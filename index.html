<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙虎斗 - 链上终端</title>
    <style>
        :root {
            --jade: #4a7c64; --jade-d: #2c4a3b;
            --stone: #6b737e;
            --inner: inset 16px 16px 24px rgba(0,0,0,0.8), inset -8px -8px 12px rgba(255,255,255,0.06);
            --gold: #f1c40f; --blue: #3498db; --tiger: #e67e22; --tie: #9b59b6;
            --red: #ff4d4d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { background: #0c0c0c; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .container-outer {
            width: 100vw; height: 100vh; max-width: 480px;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%;
            animation: outerNeonRotate 15s linear infinite;
            padding: 6px;
            border-radius: 18px;
            box-shadow: 0 0 50px rgba(255,255,255,0.6);
        }
        @keyframes outerNeonRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%; height: 100%;
            background: var(--jade);
            border-radius: 15px;
            display: flex; flex-direction: column;
            box-shadow: var(--inner);
        }

        .header { height: 8%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 8px 12px; }
        .box { background: var(--stone); border: 2px solid var(--jade-d); box-shadow: var(--inner); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px;
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        .box span:first-child { font-size: 12px; color: #ccc; letter-spacing: 1px; font-weight: bold; }
        .box span:last-child { font-size: 20px; font-weight: bold; color: var(--gold); text-shadow: 0 0 6px var(--gold); }
        .red-number { color: var(--red); font-weight: bold; }

        .battle-scene {
            height: 35%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            border: 3px solid var(--jade-d);
            border-radius: 12px;
            margin: 4px 10px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }
        .scene-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 1;
        }
        .dragon, .tiger {
            position: absolute;
            top: 50%;
            width: 80px;
            height: 80px;
            z-index: 10;
            text-align: center;
            font-size: 70px;
            line-height: 1;
        }
        .dragon {
            left: 20px;
            color: var(--blue);
            filter: drop-shadow(0 0 10px var(--blue));
            animation: dragonMove 3s ease-in-out infinite;
        }
        .tiger {
            right: 20px;
            color: var(--tiger);
            filter: drop-shadow(0 0 10px var(--tiger));
            animation: tigerMove 3s ease-in-out infinite;
        }
        @keyframes dragonMove {
            0% { transform: translateY(-50%) translateY(0) rotate(0deg); }
            50% { transform: translateY(-50%) translateY(-10px) rotate(5deg); }
            100% { transform: translateY(-50%) translateY(0) rotate(0deg); }
        }
        @keyframes tigerMove {
            0% { transform: translateY(-50%) translateY(0) rotate(0deg); }
            50% { transform: translateY(-50%) translateY(-10px) rotate(-5deg); }
            100% { transform: translateY(-50%) translateY(0) rotate(0deg); }
        }
        .battle-result {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 8px var(--gold);
            background: rgba(0,0,0,0.5);
            padding: 2px 10px;
            border-radius: 10px;
            z-index: 20;
        }

        .play-section {
            flex: 1; display: flex; flex-direction: column;
            background: var(--stone); box-shadow: var(--inner); border: 3px solid var(--jade-d);
            border-radius: 12px; margin: 4px 10px 8px 10px; padding: 12px;
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        .account-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            padding: 6px 10px;
            margin-bottom: 10px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5), inset -1px -1px 2px rgba(255,255,255,0.1);
        }
        .account-info {
            font-size: 12px;
            color: #eee;
        }
        .account-info span {
            color: var(--gold);
            font-weight: bold;
        }
        .account-switch {
            display: flex;
            gap: 6px;
        }
        .account-switch input {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--jade-d);
            border-radius: 8px;
            padding: 4px 8px;
            color: #fff;
            font-size: 12px;
            width: 100px;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5);
        }
        .account-switch button {
            background: var(--jade);
            border: 1px solid var(--gold);
            border-radius: 8px;
            padding: 4px 8px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4), inset -1px -1px 2px rgba(255,255,255,0.1);
        }

        .multi-bet-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            justify-content: space-between;
        }
        .multi-bet-item {
            flex: 1;
            background: #3a5a4a;
            border: 2px solid var(--jade-d);
            border-radius: 12px;
            padding: 8px 4px;
            text-align: center;
            box-shadow: inset 6px 6px 10px rgba(0,0,0,0.6), inset -4px -4px 6px rgba(255,255,255,0.1);
            transition: all 0.1s ease;
        }
        .multi-bet-item.selected {
            border-color: var(--gold);
            background: rgba(255,255,255,0.2);
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.7), inset -2px -2px 4px rgba(255,255,255,0.15);
        }
        .multi-bet-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .multi-bet-name.dragon { color: var(--blue); text-shadow: 0 0 8px var(--blue); }
        .multi-bet-name.tiger { color: var(--tiger); text-shadow: 0 0 8px var(--tiger); }
        .multi-bet-name.tie { color: var(--tie); text-shadow: 0 0 8px var(--tie); }
        .multi-bet-amount {
            font-size: 16px;
            font-weight: bold;
            color: var(--red);
        }
        .multi-bet-control {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 6px;
        }
        .multi-bet-control button {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--gold);
            border-radius: 20px;
            width: 28px;
            height: 28px;
            color: var(--gold);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5), inset -1px -1px 2px rgba(255,255,255,0.1);
        }

        .data-stack { display: grid; grid-template-rows: repeat(3, 1fr); gap: 6px; margin: 0 6px; }
        .data-item { background: rgba(0,0,0,0.6); border: 2px solid var(--jade-d); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.6), inset -2px -2px 4px rgba(255,255,255,0.05);
        }
        .data-item label { font-size: 12px; color: #ccc; font-weight: bold; }
        .data-item value { font-size: 18px; font-weight: 900; color: var(--red); }

        .stake-txt { text-align: center; color: #eee; font-size: 16px; font-weight: bold; margin: 8px 0; }
        .stake-txt span { color: var(--red); }

        .exec-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .refresh-btn, .repeat-btn, .cancel-btn, .main-go {
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.5), inset -2px -2px 4px rgba(255,255,255,0.1);
            transition: all 0.05s linear;
        }
        .refresh-btn:active, .repeat-btn:active, .cancel-btn:active, .main-go:active {
            transform: translateY(2px);
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.7);
        }
        .refresh-btn {
            width: 52px;
            height: 52px;
            background: #3498db;
            border: 3px solid var(--jade-d);
            border-radius: 10px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }
        .repeat-btn {
            width: 52px;
            height: 52px;
            background: #2c3e50;
            border: 3px solid var(--jade-d);
            border-radius: 10px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .cancel-btn {
            width: 52px;
            height: 52px;
            background: #c0392b;
            border: 3px solid var(--jade-d);
            border-radius: 10px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .main-go {
            flex: 1;
            height: 52px;
            background: linear-gradient(180deg, #e53935, #b71c1c);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
        }

        .timer-text {
            font-size: 14px;
            color: var(--gold);
            text-align: center;
            margin: 5px 0;
        }
        .speed-select {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 8px 0;
        }
        .speed-btn {
            background: rgba(0,0,0,0.4);
            border: 2px solid var(--jade-d);
            border-radius: 8px;
            padding: 6px 12px;
            color: #aaa;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5), inset -1px -1px 2px rgba(255,255,255,0.1);
        }
        .speed-btn.active {
            border-color: var(--gold);
            color: #fff;
            background: var(--jade-d);
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
<div class="container-outer">
    <div class="container">
        <div class="header">
            <div class="box"><span>余额</span><span id="balanceDisplay" class="red-number">0.00</span></div>
            <div class="box"><span>彩金池</span><span id="poolDisplay" class="red-number">50000.00</span></div>
        </div>
        <div class="battle-scene">
            <div class="scene-bg"></div>
            <div class="dragon">🐉</div>
            <div class="tiger">🐯</div>
            <div class="battle-result" id="battle-result"></div>
        </div>
        <div class="play-section">
            <div class="account-bar">
                <div class="account-info">当前账户：<span id="currentUserId">6685731895</span></div>
                <div class="account-switch">
                    <input type="text" id="switchUserIdInput" placeholder="输入用户ID" value="6685731895">
                    <button id="switchUserBtn">切换</button>
                </div>
            </div>

            <div class="multi-bet-row">
                <div class="multi-bet-item" data-type="DRAGON">
                    <div class="multi-bet-name dragon">🐉 龙</div>
                    <div class="multi-bet-amount" id="betDragonAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="DRAGON">-</button>
                        <button class="bet-inc" data-type="DRAGON">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" data-type="TIE">
                    <div class="multi-bet-name tie">⚖️ 和</div>
                    <div class="multi-bet-amount" id="betTieAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="TIE">-</button>
                        <button class="bet-inc" data-type="TIE">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" data-type="TIGER">
                    <div class="multi-bet-name tiger">🐯 虎</div>
                    <div class="multi-bet-amount" id="betTigerAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="TIGER">-</button>
                        <button class="bet-inc" data-type="TIGER">+</button>
                    </div>
                </div>
            </div>

            <div class="data-stack">
                <div class="data-item"><label>总押注</label><value id="totalBetAmount">0.00</value></div>
                <div class="data-item"><label>预计奖金</label><value id="val-win">0.00</value></div>
                <div class="data-item"><label>模式</label><value>自动开奖</value></div>
            </div>
            <div class="stake-txt">单注步长：<span id="stepValue" class="red-number">10</span> USDT</div>
            <div class="timer-text">下一局: <span id="countdownNum" class="red-number">30</span>秒</div>
            <div class="speed-select">
                <span class="speed-btn active" data-speed="1">1X</span>
                <span class="speed-btn" data-speed="2">2X</span>
                <span class="speed-btn" data-speed="3">3X</span>
            </div>
            <div class="exec-row">
                <button class="refresh-btn" id="refreshBtn">🔄</button>
                <button class="repeat-btn" id="repeatBtn">续押</button>
                <button class="cancel-btn" id="cancelBtn">取消</button>
                <button class="main-go" id="fightBtn">确认投注</button>
            </div>
        </div>
    </div>
</div>

<script>
let CURRENT_USER_ID = "6685731895";
const API_URL = "http://127.0.0.1:8080";

let state = {
    balance: 0,
    bets: { DRAGON: 0, TIGER: 0, TIE: 0 },
    betRolling: false,
    autoMode: true,
    speed: 1,
    pool: 50000,
    countdown: 30,
    countdownInterval: null
};
let lastBet = null;

function getCountdownSeconds() {
    if (state.speed === 1) return 30;
    if (state.speed === 2) return 20;
    return 10;
}

async function syncBalance() {
    try {
        const res = await fetch(`${API_URL}/balance?user_id=${CURRENT_USER_ID}`);
        const data = await res.json();
        state.balance = data.balance;
        updateUI();
        document.getElementById('battle-result').innerText = '💰 余额已刷新';
        setTimeout(() => {
            if (!state.betRolling) document.getElementById('battle-result').innerText = '';
        }, 2000);
    } catch(e) {
        console.error(e);
        document.getElementById('battle-result').innerText = '❌ 同步失败';
    }
}

async function placeBet(type, amount) {
    if (state.betRolling) {
        document.getElementById('battle-result').innerText = '⏳ 押注处理中，请稍后';
        return false;
    }
    if (amount <= 0) {
        document.getElementById('battle-result').innerText = '⚠️ 押注金额必须大于0';
        return false;
    }
    if (amount > state.balance) {
        document.getElementById('battle-result').innerText = '⚠️ 余额不足';
        return false;
    }
    state.betRolling = true;
    document.getElementById('battle-result').innerText = '💥 押注中... 💥';
    try {
        const res = await fetch(`${API_URL}/bet`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: CURRENT_USER_ID,
                type: type,
                amount: amount
            })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        state.balance = data.balance;
        updateUI();
        const resultMsg = data.win > 0 ? `🎲 开奖: ${data.result}  ✅ 中奖 +${data.win} TRX` : `🎲 开奖: ${data.result}  ❌ 未中奖`;
        document.getElementById('battle-result').innerText = resultMsg;
        setTimeout(() => {
            if (!state.betRolling) document.getElementById('battle-result').innerText = '';
        }, 10000);
        if (state.autoMode) {
            clearCountdown();
            startCountdown(getCountdownSeconds());
        }
        state.betRolling = false;
        return true;
    } catch(e) {
        console.error(e);
        document.getElementById('battle-result').innerText = '❌ 网络错误';
        state.betRolling = false;
        return false;
    }
}

function executeBet() {
    if (state.betRolling) {
        document.getElementById('battle-result').innerText = '⏳ 押注处理中，请稍后';
        return;
    }
    const total = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
    if (total <= 0) {
        document.getElementById('battle-result').innerText = '⚠️ 请至少押注一个选项';
        return;
    }
    let selectedType = null, selectedAmount = 0;
    if (state.bets.DRAGON > 0) { selectedType = "DRAGON"; selectedAmount = state.bets.DRAGON; }
    if (state.bets.TIGER > selectedAmount) { selectedType = "TIGER"; selectedAmount = state.bets.TIGER; }
    if (state.bets.TIE > selectedAmount) { selectedType = "TIE"; selectedAmount = state.bets.TIE; }
    if (!selectedType) return;
    const typeMap = { "DRAGON": "龙", "TIGER": "虎", "TIE": "和" };
    const betType = typeMap[selectedType];
    const betAmount = selectedAmount;
    lastBet = { type: betType, amount: betAmount };
    placeBet(betType, betAmount).then(success => {
        if (success) {
            state.bets = { DRAGON: 0, TIGER: 0, TIE: 0 };
            updateUI();
        }
    });
}

function repeatLastBet() {
    if (!lastBet) {
        document.getElementById('battle-result').innerText = '⚠️ 没有上次押注记录，请先手动押注';
        setTimeout(() => {
            if (!state.betRolling) document.getElementById('battle-result').innerText = '';
        }, 2000);
        return;
    }
    if (state.betRolling) {
        document.getElementById('battle-result').innerText = '⏳ 押注处理中，请稍后';
        return;
    }
    placeBet(lastBet.type, lastBet.amount);
}

function cancelAllBets() {
    if (state.betRolling) {
        document.getElementById('battle-result').innerText = '⏳ 押注处理中，请稍后再试';
        return;
    }
    state.bets = { DRAGON: 0, TIGER: 0, TIE: 0 };
    updateUI();
    document.getElementById('battle-result').innerText = '✅ 已清空所有押注';
    setTimeout(() => {
        if (!state.betRolling) document.getElementById('battle-result').innerText = '';
    }, 2000);
}

function updateUI() {
    document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
    document.getElementById('poolDisplay').innerText = state.pool.toFixed(2);
    document.getElementById('betDragonAmount').innerText = state.bets.DRAGON;
    document.getElementById('betTigerAmount').innerText = state.bets.TIGER;
    document.getElementById('betTieAmount').innerText = state.bets.TIE;
    const total = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
    document.getElementById('totalBetAmount').innerText = total.toFixed(2);
    let maxWin = 0;
    if (state.bets.DRAGON > 0) maxWin = Math.max(maxWin, state.bets.DRAGON * 2);
    if (state.bets.TIGER > 0) maxWin = Math.max(maxWin, state.bets.TIGER * 2);
    if (state.bets.TIE > 0) maxWin = Math.max(maxWin, state.bets.TIE * 8);
    document.getElementById('val-win').innerText = maxWin.toFixed(2);
    document.querySelectorAll('.multi-bet-item').forEach(el => {
        const type = el.dataset.type;
        el.classList.toggle('selected', state.bets[type] > 0);
    });
}

function adjustBet(type, delta) {
    if (state.betRolling) return;
    let newVal = state.bets[type] + delta;
    if (newVal < 0) newVal = 0;
    state.bets[type] = newVal;
    updateUI();
}

function startPoolFluctuation() {
    setInterval(() => {
        let change = Math.floor(Math.random() * 61) - 30;
        let newPool = state.pool + change;
        if (newPool < 10000) newPool = 10000;
        if (newPool > 100000) newPool = 100000;
        state.pool = newPool;
        document.getElementById('poolDisplay').innerText = state.pool.toFixed(2);
    }, 1000);
}

function startCountdown(sec) {
    if (state.countdownInterval) clearInterval(state.countdownInterval);
    state.countdown = sec;
    document.getElementById('countdownNum').innerText = state.countdown;
    state.countdownInterval = setInterval(() => {
        if (state.countdown <= 1) {
            clearInterval(state.countdownInterval);
            state.countdownInterval = null;
            if (state.bets.DRAGON + state.bets.TIGER + state.bets.TIE > 0) {
                executeBet();
            } else {
                document.getElementById('battle-result').innerText = '⏳ 无人押注，跳过此局';
                startCountdown(getCountdownSeconds());
            }
        } else {
            state.countdown--;
            document.getElementById('countdownNum').innerText = state.countdown;
        }
    }, 1000);
}

function clearCountdown() {
    if (state.countdownInterval) {
        clearInterval(state.countdownInterval);
        state.countdownInterval = null;
    }
}

function refreshBalance() {
    syncBalance();
    document.getElementById('battle-result').innerText = '💰 余额已刷新';
    setTimeout(() => {
        if (!state.betRolling && document.getElementById('battle-result').innerText === '💰 余额已刷新') {
            document.getElementById('battle-result').innerText = '';
        }
    }, 2000);
}

function setSpeed(speed) {
    state.speed = speed;
    document.querySelectorAll('.speed-btn').forEach(btn => {
        if (parseInt(btn.dataset.speed) === speed) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
    clearCountdown();
    startCountdown(getCountdownSeconds());
}

function switchUser() {
    const newUserId = document.getElementById('switchUserIdInput').value.trim();
    if (!newUserId) {
        alert("请输入用户ID");
        return;
    }
    CURRENT_USER_ID = newUserId;
    document.getElementById('currentUserId').innerText = CURRENT_USER_ID;
    state.bets = { DRAGON: 0, TIGER: 0, TIE: 0 };
    lastBet = null;
    updateUI();
    syncBalance();
    clearCountdown();
    startCountdown(getCountdownSeconds());
    document.getElementById('battle-result').innerText = `已切换至用户 ${CURRENT_USER_ID}`;
    setTimeout(() => {
        if (!state.betRolling) document.getElementById('battle-result').innerText = '';
    }, 2000);
}

function bindEvents() {
    document.getElementById('refreshBtn').onclick = refreshBalance;
    document.getElementById('repeatBtn').onclick = repeatLastBet;
    document.getElementById('cancelBtn').onclick = cancelAllBets;
    document.getElementById('fightBtn').onclick = executeBet;
    document.getElementById('switchUserBtn').onclick = switchUser;

    document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.onclick = () => setSpeed(parseInt(btn.dataset.speed));
    });

    document.querySelectorAll('.bet-dec').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const type = btn.dataset.type;
            adjustBet(type, -10);
        };
    });
    document.querySelectorAll('.bet-inc').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const type = btn.dataset.type;
            adjustBet(type, 10);
        };
    });
}

async function init() {
    bindEvents();
    await syncBalance();
    startPoolFluctuation();
    setSpeed(1);
    updateUI();
    startCountdown(getCountdownSeconds());
}

window.onload = init;
</script>
</body>
</html>
