<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>五兽至尊_V120_ULTRA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --pink: #ff0055; --bg: #05080a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; overflow: hidden; }

        /* 顶部余额卡片 - 恢复高端质感 */
        .header { width: 100%; height: 22%; display: flex; align-items: center; justify-content: center; padding-top: 10px; }
        .bal-card { width: 90%; background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 100%); border: 1.5px solid var(--neon); border-radius: 20px; padding: 18px; text-align: center; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        .bal-title { font-size: 12px; color: var(--neon); letter-spacing: 2px; margin-bottom: 5px; opacity: 0.8; }
        .bal-val { font-size: 42px; font-weight: 900; text-shadow: 0 0 20px var(--neon); }

        /* 转盘中心区 - 恢复霸气布局 */
        .main-game { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; }
        .wheel-box { position: relative; width: 88vw; max-width: 360px; aspect-ratio: 1/1; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 12px solid #1a1a1a; background: #111; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); position: relative; overflow: hidden; box-shadow: 0 0 50px #000; }
        
        .sector { position: absolute; width: 100%; height: 100%; clip-path: polygon(50% 50%, 100% 18%, 100% 82%); transform-origin: center; display: flex; align-items: center; justify-content: flex-end; padding-right: 12%; }
        .item { transform: rotate(90deg); display: flex; flex-direction: column; align-items: center; }
        .item b { font-size: 36px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        .item span { font-size: 11px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 5px; border: 1px solid var(--neon); margin-top: 8px; white-space: nowrap; }

        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent; border-top: 48px solid var(--neon); z-index: 100; filter: drop-shadow(0 0 15px var(--neon)); }
        .spin-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90px; height: 90px; background: #000; border: 4px solid var(--pink); border-radius: 50%; z-index: 110; color: var(--pink); font-size: 24px; font-weight: 900; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px var(--pink); cursor: pointer; }

        /* 底部控制区 - 恢复简洁美观 */
        .footer { width: 100%; height: 20%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 15px; }
        .bet-box { display: flex; align-items: center; gap: 30px; background: rgba(255,255,255,0.05); padding: 12px 30px; border-radius: 40px; border: 1px solid #333; }
        .btn-adj { width: 45px; height: 45px; border-radius: 50%; border: 1.5px solid #666; background: #222; color: #fff; font-size: 24px; font-weight: bold; }
        #msg { color: var(--gold); font-weight: bold; font-size: 20px; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-card">
            <div class="bal-title">PREMIUM VIP BALANCE</div>
            <div class="bal-val">🪙 <span id="bal">1,000</span></div>
        </div>
    </div>

    <div class="main-game">
        <div class="wheel-box">
            <div class="pointer"></div>
            <div id="wheel" class="wheel">
                <div class="sector" style="transform:rotate(-90deg); background:rgba(255,215,0,0.15)"><div class="item"><b>👑</b><span>至尊 MAX</span></div></div>
                <div class="sector" style="transform:rotate(-30deg); background:rgba(255,77,77,0.1)"><div class="item"><b>🦁</b><span>威武 LION</span></div></div>
                <div class="sector" style="transform:rotate(30deg); background:rgba(255,174,66,0.1)"><div class="item"><b>🐯</b><span>霸气 TIGER</span></div></div>
                <div class="sector" style="transform:rotate(90deg); background:rgba(77,255,136,0.1)"><div class="item"><b>🦅</b><span>睿智 EAGLE</span></div></div>
                <div class="sector" style="transform:rotate(150deg); background:rgba(162,155,254,0.1)"><div class="item"><b>🐺</b><span>孤狼 WOLF</span></div></div>
                <div class="sector" style="transform:rotate(210deg); background:rgba(253,203,110,0.1)"><div class="item"><b>🐕</b><span>忠诚 DOG</span></div></div>
            </div>
            <div class="spin-btn" id="spinBtn" onclick="spin()">SPIN</div>
        </div>
    </div>

    <div class="footer">
        <div class="bet-box">
            <button class="btn-adj" onclick="setB(-10)">-</button>
            <div style="font-size:26px; font-weight:bold; width:90px; text-align:center;"><span id="bet" style="color:var(--gold)">1</span></div>
            <button class="btn-adj" onclick="setB(10)">+</button>
        </div>
        <div id="msg">祝您好运连连！</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let b = parseFloat(localStorage.getItem('g_v120') || '1000');
        let bet = 1, r = 0, isS = false, audioInited = false;
        
        // 核心音频逻辑：使用 Web Audio API 避开文件加载
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, dur, type='sine', vol=0.1) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        // 初始化音频通道
        function init() { if(!audioInited) { audioCtx.resume(); audioInited = true; playTone(523.25, 0.3); } }

        function sync() {
            document.getElementById('bal').innerText = Math.floor(b).toLocaleString();
            document.getElementById('bet').innerText = bet;
            localStorage.setItem('g_v120', b);
        }

        window.setB = (v) => { 
            init();
            if(!isS) { 
                bet = Math.max(1, Math.min(b, bet+v)); sync(); 
                tg.HapticFeedback.selectionChanged();
                playTone(800, 0.05, 'square', 0.05); 
            } 
        };

        function spin() {
            init();
            if(isS || b < bet) return;
            isS = true; b -= bet; sync();
            tg.HapticFeedback.impactOccurred('heavy');
            
            // 旋转音效
            let tick = setInterval(() => { if(isS) playTone(150, 0.1, 'triangle', 0.05); }, 150);
            
            let idx = Math.floor(Math.random()*6);
            r += (3600 + idx*60);
            document.getElementById('wheel').style.transform = `rotate(-${r}deg)`;
            document.getElementById('msg').innerText = "🎰 旋转中...";

            setTimeout(() => {
                clearInterval(tick);
                const multi = [88, 15, 10, 5, 2, 0];
                let win = Math.floor(bet * multi[idx]);
                b += win; sync();
                
                if(win > 0) {
                    document.getElementById('msg').innerText = "🎊 赢取 " + win + " 金币！";
                    playTone(523, 0.5); setTimeout(()=>playTone(659, 0.5), 150); setTimeout(()=>playTone(783, 0.8), 300);
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    document.getElementById('msg').innerText = "💔 运气差了一点点！";
                    playTone(200, 0.5, 'sawtooth', 0.05);
                }
                isS = false;
            }, 5000);
        }
        sync();
    </script>
</body>
</html>
