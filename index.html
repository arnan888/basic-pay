<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>双游戏大厅 · 至尊骰宝 + 葫芦鱼抢庄</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0f0e0c;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 12px;
            color: #ffe6c7;
        }
        #app {
            max-width: 560px;
            margin: 0 auto;
            background: #1e1b16;
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .auth-panel, .user-section, .game-nav { padding: 12px 16px; }
        .game-nav {
            display: flex;
            gap: 8px;
            background: #2a241e;
            border-radius: 60px;
            margin: 8px 12px;
        }
        .game-tab {
            flex: 1;
            text-align: center;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #dbbc8c;
            cursor: pointer;
            transition: 0.2s;
        }
        .game-tab.active {
            background: #d49c3f;
            color: #1f1a12;
            box-shadow: inset 0 1px 3px #ffeaac, 0 2px 6px black;
        }
        .user-section {
            background: #1f1711;
            border-radius: 32px;
            margin: 12px;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        #userBalanceDisplay {
            font-size: 1.4rem;
            font-weight: 900;
            color: #ffcc44;
            background: #0a0705;
            padding: 0 12px;
            border-radius: 50px;
        }
        .charge-btn, .withdraw-btn {
            background: #3f2a1a;
            border-radius: 40px;
            padding: 6px 14px;
            border: none;
            color: #ffda99;
            font-weight: bold;
            cursor: pointer;
        }
        .logout-btn, .service-btn {
            background: #2a1f16;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            border: none;
            color: #ffdd99;
            cursor: pointer;
        }
        .charge-withdraw-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        /* 至尊骰宝盒子布局 */
        .dice-wrapper .points-grid,
        .dice-wrapper .trio-grid,
        .dice-wrapper .special-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 8px;
            margin: 10px 0;
        }
        .dice-wrapper .bet-card {
            background: linear-gradient(145deg, #2c241c, #1f1a14);
            border-radius: 20px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 163, 115, 0.4);
        }
        .dice-wrapper .bet-card:active { transform: scale(0.96); background: #3a2f24; }
        .dice-wrapper .bet-name { font-weight: bold; font-size: 0.85rem; color: #ffdfb3; }
        .dice-wrapper .bet-odds { font-size: 0.7rem; color: #ffb347; background: rgba(0,0,0,0.4); display: inline-block; padding: 0px 6px; border-radius: 40px; margin-top: 2px; }
        .dice-wrapper .bet-amount { font-size: 1rem; font-weight: 800; background: #00000066; border-radius: 40px; margin-top: 5px; padding: 2px 0; color: #f7d44a; }

        .chips, .fish-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 12px 0;
        }
        .chip {
            background: radial-gradient(circle at 30% 20%, #f5b042, #c46f1a);
            width: 65px;
            padding: 8px 0;
            text-align: center;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #2c1a0a;
            box-shadow: 0 5px 0 #7a3e0e;
            cursor: pointer;
            transition: 0.05s linear;
            border: 1px solid #ffcd94;
        }
        .chip.selected {
            background: radial-gradient(circle at 30% 20%, #ffe484, #ffa01e);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #b45f1a;
        }
        .chip:active { transform: translateY(2px); box-shadow: 0 2px 0 #7a3e0e; }

        .countdown-warning { color: #ff7777; text-shadow: 0 0 4px red; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } }

        .dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .dice-cube {
            width: 70px;
            height: 70px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s linear;
            cursor: default;
        }
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #faf0cf;
            border-radius: 14px;
            border: 2px solid #b97f2e;
            box-shadow: inset 0 0 8px #ffcf8a;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .pip {
            width: 12px;
            height: 12px;
            background: #2d1f0c;
            border-radius: 50%;
            margin: 3px;
            box-shadow: inset 0 1px 2px #aa7744;
        }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 8px; left: 8px; }
        .pip-tr { position: absolute; top: 8px; right: 8px; }
        .pip-bl { position: absolute; bottom: 8px; left: 8px; }
        .pip-br { position: absolute; bottom: 8px; right: 8px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1, .pip-l2, .pip-l3 { position: absolute; left: 6px; }
        .pip-l1 { top: 6px; }
        .pip-l2 { top: 50%; transform: translateY(-50%); }
        .pip-l3 { bottom: 6px; }
        .pip-r1, .pip-r2, .pip-r3 { position: absolute; right: 6px; }
        .pip-r1 { top: 6px; }
        .pip-r2 { top: 50%; transform: translateY(-50%); }
        .pip-r3 { bottom: 6px; }

        .front { transform: translateZ(35px); }
        .back { transform: rotateY(180deg) translateZ(35px); }
        .right { transform: rotateY(90deg) translateZ(35px); }
        .left { transform: rotateY(-90deg) translateZ(35px); }
        .top { transform: rotateX(90deg) translateZ(35px); }
        .bottom { transform: rotateX(-90deg) translateZ(35px); }

        @media (max-width: 480px) {
            .dice-cube { width: 55px; height: 55px; }
            .front, .back, .right, .left, .top, .bottom { transform: translateZ(27px); }
            .back { transform: rotateY(180deg) translateZ(27px); }
            .right { transform: rotateY(90deg) translateZ(27px); }
            .left { transform: rotateY(-90deg) translateZ(27px); }
            .top { transform: rotateX(90deg) translateZ(27px); }
            .bottom { transform: rotateX(-90deg) translateZ(27px); }
            .pip { width: 9px; height: 9px; }
            .chip { width: 55px; font-size: 1rem; }
        }

        .fish-wrapper .fish-pattern-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin: 4px auto;
            display: block;
            background: #2a1f16;
            border-radius: 12px;
            padding: 4px;
        }
        .fish-wrapper .bet-card {
            background: #2c1e12;
            border-radius: 20px;
            padding: 8px;
            text-align: center;
            border: 1px solid #d49c3f;
        }
        .fish-wrapper .bet-amount {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }
        .btn-chip {
            background: #ffaa44;
            border: none;
            border-radius: 30px;
            width: 28px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .online-count-box {
            background: #2a1f16;
            margin: 10px;
            padding: 8px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
        }
        .result-popup {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: #1e2a1c;
            padding: 14px 28px;
            border-radius: 80px;
            font-weight: bold;
            font-size: 1.4rem;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            box-shadow: 0 0 25px gold;
            border-left: 6px solid gold;
            color: #ffeaac;
            white-space: nowrap;
        }
        .result-popup.win { background: #1f3d1a; border-left-color: #6eff00; }
        .result-popup.show { opacity: 1; transform: translateX(-50%) scale(1); }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: #2b241e;
            border-radius: 36px;
            width: 90%;
            max-width: 480px;
            padding: 20px;
            border: 1px solid #d4a373;
            color: #ffe1b3;
            max-height: 85vh;
            overflow-y: auto;
        }
        .toast-message {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            color: #ffcc44;
            padding: 8px 16px;
            border-radius: 60px;
            z-index: 3000;
            font-weight: bold;
            white-space: nowrap;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        .qr-img {
            width: 140px;
            height: 140px;
            margin: 8px auto;
            display: block;
            background: white;
            border-radius: 20px;
            padding: 8px;
            object-fit: contain;
        }
        .admin-table {
            width: 100%;
            font-size: 0.7rem;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 6px 4px;
            border-bottom: 1px solid #d4a373;
            text-align: left;
        }
        .withdraw-input, .withdraw-select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 40px;
            background: #1a1a1a;
            border: 1px solid #d49c3f;
            color: #ffdd99;
        }
        .confirm-btn {
            background: #d49c3f;
            border: none;
            border-radius: 40px;
            padding: 8px;
            width: 100%;
            margin-top: 12px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ======================== 全局数据 ========================
    let systemBankerBalance = localStorage.getItem('system_banker_balance') ? parseFloat(localStorage.getItem('system_banker_balance')) : 50000;
    let adjustFactor = localStorage.getItem('adjustFactor') ? parseFloat(localStorage.getItem('adjustFactor')) : 1.0;
    let validReferralCodes = ["VIP666", "888VIP", "GOLD2025", "LUCKY8", "DICE100"];
    let usersData = JSON.parse(localStorage.getItem('dice_users')) || {};
    let currentUser = null;

    // 提现记录存储
    let withdrawRecords = JSON.parse(localStorage.getItem('withdraw_records')) || [];

    function saveUsers() { localStorage.setItem('dice_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 0) : 0; }
    function setUserBalance(amount) {
        if (!currentUser) return;
        usersData[currentUser.phone].balance = Math.max(0, amount);
        saveUsers();
        let balSpan = document.getElementById("userBalanceDisplay");
        if (balSpan) balSpan.innerText = getUserBalance().toFixed(2);
    }
    function modifyBanker(delta) {
        systemBankerBalance = Math.max(0, systemBankerBalance + delta);
        localStorage.setItem('system_banker_balance', systemBankerBalance);
        let bankerEl = document.getElementById('diceBankerDisplay');
        if (bankerEl) bankerEl.innerText = systemBankerBalance.toFixed(2);
    }
    function showToast(msg) {
        let t = document.createElement('div'); t.className = 'toast-message'; t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    function updateAllBalance() {
        let balSpan = document.getElementById("userBalanceDisplay");
        if (balSpan) balSpan.innerText = getUserBalance().toFixed(2);
        let bankerSpan = document.getElementById('diceBankerDisplay');
        if (bankerSpan) bankerSpan.innerText = systemBankerBalance.toFixed(2);
    }
    
    // 充值弹窗（微信+支付宝收款码）
    function showRechargeModal() {
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">💎 充值</h3>
                <p style="margin:10px 0; text-align:center;"><strong>1元 = 1000文</strong>，扫码支付后联系客服上分</p>
                <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;">
                    <div style="text-align:center;">
                        <img class="qr-img" alt="微信收款码" src="mmexport1776247819360.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%BE%AE%E4%BF%A1%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'">
                        <p>📱 微信收款码</p>
                    </div>
                    <div style="text-align:center;">
                        <img class="qr-img" alt="支付宝收款码" src="mmexport1776247823872.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E6%94%AF%E4%BB%98%E5%AE%9D%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'">
                        <p>📱 支付宝收款码</p>
                    </div>
                </div>
                <p style="margin-top:10px; text-align:center;">📞 客服微信: <strong>game_kf_888</strong> (支付后截图联系)</p>
                <button id="closeRecharge" style="background:#c47c3a; margin-top:15px; padding:8px; border-radius:40px; width:100%;">关闭</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#closeRecharge').onclick = () => modalDiv.remove();
    }
    // 客服弹窗（预留二维码）
    function showServiceModal() {
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">📞 客服微信</h3>
                <img class="qr-img" alt="客服微信二维码" src="kefu_qr.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%AE%A2%E6%9C%8D%E5%BE%AE%E4%BF%A1%E4%BA%8C%E7%BB%B4%E7%A0%81%3C/text%3E%3C/svg%3E'">
                <p style="margin-top:10px; text-align:center;">微信号: game_kf_888</p>
                <button id="closeSvc" style="background:#c47c3a; margin-top:15px; padding:8px; border-radius:40px; width:100%;">关闭</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#closeSvc').onclick = () => modalDiv.remove();
    }
    function recharge() { showRechargeModal(); }

    // ======================== 提现功能（完整版：金额限制 + 绑定收款方式） ========================
    function withdraw() {
        let currentBalance = getUserBalance();
        if (currentBalance <= 0) {
            showToast("余额为0，无法提现");
            return;
        }
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">💰 提现申请</h3>
                <div style="margin:12px 0;">
                    <label>当前余额: <strong style="color:#ffcc44;">${currentBalance.toFixed(2)} 文</strong></label>
                </div>
                <div style="margin:12px 0;">
                    <label>提现金额 (1文 = 0.001元)</label>
                    <input type="number" id="withdrawAmount" class="withdraw-input" placeholder="请输入提现金额" min="1" max="${currentBalance}" step="1">
                </div>
                <div style="margin:12px 0;">
                    <label>收款方式</label>
                    <select id="withdrawType" class="withdraw-select">
                        <option value="微信">微信</option>
                        <option value="支付宝">支付宝</option>
                    </select>
                </div>
                <div style="margin:12px 0;">
                    <label>收款账号</label>
                    <input type="text" id="withdrawAccount" class="withdraw-input" placeholder="请输入微信/支付宝账号" required>
                </div>
                <button id="confirmWithdraw" class="confirm-btn">确认提现</button>
                <button id="cancelWithdraw" style="background:#734c2e; margin-top:8px; padding:8px; border-radius:40px; width:100%;">取消</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const amountInput = modalDiv.querySelector('#withdrawAmount');
        const typeSelect = modalDiv.querySelector('#withdrawType');
        const accountInput = modalDiv.querySelector('#withdrawAccount');
        const confirmBtn = modalDiv.querySelector('#confirmWithdraw');
        const cancelBtn = modalDiv.querySelector('#cancelWithdraw');
        confirmBtn.onclick = () => {
            let amount = parseFloat(amountInput.value);
            let account = accountInput.value.trim();
            let payType = typeSelect.value;
            if (isNaN(amount) || amount <= 0) {
                showToast("请输入有效的提现金额");
                return;
            }
            if (amount > currentBalance) {
                showToast("提现金额不能超过余额");
                return;
            }
            if (!account) {
                showToast("请填写收款账号");
                return;
            }
            // 扣减余额
            setUserBalance(currentBalance - amount);
            // 记录提现申请
            let record = {
                phone: currentUser.phone,
                amount: amount,
                type: payType,
                account: account,
                time: new Date().toLocaleString(),
                status: "待处理"
            };
            withdrawRecords.push(record);
            localStorage.setItem('withdraw_records', JSON.stringify(withdrawRecords));
            showToast(`提现申请已提交！${amount}文将处理到您的${payType}账号 ${account}`);
            modalDiv.remove();
            updateAllBalance();
        };
        cancelBtn.onclick = () => modalDiv.remove();
    }

    // 管理员后台（含提现记录查看）
    let adminClickCount = 0, adminClickTimer = null;
    let adminPassword = "admin888";
    function openAdminModal() {
        let pwd = prompt("管理员后台密码:");
        if (pwd !== adminPassword) { showToast("密码错误"); return; }
        let allUsers = Object.keys(usersData).map(phone => ({ phone, balance: usersData[phone].balance, code: usersData[phone].referralCode || '无', regTime: usersData[phone].registerTime || '未知' }));
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">🎛️ 管理员后台</h3>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <input type="text" id="adminSearchInput" placeholder="搜索手机号" style="flex:2; background:#1a1a1a; border:1px solid #d49c3f; border-radius:40px; padding:6px; color:#ffdd99;">
                    <button id="adminSearchBtn" style="background:#2980b9; border-radius:40px; padding:6px 12px;">🔍 搜索</button>
                    <button id="adminResetSearch" style="background:#555; border-radius:40px; padding:6px 12px;">重置</button>
                </div>
                <div style="max-height:200px; overflow-y:auto; margin-bottom:12px;">
                    <table class="admin-table">
                        <thead><tr><th>手机号</th><th>余额</th><th>推荐码</th><th>注册时间</th></tr></thead>
                        <tbody id="adminUserTableBody"></tbody>
                    </table>
                </div>
                <select id="adminTargetUser" style="width:100%; margin:8px 0; padding:6px; border-radius:40px; background:#1a1a1a; color:#ffdd99;">
                    ${allUsers.map(u => `<option value="${u.phone}">${u.phone} (${u.balance.toFixed(2)})</option>`).join('')}
                </select>
                <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                    <input type="number" id="adminAmount" placeholder="金额" value="0" style="flex:1; border-radius:40px; padding:6px;">
                    <button id="adminAddBalance" style="background:#2e7d32; border-radius:40px; padding:6px 12px;">➕ 上分</button>
                    <button id="adminSubBalance" style="background:#c0392b; border-radius:40px; padding:6px 12px;">➖ 下分</button>
                    <button id="adminResetBalance" style="background:#f39c12; border-radius:40px; padding:6px 12px;">🔄 重置1000</button>
                </div>
                <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                    <button id="adminQueryBalance" style="background:#2980b9; border-radius:40px; padding:6px 12px;">🔍 查询余额</button>
                    <button id="adminExportUsers" style="background:#27ae60; border-radius:40px; padding:6px 12px;">📋 导出用户</button>

    // ==================== 葫芦鱼（完整版，带3D骰子动画） ====================
    let fishDestroy = null;
    function initFishGame(container) {
        if (fishDestroy) fishDestroy();
        container.innerHTML = `
            <div class="fish-wrapper" style="padding:12px;">
                <div style="background:#1a3a2a; border-radius:32px; padding:12px;">
                    <div style="display:flex; gap:8px; margin-bottom:12px;">
                        <div style="flex:1; background:#0a0a08; border-radius:30px; text-align:center;"><div>🏦 庄家余额</div><div id="fishBankerDisplay">∞</div></div>
                        <div style="flex:1; background:#0a0a08; border-radius:30px; text-align:center;"><div>🎲 总押注</div><div id="fishTotalBet">0</div></div>
                        <div style="flex:1; background:#0a0a08; border-radius:30px; text-align:center;"><div>🏆 上局净利</div><div id="fishLastWin">0</div></div>
                    </div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
                        <div class="fish-chips" style="display:flex; gap:8px; flex-wrap:wrap;">
                            <div class="chip" data-chip="2">2</div><div class="chip" data-chip="5">5</div><div class="chip selected" data-chip="10">10</div><div class="chip" data-chip="50">50</div><div class="chip" data-chip="100" id="fishAdminTrigger">100</div>
                        </div>
                        <button id="fishRollBtn" style="background:#c47c3a; border:none; border-radius:40px; padding:8px 12px;">🎲 开骰</button>
                        <button id="fishClearBtn" style="background:#c23b22; border-radius:40px; padding:8px 12px;">清空</button>
                        <button id="fishGrabBtn" style="background:#e09d32; border-radius:40px; padding:8px 12px;">🎲 抢庄</button>
                        <button id="fishDoubleBtn" style="background:#f39c12; border-radius:40px; padding:8px 12px;">🎯 双押</button>
                    </div>
                    <div class="dice-3d-area" style="margin-bottom:12px;">
                        <div class="dice-cube" id="fishDice0"></div>
                        <div class="dice-cube" id="fishDice1"></div>
                        <div class="dice-cube" id="fishDice2"></div>
                    </div>
                    <div id="fishPatternGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:12px 0;"></div>
                    <div class="online-count-box"><span>🎮 在线人数</span><span id="onlineCountFish">--</span><button id="fishRulesBtn" style="background:#2a1f16; border-radius:30px; padding:4px 12px;">赔付规则</button></div>
                    <button id="fishRecordBtn" style="width:100%; background:#3a2a1c; border-radius:40px; padding:8px; margin-top:8px;">📜 开奖记录查询</button>
                    <div id="fishPhaseHint" style="text-align:center; margin-top:8px; font-size:0.7rem; background:#00000066; border-radius:30px; padding:4px;">🎲 下注阶段 · 25秒</div>
                </div>
            </div>
        `;
        const patternNames = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        function buildFishDice(diceDiv, initPattern) {
            if (!diceDiv) return;
            diceDiv.innerHTML = '';
            const faces = ['front','back','right','left','top','bottom'];
            const facePatterns = ["鱼","虾","蟹","葫芦","金钱","鸡"];
            faces.forEach((face, idx) => {
                let fd = document.createElement('div');
                fd.className = `dice-face ${face}`;
                fd.style.background = "#faf0cf";
                fd.style.display = "flex";
                fd.style.alignItems = "center";
                fd.style.justifyContent = "center";
                fd.style.fontSize = "1.8rem";
                fd.style.fontWeight = "bold";
                fd.style.color = "#b97f2e";
                fd.innerText = facePatterns[idx];
                diceDiv.appendChild(fd);
            });
            setFishDiceValue(diceDiv, initPattern);
        }
        function setFishDiceValue(diceDiv, patternName) {
            const rotMap = { "鱼":"rotateX(0deg) rotateY(0deg)", "虾":"rotateX(0deg) rotateY(-90deg)", "蟹":"rotateX(0deg) rotateY(180deg)", "葫芦":"rotateX(0deg) rotateY(90deg)", "金钱":"rotateX(-90deg) rotateY(0deg)", "鸡":"rotateX(90deg) rotateY(0deg)" };
            diceDiv.style.transform = rotMap[patternName] || "rotateX(0deg)";
        }
        const fishDice = [document.getElementById('fishDice0'), document.getElementById('fishDice1'), document.getElementById('fishDice2')];
        fishDice.forEach(d => buildFishDice(d, "鱼"));
        let patternBets = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
        let specialDouble = 0;
        let currentChip = 10;
        let hasGrabbed = false;
        let playerBankerBalance = 0;
        let gameRecords = [];
        let isRolling = false, roundActive = true, countdownTimer = null, autoRollTimer = null;
        let lastWinAmount = 0;
        function updateFishUI() {
            for (let p in patternBets) { let span = document.getElementById(`fishBet_${p}`); if(span) span.innerText = patternBets[p]; }
            document.getElementById('fishTotalBet').innerText = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            document.getElementById('fishLastWin').innerText = lastWinAmount;
            let bankerSpan = document.getElementById('fishBankerDisplay');
            if (bankerSpan) bankerSpan.innerText = hasGrabbed ? playerBankerBalance.toFixed(2) : "∞";
        }
        function addFishBet(pattern, val) {
            if (hasGrabbed) { showToast("庄家不能下注"); return; }
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (val > 500) { showToast("单注上限500"); return; }
            if (total+val > 2000) { showToast("总注上限2000"); return; }
            if (val > getUserBalance()) { showToast("余额不足"); return; }
            setUserBalance(getUserBalance() - val);
            patternBets[pattern] += val;
            updateFishUI();
        }
        function subFishBet(pattern, val) {
            let cur = patternBets[pattern];
            if (cur < val) val = cur;
            if (val===0) return;
            patternBets[pattern] -= val;
            setUserBalance(getUserBalance() + val);
            updateFishUI();
        }
        function addDoubleBet() {
            if (hasGrabbed) { showToast("庄家不能下注"); return; }
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (currentChip > 500) { showToast("双押上限500"); return; }
            if (total+currentChip > 2000) { showToast("总注上限2000"); return; }
            if (currentChip > getUserBalance()) { showToast("余额不足"); return; }
            setUserBalance(getUserBalance() - currentChip);
            specialDouble += currentChip;
            updateFishUI();
        }
        function clearFishBets() {
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (total>0) setUserBalance(getUserBalance() + total);
            patternBets = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
            specialDouble = 0;
            updateFishUI();
        }
        async function rollFishDiceWithAnimation(finalPatterns) {
            for (let i=0;i<3;i++) {
                fishDice[i].style.transition = 'none';
                fishDice[i].style.transform = `rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`;
            }
            await new Promise(r=>setTimeout(r, 50));
            for (let i=0;i<3;i++) fishDice[i].style.transition = 'transform 0.5s cubic-bezier(0.4,0,0.2,1)';
            for (let step=0; step<12; step++) {
                for (let i=0;i<3;i++) {
                    let randX = Math.random()*360, randY = Math.random()*360;
                    fishDice[i].style.transform = `rotateX(${randX}deg) rotateY(${randY}deg)`;
                }
                await new Promise(r=>setTimeout(r, 80));
            }
            for (let i=0;i<3;i++) setFishDiceValue(fishDice[i], finalPatterns[i]);
            await new Promise(r=>setTimeout(r, 400));
        }
        async function settleFish() {
            if (isRolling) return;
            let totalBet = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (totalBet === 0) { showToast("请先下注"); return; }
            isRolling = true;
            let r1 = patternNames[Math.floor(Math.random()*6)];
            let r2 = patternNames[Math.floor(Math.random()*6)];
            let r3 = patternNames[Math.floor(Math.random()*6)];
            await rollFishDiceWithAnimation([r1,r2,r3]);
            let winAmount = 0;
            let occurs = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
            [r1,r2,r3].forEach(p=>occurs[p]++);
            for (let p in patternBets) {
                let cnt = occurs[p];
                if (cnt>0 && patternBets[p]>0) winAmount += patternBets[p] * (cnt+1);
            }
            if (specialDouble>0 && occurs["鱼"]>0 && occurs["虾"]>0) winAmount += specialDouble * 4.5;
            winAmount = winAmount * adjustFactor;
            if (totalBet>0) {
                setUserBalance(getUserBalance() + winAmount);
                if (hasGrabbed) {
                    let net = (totalBet - winAmount) * adjustFactor;
                    playerBankerBalance += net;
                    if (playerBankerBalance < 0) { hasGrabbed=false; playerBankerBalance=0; localStorage.removeItem('fish_player_banker'); showToast("庄家破产"); }
                    else localStorage.setItem('fish_player_banker', playerBankerBalance);
                    updateFishUI();
                }
                lastWinAmount = winAmount - totalBet;
            } else lastWinAmount = 0;
            gameRecords.unshift({ time:new Date().toLocaleTimeString(), dice:`${r1},${r2},${r3}`, result:winAmount>0?`赢${winAmount}`:`输${totalBet}` });
            if (gameRecords.length>50) gameRecords.pop();
            clearFishBets();
            let pop = document.createElement('div'); pop.className='result-popup '+(winAmount>0?'win':'lose'); pop.textContent=winAmount>0?`🎉 赢 ${winAmount.toFixed(2)} 🎉`:`😭 输 ${totalBet} 😭`; document.body.appendChild(pop); setTimeout(()=>pop.classList.add('show'),10); setTimeout(()=>{pop.classList.remove('show'); setTimeout(()=>pop.remove(),300);},2000);
            isRolling=false;
            if(roundActive) startFishRound();
        }
        function startFishRound() {
            if (countdownTimer) clearInterval(countdownTimer);
            let remaining=25;
            let hintDiv = document.getElementById('fishPhaseHint');
            if(hintDiv) hintDiv.innerText = `🎲 下注阶段 · ${remaining}秒`;
            countdownTimer = setInterval(()=>{
                remaining--;
                if(hintDiv) hintDiv.innerText = `🎲 下注阶段 · ${remaining}秒`;
                if(remaining<=0){
                    clearInterval(countdownTimer);
                    if(!isRolling && roundActive) settleFish();
                }
            },1000);
            if(autoRollTimer) clearTimeout(autoRollTimer);
            autoRollTimer = setTimeout(()=>{
                if(countdownTimer) clearInterval(countdownTimer);
                if(!isRolling && roundActive) settleFish();
            },25000);
        }
        let gridDiv = document.getElementById('fishPatternGrid');
        patternNames.forEach(p => {
            let card = document.createElement('div'); card.className='bet-card';
            card.innerHTML = `<div class="fish-pattern-img" style="font-size:2rem;">${p}</div><div class="bet-name">${p}</div><div class="bet-amount"><button class="btn-chip sub-pat" data-pat="${p}">-</button><span id="fishBet_${p}">0</span><button class="btn-chip add-pat" data-pat="${p}">+</button></div>`;
            gridDiv.appendChild(card);
        });
        document.querySelectorAll('.fish-wrapper .chip').forEach(chip=>{
            chip.onclick=function(){ currentChip=parseInt(this.dataset.chip); document.querySelectorAll('.fish-wrapper .chip').forEach(c=>c.classList.remove('selected')); this.classList.add('selected'); };
        });
        document.getElementById('fishGrabBtn').onclick=()=>{
            if(hasGrabbed){ showToast("已是庄家"); return; }
            if(getUserBalance()>=2001){
                setUserBalance(getUserBalance()-2001);
                playerBankerBalance=2001;
                hasGrabbed=true;
                localStorage.setItem('fish_player_banker', playerBankerBalance);
                updateFishUI();
                showToast("抢庄成功，不可下注");
            } else showToast("余额不足2001");
        };
        document.getElementById('fishClearBtn').onclick=clearFishBets;
        document.getElementById('fishDoubleBtn').onclick=addDoubleBet;
        document.getElementById('fishRollBtn').onclick=()=>{ if(!isRolling && roundActive) settleFish(); };
        document.getElementById('fishRecordBtn').onclick=()=>{
            if(gameRecords.length===0){ showToast("暂无记录"); return; }
            let html='<div>'; gameRecords.forEach(r=>{ html+=`<div style="margin:6px;">${r.time} 🎲 ${r.dice} ${r.result}</div>`; }); html+='</div><button id="closeRec">关闭</button>';
            let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove();
        };
        document.getElementById('fishRulesBtn').onclick=()=>{ showToast("六门:出现次数赔(次数+1)倍，双押鱼+虾4.5倍，全局系数"+adjustFactor); };
        gridDiv.addEventListener('click',(e)=>{
            let btn=e.target.closest('.btn-chip');
            if(!btn) return;
            let pat=btn.dataset.pat;
            if(btn.classList.contains('add-pat')) addFishBet(pat, currentChip);
            if(btn.classList.contains('sub-pat')) subFishBet(pat, currentChip);
        });
        let savedBankerFish = localStorage.getItem('fish_player_banker');
        if(savedBankerFish && parseInt(savedBankerFish)>0){ hasGrabbed=true; playerBankerBalance=parseInt(savedBankerFish); }
        updateFishUI();
        startFishRound();
        fishDestroy = () => { roundActive=false; if(countdownTimer) clearInterval(countdownTimer); if(autoRollTimer) clearTimeout(autoRollTimer); container.innerHTML=''; };
        return fishDestroy;
    }

                        <div style="flex:1; background:#0c0b09; border-radius:44px; padding:6px; text-align:center;"><div>🎲 总押注</div><div id="totalBet">0</div></div>
                    </div>
                    <div class="dice-3d-area"><div class="dice-cube" id="dice1"></div><div class="dice-cube" id="dice2"></div><div class="dice-cube" id="dice3"></div></div>
                    <div style="text-align:center;"><span id="totalPoints" style="font-size:26px; font-weight:800;">3</span></div>
                    <div style="display:flex; justify-content:space-between; background:#00000066; border-radius:40px; padding:6px 12px; margin:8px 0;"><span>🎲 本局中奖:</span><span id="rollingWinNumber">0.00</span></div>
                    <div style="display:flex; justify-content:space-between; background:#19140ed9; border-radius:40px; padding:6px 12px;"><div>⏱️ 下注 <span id="countdownNum">25</span> s</div><div>🎲 筹码 <span id="selectedChip">0</span></div></div>
                    <div style="display:flex; gap:8px; margin:12px 0;"><button id="clearAllBtn" style="flex:1; background:#c23b22; border-radius:60px; padding:8px;">❌ 清空</button><button id="repeatBtn" style="flex:1; background:#e09d32; border-radius:60px; padding:8px;">🔄 续押</button><button id="refreshBtn" style="flex:1; background:#2c7a4d; border-radius:60px; padding:8px;">💹 刷新</button></div>
                    <div class="chips"><div class="chip" data-val="10">10</div><div class="chip" data-val="20">20</div><div class="chip" data-val="50">50</div><div class="chip" data-val="100">100</div><div class="chip" data-val="500">500</div><div class="chip" data-val="1000" id="adminTriggerChip">1K</div></div>
                    <div style="font-size:0.7rem;">🎲 大小单双 · 赔率2倍</div>
                    <div class="special-grid"><div class="bet-card special-card" data-type="BIG">大<div id="bet_BIG">0</div></div><div class="bet-card special-card" data-type="SMALL">小<div id="bet_SMALL">0</div></div><div class="bet-card special-card" data-type="ODD">单<div id="bet_ODD">0</div></div><div class="bet-card special-card" data-type="EVEN">双<div id="bet_EVEN">0</div></div></div>
                    <div style="font-size:0.7rem;">🎲 点数投注 · 4-17点</div><div class="points-grid">${pointsHtml}</div>
                    <div style="font-size:0.7rem;">🎲 围骰 · 豹子专区</div><div class="trio-grid">${trioHtml}</div>
                    <button id="showDiceHistoryBtn" style="width:100%; background:#3a2a1c; border-radius:60px; padding:10px; margin-top:14px;">📜 开奖记录查询</button>
                </div>
            </div>
        `;
        function buildDiceCube(diceDiv) {
            if (!diceDiv) return;
            diceDiv.innerHTML = '';
            const faces = ['front','back','right','left','top','bottom'];
            const valMap = { front:1, back:6, right:4, left:3, top:2, bottom:5 };
            faces.forEach(face => {
                let num = valMap[face];
                let fd = document.createElement('div');
                fd.className = `dice-face ${face}`;
                let pipHtml = '';
                if (num===1) pipHtml = '<div class="pip pip-center"></div>';
                else if (num===2) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-br"></div>';
                else if (num===3) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div>';
                else if (num===4) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                else if (num===5) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-mid"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                else pipHtml = '<div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div>';
                fd.innerHTML = pipHtml;
                diceDiv.appendChild(fd);
            });
        }
        const diceEls = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
        diceEls.forEach(d=>buildDiceCube(d));
        function setCubeValue(dice, val) {
            const rot = { 1:'rotateX(0deg)',2:'rotateX(-90deg)',3:'rotateY(90deg)',4:'rotateY(-90deg)',5:'rotateX(90deg)',6:'rotateX(180deg)' };
            dice.style.transform = rot[val];
        }
        let bets = { BIG:0,SMALL:0,ODD:0,EVEN:0,4:0,5:0,6:0,7:0,8:0,9:0,10:0,11:0,12:0,13:0,14:0,15:0,16:0,17:0,TRIPLE_1:0,TRIPLE_2:0,TRIPLE_3:0,TRIPLE_4:0,TRIPLE_5:0,TRIPLE_6:0,ALL_TRIPLE:0 };
        let selectedChip = 0, currentBalance = getUserBalance(), isDrawing = false, isBetLocked = false, countdownInterval = null, rollingAnimation = null, lastBet = null;
        const totalEl = document.getElementById('totalPoints');
        const rollingWinEl = document.getElementById('rollingWinNumber');
        function updateUI() {
            for(let k in bets) { let el = document.getElementById(`bet_${k}`); if(el) el.innerText = bets[k]; }
            document.getElementById('totalBet').innerText = Object.values(bets).reduce((a,b)=>a+b,0);
            document.getElementById('diceBankerDisplay').innerText = systemBankerBalance.toFixed(2);
            document.getElementById("userBalanceDisplay").innerText = getUserBalance().toFixed(2);
        }
        async function startRollingLong(finalVals, duration=5000) {
            return new Promise(resolve => {
                let steps=30, step=0, interval=duration/steps;
                let iv = setInterval(()=>{ diceEls.forEach(d=>setCubeValue(d, Math.floor(Math.random()*6)+1)); step++; if(step>=steps){ clearInterval(iv); diceEls.forEach((d,i)=>setCubeValue(d, finalVals[i])); resolve(); } }, interval);
            });
        }
        function startRollingNumber(finalAmount) {
            if(rollingAnimation) cancelAnimationFrame(rollingAnimation);
            let start=performance.now(), startVal=parseFloat(rollingWinEl.innerText)||0;
            function update(now){ let p=Math.min(1,(now-start)/5000), ease=1-Math.pow(1-p,2), cur=startVal+(finalAmount-startVal)*ease; rollingWinEl.innerText=cur.toFixed(2); if(p<1) rollingAnimation=requestAnimationFrame(update); else { rollingWinEl.innerText=finalAmount.toFixed(2); rollingAnimation=null; } }
            rollingAnimation=requestAnimationFrame(update);
        }
        function getResultInfo(d1,d2,d3){
            let total=d1+d2+d3, types=[];
            if(total>=11 && total<=17) types.push('BIG'); else types.push('SMALL');
            if(total%2===1) types.push('ODD'); else types.push('EVEN');
            if(d1===d2 && d2===d3) { types.push(`TRIPLE_${d1}`); types.push('ALL_TRIPLE'); }
            return {total, types};
        }
        async function addBet(type){
            if(isBetLocked) { showToast("开奖中请等待"); return; }
            if(selectedChip<=0){ showToast("请选择筹码"); return; }
            if(selectedChip > currentBalance){ showToast("余额不足"); return; }
            currentBalance -= selectedChip;
            setUserBalance(currentBalance);
            bets[type] += selectedChip;
            updateUI();
        }
        async function clearAllBets(){
            let total = Object.values(bets).reduce((a,b)=>a+b,0);
            currentBalance += total;
            setUserBalance(currentBalance);
            for(let k in bets) bets[k]=0;
            updateUI();
            showToast("已清空");
        }
        async function repeatLastBet(){
            if(!lastBet || Object.values(lastBet).every(v=>v===0)){ showToast("无续押记录"); return; }
            let need = Object.values(lastBet).reduce((a,b)=>a+b,0);
            if(need > currentBalance){ showToast("余额不足"); return; }
            for(let k in bets) bets[k]=0;
            for(let k in lastBet) bets[k]=lastBet[k];
            currentBalance -= need;
            setUserBalance(currentBalance);
            updateUI();
            if(!isDrawing && !isBetLocked) startAutoDraw();
        }
        let gameRecords = [];
        function addRecord(d1,d2,d3,winAmount,totalBetVal){ gameRecords.unshift({ time:new Date().toLocaleTimeString(), dice:`${d1},${d2},${d3}`, result:winAmount>0?`赢${winAmount}`:`输${totalBetVal}`, win:winAmount }); if(gameRecords.length>50) gameRecords.pop(); }
        async function startAutoDraw(){
            if(isDrawing) return;
            let totalBetVal = Object.values(bets).reduce((a,b)=>a+b,0);
            isDrawing=true; isBetLocked=true;
            let d1=Math.floor(Math.random()*6)+1, d2=Math.floor(Math.random()*6)+1, d3=Math.floor(Math.random()*6)+1;
            let {total, types} = getResultInfo(d1,d2,d3);
            let winAmount=0;
            if(totalBetVal>0){
                if(types.includes('BIG') && bets.BIG) winAmount += bets.BIG*2;
                if(types.includes('SMALL') && bets.SMALL) winAmount += bets.SMALL*2;
                if(types.includes('ODD') && bets.ODD) winAmount += bets.ODD*2;
                if(types.includes('EVEN') && bets.EVEN) winAmount += bets.EVEN*2;
                if(bets[total]) winAmount += bets[total] * oddsMap[total];
                for(let t of types) { if(t.startsWith('TRIPLE_') && bets[t]) winAmount += bets[t]*150; if(t==='ALL_TRIPLE' && bets.ALL_TRIPLE) winAmount += bets.ALL_TRIPLE*30; }
                winAmount = winAmount * adjustFactor;
            }
            startRollingNumber(winAmount);
            await startRollingLong([d1,d2,d3], 5000);
            totalEl.innerText = total;
            if(totalBetVal>0){
                if(winAmount>0) currentBalance += winAmount;
                setUserBalance(currentBalance);
                let netToBanker = (totalBetVal - winAmount) * adjustFactor;
                modifyBanker(netToBanker);
            }
            addRecord(d1,d2,d3,winAmount,totalBetVal);
            for(let k in bets) bets[k]=0;
            lastBet = JSON.parse(JSON.stringify(bets));
            updateUI();
            let pop = document.createElement('div'); pop.className='result-popup '+(winAmount>0?'win':'lose'); pop.textContent=winAmount>0?`🎉 赢 ${winAmount.toFixed(2)} 🎉`:(totalBetVal>0?`😭 输 ${totalBetVal} 😭`:`🎲 点数 ${total} 无人下注`); document.body.appendChild(pop); setTimeout(()=>pop.classList.add('show'),10); setTimeout(()=>{ pop.classList.remove('show'); setTimeout(()=>pop.remove(),300); },2000);
            isDrawing=false; isBetLocked=false;
            startCountdown(25);
        }
        function startCountdown(sec){
            if(countdownInterval) clearInterval(countdownInterval);
            let c=sec, cdSpan=document.getElementById('countdownNum');
            cdSpan.innerText=c; isBetLocked=false;
            countdownInterval = setInterval(()=>{
                if(c<=1){ clearInterval(countdownInterval); countdownInterval=null; isBetLocked=true; startAutoDraw(); }
                else { c--; cdSpan.innerText=c; if(c<=5) cdSpan.classList.add('countdown-warning'); else cdSpan.classList.remove('countdown-warning'); }
            },1000);
        }
        async function refreshBalance(){ currentBalance=getUserBalance(); updateUI(); showToast("余额已刷新"); }
        document.querySelectorAll('.dice-wrapper .chip').forEach(chip=>{ chip.onclick=function(){ selectedChip=parseInt(this.dataset.val); document.getElementById('selectedChip').innerText=selectedChip; document.querySelectorAll('.dice-wrapper .chip').forEach(c=>c.classList.remove('selected')); this.classList.add('selected'); }; });
        document.querySelectorAll('.special-card').forEach(c=>{ c.onclick=()=>addBet(c.dataset.type); });
        document.querySelectorAll('.point-card').forEach(c=>{ c.onclick=()=>addBet(parseInt(c.dataset.point)); });
        document.querySelectorAll('.trio-card').forEach(c=>{ c.onclick=()=>addBet(c.dataset.type); });
        document.getElementById('clearAllBtn').onclick=clearAllBets;
        document.getElementById('repeatBtn').onclick=repeatLastBet;
        document.getElementById('refreshBtn').onclick=refreshBalance;
        document.getElementById('showDiceHistoryBtn').onclick=()=>{
            if(gameRecords.length===0){ showToast("暂无记录"); return; }
            let html='<div style="max-height:350px; overflow-y:auto;">';
            gameRecords.forEach(r=>{ html+=`<div style="margin:6px; padding:6px;">${r.time} 🎲 ${r.dice} ${r.result}</div>`; });
            html+='</div><button id="closeRec" style="background:#d49c3f; margin-top:12px; padding:8px; border-radius:60px;">关闭</button>';
            let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove();
        };
        diceEls.forEach((d,i)=>setCubeValue(d,1));
        totalEl.innerText=3;
        updateUI();
        startCountdown(25);
        diceDestroy = () => { if(countdownInterval) clearInterval(countdownInterval); if(rollingAnimation) cancelAnimationFrame(rollingAnimation); container.innerHTML=''; };
        return diceDestroy;
    }

    // 游戏3/4占位
    let game3Destroy = null, game4Destroy = null;
    function initGame3(container) { if (game3Destroy) game3Destroy(); container.innerHTML = `<div style="padding:60px; text-align:center;">🎮 游戏3 · 即将开放</div>`; game3Destroy = () => container.innerHTML = ''; return game3Destroy; }
    function initGame4(container) { if (game4Destroy) game4Destroy(); container.innerHTML = `<div style="padding:60px; text-align:center;">♠️ 游戏4 · 百人牛牛筹备中</div>`; game4Destroy = () => container.innerHTML = ''; return game4Destroy; }

    // ==================== 认证大厅 & 游戏总控 ====================
    function renderAuthUI() {
        const savedPhone = localStorage.getItem('saved_phone') || '';
        const savedPwd = localStorage.getItem('saved_password') || '';
        const rememberChecked = localStorage.getItem('remember_me') === 'true';
        document.getElementById('app').innerHTML = `
            <div class="auth-panel" style="padding: 30px 20px;">
                <h2 style="text-align:center;">🎲 双游戏大厅</h2>
                <input type="tel" id="regPhone" placeholder="手机号" maxlength="11" value="${savedPhone}" style="width:100%; margin:8px 0; padding:12px; border-radius:60px; background:#2a241e; border:none; color:#ffebc2;">
                <input type="password" id="regPassword" placeholder="密码 (≥4位)" value="${savedPwd}" style="width:100%; margin:8px 0; padding:12px; border-radius:60px;">
                <input type="text" id="regReferralCode" placeholder="推荐码 (必填)" maxlength="20" style="width:100%; margin:8px 0; padding:12px; border-radius:60px;">
                <div style="display:flex; gap:12px; margin:12px 0;"><input type="checkbox" id="rememberCheckbox" ${rememberChecked ? 'checked' : ''}> <label>记住账号</label></div>
                <div style="display:flex; gap:12px;"><button id="loginBtn" style="flex:1; background:#d49c3f; border-radius:60px; padding:10px;">登录</button><button id="registerBtn" style="flex:1; background:#3f6a47; border-radius:60px;">注册</button></div>
                <div class="auth-note" style="font-size:0.7rem; text-align:center; margin-top:12px;">有效推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100 | 送1000文</div>
            </div>
        `;
        document.getElementById('registerBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim(), pwd = document.getElementById('regPassword').value, code = document.getElementById('regReferralCode').value.trim().toUpperCase();
            if (!phone || !pwd) return showToast("填写完整");
            if (!/^1[3-9]\d{9}$/.test(phone)) return showToast("手机号无效");
            if (pwd.length < 4) return showToast("密码≥4位");
            if (!code || !validReferralCodes.includes(code)) return showToast("推荐码无效");
            if (usersData[phone]) return showToast("已注册");
            usersData[phone] = { password: pwd, balance: 1000, referralCode: code, registerTime: new Date().toLocaleString() };
            saveUsers(); showToast("注册成功！请登录");
        };
        document.getElementById('loginBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim(), pwd = document.getElementById('regPassword').value, rem = document.getElementById('rememberCheckbox').checked;
            if (!phone || !pwd) return showToast("填写账号密码");
            let user = usersData[phone];
            if (!user || user.password !== pwd) return showToast("账号或密码错误");
            if (rem) { localStorage.setItem('saved_phone', phone); localStorage.setItem('saved_password', pwd); localStorage.setItem('remember_me', 'true'); }
            else { localStorage.removeItem('saved_phone'); localStorage.removeItem('saved_password'); localStorage.setItem('remember_me', 'false'); }
            currentUser = { phone, ...user };
            showToast(`欢迎 ${phone}`);
            renderGameLobby();
        };
    }
    function renderGameLobby() {
        document.getElementById('app').innerHTML = `
            <div class="user-section"><div class="user-info-row"><span>📱 ${currentUser.phone.substring(0,7)}*** | 💰 余额: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span><div class="btn-group"><button id="serviceBtn" class="service-btn">📞 客服</button><button id="logoutBtn" class="logout-btn">退出</button></div></div><div class="charge-withdraw-row"><button id="rechargeBtn" class="charge-btn">💎 充值</button><button id="withdrawBtn" class="withdraw-btn">💰 提现</button></div></div>
            <div class="game-nav"><button class="game-tab active" data-game="fish">🐟 葫芦鱼</button><button class="game-tab" data-game="dice">🎲 至尊骰宝</button><button class="game-tab" data-game="game3">🎮 游戏3</button><button class="game-tab" data-game="game4">♠️ 游戏4</button></div>
            <div class="game-container"><div id="gamePanel"></div></div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;   // 增强版提现
        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const inits = { fish: initFishGame, dice: initDiceGame, game3: initGame3, game4: initGame4 };
        async function switchGame(id) { if(currentDestroy) currentDestroy(); gamePanel.innerHTML=''; currentDestroy = await inits[id](gamePanel); updateAllBalance(); }
        document.querySelectorAll('.game-tab').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.game-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
        switchGame('dice');
        document.addEventListener('click', (e) => { if(e.target && (e.target.id === 'adminTriggerChip' || e.target.id === 'fishAdminTrigger')) { adminClickCount++; if(adminClickTimer) clearTimeout(adminClickTimer); adminClickTimer = setTimeout(()=>{ adminClickCount=0; }, 1000); if(adminClickCount>=3){ adminClickCount=0; clearTimeout(adminClickTimer); openAdminModal(); } } });
    }
    renderAuthUI();
</script>
</body>
