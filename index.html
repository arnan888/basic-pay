<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_SUNKEN_PRO</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        
        body { 
            background: #05070a; 
            color:#FFF; font-family: "PingFang SC", sans-serif; 
            height:100vh; overflow:hidden; display:flex; flex-direction:column;
        }

        /* 状态条：极致简约，无敏感数据 */
        .status-bar { 
            background:#000; height:30px; display:flex; align-items:center; 
            padding:0 15px; font-size:11px; color:#0f0; justify-content:center; 
            border-bottom:1px solid #1a1a1a; font-weight:bold; letter-spacing:1px;
        }

        /* 核心区：垂直分布 */
        .core-section { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:20px 15px; gap:20px; }

        /* --- 核心改动：凹陷式深绿资产看板 --- */
        .balance-card { 
            width:100%; 
            /* 凹陷质感：内阴影是关键 */
            background: linear-gradient(145deg, #020805, #0a1f14); 
            border: 2px solid #061810;
            border-radius:15px; 
            padding:30px 20px; 
            text-align:center;
            box-shadow: 
                inset 6px 6px 15px rgba(0,0,0,0.8), 
                inset -2px -2px 10px rgba(0,230,118,0.05),
                0 4px 10px rgba(0,0,0,0.5);
            position: relative;
        }
        .bal-label { font-size:12px; color:#2e7d32; margin-bottom:8px; font-weight:bold; letter-spacing:1px; text-transform:uppercase; }
        .bal-val { 
            font-size:65px; font-weight:900; 
            color:#00e676; 
            text-shadow: 0 0 15px rgba(0,230,118,0.4); 
            letter-spacing:-1px; 
            font-family: 'Courier New', Courier, monospace; /* 增加仪器感 */
        }
        .bet-info { font-size:13px; color:#1b5e20; margin-top:10px; }
        .bet-val { color:#00e676; font-weight:bold; }

        /* 转盘模块：保持科技蓝对冲 */
        .wheel-module { 
            position:relative; width:240px; height:240px; 
            background:#001529; border-radius:15px; border:1px solid #0d47a1;
            display:flex; align-items:center; justify-content:center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .wheel-outer {
            width: 210px; height: 210px; border-radius: 50%;
            border: 4px solid #0d47a1; position: relative;
            background: #020810; overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .wheel-inner-bg {
            position: absolute; width: 100%; height: 100%;
            background: conic-gradient(
                #001529 0deg 45deg, #0d47a1 45deg 90deg, 
                #002171 90deg 135deg, #01579b 135deg 180deg, 
                #002171 180deg 225deg, #0d47a1 225deg 270deg,
                #001529 270deg 315deg, #001529 315deg 360deg
            );
            opacity: 0.5;
        }
        .pointer-line { 
            position:absolute; top:8px; left:50%; transform:translateX(-50%); 
            width:3px; height:40px; background:#F00; z-index:100; box-shadow:0 0 15px #F00;
        }
        .slot-val { 
            position:absolute; width:100%; height:100%; text-align:center; 
            padding-top:15px; font-weight:900; font-size:15px; color:#4fc3f7;
        }
        .high-m { color: #fff !important; text-shadow: 0 0 10px #fff; }

        /* 控制台 */
        .console { width:100%; background:#000; border-top:1px solid #1a1a1a; padding:15px 15px 85px 15px; }
        .main-row { display:flex; gap:12px; margin-bottom:15px; }
        .adj { 
            width:60px; height:60px; background:#111; border:1px solid #222; color:#FFF; 
            font-size:35px; border-radius:10px; display:flex; align-items:center; justify-content:center; 
        }
        .exec { 
            flex:1; background:#F00; border:none; color:#FFF; 
            font-size:24px; font-weight:900; border-radius:10px; letter-spacing:4px;
        }
        
        .tech-row { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
        .mode-b { 
            padding:14px; background:#0a0a0a; border:1px solid #222; 
            color:#555; font-size:12px; font-weight:bold; text-align:center; border-radius:8px; 
        }
        .mode-b.on { border-color:#F00; color:#F00; background:rgba(255,0,0,0.05); }

        /* 底部导航 */
        .nav { position:fixed; bottom:0; width:100%; height:75px; background:#000; border-top:1px solid #1a1a1a; display:grid; grid-template-columns: repeat(4, 1fr); }
        .nav-n { display:flex; flex-direction:column; align-items:center; justify-content:center; color:#333; font-size:12px; font-weight:bold; }
        .nav-n.act { color:#F00; }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>● 系统通信建立 AI_QUANT_ENCRYPTED ● </span>
    </div>

    <div class="core-section">
        <!-- 凹陷深绿余额板块 -->
        <div class="balance-card">
            <div class="bal-label">实时可用资产 (USDT)</div>
            <div class="bal-val" id="ui_bal">100.3</div>
            <div class="bet-info">量化执行额度: <span class="bet-val" id="ui_bet">0.5</span></div>
        </div>

        <!-- 科技蓝转盘核心 -->
        <div class="wheel-module">
            <div class="pointer-line"></div>
            <div id="ui_wheel" class="wheel-outer">
                <div class="wheel-inner-bg"></div>
                <div class="slot-val" style="transform:rotate(0deg)">1.5X</div>
                <div class="slot-val" style="transform:rotate(45deg); opacity:0.3;">0X</div>
                <div class="slot-val" style="transform:rotate(90deg)">120X</div>
                <div class="slot-val high-m" style="transform:rotate(135deg)">500X</div>
                <div class="slot-val high-m" style="transform:rotate(180deg)">X88</div>
                <div class="slot-val" style="transform:rotate(225deg)">50X</div>
                <div class="slot-val" style="transform:rotate(270deg)">20X</div>
                <div class="slot-val" style="transform:rotate(315deg); opacity:0.3;">0X</div>
            </div>
        </div>
    </div>

    <div class="console">
        <div class="main-row">
            <div class="adj" onclick="changeBet(-0.5)">－</div>
            <button id="go_btn" class="exec" onclick="go()">开始执行</button>
            <div class="adj" onclick="changeBet(0.5)">＋</div>
        </div>
        <div class="tech-row">
            <div id="auto_btn" class="mode-b" onclick="toggleAuto()">🤖 自动挂机: 关</div>
            <div id="speed_btn" class="mode-b" onclick="toggleSpeed()">⚡ 极速模式: 1X</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-n">行情</div>
        <div class="nav-n">资产中心</div>
        <div class="nav-n">历史记录</div>
        <div class="nav-n act">量化终端</div>
    </div>

    <script>
        let balance = 100.3, bet = 0.5, rot = 0, busy = false;
        let isAuto = false, speedMode = 1;

        function toggleAuto() {
            isAuto = !isAuto;
            const btn = document.getElementById('auto_btn');
            btn.innerText = `🤖 自动挂机: ${isAuto ? '开' : '关'}`;
            btn.className = isAuto ? 'mode-b on' : 'mode-b';
            if(isAuto && !busy) go();
        }

        function toggleSpeed() {
            speedMode = (speedMode === 1) ? 2 : 1;
            const btn = document.getElementById('speed_btn');
            btn.innerText = `⚡ 极速模式: ${speedMode === 1 ? '1X' : '2X'}`;
            btn.className = speedMode === 2 ? 'mode-b on' : 'mode-b';
            document.getElementById('ui_wheel').style.transitionDuration = speedMode === 1 ? '5s' : '1.2s';
        }

        function changeBet(val) {
            if (busy) return;
            let n = bet + val;
            if (n >= 0.5) { bet = n; document.getElementById('ui_bet').innerText = bet.toFixed(1); }
        }

        function animateWin(prize) {
            const balEl = document.getElementById('ui_bal');
            let currentWin = 0.1;
            const timer = setInterval(() => {
                currentWin += prize / 40;
                if (currentWin >= prize) {
                    currentWin = prize;
                    clearInterval(timer);
                    if(isAuto) setTimeout(go, 800);
                }
                const tempBal = (balance - prize) + currentWin;
                balEl.innerText = tempBal.toFixed(1);
            }, 30);
        }

        function go() {
            if (busy || balance < bet) {
                isAuto = false;
                document.getElementById('auto_btn').className = 'mode-b';
                document.getElementById('auto_btn').innerText = '🤖 自动挂机: 关';
                return;
            }
            busy = true;
            document.getElementById('go_btn').style.background = "#500";

            const r = Math.floor(Math.random() * 1000);
            let idx = (r < 480) ? 1 : (r < 950 ? 0 : (r < 995 ? 7 : (r < 998 ? 5 : (r < 2 ? 3 : 2))));
            const targetAngle = idx * 45;
            rot += (Math.floor(Math.random() * 5) + 12) * 360 + (360 - targetAngle - (rot % 360)) + 360;
            document.getElementById('ui_wheel').style.transform = `rotate(${rot}deg)`;

            const waitTime = speedMode === 1 ? 5000 : 1200;

            setTimeout(() => {
                const multis = [1.5, 0, 120, 500, 88, 50, 20, 0];
                const prize = multis[idx] * bet;
                balance = (balance - bet) + prize;
                if (prize > 0) animateWin(prize);
                else {
                    document.getElementById('ui_bal').innerText = balance.toFixed(1);
                    if(isAuto) setTimeout(go, 1000);
                }
                setTimeout(() => { busy = false; document.getElementById('go_btn').style.background = "#F00"; }, 1500);
            }, waitTime);
        }
    </script>
</body>
</html>
