<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>量化终端 · 暗铸模式</title>
    <style>
        :root { --mg: #14281d; --pn: #232d36; --rd: #c93434; --gd: #f0a04b; --bg: #071a10; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        .app-shell { flex: 1; display: flex; flex-direction: column; padding: 12px; gap: 10px; overflow-y: auto; padding-bottom: 80px; }

        /* 顶部余额 - 像素级还原阴影 */
        .box-frame { background: var(--pn); border-radius: 30px; padding: 8px; border: 2px solid var(--mg); box-shadow: 0 10px 20px #000; }
        .box-inner { background: #232d36; border-radius: 24px; padding: 18px; text-align: center; box-shadow: inset 4px 6px 12px #000; background-image: radial-gradient(rgba(255,255,255,0.03) 1.5px, transparent 1.5px); background-size: 20px 20px; }
        .val { color: #ff5252; font-size: 60px; font-weight: bold; margin: 5px 0; letter-spacing: -2px; }

        /* 转盘区 */
        .wheel-panel { background: var(--pn); border-radius: 35px; border: 2px solid var(--mg); padding: 30px 0; position: relative; box-shadow: inset 0 0 20px #000; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 20px 20px; }
        .pointer { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 50; width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 30px solid #ff3b30; }
        .plate { width: 260px; height: 260px; border-radius: 50%; background: #2d7053; border: 12px solid #141a1f; outline: 3px solid var(--mg); position: relative; margin: 0 auto; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .x0 { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 85px; height: 85px; background: #141a1f; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ff5252; font-weight: bold; font-size: 28px; border: 3px solid var(--mg); z-index: 10; }
        .item { position: absolute; width: 100%; height: 100%; text-align: center; transform-origin: 50% 50%; padding-top: 15px; }
        .item label { display: block; font-size: 10px; color: #fff; margin-top: -2px; }

        /* 按键区 */
        .row { display: flex; gap: 12px; }
        .side { width: 70px; height: 70px; background: var(--pn); border: 2px solid var(--mg); border-radius: 20px; color: var(--gd); font-size: 35px; box-shadow: 4px 6px 10px #000; cursor: pointer; }
        .draw { flex: 1; background: linear-gradient(180deg, #d33838, #8a1a1a); border: none; border-radius: 50px; height: 70px; color: white; font-size: 24px; font-weight: bold; box-shadow: 0 7px 0 #5e1111; cursor: pointer; }
        .opt { flex: 1; height: 50px; background: #232d36; border: 2px solid var(--mg); border-radius: 20px; color: #fff; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 5px; box-shadow: inset 2px 2px 4px #000; }

        /* 底部导航栏 - 严格还原 */
        .navbar { position: fixed; bottom: 0; width: 100%; max-width: 414px; height: 75px; background: #0d1210; border-top: 1px solid #1a2e24; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8a969e; font-size: 11px; }
        .nav-active { color: #ff5252; }
        .nav-icon { width: 24px; height: 24px; border-radius: 5px; background: #232d36; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="box-frame">
        <div class="box-inner">
            <div style="font-size:12px; color:#8a969e">💰 可用余额 (USDT)</div>
            <div id="bText" class="val">146.8</div>
            <div style="font-size:14px; color:#8a969e">🔥 单注额度: <span id="aText" style="color:var(--gd); font-weight:bold">5.5</span></div>
        </div>
    </div>

    <div class="wheel-panel">
        <div class="pointer"></div>
        <div id="plate" class="plate">
            <div class="x0">X0</div>
            <div class="item" style="transform:rotate(0deg)">🦢<label>仙鹤</label></div>
            <div class="item" style="transform:rotate(45deg)">🐺<label>孤狼</label></div>
            <div class="item" style="transform:rotate(90deg)">🐯<label>猛虎</label></div>
            <div class="item" style="transform:rotate(135deg)">🐢<label>玄武</label></div>
            <div class="item" style="transform:rotate(180deg)">🦌<label>麒麟</label></div>
            <div class="item" style="transform:rotate(225deg)">🐲<label>神龙</label></div>
            <div class="item" style="transform:rotate(270deg)">🔥<label>凤凰</label></div>
            <div class="item" style="transform:rotate(315deg)">🦅<label>大鹏</label></div>
        </div>
    </div>

    <div class="row">
        <button class="side" onclick="adj(-0.5)">−</button>
        <button class="draw" onclick="spin()">▶ 执行抽取</button>
        <button class="side" onclick="adj(0.5)">+</button>
    </div>

    <div class="row" style="margin-top:5px;">
        <button class="opt" onclick="auto()">🤖 自动模式: <span id="as">关</span></button>
        <button class="opt" onclick="speed()">⚡ 变速: <span id="ss">1X</span></button>
    </div>
</div>

<!-- 底部导航 -->
<div class="navbar">
    <div class="nav-item">📊<span>行情</span></div>
    <div class="nav-item">🏢<span>资产中心</span></div>
    <div class="nav-item">📂<span>历史记录</span></div>
    <div class="nav-item nav-active">🎯<span>量化终端</span></div>
</div>

<script>
    let bal = 146.8, amt = 5.5, rot = 0, isA = false, sp = 1, busy = false;
    function adj(v) { if(!busy){ amt = Math.max(0, amt+v); document.getElementById('aText').innerText = amt.toFixed(1); } }
    function speed() { sp = sp === 1 ? 2 : 1; document.getElementById('ss').innerText = sp+'X'; }
    function auto() { isA = !isA; document.getElementById('as').innerText = isA?'开':'关'; if(isA && !busy) spin(); }
    function spin() {
        if(busy || bal < amt) { isA = false; document.getElementById('as').innerText = '关'; return; }
        busy = true; bal -= amt; document.getElementById('bText').innerText = bal.toFixed(1);
        const p = document.getElementById('plate');
        const target = Math.floor(Math.random()*8)*45;
        rot += 1800 + (360 - (rot%360)) + (360 - target);
        p.style.transition = `transform ${5/sp}s cubic-bezier(0.1, 0, 0.1, 1)`;
        p.style.transform = `rotate(${rot}deg)`;
        setTimeout(() => { busy = false; if(isA) setTimeout(spin, 800); }, (5000/sp)+200);
    }
</script>
</body>
</html>
