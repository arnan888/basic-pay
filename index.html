<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>霓虹三游戏 · 完美最终版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c); font-family: 'Inter', system-ui, sans-serif; padding: 16px; min-height: 100vh; color: #eef2ff; }
        #app { max-width: 560px; margin: 0 auto; background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(12px); border-radius: 48px; border: 1px solid rgba(0, 255, 255, 0.2); box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(0,255,255,0.1); overflow: hidden; }
        .auth-panel { padding: 32px 24px; background: rgba(10,14,23,0.7); }
        .auth-panel h2, .auth-panel h3 { text-align: center; margin-bottom: 20px; font-weight: 700; background: linear-gradient(135deg,#00ffff,#ff00ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .auth-input { width: 100%; padding: 14px 18px; margin: 8px 0; background: rgba(0,0,0,0.6); border: 1px solid #00ffff; border-radius: 32px; color: #00ffff; font-size: 1rem; outline: none; }
        .flex-row { display: flex; gap: 12px; align-items: center; margin: 12px 0; }
        .code-btn, .auth-btn { background: linear-gradient(135deg,#ff00ff,#ff44aa); border: none; border-radius: 40px; padding: 12px 20px; font-weight: bold; color: white; cursor: pointer; width: 100%; }
        .code-btn { background: linear-gradient(135deg,#00ffff,#00aaff); color: black; width: auto; }
        .user-section { background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); padding: 16px; border-bottom: 1px solid #00ffff; }
        .user-info-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        #userBalanceDisplay { font-size: 1.7rem; font-weight: 800; background: linear-gradient(135deg,#00ffff,#ff00ff); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
        .btn-group { display: flex; gap: 8px; }
        .btn-sm { background: rgba(0,255,255,0.2); border: 1px solid #00ffff; padding: 6px 14px; border-radius: 40px; color: #00ffff; cursor: pointer; }
        .charge-btn, .withdraw-btn { background: linear-gradient(135deg,#ff00ff,#ff44aa); border: none; padding: 8px 18px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; }
        .lang-switch { background: #00ffff; border: none; border-radius: 30px; padding: 4px 12px; color: black; cursor: pointer; }
        .game-nav { display: flex; gap: 8px; background: rgba(0,0,0,0.4); padding: 8px 16px; margin: 16px 12px; border-radius: 60px; }
        .game-tab { flex: 1; background: transparent; border: none; padding: 10px 0; border-radius: 40px; font-weight: 600; color: #00ffff; cursor: pointer; }
        .game-tab.active { background: linear-gradient(135deg,#ff00ff,#ff44aa); color: white; box-shadow: 0 0 12px #ff00ff; }
        .game-container { padding: 12px 16px 24px; }
        .game-card { background: rgba(0,0,0,0.55); backdrop-filter: blur(8px); border-radius: 32px; padding: 20px; border: 1px solid #00ffff; }
        .chip { background: linear-gradient(145deg,#00aaff,#0088cc); display: inline-block; padding: 8px 16px; border-radius: 40px; margin: 4px; cursor: pointer; font-weight: bold; color: white; }
        .chip.selected { background: linear-gradient(145deg,#ff00ff,#cc00aa); box-shadow: 0 0 10px #ff00ff; }
        .quick-bet, .clear-bet, .exec-btn { background: rgba(0,255,255,0.2); border: 1px solid #00ffff; border-radius: 30px; padding: 6px 14px; margin: 4px; cursor: pointer; color: #00ffff; }
        .exec-btn { background: linear-gradient(135deg,#00ffff,#00aaff); color: black; font-weight: bold; }
        .main-go { background: linear-gradient(135deg,#ff00ff,#ff44aa); color: white; }
        .dice-3d-area { display: flex; justify-content: center; gap: 20px; margin: 20px 0; perspective: 800px; }
        .dice-cube { width: 80px; height: 80px; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); }
        .dice-face { position: absolute; width: 100%; height: 100%; background: #1e1e2a; border-radius: 16px; border: 2px solid #00ffff; display: flex; align-items: center; justify-content: center; backface-visibility: visible; }
        .pip { width: 14px; height: 14px; background: #00ffff; border-radius: 50%; margin: 3px; box-shadow: 0 0 4px cyan; }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 12px; left: 12px; }
        .pip-tr { position: absolute; top: 12px; right: 12px; }
        .pip-bl { position: absolute; bottom: 12px; left: 12px; }
        .pip-br { position: absolute; bottom: 12px; right: 12px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1, .pip-l2, .pip-l3 { position: absolute; left: 12px; }
        .pip-l1 { top: 12px; }
        .pip-l2 { top: 50%; transform: translateY(-50%); }
        .pip-l3 { bottom: 12px; }
        .pip-r1, .pip-r2, .pip-r3 { position: absolute; right: 12px; }
        .pip-r1 { top: 12px; }
        .pip-r2 { top: 50%; transform: translateY(-50%); }
        .pip-r3 { bottom: 12px; }
        .front { transform: translateZ(40px); }
        .back { transform: rotateY(180deg) translateZ(40px); }
        .right { transform: rotateY(90deg) translateZ(40px); }
        .left { transform: rotateY(-90deg) translateZ(40px); }
        .top { transform: rotateX(90deg) translateZ(40px); }
        .bottom { transform: rotateX(-90deg) translateZ(40px); }
        @media (max-width:480px){ .dice-cube{width:65px;height:65px;} .front,.back,.right,.left,.top,.bottom{transform:translateZ(32px);} .back{transform:rotateY(180deg) translateZ(32px);} .right{transform:rotateY(90deg) translateZ(32px);} .left{transform:rotateY(-90deg) translateZ(32px);} .top{transform:rotateX(90deg) translateZ(32px);} .bottom{transform:rotateX(-90deg) translateZ(32px);} }
        .fish-pattern-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 16px 0; }
        .fish-bet-card { background: rgba(0,0,0,0.6); border-radius: 24px; padding: 12px; text-align: center; border: 1px solid #00ffff; cursor: pointer; transition: 0.1s; }
        .fish-bet-card.selected { border: 3px solid #ff00ff; background: #ff00ff22; }
        .bet-card { background: rgba(0,0,0,0.6); border-radius: 20px; padding: 8px; text-align: center; cursor: pointer; border: 1px solid #00ffff; }
        .points-grid, .trio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px,1fr)); gap: 8px; margin: 12px 0; }
        .history-cell { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(0,255,255,0.2); font-weight: bold; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #0f172a; border-radius: 32px; padding: 24px; max-width: 90%; max-height: 85%; overflow: auto; color: #00ffff; border: 1px solid #ff00ff; }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #00ffff; padding: 8px 20px; border-radius: 60px; z-index: 2000; font-weight: bold; white-space: nowrap; border: 1px solid cyan; }
        .result-popup { position: fixed; bottom: 40%; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg,#ff00ff,#ff44aa); color: white; padding: 12px 28px; border-radius: 60px; font-weight: bold; font-size: 1.2rem; z-index: 1500; box-shadow: 0 0 20px magenta; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .admin-table th, .admin-table td { padding: 8px 4px; border-bottom: 1px solid #00ffff; text-align: left; }
        .admin-btn { background: #00aaff; border: none; border-radius: 20px; padding: 4px 8px; margin: 2px; color: black; font-weight: bold; cursor: pointer; }
        .dt-flash { animation: dtFlash 0.3s 3; }
        .dt-animation-box { animation: dtShake 0.5s ease-in-out; }
        @keyframes dtFlash { 0%{opacity:1;text-shadow:0 0 5px white;} 50%{opacity:0.3;text-shadow:0 0 30px gold;} 100%{opacity:1;text-shadow:0 0 5px white;} }
        @keyframes dtShake { 0%{transform:translateX(0);} 25%{transform:translateX(-10px) scale(1.1);text-shadow:0 0 10px gold;} 50%{transform:translateX(10px) scale(1.2);text-shadow:0 0 20px orange;} 75%{transform:translateX(-5px) scale(1.1);} 100%{transform:translateX(0) scale(1);} }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== 双语 ====================
    const lang = {
        zh: { recharge:"💎 充值", withdraw:"💰 提现", service:"📞 客服", logout:"退出", balance:"余额", phoneOrEmail:"手机号 / 邮箱", password:"密码 (≥4位)", referralCode:"推荐码 (必填)", remember:"记住账号", login:"登录", register:"注册", referralNote:"推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100", getCode:"获取验证码", verifyCode:"验证码", registerNow:"注册新账户", gameFish:"🐟 葫芦鱼", gameDice:"🎲 至尊骰宝", gameDT:"🐉 龙虎斗", game4:"♠️ 游戏4", fishRoll:"🎲 开骰", fishClear:"清空", fishGrab:"🎲 抢庄", fishDouble:"🎯 双押", diceClear:"清空", diceRepeat:"续押", diceRefresh:"刷新", dtFight:"确认投注", dtCancel:"全部取消", dtRepeat:"续押", dtRefresh:"刷新" },
        th: { recharge:"💎 เติมเงิน", withdraw:"💰 ถอนเงิน", service:"📞 บริการ", logout:"ออก", balance:"ยอดเงิน", phoneOrEmail:"เบอร์โทร / อีเมล", password:"รหัสผ่าน (≥4)", referralCode:"รหัสแนะนำ", remember:"จำฉัน", login:"เข้าสู่ระบบ", register:"สมัคร", referralNote:"รหัส: VIP666,888VIP,GOLD2025,LUCKY8,DICE100", getCode:"รับรหัส", verifyCode:"รหัสยืนยัน", registerNow:"สมัครสมาชิก", gameFish:"🐟 ปลาหมึก", gameDice:"🎲 เซียนเต๋า", gameDT:"🐉 มังกรเสือ", game4:"♠️ เกม4", fishRoll:"🎲 เปิด", fishClear:"ล้าง", fishGrab:"🎲 รับเจ้ามือ", fishDouble:"🎯 เดิมพันคู่", diceClear:"ล้าง", diceRepeat:"เล่นซ้ำ", diceRefresh:"รีเฟรช", dtFight:"ยืนยัน", dtCancel:"ยกเลิก", dtRepeat:"เล่นซ้ำ", dtRefresh:"รีเฟรช" }
    };
    let currentLang = 'zh';
    function t(key) { return lang[currentLang][key] || lang.zh[key] || key; }

    // ==================== 全局数据 ====================
    let systemBankerBalance = localStorage.getItem('neon_system_banker') ? parseFloat(localStorage.getItem('neon_system_banker')) : 50000;
    let adjustFactor = localStorage.getItem('neon_adjustFactor') ? parseFloat(localStorage.getItem('neon_adjustFactor')) : 1.0;
    let validReferralCodes = ["VIP666","888VIP","GOLD2025","LUCKY8","DICE100"];
    let usersData = JSON.parse(localStorage.getItem('neon_users')) || {};
    let currentUser = null;
    let verificationCodes = {};

    function saveUsers() { localStorage.setItem('neon_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.account]?.balance || 0) : 0; }
    function setUserBalance(amount) { if(!currentUser) return; usersData[currentUser.account].balance = Math.max(0, amount); saveUsers(); let span = document.getElementById("userBalanceDisplay"); if(span) span.innerText = getUserBalance().toFixed(2); }
    function showToast(msg) { let t=document.createElement('div'); t.className='toast-message'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    function recharge() { let yuan=prompt(t('recharge')+" (1元=1余额)","0"); if(!yuan) return; let num=parseFloat(yuan); if(isNaN(num)||num<=0){showToast("请输入正数");return;} setUserBalance(getUserBalance()+num); showToast(`${t('recharge')} +${num.toFixed(2)} 元`); }
    function withdraw() { let bal=getUserBalance(); if(bal<=0){showToast("余额不足");return;} let amount=parseFloat(prompt("提现金额 (元)","10")); if(isNaN(amount)||amount<=0||amount>bal){showToast("金额无效");return;} let type=confirm("提现方式：确定=微信，取消=支付宝")?"微信":"支付宝"; let account=prompt("请输入收款账号:"); if(!account) return; setUserBalance(bal-amount); let records=JSON.parse(localStorage.getItem('neon_withdraw'))||[]; records.push({phone:currentUser.account,amount,type,account,time:new Date().toLocaleString()}); localStorage.setItem('neon_withdraw',JSON.stringify(records)); showToast(`提现申请已提交！${amount}元将处理到${type}账号 ${account}`); }
    function showServiceModal() { alert("客服微信: game_kf_888"); }
    function addGameRecord(account, gameName, betInfo, result, winAmount, betAmount) { if(!usersData[account]) return; let rec=usersData[account].records||[]; rec.unshift({time:new Date().toLocaleString(), game:gameName, bet:betInfo, result, win:winAmount, amount:betAmount}); if(rec.length>100) rec.pop(); usersData[account].records=rec; saveUsers(); }

    // ==================== 管理员后台 ====================
    let adminPassword = localStorage.getItem('neon_admin_pwd') || "admin888";
    function openAdminModal() {
        let pwd = prompt("管理员密码:");
        if(pwd !== adminPassword) { showToast("密码错误"); return; }
        let allUsers = Object.keys(usersData).map(acc => ({ account:acc, balance:usersData[acc].balance, regTime:usersData[acc].registerTime||'未知' }));
        let modalDiv = document.createElement('div'); modalDiv.className='modal';
        modalDiv.innerHTML = `<div class="modal-content" style="max-width:500px;"><h3 style="text-align:center;color:#ff00ff;">🎛️ 霓虹管理员后台</h3><div style="display:flex;gap:8px;margin:12px 0;"><input type="text" id="adminSearchInput" placeholder="🔍 搜索账号" style="flex:2;padding:8px;border-radius:40px;border:1px solid #00ffff;background:#000;color:#00ffff;"><button id="adminSearchBtn" class="admin-btn">搜索</button><button id="adminResetSearch" class="admin-btn">重置</button></div><div style="max-height:220px;overflow-y:auto;margin-bottom:12px;"><table class="admin-table"><thead><tr><th>账号</th><th>余额</th><th>注册时间</th><th>操作</th></tr></thead><tbody id="adminUserTableBody"></tbody></table></div><select id="adminTargetUser" style="width:100%;margin:8px 0;padding:8px;border-radius:40px;background:#000;color:#00ffff;border:1px solid #00ffff;">${allUsers.map(u=>`<option value="${u.account}">${u.account} (${u.balance.toFixed(2)} 元)</option>`).join('')}</select><div style="display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;"><input id="adminAmount" placeholder="金额" value="0" style="flex:1;padding:8px;border-radius:40px;background:#000;color:#00ffff;"><button id="adminAddBalance" class="admin-btn">➕ 上分</button><button id="adminSubBalance" class="admin-btn">➖ 下分</button><button id="adminResetBalance" class="admin-btn">🔄 重置0</button></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;"><button id="adminQueryBalance" class="admin-btn">🔍 查询余额</button><button id="adminExportUsers" class="admin-btn">📋 导出用户</button><button id="adminAddCode" class="admin-btn">➕ 新增推荐码</button><button id="adminListCodes" class="admin-btn">📜 查看推荐码</button><button id="adminSetBanker" class="admin-btn">🏦 设置庄家</button><button id="adminChangePwd" class="admin-btn">🔑 改管理员密码</button><button id="adminResetFishBanker" class="admin-btn">🐟 重置鱼虾蟹庄家</button></div><div style="margin:12px 0;"><label>🎛️ 全局赔付系数: <input id="adminAdjustFactor" step="0.01" value="${adjustFactor}" style="width:90px;padding:4px;border-radius:20px;background:#000;color:#00ffff;"></label><button id="adminSaveFactor" class="admin-btn">保存系数</button><span style="font-size:0.7rem;margin-left:8px;">(影响所有游戏赔付)</span></div><button id="adminViewWithdraw" class="admin-btn" style="width:100%;margin-bottom:8px;">📋 查看所有提现记录</button><button id="adminCloseBtn" class="auth-btn" style="background:#ff00ff;">关闭后台</button></div>`;
        document.body.appendChild(modalDiv);
        function renderUserTable(searchKeyword=''){ let filtered=searchKeyword?allUsers.filter(u=>u.account.includes(searchKeyword)):allUsers; let tbody=modalDiv.querySelector('#adminUserTableBody'); tbody.innerHTML=filtered.map(u=>`<tr><td>${u.account}</td><td>💰 ${u.balance.toFixed(2)}</td><td>${u.regTime}</td><td><button class="viewRecordBtn" data-account="${u.account}" class="admin-btn">📜 记录</button></td></tr>`).join(''); document.querySelectorAll('.viewRecordBtn').forEach(btn=>{ btn.onclick=()=>{ let acc=btn.dataset.account; let records=usersData[acc]?.records||[]; let html='<div style="max-height:300px;overflow-y:auto;">'+records.map(r=>`<div style="padding:6px;border-bottom:1px solid #00ffff;">${r.time} | ${r.game} | 押 ${r.bet} → ${r.result} | ${r.win>0?'<span style="color:#0f0;">赢 '+r.win+'</span>':'<span style="color:#f0f;">输 '+r.amount+'</span>'}</div>`).join('')+'</div><button id="closeRec" class="auth-btn">关闭</button>'; let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove(); }; }); }
        renderUserTable();
        modalDiv.querySelector('#adminSearchBtn').onclick=()=>{ let kw=modalDiv.querySelector('#adminSearchInput').value.trim(); renderUserTable(kw); };
        modalDiv.querySelector('#adminResetSearch').onclick=()=>{ modalDiv.querySelector('#adminSearchInput').value=''; renderUserTable(''); };
        const getTarget=()=>modalDiv.querySelector('#adminTargetUser').value;
        const getAmt=()=>parseFloat(modalDiv.querySelector('#adminAmount').value)||0;
        modalDiv.querySelector('#adminAddBalance').onclick=()=>{ let t=getTarget(), a=getAmt(); if(a<=0){showToast("金额必须大于0");return;} usersData[t].balance+=a; saveUsers(); if(currentUser?.account===t) setUserBalance(usersData[t].balance); showToast(`${t} +${a} 元`); modalDiv.remove(); openAdminModal(); };
        modalDiv.querySelector('#adminSubBalance').onclick=()=>{ let t=getTarget(), a=getAmt(); if(a<=0||usersData[t].balance<a){showToast("金额无效或余额不足");return;} usersData[t].balance-=a; saveUsers(); if(currentUser?.account===t) setUserBalance(usersData[t].balance); showToast(`${t} -${a} 元`); modalDiv.remove(); openAdminModal(); };
        modalDiv.querySelector('#adminResetBalance').onclick=()=>{ let t=getTarget(); if(confirm(`确认将 ${t} 的余额重置为 0 元吗？`)){ usersData[t].balance=0; saveUsers(); if(currentUser?.account===t) setUserBalance(0); showToast(`${t} 余额已重置为 0`); modalDiv.remove(); openAdminModal(); } };
        modalDiv.querySelector('#adminQueryBalance').onclick=()=>{ let t=getTarget(); showToast(`${t} 当前余额: ${usersData[t].balance.toFixed(2)} 元`); };
        modalDiv.querySelector('#adminExportUsers').onclick=()=>{ let data=allUsers.map(u=>`${u.account},${u.balance},${u.regTime}`).join('\n'); navigator.clipboard.writeText("账号,余额,注册时间\n"+data).then(()=>showToast(`已复制 ${allUsers.length} 条用户数据`)).catch(()=>showToast("复制失败")); };
        modalDiv.querySelector('#adminAddCode').onclick=()=>{ let newCode=prompt("请输入新的推荐码（大写字母+数字）:").trim().toUpperCase(); if(newCode && !validReferralCodes.includes(newCode)){ validReferralCodes.push(newCode); localStorage.setItem('neon_valid_codes',JSON.stringify(validReferralCodes)); showToast(`推荐码 ${newCode} 已添加`); } else showToast("无效或已存在"); };
        modalDiv.querySelector('#adminListCodes').onclick=()=>{ alert(`当前有效推荐码：\n${validReferralCodes.join(', ')}`); };
        modalDiv.querySelector('#adminSetBanker').onclick=()=>{ let newAmt=parseFloat(prompt("骰宝系统庄家新余额:",systemBankerBalance)); if(!isNaN(newAmt) && newAmt>=0){ systemBankerBalance=newAmt; localStorage.setItem('neon_system_banker',systemBankerBalance); showToast(`骰宝庄家余额已设为 ${newAmt.toFixed(2)} 元`); let bankerEl=document.getElementById('diceBankerDisplay'); if(bankerEl) bankerEl.innerText=systemBankerBalance.toFixed(2); } else showToast("无效"); };
        modalDiv.querySelector('#adminChangePwd').onclick=()=>{ let old=prompt("当前管理员密码:"); if(old!==adminPassword){showToast("密码错误");return;} let newPwd=prompt("新密码(≥4位):"); if(newPwd && newPwd.length>=4){ adminPassword=newPwd; localStorage.setItem('neon_admin_pwd',newPwd); showToast("管理员密码修改成功"); } else showToast("密码至少4位"); };
        modalDiv.querySelector('#adminSaveFactor').onclick=()=>{ let newFac=parseFloat(modalDiv.querySelector('#adminAdjustFactor').value); if(!isNaN(newFac) && newFac>=0.2 && newFac<=3.0){ adjustFactor=newFac; localStorage.setItem('neon_adjustFactor',adjustFactor); showToast(`全局赔付系数已设为 ${adjustFactor}`); } else showToast("系数范围 0.2 ~ 3.0"); };
        modalDiv.querySelector('#adminViewWithdraw').onclick=()=>{ let records=JSON.parse(localStorage.getItem('neon_withdraw'))||[]; if(records.length===0){alert("暂无提现记录");return;} let txt=records.map(r=>`${r.phone}  ${r.amount}元 ${r.type} ${r.account} ${r.time}`).join('\n'); alert("提现记录：\n"+txt); };
        modalDiv.querySelector('#adminResetFishBanker').onclick=()=>{ localStorage.removeItem('neon_fish_banker'); showToast("鱼虾蟹庄家余额已重置"); if(window.currentFishReset) window.currentFishReset(); };
        modalDiv.querySelector('#adminCloseBtn').onclick=()=>modalDiv.remove();
    }
    // ==================== 龙虎斗（简化版，但完整动画） ====================
    let dragonTigerDestroy = null;
    function initDragonTigerGame(container) {
        if(dragonTigerDestroy) dragonTigerDestroy();
        container.innerHTML = `<div class="game-card"><div style="background:rgba(0,0,0,0.5);border-radius:28px;padding:16px;text-align:center;margin-bottom:16px;"><div style="font-size:2rem;display:flex;justify-content:space-between;"><span id="dtDragonSpan" style="color:#ff00ff;">🐉 龙</span><span id="dtVsSpan" style="color:#00ffff;">VS</span><span id="dtTigerSpan" style="color:#00ffff;">虎 🐯</span></div><div id="dtBattleResult" style="margin-top:8px;"></div></div><div style="display:flex;justify-content:space-between;margin-bottom:12px;"><div>👤 <span id="currentUserId">${currentUser.account}</span></div><div><button id="myHistoryBtnDT" class="quick-bet">我的记录</button><button id="newUserBtnDT" class="quick-bet">新用户</button></div></div><div style="display:flex;gap:8px;margin:12px 0;"><input type="text" id="switchUserIdInputDT" placeholder="切换账号" style="flex:1;background:rgba(0,0,0,0.6);border:1px solid #00ffff;border-radius:30px;padding:10px;color:#00ffff;"><button id="switchUserBtnDT" class="quick-bet">登录</button></div><div class="multi-bet-item" data-type="DRAGON" style="background:rgba(0,0,0,0.5);border-radius:24px;padding:12px;margin-bottom:12px;"><div>🐉 龙</div><div class="bet-amount" id="betDragonAmount">0</div><div><button class="quick-bet" data-type="DRAGON" data-amount="10">+10</button><button class="quick-bet" data-type="DRAGON" data-amount="20">+20</button><button class="quick-bet" data-type="DRAGON" data-amount="50">+50</button><button class="quick-bet" data-type="DRAGON" data-amount="100">+100</button><button class="clear-bet" data-type="DRAGON">清空</button></div></div><div class="multi-bet-item" data-type="TIE" style="background:rgba(0,0,0,0.5);border-radius:24px;padding:12px;margin-bottom:12px;"><div>⚖️ 和</div><div class="bet-amount" id="betTieAmount">0</div><div><button class="quick-bet" data-type="TIE" data-amount="10">+10</button><button class="quick-bet" data-type="TIE" data-amount="20">+20</button><button class="quick-bet" data-type="TIE" data-amount="50">+50</button><button class="quick-bet" data-type="TIE" data-amount="100">+100</button><button class="clear-bet" data-type="TIE">清空</button></div></div><div class="multi-bet-item" data-type="TIGER" style="background:rgba(0,0,0,0.5);border-radius:24px;padding:12px;margin-bottom:12px;"><div>🐯 虎</div><div class="bet-amount" id="betTigerAmount">0</div><div><button class="quick-bet" data-type="TIGER" data-amount="10">+10</button><button class="quick-bet" data-type="TIGER" data-amount="20">+20</button><button class="quick-bet" data-type="TIGER" data-amount="50">+50</button><button class="quick-bet" data-type="TIGER" data-amount="100">+100</button><button class="clear-bet" data-type="TIGER">清空</button></div></div><div style="display:flex;gap:12px;margin:12px 0;"><div>📊 总押注: <span id="totalBetAmountDT">0</span></div><div>🏆 预计奖金: <span id="valWinDT">0</span></div></div><div>⏱️ 下一局: <span id="countdownNumDT">30</span> s</div><div style="display:flex;gap:12px;margin:12px 0;"><span class="speed-btn active" data-speed="1">1X</span><span class="speed-btn" data-speed="2">2X</span><span class="speed-btn" data-speed="3">3X</span></div><div class="history-area"><div>最近10局</div><div id="historyGridDT" class="history-grid"></div><div id="recordListDT"></div></div><div style="display:flex;gap:8px;margin-top:16px;"><button id="refreshBtnDT" class="exec-btn">刷新</button><button id="repeatBtnDT" class="exec-btn">续押</button><button id="cancelBtnDT" class="exec-btn">全部取消</button><button id="fightBtnDT" class="exec-btn main-go">确认投注</button></div><div style="display:flex;gap:12px;margin-top:16px;"><div>💰 余额: <span id="balanceDisplayDT">${getUserBalance().toFixed(2)}</span></div><div>🎲 彩金池: 50000</div></div></div>`;
        let state = { bets: { DRAGON: 0, TIGER: 0, TIE: 0 }, betRolling: false, speed: 1, countdown: 30, countdownInterval: null };
        let lastBet = null;
        function getCountdownSec() { return state.speed===1?30:(state.speed===2?20:10); }
        function updateUIDT() { document.getElementById('balanceDisplayDT').innerText=getUserBalance().toFixed(2); document.getElementById('betDragonAmount').innerText=state.bets.DRAGON; document.getElementById('betTigerAmount').innerText=state.bets.TIGER; document.getElementById('betTieAmount').innerText=state.bets.TIE; let total=state.bets.DRAGON+state.bets.TIGER+state.bets.TIE; document.getElementById('totalBetAmountDT').innerText=total; let maxWin=Math.max(state.bets.DRAGON*1.95, state.bets.TIGER*1.95, state.bets.TIE*8); document.getElementById('valWinDT').innerText=maxWin.toFixed(2); }
        function addBetAmount(type,amount) { if(state.betRolling) return; let newVal=state.bets[type]+amount; if(newVal>getUserBalance()){ showToast("余额不足"); return; } state.bets[type]=newVal; updateUIDT(); }
        function clearBet(type) { state.bets[type]=0; updateUIDT(); }
        function cancelAllBetsDT() { state.bets={DRAGON:0,TIGER:0,TIE:0}; updateUIDT(); }
        function playDrawAnimation(result, callback) { const dragonSpan=document.getElementById('dtDragonSpan'); const tigerSpan=document.getElementById('dtTigerSpan'); const vsSpan=document.getElementById('dtVsSpan'); if(!dragonSpan){ if(callback) callback(); return; } dragonSpan.classList.remove('dt-flash','dt-animation-box'); tigerSpan.classList.remove('dt-flash','dt-animation-box'); vsSpan.classList.remove('dt-flash'); void dragonSpan.offsetWidth; dragonSpan.classList.add('dt-flash'); tigerSpan.classList.add('dt-flash'); vsSpan.classList.add('dt-flash'); setTimeout(()=>{ dragonSpan.classList.remove('dt-flash'); tigerSpan.classList.remove('dt-flash'); vsSpan.classList.remove('dt-flash'); if(result==='龙'){ dragonSpan.classList.add('dt-animation-box'); setTimeout(()=>dragonSpan.classList.remove('dt-animation-box'),600); } else if(result==='虎'){ tigerSpan.classList.add('dt-animation-box'); setTimeout(()=>tigerSpan.classList.remove('dt-animation-box'),600); } else { dragonSpan.classList.add('dt-animation-box'); tigerSpan.classList.add('dt-animation-box'); setTimeout(()=>{ dragonSpan.classList.remove('dt-animation-box'); tigerSpan.classList.remove('dt-animation-box'); },600); } if(callback) setTimeout(callback,500); },500); }
        function showResultModalDT(result, winAmount, callback){ let overlay=document.createElement('div'); overlay.className='modal'; overlay.innerHTML=`<div class="modal-content"><div style="font-size:60px;">${result==='龙'?'🐉':(result==='虎'?'🐯':'⚖️')}</div><div>${result}</div><div>${winAmount>0?`🎉 中奖 +${winAmount}`:'😞 未中奖'}</div><button id="closeAnim" class="auth-btn">关闭</button></div>`; document.body.appendChild(overlay); overlay.querySelector('#closeAnim').onclick=()=>{ overlay.remove(); if(callback) callback(); }; }
        function placeBetDT(type, amount) { if(state.betRolling) return; state.betRolling=true; let outcomes=['龙','虎','和']; let result=outcomes[Math.floor(Math.random()*3)]; let win=0; if((type==='DRAGON' && result==='龙') || (type==='TIGER' && result==='虎') || (type==='TIE' && result==='和')) win = amount * (result==='和'?8:2); playDrawAnimation(result,()=>{ let newBalance=getUserBalance()-amount+win; setUserBalance(newBalance); let betTypeName=type==='DRAGON'?'龙':(type==='TIGER'?'虎':'和'); addGameRecord(currentUser.account,'龙虎斗',betTypeName,result,win,amount); let rec=usersData[currentUser.account].records||[]; rec.unshift({time:new Date().toLocaleString(), game:'龙虎斗', bet:betTypeName, result, win, amount}); if(rec.length>50) rec.pop(); usersData[currentUser.account].records=rec; let hist=usersData[currentUser.account].resultHistory||[]; hist.unshift(result); if(hist.length>10) hist.pop(); usersData[currentUser.account].resultHistory=hist; saveUsers(); updateHistoryDisplayDT(); updateRecordDisplayDT(); document.getElementById('dtBattleResult').innerHTML=`🎲 开奖: ${result} ${win>0?`✅ +${win}`:'❌'}`; showResultModalDT(result, win, ()=>{ state.betRolling=false; if(state.countdownInterval) clearInterval(state.countdownInterval); startCountdownDT(getCountdownSec()); }); state.bets={DRAGON:0,TIGER:0,TIE:0}; updateUIDT(); }); }
        function executeBetDT() { if(state.betRolling) return; let selected=null, maxAmt=0; if(state.bets.DRAGON>maxAmt){ selected='DRAGON'; maxAmt=state.bets.DRAGON; } if(state.bets.TIGER>maxAmt){ selected='TIGER'; maxAmt=state.bets.TIGER; } if(state.bets.TIE>maxAmt){ selected='TIE'; maxAmt=state.bets.TIE; } if(!selected) return; if(maxAmt>getUserBalance()){ showToast("余额不足"); cancelAllBetsDT(); return; } lastBet={ type:selected, amount:maxAmt }; clearCountdownDT(); placeBetDT(selected, maxAmt); }
        function repeatLastBetDT() { if(lastBet && !state.betRolling) placeBetDT(lastBet.type, lastBet.amount); }
        function startCountdownDT(sec) { if(state.countdownInterval) clearInterval(state.countdownInterval); state.countdown=sec; document.getElementById('countdownNumDT').innerText=state.countdown; state.countdownInterval=setInterval(()=>{ if(state.countdown<=1){ clearInterval(state.countdownInterval); state.countdownInterval=null; let total=state.bets.DRAGON+state.bets.TIGER+state.bets.TIE; if(total>0) executeBetDT(); else startCountdownDT(getCountdownSec()); } else { state.countdown--; document.getElementById('countdownNumDT').innerText=state.countdown; } },1000); }
        function clearCountdownDT() { if(state.countdownInterval){ clearInterval(state.countdownInterval); state.countdownInterval=null; } }
        function setSpeedDT(speed) { state.speed=speed; clearCountdownDT(); startCountdownDT(getCountdownSec()); document.querySelectorAll('.speed-btn').forEach(btn=>{ if(parseInt(btn.dataset.speed)===speed) btn.classList.add('active'); else btn.classList.remove('active'); }); }
        function updateHistoryDisplayDT() { let hist=usersData[currentUser.account]?.resultHistory||[]; let grid=document.getElementById('historyGridDT'); if(!grid) return; grid.innerHTML=''; for(let i=0;i<10;i++){ let cell=document.createElement('div'); cell.className='history-cell'; if(i<hist.length){ let r=hist[i]; cell.style.background=r==='龙'?'#ff00ff':(r==='虎'?'#00ffff':'#ffaa00'); cell.textContent=r==='龙'?'🐉':(r==='虎'?'🐯':'⚖️'); } else { cell.style.background='rgba(0,255,255,0.2)'; cell.textContent='?'; } grid.appendChild(cell); } }
        function updateRecordDisplayDT() { let recs=usersData[currentUser.account]?.records||[]; let listDiv=document.getElementById('recordListDT'); if(!listDiv) return; listDiv.innerHTML=''; recs.slice(0,10).forEach(r=>{ let div=document.createElement('div'); div.style.padding='8px'; div.style.borderBottom='1px solid #00ffff'; let isWin=r.win>0; div.innerHTML=`<span>${r.time}</span> 押${r.bet}→${r.result} <span style="color:${isWin?'#0f0':'#f0f'}">${isWin?`+${r.win}`:`-${r.amount}`}</span>`; listDiv.appendChild(div); }); }
        function showMyHistoryDT() { let recs=usersData[currentUser.account]?.records||[]; let html='<div>'+recs.map(r=>`<div>${r.time} 押${r.bet}→${r.result} ${r.win>0?'赢'+r.win:'输'+r.amount}</div>`).join('')+'</div><button id="closeHist" class="auth-btn">关闭</button>'; let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeHist').onclick=()=>m.remove(); }
        function newUserDT() { let newId=prompt("新账号（手机号/邮箱）:"); if(!newId) return; if(usersData[newId]){ showToast("账号已存在"); return; } usersData[newId]={ balance:0, password:"123456", records:[], resultHistory:[], registerTime:new Date().toLocaleString() }; saveUsers(); showToast(`新账号 ${newId} 创建成功，密码123456`); document.getElementById('switchUserIdInputDT').value=newId; switchUserDT(); }
        function switchUserDT() { let newId=document.getElementById('switchUserIdInputDT').value.trim(); if(!newId) return; if(!usersData[newId]){ showToast("账号不存在"); return; } currentUser={ account:newId, ...usersData[newId] }; document.getElementById('currentUserId').innerText=newId; document.getElementById("userBalanceDisplay").innerText=getUserBalance().toFixed(2); updateUIDT(); updateHistoryDisplayDT(); updateRecordDisplayDT(); clearCountdownDT(); startCountdownDT(getCountdownSec()); showToast(`已切换到 ${newId}`); }
        function refreshBalanceDT() { updateUIDT(); showToast("刷新"); }
        document.querySelectorAll('.quick-bet').forEach(btn=>{ btn.onclick=()=>{ let type=btn.dataset.type, amt=parseInt(btn.dataset.amount); if(type && amt) addBetAmount(type,amt); }; });
        document.querySelectorAll('.clear-bet').forEach(btn=>{ btn.onclick=()=>clearBet(btn.dataset.type); });
        document.getElementById('fightBtnDT').onclick=executeBetDT;
        document.getElementById('cancelBtnDT').onclick=cancelAllBetsDT;
        document.getElementById('repeatBtnDT').onclick=repeatLastBetDT;
        document.getElementById('refreshBtnDT').onclick=refreshBalanceDT;
        document.getElementById('myHistoryBtnDT').onclick=showMyHistoryDT;
        document.getElementById('newUserBtnDT').onclick=newUserDT;
        document.getElementById('switchUserBtnDT').onclick=switchUserDT;
        document.querySelectorAll('.speed-btn').forEach(btn=>{ btn.onclick=()=>setSpeedDT(parseInt(btn.dataset.speed)); });
        updateUIDT(); updateHistoryDisplayDT(); updateRecordDisplayDT(); startCountdownDT(30);
        dragonTigerDestroy = () => { if(state.countdownInterval) clearInterval(state.countdownInterval); container.innerHTML=''; };
        return dragonTigerDestroy;
    }

    function initGame4(container) { container.innerHTML=`<div class="game-card" style="text-align:center;padding:40px;">♠️ 游戏4 · 百人牛牛筹备中</div>`; return ()=>{}; }

    // ==================== 认证界面 ====================
    function renderAuthUI() {
        const savedAcc=localStorage.getItem('neon_saved_account')||'';
        const savedPwd=localStorage.getItem('neon_saved_password')||'';
        const remChecked=localStorage.getItem('neon_remember_me')==='true';
        document.getElementById('app').innerHTML = `<div class="auth-panel"><h2>🎲 霓虹三游戏</h2><div><input type="text" id="loginAccount" class="auth-input" placeholder="${t('phoneOrEmail')}" value="${savedAcc}"><input type="password" id="loginPassword" class="auth-input" placeholder="${t('password')}" value="${savedPwd}"><div class="flex-row"><input type="checkbox" id="rememberCheckbox" ${remChecked?'checked':''}> <label>${t('remember')}</label></div><button id="loginBtn" class="auth-btn">${t('login')}</button></div><hr><h3>${t('registerNow')}</h3><input type="text" id="regAccount" class="auth-input" placeholder="${t('phoneOrEmail')}"><div class="flex-row"><input type="text" id="regCode" class="auth-input" placeholder="${t('verifyCode')}"><button id="getCodeBtn" class="code-btn">${t('getCode')}</button></div><input type="password" id="regPassword" class="auth-input" placeholder="${t('password')}"><input type="text" id="regReferral" class="auth-input" placeholder="${t('referralCode')}"><button id="registerBtn" class="auth-btn">${t('register')}</button><div class="auth-note">${t('referralNote')}</div></div>`;
        document.getElementById('loginBtn').onclick=()=>{ let acc=document.getElementById('loginAccount').value.trim(); let pwd=document.getElementById('loginPassword').value; let rem=document.getElementById('rememberCheckbox').checked; if(!acc||!pwd){showToast("请填写账号和密码");return;} let user=usersData[acc]; if(!user||user.password!==pwd){showToast("账号或密码错误");return;} if(rem){localStorage.setItem('neon_saved_account',acc); localStorage.setItem('neon_saved_password',pwd); localStorage.setItem('neon_remember_me','true');}else{localStorage.removeItem('neon_saved_account'); localStorage.removeItem('neon_saved_password'); localStorage.setItem('neon_remember_me','false');} currentUser={account:acc,...user}; showToast(`欢迎 ${acc}`); renderGameLobby(); };
        document.getElementById('getCodeBtn').onclick=()=>{ let acc=document.getElementById('regAccount').value.trim(); if(!acc){showToast("请填写手机号或邮箱");return;} if(usersData[acc]){showToast("账号已注册，请直接登录");return;} let code=Math.floor(100000+Math.random()*900000); verificationCodes[acc]={code:code.toString(), expire:Date.now()+5*60*1000}; alert(`【验证码】您的验证码是：${code}，5分钟内有效。`); showToast("验证码已发送"); };
        document.getElementById('registerBtn').onclick=()=>{ let acc=document.getElementById('regAccount').value.trim(); let code=document.getElementById('regCode').value.trim(); let pwd=document.getElementById('regPassword').value; let ref=document.getElementById('regReferral').value.trim().toUpperCase(); if(!acc||!code||!pwd||!ref){showToast("请填写完整信息");return;} if(!validReferralCodes.includes(ref)){showToast("推荐码无效");return;} if(usersData[acc]){showToast("账号已存在");return;} let v=verificationCodes[acc]; if(!v||v.code!==code||Date.now()>v.expire){showToast("验证码错误或已过期");return;} if(pwd.length<4){showToast("密码至少4位");return;} usersData[acc]={password:pwd, balance:0, referralCode:ref, registerTime:new Date().toLocaleString(), records:[], resultHistory:[]}; saveUsers(); delete verificationCodes[acc]; showToast("注册成功！请登录"); document.getElementById('regAccount').value=''; document.getElementById('regCode').value=''; document.getElementById('regPassword').value=''; document.getElementById('regReferral').value=''; };
    }

    function renderGameLobby() {
        document.getElementById('app').innerHTML = `<div class="user-section"><div class="user-info-row"><span>📱 ${currentUser.account} | 💰 ${t('balance')}: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span><div class="btn-group"><button id="serviceBtn" class="btn-sm">${t('service')}</button><button id="logoutBtn" class="btn-sm">${t('logout')}</button><button id="langSwitchBtn" class="lang-switch">ภาษาไทย</button></div></div><div class="charge-withdraw-row" style="margin-top:12px;"><button id="rechargeBtn" class="charge-btn">${t('recharge')}</button><button id="withdrawBtn" class="withdraw-btn">${t('withdraw')}</button></div></div><div class="game-nav"><button class="game-tab active" data-game="fish">${t('gameFish')}</button><button class="game-tab" data-game="dice">${t('gameDice')}</button><button class="game-tab" data-game="dragonTiger">${t('gameDT')}</button><button class="game-tab" data-game="game4">${t('game4')}</button></div><div class="game-container" id="gamePanel"></div>`;
        document.getElementById('logoutBtn').onclick=()=>{ currentUser=null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick=showServiceModal;
        document.getElementById('rechargeBtn').onclick=recharge;
        document.getElementById('withdrawBtn').onclick=withdraw;
        document.getElementById('langSwitchBtn').onclick=()=>{ currentLang=currentLang==='zh'?'th':'zh'; document.getElementById('langSwitchBtn').innerText=currentLang==='zh'?'ภาษาไทย':'中文'; renderGameLobby(); };
        const gamePanel=document.getElementById('gamePanel');
        let currentDestroy=null;
        const inits={ fish:initFishGame, dice:initDiceGame, dragonTiger:initDragonTigerGame, game4:initGame4 };
        async function switchGame(id){ if(currentDestroy) currentDestroy(); gamePanel.innerHTML=''; currentDestroy=await inits[id](gamePanel); }
        document.querySelectorAll('.game-tab').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.game-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
        switchGame('fish');
        let adminClickCount=0;
        document.getElementById('userBalanceDisplay').addEventListener('click',()=>{ adminClickCount++; setTimeout(()=>{adminClickCount=0;},1000); if(adminClickCount>=3){ adminClickCount=0; openAdminModal(); } });
    }

    renderAuthUI();
</script>
