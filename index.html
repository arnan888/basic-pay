<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虎对决15秒视频版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        /* 主游戏容器 */
        .game-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 800px;
            background: #4a7c64;
            border-radius: 15px;
            padding: 6px;
            border: 3px solid #2c4a3b;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
            display: flex;
            flex-direction: column;
        }

        /* 顶部状态栏 - 保留内陷效果 */
        .top-bar {
            height: 8%;
            min-height: 40px;
            display: flex;
            gap: 10px;
            padding: 8px 12px;
        }
        .info-card {
            flex: 1;
            background: #6b737e;
            box-shadow: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
            border: 2px solid #2c4a3b;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }
        .info-card label { font-size: 12px; color: #ccc; }
        .info-card span { font-size: 20px; color: #f1c40f; text-shadow: 0 0 6px #f1c40f; }

        /* 中间对决区 - 视频作为背景+保留内陷 */
        .battle-area {
            height: 38%;
            min-height: 180px;
            margin: 4px 10px;
            border: 3px solid #2c4a3b;
            border-radius: 12px;
            box-shadow: inset 10px 10px 20px rgba(0,0,0,0.8), inset -10px -10px 20px rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        /* 视频作为背景 */
        #battleVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        /* 网格遮罩 - 保留原有风格 */
        .grid-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
            z-index: 2;
            pointer-events: none;
        }
        /* 结果文字 */
        .result-text {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 2px 15px;
            border-radius: 10px;
            z-index: 3;
        }

        /* 底部操作区 - 保留所有内陷效果 */
        .control-area {
            flex: 1;
            margin: 0 10px 8px 10px;
            background: #6b737e;
            box-shadow: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
            border: 3px solid #2c4a3b;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }
        /* 选择区 - 内陷效果拉满 */
        .choice-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .choice-btn {
            height: 70px;
            background: #333;
            box-shadow: inset 5px 5px 10px rgba(0,0,0,0.6), inset -3px -3px 6px rgba(255,255,255,0.1);
            border: 2px solid #2c4a3b;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            font-weight: bold;
            cursor: pointer;
        }
        .choice-btn.dragon { color: #3498db; text-shadow: 0 0 10px #3498db; }
        .choice-btn.tiger { color: #e67e22; text-shadow: 0 0 10px #e67e22; }
        .choice-btn.tie { color: #9b59b6; text-shadow: 0 0 10px #9b59b6; }
        .choice-btn.active {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.6), inset -2px -2px 5px rgba(255,255,255,0.1);
            border-color: #f1c40f;
            background: #222;
        }
        /* 数据区 - 内陷效果 */
        .data-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
        }
        .data-item {
            background: #333;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.6), inset -2px -2px 4px rgba(255,255,255,0.05);
            border: 2px solid #2c4a3b;
            border-radius: 8px;
            padding: 0 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .data-item label { font-size: 12px; color: #ccc; }
        .data-item span { font-size: 18px; color: #f1c40f; text-shadow: 0 0 6px #f1c40f; }

        /* 押注文字 */
        .bet-text {
            text-align: center;
            color: #fff;
            font-size: 16px;
            margin: 8px 0;
        }
        .bet-text span { color: #f1c40f; text-shadow: 0 0 8px #f1c40f; }

        /* 按键区 - 内陷效果 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .func-btn {
            width: 50px;
            height: 50px;
            background: #4a7c64;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.6), inset -2px -2px 4px rgba(255,255,255,0.05);
            border: 2px solid #2c4a3b;
            border-radius: 8px;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        .main-btn {
            flex: 1;
            background: linear-gradient(#e53935, #b71c1c);
            box-shadow: 0 5px 0 #7f0000;
            border-radius: 25px;
            font-size: 20px;
        }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #7f0000; }

        /* 模式选择区 */
        .mode-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .mode-btn {
            background: #333;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.6), inset -2px -2px 4px rgba(255,255,255,0.05);
            border: 2px solid #2c4a3b;
            border-radius: 8px;
            color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .mode-btn.active { border-color: #f1c40f; color: #fff; }
        .speed-btn { display: flex; gap: 5px; }
        .speed-btn span { flex: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .speed-btn span.active { background: #f1c40f; color: #000; }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 顶部状态栏 -->
        <div class="top-bar">
            <div class="info-card">
                <label>账户余额</label>
                <span id="balance">857.80</span>
            </div>
            <div class="info-card">
                <label>奖池累积</label>
                <span>84291.50</span>
            </div>
        </div>

        <!-- 中间视频对决区 -->
        <div class="battle-area">
            <!-- 替换成你的视频 -->
            <video id="battleVideo" autoplay muted loop playsinline>
                <source src="your_dragon_tiger_video.mp4" type="video/mp4">
                你的浏览器不支持视频播放，请更新浏览器
            </video>
            <!-- 保留网格遮罩 -->
            <div class="grid-mask"></div>
            <!-- 结果文字 -->
            <div class="result-text" id="resultText">龙虎争霸 · 15秒决胜负</div>
        </div>

        <!-- 底部操作区 -->
        <div class="control-area">
            <div class="choice-group">
                <div class="choice-btn dragon" onclick="setChoice('dragon')">龙</div>
                <div class="choice-btn tie" onclick="setChoice('tie')">和</div>
                <div class="choice-btn tiger" onclick="setChoice('tiger')">虎</div>
            </div>

            <div class="data-group">
                <div class="data-item">
                    <label>当前押注</label>
                    <span id="currentBet">100.00</span>
                </div>
                <div class="data-item">
                    <label>预计奖金</label>
                    <span id="expectWin">800.00</span>
                </div>
                <div class="data-item">
                    <label>当前选择</label>
                    <span id="currentChoice">未选择</span>
                </div>
            </div>

            <div class="bet-text">押注金额：<span id="betAmount">100</span> USDT</div>

            <div class="btn-group">
                <button class="func-btn" onclick="changeBet(-1)">-</button>
                <button class="main-btn" onclick="startBattle()">确认投注</button>
                <button class="func-btn" onclick="changeBet(1)">+</button>
            </div>

            <div class="mode-group">
                <button class="mode-btn" onclick="toggleAuto()">自动投注</button>
                <div class="mode-btn speed-btn">
                    <span class="active" onclick="setSpeed(1)">1X</span>
                    <span onclick="setSpeed(2)">2X</span>
                    <span onclick="setSpeed(3)">3X</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let balance = 857.8;
        let betLevels = [10,50,100,500,1000];
        let currentBetIdx = 2;
        let selected = null;
        let isRunning = false;
        let autoMode = false;
        let speed = 1;

        // 选择投注项
        function setChoice(type) {
            if(isRunning) return;
            selected = type;
            document.querySelectorAll('.choice-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.choice-btn.${type}`).classList.add('active');
            document.getElementById('currentChoice').textContent = type==='dragon'?'龙':type==='tiger'?'虎':'和';
            updateWinAmount();
        }

        // 更新奖金
        function updateWinAmount() {
            let bet = betLevels[currentBetIdx];
            let win = bet * (selected === 'tie' ? 8 : 1);
            document.getElementById('expectWin').textContent = win.toFixed(2);
        }

        // 调整押注金额
        function changeBet(dir) {
            if(isRunning) return;
            currentBetIdx = Math.max(0, Math.min(4, currentBetIdx + dir));
            document.getElementById('betAmount').textContent = betLevels[currentBetIdx];
            document.getElementById('currentBet').textContent = betLevels[currentBetIdx].toFixed(2);
            updateWinAmount();
        }

        // 开始对决
        function startBattle() {
            if(isRunning) { alert('对决进行中，请稍候'); return; }
            if(!selected) { alert('请先选择投注项'); return; }
            
            let bet = betLevels[currentBetIdx];
            if(balance < bet) { alert('余额不足'); return; }

            isRunning = true;
            balance -= bet;
            document.getElementById('balance').textContent = balance.toFixed(2);
            
            document.getElementById('resultText').textContent = '对决开始 · 风云变幻';
            
            // 15秒后出结果
            setTimeout(() => {
                let res = ['dragon','tiger','tie'][Math.floor(Math.random()*3)];
                let resText = res==='dragon'?'龙威盖世':'tiger'?'虎啸山林':'势均力敌';
                document.getElementById('resultText').textContent = resText;
                
                if(res === selected) {
                    balance += bet * (res==='tie'?8:1);
                    document.getElementById('balance').textContent = balance.toFixed(2);
                }
                isRunning = false;
                
                if(autoMode) setTimeout(startBattle, speed*1000);
            }, 15000);
        }

        // 自动模式
        function toggleAuto() {
            autoMode = !autoMode;
            let btn = document.querySelector('.mode-btn:first-child');
            btn.classList.toggle('active');
            btn.textContent = autoMode?'关闭自动':'自动投注';
            if(autoMode && !isRunning) startBattle();
        }

        // 设置速度
        function setSpeed(s) {
            speed = s;
            document.querySelectorAll('.speed-btn span').forEach(sp => sp.classList.remove('active'));
            document.querySelector(`.speed-btn span:nth-child(${s})`).classList.add('active');
        }
    </script>
</body>
</html>
