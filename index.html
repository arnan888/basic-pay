
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>老式牌九 · 赌桌</title>
<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#0b0502;
    overflow:hidden;
    font-family:"STSong","SimSun",serif;
}

/* 桌体 */
#table{
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at center,#1e6a3b 0%,#0d3a22 65%,#081f14 100%);
    border:28px solid #3a1e0d;
    box-shadow:
        inset 0 0 120px rgba(0,0,0,.9),
        0 0 80px rgba(0,0,0,.9);
}

/* 木框压边 */
#table::before{
    content:'';
    position:absolute;
    inset:18px;
    border:6px solid #7b4a1c;
    box-shadow:inset 0 0 40px rgba(0,0,0,.7);
    pointer-events:none;
}

/* 庄位 */
#dealer{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:240px;
    height:240px;
    border-radius:50%;
    background:
        radial-gradient(circle,#e0b15a 0%,#8b5514 70%);
    box-shadow:
        inset 0 0 40px rgba(0,0,0,.6),
        0 0 50px rgba(0,0,0,.9);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:108px;
    color:#6b0000;
    font-weight:bold;
    letter-spacing:6px;
}

/* 区域 */
.area{
    position:absolute;
    width:300px;
    height:160px;
    border:3px solid rgba(255,215,140,.7);
    border-radius:18px;
    box-shadow:
        inset 0 0 30px rgba(0,0,0,.6),
        0 0 25px rgba(0,0,0,.7);
}

/* 区名 */
.area .name{
    position:absolute;
    left:14px;
    top:10px;
    font-size:26px;
    color:#f5d28a;
    text-shadow:0 0 6px rgba(0,0,0,.8);
}

/* 牌 */
.cards{
    position:absolute;
    bottom:14px;
    left:14px;
    display:flex;
    gap:10px;
}
.card{
    width:64px;
    height:92px;
    background:
        linear-gradient(#faf7ef,#e6dcc7);
    border-radius:8px;
    box-shadow:
        inset 0 0 6px rgba(0,0,0,.3),
        0 6px 10px rgba(0,0,0,.7);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    color:#3b0000;
    font-weight:bold;
}

/* 筹码 */
.chips{
    position:absolute;
    right:12px;
    bottom:-26px;
    display:flex;
    gap:8px;
}
.chip{
    width:46px;
    height:46px;
    border-radius:50%;
    font-size:13px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    box-shadow:
        inset 0 0 8px rgba(255,255,255,.3),
        0 0 14px rgba(0,0,0,.8);
}
.c10{background:#c8a02e}
.c50{background:#2f9e4f}
.c100{background:#1f5fbf}
.c500{background:#6f2dbd}

/* 控制 */
#ctrl{
    position:absolute;
    bottom:26px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:18px;
}
button{
    padding:14px 34px;
    font-size:20px;
    background:#d2a44a;
    color:#4a1e00;
    border:none;
    border-radius:14px;
    box-shadow:0 6px 0 #7a4d10;
}
button:active{
    transform:translateY(4px);
    box-shadow:0 2px 0 #7a4d10;
}
</style>
</head>
<body>

<div id="table">

    <div id="dealer">庄</div>

    <div class="area" style="left:5%;top:16%">
        <div class="name">天门</div>
        <div class="cards"></div>
        <div class="chips"></div>
    </div>

    <div class="area" style="right:5%;top:16%">
        <div class="name">地门</div>
        <div class="cards"></div>
        <div class="chips"></div>
    </div>

    <div class="area" style="left:5%;bottom:22%">
        <div class="name">玄门</div>
        <div class="cards"></div>
        <div class="chips"></div>
    </div>

    <div class="area" style="right:5%;bottom:22%">
        <div class="name">黄门</div>
        <div class="cards"></div>
        <div class="chips"></div>
    </div>

    <div id="ctrl">
        <button onclick="deal()">开牌</button>
        <button onclick="bet()">压筹</button>
        <button onclick="clearAll()">收桌</button>
    </div>
</div>

<script>
const tiles=["天","地","人","和","梅","长三","板凳","虎头","红十","高脚","幺六","四六"];

function deal(){
    document.querySelectorAll('.cards').forEach(c=>{
        c.innerHTML='';
        for(let i=0;i<2;i++){
            const d=document.createElement('div');
            d.className='card';
            d.textContent=tiles[Math.floor(Math.random()*tiles.length)];
            c.appendChild(d);
        }
    });
}

function bet(){
    document.querySelectorAll('.chips').forEach(c=>{
        const v=[10,50,100,500][Math.floor(Math.random()*4)];
        const d=document.createElement('div');
        d.className='chip c'+v;
        d.textContent=v;
        c.appendChild(d);
    });
}

function clearAll(){
    document.querySelectorAll('.cards,.chips').forEach(e=>e.innerHTML='');
}
</script>

</body>
</html>
