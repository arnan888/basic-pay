<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>DOLA_旗舰庄家终端_豪华版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        /* 1. 背景不再是黑洞：加入星空和流光 */
        body {
            background: radial-gradient(circle at center, #1a0a0a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; font-family: 'Arial Black';
        }
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 100px 100px; animation: starMove 100s linear infinite; opacity: 0.3;
        }
        @keyframes starMove { from { transform: translateY(0); } to { transform: translateY(-100%); } }

        /* 2. 转盘外框：加强亮金质感 */
        .turntable-container {
            width: 450px; height: 450px; border: 12px solid #FFD700;
            box-shadow: 0 0 50px rgba(255,215,0,0.5), inset 0 0 20px #000;
            border-radius: 50%; position: relative; z-index: 10;
            background: #000;
        }
        .turntable {
            width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from 0deg, #c01f1f 0 60deg, #000 60deg 120deg, #c01f1f 120deg 180deg, #000 180deg 240deg, #c01f1f 240deg 300deg, #000 300deg 360deg);
            transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1.2);
        }
        /* 3. 3D按钮与余额 */
        .spin-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90px; height: 90px; border-radius: 50%;
            background: radial-gradient(circle, #00ff00, #006400);
            box-shadow: 0 10px 0 #004d00, 0 15px 25px rgba(0,0,0,0.7);
            border: 3px solid #fff; cursor: pointer; color: white;
            display: flex; align-items: center; justify-content: center; font-weight: 900; z-index: 20;
        }
        .spin-btn:active { transform: translate(-50%, -50%) translateY(8px); box-shadow: 0 2px 0 #004d00; }
        .score { color: #FFD700; font-size: 48px; margin-bottom: 20px; text-shadow: 0 0 20px #FFD700; z-index: 10; }
        
        /* 屏幕抖动动画 */
        .shake { animation: shake 0.2s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(5px,5px); } 75% { transform: translate(-5px,-5px); } }
    </style>
</head>
<body>
    <div class="score" id="bal">BALANCE: 88,888.00</div>
    <div class="turntable-container" id="mainBox">
        <div class="turntable" id="wheel"></div>
        <div class="spin-btn" onclick="start()">SPIN</div>
    </div>

    <!-- 音乐资源：引用在线刺激音效 -->
    <audio id="audio_spin" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3">
    <audio id="audio_win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3">

    <script>
        let balance = 88888.00;
        let rotation = 0;
        const wheel = document.getElementById('wheel');
        const balEl = document.getElementById('bal');
        const mainBox = document.getElementById('mainBox');
        const audioSpin = document.getElementById('audio_spin');
        const audioWin = document.getElementById('audio_win');

        function start() {
            if (balance < 0.5) return alert("余额不足 0.5");
            balance -= 0.5;
            balEl.innerText = "BALANCE: " + balance.toFixed(2);
            
            // 播放转动音乐
            audioSpin.currentTime = 0;
            audioSpin.play();

            let add = 1800 + Math.floor(Math.random() * 360);
            rotation += add;
            wheel.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                // 停下时的物理震动和音效
                mainBox.classList.add('shake');
                audioSpin.pause();
                audioWin.play();
                
                setTimeout(() => {
                    mainBox.classList.remove('shake');
                    let win = [0, 1.5, 10, 0, 50][Math.floor(Math.random()*5)];
                    balance += win;
                    balEl.innerText = "BALANCE: " + balance.toFixed(2);
                }, 200);
            }, 3000);
        }
    </script>
</body>
</html>
