<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙虎斗 · 暗涌终端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0c0c0c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 16px;
        }
        /* 抽屉式主容器：宽度占屏幕45%，保持小巧，可滚动 */
        .container-outer {
            width: 45vw;
            max-width: 400px;
            min-width: 280px;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%;
            animation: outerNeonRotate 15s linear infinite;
            padding: 6px;
            border-radius: 24px;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        @keyframes outerNeonRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            width: 100%;
            background: #4a7c64;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 8px 8px 12px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.06);
            overflow: hidden;
        }
        /* 顶部余额彩金区域 */
        .top-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px;
        }
        .stat-card {
            background: #6b737e;
            border: 2px solid #2c4a3b;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.5), inset -2px -2px 4px rgba(255,255,255,0.1);
            background-image: linear-gradient(rgba(0,0,0,0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.2) 1px, transparent 1px);
            background-size: 10px 10px;
        }
        .stat-card span:first-child {
            font-size: 12px;
            color: #ccc;
            font-weight: bold;
        }
        .stat-card span:last-child {
            color: #ff3300 !important;
            font-weight: bold;
            font-size: 1.2em;
            text-shadow: 0 0 2px rgba(255,51,0,0.5);
        }
        /* 战场区域 占40% */
        .battle-scene {
            position: relative;
            margin: 8px 12px;
            border: 3px solid #2c4a3b;
            border-radius: 18px;
            overflow: hidden;
            background: #0a0a0a;
            height: 40vh;
            max-height: 240px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .scene-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        .scene-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 立体大字龙虎 */
        .dragon-word, .tiger-word {
            position: absolute;
            bottom: 12px;
            font-size: 44px;
            font-weight: 900;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.5), 8px 8px 0 rgba(0,0,0,0.3);
            z-index: 10;
            transition: all 0.2s ease;
            opacity: 0.9;
        }
        .dragon-word {
            left: 12px;
            color: #e74c3c;
            text-shadow: 0 0 10px red, 4px 4px 0 darkred;
        }
        .tiger-word {
            right: 12px;
            color: #3498db;
            text-shadow: 0 0 10px blue, 4px 4px 0 darkblue;
        }
        .highlight-win {
            transform: scale(1.2);
            text-shadow: 0 0 20px currentColor, 6px 6px 0 rgba(0,0,0,0.5);
            opacity: 1;
        }
        .battle-result {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            font-weight: bold;
            color: #ffecb3;
            background: rgba(0,0,0,0.7);
            padding: 4px 14px;
            border-radius: 30px;
            z-index: 20;
            backdrop-filter: blur(6px);
            pointer-events: none;
            white-space: nowrap;
        }
        /* 押注及控制区域（可滚动抽屉式） */
        .bet-section {
            background: #6b737e;
            margin: 8px 12px 12px;
            border: 3px solid #2c4a3b;
            border-radius: 18px;
            padding: 12px;
            box-shadow: inset 6px 6px 10px rgba(0,0,0,0.5), inset -3px -3px 6px rgba(255,255,255,0.1);
            background-image: linear-gradient(rgba(0,0,0,0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.2) 1px, transparent 1px);
            background-size: 10px 10px;
            max-height: 55vh;
            overflow-y: auto;
        }
        .account-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.45);
            border-radius: 12px;
            padding: 5px 10px;
            margin-bottom: 12px;
        }
        .account-info {
            font-size: 11px;
            color: #eee;
        }
        .account-info span { color: #f1c40f; font-weight: bold; }
        .account-switch {
            display: flex;
            gap: 6px;
        }
        .account-switch input {
            background: rgba(0,0,0,0.6);
            border: 1px solid #2c4a3b;
            border-radius: 8px;
            padding: 4px 6px;
            color: white;
            font-size: 11px;
            width: 85px;
        }
        .account-switch button {
            background: #4a7c64;
            border: 1px solid #f1c40f;
            border-radius: 8px;
            padding: 4px 8px;
            color: white;
            font-size: 11px;
            cursor: pointer;
        }
        .multi-bet-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .multi-bet-item {
            flex: 1;
            background: #3a5a4a;
            border: 2px solid #2c4a3b;
            border-radius: 14px;
            padding: 8px 2px;
            text-align: center;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.5), inset -2px -2px 4px rgba(255,255,255,0.1);
        }
        .multi-bet-item.selected {
            border-color: #f1c40f;
            background: rgba(255,255,255,0.2);
        }
        .multi-bet-name {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .multi-bet-name.dragon { color: #e74c3c; text-shadow: 0 0 4px #e74c3c; }
        .multi-bet-name.tiger { color: #3498db; text-shadow: 0 0 4px #3498db; }
        .multi-bet-name.tie { color: #9b59b6; text-shadow: 0 0 4px #9b59b6; }
        .multi-bet-amount { font-size: 18px; color: #ff3300; font-weight: bold; }
        .multi-bet-control {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 6px;
        }
        .multi-bet-control button {
            background: rgba(0,0,0,0.65);
            border: 1px solid #f1c40f;
            border-radius: 30px;
            width: 32px;
            height: 32px;
            color: #f1c40f;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
        }
        .data-stack {
            display: grid;
            grid-template-rows: repeat(3, 1fr);
            gap: 6px;
            margin: 8px 0;
        }
        .data-item {
            background: rgba(0,0,0,0.6);
            border: 2px solid #2c4a3b;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 12px;
        }
        .data-item label { font-size: 11px; color: #ccc; font-weight: bold; }
        .data-item value { color: #ff3300; font-weight: bold; font-size: 1.1em; }
        .stake-txt {
            text-align: center;
            color: #eee;
            font-size: 11px;
            margin: 6px 0;
        }
        /* 历史记录区域 */
        .history-area {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 8px;
            margin: 8px 0;
        }
        .history-title {
            font-size: 11px;
            color: #f1c40f;
            text-align: center;
            margin-bottom: 6px;
        }
        .history-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            margin-bottom: 12px;
        }
        .history-cell {
            aspect-ratio: 1 / 1;
            background: rgba(0,0,0,0.6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }
        .history-cell.dragon { background: #e74c3c; color: white; }
        .history-cell.tiger { background: #3498db; color: white; }
        .history-cell.tie { background: #9b59b6; color: white; }
        .record-list {
            max-height: 100px;
            overflow-y: auto;
            font-size: 10px;
            color: #ccc;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .record-item {
            background: rgba(0,0,0,0.4);
            padding: 3px 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
        }
        .record-win { color: #4caf50; }
        .record-lose { color: #f44336; }
        .timer-text {
            font-size: 13px;
            color: #f1c40f;
            text-align: center;
            margin: 8px 0 4px;
        }
        .speed-select {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 8px 0;
        }
        .speed-btn {
            background: rgba(0,0,0,0.4);
            border: 2px solid #2c4a3b;
            border-radius: 30px;
            padding: 4px 14px;
            color: #aaa;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
        .speed-btn.active {
            border-color: #f1c40f;
            color: white;
            background: #2c4a3b;
        }
        .exec-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }
        .refresh-btn, .repeat-btn, .cancel-btn, .main-go {
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5), inset -1px -1px 2px rgba(255,255,255,0.1);
            cursor: pointer;
            transition: 0.05s linear;
        }
        .refresh-btn:active, .repeat-btn:active, .cancel-btn:active, .main-go:active {
            transform: translateY(2px);
        }
        .refresh-btn {
            width: 48px;
            height: 48px;
            background: #3498db;
            border: 2px solid #2c4a3b;
            border-radius: 12px;
            color: white;
            font-size: 24px;
        }
        .repeat-btn {
            width: 48px;
            height: 48px;
            background: #2c3e50;
            border: 2px solid #2c4a3b;
            border-radius: 12px;
            color: white;
            font-size: 20px;
        }
        .cancel-btn {
            width: 48px;
            height: 48px;
            background: #c0392b;
            border: 2px solid #2c4a3b;
            border-radius: 12px;
            color: white;
            font-size: 20px;
        }
        .main-go {
            flex: 1;
            height: 48px;
            background: linear-gradient(180deg, #e53935, #b71c1c);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
        /* 隐藏文件输入 */
        #hiddenFileInput {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 0;
            height: 0;
        }
        /* 菜单面板 */
        .secret-menu {
            position: fixed;
            bottom: 80px;
            right: 12px;
            background: #1e2a2e;
            border: 2px solid #f1c40f;
            border-radius: 24px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            backdrop-filter: blur(20px);
            z-index: 10000;
        }
        .secret-menu button {
            background: #2c3e2f;
            border: none;
            border-radius: 50px;
            padding: 6px 20px;
            color: #f1c40f;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }
        .admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e2a2e;
            border: 2px solid #f1c40f;
            border-radius: 24px;
            padding: 16px;
            width: 90%;
            max-width: 340px;
            backdrop-filter: blur(20px);
            z-index: 10001;
            color: white;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .admin-panel h3 {
            margin-bottom: 10px;
            color: #f1c40f;
        }
        .admin-panel input {
            width: 100%;
            padding: 6px;
            margin: 6px 0;
            border-radius: 10px;
            border: 1px solid #f1c40f;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 13px;
        }
        .admin-panel button {
            background: #2c3e2f;
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            margin: 4px;
            color: #f1c40f;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-panel .close-btn {
            background: #c0392b;
            color: white;
        }
        .admin-panel .user-list {
            max-height: 140px;
            overflow-y: auto;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 5px;
            margin: 6px 0;
        }
        .admin-panel .user-item {
            padding: 4px;
            border-bottom: 1px solid #555;
            cursor: pointer;
            font-size: 12px;
        }
        .admin-panel .user-item.selected {
            background: #f1c40f;
            color: black;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div class="container-outer">
    <div class="container">
        <!-- 顶部余额彩金 -->
        <div class="top-stats">
            <div class="stat-card"><span>余额</span><span id="balanceDisplay">10000.00</span></div>
            <div class="stat-card"><span>彩金池</span><span id="poolDisplay">50000.00</span></div>
        </div>

        <!-- 战场区域 占40% -->
        <div class="battle-scene">
            <div class="scene-bg" id="sceneBg"></div>
            <div class="dragon-word" id="dragonWord">龍</div>
            <div class="tiger-word" id="tigerWord">虎</div>
            <div class="battle-result" id="battleResult"></div>
        </div>

        <!-- 押注及控制区域（可滚动抽屉） -->
        <div class="bet-section">
            <div class="account-bar">
                <div class="account-info">当前账户：<span id="currentUserId">6685731895</span></div>
                <div class="account-switch">
                    <input type="text" id="switchUserIdInput" placeholder="用户ID" value="6685731895">
                    <button id="switchUserBtn">切换</button>
                </div>
            </div>

            <div class="multi-bet-row">
                <div class="multi-bet-item" data-type="DRAGON">
                    <div class="multi-bet-name dragon">🐉 龙</div>
                    <div class="multi-bet-amount" id="betDragonAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="DRAGON">-</button>
                        <button class="bet-inc" data-type="DRAGON">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" data-type="TIE">
                    <div class="multi-bet-name tie">⚖️ 和</div>
                    <div class="multi-bet-amount" id="betTieAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="TIE">-</button>
                        <button class="bet-inc" data-type="TIE">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" data-type="TIGER">
                    <div class="multi-bet-name tiger">🐯 虎</div>
                    <div class="multi-bet-amount" id="betTigerAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="TIGER">-</button>
                        <button class="bet-inc" data-type="TIGER">+</button>
                    </div>
                </div>
            </div>

            <div class="data-stack">
                <div class="data-item"><label>总押注</label><value id="totalBetAmount">0.00</value></div>
                <div class="data-item"><label>预计奖金</label><value id="valWin">0.00</value></div>
                <div class="data-item"><label>模式</label><value class="mode-value">自动开奖</value></div>
            </div>
            <div class="stake-txt">单注步长：<span id="stepValue">10</span> USDT</div>
            <div class="timer-text">下一局: <span id="countdownNum" class="red-number">30</span>秒</div>
            <div class="speed-select">
                <span class="speed-btn active" data-speed="1">1X</span>
                <span class="speed-btn" data-speed="2">2X</span>
                <span class="speed-btn" data-speed="3">3X</span>
            </div>

            <!-- 历史记录区域 -->
            <div class="history-area">
                <div class="history-title">📊 最近10局开奖</div>
                <div class="history-grid" id="historyGrid"></div>
                <div class="history-title">📜 开奖记录</div>
                <div class="record-list" id="recordList"></div>
            </div>

            <div class="exec-row">
                <button class="refresh-btn" id="refreshBtn">🔄</button>
                <button class="repeat-btn" id="repeatBtn">续押</button>
                <button class="cancel-btn" id="cancelBtn">取消</button>
                <button class="main-go" id="fightBtn">确认投注</button>
            </div>
        </div>
    </div>
</div>
<input type="file" id="hiddenFileInput" accept="image/*,video/mp4,video/webm" style="display:none">

<script>
    (function(){
        // ---------- 用户数据 ----------
        let users = JSON.parse(localStorage.getItem('dragon_tiger_users')) || {};
        let CURRENT_USER_ID = "6685731895";
        if (!users[CURRENT_USER_ID]) {
            users[CURRENT_USER_ID] = { balance: 10000, history: [], records: [], resultHistory: [] };
            localStorage.setItem('dragon_tiger_users', JSON.stringify(users));
        }
        let ADMIN_PASSWORD = localStorage.getItem('dragon_tiger_password') || "dragon888";
        function saveUsers() { localStorage.setItem('dragon_tiger_users', JSON.stringify(users)); }
        function getBalance(userId) { if (!users[userId]) users[userId] = { balance: 10000, history: [], records: [], resultHistory: [] }; return users[userId].balance; }
        function setBalance(userId, amount) { if (!users[userId]) users[userId] = { balance: 10000, history: [], records: [], resultHistory: [] }; users[userId].balance = amount; saveUsers(); }
        function addBalance(userId, delta) { setBalance(userId, getBalance(userId) + delta); }
        function getUserList() { return Object.keys(users); }

        // 开奖历史（10个小格子）
        function getResultHistory(userId) { return users[userId]?.resultHistory || []; }
        function pushResult(userId, result) {
            if (!users[userId]) users[userId] = { balance: 10000, history: [], records: [], resultHistory: [] };
            let arr = users[userId].resultHistory || [];
            arr.unshift(result);
            if (arr.length > 10) arr.pop();
            users[userId].resultHistory = arr;
            saveUsers();
            if (userId === CURRENT_USER_ID) updateHistoryGrid();
        }
        function updateHistoryGrid() {
            const grid = document.getElementById('historyGrid');
            if (!grid) return;
            const history = getResultHistory(CURRENT_USER_ID);
            grid.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const cell = document.createElement('div');
                cell.className = 'history-cell';
                if (i < history.length) {
                    const res = history[i];
                    cell.classList.add(res === '龙' ? 'dragon' : (res === '虎' ? 'tiger' : 'tie'));
                    cell.textContent = res === '龙' ? '🐉' : (res === '虎' ? '🐯' : '⚖️');
                } else {
                    cell.textContent = '?';
                }
                grid.appendChild(cell);
            }
        }

        // 记录文字版
        function addRecord(userId, betType, result, winAmount, betAmount) {
            if (!users[userId]) users[userId] = { balance: 10000, history: [], records: [], resultHistory: [] };
            let records = users[userId].records || [];
            records.unshift({ time: new Date().toLocaleTimeString(), bet: betType, result: result, win: winAmount, amount: betAmount });
            if (records.length > 20) records.pop();
            users[userId].records = records;
            saveUsers();
            if (userId === CURRENT_USER_ID) refreshRecordDisplay();
        }
        function refreshRecordDisplay() {
            const container = document.getElementById('recordList');
            if (!container) return;
            const records = users[CURRENT_USER_ID]?.records || [];
            container.innerHTML = '';
            if (records.length === 0) { container.innerHTML = '<div style="text-align:center; color:#aaa;">暂无记录</div>'; return; }
            records.slice(0, 10).forEach(rec => {
                const div = document.createElement('div');
                div.className = 'record-item';
                const isWin = rec.win > 0;
                div.innerHTML = `<span>${rec.time}</span><span>押 ${rec.bet} → 开 ${rec.result}</span><span class="${isWin ? 'record-win' : 'record-lose'}">${isWin ? `+${rec.win}` : `-${rec.amount}`}</span>`;
                container.appendChild(div);
            });
        }

        // 高亮立体字
        function highlightWord(result) {
            const dragon = document.getElementById('dragonWord');
            const tiger = document.getElementById('tigerWord');
            dragon.classList.remove('highlight-win');
            tiger.classList.remove('highlight-win');
            if (result === '龙') {
                dragon.classList.add('highlight-win');
                setTimeout(() => dragon.classList.remove('highlight-win'), 800);
            } else if (result === '虎') {
                tiger.classList.add('highlight-win');
                setTimeout(() => tiger.classList.remove('highlight-win'), 800);
            } else if (result === '和') {
                dragon.classList.add('highlight-win');
                tiger.classList.add('highlight-win');
                setTimeout(() => {
                    dragon.classList.remove('highlight-win');
                    tiger.classList.remove('highlight-win');
                }, 800);
            }
        }

        // ---------- IndexedDB 媒体存储 ----------
        const DB_NAME = "DragonTigerMediaLocal";
        const STORE_NAME = "mediaAssets";
        let db = null;
        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => { const dbRef = e.target.result; if (!dbRef.objectStoreNames.contains(STORE_NAME)) dbRef.createObjectStore(STORE_NAME); };
                req.onsuccess = (e) => { db = e.target.result; resolve(db); };
                req.onerror = (e) => reject(e);
            });
        }
        async function saveMedia(key, blob, mimeType) {
            if (!db) await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                store.put({ blob, mimeType, updated: Date.now() }, key);
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e);
            });
        }
        async function loadMedia(key) {
            if (!db) await openDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, "readonly");
                const store = tx.objectStore(STORE_NAME);
                const req = store.get(key);
                req.onsuccess = () => resolve(req.result || null);
                req.onerror = () => resolve(null);
            });
        }
        function applyBackground(blob, mimeType) {
            const bgDiv = document.getElementById('sceneBg');
            bgDiv.innerHTML = '';
            bgDiv.style.backgroundImage = 'none';
            if (!blob) return;
            const url = URL.createObjectURL(blob);
            if (mimeType.startsWith('video/')) {
                const video = document.createElement('video');
                video.src = url;
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';
                bgDiv.appendChild(video);
                video.play().catch(e=>console.log);
            } else if (mimeType.startsWith('image/')) {
                bgDiv.style.backgroundImage = `url(${url})`;
                bgDiv.style.backgroundSize = 'cover';
                bgDiv.style.backgroundPosition = 'center';
            }
        }
        async function restoreBackground() {
            try { const bg = await loadMedia('background'); if (bg && bg.blob) applyBackground(bg.blob, bg.mimeType); } catch(e) { console.log(e); } }
        async function uploadBackground(file) { if (!file) return; await saveMedia('background', file, file.type); applyBackground(file, file.type); }
        async function uploadDragon(file) { if (!file) return; await saveMedia('dragon', file, file.type); }
        async function uploadTiger(file) { if (!file) return; await saveMedia('tiger', file, file.type); }

        // ---------- 游戏核心 ----------
        let state = {
            balance: getBalance(CURRENT_USER_ID),
            bets: { DRAGON: 0, TIGER: 0, TIE: 0 },
            betRolling: false,
            autoMode: true,
            speed: 1,
            pool: 50000,
            countdown: 30,
            countdownInterval: null
        };
        let lastBet = null;
        let resultTimer = null;

        function showGameResult(msg) {
            const el = document.getElementById('battleResult');
            if (!el) return;
            if (msg.includes('开奖') && (msg.includes('中奖') || msg.includes('未中') || msg.includes('+'))) {
                el.innerText = msg;
                el.style.opacity = '1';
                if (resultTimer) clearTimeout(resultTimer);
                resultTimer = setTimeout(() => { el.style.opacity = '0'; setTimeout(() => { if (el.innerText === msg) el.innerText = ''; }, 200); }, 3000);
            } else console.log("[静默]", msg);
        }

        function getCountdownSec() { return state.speed===1?30:(state.speed===2?20:10); }
        function syncBalance() { state.balance = getBalance(CURRENT_USER_ID); updateUI(); }
        
        function placeBet(type, amount) {
            if (state.betRolling || amount<=0 || amount>state.balance) return false;
            state.betRolling = true;
            const outcomes = ['龙', '虎', '和'];
            const result = outcomes[Math.floor(Math.random() * 3)];
            let win = 0;
            if (type === result) win = amount * (result === '和' ? 8 : 2);
            const newBalance = state.balance - amount + win;
            setBalance(CURRENT_USER_ID, newBalance);
            state.balance = newBalance;
            updateUI();
            addRecord(CURRENT_USER_ID, type, result, win, amount);
            pushResult(CURRENT_USER_ID, result);
            highlightWord(result);
            const resultMsg = win > 0 ? `🎲 开奖: ${result}  ✅ 中奖 +${win} TRX` : `🎲 开奖: ${result}  ❌ 未中奖`;
            showGameResult(resultMsg);
            if (state.autoMode) { clearCountdown(); startCountdown(getCountdownSec()); }
            state.betRolling = false;
            return true;
        }

        function executeBet() {
            if (state.betRolling) return;
            const total = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
            if (total <= 0) return;
            let selectedType = null, selectedAmount = 0;
            if (state.bets.DRAGON > selectedAmount) { selectedType = "DRAGON"; selectedAmount = state.bets.DRAGON; }
            if (state.bets.TIGER > selectedAmount) { selectedType = "TIGER"; selectedAmount = state.bets.TIGER; }
            if (state.bets.TIE > selectedAmount) { selectedType = "TIE"; selectedAmount = state.bets.TIE; }
            if (!selectedType) return;
            const betType = { DRAGON:"龙", TIGER:"虎", TIE:"和" }[selectedType];
            lastBet = { type: betType, amount: selectedAmount };
            placeBet(betType, selectedAmount).then(success => { if(success){ state.bets = { DRAGON:0, TIGER:0, TIE:0 }; updateUI(); } });
        }

        function repeatLastBet() { if(lastBet && !state.betRolling) placeBet(lastBet.type, lastBet.amount); }
        function cancelAllBets() { if(!state.betRolling){ state.bets = { DRAGON:0, TIGER:0, TIE:0 }; updateUI(); } }

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
            document.getElementById('poolDisplay').innerText = state.pool.toFixed(2);
            document.getElementById('betDragonAmount').innerText = state.bets.DRAGON;
            document.getElementById('betTigerAmount').innerText = state.bets.TIGER;
            document.getElementById('betTieAmount').innerText = state.bets.TIE;
            const total = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
            document.getElementById('totalBetAmount').innerText = total.toFixed(2);
            let maxWin = 0;
            if (state.bets.DRAGON > 0) maxWin = Math.max(maxWin, state.bets.DRAGON * 2);
            if (state.bets.TIGER > 0) maxWin = Math.max(maxWin, state.bets.TIGER * 2);
            if (state.bets.TIE > 0) maxWin = Math.max(maxWin, state.bets.TIE * 8);
            document.getElementById('valWin').innerText = maxWin.toFixed(2);
            document.querySelectorAll('.multi-bet-item').forEach(el => { const type = el.dataset.type; if (state.bets[type] > 0) el.classList.add('selected'); else el.classList.remove('selected'); });
        }

        function adjustBet(type, delta) { if(!state.betRolling){ let newVal = state.bets[type] + delta; if(newVal<0) newVal=0; state.bets[type]=newVal; updateUI(); } }
        function startPoolFluctuation() { setInterval(() => { let change = Math.floor(Math.random()*61)-30; let newPool = state.pool+change; if(newPool<10000) newPool=10000; if(newPool>100000) newPool=100000; state.pool=newPool; document.getElementById('poolDisplay').innerText=state.pool.toFixed(2); }, 1000); }
        function startCountdown(sec) {
            if(state.countdownInterval) clearInterval(state.countdownInterval);
            state.countdown = sec;
            document.getElementById('countdownNum').innerText = state.countdown;
            state.countdownInterval = setInterval(() => {
                if(state.countdown <= 1){
                    clearInterval(state.countdownInterval);
                    state.countdownInterval = null;
                    if(state.bets.DRAGON+state.bets.TIGER+state.bets.TIE > 0) executeBet();
                    else startCountdown(getCountdownSec());
                } else {
                    state.countdown--;
                    document.getElementById('countdownNum').innerText = state.countdown;
                }
            }, 1000);
        }
        function clearCountdown() { if(state.countdownInterval){ clearInterval(state.countdownInterval); state.countdownInterval=null; } }
        function refreshBalance() { syncBalance(); }
        function setSpeed(speed) {
            state.speed = speed;
            document.querySelectorAll('.speed-btn').forEach(btn => { if(parseInt(btn.dataset.speed)===speed) btn.classList.add('active'); else btn.classList.remove('active'); });
            clearCountdown(); startCountdown(getCountdownSec());
        }
        function switchUser() {
            const newId = document.getElementById('switchUserIdInput').value.trim();
            if(!newId) return;
            CURRENT_USER_ID = newId;
            if (!users[CURRENT_USER_ID]) { users[CURRENT_USER_ID] = { balance: 10000, history: [], records: [], resultHistory: [] }; saveUsers(); }
            document.getElementById('currentUserId').innerText = CURRENT_USER_ID;
            state.bets = { DRAGON:0, TIGER:0, TIE:0 };
            lastBet = null;
            syncBalance(); updateUI(); clearCountdown(); startCountdown(getCountdownSec());
            refreshRecordDisplay();
            updateHistoryGrid();
        }

        // ---------- 管理员面板 ----------
        let adminPanel = null;
        let selectedAdminUserId = CURRENT_USER_ID;
        function showAdminPanel() {
            if (adminPanel) { adminPanel.remove(); adminPanel = null; return; }
            const panel = document.createElement('div');
            panel.className = 'admin-panel';
            panel.innerHTML = `
                <h3>🔐 管理员面板</h3>
                <div class="user-list" id="adminUserList"></div>
                <div>当前选中用户：<strong id="selectedUserDisplay">${selectedAdminUserId}</strong></div>
                <input type="number" id="adminAmount" placeholder="金额" value="100">
                <div style="display: flex; gap: 8px; justify-content: center;">
                    <button id="adminAddBtn">➕ 上分</button>
                    <button id="adminSubBtn">➖ 下分</button>
                    <button id="adminQueryBtn">🔍 查询余额</button>
                    <button id="adminResetBtn">🔄 重置为10000</button>
                </div>
                <button id="adminChangePwdBtn">🔑 修改管理员密码</button>
                <button class="close-btn" id="adminCloseBtn">关闭</button>
            `;
            document.body.appendChild(panel);
            adminPanel = panel;
            function refreshUserList() {
                const userListDiv = document.getElementById('adminUserList');
                if (!userListDiv) return;
                const usersArr = getUserList();
                userListDiv.innerHTML = '';
                usersArr.forEach(uid => {
                    const div = document.createElement('div');
                    div.className = 'user-item' + (uid === selectedAdminUserId ? ' selected' : '');
                    div.textContent = `${uid} (余额: ${getBalance(uid).toFixed(2)})`;
                    div.onclick = () => { selectedAdminUserId = uid; document.getElementById('selectedUserDisplay').innerText = selectedAdminUserId; refreshUserList(); };
                    userListDiv.appendChild(div);
                });
            }
            refreshUserList();
            document.getElementById('adminAddBtn').onclick = () => {
                const amount = parseFloat(document.getElementById('adminAmount').value);
                if (isNaN(amount) || amount <= 0) { alert("请输入正数金额"); return; }
                addBalance(selectedAdminUserId, amount);
                refreshUserList();
                if (selectedAdminUserId === CURRENT_USER_ID) syncBalance();
                alert(`✅ 已给 ${selectedAdminUserId} 上分 ${amount} TRX，新余额: ${getBalance(selectedAdminUserId).toFixed(2)}`);
            };
            document.getElementById('adminSubBtn').onclick = () => {
                const amount = parseFloat(document.getElementById('adminAmount').value);
                if (isNaN(amount) || amount <= 0) { alert("请输入正数金额"); return; }
                const cur = getBalance(selectedAdminUserId);
                if (cur < amount) { alert("余额不足，无法下分"); return; }
                addBalance(selectedAdminUserId, -amount);
                refreshUserList();
                if (selectedAdminUserId === CURRENT_USER_ID) syncBalance();
                alert(`✅ 已从 ${selectedAdminUserId} 下分 ${amount} TRX，新余额: ${getBalance(selectedAdminUserId).toFixed(2)}`);
            };
            document.getElementById('adminQueryBtn').onclick = () => {
                alert(`用户 ${selectedAdminUserId} 当前余额: ${getBalance(selectedAdminUserId).toFixed(2)} TRX`);
            };
            document.getElementById('adminResetBtn').onclick = () => {
                if (confirm(`确认将 ${selectedAdminUserId} 的余额重置为 10000 TRX？`)) {
                    setBalance(selectedAdminUserId, 10000);
                    refreshUserList();
                    if (selectedAdminUserId === CURRENT_USER_ID) syncBalance();
                    alert(`✅ 已重置 ${selectedAdminUserId} 余额为 10000 TRX`);
                }
            };
            document.getElementById('adminChangePwdBtn').onclick = () => {
                const old = prompt("请输入当前管理员密码:");
                if (old !== ADMIN_PASSWORD) { alert("密码错误"); return; }
                const newPwd = prompt("请输入新密码 (至少4位):");
                if (!newPwd || newPwd.length < 4) { alert("密码至少4位"); return; }
                ADMIN_PASSWORD = newPwd;
                localStorage.setItem('dragon_tiger_password', newPwd);
                alert("✅ 管理员密码修改成功！");
            };
            document.getElementById('adminCloseBtn').onclick = () => { panel.remove(); adminPanel = null; };
        }

        // ---------- 文件上传 ----------
        const hiddenInput = document.getElementById('hiddenFileInput');
        let pendingUploadType = null;
        hiddenInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (pendingUploadType === 'dragon') uploadDragon(file);
            else if (pendingUploadType === 'tiger') uploadTiger(file);
            else if (pendingUploadType === 'background') uploadBackground(file);
            pendingUploadType = null;
            hiddenInput.value = '';
        });
        function triggerUpload(type) { pendingUploadType = type; hiddenInput.click(); }

        // ---------- 长按菜单 ----------
        let longPressTimer = null, activeMenu = null;
        function showSecretMenu() {
            if(activeMenu) { activeMenu.remove(); activeMenu=null; return; }
            const menu = document.createElement('div');
            menu.className = 'secret-menu';
            menu.innerHTML = `
                <button id="secretDragon">🐉 上传龙图/视频</button>
                <button id="secretTiger">🐯 上传虎图/视频</button>
                <button id="secretBg">🌌 上传背景 (图/视频)</button>
                <button id="secretAdmin">👑 管理员面板</button>
            `;
            document.body.appendChild(menu);
            activeMenu = menu;
            const closeHandler = (e) => { if(!menu.contains(e.target)){ menu.remove(); activeMenu=null; document.removeEventListener('click', closeHandler); } };
            setTimeout(()=>document.addEventListener('click', closeHandler), 20);
            document.getElementById('secretDragon').onclick = () => { if(activeMenu) activeMenu.remove(); activeMenu=null; triggerUpload('dragon'); };
            document.getElementById('secretTiger').onclick = () => { if(activeMenu) activeMenu.remove(); activeMenu=null; triggerUpload('tiger'); };
            document.getElementById('secretBg').onclick = () => { if(activeMenu) activeMenu.remove(); activeMenu=null; triggerUpload('background'); };
            document.getElementById('secretAdmin').onclick = () => {
                if(activeMenu) activeMenu.remove(); activeMenu=null;
                const pwd = prompt("🔐 请输入管理员密码:", "");
                if(pwd === ADMIN_PASSWORD) { showAdminPanel(); } else { alert("密码错误！"); }
            };
        }
        function onLongPress() {
            const pwd = prompt("🔐 管理员验证（长按续押按钮3秒）\n请输入管理密码:", "");
            if(pwd === ADMIN_PASSWORD) { showSecretMenu(); } else if(pwd !== null) { alert("密码错误！"); }
        }

        function bindEvents() {
            document.getElementById('refreshBtn').onclick = refreshBalance;
            const repeatBtn = document.getElementById('repeatBtn');
            repeatBtn.onclick = null;
            repeatBtn.addEventListener('click', (e) => { if(longPressTimer) clearTimeout(longPressTimer); repeatLastBet(); });
            repeatBtn.addEventListener('touchstart', (e) => { longPressTimer = setTimeout(() => { onLongPress(); longPressTimer = null; }, 3000); });
            repeatBtn.addEventListener('touchend', () => { if(longPressTimer) clearTimeout(longPressTimer); });
            repeatBtn.addEventListener('touchcancel', () => { if(longPressTimer) clearTimeout(longPressTimer); });
            repeatBtn.addEventListener('mousedown', (e) => { longPressTimer = setTimeout(() => { onLongPress(); longPressTimer = null; }, 3000); });
            repeatBtn.addEventListener('mouseup', () => { if(longPressTimer) clearTimeout(longPressTimer); });
            document.getElementById('cancelBtn').onclick = cancelAllBets;
            document.getElementById('fightBtn').onclick = executeBet;
            document.getElementById('switchUserBtn').onclick = switchUser;
            document.querySelectorAll('.speed-btn').forEach(btn => btn.onclick = () => setSpeed(parseInt(btn.dataset.speed)));
            document.querySelectorAll('.bet-dec').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); adjustBet(btn.dataset.type, -10); });
            document.querySelectorAll('.bet-inc').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); adjustBet(btn.dataset.type, 10); });
        }

        async function init() {
            await openDB();
            await restoreBackground();
            bindEvents();
            syncBalance();
            startPoolFluctuation();
            setSpeed(1);
            updateUI();
            startCountdown(getCountdownSec());
            refreshRecordDisplay();
            updateHistoryGrid();
        }
        window.onload = init;
    })();
</script>
</body>
</html>
