<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>METEOR_FIRE_WHEEL_V400</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --neon: #00ff88; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-around; overflow: hidden; }
        
        /* ☄️ 火雨流星背景画布 */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .header { border: 4px solid var(--gold); padding: 12px 60px; border-radius: 60px; box-shadow: 0 0 30px var(--gold); background: rgba(0,0,0,0.8); z-index: 10; }
        #balance { font-size: 48px; color: var(--gold); text-shadow: 0 0 20px gold; font-weight: 900; }

        /* 🎡 实体大转盘 */
        .wheel-stage { position: relative; z-index: 10; }
        .wheel-box { 
            width: 320px; height: 320px; border: 12px solid #333; border-radius: 50%; 
            position: relative; overflow: hidden; background: radial-gradient(circle, #222, #000);
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            box-shadow: 0 0 80px rgba(255, 68, 0, 0.4); 
        }
        .line { position: absolute; width: 4px; height: 100%; background: #000; left: 50%; margin-left: -2px; transform-origin: center; }
        .symbol { position: absolute; width: 60px; height: 60px; font-size: 45px; left: 50%; top: 50%; margin: -30px; display: flex; align-items: center; justify-content: center; }
        .s1 { transform: rotate(22.5deg) translateY(-110px); } .s2 { transform: rotate(67.5deg) translateY(-110px); }
        .s3 { transform: rotate(112.5deg) translateY(-110px); } .s4 { transform: rotate(157.5deg) translateY(-110px); }
        .s5 { transform: rotate(202.5deg) translateY(-110px); } .s6 { transform: rotate(247.5deg) translateY(-110px); }
        .s7 { transform: rotate(292.5deg) translateY(-110px); } .s8 { transform: rotate(337.5deg) translateY(-110px); }
        
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #ff4400; z-index: 50; filter: drop-shadow(0 0 15px red); }
        .spin-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95px; height: 95px; border-radius: 50%; background: var(--neon); border: 5px solid #004422; color: #000; font-size: 20px; font-weight: 900; z-index: 100; box-shadow: 0 0 30px var(--neon); cursor: pointer; }

        .footer { width: 95%; background: rgba(17,17,17,0.9); padding: 20px; border-radius: 30px; border: 1px solid #444; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .bet-ctrl { display: flex; align-items: center; gap: 10px; }
        .b-btn { width: 50px; height: 50px; background: #333; color: #fff; border: none; border-radius: 12px; font-size: 28px; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <audio id="dj-bgm" src="https://www.soundjay.com/free-music/iron-man-1.mp3" loop>
    <audio id="spin-snd" src="https://www.soundjay.com/mechanical/mechanical-clanking-1.mp3">
    <audio id="win-snd" src="https://www.soundjay.com/misc/coins-spilled-1.mp3">

    <div class="header"><div id="balance">88,888</div></div>

    <div class="wheel-stage">
        <div class="pointer"></div>
        <div class="wheel-box" id="wheel">
            <div class="line" style="transform: rotate(0deg)"></div><div class="line" style="transform: rotate(45deg)"></div><div class="line" style="transform: rotate(90deg)"></div><div class="line" style="transform: rotate(135deg)"></div>
            <div class="symbol s1">🦁</div><div class="symbol s2">🐯</div><div class="symbol s3">💎</div><div class="symbol s4">💰</div>
            <div class="symbol s5">👑</div><div class="symbol s6">7️⃣</div><div class="symbol s7">🦅</div><div class="symbol s8">🎰</div>
        </div>
        <button class="spin-btn" onclick="ignite()">SPIN</button>
    </div>

    <div class="footer">
        <div class="bet-ctrl">
            <button class="b-btn" onclick="changeBet(-100)">-</button>
            <span id="bet-val" style="font-size:32px; color:var(--gold); min-width:90px; text-align:center;">100</span>
            <button class="b-btn" onclick="changeBet(100)">+</button>
        </div>
        <div id="win-amt" style="color:var(--neon); font-size:32px; font-weight:900;">WIN: 0</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let bal = 88888; let bet = 100; let rot = 0; let isDJ = false;
        document.getElementById('balance').innerText = bal.toLocaleString();

        // --- ☄️ 火雨流星背景代码 ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const meteors = [];
        function createMeteor() { return { x: Math.random()*canvas.width, y: -20, len: Math.random()*80+20, speed: Math.random()*15+5 }; }
        for(let i=0; i<20; i++) meteors.push(createMeteor());
        function drawMeteors() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255, 68, 0, 0.6)'; ctx.lineWidth = 2;
            meteors.forEach(m => {
                ctx.beginPath(); ctx.moveTo(m.x, m.y); ctx.lineTo(m.x - m.len/2, m.y + m.len); ctx.stroke();
                m.y += m.speed; m.x -= m.speed/2;
                if(m.y > canvas.height) { m.y = -20; m.x = Math.random()*canvas.width; }
            });
            requestAnimationFrame(drawMeteors);
        }
        drawMeteors();

        // --- 游戏逻辑 ---
        function changeBet(v) { if(bet+v >= 100){ bet+=v; document.getElementById('bet-val').innerText=bet; tg.HapticFeedback.impactOccurred('light'); } }

        function ignite() {
            if(bal < bet) { tg.showAlert("余额不足"); return; }
            if(!isDJ) { document.getElementById('dj-bgm').play(); isDJ = true; }
            bal -= bet; document.getElementById('balance').innerText = bal.toLocaleString();
            document.getElementById('win-amt').innerText = "WIN: 0";
            
            const w = document.getElementById('wheel');
            const spinS = document.getElementById('spin-snd');
            spinS.currentTime = 0; spinS.play();
            
            rot += 1800 + Math.floor(Math.random()*360);
            w.style.transform = `rotate(${rot}deg)`;
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                let win = Math.random() > 0.7 ? bet * 10 : 0;
                if(win > 0) {
                    bal += win; document.getElementById('win-amt').innerText = "WIN: " + win;
                    document.getElementById('win-snd').play();
                    tg.HapticFeedback.notificationOccurred('success');
                }
                document.getElementById('balance').innerText = bal.toLocaleString();
            }, 4000);
        }
    </script>
</body>
</html>
