<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_BEAST_ULTRA</title>
    <style>
        :root {
            --jade: #4a7c64; --jade-l: #6b9a85; --jade-d: #2c4a3b;
            --stone: #6b737e; --inner: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            --gold: #f1c40f; --red: #ff4d4d; --blue: #3498db; --tiger: #e67e22; --tie: #9b59b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0c0c0c; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* 整体大外框：七彩霓虹灯围绕转动样式 */
        .container-outer {
            width: 100vw; height: 100vh; max-width: 500px;
            display: flex; justify-content: center; align-items: center;
            /* 七彩霓虹外框 */
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%;
            animation: outerNeonRotate 15s linear infinite;
            padding: 8px;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(255,255,255,0.6);
        }
        /* 大外框霓虹转动动画 */
        @keyframes outerNeonRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 内部容器：保持原有布局 */
        .container {
            width: 100%; height: 100%;
            background: var(--jade);
            border-radius: 15px;
            display: flex; flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* 状态栏：余额与奖池 */
        .header { height: 10%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .box { background: var(--stone); border: 2px solid var(--jade-d); box-shadow: var(--inner); border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            /* 黑色网格线路背景 */
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        .box span:first-child { font-size: 10px; color: #ccc; letter-spacing: 1px; margin-bottom: 2px; }
        .box span:last-child { font-size: 18px; font-weight: bold; }

        /* 转盘区：加上网格线路 */
        .wheel-area { 
            height: 40%; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: var(--stone); box-shadow: var(--inner); border: 4px solid var(--jade-d); 
            border-radius: 12px; margin: 4px 10px; position: relative; padding: 15px 0;
            /* 黑色网格线路背景 */
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        /* 转盘控制按钮：合并为一个，可切换模式 */
        .wheel-btn {
            width: 160px; height: 35px;
            background: linear-gradient(180deg, #3498db, #2980b9);
            border: none; border-radius: 18px;
            color: #fff; font-size: 16px; font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 4px 0 #1a5276;
            cursor: pointer;
        }
        .wheel-btn.bet-mode { background: linear-gradient(180deg, #e53935, #b71c1c); box-shadow: 0 4px 0 #7f0000; }
        .wheel-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a5276; }
        .wheel-btn.bet-mode:active { box-shadow: 0 1px 0 #7f0000; }
        .wheel-btn:disabled { background: linear-gradient(180deg, #666, #333); box-shadow: 0 4px 0 #222; cursor: not-allowed; }
        
        .ptr { position: absolute; top: 55px; z-index: 100; width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent; border-top: 26px solid var(--red); filter: drop-shadow(0 0 15px red); }
        
        /* 转盘外包圈：亮度更高，强化视觉焦点 */
        .wheel-outer {
            width: 285px; height: 285px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            /* 高亮度七彩霓虹 */
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 800% 800%;
            animation: wheelNeonFlash 6s linear infinite;
            padding: 8px;
            /* 更强的发光效果 */
            box-shadow: 0 0 80px rgba(255,255,255,0.8), inset 0 0 20px rgba(255,255,255,0.5);
            border: 2px solid #fff;
        }
        /* 转盘外圈高亮度闪光动画 */
        @keyframes wheelNeonFlash {
            0% { background-position: 0% 50%; filter: brightness(1); }
            25% { background-position: 50% 100%; filter: brightness(1.5); }
            50% { background-position: 100% 50%; filter: brightness(1); }
            75% { background-position: 50% 0%; filter: brightness(1.5); }
            100% { background-position: 0% 50%; filter: brightness(1); }
        }
        
        /* 转盘主体改为灰色黑线网格 */
        #wheel { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 5px solid #000; 
            /* 灰色网格背景 */
            background: var(--stone);
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 12px 12px;
            position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1.1); 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8); 
            /* 增加内部分割线，强化网格感 */
            overflow: hidden;
        }
        /* 转盘内部分割线：和网格呼应 */
        #wheel::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(to right, transparent 50%, rgba(0,0,0,0.4) 50%, transparent 50%),
                        linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.4) 50%, transparent 50%),
                        linear-gradient(45deg, transparent 50%, rgba(0,0,0,0.2) 50%, transparent 50%),
                        linear-gradient(-45deg, transparent 50%, rgba(0,0,0,0.2) 50%, transparent 50%);
            pointer-events: none;
        }
        
        .slot { position: absolute; width: 100%; height: 100%; text-align: center; padding-top: 20px; font-weight: bold; }
        .beast-ico { display: block; font-size: 34px; margin-bottom: 0px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        .beast-nm { font-size: 11px; color: #fff; text-shadow: 1px 1px 2px #000; }
        /* 神兽分类标记 */
        .beast-tag {
            font-size: 9px; color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 1px 6px; border-radius: 8px;
            margin-top: 3px;
        }
        .tag-dragon { background: rgba(52,152,219,0.7); }
        .tag-tiger { background: rgba(230,126,34,0.7); }
        .tag-tie { background: rgba(155,89,182,0.7); }

        /* 开奖结果提示区：强化龙虎显示 */
        .result-area {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; margin-top: 10px;
        }
        .wheel-result {
            font-size: 14px; color: var(--gold);
            font-weight: bold; text-shadow: 0 0 8px var(--gold);
        }
        .battle-result {
            font-size: 16px; font-weight: bold;
            padding: 4px 15px; border-radius: 15px;
            color: #fff; text-shadow: 0 0 5px #000;
            display: none;
        }
        .battle-result.show { display: block; }
        .result-dragon { background: var(--blue); box-shadow: 0 0 15px var(--blue); }
        .result-tiger { background: var(--tiger); box-shadow: 0 0 15px var(--tiger); }
        .result-tie { background: var(--tie); box-shadow: 0 0 15px var(--tie); }

        /* 核心区：龙虎和独立押注，加上网格线路 */
        .play-section {
            flex: 1; display: flex; flex-direction: column;
            background: var(--stone); box-shadow: var(--inner); border: 4px solid var(--jade-d); 
            border-radius: 12px; margin: 6px 10px 10px 10px; padding: 14px;
            /* 黑色网格线路背景 */
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        /* 龙虎和独立布局 */
        .battle-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; height: 110px; margin-bottom: 12px; }
        .side-cell { 
            background: rgba(0,0,0,0.35); border: 3px solid var(--jade-d); border-radius: 14px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: var(--inner); cursor: pointer; transition: 0.1s;
        }
        .side-cell.active { border-color: var(--gold); background: rgba(255,255,255,0.1); transform: scale(0.97); }
        .side-cell span:first-child { font-size: 13px; color: #999; margin-bottom: 5px; }
        .side-cell span:last-child { font-size: 36px; font-weight: 900; }
        /* 新增"和"位样式 */
        #cell-TIE span:last-child { color: var(--tie); text-shadow: 0 0 12px var(--tie); }

        /* 数据墙：调整布局更紧凑 */
        .data-stack { display: grid; grid-template-rows: repeat(3, 1fr); gap: 6px; margin: 0 8px; }
        .data-item { background: rgba(0,0,0,0.6); border: 1px solid var(--jade-d); border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .data-item label { font-size: 9px; color: #777; font-weight: bold; }
        .data-item value { font-size: 14px; color: var(--gold); font-weight: 900; }
        /* 新增各押注项赔率显示 */
        .odds-item { font-size: 10px; color: #ccc; margin-top: 3px; }

        /* 操作键位区 */
        .stake-txt { text-align: center; color: #eee; font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .exec-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .step-btn { width: 48px; height: 48px; background: var(--jade); border: 3px solid var(--jade-d); border-radius: 10px; color: #fff; font-size: 24px; font-weight: bold; }
        /* 押注金额调整按钮改为切换模式 */
        .mode-toggle {
            flex: 1; height: 48px;
            background: linear-gradient(180deg, var(--jade-l), var(--jade-d));
            border: none; border-radius: 24px;
            color: #fff; font-size: 14px; font-weight: bold;
            cursor: pointer;
        }
        
        .mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mode-btn { height: 38px; background: rgba(0,0,0,0.4); border: 2px solid var(--jade-d); border-radius: 8px; color: #aaa; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .mode-btn.active { border-color: var(--gold); color: #fff; background: var(--jade-d); }

        .blur { filter: blur(5px); }
        @keyframes win-pulse { 0%{filter:brightness(1)} 50%{filter:brightness(2);transform:scale(1.05)} 100%{filter:brightness(1)} }
        .winner { animation: win-pulse 0.4s ease 4; }
        /* 开奖结果放大动画 */
        @keyframes result-pop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .battle-result.show { animation: result-pop 0.6s ease forwards; }
    </style>
</head>
<body>

<!-- 新增大外框容器 -->
<div class="container-outer">
    <div class="container">
        <div class="header">
            <div class="box"><span>MY BALANCE</span><span id="ui-bal" style="color:var(--red)">857.80</span></div>
            <div class="box"><span>JACKPOT POOL</span><span style="color:var(--gold)">84291.50</span></div>
        </div>

        <div class="wheel-area">
            <!-- 合并控制按钮：可切换"单独旋转"和"押注开奖" -->
            <button class="wheel-btn" id="btn-wheel-control" onclick="controlAction()">单独旋转</button>
            <div class="ptr"></div>
            <!-- 转盘外包七彩霓虹圈 -->
            <div class="wheel-outer">
                <div id="wheel"></div>
            </div>
            <!-- 开奖结果提示区：同时显示神兽和龙虎结果 -->
            <div class="result-area">
                <div class="wheel-result" id="wheel-result">准备就绪</div>
                <div class="battle-result" id="battle-result">龙</div>
            </div>
        </div>

        <div class="play-section">
            <!-- 龙虎和独立押注区 -->
            <div class="battle-row">
                <div id="cell-DRAGON" class="side-cell" onclick="setPick('DRAGON')">
                    <span>龙位</span>
                    <span style="color:var(--blue); text-shadow: 0 0 12px var(--blue);">龙</span>
                    <div class="odds-item">赔率 1:1</div>
                </div>
                
                <div id="cell-TIE" class="side-cell" onclick="setPick('TIE')">
                    <span>和局</span>
                    <span>和</span>
                    <div class="odds-item">赔率 1:8</div>
                </div>

                <div id="cell-TIGER" class="side-cell" onclick="setPick('TIGER')">
                    <span>虎位</span>
                    <span style="color:var(--tiger); text-shadow: 0 0 12px var(--tiger);">虎</span>
                    <div class="odds-item">赔率 1:1</div>
                </div>
            </div>

            <!-- 数据区调整 -->
            <div class="data-stack">
                <div class="data-item"><label>当前押注</label><value id="val-bet">0.00</value></div>
                <div class="data-item" style="border-color:var(--gold)"><label>预计奖金</label><value id="val-win">0.00</value></div>
                <div class="data-item"><label>已选选项</label><value id="val-pick">未选择</value></div>
            </div>

            <div class="stake-txt">SELECT STAKE: <span id="ui-stake" style="color:var(--gold)">100.0</span> USDT</div>
            
            <div class="exec-row">
                <button class="step-btn" onclick="adj(-1)">-</button>
                <button class="mode-toggle" onclick="toggleMode()">切换操作模式</button>
                <button class="step-btn" onclick="adj(1)">+</button>
            </div>

            <div class="mode-row">
                <div id="btn-auto" class="mode-btn" onclick="state.auto=!state.auto; update();">🤖 AUTO MODE</div>
                <div id="btn-speed" class="mode-btn" onclick="state.speed=state.speed%3+1; update();">⚡ SPEED: 1X</div>
            </div>
        </div>
    </div>
</div>

<script>
// 神兽分类：关联龙/虎/和
const beastList = [
    {n:'狮子', i:'🦁', type:'TIGER'},
    {n:'猛虎', i:'🐯', type:'TIGER'},
    {n:'恶狼', i:'🐺', type:'TIGER'},
    {n:'犀牛', i:'🦏', type:'DRAGON'},
    {n:'巨象', i:'🐘', type:'DRAGON'},
    {n:'黑熊', i:'🐻', type:'DRAGON'},
    {n:'神龙', i:'🐲', type:'TIE'},
    {n:'雄鹰', i:'🦅', type:'TIE'}
];

// 新增赔率配置
const oddsConfig = {
    DRAGON: 1,
    TIGER: 1,
    TIE: 8
};

let state = { 
    bal: 857.8, 
    bets: [10, 50, 100, 500, 1000], 
    bIdx: 2, 
    pick: null, 
    wheelRolling: false, 
    currentMode: 'single', // single-单独旋转；bet-押注开奖
    auto: false, 
    speed: 1, 
    wheelDeg: 0 
};

function init() {
    const w = document.getElementById('wheel');
    beastList.forEach((b, i) => {
        const d = document.createElement('div');
        d.className = 'slot'; d.style.transform = `rotate(${i*45}deg)`;
        // 增加分类标签
        let tagClass = '';
        if(b.type === 'DRAGON') tagClass = 'tag-dragon';
        else if(b.type === 'TIGER') tagClass = 'tag-tiger';
        else tagClass = 'tag-tie';
        
        d.innerHTML = `<span class="beast-ico">${b.i}</span>
                       <span class="beast-nm">${b.n}</span>
                       <span class="beast-tag ${tagClass}">${b.type==='DRAGON'?'龙':'虎'||'和'}</span>`;
        w.appendChild(d);
    });
    update();
}

// 切换操作模式
function toggleMode() {
    state.currentMode = state.currentMode === 'single' ? 'bet' : 'single';
    const btn = document.getElementById('btn-wheel-control');
    if(state.currentMode === 'single') {
        btn.innerText = '单独旋转';
        btn.classList.remove('bet-mode');
    } else {
        btn.innerText = '押注开奖';
        btn.classList.add('bet-mode');
    }
    update();
}

// 统一控制操作：根据模式执行不同逻辑
function controlAction() {
    if(state.wheelRolling) {
        alert("转盘正在转动，请稍候！");
        return;
    }

    if(state.currentMode === 'single') {
        // 单独旋转模式
        rotateWheel();
    } else {
        // 押注开奖模式
        betAndRoll();
    }
}

// 单独旋转转盘
function rotateWheel() {
    state.wheelRolling = true;
    document.getElementById('btn-wheel-control').disabled = true;
    document.getElementById('wheel').classList.add('blur');
    document.getElementById('wheel-result').innerText = "转盘转动中...";
    document.getElementById('battle-result').classList.remove('show');

    const winIdx = Math.floor(Math.random()*8);
    const rounds = state.speed===3 ? 4 : 8;
    const target = (360 - (state.wheelDeg%360)) + rounds*360 - (winIdx*45);
    state.wheelDeg += target;
    
    const wheel = document.getElementById('wheel');
    wheel.style.transitionDuration = state.speed===3?'0.8s':state.speed===2?'2s':'4s';
    wheel.style.transform = `rotate(0deg)`;
    setTimeout(() => {
        wheel.style.transform = `rotate(${state.wheelDeg}deg)`;
    }, 50);

    // 显示结果
    setTimeout(() => {
        wheel.classList.remove('blur'); 
        state.wheelRolling = false;
        document.getElementById('btn-wheel-control').disabled = false;
        const winBeast = beastList[winIdx];
        // 显示神兽结果和对应龙虎类别
        document.getElementById('wheel-result').innerText = `开出：${winBeast.n} ${winBeast.i}`;
        const battleResult = document.getElementById('battle-result');
        battleResult.innerText = winBeast.type === 'DRAGON' ? '龙' : winBeast.type === 'TIGER' ? '虎' : '和';
        battleResult.className = `battle-result result-${winBeast.type.toLowerCase()} show`;
    }, parseFloat(wheel.style.transitionDuration)*1000 + 50);
}

// 押注并开奖（转盘作为开奖依据）
function betAndRoll() {
    const cost = state.bets[state.bIdx];
    if(!state.pick) {
        alert("请先选择押注项（龙/虎/和）！");
        return;
    }
    if(state.bal < cost) {
        alert("余额不足，请调整押注金额！");
        return;
    }

    state.wheelRolling = true;
    state.bal -= cost;
    const winAmt = cost * oddsConfig[state.pick];
    document.getElementById('val-bet').innerText = cost.toFixed(2);
    document.getElementById('val-win').innerText = winAmt.toFixed(2);
    document.getElementById('btn-wheel-control').disabled = true;
    document.getElementById('wheel').classList.add('blur');
    document.getElementById('wheel-result').innerText = "开奖中...";
    document.getElementById('battle-result').classList.remove('show');
    update();

    const winIdx = Math.floor(Math.random()*8);
    const rounds = state.speed===3 ? 4 : 8;
    const target = (360 - (state.wheelDeg%360)) + rounds*360 - (winIdx*45);
    state.wheelDeg += target;
    
    const wheel = document.getElementById('wheel');
    wheel.style.transitionDuration = state.speed===3?'0.8s':state.speed===2?'2s':'4s';
    wheel.style.transform = `rotate(0deg)`;
    setTimeout(() => {
        wheel.style.transform = `rotate(${state.wheelDeg}deg)`;
    }, 50);

    // 开奖结果判定
    setTimeout(() => {
        wheel.classList.remove('blur'); 
        state.wheelRolling = false;
        document.getElementById('btn-wheel-control').disabled = false;
        const winBeast = beastList[winIdx];
        const winResult = winBeast.type;
        
        // 显示结果
        document.getElementById('wheel-result').innerText = `开出：${winBeast.n} ${winBeast.i}`;
        const battleResult = document.getElementById('battle-result');
        battleResult.innerText = winResult === 'DRAGON' ? '龙' : winResult === 'TIGER' ? '虎' : '和';
        battleResult.className = `battle-result result-${winResult.toLowerCase()} show`;

        // 中奖判定
        if(state.pick === winResult) {
            state.bal += winAmt;
            document.getElementById('cell-'+winResult).classList.add('winner');
            setTimeout(()=>document.getElementById('cell-'+winResult).classList.remove('winner'), 2000);
        }
        update();
        if(state.auto) setTimeout(controlAction, 1200);
    }, parseFloat(wheel.style.transitionDuration)*1000 + 50);
}

// 设置押注项
function setPick(s) { 
    state.pick = s; 
    update(); 
}

function adj(d) { 
    state.bIdx = Math.max(0, Math.min(state.bets.length-1, state.bIdx + d)); 
    update(); 
}

function update() {
    document.getElementById('ui-bal').innerText = state.bal.toFixed(2);
    document.getElementById('ui-stake').innerText = state.bets[state.bIdx].toFixed(1);
    document.querySelectorAll('.side-cell').forEach(c => c.classList.remove('active'));
    if(state.pick) document.getElementById('cell-'+state.pick).classList.add('active');
    document.getElementById('val-pick').innerText = state.pick || '未选择';
    document.getElementById('btn-auto').className = "mode-btn " + (state.auto?"active":"");
    document.getElementById('btn-speed').innerText = "⚡ SPEED: " + state.speed + "X";
}

// 初始化
init();
</script>
</body>
</html>
