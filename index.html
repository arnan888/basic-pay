<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOLA_ULTIMATE_V88_FULL_STACK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        /* 1. 补全：动态深邃星空背景 (解决死黑问题) */
        body {
            background: radial-gradient(circle at center, #2b0a0a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; font-family: 'Arial Black', sans-serif;
        }
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 80px 80px; animation: starMove 120s linear infinite; opacity: 0.2;
        }
        @keyframes starMove { from { transform: translateY(0); } to { transform: translateY(-50%); } }

        /* 2. 补全：至尊金属余额 HUD */
        .hud { text-align: center; margin-bottom: 25px; z-index: 10; }
        .hud-v { 
            color: #FFD700; font-size: 52px; font-weight: 900;
            text-shadow: 0 0 20px rgba(255,215,0,0.6), 2px 2px 5px #000;
        }

        /* 3. 补全：12px 实体亮金外框 + 3D 转盘 */
        .outer {
            width: 460px; height: 460px; border: 12px solid #FFD700;
            box-shadow: 0 0 60px rgba(255,215,0,0.4), inset 0 0 25px #000;
            border-radius: 50%; position: relative; z-index: 5; background: #000;
        }
        .wheel {
            width: 100%; height: 100%; border-radius: 50%; position: relative;
            overflow: hidden; transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1.25);
            background: #000;
        }
        .prize-item {
            position: absolute; width: 50%; height: 50%; transform-origin: bottom right;
            display: flex; justify-content: center; align-items: center;
            color: #FFD700; font-size: 18px; font-weight: bold; padding-bottom: 90px;
        }
        .prize-item:nth-child(odd) { background: radial-gradient(circle, #c01f1f, #000); }
        .prize-item:nth-child(even) { background: radial-gradient(circle, #111, #300); }

        /* 4. 补全：真 3D 绿色物理按钮 (下沉 10 像素) */
        .spin-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; border-radius: 50%;
            background: radial-gradient(circle, #00ff00, #006400);
            box-shadow: 0 10px 0 #004000, 0 15px 30px rgba(0,0,0,0.8);
            border: 4px solid #fff; cursor: pointer; color: white; font-size: 20px;
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .spin-btn:active { transform: translate(-50%, -50%) translateY(8px); box-shadow: 0 2px 0 #004000; }

        /* 5. 补全：三档变速按钮 */
        .gears { margin-top: 40px; display: flex; gap: 12px; z-index: 10; }
        .gear {
            padding: 10px 22px; border: 1px solid #FFD700; background: rgba(0,0,0,0.7);
            color: #FFD700; border-radius: 6px; cursor: pointer; transition: 0.3s;
        }
        .gear.active { background: #FFD700; color: #000; box-shadow: 0 0 20px #FFD700; }

        /* 补全：物理震动感 */
        .shake { animation: shakeAction 0.15s ease-in-out infinite; }
        @keyframes shakeAction { 0% { transform: translate(3px,3px); } 50% { transform: translate(-3px,-3px); } 100% { transform: translate(0,0); } }
        .ptr { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 45px solid #FFD700; z-index: 150; }
    </style>
</head>
<body>
    <div class="hud">
        <div id="bal" class="hud-v">88,988.00</div>
    </div>

    <div class="outer" id="stage">
        <div class="ptr"></div>
        <div class="wheel" id="wheel">
            <div class="prize-item" style="transform: rotate(0deg) skewY(-45deg);">💰 10.0</div>
            <div class="prize-item" style="transform: rotate(45deg) skewY(-45deg);">❌ 空</div>
            <div class="prize-item" style="transform: rotate(90deg) skewY(-45deg);">💎 50.0</div>
            <div class="prize-item" style="transform: rotate(135deg) skewY(-45deg);">❌ 空</div>
            <div class="prize-item" style="transform: rotate(180deg) skewY(-45deg);">🔥 5.0</div>
            <div class="prize-item" style="transform: rotate(225deg) skewY(-45deg);">❌ 空</div>
            <div class="prize-item" style="transform: rotate(270deg) skewY(-45deg);">⭐ 100</div>
            <div class="prize-item" style="transform: rotate(315deg) skewY(-45deg);">❌ 空</div>
        </div>
        <div class="spin-btn" onclick="runSpin()">SPIN</div>
    </div>

    <div class="gears">
        <button class="gear active" id="g1" onclick="setG(1)">标准</button>
        <button class="gear" id="g2" onclick="setG(2)">快速</button>
        <button class="gear" id="g3" onclick="setG(3)">极速</button>
    </div>

    <audio id="s_spin" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3">
    <audio id="s_win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3">

    <script>
        let balance = 88988.00; let rot = 0; let gear = 1; let busy = false;
        const w = document.getElementById('wheel');
        const stage = document.getElementById('stage');
        const s_s = document.getElementById('s_spin');
        const s_w = document.getElementById('s_win');

        function setG(v) { gear = v; document.querySelectorAll('.gear').forEach(b=>b.classList.remove('active')); document.getElementById('g'+v).classList.add('active'); }

        function runSpin() {
            if(busy || balance < 0.5) return;
            busy = true; balance -= 0.5; updateBal();
            s_s.play();
            
            let dur = gear==1 ? 3000 : gear==2 ? 1500 : 600;
            let add = 1800 + Math.floor(Math.random()*360); rot += add;
            
            w.style.transition = `transform ${dur}ms ${gear==3?'linear':'cubic-bezier(0.15, 0, 0.15, 1.25)'}`;
            w.style.transform = `rotate(${rot}deg)`;
            if(gear==3) w.style.filter = "blur(5px)";

            setTimeout(() => {
                w.style.filter = "none";
                stage.classList.add('shake');
                s_s.pause(); s_w.play();
                
                setTimeout(() => {
                    stage.classList.remove('shake');
                    let rewards = [10, 0, 50, 0, 5, 0, 100, 0];
                    let prize = rewards[Math.floor(Math.random()*8)];
                    animateWin(prize);
                    busy = false;
                }, 300);
            }, dur);
        }

        function updateBal() { document.getElementById('bal').innerText = balance.toLocaleString(undefined,{minimumFractionDigits:2}); }
        function animateWin(win) {
            let start = balance; balance += win; let step = win/20; let c = 0;
            let t = setInterval(() => {
                c++; let cur = start + step*c;
                document.getElementById('bal').innerText = cur.toLocaleString(undefined,{minimumFractionDigits:2});
                if(c>=20){ clearInterval(t); updateBal(); }
            }, 30);
        }
    </script>
</body>
</html>
