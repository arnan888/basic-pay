<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="祝贺转盘系统 - 物理质感立体设计">
    <title>ULITMATE_CONGRATS_PB</title>
    <style>
        /* 全局重置与基础设置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1a1a; 
            color: #e0e0e0; 
            font-family: "Microsoft Yahei", "Segoe UI", sans-serif;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 核心容器：四周墨绿色2.8mm平面立体包边 */
        .main-container {
            width: clamp(320px, 90%, 1000px);
            height: clamp(500px, 85vh, 800px);
            /* 模拟2.8mm包边厚度 */
            border: 14px solid #0f382c;
            border-radius: 12px;
            box-shadow: 
                inset 0 0 0 6px #1a4a3d, 
                0 8px 25px rgba(0,0,0,0.8);
            position: relative;
            background: #2c2c2c;
            /* 暗灰色双层网格内陷模式 */
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 20px 20px, 20px 20px;
            background-position: center center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部板块：后台操作字段区 */
        .top-panel {
            height: 80px;
            background: rgba(15, 56, 44, 0.7);
            border-bottom: 3px solid #1a4a3d;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 30px;
        }
        .top-panel .field-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .top-panel .field-label {
            font-size: 14px;
            color: #a8c9be;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .top-panel .field-value {
            font-size: 22px;
            font-family: "Consolas", monospace;
            color: #82e0aa;
            text-shadow: 0 0 5px rgba(130, 224, 170, 0.5);
            font-weight: bold;
        }

        /* 中间板块：转盘核心区（中间偏上位置） */
        .middle-panel {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 30px;
            position: relative;
        }

        /* 底部板块：辅助信息区 */
        .bottom-panel {
            height: 60px;
            background: rgba(15, 56, 44, 0.7);
            border-top: 3px solid #1a4a3d;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bottom-panel .info-text {
            font-size: 16px;
            color: #a8c9be;
            letter-spacing: 2px;
            font-weight: 500;
        }

        /* 转盘容器：物理立体质感 */
        .wheel-container {
            width: clamp(280px, 60vmin, 500px);
            height: clamp(280px, 60vmin, 500px);
            position: relative;
        }
        /* 转盘外框：立体包边 */
        .wheel-frame {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #1a4a3d;
            box-shadow: 
                inset 0 0 15px rgba(0,0,0,0.8),
                0 0 20px rgba(15, 56, 44, 0.6);
            background: #383838;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        /* 转盘指针：立体突出 */
        .wheel-pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 50px;
            background: linear-gradient(#0f382c, #1a4a3d);
            border: 3px solid #82e0aa;
            border-radius: 4px 4px 0 0;
            box-shadow: 0 3px 8px rgba(0,0,0,0.6);
            z-index: 100;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        .wheel-pointer::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 5px;
            background: #82e0aa;
            border-radius: 3px;
        }

        /* 转盘主体：8格分块，内置网格底纹 */
        .wheel-body {
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            border-radius: 50%;
            background: #2c2c2c;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 15px 15px, 15px 15px;
            position: relative;
            transition: transform 5s cubic-bezier(0.1, 0, 0, 1.02);
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 转盘8个格子：立体分块 */
        .wheel-slot {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            transform-origin: center center;
            clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 50%);
        }
        /* 格子交替底色，增强区分 */
        .wheel-slot:nth-child(odd) {
            background: rgba(15, 56, 44, 0.2);
        }
        .wheel-slot:nth-child(even) {
            background: rgba(26, 74, 61, 0.2);
        }

        /* 格子内容容器：动物图案+文字 */
        .slot-content {
            position: absolute;
            top: 15px;
            left: 50%;
            transform-origin: center bottom;
            width: 80px;
            text-align: center;
            transform: rotate(calc(var(--slot-angle) * 1deg));
        }
        /* 立体动物图案容器 */
        .animal-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #383838, #2c2c2c);
            border: 3px solid #82e0aa;
            box-shadow: 
                inset 0 0 10px rgba(0,0,0,0.8),
                0 5px 10px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            /* 立体浮雕效果 */
            position: relative;
        }
        .animal-icon::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            border-radius: 50%;
            background: linear-gradient(45deg, rgba(255,255,255,0.1), transparent);
            pointer-events: none;
        }
        /* 动物SVG图标样式 */
        .animal-icon svg {
            width: 45px;
            height: 45px;
            fill: #e0e0e0;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
        }
        /* 格子文字信息 */
        .slot-name {
            font-size: 14px;
            color: #e0e0e0;
            font-weight: bold;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            margin-bottom: 3px;
        }
        .slot-reward {
            font-size: 12px;
            color: #82e0aa;
            background: rgba(15, 56, 44, 0.5);
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid #82e0aa;
        }

        /* 中心按钮：立体按压质感 */
        .center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(#0f382c, #1a4a3d);
            border: 4px solid #82e0aa;
            box-shadow: 
                inset 0 0 15px rgba(0,0,0,0.6),
                0 6px 0 #0a2820,
                0 8px 15px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            transition: all 0.15s ease;
        }
        .center-btn:active {
            transform: translate(-50%, -50%) translateY(4px);
            box-shadow: 
                inset 0 0 10px rgba(0,0,0,0.6),
                0 2px 0 #0a2820,
                0 4px 8px rgba(0,0,0,0.8);
        }
        .center-btn.busy {
            background: linear-gradient(#2c2c2c, #383838);
            border-color: #666;
            cursor: not-allowed;
            transform: translate(-50%, -50%);
            box-shadow: 
                inset 0 0 10px rgba(0,0,0,0.6),
                0 2px 0 #1a1a1a,
                0 4px 8px rgba(0,0,0,0.8);
        }
        .center-btn h2 {
            font-size: 28px;
            color: #e0e0e0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }
        .center-btn.busy h2 {
            color: #999;
        }

        /* 加载指示器 */
        .loading-indicator {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 35px;
            height: 35px;
            border: 3px solid #82e0aa;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 201;
        }
        .loading-indicator.active {
            display: block;
        }
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 中奖高亮效果 */
        .wheel-slot.win {
            background: rgba(130, 224, 170, 0.3);
        }
        .wheel-slot.win .animal-icon {
            border-color: #fff;
            box-shadow: 0 0 20px rgba(130, 224, 170, 0.8);
        }
        .wheel-slot.win .animal-icon svg {
            fill: #fff;
            filter: drop-shadow(0 0 8px rgba(130, 224, 170, 0.8));
        }
    </style>
</head>
