<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body { 
        background: #3fb950; 
        background-image: radial-gradient(circle at 50% 50%, #4ade80 0%, #166534 100%);
        color:#333; 
        font-family: "PingFang SC", sans-serif; 
        height:100vh; 
        display:flex; 
        flex-direction:column; 
        overflow: hidden;
    }

    .status-bar { background: rgba(0,0,0,0.1); height:28px; display:flex; align-items:center; padding:0 15px; font-size:10px; color:#fff; justify-content:center; flex-shrink: 0; }

    .core-section { 
        flex: 1; 
        display:flex; 
        flex-direction:column; 
        align-items:center; 
        justify-content: space-evenly; 
        padding:15px;
        min-height: 0; 
    }

    /* 灰色大网格内陷面板 */
    .pit-panel {
        width:100%;
        max-width: 400px;
        background-color: #cfd8e3;
        background-image: 
            linear-gradient(rgba(0,0,0,0.06) 1.5px, transparent 1.5px),
            linear-gradient(90deg, rgba(0,0,0,0.06) 1.5px, transparent 1.5px);
        background-size: 25px 25px;
        border-radius: 24px;
        box-shadow: 
            inset 8px 8px 15px rgba(0,0,0,0.2), 
            inset -5px -5px 12px rgba(255,255,255,0.5),
            0 4px 10px rgba(0,0,0,0.15);
        border: 2px solid #b0bbc9;
        padding: 15px;
        position: relative;
    }

    .bal-val { font-size: 48px; font-weight: 900; color: #ff4d4d; font-family: 'Verdana', sans-serif; }

    /* 转盘区域 */
    .wheel-pit {
        width: 280px;
        height: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .wheel-outer { 
        width: 240px; height: 240px; border-radius: 50%; position: relative; 
        background: linear-gradient(145deg, #ffffff, #d1d9e6);
        box-shadow: 8px 8px 20px rgba(0,0,0,0.2), -4px -4px 15px rgba(255,255,255,0.8);
        border: 2px solid #bdc8d7;
        transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        z-index: 5;
    }

    .wheel-center-val {
        position: absolute; z-index: 20; width: 60px; height: 60px; background: #e0e5ec;
        border-radius: 50%; display: flex; align-items:center; justify-content:center;
        color: #ff4d4d; font-size: 18px; font-weight: 900;
        box-shadow: 3px 3px 6px rgba(0,0,0,0.2), inset 1px 1px 2px white; 
        border: 1px solid #c2cbd8;
    }

    .slot-content { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; padding-top:10px; }
    .beast-ico { font-size: 36px; filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.3)); }
    .beast-txt { font-size: 10px; color:#444; font-weight:bold; }

    /* 固定红色箭头指针 */
    .pointer-arrow {
        position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
        width: 0; height: 0;
        border-left: 12px solid transparent;
        border-right: 12px solid transparent;
        border-top: 20px solid #ff0000;
        z-index: 100;
        filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
    }

    /* --- 控制台区域：解决按键压迫问题 --- */
    .console-area { 
        width:100%; 
        background-color: #cfd8e3;
        background-image: 
            linear-gradient(rgba(0,0,0,0.06) 1.5px, transparent 1.5px),
            linear-gradient(90deg, rgba(0,0,0,0.06) 1.5px, transparent 1.5px);
        background-size: 25px 25px;
        padding: 25px 20px 100px 20px; /* 增加底部 padding (100px) 确保完全避开导航栏 */
        border-radius: 35px 35px 0 0;
        box-shadow: 0 -8px 25px rgba(0,0,0,0.2), inset 0 4px 10px rgba(255,255,255,0.4);
        border-top: 2px solid #b0bbc9;
        flex-shrink: 0;
    }

    .main-row { 
        display:flex; 
        align-items: center; 
        justify-content: space-between; 
        gap: 15px; 
        margin-bottom: 25px; /* 增加行间距 */
    }

    .btn-deep-inset { 
        background: #e0e5ec; color:#555; font-size:26px; border-radius:15px;
        width: 60px; height: 60px; display:flex; align-items:center; justify-content:center;
        box-shadow: 4px 4px 8px rgba(0,0,0,0.1), -4px -4px 8px rgba(255,255,255,0.7);
        border: 1px solid #c2cbd8;
        cursor: pointer;
    }

    .exec-red-btn { 
        flex: 1; height: 60px; background: #d90000; border: none;
        border-bottom: 5px solid #a00000; color:#fff; font-size:20px; font-weight:900; 
        border-radius: 15px; letter-spacing:1px; box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        cursor: pointer;
    }
    .exec-red-btn:active { transform: translateY(2px); border-bottom-width: 2px; }

    .tech-row { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mode-btn { 
        padding:15px; background:#e0e5ec; border-radius:12px;
        color:#444; font-size:12px; text-align:center; font-weight: bold;
        box-shadow: 3px 3px 6px rgba(0,0,0,0.1), -2px -2px 5px rgba(255,255,255,0.7);
        border: 1px solid #c2cbd8;
    }
    .mode-btn.on { background: #ff4d4d; color: white; border-color: #d90000; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); }

    /* 底部导航 */
    .nav { position:fixed; bottom:0; width:100%; height:75px; background:#fff; border-top:1px solid #ddd; display:grid; grid-template-columns: repeat(4, 1fr); z-index: 1000; }
    .nav-n { display:flex; flex-direction:column; align-items:center; justify-content:center; color:#888; font-size:11px; font-weight:bold; }
    .nav-n.act { color:#ff4d4d; }
</style>
</head>
<body>

<div class="status-bar">● QUANT_PULSE_EXTERIOR_V5.1 ●</div>

<div class="core-section">
    <div class="pit-panel" style="text-align: center;">
        <div style="font-size:11px; color:#555; font-weight:bold; letter-spacing:1px;">AVAILABLE BALANCE (USDT)</div>
        <div class="bal-val" id="ui_bal">146.8</div>
        <div style="font-size:12px; color:#666; font-weight:bold;">BET: <span id="ui_bet" style="color:#ff4d4d;">5.5</span></div>
    </div>

    <div class="pit-panel" style="display:flex; justify-content:center; align-items:center;">
        <div class="wheel-pit">
            <div class="pointer-arrow"></div>
            <div class="wheel-center-val" id="center_val">X0</div>
            <div id="ui_wheel" class="wheel-outer">
                <div class="slot-content" style="transform:rotate(0deg)"><span class="beast-ico">🐺</span><span class="beast-txt">孤狼</span></div>
                <div class="slot-content" style="transform:rotate(45deg)"><span class="beast-ico">🐯</span><span class="beast-txt">猛虎</span></div>
                <div class="slot-content" style="transform:rotate(90deg)"><span class="beast-ico">🐢</span><span class="beast-txt">玄武</span></div>
                <div class="slot-content" style="transform:rotate(135deg)"><span class="beast-ico">🦌</span><span class="beast-txt">麒麟</span></div>
                <div class="slot-content" style="transform:rotate(180deg)"><span class="beast-ico">🐲</span><span class="beast-txt">神龙</span></div>
                <div class="slot-content" style="transform:rotate(225deg)"><span class="beast-ico">🔥</span><span class="beast-txt">凤凰</span></div>
                <div class="slot-content" style="transform:rotate(270deg)"><span class="beast-ico">🦅</span><span class="beast-txt">大鹏</span></div>
                <div class="slot-content" style="transform:rotate(315deg)"><span class="beast-ico">🦢</span><span class="beast-txt">仙鹤</span></div>
            </div>
        </div>
    </div>
</div>

<div class="console-area">
    <div class="main-row">
        <button class="btn-deep-inset" onclick="changeBet(-0.5)">－</button>
        <button id="go_btn" class="exec-red-btn" onclick="go()">开始执行</button>
        <button class="btn-deep-inset" onclick="changeBet(0.5)">＋</button>
    </div>
    <div class="tech-row">
        <div id="auto_btn" class="mode-btn" onclick="toggleAuto()">🤖 自动模式: 关</div>
        <div id="speed_btn" class="mode-btn" onclick="cycleSpeed()">⚡ 变速模式: 1X</div>
    </div>
</div>

<div class="nav">
    <div class="nav-n">行情</div><div class="nav-n">资产中心</div><div class="nav-n">历史记录</div><div class="nav-n act">量化终端</div>
</div>

<script>
    let balance = 146.8, bet = 5.5, rot = 0, busy = false, isAuto = false, speedMode = 1;
    const beastNames = ["X0", "X50", "X88", "X50", "X120", "X500", "X20", "X0"];
    const multis = [0, 50, 88, 50, 120, 500, 20, 0];

    function toggleAuto() {
        isAuto = !isAuto;
        document.getElementById('auto_btn').className = isAuto ? 'mode-btn on' : 'mode-btn';
        document.getElementById('auto_btn').innerHTML = `🤖 自动模式: ${isAuto ? '开' : '关'}`;
        if(isAuto && !busy) go();
    }

    function cycleSpeed() {
        speedMode = (speedMode % 3) + 1;
        document.getElementById('speed_btn').innerHTML = `⚡ 变速模式: ${speedMode}X`;
        const times = ["", "5s", "1.2s", "0.5s"];
        document.getElementById('ui_wheel').style.transitionDuration = times[speedMode];
    }

    function changeBet(val) {
        if (busy) return;
        let n = bet + val;
        if (n >= 0.5) { bet = n; document.getElementById('ui_bet').innerText = bet.toFixed(1); }
    }

    function go() {
        if (busy || balance < bet) { isAuto = false; return; }
        busy = true;
        const r = Math.floor(Math.random() * 1000);
        let idx = (r < 500) ? 0 : (r < 850 ? 7 : (r < 950 ? 6 : (r < 980 ? 1 : (r < 990 ? 3 : (r < 996 ? 2 : (r < 999 ? 4 : 5))))));
        const targetAngle = idx * 45;
        rot += (Math.floor(Math.random() * 5) + 10) * 360 + (360 - targetAngle - (rot % 360)) + 360;
        document.getElementById('ui_wheel').style.transform = `rotate(${rot}deg)`;
        
        const waitTimes = [0, 5000, 1200, 500];
        setTimeout(() => {
            const prize = multis[idx] * bet;
            balance = (balance - bet) + prize;
            document.getElementById('ui_bal').innerText = balance.toFixed(1);
            document.getElementById('center_val').innerText = beastNames[idx];
            if(isAuto) setTimeout(go, 800);
            setTimeout(() => { busy = false; }, 500);
        }, waitTimes[speedMode]);
    }
</script>

</body>
</html>
