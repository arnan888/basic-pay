<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>金辉娱乐城 · 全自动豪华版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #1a120b 0%, #2a1e12 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            color: #ffecb3;
            transition: background 0.3s, color 0.3s;
        }
        #app {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(30, 20, 12, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(255, 215, 0, 0.5);
            overflow: hidden;
        }
        .auth-panel {
            padding: 28px 20px;
            background: rgba(20, 12, 6, 0.8);
        }
        .auth-panel h2, .auth-panel h3 {
            text-align: center;
            margin-bottom: 16px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-input {
            width: 100%;
            padding: 12px 16px;
            margin: 6px 0;
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffaa33;
            border-radius: 40px;
            color: #ffd966;
            font-size: 0.95rem;
            outline: none;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 10px 0;
        }
        .code-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            color: #2a1a0a;
            font-weight: 700;
            cursor: pointer;
        }
        .auth-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: bold;
            color: #2a1a0a;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-size: 0.95rem;
        }
        hr {
            margin: 20px 0;
            border-color: #ffaa33;
        }
        .auth-note {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 12px;
            color: #ffaa33;
        }
        .user-section {
            background: rgba(20, 12, 6, 0.7);
            padding: 12px 16px;
            border-bottom: 1px solid #ffaa33;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        #userBalanceDisplay {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 6px;
        }
        .btn-sm {
            background: rgba(255,170,51,0.2);
            border: 1px solid #ffaa33;
            padding: 4px 12px;
            border-radius: 40px;
            color: #ffd966;
            cursor: pointer;
            font-size: 0.75rem;
            min-height: 36px;
        }
        .charge-btn, .withdraw-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: #2a1a0a;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            min-height: 40px;
        }
        .lang-switch, .theme-switch {
            background: #ffaa33;
            border: none;
            border-radius: 30px;
            padding: 4px 10px;
            color: #2a1a0a;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 4px;
            min-height: 34px;
        }
        .game-nav {
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            margin: 12px 12px;
            border-radius: 60px;
        }
        .game-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.8rem;
            color: #ffaa33;
            cursor: pointer;
            min-height: 44px;
        }
        .game-tab.active {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            color: #2a1a0a;
            box-shadow: 0 0 8px #ffaa33;
        }
        .game-container {
            padding: 8px 12px 20px;
        }
        .game-card {
            background: rgba(20, 12, 6, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 16px;
            border: 1px solid #ffaa33;
        }
        .chip {
            background: linear-gradient(145deg, #cc8800, #aa6600);
            display: inline-block;
            padding: 8px 16px;
            border-radius: 36px;
            margin: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #ffecb3;
            border: 1px solid #ffaa33;
            font-size: 0.9rem;
            min-width: 55px;
            text-align: center;
            min-height: 44px;
        }
        .chip.selected {
            background: linear-gradient(145deg, #ffaa33, #ff884d);
            color: #2a1a0a;
        }
        .quick-bet, .clear-bet {
            background: rgba(255,170,51,0.2);
            border: 1px solid #ffaa33;
            border-radius: 30px;
            padding: 4px 12px;
            margin: 3px;
            cursor: pointer;
            color: #ffd966;
            font-weight: 500;
            font-size: 0.8rem;
            min-height: 36px;
        }
        .exec-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 36px;
            padding: 8px 14px;
            color: #2a1a0a;
            font-weight: bold;
            cursor: pointer;
            margin: 3px;
            font-size: 0.85rem;
            min-height: 44px;
        }
        .main-go {
            background: linear-gradient(135deg, #ffcc66, #ffaa33);
            font-weight: 800;
        }
        .countdown-area {
            text-align: center;
            margin: 6px 0 12px 0;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 8px 12px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #ffaa33;
        }
        .fish-dice-3d-area, .dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            perspective: 800px;
        }
        .fish-dice-cube, .dice-cube {
            width: 70px;
            height: 70px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.2s cubic-bezier(0.2,0.9,0.4,1.1);
        }
        .fish-dice-face, .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #2a1e12;
            border: 2px solid #ffaa33;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: visible;
            font-size: 2rem;
            font-weight: bold;
            color: #ffd966;
        }
        .fish-front { transform: translateZ(35px); }
        .fish-back { transform: rotateY(180deg) translateZ(35px); }
        .fish-right { transform: rotateY(90deg) translateZ(35px); }
        .fish-left { transform: rotateY(-90deg) translateZ(35px); }
        .fish-top { transform: rotateX(90deg) translateZ(35px); }
        .fish-bottom { transform: rotateX(-90deg) translateZ(35px); }
        .front { transform: translateZ(35px); }
        .back { transform: rotateY(180deg) translateZ(35px); }
        .right { transform: rotateY(90deg) translateZ(35px); }
        .left { transform: rotateY(-90deg) translateZ(35px); }
        .top { transform: rotateX(90deg) translateZ(35px); }
        .bottom { transform: rotateX(-90deg) translateZ(35px); }
        @media (max-width:480px){
            .fish-dice-cube, .dice-cube{width:60px;height:60px;}
            .fish-front,.fish-back,.fish-right,.fish-left,.fish-top,.fish-bottom,
            .front,.back,.right,.left,.top,.bottom{transform:translateZ(30px);}
            .fish-dice-face,.dice-face{font-size:1.5rem;}
            .chip{ padding: 6px 12px; min-width: 45px; }
        }
        .pip {
            width: 10px;
            height: 10px;
            background: #ffaa33;
            border-radius: 50%;
            margin: 2px;
        }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 8px; left: 8px; }
        .pip-tr { position: absolute; top: 8px; right: 8px; }
        .pip-bl { position: absolute; bottom: 8px; left: 8px; }
        .pip-br { position: absolute; bottom: 8px; right: 8px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .fish-pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 10px 0;
        }
        .fish-bet-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 8px 4px;
            text-align: center;
            border: 1px solid #ffaa33;
        }
        .bet-card {
            background: rgba(0,0,0,0.5);
            border-radius: 18px;
            padding: 8px 2px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #ffaa33;
            font-size: 0.8rem;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .points-grid, .trio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
            gap: 8px;
            margin: 10px 0;
        }
        .history-cell {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,170,51,0.2);
            font-weight: bold;
        }
        .modal {
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2a1e12;
            border-radius: 36px;
            padding: 20px;
            max-width: 90%;
            max-height: 85%;
            overflow: auto;
            color: #ffd966;
            border: 1px solid #ffaa33;
            text-align: center;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a1a0a;
            color: #ffd966;
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 2000;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid #ffaa33;
            font-size: 0.85rem;
        }
        .result-popup {
            position: fixed;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg,#ffaa33,#ff884d);
            color: #2a1a0a;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            z-index: 1500;
            white-space: nowrap;
        }
        .admin-btn { background: #ffaa33; border: none; border-radius: 20px; padding: 4px 8px; margin: 2px; color: #2a1a0a; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .niu-card {
            width: 55px;
            height: 75px;
            background: white;
            border-radius: 8px;
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1rem;
            margin: 0 2px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            flex-shrink: 0;
            color: #2a1a0a;
        }
        .niu-card[data-suit="♥"], .niu-card[data-suit="♦"] { color: #c33; }
        .niu-card[data-suit="♣"], .niu-card[data-suit="♠"] { color: #333; }
        .niu-hand {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            overflow-x: auto;
            justify-content: center;
            gap: 8px;
            min-height: 100px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin: 8px 0;
        }
        @media (max-width:480px){
            .niu-card{width:48px;height:65px;font-size:0.85rem;}
        }
        body.light-mode {
            background: linear-gradient(145deg,#f5f0e6 0%,#e8dfd0 100%);
            color: #3a2a1a;
        }
        body.light-mode #app {
            background: rgba(245,240,230,0.85);
            border-color: rgba(180,130,60,0.5);
        }
        body.light-mode .auth-panel,
        body.light-mode .user-section,
        body.light-mode .game-card,
        body.light-mode .modal-content {
            background: rgba(250,245,235,0.9);
            border-color: #b8860b;
            color: #3a2a1a;
        }
        body.light-mode .auth-input,
        body.light-mode .fish-bet-card,
        body.light-mode .bet-card,
        body.light-mode .chip,
        body.light-mode .quick-bet,
        body.light-mode .exec-btn,
        body.light-mode .countdown-area {
            background: rgba(255,250,240,0.8);
            border-color: #c99a3b;
            color: #4a3a2a;
        }
        body.light-mode .chip.selected {
            background: linear-gradient(145deg,#ffcc77,#e6a822);
            color: #2a1a0a;
        }
        body.light-mode .fish-dice-face,
        body.light-mode .dice-face {
            background: #fffaf0;
            border-color: #c99a3b;
            color: #4a3a2a;
        }
        body.light-mode .niu-card {
            background: #fffaf0;
            border-color: #c99a3b;
        }
        body.light-mode .toast-message {
            background: #fff9ef;
            color: #b8860b;
            border-color: #b8860b;
        }
        body.light-mode .result-popup {
            background: linear-gradient(135deg,#ffcc77,#e6a822);
            color: #2a1a0a;
        }
        button, .chip, .bet-card, .quick-bet, .exec-btn, .game-tab { touch-action: manipulation; cursor: pointer; }
        .game-card { -webkit-overflow-scrolling: touch; }
        .fish-dice-cube, .dice-cube { will-change: transform; }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== 双语 ====================
    const lang = {
        zh: {
            recharge: "💎 充值", withdraw: "💰 提现", service: "📞 客服", logout: "退出", balance: "余额",
            phoneOrEmail: "手机号 / 邮箱", password: "密码 (≥4位)", referralCode: "推荐码 (必填)", remember: "记住账号",
            login: "登录", register: "注册", referralNote: "推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "获取验证码", verifyCode: "验证码", registerNow: "注册新账户",
            gameFish: "🐟 金辉鱼虾蟹", gameDice: "🎲 金辉骰宝", gameDT: "🐉 金辉龙虎斗", game4: "🐮 金辉牛牛"
        },
        th: {
            recharge: "💎 เติมเงิน", withdraw: "💰 ถอนเงิน", service: "📞 บริการ", logout: "ออก", balance: "ยอดเงิน",
            phoneOrEmail: "เบอร์โทร / อีเมล", password: "รหัสผ่าน (≥4)", referralCode: "รหัสแนะนำ", remember: "จำฉัน",
            login: "เข้าสู่ระบบ", register: "สมัคร", referralNote: "รหัส: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "รับรหัส", verifyCode: "รหัสยืนยัน", registerNow: "สมัครสมาชิก",
            gameFish: "🐟 ปลาหมึกทอง", gameDice: "🎲 เซียนเต๋าทอง", gameDT: "🐉 มังกรเสือทอง", game4: "🐮 กระบือทอง"
        }
    };
    let currentLang = 'zh';
    function t(key) { return lang[currentLang][key] || lang.zh[key] || key; }

    // ==================== 全局数据 ====================
    let systemBankerBalance = localStorage.getItem('neon_system_banker') ? parseFloat(localStorage.getItem('neon_system_banker')) : 50000;
    let adjustFactor = localStorage.getItem('neon_adjustFactor') ? parseFloat(localStorage.getItem('neon_adjustFactor')) : 1.0;
    let validReferralCodes = ["VIP666","888VIP","GOLD2025","LUCKY8","DICE100"];
    let usersData = JSON.parse(localStorage.getItem('neon_users')) || {};

    // 预设测试账号
    const presetTestAccounts = {
        'ad13802262305': { password: '000000', balance: 10000, registerTime: new Date().toLocaleString(), records: [], resultHistory: [] },
        'ag17266196979': { password: '000000', balance: 70000, registerTime: new Date().toLocaleString(), records: [], resultHistory: [] },
        'ad13691996362': { password: '000000', balance: 50000, registerTime: new Date().toLocaleString(), records: [], resultHistory: [] },
        'ad0919154422': { password: '000000', balance: 1000000, registerTime: new Date().toLocaleString(), records: [], resultHistory: [] },
        'test5': { password: '123', balance: 500000, registerTime: new Date().toLocaleString(), records: [], resultHistory: [] }
    };
    for (let acc in presetTestAccounts) {
        if (!usersData[acc]) usersData[acc] = presetTestAccounts[acc];
    }
    localStorage.setItem('neon_users', JSON.stringify(usersData));
    let currentUser = null;
    let verificationCodes = {};

    function saveUsers() { localStorage.setItem('neon_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.account]?.balance || 0) : 0; }
    function setUserBalance(amount) {
        if(!currentUser) return;
        usersData[currentUser.account].balance = Math.max(0, amount);
        saveUsers();
        let span = document.getElementById("userBalanceDisplay");
        if(span) span.innerText = getUserBalance().toFixed(2);
    }
    function showToast(msg) { let t = document.createElement('div'); t.className = 'toast-message'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }

    function addGameRecord(account, gameName, betInfo, result, winAmount, betAmount) {
        if(!usersData[account]) return;
        let rec = usersData[account].records||[];
        rec.unshift({ time: new Date().toLocaleString(), game: gameName, bet: betInfo, result, win: winAmount, amount: betAmount });
        if(rec.length>100) rec.pop();
        usersData[account].records = rec;
        saveUsers();
    }

    // 充值/提现/客服/管理员 简化保留原功能
    function recharge() {
        let amt = parseFloat(prompt("充值金额（元）:", "100"));
        if(isNaN(amt)||amt<=0) return showToast("金额无效");
        setUserBalance(getUserBalance() + amt);
        showToast(`充值成功 +${amt} 元`);
    }
    function withdraw() {
        let bal = getUserBalance();
        if(bal <= 0) { showToast("余额不足"); return; }
        let amt = parseFloat(prompt("提现金额（元）:", "10"));
        if(isNaN(amt)||amt<=0||amt>bal) return showToast("金额无效");
        setUserBalance(bal - amt);
        showToast(`提现申请已提交 ${amt} 元`);
    }
    function showServiceModal() { alert("客服微信: jinhui_cs_888"); }

    // 管理员后台（简化）
    let adminPassword = localStorage.getItem('neon_admin_pwd') || "admin888";
    function openAdminModal() {
        let pwd = prompt("管理员密码:");
        if(pwd !== adminPassword) { showToast("密码错误"); return; }
        alert("后台功能：可修改余额、赔付系数等（演示版已集成在代码中）");
    }

    // ========== 鱼虾蟹游戏（全自动+5秒动画+完美续押）==========
    let fishDestroy = null;
    function initFishGame(container) {
        if(fishDestroy) fishDestroy();
        container.innerHTML = `
            <div class="game-card">
                <div style="display:flex; gap:8px; margin-bottom:10px;">
                    <div style="flex:1; background:rgba(0,0,0,0.5); border-radius:20px; padding:6px; text-align:center;"><div style="font-size:0.7rem;">💰 我的余额</div><div id="fishMyBalance">0</div></div>
                    <div style="flex:1; background:rgba(0,0,0,0.5); border-radius:20px; padding:6px; text-align:center;"><div style="font-size:0.7rem;">🎲 总押注</div><div id="fishTotalBet">0</div></div>
                    <div style="flex:1; background:rgba(0,0,0,0.5); border-radius:20px; padding:6px; text-align:center;"><div style="font-size:0.7rem;">🏆 上局净利</div><div id="fishLastWin">0</div></div>
                </div>
                <div class="countdown-area" id="fishPhaseHint">🎲 下注阶段 · 25秒</div>
                <div id="fishChips"><span class="chip" data-chip="10">10</span><span class="chip" data-chip="50">50</span><span class="chip selected" data-chip="100">100</span><span class="chip" data-chip="500">500</span><span class="chip" data-chip="1000">1000</span></div>
                <div style="display:flex; gap:6px; margin:8px 0;">
                    <button id="fishClearBtn" class="exec-btn">清空</button>
                    <button id="fishRepeatBtn" class="exec-btn">🔄 续押</button>
                    <button id="fishGrabBtn" class="exec-btn" style="background:#ff884d;">抢庄</button>
                </div>
                <div class="fish-dice-3d-area">
                    <div class="fish-dice-cube" id="fishDice0"></div>
                    <div class="fish-dice-cube" id="fishDice1"></div>
                    <div class="fish-dice-cube" id="fishDice2"></div>
                </div>
                <div><strong>🎲 单选押注</strong></div>
                <div id="fishPatternGrid" class="fish-pattern-grid"></div>

            if(!hasNiu) return {type:'无牛', multiplier:0, display:'无牛'};

        const savedTheme = localStorage.getItem('neon_theme');
        if(savedTheme === 'light'){ document.body.classList.add('light-mode'); themeBtn.innerHTML='☀️ 日间'; } else themeBtn.innerHTML='🌙 夜间';
        themeBtn.onclick = () => { document.body.classList.toggle('light-mode'); let isLight=document.body.classList.contains('light-mode'); localStorage.setItem('neon_theme',isLight?'light':'dark'); themeBtn.innerHTML=isLight?'☀️ 日间':'🌙 夜间'; };
        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const inits = { fish: initFishGame, dice: initDiceGame, dragonTiger: initDragonTigerGame, game4: initGame4 };
        async function switchGame(id){ if(currentDestroy) currentDestroy(); gamePanel.innerHTML = ''; currentDestroy = await inits[id](gamePanel); }
        document.querySelectorAll('.game-tab').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.game-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
        switchGame('fish');
        let adminClickCount=0;
        document.getElementById('userBalanceDisplay').addEventListener('click',()=>{ adminClickCount++; setTimeout(()=>{ adminClickCount=0; },1000); if(adminClickCount>=3){ adminClickCount=0; openAdminModal(); } });
    }

    function renderAuthUI() {
        const savedAcc = localStorage.getItem('neon_saved_account') || '';
        const savedPwd = localStorage.getItem('neon_saved_password') || '';
        const remChecked = localStorage.getItem('neon_remember_me') === 'true';
        document.getElementById('app').innerHTML = `<div class="auth-panel"><h2>🏆 金辉娱乐城</h2><div><input type="text" id="loginAccount" class="auth-input" placeholder="${t('phoneOrEmail')}" value="${savedAcc}"><input type="password" id="loginPassword" class="auth-input" placeholder="${t('password')}" value="${savedPwd}"><div class="flex-row"><input type="checkbox" id="rememberCheckbox" ${remChecked ? 'checked' : ''}> <label>${t('remember')}</label></div><button id="loginBtn" class="auth-btn">${t('login')}</button></div><hr><h3>${t('registerNow')}</h3><input type="text" id="regAccount" class="auth-input" placeholder="${t('phoneOrEmail')}"><div class="flex-row"><input type="text" id="regCode" class="auth-input" placeholder="${t('verifyCode')}"><button id="getCodeBtn" class="code-btn">${t('getCode')}</button></div><input type="password" id="regPassword" class="auth-input" placeholder="${t('password')}"><input type="text" id="regReferral" class="auth-input" placeholder="${t('referralCode')}"><button id="registerBtn" class="auth-btn">${t('register')}</button><div class="auth-note">${t('referralNote')}</div></div>`;
        document.getElementById('loginBtn').onclick = () => { let acc = document.getElementById('loginAccount').value.trim(); let pwd = document.getElementById('loginPassword').value; let rem = document.getElementById('rememberCheckbox').checked; if (!acc || !pwd) { showToast("请填写账号和密码"); return; } let user = usersData[acc]; if (!user || user.password !== pwd) { showToast("账号或密码错误"); return; } if (rem) { localStorage.setItem('neon_saved_account', acc); localStorage.setItem('neon_saved_password', pwd); localStorage.setItem('neon_remember_me', 'true'); } else { localStorage.removeItem('neon_saved_account'); localStorage.removeItem('neon_saved_password'); localStorage.setItem('neon_remember_me', 'false'); } currentUser = { account: acc, ...user }; showToast(`欢迎 ${acc}`); renderGameLobby(); };
        document.getElementById('getCodeBtn').onclick = () => { let acc = document.getElementById('regAccount').value.trim(); if (!acc) { showToast("请填写手机号或邮箱"); return; } if (usersData[acc]) { showToast("账号已注册，请直接登录"); return; } let code = Math.floor(100000 + Math.random() * 900000); verificationCodes[acc] = { code: code.toString(), expire: Date.now() + 5 * 60 * 1000 }; alert(`【验证码】您的验证码是：${code}，5分钟内有效。`); showToast("验证码已发送"); };
        document.getElementById('registerBtn').onclick = () => { let acc = document.getElementById('regAccount').value.trim(); let code = document.getElementById('regCode').value.trim(); let pwd = document.getElementById('regPassword').value; let ref = document.getElementById('regReferral').value.trim().toUpperCase(); if (!acc || !code || !pwd || !ref) { showToast("请填写完整信息"); return; } if (!validReferralCodes.includes(ref)) { showToast("推荐码无效"); return; } if (usersData[acc]) { showToast("账号已存在"); return; } let v = verificationCodes[acc]; if (!v || v.code !== code || Date.now() > v.expire) { showToast("验证码错误或已过期"); return; } if (pwd.length < 4) { showToast("密码至少4位"); return; } usersData[acc] = { password: pwd, balance: 0, referralCode: ref, registerTime: new Date().toLocaleString(), records: [], resultHistory: [] }; saveUsers(); delete verificationCodes[acc]; showToast("注册成功！请登录"); };
    }

    let savedUser = localStorage.getItem('curr_acc');
    if (savedUser && usersData[savedUser]) { currentUser = { account: savedUser, ...usersData[savedUser] }; renderGameLobby(); }
    else renderAuthUI();
</script>
</body>
</html>
