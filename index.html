<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA 旗舰量化终端</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* 🔒 登录框：重型装甲感 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        
        .login-box { 
            background: #1c221e; 
            padding: 50px 30px; 
            border-radius: 25px; 
            /* 🌲 2.8mm 翡翠亮绿包边 (约 11px) */
            border: 11px solid #00ff88; 
            /* 强化外发光和内阴影，增加立体感 */
            box-shadow: 0 0 40px rgba(0,255,136,0.5), inset 0 0 20px rgba(0,255,136,0.3); 
            text-align: center; 
            width: 85%; 
            max-width: 360px; 
            box-sizing: border-box; 
        }
        
        .login-box h2 { color: #fff; font-size: 28px; font-weight: bold; margin-bottom: 30px; letter-spacing: 3px; text-shadow: 0 0 10px rgba(255,255,255,0.4); }
        
        /* 🏮 输入框：高亮白底红框 */
        #user-id-input { 
            width: 100%; 
            padding: 18px; 
            border: 3px solid #ff3333; 
            border-radius: 12px; 
            background: #ffffff; 
            color: #000; 
            outline: none; 
            margin-bottom: 30px; 
            text-align: center; 
            font-size: 26px; 
            font-weight: bold;
            box-sizing: border-box; 
            box-shadow: 0 0 20px rgba(255,51,51,0.5); 
        }
        
        /* 🔴 红色按键：极致内陷感 */
        .btn-login { 
            width: 100%; 
            padding: 20px; 
            border: none;
            border-radius: 12px; 
            background: #ff0000; 
            color: #fff; 
            font-weight: bold; 
            font-size: 22px; 
            cursor: pointer; 
            /* 强化内陷阴影：顶部深色，底部亮色 */
            box-shadow: inset 8px 8px 16px #800000, inset -8px -8px 16px #ff4d4d; 
            transition: 0.1s; 
        }
        
        .btn-login:active { 
            box-shadow: inset 12px 12px 25px #500000, inset -12px -12px 20px #ff2222; 
            transform: scale(0.96); 
        }

        .hint { color: #00ff88; font-size: 14px; margin-top: 20px; font-weight: bold; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>终端激活</h2>
            <input type="text" id="user-id-input" readonly>
            <button class="btn-login" onclick="handleLogin()">确认进入</button>
            <p class="hint">● 系统已自动分配激活序列号</p>
        </div>
    </div>

    <script>
        window.onload = function() {
            // 自动生成 6 位 ID
            const randomId = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('user-id-input').value = randomId;
        }

        function handleLogin() {
            const val = document.getElementById('user-id-input').value;
            // 携带 ID 跳转到游戏界面
            window.location.href = window.location.origin + window.location.pathname + "?user_id=" + val;
        }
    </script>
</body>
</html>
