<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>霓虹三游戏 · 至尊骰宝 + 葫芦鱼 + 龙虎斗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 16px;
            min-height: 100vh;
            color: #eef2ff;
        }
        /* 主容器 - 玻璃卡片 */
        #app {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        /* 登录/注册面板 */
        .auth-panel {
            padding: 32px 24px;
            background: rgba(10, 14, 23, 0.6);
        }
        .auth-panel h2, .auth-panel h3 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f0f9ff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-input {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        .auth-input:focus {
            border-color: #c084fc;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.2);
        }
        .auth-input::placeholder {
            color: #94a3b8;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 12px 0;
        }
        .code-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .code-btn:active { transform: scale(0.96); }
        .auth-btn {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            font-size: 1rem;
            transition: 0.2s;
        }
        .auth-btn:active { transform: scale(0.98); }
        hr {
            margin: 24px 0;
            border-color: rgba(255, 255, 255, 0.1);
        }
        .auth-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 16px;
            color: #94a3b8;
        }
        /* 用户信息栏 */
        .user-section {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        #userBalanceDisplay {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-color: #fbbf24; /* fallback */
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn-sm {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.1s;
        }
        .btn-sm:active { transform: scale(0.95); }
        .charge-btn, .withdraw-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }
        .charge-btn:active, .withdraw-btn:active { transform: scale(0.96); }
        .lang-switch {
            background: #3b82f6;
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            color: white;
            cursor: pointer;
            margin-left: 8px;
        }
        /* 游戏导航 */
        .game-nav {
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            margin: 16px 12px;
            border-radius: 60px;
        }
        .game-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #cbd5e1;
            cursor: pointer;
            transition: 0.2s;
        }
        .game-tab.active {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            color: white;
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3);
        }
        .game-container {
            padding: 12px 16px 24px;
        }
        /* 游戏内通用卡片 */
        .game-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chip {
            background: linear-gradient(145deg, #fbbf24, #f59e0b);
            display: inline-block;
            padding: 8px 16px;
            border-radius: 40px;
            margin: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #1e1e2a;
            transition: 0.05s linear;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .chip.selected {
            background: linear-gradient(145deg, #f97316, #ea580c);
            color: white;
            transform: scale(0.96);
        }
        .quick-bet, .clear-bet {
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 30px;
            padding: 6px 14px;
            margin: 4px;
            cursor: pointer;
            color: #facc15;
            font-weight: 500;
        }
        .exec-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 4px;
        }
        .main-go {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
        }
        .dice-cube {
            width: 70px;
            height: 70px;
            background: #fef3c7;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #b45309;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        .fish-pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
        }
        .fish-bet-card {
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        .bet-card {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            margin: 4px;
        }
        .bet-card:active { transform: scale(0.96); background: #f43f5e; }
        .history-cell {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            font-weight: bold;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 32px;
            padding: 24px;
            max-width: 90%;
            max-height: 80%;
            overflow: auto;
            color: white;
            border: 1px solid #facc15;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #facc15;
            padding: 8px 20px;
            border-radius: 60px;
            z-index: 2000;
            font-weight: bold;
            backdrop-filter: blur(12px);
            white-space: nowrap;
        }
        .result-popup {
            position: fixed;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 1500;
            box-shadow: 0 0 20px rgba(244,63,94,0.5);
        }
        button {
            cursor: pointer;
        }
        /* 点数网格 */
        .points-grid, .trio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 8px;
            margin: 12px 0;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== 双语（默认中文） ====================
    const lang = {
        zh: {
            recharge: "💎 充值", withdraw: "💰 提现", service: "📞 客服", logout: "退出", balance: "余额",
            phoneOrEmail: "手机号 / 邮箱", password: "密码 (≥4位)", referralCode: "推荐码 (必填)", remember: "记住账号",
            login: "登录", register: "注册", referralNote: "推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "获取验证码", verifyCode: "验证码", registerNow: "注册新账户",
            gameFish: "🐟 葫芦鱼", gameDice: "🎲 至尊骰宝", gameDT: "🐉 龙虎斗", game4: "♠️ 游戏4",
            fishRoll: "🎲 开骰", fishClear: "清空", fishGrab: "🎲 抢庄", fishDouble: "🎯 双押",
            diceClear: "清空", diceRepeat: "续押", diceRefresh: "刷新", dtFight: "确认投注", dtCancel: "全部取消", dtRepeat: "续押", dtRefresh: "刷新"
        },
        th: {
            recharge: "💎 เติมเงิน", withdraw: "💰 ถอนเงิน", service: "📞 บริการ", logout: "ออก", balance: "ยอดเงิน",
            phoneOrEmail: "เบอร์โทร / อีเมล", password: "รหัสผ่าน (≥4)", referralCode: "รหัสแนะนำ", remember: "จำฉัน",
            login: "เข้าสู่ระบบ", register: "สมัคร", referralNote: "รหัส: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "รับรหัส", verifyCode: "รหัสยืนยัน", registerNow: "สมัครสมาชิก",
            gameFish: "🐟 ปลาหมึก", gameDice: "🎲 เซียนเต๋า", gameDT: "🐉 มังกรเสือ", game4: "♠️ เกม4",
            fishRoll: "🎲 เปิด", fishClear: "ล้าง", fishGrab: "🎲 รับเจ้ามือ", fishDouble: "🎯 เดิมพันคู่",
            diceClear: "ล้าง", diceRepeat: "เล่นซ้ำ", diceRefresh: "รีเฟรช", dtFight: "ยืนยัน", dtCancel: "ยกเลิก", dtRepeat: "เล่นซ้ำ", dtRefresh: "รีเฟรช"
        }
    };
    let currentLang = 'zh';
    function t(key) { return lang[currentLang][key] || lang.zh[key] || key; }

    // ==================== 全局数据 ====================
    let systemBankerBalance = 50000;
    let adjustFactor = 1.0;
    let validReferralCodes = ["VIP666", "888VIP", "GOLD2025", "LUCKY8", "DICE100"];
    let usersData = JSON.parse(localStorage.getItem('neon_users')) || {};
    let currentUser = null;
    let verificationCodes = {};

    function saveUsers() { localStorage.setItem('neon_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.account]?.balance || 0) : 0; }
    function setUserBalance(amount) {
        if (!currentUser) return;
        usersData[currentUser.account].balance = Math.max(0, amount);
        saveUsers();
        let span = document.getElementById("userBalanceDisplay");
        if (span) span.innerText = getUserBalance().toFixed(2);
    }
    function showToast(msg) {
        let t = document.createElement('div'); t.className = 'toast-message'; t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    function recharge() {
        let yuan = prompt(t('recharge') + " (1元 = 1余额)", "10");
        if (!yuan) return;
        let num = parseFloat(yuan);
        if (isNaN(num) || num <= 0) { showToast("请输入正数"); return; }
        setUserBalance(getUserBalance() + num);
        showToast(`${t('recharge')} +${num.toFixed(2)} 元`);
    }
    function withdraw() {
        let bal = getUserBalance();
        if (bal <= 0) { showToast("余额不足"); return; }
        let amount = parseFloat(prompt("提现金额 (元)", "10"));
        if (isNaN(amount) || amount <= 0 || amount > bal) { showToast("金额无效"); return; }
        let type = confirm("提现方式：确定=微信，取消=支付宝") ? "微信" : "支付宝";
        let account = prompt("请输入收款账号:");
        if (!account) return;
        setUserBalance(bal - amount);
        showToast(`提现申请已提交！${amount}元将处理到${type}账号 ${account}`);
    }
    function showServiceModal() { alert("客服微信: game_kf_888"); }

    // 管理员后台（简单实用）
    let adminPassword = "admin888";
    function openAdminModal() {
        let pwd = prompt("管理员密码:");
        if (pwd !== adminPassword) { showToast("密码错误"); return; }
        let userList = Object.keys(usersData).map(acc => `${acc}: ${usersData[acc].balance}元`).join('\n');
        alert("用户列表：\n" + userList);
        let target = prompt("输入要操作的账号:");
        if (!target || !usersData[target]) { showToast("账号不存在"); return; }
        let action = prompt("操作: 1-上分 2-下分 3-重置0");
        let amt = parseFloat(prompt("金额:"));
        if (action === '1') { usersData[target].balance += amt; saveUsers(); showToast(`+${amt}`); }
        else if (action === '2') { if (usersData[target].balance >= amt) { usersData[target].balance -= amt; saveUsers(); showToast(`-${amt}`); } else showToast("余额不足"); }
        else if (action === '3') { usersData[target].balance = 0; saveUsers(); showToast("已重置为0"); }
        if (currentUser && currentUser.account === target) setUserBalance(usersData[target].balance);
    }

    // 添加游戏记录
    function addGameRecord(account, gameName, betInfo, result, winAmount, betAmount) {
        if (!usersData[account]) return;
        let rec = usersData[account].records || [];
        rec.unshift({ time: new Date().toLocaleString(), game: gameName, bet: betInfo, result, win: winAmount, amount: betAmount });
        if (rec.length > 100) rec.pop();
        usersData[account].records = rec;
        saveUsers();
    }

    // ==================== 葫芦鱼（完整功能） ====================
    let fishDestroy = null;
    function initFishGame(container) {
        if (fishDestroy) fishDestroy();
        container.innerHTML = `
            <div class="game-card">
                <div style="display:flex; gap:12px; margin-bottom:16px;">
                    <div style="flex:1; background:rgba(0,0,0,0.4); border-radius:24px; padding:8px; text-align:center;"><div>🏦 庄家余额</div><div id="fishBankerDisplay">∞</div></div>
                    <div style="flex:1; background:rgba(0,0,0,0.4); border-radius:24px; padding:8px; text-align:center;"><div>🎲 总押注</div><div id="fishTotalBet">0</div></div>
                    <div style="flex:1; background:rgba(0,0,0,0.4); border-radius:24px; padding:8px; text-align:center;"><div>🏆 上局净利</div><div id="fishLastWin">0</div></div>
                </div>
                <div id="fishChips" style="margin:8px 0;">
                    <span class="chip" data-chip="2">2</span><span class="chip" data-chip="5">5</span><span class="chip selected" data-chip="10">10</span><span class="chip" data-chip="50">50</span><span class="chip" data-chip="100">100</span>
                </div>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <button id="fishRollBtn" class="exec-btn">${t('fishRoll')}</button>
                    <button id="fishClearBtn" class="exec-btn" style="background:#e11d48;">${t('fishClear')}</button>
                    <button id="fishGrabBtn" class="exec-btn" style="background:#f59e0b;">${t('fishGrab')}</button>
                    <button id="fishDoubleBtn" class="exec-btn" style="background:#f97316;">${t('fishDouble')}</button>
                </div>
                <div class="dice-3d-area" style="display:flex; gap:16px; justify-content:center; margin:16px 0;">
                    <div class="dice-cube" id="fishDice0">🎲</div>
                    <div class="dice-cube" id="fishDice1">🎲</div>
                    <div class="dice-cube" id="fishDice2">🎲</div>
                </div>
                <div id="fishPatternGrid" class="fish-pattern-grid"></div>
                <button id="fishRecordBtn" class="exec-btn" style="width:100%; margin-top:8px;">📜 记录</button>
                <div id="fishPhaseHint" style="text-align:center; margin-top:12px; background:rgba(0,0,0,0.4); border-radius:30px; padding:8px;">🎲 下注阶段 · 25秒</div>
            </div>
        `;
        const patternNames = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        let patternBets = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
        let specialDouble = 0;
        let currentChip = 10;
        let hasGrabbed = false;
        let playerBankerBalance = 0;
        let gameRecords = [];
        let isRolling = false, roundActive = true, countdownTimer = null;
        let lastWinAmount = 0;

        function updateFishUI() {
            for (let p in patternBets) { let span = document.getElementById(`fishBet_${p}`); if(span) span.innerText = patternBets[p]; }
            document.getElementById('fishTotalBet').innerText = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            document.getElementById('fishLastWin').innerText = lastWinAmount;
            let bankerSpan = document.getElementById('fishBankerDisplay');
            if (bankerSpan) bankerSpan.innerText = hasGrabbed ? playerBankerBalance.toFixed(2) : "∞";
        }
        function addFishBet(pattern, val) {
            if (hasGrabbed) { showToast("庄家不能下注"); return; }
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (val > 500) { showToast("单注上限500"); return; }
            if (total+val > 2000) { showToast("总注上限2000"); return; }
            if (val > getUserBalance()) { showToast("余额不足"); return; }
            setUserBalance(getUserBalance() - val);
            patternBets[pattern] += val;
            updateFishUI();
        }
        function subFishBet(pattern, val) {
            let cur = patternBets[pattern];
            if (cur < val) val = cur;
            if (val===0) return;
            patternBets[pattern] -= val;
            setUserBalance(getUserBalance() + val);
            updateFishUI();
        }
        function addDoubleBet() {
            if (hasGrabbed) { showToast("庄家不能下注"); return; }
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (currentChip > 500) { showToast("双押上限500"); return; }
            if (total+currentChip > 2000) { showToast("总注上限2000"); return; }
            if (currentChip > getUserBalance()) { showToast("余额不足"); return; }
            setUserBalance(getUserBalance() - currentChip);
            specialDouble += currentChip;
            updateFishUI();
        }
        function clearFishBets() {
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (total>0) setUserBalance(getUserBalance() + total);
            patternBets = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
            specialDouble = 0;
            updateFishUI();
        }
        async function rollFishDice(finalPatterns) {
            const diceDivs = [document.getElementById('fishDice0'), document.getElementById('fishDice1'), document.getElementById('fishDice2')];
            for (let i=0;i<3;i++) diceDivs[i].innerText = "🎲";
            await new Promise(r=>setTimeout(r, 300));
            for (let i=0;i<3;i++) diceDivs[i].innerText = finalPatterns[i];
        }
        async function settleFish() {
            if (isRolling) return;
            let totalBet = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (totalBet === 0) { showToast("请先下注"); return; }
            isRolling = true;
            let r1 = patternNames[Math.floor(Math.random()*6)];
            let r2 = patternNames[Math.floor(Math.random()*6)];
            let r3 = patternNames[Math.floor(Math.random()*6)];
            await rollFishDice([r1,r2,r3]);
            let winAmount = 0;
            let occurs = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
            [r1,r2,r3].forEach(p=>occurs[p]++);
            for (let p in patternBets) {
                let cnt = occurs[p];
                if (cnt>0 && patternBets[p]>0) winAmount += patternBets[p] * (cnt+1);
            }
            if (specialDouble>0 && occurs["鱼"]>0 && occurs["虾"]>0) winAmount += specialDouble * 4.5;
            winAmount = winAmount * adjustFactor;
            if (totalBet>0) {
                setUserBalance(getUserBalance() + winAmount);
                if (hasGrabbed) {
                    let net = (totalBet - winAmount) * adjustFactor;
                    playerBankerBalance += net;

        function repeatLastBetDT() { if (lastBet && !state.betRolling) placeBetDT(lastBet.type, lastBet.amount); }
        function startCountdownDT(sec) {
            if (state.countdownInterval) clearInterval(state.countdownInterval);
            state.countdown = sec;
            document.getElementById('countdownNumDT').innerText = state.countdown;
            state.countdownInterval = setInterval(() => {
                if (state.countdown <= 1) {
                    clearInterval(state.countdownInterval);
                    state.countdownInterval = null;
                    let total = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
                    if (total > 0) executeBetDT();
                    else startCountdownDT(getCountdownSec());
                } else {
                    state.countdown--;
                    document.getElementById('countdownNumDT').innerText = state.countdown;
                }
            }, 1000);
        }
        function clearCountdownDT() { if (state.countdownInterval) { clearInterval(state.countdownInterval); state.countdownInterval = null; } }
        function setSpeedDT(speed) { state.speed = speed; clearCountdownDT(); startCountdownDT(getCountdownSec()); document.querySelectorAll('.speed-btn').forEach(btn => { if (parseInt(btn.dataset.speed)===speed) btn.classList.add('active'); else btn.classList.remove('active'); }); }
        function updateHistoryDisplayDT() {
            let hist = usersData[currentUser.account]?.resultHistory || [];
            let grid = document.getElementById('historyGridDT');
            if (!grid) return;
            grid.innerHTML = '';
            for (let i=0; i<10; i++) {
                let cell = document.createElement('div'); cell.className = 'history-cell';
                if (i < hist.length) { let r = hist[i]; cell.style.background = r==='龙'?'#f43f5e':(r==='虎'?'#3b82f6':'#facc15'); cell.textContent = r==='龙'?'🐉':(r==='虎'?'🐯':'⚖️'); }
                else { cell.style.background = 'rgba(255,255,255,0.2)'; cell.textContent = '?'; }
                grid.appendChild(cell);
            }
        }
        function updateRecordDisplayDT() {
            let recs = usersData[currentUser.account]?.records || [];
            let listDiv = document.getElementById('recordListDT');
            if (!listDiv) return;
            listDiv.innerHTML = '';
            recs.slice(0,10).forEach(r => {
                let div = document.createElement('div'); div.style.padding = '8px'; div.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
                let isWin = r.win > 0;
                div.innerHTML = `<span>${r.time}</span> 押${r.bet}→${r.result} <span style="color:${isWin?'#facc15':'#f43f5e'}">${isWin?`+${r.win}`:`-${r.amount}`}</span>`;
                listDiv.appendChild(div);
            });
        }
        function showMyHistoryDT() {
            let recs = usersData[currentUser.account]?.records || [];
            let html = '<div>' + recs.map(r => `<div>${r.time} 押${r.bet}→${r.result} ${r.win>0?'赢'+r.win:'输'+r.amount}</div>`).join('') + '</div><button id="closeHist" class="auth-btn">关闭</button>';
            let m = document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeHist').onclick=()=>m.remove();
        }
        function newUserDT() {
            let newId = prompt("新账号（手机号/邮箱）:");
            if (!newId) return;
            if (usersData[newId]) { showToast("账号已存在"); return; }
            usersData[newId] = { balance: 0, password: "123456", records: [], resultHistory: [], registerTime: new Date().toLocaleString() };
            saveUsers();
            showToast(`新账号 ${newId} 创建成功，密码123456`);
            document.getElementById('switchUserIdInputDT').value = newId;
            switchUserDT();
        }
        function switchUserDT() {
            let newId = document.getElementById('switchUserIdInputDT').value.trim();
            if (!newId) return;
            if (!usersData[newId]) { showToast("账号不存在"); return; }
            currentUser = { account: newId, ...usersData[newId] };
            document.getElementById('currentUserId').innerText = newId;
            document.getElementById("userBalanceDisplay").innerText = getUserBalance().toFixed(2);
            updateUIDT(); updateHistoryDisplayDT(); updateRecordDisplayDT();
            clearCountdownDT(); startCountdownDT(getCountdownSec());
            showToast(`已切换到 ${newId}`);
        }
        function refreshBalanceDT() { updateUIDT(); showToast("刷新"); }
        document.querySelectorAll('.quick-bet').forEach(btn => { btn.onclick = () => { let type = btn.dataset.type, amt = parseInt(btn.dataset.amount); if (type && amt) addBetAmount(type, amt); }; });
        document.querySelectorAll('.clear-bet').forEach(btn => { btn.onclick = () => clearBet(btn.dataset.type); });
        document.getElementById('fightBtnDT').onclick = executeBetDT;
        document.getElementById('cancelBtnDT').onclick = cancelAllBetsDT;
        document.getElementById('repeatBtnDT').onclick = repeatLastBetDT;
        document.getElementById('refreshBtnDT').onclick = refreshBalanceDT;
        document.getElementById('myHistoryBtnDT').onclick = showMyHistoryDT;
        document.getElementById('newUserBtnDT').onclick = newUserDT;
        document.getElementById('switchUserBtnDT').onclick = switchUserDT;
        document.querySelectorAll('.speed-btn').forEach(btn => { btn.onclick = () => setSpeedDT(parseInt(btn.dataset.speed)); });
        updateUIDT(); updateHistoryDisplayDT(); updateRecordDisplayDT(); startCountdownDT(30);
        dragonTigerDestroy = () => { if (state.countdownInterval) clearInterval(state.countdownInterval); container.innerHTML=''; };
        return dragonTigerDestroy;
    }

    function initGame4(container) { container.innerHTML = `<div class="game-card" style="text-align:center; padding:40px;">♠️ 游戏4 · 百人牛牛筹备中</div>`; return ()=>{}; }

    // ==================== 认证界面 ====================
    function renderAuthUI() {
        const savedAcc = localStorage.getItem('saved_account') || '';
        const savedPwd = localStorage.getItem('saved_password') || '';
        const remChecked = localStorage.getItem('remember_me') === 'true';
        document.getElementById('app').innerHTML = `
            <div class="auth-panel">
                <h2>🎲 霓虹三游戏</h2>
                <div>
                    <input type="text" id="loginAccount" class="auth-input" placeholder="${t('phoneOrEmail')}" value="${savedAcc}">
                    <input type="password" id="loginPassword" class="auth-input" placeholder="${t('password')}" value="${savedPwd}">
                    <div class="flex-row"><input type="checkbox" id="rememberCheckbox" ${remChecked ? 'checked' : ''}> <label>${t('remember')}</label></div>
                    <button id="loginBtn" class="auth-btn">${t('login')}</button>
                </div>
                <hr>
                <h3>${t('registerNow')}</h3>
                <input type="text" id="regAccount" class="auth-input" placeholder="${t('phoneOrEmail')}">
                <div class="flex-row">
                    <input type="text" id="regCode" class="auth-input" placeholder="${t('verifyCode')}">
                    <button id="getCodeBtn" class="code-btn">${t('getCode')}</button>
                </div>
                <input type="password" id="regPassword" class="auth-input" placeholder="${t('password')}">
                <input type="text" id="regReferral" class="auth-input" placeholder="${t('referralCode')}">
                <button id="registerBtn" class="auth-btn">${t('register')}</button>
                <div class="auth-note">${t('referralNote')}</div>
            </div>
        `;
        document.getElementById('loginBtn').onclick = () => {
            let acc = document.getElementById('loginAccount').value.trim();
            let pwd = document.getElementById('loginPassword').value;
            let rem = document.getElementById('rememberCheckbox').checked;
            if (!acc || !pwd) { showToast("请填写账号和密码"); return; }
            let user = usersData[acc];
            if (!user || user.password !== pwd) { showToast("账号或密码错误"); return; }
            if (rem) { localStorage.setItem('saved_account', acc); localStorage.setItem('saved_password', pwd); localStorage.setItem('remember_me', 'true'); }
            else { localStorage.removeItem('saved_account'); localStorage.removeItem('saved_password'); localStorage.setItem('remember_me', 'false'); }
            currentUser = { account: acc, ...user };
            showToast(`欢迎 ${acc}`);
            renderGameLobby();
        };
        document.getElementById('getCodeBtn').onclick = () => {
            let acc = document.getElementById('regAccount').value.trim();
            if (!acc) { showToast("请填写手机号或邮箱"); return; }
            if (usersData[acc]) { showToast("账号已注册，请直接登录"); return; }
            let code = Math.floor(100000 + Math.random() * 900000);
            verificationCodes[acc] = { code: code.toString(), expire: Date.now() + 5*60*1000 };
            alert(`【验证码】您的验证码是：${code}，5分钟内有效。`);
            showToast("验证码已发送");
        };
        document.getElementById('registerBtn').onclick = () => {
            let acc = document.getElementById('regAccount').value.trim();
            let code = document.getElementById('regCode').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let ref = document.getElementById('regReferral').value.trim().toUpperCase();
            if (!acc || !code || !pwd || !ref) { showToast("请填写完整信息"); return; }
            if (!validReferralCodes.includes(ref)) { showToast("推荐码无效"); return; }
            if (usersData[acc]) { showToast("账号已存在"); return; }
            let v = verificationCodes[acc];
            if (!v || v.code !== code || Date.now() > v.expire) { showToast("验证码错误或已过期"); return; }
            if (pwd.length < 4) { showToast("密码至少4位"); return; }
            usersData[acc] = { password: pwd, balance: 0, referralCode: ref, registerTime: new Date().toLocaleString(), records: [], resultHistory: [] };
            saveUsers();
            delete verificationCodes[acc];
            showToast("注册成功！请登录");
            document.getElementById('regAccount').value = '';
            document.getElementById('regCode').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regReferral').value = '';
        };
    }

    function renderGameLobby() {
        document.getElementById('app').innerHTML = `
            <div class="user-section">
                <div class="user-info-row">
                    <span>📱 ${currentUser.account} | 💰 ${t('balance')}: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span>
                    <div class="btn-group">
                        <button id="serviceBtn" class="btn-sm">${t('service')}</button>
                        <button id="logoutBtn" class="btn-sm">${t('logout')}</button>
                        <button id="langSwitchBtn" class="lang-switch">ภาษาไทย</button>
                    </div>
                </div>
                <div class="charge-withdraw-row" style="margin-top:12px;">
                    <button id="rechargeBtn" class="charge-btn">${t('recharge')}</button>
                    <button id="withdrawBtn" class="withdraw-btn">${t('withdraw')}</button>
                </div>
            </div>
            <div class="game-nav">
                <button class="game-tab active" data-game="fish">${t('gameFish')}</button>
                <button class="game-tab" data-game="dice">${t('gameDice')}</button>
                <button class="game-tab" data-game="dragonTiger">${t('gameDT')}</button>
                <button class="game-tab" data-game="game4">${t('game4')}</button>
            </div>
            <div class="game-container" id="gamePanel"></div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;
        document.getElementById('langSwitchBtn').onclick = () => {
            currentLang = currentLang === 'zh' ? 'th' : 'zh';
            document.getElementById('langSwitchBtn').innerText = currentLang === 'zh' ? 'ภาษาไทย' : '中文';
            renderGameLobby();
        };
        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const inits = { fish: initFishGame, dice: initDiceGame, dragonTiger: initDragonTigerGame, game4: initGame4 };
        async function switchGame(id) { if (currentDestroy) currentDestroy(); gamePanel.innerHTML = ''; currentDestroy = await inits[id](gamePanel); }
        document.querySelectorAll('.game-tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchGame(btn.dataset.game);
            };
        });
        switchGame('fish');
        // 管理员触发（点击余额区域3次）
        let adminClickCount = 0;
        document.getElementById('userBalanceDisplay').addEventListener('click', () => {
            adminClickCount++;
            setTimeout(() => { adminClickCount = 0; }, 1000);
            if (adminClickCount >= 3) { adminClickCount = 0; openAdminModal(); }
        });
    }

    renderAuthUI();
</script>
</body>
</html>
