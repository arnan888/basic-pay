<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>五兽至尊_SOUND_ULTRA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --pink: #ff0055; --bg: #05080a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }

        /* 音频开关：增加呼吸灯效果 */
        .audio-toggle { position: absolute; top: 15px; right: 15px; z-index: 200; width: 45px; height: 45px; background: rgba(0,0,0,0.7); border: 2px solid var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 15px var(--neon); animation: breathe 2s infinite; }
        @keyframes breathe { 0% { opacity: 0.6; } 50% { opacity: 1; box-shadow: 0 0 25px var(--neon); } 100% { opacity: 0.6; } }

        .header { width: 100%; height: 22%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .bal-card { width: 85%; background: rgba(255,255,255,0.03); border: 1.5px solid rgba(0,242,255,0.4); border-radius: 20px; padding: 12px; text-align: center; }
        .bal-val { font-size: 38px; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--neon); }

        .main-game { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .wheel-box { position: relative; width: 82vw; max-width: 340px; aspect-ratio: 1 / 1; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 10px solid #1a1a1a; background: #111; position: relative; overflow: hidden; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); box-shadow: 0 0 50px #000; }
        
        .sector { position: absolute; width: 100%; height: 100%; clip-path: polygon(50% 50%, 100% 20%, 100% 80%); transform-origin: center; display: flex; align-items: center; justify-content: flex-end; padding-right: 12%; }
        .item { transform: rotate(90deg); display: flex; flex-direction: column; align-items: center; }
        .item b { font-size: 32px; }
        .item span { font-size: 10px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--neon); }

        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 40px solid var(--neon); z-index: 100; }
        .spin-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: #000; border: 4px solid var(--pink); border-radius: 50%; z-index: 110; color: var(--pink); font-size: 20px; font-weight: 900; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px var(--pink); }

        .footer { width: 100%; height: 20%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .bet-box { display: flex; align-items: center; gap: 20px; background: rgba(255,255,255,0.05); padding: 8px 20px; border-radius: 30px; border: 1px solid #333; }
        .btn-adj { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #555; background: #222; color: #fff; font-size: 22px; }
        #msg { color: var(--gold); font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <!-- 点击这个呼吸灯按钮即可立刻激活所有声音 -->
    <div class="audio-toggle" onclick="initAudio()" id="muteBtn">🔊</div>

    <div class="header">
        <div class="bal-card">
            <div style="font-size:11px; color:var(--neon); letter-spacing:1px;">VIP BALANCE</div>
            <div class="bal-val">🪙 <span id="bal">1,000</span></div>
        </div>
    </div>

    <div class="main-game">
        <div class="wheel-box">
            <div class="pointer"></div>
            <div class="wheel" id="wheel">
                <!-- 扇区内容保持不变 -->
                <div class="sector" style="transform:rotate(-90deg); background:rgba(255,215,0,0.1)"><div class="item"><b>👑</b><span>至尊 MAX</span></div></div>
                <div class="sector" style="transform:rotate(-30deg); background:rgba(255,0,0,0.05)"><div class="item"><b>🦁</b><span>威武 LION</span></div></div>
                <div class="sector" style="transform:rotate(30deg); background:rgba(255,165,0,0.1)"><div class="item"><b>🐯</b><span>霸气 TIGER</span></div></div>
                <div class="sector" style="transform:rotate(90deg); background:rgba(0,255,0,0.05)"><div class="item"><b>🦅</b><span>睿智 EAGLE</span></div></div>
                <div class="sector" style="transform:rotate(150deg); background:rgba(147,112,219,0.1)"><div class="item"><b>🐺</b><span>孤狼 WOLF</span></div></div>
                <div class="sector" style="transform:rotate(210deg); background:rgba(240,230,140,0.05)"><div class="item"><b>🐕</b><span>忠诚 DOG</span></div></div>
            </div>
            <div class="spin-btn" onclick="spin()">SPIN</div>
        </div>
    </div>

    <div class="footer">
        <div class="bet-box">
            <button class="btn-adj" onclick="setB(-10)">-</button>
            <div style="font-size:24px; font-weight:bold; width:80px; text-align:center;"><span id="bet" style="color:var(--gold)">1</span></div>
            <button class="btn-adj" onclick="setB(10)">+</button>
        </div>
        <div id="msg">点击按钮激活音效</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let b = parseFloat(localStorage.getItem('g_final') || '1000');
        let bet = 1, r = 0, isS = false, audioInited = false;
        
        // 使用更稳定的外部源链接
        const bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
        const spinSound = new Audio('https://s3.amazonaws.com/freecodecamp/simonSound1.mp3');
        const winSound = new Audio('https://s3.amazonaws.com/freecodecamp/simonSound4.mp3');
        
        bgMusic.loop = true; bgMusic.volume = 0.2;

        // 核心：必须通过这个函数点击一次才能激活声音
        function initAudio() {
            if(!audioInited) {
                bgMusic.play().catch(e => console.log("等待交互"));
                audioInited = true;
                document.getElementById('msg').innerText = "音效已激活 🔊";
                document.getElementById('muteBtn').style.animation = "none";
            } else {
                if(bgMusic.paused) { bgMusic.play(); document.getElementById('muteBtn').innerText = "🔊"; }
                else { bgMusic.pause(); document.getElementById('muteBtn').innerText = "🔇"; }
            }
            tg.HapticFeedback.selectionChanged();
        }

        function sync() {
            document.getElementById('bal').innerText = Math.floor(b).toLocaleString();
            document.getElementById('bet').innerText = bet;
            localStorage.setItem('g_final', b);
        }

        window.setB = (v) => { 
            if(!isS) { 
                bet = Math.max(1, Math.min(b, bet+v)); sync(); 
                tg.HapticFeedback.selectionChanged();
                if(!audioInited) initAudio(); // 点击下注时也尝试激活
            } 
        };

        function spin() {
            if(isS || b < bet) return;
            if(!audioInited) initAudio(); // 启动时也尝试激活
            
            isS = true; b -= bet; sync();
            tg.HapticFeedback.impactOccurred('heavy');
            spinSound.play().catch(()=>{});
            
            let idx = Math.floor(Math.random()*6);
            r += (3600 + idx*60);
            document.getElementById('wheel').style.transform = `rotate(-${r}deg)`;

            setTimeout(() => {
                const multi = [50, 15, 10, 5, 2, 0];
                let win = Math.floor(bet * multi[idx]);
                b += win; sync();
                if(win > 0) {
                    document.getElementById('msg').innerText = "💰 赢取 " + win + " !";
                    winSound.play().catch(()=>{});
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    document.getElementById('msg').innerText = "再试一次！";
                }
                isS = false;
            }, 5000);
        }
        sync();
    </script>
</body>
</html>
