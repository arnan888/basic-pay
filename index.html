<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>金辉娱乐城 · 完整版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%); font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif; padding: 12px; min-height: 100vh; color: #ffecb3; }
        #app { max-width: 560px; margin: 0 auto; background: rgba(18,25,45,0.8); backdrop-filter: blur(12px); border-radius: 48px; border: 1px solid rgba(255,215,0,0.3); overflow: hidden; }
        .auth-panel { padding: 28px 20px; background: rgba(20,12,6,0.8); }
        .auth-panel h2, .auth-panel h3 { text-align: center; margin-bottom: 16px; font-weight: 800; background: linear-gradient(135deg, #ffd966, #ffaa33); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .auth-input { width: 100%; padding: 12px 16px; margin: 6px 0; background: rgba(0,0,0,0.6); border: 1px solid #ffaa33; border-radius: 40px; color: #ffd966; font-size: 0.95rem; outline: none; }
        .flex-row { display: flex; gap: 10px; align-items: center; margin: 10px 0; }
        .code-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; border-radius: 40px; padding: 10px 18px; color: #2a1a0a; font-weight: 700; cursor: pointer; }
        .auth-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; border-radius: 40px; padding: 12px; font-weight: bold; color: #2a1a0a; cursor: pointer; width: 100%; margin-top: 10px; font-size: 0.95rem; }
        hr { margin: 20px 0; border-color: #ffaa33; }
        .auth-note { font-size: 0.65rem; text-align: center; margin-top: 12px; color: #ffaa33; }
        .user-section { background: rgba(20,12,6,0.7); padding: 12px 16px; border-bottom: 1px solid #ffaa33; }
        .user-info-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        #userBalanceDisplay { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #ffd966, #ffaa33); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
        .btn-group { display: flex; gap: 6px; }
        .btn-sm { background: rgba(255,170,51,0.2); border: 1px solid #ffaa33; padding: 4px 12px; border-radius: 40px; color: #ffd966; cursor: pointer; font-size: 0.75rem; }
        .charge-btn, .withdraw-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; padding: 6px 16px; border-radius: 40px; color: #2a1a0a; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .lang-switch, .theme-switch { background: #ffaa33; border: none; border-radius: 30px; padding: 4px 10px; color: #2a1a0a; cursor: pointer; font-size: 0.75rem; font-weight: bold; margin-left: 4px; }
        .game-nav { display: flex; gap: 6px; background: rgba(0,0,0,0.4); padding: 6px 12px; margin: 12px 12px; border-radius: 60px; }
        .game-tab { flex: 1; background: transparent; border: none; padding: 8px 0; border-radius: 40px; font-weight: 700; font-size: 0.8rem; color: #ffaa33; cursor: pointer; }
        .game-tab.active { background: linear-gradient(135deg, #ffaa33, #ff884d); color: #2a1a0a; box-shadow: 0 0 8px #ffaa33; }
        .game-container { padding: 8px 12px 20px; }
        .game-card { background: rgba(20,12,6,0.7); backdrop-filter: blur(8px); border-radius: 32px; padding: 16px; border: 1px solid #ffaa33; }
        .chip { background: linear-gradient(145deg, #cc8800, #aa6600); display: inline-block; padding: 6px 14px; border-radius: 36px; margin: 3px; cursor: pointer; font-weight: bold; color: #ffecb3; border: 1px solid #ffaa33; font-size: 0.85rem; }
        .chip.selected { background: linear-gradient(145deg, #ffaa33, #ff884d); color: #2a1a0a; }
        .quick-bet, .clear-bet { background: rgba(255,170,51,0.2); border: 1px solid #ffaa33; border-radius: 30px; padding: 4px 10px; margin: 3px; cursor: pointer; color: #ffd966; font-weight: 500; font-size: 0.75rem; }
        .exec-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; border-radius: 36px; padding: 8px 14px; color: #2a1a0a; font-weight: bold; cursor: pointer; margin: 3px; font-size: 0.85rem; }
        .main-go { background: linear-gradient(135deg, #ffcc66, #ffaa33); font-weight: 800; }
        .countdown-area { text-align: center; margin: 6px 0 12px 0; background: rgba(0,0,0,0.5); border-radius: 40px; padding: 6px 12px; font-weight: bold; font-size: 0.9rem; color: #ffaa33; }
        .fish-dice-3d-area, .dice-3d-area { display: flex; justify-content: center; gap: 20px; margin: 20px 0; perspective: 1200px; }
        .fish-dice-cube, .dice-cube { width: 70px; height: 70px; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.2,0.9,0.4,1.1); }
        .fish-dice-face, .dice-face { position: absolute; width: 100%; height: 100%; background: #2a1e12; border: 2px solid #ffaa33; border-radius: 16px; display: flex; align-items: center; justify-content: center; backface-visibility: visible; font-size: 2rem; font-weight: bold; color: #ffd966; }
        .fish-front { transform: translateZ(35px); } .fish-back { transform: rotateY(180deg) translateZ(35px); } .fish-right { transform: rotateY(90deg) translateZ(35px); } .fish-left { transform: rotateY(-90deg) translateZ(35px); } .fish-top { transform: rotateX(90deg) translateZ(35px); } .fish-bottom { transform: rotateX(-90deg) translateZ(35px); }
        .front { transform: translateZ(35px); } .back { transform: rotateY(180deg) translateZ(35px); } .right { transform: rotateY(90deg) translateZ(35px); } .left { transform: rotateY(-90deg) translateZ(35px); } .top { transform: rotateX(90deg) translateZ(35px); } .bottom { transform: rotateX(-90deg) translateZ(35px); }
        @media (max-width:480px){ .fish-dice-cube, .dice-cube{width:60px;height:60px;} .fish-front,.fish-back,.fish-right,.fish-left,.fish-top,.fish-bottom,.front,.back,.right,.left,.top,.bottom{transform:translateZ(30px);} .fish-dice-face{font-size:1.5rem;} }
        .pip { width: 10px; height: 10px; background: #ffaa33; border-radius: 50%; margin: 2px; }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 8px; left: 8px; } .pip-tr { position: absolute; top: 8px; right: 8px; }
        .pip-bl { position: absolute; bottom: 8px; left: 8px; } .pip-br { position: absolute; bottom: 8px; right: 8px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1,.pip-l2,.pip-l3 { position: absolute; left: 8px; } .pip-l1 { top: 8px; } .pip-l2 { top: 50%; transform: translateY(-50%); } .pip-l3 { bottom: 8px; }
        .pip-r1,.pip-r2,.pip-r3 { position: absolute; right: 8px; } .pip-r1 { top: 8px; } .pip-r2 { top: 50%; transform: translateY(-50%); } .pip-r3 { bottom: 8px; }
        .fish-pattern-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin: 10px 0; }
        .fish-bet-card { background: rgba(0,0,0,0.5); border-radius: 16px; padding: 6px 2px; text-align: center; border: 1px solid #ffaa33; }
        .bet-card { background: rgba(0,0,0,0.5); border-radius: 18px; padding: 6px; text-align: center; cursor: pointer; border: 1px solid #ffaa33; font-size: 0.8rem; }
        .points-grid, .trio-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(58px,1fr)); gap: 6px; margin: 10px 0; }
        .history-cell { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(255,170,51,0.2); font-weight: bold; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #2a1e12; border-radius: 36px; padding: 20px; max-width: 90%; max-height: 85%; overflow: auto; color: #ffd966; border: 1px solid #ffaa33; text-align: center; }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2a1a0a; color: #ffd966; padding: 6px 16px; border-radius: 40px; z-index: 2000; font-weight: bold; white-space: nowrap; border: 1px solid #ffaa33; font-size: 0.8rem; }
        .result-popup { position: fixed; bottom: 40%; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg,#ffaa33,#ff884d); color: #2a1a0a; padding: 10px 24px; border-radius: 50px; font-weight: bold; font-size: 1rem; z-index: 1500; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .admin-table th, .admin-table td { padding: 6px 4px; border-bottom: 1px solid #ffaa33; text-align: left; }
        .admin-btn { background: #ffaa33; border: none; border-radius: 20px; padding: 4px 8px; margin: 2px; color: #2a1a0a; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .niu-card { width: 55px; height: 75px; background: white; border-radius: 8px; display: inline-flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; font-size: 1rem; margin: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.3); flex-shrink: 0; color: #2a1a0a; }
        .niu-card[data-suit="♥"], .niu-card[data-suit="♦"] { color: #c33; }
        .niu-card[data-suit="♣"], .niu-card[data-suit="♠"] { color: #333; }
        .niu-hand { display: flex; flex-direction: row; flex-wrap: nowrap; overflow-x: auto; justify-content: center; gap: 8px; min-height: 100px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 20px; margin: 8px 0; }
        @media (max-width:480px){ .niu-card{width:48px;height:65px;font-size:0.85rem;} }
        body.light-mode { background: linear-gradient(145deg,#f5f0e6 0%,#e8dfd0 100%); color: #3a2a1a; }
        body.light-mode #app { background: rgba(245,240,230,0.85); border-color: rgba(180,130,60,0.5); }
        body.light-mode .auth-panel, body.light-mode .user-section, body.light-mode .game-card, body.light-mode .modal-content { background: rgba(250,245,235,0.9); border-color: #b8860b; color: #3a2a1a; }
        body.light-mode .auth-input, body.light-mode .fish-bet-card, body.light-mode .bet-card, body.light-mode .chip, body.light-mode .quick-bet, body.light-mode .exec-btn, body.light-mode .countdown-area { background: rgba(255,250,240,0.8); border-color: #c99a3b; color: #4a3a2a; }
        body.light-mode .chip.selected { background: linear-gradient(145deg,#ffcc77,#e6a822); color: #2a1a0a; }
        body.light-mode .fish-dice-face, body.light-mode .dice-face, body.light-mode .niu-card { background: #fffaf0; border-color: #c99a3b; color: #4a3a2a; }
        body.light-mode .toast-message { background: #fff9ef; color: #b8860b; border-color: #b8860b; }
        body.light-mode .result-popup { background: linear-gradient(135deg,#ffcc77,#e6a822); color: #2a1a0a; }
        body.light-mode .admin-table th, body.light-mode .admin-table td { border-bottom-color: #dbb45c; }
        body.light-mode .admin-btn { background: #e6a822; color: #2a1a0a; }
        body.light-mode .lang-switch, body.light-mode .theme-switch { background: #e6a822; color: #2a1a0a; }
        body.light-mode .charge-btn, body.light-mode .withdraw-btn { background: linear-gradient(135deg,#e6a822,#c9881c); color: #2a1a0a; }
        body.light-mode #userBalanceDisplay { background: linear-gradient(135deg,#c9881c,#a56b0f); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:3000; backdrop-filter:blur(4px); }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== 存储KEY和全局配置 ====================
    const STORAGE = {
        users: 'jinhui_users_final',
        recharge: 'jinhui_recharge_final',
        withdraw: 'jinhui_withdraw_final',
        config: 'jinhui_config_final'
    };
    let systemConfig = { bankerBalance: 200000, adjustFactor: 0.98 };
    function loadConfig() { let s = localStorage.getItem(STORAGE.config); if(s) systemConfig = JSON.parse(s); else localStorage.setItem(STORAGE.config, JSON.stringify(systemConfig)); }
    function saveConfig() { localStorage.setItem(STORAGE.config, JSON.stringify(systemConfig)); }

    function loadUsers() { let u = localStorage.getItem(STORAGE.users); if(!u) { let init = [{ account: "admin", password: "admin888", balance: 0, register_time: new Date().toLocaleString(), records: [], result_history: [] }]; localStorage.setItem(STORAGE.users, JSON.stringify(init)); return init; } return JSON.parse(u); }
    function saveUsers(users) { localStorage.setItem(STORAGE.users, JSON.stringify(users)); }

    let currentUser = null;
    function updateBalance(account, newBal) { let users = loadUsers(); let idx = users.findIndex(u => u.account === account); if(idx !== -1) { users[idx].balance = newBal; saveUsers(users); if(currentUser && currentUser.account === account) currentUser.balance = newBal; let span = document.getElementById("userBalanceDisplay"); if(span) span.innerText = newBal.toFixed(2); } }

    function addGameRecord(account, game, betInfo, result, win, bet) { let users = loadUsers(); let u = users.find(u=>u.account===account); if(u){ u.records = u.records||[]; u.records.unshift({time:new Date().toLocaleString(), game, bet:betInfo, result, win, amount:bet}); if(u.records.length>100) u.records.pop(); saveUsers(users); if(currentUser && currentUser.account===account) currentUser.records = u.records; } }

    function showToast(msg, isErr=false) { let t=document.createElement('div'); t.className='toast-message'; t.innerText=msg; t.style.borderLeftColor=isErr?'#ff6b6b':'#ffaa33'; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
    function showLoading(show, text="处理中...") { let ex=document.querySelector('.loading-overlay'); if(show){ if(ex) ex.remove(); let d=document.createElement('div'); d.className='loading-overlay'; d.innerHTML=`<div style="background:#2a1e12; padding:16px; border-radius:40px;">⏳ ${text}</div>`; document.body.appendChild(d); } else if(ex) ex.remove(); }

    async function gameSettle(totalBet, winAmount) {
        if(!currentUser) return false;
        if(currentUser.balance < totalBet) { showToast("余额不足", true); return false; }
        let bankerDelta = totalBet - winAmount;
        let newBanker = systemConfig.bankerBalance + bankerDelta;
        if(newBanker < 0) { showToast("平台资金池临时短缺，请联系客服", true); return false; }
        systemConfig.bankerBalance = newBanker;
        saveConfig();
        let newBal = currentUser.balance - totalBet + winAmount;
        updateBalance(currentUser.account, newBal);
        let pop=document.createElement('div'); pop.className='result-popup'; pop.innerText=winAmount>totalBet?`🎉 赢得 ${(winAmount-totalBet).toFixed(2)}`:`😭 亏损 ${(totalBet-winAmount).toFixed(2)}`; document.body.appendChild(pop); setTimeout(()=>pop.remove(),1800);
        showToast(`结算完成，余额 ${newBal.toFixed(2)}`);
        return true;
    }

    function applyRecharge() { let amt = parseFloat(prompt("充值金额（USDT）:", "100")); if(isNaN(amt)||amt<=0) return showToast("金额无效"); let orders = JSON.parse(localStorage.getItem(STORAGE.recharge)||'[]'); orders.push({id:Date.now(), account:currentUser.account, amount:amt, status:'pending', time:new Date().toLocaleString()}); localStorage.setItem(STORAGE.recharge, JSON.stringify(orders)); showToast(`充值申请已提交，等待管理员审核`); }
    function applyWithdraw() { let amt = parseFloat(prompt("提现金额（USDT）:", "10")); if(isNaN(amt)||amt<=0) return showToast("金额无效"); if(currentUser.balance<amt) return showToast("余额不足",true); let addr = prompt("USDT (TRC20) 收款地址"); if(!addr) return; let orders = JSON.parse(localStorage.getItem(STORAGE.withdraw)||'[]'); orders.push({id:Date.now(), account:currentUser.account, amount:amt, address:addr, status:'pending', time:new Date().toLocaleString()}); localStorage.setItem(STORAGE.withdraw, JSON.stringify(orders)); showToast(`提现申请已提交，工作人员会尽快处理`); }
    function showServiceModal() { alert("客服微信: jinhui_cs_888"); }

    function openAdminModal() {
        let pwd = prompt("管理员密码:");
        if(pwd !== "admin888") { showToast("密码错误", true); return; }
        let users = loadUsers();
        let rechargeOrders = JSON.parse(localStorage.getItem(STORAGE.recharge)||'[]');
        let withdrawOrders = JSON.parse(localStorage.getItem(STORAGE.withdraw)||'[]');
        let pendingRecharges = rechargeOrders.filter(o=>o.status==='pending');
        let pendingWithdraws = withdrawOrders.filter(o=>o.status==='pending');
        let modalDiv = document.createElement('div'); modalDiv.className='modal';
        modalDiv.innerHTML = `<div class="modal-content" style="max-width:680px;">
            <h3>🎛️ 管理员后台</h3>
            <div>🏦 庄家资金池: ${systemConfig.bankerBalance.toFixed(2)} USDT <button id="addBankerBtn">➕ 注入资金</button></div>
            <div>🎲 赔付系数: <input id="factorInput" type="number" step="0.01" value="${systemConfig.adjustFactor}"> <button id="saveFactorBtn">保存</button></div>
            <hr><div><strong>充值审核</strong><div id="rechargeList"></div></div>
            <div><strong>提现审核</strong><div id="withdrawList"></div></div>
            <div><strong>用户管理</strong><select id="userSelect">${users.map(u=>`<option value="${u.account}">${u.account} (余额 ${u.balance.toFixed(2)})</option>`).join('')}</select>
            <input id="amountInput" placeholder="金额" type="number"> <button id="addBalanceBtn">➕ 上分</button> <button id="subBalanceBtn">➖ 下分</button></div>
            <button id="closeAdminBtn">关闭</button>
        </div>`;
        document.body.appendChild(modalDiv);
        function refreshRecharge(){
            let container = modalDiv.querySelector('#rechargeList');
            if(pendingRecharges.length===0){ container.innerHTML='<div>暂无待审核充值</div>'; return; }
            container.innerHTML = pendingRecharges.map(o=>`<div>${o.account} 申请充值 ${o.amount} USDT<br>时间: ${o.time}<br><button class="admin-btn approveRecharge" data-id="${o.id}">✅ 确认</button> <button class="admin-btn rejectRecharge" data-id="${o.id}">❌ 拒绝</button></div>`).join('');
            document.querySelectorAll('.approveRecharge').forEach(btn=>{ btn.onclick=()=>{ let id=parseInt(btn.dataset.id); let order=rechargeOrders.find(o=>o.id===id); if(order && order.status==='pending'){ let user=users.find(u=>u.account===order.account); if(user){ user.balance+=order.amount; saveUsers(users); order.status='approved'; localStorage.setItem(STORAGE.recharge,JSON.stringify(rechargeOrders)); showToast(`已为 ${order.account} 充值 ${order.amount} USDT`); modalDiv.remove(); openAdminModal(); } } }; });
            document.querySelectorAll('.rejectRecharge').forEach(btn=>{ btn.onclick=()=>{ let id=parseInt(btn.dataset.id); let order=rechargeOrders.find(o=>o.id===id); if(order){ order.status='rejected'; localStorage.setItem(STORAGE.recharge,JSON.stringify(rechargeOrders)); showToast(`已拒绝 ${order.account} 的充值申请`); modalDiv.remove(); openAdminModal(); } }; });
        }
        function refreshWithdraw(){
            let container = modalDiv.querySelector('#withdrawList');
            if(pendingWithdraws.length===0){ container.innerHTML='<div>暂无待处理提现</div>'; return; }
            container.innerHTML = pendingWithdraws.map(o=>`<div>${o.account} 申请提现 ${o.amount} USDT<br>地址: ${o.address}<br><button class="admin-btn approveWithdraw" data-id="${o.id}">✅ 确认打款</button> <button class="admin-btn rejectWithdraw" data-id="${o.id}">❌ 拒绝</button></div>`).join('');
            document.querySelectorAll('.approveWithdraw').forEach(btn=>{ btn.onclick=()=>{ let id=parseInt(btn.dataset.id); let order=withdrawOrders.find(o=>o.id===id); if(order && order.status==='pending'){ let user=users.find(u=>u.account===order.account); if(user && user.balance>=order.amount){ user.balance-=order.amount; saveUsers(users); order.status='approved'; localStorage.setItem(STORAGE.withdraw,JSON.stringify(withdrawOrders)); showToast(`已处理 ${order.account} 提现 ${order.amount} USDT`); modalDiv.remove(); openAdminModal(); } else showToast("用户余额不足",true); } }; });
            document.querySelectorAll('.rejectWithdraw').forEach(btn=>{ btn.onclick=()=>{ let id=parseInt(btn.dataset.id); let order=withdrawOrders.find(o=>o.id===id); if(order){ order.status='rejected'; localStorage.setItem(STORAGE.withdraw,JSON.stringify(withdrawOrders)); showToast(`已拒绝 ${order.account} 的提现申请`); modalDiv.remove(); openAdminModal(); } }; });
        }
        refreshRecharge(); refreshWithdraw();
        modalDiv.querySelector('#addBankerBtn').onclick=()=>{ let amt=parseFloat(prompt("注入资金:","20000")); if(!isNaN(amt)&&amt>0){ systemConfig.bankerBalance+=amt; saveConfig(); showToast(`庄家池 +${amt}`); modalDiv.remove(); openAdminModal(); } };
        modalDiv.querySelector('#saveFactorBtn').onclick=()=>{ let val=parseFloat(modalDiv.querySelector('#factorInput').value); if(!isNaN(val)&&val>=0.5&&val<=1.5){ systemConfig.adjustFactor=val; saveConfig(); showToast(`赔付系数已设为 ${val}`); modalDiv.remove(); openAdminModal(); } else showToast("系数0.5~1.5",true); };
        modalDiv.querySelector('#addBalanceBtn').onclick=()=>{ let acc=modalDiv.querySelector('#userSelect').value; let amt=parseFloat(modalDiv.querySelector('#amountInput').value); if(isNaN(amt)||amt<=0) return showToast("金额无效"); let u=users.find(u=>u.account===acc); if(u){ u.balance+=amt; saveUsers(users); if(currentUser && currentUser.account===acc) currentUser.balance=u.balance; showToast(`给 ${acc} 上分 ${amt} USDT`); modalDiv.remove(); openAdminModal(); } };
        modalDiv.querySelector('#subBalanceBtn').onclick=()=>{ let acc=modalDiv.querySelector('#userSelect').value; let amt=parseFloat(modalDiv.querySelector('#amountInput').value); if(isNaN(amt)||amt<=0) return showToast("金额无效"); let u=users.find(u=>u.account===acc); if(u && u.balance>=amt){ u.balance-=amt; saveUsers(users); if(currentUser && currentUser.account===acc) currentUser.balance=u.balance; showToast(`给 ${acc} 下分 ${amt} USDT`); modalDiv.remove(); openAdminModal(); } else showToast("余额不足",true); };
        modalDiv.querySelector('#closeAdminBtn').onclick=()=>modalDiv.remove();
    }

    function login(account, password) { let users=loadUsers(); let u=users.find(u=>u.account===account); if(!u) return {success:false,msg:"账号不存在"}; if(u.password!==password) return {success:false,msg:"密码错误"}; currentUser=u; localStorage.setItem('curr_acc',account); return {success:true,msg:"登录成功"}; }
    function register(account,password,code) { let valid=["VIP666","888VIP","GOLD2025","LUCKY8","DICE100"]; if(!valid.includes(code)) return {success:false,msg:"推荐码无效"}; let users=loadUsers(); if(users.find(u=>u.account===account)) return {success:false,msg:"账号已存在"}; let newUser={account,password,balance:0,register_time:new Date().toLocaleString(),records:[],result_history:[]}; users.push(newUser); saveUsers(users); return {success:true,msg:"注册成功"}; }

    // ==================== 鱼虾蟹游戏 ====================
    let fishDestroy = null;
    function initFishGame(container) {
        if(fishDestroy) fishDestroy();
        container.innerHTML = `
            <div class="game-card">
                <div style="display:flex; gap:8px;"><div style="flex:1; text-align:center;">💰 余额<div id="fishMyBalance">0</div></div><div style="flex:1; text-align:center;">🎲 总押注<div id="fishTotalBet">0</div></div><div style="flex:1; text-align:center;">🏆 上局净利<div id="fishLastWin">0</div></div></div>
                <div class="countdown-area" id="fishPhaseHint">🎲 下注阶段 · 25秒</div>
                <div id="fishChips"><span class="chip" data-chip="2">2</span><span class="chip" data-chip="5">5</span><span class="chip selected" data-chip="10">10</span><span class="chip" data-chip="50">50</span><span class="chip" data-chip="100">100</span></div>
                <div><button id="fishRollBtn" class="exec-btn">开骰</button><button id="fishClearBtn" class="exec-btn">清空</button><button id="fishRepeatBtn" class="exec-btn">续押</button><button id="fishGrabBtn" class="exec-btn">抢庄</button></div>
                <div class="fish-dice-3d-area"><div class="fish-dice-cube" id="fishDice0"></div><div class="fish-dice-cube" id="fishDice1"></div><div class="fish-dice-cube" id="fishDice2"></div></div>
                <div><strong>单选押注</strong></div><div id="fishPatternGrid" class="fish-pattern-grid"></div>
                <div><strong>双押组合</strong></div><div id="fishDoubleGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;"></div>
                <button id="fishRecordBtn" class="exec-btn">📜 记录</button>
                <div id="fishPlayersPanel"><strong>👥 闲家押注</strong><div id="fishPlayerBetsList"></div></div>
            </div>
        `;
        const patternNames = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        const patternEmojis = ["🐟","🦐","🦀","🎃","💰","🐔"];
        const doubleCombos = [["鱼","虾"],["鱼","蟹"],["鱼","葫芦"],["鱼","金钱"],["鱼","鸡"],["虾","蟹"],["虾","葫芦"],["虾","金钱"],["虾","鸡"],["蟹","葫芦"],["蟹","金钱"],["蟹","鸡"],["葫芦","金钱"],["葫芦","鸡"],["金钱","鸡"]];
        function buildFishDice(diceDiv) {
            diceDiv.innerHTML='';
            const faces=['fish-front','fish-back','fish-right','fish-left','fish-top','fish-bottom'];
            faces.forEach((fc,idx)=>{ let fd=document.createElement('div'); fd.className=`fish-dice-face ${fc}`; fd.innerText=patternEmojis[idx%6]; diceDiv.appendChild(fd); });
            diceDiv.style.transform=`rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`;
        }
        function setFishDiceValue(diceDiv,pat){
            let idx=patternNames.indexOf(pat);
            let rx=0,ry=0;
            if(idx===0){rx=0;ry=0;}else if(idx===1){rx=0;ry=-90;}else if(idx===2){rx=0;ry=180;}else if(idx===3){rx=0;ry=90;}else if(idx===4){rx=-90;ry=0;}else if(idx===5){rx=90;ry=0;}
            diceDiv.style.transform=`rotateX(${rx+360*(1+Math.floor(Math.random()*2))}deg) rotateY(${ry+360*(1+Math.floor(Math.random()*2))}deg)`;
        }
        let fishDice = [document.getElementById('fishDice0'),document.getElementById('fishDice1'),document.getElementById('fishDice2')];
        fishDice.forEach(buildFishDice);
        let patternBets={鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0};
        let doubleBets={}; doubleCombos.forEach(c=>doubleBets[c.join(',')]=0);
        let currentChip=10, isGrabbed=false, gameRecords=[], isRolling=false, roundActive=true, countdownTimer=null, lastWinAmount=0;
        let playersList=[{name:"闲家A",bet:0},{name:"闲家B",bet:0},{name:"闲家C",bet:0}];
        let lastBetState=null, clearTimer=null;

        function updateFishUI(){
            for(let p in patternBets){ let sp=document.getElementById(`fishBet_${p}`); if(sp) sp.innerText=patternBets[p]; }
            for(let c of doubleCombos){ let key=c.join(','); let sp=document.getElementById(`doubleBet_${key.replace(/,/g,'_')}`); if(sp) sp.innerText=doubleBets[key]; }
            let total=Object.values(patternBets).reduce((a,b)=>a+b,0)+Object.values(doubleBets).reduce((a,b)=>a+b,0);
            document.getElementById('fishTotalBet').innerText=total;
            document.getElementById('fishLastWin').innerText=lastWinAmount;
            document.getElementById('fishMyBalance').innerText=currentUser?currentUser.balance.toFixed(2):'0';
            document.getElementById('fishPlayerBetsList').innerHTML=playersList.map(p=>`<div>${p.name}: ${p.bet}</div>`).join('');
            let grabBtn=document.getElementById('fishGrabBtn');
            if(grabBtn) grabBtn.disabled = (isGrabbed || (currentUser && currentUser.balance < 2000));
        }
        function saveLastBetState(){ lastBetState={patternBets:{...patternBets}, doubleBets:{...doubleBets}}; }
        async function repeatLastBet(){
            if(!lastBetState) return showToast("无上局押注");
            let total=Object.values(lastBetState.patternBets).reduce((a,b)=>a+b,0)+Object.values(lastBetState.doubleBets).reduce((a,b)=>a+b,0);
            let bal=currentUser.balance;
            if(total>bal) return showToast("余额不足");
            let oldTotal=Object.values(patternBets).reduce((a,b)=>a+b,0)+Object.values(doubleBets).reduce((a,b)=>a+b,0);
            if(oldTotal>0) await gameSettle(oldTotal, 0);
            patternBets={...lastBetState.patternBets}; doubleBets={...lastBetState.doubleBets};
            await gameSettle(total, 0);
            updateFishUI(); showToast("续押成功");
        }
        async function addPatternBet(p,v){
            if(isGrabbed) { showToast("庄家不能下注"); return; }
            let total=Object.values(patternBets).reduce((a,b)=>a+b,0)+Object.values(doubleBets).reduce((a,b)=>a+b,0);
            if(v>500||total+v>2000) return showToast("超上限");
            let bal=currentUser.balance;
            if(v>bal) return showToast("余额不足");
            await gameSettle(v, 0);
            patternBets[p]+=v; updateFishUI(); saveLastBetState();
        }
        async function subPatternBet(p,v){ let cur=patternBets[p]; if(cur<v) v=cur; if(v===0) return; patternBets[p]-=v; await gameSettle(-v,0); updateFishUI(); saveLastBetState(); }
        async function addDoubleBet(key){
            if(isGrabbed) return showToast("庄家不能下注");
            let val=currentChip;
            let total=Object.values(patternBets).reduce((a,b)=>a+b,0)+Object.values(doubleBets).reduce((a,b)=>a+b,0);
            if(val>500||total+val>2000) return showToast("超上限");
            let bal=currentUser.balance;
            if(val>bal) return showToast("余额不足");
            await gameSettle(val,0);
            doubleBets[key]+=val; updateFishUI(); saveLastBetState();
        }
        async function clearFishBets(){
            let total=Object.values(patternBets).reduce((a,b)=>a+b,0)+Object.values(doubleBets).reduce((a,b)=>a+b,0);
            if(total>0) await gameSettle(-total,0);
            patternBets={鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0};
            for(let k in doubleBets) doubleBets[k]=0;
            updateFishUI(); saveLastBetState();
        }
        async function rollFishDiceWithAnimation(final){
            for(let i=0;i<3;i++){ fishDice[i].style.transition='none'; fishDice[i].style.transform=`rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`; }
            await new Promise(r=>setTimeout(r,40));
            for(let i=0;i<3;i++) fishDice[i].style.transition='transform 0.4s';
            for(let s=0;s<10;s++){ for(let i=0;i<3;i++){ fishDice[i].style.transform=`rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`; } await new Promise(r=>setTimeout(r,60)); }
            for(let i=0;i<3;i++) setFishDiceValue(fishDice[i],final[i]);
            await new Promise(r=>setTimeout(r,300));
        }
        async function settleFish(){
            if(isRolling) return;
            let totalBet=Object.values(patternBets).reduce((a,b)=>a+b,0)+Object.values(doubleBets).reduce((a,b)=>a+b,0);
            if(totalBet===0 && !isGrabbed && totalBet===0) { showToast("请下注"); return; }
            isRolling=true;
            let r1=patternNames[Math.floor(Math.random()*6)], r2=patternNames[Math.floor(Math.random()*6)], r3=patternNames[Math.floor(Math.random()*6)];
            await rollFishDiceWithAnimation([r1,r2,r3]);
            let occurs={鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0};
            [r1,r2,r3].forEach(p=>occurs[p]++);
            let winAmount=0;
            for(let p in patternBets){
                let cnt=occurs[p];
                if(cnt>0) winAmount+=patternBets[p]*cnt;
            }
            for(let combo of doubleCombos){
                let key=combo.join(',');
                let bet=doubleBets[key];
                if(bet>0){
                    let a=combo[0],b=combo[1];
                    if(occurs[a]>0 && occurs[b]>0) winAmount+=bet*5;
                }
            }
            let netProfit=winAmount-totalBet;
            lastWinAmount=netProfit;
            let success = await gameSettle(totalBet, winAmount);
            if(!success){ isRolling=false; startFishRound(); return; }
            let pop=document.createElement('div'); pop.className='result-popup'; pop.innerText=netProfit>0?`🎉 赢 ${netProfit.toFixed(2)}`:`😭 输 ${-netProfit}`; document.body.appendChild(pop); setTimeout(()=>pop.remove(),1800);
            gameRecords.unshift({time:new Date().toLocaleTimeString(), dice:`${r1},${r2},${r3}`, result:netProfit>0?`赢${netProfit.toFixed(2)}`:`输${-netProfit}`});
            patternBets={鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0};
            for(let k in doubleBets) doubleBets[k]=0;
            updateFishUI(); saveLastBetState();
            isRolling=false;
            isGrabbed=false;
            if(countdownTimer) clearInterval(countdownTimer);
            startFishRound();
        }
        function startFishRound(){
            if(countdownTimer) clearInterval(countdownTimer);
            let remaining=25, hint=document.getElementById('fishPhaseHint');
            hint.innerText=`🎲 下注阶段 · ${remaining}秒`;
            countdownTimer=setInterval(()=>{ remaining--; hint.innerText=`🎲 下注阶段 · ${remaining}秒`; if(remaining<=0){ clearInterval(countdownTimer); if(!isRolling && roundActive) settleFish(); } },1000);
        }
        let gridDiv=document.getElementById('fishPatternGrid');
        patternNames.forEach(p=>{
            let div=document.createElement('div'); div.className='fish-bet-card';
            div.innerHTML=`<div>${patternEmojis[patternNames.indexOf(p)]}</div><div>${p}</div><div><button class="quick-bet sub-pat" data-pat="${p}">-</button><span id="fishBet_${p}">0</span><button class="quick-bet add-pat" data-pat="${p}">+</button></div>`;
            gridDiv.appendChild(div);
        });
        let doubleGrid=document.getElementById('fishDoubleGrid');
        doubleCombos.forEach(combo=>{
            let key=combo.join(','); let btn=document.createElement('div'); btn.className='bet-card';
            btn.innerHTML=`<div>${combo[0]}+${combo[1]}</div><div id="doubleBet_${key.replace(/,/g,'_')}">0</div>`;
            btn.onclick=()=>addDoubleBet(key);
            doubleGrid.appendChild(btn);
        });
        document.querySelectorAll('#fishChips .chip').forEach(c=>{ c.onclick=function(){ currentChip=parseInt(this.dataset.chip); document.querySelectorAll('#fishChips .chip').forEach(cc=>cc.classList.remove('selected')); this.classList.add('selected'); }; });
        document.getElementById('fishGrabBtn').onclick=async ()=>{
            if(isGrabbed) return showToast("已是庄家");
            let bal=currentUser.balance;
            if(bal>=2000){
                await gameSettle(2000,0);
                isGrabbed=true;
                updateFishUI();
                showToast("抢庄成功");
                if(countdownTimer) clearInterval(countdownTimer);
                startFishRound();
            } else showToast("余额不足2000");
        };
        document.getElementById('fishClearBtn').onclick=clearFishBets;
        document.getElementById('fishRepeatBtn').onclick=repeatLastBet;
        document.getElementById('fishRollBtn').onclick=()=>{ if(!isRolling && roundActive) settleFish(); };
        document.getElementById('fishRecordBtn').onclick=()=>{
            let html='<div style="max-height:200px; overflow:auto;">'+gameRecords.map(r=>`<div>${r.time} ${r.dice} ${r.result}</div>`).join('')+'</div><button id="closeRec" class="auth-btn">关闭</button>';
            let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove();
        };
        gridDiv.addEventListener('click',(e)=>{
            let btn=e.target.closest('.quick-bet'); if(!btn) return; let pat=btn.dataset.pat;
            if(btn.classList.contains('add-pat')) addPatternBet(pat,currentChip);
            if(btn.classList.contains('sub-pat')) subPatternBet(pat,currentChip);
        });
        updateFishUI(); startFishRound();
        fishDestroy = ()=>{ if(clearTimer) clearTimeout(clearTimer); roundActive=false; if(countdownTimer) clearInterval(countdownTimer); container.innerHTML=''; };
        return fishDestroy;
    }
