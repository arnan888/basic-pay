<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥林匹斯之巅·大型老虎机</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E63946',
                        secondary: '#FFD700',
                        dark: '#121212',
                        light: '#F5F5F5',
                        gold: '#FFC107',
                        purple: '#9C27B0',
                        blue: '#1976D2'
                    },
                    fontFamily: {
                        gaming: ['Arial Black', 'Arial Bold', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 8px rgba(255,215,0,0.8); }
            .text-shadow-lg { text-shadow: 0 0 15px rgba(255,215,0,1); }
            .reel-shadow { box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
            .glass { 
                background: rgba(255,255,255,0.1);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
            }
            .symbol-wild { background: linear-gradient(45deg, #FFD700, #FFA500); }
            .symbol-scatter { background: linear-gradient(45deg, #E63946, #FF6B6B); }
            .symbol-god { background: linear-gradient(45deg, #1976D2, #2196F3); }
            .symbol-fruit { background: linear-gradient(45deg, #9C27B0, #BA68C8); }
            .animate-spin-reel { animation: spinReel 0.05s linear infinite; }
            .animate-pulse-slow { animation: pulse 3s infinite; }
            .animate-float { animation: float 3s ease-in-out infinite; }
            .animate-win { animation: winFlash 0.5s ease-in-out 3; }
        }

        @keyframes spinReel {
            0% { transform: translateY(0); }
            100% { transform: translateY(-80px); }
        }

        @keyframes winFlash {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="bg-dark min-h-screen overflow-x-hidden font-gaming text-light">
    <!-- 背景装饰 -->
    <div class="fixed inset-0 z-0 opacity-20">
        <div class="absolute top-0 left-0 w-full h-full bg-[url('https://picsum.photos/id/1015/1920/1080')] bg-cover bg-center"></div>
        <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-purple-900/50 to-dark/90"></div>
    </div>

    <!-- 主容器 -->
    <div class="relative z-10 container mx-auto px-4 py-8">
        <!-- 顶部栏 -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8">
            <div class="flex items-center mb-4 md:mb-0">
                <div class="text-secondary text-4xl mr-2 animate-float">⚡</div>
                <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-bold text-shadow text-secondary">奥林匹斯之巅</h1>
            </div>

            <div class="flex flex-col items-end">
                <div class="text-lg mb-1">累积大奖</div>
                <div class="text-[clamp(1.5rem,4vw,2.5rem)] text-gold font-bold text-shadow-lg animate-pulse-slow" id="jackpot">¥ 2,589,630</div>
            </div>
        </header>

        <!-- 游戏主体 -->
        <div class="max-w-5xl mx-auto">
            <!-- 玩家信息栏 -->
            <div class="glass rounded-lg p-4 mb-6 flex justify-between items-center">
                <div class="flex items-center">
                    <div class="w-12 h-12 rounded-full bg-blue-500 flex items-center justify-center text-xl mr-3">
                        <i class="fa fa-user"></i>
                    </div>
                    <div>
                        <div class="text-sm text-gray-300">玩家：奥林匹斯之子</div>
                        <div class="text-xl font-bold" id="user-balance">余额：¥ 10,000</div>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <button class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg transition-all duration-300 flex items-center">
                        <i class="fa fa-cog mr-2"></i> 设置
                    </button>
                    <button class="bg-primary hover:bg-red-700 px-4 py-2 rounded-lg transition-all duration-300 flex items-center">
                        <i class="fa fa-gift mr-2"></i> 充值
                    </button>
                </div>
            </div>

            <!-- 老虎机主体 -->
            <div class="glass rounded-xl p-6 border-2 border-secondary relative">
                <!-- 皮肤切换按钮 -->
                <button class="absolute top-4 right-4 bg-dark/80 hover:bg-dark px-3 py-1 rounded-lg text-sm flex items-center" id="skin-toggle">
                    <i class="fa fa-paint-brush mr-2"></i> 切换皮肤
                </button>

                <!-- 游戏标题 -->
                <div class="text-center mb-6">
                    <h2 class="text-2xl md:text-3xl font-bold text-secondary" id="game-title">宙斯的恩赐</h2>
                    <p class="text-gray-300 text-sm" id="game-desc">转动卷轴，赢取诸神的奖励！</p>
                </div>

                <!-- 卷轴区域 -->
                <div class="bg-dark/90 rounded-lg p-4 mb-6 reel-shadow relative overflow-hidden">
                    <!-- 支付线指示器 -->
                    <div class="absolute inset-0 z-20 pointer-events-none" id="paylines-container"></div>

                    <!-- 卷轴容器 -->
                    <div class="grid grid-cols-5 gap-2 relative z-10" id="reels-container">
                        <!-- 卷轴会通过JS动态生成 -->
                    </div>

                    <!-- 中奖提示 -->
                    <div class="absolute inset-0 z-30 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-500" id="win-indicator">
                        <div class="bg-primary/90 px-8 py-4 rounded-xl text-3xl md:text-5xl font-bold text-shadow-lg animate-win">
                            <span id="win-amount">¥ 1,200</span>
                        </div>
                    </div>
                </div>

                <!-- 控制区域 -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <!-- 下注控制 -->
                    <div class="glass rounded-lg p-4">
                        <div class="text-center text-lg mb-3 font-bold">下注设置</div>
                        <div class="flex justify-between items-center mb-4">
                            <button class="bg-dark hover:bg-gray-800 w-10 h-10 rounded-full flex items-center justify-center" id="bet-minus">
                                <i class="fa fa-minus"></i>
                            </button>
                            <div class="text-2xl font-bold" id="current-bet">¥ 100</div>
                            <button class="bg-dark hover:bg-gray-800 w-10 h-10 rounded-full flex items-center justify-center" id="bet-plus">
                                <i class="fa fa-plus"></i>
                            </button>
                        </div>
                        <div class="flex justify-between">
                            <button class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded-lg text-sm w-[45%]" id="bet-min">最小下注</button>
                            <button class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded-lg text-sm w-[45%]" id="bet-max">最大下注</button>
                        </div>
                    </div>

                    <!-- 支付线控制 -->
                    <div class="glass rounded-lg p-4">
                        <div class="text-center text-lg mb-3 font-bold">支付线</div>
                        <div class="flex justify-between items-center mb-4">
                            <button class="bg-dark hover:bg-gray-800 w-10 h-10 rounded-full flex items-center justify-center" id="lines-minus">
                                <i class="fa fa-minus"></i>
                            </button>
                            <div class="text-2xl font-bold" id="current-lines">25 线</div>
                            <button class="bg-dark hover:bg-gray-800 w-10 h-10 rounded-full flex items-center justify-center" id="lines-plus">
                                <i class="fa fa-plus"></i>
                            </button>
                        </div>
                        <div class="flex justify-between">
                            <button class="bg-purple-600 hover:bg-purple-700 px-3 py-1 rounded-lg text-sm w-[45%]" id="show-paylines">显示线路</button>
                            <button class="bg-purple-600 hover:bg-purple-700 px-3 py-1 rounded-lg text-sm w-[45%]" id="hide-paylines">隐藏线路</button>
                        </div>
                    </div>

                    <!-- 主要操作 -->
                    <div class="glass rounded-lg p-4 flex flex-col justify-between">
                        <div class="text-center text-lg mb-3 font-bold">游戏控制</div>
                        <button class="bg-primary hover:bg-red-700 text-xl font-bold py-3 rounded-lg transition-all duration-300 transform hover:scale-105 mb-3" id="spin-button">
                            <i class="fa fa-refresh mr-2"></i> 开始转动
                        </button>
                        <div class="flex justify-between">
                            <button class="bg-gold text-dark hover:bg-yellow-400 px-3 py-2 rounded-lg font-bold w-[45%]" id="autospin-button">
                                <i class="fa fa-repeat mr-1"></i> 自动
                            </button>
                            <button class="bg-secondary text-dark hover:bg-yellow-300 px-3 py-2 rounded-lg font-bold w-[45%]" id="max-spin-button">
                                <i class="fa fa-bolt mr-1"></i> 最大
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 免费旋转区域 -->
                <div class="glass rounded-lg p-4 mb-6 hidden" id="freespin-panel">
                    <div class="flex justify-between items-center">
                        <div class="text-lg font-bold text-gold">免费旋转</div>
                        <div class="text-xl font-bold" id="freespin-count">剩余：10 次</div>
                    </div>
                    <div class="text-center text-sm text-gray-300 mt-2">
                        <span class="text-gold font-bold">×3</span> 奖励倍数
                    </div>
                </div>

                <!-- 游戏信息区域 -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="glass rounded-lg p-3 text-center">
                        <div class="text-sm text-gray-300 mb-1">总转动次数</div>
                        <div class="text-xl font-bold" id="total-spins">1,258</div>
                    </div>
                    <div class="glass rounded-lg p-3 text-center">
                        <div class="text-sm text-gray-300 mb-1">总中奖次数</div>
                        <div class="text-xl font-bold" id="total-wins">326</div>
                    </div>
                    <div class="glass rounded-lg p-3 text-center">
                        <div class="text-sm text-gray-300 mb-1">中奖率</div>
                        <div class="text-xl font-bold" id="win-rate">26.0%</div>
                    </div>
                    <div class="glass rounded-lg p-3 text-center">
                        <div class="text-sm text-gray-300 mb-1">最大单局奖励</div>
                        <div class="text-xl font-bold text-gold" id="max-win">¥ 128,500</div>
                    </div>
                </div>
            </div>

            <!-- 支付表 -->
            <div class="glass rounded-xl p-6 mt-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-secondary">奖励支付表</h2>
                    <button class="bg-dark hover:bg-gray-800 px-4 py-2 rounded-lg" id="toggle-paytable">
                        <i class="fa fa-chevron-down mr-2"></i> 收起
                    </button>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4" id="paytable-container">
                    <!-- 支付表内容通过JS动态生成 -->
                </div>
            </div>
        </div>

        <!-- 底部版权 -->
        <footer class="mt-12 text-center text-gray-400 text-sm">
            <p>本游戏仅用于展示，请勿用于商业或非法用途 | 游戏设计参考《Gates of Olympus》《Sweet Bonanza》</p>
            <p class="mt-2">© 2024 奥林匹斯游戏工作室 版权所有</p>
        </footer>
    </div>

    <!-- 音效控制 -->
    <div class="fixed bottom-4 right-4 z-50">
        <button class="bg-dark/80 hover:bg-dark w-12 h-12 rounded-full flex items-center justify-center" id="sound-toggle">
            <i class="fa fa-volume-up text-xl" id="sound-icon"></i>
        </button>
    </div>

        // 游戏核心配置
        const GAME_CONFIG = {
            // 皮肤配置
