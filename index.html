<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_ENERGY_PULSE</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        
        /* 1. 背景：提亮绿色 + 红色脉冲点缀 */
        body { 
            background: #22c55e; 
            background-image: 
                /* 红色间隔发光体 (大面积点缀) */
                radial-gradient(circle at 10% 10%, #ff0000 1.5px, transparent 2px),
                radial-gradient(circle at 30% 20%, #ff0000 1.5px, transparent 2px),
                radial-gradient(circle at 70% 15%, #ff0000 1.5px, transparent 2px),
                radial-gradient(circle at 90% 30%, #ff0000 1.5px, transparent 2px),
                radial-gradient(circle at 20% 80%, #ff0000 1.5px, transparent 2px),
                radial-gradient(circle at 80% 85%, #ff0000 1.5px, transparent 2px),
                radial-gradient(circle at 50% 50%, #4ade80 0%, #15803d 100%);
            background-size: 100px 100px, 150px 150px, 120px 120px, 200px 200px, 180px 180px, 140px 140px, 100% 100%;
            color:#FFF; font-family: "PingFang SC", sans-serif; 
            height:100vh; overflow:hidden; display:flex; flex-direction:column;
            animation: pulse-bg 4s infinite alternate; /* 增加呼吸感 */
        }
        @keyframes pulse-bg { from { filter: brightness(1); } to { filter: brightness(1.1); } }

        .status-bar { background: rgba(0,0,0,0.5); height:28px; display:flex; align-items:center; justify-content:center; font-size:10px; color:#fff; }
        .core-section { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:15px; gap:12px; }

        /* 2. 深度内陷板块 + 白色光点点缀 */
        .stable-inset-panel {
            width:100%; background: #080a09; border-radius:18px;
            /* 黑色底座内的白色点缀 */
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(255,255,255,0.4) 1px, transparent 1.5px),
                radial-gradient(circle at 85% 20%, rgba(255,255,255,0.4) 1px, transparent 1.5px),
                radial-gradient(circle at 50% 85%, rgba(255,255,255,0.4) 1px, transparent 1.5px),
                radial-gradient(circle at 10% 90%, rgba(255,255,255,0.4) 1px, transparent 1.5px);
            background-size: 50px 50px;
            box-shadow: inset 10px 10px 20px rgba(0,0,0,1), inset -2px -2px 6px rgba(255,255,255,0.02), 0 0 0 2px #000;
            border: 1px solid #1a2f23; position: relative;
        }

        /* 余额区 */
        .balance-card { padding:22px; text-align:center; }
        .bal-val { font-size:62px; font-weight:900; color: #ef4444; text-shadow: 0 0 20px rgba(239,68,68,0.6); font-family: 'Verdana', sans-serif; }

        /* 3. 转盘区：黑盘内的密集星光 */
        .wheel-well { width:100%; max-width:330px; aspect-ratio: 1/1; display:flex; align-items:center; justify-content:center; }
        .wheel-outer {
            width: 86%; height: 86%; border-radius: 50%; position: relative; 
            border: 8px solid #000; overflow: hidden; background: #050807;
            /* 转盘内的白光体点缀 */
            background-image: 
                radial-gradient(circle at 20% 30%, #fff 0.8px, transparent 1.2px),
                radial-gradient(circle at 70% 20%, #fff 0.8px, transparent 1.2px),
                radial-gradient(circle at 40% 80%, #fff 0.8px, transparent 1.2px),
                radial-gradient(circle at 80% 60%, #fff 0.8px, transparent 1.2px);
            background-size: 40px 40px;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 0 40px rgba(0,0,0,1); margin: auto;
        }
        
        .wheel-center-val {
            position: absolute; z-index: 10; width: 80px; height: 80px; background: #0d1110;
            border-radius: 50%; border: 2px solid #222; display: flex; align-items:center; justify-content:center;
            color: #ef4444; font-size: 24px; font-weight: 900; box-shadow: 0 0 20px rgba(0,0,0,1);
        }
        
        .slot-content { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; padding-top:8px; }
        .beast-ico { font-size: 38px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
        .beast-txt { font-size: 11px; color:#ffffff; font-weight:900; margin-top: 2px; text-shadow: 0 1px 2px #000; }
        .pointer-line { position:absolute; top:4px; left:50%; transform:translateX(-50%); width:4px; height:48px; background:#ef4444; z-index:100; border-radius:2px; box-shadow: 0 0 15px #ef4444; }

        /* 4. 下分按键区（保持锁死不动） */
        .console-area { 
            width:100%; background:#0d1110; padding:20px 20px 85px 20px; 
            border-radius: 25px 25px 0 0; border-top: 3px solid #000;
        }
        .main-row { display:flex; gap:12px; margin-bottom:15px; }
        .btn-deep-inset {
            background: #080a09; border: 1px solid #1a1a1a; color:#ffffff; font-size:32px; border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            box-shadow: inset 8px 8px 16px rgba(0,0,0,0.9), inset -2px -2px 8px rgba(255,255,255,0.02); 
        }
        .adj { width:65px; height:60px; font-weight:bold; }
        .exec-red-inset { 
            flex:1; height:60px; background: #991b1b; border: 1px solid #450a0a; color:#fff; font-size:24px; font-weight:900; border-radius:12px; letter-spacing:4px;
            box-shadow: inset 6px 6px 12px rgba(0,0,0,0.7), inset -2px -2px 8px rgba(255,255,255,0.1);
        }
        .tech-row { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
        .mode-btn { padding:14px; background:#080a09; border: 1px solid #1a1a1a; color:#ffffff; font-size:12px; border-radius:10px; text-align:center; box-shadow: inset 5px 5px 10px rgba(0,0,0,0.7); }
        .mode-btn.on { color:#ef4444; border-color:#991b1b; }

        .nav { position:fixed; bottom:0; width:100%; height:75px; background:#000; border-top:1px solid #111; display:grid; grid-template-columns: repeat(4, 1fr); }
        .nav-n { display:flex; flex-direction:column; align-items:center; justify-content:center; color:#ffffff; font-size:11px; font-weight:bold; opacity: 0.6; }
        .nav-n.act { color:#ef4444; opacity: 1; }

        .label-white { font-size:10px; color:#ffffff; margin-bottom:12px; letter-spacing:1px; font-weight:900; opacity: 0.8; }
        .bet-label { font-size:11px; color:#ffffff; margin-top:8px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="status-bar">● PULSE_GLOW_ACTIVE ● </div>

    <div class="core-section">
        <div class="stable-inset-panel balance-card">
            <div class="label-white">AVAILABLE BALANCE (USDT)</div>
            <div class="bal-val" id="ui_bal">100.3</div>
            <div class="bet-label">UNIT_BET: <span id="ui_bet" style="color:#ef4444; font-weight:900;">0.5</span></div>
        </div>

        <div class="stable-inset-panel wheel-well">
            <div class="pointer-line"></div>
            <div class="wheel-center-val" id="center_val">X88</div>
            <div id="ui_wheel" class="wheel-outer">
                <div class="slot-content" style="transform:rotate(0deg)"><span class="beast-ico">🐲</span><span class="beast-txt">神龙</span></div>
                <div class="slot-content" style="transform:rotate(45deg)"><span class="beast-ico">🐯</span><span class="beast-txt">猛虎</span></div>
                <div class="slot-content" style="transform:rotate(90deg)"><span class="beast-ico">🦅</span><span class="beast-txt">苍鹰</span></div>
                <div class="slot-content" style="transform:rotate(135deg)"><span class="beast-ico">🦄</span><span class="beast-txt">麒麟</span></div>
                <div class="slot-content" style="transform:rotate(180deg)"><span class="beast-ico">🔥</span><span class="beast-txt">凤凰</span></div>
                <div class="slot-content" style="transform:rotate(225deg)"><span class="beast-ico">🐺</span><span class="beast-txt">贪狼</span></div>
                <div class="slot-content" style="transform:rotate(270deg)"><span class="beast-ico">🐢</span><span class="beast-txt">玄武</span></div>
                <div class="slot-content" style="transform:rotate(315deg)"><span class="beast-ico">🦁</span><span class="beast-txt">狂狮</span></div>
            </div>
        </div>
    </div>

    <div class="console-area">
        <div class="main-row">
            <div class="btn-deep-inset adj" onclick="changeBet(-0.5)">－</div>
            <button id="go_btn" class="exec-red-inset" onclick="go()">开始执行</button>
            <div class="btn-deep-inset adj" onclick="changeBet(0.5)">＋</div>
        </div>
        <div class="tech-row">
            <div id="auto_btn" class="mode-btn" onclick="toggleAuto()">🤖 自动模式: 关</div>
            <div id="speed_btn" class="mode-btn" onclick="cycleSpeed()">⚡ 变速模式: 1X</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-n">行情</div><div class="nav-n">资产中心</div><div class="nav-n">历史记录</div><div class="nav-n act">量化终端</div>
    </div>

    <script>
        let balance = 100.3, bet = 0.5, rot = 0, busy = false, isAuto = false, speedMode = 1;
        const beastNames = ["X500", "X88", "X50", "X120", "X200", "X10", "X0", "X30"];
        const multis = [500, 88, 50, 120, 200, 10, 0, 30];

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById('auto_btn').className = isAuto ? 'mode-btn on' : 'mode-btn';
            document.getElementById('auto_btn').innerHTML = `🤖 自动模式: ${isAuto ? '开' : '关'}`;
            if(isAuto && !busy) go();
        }

        function cycleSpeed() {
            speedMode = (speedMode % 3) + 1;
            const btn = document.getElementById('speed_btn');
            btn.innerHTML = `⚡ 变速模式: ${speedMode}X`;
            const times = ["", "5s", "1.2s", "0.5s"];
            document.getElementById('ui_wheel').style.transitionDuration = times[speedMode];
        }

        function changeBet(val) {
            if (busy) return;
            let n = bet + val;
            if (n >= 0.5) { bet = n; document.getElementById('ui_bet').innerText = bet.toFixed(1); }
        }

        function go() {
            if (busy || balance < bet) { isAuto = false; return; }
            busy = true;
            document.getElementById('go
