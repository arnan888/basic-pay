<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>金辉娱乐城 · 云端同步版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: linear-gradient(145deg, #1a120b 0%, #2a1e12 100%); font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif; padding: 12px; min-height: 100vh; color: #ffecb3; transition: background 0.3s, color 0.3s; }
        #app { max-width: 560px; margin: 0 auto; background: rgba(30, 20, 12, 0.75); backdrop-filter: blur(12px); border-radius: 48px; border: 1px solid rgba(255, 215, 0, 0.5); overflow: hidden; }
        .auth-panel { padding: 28px 20px; background: rgba(20, 12, 6, 0.8); }
        .auth-panel h2, .auth-panel h3 { text-align: center; margin-bottom: 16px; font-weight: 800; background: linear-gradient(135deg, #ffd966, #ffaa33); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .auth-input { width: 100%; padding: 12px 16px; margin: 6px 0; background: rgba(0,0,0,0.6); border: 1px solid #ffaa33; border-radius: 40px; color: #ffd966; font-size: 0.95rem; outline: none; }
        .flex-row { display: flex; gap: 10px; align-items: center; margin: 10px 0; }
        .code-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; border-radius: 40px; padding: 10px 18px; color: #2a1a0a; font-weight: 700; cursor: pointer; }
        .auth-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; border-radius: 40px; padding: 12px; font-weight: bold; color: #2a1a0a; cursor: pointer; width: 100%; margin-top: 10px; font-size: 0.95rem; }
        hr { margin: 20px 0; border-color: #ffaa33; }
        .auth-note { font-size: 0.65rem; text-align: center; margin-top: 12px; color: #ffaa33; }
        .user-section { background: rgba(20, 12, 6, 0.7); padding: 12px 16px; border-bottom: 1px solid #ffaa33; }
        .user-info-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        #userBalanceDisplay { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #ffd966, #ffaa33); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
        .btn-group { display: flex; gap: 6px; }
        .btn-sm { background: rgba(255,170,51,0.2); border: 1px solid #ffaa33; padding: 4px 12px; border-radius: 40px; color: #ffd966; cursor: pointer; font-size: 0.75rem; }
        .charge-btn, .withdraw-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; padding: 6px 16px; border-radius: 40px; color: #2a1a0a; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .lang-switch, .theme-switch { background: #ffaa33; border: none; border-radius: 30px; padding: 4px 10px; color: #2a1a0a; cursor: pointer; font-size: 0.75rem; font-weight: bold; margin-left: 4px; }
        .game-nav { display: flex; gap: 6px; background: rgba(0,0,0,0.4); padding: 6px 12px; margin: 12px 12px; border-radius: 60px; }
        .game-tab { flex: 1; background: transparent; border: none; padding: 8px 0; border-radius: 40px; font-weight: 700; font-size: 0.8rem; color: #ffaa33; cursor: pointer; }
        .game-tab.active { background: linear-gradient(135deg, #ffaa33, #ff884d); color: #2a1a0a; box-shadow: 0 0 8px #ffaa33; }
        .game-container { padding: 8px 12px 20px; }
        .game-card { background: rgba(20, 12, 6, 0.7); backdrop-filter: blur(8px); border-radius: 32px; padding: 16px; border: 1px solid #ffaa33; }
        .chip { background: linear-gradient(145deg, #cc8800, #aa6600); display: inline-block; padding: 6px 14px; border-radius: 36px; margin: 3px; cursor: pointer; font-weight: bold; color: #ffecb3; border: 1px solid #ffaa33; font-size: 0.85rem; }
        .chip.selected { background: linear-gradient(145deg, #ffaa33, #ff884d); color: #2a1a0a; }
        .quick-bet, .clear-bet { background: rgba(255,170,51,0.2); border: 1px solid #ffaa33; border-radius: 30px; padding: 4px 10px; margin: 3px; cursor: pointer; color: #ffd966; font-weight: 500; font-size: 0.75rem; }
        .exec-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; border-radius: 36px; padding: 8px 14px; color: #2a1a0a; font-weight: bold; cursor: pointer; margin: 3px; font-size: 0.85rem; }
        .main-go { background: linear-gradient(135deg, #ffcc66, #ffaa33); font-weight: 800; }
        .countdown-area { text-align: center; margin: 6px 0 12px 0; background: rgba(0,0,0,0.5); border-radius: 40px; padding: 6px 12px; font-weight: bold; font-size: 0.9rem; color: #ffaa33; }
        .fish-dice-3d-area, .dice-3d-area { display: flex; justify-content: center; gap: 20px; margin: 20px 0; perspective: 1200px; }
        .fish-dice-cube, .dice-cube { width: 70px; height: 70px; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); }
        .fish-dice-face, .dice-face { position: absolute; width: 100%; height: 100%; background: #2a1e12; border: 2px solid #ffaa33; border-radius: 16px; display: flex; align-items: center; justify-content: center; backface-visibility: visible; font-size: 2rem; font-weight: bold; color: #ffd966; }
        .fish-front, .front { transform: translateZ(35px); }
        .fish-back, .back { transform: rotateY(180deg) translateZ(35px); }
        .fish-right, .right { transform: rotateY(90deg) translateZ(35px); }
        .fish-left, .left { transform: rotateY(-90deg) translateZ(35px); }
        .fish-top, .top { transform: rotateX(90deg) translateZ(35px); }
        .fish-bottom, .bottom { transform: rotateX(-90deg) translateZ(35px); }
        @media (max-width:480px){ .fish-dice-cube, .dice-cube{width:60px;height:60px;} .fish-front,.fish-back,.fish-right,.fish-left,.fish-top,.fish-bottom,.front,.back,.right,.left,.top,.bottom{transform:translateZ(30px);} .fish-dice-face{font-size:1.5rem;} }
        .pip { width: 10px; height: 10px; background: #ffaa33; border-radius: 50%; margin: 2px; }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 8px; left: 8px; }
        .pip-tr { position: absolute; top: 8px; right: 8px; }
        .pip-bl { position: absolute; bottom: 8px; left: 8px; }
        .pip-br { position: absolute; bottom: 8px; right: 8px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1,.pip-l2,.pip-l3 { position: absolute; left: 8px; }
        .pip-l1 { top: 8px; }
        .pip-l2 { top: 50%; transform: translateY(-50%); }
        .pip-l3 { bottom: 8px; }
        .pip-r1,.pip-r2,.pip-r3 { position: absolute; right: 8px; }
        .pip-r1 { top: 8px; }
        .pip-r2 { top: 50%; transform: translateY(-50%); }
        .pip-r3 { bottom: 8px; }
        .fish-pattern-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin: 10px 0; }
        .fish-bet-card { background: rgba(0,0,0,0.5); border-radius: 16px; padding: 6px 2px; text-align: center; border: 1px solid #ffaa33; }
        .bet-card { background: rgba(0,0,0,0.5); border-radius: 18px; padding: 6px; text-align: center; cursor: pointer; border: 1px solid #ffaa33; font-size: 0.8rem; }
        .points-grid, .trio-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(58px,1fr)); gap: 6px; margin: 10px 0; }
        .history-cell { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(255,170,51,0.2); font-weight: bold; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #2a1e12; border-radius: 36px; padding: 20px; max-width: 90%; max-height: 85%; overflow: auto; color: #ffd966; border: 1px solid #ffaa33; text-align: center; }
        .qr-img { width: 120px; height: 120px; object-fit: cover; border-radius: 16px; border: 2px solid #ffaa33; background: white; }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2a1a0a; color: #ffd966; padding: 6px 16px; border-radius: 40px; z-index: 2000; font-weight: bold; white-space: nowrap; border: 1px solid #ffaa33; font-size: 0.8rem; }
        .result-popup { position: fixed; bottom: 40%; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg,#ffaa33,#ff884d); color: #2a1a0a; padding: 10px 24px; border-radius: 50px; font-weight: bold; font-size: 1rem; z-index: 1500; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .admin-table th, .admin-table td { padding: 6px 4px; border-bottom: 1px solid #ffaa33; text-align: left; }
        .admin-btn { background: #ffaa33; border: none; border-radius: 20px; padding: 4px 8px; margin: 2px; color: #2a1a0a; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        @keyframes dtFlash { 0%{opacity:1;text-shadow:0 0 5px gold;} 50%{opacity:0.3;text-shadow:0 0 30px orange;} 100%{opacity:1;text-shadow:0 0 5px gold;} }
        @keyframes dtShake { 0%{transform:translateX(0);} 25%{transform:translateX(-8px) scale(1.05);} 50%{transform:translateX(8px) scale(1.1);} 75%{transform:translateX(-4px) scale(1.05);} 100%{transform:translateX(0) scale(1);} }
        .dt-flash { animation: dtFlash 0.3s 3; }
        .dt-animation-box { animation: dtShake 0.5s ease-in-out; }
        .niu-card { width: 55px; height: 75px; background: white; border-radius: 8px; display: inline-flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; font-size: 1rem; margin: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.3); flex-shrink: 0; color: #2a1a0a; }
        .niu-card[data-suit="♥"], .niu-card[data-suit="♦"] { color: #c33; }
        .niu-card[data-suit="♣"], .niu-card[data-suit="♠"] { color: #333; }
        .niu-hand { display: flex; flex-direction: row; flex-wrap: nowrap; overflow-x: auto; justify-content: center; gap: 8px; min-height: 100px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 20px; margin: 8px 0; }
        @media (max-width:480px){ .niu-card{width:48px;height:65px;font-size:0.85rem;} }
        body.light-mode { background: linear-gradient(145deg,#f5f0e6 0%,#e8dfd0 100%); color: #3a2a1a; }
        body.light-mode #app { background: rgba(245,240,230,0.85); border-color: rgba(180,130,60,0.5); }
        body.light-mode .auth-panel, body.light-mode .user-section, body.light-mode .game-card, body.light-mode .modal-content { background: rgba(250,245,235,0.9); border-color: #b8860b; color: #3a2a1a; }
        body.light-mode .auth-input, body.light-mode .fish-bet-card, body.light-mode .bet-card, body.light-mode .chip, body.light-mode .quick-bet, body.light-mode .exec-btn, body.light-mode .countdown-area { background: rgba(255,250,240,0.8); border-color: #c99a3b; color: #4a3a2a; }
        body.light-mode .chip.selected { background: linear-gradient(145deg,#ffcc77,#e6a822); color: #2a1a0a; }
        body.light-mode .fish-dice-face, body.light-mode .dice-face, body.light-mode .niu-card { background: #fffaf0; border-color: #c99a3b; color: #4a3a2a; }
        body.light-mode .toast-message { background: #fff9ef; color: #b8860b; border-color: #b8860b; }
        body.light-mode .result-popup { background: linear-gradient(135deg,#ffcc77,#e6a822); color: #2a1a0a; }
        body.light-mode .admin-table th, body.light-mode .admin-table td { border-bottom-color: #dbb45c; }
        body.light-mode .admin-btn { background: #e6a822; color: #2a1a0a; }
        body.light-mode .lang-switch, body.light-mode .theme-switch { background: #e6a822; color: #2a1a0a; }
        body.light-mode .charge-btn, body.light-mode .withdraw-btn { background: linear-gradient(135deg,#e6a822,#c9881c); color: #2a1a0a; }
        body.light-mode #userBalanceDisplay { background: linear-gradient(135deg,#c9881c,#a56b0f); -webkit-background-clip: text; background-clip: text; color: transparent; }
        body.light-mode #app > div:first-child { background: linear-gradient(135deg,#f5e6d3,#e8d8c0); border-bottom-color: #b8860b; }
        body.light-mode #app > div:first-child h1 { background: linear-gradient(135deg,#c9881c,#a56b0f); -webkit-background-clip: text; background-clip: text; color: transparent; }
        body.light-mode #app > div:first-child p { color: #b8860b; }
        body.light-mode #app > div:first-child div:last-child { background: #b8860b; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:3000; backdrop-filter:blur(4px); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app"></div>
<script>
    // 检查并初始化 Supabase 客户端（修复重复声明）
    if (typeof supabase === 'undefined') {
        alert("网络错误：Supabase SDK 加载失败，请刷新页面重试。");
        throw new Error("Supabase SDK not loaded");
    }
    const SUPABASE_URL = 'https://spjmfifgzzqjritklgxm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwam1maWZnenpxanJpdGtsZ3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDQ5MjIsImV4cCI6MjA5MjUyMDkyMn0.lzqdVmNEGHjkdr_Pbj23J_PrSEKnEmVkTAWEZ1Qa6QQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 双语
    const lang = {
        zh: { recharge:"💎 充值", withdraw:"💰 提现", service:"📞 客服", logout:"退出", balance:"余额", phoneOrEmail:"手机号 / 邮箱", password:"密码 (≥4位)", referralCode:"推荐码 (必填)", remember:"记住账号", login:"登录", register:"注册", referralNote:"推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100", getCode:"获取验证码", verifyCode:"验证码", registerNow:"注册新账户", gameFish:"🐟 金辉鱼虾蟹", gameDice:"🎲 金辉骰宝", gameDT:"🐉 金辉龙虎斗", game4:"🐮 金辉牛牛" },
        th: { recharge:"💎 เติมเงิน", withdraw:"💰 ถอนเงิน", service:"📞 บริการ", logout:"ออก", balance:"ยอดเงิน", phoneOrEmail:"เบอร์โทร / อีเมล", password:"รหัสผ่าน (≥4)", referralCode:"รหัสแนะนำ", remember:"จำฉัน", login:"เข้าสู่ระบบ", register:"สมัคร", referralNote:"รหัส: VIP666,888VIP,GOLD2025,LUCKY8,DICE100", getCode:"รับรหัส", verifyCode:"รหัสยืนยัน", registerNow:"สมัครสมาชิก", gameFish:"🐟 ปลาหมึกทอง", gameDice:"🎲 เซียนเต๋าทอง", gameDT:"🐉 มังกรเสือทอง", game4:"🐮 กระบือทอง" }
    };
    let currentLang = 'zh';
    function t(key) { return lang[currentLang][key] || lang.zh[key] || key; }

    let currentUser = null;
    let systemBankerBalance = 50000;
    let adjustFactor = 1.0;
    let validReferralCodes = ["VIP666","888VIP","GOLD2025","LUCKY8","DICE100"];

    function showToast(msg, isError=false) {
        let t = document.createElement('div');
        t.className = 'toast-message';
        t.innerText = msg;
        t.style.borderLeftColor = isError ? '#ff6b6b' : '#ffaa33';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    function showLoading(show, text="处理中...") {
        let existing = document.querySelector('.loading-overlay');
        if(show){
            if(existing) existing.remove();
            let div = document.createElement('div');
            div.className = 'loading-overlay';
            div.innerHTML = `<div style="background:#2a1e12; padding:16px 24px; border-radius:40px; border:1px solid #ffaa33;">⏳ ${text}</div>`;
            document.body.appendChild(div);
        } else if(existing) existing.remove();
    }

    async function loadSystemConfig() {
        try {
            const { data, error } = await supabaseClient.from('system_config').select('*');
            if(error) throw error;
            for(let cfg of data){
                if(cfg.key === 'systemBankerBalance') systemBankerBalance = cfg.value;
                if(cfg.key === 'adjustFactor') adjustFactor = cfg.value;
            }
        } catch(e){ console.warn(e); }
    }

    async function login(account, password) {
        try {
            const { data, error } = await supabaseClient.from('users').select('*').eq('account', account).maybeSingle();
            if(error) throw error;
            if(!data) return { success: false, msg: "账号不存在" };
            if(data.password === password){
                currentUser = data;
                return { success: true, msg: "登录成功" };
            }
            return { success: false, msg: "密码错误" };
        } catch(err){
            console.error(err);
            return { success: false, msg: "网络错误: " + (err.message || "请检查控制台") };
        }
    }
    async function register(account, password, code) {
        if(!validReferralCodes.includes(code)) return { success: false, msg: "推荐码无效" };
        try {
            const { data: existing } = await supabaseClient.from('users').select('account').eq('account', account).maybeSingle();
            if(existing) return { success: false, msg: "账号已存在" };
            const { error } = await supabaseClient.from('users').insert({ account, password, balance:0, register_time: new Date().toLocaleString(), records:[], result_history:[] });
            if(error) throw error;
            return { success: true, msg: "注册成功" };
        } catch(err){
            console.error(err);
            return { success: false, msg: "注册失败: " + (err.message || "请检查网络") };
        }
    }
    async function getUserBalance() {
        if(!currentUser) return 0;
        const { data, error } = await supabaseClient.from('users').select('balance').eq('id', currentUser.id).single();
        if(!error && data) { currentUser.balance = data.balance; return data.balance; }
        return currentUser.balance;
    }
    async function setUserBalance(amount) {
        if(!currentUser) return;
        await supabaseClient.from('users').update({ balance: amount }).eq('id', currentUser.id);
        currentUser.balance = amount;
        let span = document.getElementById("userBalanceDisplay");
        if(span) span.innerText = amount.toFixed(2);
    }
    async function addGameRecord(account, gameName, betInfo, result, winAmount, betAmount) {
        try {
            const { data: user } = await supabaseClient.from('users').select('records').eq('account', account).single();
            let records = user?.records || [];
            records.unshift({ time: new Date().toLocaleString(), game: gameName, bet: betInfo, result, win: winAmount, amount: betAmount });
            if(records.length > 100) records.pop();
            await supabaseClient.from('users').update({ records }).eq('account', account);
        } catch(e){ console.warn(e); }
    }

    async function recharge() {
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-content"><h3>💎 金辉充值</h3><div style="display:flex; gap:15px; margin:12px 0;"><div><img class="qr-img" alt="微信收款码" src="mmexport1776247819360.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%BE%AE%E4%BF%A1%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'"><p>微信支付</p></div><div><img class="qr-img" alt="支付宝收款码" src="mmexport1776247823872.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E6%94%AF%E4%BB%98%E5%AE%9D%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'"><p>支付宝支付</p></div></div><div style="background:#1a1008; border-radius:18px; padding:12px;"><p>请扫码支付后，填写以下信息提交审核</p></div><input type="number" id="rechargeAmount" placeholder="充值金额（元）" style="width:100%; padding:8px; margin:8px 0; border-radius:40px;"><input type="text" id="rechargeOrderNo" placeholder="支付单号（选填）" style="width:100%; padding:8px; margin:8px 0; border-radius:40px;"><textarea id="rechargeRemark" placeholder="备注" rows="2" style="width:100%; padding:8px; margin:8px 0; border-radius:20px;"></textarea><button id="submitRechargeBtn" class="auth-btn">提交充值申请</button><button id="cancelRechargeBtn" class="auth-btn" style="margin-top:8px;">取消</button></div>`;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#submitRechargeBtn').onclick = async () => {
            let amount = parseFloat(modalDiv.querySelector('#rechargeAmount').value);
            if(isNaN(amount)||amount<=0){ showToast("金额无效"); return; }
            let orderNo = modalDiv.querySelector('#rechargeOrderNo').value.trim() || '无';
            let remark = modalDiv.querySelector('#rechargeRemark').value.trim();
            await supabaseClient.from('pending_recharges').insert({ account: currentUser.account, amount, order_no: orderNo, remark, time: new Date().toLocaleString(), status:'pending' });
            showToast(`充值申请已提交！金额：${amount}元，等待管理员审核。`);
            modalDiv.remove();
        };
        modalDiv.querySelector('#cancelRechargeBtn').onclick = () => modalDiv.remove();
    }
    async function withdraw() {
        let bal = await getUserBalance();
        if(bal<=0){ showToast("余额不足"); return; }
        let amount = parseFloat(prompt("提现金额 (元)", "10"));

        function shuffle(deck){ for(let i=deck.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; } return deck; }
        function calcNiuType(cards){ let pts=cards.map(c=>c.points), sum=pts.reduce((a,b)=>a+b,0); let hasNiu=false,niuVal=0; for(let i=0;i<5;i++) for(let j=i+1;j<5;j++) for(let k=j+1;k<5;k++){ let s=pts[i]+pts[j]+pts[k]; if(s%10===0){ let rest=sum-s; niuVal=rest%10; hasNiu=true; break; } if(hasNiu) break; if(hasNiu) break; } if(!hasNiu) return {type:'无牛',multiplier:0,display:'无牛'}; if(niuVal===0){ let allTen=pts.every(p=>p===10); if(allTen) return {type:'五花牛',multiplier:5,display:'五花牛'}; let cnt={}; pts.forEach(p=>cnt[p]=(cnt[p]||0)+1); if(Object.values(cnt).some(c=>c===4)) return {type:'四炸',multiplier:8,display:'四炸'}; return {type:'牛牛',multiplier:3,display:'牛牛'}; } return {type:`牛${niuVal}`,multiplier:1,display:`牛${niuVal}`}; }
        container.innerHTML = `<div class="game-card"><div id="bankerHand" class="niu-hand">🃟 🃟 🃟 🃟 🃟</div><div id="bankerType">?</div><div id="playerHand" class="niu-hand">🃟 🃟 🃟 🃟 🃟</div><div id="playerType">?</div><div class="countdown-area">⏱️ 下注 <span id="niuCountdownNum">25</span> s</div><div><span>🎲 本局中奖: <span id="niuWinAmount">0</span></span><span>📊 盈亏: <span id="niuProfitLoss">0</span></span></div><div id="niuChips"><span class="chip" data-chip="10">10</span><span class="chip" data-chip="20">20</span><span class="chip selected" data-chip="50">50</span><span class="chip" data-chip="100">100</span><span class="chip" data-chip="500">500</span></div><div style="display:flex;gap:8px;"><div class="bet-card" data-bet="PLAYER">闲家赢<br><span id="bet_PLAYER">0</span></div><div class="bet-card" data-bet="BANKER">庄家赢<br><span id="bet_BANKER">0</span></div><div class="bet-card" data-bet="TIE">和<br><span id="bet_TIE">0</span></div></div><div style="display:flex;gap:8px;"><div class="bet-card" data-bet="NIU_NIU">闲家牛牛<br><span id="bet_NIU_NIU">0</span></div><div class="bet-card" data-bet="WU_HUA">闲家五花牛<br><span id="bet_WU_HUA">0</span></div></div><div><button id="niuClearBtn" class="exec-btn">清空</button><button id="niuRepeatBtn" class="exec-btn">续押</button><button id="niuRefreshBtn" class="exec-btn">刷新</button><button id="niuDealBtn" class="exec-btn main-go">🐮 发牌</button></div><div>💰 余额: <span id="niuBalance">0</span> 总押注: <span id="niuTotalBet">0</span></div><div id="niuResultMsg"></div></div>`;
        let bets={ PLAYER:0, BANKER:0, TIE:0, NIU_NIU:0, WU_HUA:0 };
        let selectedChip=50, currentBalance=0, isRolling=false, countdownTimer=null, lastBetSnapshot=null, remainingSec=25;
        async function updateUI(){ for(let k in bets){ let sp=document.getElementById(`bet_${k}`); if(sp) sp.innerText=bets[k]; } let total=Object.values(bets).reduce((a,b)=>a+b,0); document.getElementById('niuTotalBet').innerText=total; let bal=await getUserBalance(); document.getElementById('niuBalance').innerText=bal.toFixed(2); currentBalance=bal; }
        function saveLastBet(){ lastBetSnapshot=JSON.parse(JSON.stringify(bets)); }
        async function clearAllBets(){ let total=Object.values(bets).reduce((a,b)=>a+b,0); if(total>0){ let bal=await getUserBalance(); await setUserBalance(bal+total); } for(let k in bets) bets[k]=0; updateUI(); saveLastBet(); showToast("已清空押注"); }
        async function repeatLastBet(){ if(!lastBetSnapshot) return showToast("无续押记录"); let need=Object.values(lastBetSnapshot).reduce((a,b)=>a+b,0); let bal=await getUserBalance(); if(need>bal) return showToast("余额不足"); let oldTotal=Object.values(bets).reduce((a,b)=>a+b,0); if(oldTotal>0) await setUserBalance(bal+oldTotal); for(let k in bets) bets[k]=0; for(let k in lastBetSnapshot) bets[k]=lastBetSnapshot[k]; await setUserBalance(await getUserBalance()-need); updateUI(); showToast("续押成功"); }
        async function addBet(betType){ if(isRolling) return showToast("开奖中"); if(selectedChip<=0) return showToast("选筹码"); let bal=await getUserBalance(); if(selectedChip>bal) return showToast("余额不足"); await setUserBalance(bal-selectedChip); bets[betType]+=selectedChip; updateUI(); saveLastBet(); showToast(`+${selectedChip} ${betType}`); }
        async function revealCards(handDiv,cards,delay=150){ handDiv.innerHTML=''; for(let card of cards){ let cd=document.createElement('div'); cd.className='niu-card'; cd.setAttribute('data-suit',card.suit); cd.style.transform='rotateY(90deg)'; cd.style.transition='transform 0.2s'; cd.innerText=card.value+card.suit; handDiv.appendChild(cd); setTimeout(()=>{ cd.style.transform='rotateY(0deg)'; },30); await new Promise(r=>setTimeout(r,delay)); } }
        async function startGame(){ if(isRolling) return; let totalBet=Object.values(bets).reduce((a,b)=>a+b,0); if(totalBet===0) return showToast("请先下注"); let bal=await getUserBalance(); if(totalBet>bal) return showToast("余额不足"); isRolling=true; if(countdownTimer) clearInterval(countdownTimer); let deck=shuffle(createDeck()); let playerCards=deck.slice(0,5), bankerCards=deck.slice(5,10); let playerType=calcNiuType(playerCards), bankerType=calcNiuType(bankerCards); await revealCards(document.getElementById('playerHand'),playerCards,120); await revealCards(document.getElementById('bankerHand'),bankerCards,120); document.getElementById('playerType').innerHTML=`${playerType.display} ${playerType.multiplier>1?`(赔率${playerType.multiplier})`:''}`; document.getElementById('bankerType').innerHTML=`${bankerType.display} ${bankerType.multiplier>1?`(赔率${bankerType.multiplier})`:''}`; let result='', winAmount=0; let pScore=playerType.multiplier===0?0:(playerType.multiplier===1?1:playerType.multiplier); let bScore=bankerType.multiplier===0?0:(bankerType.multiplier===1?1:bankerType.multiplier); if(pScore>bScore) result='PLAYER'; else if(bScore>pScore) result='BANKER'; else result='TIE'; if(result==='PLAYER'&&bets.PLAYER>0) winAmount+=bets.PLAYER*2; if(result==='BANKER'&&bets.BANKER>0) winAmount+=bets.BANKER*2; if(result==='TIE'&&bets.TIE>0) winAmount+=bets.TIE*8; if(playerType.type==='牛牛'&&bets.NIU_NIU>0) winAmount+=bets.NIU_NIU*(playerType.multiplier+1); if(playerType.type==='五花牛'&&bets.WU_HUA>0) winAmount+=bets.WU_HUA*(playerType.multiplier+1); winAmount*=adjustFactor; let profit=winAmount-totalBet; await setUserBalance(bal+winAmount); document.getElementById('niuWinAmount').innerText=winAmount.toFixed(2); document.getElementById('niuProfitLoss').innerText=profit.toFixed(2); document.getElementById('niuResultMsg').innerHTML=`${playerType.display} vs ${bankerType.display}<br>${result==='PLAYER'?'闲家胜':(result==='BANKER'?'庄家胜':'和局')} ${winAmount>0?` 赢得 ${winAmount.toFixed(2)}`:''}`; await addGameRecord(currentUser.account,'金辉牛牛',`总注${totalBet}`,`${playerType.display} vs ${bankerType.display}`,winAmount,totalBet); for(let k in bets) bets[k]=0; updateUI(); saveLastBet(); isRolling=false; startCountdown(25); }
        function startCountdown(sec){ if(countdownTimer) clearInterval(countdownTimer); remainingSec=sec; let cd=document.getElementById('niuCountdownNum'); cd.innerText=remainingSec; countdownTimer=setInterval(()=>{ if(remainingSec<=1){ clearInterval(countdownTimer); countdownTimer=null; if(!isRolling) startGame(); }else{ remainingSec--; cd.innerText=remainingSec; } },1000); }
        async function refreshBalance(){ await updateUI(); showToast("刷新"); }
        document.querySelectorAll('#niuChips .chip').forEach(c=>{ c.onclick=function(){ selectedChip=parseInt(this.dataset.chip); document.querySelectorAll('#niuChips .chip').forEach(cc=>cc.classList.remove('selected')); this.classList.add('selected'); }; });
        document.querySelectorAll('.bet-card[data-bet]').forEach(c=>{ c.onclick=()=>addBet(c.dataset.bet); });
        document.getElementById('niuClearBtn').onclick=clearAllBets;
        document.getElementById('niuRepeatBtn').onclick=repeatLastBet;
        document.getElementById('niuRefreshBtn').onclick=refreshBalance;
        document.getElementById('niuDealBtn').onclick=()=>{ if(!isRolling) startGame(); };
        updateUI(); startCountdown(25); saveLastBet();
        niuNiuDestroy=()=>{ if(countdownTimer) clearInterval(countdownTimer); container.innerHTML=''; };
        return niuNiuDestroy;
    }

    // 游戏大厅渲染
    async function renderGameLobby() {
        if (!currentUser) { renderAuthUI(); return; }
        const balance = await getUserBalance();
        document.getElementById('app').innerHTML = `
            <div style="text-align:center; padding:16px 12px 8px; background:linear-gradient(135deg,#2a1e12,#1a120b); border-bottom:2px solid #ffaa33;">
                <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
                    <span style="font-size:2rem;">🎰</span>
                    <div>
                        <h1 style="font-size:1.6rem; font-weight:800; background:linear-gradient(135deg,#ffd966,#ffaa33); -webkit-background-clip:text; background-clip:text; color:transparent;">金辉娱乐城</h1>
                        <p style="font-size:0.65rem; color:#ffaa33;">JINHUI CASINO · 诚信公平</p>
                    </div>
                    <span style="font-size:2rem;">🎲</span>
                </div>
                <div style="height:2px; width:80px; background:#ffaa33; margin:8px auto 0;"></div>
            </div>
            <div class="user-section">
                <div class="user-info-row">
                    <span>📱 ${currentUser.account} | 💰 ${t('balance')}: <span id="userBalanceDisplay">${balance.toFixed(2)}</span></span>
                    <div class="btn-group">
                        <button id="serviceBtn" class="btn-sm">${t('service')}</button>
                        <button id="logoutBtn" class="btn-sm">${t('logout')}</button>
                        <button id="langSwitchBtn" class="lang-switch">ภาษาไทย</button>
                        <button id="themeToggleBtn" class="theme-switch">🌙 夜间</button>
                        <button id="changePwdBtn" class="btn-sm">🔑 修改密码</button>
                    </div>
                </div>
                <div style="margin-top:8px;">
                    <button id="rechargeBtn" class="charge-btn">${t('recharge')}</button>
                    <button id="withdrawBtn" class="withdraw-btn">${t('withdraw')}</button>
                </div>
            </div>
            <div class="game-nav">
                <button class="game-tab active" data-game="fish">${t('gameFish')}</button>
                <button class="game-tab" data-game="dice">${t('gameDice')}</button>
                <button class="game-tab" data-game="dragonTiger">${t('gameDT')}</button>
                <button class="game-tab" data-game="game4">${t('game4')}</button>
            </div>
            <div class="game-container" id="gamePanel"></div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;
        document.getElementById('langSwitchBtn').onclick = () => { currentLang = currentLang === 'zh' ? 'th' : 'zh'; renderGameLobby(); };
        document.getElementById('changePwdBtn').onclick = () => {
            let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
            modalDiv.innerHTML = `<div class="modal-content"><h3>🔐 修改密码</h3><input type="password" id="oldPwd" placeholder="旧密码"><input type="password" id="newPwd" placeholder="新密码"><input type="password" id="confirmPwd" placeholder="确认新密码"><button id="confirmChangeBtn" class="auth-btn">确认</button><button id="cancelChangeBtn" class="auth-btn">取消</button></div>`;
            document.body.appendChild(modalDiv);
            modalDiv.querySelector('#confirmChangeBtn').onclick = async () => {
                let old = modalDiv.querySelector('#oldPwd').value, newp = modalDiv.querySelector('#newPwd').value, conf = modalDiv.querySelector('#confirmPwd').value;
                if(!old||!newp||!conf) return showToast("请填写完整");
                if(newp!==conf) return showToast("两次密码不一致");
                if(newp.length<4) return showToast("密码至少4位");
                if(currentUser.password!==old) return showToast("旧密码错误");
                let { error } = await supabaseClient.from('users').update({ password: newp }).eq('id', currentUser.id);
                if(!error){ showToast("修改成功，请重新登录"); modalDiv.remove(); currentUser=null; renderAuthUI(); }
                else showToast("修改失败");
            };
            modalDiv.querySelector('#cancelChangeBtn').onclick = () => modalDiv.remove();
        };
        const themeBtn = document.getElementById('themeToggleBtn');
        if(localStorage.getItem('neon_theme')==='light'){ document.body.classList.add('light-mode'); themeBtn.innerHTML='☀️ 日间'; }
        themeBtn.onclick = () => { document.body.classList.toggle('light-mode'); let isLight=document.body.classList.contains('light-mode'); localStorage.setItem('neon_theme',isLight?'light':'dark'); themeBtn.innerHTML=isLight?'☀️ 日间':'🌙 夜间'; };
        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const inits = { fish: initFishGame, dice: initDiceGame, dragonTiger: initDragonTigerGame, game4: initGame4 };
        async function switchGame(id){ if(currentDestroy) currentDestroy(); gamePanel.innerHTML = ''; currentDestroy = await inits[id](gamePanel); }
        document.querySelectorAll('.game-tab').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.game-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
        switchGame('fish');
        let secretClickCount=0, secretTimer=null;
        const titleEl = document.querySelector('#app > div:first-child h1');
        if(titleEl) titleEl.addEventListener('click',()=>{ secretClickCount++; if(secretTimer) clearTimeout(secretTimer); secretTimer=setTimeout(()=>{ secretClickCount=0; },1000); if(secretClickCount>=5){ secretClickCount=0; openSecretStatsModal(); } });
        let adminClickCount=0;
        document.getElementById('userBalanceDisplay').addEventListener('click',()=>{ adminClickCount++; setTimeout(()=>{ adminClickCount=0; },1000); if(adminClickCount>=3){ adminClickCount=0; openAdminModal(); } });
    }

    async function openSecretStatsModal() {
        let { data: allUsers } = await supabaseClient.from('users').select('*');
        if(!allUsers) return;
        let totalBalance=0, totalBet=0, totalWin=0;
        for(let u of allUsers){
            totalBalance+=u.balance;
            let rec=u.records||[];
            for(let r of rec){ totalBet+=r.amount; if(r.win>0) totalWin+=r.win; }
        }
        let net=totalWin-totalBet;
        let modalDiv=document.createElement('div'); modalDiv.className='modal';
        modalDiv.innerHTML=`<div class="modal-content"><h3>📊 超级统计面板</h3><div>💰 总余额:${totalBalance.toFixed(2)}</div><div>🎲 总投注:${totalBet.toFixed(2)}</div><div>🏆 总赢额:${totalWin.toFixed(2)}</div><div>📊 平台净盈利:${net.toFixed(2)}</div><div style="max-height:300px;overflow:auto;"><table class="admin-table"><tr><th>账号</th><th>余额</th><th>总投注</th><th>总赢额</th><th>净盈利</th></tr>${allUsers.map(u=>{ let bet=0,win=0; (u.records||[]).forEach(r=>{ bet+=r.amount; if(r.win>0) win+=r.win; }); let profit=win-bet; return `<tr><td>${u.account}</td><td>${u.balance.toFixed(2)}</td><td>${bet.toFixed(2)}</td><td>${win.toFixed(2)}</td><td style="color:${profit>=0?'#0f0':'#f0f'}">${profit.toFixed(2)}</td>`; }).join('')}</table></div><button id="closeStats" class="auth-btn">关闭</button></div>`;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#closeStats').onclick=()=>modalDiv.remove();
    }

    async function renderAuthUI() {
        const savedAcc = localStorage.getItem('neon_saved_account') || '';
        const savedPwd = localStorage.getItem('neon_saved_password') || '';
        const remChecked = localStorage.getItem('neon_remember_me') === 'true';
        document.getElementById('app').innerHTML = `<div class="auth-panel"><h2>🏆 金辉娱乐城</h2><div><input type="text" id="loginAccount" class="auth-input" placeholder="${t('phoneOrEmail')}" value="${savedAcc}"><input type="password" id="loginPassword" class="auth-input" placeholder="${t('password')}" value="${savedPwd}"><div class="flex-row"><input type="checkbox" id="rememberCheckbox" ${remChecked ? 'checked' : ''}> <label>${t('remember')}</label></div><button id="loginBtn" class="auth-btn">${t('login')}</button></div><hr><h3>${t('registerNow')}</h3><input type="text" id="regAccount" class="auth-input" placeholder="${t('phoneOrEmail')}"><div class="flex-row"><input type="text" id="regCode" class="auth-input" placeholder="${t('verifyCode')}"><button id="getCodeBtn" class="code-btn">${t('getCode')}</button></div><input type="password" id="regPassword" class="auth-input" placeholder="${t('password')}"><input type="text" id="regReferral" class="auth-input" placeholder="${t('referralCode')}"><button id="registerBtn" class="auth-btn">${t('register')}</button><div class="auth-note">${t('referralNote')}</div></div>`;
        document.getElementById('loginBtn').onclick = async () => {
            let acc = document.getElementById('loginAccount').value.trim();
            let pwd = document.getElementById('loginPassword').value;
            let rem = document.getElementById('rememberCheckbox').checked;
            if (!acc || !pwd) { showToast("请填写账号和密码", true); return; }
            showLoading(true, "登录中...");
            let res = await login(acc, pwd);
            showLoading(false);
            if (res.success) {
                if (rem) {
                    localStorage.setItem('neon_saved_account', acc);
                    localStorage.setItem('neon_saved_password', pwd);
                    localStorage.setItem('neon_remember_me', 'true');
                } else {
                    localStorage.removeItem('neon_saved_account');
                    localStorage.removeItem('neon_saved_password');
                    localStorage.setItem('neon_remember_me', 'false');
                }
                showToast(`欢迎 ${acc}`);
                renderGameLobby();
            } else {
                showToast(res.msg, true);
            }
        };
        document.getElementById('getCodeBtn').onclick = () => {
            let acc = document.getElementById('regAccount').value.trim();
            if (!acc) { showToast("请填写手机号或邮箱", true); return; }
            let code = Math.floor(100000 + Math.random() * 900000);
            window.tempCode = { acc, code, expire: Date.now() + 5*60*1000 };
            alert(`【验证码】您的验证码是：${code}，5分钟内有效。`);
            showToast("验证码已发送");
        };
        document.getElementById('registerBtn').onclick = async () => {
            let acc = document.getElementById('regAccount').value.trim();
            let code = document.getElementById('regCode').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let ref = document.getElementById('regReferral').value.trim().toUpperCase();
            if (!acc || !code || !pwd || !ref) { showToast("请填写完整信息", true); return; }
            if (!validReferralCodes.includes(ref)) { showToast("推荐码无效", true); return; }
            if (!window.tempCode || window.tempCode.acc !== acc || window.tempCode.code != code || Date.now() > window.tempCode.expire) { showToast("验证码错误或已过期", true); return; }
            if (pwd.length < 4) { showToast("密码至少4位", true); return; }
            showLoading(true, "注册中...");
            let res = await register(acc, pwd, ref);
            showLoading(false);
            if (res.success) {
                showToast("注册成功！请登录");
                document.getElementById('regAccount').value = '';
                document.getElementById('regCode').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regReferral').value = '';
            } else {
                showToast(res.msg, true);
            }
        };
    }

    // 启动
    (async () => {
        await loadSystemConfig();
        renderAuthUI();
    })();
</script>
