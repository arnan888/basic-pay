<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_PRO_V6</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { 
            background: #121212; 
            background-image: linear-gradient(#1a1a1a 1px, transparent 1px), linear-gradient(90deg, #1a1a1a 1px, transparent 1px);
            background-size: 20px 20px;
            color:#FFF; font-family: "Segoe UI", sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column;
        }

        /* 顶部看板 */
        .header-dash { display:grid; grid-template-columns: 1fr 1fr; background:#000; height: 80px; border-bottom:1px solid #333; }
        .dash-node { display:flex; flex-direction:column; justify-content:center; align-items:center; border-right:1px solid #222; }
        .node-label { font-size:10px; color:#666; text-transform:uppercase; margin-bottom:4px; }
        .node-val { color:#F00; font-size:22px; font-weight:900; font-family:monospace; }

        /* 状态条 */
        .status-bar { background:#000; height:24px; display:flex; align-items:center; padding:0 12px; font-size:10px; color:#0f0; justify-content:space-between; border-bottom:1px solid #222; }

        .core-section { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:15px; }

        /* 资产看板 */
        .balance-card { 
            width:100%; background:linear-gradient(145deg, #0a0a0a, #151515); 
            border:1px solid #333; border-radius:12px; padding:20px; text-align:center; margin-bottom:20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .bal-val { font-size:65px; font-weight:900; color:#F00; text-shadow:0 0 20px rgba(255,0,0,0.2); }

        /* --- 转盘增强区 --- */
        .wheel-module { 
            position:relative; width:270px; height:270px; 
            background:#1a1a1a; border-radius:15px; border:1px solid #333;
            display:flex; align-items:center; justify-content:center;
            box-shadow: inset 0 0 20px #000;
        }
        /* 增加外圈呼吸灯 */
        .wheel-module::after {
            content:''; position:absolute; width:100%; height:100%;
            border-radius:15px; box-shadow: 0 0 15px rgba(255,0,0,0.1);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.6; } 100% { opacity: 0.3; } }

        .wheel-outer {
            width: 240px; height: 240px; border-radius: 50%;
            border: 4px solid #222; position: relative;
            background: #0a0a0a; overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }
        /* 转盘颜色分区 */
        .wheel-inner-bg {
            position: absolute; width: 100%; height: 100%;
            background: conic-gradient(
                #111 0deg 45deg, #1a1a1a 45deg 90deg, 
                #200 90deg 135deg, #300 135deg 180deg, 
                #200 180deg 225deg, #1a1a1a 225deg 270deg,
                #111 270deg 315deg, #111 315deg 360deg
            );
            opacity: 0.8;
        }
        .pointer-line { 
            position:absolute; top:10px; left:50%; transform:translateX(-50%); 
            width:3px; height:35px; background:#F00; z-index:100; box-shadow:0 0 10px #F00;
        }
        .slot-val { 
            position:absolute; width:100%; height:100%; text-align:center; 
            padding-top:20px; font-weight:900; font-size:14px; color:#888;
        }
        /* 高倍率颜色加亮 */
        .high-m { color: #F00 !important; text-shadow: 0 0 5px #F00; }

        /* 操作台 */
        .console { width:100%; background:#0a0a0a; border-top:1px solid #333; padding:20px 15px 100px 15px; }
        .main-row { display:flex; gap:12px; margin-bottom:15px; }
        .adj { width:55px; height:55px; background:#222; border:1px solid #444; color:#FFF; font-size:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; }
        .exec { flex:1; background:#F00; border:none; color:#FFF; font-size:22px; font-weight:900; border-radius:6px; letter-spacing:2px; }
        .tech-row { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
        .mode-b { padding:12px; background:#1a1a1a; border:1px solid #333; color:#666; font-size:11px; font-weight:bold; text-align:center; border-radius:4px; }
        .mode-b.on { border-color:#F00; color:#F00; }

        /* 底部导航 */
        .nav { position:fixed; bottom:0; width:100%; height:75px; background:#000; border-top:1px solid #333; display:grid; grid-template-columns: repeat(4, 1fr); }
        .nav-n { display:flex; flex-direction:column; align-items:center; justify-content:center; color:#444; font-size:11px; font-weight:bold; }
        .nav-n.act { color:#F00; }
    </style>
</head>
<body>

    <div class="header-dash">
        <div class="dash-node">
            <div class="node-label">Settlement In</div>
            <div id="st_in" class="node-val">0.5</div>
        </div>
        <div class="dash-node">
            <div class="node-label">Liquidity Out</div>
            <div id="st_out" class="node-val">0.8</div>
        </div>
    </div>

    <div class="status-bar">
        <span>● SYSTEM_READY</span>
        <span>RTP_LOCKED: 90.00%</span>
    </div>

    <div class="core-section">
        <div class="balance-card">
            <div class="node-label">Available Balance (USDT)</div>
            <div class="bal-val" id="ui_bal">100.3</div>
            <div style="font-size:12px; color:#666;">UNIT_BET: <span id="ui_bet" style="color:#F00">0.5</span></div>
        </div>

        <div class="wheel-module">
            <div class="pointer-line"></div>
            <div id="ui_wheel" class="wheel-outer">
                <div class="wheel-inner-bg"></div>
                <!-- 倍率分布：0X暗，高倍红 -->
                <div class="slot-val" style="transform:rotate(0deg)">1.5X</div>
                <div class="slot-val" style="transform:rotate(45deg); opacity:0.3;">0X</div>
                <div class="slot-val" style="transform:rotate(90deg); color:#AAA;">120X</div>
                <div class="slot-val high-m" style="transform:rotate(135deg)">500X</div>
                <div class="slot-val high-m" style="transform:rotate(180deg)">X88</div>
                <div class="slot-val" style="transform:rotate(225deg); color:#AAA;">50X</div>
                <div class="slot-val" style="transform:rotate(270deg); color:#AAA;">20X</div>
                <div class="slot-val" style="transform:rotate(315deg); opacity:0.3;">0X</div>
            </div>
        </div>
    </div>

    <div class="console">
        <div class="main-row">
            <div class="adj" onclick="changeBet(-0.5)">－</div>
            <button id="go_btn" class="exec" onclick="go()">EXECUTE</button>
            <div class="adj" onclick="changeBet(0.5)">＋</div>
        </div>
        <div class="tech-row">
            <div id="auto_btn" class="mode-b" onclick="toggleAuto()">AUTO PILOT: OFF</div>
            <div id="speed_btn" class="mode-b" onclick="toggleSpeed()">BOOST MODE: 1X</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-n">MARKET</div>
        <div class="nav-n">ASSETS</div>
        <div class="nav-n">HISTORY</div>
        <div class="nav-n act">QUANT</div>
    </div>

    <script>
        let balance = 100.3, bet = 0.5, totalIn = 0.5, totalOut = 0.8, rot = 0, busy = false;
        let isAuto = false, speedMode = 1;

        function toggleAuto() {
            isAuto = !isAuto;
            const btn = document.getElementById('auto_btn');
            btn.innerText = `AUTO PILOT: ${isAuto ? 'ON' : 'OFF'}`;
            btn.className = isAuto ? 'mode-b on' : 'mode-b';
            if(isAuto && !busy) go();
        }

        function toggleSpeed() {
            speedMode = (speedMode === 1) ? 2 : 1;
            const btn = document.getElementById('speed_btn');
            btn.innerText = `BOOST MODE: ${speedMode === 1 ? '1X' : '2X'}`;
            btn.className = speedMode === 2 ? 'mode-b on' : 'mode-b';
            document.getElementById('ui_wheel').style.transitionDuration = speedMode === 1 ? '5s' : '1.2s';
        }

        function changeBet(val) {
            if (busy) return;
            let n = bet + val;
            if (n >= 0.5) { bet = n; document.getElementById('ui_bet').innerText = bet.toFixed(1); }
        }

        function animateWin(prize) {
            const balEl = document.getElementById('ui_bal');
            let currentWin = 0.1;
            const duration = 1200;
            const increment = prize / (duration / 30);
            const timer = setInterval(() => {
                currentWin += increment;
                if (currentWin >= prize) {
                    currentWin = prize;
                    clearInterval(timer);
                    if(isAuto) setTimeout(go, 800);
                }
                const tempBal = (balance - prize) + currentWin;
                balEl.innerText = tempBal.toFixed(1);
            }, 30);
        }

        function go() {
            if (busy || balance < bet) {
                isAuto = false;
                document.getElementById('auto_btn').className = 'mode-b';
                document.getElementById('auto_btn').innerText = 'AUTO PILOT: OFF';
                return;
            }
            busy = true;
            document.getElementById('go_btn').style.background = "#500";

            const r = Math.floor(Math.random() * 1000);
            let idx = (r < 480) ? 1 : (r < 950 ? 0 : (r < 995 ? 7 : (r < 998 ? 5 : (r < 2 ? 3 : 2))));

            const targetAngle = idx * 45;
            rot += (Math.floor(Math.random() * 5) + 12) * 360 + (360 - targetAngle - (rot % 360)) + 360;
            document.getElementById('ui_wheel').style.transform = `rotate(${rot}deg)`;

            const waitTime = speedMode === 1 ? 5000 : 1200;

            setTimeout(() => {
                const multis = [1.5, 0, 120, 500, 88, 50, 20, 0];
                const prize = multis[idx] * bet;
                balance = (balance - bet) + prize;
                totalIn += bet; totalOut += prize;
                document.getElementById('st_in').innerText = totalIn.toFixed(1);
                document.getElementById('st_out').innerText = totalOut.toFixed(1);

                if (prize > 0) animateWin(prize);
                else {
                    document.getElementById('ui_bal').innerText = balance.toFixed(1);
                    if(isAuto) setTimeout(go, 1000);
                }
                setTimeout(() => { busy = false; document.getElementById('go_btn').style.background = "#F00"; }, 1500);
            }, waitTime);
        }
    </script>
</body>
</html>
