<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>FINAL_SURVIVAL_V5000</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --neon: #00ff88; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        /* 🌌 静态暗红星空背景：省电、省内存、绝不黑屏 */
        body { 
            background: radial-gradient(circle at center, #300000 0%, #000000 100%); 
            color: #fff; font-family: sans-serif; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-around; overflow: hidden; 
        }
        
        /* 🏆 黄金余额框 */
        .header { border: 3px solid var(--gold); padding: 10px 50px; border-radius: 50px; box-shadow: 0 0 20px var(--gold); background: rgba(0,0,0,0.8); }
        #balance { font-size: 40px; color: var(--gold); font-weight: bold; }

        /* 🎡 实体大转盘 */
        .stage { position: relative; width: 300px; height: 300px; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid red; z-index: 50; }
        
        .wheel { 
            width: 100%; height: 100%; border: 8px solid #444; border-radius: 50%; 
            position: relative; overflow: hidden; background: #111;
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            box-shadow: 0 0 40px rgba(255,0,0,0.3);
        }
        /* 转盘线条 */
        .line { position: absolute; width: 2px; height: 100%; background: #333; left: 50%; }
        /* 8个图案 */
        .symbol { position: absolute; width: 50px; height: 50px; font-size: 35px; left: 50%; top: 50%; margin: -25px; display: flex; align-items: center; justify-content: center; }
        .s1 { transform: rotate(22.5deg) translateY(-100px); } .s2 { transform: rotate(67.5deg) translateY(-100px); }
        .s3 { transform: rotate(112.5deg) translateY(-100px); } .s4 { transform: rotate(157.5deg) translateY(-100px); }
        .s5 { transform: rotate(202.5deg) translateY(-100px); } .s6 { transform: rotate(247.5deg) translateY(-100px); }
        .s7 { transform: rotate(292.5deg) translateY(-100px); } .s8 { transform: rotate(337.5deg) translateY(-100px); }

        .spin-btn { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 85px; height: 85px; border-radius: 50%; background: var(--neon); 
            border: 4px solid #004422; font-weight: 900; z-index: 100; box-shadow: 0 0 20px var(--neon); 
        }

        /* 🎮 注码控制 */
        .footer { width: 95%; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 20px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .btn-mini { width: 45px; height: 45px; background: #333; color: #fff; border: none; border-radius: 10px; font-size: 24px; }
    </style>
</head>
<body>
    <audio id="bgm" src="https://www.soundjay.com/free-music/iron-man-1.mp3" loop>
    <audio id="win-s" src="https://www.soundjay.com/misc/coins-spilled-1.mp3">

    <div class="header"><div id="balance">加载中...</div></div>

    <div class="stage">
        <div class="pointer"></div>
        <div id="wheel" class="wheel">
            <div class="line" style="transform: rotate(0deg)"></div><div class="line" style="transform: rotate(45deg)"></div><div class="line" style="transform: rotate(90deg)"></div><div class="line" style="transform: rotate(135deg)"></div>
            <div class="symbol s1">🦁</div><div class="symbol s2">🐯</div><div class="symbol s3">💎</div><div class="symbol s4">💰</div>
            <div class="symbol s5">👑</div><div class="symbol s6">7️⃣</div><div class="symbol s7">🦅</div><div class="symbol s8">🎰</div>
        </div>
        <button class="spin-btn" id="btn" onclick="start()">SPIN</button>
    </div>

    <div class="footer">
        <div>
            <button class="btn-mini" onclick="change(-100)">-</button>
            <span id="bet" style="font-size:28px; color:var(--gold); margin: 0 10px;">100</span>
            <button class="btn-mini" onclick="change(100)">+</button>
        </div>
        <div id="win" style="color:var(--neon); font-size:28px; font-weight:bold;">WIN: 0</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        let balance = parseInt(urlParams.get('balance')) || 88888;
        let bet = 100; let rot = 0; let musicStarted = false;

        function update() { document.getElementById('balance').innerText = balance.toLocaleString(); }
        update();

        function change(v) { if(bet+v >= 100){ bet+=v; document.getElementById('bet').innerText=bet; tg.HapticFeedback.impactOccurred('light'); } }

        function start() {
            if(balance < bet) { tg.showAlert("余额不足"); return; }
            if(!musicStarted) { document.getElementById('bgm').play(); musicStarted = true; }
            
            balance -= bet; update();
            document.getElementById('win').innerText = "WIN: 0";
            
            const wheel = document.getElementById('wheel');
            const btn = document.getElementById('btn');
            btn.disabled = true;

            rot += 1800 + Math.floor(Math.random()*360);
            wheel.style.transform = `rotate(${rot}deg)`;
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                let win = Math.random() > 0.7 ? bet * 10 : 0;
                if(win > 0) {
                    balance += win; update();
                    document.getElementById('win').innerText = "WIN: " + win;
                    document.getElementById('win-s').play();
                    tg.HapticFeedback.notificationOccurred('success');
                }
                btn.disabled = false;
            }, 4000);
        }
    </script>
</body>
</html>
