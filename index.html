<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>五兽至尊_V500_ULTIMATE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --gold: #ffcc00; --dark: #020406; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        /* 1. 终极全屏流光背景：彻底解决“填不满”问题 */
        body { 
            background: var(--dark); color: #fff; font-family: 'Arial Black', sans-serif; 
            height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; overflow: hidden;
            position: relative;
        }
        /* 动态激光流光层 */
        .bg-stream {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, #102030 0%, #020406 100%),
                repeating-linear-gradient(125deg, rgba(0,242,255,0.03) 0%, transparent 10%, rgba(255,0,85,0.03) 20%);
            background-size: 400% 400%; animation: streamBG 15s ease infinite; z-index: -1;
        }
        @keyframes streamBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        /* 顶部余额：流光溢彩卡片 */
        .header { width: 100%; height: 20%; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .bal-display { 
            background: rgba(255,255,255,0.02); border: 2px solid var(--neon); border-radius: 20px;
            padding: 15px 40px; backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(0,242,255,0.3), inset 0 0 15px rgba(0,242,255,0.2);
        }
        .bal-val { font-size: 48px; font-weight: 900; text-shadow: 0 0 20px var(--neon); letter-spacing: -2px; }

        /* 转盘区：悬浮霓虹效果 */
        .main-stage { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; z-index: 5; }
        .wheel-glow {
            position: relative; width: 92vw; max-width: 400px; aspect-ratio: 1/1; 
            border-radius: 50%; padding: 12px;
            background: linear-gradient(135deg, #222, #000, #333);
            box-shadow: 0 0 60px rgba(0, 242, 255, 0.4); /* 巨大的外发光 */
        }
        /* 旋转的霓虹虚线 */
        .wheel-glow::after {
            content: ""; position: absolute; inset: -6px; border-radius: 50%;
            border: 3px dashed var(--pink); opacity: 0.5; animation: spin-rev 12s linear infinite;
        }
        @keyframes spin-rev { 100% { transform: rotate(-360deg); } }

        .wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 10px solid #111;
            background: conic-gradient(from 0deg, #111 0%, #222 25%, #111 50%, #222 75%, #111 100%);
            transition: transform 6s cubic-bezier(0.1, 0, 0, 1); position: relative; overflow: hidden;
        }
        
        .sector { position: absolute; width: 100%; height: 100%; clip-path: polygon(50% 50%, 100% 16%, 100% 84%); transform-origin: center; display: flex; align-items: center; justify-content: flex-end; padding-right: 6%; }
        
        /* 极致图标：发光投影 */
        .item-icon { transform: rotate(90deg) translateY(-28px); font-size: 82px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.8)); }

        .needle { 
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent; border-top: 60px solid #fff; 
            z-index: 100; filter: drop-shadow(0 0 20px var(--neon));
        }
        
        .btn-core { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90px; height: 90px; background: radial-gradient(#333, #000); 
            border: 5px solid var(--pink); border-radius: 50%; z-index: 110;
            color: #fff; font-size: 24px; font-weight: 900; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 40px var(--pink), inset 0 0 20px var(--pink); cursor: pointer;
        }

        /* 底部控制：赛博模块 */
        .footer { width: 100%; height: 22%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; z-index: 10; }
        .bet-box { 
            display: flex; align-items: center; gap: 40px; background: rgba(0,0,0,0.6); 
            padding: 12px 35px; border-radius: 50px; border: 2px solid var(--neon); backdrop-filter: blur(10px);
        }
        .btn-ui { width: 55px; height: 55px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 32px; font-weight: bold; }
        #msg-box { color: var(--gold); font-weight: 900; font-size: 28px; text-shadow: 0 0 15px #000; letter-spacing: 1px; }
    </style>
</head>
<body onclick="activate()">

    <div class="bg-stream"></div>

    <div class="header">
        <div class="bal-display"><div class="bal-val">💎 <span id="bal">1,000</span></div></div>
    </div>

    <div class="main-stage">
        <div class="wheel-glow">
            <div class="needle"></div>
            <div id="wheel" class="wheel">
                <div class="sector" style="background:rgba(255,215,0,0.25); transform:rotate(-90deg)"><b class="item-icon">👑</b></div>
                <div class="sector" style="background:rgba(255,0,85,0.15); transform:rotate(-30deg)"><b class="item-icon">🦁</b></div>
                <div class="sector" style="background:rgba(255,165,0,0.25); transform:rotate(30deg)"><b class="item-icon">🐯</b></div>
                <div class="sector" style="background:rgba(0,242,255,0.2); transform:rotate(90deg)"><b class="item-icon">🦅</b></div>
                <div class="sector" style="background:rgba(147,112,219,0.25); transform:rotate(150deg)"><b class="item-icon">🐺</b></div>
                <div class="sector" style="background:rgba(255,255,255,0.15); transform:rotate(210deg)"><b class="item-icon">🐕</b></div>
            </div>
            <div class="btn-core" onclick="startSpin()">SPIN</div>
        </div>
    </div>

    <div class="footer">
        <div class="bet-box">
            <button class="btn-ui" onclick="adj(-10)">-</button>
            <div style="font-size:42px; font-weight:900; min-width:90px; text-align:center;"><span id="bet">1</span></div>
            <button class="btn-ui" onclick="adj(10)">+</button>
        </div>
        <div id="msg-box">WAKE UP THE SYSTEM</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let b = 1000, bet = 1, r = 0, isS = false, audio;

        // 🎵 V500 提神音效引擎
        function activate() {
            if(!audio) {
                audio = new (window.AudioContext || window.webkitAudioContext)();
                if(audio.state === 'suspended') audio.resume();
                document.getElementById('msg-box').innerText = "LET'S PLAY";
                
                // 背景心跳 Techno 节奏
                const pulse = () => {
                    const o = audio.createOscillator(); const g = audio.createGain();
                    o.type = 'sawtooth'; o.frequency.setValueAtTime(55, audio.currentTime);
                    g.gain.setValueAtTime(0.05, audio.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.2);
                    o.connect(g); g.connect(audio.destination);
                    o.start(); o.stop(audio.currentTime + 0.2);
                    setTimeout(pulse, 400);
                };
                pulse();
            }
        }

        function play(f, d, t='sine', v=0.1) {
            if(!audio) return;
            const o = audio.createOscillator(); const g = audio.createGain();
            o.type = t; o.frequency.setTargetAtTime(f, audio.currentTime, 0.01);
            g.gain.setValueAtTime(v, audio.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d);
            o.connect(g); g.connect(audio.destination);
            o.start(); o.stop(audio.currentTime + d);
        }

        function adj(v) {
            if(isS) return;
            bet = Math.max(1, Math.min(b, bet+v)); 
            document.getElementById('bet').innerText = bet;
            tg.HapticFeedback.selectionChanged();
            play(1200, 0.1, 'square', 0.03); 
        }

        function startSpin() {
            if(isS || b < bet) return;
            isS = true; b -= bet; document.getElementById('bal').innerText = b.toLocaleString();
            tg.HapticFeedback.impactOccurred('heavy');
            
            let tick = setInterval(() => { if(isS) play(300 + Math.random()*800, 0.1, 'sawtooth', 0.02); }, 120);
            
            let idx = Math.floor(Math.random()*6);
            r += (3600 + idx*60);
            document.getElementById('wheel').style.transform = `rotate(-${r}deg)`;
            document.getElementById('msg-box').innerText = "CALCULATING...";

            setTimeout(() => {
                clearInterval(tick);
                const multi = [88, 15, 10, 5, 2, 0];
                let win = Math.floor(bet * multi[idx]);
                b += win; document.getElementById('bal').innerText = b.toLocaleString();
                
                if(win > 0) {
                    document.getElementById('msg-box').innerText = "JACKPOT! +" + win;
                    for(let i=0; i<10; i++) setTimeout(()=>play(500+i*100, 0.3, 'sine', 0.1), i*70);
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    document.getElementById('msg-box').innerText = "TRY AGAIN";
                    play(100, 0.6, 'triangle', 0.1);
                }
                isS = false;
            }, 6000);
        }
    </script>
</body>
</html>
