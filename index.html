<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA_FINAL_V200</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at center, #2e0808 0%, #000 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        .hud { text-align: center; margin-bottom: 20px; }
        .hud-v { color: #FFD700; font-size: 50px; text-shadow: 0 0 15px rgba(255,215,0,0.8); }
        .outer { width: 360px; height: 360px; border: 12px solid #FFD700; border-radius: 50%; position: relative; background: #000; box-shadow: 0 0 40px rgba(255,215,0,0.3); }
        .wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1.25); overflow: hidden; }
        
        /* 关键：修复文字扇形排列 */
        .sector {
            position: absolute; width: 100%; height: 100%;
            clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 50%); /* 划分扇区 */
        }
        .sector-text {
            position: absolute; width: 100%; text-align: center; top: 40px;
            color: #FFD700; font-size: 16px; font-weight: bold; transform-origin: center 180px;
        }
        
        /* 3D 绿色按钮 */
        .spin { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85px; height: 85px; border-radius: 50%; background: radial-gradient(circle, #00ff00, #006400); border: 4px solid #fff; cursor: pointer; z-index: 100; box-shadow: 0 8px 0 #004d00, 0 12px 20px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; }
        .spin:active { transform: translate(-50%, -50%) translateY(6px); box-shadow: 0 2px 0 #004d00; }
        
        .gears { margin-top: 30px; display: flex; gap: 10px; }
        .gear { padding: 8px 15px; border: 1px solid #FFD700; background: none; color: #FFD700; border-radius: 4px; }
        .gear.active { background: #FFD700; color: #000; }
        .ptr { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 35px solid #FFD700; z-index: 50; }
    </style>
</head>
<body>
    <div class="hud"><div class="hud-v" id="bal">89,037.00</div></div>
    <div class="outer">
        <div class="ptr"></div>
        <div class="wheel" id="w">
            <div class="sector" style="transform: rotate(0deg); background: #c01f1f;"><div class="sector-text" style="transform: rotate(22.5deg);">💰 10.0</div></div>
            <div class="sector" style="transform: rotate(45deg); background: #111;"><div class="sector-text" style="transform: rotate(22.5deg);">❌ 空</div></div>
            <div class="sector" style="transform: rotate(90deg); background: #c01f1f;"><div class="sector-text" style="transform: rotate(22.5deg);">💎 50.0</div></div>
            <div class="sector" style="transform: rotate(135deg); background: #111;"><div class="sector-text" style="transform: rotate(22.5deg);">❌ 空</div></div>
            <div class="sector" style="transform: rotate(180deg); background: #c01f1f;"><div class="sector-text" style="transform: rotate(22.5deg);">🔥 5.0</div></div>
            <div class="sector" style="transform: rotate(225deg); background: #111;"><div class="sector-text" style="transform: rotate(22.5deg);">❌ 空</div></div>
            <div class="sector" style="transform: rotate(270deg); background: #c01f1f;"><div class="sector-text" style="transform: rotate(22.5deg);">⭐ 100</div></div>
            <div class="sector" style="transform: rotate(315deg); background: #111;"><div class="sector-text" style="transform: rotate(22.5deg);">❌ 空</div></div>
        </div>
        <div class="spin" onclick="run()">SPIN</div>
    </div>
    <div class="gears">
        <button class="gear active" id="g1" onclick="setG(1)">标准</button>
        <button class="gear" id="g2" onclick="setG(2)">快速</button>
        <button class="gear" id="g3" onclick="setG(3)">极速</button>
    </div>
    <script>
        let b = 89037.00; let r = 0; let g = 1; let isS = false;
        function setG(v) { g = v; document.querySelectorAll('.gear').forEach(b=>b.classList.remove('active')); document.getElementById('g'+v).classList.add('active'); }
        function run() {
            if(isS || b < 0.5) return; isS = true; b -= 0.5;
            document.getElementById('bal').innerText = b.toLocaleString(undefined,{minimumFractionDigits:2});
            let dur = g==1 ? 3000 : g==2 ? 1500 : 600;
            let add = 1800 + Math.floor(Math.random()*360); r += add;
            const w = document.getElementById('w');
            w.style.transition = `transform ${dur}ms cubic-bezier(0.15, 0, 0.15, 1.25)`;
            w.style.transform = `rotate(${r}deg)`;
            setTimeout(() => {
                let win = [10, 0, 50, 0, 5, 0, 100, 0][Math.floor(Math.random()*8)];
                b += win; document.getElementById('bal').innerText = b.toLocaleString(undefined,{minimumFractionDigits:2});
                isS = false;
            }, dur + 200);
        }
    </script>
</body>
</html>
