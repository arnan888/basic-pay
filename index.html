<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>五兽至尊_MAX_BEAST</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --pink: #ff0055; --bg: #05080a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Arial Black', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }

        /* 顶部余额 - 简洁大气 */
        .header { width: 100%; height: 20%; display: flex; align-items: center; justify-content: center; }
        .bal-card { width: 85%; border-bottom: 2px solid var(--neon); padding: 10px; text-align: center; }
        .bal-val { font-size: 46px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--neon); letter-spacing: -1px; }

        /* 转盘中心区 - 巨型化处理 */
        .main-game { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .wheel-box { position: relative; width: 92vw; max-width: 380px; aspect-ratio: 1/1; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 12px solid #151515; background: #0a0a0a; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); position: relative; overflow: hidden; box-shadow: 0 0 60px #000; }
        
        /* 扇区背景强化 */
        .sector { position: absolute; width: 100%; height: 100%; clip-path: polygon(50% 50%, 100% 16%, 100% 84%); transform-origin: center; display: flex; align-items: center; justify-content: flex-end; padding-right: 8%; }
        
        /* 核心：霸气巨型图标 */
        .item { transform: rotate(90deg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .item b { 
            font-size: 72px; /* 巨型图标尺寸 */
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.6));
            margin-bottom: -5px;
            animation: beast-pulse 2s infinite ease-in-out;
        }
        @keyframes beast-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .item span { font-size: 11px; font-weight: 900; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 5px #000; }

        /* 指针与按钮 */
        .pointer { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent; border-top: 55px solid var(--neon); z-index: 100; filter: drop-shadow(0 0 20px var(--neon)); }
        .spin-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95px; height: 95px; background: radial-gradient(#222, #000); border: 5px solid var(--pink); border-radius: 50%; z-index: 110; color: var(--pink); font-size: 26px; font-weight: 900; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px var(--pink); text-shadow: 0 0 10px var(--pink); }

        /* 底部控制区 */
        .footer { width: 100%; height: 18%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: linear-gradient(0deg, rgba(0,242,255,0.05) 0%, transparent 100%); }
        .bet-box { display: flex; align-items: center; gap: 40px; }
        .btn-adj { width: 50px; height: 50px; border-radius: 12px; border: 2px solid #444; background: #111; color: #fff; font-size: 28px; font-weight: bold; }
        #msg { color: var(--gold); font-weight: 900; font-size: 22px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-card"><div class="bal-val">🪙 <span id="bal">1,000</span></div></div>
    </div>

    <div class="main-game">
        <div class="wheel-box">
            <div class="pointer"></div>
            <div id="wheel" class="wheel">
                <div class="sector" style="transform:rotate(-90deg); background:rgba(255,215,0,0.2)"><div class="item"><b>👑</b><span>至尊</span></div></div>
                <div class="sector" style="transform:rotate(-30deg); background:rgba(255,0,0,0.1)"><div class="item"><b>🦁</b><span>狮王</span></div></div>
                <div class="sector" style="transform:rotate(30deg); background:rgba(255,165,0,0.15)"><div class="item"><b>🐯</b><span>猛虎</span></div></div>
                <div class="sector" style="transform:rotate(90deg); background:rgba(0,255,0,0.1)"><div class="item"><b>🦅</b><span>雄鹰</span></div></div>
                <div class="sector" style="transform:rotate(150deg); background:rgba(147,112,219,0.15)"><div class="item"><b>🐺</b><span>恶狼</span></div></div>
                <div class="sector" style="transform:rotate(210deg); background:rgba(240,230,140,0.1)"><div class="item"><b>🐕</b><span>忠犬</span></div></div>
            </div>
            <div class="spin-btn" onclick="spin()">SPIN</div>
        </div>
    </div>

    <div class="footer">
        <div class="bet-box">
            <button class="btn-adj" onclick="setB(-10)">-</button>
            <div style="font-size:32px; font-weight:900; color:var(--gold);"><span id="bet">1</span></div>
            <button class="btn-adj" onclick="setB(10)">+</button>
        </div>
        <div id="msg">READY TO WIN</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let b = parseFloat(localStorage.getItem('g_max') || '1000');
        let bet = 1, r = 0, isS = false, audioInited = false;
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, dur, type='sine', vol=0.1) {
            if(!audioInited) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function unlock() { if(!audioInited) { audioCtx.resume(); audioInited = true; playTone(500, 0.2); } }

        function sync() {
            document.getElementById('bal').innerText = Math.floor(b).toLocaleString();
            document.getElementById('bet').innerText = bet;
            localStorage.setItem('g_max', b);
        }

        window.setB = (v) => { 
            unlock();
            if(!isS) { 
                bet = Math.max(1, Math.min(b, bet+v)); sync(); 
                tg.HapticFeedback.selectionChanged();
                playTone(800, 0.05, 'square', 0.05); 
            } 
        };

        function spin() {
            unlock();
            if(isS || b < bet) return;
            isS = true; b -= bet; sync();
            tg.HapticFeedback.impactOccurred('heavy');
            
            let tick = setInterval(() => { if(isS) playTone(150, 0.1, 'triangle', 0.05); }, 150);
            
            let idx = Math.floor(Math.random()*6);
            r += (3600 + idx*60);
            document.getElementById('wheel').style.transform = `rotate(-${r}deg)`;
            document.getElementById('msg').innerText = "TURNING...";

            setTimeout(() => {
                clearInterval(tick);
                const multi = [88, 15, 10, 5, 2, 0];
                let win = Math.floor(bet * multi[idx]);
                b += win; sync();
                
                if(win > 0) {
                    document.getElementById('msg').innerText = "WIN: " + win + "!";
                    playTone(500, 0.4); setTimeout(()=>playTone(800, 0.6), 150);
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    document.getElementById('msg').innerText = "TRY AGAIN";
                    playTone(100, 0.5, 'sawtooth', 0.05);
                }
                isS = false;
            }, 5000);
        }
        sync();
    </script>
</body>
</html>
