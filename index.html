        const diceCover = container.querySelector('#diceCover');

        function setDiceValue(dice, val) {
            const rot = {1:'rotateX(0deg) rotateY(0deg)',2:'rotateX(-90deg) rotateY(0deg)',3:'rotateX(0deg) rotateY(90deg)',4:'rotateX(0deg) rotateY(-90deg)',5:'rotateX(90deg) rotateY(0deg)',6:'rotateX(180deg) rotateY(0deg)'};
            dice.style.transform = rot[val];
        }
        async function startRolling(finalVals) {
            return new Promise(resolve => {
                diceEl[0].classList.add('rolling1'); diceEl[1].classList.add('rolling2'); diceEl[2].classList.add('rolling3');
                let step = 0, maxStep = 18;
                let iv = setInterval(() => {
                    step++;
                    diceEl.forEach(d => setDiceValue(d, Math.floor(Math.random() * 6) + 1));
                    if (step >= maxStep) {
                        clearInterval(iv);
                        diceEl.forEach(d => d.classList.remove('rolling1','rolling2','rolling3'));
                        diceEl.forEach((d,i) => { setDiceValue(d, finalVals[i]); d.classList.add('land'); setTimeout(() => d.classList.remove('land'), 200); });
                        resolve();
                    }
                }, 50);
            });
        }
        function startRollingNumber(finalAmount) {
            if (rollingAnimation) cancelAnimationFrame(rollingAnimation);
            let startTime = performance.now(), duration = 5000, startVal = 0.01;
            function update(now) {
                let elapsed = now - startTime, progress = Math.min(1, elapsed / duration), ease = 1 - Math.pow(1 - progress, 2);
                let current = startVal + (finalAmount - startVal) * ease;
                rollingWinEl.innerText = current.toFixed(2);
                if (progress < 1) rollingAnimation = requestAnimationFrame(update);
                else { rollingWinEl.innerText = finalAmount.toFixed(2); rollingAnimation = null; }
            }
            rollingAnimation = requestAnimationFrame(update);
        }
        function getResultInfo(d1,d2,d3) {
            let total = d1+d2+d3, types = [];
            if (total>=11 && total<=17) types.push('BIG');
            if (total>=4 && total<=10) types.push('SMALL');
            if (total%2===1) types.push('ODD');
            if (total%2===0) types.push('EVEN');
            if (d1===d2 && d2===d3) { types.push('TRIPLE_'+d1); types.push('ALL_TRIPLE'); }
            return { total, types };
        }
        function updateUI() {
            container.querySelector('#bet_BIG').innerText = bets['BIG'];
            container.querySelector('#bet_SMALL').innerText = bets['SMALL'];
            container.querySelector('#bet_ODD').innerText = bets['ODD'];
            container.querySelector('#bet_EVEN').innerText = bets['EVEN'];
            for (let i=4;i<=17;i++) { let el = container.querySelector('#bet_'+i); if(el) el.innerText = bets[i]; }
            for (let i=1;i<=6;i++) { let el = container.querySelector('#bet_TRIPLE_'+i); if(el) el.innerText = bets['TRIPLE_'+i]; }
            container.querySelector('#bet_ALL_TRIPLE').innerText = bets['ALL_TRIPLE'];
            let totalBet = Object.values(bets).reduce((a,b)=>a+b,0);
            container.querySelector('#totalBet').innerText = totalBet;
            container.querySelector('#balanceDisplay').innerText = currentBalance.toFixed(2);
            let pool = 50000 + (Math.random()-0.5)*3000;
            container.querySelector('#poolDisplay').innerText = Math.max(40000,Math.min(60000,pool)).toFixed(2);
        }
        function addBet(type) {
            if (selectedChip<=0) { showToast("请先选择筹码"); return; }
            if (selectedChip>currentBalance) { showToast("余额不足"); return; }
            currentBalance -= selectedChip;
            setUserBalance(currentBalance);
            bets[type] += selectedChip;
            updateUI();
            let selector = typeof type==='string' ? (type.startsWith('TRIPLE_')?'.trio-card[data-type="'+type+'"]':'.special-card[data-type="'+type+'"]') : '.point-card[data-point="'+type+'"]';
            let el = container.querySelector(selector);
            if (el) { el.classList.add('selected'); setTimeout(()=>el.classList.remove('selected'),800); }
        }
        function clearAllBets() {
            let total = Object.values(bets).reduce((a,b)=>a+b,0);
            currentBalance += total;
            setUserBalance(currentBalance);
            for (let k in bets) bets[k]=0;
            updateUI();
            showToast("已取消所有下注");
        }
        function repeatLastBet() {
            if (!lastBet) { showToast("没有可续押的记录"); return; }
            let totalNeed = Object.values(lastBet).reduce((a,b)=>a+b,0);
            if (totalNeed>currentBalance) { showToast("余额不足，无法续押"); return; }
            for (let k in bets) bets[k]=0;
            for (let k in lastBet) bets[k]=lastBet[k];
            currentBalance -= totalNeed;
            setUserBalance(currentBalance);
            updateUI();
            if (!isDrawing && !isBetLocked) drawWithCover();
        }
        function resetDiceCover() {
            if (diceCover) {
                diceCover.classList.remove('open-cover','hidden-cover');
                diceCover.style.display='flex'; diceCover.style.visibility='visible'; diceCover.style.opacity='1'; diceCover.style.transform='translateY(0) scale(1)';
            }
        }
        async function openCoverAndWait() {
            if (!diceCover) return;
            if (diceCover.classList.contains('hidden-cover') || diceCover.style.display==='none') resetDiceCover();
            diceCover.classList.add('open-cover');
            await new Promise(r=>setTimeout(r,600));
            diceCover.classList.add('hidden-cover');
            diceCover.style.display='none';
        }
        async function drawWithCover() {
            if (isDrawing) return;
            let totalBet = Object.values(bets).reduce((a,b)=>a+b,0);
            if (totalBet===0) { showToast("请先下注"); return; }
            if (totalBet>currentBalance) { showToast("余额不足，无法开奖"); return; }
            isDrawing=true; isBetLocked=true;
            await openCoverAndWait();
            let d1=Math.floor(Math.random()*6)+1, d2=Math.floor(Math.random()*6)+1, d3=Math.floor(Math.random()*6)+1;
            let {total,types} = getResultInfo(d1,d2,d3);
            let winAmounts = [];
            if (types.includes('BIG') && bets['BIG']>0) winAmounts.push(bets['BIG']*2);
            if (types.includes('SMALL') && bets['SMALL']>0) winAmounts.push(bets['SMALL']*2);
            if (types.includes('ODD') && bets['ODD']>0) winAmounts.push(bets['ODD']*2);
            if (types.includes('EVEN') && bets['EVEN']>0) winAmounts.push(bets['EVEN']*2);
            if (bets[total]>0) winAmounts.push(bets[total]*CONFIG.odds[total]);
            for (let t of types) {
                if (t.startsWith('TRIPLE_') && bets[t]>0) winAmounts.push(bets[t]*CONFIG.odds[t]);
                if (t==='ALL_TRIPLE' && bets['ALL_TRIPLE']>0) winAmounts.push(bets['ALL_TRIPLE']*CONFIG.odds['ALL_TRIPLE']);
            }
            let totalWin = winAmounts.reduce((a,b)=>a+b,0);
            startRollingNumber(totalWin);
            await startRolling([d1,d2,d3]);
            totalEl.innerText = total;
            currentBalance += totalWin;
            setUserBalance(currentBalance);
            let betSummary = [];
            for (let k in bets) if (bets[k]>0) {
                if (k==='BIG') betSummary.push('大'+bets[k]);
                else if (k==='SMALL') betSummary.push('小'+bets[k]);
                else if (k==='ODD') betSummary.push('单'+bets[k]);
                else if (k==='EVEN') betSummary.push('双'+bets[k]);
                else if (typeof k==='number') betSummary.push(k+'点'+bets[k]);
                else if (k.startsWith('TRIPLE_')) betSummary.push(k.split('_')[1]+'围'+bets[k]);
                else if (k==='ALL_TRIPLE') betSummary.push('豹子'+bets[k]);
            }
            let recs = diceUsers[currentUserId].records || [];
            recs.unshift({ time:new Date().toLocaleTimeString(), bets:betSummary.join(' '), result:total, resultType:types.join(','), win:totalWin, isWin:totalWin>0 });
            if (recs.length>30) recs.pop();
            diceUsers[currentUserId].records = recs;
            saveDiceUsers();
            updateHistory();
            for (let k in bets) bets[k]=0;
            updateUI();
            lastBet = JSON.parse(JSON.stringify(bets));
            let winText = totalWin>0 ? `🎉 恭喜！ 赢 ${totalWin.toFixed(2)} 🎉` : `😭 很遗憾 输 ${totalBet.toFixed(2)} 😭`;
            let pop = document.createElement('div'); pop.className='result-popup '+(totalWin>0?'win':'lose'); pop.textContent=winText; document.body.appendChild(pop); setTimeout(()=>pop.classList.add('show'),10); setTimeout(()=>{pop.classList.remove('show');setTimeout(()=>pop.remove(),300);},2000);
            setTimeout(()=>{ resetDiceCover(); isDrawing=false; isBetLocked=false; startCountdown(CONFIG.countdownSeconds); },5000);
        }
        function startCountdown(sec) {
            if (countdownInterval) clearInterval(countdownInterval);
            let c = sec, cdSpan = container.querySelector('#countdownNum');
            cdSpan.innerText = c; cdSpan.classList.remove('countdown-warning');
            isBetLocked = false;
            countdownInterval = setInterval(() => {
                if (c<=1) { clearInterval(countdownInterval); countdownInterval=null; isBetLocked=true; drawWithCover(); }
                else { c--; cdSpan.innerText = c; if (c<=5) cdSpan.classList.add('countdown-warning'); }
            }, 1000);
        }
        function updateHistory() {
            let histDiv = container.querySelector('#historyList');
            let recs = diceUsers[currentUserId]?.records || [];
            histDiv.innerHTML = recs.length===0 ? '<div style="text-align:center;color:#666">暂无记录</div>' : recs.slice(0,10).map(r=>`<div style="display:flex; justify-content:space-between; padding:4px; border-bottom:1px solid #333;"><span>${r.time}</span><span>${r.bets}</span><span>开${r.result}点</span><span style="color:${r.isWin?'#4caf50':'#f44336'}">${r.isWin?'+'+r.win:''}</span></div>`).join('');
        }
        function refreshBalance() { currentBalance = getUserBalance(); updateUI(); showToast("余额已刷新"); }
        function switchUser() {
            let newId = container.querySelector('#switchId').value.trim();
            if (!newId) return;
            currentUserId = newId;
            if (!diceUsers[currentUserId]) diceUsers[currentUserId] = { records: [] };
            container.querySelector('#currentUserId').innerText = currentUserId;
            currentBalance = getUserBalance();
            for (let k in bets) bets[k]=0;
            updateUI();
            if (countdownInterval) clearInterval(countdownInterval);
            startCountdown(CONFIG.countdownSeconds);
            updateHistory();
            showToast('已切换到 '+currentUserId);
        }
        function showHistoryModal() {
            let recs = diceUsers[currentUserId]?.records || [];
            let html = '<div style="max-height:300px;overflow-y:auto">'+(recs.length===0?'<p>暂无记录</p>':recs.map(r=>`<div style="padding:8px;border-bottom:1px solid #333;">${r.time} ${r.bets} 开${r.result}点 ${r.isWin?'+'+r.win:''}</div>`).join(''))+'</div><button id="closeModalBtn" style="background:#ff6600;border:none;border-radius:30px;padding:10px 24px;margin-top:16px;color:#fff">关闭</button>';
            let modal = document.createElement('div'); modal.className='modal'; modal.innerHTML='<div class="modal-content"><h3>📜 投注记录</h3>'+html+'</div>'; document.body.appendChild(modal); modal.querySelector('#closeModalBtn').onclick=()=>modal.remove();
        }
        let adminPanel = null;
        function showAdminPanel() {
            if (adminPanel) { adminPanel.remove(); adminPanel=null; return; }
            let panel = document.createElement('div'); panel.className='modal'; panel.innerHTML='<div class="modal-content"><h3>🔐 管理员面板</h3><div id="adminUserList" class="admin-user-list"></div><div>当前：<strong id="adminSelectedUser">'+currentUserId+'</strong></div><input type="number" id="adminAmount" placeholder="金额" value="0"><div class="admin-btns"><button id="adminAdd">上分</button><button id="adminSub">下分</button><button id="adminQuery">查询</button><button id="adminReset">重置</button><button id="adminPwd">改密</button></div><button id="adminClose">关闭</button></div>';
            document.body.appendChild(panel); adminPanel=panel;
            function refreshList() {
                let listDiv = panel.querySelector('#adminUserList');
                listDiv.innerHTML = Object.keys(diceUsers).map(uid => `<div class="admin-user ${uid===currentUserId?'selected':''}" data-uid="${uid}">${uid} (${getUserBalance().toFixed(2)})</div>`).join('');
                listDiv.querySelectorAll('.admin-user').forEach(div => { div.onclick = () => { currentUserId = div.dataset.uid; panel.querySelector('#adminSelectedUser').innerText = currentUserId; refreshList(); }; });
            }
            refreshList();
            panel.querySelector('#adminAdd').onclick = () => { let amt = parseFloat(panel.querySelector('#adminAmount').value); if (isNaN(amt)||amt<=0) return; setUserBalance(getUserBalance()+amt); currentBalance=getUserBalance(); updateUI(); refreshList(); showToast('上分成功'); };
            panel.querySelector('#adminSub').onclick = () => { let amt = parseFloat(panel.querySelector('#adminAmount').value); if (isNaN(amt)||amt<=0) return; let cur=getUserBalance(); if(cur<amt) { showToast("余额不足"); return; } setUserBalance(cur-amt); currentBalance=getUserBalance(); updateUI(); refreshList(); showToast('下分成功'); };
            panel.querySelector('#adminQuery').onclick = () => showToast(currentUserId+' 余额: '+getUserBalance().toFixed(2));
            panel.querySelector('#adminReset').onclick = () => { if(confirm('重置 '+currentUserId+' 余额为 '+CONFIG.defaultBalance)) { setUserBalance(CONFIG.defaultBalance); currentBalance=getUserBalance(); updateUI(); refreshList(); showToast("重置成功"); } };
            panel.querySelector('#adminPwd').onclick = () => { let old=prompt("当前密码:"); if(old!==adminPwd) { showToast("密码错误"); return; } let newPwd=prompt("新密码(至少6位):"); if(newPwd&&newPwd.length>=6) { adminPwd=newPwd; localStorage.setItem('dice_admin_pwd',newPwd); showToast("密码修改成功"); } };
            panel.querySelector('#adminClose').onclick = () => { panel.remove(); adminPanel=null; };
        }
        function createPointsGrid() {
            let grid = container.querySelector('#pointsGrid');
            for (let i=4;i<=17;i++) {
                let card = document.createElement('div'); card.className='point-card'; card.setAttribute('data-point',i);
                card.innerHTML = '<div>'+i+'点</div><div>赔 '+CONFIG.odds[i]+'倍</div><div id="bet_'+i+'">0</div>';
                card.onclick = (function(p){ return function(){ addBet(p); }; })(i);
                grid.appendChild(card);
            }
        }
        function createCombinedGrid() {
            let grid = container.querySelector('#combinedGrid');
            for (let i=1;i<=6;i++) {
                let card = document.createElement('div'); card.className='trio-card'; card.setAttribute('data-type','TRIPLE_'+i);
                card.innerHTML = '<div>'+i+'围</div><div>赔 150倍</div><div id="bet_TRIPLE_'+i+'">0</div>';
                card.onclick = (function(p){ return function(){ addBet('TRIPLE_'+p); }; })(i);
                grid.appendChild(card);
            }
            let allCard = document.createElement('div'); allCard.className='trio-card'; allCard.setAttribute('data-type','ALL_TRIPLE');
            allCard.innerHTML = '<div>豹子</div><div>赔 30倍</div><div id="bet_ALL_TRIPLE">0</div>';
            allCard.onclick = () => addBet('ALL_TRIPLE');
            grid.appendChild(allCard);
        }
        function initDrawers() {
            container.querySelectorAll('.drawer-header').forEach(header => {
                header.addEventListener('click', function() {
                    let drawerId = this.getAttribute('data-drawer');
                    let content = container.querySelector('#'+drawerId);
                    let icon = this.querySelector('.drawer-icon');
                    if (content.classList.contains('open')) { content.classList.remove('open'); icon.innerHTML='▼'; }
                    else { content.classList.add('open'); icon.innerHTML='▲'; }
                });
            });
        }
        function init() {
            createPointsGrid(); createCombinedGrid();
            container.querySelectorAll('.chip').forEach(chip => {
                chip.onclick = function() { selectedChip = parseInt(this.dataset.val); container.querySelector('#selectedChip').innerText = selectedChip; container.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected-chip')); this.classList.add('selected-chip'); };
            });
            container.querySelectorAll('.special-card').forEach(card => card.onclick = () => addBet(card.dataset.type));
            container.querySelector('#clearAllBtn').onclick = clearAllBets;
            container.querySelector('#repeatBtn').onclick = repeatLastBet;
            container.querySelector('#refreshBtn').onclick = refreshBalance;
            container.querySelector('#betBtn').onclick = () => { if(!isDrawing && !isBetLocked) drawWithCover(); };
            container.querySelector('#switchBtn').onclick = switchUser;
            container.querySelector('#historyBtn').onclick = showHistoryModal;
            container.querySelector('#adminEntry').onclick = () => { let pwd=prompt("管理员密码:"); if(pwd===adminPwd) showAdminPanel(); else if(pwd!==null) showToast("密码错误"); };
            container.querySelector('#newUserBtn').onclick = () => { let newId="player_"+Math.floor(Math.random()*100000); container.querySelector('#switchId').value=newId; switchUser(); showToast("新账户："+newId+" 初始余额 "+CONFIG.defaultBalance); };
            diceEl.forEach(d => {
                for (let i=0;i<6;i++) {
                    let faceDivs=['front','back','right','left','top','bottom'];
                    let faceClass=faceDivs[i];
                    let valMap={front:1,back:6,right:4,left:3,top:2,bottom:5};
                    let num=valMap[faceClass];
                    let faceDiv=document.createElement('div');
                    faceDiv.className='dice-face '+faceClass+' face-'+num;
                    let pipHtml='';
                    if (num===1) pipHtml='<div class="pip pip-center"></div>';
                    else if (num===2) pipHtml='<div class="pip pip-tl"></div><div class="pip pip-br"></div>';
                    else if (num===3) pipHtml='<div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div>';
                    else if (num===4) pipHtml='<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                    else if (num===5) pipHtml='<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-mid"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                    else if (num===6) pipHtml='<div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div>';
                    faceDiv.innerHTML=pipHtml;
                    d.appendChild(faceDiv);
                }
            });
            diceEl.forEach(d=>setDiceValue(d,1));
            totalEl.innerText=3;
            updateUI(); updateHistory(); startCountdown(CONFIG.countdownSeconds);
            let savedPwd = localStorage.getItem('dice_admin_pwd');
            if (savedPwd) adminPwd = savedPwd;
            resetDiceCover();
            initDrawers();
        }
        init();

        destroy = () => {
            if (countdownInterval) clearInterval(countdownInterval);
            if (rollingAnimation) cancelAnimationFrame(rollingAnimation);
            container.innerHTML = '';
        };
        return destroy;
    }

    // ==================== 游戏四：预留 ====================
    function initGame4(container) { container.innerHTML = '<div style="padding:40px;text-align:center;color:#ffdd99;">♠️ 游戏4预留位</div>'; return ()=>{}; }

    // ==================== 主界面 ====================
    function renderAuthUI() {
        const savedPhone = localStorage.getItem('saved_phone') || '';
        const savedPwd = localStorage.getItem('saved_password') || '';
        const rememberChecked = localStorage.getItem('remember_me') === 'true';
        const app = document.getElementById('app');
        app.innerHTML = `<div class="auth-panel"><h2>🎲 四游戏大厅</h2><input type="tel" id="regPhone" class="auth-input" placeholder="手机号" maxlength="11" value="${savedPhone}"><input type="password" id="regPassword" class="auth-input" placeholder="密码 (至少4位)" value="${savedPwd}"><div style="display:flex; align-items:center; gap:8px; margin:8px 0;"><input type="checkbox" id="rememberCheckbox" ${rememberChecked ? 'checked' : ''}><label style="color:#ffdd99;">记住账号密码</label></div><div class="auth-buttons"><button id="loginBtn" class="auth-btn">登录</button><button id="registerBtn" class="auth-btn">注册</button></div><div class="auth-note">🎮 测试手机号注册 | 初始1000 | 筹码1k连点三下管理后台</div></div>`;
        document.getElementById('loginBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let remember = document.getElementById('rememberCheckbox').checked;
            if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            let user = usersData[phone];
            if(!user) { showToast("手机号未注册"); return; }
            if(user.password !== pwd) { showToast("密码错误"); return; }
            if(remember) { localStorage.setItem('saved_phone', phone); localStorage.setItem('saved_password', pwd); localStorage.setItem('remember_me', 'true'); }
            else { localStorage.removeItem('saved_phone'); localStorage.removeItem('saved_password'); localStorage.setItem('remember_me', 'false'); }
            currentUser = { phone, ...user };
            showToast(`欢迎，${phone}`);
            renderGameLobby();
        };
        document.getElementById('registerBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            if(!/^1[3-9]\d{9}$/.test(phone)) { showToast("请输入有效11位手机号"); return; }
            if(pwd.length < 4) { showToast("密码至少4位"); return; }
            if(usersData[phone]) { showToast("手机号已注册"); return; }
            usersData[phone] = { password: pwd, balance: 1000 };
            saveUsers();
            showToast("注册成功！请登录");
        };
    }

    function renderGameLobby() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="user-section">
                <span>📱 ${currentUser.phone.substring(0,7)}... | 💰 余额: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span>
                <div><button id="serviceBtn">📞 客服</button><button id="logoutBtn">退出</button></div>
            </div>
            <div class="charge-withdraw-row">
                <button id="rechargeBtn">💎 充值</button>
                <button id="withdrawBtn">💰 提现</button>
            </div>
            <div class="game-nav">
                <button class="game-tab active" data-game="fish">🎲 葫芦鱼</button>
                <button class="game-tab" data-game="poker">🃟 十三张</button>
                <button class="game-tab" data-game="game3">🎲 骰宝</button>
                <button class="game-tab" data-game="game4">♠️ 游戏4</button>
            </div>
            <div class="game-container"><div id="gamePanel"></div></div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showService;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;

        const gameContainer = document.getElementById('gamePanel');
        let currentDestroy = null;
        const gameInits = { fish: initFishGame, poker: initPokerGame, game3: initGame3, game4: initGame4 };

        async function switchGame(gameId) {
            if (currentDestroy) { currentDestroy(); currentDestroy = null; }
            gameContainer.innerHTML = '';
            const initFn = gameInits[gameId];
            if (initFn) {
                const destroy = await initFn(gameContainer);
                if (typeof destroy === 'function') currentDestroy = destroy;
            }
            document.getElementById('userBalanceDisplay').innerText = getUserBalance().toFixed(2);
        }

        document.querySelectorAll('.game-tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchGame(btn.dataset.game);
            };
        });
        switchGame('fish');
    }

    renderAuthUI();
</script>
</body>
</html>
