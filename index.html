<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虎对决15秒视频版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        /* 主游戏容器 */
        .game-container {
            width: 100%;
            max-width: 480px;
            background: #4a7c64;
            border-radius: 15px;
            padding: 6px;
            border: 3px solid #2c4a3b;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
            display: flex;
            flex-direction: column;
        }

        /* 顶部状态栏（保留原风格） */
        .top-bar {
            height: 8%;
            display: flex;
            gap: 10px;
            padding: 8px 12px;
        }
        .info-card {
            flex: 1;
            background: #6b737e;
            box-shadow: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
            border: 2px solid #2c4a3b;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }
        .info-card label { font-size: 12px; color: #ccc; }
        .info-card span { font-size: 20px; color: #f1c40f; text-shadow: 0 0 6px #f1c40f; }

        /* ================== 视频作为龙虎框背景 ================== */
        .battle-section {
            height: 38%;
            margin: 4px 10px;
            border: 3px solid #2c4a3b;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            /* 内陷效果保留 */
            box-shadow: inset 10px 10px 20px rgba(0,0,0,0.8), inset -10px -10px 20px rgba(255,255,255,0.05);
        }
        /* 视频作为背景 */
        #dragonTigerVideo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            object-fit: cover;
            z-index: 1;
        }
        /* 网格遮罩层（保留原风格） */
        .grid-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
            z-index: 2;
            pointer-events: none;
        }
        /* 结果文字层 */
        .battle-result {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 2px 15px;
            border-radius: 10px;
            z-index: 3;
        }
        /* ======================================================= */

        /* 操作区（保留原风格） */
        .control-section {
            flex: 1;
            margin: 0 10px 8px 10px;
            background: #6b737e;
            border: 3px solid #2c4a3b;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        .choice-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .choice-btn {
            height: 70px;
            background: #333;
            box-shadow: inset 5px 5px 10px rgba(0,0,0,0.6), inset -3px -3px 6px rgba(255,255,255,0.1);
            border: 2px solid #2c4a3b;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            font-weight: bold;
            cursor: pointer;
        }
        .choice-btn.dragon { color: #3498db; text-shadow: 0 0 10px #3498db; }
        .choice-btn.tiger { color: #e67e22; text-shadow: 0 0 10px #e67e22; }
        .choice-btn.tie { color: #9b59b6; text-shadow: 0 0 10px #9b59b6; }
        .choice-btn.active {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.6), inset -2px -2px 5px rgba(255,255,255,0.1);
            border-color: #f1c40f;
            background: #222;
        }
        .data-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
        }
        .data-item {
            background: #333;
            border: 2px solid #2c4a3b;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            height: 40px;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.6), inset -2px -2px 4px rgba(255,255,255,0.05);
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 12px 12px;
        }
        .data-item label { color: #ccc; font-size: 12px; }
        .data-item span { color: #f1c40f; font-size: 18px; }
        .bet-txt { text-align: center; color: #fff; font-size: 16px; margin-bottom: 10px; }
        .bet-txt span { color: #f1c40f; text-shadow: 0 0 8px #f1c40f; }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .func-btn {
            width: 50px;
            height: 50px;
            background: #4a7c64;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.6), inset -2px -2px 4px rgba(255,255,255,0.05);
            border: 2px solid #2c4a3b;
            border-radius: 8px;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        .main-btn {
            flex: 1;
            background: linear-gradient(#e53935, #b71c1c);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #7f0000;
        }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #7f0000; }
        .mode-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .mode-btn {
            height: 40px;
            background: #333;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.6), inset -2px -2px 4px rgba(255,255,255,0.05);
            border: 2px solid #2c4a3b;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mode-btn.active { background: #222; border-color: #f1c40f; color: #f1c40f; }
        .speed-btn { display: flex; gap: 5px; }
        .speed-btn span { flex: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .speed-btn span.active { background: #f1c40f; color: #000; }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 顶部状态栏 -->
        <div class="top-bar">
            <div class="info-card">
                <label>账户余额</label>
                <span id="balance">857.80</span>
            </div>
            <div class="info-card">
                <label>奖池累积</label>
                <span>84291.50</span>
            </div>
        </div>

        <!-- 龙虎对决区（视频作为背景） -->
        <div class="battle-section">
            <!-- 15秒对决视频 -->
            <video id="dragonTigerVideo" autoplay muted loop playsinline>
                <source src="your_dragon_tiger_video.mp4" type="video/mp4">
                你的浏览器不支持视频播放，请更换浏览器或查看其他格式。
            </video>
            <!-- 黑色网格遮罩（保留原风格） -->
            <div class="grid-mask"></div>
            <!-- 结果文字 -->
            <div class="battle-result" id="battleResult">龙虎争霸 · 15秒决胜负</div>
        </div>

        <!-- 操作区 -->
        <div class="control-section">
            <div class="choice-group">
                <div class="choice-btn dragon" onclick="setChoice('dragon')">龙</div>
                <div class="choice-btn tie" onclick="setChoice('tie')">和</div>
                <div class="choice-btn tiger" onclick="setChoice('tiger')">虎</div>
            </div>

            <div class="data-group">
                <div class="data-item">
                    <label>当前押注</label>
                    <span id="currentBet">100.00</span>
                </div>
                <div class="data-item">
                    <label>预计奖金</label>
                    <span id="expectWin">800.00</span>
                </div>
                <div class="data-item">
                    <label>当前选择</label>
                    <span id="currentChoice">未选择</span>
                </div>
            </div>

            <div class="bet-txt">押注金额：<span id="betAmount">100</span> USDT</div>

            <div class="btn-group">
                <button class="func-btn" onclick="changeBet(-1)">-</button>
                <button class="main-btn" onclick="startGame()">确认投注</button>
                <button class="func-btn" onclick="changeBet(1)">+</button>
            </div>

            <div class="mode-group">
                <button class="mode-btn" id="autoBtn" onclick="toggleAuto()">自动投注</button>
                <div class="mode-btn speed-btn">
                    <span class="active" onclick="setSpeed(1)">1X</span>
                    <span onclick="setSpeed(2)">2X</span>
                    <span onclick="setSpeed(3)">3X</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 视频控制逻辑
        const video = document.getElementById('dragonTigerVideo');
        const battleResult = document.getElementById('battleResult');
        let isVideoPlaying = false;

        // 视频加载完成
        video.addEventListener('loadedmetadata', () => {
            if (video.duration !== 15) {
                console.warn('视频时长非15秒，将按15秒节奏控制');
            }
        });

        // 游戏核心数据
        let balance = 857.8;
        let betLevels = [10,50,100,500,1000];
        let currentBet = 2;
        let selected = null;
        let isRunning = false;
        let autoMode = false;
        let speed = 1;

        // 选择投注项
        function setChoice(type) {
            if(isRunning) return;
            selected = type;
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.choice-btn.${type}`).classList.add('active');
            document.getElementById('currentChoice').textContent = type==='dragon'?'龙':type==='tiger'?'虎':'和';
            let win = betLevels[currentBet] * (type==='tie'?8:1);
            document.getElementById('expectWin').textContent = win.toFixed(2);
        }

        // 调整押注金额
        function changeBet(dir) {
            if(isRunning) return;
            currentBet = Math.max(0, Math.min(4, currentBet + dir));
            document.getElementById('betAmount').textContent = betLevels[currentBet];
            document.getElementById('currentBet').textContent = betLevels[currentBet].toFixed(2);
            let win = betLevels[currentBet] * (selected==='tie'?8:1);
            document.getElementById('expectWin').textContent = win.toFixed(2);
        }

        // 开始游戏（同步视频15秒节奏）
        function startGame() {
            if(isRunning) { alert('游戏进行中，请稍候'); return; }
            if(!selected) { alert('请先选择投注项'); return; }
            
            let bet = betLevels[currentBet];
            if(balance < bet) { alert('余额不足'); return; }

            isRunning = true;
            balance -= bet;
            document.getElementById('balance').textContent = balance.toFixed(2);
            
            // 视频同步播放并提示
            battleResult.textContent = '对决开始 · 风云变幻';
            video.currentTime = 0;
            video.play();
            isVideoPlaying = true;

            // 15秒后出结果
            setTimeout(() => {
                let res = ['dragon','tiger','tie'][Math.floor(Math.random()*3)];
                let txt = '';
                if(res==='dragon'){
                    txt = '龙威盖世 · 大胜而归';
                }
                else if(res==='tiger'){
                    txt = '虎啸山林 · 力压群雄';
                }
                else{
                    txt = '势均力敌 · 握手言和';
                }
                battleResult.textContent = txt;
                
                if(res === selected) {
                    balance += bet * (res==='tie'?8:1);
                    document.getElementById('balance').textContent = balance.toFixed(2);
                }
                
                isRunning = false;
                isVideoPlaying = false;
                
                if(autoMode) setTimeout(startGame, speed*1000);
            }, 15000);
        }

        // 自动模式
        function toggleAuto() {
            autoMode = !autoMode;
            let btn = document.getElementById('autoBtn');
            btn.classList.toggle('active');
            btn.textContent = autoMode?'关闭自动':'自动投注';
            if(autoMode && !isRunning) startGame();
        }

        // 设置速度
        function setSpeed(s) {
            speed = s;
            document.querySelectorAll('.speed-btn span').forEach(sp => sp.classList.remove('active'));
            document.querySelector(`.speed-btn span:nth-child(${s})`).classList.add('active');
        }
    </script>
</body>
</html>
