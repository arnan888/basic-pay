<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="祝贺转盘系统 - 核心功能精简版">
    <title>ULITMATE_CONGRATS_PB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #FFD700; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw; overflow: hidden; 
            font-family: "Microsoft Yahei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* 后台栏 - 精简样式 */
        .pb-admin-bar {
            position: fixed; top: 0; width: 100%; height: 45px;
            background: #000; border-bottom: 4px solid #FFD700;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; font-family: "Consolas", monospace; font-size: 15px;
        }
        .pb-admin-bar span { color: #888; margin-right: 3px; }
        .pb-admin-bar b { color: #0f0; text-shadow: 0 0 5px #0f0; }

        /* 余额区 - 简洁明了 */
        .ui-top { margin-top: 40px; text-align: center; }
        .bal-val { 
            font-size: clamp(40px, 10vw, 70px); 
            font-weight: 900; 
            color: #FFD700; 
            text-shadow: 0 0 20px #FFD700;
            /* 新增：余额变化动画 */
            transition: color 0.3s ease;
        }
        /* 新增：余额增减颜色提示 */
        .bal-val.gain { color: #0f0; text-shadow: 0 0 20px #0f0; }
        .bal-val.lose { color: #f00; text-shadow: 0 0 20px #f00; }

        /* ========== 重点：凸显转盘外圈 ========== */
        .stage {
            position: relative;
            margin-top: 20px;
            /* 外圈主体：双层边框+渐变凸显 */
            width: clamp(380px, 80vmin, 700px);
            height: clamp(380px, 80vmin, 700px);
            border-radius: 50%;
            background: radial-gradient(circle, #222 0%, #000 85%);
            /* 外层装饰圈 */
            box-shadow: 
                0 0 0 10px #111,
                0 0 0 18px #FFD700,
                0 0 0 28px #000,
                0 0 0 32px #FFD700,
                0 0 40px 32px rgba(255,215,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }
        /* 内圈盘子：与外圈清晰区分 */
        .wheel-wrap {
            width: 92%;
            height: 92%;
            border-radius: 50%;
            background: #000;
            border: 2px solid #FFD700;
            position: relative;
            overflow: hidden;
        }

        /* 指针：位置调整，与外圈呼应 */
        .pointer {
            position: absolute; 
            top: -25px; left: 50%; 
            transform: translateX(-50%);
            z-index: 100;
            width: 30px; height: 50px;
            background: linear-gradient(to bottom, #FFD700 0%, #f00 100%);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            box-shadow: 0 0 10px #f00;
            /* 新增：旋转时指针高亮 */
            transition: box-shadow 0.3s ease;
        }
        .pointer.active { box-shadow: 0 0 20px #FFD700, 0 0 30px #f00; }
        /* 指针底座：强化与外圈连接 */
        .pointer::after {
            content: '';
            position: absolute;
            bottom: -8px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 12px;
            background: #FFD700;
            border-radius: 6px;
            box-shadow: 0 0 5px #FFD700;
        }

        /* 转盘本体：分区清晰，不乱不乱！ */
        .wheel {
            width: 100%; height: 100%; 
            position: relative; 
            border-radius: 50%;
            transition: transform 5s cubic-bezier(0.1, 0, 0, 1.02);
        }
        /* 分区色块：让每个槽位边界明确 */
        .slot {
            position: absolute; 
            width: 100%; height: 100%;
            clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%);
            transform-origin: 50% 50%;
            background: #111;
        }
        /* 交替颜色，区分更明显 */
        .slot:nth-child(odd) { background: #1a1a1a; }
        /* 每个槽位的内容容器 */
        .slot-content {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            width: 120px;
            text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }
        /* 图标容器：统一样式 */
        .icon-box {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, #FFD700, #f00);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 8px;
            box-shadow: 0 0 10px rgba(255,215,0,0.6);
        }
        .icon-box svg { width: 35px; height: 35px; fill: #000; }
        /* 文字样式：清晰不拥挤 */
        .slot-name { 
            font-size: 14px; color: #fff; 
            white-space: nowrap;
            text-shadow: 0 0 5px #000;
        }
        .slot-reward { 
            font-size: 12px; color: #0f0; 
            background: #000;
            padding: 1px 8px;
            border-radius: 10px;
            border: 1px solid #0f0;
            margin-top: 3px;
        }
        /* 新增：中奖项高亮 */
        .slot-content.win {
            transform: translateX(-50%) scale(1.1);
            transition: transform 0.5s ease;
        }
        .slot-content.win .icon-box {
            box-shadow: 0 0 15px #0f0, 0 0 25px rgba(0,255,0,0.6);
            border: 2px solid #0f0;
        }
        .slot-content.win .slot-name {
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }

        /* 中心按钮：简洁厚重，不抢外圈风头 */
        .btn-center {
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 110px; height: 110px;
            border-radius: 50%;
            background: radial-gradient(circle, #f00, #700);
            border: 4px solid #FFD700;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,0,0,0.8);
            z-index: 200;
            /* 新增：按钮按下效果优化 */
            transition: all 0.1s ease;
        }
        .btn-center h2 { 
            font-size: 32px; color: #fff; 
            text-shadow: 2px 2px 5px #000;
        }
        .btn-center.busy {
            background: radial-gradient(circle, #666, #333);
            border-color: #999;
            cursor: not-allowed;
            box-shadow: 0 0 10px rgba(100,100,100,0.5);
        }
        .btn-center.busy h2 { color: #ccc; }
        /* 新增：按钮正常点击反馈 */
        .btn-center:not(.busy):active {
            transform: translate(-50%, -50%) scale(0.95);
            box-shadow: 0 0 15px rgba(255,0,0,0.8);
        }

        /* 精简加载动画，只保留必要反馈 */
        .loading {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 35px; height: 35px;
            border: 3px solid #FFD700;
            border-top: 3px solid #f00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 201;
        }
        .loading.active { display: block; }
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 新增：操作提示弹窗 */
        .toast {
            display: none;
            position: fixed;
            bottom: 30px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.9);
            border: 2px solid #FFD700;
            border-radius: 20px;
            color: #fff;
            font-size: 16px;
            z-index: 1001;
            animation: toastPop 0.3s ease forwards;
        }
        .toast.active { display: block; }
        @keyframes toastPop {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 新增：数据重置按钮（可选，便于测试） */
        .reset-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 6px 12px;
            background: #111;
            border: 1px solid #FFD700;
            border-radius: 10px;
            color: #FFD700;
            font-size: 12px;
            cursor: pointer;
            z-index: 1000;
            transition: background 0.2s ease;
        }
        .reset-btn:hover { background: #222; }
    </style>
</head>
<body>

    <div class="pb-admin-bar">

                    <div class="slot-content" style="transform: rotate(-270deg);">

            <div class="loading" id="loading"></div>
            <div class="btn-center" id="mainBtn" onclick="exec()">

        </div>
    </div>

    <!-- 新增功能元素 -->
    <div class="toast" id="toast">操作提示</div>
    <div class="reset-btn" onclick="resetData()">重置数据</div>

    <script>
        // 核心数据：只保留必要项
        let balance = 89123.0, 
            totalIn = 0,       
            totalOut = 0,      
            wheelRotation = 0, 
            isBusy = false;
        
        // 奖励配置：补充名称便于提示
        const rewardMatrix = [
            {angle: 0, value: 88, name: '旗开得胜'},
            {angle: 45, value: 50, name: '无惧浪潮'},
            {angle: 90, value: 20, name: '乘风破浪'},
            {angle: 135, value: 0, name: '首战告捷'},
            {angle: 180, value: 15, name: '屹立不倒'},
            {angle: 225, value: 0, name: '站得稳'},
            {angle: 270, value: 120, name: '马到成功'},
            {angle: 315, value: 0, name: '万事如意'}
        ];
        
        // DOM缓存：补充新增元素
        const dom = {
            balance: document.getElementById('ui_bal'),
            totalIn: document.getElementById('op_in'),
            totalOut: document.getElementById('op_out'),
            rtp: document.getElementById('op_rtp'),
            wheel: document.getElementById('ui_wheel'),
            btn: document.getElementById('mainBtn'),
            loading: document.getElementById('loading'),
            pointer: document.getElementById('pointer'),
            toast: document.getElementById('toast'),
            slots: document.querySelectorAll('.slot-content')
        };

        // 数字格式化：核心功能保留
        function formatNum(num) {
            if (isNaN(num)) return '0.00';
            return num.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
        }

        // 新增：显示提示弹窗
        function showToast(text, duration = 2000) {
            dom.toast.innerText = text;
            dom.toast.classList.add('active');
            setTimeout(() => dom.toast.classList.remove('active'), duration);
        }

        // 新增：余额变化视觉提示
        function showBalanceChange(isGain) {
