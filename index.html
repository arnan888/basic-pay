<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五兽至尊_V66_Stable</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --gold: #ffcc00; --blue: #1e3a5f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at 50% 50%, var(--blue) 0%, #0d1b2a 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .hud {
            width: 95%; margin-top: 15px; z-index: 100;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid var(--neon); border-radius: 20px; padding: 15px; text-align: center;
        }
        .bal-txt { font-size: 30px; color: #fff; margin-bottom: 10px; text-shadow: 0 0 15px var(--neon); }
        
        .bet-row { display: flex; align-items: center; justify-content: center; gap: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
        .btn-ctrl { padding: 8px 15px; background: rgba(0,0,0,0.5); border: 1.5px solid var(--gold); color: var(--gold); border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .bet-val { font-size: 24px; color: var(--gold); min-width: 70px; font-weight: 900; }

        .wheel-box { margin-top: 25px; position: relative; width: 320px; height: 320px; z-index: 50; }
        .wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 10px solid #2c3e50;
            position: relative; overflow: hidden; transition: transform 4.5s cubic-bezier(0.15, 0, 0.1, 1);
            background: #111; box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        .sector {
            position: absolute; width: 100%; height: 100%;
            clip-path: polygon(50% 50%, 100% 21%, 100% 79%); transform-origin: center;
            display: flex; align-items: center; justify-content: center;
        }
        /* 确保图片加载正常，如果加载失败会显示文字备用 */
        .sector img { width: 110%; height: 110%; object-fit: cover; filter: brightness(0.7); }
        .sector span { position: absolute; right: 15px; transform: rotate(-90deg); font-size: 12px; font-weight: bold; background: var(--pink); padding: 2px 5px; border-radius: 4px; }
        
        .s0{transform:rotate(-90deg)} .s1{transform:rotate(-30deg)} .s2{transform:rotate(30deg)} 
        .s3{transform:rotate(90deg)} .s4{transform:rotate(150deg)} .s5{transform:rotate(210deg)}

        .pointer { 
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; 
            border-top: 35px solid var(--neon); z-index: 70;
        }
        .center-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; background: #000; border: 4px solid var(--pink);
            border-radius: 50%; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; z-index: 80;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px var(--pink);
        }

        .admin-panel {
            margin-top: 30px; width: 92%; background: rgba(0,0,0,0.4); 
            backdrop-filter: blur(5px); border-radius: 20px; padding: 15px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        #res-win { font-size: 32px; font-weight: 900; color: var(--neon); margin-bottom: 12px; min-height: 40px; }
        .admin-btns { display: flex; justify-content: center; gap: 12px; }
        .btn-admin { flex: 1; padding: 10px; background: #222; border: 1px solid #444; color: #aaa; border-radius: 12px; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hud">
        <div class="bal-txt">💰 <span id="bal">1,000</span></div>
        <div class="bet-row">
            <button class="btn-ctrl" onclick="chgBet(-1)">-1</button>
            <button class="btn-ctrl" onclick="chgBet(-10)">-10</button>
            <div class="bet-val">BET: <span id="bet">1</span></div>
            <button class="btn-ctrl" onclick="chgBet(10)">+10</button>
            <button class="btn-ctrl" onclick="chgBet(1)">+1</button>
        </div>
    </div>

    <div class="wheel-box">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <!-- 请确保这些图片文件在你的 GitHub 根目录下 -->
            <div class="sector s0"><img src="all.jpg" onerror="this.style.display='none'"><span>MAX</span></div>
            <div class="sector s1"><img src="lion.jpg" onerror="this.style.display='none'"><span>LION</span></div>
            <div class="sector s2"><img src="tiger.jpg" onerror="this.style.display='none'"><span>TIGER</span></div>
            <div class="sector s3"><img src="leopard.jpg" onerror="this.style.display='none'"><span>LEO</span></div>
            <div class="sector s4"><img src="wolf.jpg" onerror="this.style.display='none'"><span>WOLF</span></div>
            <div class="sector s5"><img src="dog.jpg" onerror="this.style.display='none'"><span>DOG</span></div>
        </div>
        <div class="center-btn" onclick="spin()">SPIN</div>
    </div>

    <div class="admin-panel">
        <div id="res-win">READY</div>
        <div class="admin-btns">
            <button class="btn-admin" onclick="addGold(100)">+100</button>
            <button class="btn-admin" onclick="addGold(1000)">+1000</button>
            <button class="btn-admin" onclick="resetSys()">RESET</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let b = parseFloat(localStorage.getItem('u_gold') || '1000');
        let tIn = parseFloat(localStorage.getItem('u_in') || '1000');
        let tOut = parseFloat(localStorage.getItem('u_out') || '0');
        let curBet = 1; 
        let r = 0; 
        let spinning = false;

        const config = [{min:30,max:100,w:1.5},{min:10,max:30,w:6.5},{min:5,max:15,w:12},{min:2,max:10,w:20},{min:0.5,max:5,w:25},{min:0.1,max:1,w:35}];

        function updateUI() {
            document.getElementById('bal').innerText = Math.floor(b).toLocaleString();
            document.getElementById('bet').innerText = curBet;
            localStorage.setItem('u_gold', b);
            localStorage.setItem('u_in', tIn);
            localStorage.setItem('u_out', tOut);
        }

        window.addGold = (v) => { b += v; tIn += v; updateUI(); };
        window.resetSys = () => { if(confirm("RESET?")){ b=1000; tIn=1000; tOut=0; updateUI(); } };
        window.chgBet = (v) => { if(!spinning){ curBet = Math.max(1, Math.min(b, curBet + v)); updateUI(); } };

        function spin() {
            if(spinning || b < curBet) return;
            spinning = true; b -= curBet; updateUI();
            document.getElementById('res-win').innerText = "SPINNING...";
            
            let rtp = tOut / tIn;
            let idx = (rtp >= 0.92) ? (Math.random() < 0.8 ? 5 : 4) : Math.floor(Math.random() * 6);

            r += (2160 + idx * 60);
            document.getElementById('wheel').style.transform = `rotate(-${r}deg)`;

            setTimeout(() => {
                let m = (Math.random() * (config[idx].max - config[idx].min) + config[idx].min);
                let win = Math.floor(curBet * m);
                b += win; tOut += win; updateUI();
                document.getElementById('res-win').innerText = win > 0 ? "WIN: " + win : "LOST";
                spinning = false;
            }, 4500);
        }
        updateUI();
    </script>
</body>
</html>
