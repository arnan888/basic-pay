<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA · 旗舰量化终端 PRO</title>
    <style>
        :root {
            --bg: #0d120f;
            --panel: #1a231e;
            --red: #ff5a5a;
            --gold: #f1c40f;
            --dark-red: #3d0e0e;
            --border: #2d3e34;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: #fff; font-family: -apple-system, sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            /* 还原：菱形拉丝质感背景 */
            background-image: 
                linear-gradient(45deg, rgba(45, 62, 52, 0.2) 1px, transparent 1px),
                linear-gradient(-45deg, rgba(45, 62, 52, 0.2) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 顶部：内陷式资产面板 */
        .header { 
            background: var(--panel); margin: 15px; padding: 25px 15px; border-radius: 25px; 
            border: 1px solid var(--border); box-shadow: inset 0 0 25px rgba(0,0,0,0.9);
            text-align: center; position: relative;
        }
        .bal-val { font-size: 60px; color: var(--red); font-weight: 800; font-family: 'DIN Alternate', sans-serif; letter-spacing: -2px; }
        .bet-status { display: flex; justify-content: center; gap: 10px; margin-top: 10px; font-size: 14px; color: var(--gold); }
        .bet-status b { background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 6px; border: 1px solid rgba(241,196,15,0.3); }

        /* 中间：量化转盘舞台 */
        .stage { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .pointer { 
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 10;
            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; 
            border-top: 28px solid #ff0000; filter: drop-shadow(0 4px 8px #000);
        }

        #wheel { 
            width: 310px; height: 310px; border-radius: 50%; border: 14px solid #233129;
            background: #1a231e; position: relative;
            /* 物理减速曲线：启动极快，结尾极慢且丝滑 */
            transition: transform 6s cubic-bezier(0.15, 0, 0, 1);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            background-image: radial-gradient(circle at center, #2d3e34 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .hub {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85px; height: 85px; background: #1a231e; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--red); font-weight: bold; font-size: 22px; border: 5px solid #233129;
            z-index: 5; text-align: center; line-height: 1.1;
        }

        .node {
            position: absolute; width: 100%; height: 100%; text-align: center;
            padding-top: 28px; font-size: 28px;
        }

        /* 底部：暗红操作面板 */
        .footer { 
            background: var(--dark-red); padding: 25px 20px 45px; border-radius: 40px 40px 0 0;
            border-top: 2px solid #631b1b; display: flex; align-items: center; justify-content: space-between; gap: 15px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
        }

        .side-btn { 
            width: 65px; height: 60px; background: #261111; border-radius: 16px; 
            color: var(--red); font-size: 32px; display: flex; align-items: center; justify-content: center; 
            border: 1px solid #631b1b; cursor: pointer; transition: 0.1s;
        }
        .side-btn:active { transform: scale(0.9); background: #3d1a1a; }

        .main-btn { 
            flex: 1; height: 85px; background: linear-gradient(180deg, #cc2929 0%, #991a1a 100%);
            color: #fff; border-radius: 45px; font-size: 26px; font-weight: bold; border: none;
            box-shadow: 0 8px 0 #801a1a; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .main-btn span { font-size: 12px; opacity: 0.7; font-weight: normal; margin-top: 2px; letter-spacing: 2px; }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #801a1a; }
        .main-btn:disabled { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }

        /* 动画态 */
        .working { animation: pulse 1s infinite; color: var(--gold) !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <div style="color:#8aa095; font-size: 13px; margin-bottom: 5px;">💰 可用余额 (USDT)</div>
        <div class="bal-val" id="ui-bal">1000.00</div>
        <div class="bet-status">
            <span>档次: <b id="ui-tier">1</b></span>
            <span>单注: <b id="ui-bet">10.0</b></span>
        </div>
    </div>

    <div class="stage">
        <div class="pointer"></div>
        <div id="wheel">
            <div class="hub" id="ui-hub">准备<br>同步</div>
            <div class="node" style="transform:rotate(0deg)">🐺</div>
            <div class="node" style="transform:rotate(45deg)">🦢</div>
            <div class="node" style="transform:rotate(90deg)">🐢</div>
            <div class="node" style="transform:rotate(135deg)">🦅</div>
            <div class="node" style="transform:rotate(180deg)">🐯</div>
            <div class="node" style="transform:rotate(225deg)">🦄</div>
            <div class="node" style="transform:rotate(270deg)">🐲</div>
            <div class="node" style="transform:rotate(315deg)">🔥</div>
        </div>
    </div>

    <div class="footer">
        <div class="side-btn" onclick="Control.changeTier(-1)">−</div>
        <button class="main-btn" id="ui-go" onclick="Control.execute()">
            ▶ 执行抽取
            <span>QUANTUM TERMINAL V2.4</span>
        </button>
        <div class="side-btn" onclick="Control.changeTier(1)">+</div>
    </div>

    <script>
        // 生产环境加固逻辑封装
        const Control = {
            // 五个核心档次定义 (盈利作品专用档位)
            tiers: [10.0, 50.0, 100.0, 500.0, 1000.0],
            currentIdx: 0,
            balance: 1000.00,
            isLocked: false,
            totalRotation: 0,

            // 初始化
            init() {
                this.render();
            },

            // 切换档次
            changeTier(dir) {
                if(this.isLocked) return;
                // 5档循环逻辑
                this.currentIdx = (this.currentIdx + dir + 5) % 5;
                this.render();
                if(window.navigator.vibrate) window.navigator.vibrate(15);
            },

            // 执行量化同步
            execute() {
                const bet = this.tiers[this.currentIdx];
                if(this.isLocked || this.balance < bet) return;

                // 1. 状态锁定
                this.isLocked = true;
                this.balance -= bet;
                this.render();

                const hub = document.getElementById('ui-hub');
                const btn = document.getElementById('ui-go');
                
                btn.disabled = true;
                hub.innerHTML = "同步<br>中...";
                hub.classList.add('working');

                // 2. 物理仿真旋转 (5圈起步 + 随机偏移)
                const rounds = 8 + Math.floor(Math.random() * 5);
                const extra = Math.floor(Math.random() * 360);
                this.totalRotation += (rounds * 360) + extra;
                
                document.getElementById('wheel').style.transform = `rotate(${this.totalRotation}deg)`;

                // 3. 结果结算 (根据生产概率回填)
                setTimeout(() => {
                    this.isLocked = false;
                    btn.disabled = false;
                    hub.innerHTML = "准备<br>同步";
                    hub.classList.remove('working');

                    // 模拟盈利概率 (生产环境应对接API)
                    if(Math.random() > 0.65) {
                        const win = bet * 2.5; 
                        this.balance += win;
                        this.render();
                        // 简单提醒
                        // alert("同步成功，资产已回填");
                    }
                }, 6000); // 必须与CSS中的6s一致
            },

            render() {
                document.getElementById('ui-bal').innerText = this.balance.toFixed(2);
                document.getElementById('ui-tier').innerText = this.currentIdx + 1;
                document.getElementById('ui-bet').innerText = this.tiers[this.currentIdx].toFixed(1);
            }
        };

        Control.init();
    </script>
</body>
</html>
