<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA 旗舰量化终端</title>
    <style>
        body { background: #0b0f0d; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* 🔒 翡翠绿重型激活遮罩 (复刻 27447.jpg) */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #1c221e; padding: 40px 25px; border-radius: 20px; border: 11px solid #00ff88; box-shadow: 0 0 40px #00ff8888; text-align: center; width: 85%; max-width: 350px; }
        #id-box { width: 100%; padding: 15px; background: #fff; color: #000; font-size: 28px; font-weight: bold; border-radius: 10px; border: 3px solid #ff3333; margin: 20px 0; box-sizing: border-box; }
        .btn-go { width: 100%; padding: 18px; background: #ff0000; color: #fff; border: none; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: inset 5px 5px 10px #800; }

        /* 🎮 豪华量化终端界面 (深度复刻 27444.jpg) */
        #game-page { display: none; width: 100%; height: 100vh; flex-direction: column; background: #121a16; }
        .top-info { background: #1a251f; margin: 10px; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #2d3e34; box-shadow: inset 0 0 15px #000; }
        .bal-val { font-size: 52px; color: #ff6b6b; font-weight: bold; margin: 5px 0; }
        .sub-tag { color: #f1c40f; font-size: 13px; margin-top: 5px; }

        /* 🎡 稳定版量化转盘 - 无需外部图片，永不失效 */
        .wheel-section { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background-image: radial-gradient(#2d3e34 1px, transparent 1px); background-size: 20px 20px; }
        .wheel-outer { width: 310px; height: 310px; border-radius: 50%; border: 12px solid #233129; background: #1a251f; position: relative; box-shadow: 0 0 30px #000; display: flex; align-items: center; justify-content: center; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1); position: relative; }
        
        /* 这里的 Emoji 代表你的神兽，位置严格按照你的图 27444.jpg 排布 */
        .beast { position: absolute; font-size: 28px; width: 40px; text-align: center; }
        .b1 { top: 10px; left: 50%; transform: translateX(-50%); } /* 孤狼 */
        .b2 { top: 40px; right: 40px; } /* 仙鹤 */
        .b3 { top: 50%; right: 10px; transform: translateY(-50%); } /* 玄武 */
        .b4 { bottom: 40px; right: 40px; } /* 大鹏 */
        .b5 { bottom: 10px; left: 50%; transform: translateX(-50%); } /* 猛虎 */
        .b6 { bottom: 40px; left: 40px; } /* 麒麟 */
        .b7 { top: 50%; left: 10px; transform: translateY(-50%); } /* 神龙 */
        .b8 { top: 40px; left: 40px; } /* 凤凰 */
        
        .center-hub { position: absolute; width: 70px; height: 70px; background: #233129; border-radius: 50%; border: 4px solid #121a16; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #8aa095; z-index: 5; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ff4d4d; z-index: 10; }

        /* 红色控制区 (复刻 27444.jpg) */
        .controls { background: #4a1414; padding: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-op { background: #330c0c; border: none; color: #fff; width: 50px; height: 50px; border-radius: 10px; font-size: 24px; font-weight: bold; }
        .btn-spin { background: #ff4d4d; border: none; color: #fff; padding: 15px 50px; border-radius: 35px; font-size: 20px; font-weight: bold; flex: 1; box-shadow: 0 4px 0 #b33636; }

        /* 底部导航 (复刻 27444.jpg) */
        .nav-bar { background: #111; display: grid; grid-template-columns: repeat(4, 1fr); padding: 12px 0; border-top: 1px solid #2d3e34; }
        .nav-item { text-align: center; font-size: 11px; color: #8aa095; display: flex; flex-direction: column; gap: 4px; }
        .nav-item.active { color: #ff6b6b; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin:0; letter-spacing:2px;">终端激活</h2>
            <div id="id-box">加载中...</div>
            <button class="btn-go" onclick="activate()">确认进入</button>
            <p style="color:#00ff88; font-size:13px; margin-top:15px; font-weight:bold;">● 系统已自动分配激活序列号</p>
        </div>
    </div>

    <div id="game-page">
        <div style="text-align:center; padding:10px; color:#f1c40f; font-size:12px;">⚡ 量化终端 · 公平游戏 ⚡</div>
        <div class="top-info">
            <div style="color:#8aa095; font-size:14px;">💰 可用余额 (USDT)</div>
            <div class="bal-val" id="user-bal">1000.00</div>
            <div class="sub-tag">🔥 单注额度: 10.0</div>
        </div>

        <div class="wheel-section">
            <div class="wheel-outer">
                <div class="pointer"></div>
                <div class="center-hub">准备</div>
                <div id="wheel">
                    <div class="beast b1">🐺<br><small style="font-size:10px">孤狼</small></div>
                    <div class="beast b2">🦢<br><small style="font-size:10px">仙鹤</small></div>
                    <div class="beast b3">🐢<br><small style="font-size:10px">玄武</small></div>
                    <div class="beast b4">🦅<br><small style="font-size:10px">大鹏</small></div>
                    <div class="beast b5">🐯<br><small style="font-size:10px">猛虎</small></div>
                    <div class="beast b6">🦄<br><small style="font-size:10px">麒麟</small></div>
                    <div class="beast b7">🐲<br><small style="font-size:10px">神龙</small></div>
                    <div class="beast b8">🔥<br><small style="font-size:10px">凤凰</small></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-op">-</button>
            <button class="btn-spin" onclick="runSpin()">▶ 执行抽取</button>
            <button class="btn-op">+</button>
        </div>

        <div class="nav-bar">
            <div class="nav-item">📊<br>行情</div>
            <div class="nav-item">💳<br>资产中心</div>
            <div class="nav-item">📜<br>历史记录</div>
            <div class="nav-item active">🎲<br>量化终端</div>
        </div>
    </div>

    <script>
        // 激活逻辑
        const rid = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('id-box').innerText = rid;

        if (new URLSearchParams(window.location.search).has('user_id')) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('game-page').style.display = 'flex';
        }

        function activate() {
            window.location.href = window.location.origin + window.location.pathname + "?user_id=" + rid;
        }

        // 游戏逻辑 (初始 1000 余额)
        let balance = 1000.00;
        function runSpin() {
            if (balance < 10) return alert("余额不足，请充值");
            balance -= 10;
            document.getElementById('user-bal').innerText = balance.toFixed(2);
            
            const w = document.getElementById('wheel');
            const target = Math.floor(3600 + Math.random() * 3600); // 旋转至少10圈
            w.style.transform = `rotate(${target}deg)`;
        }
    </script>
</body>
</html>
