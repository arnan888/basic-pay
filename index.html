<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>霓虹三游戏 · 3D骰子完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 16px;
            min-height: 100vh;
            color: #eef2ff;
        }
        #app {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.1) inset;
            overflow: hidden;
        }
        /* 登录/注册面板 */
        .auth-panel {
            padding: 32px 24px;
            background: rgba(10, 14, 23, 0.7);
        }
        .auth-panel h2, .auth-panel h3 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(0,255,255,0.3);
        }
        .auth-input {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffff;
            border-radius: 32px;
            color: #00ffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        .auth-input:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 0 3px rgba(255, 0, 255, 0.2);
        }
        .auth-input::placeholder {
            color: #6b7280;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 12px 0;
        }
        .code-btn {
            background: linear-gradient(135deg, #00ffff, #00aaff);
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: black;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .auth-btn {
            background: linear-gradient(135deg, #ff00ff, #ff44aa);
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            font-size: 1rem;
            text-shadow: 0 0 2px black;
        }
        .auth-btn:active, .code-btn:active { transform: scale(0.98); }
        hr {
            margin: 24px 0;
            border-color: #00ffff;
        }
        .auth-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 16px;
            color: #00ffff;
        }
        /* 用户栏 */
        .user-section {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 16px;
            border-bottom: 1px solid #00ffff;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        #userBalanceDisplay {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            text-shadow: 0 0 5px rgba(0,255,255,0.5);
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn-sm {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            padding: 6px 14px;
            border-radius: 40px;
            color: #00ffff;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .charge-btn, .withdraw-btn {
            background: linear-gradient(135deg, #ff00ff, #ff44aa);
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .lang-switch {
            background: #00ffff;
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            color: black;
            cursor: pointer;
            margin-left: 8px;
        }
        /* 游戏导航 */
        .game-nav {
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 16px;
            margin: 16px 12px;
            border-radius: 60px;
        }
        .game-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #00ffff;
            cursor: pointer;
            transition: 0.2s;
        }
        .game-tab.active {
            background: linear-gradient(135deg, #ff00ff, #ff44aa);
            color: white;
            box-shadow: 0 0 12px #ff00ff;
        }
        .game-container {
            padding: 12px 16px 24px;
        }
        /* 游戏卡片 */
        .game-card {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #00ffff;
            box-shadow: 0 0 15px rgba(0,255,255,0.2);
        }
        .chip {
            background: linear-gradient(145deg, #00aaff, #0088cc);
            display: inline-block;
            padding: 8px 16px;
            border-radius: 40px;
            margin: 4px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            border: 1px solid #00ffff;
        }
        .chip.selected {
            background: linear-gradient(145deg, #ff00ff, #cc00aa);
            box-shadow: 0 0 10px #ff00ff;
        }
        .quick-bet, .clear-bet {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            border-radius: 30px;
            padding: 6px 14px;
            margin: 4px;
            cursor: pointer;
            color: #00ffff;
            font-weight: 500;
        }
        .exec-btn {
            background: linear-gradient(135deg, #00ffff, #00aaff);
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            margin: 4px;
        }
        .main-go {
            background: linear-gradient(135deg, #ff00ff, #ff44aa);
            color: white;
        }
        /* 3D 骰子通用样式 */
        .dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            perspective: 800px;
        }
        .dice-cube {
            width: 80px;
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
        }
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #1e1e2a;
            border-radius: 16px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 8px cyan;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            backface-visibility: visible;
        }
        /* 骰子圆点样式 */
        .pip {
            width: 14px;
            height: 14px;
            background: #00ffff;
            border-radius: 50%;
            margin: 3px;
            box-shadow: 0 0 4px cyan;
        }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 12px; left: 12px; }
        .pip-tr { position: absolute; top: 12px; right: 12px; }
        .pip-bl { position: absolute; bottom: 12px; left: 12px; }
        .pip-br { position: absolute; bottom: 12px; right: 12px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1, .pip-l2, .pip-l3 { position: absolute; left: 12px; }
        .pip-l1 { top: 12px; }
        .pip-l2 { top: 50%; transform: translateY(-50%); }
        .pip-l3 { bottom: 12px; }
        .pip-r1, .pip-r2, .pip-r3 { position: absolute; right: 12px; }
        .pip-r1 { top: 12px; }
        .pip-r2 { top: 50%; transform: translateY(-50%); }
        .pip-r3 { bottom: 12px; }
        /* 鱼虾蟹骰子面文字样式 */
        .dice-face-text {
            font-size: 2.5rem;
            text-shadow: 0 0 5px cyan;
        }
        .front { transform: translateZ(40px); }
        .back { transform: rotateY(180deg) translateZ(40px); }
        .right { transform: rotateY(90deg) translateZ(40px); }
        .left { transform: rotateY(-90deg) translateZ(40px); }
        .top { transform: rotateX(90deg) translateZ(40px); }
        .bottom { transform: rotateX(-90deg) translateZ(40px); }
        @media (max-width: 480px) {
            .dice-cube { width: 65px; height: 65px; }
            .front, .back, .right, .left, .top, .bottom { transform: translateZ(32px); }
            .back { transform: rotateY(180deg) translateZ(32px); }
            .right { transform: rotateY(90deg) translateZ(32px); }
            .left { transform: rotateY(-90deg) translateZ(32px); }
            .top { transform: rotateX(90deg) translateZ(32px); }
            .bottom { transform: rotateX(-90deg) translateZ(32px); }
            .dice-face-text { font-size: 2rem; }
            .pip { width: 10px; height: 10px; }
            .pip-tl, .pip-tr, .pip-bl, .pip-br, .pip-l1, .pip-l2, .pip-l3, .pip-r1, .pip-r2, .pip-r3 { margin: 0; }
        }
        .fish-pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
        }
        .fish-bet-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            border: 1px solid #00ffff;
        }
        .bet-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #00ffff;
        }
        .bet-card:active { background: #00ffff22; transform: scale(0.96); }
        .history-cell {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 255, 255, 0.2);
            font-weight: bold;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #0f172a;
            border-radius: 32px;
            padding: 24px;
            max-width: 90%;
            max-height: 85%;
            overflow: auto;
            color: #00ffff;
            border: 1px solid #ff00ff;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #00ffff;
            padding: 8px 20px;
            border-radius: 60px;
            z-index: 2000;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid cyan;
        }
        .result-popup {
            position: fixed;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff00ff, #ff44aa);
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 1500;
            box-shadow: 0 0 20px magenta;
        }
        .points-grid, .trio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 8px;
            margin: 12px 0;
        }
        button { cursor: pointer; }
        /* 管理员表格 */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .admin-table th, .admin-table td {
            padding: 8px 4px;
            border-bottom: 1px solid #00ffff;
            text-align: left;
        }
        .admin-btn {
            background: #00aaff;
            border: none;
            border-radius: 20px;
            padding: 4px 8px;
            margin: 2px;
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== 双语词库（霓虹版） ====================
    const lang = {
        zh: {
            recharge: "💎 充值", withdraw: "💰 提现", service: "📞 客服", logout: "退出", balance: "余额",
            phoneOrEmail: "手机号 / 邮箱", password: "密码 (≥4位)", referralCode: "推荐码 (必填)", remember: "记住账号",
            login: "登录", register: "注册", referralNote: "推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "获取验证码", verifyCode: "验证码", registerNow: "注册新账户",
            gameFish: "🐟 葫芦鱼", gameDice: "🎲 至尊骰宝", gameDT: "🐉 龙虎斗", game4: "♠️ 游戏4",
            fishRoll: "🎲 开骰", fishClear: "清空", fishGrab: "🎲 抢庄", fishDouble: "🎯 双押",
            diceClear: "清空", diceRepeat: "续押", diceRefresh: "刷新", dtFight: "确认投注", dtCancel: "全部取消", dtRepeat: "续押", dtRefresh: "刷新"
        },
        th: {
            recharge: "💎 เติมเงิน", withdraw: "💰 ถอนเงิน", service: "📞 บริการ", logout: "ออก", balance: "ยอดเงิน",
            phoneOrEmail: "เบอร์โทร / อีเมล", password: "รหัสผ่าน (≥4)", referralCode: "รหัสแนะนำ", remember: "จำฉัน",
            login: "เข้าสู่ระบบ", register: "สมัคร", referralNote: "รหัส: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "รับรหัส", verifyCode: "รหัสยืนยัน", registerNow: "สมัครสมาชิก",
            gameFish: "🐟 ปลาหมึก", gameDice: "🎲 เซียนเต๋า", gameDT: "🐉 มังกรเสือ", game4: "♠️ เกม4",
            fishRoll: "🎲 เปิด", fishClear: "ล้าง", fishGrab: "🎲 รับเจ้ามือ", fishDouble: "🎯 เดิมพันคู่",
            diceClear: "ล้าง", diceRepeat: "เล่นซ้ำ", diceRefresh: "รีเฟรช", dtFight: "ยืนยัน", dtCancel: "ยกเลิก", dtRepeat: "เล่นซ้ำ", dtRefresh: "รีเฟรช"
        }
    };
    let currentLang = 'zh';
    function t(key) { return lang[currentLang][key] || lang.zh[key] || key; }

    // ==================== 全局数据 ====================
    let systemBankerBalance = localStorage.getItem('neon_system_banker') ? parseFloat(localStorage.getItem('neon_system_banker')) : 50000;
    let adjustFactor = localStorage.getItem('neon_adjustFactor') ? parseFloat(localStorage.getItem('neon_adjustFactor')) : 1.0;
    let validReferralCodes = ["VIP666", "888VIP", "GOLD2025", "LUCKY8", "DICE100"];
    let usersData = JSON.parse(localStorage.getItem('neon_users')) || {};
    let currentUser = null;
    let verificationCodes = {};

    function saveUsers() { localStorage.setItem('neon_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.account]?.balance || 0) : 0; }
    function setUserBalance(amount) {
        if (!currentUser) return;
        usersData[currentUser.account].balance = Math.max(0, amount);
        saveUsers();
        let span = document.getElementById("userBalanceDisplay");
        if (span) span.innerText = getUserBalance().toFixed(2);
    }
    function showToast(msg) {
        let t = document.createElement('div'); t.className = 'toast-message'; t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    function recharge() {
        let yuan = prompt(t('recharge') + " (1元 = 1余额)", "10");
        if (!yuan) return;
        let num = parseFloat(yuan);
        if (isNaN(num) || num <= 0) { showToast("请输入正数"); return; }
        setUserBalance(getUserBalance() + num);
        showToast(`${t('recharge')} +${num.toFixed(2)} 元`);
    }
    function withdraw() {
        let bal = getUserBalance();
        if (bal <= 0) { showToast("余额不足"); return; }
        let amount = parseFloat(prompt("提现金额 (元)", "10"));
        if (isNaN(amount) || amount <= 0 || amount > bal) { showToast("金额无效"); return; }
        let type = confirm("提现方式：确定=微信，取消=支付宝") ? "微信" : "支付宝";
        let account = prompt("请输入收款账号:");
        if (!account) return;
        setUserBalance(bal - amount);
        let record = { phone: currentUser.account, amount: amount, type, account, time: new Date().toLocaleString() };
        let records = JSON.parse(localStorage.getItem('neon_withdraw')) || [];
        records.push(record);
        localStorage.setItem('neon_withdraw', JSON.stringify(records));
        showToast(`提现申请已提交！${amount}元将处理到${type}账号 ${account}`);
    }
    function showServiceModal() { alert("客服微信: game_kf_888"); }

    // ==================== 管理员后台 ====================
    let adminPassword = "admin888";
    function openAdminModal() {
        let pwd = prompt("管理员密码:");
        if (pwd !== adminPassword) { showToast("密码错误"); return; }
        let allUsers = Object.keys(usersData).map(acc => ({ account: acc, balance: usersData[acc].balance, regTime: usersData[acc].registerTime || '未知' }));
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content" style="max-width:500px;">
                <h3 style="text-align:center; color:#ff00ff;">🎛️ 霓虹管理员后台</h3>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <input type="text" id="adminSearchInput" placeholder="🔍 搜索手机号/邮箱" style="flex:2; padding:8px; border-radius:40px; border:1px solid #00ffff; background:#000;">
                    <button id="adminSearchBtn" class="admin-btn">搜索</button>
                    <button id="adminResetSearch" class="admin-btn">重置</button>
                </div>
                <div style="max-height:220px; overflow-y:auto; margin-bottom:12px;">
                    <table class="admin-table">
                        <thead><tr><th>账号</th><th>余额</th><th>注册时间</th><th>操作</th></tr></thead>
                        <tbody id="adminUserTableBody"></tbody>
                    </table>
                </div>
                <select id="adminTargetUser" style="width:100%; margin:8px 0; padding:8px; border-radius:40px; background:#000; color:#00ffff; border:1px solid #00ffff;">
                    ${allUsers.map(u => `<option value="${u.account}">${u.account} (${u.balance.toFixed(2)} 元)</option>`).join('')}
                </select>
                <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                    <input id="adminAmount" placeholder="金额" value="0" style="flex:1; padding:8px; border-radius:40px; background:#000; color:#00ffff; border:1px solid #00ffff;">
                    <button id="adminAddBalance" class="admin-btn">➕ 上分</button>
                    <button id="adminSubBalance" class="admin-btn">➖ 下分</button>
                    <button id="adminResetBalance" class="admin-btn">🔄 重置0</button>
                </div>
                <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                    <button id="adminQueryBalance" class="admin-btn">🔍 查询余额</button>
                    <button id="adminExportUsers" class="admin-btn">📋 导出用户</button>
                    <button id="adminAddCode" class="admin-btn">➕ 新增推荐码</button>
                    <button id="adminListCodes" class="admin-btn">📜 查看推荐码</button>
                    <button id="adminSetBanker" class="admin-btn">🏦 设置庄家</button>
                    <button id="adminChangePwd" class="admin-btn">🔑 改管理员密码</button>
                </div>
                <div style="margin:12px 0;">
                    <label>🎛️ 全局赔付系数: <input id="adminAdjustFactor" step="0.01" value="${adjustFactor}" style="width:90px; padding:4px; border-radius:20px; background:#000; color:#00ffff;"></label>
                    <button id="adminSaveFactor" class="admin-btn">保存系数</button>
                    <span style="font-size:0.7rem; margin-left:8px;">(影响所有游戏赔付)</span>
                </div>
                <button id="adminViewWithdraw" class="admin-btn" style="width:100%; margin-bottom:8px;">📋 查看所有提现记录</button>
                <button id="adminCloseBtn" class="auth-btn" style="background:#ff00ff;">关闭后台</button>
            </div>
        `;
        document.body.appendChild(modalDiv);

        function renderUserTable(searchKeyword = '') {
            let filtered = searchKeyword ? allUsers.filter(u => u.account.includes(searchKeyword)) : allUsers;
            let tbody = modalDiv.querySelector('#adminUserTableBody');
            tbody.innerHTML = filtered.map(u => `
                <tr>
                    <td>${u.account}</td>
                    <td>💰 ${u.balance.toFixed(2)}</td>
                    <td>${u.regTime}</td>
                    <td><button class="viewRecordBtn" data-account="${u.account}" class="admin-btn" style="background:#ff00ff;">📜 记录</button></td>
                </tr>
            `).join('');
            document.querySelectorAll('.viewRecordBtn').forEach(btn => {
                btn.onclick = () => {
                    let acc = btn.dataset.account;
                    let records = usersData[acc]?.records || [];
                    let html = '<div style="max-height:300px; overflow-y:auto;">' + records.map(r => `<div style="padding:6px; border-bottom:1px solid #00ffff;">${r.time} | ${r.game} | 押 ${r.bet} → ${r.result} | ${r.win>0 ? '<span style="color:#0f0;">赢 '+r.win+'</span>' : '<span style="color:#f0f;">输 '+r.amount+'</span>'}</div>`).join('') + '</div><button id="closeRec" class="auth-btn" style="margin-top:12px;">关闭</button>';
                    let m = document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove();
                };
            });
        }
        renderUserTable();

        modalDiv.querySelector('#adminSearchBtn').onclick = () => {
            let kw = modalDiv.querySelector('#adminSearchInput').value.trim();
            renderUserTable(kw);
        };
        modalDiv.querySelector('#adminResetSearch').onclick = () => {
            modalDiv.querySelector('#adminSearchInput').value = '';
            renderUserTable('');
        };

        const getTarget = () => modalDiv.querySelector('#adminTargetUser').value;
        const getAmt = () => parseFloat(modalDiv.querySelector('#adminAmount').value) || 0;

        modalDiv.querySelector('#adminAddBalance').onclick = () => {
            let t = getTarget(), a = getAmt();
            if (a <= 0) { showToast("金额必须大于0"); return; }
            usersData[t].balance += a;
            saveUsers();
            if (currentUser?.account === t) setUserBalance(usersData[t].balance);
            showToast(`${t} +${a} 元`);
            modalDiv.remove(); openAdminModal();
        };
        modalDiv.querySelector('#adminSubBalance').onclick = () => {
            let t = getTarget(), a = getAmt();
            if (a <= 0 || usersData[t].balance < a) { showToast("金额无效或余额不足"); return; }
            usersData[t].balance -= a;
            saveUsers();
            if (currentUser?.account === t) setUserBalance(usersData[t].balance);
            showToast(`${t} -${a} 元`);
            modalDiv.remove(); openAdminModal();
        };
        modalDiv.querySelector('#adminResetBalance').onclick = () => {
            let t = getTarget();
            if (confirm(`确认将 ${t} 的余额重置为 0 元吗？`)) {
                usersData[t].balance = 0;
                saveUsers();
                if (currentUser?.account === t) setUserBalance(0);
                showToast(`${t} 余额已重置为 0`);
                modalDiv.remove(); openAdminModal();
            }
        };
        modalDiv.querySelector('#adminQueryBalance').onclick = () => {
            let t = getTarget();
            showToast(`${t} 当前余额: ${usersData[t].balance.toFixed(2)} 元`);
        };
        modalDiv.querySelector('#adminExportUsers').onclick = () => {
            let data = allUsers.map(u => `${u.account},${u.balance},${u.regTime}`).join('\n');
            navigator.clipboard.writeText("账号,余额,注册时间\n" + data).then(() => showToast(`已复制 ${allUsers.length} 条用户数据`)).catch(() => showToast("复制失败"));
        };
        modalDiv.querySelector('#adminAddCode').onclick = () => {
            let newCode = prompt("请输入新的推荐码（大写字母+数字）:").trim().toUpperCase();
            if (newCode && !validReferralCodes.includes(newCode)) {
                validReferralCodes.push(newCode);
                localStorage.setItem('neon_valid_codes', JSON.stringify(validReferralCodes));
                showToast(`推荐码 ${newCode} 已添加`);
            } else showToast("无效或已存在");
        };
        modalDiv.querySelector('#adminListCodes').onclick = () => {
            alert(`当前有效推荐码：\n${validReferralCodes.join(', ')}`);
        };
        modalDiv.querySelector('#adminSetBanker').onclick = () => {
            let newAmt = parseFloat(prompt("骰宝系统庄家新余额:", systemBankerBalance));
            if (!isNaN(newAmt) && newAmt >= 0) {
                systemBankerBalance = newAmt;
                localStorage.setItem('neon_system_banker', systemBankerBalance);
                showToast(`骰宝庄家余额已设为 ${newAmt.toFixed(2)} 元`);
                let bankerEl = document.getElementById('diceBankerDisplay');
                if (bankerEl) bankerEl.innerText = systemBankerBalance.toFixed(2);
            } else showToast("无效");
        };
        modalDiv.querySelector('#adminChangePwd').onclick = () => {
            let old = prompt("当前管理员密码:");
            if (old !== adminPassword) { showToast("密码错误"); return; }
            let newPwd = prompt("新密码(≥4位):");
            if (newPwd && newPwd.length >= 4) {
                adminPassword = newPwd;
                localStorage.setItem('neon_admin_pwd', newPwd);
                showToast("管理员密码修改成功");
            } else showToast("密码至少4位");
        };
        modalDiv.querySelector('#adminSaveFactor').onclick = () => {
            let newFac = parseFloat(modalDiv.querySelector('#adminAdjustFactor').value);
            if (!isNaN(newFac) && newFac >= 0.2 && newFac <= 3.0) {
                adjustFactor = newFac;
                localStorage.setItem('neon_adjustFactor', adjustFactor);
                showToast(`全局赔付系数已设为 ${adjustFactor}`);
            } else showToast("系数范围 0.2 ~ 3.0");
        };
        modalDiv.querySelector('#adminViewWithdraw').onclick = () => {
            let records = JSON.parse(localStorage.getItem('neon_withdraw')) || [];
            if (records.length === 0) { alert("暂无提现记录"); return; }
            let txt = records.map(r => `${r.phone}  ${r.amount}元 ${r.type} ${r.account} ${r.time}`).join('\n');
            alert("提现记录：\n" + txt);
        };
        modalDiv.querySelector('#adminCloseBtn').onclick = () => modalDiv.remove();
    }

    // 添加游戏记录
    function addGameRecord(account, gameName, betInfo, result, winAmount, betAmount) {
        if (!usersData[account]) return;
        let rec = usersData[account].records || [];
        rec.unshift({ time: new Date().toLocaleString(), game: gameName, bet: betInfo, result, win: winAmount, amount: betAmount });
        if (rec.length > 100) rec.pop();
        usersData[account].records = rec;
        saveUsers();
    }

    // ==================== 葫芦鱼（鱼虾蟹3D骰子） ====================
    let fishDestroy = null;
    function initFishGame(container) {
        if (fishDestroy) fishDestroy();
        container.innerHTML = `
            <div class="game-card">
                <div style="display:flex; gap:12px; margin-bottom:16px;">
                    <div style="flex:1; background:rgba(0,0,0,0.5); border-radius:24px; padding:8px; text-align:center;"><div>🏦 庄家余额</div><div id="fishBankerDisplay">∞</div></div>
                    <div style="flex:1; background:rgba(0,0,0,0.5); border-radius:24px; padding:8px; text-align:center;"><div>🎲 总押注</div><div id="fishTotalBet">0</div></div>
                    <div style="flex:1; background:rgba(0,0,0,0.5); border-radius:24px; padding:8px; text-align:center;"><div>🏆 上局净利</div><div id="fishLastWin">0</div></div>
                </div>
                <div id="fishChips" style="margin:8px 0;">
                    <span class="chip" data-chip="2">2</span><span class="chip" data-chip="5">5</span><span class="chip selected" data-chip="10">10</span><span class="chip" data-chip="50">50</span><span class="chip" data-chip="100">100</span>
                </div>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <button id="fishRollBtn" class="exec-btn">${t('fishRoll')}</button>
                    <button id="fishClearBtn" class="exec-btn" style="background:#c23b22;">${t('fishClear')}</button>
                    <button id="fishGrabBtn" class="exec-btn" style="background:#f59e0b;">${t('fishGrab')}</button>
                    <button id="fishDoubleBtn" class="exec-btn" style="background:#f97316;">${t('fishDouble')}</button>
                </div>
                <div class="dice-3d-area">
                    <div class="dice-cube" id="fishDice0"></div>
                    <div class="dice-cube" id="fishDice1"></div>
                    <div class="dice-cube" id="fishDice2"></div>
                </div>
                <div id="fishPatternGrid" class="fish-pattern-grid"></div>
                <button id="fishRecordBtn" class="exec-btn" style="width:100%; margin-top:8px;">📜 记录</button>
                <div id="fishPhaseHint" style="text-align:center; margin-top:12px; background:rgba(0,0,0,0.5); border-radius:30px; padding:8px;">🎲 下注阶段 · 25秒</div>
            </div>
        `;
        const patternNames = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        const patternEmojis = ["🐟", "🦐", "🦀", "🎃", "💰", "🐔"];
        
        function buildFishDice(diceDiv) {
            if (!diceDiv) return;
            diceDiv.innerHTML = '';
            const faces = ['front', 'back', 'right', 'left', 'top', 'bottom'];
            const facePatterns = patternEmojis;
            faces.forEach((face, idx) => {
                let fd = document.createElement('div');
                fd.className = `dice-face ${face}`;
                fd.style.background = "#1e1e2a";
                fd.style.display = "flex";
                fd.style.alignItems = "center";
                fd.style.justifyContent = "center";
                fd.style.fontSize = "2.5rem";
                fd.style.fontWeight = "bold";
                fd.style.color = "#00ffff";
                fd.style.textShadow = "0 0 5px cyan";
                fd.innerText = facePatterns[idx];
                diceDiv.appendChild(fd);
            });
            const randX = Math.floor(Math.random() * 360);
            const randY = Math.floor(Math.random() * 360);
            diceDiv.style.transform = `rotateX(${randX}deg) rotateY(${randY}deg)`;
        }
        
        function setFishDiceValue(diceDiv, patternName) {
            const index = patternNames.indexOf(patternName);
            let rotateX = 0, rotateY = 0;
            switch(index) {
                case 0: rotateX = 0; rotateY = 0; break;
                case 1: rotateX = 0; rotateY = -90; break;
                case 2: rotateX = 0; rotateY = 180; break;
                case 3: rotateX = 0; rotateY = 90; break;
                case 4: rotateX = -90; rotateY = 0; break;
                case 5: rotateX = 90; rotateY = 0; break;
            }
            const extraX = 360 * (1 + Math.floor(Math.random() * 2));
            const extraY = 360 * (1 + Math.floor(Math.random() * 2));
            diceDiv.style.transform = `rotateX(${rotateX + extraX}deg) rotateY(${rotateY + extraY}deg)`;
        }
        
        const fishDice = [document.getElementById('fishDice0'), document.getElementById('fishDice1'), document.getElementById('fishDice2')];
        fishDice.forEach(d => buildFishDice(d));
        
        let patternBets = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
        let specialDouble = 0;
        let currentChip = 10;
        let hasGrabbed = false;
        let playerBankerBalance = 0;
        let gameRecords = [];
        let isRolling = false, roundActive = true, countdownTimer = null;
        let lastWinAmount = 0;

        function updateFishUI() {
            for (let p in patternBets) { let span = document.getElementById(`fishBet_${p}`); if(span) span.innerText = patternBets[p]; }
            document.getElementById('fishTotalBet').innerText = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            document.getElementById('fishLastWin').innerText = lastWinAmount;
            let bankerSpan = document.getElementById('fishBankerDisplay');
            if (bankerSpan) bankerSpan.innerText = hasGrabbed ? playerBankerBalance.toFixed(2) : "∞";
        }
        
        function addFishBet(pattern, val) {
            if (hasGrabbed) { showToast("庄家不能下注"); return; }
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (val > 500) { showToast("单注上限500"); return; }
            if (total+val > 2000) { showToast("总注上限2000"); return; }
            if (val > getUserBalance()) { showToast("余额不足"); return; }
            setUserBalance(getUserBalance() - val);
            patternBets[pattern] += val;
            updateFishUI();
        }
        function subFishBet(pattern, val) {
            let cur = patternBets[pattern];
            if (cur < val) val = cur;
            if (val===0) return;
            patternBets[pattern] -= val;
            setUserBalance(getUserBalance() + val);
            updateFishUI();
        }
        function addDoubleBet() {
            if (hasGrabbed) { showToast("庄家不能下注"); return; }
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (currentChip > 500) { showToast("双押上限500"); return; }
            if (total+currentChip > 2000) { showToast("总注上限2000"); return; }
            if (currentChip > getUserBalance()) { showToast("余额不足"); return; }
            setUserBalance(getUserBalance() - currentChip);
            specialDouble += currentChip;
            updateFishUI();
        }
        function clearFishBets() {
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (total>0) setUserBalance(getUserBalance() + total);
            patternBets = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
            specialDouble = 0;
            updateFishUI();
        }
        
        async function rollFishDiceWithAnimation(finalPatterns) {
            for (let i=0;i<3;i++) {
                fishDice[i].style.transition = 'none';
                const randX = Math.floor(Math.random() * 360);
                const randY = Math.floor(Math.random() * 360);
                fishDice[i].style.transform = `rotateX(${randX}deg) rotateY(${randY}deg)`;
            }
            await new Promise(r => setTimeout(r, 50));
            for (let i=0;i<3;i++) fishDice[i].style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
            for (let step=0; step<12; step++) {
                for (let i=0;i<3;i++) {
                    const randX = Math.random() * 360;
                    const randY = Math.random() * 360;
                    fishDice[i].style.transform = `rotateX(${randX}deg) rotateY(${randY}deg)`;
                }
                await new Promise(r => setTimeout(r, 80));
            }
            for (let i=0;i<3;i++) {
                setFishDiceValue(fishDice[i], finalPatterns[i]);
            }
            await new Promise(r => setTimeout(r, 400));
        }
        
        async function settleFish() {
            if (isRolling) return;
            let totalBet = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (totalBet === 0) { showToast("请先下注"); return; }
            isRolling = true;
            let r1 = patternNames[Math.floor(Math.random()*6)];
            let r2 = patternNames[Math.floor(Math.random()*6)];
            let r3 = patternNames[Math.floor(Math.random()*6)];
            await rollFishDiceWithAnimation([r1,r2,r3]);
            let winAmount = 0;
            let occurs = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
            [r1,r2,r3].forEach(p=>occurs[p]++);
            for (let p in patternBets) {
                let cnt = occurs[p];
                if (cnt>0 && patternBets[p]>0) winAmount += patternBets[p] * (cnt+1);
            }
            if (specialDouble>0 && occurs["鱼"]>0 && occurs["虾"]>0) winAmount += specialDouble * 4.5;
            winAmount = winAmount * adjustFactor;
            if (totalBet>0) {
                setUserBalance(getUserBalance() + winAmount);
                if (hasGrabbed) {
                    let net = (totalBet - winAmount) * adjustFactor;
                    playerBankerBalance += net;
                    if (playerBankerBalance < 0) { hasGrabbed=false; playerBankerBalance=0; localStorage.removeItem('neon_fish_banker'); showToast("庄家破产"); }
                    else localStorage.setItem('neon_fish_banker', playerBankerBalance);
                    updateFishUI();
                }
                lastWinAmount = winAmount - totalBet;
                addGameRecord(currentUser.account, '葫芦鱼', `押${Object.entries(patternBets).filter(([k,v])=>v>0).map(([k,v])=>`${k}${v}`).join(',')}`, `${r1},${r2},${r3}`, winAmount, totalBet);
            } else lastWinAmount = 0;
            gameRecords.unshift({ time:new Date().toLocaleTimeString(), dice:`${r1},${r2},${r3}`, result:winAmount>0?`赢${winAmount}`:`输${totalBet}` });
            clearFishBets();
            let pop = document.createElement('div'); pop.className='result-popup'; pop.innerText = winAmount>0?`🎉 赢 ${winAmount.toFixed(2)} 🎉`:`😭 输 ${totalBet} 😭`; document.body.appendChild(pop); setTimeout(()=>pop.remove(), 2000);
            isRolling=false;
            if(roundActive) startFishRound();
        }
        
        function startFishRound() {
            if (countdownTimer) clearInterval(countdownTimer);
            let remaining=25;
            let hintDiv = document.getElementById('fishPhaseHint');
            if(hintDiv) hintDiv.innerText = `🎲 下注阶段 · ${remaining}秒`;
            countdownTimer = setInterval(()=>{
                remaining--;
                if(hintDiv) hintDiv.innerText = `🎲 下注阶段 · ${remaining}秒`;
                if(remaining<=0){
                    clearInterval(countdownTimer);
                    if(!isRolling && roundActive) settleFish();
                }
            },1000);
        }
        
        let gridDiv = document.getElementById('fishPatternGrid');
        patternNames.forEach(p => {
            let card = document.createElement('div'); card.className = 'fish-bet-card';
            let emoji = patternEmojis[patternNames.indexOf(p)];
            card.innerHTML = `<div style="font-size:1.6rem; margin-bottom:4px;">${emoji}</div><div>${p}</div><div><button class="quick-bet sub-pat" data-pat="${p}">-</button><span id="fishBet_${p}" style="margin:0 12px; font-weight:bold;">0</span><button class="quick-bet add-pat" data-pat="${p}">+</button></div>`;
            gridDiv.appendChild(card);
        });
        
        document.querySelectorAll('#fishChips .chip').forEach(chip=>{
            chip.onclick=function(){ currentChip=parseInt(this.dataset.chip); document.querySelectorAll('#fishChips .chip').forEach(c=>c.classList.remove('selected')); this.classList.add('selected'); };
        });
        
        document.getElementById('fishGrabBtn').onclick=()=>{
            if(hasGrabbed){ showToast("已是庄家"); return; }
            if(getUserBalance()>=2001){
                setUserBalance(getUserBalance()-2001);
                playerBankerBalance=2001;
                hasGrabbed=true;
                localStorage.setItem('neon_fish_banker', playerBankerBalance);
                updateFishUI();
                showToast("抢庄成功，不可下注");
            } else showToast("余额不足2001");
        };
        document.getElementById('fishClearBtn').onclick=clearFishBets;
        document.getElementById('fishDoubleBtn').onclick=addDoubleBet;
        document.getElementById('fishRollBtn').onclick=()=>{ if(!isRolling && roundActive) settleFish(); };
        document.getElementById('fishRecordBtn').onclick=()=>{
            if(gameRecords.length===0){ showToast("暂无记录"); return; }
            let html = '<div>' + gameRecords.map(r=>`<div>${r.time} 🎲 ${r.dice} ${r.result}</div>`).join('') + '</div><button id="closeRec" class="auth-btn">关闭</button>';
            let m = document.createElement('div'); m.className='modal'; m.innerHTML = `<div class="modal-content">${html}</div>`;
            document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove();
        };
        
        gridDiv.addEventListener('click',(e)=>{
            let btn = e.target.closest('.quick-bet');
            if(!btn) return;
            let pat = btn.dataset.pat;
            if(btn.classList.contains('add-pat')) addFishBet(pat, currentChip);
            if(btn.classList.contains('sub-pat')) subFishBet(pat, currentChip);
        });
        
        let saved = localStorage.getItem('neon_fish_banker');
        if(saved && parseInt(saved)>0){ hasGrabbed=true; playerBankerBalance=parseInt(saved); }
        updateFishUI();
        startFishRound();
        fishDestroy = () => { roundActive=false; if(countdownTimer) clearInterval(countdownTimer); container.innerHTML=''; };
        return fishDestroy;
    }

        document.getElementById('pointsGrid').innerHTML = pointsHtml;

        trioHtml += `<div class="bet-card trio-card" data-type="ALL_TRIPLE">豹子</div>`;
        document.getElementById('trioGrid').innerHTML = trioHtml;

        // 构建3D点数骰子
        function buildDiceCube(diceDiv) {
            if (!diceDiv) return;
            diceDiv.innerHTML = '';
            const faces = ['front', 'back', 'right', 'left', 'top', 'bottom'];
            const valMap = { front:1, back:6, right:4, left:3, top:2, bottom:5 };
            faces.forEach(face => {
                let num = valMap[face];
                let fd = document.createElement('div');
                fd.className = `dice-face ${face}`;
                // 根据点数绘制圆点
                let pipHtml = '';
                if (num === 1) pipHtml = '<div class="pip pip-center"></div>';
                else if (num === 2) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-br"></div>';
                else if (num === 3) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div>';
                else if (num === 4) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';

                else pipHtml = '<div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div>';

            // 初始随机旋转
            const randX = Math.floor(Math.random() * 360);
            const randY = Math.floor(Math.random() * 360);
            diceDiv.style.transform = `rotateX(${randX}deg) rotateY(${randY}deg)`;
        }
        
        function setCubeValue(dice, val) {
            const rot = { 1:'rotateX(0deg) rotateY(0deg)', 2:'rotateX(-90deg) rotateY(0deg)', 3:'rotateY(90deg)', 4:'rotateY(-90deg)', 5:'rotateX(90deg)', 6:'rotateX(180deg)' };
            // 增加多圈旋转使动画更自然
            const extraX = 360 * (1 + Math.floor(Math.random() * 2));
            const extraY = 360 * (1 + Math.floor(Math.random() * 2));
            let baseRot = rot[val];
            // 解析baseRot
            let rotateX = 0, rotateY = 0;
            if (baseRot.includes('rotateX')) {
                let match = baseRot.match(/rotateX\(([-\d]+)deg\)/);
                if (match) rotateX = parseInt(match[1]);
            }
            if (baseRot.includes('rotateY')) {
                let match = baseRot.match(/rotateY\(([-\d]+)deg\)/);
                if (match) rotateY = parseInt(match[1]);
            }
            dice.style.transform = `rotateX(${rotateX + extraX}deg) rotateY(${rotateY + extraY}deg)`;
        }

        async function startRollingLong(finalVals, duration=5000) {
            return new Promise(resolve => {
                let steps=30, step=0, interval=duration/steps;
                let iv = setInterval(()=>{
                    diceEls.forEach(d => {
                        const randVal = Math.floor(Math.random()*6)+1;
                        setCubeValue(d, randVal);
                    });
                    step++;
                    if(step>=steps){
                        clearInterval(iv);
                        diceEls.forEach((d,i)=>setCubeValue(d, finalVals[i]));
                        resolve();
                    }
                }, interval);
            });
        }
        
        function startRollingNumber(finalAmount) {
            if(window.rollingAnimation) cancelAnimationFrame(window.rollingAnimation);
            let start=performance.now(), startVal=parseFloat(rollingWinEl.innerText)||0;
            function update(now){
                let p=Math.min(1,(now-start)/5000), ease=1-Math.pow(1-p,2), cur=startVal+(finalAmount-startVal)*ease;
                rollingWinEl.innerText=cur.toFixed(2);
                if(p<1) window.rollingAnimation=requestAnimationFrame(update);
                else { rollingWinEl.innerText=finalAmount.toFixed(2); window.rollingAnimation=null; }
            }
            window.rollingAnimation=requestAnimationFrame(update);
        }
        
        function getResultInfo(d1,d2,d3){

            return {total, types};

        async function startAutoDrawDice(){
            if(isBetLocked) return;

            isBetLocked=true;
            let d1=Math.floor(Math.random()*6)+1, d2=Math.floor(Math.random()*6)+1, d3=Math.floor(Math.random()*6)+1;
            let {total, types}=getResultInfo(d1,d2,d3);
            let winAmount=0;
            if(totalBetVal>0){
                if(types.includes('BIG') && bets.BIG) winAmount+=bets.BIG*2;
                if(types.includes('SMALL') && bets.SMALL) winAmount+=bets.SMALL*2;
                if(types.includes('ODD') && bets.ODD) winAmount+=bets.ODD*2;
                if(types.includes('EVEN') && bets.EVEN) winAmount+=bets.EVEN*2;
                const oddsMap = {4:60,5:30,6:18,7:12,8:8,9:7,10:6,11:6,12:7,13:8,14:12,15:18,16:30,17:60};
                if(bets[total]) winAmount+=bets[total]*oddsMap[total];
                for(let t of types){ if(t.startsWith('TRIPLE_') && bets[t]) winAmount+=bets[t]*150; if(t==='ALL_TRIPLE' && bets.ALL_TRIPLE) winAmount+=bets.ALL_TRIPLE*30; }
                winAmount = winAmount * adjustFactor;
            }
            startRollingNumber(winAmount);
            await startRollingLong([d1,d2,d3], 5000);
            totalEl.innerText = total;

        }

        document.getElementById('repeatBtnDT').onclick = repeatLastBetDT;
        document.getElementById('refreshBtnDT').onclick = refreshBalanceDT;
        document.getElementById('myHistoryBtnDT').onclick = showMyHistoryDT;
        document.getElementById('newUserBtnDT').onclick = newUserDT;
        document.getElementById('switchUserBtnDT').onclick = switchUserDT;
        document.querySelectorAll('.speed-btn').forEach(btn => { btn.onclick = () => setSpeedDT(parseInt(btn.dataset.speed)); });
        updateUIDT(); updateHistoryDisplayDT(); updateRecordDisplayDT(); startCountdownDT(30);
        dragonTigerDestroy = () => { if (state.countdownInterval) clearInterval(state.countdownInterval); container.innerHTML=''; };
        return dragonTigerDestroy;
    }

    function initGame4(container) { container.innerHTML = `<div class="game-card" style="text-align:center; padding:40px;">♠️ 游戏4 · 百人牛牛筹备中</div>`; return ()=>{}; }

    // ==================== 认证界面 ====================
    function renderAuthUI() {
        const savedAcc = localStorage.getItem('neon_saved_account') || '';
        const savedPwd = localStorage.getItem('neon_saved_password') || '';
        const remChecked = localStorage.getItem('neon_remember_me') === 'true';
        document.getElementById('app').innerHTML = `
            <div class="auth-panel">
                <h2>🎲 霓虹三游戏</h2>
                <div>
                    <input type="text" id="loginAccount" class="auth-input" placeholder="${t('phoneOrEmail')}" value="${savedAcc}">
                    <input type="password" id="loginPassword" class="auth-input" placeholder="${t('password')}" value="${savedPwd}">
                    <div class="flex-row"><input type="checkbox" id="rememberCheckbox" ${remChecked ? 'checked' : ''}> <label>${t('remember')}</label></div>
                    <button id="loginBtn" class="auth-btn">${t('login')}</button>
                </div>
                <hr>
                <h3>${t('registerNow')}</h3>
                <input type="text" id="regAccount" class="auth-input" placeholder="${t('phoneOrEmail')}">
                <div class="flex-row">
                    <input type="text" id="regCode" class="auth-input" placeholder="${t('verifyCode')}">
                    <button id="getCodeBtn" class="code-btn">${t('getCode')}</button>
                </div>
                <input type="password" id="regPassword" class="auth-input" placeholder="${t('password')}">
                <input type="text" id="regReferral" class="auth-input" placeholder="${t('referralCode')}">
                <button id="registerBtn" class="auth-btn">${t('register')}</button>
                <div class="auth-note">${t('referralNote')}</div>
            </div>
        `;
        document.getElementById('loginBtn').onclick = () => {
            let acc = document.getElementById('loginAccount').value.trim();
            let pwd = document.getElementById('loginPassword').value;
            let rem = document.getElementById('rememberCheckbox').checked;
            if (!acc || !pwd) { showToast("请填写账号和密码"); return; }
            let user = usersData[acc];
            if (!user || user.password !== pwd) { showToast("账号或密码错误"); return; }
            if (rem) { localStorage.setItem('neon_saved_account', acc); localStorage.setItem('neon_saved_password', pwd); localStorage.setItem('neon_remember_me', 'true'); }
            else { localStorage.removeItem('neon_saved_account'); localStorage.removeItem('neon_saved_password'); localStorage.setItem('neon_remember_me', 'false'); }
            currentUser = { account: acc, ...user };
            showToast(`欢迎 ${acc}`);
            renderGameLobby();
        };
        document.getElementById('getCodeBtn').onclick = () => {
            let acc = document.getElementById('regAccount').value.trim();
            if (!acc) { showToast("请填写手机号或邮箱"); return; }
            if (usersData[acc]) { showToast("账号已注册，请直接登录"); return; }
            let code = Math.floor(100000 + Math.random() * 900000);
            verificationCodes[acc] = { code: code.toString(), expire: Date.now() + 5*60*1000 };
            alert(`【验证码】您的验证码是：${code}，5分钟内有效。`);
            showToast("验证码已发送");
        };
        document.getElementById('registerBtn').onclick = () => {
            let acc = document.getElementById('regAccount').value.trim();
            let code = document.getElementById('regCode').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let ref = document.getElementById('regReferral').value.trim().toUpperCase();
            if (!acc || !code || !pwd || !ref) { showToast("请填写完整信息"); return; }
            if (!validReferralCodes.includes(ref)) { showToast("推荐码无效"); return; }
            if (usersData[acc]) { showToast("账号已存在"); return; }
            let v = verificationCodes[acc];
            if (!v || v.code !== code || Date.now() > v.expire) { showToast("验证码错误或已过期"); return; }
            if (pwd.length < 4) { showToast("密码至少4位"); return; }
            usersData[acc] = { password: pwd, balance: 0, referralCode: ref, registerTime: new Date().toLocaleString(), records: [], resultHistory: [] };
            saveUsers();
            delete verificationCodes[acc];
            showToast("注册成功！请登录");
            document.getElementById('regAccount').value = '';
            document.getElementById('regCode').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regReferral').value = '';
        };
    }

    function renderGameLobby() {
        document.getElementById('app').innerHTML = `
            <div class="user-section">
                <div class="user-info-row">
                    <span>📱 ${currentUser.account} | 💰 ${t('balance')}: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span>
                    <div class="btn-group">
                        <button id="serviceBtn" class="btn-sm">${t('service')}</button>
                        <button id="logoutBtn" class="btn-sm">${t('logout')}</button>
                        <button id="langSwitchBtn" class="lang-switch">ภาษาไทย</button>
                    </div>
                </div>
                <div class="charge-withdraw-row" style="margin-top:12px;">
                    <button id="rechargeBtn" class="charge-btn">${t('recharge')}</button>
                    <button id="withdrawBtn" class="withdraw-btn">${t('withdraw')}</button>
                </div>
            </div>
            <div class="game-nav">
                <button class="game-tab active" data-game="fish">${t('gameFish')}</button>
                <button class="game-tab" data-game="dice">${t('gameDice')}</button>
                <button class="game-tab" data-game="dragonTiger">${t('gameDT')}</button>
                <button class="game-tab" data-game="game4">${t('game4')}</button>
            </div>
            <div class="game-container" id="gamePanel"></div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;
        document.getElementById('langSwitchBtn').onclick = () => {
            currentLang = currentLang === 'zh' ? 'th' : 'zh';
            document.getElementById('langSwitchBtn').innerText = currentLang === 'zh' ? 'ภาษาไทย' : '中文';
            renderGameLobby();
        };
        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const inits = { fish: initFishGame, dice: initDiceGame, dragonTiger: initDragonTigerGame, game4: initGame4 };
        async function switchGame(id) { if (currentDestroy) currentDestroy(); gamePanel.innerHTML = ''; currentDestroy = await inits[id](gamePanel); }
        document.querySelectorAll('.game-tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchGame(btn.dataset.game);
            };
        });
        switchGame('fish');
        // 管理员入口：连续点击余额3次
        let adminClickCount = 0;
        document.getElementById('userBalanceDisplay').addEventListener('click', () => {
            adminClickCount++;
            setTimeout(() => { adminClickCount = 0; }, 1000);
            if (adminClickCount >= 3) { adminClickCount = 0; openAdminModal(); }
        });
    }

    renderAuthUI();
</script>
</body>
</html>
