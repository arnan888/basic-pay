<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA 旗舰量化终端</title>
    <style>
        /* ================= 🎨 基础样式 ================= */
        body { background: #121212; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* ================= 🔒 翡翠绿重型激活遮罩 ================= */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { 
            background: #1c221e; padding: 50px 30px; border-radius: 25px; 
            border: 11px solid #00ff88; /* 2.8mm 翡翠绿厚边 */
            box-shadow: 0 0 40px rgba(0,255,136,0.6); 
            text-align: center; width: 85%; max-width: 360px; box-sizing: border-box; 
        }
        .login-box h2 { color: #fff; font-size: 28px; font-weight: bold; margin-bottom: 30px; letter-spacing: 3px; }
        #user-id-input { 
            width: 100%; padding: 18px; border: 3px solid #ff3333; border-radius: 12px; 
            background: #ffffff; color: #000; outline: none; margin-bottom: 30px; 
            text-align: center; font-size: 26px; font-weight: bold; box-sizing: border-box; 
        }
        .btn-activate { 
            width: 100%; padding: 20px; border: none; border-radius: 12px; 
            background: #ff0000; color: #fff; font-weight: bold; font-size: 22px; cursor: pointer;
            box-shadow: inset 8px 8px 16px #800000, inset -8px -8px 16px #ff4d4d; 
            transition: 0.1s;
        }
        .btn-activate:active { box-shadow: inset 12px 12px 25px #500000; transform: scale(0.96); }
        .activate-hint { color: #00ff88; font-size: 14px; margin-top: 20px; font-weight: bold; }

        /* ================= 🎮 完整转盘游戏样式 ================= */
        #game-content { display: none; width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; background: #1a251f; position: relative; }
        
        /* 顶部余额卡 */
        .top-bar { background: #233129; margin: 15px; padding: 20px; border-radius: 18px; text-align: center; box-shadow: inset 0 0 15px #000, 5px 5px 10px rgba(0,0,0,0.3); border: 1px solid #2d3e34; }
        .balance-label { color: #8aa095; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .balance-num { font-size: 48px; color: #ff6b6b; font-weight: bold; margin: 10px 0; }
        .bet-info { color: #f1c40f; font-size: 14px; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; }

        /* 中部转盘区 */
        .wheel-section { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: #121915; border-top: 2px solid #2d3e34; border-bottom: 2px solid #2d3e34; }
        .wheel-outer { width: 320px; height: 320px; background: #2d3e34; border-radius: 50%; position: relative; padding: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px #1a251f; }
        .wheel-inner { width: 100%; height: 100%; background: #1a251f; border-radius: 50%; position: relative; overflow: hidden; transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ff4d4d; z-index: 10; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5)); }
        .center-hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: #2d3e34; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #8aa095; font-weight: bold; z-index: 5; box-shadow: 0 0 15px #000; }
        
        /* 底部控制区 */
        .control-panel { background: #5a1919; padding: 20px 15px; display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .btn-rect { background: #3d1111; border: none; color: #fff; padding: 15px; border-radius: 12px; font-size: 24px; font-weight: bold; box-shadow: inset 4px 4px 8px #2d0d0d, 3px 3px 6px rgba(0,0,0,0.3); cursor: pointer; }
        .btn-rect:active { box-shadow: inset 6px 6px 12px #200808; transform: scale(0.97); }
        .btn-spin { background: #e74c3c; border: none; color: #fff; padding: 18px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; box-spacing: 2px; box-shadow: 0 5px 0 #c0392b, 0 8px 15px rgba(0,0,0,0.4); cursor: pointer; transition: 0.1s; display: flex; align-items: center; gap: 8px; }
        .btn-spin:active { transform: translateY(3px); box-shadow: 0 2px 0 #c0392b, 0 4px 8px rgba(0,0,0,0.4); }
        .btn-spin.spinning { background: #95a5a6; box-shadow: none; transform: translateY(3px); cursor: not-allowed; }

        /* 底部功能栏 */
        .tab-bar { background: #1a1a1a; display: grid; grid-template-columns: repeat(4, 1fr); padding: 10px 0; border-top: 1px solid #333; }
        .tab-item { text-align: center; color: #8aa095; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.7; }
        .tab-item.active { color: #f1c40f; opacity: 1; }
        
        /* 其他简化元素 */
        .mode-toggles { display: flex; justify-content: space-around; background: #121915; padding: 10px; border-top: 1px solid #2d3e34; }
        .toggle-item { background: #233129; color: #8aa095; padding: 8px 15px; border-radius: 15px; font-size: 12px; display: flex; align-items: center; gap: 5px; }

        /* 旋转控制代码 (JavaScript会用到) */
        @keyframes rotating { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .wheel-inner.fast-spin { animation: rotating 0.5s linear infinite; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>终端激活</h2>
            <input type="text" id="user-id-input" readonly>
            <button class="btn-activate" onclick="handleActivate()">确认进入</button>
            <p class="activate-hint">● 系统已自动分配激活序列号</p>
        </div>
    </div>

    <div id="game-content">
        <div class="top-bar">
            <div class="balance-label"><span>💰</span> 可用余额 (USDT)</div>
            <div class="balance-num" id="current-balance">1000.00</div>
            <div class="bet-info"><span>🔥</span> 单注额度: <span id="bet-amount">10.0</span></div>
        </div>

        <div class="wheel-section">
            <div class="pointer"></div>
            <div class="wheel-outer">
                <div class="center-hub">准备</div>
                <div class="wheel-inner" id="wheel">
                    <img src="https://i.imgur.com/8QdY6U7.png" alt="转盘神兽" style="width:100%; height:100%;">
                </div>
            </div>
        </div>

        <div class="control-panel">
            <button class="btn-rect">-</button>
            <button class="btn-spin" id="spin-button" onclick="startSpin()">
                <span id="spin-icon">▶</span>
                <span id="spin-text">执行抽取</span>
            </button>
            <button class="btn-rect">+</button>
        </div>

        <div class="tab-bar">
            <div class="tab-item"><span style="font-size:18px;">📊</span>行情</div>
            <div class="tab-item"><span style="font-size:18px;">💳</span>资产中心</div>
            <div class="tab-item"><span style="font-size:18px;">📜</span>历史记录</div>
            <div class="tab-item active"><span style="font-size:18px;">🎲</span>量化终端</div>
        </div>
    </div>

    <script>
        // ======= 🔒 激活逻辑 =======
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const uid = urlParams.get('user_id');

            // 如果链接带 ID，关掉遮罩，显露出完整游戏
            if (uid) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('game-content').style.display = 'flex'; // 显露游戏
            } else {
                // 否则分配一个 ID
                const randomId = Math.floor(100000 + Math.random() * 900000);
                document.getElementById('user-id-input').value = randomId;
            }
        }

        function handleActivate() {
            const val = document.getElementById('user-id-input').value;
            // 带着 ID 重新加载页面，进入游戏模式
            window.location.href = window.location.origin + window.location.pathname + "?user_id=" + val;
        }

        // ======= 🎮 转盘功能 (简化演示) =======
        let balance = 1000;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning || balance < 10) return;
            isSpinning = true;
            balance -= 10;
            document.getElementById('current-balance').innerText = balance.toFixed(2);
            
            const wheel = document.getElementById('wheel');
            const btn = document.getElementById('spin-button');
            
            // 开始快速旋转
            wheel.classList.add('fast-spin');
            btn.classList.add('spinning');
            btn.querySelector('#spin-text').innerText = "抽取中...";

            // 4秒后停止
            setTimeout(() => {
                wheel.classList.remove('fast-spin');
                // 随机停止角度 (演示)
                const randomDegree = Math.floor(Math.random() * 360);
                wheel.style.transform = `rotate(${3600 + randomDegree}deg)`; 

                // 模拟结算 (92% 概率输)
                setTimeout(() => {
                    if (Math.random() > 0.08) {
                        // 输
                        btn.querySelector('#spin-text').innerText = "未中奖";
                    } else {
                        // 赢 (演示)
                        balance += 50;
                        document.getElementById('current-balance').innerText = balance.toFixed(2);
                        btn.querySelector('#spin-text').innerText = "中奖 50!";
                    }
                    isSpinning = false;
                    setTimeout(() => {
                        btn.classList.remove('spinning');
                        btn.querySelector('#spin-text').innerText = "执行抽取";
                    }, 1000);
                }, 4100); 

            }, 100);
        }
    </script>
</body>
</html>
