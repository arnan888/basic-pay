<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ AI 量化终端 ✨</title>
    <style>
        /* 科技网格背景 */
        body {
            margin: 0; background-color: #1a1b1e;
            background-image: linear-gradient(rgba(0,0,0,0.8) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.8) 1px, transparent 1px);
            background-size: 30px 30px; color: #fff; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }

        #balance { font-size: 50px; color: #ff4d4d; margin-top: 50px; font-weight: bold; }
        
        /* 转盘容器 */
        #wheel-container { position: relative; margin: 40px 0; width: 280px; height: 280px; }
        #wheel { 
            width: 100%; height: 100%; border-radius: 50%;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            /* 如果你没图片，这里会显示一个绿色的圆盘保底 */
            background: conic-gradient(#2e7d32 0deg 45deg, #1b5e20 45deg 90deg, #2e7d32 90deg 135deg, #1b5e20 135deg 180deg, #2e7d32 180deg 225deg, #1b5e20 225deg 270deg, #2e7d32 270deg 315deg, #1b5e20 315deg 360deg);
            border: 8px solid #333;
        }
        #pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); color: #ff4d4d; font-size: 30px; z-index: 10; }

        /* 龙虎选框 */
        .options { display: flex; gap: 20px; margin-bottom: 30px; }
        .opt { padding: 10px 25px; border: 1px solid #555; border-radius: 8px; cursor: pointer; background: rgba(255,255,255,0.05); }
        .selected { border-color: #ffde00; background: rgba(255,222,0,0.1); box-shadow: 0 0 10px #ffde00; }

        /* 红色大按钮 */
        #btn { 
            background: #b71c1c; color: white; padding: 15px 60px; 
            border-radius: 40px; font-size: 20px; font-weight: bold; cursor: pointer;
            border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="balance">146.8</div>
    <div style="color:#888; margin-top:10px;">🔥 单注额度: 5.5</div>

    <div id="wheel-container">
        <div id="pointer">▼</div>
        <img src="wheel.png" id="wheel" onerror="this.style.display='block'">
    </div>

    <div class="options">
        <div id="opt-DRAGON" class="opt" onclick="sel('DRAGON')">🐉 龙</div>
        <div id="opt-TIGER" class="opt" onclick="sel('TIGER')">🐯 虎</div>
    </div>

    <button id="btn" onclick="start()">▶ 执行抽取</button>

    <script>
        let s = { bal: 146.8, deg: 0, roll: false, side: null };

        function sel(side) {
            if(s.roll) return;
            s.side = side;
            document.querySelectorAll('.opt').forEach(el => el.classList.remove('selected'));
            document.getElementById('opt-' + side).classList.add('selected');
        }

        function start() {
            if(s.roll || s.bal < 5.5) return;
            
            // 强制点火
            s.roll = true;
            s.bal -= 5.5;
            document.getElementById('balance').innerText = s.bal.toFixed(1);

            // 转盘旋转
            const w = document.getElementById('wheel');
            const randomStop = Math.floor(Math.random() * 8);
            s.deg += (360 * 8) - (randomStop * 45); 
            w.style.transform = `rotate(${s.deg}deg)`;

            // 逻辑处理：直接保底随机（防止你后台没开）
            let result = Math.random() < 0.5 ? 'DRAGON' : 'TIGER';

            setTimeout(() => {
                s.roll = false;
                // 结果判定
                if(s.side === result) {
                    s.bal += 11;
                    document.getElementById('balance').innerText = s.bal.toFixed(1);
                    alert('恭喜命中！结果：' + (result === 'DRAGON' ? '龙' : '虎'));
                } else {
                    alert('未命中，结果：' + (result === 'DRAGON' ? '龙' : '虎'));
                }
            }, 4100);
        }
    </script>
</body>
</html>
