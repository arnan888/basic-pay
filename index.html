<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>篮球对决 · 多项押注版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a1f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 12px;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            background: #2d5e48;
            border-radius: 36px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid #f1c40f80;
        }

        .top-bar {
            display: flex;
            gap: 12px;
            padding: 16px 18px;
            background: #1e3a2f;
            border-bottom: 2px solid #f1c40f60;
        }

        .info-card {
            flex: 1;
            background: #0f2c22;
            border-radius: 28px;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border: 1px solid #4d8068;
        }

        .info-card label {
            font-size: 12px;
            color: #cbd5e0;
        }

        .info-card span {
            font-size: 20px;
            font-weight: bold;
            color: #f5b042;
            font-family: monospace;
        }

        .battle-stage {
            margin: 12px 16px;
            border-radius: 28px;
            background: #000;
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border: 2px solid #f1c40f;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        #gameVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(0, 0, 0, 0.25) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 0, 0, 0.25) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 2;
        }

        .battle-title {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            padding: 4px 16px;
            border-radius: 60px;
            color: #ffdf8c;
            font-size: 14px;
            font-weight: bold;
            z-index: 3;
            border: 1px solid #ffc10770;
            white-space: nowrap;
            pointer-events: none;
        }

        .result-floating {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            padding: 6px 20px;
            border-radius: 40px;
            color: #ffe6b3;
            font-weight: bold;
            font-size: 14px;
            z-index: 3;
            white-space: nowrap;
            border-left: 3px solid #f1c40f;
            border-right: 3px solid #f1c40f;
            pointer-events: none;
            text-align: center;
        }

        .control-panel {
            margin: 8px 16px 20px;
            background: #1f4236;
            border-radius: 32px;
            padding: 16px;
        }

        .bet-item {
            background: #0e2a20;
            border-radius: 60px;
            margin-bottom: 12px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #3d6e58;
        }

        .bet-label {
            font-size: 28px;
            font-weight: bold;
            width: 70px;
            text-align: center;
        }
        .bet-label.red { color: #ff6b6b; }
        .bet-label.blue { color: #4aa3ff; }
        .bet-label.tie { color: #c084fc; }

        .bet-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1f3a30;
            padding: 5px 12px;
            border-radius: 50px;
        }

        .bet-controls button {
            width: 36px;
            height: 36px;
            border-radius: 30px;
            border: none;
            font-size: 24px;
            background: #2e4e40;
            color: white;
            cursor: pointer;
        }

        .bet-amount-input {
            font-size: 22px;
            font-weight: bold;
            min-width: 70px;
            text-align: center;
            color: #ffda88;
        }

        .total-bet-info {
            background: #00000066;
            border-radius: 30px;
            padding: 8px 15px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .total-bet-info span { color: #f5c542; font-size: 22px; }

        .quick-bet-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .quick-btn {
            flex: 1;
            background: #2e4e40;
            border: none;
            border-radius: 40px;
            padding: 10px;
            font-weight: bold;
            color: #fff0c0;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }

        .confirm-btn {
            flex: 1;
            background: linear-gradient(145deg, #dd3b2f, #a51f14);
            border: none;
            border-radius: 60px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            padding: 14px;
            cursor: pointer;
        }

        .reset-bet-btn {
            background: #3a2a1f;
            border: none;
            border-radius: 60px;
            padding: 0 20px;
            font-size: 18px;
            color: #ffcd94;
            cursor: pointer;
        }

        .mode-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 8px;
        }

        .mode-btn {
            background: #1e3a2f;
            border: 1px solid #5c9279;
            border-radius: 48px;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            color: #efe3c9;
        }

        .mode-btn.active {
            background: #f1c40f;
            color: #1e3a2f;
        }

        .speed-group {
            display: flex;
            gap: 4px;
            background: #1e3a2f;
            border-radius: 48px;
            padding: 4px;
        }

        .speed-option {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 40px;
            cursor: pointer;
            color: #ddddbb;
        }

        .speed-option.active {
            background: #f1c40f;
            color: #1e3a2f;
        }

        .disabled-click {
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="info-card"><label>🏀 账户余额</label><span id="balanceDisplay">1000.00</span></div>
        <div class="info-card"><label>🎯 奖池累积</label><span id="jackpotDisplay">84291.50</span></div>
    </div>

    <div class="battle-stage">
        <video id="gameVideo" autoplay muted loop playsinline>
            <source src="basketball.mp4" type="video/mp4">
        </video>
        <div class="grid-overlay"></div>
        <div class="battle-title">🏀 篮球巅峰对决 · 15秒决胜 🏀</div>
        <div class="result-floating" id="battleResultMsg">多项押注 · 红队/蓝队/平局</div>
    </div>

    <div class="control-panel">
        <div class="bet-item">
            <div class="bet-label red">🔥 红队</div>
            <div class="bet-controls">
                <button class="dec-red">-</button>
                <span class="bet-amount-input" id="betRed">0</span>
                <button class="inc-red">+</button>
            </div>
        </div>
        <div class="bet-item">
            <div class="bet-label blue">💙 蓝队</div>
            <div class="bet-controls">
                <button class="dec-blue">-</button>
                <span class="bet-amount-input" id="betBlue">0</span>
                <button class="inc-blue">+</button>
            </div>
        </div>
        <div class="bet-item">
            <div class="bet-label tie">⚖️ 平局</div>
            <div class="bet-controls">
                <button class="dec-tie">-</button>
                <span class="bet-amount-input" id="betTie">0</span>
                <button class="inc-tie">+</button>
            </div>
        </div>

        <div class="total-bet-info">
            <span>💰 总押注</span>
            <span id="totalBetAmount">0.00</span>
            <span>USDT</span>
        </div>

        <div class="quick-bet-row">
            <button class="quick-btn" data-quick="10">+10</button>
            <button class="quick-btn" data-quick="50">+50</button>
            <button class="quick-btn" data-quick="100">+100</button>
            <button class="quick-btn" data-quick="clear">清空</button>
        </div>

        <div class="action-buttons">
            <button class="confirm-btn" id="startBattleBtn">🏀 确认投注 & 开战</button>
            <button class="reset-bet-btn" id="clearAllBtn">🗑️ 重置</button>
        </div>

        <div class="mode-bar">
            <div class="mode-btn" id="autoModeBtn">🔁 自动投注</div>
            <div class="speed-group">
                <div class="speed-option" data-speed="1">1X</div>
                <div class="speed-option active" data-speed="2">2X</div>
                <div class="speed-option" data-speed="3">3X</div>
            </div>
        </div>
    </div>
</div>

<script>
    let balance = 1000.00;
    let bets = { red: 0, blue: 0, tie: 0 };
    let isGameInProgress = false;
    let autoMode = false;
    let currentSpeed = 2;
    let autoTimer = null;
    let gameTimeout = null;
    
    const ODDS = { red: 1, blue: 1, tie: 8 };
    
    const balanceSpan = document.getElementById('balanceDisplay');
    const totalBetSpan = document.getElementById('totalBetAmount');
    const betRedSpan = document.getElementById('betRed');
    const betBlueSpan = document.getElementById('betBlue');
    const betTieSpan = document.getElementById('betTie');
    const resultMsgDiv = document.getElementById('battleResultMsg');
    const startBtn = document.getElementById('startBattleBtn');
    const autoModeBtn = document.getElementById('autoModeBtn');
    const videoEl = document.getElementById('gameVideo');
    
    function updateUI() {
        balanceSpan.textContent = balance.toFixed(2);
        betRedSpan.textContent = bets.red;
        betBlueSpan.textContent = bets.blue;
        betTieSpan.textContent = bets.tie;
        const total = bets.red + bets.blue + bets.tie;
        totalBetSpan.textContent = total.toFixed(2);
    }
    
    function modifyBet(type, delta) {
        if (isGameInProgress) {
            resultMsgDiv.textContent = '⛔ 比赛进行中，无法修改';
            return;
        }
        let newVal = bets[type] + delta;
        if (newVal < 0) newVal = 0;
        bets[type] = newVal;
        updateUI();
        resultMsgDiv.textContent = `📝 ${type === 'red' ? '红队' : type === 'blue' ? '蓝队' : '平局'}: ${newVal} USDT`;
    }
    
    function quickAdd(amount) {
        if (isGameInProgress) { resultMsgDiv.textContent = '比赛进行中无法加注'; return; }
        if (amount === 'clear') {
            bets = { red: 0, blue: 0, tie: 0 };
            resultMsgDiv.textContent = '已清空所有押注';
        } else {
            bets.red += amount;
            bets.blue += amount;
            bets.tie += amount;
            resultMsgDiv.textContent = `每个选项增加 ${amount} USDT`;
        }
        updateUI();
    }
    
    function resetAllBets() {
        if (isGameInProgress) { resultMsgDiv.textContent = '比赛进行中无法重置'; return; }
        bets = { red: 0, blue: 0, tie: 0 };
        updateUI();
        resultMsgDiv.textContent = '所有押注已归零';
    }
    
    function getTotalBet() { return bets.red + bets.blue + bets.tie; }
    
    function getGameResult() {
        const r = Math.random();
        if (r < 0.45) return 'red';
        if (r < 0.9) return 'blue';
        return 'tie';
    }
    
    function startBattle() {
        if (isGameInProgress) return;
        const totalBet = getTotalBet();
        if (totalBet === 0) { resultMsgDiv.textContent = '⚠️ 请至少押注一方'; return; }
        if (totalBet > balance) { resultMsgDiv.textContent = `❌ 余额不足`; return; }
        
        balance -= totalBet;
        updateUI();
        const currentBets = { ...bets };
        
        isGameInProgress = true;
        document.querySelector('.control-panel').classList.add('disabled-click');
        startBtn.disabled = true;
        resultMsgDiv.textContent = '🏀 比赛开始 · 15秒后揭晓 🏀';
        
        videoEl.currentTime = 0;
        videoEl.play();
        
        if (gameTimeout) clearTimeout(gameTimeout);
        gameTimeout = setTimeout(() => {
            const result = getGameResult();
            let winAmount = 0;
            let resultText = '';
            
            if (result === 'red') resultText = '🔥 红队获胜！';
            else if (result === 'blue') resultText = '💙 蓝队获胜！';
            else resultText = '⚖️ 平局！';
            
            if (result === 'red') winAmount = currentBets.red;
            else if (result === 'blue') winAmount = currentBets.blue;
            else winAmount = currentBets.tie * 8;
            
            if (winAmount > 0) {
                balance += winAmount;
                resultMsgDiv.innerHTML = `✨ 命中！ ${resultText} 赢得 ${winAmount.toFixed(2)} USDT ✨`;
            } else {
                resultMsgDiv.innerHTML = `💔 惜败！ ${resultText} 💔`;
            }
            updateUI();
            
            isGameInProgress = false;
            document.querySelector('.control-panel').classList.remove('disabled-click');
            startBtn.disabled = false;
            
            if (autoMode && !isGameInProgress && getTotalBet() > 0 && balance >= getTotalBet()) {
                if (autoTimer) clearTimeout(autoTimer);
                autoTimer = setTimeout(() => startBattle(), currentSpeed * 1000);
            }
            gameTimeout = null;
        }, 15000);
    }
    
    function toggleAutoMode() {
        if (isGameInProgress) { resultMsgDiv.textContent = '请等待比赛结束'; return; }
        autoMode = !autoMode;
        autoModeBtn.classList.toggle('active');
        autoModeBtn.textContent = autoMode ? '⏸️ 关闭自动' : '🔁 自动投注';
        if (autoMode && !isGameInProgress && getTotalBet() > 0 && balance >= getTotalBet()) {
            if (autoTimer) clearTimeout(autoTimer);
            autoTimer = setTimeout(() => startBattle(), 200);
        }
    }
    
    function setSpeed(level) {
        currentSpeed = level;
        document.querySelectorAll('.speed-option').forEach(opt => opt.classList.remove('active'));
        document.querySelector(`.speed-option[data-speed="${level}"]`).classList.add('active');
    }
    
    document.querySelector('.dec-red').onclick = () => modifyBet('red', -1);
    document.querySelector('.inc-red').onclick = () => modifyBet('red', 1);
    document.querySelector('.dec-blue').onclick = () => modifyBet('blue', -1);
    document.querySelector('.inc-blue').onclick = () => modifyBet('blue', 1);
    document.querySelector('.dec-tie').onclick = () => modifyBet('tie', -1);
    document.querySelector('.inc-tie').onclick = () => modifyBet('tie', 1);
    
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.onclick = () => {
            const val = btn.getAttribute('data-quick');
            if (val === 'clear') quickAdd('clear');
            else quickAdd(parseFloat(val));
        };
    });
    
    document.getElementById('clearAllBtn').onclick = resetAllBets;
    startBtn.onclick = () => { if (autoMode) toggleAutoMode(); startBattle(); };
    autoModeBtn.onclick = toggleAutoMode;
    document.querySelectorAll('.speed-option').forEach(opt => {
        opt.onclick = () => setSpeed(parseInt(opt.getAttribute('data-speed')));
    });
    
    updateUI();
    bets = { red: 10, blue: 10, tie: 5 };
    updateUI();
</script>
</body>
</html>
