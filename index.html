<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>至尊骰宝 · 真摇骰子</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'PingFang SC', sans-serif;
            padding: 12px;
        }
        .game-box {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(145deg, #1a4a2a, #0a2a1a);
            border-radius: 40px;
            padding: 16px;
            border: 1px solid #ffaa44;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .inner {
            background: rgba(0,0,0,0.3);
            border-radius: 32px;
            padding: 16px;
        }
        
        /* 骰子区域 */
        .dice-area {
            background: rgba(0,0,0,0.4);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
        }
        .dice-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .dice {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #fff, #e0e0e0);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #c0392b;
            border: 2px solid #ffaa44;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.05s;
        }
        .dice-shake {
            animation: shake 0.08s infinite;
        }
        @keyframes shake {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(-5px,-5px) rotate(10deg); }
            50% { transform: translate(5px,5px) rotate(-10deg); }
            75% { transform: translate(-5px,5px) rotate(15deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }
        .total {
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            padding: 10px;
        }
        .total-label {
            font-size: 12px;
            color: #ffaa88;
        }
        .total-number {
            font-size: 48px;
            font-weight: bold;
            color: #ffcc44;
            font-family: monospace;
        }
        .total-blink {
            animation: blink 0.05s step-end infinite;
        }
        @keyframes blink {
            0% { text-shadow: 0 0 5px #ffaa44; }
            50% { text-shadow: 0 0 20px #ff6600; color: #ffdd88; }
        }
        
        /* 下注区域 */
        .points-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 16px 0;
        }
        .point-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,170,68,0.3);
        }
        .point-card.selected {
            background: linear-gradient(135deg, #ff6600, #cc3300);
            transform: scale(0.97);
        }
        .point-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffcc44;
        }
        .point-odds {
            font-size: 11px;
            color: #88aa88;
        }
        .point-card.selected .point-value,
        .point-card.selected .point-odds {
            color: #fff;
        }
        
        .chips {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        .chip {
            width: 60px;
            padding: 10px 0;
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .chip-10 { background: radial-gradient(#4a90d9, #1a4a8a); color: #fff; }
        .chip-20 { background: radial-gradient(#50b86a, #2a6a3a); color: #fff; }
        .chip-50 { background: radial-gradient(#e85d3a, #aa2a1a); color: #fff; }
        .chip-100 { background: radial-gradient(#9b59b6, #6c3483); color: #fff; }
        .chip-500 { background: radial-gradient(#f1c40f, #d4a00a); color: #333; }
        .chip-1000 { background: radial-gradient(#e74c3c, #c0392b); color: #fff; }
        .chip:active { transform: scale(0.94); }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }
        .stat-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }
        .stat-label {
            font-size: 11px;
            color: #88aa88;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffcc44;
        }
        
        .countdown {
            text-align: center;
            margin: 16px 0;
        }
        .countdown-num {
            font-size: 32px;
            font-weight: bold;
            color: #ffaa44;
        }
        .countdown-warning {
            animation: warning 0.5s infinite;
            color: #ff3300 !important;
        }
        @keyframes warning {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; text-shadow: 0 0 10px red; }
        }
        
        .history {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 12px;
            margin: 16px 0;
            max-height: 120px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 12px;
            color: #ccc;
        }
        .win { color: #4caf50; }
        .lose { color: #f44336; }
        
        .buttons {
            display: flex;
            gap: 12px;
            margin: 16px 0;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            color: #ffaa44;
            border: 1px solid #ffaa44;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6600, #cc3300);
            color: #fff;
            border: none;
        }
        .btn:active { transform: scale(0.97); }
        
        .balance-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        .balance-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
        }
        .balance-label {
            font-size: 11px;
            color: #88aa88;
        }
        .balance-value {
            font-size: 22px;
            font-weight: bold;
            color: #ffcc44;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a2a1a;
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            border: 1px solid #ffaa44;
            width: 85%;
            max-width: 340px;
            color: #fff;
        }
        .modal-content button {
            background: #ff6600;
            border: none;
            border-radius: 30px;
            padding: 10px 24px;
            margin-top: 16px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-user-list {
            max-height: 150px;
            overflow-y: auto;
            margin: 12px 0;
            background: #0a1a0a;
            border-radius: 12px;
            padding: 8px;
        }
        .admin-user {
            padding: 8px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }
        .admin-user.selected {
            background: #ffaa44;
            color: #1a1a2a;
        }
        .admin-input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            background: #0a1a0a;
            border: 1px solid #ffaa44;
            color: #fff;
        }
        .admin-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 12px 0;
        }
        .admin-btn {
            padding: 8px 16px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="game-box">
    <div class="inner">
        <!-- 骰子区 -->
        <div class="dice-area">
            <div class="dice-row">
                <div class="dice" id="dice1">⚀</div>
                <div class="dice" id="dice2">⚀</div>
                <div class="dice" id="dice3">⚀</div>
            </div>
            <div class="total">
                <div class="total-label">总 点 数</div>
                <div class="total-number" id="totalPoints">3</div>
            </div>
        </div>

        <!-- 用户栏 -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="color:#ffaa44">👤</span>
                <span id="currentUserId" style="color:#ffaa44; font-weight:bold">player888</span>
            </div>
            <div>
                <button id="historyBtn" style="background:rgba(255,170,68,0.2); border:1px solid #ffaa44; border-radius:30px; padding:5px 12px; color:#ffaa44; font-size:12px">记录</button>
                <button id="newUserBtn" style="background:rgba(255,170,68,0.2); border:1px solid #ffaa44; border-radius:30px; padding:5px 12px; color:#ffaa44; font-size:12px">新用户</button>
            </div>
        </div>
        
        <!-- 登录切换 -->
        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <input type="text" id="switchId" placeholder="输入ID登录" style="flex:1; background:rgba(0,0,0,0.5); border:1px solid #ffaa44; border-radius:30px; padding:8px 12px; color:#fff">
            <button id="switchBtn" style="background:rgba(255,170,68,0.2); border:1px solid #ffaa44; border-radius:30px; padding:5px 16px; color:#ffaa44">登录</button>
        </div>

        <!-- 点数网格 -->
        <div class="points-grid" id="pointsGrid"></div>

        <!-- 筹码 -->
        <div class="chips">
            <div class="chip chip-10" data-val="10">10</div>
            <div class="chip chip-20" data-val="20">20</div>
            <div class="chip chip-50" data-val="50">50</div>
            <div class="chip chip-100" data-val="100">100</div>
            <div class="chip chip-500" data-val="500">500</div>
            <div class="chip chip-1000" data-val="1000">1K</div>
        </div>

        <!-- 统计 -->
        <div class="stats">
            <div class="stat-card"><div class="stat-label">当前押注</div><div class="stat-value" id="betAmount">0</div></div>
            <div class="stat-card"><div class="stat-label">选中点数</div><div class="stat-value" id="selectedPoint">-</div></div>
        </div>

        <!-- 倒计时 -->
        <div class="countdown">
            <div class="countdown-label">下注倒计时</div>
            <div class="countdown-num" id="countdownNum">25</div>
        </div>

        <!-- 历史 -->
        <div class="history" id="historyList"></div>

        <!-- 按钮 -->
        <div class="buttons">
            <button class="btn" id="cancelBtn">取消</button>
            <button class="btn" id="refreshBtn">刷新</button>
            <button class="btn btn-primary" id="betBtn">确认投注</button>
        </div>

        <!-- 余额 -->
        <div class="balance-row">
            <div class="balance-card" id="adminEntry">
                <div class="balance-label">💰 余额</div>
                <div class="balance-value" id="balanceDisplay">1000.00</div>
            </div>
            <div class="balance-card">
                <div class="balance-label">🎰 奖池</div>
                <div class="balance-value" id="poolDisplay">50000.00</div>
            </div>
        </div>
    </div>
</div>

<script>
// 骰子Unicode
const diceMap = {1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅'};

// 赔率
const oddsMap = {4:60,5:30,6:18,7:12,8:8,9:7,10:6,11:6,12:7,13:8,14:12,15:18,16:30,17:60};

// 用户数据
let users = JSON.parse(localStorage.getItem('dice_users')) || {};
let currentUser = "player888";
if (!users[currentUser]) users[currentUser] = { balance: 1000, records: [] };
let adminPwd = "wang000000";

function saveUsers() { localStorage.setItem('dice_users', JSON.stringify(users)); }
function getBalance(uid) { return users[uid]?.balance || 1000; }
function setBalance(uid, amt) { if (!users[uid]) users[uid] = { balance: 1000, records: [] }; users[uid].balance = amt; saveUsers(); }

// 游戏状态
let state = {
    balance: getBalance(currentUser),
    selectedPoint: null,
    betAmount: 0,
    countdown: 25,
    countdownInterval: null,
    isDrawing: false
};
let isBetLocked = false;

// DOM 元素
const diceEl = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
const totalEl = document.getElementById('totalPoints');

// 摇骰子动画
let rollTimer = null;
function rollDice(finalVals, finalTotal, isWin) {
    if (rollTimer) clearInterval(rollTimer);
    
    diceEl.forEach(d => d.classList.add('dice-shake'));
    totalEl.classList.add('total-blink');
    
    let step = 0;
    const maxStep = 20;
    
    rollTimer = setInterval(() => {
        step++;
        diceEl.forEach(d => {
            let r = Math.floor(Math.random() * 6) + 1;
            d.innerText = diceMap[r];
        });
        let sum = diceEl.reduce((s, d) => s + Object.keys(diceMap).find(k => diceMap[k] === d.innerText), 0);
        totalEl.innerText = sum;
        
        if (step >= maxStep) {
            clearInterval(rollTimer);
            rollTimer = null;
            diceEl.forEach(d => d.classList.remove('dice-shake'));
            totalEl.classList.remove('total-blink');
            
            diceEl.forEach((d, i) => d.innerText = diceMap[finalVals[i]]);
            totalEl.innerText = finalTotal;
            
            if (isWin) {
                totalEl.style.color = '#4caf50';
                setTimeout(() => totalEl.style.color = '#ffcc44', 2000);
            } else {
                totalEl.style.color = '#f44336';
                setTimeout(() => totalEl.style.color = '#ffcc44', 2000);
            }
        }
    }, 60);
}

// 开奖
function draw() {
    if (state.isDrawing) return;
    if (state.selectedPoint === null || state.betAmount === 0) return;
    if (state.betAmount > state.balance) return;
    
    state.isDrawing = true;
    isBetLocked = true;
    
    const d1 = Math.floor(Math.random() * 6) + 1;
    const d2 = Math.floor(Math.random() * 6) + 1;
    const d3 = Math.floor(Math.random() * 6) + 1;
    const total = d1 + d2 + d3;
    
    let win = 0;
    let isWin = false;
    if (state.selectedPoint === total) {
        win = state.betAmount * oddsMap[total];
        isWin = true;
    }
    
    rollDice([d1, d2, d3], total, isWin);
    
    const newBalance = state.balance - state.betAmount + win;
    setBalance(currentUser, newBalance);
    state.balance = newBalance;
    
    // 记录
    let recs = users[currentUser].records || [];
    recs.unshift({
        time: new Date().toLocaleTimeString(),
        point: state.selectedPoint,
        bet: state.betAmount,
        result: total,
        win: win
    });
    if (recs.length > 30) recs.pop();
    users[currentUser].records = recs;
    saveUsers();
    updateHistory();
    updateUI();
    
    if (navigator.vibrate) navigator.vibrate(isWin ? [100,50,100] : 80);
    
    setTimeout(() => {
        state.selectedPoint = null;
        state.betAmount = 0;
        state.isDrawing = false;
        updateUI();
        document.querySelectorAll('.point-card').forEach(c => c.classList.remove('selected'));
        startCountdown(25);
    }, 5000);
}

function placeBet() {
    if (state.isDrawing || isBetLocked) { alert("开奖中，请等待"); return; }
    if (state.selectedPoint === null) { alert("请先选择一个点数"); return; }
    if (state.betAmount <= 0) { alert("请先选择筹码"); return; }
    if (state.betAmount > state.balance) { alert("余额不足"); return; }
    
    clearCountdown();
    draw();
}

function addBet(amount) {
    if (state.isDrawing || isBetLocked) return;
    state.betAmount += amount;
    updateUI();
}

function selectPoint(point) {
    if (state.isDrawing || isBetLocked) return;
    state.selectedPoint = point;
    updateUI();
    document.querySelectorAll('.point-card').forEach(c => {
        if (parseInt(c.dataset.point) === point) c.classList.add('selected');
        else c.classList.remove('selected');
    });
}

function cancelBet() {
    if (state.isDrawing || isBetLocked) return;
    state.selectedPoint = null;
    state.betAmount = 0;
    updateUI();
    document.querySelectorAll('.point-card').forEach(c => c.classList.remove('selected'));
}

function refreshBalance() {
    state.balance = getBalance(currentUser);
    updateUI();
}

function updateUI() {
    document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
    document.getElementById('betAmount').innerText = state.betAmount;
    document.getElementById('selectedPoint').innerText = state.selectedPoint || '-';
    document.getElementById('poolDisplay').innerText = (50000 + Math.random() * 2000).toFixed(2);
}

function updateHistory() {
    const container = document.getElementById('historyList');
    const recs = users[currentUser]?.records || [];
    container.innerHTML = '';
    if (recs.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#666">暂无记录</div>';
        return;
    }
    recs.slice(0, 10).forEach(r => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<span>${r.time}</span><span>押${r.point}点 ${r.bet}</span><span>开${r.result}点</span><span class="${r.win>0?'win':'lose'}">${r.win>0 ? '+'+r.win : '-'+r.bet}</span>`;
        container.appendChild(div);
    });
}

function startCountdown(sec) {
    if (state.countdownInterval) clearInterval(state.countdownInterval);
    state.countdown = sec;
    const cdSpan = document.getElementById('countdownNum');
    cdSpan.innerText = state.countdown;
    cdSpan.classList.remove('countdown-warning');
    
    isBetLocked = false;
    
    state.countdownInterval = setInterval(() => {
        if (state.countdown <= 1) {
            clearInterval(state.countdownInterval);
            state.countdownInterval = null;
            isBetLocked = true;
            if (state.selectedPoint && state.betAmount > 0 && state.betAmount <= state.balance) {
                draw();
            } else {
                startCountdown(25);
            }
        } else {
            state.countdown--;
            cdSpan.innerText = state.countdown;
            if (state.countdown <= 5) cdSpan.classList.add('countdown-warning');
        }
    }, 1000);
}

function clearCountdown() {
    if (state.countdownInterval) {
        clearInterval(state.countdownInterval);
        state.countdownInterval = null;
    }
}

function switchUser() {
    const newId = document.getElementById('switchId').value.trim();
    if (!newId) return;
    currentUser = newId;
    if (!users[currentUser]) users[currentUser] = { balance: 1000, records: [] };
    document.getElementById('currentUserId').innerText = currentUser;
    state.balance = getBalance(currentUser);
    state.selectedPoint = null;
    state.betAmount = 0;
    state.isDrawing = false;
    isBetLocked = false;
    updateUI();
    clearCountdown();
    startCountdown(25);
    updateHistory();
    document.querySelectorAll('.point-card').forEach(c => c.classList.remove('selected'));
}

function showHistoryModal() {
    const recs = users[currentUser]?.records || [];
    let html = '<div style="max-height:300px;overflow-y:auto">';
    if (recs.length === 0) html += '<p>暂无记录</p>';
    else {
        recs.forEach(r => {
            html += `<div style="padding:8px;border-bottom:1px solid #333;display:flex;justify-content:space-between">
                        <span>${r.time}</span>
                        <span>押${r.point}点 ${r.bet}</span>
                        <span>开${r.result}点</span>
                        <span style="color:${r.win>0?'#4caf50':'#f44336'}">${r.win>0 ? '+'+r.win : '-'+r.bet}</span>
                    </div>`;
        });
    }
    html += '</div><button id="closeModalBtn">关闭</button>';
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<div class="modal-content"><h3>📜 投注记录</h3>${html}</div>`;
    document.body.appendChild(modal);
    document.getElementById('closeModalBtn').onclick = () => modal.remove();
}

// 管理员面板
let adminPanel = null;
let adminSelectedUser = currentUser;

function showAdminPanel() {
    if (adminPanel) { adminPanel.remove(); adminPanel = null; return; }
    const panel = document.createElement('div');
    panel.className = 'modal';
    panel.innerHTML = `
        <div class="modal-content" style="width:90%;max-width:360px">
            <h3>🔐 管理员</h3>
            <div id="adminUserList" class="admin-user-list"></div>
            <div>当前：<strong id="adminSelectedUser">${adminSelectedUser}</strong></div>
            <input type="number" id="adminAmount" class="admin-input" placeholder="金额" value="0">
            <div class="admin-btns">
                <button id="adminAdd" class="admin-btn" style="background:#4caf50;color:#fff">上分</button>
                <button id="adminSub" class="admin-btn" style="background:#f44336;color:#fff">下分</button>
                <button id="adminQuery" class="admin-btn" style="background:#2196f3;color:#fff">查询</button>
                <button id="adminReset" class="admin-btn" style="background:#ff9800;color:#fff">重置</button>
                <button id="adminPwd" class="admin-btn" style="background:#9c27b0;color:#fff">改密</button>
            </div>
            <button id="adminClose" style="background:#ffaa44;color:#1a1a2a;padding:8px 24px;border-radius:25px;border:none;margin-top:12px">关闭</button>
        </div>
    `;
    document.body.appendChild(panel);
    adminPanel = panel;
    
    function refreshUserList() {
        const listDiv = document.getElementById('adminUserList');
        const usersArr = Object.keys(users);
        listDiv.innerHTML = '';
        usersArr.forEach(uid => {
            const div = document.createElement('div');
            div.className = 'admin-user';
            if (uid === adminSelectedUser) div.classList.add('selected');
            div.textContent = `${uid} (${getBalance(uid).toFixed(2)})`;
            div.onclick = () => {
                adminSelectedUser = uid;
                document.getElementById('adminSelectedUser').innerText = adminSelectedUser;
                refreshUserList();
            };
            listDiv.appendChild(div);
        });
    }
    refreshUserList();
    
    document.getElementById('adminAdd').onclick = () => {
        let amt = parseFloat(document.getElementById('adminAmount').value);
        if (isNaN(amt) || amt <= 0) { alert("请输入正数"); return; }
        let cur = getBalance(adminSelectedUser);
        setBalance(adminSelectedUser, cur + amt);
        refreshUserList();
        if (adminSelectedUser === currentUser) { state.balance = getBalance(currentUser); updateUI(); }
        alert(`给 ${adminSelectedUser} 上分 ${amt}`);
    };
    document.getElementById('adminSub').onclick = () => {
        let amt = parseFloat(document.getElementById('adminAmount').value);
        if (isNaN(amt) || amt <= 0) { alert("请输入正数"); return; }
        let cur = getBalance(adminSelectedUser);
        if (cur < amt) { alert("余额不足"); return; }
        setBalance(adminSelectedUser, cur - amt);
        refreshUserList();
        if (adminSelectedUser === currentUser) { state.balance = getBalance(currentUser); updateUI(); }
        alert(`从 ${adminSelectedUser} 下分 ${amt}`);
    };
    document.getElementById('adminQuery').onclick = () => {
        alert(`${adminSelectedUser} 余额: ${getBalance(adminSelectedUser).toFixed(2)}`);
    };
    document.getElementById('adminReset').onclick = () => {
        if (confirm(`重置 ${adminSelectedUser} 余额为1000？`)) {
            setBalance(adminSelectedUser, 1000);
            refreshUserList();
            if (adminSelectedUser === currentUser) { state.balance = getBalance(currentUser); updateUI(); }
            alert("重置成功");
        }
    };
    document.getElementById('adminPwd').onclick = () => {
        let old = prompt("当前密码:");
        if (old !== adminPwd) { alert("密码错误"); return; }
        let newPwd = prompt("新密码(至少6位):");
        if (!newPwd || newPwd.length < 6) { alert("密码至少6位"); return; }
        adminPwd = newPwd;
        localStorage.setItem('dice_admin_pwd', newPwd);
        alert("密码修改成功");
    };
    document.getElementById('adminClose').onclick = () => { panel.remove(); adminPanel = null; };
}

// 创建点数网格
function createPointsGrid() {
    const grid = document.getElementById('pointsGrid');
    for (let i = 4; i <= 17; i++) {
        const card = document.createElement('div');
        card.className = 'point-card';
        card.dataset.point = i;
        card.innerHTML = `<div class="point-value">${i}点</div><div class="point-odds">赔 ${oddsMap[i]}倍</div>`;
        card.onclick = () => selectPoint(i);
        grid.appendChild(card);
    }
}

// 初始化
function init() {
    createPointsGrid();
    updateUI();
    updateHistory();
    startCountdown(25);
    
    // 加载保存的密码
    let saved = localStorage.getItem('dice_admin_pwd');
    if (saved) adminPwd = saved;
    
    document.getElementById('betBtn').onclick = placeBet;
    document.getElementById('cancelBtn').onclick = cancelBet;
    document.getElementById('refreshBtn').onclick = refreshBalance;
    document.getElementById('switchBtn').onclick = switchUser;
    document.getElementById('historyBtn').onclick = showHistoryModal;
    document.getElementById('adminEntry').onclick = () => {
        let pwd = prompt("管理员密码:");
        if (pwd === adminPwd) showAdminPanel();
        else if (pwd !== null) alert("密码错误");
    };
    document.getElementById('newUserBtn').onclick = () => {
        let newId = "player_" + Math.floor(Math.random() * 100000);
        document.getElementById('switchId').value = newId;
        switchUser();
        alert(`新账户：${newId}\n初始余额：1000`);
    };
    
    document.querySelectorAll('.chip').forEach(chip => {
        chip.onclick = () => addBet(parseInt(chip.dataset.val));
    });
    
    // 初始骰子显示
    diceEl.forEach(d => d.innerText = diceMap[1]);
    totalEl.innerText = 3;
}

init();
</script>
