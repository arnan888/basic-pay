<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙虎斗 - 链上终端</title>
    <style>
        /* 保持你原有的所有配色和变量 */
        :root {
            --jade: #4a7c64; --jade-l: #6b9a85; --jade-d: #2c4a3b;
            --stone: #6b737e; --inner: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            --gold: #f1c40f; --red: #ff4d4d; --blue: #3498db; --tiger: #e67e22; --tie: #9b59b6;
        }
        /* 核心修复：防止缩放和点击延迟 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        body { background: #0c0c0c; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .container-outer {
            width: 100vw; height: 100vh; max-width: 480px;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%; animation: outerNeonRotate 15s linear infinite;
            padding: 6px; border-radius: 18px; box-shadow: 0 0 50px rgba(255,255,255,0.6);
        }
        @keyframes outerNeonRotate { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container { width: 100%; height: 100%; background: var(--jade); border-radius: 15px; display: flex; flex-direction: column; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .header { height: 8%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 8px 12px; }
        .box { background: var(--stone); border: 2px solid var(--jade-d); box-shadow: var(--inner); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; }
        .box span:last-child { font-size: 20px; font-weight: bold; color: var(--gold); text-shadow: 0 0 6px var(--gold); }

        .battle-scene { 
            height: 38%; display: flex; justify-content: center; align-items: center; 
            background: #0a0a0a; border: 3px solid var(--jade-d); 
            border-radius: 12px; margin: 4px 10px; position: relative;
        }
        .dragon, .tiger { position: absolute; top: 50%; transform: translateY(-50%); width: 100px; height: 100px; z-index: 10; transition: 0.3s; }
        .dragon { left: 20px; } .tiger { right: 20px; }
        .dragon-icon, .tiger-icon { font-size: 70px; }
        .dragon.attack { animation: dragonAtk 0.4s ease forwards; }
        .tiger.attack { animation: tigerAtk 0.4s ease forwards; }
        @keyframes dragonAtk { 0% { left: 20px; } 50% { left: 40%; transform: translateY(-50%) scale(1.2); } 100% { left: 20px; } }
        @keyframes tigerAtk { 0% { right: 20px; } 50% { right: 40%; transform: translateY(-50%) scale(1.2); } 100% { right: 20px; } }

        .play-section { flex: 1; display: flex; flex-direction: column; background: var(--stone); box-shadow: var(--inner); border: 3px solid var(--jade-d); border-radius: 12px; margin: 4px 10px 8px 10px; padding: 12px; }
        .multi-bet-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .multi-bet-item { flex: 1; background: rgba(0,0,0,0.45); border: 2px solid var(--jade-d); border-radius: 12px; padding: 8px 4px; text-align: center; }
        .multi-bet-item.selected { border-color: var(--gold); background: rgba(255,255,255,0.1); }
        .multi-bet-name { font-size: 22px; font-weight: bold; margin-bottom: 4px; }
        .multi-bet-amount { font-size: 18px; color: var(--gold); font-weight: bold; }
        
        /* 提升按键交互感 */
        .multi-bet-control { display: flex; justify-content: center; gap: 12px; margin-top: 6px; }
        .multi-bet-control button {
            background: rgba(0,0,0,0.6); border: 1px solid var(--gold); border-radius: 50%;
            width: 30px; height: 30px; color: var(--gold); font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .multi-bet-control button:active { transform: scale(0.85); background: var(--gold); color: #000; }

        .data-stack { display: grid; gap: 6px; }
        .data-item { background: rgba(0,0,0,0.6); border: 2px solid var(--jade-d); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; height: 40px; }
        .exec-row { display: flex; gap: 10px; margin: 10px 0; }
        .main-go { flex: 1; height: 52px; background: linear-gradient(180deg, #e53935, #b71c1c); border: none; border-radius: 30px; color: #fff; font-size: 20px; font-weight: 900; box-shadow: 0 5px 0 #7f0000; }
        .step-btn { width: 52px; height: 52px; background: var(--jade); border: 3px solid var(--jade-d); border-radius: 10px; color: #fff; font-size: 28px; }

        .admin-panel { background: #2c3e50; margin-top: 10px; padding: 12px; border-radius: 12px; display: none; }
        .battle-result { position: absolute; top: 10px; color: #fff; font-weight: bold; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 10px; z-index: 20; }
    </style>
</head>
<body>
<div class="container-outer">
    <div class="container">
        <div class="header">
            <div class="box"><span>余额</span><span id="balanceDisplay">0.00</span></div>
            <div class="box"><span>奖池</span><span id="poolDisplay">84291.50</span></div>
        </div>

        <div class="battle-scene">
            <div class="battle-result" id="battle-result">龙虎相争·一触即发</div>
            <div class="dragon" id="dragon"><div class="dragon-icon">🐉</div></div>
            <div class="tiger" id="tiger"><div class="tiger-icon">🐯</div></div>
        </div>

        <div class="play-section">
            <div class="multi-bet-row">
                <div class="multi-bet-item" id="item-DRAGON">
                    <div class="multi-bet-name" style="color:var(--blue)">龙</div>
                    <div class="multi-bet-amount" id="betDragonDisplay">0</div>
                    <div class="multi-bet-control">
                        <button onclick="handleAdjust('DRAGON', -1, event)">-</button>
                        <button onclick="handleAdjust('DRAGON', 1, event)">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" id="item-TIE">
                    <div class="multi-bet-name" style="color:var(--tie)">和</div>
                    <div class="multi-bet-amount" id="betTieDisplay">0</div>
                    <div class="multi-bet-control">
                        <button onclick="handleAdjust('TIE', -1, event)">-</button>
                        <button onclick="handleAdjust('TIE', 1, event)">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" id="item-TIGER">
                    <div class="multi-bet-name" style="color:var(--tiger)">虎</div>
                    <div class="multi-bet-amount" id="betTigerDisplay">0</div>
                    <div class="multi-bet-control">
                        <button onclick="handleAdjust('TIGER', -1, event)">-</button>
                        <button onclick="handleAdjust('TIGER', 1, event)">+</button>
                    </div>
                </div>
            </div>

            <div class="data-stack">
                <div class="data-item"><label>合计投注</label><span id="totalBet" style="color:var(--gold);font-weight:bold">0</span></div>
                <div class="data-item"><label>单注步长</label><span id="stepDisplay" style="color:var(--gold);font-weight:bold">10</span></div>
            </div>

            <div class="exec-row">
                <button class="step-btn" onclick="adjustStep(-10)">-</button>
                <button class="main-go" onclick="submitBet()">确认投注</button>
                <button class="step-btn" onclick="adjustStep(10)">+</button>
            </div>

            <button onclick="toggleAdmin()" style="width:100%;padding:8px;background:#e67e22;border:none;border-radius:8px;color:#fff;margin-top:5px">🔧 管理面板</button>
            <div id="adminPanel" class="admin-panel">
                <input type="password" id="adminKey" value="dola_admin_2024" style="width:100%;margin-bottom:5px">
                <input type="text" id="targetUid" placeholder="用户ID" style="width:100%;margin-bottom:5px">
                <button onclick="adminOp('add')" style="padding:5px 15px">增加</button>
                <button onclick="adminOp('sub')" style="padding:5px 15px">扣除</button>
                <div id="adminRes" style="color:#f1c40f;margin-top:5px"></div>
            </div>
        </div>
    </div>
</div>

<script>
// ==================== 运营配置 ====================
const USER_ID = "6685731895";
const API_URL = "http://127.0.0.1:8080";

let state = {
    balance: 0,
    betStep: 10,
    bets: { DRAGON: 0, TIGER: 0, TIE: 0 },
    betRolling: false,
    pool: 84291.5
};

// ==================== 核心逻辑 ====================
window.onload = async () => {
    await syncBalance();
    updateUI();
};

async function syncBalance() {
    try {
        const res = await fetch(`${API_URL}/balance?user_id=${USER_ID}`);
        const data = await res.json();
        state.balance = data.balance || 0;
        updateUI();
    } catch(e) { console.error("API同步失败"); }
}

// 修复点击不动的关键：handleAdjust
function handleAdjust(type, dir, event) {
    if (event) { event.preventDefault(); event.stopPropagation(); }
    if (state.betRolling) return;

    // 运营逻辑：如果是单选模式，增加一端则清空另外两端
    if(dir > 0) {
        Object.keys(state.bets).forEach(k => { if(k !== type) state.bets[k] = 0; });
    }

    let nextVal = state.bets[type] + (dir * state.betStep);
    state.bets[type] = Math.max(0, nextVal);
    updateUI();
}

function adjustStep(val) {
    state.betStep = Math.max(10, Math.min(500, state.betStep + val));
    updateUI();
}

function updateUI() {
    document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
    document.getElementById('stepDisplay').innerText = state.betStep;
    document.getElementById('betDragonDisplay').innerText = state.bets.DRAGON;
    document.getElementById('betTigerDisplay').innerText = state.bets.TIGER;
    document.getElementById('betTieDisplay').innerText = state.bets.TIE;

    let total = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
    document.getElementById('totalBet').innerText = total;

    // 高亮逻辑
    ['DRAGON','TIE','TIGER'].forEach(k => {
        document.getElementById(`item-${k}`).classList.toggle('selected', state.bets[k] > 0);
    });
}

async function submitBet() {
    if (state.betRolling) return;
    
    let typeKey = Object.keys(state.bets).find(k => state.bets[k] > 0);
    let amount = typeKey ? state.bets[typeKey] : 0;

    if (amount <= 0) return setStatus("⚠️ 请选择投注项");
    if (amount > state.balance) return setStatus("⚠️ 余额不足");

    state.betRolling = true;
    setStatus("💥 投注处理中...");
    
    // 动画
    document.getElementById('dragon').classList.add('attack');
    document.getElementById('tiger').classList.add('attack');

    const typeMap = { DRAGON: "龙", TIGER: "虎", TIE: "和" };

    try {
        const res = await fetch(`${API_URL}/bet`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: USER_ID, type: typeMap[typeKey], amount: amount })
        });
        const data = await res.json();

        setTimeout(() => {
            document.getElementById('dragon').classList.remove('attack');
            document.getElementById('tiger').classList.remove('attack');
            
            if (data.error) {
                setStatus(`❌ ${data.error}`);
            } else {
                state.balance = data.balance;
                setStatus(`${data.result}！${data.win > 0 ? '✅ 赢 +'+data.win : '❌ 未中'}`);
                state.bets = { DRAGON: 0, TIGER: 0, TIE: 0 };
                updateUI();
            }
        }, 600);
    } catch(e) {
        setStatus("❌ API连接超时");
    } finally {
        // 关键：无论成功失败，600ms后解锁，防止死锁
        setTimeout(() => { state.betRolling = false; }, 700);
    }
}

function setStatus(s) { document.getElementById('battle-result').innerText = s; }

// ==================== 管理模块 ====================
function toggleAdmin() {
    let p = document.getElementById('adminPanel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

async function adminOp(act) {
    const key = document.getElementById('adminKey').value;
    const uid = document.getElementById('targetUid').value;
    const amt = prompt("请输入变动金额");
    if(!amt) return;

    try {
        const res = await fetch(`${API_URL}/admin/${act}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Admin-Key': key },
            body: JSON.stringify({ user_id: uid, amount: parseInt(amt) })
        });
        const data = await res.json();
        document.getElementById('adminRes').innerText = data.msg || data.error || "操作成功";
        syncBalance();
    } catch(e) { alert("管理接口异常"); }
}
</script>
</body>
</html>
