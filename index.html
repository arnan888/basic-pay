<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA 旗舰量化终端</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #1c221e; padding: 40px 25px; border-radius: 20px; border: 11px solid #00ff88; box-shadow: 0 0 40px #00ff8888; text-align: center; width: 85%; max-width: 350px; }
        #user-id-input { width: 100%; padding: 15px; background: #fff; color: #000; font-size: 28px; font-weight: bold; border-radius: 10px; border: 3px solid #ff3333; margin: 20px 0; text-align: center; box-sizing: border-box; }
        .btn-red { width: 100%; padding: 18px; background: #ff0000; color: #fff; border: none; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; }
        
        #game-page { display: none; width: 100%; height: 100vh; flex-direction: column; background: #1a251f; }
        .header { background: #233129; padding: 20px; text-align: center; border-bottom: 2px solid #333; }
        .bal-val { font-size: 45px; color: #ff6b6b; font-weight: bold; margin: 10px 0; }
        .wheel-box { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #wheel { width: 280px; height: 280px; border-radius: 50%; border: 10px solid #2d3e34; background: conic-gradient(#ff4d4d 0 45deg, #f1c40f 45deg 90deg, #3498db 90deg 135deg, #9b59b6 135deg 180deg, #2ecc71 180deg 225deg, #e67e22 225deg 270deg, #1abc9c 270deg 315deg, #444 315deg 360deg); transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1); }
        .arrow { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #fff; z-index: 10; }
        .footer { background: #5a1414; padding: 25px; text-align: center; }
        .btn-spin { background: #ff3333; color: white; padding: 15px 50px; border-radius: 30px; font-size: 20px; font-weight: bold; border: none; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h2>终端激活</h2>
            <input type="text" id="user-id-input" readonly>
            <button class="btn-red" onclick="go()">确认进入</button>
        </div>
    </div>

    <div id="game-page">
        <div class="header">
            <div style="color:#888;">可用余额 (USDT)</div>
            <div class="bal-val">1000.00</div>
        </div>
        <div class="wheel-box">
            <div class="arrow"></div>
            <div id="wheel"></div>
        </div>
        <div class="footer">
            <button class="btn-spin" onclick="spin()">执行抽取</button>
        </div>
    </div>

    <script>
        const rid = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('user-id-input').value = rid;
        if (new URLSearchParams(window.location.search).has('user_id')) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('game-page').style.display = 'flex';
        }
        function go() { window.location.href = window.location.origin + window.location.pathname + "?user_id=" + rid; }
        function spin() { document.getElementById('wheel').style.transform = `rotate(${Math.floor(3000 + Math.random() * 2000)}deg)`; }
    </script>
</body>
</html>
