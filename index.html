<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_BEAST_ULTRA</title>
    <style>
        :root {
            --jade: #4a7c64; --jade-l: #6b9a85; --jade-d: #2c4a3b;
            --stone: #6b737e; --inner: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            --gold: #f1c40f; --red: #ff4d4d; --blue: #3498db; --tiger: #e67e22; --tie: #9b59b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0c0c0c; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* 整体大外框：七彩霓虹灯围绕转动样式 */
        .container-outer {
            width: 100vw; height: 100vh; max-width: 500px;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%;
            animation: outerNeonRotate 15s linear infinite;
            padding: 8px;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(255,255,255,0.6);
        }
        @keyframes outerNeonRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 内部容器：保持原有布局 */
        .container {
            width: 100%; height: 100%;
            background: var(--jade);
            border-radius: 15px;
            display: flex; flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* 状态栏：余额与奖池 */
        .header { height: 10%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .box { background: var(--stone); border: 2px solid var(--jade-d); box-shadow: var(--inner); border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        .box span:first-child { font-size: 12px; color: #ccc; letter-spacing: 1px; margin-bottom: 3px; }
        .box span:last-child { font-size: 22px; font-weight: bold; color: var(--gold); text-shadow: 0 0 8px var(--gold); }

        /* 转盘区 */
        .wheel-area { 
            height: 40%; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: var(--stone); box-shadow: var(--inner); border: 4px solid var(--jade-d); 
            border-radius: 12px; margin: 4px 10px; padding: 15px 0;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        .ptr { position: absolute; top: 15px; z-index: 100; width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 30px solid var(--red); filter: drop-shadow(0 0 10px red); }
        
        /* 转盘外包圈：高亮度七彩霓虹 */
        .wheel-outer {
            width: 300px; height: 300px; border-radius: 50%;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 800% 800%;
            animation: wheelNeonFlash 6s linear infinite;
            padding: 8px;
            box-shadow: 0 0 50px rgba(255,255,255,0.6), inset 0 0 20px rgba(255,255,255,0.5);
            border: 3px solid #fff;
        }
        @keyframes wheelNeonFlash {
            0% { background-position: 0% 50%; filter: brightness(1); }
            50% { background-position: 100% 50%; filter: brightness(1.5); }
            100% { background-position: 0% 50%; filter: brightness(1); }
        }
        
        #wheel { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: var(--stone); position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1.1); 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8); border: 4px solid var(--jade-d);
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 12px 12px;
        }
        .slot { position: absolute; width: 100%; height: 100%; text-align: center; padding-top: 25px; transform-origin: 50% 50%; }
        .beast-ico { display: block; font-size: 40px; margin-bottom: 5px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.8)); }
        .beast-nm { font-size: 16px; color: #fff; font-weight: bold; text-shadow: 0 0 8px #000; }
        
        /* 转盘结果提示 */
        .wheel-result {
            margin-top: 15px; font-size: 18px; color: var(--gold);
            font-weight: bold; text-shadow: 0 0 10px var(--gold);
        }

        /* 核心区：龙虎和押注 */
        .play-section {
            flex: 1; display: flex; flex-direction: column;
            background: var(--stone); box-shadow: var(--inner); border: 4px solid var(--jade-d); 
            border-radius: 12px; margin: 6px 10px 10px 10px; padding: 14px;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        /* 龙虎和布局：调大尺寸 */
        .battle-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; height: 140px; margin-bottom: 15px; }
        .side-cell { 
            background: rgba(0,0,0,0.35); border: 4px solid var(--jade-d); border-radius: 16px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.1s; box-shadow: var(--inner);
        }
        .side-cell.active { border-color: var(--gold); background: rgba(255,255,255,0.1); transform: scale(0.97); }
        .side-cell span:first-child { font-size: 16px; color: #ddd; margin-bottom: 8px; }
        .side-cell span:last-child { font-size: 50px; font-weight: 900; }
        #cell-DRAGON span:last-child { color: var(--blue); text-shadow: 0 0 15px var(--blue); }
        #cell-TIGER span:last-child { color: var(--tiger); text-shadow: 0 0 15px var(--tiger); }
        #cell-TIE span:last-child { color: var(--tie); text-shadow: 0 0 15px var(--tie); }

        /* 数据区：调大字体 */
        .data-stack { display: grid; grid-template-rows: repeat(3, 1fr); gap: 8px; margin: 0 8px; }
        .data-item { background: rgba(0,0,0,0.6); border: 2px solid var(--jade-d); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .data-item label { font-size: 14px; color: #ccc; font-weight: bold; margin-bottom: 5px; }
        .data-item value { font-size: 20px; color: var(--gold); font-weight: 900; text-shadow: 0 0 8px var(--gold); }

        /* 操作区：所有按键数字调大 */
        .stake-txt { text-align: center; color: #eee; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .exec-row { display: flex; gap: 12px; align-items: center; margin-bottom: 15px; }
        /* 调整按键：调大尺寸和数字 */
        .step-btn { width: 60px; height: 60px; background: var(--jade); border: 4px solid var(--jade-d); border-radius: 12px; color: #fff; font-size: 32px; font-weight: bold; cursor: pointer; }
        .main-go { flex: 1; height: 70px; background: linear-gradient(180deg, #e53935, #b71c1c); border: none; border-radius: 35px; color: #fff; font-size: 28px; font-weight: 900; letter-spacing: 2px; cursor: pointer; box-shadow: 0 6px 0 #7f0000; }
        .main-go:active { transform: translateY(3px); box-shadow: 0 2px 0 #7f0000; }
        
        .mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .mode-btn { height: 45px; background: rgba(0,0,0,0.4); border: 3px solid var(--jade-d); border-radius: 10px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .mode-btn.active { border-color: var(--gold); background: rgba(0,0,0,0.6); }
    </style>
</head>
<body>

<div class="container-outer">
    <div class="container">
        <div class="header">
            <div class="box"><span>MY BALANCE</span><span>857.80</span></div>
            <div class="box"><span>JACKPOT</span><span>84291.50</span></div>
        </div>

        <div class="wheel-area" style="position: relative;">
            <div class="ptr"></div>
            <div class="wheel-outer">
                <div id="wheel"></div>
            </div>
            <div class="wheel-result">准备就绪</div>
        </div>

        <div class="play-section">
            <div class="battle-row">
                <div id="cell-DRAGON" class="side-cell" onclick="setPick('DRAGON')"><span>龙位</span><span>龙</span></div>
                <div id="cell-TIE" class="side-cell" onclick="setPick('TIE')"><span>和局</span><span>和</span></div>
                <div id="cell-TIGER" class="side-cell" onclick="setPick('TIGER')"><span>虎位</span><span>虎</span></div>
            </div>

            <div class="data-stack">
                <div class="data-item"><label>当前押注</label><value>0.00</value></div>
                <div class="data-item"><label>预计奖金</label><value>0.00</value></div>
                <div class="data-item"><label>已选选项</label><value>未选择</value></div>
            </div>

            <div class="stake-txt">押注金额：<span style="color:var(--gold); font-size:22px;">100</span> USDT</div>
            
            <div class="exec-row">
                <button class="step-btn" onclick="adjustBet(-1)">-</button>
                <button class="main-go" onclick="execute()">确认投注</button>
                <button class="step-btn" onclick="adjustBet(1)">+</button>
            </div>

            <div class="mode-row">
                <div class="mode-btn" onclick="toggleAuto()">自动投注</div>
                <div class="mode-btn" onclick="toggleSpeed()">速度: 1X</div>
            </div>
        </div>
    </div>
</div>

<script>
const beasts = [
    {icon:'🦁', name:'狮子'}, {icon:'🐯', name:'猛虎'}, {icon:'🐺', name:'恶狼'}, {icon:'🦏', name:'犀牛'},
    {icon:'🐘', name:'巨象'}, {icon:'🐻', name:'黑熊'}, {icon:'🐲', name:'神龙'}, {icon:'🦅', name:'雄鹰'}
];

let state = {
    balance: 857.8,
    betLevels: [10, 50, 100, 500, 1000],
    currentBetIdx: 2,
    selected: null,
    isRolling: false,
    autoMode: false,
    speed: 1,
    wheelDeg: 0
};

// 初始化转盘
function initWheel() {
    const wheel = document.getElementById('wheel');
    beasts.forEach((b, i) => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.style.transform = `rotate(${i * 45}deg)`;
        slot.innerHTML = `<div class="beast-ico">${b.icon}</div><div class="beast-nm">${b.name}</div>`;
        wheel.appendChild(slot);
    });
}

// 设置押注选项
function setPick(type) {
    if(state.isRolling) return;
    state.selected = type;
    document.querySelectorAll('.side-cell').forEach(c => c.classList.remove('active'));
    document.getElementById(`cell-${type}`).classList.add('active');
    document.querySelector('.data-item value:last-child').textContent = type;
}

// 调整押注金额
function adjustBet(dir) {
    if(state.isRolling) return;
    state.currentBetIdx = Math.max(0, Math.min(state.betLevels.length-1, state.currentBetIdx + dir));
    document.querySelector('.stake-txt span').textContent = state.betLevels[state.currentBetIdx];
}

// 执行投注/开奖
function execute() {
    if(state.isRolling) { alert('转盘转动中，请稍后'); return; }
    if(!state.selected) { alert('请先选择投注项'); return; }
    const betAmt = state.betLevels[state.currentBetIdx];
    if(state.balance < betAmt) { alert('余额不足'); return; }

    state.isRolling = true;
    state.balance -= betAmt;
    document.querySelector('.box span:last-child').textContent = state.balance.toFixed(2);
    document.querySelector('.data-item value:first-child').textContent = betAmt.toFixed(2);
    
    // 计算转盘转动角度
    const spinRounds = state.speed === 3 ? 4 : 8;
    const targetDeg = (360 - (state.wheelDeg % 360)) + spinRounds * 360 - (Math.floor(Math.random()*8)*45);
    state.wheelDeg += targetDeg;
    document.getElementById('wheel').style.transform = `rotate(${state.wheelDeg}deg)`;

    // 开奖结果判定
    setTimeout(() => {
        state.isRolling = false;
        const winType = ['DRAGON','TIGER','TIE'][Math.floor(Math.random()*3)];
        const winAmt = betAmt * (winType === 'TIE' ? 8 : 1);
        document.querySelector('.data-item value:nth-child(2)').textContent = winAmt.toFixed(2);
        
        if(winType === state.selected) {
            state.balance += winAmt;
            document.querySelector('.box span:last-child').textContent = state.balance.toFixed(2);
            document.getElementById(`cell-${winType}`).classList.add('winner');
            setTimeout(() => document.getElementById(`cell-${winType}`).classList.remove('winner'), 2000);
        }
        
        if(state.autoMode) setTimeout(execute, 1500);
    }, state.speed === 3 ? 800 : state.speed === 2 ? 2000 : 4000);
}

// 切换自动模式
function toggleAuto() {
    state.autoMode = !state.autoMode;
    const btn = document.querySelector('.mode-btn:first-child');
    btn.classList.toggle('active');
    btn.textContent = state.autoMode ? '关闭自动' : '自动投注';
}

// 切换速度
function toggleSpeed() {
    state.speed = (state.speed % 3) + 1;
    document.querySelector('.mode-btn:last-child').textContent = `速度: ${state.speed}X`;
}

// 初始化
window.onload = function() {
    initWheel();
};
</script>
</body>
</html>
