<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>五兽至尊_FINAL_SOUND</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --bg: #05080a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* 强制引导遮罩 - 解决无法自动播放的核心 */
        #audio-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gate-btn { padding: 20px 40px; background: var(--neon); color: #000; border-radius: 50px; font-weight: bold; font-size: 20px; box-shadow: 0 0 30px var(--neon); border: none; }

        .header { width: 100%; height: 20%; display: flex; align-items: center; justify-content: center; }
        .bal-card { width: 85%; border: 1px solid var(--neon); border-radius: 20px; padding: 15px; text-align: center; box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        .bal-val { font-size: 36px; font-weight: 900; color: #fff; }

        .main-game { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .wheel-box { position: relative; width: 85vw; max-width: 340px; aspect-ratio: 1/1; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #222; background: #111; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); position: relative; overflow: hidden; }
        .sector { position: absolute; width: 100%; height: 100%; clip-path: polygon(50% 50%, 100% 20%, 100% 80%); transform-origin: center; display: flex; align-items: center; justify-content: flex-end; padding-right: 12%; }
        .item { transform: rotate(90deg); display: flex; flex-direction: column; align-items: center; }
        
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 35px solid var(--neon); z-index: 100; }
        .spin-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; background: #000; border: 3px solid var(--pink); border-radius: 50%; z-index: 110; color: var(--pink); font-weight: 900; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--pink); }

        .footer { width: 100%; height: 15%; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .bet-box { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 5px 20px; border-radius: 30px; }
        .btn-adj { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #444; background: #222; color: #fff; }
    </style>
</head>
<body>

    <!-- 只要用户点这个按钮，声音就一定能放出来 -->
    <div id="audio-gate">
        <h2 style="color:var(--neon)">五兽至尊-V112</h2>
        <p style="color:#888; margin-bottom:30px;">检测到环境静音，请开启音频通道</p>
        <button class="gate-btn" onclick="unlockAudio()">开启沉浸音效</button>
    </div>

    <div class="header">
        <div class="bal-card"><div class="bal-val">🪙 <span id="bal">1,000</span></div></div>
    </div>

    <div class="main-game">
        <div class="wheel-box">
            <div class="pointer"></div>
            <div id="wheel" class="wheel">
                <div class="sector" style="transform:rotate(-90deg); background:rgba(255,215,0,0.1)"><div class="item"><b>👑</b></div></div>
                <div class="sector" style="transform:rotate(-30deg); background:rgba(255,0,0,0.05)"><div class="item"><b>🦁</b></div></div>
                <div class="sector" style="transform:rotate(30deg); background:rgba(255,165,0,0.1)"><div class="item"><b>🐯</b></div></div>
                <div class="sector" style="transform:rotate(90deg); background:rgba(0,255,0,0.05)"><div class="item"><b>🦅</b></div></div>
                <div class="sector" style="transform:rotate(150deg); background:rgba(147,112,219,0.1)"><div class="item"><b>🐺</b></div></div>
                <div class="sector" style="transform:rotate(210deg); background:rgba(240,230,140,0.05)"><div class="item"><b>🐕</b></div></div>
            </div>
            <div class="spin-btn" onclick="spin()">SPIN</div>
        </div>
    </div>

    <div class="footer">
        <div class="bet-box">
            <button class="btn-adj" onclick="setB(-10)">-</button>
            <span style="font-size:20px; font-weight:bold; color:var(--neon)">下注: <span id="bet">1</span></span>
            <button class="btn-adj" onclick="setB(10)">+</button>
        </div>
        <div id="msg" style="color:var(--pink)">等待开奖...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let b = 1000, bet = 1, r = 0, isS = false;
        
        // 使用 Web Audio API 创建合成音效 (不需要外部链接，不会失效)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function unlockAudio() {
            audioCtx.resume();
            document.getElementById('audio-gate').style.display = 'none';
            playTone(440, 'sine', 0.2); // 成功激活提示音
        }

        function sync() {
            document.getElementById('bal').innerText = b.toLocaleString();
            document.getElementById('bet').innerText = bet;
        }

        window.setB = (v) => { if(!isS) { bet = Math.max(1, Math.min(b, bet+v)); sync(); playTone(600, 'square', 0.05); } };

        function spin() {
            if(isS || b < bet) return;
            isS = true; b -= bet; sync();
            tg.HapticFeedback.impactOccurred('heavy');
            
            // 旋转时的滴答声 (模拟音效)
            let timer = setInterval(() => { if(isS) playTone(150, 'sawtooth', 0.05); }, 200);

            let idx = Math.floor(Math.random()*6);
            r += (3600 + idx*60);
            document.getElementById('wheel').style.transform = `rotate(-${r}deg)`;

            setTimeout(() => {
                clearInterval(timer);
                const multi = [50, 15, 10, 5, 2, 0];
                let win = Math.floor(bet * multi[idx]);
                b += win; sync();
                if(win > 0) {
                    playTone(880, 'sine', 0.5); setTimeout(()=>playTone(1100, 'sine', 0.5), 100);
                    document.getElementById('msg').innerText = "🎊 赢取 " + win + " !";
                } else {
                    playTone(100, 'sine', 0.3);
                    document.getElementById('msg').innerText = "再试一次";
                }
                isS = false;
            }, 5000);
        }
    </script>
</body>
</html>
