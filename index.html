<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字牌老虎机 | 红中·发财·白板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer utilities {
            .tile-shadow { box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
            .tile-glow-red { box-shadow: 0 0 15px rgba(211,47,47,0.8); }
            .tile-glow-gold { box-shadow: 0 0 15px rgba(251,192,45,0.8); }
            .tile-glow-white { box-shadow: 0 0 15px rgba(255,255,255,0.8); }
            .reel-mask { mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent); }
            .animate-roll { animation: roll 0.05s linear infinite; }
            .animate-drop { animation: drop 0.5s ease-out forwards; }
            .animate-win-red { animation: flashRed 0.5s ease-in-out 3; }
            .animate-win-gold { animation: flashGold 0.5s ease-in-out 3; }
            .animate-win-white { animation: flashWhite 0.5s ease-in-out 3; }
        }

        @keyframes roll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-120px); }
        }

        @keyframes drop {
            0% { transform: translateY(-240px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes flashRed {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(211,47,47,1); }
            100% { transform: scale(1); }
        }

        @keyframes flashGold {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(251,192,45,1); }
            100% { transform: scale(1); }
        }

        @keyframes flashWhite {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,255,255,1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-[#1A1A1A] min-h-screen flex flex-col items-center justify-center p-4 font-sans">
    <!-- 背景装饰 -->
    <div class="fixed inset-0 z-0 opacity-10">
        <div class="absolute top-[10%] left-[5%] text-[10vw]">🀄</div>
        <div class="absolute top-[20%] right-[8%] text-[12vw]">🀅</div>
        <div class="absolute bottom-[15%] left-[15%] text-[11vw]">🀆</div>
        <div class="absolute bottom-[25%] right-[10%] text-[9vw]">🀄</div>
    </div>

    <!-- 游戏主体 -->
    <div class="relative z-10 w-full max-w-md bg-[#8D6E63] rounded-2xl p-6 border-4 border-[#5D4037] shadow-xl">
        <!-- 标题 -->
        <div class="text-center mb-6">
            <h1 class="text-[clamp(1.5rem,5vw,2.5rem)] font-bold text-white flex justify-center items-center gap-3">
                <span>🀄</span>
                <span>字牌老虎机</span>
                <span>🀅</span>
            </h1>
            <p class="text-yellow-200 text-sm mt-1">红中 · 发财 · 白板</p>
        </div>

        <!-- 余额显示 -->
        <div class="bg-[#3E2723] rounded-lg p-3 mb-4 flex justify-between items-center border-2 border-[#5D4037]">
            <div class="text-white text-sm">当前筹码</div>
            <div class="text-[clamp(1.2rem,4vw,1.8rem)] font-bold text-yellow-400" id="balance">¥ 8,888</div>
        </div>

        <!-- 老虎机卷轴区 -->
        <div class="bg-[#263238] rounded-lg p-4 mb-6 border-2 border-[#37474F] relative">
            <!-- 卷轴容器 -->
            <div class="flex justify-between gap-2 h-[120px] overflow-hidden reel-mask">
                <!-- 卷轴1 -->
                <div class="w-[calc(33.333%-8px)] h-full flex flex-col items-center justify-start bg-[#455A64] rounded-lg overflow-hidden" id="reel1">
                    <div class="w-full h-[120px] flex items-center justify-center text-[clamp(2.5rem,8vw,4rem)] tile-shadow bg-white text-[#D32F2F]" id="tile1-1">🀄</div>
                </div>
                <!-- 卷轴2 -->
                <div class="w-[calc(33.333%-8px)] h-full flex flex-col items-center justify-start bg-[#455A64] rounded-lg overflow-hidden" id="reel2">
                    <div class="w-full h-[120px] flex items-center justify-center text-[clamp(2.5rem,8vw,4rem)] tile-shadow bg-white text-[#FBC02D]" id="tile2-1">🀅</div>
                </div>
                <!-- 卷轴3 -->
                <div class="w-[calc(33.333%-8px)] h-full flex flex-col items-center justify-start bg-[#455A64] rounded-lg overflow-hidden" id="reel3">
                    <div class="w-full h-[120px] flex items-center justify-center text-[clamp(2.5rem,8vw,4rem)] tile-shadow bg-white text-[#212121]" id="tile3-1">🀆</div>
                </div>
            </div>

            <!-- 中奖提示 -->
            <div class="absolute inset-0 z-10 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-500" id="win-tip">
                <div class="bg-black/80 px-6 py-3 rounded-xl text-xl font-bold" id="win-text">
                    <span id="win-msg">红中三连！</span>
                    <span class="text-yellow-400 ml-2" id="win-money">¥ 1,888</span>
                </div>
            </div>
        </div>

        <!-- 控制区 -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <!-- 下注控制 -->
            <div class="bg-[#3E2723] rounded-lg p-4 border-2 border-[#5D4037]">
                <div class="text-center text-white text-sm mb-3">下注金额</div>
                <div class="flex justify-between items-center mb-3">
                    <button class="bg-[#5D4037] hover:bg-[#795548] w-10 h-10 rounded-full flex items-center justify-center text-white" id="bet-minus">
                        <span>-</span>
                    </button>
                    <div class="text-xl font-bold text-yellow-400" id="current-bet">¥ 100</div>
                    <button class="bg-[#5D4037] hover:bg-[#795548] w-10 h-10 rounded-full flex items-center justify-center text-white" id="bet-plus">
                        <span>+</span>
                    </button>
                </div>
                <div class="flex justify-between">
                    <button class="bg-[#D32F2F] hover:bg-[#B71C1C] text-white px-3 py-1 rounded text-xs w-[45%]" id="bet-min">最小</button>
                    <button class="bg-[#D32F2F] hover:bg-[#B71C1C] text-white px-3 py-1 rounded text-xs w-[45%]" id="bet-max">最大</button>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="bg-[#3E2723] rounded-lg p-4 border-2 border-[#5D4037] flex flex-col justify-between">
                <div class="text-center text-white text-sm mb-3">游戏操作</div>
                <button class="bg-[#FBC02D] hover:bg-[#F9A825] text-[#1A1A1A] text-xl font-bold py-3 rounded-lg mb-3 transition-all duration-300 transform hover:scale-105" id="spin-btn">
                    <span>开 牌</span>
                </button>
                <div class="flex justify-between">
                    <button class="bg-[#1976D2] hover:bg-[#0D47A1] text-white px-3 py-2 rounded text-xs w-[45%]" id="auto-btn">
                        自动
                    </button>
                    <button class="bg-[#D32F2F] hover:bg-[#B71C1C] text-white px-3 py-2 rounded text-xs w-[45%]" id="sound-btn">
                        <i id="sound-icon">🔊</i> 音效
                    </button>
                </div>
            </div>
        </div>

        <!-- 奖励说明 -->
        <div class="bg-[#3E2723] rounded-lg p-4 border-2 border-[#5D4037]">
            <div class="text-center text-white text-sm mb-2">牌型奖励表</div>
            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-[#4E342E] rounded p-2">
                    <div class="text-[2rem] mb-1">🀄🀄🀄</div>
                    <div class="text-white text-xs">红中三连</div>
                    <div class="text-yellow-400 text-sm font-bold">×88倍</div>
                </div>
                <div class="bg-[#4E342E] rounded p-2">
                    <div class="text-[2rem] mb-1">🀅🀅🀅</div>
                    <div class="text-white text-xs">发财三连</div>
                    <div class="text-yellow-400 text-sm font-bold">×66倍</div>
                </div>
                <div class="bg-[#4E342E] rounded p-2">
                    <div class="text-[2rem] mb-1">🀆🀆🀆</div>
                    <div class="text-white text-xs">白板三连</div>
                    <div class="text-yellow-400 text-sm font-bold">×48倍</div>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center mt-2">
                <div class="bg-[#4E342E] rounded p-2">
                    <div class="text-[2rem] mb-1">🀄🀄</div>
                    <div class="text-white text-xs">红中对子</div>
                    <div class="text-yellow-400 text-sm font-bold">×8倍</div>
                </div>
                <div class="bg-[#4E342E] rounded p-2">
                    <div class="text-[2rem] mb-1">🀅🀅</div>
                    <div class="text-white text-xs">发财对子</div>
                    <div class="text-yellow-400 text-sm font-bold">×6倍</div>
                </div>
                <div class="bg-[#4E342E] rounded p-2">
                    <div class="text-[2rem] mb-1">🀆🀆</div>
                    <div class="text-white text-xs">白板对子</div>
                    <div class="text-yellow-400 text-sm font-bold">×4倍</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部说明 -->
    <div class="relative z-10 text-center text-white/60 text-xs mt-6">
        <p>国粹字牌主题老虎机 | 仅用于前端技术展示</p>
    </div>

    <script>
        // 核心配置
        const SLOT_CONFIG = {
            tiles: [
                { icon: '🀄', name: '红中', color: 'text-[#D32F2F] tile-glow-red animate-win-red', pairMulti: 8, tripleMulti: 88 },
                { icon: '🀅', name: '发财', color: 'text-[#FBC02D] tile-glow-gold animate-win-gold', pairMulti: 6, tripleMulti: 66 },
                { icon: '🀆', name: '白板', color: 'text-[#212121] tile-glow-white animate-win-white', pairMulti: 4, tripleMulti: 48 }
            ],
            minBet: 10,
            maxBet: 500,
            initBalance: 8888
        };

        // 游戏状态
        let gameState = {
            balance: SLOT_CONFIG.initBalance,
            currentBet: 100,
            isSpinning: false,
            isAuto: false,
            soundOn: true,
            autoTimes: 0
        };

        // DOM元素
        const elements = {
            balance: document.getElementById('balance'),
            currentBet: document.getElementById('current-bet'),
            spinBtn: document.getElementById('spin-btn'),
            autoBtn: document.getElementById('auto-btn'),
            soundBtn: document.getElementById('sound-btn'),
            soundIcon: document.getElementById('sound-icon'),
            betMinus: document.getElementById('bet-minus'),
            betPlus: document.getElementById('bet-plus'),
            betMin: document.getElementById('bet-min'),
            betMax: document.getElementById('bet-max'),
            reels: [
                document.getElementById('reel1'),
                document.getElementById('reel2'),
                document.getElementById('reel3')
            ],
            winTip: document.getElementById('win-tip'),
            winMsg: document.getElementById('win-msg'),
            winMoney: document.getElementById('win-money')
        };

        // 音效（模拟）
        function playSound(type) {
            if (!gameState.soundOn) return;
            console.log(`播放音效：${type}`);
            // 实际项目中可替换为真实音频播放
            switch(type) {
                case 'spin': console.log('🎵 转动音效'); break;
                case 'stop': console.log('🎵 停止音效'); break;
                case 'win': console.log('🎵 中奖音效'); break;
                case 'bigWin': console.log('🎵 大奖音效'); break;
                case 'btn': console.log('🎵 按钮音效'); break;
            }
        }

        // 更新UI显示
        function updateUI() {
            elements.balance.textContent = `¥ ${gameState.balance.toLocaleString()}`;
            elements.currentBet.textContent = `¥ ${gameState.currentBet}`;
            elements.soundIcon.textContent = gameState.soundOn ? '🔊' : '🔊';
        }

        // 获取随机牌
        function getRandomTile() {
            return SLOT_CONFIG.tiles[Math.floor(Math.random() * SLOT_CONFIG.tiles.length)];
        }

        // 生成卷轴内容
        function generateReelContent(reelEl, count = 5) {
            reelEl.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const tile = getRandomTile();
                const tileEl = document.createElement('div');
                tileEl.className = `w-full h-[120px] flex items-center justify-center text-[clamp(2.5rem,8vw,4rem)] tile-shadow bg-white ${tile.color}`;
                tileEl.textContent = tile.icon;
                tileEl.dataset.type = tile.name;
                reelEl.appendChild(tileEl);
            }
            return reelEl;
        }

        // 滚动卷轴
        async function spinReels() {
            if (gameState.isSpinning || gameState.balance < gameState.currentBet) return;
            
            // 扣除下注
            gameState.balance -= gameState.currentBet;
            updateUI();
            gameState.isSpinning = true;
            elements.spinBtn.disabled = true;
            elements.spinBtn.style.opacity = '0.7';
            
            // 播放转动音效
            playSound('spin');
            
            // 初始化卷轴
            const results = [];
            for (let i = 0; i < 3; i++) {
                elements.reels[i].classList.add('animate-roll');
                generateReelContent(elements.reels[i], 10);
            }

            // 逐个停止卷轴
            for (let i = 0; i < 3; i++) {
                await new Promise(resolve => setTimeout(resolve, 800 + i * 500));
                elements.reels[i].classList.remove('animate-roll');
                playSound('stop');
                
                // 生成最终结果
                const finalTile = getRandomTile();
                results.push(finalTile);
                
                // 更新卷轴显示最终牌
                const finalTileEl = document.createElement('div');
                finalTileEl.className = `w-full h-[120px] flex items-center justify-center text-[clamp(2.5rem,8vw,4rem)] tile-shadow bg-white ${finalTile.color} animate-drop`;
                finalTileEl.textContent = finalTile.icon;
                finalTileEl.dataset.type = finalTile.name;
                elements.reels[i].innerHTML = '';
                elements.reels[i].appendChild(finalTileEl);
            }

            // 计算奖励
            calculateWin(results);
            
            // 恢复状态
            gameState.isSpinning = false;
            elements.spinBtn.disabled = false;
            elements.spinBtn.style.opacity = '1';
            
            // 自动模式继续
            if (gameState.isAuto && gameState.autoTimes > 0) {
                gameState.autoTimes--;
                setTimeout(spinReels, 1000);
            }
        }

        // 计算奖励
        function calculateWin(results) {
            let winAmount = 0;
            let winType = '';
            let winDesc = '';
            
            // 检查是否三连
            if (results[0].name === results[1].name && results[1].name === results[2].name) {
                winAmount = gameState.currentBet * results[0].tripleMulti;
                winType = 'triple';
                winDesc = `${results[0].name}三连`;
                playSound('bigWin');
            } 
            // 检查是否对子
            else if (results[0].name === results[1].name || results[0].name === results[2].name || results[1].name === results[2].name) {
                // 取出现次数多的牌型
                const tileCounts = {};
                results.forEach(tile => {
                    tileCounts[tile.name] = (tileCounts[tile.name] || 0) + 1;
                });
                let mainTile = results[0];
                for (const name in tileCounts) {
                    if (tileCounts[name] > tileCounts[mainTile.name]) {
                        mainTile = SLOT_CONFIG.tiles.find(t => t.name === name);
                    }
                }
                winAmount = gameState.currentBet * mainTile.pairMulti;
                winType = 'pair';
                winDesc = `${mainTile.name}对子`;
                playSound('win');
            }

            // 显示奖励
            if (winAmount > 0) {
                gameState.balance += winAmount;
                updateUI();
                
                elements.winMsg.textContent = winDesc;
                elements.winMoney.textContent = `¥ ${winAmount.toLocaleString()}`;
                elements.winTip.style.opacity = '1';
                
                setTimeout(() => {
                    elements.winTip.style.opacity = '0';
                }, 3000);
            }
        }

        // 初始化游戏
        function initGame() {
            // 生成初始卷轴
            elements.reels.forEach(reel => generateReelContent(reel));
            updateUI();
            
            // 绑定事件
            elements.spinBtn.addEventListener('click', () => {
                playSound('btn');
                spinReels();
            });
            
            elements.autoBtn.addEventListener('click', () => {
                playSound('btn');
                gameState.isAuto = !gameState.isAuto;
                gameState.autoTimes = gameState.isAuto ? 10 : 0;
                elements.autoBtn.textContent = gameState.isAuto ? '停止' : '自动';
                elements.autoBtn.style.backgroundColor = gameState.isAuto ? '#B71C1C' : '#1976D2';
                
                if (gameState.isAuto && !gameState.isSpinning) {
                    spinReels();
                }
            });
            
            elements.soundBtn.addEventListener('click', () => {
                playSound('btn');
                gameState.soundOn = !gameState.soundOn;
                elements.soundIcon.textContent = gameState.soundOn ? '🔊' : '🔊';
            });
            
            elements.betMinus
