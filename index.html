<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>至尊骰宝 · 完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', sans-serif;
            padding: 12px;
        }
        /* 主容器 */
        .game-container {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(145deg, #1a4a2a, #0a2a1a);
            border-radius: 40px;
            padding: 16px;
            border: 1px solid #ffaa44;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .inner {
            background: rgba(0,0,0,0.3);
            border-radius: 32px;
            padding: 16px;
        }
        /* 三大盒子公用样式 */
        .box {
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
        }
        /* 骰子区 */
        .dice-area {
            text-align: center;
        }
        .dice-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
        }
        .dice {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #fff, #e0e0e0);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #c0392b;
            border: 2px solid #ffaa44;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .dice-shake {
            animation: shake 0.08s infinite;
        }
        @keyframes shake {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(-5px,-5px) rotate(10deg); }
            75% { transform: translate(5px,5px) rotate(-10deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }
        .total {
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 8px;
        }
        .total-label { font-size: 12px; color: #ffaa88; }
        .total-number {
            font-size: 42px;
            font-weight: bold;
            color: #ffcc44;
            font-family: monospace;
            text-shadow: 0 0 8px #ff6600;
        }
        .total-blink { animation: blink 0.05s step-end infinite; }
        @keyframes blink {
            0% { text-shadow: 0 0 5px #ffaa44; }
            50% { text-shadow: 0 0 20px #ff6600; color: #ffdd88; }
        }

        /* 下注区 - 滚动 */
        .bet-scroll {
            max-height: 380px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .bet-category {
            color: #ffaa44;
            font-size: 14px;
            margin: 12px 0 8px;
            padding-left: 4px;
            border-left: 3px solid #ffaa44;
        }
        /* 大小单双网格 */
        .special-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .special-card {
            background: linear-gradient(145deg,#2a3a2a,#1a2a1a);
            border-radius: 20px;
            padding: 10px 4px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,170,68,0.3);
        }
        .special-card.selected {
            background: linear-gradient(135deg,#ff6600,#cc3300);
            transform: scale(0.98);
        }
        .special-name { font-size: 18px; font-weight: bold; color: #ffcc44; }
        .special-odds { font-size: 11px; color: #88aa88; }
        .special-bet-amount {
            font-size: 13px;
            font-weight: bold;
            color: #ffaa44;
            margin-top: 5px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 2px;
        }
        /* 点数网格 */
        .points-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .point-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,170,68,0.3);
        }
        .point-card.selected {
            background: linear-gradient(135deg,#ff6600,#cc3300);
            transform: scale(0.97);
        }
        .point-value { font-size: 16px; font-weight: bold; color: #ffcc44; }
        .point-odds { font-size: 9px; color: #88aa88; }
        .point-bet-amount {
            font-size: 11px;
            font-weight: bold;
            color: #ffaa44;
            margin-top: 3px;
        }
        /* 围骰 & 豹子 */
        .trio-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .trio-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,170,68,0.3);
        }
        .trio-card.selected {
            background: linear-gradient(135deg,#ff6600,#cc3300);
            transform: scale(0.97);
        }
        .trio-name { font-size: 16px; font-weight: bold; color: #ffcc44; }
        .trio-odds { font-size: 10px; color: #88aa88; }
        .trio-bet-amount {
            font-size: 11px;
            font-weight: bold;
            color: #ffaa44;
            margin-top: 3px;
        }

        /* 信息区 */
        .info-box {
            /* 继承 .box 样式 */
        }
        .balance-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .balance-card {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            flex: 1;
            cursor: pointer;
        }
        .balance-label { font-size: 11px; color: #88aa88; }
        .balance-value { font-size: 22px; font-weight: bold; color: #ffcc44; }
        .chips {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .chip {
            width: 55px;
            padding: 8px 0;
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .chip:active { transform: scale(0.94); }
        .chip.selected-chip {
            box-shadow: 0 0 0 3px #ffaa44;
            transform: scale(1.02);
        }
        .chip-10 { background: radial-gradient(#4a90d9, #1a4a8a); color:#fff; }
        .chip-20 { background: radial-gradient(#50b86a, #2a6a3a); color:#fff; }
        .chip-50 { background: radial-gradient(#e85d3a, #aa2a1a); color:#fff; }
        .chip-100 { background: radial-gradient(#9b59b6, #6c3483); color:#fff; }
        .chip-500 { background: radial-gradient(#f1c40f, #d4a00a); color:#333; }
        .chip-1000 { background: radial-gradient(#e74c3c, #c0392b); color:#fff; }

        .selected-chip-display {
            text-align: center;
            margin-bottom: 16px;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
        }
        .selected-chip-text { color: #ffaa44; font-size: 13px; }
        .selected-chip-value { color: #ffcc44; font-size: 28px; font-weight: bold; }

        .countdown-area {
            text-align: center;
            margin-bottom: 16px;
        }
        .countdown-label { font-size: 12px; color: #88aa88; }
        .countdown-number {
            font-size: 32px;
            font-weight: bold;
            color: #ffaa44;
            font-family: monospace;
        }
        .countdown-warning { animation: warning 0.5s infinite; color: #ff3300 !important; }
        @keyframes warning { 0%,100% { opacity:1; } 50% { opacity:0.5; text-shadow:0 0 10px red; } }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            color: #ffaa44;
            border: 1px solid #ffaa44;
            font-size: 14px;
        }
        .action-btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, #ff6600, #cc3300);
            color: #fff;
            border: none;
        }

        .history {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 12px;
            max-height: 110px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
            color: #ccc;
        }
        .win { color: #4caf50; }
        .lose { color: #f44336; }

        /* 用户栏 */
        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .login-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .login-input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid #ffaa44;
            border-radius: 40px;
            padding: 8px 12px;
            color: #fff;
            font-size: 13px;
        }
        .small-btn {
            background: rgba(255,170,68,0.2);
            border: 1px solid #ffaa44;
            border-radius: 40px;
            padding: 6px 14px;
            color: #ffaa44;
            cursor: pointer;
            font-size: 12px;
        }
        .small-btn:active { transform: scale(0.95); }

        /* 模态框 */
        .modal {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a2a1a;
            border-radius: 32px;
            padding: 24px;
            text-align: center;
            border: 1px solid #ffaa44;
            width: 85%;
            max-width: 360px;
            color: #fff;
        }
        .admin-user-list {
            max-height: 150px;
            overflow-y: auto;
            margin: 12px 0;
            background: #0a1a0a;
            border-radius: 12px;
            padding: 8px;
        }
        .admin-user {
            padding: 8px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }
        .admin-user.selected { background: #ffaa44; color: #1a1a2a; }
        .admin-input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            background: #0a1a0a;
            border: 1px solid #ffaa44;
            color: #fff;
        }
        .admin-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 12px 0;
        }
        .admin-btn {
            padding: 8px 16px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="inner">
        <!-- 用户栏 -->
        <div class="user-row">
            <div><span style="color:#ffaa44">👤</span> <span id="currentUserId" style="color:#ffaa44; font-weight:bold">player888</span></div>
            <div>
                <button id="historyBtn" class="small-btn">📜 记录</button>
                <button id="newUserBtn" class="small-btn">✨ 新用户</button>
            </div>
        </div>
        <div class="login-row">
            <input type="text" id="switchId" class="login-input" placeholder="输入ID登录">
            <button id="switchBtn" class="small-btn">登录</button>
        </div>

        <!-- 三大盒子 -->
        <!-- 1. 骰子盒子 -->
        <div class="box dice-area">
            <div class="dice-row">
                <div class="dice" id="dice1">⚀</div>
                <div class="dice" id="dice2">⚀</div>
                <div class="dice" id="dice3">⚀</div>
            </div>
            <div class="total">
                <div class="total-label">总 点 数</div>
                <div class="total-number" id="totalPoints">3</div>
            </div>
        </div>

        <!-- 2. 下注盒子（滚动） -->
        <div class="box">
            <div class="bet-scroll">
                <!-- 大小单双 -->
                <div class="bet-category">🎲 大小单双</div>
                <div class="special-grid">
                    <div class="special-card" data-type="BIG"><div class="special-name">大</div><div class="special-odds">赔 2倍</div><div class="special-bet-amount" id="bet_BIG">0</div></div>
                    <div class="special-card" data-type="SMALL"><div class="special-name">小</div><div class="special-odds">赔 2倍</div><div class="special-bet-amount" id="bet_SMALL">0</div></div>
                    <div class="special-card" data-type="ODD"><div class="special-name">单</div><div class="special-odds">赔 2倍</div><div class="special-bet-amount" id="bet_ODD">0</div></div>
                    <div class="special-card" data-type="EVEN"><div class="special-name">双</div><div class="special-odds">赔 2倍</div><div class="special-bet-amount" id="bet_EVEN">0</div></div>
                </div>

                <!-- 点数 4-17 -->
                <div class="bet-category">🎲 点数</div>
                <div class="points-grid" id="pointsGrid"></div>

                <!-- 围骰 (三同号) -->
                <div class="bet-category">🎲 围骰 (三同号)</div>
                <div class="trio-grid" id="tripletsGrid"></div>

                <!-- 豹子 (全围) -->
                <div class="bet-category">🎲 豹子 (任意三同)</div>
                <div class="trio-grid">
                    <div class="trio-card" data-type="ALL_TRIPLE"><div class="trio-name">豹子</div><div class="trio-odds">赔 30倍</div><div class="trio-bet-amount" id="bet_ALL_TRIPLE">0</div></div>
                </div>
            </div>
        </div>

        <!-- 3. 信息盒子 -->
        <div class="box info-box">
            <div class="balance-row">
                <div class="balance-card" id="adminEntry">
                    <div class="balance-label">💰 余额</div>
                    <div class="balance-value" id="balanceDisplay">1000.00</div>
                </div>
                <div class="balance-card">
                    <div class="balance-label">🎰 奖池</div>
                    <div class="balance-value" id="poolDisplay">50000.00</div>
                </div>
            </div>

            <div class="chips">
                <div class="chip chip-10" data-val="10">10</div>
                <div class="chip chip-20" data-val="20">20</div>
                <div class="chip chip-50" data-val="50">50</div>
                <div class="chip chip-100" data-val="100">100</div>
                <div class="chip chip-500" data-val="500">500</div>
                <div class="chip chip-1000" data-val="1000">1K</div>
            </div>
            <div class="selected-chip-display">
                <div class="selected-chip-text">当前筹码</div>
                <div class="selected-chip-value" id="selectedChip">0</div>
            </div>

            <div class="countdown-area">
                <div class="countdown-label">⏱️ 下注倒计时</div>
                <div class="countdown-number" id="countdownNum">25</div>
            </div>

            <div class="action-buttons">
                <button class="action-btn" id="clearAllBtn">全部取消</button>
                <button class="action-btn" id="refreshBtn">刷新</button>
                <button class="action-btn btn-primary" id="betBtn">确认投注</button>
            </div>

            <div class="history" id="historyList"></div>
        </div>
    </div>
</div>

<script>
// ======================= 可配置参数（方便修改） =======================
const CONFIG = {
    countdownSeconds: 25,        // 倒计时秒数
    defaultBalance: 1000,        // 新用户初始余额
    adminPassword: "wang000000", // 管理员密码
    // 赔率表
    odds: {
        // 点数
        4:60,5:30,6:18,7:12,8:8,9:7,10:6,11:6,12:7,13:8,14:12,15:18,16:30,17:60,
        // 大小单双
        'BIG':2, 'SMALL':2, 'ODD':2, 'EVEN':2,
        // 围骰
        'TRIPLE_1':150, 'TRIPLE_2':150, 'TRIPLE_3':150, 'TRIPLE_4':150, 'TRIPLE_5':150, 'TRIPLE_6':150,
        // 豹子
        'ALL_TRIPLE':30
    }
};

// ======================= 用户系统 =======================
let users = JSON.parse(localStorage.getItem('dice_users')) || {};
let currentUser = "player888";
if (!users[currentUser]) users[currentUser] = { balance: CONFIG.defaultBalance, records: [] };
let adminPwd = CONFIG.adminPassword;
function saveUsers() { localStorage.setItem('dice_users', JSON.stringify(users)); }
function getBalance(uid) { return users[uid]?.balance || CONFIG.defaultBalance; }
function setBalance(uid, amt) { if (!users[uid]) users[uid] = { balance: CONFIG.defaultBalance, records: [] }; users[uid].balance = amt; saveUsers(); }

// ======================= 下注对象 =======================
let bets = {
    'BIG':0, 'SMALL':0, 'ODD':0, 'EVEN':0,
    4:0,5:0,6:0,7:0,8:0,9:0,10:0,11:0,12:0,13:0,14:0,15:0,16:0,17:0,
    'TRIPLE_1':0, 'TRIPLE_2':0, 'TRIPLE_3':0, 'TRIPLE_4':0, 'TRIPLE_5':0, 'TRIPLE_6':0,
    'ALL_TRIPLE':0
};

let selectedChip = 0;
let currentBalance = getBalance(currentUser);
const diceEl = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
const totalEl = document.getElementById('totalPoints');
const diceMap = {1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅'};

// ======================= 辅助函数 =======================
function getResultInfo(d1,d2,d3) {
    let total = d1+d2+d3;
    let types = [];
    if (total >= 11 && total <= 17) types.push('BIG');
    if (total >= 4 && total <= 10) types.push('SMALL');
    if (total % 2 === 1) types.push('ODD');
    if (total % 2 === 0) types.push('EVEN');
    if (d1 === d2 && d2 === d3) {
        types.push(`TRIPLE_${d1}`);
        types.push('ALL_TRIPLE');
    }
    return { total, types };
}

// 更新界面上的押注金额显示
function updateUI() {
    document.getElementById('bet_BIG').innerText = bets['BIG'];
    document.getElementById('bet_SMALL').innerText = bets['SMALL'];
    document.getElementById('bet_ODD').innerText = bets['ODD'];
    document.getElementById('bet_EVEN').innerText = bets['EVEN'];
    for (let i=4;i<=17;i++) {
        let el = document.getElementById(`bet_${i}`);
        if (el) el.innerText = bets[i];
    }
    for (let i=1;i<=6;i++) {
        let el = document.getElementById(`bet_TRIPLE_${i}`);
        if (el) el.innerText = bets[`TRIPLE_${i}`];
    }
    document.getElementById('bet_ALL_TRIPLE').innerText = bets['ALL_TRIPLE'];
    let totalBet = Object.values(bets).reduce((a,b)=>a+b,0);
    // 总押注显示（可选，若无此元素则忽略）
    if(document.getElementById('totalBet')) document.getElementById('totalBet').innerText = totalBet;
    document.getElementById('balanceDisplay').innerText = currentBalance.toFixed(2);
    // 随机奖池波动
    let pool = 50000 + (Math.random() - 0.5) * 3000;
    pool = Math.max(40000, Math.min(60000, pool));
    document.getElementById('poolDisplay').innerText = pool.toFixed(2);
}

// 添加押注
function addBet(type) {
    if (selectedChip <= 0) { alert("请先选择筹码"); return; }
    if (selectedChip > currentBalance) { alert("余额不足！当前余额：" + currentBalance); return; }
    currentBalance -= selectedChip;
    setBalance(currentUser, currentBalance);
    bets[type] += selectedChip;
    updateUI();
    // 高亮
    document.querySelectorAll('.special-card, .point-card, .trio-card').forEach(el => el.classList.remove('selected'));
    let selector = '';
    if (typeof type === 'string') {
        if (type.startsWith('TRIPLE_')) selector = `.trio-card[data-type="${type}"]`;
        else selector = `.special-card[data-type="${type}"]`;
    } else {
        selector = `.point-card[data-point="${type}"]`;
    }
    document.querySelector(selector)?.classList.add('selected');
    setTimeout(() => {
        document.querySelectorAll('.special-card, .point-card, .trio-card').forEach(el => el.classList.remove('selected'));
    }, 800);
    if (navigator.vibrate) navigator.vibrate(30);
}

// 清空所有押注
function clearAllBets() {
    let total = Object.values(bets).reduce((a,b)=>a+b,0);
    currentBalance += total;
    setBalance(currentUser, currentBalance);
    for (let k in bets) bets[k] = 0;
    updateUI();
    if (navigator.vibrate) navigator.vibrate(30);
}

// 摇骰子动画
let rollTimer = null;
function rollDice(finalVals, finalTotal, winAmounts) {
    if (rollTimer) clearInterval(rollTimer);
    diceEl.forEach(d => d.classList.add('dice-shake'));
    totalEl.classList.add('total-blink');
    let step = 0, maxStep = 18;
    rollTimer = setInterval(() => {
        step++;
        diceEl.forEach(d => { let r = Math.floor(Math.random() * 6) + 1; d.innerText = diceMap[r]; });
        let sum = diceEl.reduce((s,d) => s + Object.keys(diceMap).find(k => diceMap[k] === d.innerText)*1, 0);
        totalEl.innerText = sum;
        if (step >= maxStep) {
            clearInterval(rollTimer);
            rollTimer = null;
            diceEl.forEach(d => d.classList.remove('dice-shake'));
            totalEl.classList.remove('total-blink');
            diceEl.forEach((d,i) => d.innerText = diceMap[finalVals[i]]);
            totalEl.innerText = finalTotal;
            let totalWin = winAmounts.reduce((a,b)=>a+b,0);
            if (totalWin > 0) {
                totalEl.style.color = '#4caf50';
                setTimeout(() => totalEl.style.color = '#ffcc44', 2000);
            } else {
                totalEl.style.color = '#f44336';
                setTimeout(() => totalEl.style.color = '#ffcc44', 2000);
            }
        }
    }, 55);
}

// 开奖核心逻辑
let isDrawing = false, isBetLocked = false, countdownInterval = null;
async function draw() {
    if (isDrawing) return;
    let totalBet = Object.values(bets).reduce((a,b)=>a+b,0);
    if (totalBet === 0) { alert("请先下注"); return; }
    isDrawing = true;
    isBetLocked = true;
    const d1 = Math.floor(Math.random() * 6) + 1;
    const d2 = Math.floor(Math.random() * 6) + 1;
    const d3 = Math.floor(Math.random() * 6) + 1;
    const { total, types } = getResultInfo(d1,d2,d3);
    let winAmounts = [];
    // 大小单双
    if (types.includes('BIG') && bets['BIG']>0) winAmounts.push(bets['BIG'] * CONFIG.odds['BIG']);
    if (types.includes('SMALL') && bets['SMALL']>0) winAmounts.push(bets['SMALL'] * CONFIG.odds['SMALL']);
    if (types.includes('ODD') && bets['ODD']>0) winAmounts.push(bets['ODD'] * CONFIG.odds['ODD']);
    if (types.includes('EVEN') && bets['EVEN']>0) winAmounts.push(bets['EVEN'] * CONFIG.odds['EVEN']);
    // 点数
    if (bets[total] > 0) winAmounts.push(bets[total] * CONFIG.odds[total]);
    // 围骰 & 豹子
    for (let t of types) {
        if (t.startsWith('TRIPLE_') && bets[t] > 0) winAmounts.push(bets[t] * CONFIG.odds[t]);
        if (t === 'ALL_TRIPLE' && bets['ALL_TRIPLE'] > 0) winAmounts.push(bets['ALL_TRIPLE'] * CONFIG.odds['ALL_TRIPLE']);
    }
    let totalWin = winAmounts.reduce((a,b)=>a+b,0);
    rollDice([d1,d2,d3], total, winAmounts);
    currentBalance += totalWin;
    setBalance(currentUser, currentBalance);
    // 记录历史
    let betSummary = [];
    for (let k in bets) if (bets[k] > 0) {
        if (k === 'BIG') betSummary.push(`大${bets[k]}`);
        else if (k === 'SMALL') betSummary.push(`小${bets[k]}`);
        else if (k === 'ODD') betSummary.push(`单${bets[k]}`);
        else if (k === 'EVEN') betSummary.push(`双${bets[k]}`);
        else if (typeof k === 'number') betSummary.push(`${k}点${bets[k]}`);
        else if (k.startsWith('TRIPLE_')) betSummary.push(`${k.split('_')[1]}围${bets[k]}`);
        else if (k === 'ALL_TRIPLE') betSummary.push(`豹子${bets[k]}`);
    }
    let recs = users[currentUser].records || [];
    recs.unshift({
        time: new Date().toLocaleTimeString(),
        bets: betSummary.join(' '),
        result: total,
        resultType: types.map(t=>t==='BIG'?'大':t==='SMALL'?'小':t==='ODD'?'单':t==='EVEN'?'双':t.startsWith('TRIPLE_')?t.split('_')[1]+'围':'豹子').join(','),
        win: totalWin,
        isWin: totalWin>0
    });
    if (recs.length>30) recs.pop();
    users[currentUser].records = recs;
    saveUsers();
    updateHistory();
    // 清空押注
    for (let k in bets) bets[k] = 0;
    updateUI();
    if (navigator.vibrate) navigator.vibrate(totalWin>0?[100,50,100]:80);
    setTimeout(() => {
        isDrawing = false;
        isBetLocked = false;
        startCountdown(CONFIG.countdownSeconds);
    }, 5000);
}

// 倒计时
function startCountdown(sec) {
    if (countdownInterval) clearInterval(countdownInterval);
    let c = sec;
    const cdSpan = document.getElementById('countdownNum');
    cdSpan.innerText = c;
    cdSpan.classList.remove('countdown-warning');
    isBetLocked = false;
    countdownInterval = setInterval(() => {
        if (c <= 1) {
            clearInterval(countdownInterval);
            countdownInterval = null;
            isBetLocked = true;
            draw();
        } else {
            c--;
            cdSpan.innerText = c;
            if (c <= 5) cdSpan.classList.add('countdown-warning');
        }
    }, 1000);
}

// 更新历史记录显示
function updateHistory() {
    const container = document.getElementById('historyList');
    const recs = users[currentUser]?.records || [];
    container.innerHTML = '';
    if (recs.length === 0) { container.innerHTML = '<div style="text-align:center;color:#666">暂无记录</div>'; return; }
    recs.slice(0,10).forEach(r => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<span>${r.time}</span><span>${r.bets}</span><span>开${r.result}(${r.resultType})</span><span class="${r.isWin?'win':'lose'}">${r.isWin?'+'+r.win:''}</span>`;
        container.appendChild(div);
    });
}

function refreshBalance() { currentBalance = getBalance(currentUser); updateUI(); }
function switchUser() {
    let newId = document.getElementById('switchId').value.trim();
    if (!newId) return;
    currentUser = newId;
    if (!users[currentUser]) users[currentUser] = { balance: CONFIG.defaultBalance, records: [] };
    document.getElementById('currentUserId').innerText = currentUser;
    currentBalance = getBalance(currentUser);
    for (let k in bets) bets[k] = 0;
    updateUI();
    if (countdownInterval) clearInterval(countdownInterval);
    startCountdown(CONFIG.countdownSeconds);
    updateHistory();
    document.querySelectorAll('.special-card, .point-card, .trio-card').forEach(el => el.classList.remove('selected'));
}
function showHistoryModal() {
    const recs = users[currentUser]?.records || [];
    let html = '<div style="max-height:300px;overflow-y:auto">';
    if (recs.length === 0) html += '<p>暂无记录</p>';
    else recs.forEach(r => { html += `<div style="padding:8px;border-bottom:1px solid #333;display:flex;justify-content:space-between"><span>${r.time}</span><span>${r.bets}</span><span>开${r.result}点</span><span style="color:${r.isWin?'#4caf50':'#f44336'}">${r.isWin?'+'+r.win:''}</span></div>`; });
    html += '</div><button id="closeModalBtn" style="background:#ff6600;border:none;border-radius:30px;padding:10px 24px;margin-top:16px;color:#fff">关闭</button>';
    const modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = `<div class="modal-content"><h3>📜 投注记录</h3>${html}</div>`;
    document.body.appendChild(modal);
    document.getElementById('closeModalBtn').onclick = () => modal.remove();
}

// 管理员面板
let adminPanel = null, adminSelectedUser = currentUser;
function showAdminPanel() {
    if (adminPanel) { adminPanel.remove(); adminPanel = null; return; }
    const panel = document.createElement('div'); panel.className = 'modal';
    panel.innerHTML = `<div class="modal-content" style="width:90%;max-width:360px"><h3>🔐 管理员</h3><div id="adminUserList" class="admin-user-list"></div><div>当前：<strong id="adminSelectedUser">${adminSelectedUser}</strong></div><input type="number" id="adminAmount" class="admin-input" placeholder="金额" value="0"><div class="admin-btns"><button id="adminAdd" class="admin-btn" style="background:#4caf50;color:#fff">上分</button><button id="adminSub" class="admin-btn" style="background:#f44336;color:#fff">下分</button><button id="adminQuery" class="admin-btn" style="background:#2196f3;color:#fff">查询</button><button id="adminReset" class="admin-btn" style="background:#ff9800;color:#fff">重置</button><button id="adminPwd" class="admin-btn" style="background:#9c27b0;color:#fff">改密</button></div><button id="adminClose" style="background:#ffaa44;color:#1a1a2a;padding:8px 24px;border-radius:25px;border:none;margin-top:12px">关闭</button></div>`;
    document.body.appendChild(panel); adminPanel = panel;
    function refreshList() {
        const listDiv = document.getElementById('adminUserList');
        const usersArr = Object.keys(users);
        listDiv.innerHTML = '';
        usersArr.forEach(uid => {
            const div = document.createElement('div'); div.className = 'admin-user'; if (uid === adminSelectedUser) div.classList.add('selected');
            div.textContent = `${uid} (${getBalance(uid).toFixed(2)})`;
            div.onclick = () => { adminSelectedUser = uid; document.getElementById('adminSelectedUser').innerText = adminSelectedUser; refreshList(); };
            listDiv.appendChild(div);
        });
    }
    refreshList();
    document.getElementById('adminAdd').onclick = () => { let amt = parseFloat(document.getElementById('adminAmount').value); if (isNaN(amt)||amt<=0) { alert("请输入正数"); return; } let cur = getBalance(adminSelectedUser); setBalance(adminSelectedUser, cur+amt); refreshList(); if (adminSelectedUser===currentUser) { currentBalance=getBalance(currentUser); updateUI(); } alert(`给 ${adminSelectedUser} 上分 ${amt}`); };
    document.getElementById('adminSub').onclick = () => { let amt = parseFloat(document.getElementById('adminAmount').value); if (isNaN(amt)||amt<=0) { alert("请输入正数"); return; } let cur = getBalance(adminSelectedUser); if (cur<amt) { alert("余额不足"); return; } setBalance(adminSelectedUser, cur-amt); refreshList(); if (adminSelectedUser===currentUser) { currentBalance=getBalance(currentUser); updateUI(); } alert(`从 ${adminSelectedUser} 下分 ${amt}`); };
    document.getElementById('adminQuery').onclick = () => { alert(`${adminSelectedUser} 余额: ${getBalance(adminSelectedUser).toFixed(2)}`); };
    document.getElementById('adminReset').onclick = () => { if (confirm(`重置 ${adminSelectedUser} 余额为${CONFIG.defaultBalance}？`)) { setBalance(adminSelectedUser, CONFIG.defaultBalance); refreshList(); if (adminSelectedUser===currentUser) { currentBalance=getBalance(currentUser); updateUI(); } alert("重置成功"); } };
    document.getElementById('adminPwd').onclick = () => { let old = prompt("当前密码:"); if (old !== adminPwd) { alert("密码错误"); return; } let newPwd = prompt("新密码(至少6位):"); if (!newPwd || newPwd.length<6) { alert("密码至少6位"); return; } adminPwd = newPwd; localStorage.setItem('dice_admin_pwd', newPwd); alert("密码修改成功"); };
    document.getElementById('adminClose').onclick = () => { panel.remove(); adminPanel = null; };
}

// 动态生成点数网格和围骰网格
function createPointsGrid() {
    const grid = document.getElementById('pointsGrid');
    for (let i=4;i<=17;i++) {
        const card = document.createElement('div');
        card.className = 'point-card';
        card.setAttribute('data-point', i);
        card.innerHTML = `<div class="point-value">${i}点</div><div class="point-odds">赔 ${CONFIG.odds[i]}倍</div><div class="point-bet-amount" id="bet_${i}">0</div>`;
        card.onclick = () => addBet(i);
        grid.appendChild(card);
    }
}
function createTripletsGrid() {
    const grid = document.getElementById('tripletsGrid');
    for (let i=1;i<=6;i++) {
        const card = document.createElement('div');
        card.className = 'trio-card';
        card.setAttribute('data-type', `TRIPLE_${i}`);
        card.innerHTML = `<div class="trio-name">${i}围</div><div class="trio-odds">赔 ${CONFIG.odds[`TRIPLE_${i}`]}倍</div><div class="trio-bet-amount" id="bet_TRIPLE_${i}">0</div>`;
        card.onclick = () => addBet(`TRIPLE_${i}`);
        grid.appendChild(card);
    }
}

// 初始化
function init() {
    createPointsGrid();
    createTripletsGrid();
    // 绑定筹码
    document.querySelectorAll('.chip').forEach(chip => {
        chip.onclick = () => {
            selectedChip = parseInt(chip.dataset.val);
            document.getElementById('selectedChip').innerText = selectedChip;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected-chip'));
            chip.classList.add('selected-chip');
            if (navigator.vibrate) navigator.vibrate(20);
        };
    });
    // 绑定大小单双
    document.querySelectorAll('.special-card').forEach(card => {
        card.onclick = () => addBet(card.dataset.type);
    });
    // 绑定按钮
    document.getElementById('clearAllBtn').onclick = clearAllBets;
    document.getElementById('refreshBtn').onclick = refreshBalance;
    document.getElementById('betBtn').onclick = draw;
    document.getElementById('switchBtn').onclick = switchUser;
    document.getElementById('historyBtn').onclick = showHistoryModal;
    document.getElementById('adminEntry').onclick = () => {
        let pwd = prompt("管理员密码:");
        if (pwd === adminPwd) showAdminPanel();
        else if (pwd !== null) alert("密码错误");
    };
    document.getElementById('newUserBtn').onclick = () => {
        let newId = "player_" + Math.floor(Math.random() * 100000);
        document.getElementById('switchId').value = newId;
        switchUser();
        alert(`新账户：${newId}\n初始余额：${CONFIG.defaultBalance}`);
    };
    // 初始化骰子
    diceEl.forEach(d => d.innerText = diceMap[1]);
    totalEl.innerText = 3;
    updateUI();
    updateHistory();
    startCountdown(CONFIG.countdownSeconds);
    let saved = localStorage.getItem('dice_admin_pwd');
    if (saved) adminPwd = saved;
}
init();
</script>
