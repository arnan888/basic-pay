<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>量化终端 · 暗铸转盘</title>
    <style>
        :root { --mg-border: #14281d; --panel: #232d36; --red: #c93434; --gold: #f0a04b; --bg: #071a10; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: "PingFang SC", sans-serif; }
        body { background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* 1:1 还原外框 */
        .app { width: 100%; max-width: 414px; display: flex; flex-direction: column; padding: 12px; gap: 12px; }
        .frame-outer { background: var(--panel); border-radius: 35px; padding: 10px; border: 3px solid var(--mg-border); box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        .frame-inner { background: #232d36; border-radius: 28px; padding: 20px; text-align: center; box-shadow: inset 4px 6px 15px rgba(0,0,0,0.6); background-image: linear-gradient(rgba(255,255,255,0.03) 1.5px, transparent 1.5px), linear-gradient(90deg, rgba(255,255,255,0.03) 1.5px, transparent 1.5px); background-size: 20px 20px; }

        /* 余额区 */
        .bal-val { color: #ff5252; font-size: 68px; font-weight: bold; margin: 5px 0; letter-spacing: -3px; }
        .bet-info { font-size: 14px; color: #8a969e; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* 转盘区 */
        .wheel-panel { position: relative; display: flex; justify-content: center; padding: 35px 0; }
        .pointer { position: absolute; top: 15px; z-index: 100; width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 30px solid #ff3b30; filter: drop-shadow(0 4px 6px #000); }
        .plate { width: 270px; height: 270px; border-radius: 50%; background: #2d7053; border: 12px solid #141a1f; outline: 3px solid var(--mg-border); position: relative; box-shadow: 0 15px 45px #000; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        .center-x0 { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 85px; height: 85px; background: #141a1f; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ff5252; font-weight: bold; font-size: 28px; border: 4px solid var(--mg-border); box-shadow: inset 0 0 15px #000; z-index: 10; }
        
        .item { position: absolute; width: 100%; height: 100%; text-align: center; transform-origin: 50% 50%; padding-top: 15px; }
        .item span { font-size: 32px; display: block; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); }
        .item label { display: block; font-size: 11px; color: #fff; margin-top: -3px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        /* 控制按钮 */
        .ctrl-btns { display: flex; gap: 15px; align-items: center; }
        .side-btn { width: 75px; height: 75px; background: var(--panel); border: 2px solid var(--mg-border); border-radius: 22px; color: var(--gold); font-size: 40px; box-shadow: 5px 8px 15px #000; cursor: pointer; }
        .side-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }
        .draw-btn { flex: 1; background: linear-gradient(180deg, #d33838, #8a1a1a); border: none; border-radius: 50px; height: 75px; color: white; font-size: 26px; font-weight: bold; box-shadow: 0 8px 0 #5e1111, 0 15px 25px rgba(0,0,0,0.5); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .draw-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 #5e1111; }

        /* 功能切换 */
        .opt-bar { display: flex; gap: 10px; }
        .opt-btn { flex: 1; height: 55px; background: var(--panel); border: 2px solid var(--mg-border); border-radius: 25px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }

        /* 导航栏 */
        .nav { margin-top: auto; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a2e24; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 11px; color: #8a969e; }
        .nav-active { color: #ff5252; }
        .nav-icon { width: 22px; height: 22px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app">
    <!-- 余额 -->
    <div class="frame-outer">
        <div class="frame-inner">
            <div class="bet-info"><span style="color:var(--gold)">💰</span> 可用余额 (USDT)</div>
            <div id="bal" class="bal-val">146.8</div>
            <div class="bet-info">🔥 单注额度: <span id="bet" style="color:var(--gold); font-weight:bold">5.5</span></div>
        </div>
    </div>

    <!-- 转盘 -->
    <div class="frame-outer" style="padding:5px;">
        <div class="frame-inner" style="padding:0; overflow:hidden;">
            <div class="wheel-panel">
                <div class="pointer"></div>
                <div id="plate" class="plate">
                    <div class="center-x0">X0</div>
                    <div class="item" style="transform:rotate(0deg)"><span>🦢</span><label>仙鹤</label></div>
                    <div class="item" style="transform:rotate(45deg)"><span>🐺</span><label>孤狼</label></div>
                    <div class="item" style="transform:rotate(90deg)"><span>🐯</span><label>猛虎</label></div>
                    <div class="item" style="transform:rotate(135deg)"><span>🐢</span><label>玄武</label></div>
                    <div class="item" style="transform:rotate(180deg)"><span>🦌</span><label>麒麟</label></div>
                    <div class="item" style="transform:rotate(225deg)"><span>🐲</span><label>神龙</label></div>
                    <div class="item" style="transform:rotate(270deg)"><span>🔥</span><label>凤凰</label></div>
                    <div class="item" style="transform:rotate(315deg)"><span>🦅</span><label>大鹏</label></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 按钮 -->
    <div class="ctrl-btns">
        <button class="side-btn" onclick="adj(-0.5)">−</button>
        <button id="mainBtn" class="draw-btn" onclick="run()">▶ 执行抽取</button>
        <button class="side-btn" onclick="adj(0.5)">+</button>
    </div>

    <!-- 模式 -->
    <div class="opt-bar">
        <button class="opt-btn" onclick="auto()">🤖 自动模式: <span id="autoStat">关</span></button>
        <button class="opt-btn" onclick="speed()">⚡ 变速: <span id="spText">1X</span></button>
    </div>

    <!-- 导航 -->
    <div class="nav">
        <div class="nav-item"><div class="nav-icon" style="background:#4a5a6a"></div>行情</div>
        <div class="nav-item"><div class="nav-icon" style="background:#2d7053"></div>资产中心</div>
        <div class="nav-item"><div class="nav-icon" style="background:var(--gold)"></div>历史记录</div>
        <div class="nav-item nav-active"><div class="nav-icon" style="background:var(--red)"></div>量化终端</div>
    </div>
</div>

<script>
    let b = 146.8, a = 5.5, r = 0, isA = false, sp = 1, busy = false;
    
    function adj(v) { if(busy) return; a = Math.max(0, a + v); document.getElementById('bet').innerText = a.toFixed(1); }
    function auto() { isA = !isA; document.getElementById('autoStat').innerText = isA ? '开' : '关'; if(isA && !busy) run(); }
    function speed() { sp = sp === 1 ? 2 : 1; document.getElementById('spText').innerText = sp + 'X'; }

    function run() {
        if(busy || b < a) { isA = false; document.getElementById('autoStat').innerText = '关'; return; }
        busy = true; b -= a;
        document.getElementById('bal').innerText = b.toFixed(1);
        
        const p = document.getElementById('plate');
        const prize = Math.floor(Math.random() * 8) * 45;
        r += 1800 + (360 - (r % 360)) + (360 - prize);
        
        p.style.transition = `transform ${5/sp}s cubic-bezier(0.15, 0, 0.15, 1)`;
        p.style.transform = `rotate(${r}deg)`;
        
        setTimeout(() => {
            busy = false;
            if(isA) setTimeout(run, 800);
        }, (5000 / sp) + 200);
    }
</script>
</body>
</html>
