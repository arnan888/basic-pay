<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>PB_MAIN_CONTROL_V1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#FFED00;font-family:monospace;height:100vh;overflow:hidden;
display:flex;flex-direction:column;align-items:center;justify-content:center;}

.hud{position:fixed;top:0;width:100%;height:60px;background:#111;border-bottom:3px solid #FFED00;
display:flex;justify-content:space-around;align-items:center;font-size:18px;}
.profit-tag{color:#0f0;border:1px solid #0f0;padding:2px 10px;font-size:12px;}

.bal-area{text-align:center;margin-bottom:10px;}
.bal-val{font-size:90px;font-weight:900;text-shadow:0 0 30px #f00;}

.stage{width:70vmin;height:70vmin;border:12px solid #FFED00;border-radius:50%;
position:relative;box-shadow:0 0 50px rgba(255,0,0,.5);}
.wheel{width:100%;height:100%;border-radius:50%;
transition:transform 5s cubic-bezier(.1,0,.1,1);}
.pointer{position:absolute;top:-40px;left:50%;transform:translateX(-50%);
border-top:60px solid #f00;border-left:25px solid transparent;border-right:25px solid transparent;
z-index:100;filter:drop-shadow(0 0 10px #f00);}
.slot{position:absolute;width:100px;height:50%;left:50%;margin-left:-50px;
transform-origin:50% 100%;text-align:center;padding-top:20px;font-size:22px;font-weight:bold;color:#fff;}

.ctrls{margin-top:30px;display:flex;flex-direction:column;gap:20px;align-items:center;}
.btn-spin{background:linear-gradient(180deg,#f00,#900);width:280px;padding:20px;border:none;
border-radius:50px;color:#fff;font-size:32px;font-weight:900;cursor:pointer;
box-shadow:0 10px 30px rgba(255,0,0,.5);}
.bet-row{display:flex;gap:10px;}
.btn-bet{background:#222;border:1px solid #FFED00;color:#FFED00;
padding:10px 20px;border-radius:8px;cursor:pointer;}
</style>
</head>

<body>

<div class="hud">
  <div>IN: <b id="st_in" style="color:#0f0">0.0</b></div>
  <div class="profit-tag">PROFIT 10%</div>
  <div>OUT: <b id="st_out" style="color:#f00">0.0</b></div>
</div>

<div class="bal-area">
  <div class="bal-val" id="ui_bal">100.0</div>
  <div style="color:#888;">BET: <span id="ui_bet" style="color:#0f0">0.5</span></div>
</div>

<div class="stage">
  <div class="pointer"></div>
  <div id="ui_wheel" class="wheel">
    <div class="slot" style="transform:rotate(0deg)">10X</div>
    <div class="slot" style="transform:rotate(45deg)">5X</div>
    <div class="slot" style="transform:rotate(90deg)">2X</div>
    <div class="slot" style="transform:rotate(135deg)">0X</div>
    <div class="slot" style="transform:rotate(180deg)">1.5X</div>
    <div class="slot" style="transform:rotate(225deg)">0X</div>
    <div class="slot" style="transform:rotate(270deg)">20X</div>
    <div class="slot" style="transform:rotate(315deg)">JACK</div>
  </div>
</div>

<div class="ctrls">
  <div class="bet-row">
    <button class="btn-bet" onclick="addBet(0.5)">+0.5</button>
    <button class="btn-bet" onclick="addBet(5)">+5</button>
    <button class="btn-bet" onclick="resetBet()">C</button>
  </div>
  <button class="btn-spin" onclick="runGame()">祝 贺</button>
</div>

<script>
/* ===== 音频系统 ===== */
const audio={
 idle:new Audio('audio/idle.mp3'),
 intro:new Audio('audio/spin_intro.mp3'),
 loop:new Audio('audio/spin_loop.mp3'),
 slow:new Audio('audio/spin_slow.mp3'),
 win:new Audio('audio/win_hit.mp3'),
 lose:new Audio('audio/lose_cut.mp3')
};
audio.idle.loop=true;
audio.loop.loop=true;
audio.idle.volume=.35;
audio.loop.volume=.8;

function stopAllAudio(){
 Object.values(audio).forEach(a=>{a.pause();a.currentTime=0;});
}

/* ===== 游戏变量 ===== */
let balance=100,bet=.5,totalIn=0,totalOut=0,rotation=0,busy=false;

function addBet(v){if(!busy){bet+=v;sync();}}
function resetBet(){if(!busy){bet=.5;sync();}}

function runGame(){
 if(busy||balance<bet)return;
 busy=true;

 stopAllAudio();
 audio.intro.play();
 setTimeout(()=>audio.loop.play(),1200);

 const r=Math.floor(Math.random()*1000);
 let idx=3;
 if(r<2)idx=0;else if(r<10)idx=1;else if(r<70)idx=2;
 else if(r<520)idx=3;else if(r<998)idx=4;
 else if(r<999)idx=5;else if(r<999.8)idx=6;else idx=7;

 const angle=idx*45;
 const spins=(Math.floor(Math.random()*5)+12)*360;
 rotation+=spins+(360-angle-(rotation%360))+360;
 ui_wheel.style.transform=`rotate(${rotation}deg)`;

 setTimeout(()=>{audio.loop.pause();audio.slow.play();},3800);

 setTimeout(()=>{
  audio.slow.pause();
  const multi=[10,5,2,0,1.5,0,20,50];
  const prize=multi[idx]*bet;
  prize===0?audio.lose.play():audio.win.play();
  balance=(balance-bet)+prize;
  totalIn+=bet;totalOut+=prize;
  sync();busy=false;
  setTimeout(()=>{stopAllAudio();audio.idle.play();},1800);
 },5000);
}

function sync(){
 ui_bal.innerText=balance.toFixed(1);
 ui_bet.innerText=bet.toFixed(1);
 st_in.innerText=totalIn.toFixed(1);
 st_out.innerText=totalOut.toFixed(1);
}

/* 解锁音频（浏览器限制） */
window.addEventListener('click',()=>{
 if(audio.idle.paused&&!busy)audio.idle.play().catch(()=>{});
},{once:true});
</script>
</body>
</html>
