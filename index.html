<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOLA · 旗舰管理后台</title>
    <style>
        /* 延续你作品的科技感格纹背景 */
        body { 
            background: #0b0f0d; color: #fff; font-family: sans-serif; padding: 20px; 
            background-image: linear-gradient(rgba(45, 62, 52, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(45, 62, 52, 0.2) 1px, transparent 1px);
            background-size: 25px 25px;
        }
        .admin-container { max-width: 400px; margin: 0 auto; }
        .card { background: #1a231e; border: 1px solid #2d3e34; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #f1c40f; text-align: center; font-size: 20px; margin-bottom: 25px; border-bottom: 1px solid #2d3e34; padding-bottom: 10px; }
        
        /* 输入框样式 */
        .input-box { margin-bottom: 20px; }
        label { display: block; color: #8aa095; font-size: 14px; margin-bottom: 8px; }
        input { width: 100%; padding: 15px; background: #0d120f; border: 1px solid #2d3e34; border-radius: 12px; color: #ff5a5a; font-size: 22px; font-weight: bold; box-sizing: border-box; }
        
        /* 充值按键区 - “点一下就上分” */
        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .charge-btn { 
            background: #233129; border: 1px solid #2d3e34; color: #fff; padding: 18px; 
            border-radius: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .charge-btn span { font-size: 12px; color: #8aa095; }
        .charge-btn:active { background: #2d3e34; transform: scale(0.95); border-color: #00ff88; }
        
        /* 底部确认按钮 */
        .main-action { width: 100%; margin-top: 30px; padding: 20px; background: #cc2929; color: #fff; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; box-shadow: 0 5px 0 #801a1a; cursor: pointer; }
        
        /* 操作日志回显 */
        #log { margin-top: 25px; background: #000; padding: 15px; border-radius: 12px; font-family: monospace; font-size: 12px; color: #00ff88; min-height: 80px; border: 1px solid #2d3e34; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="card">
        <h2>💎 快速上分后台</h2>
        
        <div class="input-box">
            <label>客户激活码 / User ID</label>
            <input type="text" id="targetId" placeholder="例如: 66857318">
        </div>

        <label>选择充值额度 (USDT)</label>
        <div class="grid-buttons">
            <button class="charge-btn" onclick="setVal(100)">+100 <span>普通充值</span></button>
            <button class="charge-btn" onclick="setVal(500)">+500 <span>中级上分</span></button>
            <button class="charge-btn" onclick="setVal(1000)">+1000 <span>高级上分</span></button>
            <button class="charge-btn" onclick="setVal(5000)">+5000 <span>至尊额度</span></button>
        </div>

        <div class="input-box" style="margin-top: 20px;">
            <label>当前待充金额</label>
            <input type="number" id="chargeAmount" value="0.00">
        </div>

        <button class="main-action" onclick="confirmCharge()">🚀 确认按键上分</button>
    </div>

    <div id="log">> 系统就绪，等待操作...</div>
</div>

<script>
    function setVal(val) {
        document.getElementById('chargeAmount').value = val.toFixed(2);
    }

    function confirmCharge() {
        const id = document.getElementById('targetId').value;
        const amt = document.getElementById('chargeAmount').value;
        const log = document.getElementById('log');
        
        if(!id || amt <= 0) {
            alert("请先输入客户ID和充值金额！");
            return;
        }

        // 模拟执行逻辑
        const time = new Date().toLocaleTimeString();
        log.innerHTML = `[${time}] <br>指令发送成功！<br>用户: ${id} <br>金额: +${amt} USDT <br>状态: 余额已更新 ✅`;
        
        alert(`成功！用户 ${id} 已上分 ${amt} USDT`);
    }
</script>

</body>
</html>
