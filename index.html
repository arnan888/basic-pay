<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>现代牌九</title>
<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#05070c;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;
}

/* 主桌 */
#table{
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at center,#0f1b2e 0%,#05070c 70%);
}

/* LED 边框 */
#table::before{
    content:'';
    position:absolute;
    inset:20px;
    border-radius:28px;
    border:2px solid rgba(0,200,255,.35);
    box-shadow:
        0 0 40px rgba(0,200,255,.35),
        inset 0 0 40px rgba(0,200,255,.15);
}

/* 庄位 */
#dealer{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:200px;
    height:200px;
    border-radius:50%;
    background:
        radial-gradient(circle,#1b2f4d,#0b1322);
    box-shadow:
        0 0 80px rgba(0,200,255,.6),
        inset 0 0 40px rgba(0,0,0,.9);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:92px;
    color:#7fe7ff;
    letter-spacing:8px;
}

/* 区域 */
.area{
    position:absolute;
    width:320px;
    height:160px;
    border-radius:22px;
    background:rgba(10,18,30,.65);
    border:1px solid rgba(0,200,255,.35);
    box-shadow:0 0 30px rgba(0,200,255,.25);
}

/* 区名 */
.area .name{
    position:absolute;
    left:18px;
    top:14px;
    font-size:20px;
    color:#8befff;
    letter-spacing:2px;
}

/* 牌 */
.cards{
    position:absolute;
    left:18px;
    bottom:18px;
    display:flex;
    gap:14px;
}
.card{
    width:66px;
    height:96px;
    border-radius:12px;
    background:
        linear-gradient(145deg,#ffffff,#dfe7ef);
    color:#0a0a0a;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:600;
    box-shadow:
        0 10px 20px rgba(0,0,0,.6),
        0 0 12px rgba(0,200,255,.4);
}

/* 筹码 */
.chips{
    position:absolute;
    right:16px;
    bottom:-24px;
    display:flex;
    gap:10px;
}
.chip{
    width:48px;
    height:48px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:13px;
    font-weight:600;
    box-shadow:
        0 0 20px rgba(0,200,255,.7),
        inset 0 0 8px rgba(255,255,255,.4);
}
.c10{background:#1ecad3}
.c50{background:#20d08a}
.c100{background:#3a7bff}
.c500{background:#8f3bff}

/* 控制 */
#ctrl{
    position:absolute;
    bottom:26px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:22px;
}
button{
    padding:14px 36px;
    font-size:18px;
    background:#0f1f35;
    color:#9fefff;
    border:1px solid rgba(0,200,255,.5);
    border-radius:14px;
    box-shadow:0 0 18px rgba(0,200,255,.4);
}
button:active{
    transform:scale(.96);
}
</style>
</head>
<body>

<div id="table">

    <div id="dealer">庄</div>

    <div class="area" style="left:6%;top:16%">
        <div class="name">TIAN</div>
        <div class="cards"></div>
        <div class="chips"></div>
    </div>

    <div class="area" style="right:6%;top:16%">
        <div class="name">DI</div>
        <div class="cards"></div>
        <div class="chips"></div>
    </div>

    <div class="area" style="left:6%;bottom:22%">
        <div class="name">XUAN</div>
        <div class="cards"></div>
        <div class="chips"></div>
    </div>

    <div class="area" style="right:6%;bottom:22%">
        <div class="name">HUANG</div>
        <div class="cards"></div>
        <div class="chips"></div>
    </div>

    <div id="ctrl">
        <button onclick="deal()">DEAL</button>
        <button onclick="bet()">BET</button>
        <button onclick="clearAll()">CLEAR</button>
    </div>

</div>

<script>
const tiles=["天","地","人","和","梅","长三","板凳","虎头","红十","高脚","幺六","四六"];

function deal(){
    document.querySelectorAll('.cards').forEach(c=>{
        c.innerHTML='';
        for(let i=0;i<2;i++){
            const d=document.createElement('div');
            d.className='card';
            d.textContent=tiles[Math.floor(Math.random()*tiles.length)];
            c.appendChild(d);
        }
    });
}

function bet(){
    document.querySelectorAll('.chips').forEach(c=>{
        const v=[10,50,100,500][Math.floor(Math.random()*4)];
        const d=document.createElement('div');
        d.className='chip c'+v;
        d.textContent=v;
        c.appendChild(d);
    });
}

function clearAll(){
    document.querySelectorAll('.cards,.chips').forEach(e=>e.innerHTML='');
}
</script>

</body>
</html>
