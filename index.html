<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>五兽至尊_V15000_ULTIMATE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --gold: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; height: 100vh; overflow: hidden; }

        /* 背景：Canvas 设置为不可交互，绝不挡路 */
        #bgFX { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .app-root { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 50px 0; }

        /* 截图还原：青色霓虹余额框 */
        .bal-container {
            background: rgba(0,0,0,0.9); border: 2.5px solid var(--neon);
            padding: 15px 55px; border-radius: 18px;
            box-shadow: 0 0 30px var(--neon), inset 0 0 10px var(--neon);
            display: flex; align-items: center; gap: 18px;
        }
        .bal-val { font-size: 58px; font-weight: 900; letter-spacing: -1px; text-shadow: 0 0 15px var(--neon); }

        /* 核心区：3D 悬浮转盘 */
        .stage { position: relative; width: 88vw; max-width: 380px; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; }
        
        /* 截图还原：白色发光直线指针 */
        .laser-pointer { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            width: 3px; height: 60px; background: #fff; box-shadow: 0 0 20px #fff, 0 0 40px var(--neon); z-index: 100; 
        }

        .main-wheel {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #222, #000);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative; transition: transform 7s cubic-bezier(0.1, 0, 0, 1);
        }

        .sector { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 12%; transform-origin: center; }
        .sector b { font-size: 75px; transform: rotate(90deg); filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)); }

        /* 截图还原：深红圆环 RUN 按钮 */
        .run-trigger {
            position: absolute; width: 108px; height: 108px; border-radius: 50%;
            background: #000; border: 4.5px solid var(--pink); color: var(--pink);
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: 900; cursor: pointer; z-index: 150;
            box-shadow: 0 0 40px var(--pink); transition: 0.1s;
        }
        .run-trigger:active { transform: scale(0.85); box-shadow: 0 0 10px var(--pink); }

        /* 底部控制 */
        .footer { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #msg-bar { font-size: 30px; font-weight: 900; color: var(--gold); letter-spacing: 3px; text-shadow: 0 0 20px var(--gold); height: 40px; }
        
        .bet-ctrl { display: flex; align-items: center; gap: 60px; }
        .btn-adj { font-size: 55px; color: rgba(255,255,255,0.2); width: 50px; text-align: center; cursor: pointer; }
        .btn-adj:active { color: #fff; transform: scale(1.2); }
        .num-bet { font-size: 75px; font-weight: 900; min-width: 150px; text-align: center; }

        /* 震耳欲聋：脉冲震动动画 */
        .bass-mode { animation: bass-act 0.08s infinite; }
        @keyframes bass-act { 
            0% { transform: translate(2px, 2px); filter: brightness(1.2); } 
            50% { transform: translate(-2px, -2px); filter: brightness(1); } 
            100% { transform: translate(1px, -1px); filter: brightness(1.2); } 
        }
    </style>
</head>
<body onclick="initEngine()">

    <canvas id="bgFX"></canvas>

    <div class="app-root" id="ui-layer">
        <div class="bal-container">
            <div style="font-size:35px">💎</div>
            <div class="bal-val" id="bal-ui">1,000</div>
        </div>

        <div class="stage">
            <div class="laser-pointer"></div>
            <div id="wheel" class="main-wheel">
                <div class="sector" style="transform:rotate(-90deg)"><b>👑</b></div>
                <div class="sector" style="transform:rotate(-30deg)"><b>🦁</b></div>
                <div class="sector" style="transform:rotate(30deg)"><b>🐯</b></div>
                <div class="sector" style="transform:rotate(90deg)"><b>🦅</b></div>
                <div class="sector" style="transform:rotate(150deg)"><b>🐺</b></div>
                <div class="sector" style="transform:rotate(210deg)"><b>🐕</b></div>
            </div>
            <div class="run-trigger" id="run-btn">RUN</div>
        </div>

        <div class="footer">
            <div id="msg-bar">READY</div>
            <div class="bet-ctrl">
                <div class="btn-adj" id="minus-btn">−</div>
                <div class="num-bet" id="bet-ui">1</div>
                <div class="btn-adj" id="plus-btn">+</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let bal = 1000, bet = 1, rot = 0, isSpinning = false, ctx;

        // 背景流光：飞逝感
        function initEngine() {
            if(ctx) return;
            const cvs = document.getElementById('bgFX');
            ctx = cvs.getContext('2d');
            cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            let particles = [];
            for(let i=0; i<100; i++) particles.push({x:Math.random()*cvs.width, y:Math.random()*cvs.height, v:Math.random()*5+2, l:Math.random()*30});
            
            function render() {
                ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,cvs.width, cvs.height);
                particles.forEach(p => {
                    p.y += isSpinning ? p.v * 15 : p.v;
                    if(p.y > cvs.height) p.y = -50;
                    ctx.strokeStyle = isSpinning ? '#ff0055' : '#00f2ff';
                    ctx.lineWidth = isSpinning ? 2 : 1;
                    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y + p.l); ctx.stroke();
                });
                requestAnimationFrame(render);
            }
            render();
        }

        // 绑定事件：直接在脚本内获取元素，确保优先级
        const ui = document.getElementById('ui-layer');
        const wheel = document.getElementById('wheel');
        const msg = document.getElementById('msg-bar');
        const balUI = document.getElementById('bal-ui');
        const betUI = document.getElementById('bet-ui');

        document.getElementById('plus-btn').onclick = () => {
            if(isSpinning) return;
            bet = Math.min(bal, bet + 10);
            betUI.innerText = bet;
            tg.HapticFeedback.selectionChanged();
        };

        document.getElementById('minus-btn').onclick = () => {
            if(isSpinning) return;
            bet = Math.max(1, bet - 10);
            betUI.innerText = bet;
            tg.HapticFeedback.selectionChanged();
        };

        document.getElementById('run-btn').onclick = () => {
            if(isSpinning || bal < bet) return;
            isSpinning = true; bal -= bet;
            balUI.innerText = bal.toLocaleString();
            ui.classList.add('bass-mode');
            msg.innerText = "SPEEDING...";
            tg.HapticFeedback.impactOccurred('heavy');

            let target = Math.floor(Math.random()*6);
            rot += (3600 + target*60);
            wheel.style.transform = `rotate(-${rot}deg)`;

            setTimeout(() => {
                ui.classList.remove('bass-mode');
                const payouts = [88, 15, 10, 5, 2, 0];
                let win = Math.floor(bet * payouts[target]);
                bal += win;
                balUI.innerText = bal.toLocaleString();
                msg.innerText = win > 0 ? "VICTORY: +" + win : "FAILED";
                tg.HapticFeedback.notificationOccurred(win > 0 ? 'success' : 'error');
                isSpinning = false;
            }, 7000);
        };
    </script>
</body>
</html>
