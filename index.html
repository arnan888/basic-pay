<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_BEAST_ULTRA</title>
    <style>
        :root {
            --jade: #4a7c64; --jade-l: #6b9a85; --jade-d: #2c4a3b;
            --stone: #6b737e; --inner: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            --gold: #f1c40f; --red: #ff4d4d; --blue: #3498db; --tiger: #e67e22; --tie: #9b59b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0c0c0c; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .container-outer {
            width: 100vw; height: 100vh; max-width: 480px;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%;
            animation: outerNeonRotate 15s linear infinite;
            padding: 6px;
            border-radius: 18px;
            box-shadow: 0 0 50px rgba(255,255,255,0.6);
        }
        @keyframes outerNeonRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%; height: 100%;
            background: var(--jade);
            border-radius: 15px;
            display: flex; flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .header { height: 8%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 8px 12px; }
        .box { background: var(--stone); border: 2px solid var(--jade-d); box-shadow: var(--inner); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        .box span:first-child { font-size: 12px; color: #ccc; letter-spacing: 1px; font-weight: bold; }
        .box span:last-child { font-size: 20px; font-weight: bold; color: var(--gold); text-shadow: 0 0 6px var(--gold); }

        .battle-scene { 
            height: 38%; display: flex; justify-content: center; align-items: center; 
            background: #0a0a0a; border: 3px solid var(--jade-d); 
            border-radius: 12px; margin: 4px 10px;
            position: relative; overflow: visible;
        }
        .scene-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 1;
        }
        .scene-light {
            position: absolute; width: 150px; height: 150px;
            border-radius: 50%; filter: blur(50px);
            animation: lightPulse 3s ease infinite alternate;
            z-index: 2;
        }
        .light-left { left: 30px; top: 50%; transform: translateY(-50%); background: rgba(52,152,219,0.4); }
        .light-right { right: 30px; top: 50%; transform: translateY(-50%); background: rgba(230,126,34,0.4); }
        @keyframes lightPulse {
            0% { opacity: 0.3; transform: translateY(-50%) scale(1); }
            100% { opacity: 0.8; transform: translateY(-50%) scale(1.2); }
        }

        .dragon {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            width: 100px; height: 100px;
            z-index: 10;
            animation: dragonIdle 4s ease infinite;
        }
        .dragon-icon { font-size: 70px; color: var(--blue); 
            filter: drop-shadow(0 0 10px var(--blue)) drop-shadow(0 0 20px rgba(52,152,219,0.5));
        }
        @keyframes dragonIdle {
            0% { left: 20px; transform: translateY(-50%) rotate(0deg); }
            25% { transform: translateY(-55%) rotate(5deg); }
            50% { transform: translateY(-50%) rotate(0deg); }
            75% { transform: translateY(-45%) rotate(-5deg); }
            100% { left: 20px; transform: translateY(-50%) rotate(0deg); }
        }
        /* 增强碰撞动画 */
        .dragon.attack { animation: dragonCrash 0.35s cubic-bezier(0.2, 1.2, 0.8, 1) forwards; }
        @keyframes dragonCrash {
            0% { left: 20px; transform: translateY(-50%) scale(1); filter: drop-shadow(0 0 0px #ff6600); }
            40% { left: 45%; transform: translateY(-50%) scale(1.4) rotate(15deg); filter: drop-shadow(0 0 30px #ff3300); }
            100% { left: 20px; transform: translateY(-50%) scale(1); filter: drop-shadow(0 0 0px #ff6600); }
        }
        .dragon.win { animation: dragonWin 2s ease infinite; }
        @keyframes dragonWin {
            0% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-60%) scale(1.2); }
            100% { transform: translateY(-50%) scale(1); }
        }

        .tiger {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 100px; height: 100px;
            z-index: 10;
            animation: tigerIdle 4s ease infinite;
        }
        .tiger-icon { font-size: 70px; color: var(--tiger); 
            filter: drop-shadow(0 0 10px var(--tiger)) drop-shadow(0 0 20px rgba(230,126,34,0.5));
        }
        @keyframes tigerIdle {
            0% { right: 20px; transform: translateY(-50%) rotate(0deg); }
            25% { transform: translateY(-45%) rotate(-5deg); }
            50% { transform: translateY(-50%) rotate(0deg); }
            75% { transform: translateY(-55%) rotate(5deg); }
            100% { right: 20px; transform: translateY(-50%) rotate(0deg); }
        }
        .tiger.attack { animation: tigerCrash 0.35s cubic-bezier(0.2, 1.2, 0.8, 1) forwards; }
        @keyframes tigerCrash {
            0% { right: 20px; transform: translateY(-50%) scale(1); filter: drop-shadow(0 0 0px #ff6600); }
            40% { right: 45%; transform: translateY(-50%) scale(1.4) rotate(-15deg); filter: drop-shadow(0 0 30px #ff3300); }
            100% { right: 20px; transform: translateY(-50%) scale(1); filter: drop-shadow(0 0 0px #ff6600); }
        }
        .tiger.win { animation: tigerWin 2s ease infinite; }
        @keyframes tigerWin {
            0% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-40%) scale(1.2); }
            100% { transform: translateY(-50%) scale(1); }
        }

        /* 增强冲击波 */
        .fight-effect {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,100,0,0.9), rgba(255,0,0,0.9));
            filter: blur(15px);
            opacity: 0;
            z-index: 5;
        }
        .fight-effect.flash { animation: shockBlast 0.6s ease-out forwards; }
        @keyframes shockBlast {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); width: 60px; height: 60px; }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.8); width: 150px; height: 150px; background: radial-gradient(circle, rgba(255,200,0,1), rgba(255,50,0,0.9)); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2.5); width: 200px; height: 200px; }
        }

        /* 屏幕震动 */
        @keyframes screenShake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(4px, -3px); }
            50% { transform: translate(-3px, 4px); }
            75% { transform: translate(2px, -2px); }
            100% { transform: translate(0, 0); }
        }
        .shake {
            animation: screenShake 0.2s ease-in-out 0s 2;
        }

        .win-effect {
            position: absolute; width: 150px; height: 150px;
            border-radius: 50%;
            filter: blur(30px);
            opacity: 0;
            z-index: 5;
        }
        .win-effect.show { animation: winShine 2s ease infinite; }
        @keyframes winShine {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
            100% { opacity: 0.5; transform: scale(1); }
        }
        .win-effect.dragon { background: rgba(52,152,219,0.8); left: 20px; top: 50%; transform: translateY(-50%); }
        .win-effect.tiger { background: rgba(230,126,34,0.8); right: 20px; top: 50%; transform: translateY(-50%); }
        .win-effect.tie { background: rgba(155,89,182,0.8); left: 50%; top: 50%; transform: translate(-50%, -50%); }

        .battle-result {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            font-size: 16px; font-weight: bold;
            color: #fff; text-shadow: 0 0 8px var(--gold), 0 0 15px rgba(241,196,15,0.8);
            z-index: 20;
            padding: 2px 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
        }

        .play-section {
            flex: 1; display: flex; flex-direction: column;
            background: var(--stone); box-shadow: var(--inner); border: 3px solid var(--jade-d); 
            border-radius: 12px; margin: 4px 10px 8px 10px; padding: 12px;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        /* 多选押注区域 - 新增样式 */
        .multi-bet-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            justify-content: space-between;
        }
        .multi-bet-item {
            flex: 1;
            background: rgba(0,0,0,0.45);
            border: 2px solid var(--jade-d);
            border-radius: 12px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
        }
        .multi-bet-item.selected {
            border-color: var(--gold);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 8px rgba(241,196,15,0.5);
        }
        .multi-bet-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .multi-bet-name.dragon { color: var(--blue); text-shadow: 0 0 8px var(--blue); }
        .multi-bet-name.tiger { color: var(--tiger); text-shadow: 0 0 8px var(--tiger); }
        .multi-bet-name.tie { color: var(--tie); text-shadow: 0 0 8px var(--tie); }
        .multi-bet-amount {
            font-size: 14px;
            color: var(--gold);
            font-weight: bold;
        }
        .multi-bet-control {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 6px;
        }
        .multi-bet-control button {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--gold);
            border-radius: 20px;
            width: 28px;
            height: 28px;
            color: var(--gold);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .data-stack { display: grid; grid-template-rows: repeat(3, 1fr); gap: 6px; margin: 0 6px; }
        .data-item { background: rgba(0,0,0,0.6); border: 2px solid var(--jade-d); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; }
        .data-item label { font-size: 12px; color: #ccc; font-weight: bold; }
        .data-item value { font-size: 18px; color: var(--gold); font-weight: 900; text-shadow: 0 0 6px var(--gold); }

        .stake-txt { text-align: center; color: #eee; font-size: 16px; font-weight: bold; margin: 8px 0; }
        .stake-txt span { color: var(--gold); text-shadow: 0 0 6px var(--gold); }

        .exec-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .step-btn { width: 52px; height: 52px; background: var(--jade); border: 3px solid var(--jade-d); border-radius: 10px; color: #fff; font-size: 28px; font-weight: bold; cursor: pointer; }
        .main-go { flex: 1; height: 52px; background: linear-gradient(180deg, #e53935, #b71c1c); border: none; border-radius: 30px; color: #fff; font-size: 22px; font-weight: 900; letter-spacing: 2px; cursor: pointer; box-shadow: 0 5px 0 #7f0000; }
        .main-go:active { transform: translateY(2px); box-shadow: 0 1px 0 #7f0000; }

        .mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mode-btn { height: 42px; background: rgba(0,0,0,0.4); border: 2px solid var(--jade-d); border-radius: 8px; color: #aaa; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .mode-btn.active { border-color: var(--gold); color: #fff; background: var(--jade-d); }
        .speed-btn { display: flex; gap: 8px; }
        .speed-btn span { width: 33%; height: 100%; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .speed-btn span.active { background: var(--gold); color: #000; font-weight: bold; }
</style>
</head>
<body>

<div class="container-outer">
    <div class="container">
        <div class="header">
            <div class="box"><span>余额</span><span id="balanceDisplay">857.80</span></div>
            <div class="box"><span>奖池</span><span id="poolDisplay">84291.50</span></div>
        </div>

        <div class="battle-scene">
            <div class="scene-bg"></div>
            <div class="scene-light light-left"></div>
            <div class="scene-light light-right"></div>
            <div class="win-effect dragon" id="win-dragon"></div>
            <div class="win-effect tiger" id="win-tiger"></div>
            <div class="win-effect tie" id="win-tie"></div>
            <div class="fight-effect" id="fight-effect"></div>
            <div class="dragon" id="dragon">
                <div class="dragon-icon">🐉</div>
            </div>
            <div class="tiger" id="tiger">
                <div class="tiger-icon">🐯</div>
            </div>
            <div class="battle-result" id="battle-result">龙虎相争·一触即发</div>
        </div>

        <div class="play-section">
            <!-- 多选押注区：可同时押龙/虎/和 -->
            <div class="multi-bet-row">
                <div class="multi-bet-item" id="multiDragon" data-type="DRAGON">
                    <div class="multi-bet-name dragon">🐉 龙</div>
                    <div class="multi-bet-amount" id="betDragonAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="DRAGON">-</button>
                        <button class="bet-inc" data-type="DRAGON">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" id="multiTie" data-type="TIE">
                    <div class="multi-bet-name tie">⚖️ 和</div>
                    <div class="multi-bet-amount" id="betTieAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="TIE">-</button>
                        <button class="bet-inc" data-type="TIE">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" id="multiTiger" data-type="TIGER">
                    <div class="multi-bet-name tiger">🐯 虎</div>
                    <div class="multi-bet-amount" id="betTigerAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="TIGER">-</button>
                        <button class="bet-inc" data-type="TIGER">+</button>
                    </div>
                </div>
            </div>

            <div class="data-stack">
                <div class="data-item"><label>总押注</label><value id="totalBetAmount">0.00</value></div>
                <div class="data-item"><label>预计奖金</label><value id="val-win">0.00</value></div>
                <div class="data-item"><label>已选选项</label><value id="val-pick">多选模式</value></div>
            </div>

            <div class="stake-txt">单注步长：<span id="stepValue">10</span> USDT</div>

            <div class="exec-row">
                <button class="step-btn" id="stepMinus">-</button>
                <button class="main-go" id="fightBtn">确认投注</button>
                <button class="step-btn" id="stepPlus">+</button>
            </div>

            <div class="mode-row">
                <div id="btn-auto" class="mode-btn">自动投注</div>
                <div class="mode-btn speed-btn" id="speedSelector">
                    <span id="speed-1" class="active">1X</span>
                    <span id="speed-2">2X</span>
                    <span id="speed-3">3X</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let state = {
    balance: 857.8,
    betStep: 10,
    bets: { DRAGON: 0, TIGER: 0, TIE: 0 },
    betRolling: false,
    autoMode: false,
    speed: 1,
    pool: 84291.5
};

const ODDS = { DRAGON: 2, TIGER: 2, TIE: 8 };

function updateUI() {
    document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
    document.getElementById('poolDisplay').innerText = state.pool.toFixed(2);
    document.getElementById('betDragonAmount').innerText = state.bets.DRAGON;
    document.getElementById('betTigerAmount').innerText = state.bets.TIGER;
    document.getElementById('betTieAmount').innerText = state.bets.TIE;
    const total = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
    document.getElementById('totalBetAmount').innerText = total.toFixed(2);
    
    // 计算预计奖金（按最乐观情况显示）
    let maxWin = 0;
    if(state.bets.DRAGON > 0) maxWin = Math.max(maxWin, state.bets.DRAGON * ODDS.DRAGON);
    if(state.bets.TIGER > 0) maxWin = Math.max(maxWin, state.bets.TIGER * ODDS.TIGER);
    if(state.bets.TIE > 0) maxWin = Math.max(maxWin, state.bets.TIE * ODDS.TIE);
    document.getElementById('val-win').innerText = maxWin.toFixed(2);
    
    // 高亮有押注的选项
    document.getElementById('multiDragon').classList.toggle('selected', state.bets.DRAGON > 0);
    document.getElementById('multiTiger').classList.toggle('selected', state.bets.TIGER > 0);
    document.getElementById('multiTie').classList.toggle('selected', state.bets.TIE > 0);
}

function adjustBet(type, delta) {
    if(state.betRolling) return;
    let newVal = state.bets[type] + delta;
    if(newVal < 0) newVal = 0;
    state.bets[type] = newVal;
    updateUI();
}

function adjustStep(dir) {
    let newStep = state.betStep + dir * 10;
    if(newStep < 10) newStep = 10;
    if(newStep > 500) newStep = 500;
    state.betStep = newStep;
    document.getElementById('stepValue').innerText = state.betStep;
}

function resetAnimations() {
    const dragon = document.getElementById('dragon');
    const tiger = document.getElementById('tiger');
    const fightEffect = document.getElementById('fight-effect');
    const winDragon = document.getElementById('win-dragon');
    const winTiger = document.getElementById('win-tiger');
    const winTie = document.getElementById('win-tie');
    const container = document.querySelector('.container-outer');

    dragon.classList.remove('attack', 'win');
    tiger.classList.remove('attack', 'win');
    fightEffect.classList.remove('flash');
    winDragon.classList.remove('show');
    winTiger.classList.remove('show');
    winTie.classList.remove('show');
    container.classList.remove('shake');
}

function addShake() {
    const container = document.querySelector('.container-outer');
    container.classList.add('shake');
    setTimeout(() => container.classList.remove('shake'), 300);
}

function executeBet() {
    if(state.betRolling) { alert('押注处理中，请稍后'); return; }
    
    const totalBet = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
    if(totalBet <= 0) { alert('请至少押注一个选项'); return; }
    if(state.balance < totalBet) { alert('余额不足'); return; }

    state.betRolling = true;
    state.balance -= totalBet;
    updateUI();

    resetAnimations();
    addShake();
    document.getElementById('battle-result').textContent = '💥 龙虎碰撞！💥';

    const dragon = document.getElementById('dragon');
    const tiger = document.getElementById('tiger');
    const fightEffect = document.getElementById('fight-effect');

    setTimeout(() => {
        dragon.classList.add('attack');
        tiger.classList.add('attack');
        fightEffect.classList.add('flash');
    }, 100);

    const delay = state.speed === 3 ? 1200 : state.speed === 2 ? 2000 : 2800;
    setTimeout(() => {
        const rand = Math.random();
        let winType = '';
        if(rand < 0.45) winType = 'DRAGON';
        else if(rand < 0.9) winType = 'TIGER';
        else winType = 'TIE';
        
        let resultText = '';
        let winAmount = 0;
        
        if(winType === 'DRAGON') {
            resultText = '🐉 龙威盖世·大胜而归 🐉';
            dragon.classList.add('win');
            document.getElementById('win-dragon').classList.add('show');
            if(state.bets.DRAGON > 0) winAmount = state.bets.DRAGON * ODDS.DRAGON;
        } else if(winType === 'TIGER') {
            resultText = '🐯 虎啸山林·力压群雄 🐯';
            tiger.classList.add('win');
            document.getElementById('win-tiger').classList.add('show');
            if(state.bets.TIGER > 0) winAmount = state.bets.TIGER * ODDS.TIGER;
        } else {
            resultText = '⚖️ 势均力敌·握手言和 ⚖️';
            document.getElementById('win-tie').classList.add('show');
            if(state.bets.TIE > 0) winAmount = state.bets.TIE * ODDS.TIE;
        }
        
        if(winAmount > 0) {
            state.balance += winAmount;
            resultText += ` +${winAmount.toFixed(2)}`;
            updateUI();
        }
        
        document.getElementById('battle-result').textContent = resultText;
        
        setTimeout(() => {
            if(!state.autoMode) {
                document.getElementById('battle-result').textContent = '龙虎相争·一触即发';
            }
        }, 2500);
        
        state.betRolling = false;
        
        if(state.autoMode) {
            setTimeout(() => {
                if(state.autoMode && !state.betRolling) executeBet();
            }, state.speed === 3 ? 1500 : state.speed === 2 ? 2200 : 3000);
        }
    }, delay);
}

function toggleAuto() {
    state.autoMode = !state.autoMode;
    const btn = document.getElementById('btn-auto');
    btn.classList.toggle('active');
    btn.innerText = state.autoMode ? '关闭自动' : '自动投注';
}

function setSpeed(speed) {
    state.speed = speed;
    document.querySelectorAll('.speed-btn span').forEach(s => s.classList.remove('active'));
    document.getElementById(`speed-${speed}`).classList.add('active');
}

function toggleSpeed() {
    let newSpeed = state.speed % 3 + 1;
    setSpeed(newSpeed);
}

// 绑定事件
document.getElementById('stepMinus').onclick = () => adjustStep(-1);
document.getElementById('stepPlus').onclick = () => adjustStep(1);
document.getElementById('fightBtn').onclick = executeBet;
document.getElementById('btn-auto').onclick = toggleAuto;
document.getElementById('speedSelector').onclick = toggleSpeed;

document.querySelectorAll('.bet-dec').forEach(btn => {
    btn.onclick = (e) => {
        e.stopPropagation();
        adjustBet(btn.dataset.type, -state.betStep);
    };
});
document.querySelectorAll('.bet-inc').forEach(btn => {
    btn.onclick = (e) => {
        e.stopPropagation();
        adjustBet(btn.dataset.type, state.betStep);
    };
});

updateUI();
</script>
</body>
</html>
