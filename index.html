<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Terminal</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部状态 -->
        <div class="header">
            <span class="brand">QUANTUM • TERMINAL</span>
            <span class="status"><i class="dot"></i> API ONLINE</span>
        </div>

        <!-- 余额卡片 -->
        <div class="balance-card">
            <div class="label">ESTIMATED BALANCE (USDT)</div>
            <div class="amount">1,250.45</div>
            <button class="deposit-btn">+ QUICK DEPOSIT 立即充值</button>
        </div>

        <!-- 转盘区域 -->
        <div class="wheel-section">
            <div class="pointer"></div>
            <div class="wheel-outer">
                <div class="wheel-inner" id="wheel">
                    <div class="item" style="--i:1;">💎</div>
                    <div class="item" style="--i:2;">💩</div>
                    <div class="item" style="--i:3;">🔥</div>
                    <div class="item" style="--i:4;">💰</div>
                    <div class="item" style="--i:5;">💩</div>
                    <div class="item" style="--i:6;">⚡</div>
                    <div class="item" style="--i:7;">💩</div>
                    <div class="item" style="--i:8;">💩</div>
                </div>
            </div>
        </div>

        <!-- 交易面板 -->
        <div class="trade-panel">
            <div class="panel-header">
                <span>TRANSACTION AMOUNT</span>
                <span class="total">1250.45</span>
            </div>
            <div class="grid">
                <button class="grid-btn">+10</button>
                <button class="grid-btn">+100</button>
                <button class="grid-btn">+500</button>
                <button class="grid-btn highlight">×2</button>
                <button class="grid-btn">+1k</button>
                <button class="grid-btn">1/2</button>
                <button class="grid-btn">MAX</button>
                <button class="grid-btn dim">RST</button>
            </div>
        </div>
    </div>

    <script>
        // 点击余额模拟转动
        document.querySelector('.balance-card').onclick = function() {
            const wheel = document.getElementById('wheel');
            let randomDeg = Math.floor(Math.random() * 360) + 1440; // 至少转4圈
            wheel.style.transform = `rotate(${randomDeg}deg)`;
        };
    </script>
</body>
</html>
