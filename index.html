<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>三合一老虎机大厅 | 鱼虾蟹·骰宝·红中发财</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1a1a;
            background-image: radial-gradient(circle at 20% 30%, rgba(200, 140, 70, 0.2) 2%, transparent 3%);
            background-size: 40px 40px;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            padding: 12px;
        }
        .app {
            max-width: 550px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .game-nav {
            background: linear-gradient(135deg, #1a4a1a, #0a2a0a);
            border-radius: 60px;
            padding: 6px;
            display: flex;
            gap: 8px;
            border: 1px solid #ffaa44;
            flex-wrap: wrap;
        }
        .game-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #ccaa77;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .game-tab.active {
            background: #c47c3a;
            color: #2f1b0a;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.9);
        }
        .user-section {
            background: #1f1711;
            border-radius: 40px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .user-info-row span {
            color: #ffdd99;
            font-size: 0.85rem;
            font-weight: bold;
        }
        #userBalanceDisplay {
            font-size: 1.5rem;
            font-weight: 900;
            color: #ffcc44;
            background: #0a0705;
            padding: 0 12px;
            border-radius: 50px;
            letter-spacing: 1px;
        }
        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .logout-btn, .service-btn {
            background: #734c2e;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            color: #ffe3b3;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
        }
        .service-btn { background: #2e7d32; }
        .charge-withdraw-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .charge-btn, .withdraw-btn {
            background: #c47c3a;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: #2f1b0a;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            flex: 1;
            text-align: center;
            box-shadow: 0 2px 0 #764e26;
        }
        .withdraw-btn {
            background: #734c2e;
            color: #ffe3b3;
            box-shadow: 0 2px 0 #3f2a1a;
        }
        .game-container {
            background: linear-gradient(145deg, #362a1f 0%, #251e16 100%);
            border-radius: 48px;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .auth-panel {
            background: linear-gradient(145deg, #362a1f 0%, #251e16 100%);
            border-radius: 48px;
            padding: 30px 20px;
            text-align: center;
            border: 2px solid #ffaa44;
        }
        .auth-panel h2 {
            color: #ffdd99;
            font-size: 1.6rem;
            margin-bottom: 20px;
        }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #2a241e;
            border: 1px solid #ffaa44;
            border-radius: 60px;
            color: white;
            font-size: 0.9rem;
            text-align: center;
        }
        .auth-buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }
        .auth-btn {
            flex: 1;
            background: #c47c3a;
            border: none;
            padding: 10px;
            border-radius: 60px;
            color: #2f1b0a;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .auth-note {
            color: #aa8855;
            font-size: 0.7rem;
        }
        /* 老虎机通用样式 */
        .mahjong-slot {
            background: linear-gradient(145deg, #2a241a, #1a150e);
            border-radius: 40px;
            padding: 16px;
        }
        .reels-luxury {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .card-frame {
            background: #1f1a10;
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 8px 12px black;
            border: 1px solid #DDB571;
        }
        canvas.mahjong-canvas {
            display: block;
            width: 100px;
            height: 130px;
            border-radius: 16px;
            background: #FFF9EF;
            box-shadow: inset 0 0 0 2px #F3CF8A, inset 0 0 0 5px #A56F2E;
        }
        .card-label {
            text-align: center;
            margin-top: 6px;
            font-weight: bold;
            color: #FADB85;
            font-size: 0.7rem;
        }
        .slot-controls {
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 12px;
        }
        .bet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .bet-label {
            color: #ffdd99;
            font-size: 0.8rem;
        }
        .bet-value {
            background: #1e1710;
            padding: 4px 16px;
            border-radius: 30px;
            color: #ffdf9c;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .chip-select {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 12px;
        }
        .chip-item {
            background: #E4AE4A;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            color: #2f1f07;
            box-shadow: 0 2px 0 #7a4f1a;
        }
        .chip-item.selected {
            background: #f7c56e;
            transform: scale(0.96);
        }
        .action-row {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }
        .slot-btn {
            flex: 1;
            background: #FAD77B;
            border: none;
            border-radius: 40px;
            padding: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            color: #2e1d08;
        }
        .slot-btn.sound {
            background: #577c56;
            color: #f9f2cf;
        }
        .pay-table {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 8px;
            background: #00000066;
            border-radius: 30px;
            padding: 12px;
            margin: 12px 0;
            text-align: center;
            font-size: 0.7rem;
            color: #ffdd99;
        }
        .info-area {
            background: #000000aa;
            border-radius: 30px;
            padding: 8px;
            text-align: center;
            color: #ffe2b5;
            font-size: 0.8rem;
        }
        .bet-card {
            background: #2a1f16;
            border-radius: 20px;
            padding: 6px;
            text-align: center;
            cursor: pointer;
        }
        .result-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.6);
            background: linear-gradient(145deg, #ffcc44, #ff9933);
            color: #1a1a2a;
            padding: 18px 30px;
            border-radius: 60px;
            font-size: 2rem;
            font-weight: 900;
            z-index: 2000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }
        .result-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            color: #ffcc44;
            padding: 6px 12px;
            border-radius: 40px;
            z-index: 2001;
            animation: fadeInOut 2s forwards;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-content {
            background: #1a2a1a;
            border-radius: 48px;
            padding: 20px;
            border: 2px solid #ffaa44;
            width: 85%;
            max-width: 500px;
            text-align: center;
            color: #ffdd99;
            max-height: 80vh;
            overflow-y: auto;
        }
        .qr-img {
            width: 140px;
            height: 140px;
            margin: 8px auto;
            display: block;
            background: white;
            border-radius: 20px;
            padding: 8px;
            object-fit: contain;
        }
        @media (max-width: 550px) {
            canvas.mahjong-canvas { width: 80px; height: 105px; }
            .reels-luxury { gap: 8px; }
        }
    </style>
</head>
<body>
<div class="app" id="app"></div>
<script>
    // ==================== 全局系统 ====================
    const USERS_KEY = 'triple_games_v1';
    let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
    let currentUser = null;
    let validReferralCodes = JSON.parse(localStorage.getItem('valid_referral_codes')) || ['VIP888', 'ABC123', 'GAME2024', 'TEST001'];

    let systemBankerBalance = localStorage.getItem('system_banker_balance') ? parseFloat(localStorage.getItem('system_banker_balance')) : 100000;
    function saveSystemBanker() { localStorage.setItem('system_banker_balance', systemBankerBalance); }
    function modifyBanker(delta) { systemBankerBalance += delta; if (systemBankerBalance < 0) systemBankerBalance = 0; saveSystemBanker(); }

    let adjustFactor = localStorage.getItem('adjust_factor') ? parseFloat(localStorage.getItem('adjust_factor')) : 1.0;
    function saveAdjustFactor(val) { localStorage.setItem('adjust_factor', val); adjustFactor = val; }

    function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0; }
    function setUserBalance(amt) { if (currentUser) { usersData[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }
    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast-message';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    function showRechargeModal() {
        let m = document.createElement('div');
        m.className = 'modal';
        m.innerHTML = `<div class="modal-content"><h3>💎 充值</h3><p style="margin:10px 0;"><strong style="color:#ffaa44;">1元 = 1000文</strong>，扫码支付后联系客服上分</p><div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;"><div style="text-align:center;"><img src="mmexport1776247819360.jpg" class="qr-img" alt="微信收款码" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%BE%AE%E4%BF%A1%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'"><p>📱 微信收款码</p></div><div style="text-align:center;"><img src="mmexport1776247823872.jpg" class="qr-img" alt="支付宝收款码" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E6%94%AF%E4%BB%98%E5%AE%9D%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'"><p>📱 支付宝收款码</p></div></div><p style="margin-top:10px;">📞 客服微信: <strong>game_kf_888</strong> (支付后截图联系)</p><button id="closeRecharge" style="background:#c47c3a; margin-top:15px; padding:8px 20px; border-radius:40px;">关闭</button></div>`;
        document.body.appendChild(m);
        m.querySelector('#closeRecharge').onclick = () => m.remove();
    }
    function showServiceModal() {
        let m = document.createElement('div');
        m.className = 'modal';
        m.innerHTML = `<div class="modal-content"><h3>📞 客服微信</h3><img src="29917.jpg" class="qr-img" alt="客服微信" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%AE%A2%E6%9C%8D%E5%BE%AE%E4%BF%A1%3C/text%3E%3C/svg%3E'"><p style="margin-top:10px;">微信号: game_kf_888</p><button id="closeSvc" style="background:#c47c3a; margin-top:15px; padding:8px 20px; border-radius:40px;">关闭</button></div>`;
        document.body.appendChild(m);
        m.querySelector('#closeSvc').onclick = () => m.remove();
    }
    function recharge() { showRechargeModal(); }
    function withdraw() { showToast("提现请联系客服微信: game_kf_888"); }

    // 在线人数模拟
    let onlineInterval = null;
    function startRealOnlineCount() {
        if (onlineInterval) clearInterval(onlineInterval);
        function fetchOnline() {
            const span = document.getElementById('onlineCount');
            if (!span) return;
            // 模拟在线人数 30-200
            span.innerText = Math.floor(Math.random() * 170 + 30);
        }
        fetchOnline();
        onlineInterval = setInterval(fetchOnline, 8000);
    }

    // 管理员后台（简单版）
    let adminPassword = localStorage.getItem('admin_pwd') || 'admin123';
    async function openAdminModal() {
        const pwd = prompt("请输入管理密码:");
        if (pwd !== adminPassword) { showToast("密码错误"); return; }
        let newFactor = parseFloat(prompt("全局赔付调节系数 (当前 "+adjustFactor+"):", adjustFactor));
        if (!isNaN(newFactor) && newFactor >= 0) { saveAdjustFactor(newFactor); showToast("系数已更新"); }
        else showToast("无效");
    }
    let adminClickCount = 0, adminClickTimer = null;

    // ========== 鱼虾蟹老虎机版 ==========
    let fishDestroy = null;
    function initFishGame(container) {
        if (fishDestroy) fishDestroy();
        container.innerHTML = '';

        const PATTERNS = ["鱼", "虾", "蟹", "葫芦", "金钱", "鸡"];
        const PATTERN_ICON = { "鱼":"🐟","虾":"🦐","蟹":"🦀","葫芦":"🥒","金钱":"💰","鸡":"🐔" };
        const PATTERN_COLOR = { "鱼":"#2e86c1","虾":"#e67e22","蟹":"#e74c3c","葫芦":"#27ae60","金钱":"#f1c40f","鸡":"#e84393" };

        let currentSymbols = ["鱼","虾","蟹"];
        let currentBet = 10;
        let isSpinning = false;
        let autoActive = false;
        let autoTimer = null;
        let soundEnabled = true;
        let audioCtx = null;
        let reelIntervals = [null, null, null];
        let reelSteps = [0,0,0];
        let reelCurrentStep = [0,0,0];
        let spinTargets = ["鱼","鱼","鱼"];

        let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
        let specialBets = { doubleBet:0 };
        let lastWinAmount = 0;
        let hasGrabbed = false;
        let playerBankerBalance = 0;
        const MAX_SINGLE = 500, MAX_TOTAL = 2000;
        let savedBanker = localStorage.getItem('fish_player_banker');
        if (savedBanker && parseInt(savedBanker) > 0) { hasGrabbed = true; playerBankerBalance = parseInt(savedBanker); }

        container.innerHTML = `
            <div class="mahjong-slot">
                <div class="reels-luxury">
                    <div class="card-frame"><canvas id="fishReel0" class="mahjong-canvas" width="300" height="400"></canvas><div class="card-label">天</div></div>
                    <div class="card-frame"><canvas id="fishReel1" class="mahjong-canvas" width="300" height="400"></canvas><div class="card-label">地</div></div>
                    <div class="card-frame"><canvas id="fishReel2" class="mahjong-canvas" width="300" height="400"></canvas><div class="card-label">人</div></div>
                </div>
                <div class="slot-controls">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <div><span style="color:#ffdd99;">🏦 庄家余额</span><br><span id="fishBankerDisplay" style="color:#ffaa44;">∞</span></div>
                        <div><span style="color:#ffdd99;">🎲 总押注</span><br><span id="totalBetValue">0</span></div>
                        <div><span style="color:#ffdd99;">🏆 上局净利</span><br><span id="lastWinValue">0</span></div>
                    </div>
                    <div class="bet-row"><span class="bet-label">💰 下注金额</span><div class="bet-value" id="betAmountFish">10</div></div>
                    <div class="chip-select" id="chipSelectFish">
                        <div class="chip-item" data-bet="10">10</div><div class="chip-item selected" data-bet="10">10</div>
                        <div class="chip-item" data-bet="50">50</div><div class="chip-item" data-bet="100">100</div>
                        <div class="chip-item" data-bet="200">200</div><div class="chip-item" data-bet="500">500</div>
                    </div>
                    <div id="patternGridFish" style="display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px;"></div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <span style="color:#ffdd99;">🎯 双押 (鱼+虾)</span>
                        <span id="bet_special_doubleBet" style="background:#1e1710; padding:4px 12px; border-radius:30px; color:#ffaa44;">0</span>
                    </div>
                    <div class="action-row">
                        <button id="fishSpinBtn" class="slot-btn">🎲 开牌</button>
                        <button id="fishAutoBtn" class="slot-btn">⚡ 自动</button>
                        <button id="fishSoundBtn" class="slot-btn sound">🔊 音效</button>
                    </div>
                    <div class="action-row">
                        <button id="fishClearBetBtn" class="slot-btn">清空下注</button>
                        <button id="fishGrabBtn" class="slot-btn">🎲 抢庄</button>
                        <button id="fishResetBankerBtn" class="slot-btn">重置庄家</button>
                    </div>
                </div>
                <div class="pay-table">
                    <div>🐟鱼 1次:1.5倍<br>2次:2倍<br>3次:2.5倍</div>
                    <div>🦐虾 1次:1.5倍<br>2次:2倍<br>3次:2.5倍</div>
                    <div>🦀蟹 1次:1.5倍<br>2次:2倍<br>3次:2.5倍</div>
                    <div>🥒葫芦 1次:1.5倍<br>2次:2倍<br>3次:2.5倍</div>
                    <div>💰金钱 1次:1.5倍<br>2次:2倍<br>3次:2.5倍</div>
                    <div>🐔鸡 1次:1.5倍<br>2次:2倍<br>3次:2.5倍</div>
                    <div style="grid-column:span 3;">🎯 双押(鱼+虾) 4.5倍</div>
                </div>
                <div class="info-area" id="fishInfoMsg">✨ 抢庄可坐庄，押注上限单门500总注2000 ✨</div>
            </div>
        `;
        const canvases = [document.getElementById('fishReel0'), document.getElementById('fishReel1'), document.getElementById('fishReel2')];
        const ctxs = canvases.map(c => c.getContext('2d'));
        const betAmountSpan = document.getElementById('betAmountFish');
        const spinBtn = document.getElementById('fishSpinBtn');
        const autoBtn = document.getElementById('fishAutoBtn');
        const soundBtn = document.getElementById('fishSoundBtn');
        const clearBetBtn = document.getElementById('fishClearBetBtn');
        const grabBtn = document.getElementById('fishGrabBtn');
        const resetBankerBtn = document.getElementById('fishResetBankerBtn');
        const infoDiv = document.getElementById('fishInfoMsg');
        const totalBetSpan = document.getElementById('totalBetValue');
        const lastWinSpan = document.getElementById('lastWinValue');
        const bankerSpan = document.getElementById('fishBankerDisplay');
        const doubleBetSpan = document.getElementById('bet_special_doubleBet');

        function drawPatternTile(ctx, pattern, w, h) {
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle="#FFF9EF"; ctx.fillRect(0,0,w,h);
            ctx.strokeStyle="#D4AF5A"; ctx.lineWidth=3; ctx.strokeRect(6,6,w-12,h-12);
            ctx.strokeStyle="#9B6E3C"; ctx.lineWidth=1.5; ctx.strokeRect(12,12,w-24,h-24);
            ctx.font=`bold ${Math.min(h*0.45,90)}px "Segoe UI Emoji"`;
            ctx.fillStyle=PATTERN_COLOR[pattern]||"#D6402A";
            ctx.fillText(PATTERN_ICON[pattern], w/2-40, h/2+15);
            ctx.font=`bold ${Math.min(h*0.16,30)}px "Poppins"`;
            ctx.fillStyle="#A6702E";
            ctx.fillText(pattern, w/2-30, h-22);
        }
        function updateReels() { for(let i=0;i<3;i++) drawPatternTile(ctxs[i], currentSymbols[i], canvases[i].width, canvases[i].height); }
        function getRandomPattern() { return PATTERNS[Math.floor(Math.random()*6)]; }

        function startRolling(targets) {
            return new Promise((resolve)=>{
                if(isSpinning) return resolve(false);
                isSpinning=true; spinBtn.disabled=true; autoBtn.disabled=true;
                spinTargets=[...targets];
                for(let i=0;i<3;i++){
                    if(reelIntervals[i]) clearInterval(reelIntervals[i]);
                    reelSteps[i]=35+Math.floor(Math.random()*20);
                    reelCurrentStep[i]=0;
                    let intervalDelay=40;
                    const rollFn=(idx)=>{
                        return setInterval(()=>{
                            if(reelCurrentStep[idx]>=reelSteps[idx]){
                                clearInterval(reelIntervals[idx]);
                                reelIntervals[idx]=null;
                                currentSymbols[idx]=spinTargets[idx];
                                drawPatternTile(ctxs[idx], currentSymbols[idx], canvases[idx].width, canvases[idx].height);
                                if(!reelIntervals[0] && !reelIntervals[1] && !reelIntervals[2]) { finishSettle(); resolve(true); }
                                return;
                            }
                            let stepLeft=reelSteps[idx]-reelCurrentStep[idx];
                            let tempSym;
                            if(stepLeft<=5) tempSym=spinTargets[idx];
                            else if(stepLeft<=12) tempSym=Math.random()<0.7?spinTargets[idx]:getRandomPattern();
                            else tempSym=getRandomPattern();
                            currentSymbols[idx]=tempSym;
                            drawPatternTile(ctxs[idx], currentSymbols[idx], canvases[idx].width, canvases[idx].height);
                            reelCurrentStep[idx]++;
                            if(reelIntervals[idx]){
                                let newDelay=Math.min(130,40+Math.floor(reelCurrentStep[idx]*2));
                                clearInterval(reelIntervals[idx]);
                                reelIntervals[idx]=setInterval(()=>rollFn(idx), newDelay);
                            }
                        }, intervalDelay);
                    };
                    reelIntervals[i]=setInterval(()=>rollFn(i), intervalDelay);
                }
            });
        }

        function calculateWin(symbols, bets, doubleBet) {
            let win=0;
            const map={fish:"鱼",shrimp:"虾",crab:"蟹",calabash:"葫芦",coin:"金钱",chicken:"鸡"};
            for(let [pid,val] of Object.entries(bets)){
                if(val===0) continue;
                let occur=symbols.filter(n=>n===map[pid]).length;
                if(occur>0) win+=val*(occur+0.5);
            }
            if(symbols.includes("鱼") && symbols.includes("虾") && doubleBet) win+=doubleBet*4.5;
            return win;
        }

        async function finishSettle() {
            let totalBet = getTotalBet();
            if(totalBet===0){ isSpinning=false; spinBtn.disabled=false; autoBtn.disabled=false; infoDiv.innerHTML="⚠️ 请先下注 ⚠️"; return; }
            let winAmount = calculateWin(currentSymbols, patternBets, specialBets.doubleBet) * adjustFactor;
            if(winAmount>0){
                setUserBalance(getUserBalance()+winAmount);
                infoDiv.innerHTML=`🎉 恭喜！赢得 ${winAmount.toFixed(2)} 文！ 🎉`;
                if(soundEnabled) playWinSound();
                for(let i=0;i<3;i++){ let fc=ctxs[i]; fc.save(); fc.globalAlpha=0.5; fc.fillStyle="#FFE5A0"; fc.fillRect(0,0,canvases[i].width,canvases[i].height); fc.restore(); setTimeout(()=>drawPatternTile(ctxs[i], currentSymbols[i], canvases[i].width, canvases[i].height),150); }
            } else {
                infoDiv.innerHTML=`🍂 未中奖 · 组合: ${currentSymbols.map(s=>PATTERN_ICON[s]).join(' ')} 🍂`;
                if(soundEnabled) playLoseSound();
            }
            lastWinAmount = winAmount - totalBet;
            lastWinSpan.innerText = lastWinAmount;
            if(hasGrabbed){
                let netToBanker = (totalBet - winAmount) * adjustFactor;
                playerBankerBalance += netToBanker;
                if(playerBankerBalance<0){ hasGrabbed=false; playerBankerBalance=0; localStorage.removeItem('fish_player_banker'); infoDiv.innerHTML+=" 庄家破产，权限回收"; }
                else localStorage.setItem('fish_player_banker', playerBankerBalance);
                updateBankerDisplay();
            }
            clearBets();
            updateUI();
            updateBalanceDisplay();
            isSpinning=false; spinBtn.disabled=false; autoBtn.disabled=false;
            if(autoActive && !isSpinning && getUserBalance()>=getTotalBet()){
                autoTimer=setTimeout(()=>{ if(autoActive && !isSpinning && getUserBalance()>=getTotalBet()) performSpin(); },500);
            }
            if(getUserBalance()<getTotalBet() && autoActive) stopAutoSpin();
        }

        async function performSpin() {
            if(isSpinning) return false;
            let totalBet=getTotalBet();
            if(totalBet===0){ infoDiv.innerHTML="请先下注"; return false; }
            if(getUserBalance()<totalBet){ infoDiv.innerHTML="💰 余额不足"; return false; }
            // 扣款已在押注时扣除，此处无需再扣
            const targets=[getRandomPattern(),getRandomPattern(),getRandomPattern()];
            if(soundEnabled) playSpinSound();
            await startRolling(targets);
            return true;
        }

        function getTotalBet(){ return Object.values(patternBets).reduce((a,b)=>a+b,0)+specialBets.doubleBet; }
        function updateUI(){
            for(let k in patternBets){ let el=document.getElementById(`bet_fish_${k}`); if(el) el.innerText=patternBets[k]; }
            doubleBetSpan.innerText=specialBets.doubleBet;
            totalBetSpan.innerText=getTotalBet();
            updateBankerDisplay();
        }
        function updateBankerDisplay(){ bankerSpan.innerText=hasGrabbed?playerBankerBalance.toFixed(2):"∞"; }
        function clearBets(){ for(let k in patternBets) patternBets[k]=0; specialBets.doubleBet=0; updateUI(); }
        function modifyBalance(delta){ setUserBalance(getUserBalance()+delta); updateBalanceDisplay(); }
        function updateBalanceDisplay(){ let b=document.getElementById("userBalanceDisplay"); if(b) b.innerText=getUserBalance().toFixed(2); }
        function addBetPattern(id,val){
            if(hasGrabbed){ showToast("庄家不能下注"); return; }
            let total=getTotalBet();
            if(val>MAX_SINGLE){ showToast(`单注上限${MAX_SINGLE}`); return; }
            if(total+val>MAX_TOTAL){ showToast(`总注上限${MAX_TOTAL}`); return; }
            if(val>getUserBalance()){ showToast("余额不足"); return; }
            patternBets[id]+=val;
            modifyBalance(-val);
            updateUI();
        }
        function subBetPattern(id,val){
            let cur=patternBets[id];
            if(cur<val) val=cur;
            if(val===0) return;
            patternBets[id]-=val;
            modifyBalance(val);
            updateUI();
        }
        function addDoubleBet(val){
            if(hasGrabbed){ showToast("庄家不能下注"); return; }
            let total=getTotalBet();
            if(val>MAX_SINGLE) return;
            if(total+val>MAX_TOTAL) return;
            if(val>getUserBalance()) return;
            specialBets.doubleBet+=val;
            modifyBalance(-val);
            updateUI();
        }

        // 构建六门网格
        const patternGrid=document.getElementById('patternGridFish');
        patternGrid.innerHTML='';
        const ids={fish:"鱼",shrimp:"虾",crab:"蟹",calabash:"葫芦",coin:"金钱",chicken:"鸡"};
        for(let [id,name] of Object.entries(ids)){
            let div=document.createElement('div');
            div.className='bet-card';
            div.innerHTML=`<div style="font-size:1.2rem;">${PATTERN_ICON[name]}</div><div>${name}</div><div style="display:flex; justify-content:center; gap:8px; margin-top:4px;"><button class="sub-fish" data-id="${id}" style="background:#e74c3c; border:none; border-radius:20px; padding:2px 8px;">-</button><span id="bet_fish_${id}">0</span><button class="add-fish" data-id="${id}" style="background:#2ecc71; border:none; border-radius:20px; padding:2px 8px;">+</button></div>`;
            patternGrid.appendChild(div);
        }
        patternGrid.addEventListener('click',(e)=>{
            let btn=e.target;
            let id=btn.dataset.id;
            if(!id) return;
            if(btn.classList.contains('add-fish')) addBetPattern(id,currentBet);
            if(btn.classList.contains('sub-fish')) subBetPattern(id,currentBet);
        });
        document.querySelectorAll('#chipSelectFish .chip-item').forEach(el=>{
            el.onclick=()=>{ currentBet=parseInt(el.dataset.bet); betAmountSpan.innerText=currentBet; document.querySelectorAll('#chipSelectFish .chip-item').forEach(c=>c.classList.remove('selected')); el.classList.add('selected'); };
        });
        // 添加双押按钮
        let doubleBtn=document.createElement('button');
        doubleBtn.innerText="🎯 双押"; doubleBtn.className="slot-btn"; doubleBtn.style.background="#e67e22"; doubleBtn.style.marginTop="8px";
        doubleBtn.onclick=()=>addDoubleBet(currentBet);
        document.querySelector('.slot-controls').appendChild(doubleBtn);

        clearBetBtn.onclick=clearBets;
        grabBtn.onclick=()=>{
            if(hasGrabbed){ showToast("您已经是庄家了"); return; }
            if(getUserBalance()>=2001){
                setUserBalance(getUserBalance()-2001);
                playerBankerBalance=2001;
                hasGrabbed=true;
                localStorage.setItem('fish_player_banker',playerBankerBalance);
                updateBalanceDisplay();
                updateBankerDisplay();
                showToast("抢庄成功，不可下注");
            } else showToast("余额不足2001文");
        };
        resetBankerBtn.onclick=()=>{ if(confirm("重置庄家余额为0？")){ hasGrabbed=false; playerBankerBalance=0; localStorage.removeItem('fish_player_banker'); updateBankerDisplay(); showToast("庄家已重置"); } };
        spinBtn.onclick=()=>{ if(!isSpinning && !autoActive && getTotalBet()>0 && getUserBalance()>=getTotalBet()) performSpin(); };
        autoBtn.onclick=()=>{ autoActive ? stopAutoSpin() : startAutoSpin(); };
        soundBtn.onclick=toggleSound;

        function startAutoSpin(){
            if(autoActive) return;
            if(isSpinning){ infoDiv.innerHTML="请等待本轮结束"; return; }
            if(getTotalBet()===0){ infoDiv.innerHTML="请先下注"; return; }
            if(getUserBalance()<getTotalBet()){ infoDiv.innerHTML="余额不足，无法自动"; return; }
            autoActive=true; autoBtn.innerText="⏹️ 停止"; spinBtn.disabled=true;
            performSpin();
        }
        function stopAutoSpin(){
            if(autoTimer) clearTimeout(autoTimer);
            autoActive=false; autoBtn.innerText="⚡ 自动";
            if(!isSpinning) spinBtn.disabled=false;
            infoDiv.innerHTML="⏸️ 自动旋转已结束";
        }
        function toggleSound(){
            soundEnabled=!soundEnabled;
            soundBtn.innerText=soundEnabled?"🔊 音效":"🔇 音效";
            infoDiv.innerHTML=soundEnabled?"🔊 音效已开启":"🔇 静音模式";
            if(soundEnabled && audioCtx && audioCtx.state==='suspended') audioCtx.resume();
        }
        // 音效函数
        function initAudio(){ if(!audioCtx && soundEnabled){ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); } if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }
        function playSpinSound(){ if(!soundEnabled) return; try{ initAudio(); const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type="sine"; osc.frequency.value=880; gain.gain.value=0.2; osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.2); osc.stop(audioCtx.currentTime+0.2); }catch(e){} }
        function playWinSound(){ if(!soundEnabled) return; try{ initAudio(); const now=audioCtx.currentTime; [523.25,659.25,783.99].forEach((f,i)=>{ const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type="sine"; osc.frequency.value=f; gain.gain.value=0.25; osc.start(now+i*0.12); gain.gain.exponentialRampToValueAtTime(0.0001, now+i*0.12+0.5); osc.stop(now+i*0.12+0.5); }); }catch(e){} }
        function playLoseSound(){ if(!soundEnabled) return; try{ initAudio(); const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type="triangle"; osc.frequency.value=380; gain.gain.value=0.15; osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.4); osc.stop(audioCtx.currentTime+0.4); }catch(e){} }

        updateReels(); updateUI(); updateBalanceDisplay();
        fishDestroy=()=>{ if(autoTimer) clearTimeout(autoTimer); reelIntervals.forEach(i=>clearInterval(i)); container.innerHTML=''; };
        return fishDestroy;
    }
