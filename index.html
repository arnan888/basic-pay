<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>龙虎对决 · 15秒决胜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a1f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            padding: 12px;
        }

        /* 主游戏容器 */
        .game-container {
            width: 100%;
            max-width: 500px;
            background: #2d5e48;
            border-radius: 36px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            border: 1px solid #f1c40f80;
        }

        /* 顶部余额区 */
        .top-bar {
            display: flex;
            gap: 12px;
            padding: 16px 18px;
            background: #1e3a2f;
            border-bottom: 2px solid #f1c40f60;
        }

        .info-card {
            flex: 1;
            background: #0f2c22;
            border-radius: 28px;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 2px 3px rgba(255,255,255,0.05);
            border: 1px solid #4d8068;
        }

        .info-card label {
            font-size: 12px;
            font-weight: 500;
            color: #cbd5e0;
            letter-spacing: 1px;
        }

        .info-card span {
            font-size: 20px;
            font-weight: bold;
            color: #f5b042;
            text-shadow: 0 0 5px #f39c12;
            font-family: monospace;
        }

        /* 对决视频区 - 确保画面完美展示 */
        .battle-stage {
            margin: 12px 16px;
            border-radius: 28px;
            background: #000;
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border: 2px solid #f1c40f;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        #dragonTigerVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0a1a1a;
        }

        /* 备用Canvas画面层（当视频源无效时显示动态画面） */
        .video-fallback-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.25) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.25) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 2;
        }

        .battle-title {
            position: absolute;
            top: 12px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            display: inline-block;
            width: fit-content;
            margin: 0 auto;
            padding: 4px 16px;
            border-radius: 60px;
            color: #ffdf8c;
            letter-spacing: 2px;
            z-index: 3;
            pointer-events: none;
            font-family: monospace;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            border: 1px solid #ffc10770;
        }

        .result-floating {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 6px 20px;
            border-radius: 40px;
            color: #ffe6b3;
            font-weight: bold;
            font-size: 16px;
            z-index: 3;
            font-family: monospace;
            white-space: nowrap;
            border-left: 3px solid #f1c40f;
            border-right: 3px solid #f1c40f;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* 底部操作区 */
        .control-panel {
            margin: 8px 16px 20px 16px;
            background: #1f4236;
            border-radius: 32px;
            padding: 16px 14px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.4), 0 8px 14px rgba(0,0,0,0.3);
            border: 1px solid #70b192;
        }

        /* 龙虎和三巨头 */
        .choice-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .choice-card {
            background: #1a2e27;
            border-radius: 48px;
            text-align: center;
            padding: 12px 0;
            font-size: 36px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.1s linear;
            border: 2px solid #2f6b54;
            box-shadow: 0 4px 0 #0a1914;
            color: #e0e0e0;
        }

        .choice-card.dragon { color: #4aa3ff; text-shadow: 0 0 6px #2e86de; }
        .choice-card.tiger { color: #ff8c42; text-shadow: 0 0 6px #e67e22; }
        .choice-card.tie { color: #c084fc; text-shadow: 0 0 6px #a855f7; }

        .choice-card.active {
            border: 2px solid #ffd966;
            background: #2f4e42;
            box-shadow: 0 0 0 2px #ffd96680;
            transform: scale(0.98);
            color: #fff9e0;
        }

        /* 数据条 */
        .stats-box {
            background: #0e2a20;
            border-radius: 28px;
            padding: 6px 12px;
            margin-bottom: 16px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #3d6e58;
        }
        .stat-item:last-child { border-bottom: none; }
        .stat-item label {
            font-size: 13px;
            color: #bbd4c8;
            font-weight: 500;
        }
        .stat-item span {
            font-size: 20px;
            font-weight: bold;
            color: #ffda88;
            font-family: monospace;
        }

        .bet-amount-row {
            text-align: center;
            background: #00000055;
            border-radius: 40px;
            padding: 8px;
            margin: 12px 0;
            font-size: 16px;
            color: #e9f5ef;
            font-weight: bold;
        }
        .bet-amount-row span {
            font-size: 26px;
            color: #f5c542;
            margin: 0 4px;
            font-weight: 800;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .adjust-btn {
            background: #2e4e40;
            width: 58px;
            height: 58px;
            border-radius: 30px;
            font-size: 32px;
            font-weight: bold;
            border: none;
            color: white;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 3px 0 #0b2b1f;
        }
        .adjust-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0b2b1f;
        }
        .confirm-btn {
            flex: 1;
            background: linear-gradient(145deg, #dd3b2f, #a51f14);
            border: none;
            border-radius: 60px;
            font-size: 22px;
            font-weight: bold;
            color: #fff7e8;
            letter-spacing: 4px;
            cursor: pointer;
            box-shadow: 0 5px 0 #631008;
            transition: 0.05s linear;
        }
        .confirm-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #631008;
        }

        .mode-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .mode-btn {
            background: #1e3a2f;
            border: 1px solid #5c9279;
            border-radius: 48px;
            padding: 12px 0;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            color: #efe3c9;
            cursor: pointer;
            transition: 0.1s;
        }
        .mode-btn.active {
            background: #f1c40f;
            color: #1e3a2f;
            border-color: #ffffff;
            box-shadow: 0 0 8px gold;
        }
        .speed-group {
            display: flex;
            gap: 4px;
            background: #1e3a2f;
            border-radius: 48px;
            padding: 4px;
            border: 1px solid #5c9279;
        }
        .speed-option {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: #ddddbb;
        }
        .speed-option.active {
            background: #f1c40f;
            color: #1e3a2f;
            box-shadow: inset 0 0 2px #000;
        }

        .disabled-click {
            pointer-events: none;
            opacity: 0.7;
        }
        button:disabled {
            opacity: 0.6;
            transform: none;
        }

        @media (max-width: 450px) {
            .choice-card { font-size: 30px; padding: 10px 0; }
            .stat-item span { font-size: 18px; }
            .confirm-btn { font-size: 18px; }
            .result-floating { font-size: 12px; white-space: nowrap; padding: 4px 12px; }
            .battle-title { font-size: 10px; white-space: nowrap; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- 顶部余额/奖池 -->
    <div class="top-bar">
        <div class="info-card"><label>账户余额</label><span id="balanceDisplay">857.80</span></div>
        <div class="info-card"><label>奖池累积</label><span id="jackpotDisplay">84291.50</span></div>
    </div>

    <!-- 视频对决区 - 确保画面完美展示 -->
    <div class="battle-stage">
        <video id="dragonTigerVideo" autoplay muted loop playsinline preload="auto" style="width:100%; height:100%; object-fit:cover;">
            <!-- 内置一个极小空白数据，确保video元素存在但不影响fallback -->
            <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAADtZGF0YQAAAAA=" type="video/mp4">
        </video>
        <canvas id="videoCanvas" class="video-fallback-canvas" width="800" height="450" style="display: none;"></canvas>
        <div class="grid-overlay"></div>
        <div class="battle-title">⚔️ 龙虎争霸 · 15秒决胜 ⚔️</div>
        <div class="result-floating" id="battleResultMsg">押注决胜</div>
    </div>

    <div class="control-panel">
        <!-- 投注选项 龙/和/虎 -->
        <div class="choice-row">
            <div class="choice-card dragon" data-choice="dragon">🐉 龙</div>
            <div class="choice-card tie" data-choice="tie">⚖️ 和</div>
            <div class="choice-card tiger" data-choice="tiger">🐅 虎</div>
        </div>

        <!-- 数据统计 -->
        <div class="stats-box">
            <div class="stat-item"><label>💰 当前押注</label><span id="currentBetVal">100.00</span></div>
            <div class="stat-item"><label>🏆 预计奖金</label><span id="expectedWin">100.00</span></div>
            <div class="stat-item"><label>🎯 当前选择</label><span id="selectedChoiceText">未选择</span></div>
        </div>

        <div class="bet-amount-row">
            🎲 押注金额：<span id="betAmountSpan">100</span> USDT
        </div>

        <div class="action-buttons">
            <button class="adjust-btn" id="decreaseBet">−</button>
            <button class="confirm-btn" id="confirmBetBtn">⚡ 确认投注</button>
            <button class="adjust-btn" id="increaseBet">+</button>
        </div>

        <div class="mode-bar">
            <div class="mode-btn" id="autoModeBtn">🔁 自动投注</div>
            <div class="speed-group" id="speedGroup">
                <div class="speed-option" data-speed="1">1X</div>
                <div class="speed-option active" data-speed="2">2X</div>
                <div class="speed-option" data-speed="3">3X</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 核心状态 ----------
    let balance = 857.80;
    const betOptions = [10, 50, 100, 500, 1000];
    let currentBetIndex = 2;            // 默认100
    let selectedOption = null;           // 'dragon', 'tiger', 'tie'
    let isGameInProgress = false;
    let autoBetActive = false;
    let currentSpeed = 2;               // 间隔秒数 1X=1s,2X=2s,3X=3s
    let autoTimer = null;
    let currentGameTimeout = null;
    
    // 奖池展示固定
    const totalJackpot = 84291.50;
    
    // DOM 元素
    const balanceSpan = document.getElementById('balanceDisplay');
    const currentBetSpan = document.getElementById('currentBetVal');
    const expectedWinSpan = document.getElementById('expectedWin');
    const selectedChoiceSpan = document.getElementById('selectedChoiceText');
    const betAmountSpan = document.getElementById('betAmountSpan');
    const battleMsgDiv = document.getElementById('battleResultMsg');
    const confirmBtn = document.getElementById('confirmBetBtn');
    const autoModeBtn = document.getElementById('autoModeBtn');
    const decreaseBtn = document.getElementById('decreaseBet');
    const increaseBtn = document.getElementById('increaseBet');
    const videoEl = document.getElementById('dragonTigerVideo');
    const canvasEl = document.getElementById('videoCanvas');
    
    // ========== 龙虎动态画面渲染 (保证画面完美展示) ==========
    // 由于外部mp4可能缺失，我们使用Canvas生成华丽龙虎对决动画，确保视觉上“画面展示”
    let animationFrameId = null;
    let canvasCtx = null;
    let useCanvasFallback = true;  // 优先使用canvas动态动画，效果更炫酷且确保显示
    
    function initCanvasVisual() {
        if (!canvasEl) return;
        canvasEl.style.display = 'block';
        videoEl.style.display = 'none';   // 隐藏video，用canvas展示动态龙虎画面
        canvasCtx = canvasEl.getContext('2d');
        
        // 设置canvas尺寸匹配父容器
        const resizeCanvas = () => {
            const container = canvasEl.parentElement;
            const rect = container.getBoundingClientRect();
            canvasEl.width = rect.width || 800;
            canvasEl.height = rect.height || 450;
        };
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        let frame = 0;
        let startTime = Date.now();
        
        function drawDynamicScene() {
            if (!canvasCtx) return;
            const w = canvasEl.width;
            const h = canvasEl.height;
            if (w === 0 || h === 0) {
                animationFrameId = requestAnimationFrame(drawDynamicScene);
                return;
            }
            frame++;
            const timeSec = (Date.now() - startTime) / 1000;
            const cycleTime = timeSec % 15;  // 15秒循环
            const intensity = 0.5 + 0.5 * Math.sin(cycleTime * Math.PI * 2);
            
            // 深邃背景渐变
            const grad = canvasCtx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, '#0a1f2a');
            grad.addColorStop(1, '#1f3b30');
            canvasCtx.fillStyle = grad;
            canvasCtx.fillRect(0, 0, w, h);
            
            // 华丽网格与龙纹
            canvasCtx.strokeStyle = `rgba(210, 180, 70, ${0.2 + intensity * 0.2})`;
            canvasCtx.lineWidth = 1.5;
            const stepX = w / 20;
            const stepY = h / 15;
            for(let i = 0; i <= 20; i++) {
                canvasCtx.beginPath();
                canvasCtx.moveTo(i * stepX, 0);
                canvasCtx.lineTo(i * stepX, h);
                canvasCtx.stroke();
                canvasCtx.beginPath();
                canvasCtx.moveTo(0, i * stepY);
                canvasCtx.lineTo(w, i * stepY);
                canvasCtx.stroke();
            }
            
            // 动态光效
            canvasCtx.shadowBlur = 12;
            canvasCtx.shadowColor = "#ffaa44";
            
            // 左侧青龙
            const dragonScale = 0.08 + Math.sin(frame * 0.02) * 0.02;
            canvasCtx.font = `${Math.min(80, w * 0.12)}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", system-ui`;
            canvasCtx.fillStyle = `rgba(80, 180, 255, ${0.85 + Math.sin(cycleTime * 4) * 0.15})`;
            canvasCtx.fillText("🐉", w * 0.2, h * 0.55);
            
            // 右侧猛虎
            canvasCtx.fillStyle = `rgba(255, 140, 60, ${0.85 + Math.cos(cycleTime * 4.3) * 0.15})`;
            canvasCtx.fillText("🐅", w * 0.72, h * 0.58);
            
            // 中间火焰特效
            canvasCtx.font = `${Math.min(48, w * 0.08)}px monospace`;
            canvasCtx.fillStyle = `rgba(255, 200, 80, ${0.6 + Math.sin(cycleTime * 6) * 0.3})`;
            canvasCtx.fillText("⚔️", w * 0.47, h * 0.45);
            
            // 动态粒子 (灵气)
            for(let i=0;i<18;i++) {
                const t = Date.now() * 0.003 + i;
                const x = (w * 0.2 + Math.sin(t) * w * 0.15);
                const y = (h * 0.3 + Math.cos(t * 1.3) * h * 0.2);
                canvasCtx.fillStyle = `rgba(255, 215, 100, ${0.5 + Math.sin(t)*0.3})`;
                canvasCtx.beginPath();
                canvasCtx.arc(x, y, 3 + Math.sin(t)*2, 0, Math.PI*2);
                canvasCtx.fill();
            }
            
            // 倒计时视觉
            const remain = (15 - (cycleTime % 15)).toFixed(1);
            canvasCtx.font = `bold ${Math.min(22, w*0.045)}px monospace`;
            canvasCtx.fillStyle = "#ffcc66";
            canvasCtx.shadowBlur = 4;
            canvasCtx.fillText(`⏱️ ${remain}s`, w - 80, 45);
            
            // 龙虎争霸大字标题
            canvasCtx.font = `bold ${Math.min(26, w*0.06)}px "PingFang SC"`;
            canvasCtx.fillStyle = "#f5cd6d";
            canvasCtx.fillText("龙腾虎啸 · 决胜15秒", w/2 - 130, 38);
            
            // 若对局中展示战斗氛围
            if(isGameInProgress) {
                canvasCtx.font = `bold ${Math.min(28, w*0.07)}px monospace`;
                canvasCtx.fillStyle = "#ff7777";
                canvasCtx.shadowBlur = 10;
                canvasCtx.fillText("⚡ 激战正酣 ⚡", w/2 - 90, h - 25);
            }
            
            animationFrameId = requestAnimationFrame(drawDynamicScene);
        }
        
        drawDynamicScene();
    }
    
    // 启动画面引擎 (保证画面一定展示)
    initCanvasVisual();
    
    // 确保视频完全不干扰, 静默
    videoEl.pause();
    videoEl.style.display = 'none';
    
    // ---------- 游戏逻辑 ----------
    function updateUI() {
        balanceSpan.textContent = balance.toFixed(2);
        const currentBetAmount = betOptions[currentBetIndex];
        currentBetSpan.textContent = currentBetAmount.toFixed(2);
        betAmountSpan.textContent = currentBetAmount;
        
        let winMulti = (selectedOption === 'tie') ? 8 : 1;
        let expected = currentBetAmount * winMulti;
        expectedWinSpan.textContent = expected.toFixed(2);
        
        if(selectedOption === 'dragon') selectedChoiceSpan.textContent = '🐉 龙';
        else if(selectedOption === 'tiger') selectedChoiceSpan.textContent = '🐅 虎';
        else if(selectedOption === 'tie') selectedChoiceSpan.textContent = '⚖️ 和';
        else selectedChoiceSpan.textContent = '未选择';
    }
    
    function setSelected(choice) {
        if(isGameInProgress) {
            battleMsgDiv.textContent = '⛔ 对局中，请稍后再选';
            return;
        }
        selectedOption = choice;
        document.querySelectorAll('.choice-card').forEach(card => card.classList.remove('active'));
        if(choice === 'dragon') document.querySelector('.choice-card.dragon').classList.add('active');
        if(choice === 'tiger') document.querySelector('.choice-card.tiger').classList.add('active');
        if(choice === 'tie') document.querySelector('.choice-card.tie').classList.add('active');
        updateUI();
    }
    
    function changeBet(delta) {
        if(isGameInProgress) {
            battleMsgDiv.textContent = '战斗中无法调整押注';
            return;
        }
        let newIndex = currentBetIndex + delta;
        if(newIndex >= 0 && newIndex < betOptions.length) {
            currentBetIndex = newIndex;
            updateUI();
        }
    }
    
    function getGameResult() {
        const rand = Math.random();
        if(rand < 0.45) return 'dragon';
        else if(rand < 0.9) return 'tiger';
        else return 'tie';
    }
    
    function executeBattle() {
        if(isGameInProgress) return;
        if(!selectedOption) {
            battleMsgDiv.textContent = '⚠️ 请先选择龙/虎/和';
            return;
        }
        const betAmount = betOptions[currentBetIndex];
        if(balance < betAmount) {
            battleMsgDiv.textContent = '❌ 余额不足，无法投注';
            return;
        }
        
        // 扣除投注额
        balance -= betAmount;
        updateUI();
        isGameInProgress = true;
        document.querySelector('.control-panel').classList.add('disabled-click');
        confirmBtn.disabled = true;
        battleMsgDiv.textContent = '⚔️ 龙争虎斗 · 风云变色 ⚔️';
        
        // 15秒后出结果
        if(currentGameTimeout) clearTimeout(currentGameTimeout);
        currentGameTimeout = setTimeout(() => {
            const result = getGameResult();
            let resultText = '';
            let winAmount = 0;
            let isWin = (result === selectedOption);
            
            if(result === 'dragon') resultText = '🐉 青龙降世，龙威大胜！';
            else if(result === 'tiger') resultText = '🐅 猛虎出山，虎啸震天！';
            else resultText = '⚖️ 势均力敌 · 和局收场 ⚖️';
            
            if(isWin) {
                const multiplier = (selectedOption === 'tie') ? 8 : 1;
                winAmount = betAmount * multiplier;
                balance += winAmount;
                resultText = `✨ 命中！ ${resultText} 获得 ${winAmount.toFixed(2)} USDT ✨`;
            } else {
                resultText = `💔 惜败！ ${resultText} 再接再厉 💔`;
            }
            
            battleMsgDiv.textContent = resultText;
            updateUI();
            isGameInProgress = false;
            confirmBtn.disabled = false;
            document.querySelector('.control-panel').classList.remove('disabled-click');
            
            // 自动投注逻辑
            if(autoBetActive && !isGameInProgress) {
                if(autoTimer) clearTimeout(autoTimer);
                autoTimer = setTimeout(() => {
                    if(autoBetActive && !isGameInProgress && selectedOption && balance >= betOptions[currentBetIndex]) {
                        executeBattle();
                    } else if(autoBetActive && (balance < betOptions[currentBetIndex] || !selectedOption)) {
                        battleMsgDiv.textContent = '⚠️ 自动停用: 余额不足/未选选项';
                        toggleAutoMode(false);
                    }
                }, currentSpeed * 1000);
            }
            currentGameTimeout = null;
        }, 15000);
    }
    
    function toggleAutoMode(forceState = null) {
        if(isGameInProgress) {
            battleMsgDiv.textContent = '请等待对局结束再切换自动模式';
            return;
        }
        if(forceState !== null) autoBetActive = forceState;
        else autoBetActive = !autoBetActive;
        
        if(autoBetActive) {
            autoModeBtn.textContent = '⏸️ 关闭自动';
            autoModeBtn.classList.add('active');
            battleMsgDiv.textContent = '🔁 自动投注已开启';
            if(!isGameInProgress && selectedOption && balance >= betOptions[currentBetIndex]) {
                if(autoTimer) clearTimeout(autoTimer);
                autoTimer = setTimeout(() => executeBattle(), 200);
            } else if(!selectedOption || balance < betOptions[currentBetIndex]) {
                battleMsgDiv.textContent = '⚠️ 自动开启失败: 未选择或余额不足';
                autoBetActive = false;
                autoModeBtn.textContent = '🔁 自动投注';
                autoModeBtn.classList.remove('active');
            }
        } else {
            if(autoTimer) clearTimeout(autoTimer);
            autoModeBtn.textContent = '🔁 自动投注';
            autoModeBtn.classList.remove('active');
            battleMsgDiv.textContent = '自动模式已关闭';
        }
    }
    
    function setSpeed(level) {
        if(level >=1 && level <=3) {
            currentSpeed = level;
            document.querySelectorAll('.speed-option').forEach(opt => opt.classList.remove('active'));
            document.querySelector(`.speed-option[data-speed="${level}"]`).classList.add('active');
            battleMsgDiv.textContent = `投注间隔设为 ${level}X (${level}秒)`;
        }
    }
    
    // 事件绑定
    document.querySelectorAll('.choice-card').forEach(card => {
        card.addEventListener('click', (e) => {
            const choice = card.getAttribute('data-choice');
            if(choice) setSelected(choice);
        });
    });
    
    decreaseBtn.addEventListener('click', () => changeBet(-1));
    increaseBtn.addEventListener('click', () => changeBet(1));
    confirmBtn.addEventListener('click', () => {
        if(autoBetActive) toggleAutoMode(false);
        executeBattle();
    });
    autoModeBtn.addEventListener('click', () => toggleAutoMode());
    document.querySelectorAll('.speed-option').forEach(opt => {
        opt.addEventListener('click', (e) => {
            const speedVal = parseInt(opt.getAttribute('data-speed'));
            if(speedVal) setSpeed(speedVal);
            e.stopPropagation();
        });
    });
    
    document.getElementById('jackpotDisplay').textContent = totalJackpot.toFixed(2);
    updateUI();
    
    // 清理定时器
    window.addEventListener('beforeunload', ()=>{
        if(currentGameTimeout) clearTimeout(currentGameTimeout);
        if(autoTimer) clearTimeout(autoTimer);
        if(animationFrameId) cancelAnimationFrame(animationFrameId);
    });
</script>
</body>
</html>
