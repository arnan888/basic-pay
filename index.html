<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>霓虹狂潮老虎机</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: {
                            pink: '#FF2EC4',
                            blue: '#00F0FF',
                            purple: '#9D00FF',
                            yellow: '#FFEE00'
                        },
                        dark: '#0A0A12'
                    },
                    fontFamily: {
                        arcade: ['"Press Start 2P"', 'cursive']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow-neon {
                text-shadow: 0 0 5px currentColor, 0 0 20px currentColor;
            }
            .glow {
                box-shadow: 0 0 10px currentColor, 0 0 30px currentColor/70%;
            }
            .reel-animation {
                animation: reelSpin 0.1s linear infinite;
            }
            @keyframes reelSpin {
                0% { transform: translateY(0); }
                100% { transform: translateY(-100%); }
            }
            .symbol-pop {
                animation: pop 0.5s ease-out;
            }
            @keyframes pop {
                0% { transform: scale(1); }
                50% { transform: scale(1.2); }
                100% { transform: scale(1); }
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="bg-dark min-h-screen flex flex-col items-center justify-center text-white p-4">
    <!-- 顶部信息栏 -->
    <div class="w-full max-w-2xl flex justify-between items-center mb-6">
        <div class="text-neon-blue text-shadow-neon text-xl">
            余额: <span id="balance" class="font-bold">500</span>
        </div>
        <div class="text-neon-pink text-shadow-neon text-xl">
            免费旋转: <span id="freeSpins" class="font-bold">0</span>
        </div>
    </div>

    <!-- 老虎机主体 -->
    <div class="bg-gradient-to-b from-gray-900 to-gray-800 rounded-xl p-6 border-2 border-neon-purple glow w-full max-w-2xl">
        <!-- 标题 -->
        <h1 class="text-center text-neon-blue text-shadow-neon text-2xl mb-6 font-arcade tracking-wider">
            霓虹狂潮
        </h1>

        <!-- 卷轴区域 -->
        <div class="grid grid-cols-5 gap-2 mb-8 bg-gray-900 p-4 rounded-lg border border-neon-blue">
            <div class="reel relative overflow-hidden h-24 bg-gray-800 rounded-md border border-neon-blue" id="reel1">
                <div class="symbol-container h-full">
                    <div class="symbol h-full flex items-center justify-center text-4xl">💎</div>
                </div>
            </div>
            <div class="reel relative overflow-hidden h-24 bg-gray-800 rounded-md border border-neon-blue" id="reel2">
                <div class="symbol-container h-full">
                    <div class="symbol h-full flex items-center justify-center text-4xl">⚡</div>
                </div>
            </div>
            <div class="reel relative overflow-hidden h-24 bg-gray-800 rounded-md border border-neon-blue" id="reel3">
                <div class="symbol-container h-full">
                    <div class="symbol h-full flex items-center justify-center text-4xl">✨</div>
                </div>
            </div>
            <div class="reel relative overflow-hidden h-24 bg-gray-800 rounded-md border border-neon-blue" id="reel4">
                <div class="symbol-container h-full">
                    <div class="symbol h-full flex items-center justify-center text-4xl">🎰</div>
                </div>
            </div>
            <div class="reel relative overflow-hidden h-24 bg-gray-800 rounded-md border border-neon-blue" id="reel5">
                <div class="symbol-container h-full">
                    <div class="symbol h-full flex items-center justify-center text-4xl">💎</div>
                </div>
            </div>
        </div>

        <!-- 控制区域 -->
        <div class="flex flex-wrap justify-between items-center gap-4">
            <div class="flex flex-col gap-2">
                <div class="flex items-center gap-2">
                    <button id="betMinus" class="w-10 h-10 rounded-full bg-gray-700 hover:bg-neon-purple transition-all flex items-center justify-center">
                        <i class="fa fa-minus"></i>
                    </button>
                    <div class="w-20 text-center text-neon-yellow font-bold text-xl" id="betAmount">10</div>
                    <button id="betPlus" class="w-10 h-10 rounded-full bg-gray-700 hover:bg-neon-purple transition-all flex items-center justify-center">
                        <i class="fa fa-plus"></i>
                    </button>
                </div>
                <div class="text-sm text-gray-400 text-center">下注金额</div>
            </div>

            <button id="spinBtn" class="py-4 px-10 bg-gradient-to-r from-neon-pink to-neon-purple rounded-full text-xl font-bold glow hover:scale-105 transition-all">
                <span id="spinText">开始转动</span>
            </button>

            <div class="flex flex-col items-center">
                <div class="w-20 h-20 rounded-full bg-neon-blue/20 border border-neon-blue flex items-center justify-center">
                    <div id="winAmount" class="text-neon-yellow font-bold text-xl">0</div>
                </div>
                <div class="text-sm text-gray-400 mt-1">当前赢取</div>
            </div>
        </div>

        <!-- 支付说明 -->
        <div class="mt-6 text-sm text-gray-400 grid grid-cols-2 gap-2">
            <div>💎💎💎💎💎 = 500倍 | ⚡⚡⚡⚡⚡ = 300倍</div>
            <div>✨×3 = 免费旋转 | 🎰 = 百搭符号</div>
        </div>
    </div>

    <!-- 提示弹窗 -->
    <div id="popup" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-dark/95 border-2 border-neon-yellow rounded-xl p-8 z-50 hidden">
        <div id="popupText" class="text-center text-xl mb-4 text-neon-yellow"></div>
        <button id="closePopup" class="block mx-auto py-2 px-6 bg-neon-yellow text-dark font-bold rounded-md hover:scale-105 transition-all">
            确定
        </button>
    </div>

    <script>
        // 符号配置 - 现在流行的5卷轴设计，加入百搭、分散符号
        const SYMBOL_CONFIG = {
            "💎": { weight: 0.1, payout: {5:500, 4:100, 3:20} },
            "⚡": { weight: 0.12, payout: {5:300, 4:80, 3:15} },
            "✨": { weight: 0.08, payout: {5:150, 4:50, 3:10}, isScatter: true },
            "🎰": { weight: 0.05, isWild: true },
            "💜": { weight: 0.15, payout: {5:80, 4:20, 3:5} },
            "💙": { weight: 0.18, payout: {5:50, 4:15, 3:3} },
            "❤️": { weight: 0.22, payout: {5:30, 4:10, 3:2} }
        };
        const SYMBOLS = Object.keys(SYMBOL_CONFIG);
        const PAYLINES = [
            [0,1,2,3,4], // 中间线
            [0,0,0,0,0], // 顶线
            [4,4,4,4,4], // 底线
            [0,1,1,1,4], // 斜线1
            [4,1,1,1,0]  // 斜线2
        ];

        // 状态管理
        let state = {
            balance: 500,
            bet: 10,
            freeSpins: 0,
            isSpinning: false,
            currentWin: 0
        };

        // DOM元素
        const elements = {
            balance: document.getElementById('balance'),
            freeSpins: document.getElementById('freeSpins'),
            betAmount: document.getElementById('betAmount'),
            winAmount: document.getElementById('winAmount'),
            spinBtn: document.getElementById('spinBtn'),
            spinText: document.getElementById('spinText'),
            reels: [
                document.getElementById('reel1'),
                document.getElementById('reel2'),
                document.getElementById('reel3'),
                document.getElementById('reel4'),
                document.getElementById('reel5')
            ],
            popup: document.getElementById('popup'),
            popupText: document.getElementById('popupText'),
            closePopup: document.getElementById('closePopup'),
            betMinus: document.getElementById('betMinus'),
            betPlus: document.getElementById('betPlus')
        };

        // 更新UI显示
        function updateUI() {
            elements.balance.textContent = state.balance;
            elements.freeSpins.textContent = state.freeSpins;
            elements.betAmount.textContent = state.bet;
            elements.winAmount.textContent = state.currentWin;
            elements.spinText.textContent = state.freeSpins > 0 ? `免费旋转(${state.freeSpins})` : '开始转动';
        }

        // 获取带权重的随机符号
        function getRandomSymbol() {
            let totalWeight = 0;
            SYMBOLS.forEach(sym => totalWeight += SYMBOL_CONFIG[sym].weight);
            
            let random = Math.random() * totalWeight;
            let current = 0;
            
            for(let sym of SYMBOLS) {
                current += SYMBOL_CONFIG[sym].weight;
                if(random <= current) return sym;
            }
            return SYMBOLS[0];
        }

        // 卷轴动画
        async function animateReels(results) {
            elements.spinBtn.disabled = true;
            state.isSpinning = true;
            state.currentWin = 0;
            updateUI();

            // 给每个卷轴添加动画并逐步停止
            const reelPromises = [];
            elements.reels.forEach((reel, idx) => {
                const container = reel.querySelector('.symbol-container');
                reel.classList.add('reel-animation');
                
                // 延迟停止
                const delay = idx * 300 + 500;
                reelPromises.push(new Promise(resolve => {
                    setTimeout(() => {
                        reel.classList.remove('reel-animation');
                        container.innerHTML = `<div class="symbol h-full flex items-center justify-center text-4xl">${results[idx]}</div>`;
                        resolve();
                    }, delay);
                }));
            });

            await Promise.all(reelPromises);
            await calculateWins(results);
            
            // 中奖符号高亮
            if(state.currentWin > 0) {
                highlightWinningSymbols(results);
                await new Promise(resolve => setTimeout(resolve, 1500));
            }

            state.isSpinning = false;
            elements.spinBtn.disabled = false;
            updateUI();
        }

        // 计算奖励（现在流行的多支付线+特殊符号规则）
        async function calculateWins(results) {
            let totalWin = 0;
            let scatterCount = 0;

            // 统计分散符号数量
            results.forEach(sym => {
                if(SYMBOL_CONFIG[sym]?.isScatter) scatterCount++;
            });

            // 处理免费旋转
            if(scatterCount >= 3 && state.freeSpins === 0) {
                state.freeSpins = 10 + (scatterCount - 3) * 2; // 基础10次，每多一个加2次
                showPopup(`触发免费旋转！获得${state.freeSpins}次机会！`);
                await new Promise(resolve => setTimeout(resolve, 2000));
            }

            // 处理支付线奖励
            PAYLINES.forEach(line => {
                const lineSymbols = line.map(pos => results[pos]);
                let matchCount = 1;
                let baseSymbol = null;

                // 确定基础符号（跳过百搭）
                for(let sym of lineSymbols) {
                    if(!SYMBOL_CONFIG[sym]?.isWild) {
                        baseSymbol = sym;
                        break;
                    }
                }
                if(!baseSymbol) baseSymbol = lineSymbols[0]; // 全是百搭的情况

                // 统计匹配数量（百搭可替代）
                for(let i=1; i<lineSymbols.length; i++) {
                    const sym = lineSymbols[i];
                    if(sym === baseSymbol || SYMBOL_CONFIG[sym]?.isWild) {
                        matchCount++;
                    } else {
                        break;
                    }
                }

                // 计算奖励
                if(matchCount >= 3 && SYMBOL_CONFIG[baseSymbol]?.payout) {
                    const payoutMultiplier = SYMBOL_CONFIG[baseSymbol].payout[matchCount] || 0;
                    totalWin += payoutMultiplier * state.bet;
                }
            });

            // 更新余额
            if(totalWin > 0) {
                state.balance += totalWin;
                state.currentWin = totalWin;
                showPopup(`恭喜赢取${totalWin}金币！`);
                await new Promise(resolve => setTimeout(resolve, 1500));
            }

            // 消耗免费旋转
            if(state.freeSpins > 0) {
                state.freeSpins--;
                if(state.freeSpins === 0) {
                    showPopup("免费旋转结束！");
                    await new Promise(resolve => setTimeout(resolve, 1500));
                }
            } else {
                state.balance -= state.bet;
            }
        }

        // 高亮中奖符号
        function highlightWinningSymbols(results) {
            PAYLINES.forEach(line => {
                const lineSymbols = line.map(pos => results[pos]);
                let matchCount = 1;
                let baseSymbol = null;

                for(let sym of lineSymbols) {
                    if(!SYMBOL_CONFIG[sym]?.isWild) {
                        baseSymbol = sym;
                        break;
                    }
                }
                if(!baseSymbol) baseSymbol = lineSymbols[0];

                for(let i=1; i<lineSymbols.length; i++) {
                    const sym = lineSymbols[i];
                    if(sym === baseSymbol || SYMBOL_CONFIG[sym]?.isWild) {
                        matchCount++;
                    } else {
                        break;
                    }
                }

                if(matchCount >= 3) {
                    line.forEach(pos => {
                        const symbolEl = elements.reels[pos].querySelector('.symbol');
                        symbolEl.classList.add('symbol-pop');
                        symbolEl.style.color = '#FFEE00';
                        symbolEl.style.textShadow = '0 0 5px #FFEE00, 0 0 20px #FFEE00';
                    });
                }
            });
        }

        // 显示弹窗
        function showPopup(text) {
            elements.popupText.textContent = text;
            elements.popup.classList.remove('hidden');
        }

        // 关闭弹窗
        elements.closePopup.addEventListener('click', () => {
            elements.popup.classList.add('hidden');
        });

        // 下注调整
        elements.betMinus.addEventListener('click', () => {
            if(state.bet > 1 && !state.isSpinning) {
                state.bet--;
                updateUI();
            }
        });

        elements.betPlus.addEventListener('click', () => {
            if(state.bet < state.balance && !state.isSpinning) {
                state.bet++;
                updateUI();
            }
        });

        // 转动按钮
        elements.spinBtn.addEventListener('click', () => {
            if(state.isSpinning) return;
            if(state.freeSpins === 0 && state.balance < state.bet) {
                showPopup("余额不足！");
                return;
            }

            // 生成结果
            const results = Array(5).fill().map(() => getRandomSymbol());
            animateReels(results);
        });

        // 初始化
        updateUI();
    </script>
</body>
</html>
