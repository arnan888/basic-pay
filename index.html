        countdownInterval: null,
        isDrawing: false
    };
    let isBetLocked = false;
    
    let diceElements = [];
    let isRolling = false;
    
    // 创建单个3D骰子
    function createDiceElement(value = 1) {
        const container = document.createElement('div');
        container.className = 'dice-container';
        
        const dice = document.createElement('div');
        dice.className = 'dice-3d';
        
        // 6个面的HTML
        const faces = [1, 2, 3, 4, 5, 6];
        const positions = ['front', 'back', 'right', 'left', 'top', 'bottom'];
        const rotations = ['0deg', '180deg', '90deg', '-90deg', '90deg', '-90deg'];
        const axes = ['', 'Y', 'Y', 'Y', 'X', 'X'];
        
        faces.forEach((faceNum, idx) => {
            const face = document.createElement('div');
            face.className = `dice-face face-${faceNum}`;
            
            // 添加点数圆点
            if (faceNum === 1) {
                const pip = document.createElement('div');
                pip.className = 'pip pip-center';
                face.appendChild(pip);
            } else if (faceNum === 2) {
                face.innerHTML = '<div class="pip pip-tl"></div><div class="pip pip-br"></div>';
            } else if (faceNum === 3) {
                face.innerHTML = '<div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div>';
            } else if (faceNum === 4) {
                face.innerHTML = '<div class="pip pip-tl2"></div><div class="pip pip-tr2"></div><div class="pip pip-bl2"></div><div class="pip pip-br2"></div>';
            } else if (faceNum === 5) {
                face.innerHTML = '<div class="pip pip-tl2"></div><div class="pip pip-tr2"></div><div class="pip pip-mid"></div><div class="pip pip-bl2"></div><div class="pip pip-br2"></div>';
            } else if (faceNum === 6) {
                face.innerHTML = '<div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div>';
            }
            
            if (axes[idx] === 'X') {
                face.style.transform = `rotateX(${rotations[idx]}) translateZ(45px)`;
            } else {
                face.style.transform = `rotateY(${rotations[idx]}) translateZ(45px)`;
            }
            dice.appendChild(face);
        });
        
        container.appendChild(dice);
        return { container, dice };
    }
    
    // 初始化骰子
    function initDice() {
        const container = document.getElementById('diceContainer');
        container.innerHTML = '';
        diceElements = [];
        
        for (let i = 0; i < 3; i++) {
            const { container: diceContainer, dice } = createDiceElement(1);
            container.appendChild(diceContainer);
            diceElements.push({ container: diceContainer, dice: dice, value: 1 });
        }
    }
    
    // 设置骰子显示的值（通过旋转骰子让对应面朝上）
    function setDiceValue(diceObj, value) {
        // 骰子各面朝上的旋转角度
        const rotations = {
            1: 'rotateX(0deg) rotateY(0deg)',
            2: 'rotateX(-90deg) rotateY(0deg)',
            3: 'rotateX(0deg) rotateY(90deg)',
            4: 'rotateX(0deg) rotateY(-90deg)',
            5: 'rotateX(90deg) rotateY(0deg)',
            6: 'rotateX(180deg) rotateY(0deg)'
        };
        diceObj.dice.style.transform = rotations[value];
        diceObj.value = value;
    }
    
    // 摇骰子动画
    let rollInterval = null;
    function startRolling(finalValues, finalTotal, winAmount) {
        const totalEl = document.getElementById('totalPoints');
        
        if (rollInterval) clearInterval(rollInterval);
        
        // 添加摇晃动画
        diceElements.forEach(d => {
            d.dice.classList.add('dice-shaking');
        });
        totalEl.classList.add('rolling-animation');
        
        let step = 0;
        const steps = 25;
        
        rollInterval = setInterval(() => {
            step++;
            // 随机显示
            diceElements.forEach(d => {
                const randomVal = Math.floor(Math.random() * 6) + 1;
                setDiceValue(d, randomVal);
            });
            const currentTotal = diceElements.reduce((sum, d) => sum + d.value, 0);
            totalEl.innerText = currentTotal;
            
            if (step >= steps) {
                clearInterval(rollInterval);
                rollInterval = null;
                
                // 停止摇晃
                diceElements.forEach(d => {
                    d.dice.classList.remove('dice-shaking');
                });
                totalEl.classList.remove('rolling-animation');
                
                // 显示最终结果
                diceElements.forEach((d, idx) => {
                    setDiceValue(d, finalValues[idx]);
                });
                totalEl.innerText = finalTotal;
                
               // 落地动画
                diceElements.forEach(d => {
                    d.dice.classList.add('dice-landing');
                    setTimeout(() => d.dice.classList.remove('dice-landing'), 300);
                });
                
                if (winAmount > 0) {
                    totalEl.style.color = '#4caf50';
                    totalEl.style.textShadow = '0 0 20px #4caf50';
                    setTimeout(() => {
                        totalEl.style.color = '#ffcc44';
                        totalEl.style.textShadow = '0 0 15px #ff6600';
                    }, 2000);
                } else {
                    totalEl.style.color = '#f44336';
                    setTimeout(() => {
                        totalEl.style.color = '#ffcc44';
                    }, 2000);
                }
            }
        }, 60);
    }
    
    // 开奖
    function executeDraw() {
        if (state.isDrawing) return;
        state.isDrawing = true;
        isBetLocked = true;
        
        const d1 = Math.floor(Math.random() * 6) + 1;
        const d2 = Math.floor(Math.random() * 6) + 1;
        const d3 = Math.floor(Math.random() * 6) + 1;
        const total = d1 + d2 + d3;
        
        let win = 0;
        let isWin = false;
        if (state.selectedPoint !== null && state.selectedPoint === total) {
            const odds = oddsMap[total];
            win = state.betAmount * odds;
            isWin = true;
        }
        
        startRolling([d1, d2, d3], total, win);
        
        const newBalance = state.balance - state.betAmount + win;
        setBalance(CURRENT_USER_ID, newBalance);
        state.balance = newBalance;
        
        let recs = users[CURRENT_USER_ID].records || [];
        recs.unshift({
            time: new Date().toLocaleTimeString(),
            point: state.selectedPoint,
            bet: state.betAmount,
            result: total,
            win: win,
            isWin: isWin
        });
        if (recs.length > 30) recs.pop();
        users[CURRENT_USER_ID].records = recs;
        saveUsers();
        refreshHistory();
        updateUI();
        
        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(isWin ? [100, 50, 100] : 80);
        
        setTimeout(() => {
            state.selectedPoint = null;
            state.betAmount = 0;
            state.isDrawing = false;
            updateUI();
            document.querySelectorAll('.point-card').forEach(c => c.classList.remove('selected'));
            startCountdown(25);
        }, 5000);
    }
    
    function placeBet() {
        if (state.isDrawing || isBetLocked) {
            showModal("开奖进行中，请稍候...", "好的");
            return;
        }
        if (state.selectedPoint === null) {
            showModal("请先选择一个点数下注", "好的");
            return;
        }
        if (state.betAmount <= 0) {
            showModal("请先选择筹码金额", "好的");
            return;
        }
        if (state.betAmount > state.balance) {
            showModal("余额不足！当前余额：" + state.balance.toFixed(2), "知道了");
            return;
        }
        
        clearCountdown();
        executeDraw();
    }
    
    function addBet(amount) {
        if (state.isDrawing || isBetLocked) return;
        state.betAmount += amount;
        if (state.betAmount < 0) state.betAmount = 0;
        updateUI();
        flashButton(document.querySelector(`.chip[data-amount="${amount}"]`));
    }
    
    function selectPoint(point) {
        if (state.isDrawing || isBetLocked) return;
        state.selectedPoint = point;
        updateUI();
        document.querySelectorAll('.point-card').forEach(card => {
            if (parseInt(card.dataset.point) === point) {
                card.classList.add('selected');
            } else {
                card.classList.remove('selected');
            }
        });
        flashButton(document.querySelector(`.point-card[data-point="${point}"]`));
    }
    
    function cancelBet() {
        if (state.isDrawing || isBetLocked) return;
        state.selectedPoint = null;
        state.betAmount = 0;
        updateUI();
        document.querySelectorAll('.point-card').forEach(c => c.classList.remove('selected'));
        flashButton(document.getElementById('cancelBtn'));
    }
    
    function refreshBalance() {
        state.balance = getBalance(CURRENT_USER_ID);
        updateUI();
        flashButton(document.getElementById('refreshBtn'));
    }
    
    function updateUI() {
        document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
        document.getElementById('currentBetAmount').innerText = state.betAmount;
        document.getElementById('selectedPoint').innerText = state.selectedPoint !== null ? state.selectedPoint : '-';
        let pool = 50000 + (Math.random() - 0.5) * 3000;
        pool = Math.max(40000, Math.min(60000, pool));
        document.getElementById('poolDisplay').innerText = pool.toFixed(2);
    }
    
    function refreshHistory() {
        const container = document.getElementById('historyList');
        if (!container) return;
        const recs = users[CURRENT_USER_ID]?.records || [];
        container.innerHTML = '';
        if (recs.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#666; padding:10px;">暂无记录</div>';
            return;
        }
        recs.slice(0, 12).forEach(r => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${r.time}</span>
                            <span>押${r.point}点 ${r.bet}</span>
                            <span>开${r.result}点</span>
                            <span class="${r.isWin ? 'history-win' : 'history-lose'}">${r.isWin ? `+${r.win}` : `-${r.bet}`}</span>`;
            container.appendChild(div);
        });
    }
    
    function startCountdown(sec) {
        if(state.countdownInterval) clearInterval(state.countdownInterval);
        state.countdown = sec;
        const cdSpan = document.getElementById('countdownNum');
        cdSpan.innerText = state.countdown;
        cdSpan.classList.remove('countdown-warning');
        
        isBetLocked = false;
        
        state.countdownInterval = setInterval(() => {
            if(state.countdown <= 1){
                clearInterval(state.countdownInterval);
                state.countdownInterval = null;
                isBetLocked = true;
                if (state.selectedPoint !== null && state.betAmount > 0 && state.betAmount <= state.balance) {
                    placeBet();
                } else {
                    startCountdown(25);
                }
            } else {
                state.countdown--;
                cdSpan.innerText = state.countdown;
                if(state.countdown <= 5) {
                    cdSpan.classList.add('countdown-warning');
                }
            }
        }, 1000);
    }
    
    function clearCountdown() { if(state.countdownInterval){ clearInterval(state.countdownInterval); state.countdownInterval=null; } }
    
    function switchUser() {
        if(state.isDrawing) return;
        const newId = document.getElementById('switchUserIdInput').value.trim();
        if(!newId) return;
        CURRENT_USER_ID = newId;
        if (!users[CURRENT_USER_ID]) { users[CURRENT_USER_ID] = { balance: 1000.00, records: [] }; saveUsers(); }
        document.getElementById('currentUserId').innerText = CURRENT_USER_ID;
        state.balance = getBalance(CURRENT_USER_ID);
        state.selectedPoint = null;
        state.betAmount = 0;
        state.isDrawing = false;
        isBetLocked = false;
        updateUI();
        clearCountdown();
        startCountdown(25);
        refreshHistory();
        document.querySelectorAll('.point-card').forEach(c => c.classList.remove('selected'));
    }
    
    function showModal(msg, btnText) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>🎲 至尊骰宝</h3><p style="margin:15px 0;">${msg}</p><button id="modalCloseBtn">${btnText}</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('modalCloseBtn').onclick = () => modal.remove();
    }
    
    function flashButton(btn) {
        if(!btn) return;
        btn.classList.add('btn-highlight');
        setTimeout(() => btn.classList.remove('btn-highlight'), 150);
        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(15);
    }
    
    function showHistory() {
        const recs = users[CURRENT_USER_ID]?.records || [];
        let html = `<div style="max-height:350px; overflow-y:auto; text-align:left;">`;
        if (recs.length === 0) html += "<p style='text-align:center;'>暂无记录</p>";
        else {
            recs.slice(0, 40).forEach(r => {
                html += `<div style="padding:8px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
                            <span>${r.time}</span>
                            <span>押${r.point}点 ${r.bet}</span>
                            <span>开${r.result}点</span>
                            <span style="color:${r.isWin?'#4caf50':'#f44336'}">${r.isWin ? `+${r.win}` : `-${r.bet}`}</span>
                         </div>`;
            });
        }
        html += `</div><button id="closeHistoryBtn" style="margin-top:16px;">关闭</button>`;
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>📜 投注记录</h3>${html}</div>`;
        document.body.appendChild(modal);
        document.getElementById('closeHistoryBtn').onclick = () => modal.remove();
    }
    
    function createPointsGrid() {
        const grid = document.getElementById('pointsGrid');
        grid.innerHTML = '';
        for (let i = 4; i <= 17; i++) {
            const odds = oddsMap[i];
            const card = document.createElement('div');
            card.className = 'point-card';
            card.dataset.point = i;
            card.innerHTML = `<div class="point-value">${i}</div>
                             <div class="point-odds">赔 ${odds}倍</div>`;
            card.onclick = () => selectPoint(i);
            grid.appendChild(card);
        }
    }
    
    // ========== 管理员面板 ==========
    let adminPanel = null;
    let selectedAdminUserId = CURRENT_USER_ID;
    
    function showAdminPanel() {
        if (adminPanel) { adminPanel.remove(); adminPanel = null; return; }
        
        const panel = document.createElement('div');
        panel.className = 'admin-modal';
        panel.innerHTML = `
            <div class="admin-content">
                <h3>🔐 管理员面板</h3>
                <div class="admin-user-list" id="adminUserList"></div>
                <div>当前选中：<strong id="selectedUserDisplay">${selectedAdminUserId}</strong></div>
                <input type="number" id="adminAmount" class="admin-input" placeholder="金额" value="0">
                <div class="admin-buttons">
                    <button id="adminAddBtn" class="admin-btn admin-btn-add">➕ 上分</button>
                    <button id="adminSubBtn" class="admin-btn admin-btn-sub">➖ 下分</button>
                    <button id="adminQueryBtn" class="admin-btn admin-btn-query">🔍 查询</button>
                    <button id="adminResetBtn" class="admin-btn admin-btn-reset">🔄 重置</button>
                    <button id="adminChangePwdBtn" class="admin-btn admin-btn-pwd">🔑 改密</button>
                </div>
                <button id="adminCloseBtn" class="admin-close">关闭</button>
            </div>
        `;
        document.body.appendChild(panel);
        adminPanel = panel;
        
        function refreshUserList() {
            const userListDiv = document.getElementById('adminUserList');
            if (!userListDiv) return;
            const usersArr = getUserList();
            userListDiv.innerHTML = '';
            usersArr.forEach(uid => {
                const div = document.createElement('div');
                div.className = 'admin-user-item';
                if (uid === selectedAdminUserId) div.classList.add('selected');
                div.textContent = uid + ' (' + getBalance(uid).toFixed(2) + ')';
                div.onclick = () => {
                    selectedAdminUserId = uid;
                    document.getElementById('selectedUserDisplay').innerText = selectedAdminUserId;
                    refreshUserList();
                };
                userListDiv.appendChild(div);
            });
        }
        refreshUserList();
        
        document.getElementById('adminAddBtn').onclick = () => {
            let amount = parseFloat(document.getElementById('adminAmount').value);
            if (isNaN(amount) || amount <= 0) { alert("请输入正数金额"); return; }
            let cur = getBalance(selectedAdminUserId);
            setBalance(selectedAdminUserId, cur + amount);
            refreshUserList();
            if (selectedAdminUserId === CURRENT_USER_ID) { state.balance = getBalance(CURRENT_USER_ID); updateUI(); }
            alert(`✅ 已给 ${selectedAdminUserId} 上分 ${amount}`);
        };
        document.getElementById('adminSubBtn').onclick = () => {
            let amount = parseFloat(document.getElementById('adminAmount').value);
            if (isNaN(amount) || amount <= 0) { alert("请输入正数金额"); return; }
            let cur = getBalance(selectedAdminUserId);
            if (cur < amount) { alert("余额不足"); return; }
            setBalance(selectedAdminUserId, cur - amount);
            refreshUserList();
            if (selectedAdminUserId === CURRENT_USER_ID) { state.balance = getBalance(CURRENT_USER_ID); updateUI(); }
            alert(`✅ 已从 ${selectedAdminUserId} 下分 ${amount}`);
        };
        document.getElementById('adminQueryBtn').onclick = () => {
            alert(`${selectedAdminUserId} 当前余额: ${getBalance(selectedAdminUserId).toFixed(2)}`);
        };
        document.getElementById('adminResetBtn').onclick = () => {
            if (confirm(`重置 ${selectedAdminUserId} 余额为 1000？`)) {
                setBalance(selectedAdminUserId, 1000);
                refreshUserList();
                if (selectedAdminUserId === CURRENT_USER_ID) { state.balance = getBalance(CURRENT_USER_ID); updateUI(); }
                alert("重置成功");
            }
        };
        document.getElementById('adminChangePwdBtn').onclick = () => {
            let old = prompt("当前密码:");
            if (old !== ADMIN_PASSWORD) { alert("密码错误"); return; }
            let newPwd = prompt("新密码(至少6位):");
            if (!newPwd || newPwd.length < 6) { alert("密码至少6位"); return; }
            ADMIN_PASSWORD = newPwd;
            localStorage.setItem('sicbo_admin_pwd', newPwd);
            alert("密码修改成功");
        };
        document.getElementById('adminCloseBtn').onclick = () => { panel.remove(); adminPanel = null; };
    }
    
    // 管理员入口 - 点击余额区域
    function onAdminEntry() {
        const pwd = prompt("🔐 管理员验证\n请输入密码:");
        if (pwd === ADMIN_PASSWORD) {
            showAdminPanel();
        } else if (pwd !== null) {
            alert("密码错误");
        }
    }
    
    function bindEvents() {
        document.getElementById('refreshBtn').onclick = refreshBalance;
        document.getElementById('cancelBtn').onclick = cancelBet;
        document.getElementById('fightBtn').onclick = placeBet;
        document.getElementById('switchUserBtn').onclick = switchUser;
        document.getElementById('myHistoryBtn').onclick = showHistory;
        document.getElementById('newUserBtn').onclick = () => {
            const newId = generateRandomId();
            document.getElementById('switchUserIdInput').value = newId;
            switchUser();
            showModal(`新账户创建成功！<br>ID: ${newId}<br>初始余额: 1000.00`, "开始游戏");
        };
        // 管理员入口 - 点击余额卡片
        document.getElementById('adminEntry').onclick = onAdminEntry;
        
        document.querySelectorAll('.chip').forEach(chip => {
            chip.onclick = () => {
                const amount = parseInt(chip.dataset.amount);
                addBet(amount);
            };
        });
    }
    
    function init() {
        initDice();
        createPointsGrid();
        bindEvents();
        updateUI();
        refreshHistory();
        startCountdown(25);
        
        // 读取保存的密码
        let savedPwd = localStorage.getItem('sicbo_admin_pwd');
        if (savedPwd) ADMIN_PASSWORD = savedPwd;
        
        if (!localStorage.getItem('sicbo_first')) {
            localStorage.setItem('sicbo_first', 'true');
            setTimeout(() => {
                showModal("🎲 真3D至尊骰宝\n\n• 4-17点可选，不同点数赔率不同\n• 4点和17点赔率最高60倍\n• 25秒下注时间\n• 开奖有真实摇骰子动画\n• 点击「账户余额」进入管理员后台\n\n管理员密码：wang000000", "进入游戏");
            }, 500);
        }
    }
    
    init();
})();
</script>
</body>
</html>
