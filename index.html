
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙虎斗 · 至尊版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
        body{background:#0a0a1a;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:sans-serif;padding:16px;}
        .game{width:100%;max-width:420px;background:#1a1a2e;border-radius:20px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
        .battle{background:#000;height:150px;border-radius:12px;margin-bottom:16px;position:relative;overflow:hidden;}
        .battle-bg{position:absolute;width:100%;height:100%;background:radial-gradient(circle,#2a2a2a,#000);z-index:1;}
        .dragon{position:absolute;bottom:10px;left:15px;font-size:40px;color:#ff4444;z-index:2;}
        .tiger{position:absolute;bottom:10px;right:15px;font-size:40px;color:#4488ff;z-index:2;}
        .result{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);padding:4px 12px;border-radius:20px;color:#ffaa44;font-size:12px;z-index:2;}
        .panel{background:#1e1e2e;border-radius:12px;padding:16px;}
        .user-bar{display:flex;justify-content:space-between;margin-bottom:12px;background:#2a2a3a;padding:8px 12px;border-radius:8px;}
        .user-info{font-size:12px;color:#ccc;}
        .btn-small{background:#3a3a4a;border:none;padding:4px 10px;color:#fff;border-radius:6px;cursor:pointer;}
        .switch-bar{display:flex;gap:8px;margin-bottom:16px;}
        .switch-bar input{flex:1;background:#1a1a2a;border:1px solid #ffaa44;padding:8px;color:#fff;border-radius:8px;}
        .bet-row{display:flex;gap:12px;margin-bottom:16px;}
        .bet-item{flex:1;background:#2a2a3a;border-radius:12px;padding:10px;text-align:center;}
        .bet-name{font-size:22px;font-weight:bold;margin-bottom:5px;}
        .bet-name.dragon{color:#ff6666;}.bet-name.tiger{color:#6688ff;}.bet-name.tie{color:#aa66ff;}
        .bet-amount{font-size:20px;font-weight:bold;margin:8px 0;color:#ffaa44;}
        .bet-control{display:flex;justify-content:center;gap:16px;}
        .bet-control button{background:#1a1a2a;border:none;width:36px;height:36px;color:#ffaa44;font-size:22px;border-radius:8px;cursor:pointer;}
        .data-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;}
        .data-card{background:#2a2a3a;border-radius:10px;padding:10px;text-align:center;}
        .data-card label{font-size:11px;color:#aaa;}.data-card value{font-size:18px;font-weight:bold;color:#ffaa44;display:block;}
        .timer{text-align:center;color:#ffaa44;margin:12px 0;}
        .speed-row{display:flex;justify-content:center;gap:12px;margin:12px 0;}
        .speed-btn{background:#2a2a3a;border:none;padding:4px 16px;color:#aaa;border-radius:20px;cursor:pointer;}
        .speed-btn.active{background:#ffaa44;color:#1a1a2a;}
        .history-box{background:#2a2a3a;border-radius:10px;padding:12px;margin:16px 0;}
        .history-title{font-size:11px;color:#ffaa44;text-align:center;margin-bottom:8px;}
        .history-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-bottom:12px;}
        .history-cell{aspect-ratio:1;background:#1a1a2a;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
        .history-cell.dragon{background:#ff4444;}.history-cell.tiger{background:#4488ff;}.history-cell.tie{background:#aa66ff;}
        .record-list{max-height:100px;overflow-y:auto;font-size:11px;}
        .record-item{display:flex;justify-content:space-between;padding:4px 8px;border-bottom:1px solid #444;}
        .record-win{color:#4caf50;}.record-lose{color:#f44336;}
        .action-row{display:flex;gap:10px;margin:16px 0;}
        .action-btn{flex:1;background:#3a3a4a;border:none;padding:12px;color:#fff;font-weight:bold;border-radius:30px;cursor:pointer;}
        .action-btn.main{background:#e53935;}
        .bottom-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
        .stat-card{background:#2a2a3a;border-radius:10px;padding:10px;text-align:center;}
        .stat-card span:first-child{font-size:11px;color:#aaa;}.stat-card span:last-child{font-size:20px;font-weight:bold;color:#ffaa44;}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;}
        .modal-content{background:#2a2a3a;width:85%;max-width:340px;padding:20px;border-radius:16px;text-align:center;color:#fff;}
        .modal-content button{background:#ffaa44;border:none;padding:8px 20px;margin-top:12px;border-radius:20px;cursor:pointer;}
        #hiddenFile{display:none;}
    </style>
</head>
<body>
<div class="game">
    <div class="battle">
        <div class="battle-bg" id="battleBg"></div>
        <div class="dragon">龍</div>
        <div class="tiger">虎</div>
        <div class="result" id="resultText">等待开奖</div>
    </div>
    <div class="panel">
        <div class="user-bar"><div class="user-info">👤 账户：<span id="userId">6685731895</span></div><div><button id="historyBtn" class="btn-small">📜 记录</button> <button id="newUserBtn" class="btn-small">✨ 新用户</button></div></div>
        <div class="switch-bar"><input type="text" id="switchId" placeholder="用户ID"><button id="switchBtn" class="btn-small">切换</button></div>
        <div class="bet-row">
            <div class="bet-item"><div class="bet-name dragon">🐉 龙</div><div class="bet-amount" id="betDragon">0</div><div class="bet-control"><button id="dragonDec">-</button><button id="dragonInc">+</button></div></div>
            <div class="bet-item"><div class="bet-name tie">⚖️ 和</div><div class="bet-amount" id="betTie">0</div><div class="bet-control"><button id="tieDec">-</button><button id="tieInc">+</button></div></div>
            <div class="bet-item"><div class="bet-name tiger">🐯 虎</div><div class="bet-amount" id="betTiger">0</div><div class="bet-control"><button id="tigerDec">-</button><button id="tigerInc">+</button></div></div>
        </div>
        <div class="data-row"><div class="data-card"><label>总押注</label><value id="totalBet">0</value></div><div class="data-card"><label>预计奖金</label><value id="maxWin">0</value></div></div>
        <div class="timer">⏱️ 下一局: <span id="countdown">30</span> 秒</div>
        <div class="speed-row"><span class="speed-btn active" data-speed="1">1X</span><span class="speed-btn" data-speed="2">2X</span><span class="speed-btn" data-speed="3">3X</span></div>
        <div class="history-box"><div class="history-title">📈 最近10局开奖</div><div class="history-grid" id="historyGrid"></div><div class="history-title">📋 开奖记录</div><div class="record-list" id="recordList"></div></div>
        <div class="action-row"><button id="refreshBtn" class="action-btn">🔄 刷新</button><button id="repeatBtn" class="action-btn">🔁 续押</button><button id="cancelBtn" class="action-btn">❌ 取消</button><button id="fightBtn" class="action-btn main">🎲 投注</button></div>
        <div class="bottom-stats"><div class="stat-card"><span>💰 余额</span><span id="balance">10000</span></div><div class="stat-card"><span>🎰 彩金池</span><span id="pool">50000</span></div></div>
    </div>
</div>
<input type="file" id="hiddenFile" accept="image/*,video/mp4,video/webm">

<script>
(function(){
    let users = JSON.parse(localStorage.getItem('dragon_users')) || {};
    let currentUserId = "6685731895";
    if(!users[currentUserId]) users[currentUserId] = { balance: 10000, records: [], history: [] };
    let adminPwd = localStorage.getItem('admin_pwd') || "dragon888";
    function saveUsers(){ localStorage.setItem('dragon_users', JSON.stringify(users)); }
    function getBalance(uid){ if(!users[uid]) users[uid]={balance:10000,records:[],history:[]}; return users[uid].balance; }
    function setBalance(uid,amt){ if(!users[uid]) users[uid]={balance:10000,records:[],history:[]}; users[uid].balance=amt; saveUsers(); }
    
    let balance = getBalance(currentUserId);
    let betDragon = 0, betTiger = 0, betTie = 0;
    let betRolling = false, animating = false;
    let speed = 1, pool = 50000, countdown = 30, countdownInterval = null;
    let lastBet = null;
    
    function updateUI() {
        document.getElementById('balance').innerText = balance;
        document.getElementById('pool').innerText = pool;
        document.getElementById('betDragon').innerText = betDragon;
        document.getElementById('betTiger').innerText = betTiger;
        document.getElementById('betTie').innerText = betTie;
        let total = betDragon + betTiger + betTie;
        document.getElementById('totalBet').innerText = total;
        let maxWin = Math.max(betDragon*2, betTiger*2, betTie*8);
        document.getElementById('maxWin').innerText = maxWin;
    }
    
    function adjustDragon(delta) { let n = betDragon + delta; if(n >= 0) betDragon = n; updateUI(); }
    function adjustTiger(delta) { let n = betTiger + delta; if(n >= 0) betTiger = n; updateUI(); }
    function adjustTie(delta) { let n = betTie + delta; if(n >= 0) betTie = n; updateUI(); }
    
    function showAnimation(result, winAmount) {
        if(animating) return;
        animating = true;
        let btns = document.querySelectorAll('button');
        btns.forEach(btn => btn.disabled = true);
        let overlay = document.createElement('div');
        overlay.className = 'modal';
        overlay.innerHTML = `<div class="modal-content"><div style="font-size:80px;margin-bottom:10px;">${result === '龙' ? '🐉' : (result === '虎' ? '🐯' : '⚖️')}</div><div style="font-size:36px;font-weight:bold;color:#ffaa44;">${result}</div><div style="margin-top:12px;">${winAmount > 0 ? `🎉 中奖 +${winAmount} TRX` : '😞 未中奖'}</div><button id="animClose">关闭</button></div>`;
        document.body.appendChild(overlay);
        document.getElementById('animClose').onclick = () => { overlay.remove(); animating = false; btns.forEach(btn => btn.disabled = false); };
    }
    
    function updateHistoryGrid() {
        let grid = document.getElementById('historyGrid');
        let history = users[currentUserId]?.history || [];
        grid.innerHTML = '';
        for(let i=0; i<10; i++) {
            let cell = document.createElement('div');
            cell.className = 'history-cell';
            if(i < history.length) {
                let r = history[i];
                cell.classList.add(r === '龙' ? 'dragon' : (r === '虎' ? 'tiger' : 'tie'));
                cell.textContent = r === '龙' ? '🐉' : (r === '虎' ? '🐯' : '⚖️');
            } else { cell.textContent = '?'; }
            grid.appendChild(cell);
        }
    }
    function updateRecordList() {
        let list = document.getElementById('recordList');
        let records = users[currentUserId]?.records || [];
        list.innerHTML = '';
        if(records.length === 0) { list.innerHTML = '<div style="text-align:center;color:#aaa;">暂无记录</div>'; return; }
        records.slice(0,10).forEach(r => {
            let div = document.createElement('div');
            div.className = 'record-item';
            let isWin = r.win > 0;
            div.innerHTML = `<span>${r.time}</span><span>押 ${r.bet} → ${r.result}</span><span style="color:${isWin?'#4caf50':'#f44336'}">${isWin ? `+${r.win}` : `-${r.amount}`}</span>`;
            list.appendChild(div);
        });
    }
    
    function placeBet() {
        if(betRolling || animating) return;
        let selected = null, amount = 0;
        if(betDragon > 0) { selected = "龙"; amount = betDragon; }
        else if(betTiger > 0) { selected = "虎"; amount = betTiger; }
        else if(betTie > 0) { selected = "和"; amount = betTie; }
        else { alert("请先押注"); return; }
        if(amount > balance) { alert("余额不足"); return; }
        betRolling = true;
        let outcomes = ["龙", "虎", "和"];
        let result = outcomes[Math.floor(Math.random() * 3)];
        let win = 0;
        if(selected === result) win = amount * (result === "和" ? 8 : 2);
        let newBalance = balance - amount + win;
        balance = newBalance;
        setBalance(currentUserId, balance);
        let records = users[currentUserId].records || [];
        records.unshift({ time: new Date().toLocaleTimeString(), bet: selected, result: result, win: win, amount: amount });
        if(records.length > 30) records.pop();
        users[currentUserId].records = records;
        let history = users[currentUserId].history || [];
        history.unshift(result);
        if(history.length > 10) history.pop();
        users[currentUserId].history = history;
        saveUsers();
        betDragon = 0; betTiger = 0; betTie = 0;
        lastBet = { type: selected, amount: amount };
        updateUI();
        document.getElementById('resultText').innerText = `开奖: ${result} ${win>0 ? `中奖 +${win}` : '未中奖'}`;
        showAnimation(result, win);
        updateHistoryGrid();
        updateRecordList();
        clearCountdown();
        startCountdown(getCountdownSec());
        betRolling = false;
    }
    
    function repeatLastBet() {
        if(lastBet && !betRolling && !animating) {
            if(lastBet.type === "龙") betDragon = lastBet.amount;
            else if(lastBet.type === "虎") betTiger = lastBet.amount;
            else betTie = lastBet.amount;
            updateUI();
            placeBet();
        }
    }
    function cancelAllBets() { if(!betRolling && !animating) { betDragon=0; betTiger=0; betTie=0; updateUI(); } }
    function refreshBalance() { balance = getBalance(currentUserId); updateUI(); }
    function getCountdownSec() { return speed === 1 ? 30 : (speed === 2 ? 20 : 10); }
    function startCountdown(sec) {
        if(countdownInterval) clearInterval(countdownInterval);
        countdown = sec;
        document.getElementById('countdown').innerText = countdown;
        countdownInterval = setInterval(() => {
            if(countdown <= 1) {
                clearInterval(countdownInterval);
                countdownInterval = null;
                if(betDragon+betTiger+betTie > 0) placeBet();
                else startCountdown(getCountdownSec());
            } else {
                countdown--;
                document.getElementById('countdown').innerText = countdown;
            }
        }, 1000);
    }
    function clearCountdown() { if(countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; } }
    function setSpeed(s) { if(animating) return; speed = s; document.querySelectorAll('.speed-btn').forEach(btn => { if(parseInt(btn.dataset.speed) === s) btn.classList.add('active'); else btn.classList.remove('active'); }); clearCountdown(); startCountdown(getCountdownSec()); }
    function switchUser() { if(animating) return; let newId = document.getElementById('switchId').value.trim(); if(!newId) return; currentUserId = newId; if(!users[currentUserId]) users[currentUserId] = { balance: 10000, records: [], history: [] }; document.getElementById('userId').innerText = currentUserId; balance = getBalance(currentUserId); betDragon=0; betTiger=0; betTie=0; lastBet=null; updateUI(); clearCountdown(); startCountdown(getCountdownSec()); updateHistoryGrid(); updateRecordList(); }
    function newUser() { let newId = "user_" + Math.floor(Math.random() * 1000000); document.getElementById('switchId').value = newId; switchUser(); alert(`新账户: ${newId}\n初始余额: 10000 TRX`); }
    function showHistory() { let recs = users[currentUserId]?.records || []; let html = '<div style="max-height:300px;overflow-y:auto;">'; if(recs.length===0) html+='<p>暂无记录</p>'; else recs.forEach(r => { html += `<div style="padding:6px;border-bottom:1px solid #555;">${r.time} 押 ${r.bet} → ${r.result} ${r.win>0 ? `✅ +${r.win}` : `❌ -${r.amount}`}</div>`; }); html += '</div><button id="closeHis">关闭</button>'; let modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = `<div class="modal-content"><h3>📜 我的记录</h3>${html}</div>`; document.body.appendChild(modal); document.getElementById('closeHis').onclick = () => modal.remove(); }
    
    let fileInput = document.getElementById('hiddenFile');
    fileInput.addEventListener('change', (e) => { let file = e.target.files[0]; if(file) { let url = URL.createObjectURL(file); document.getElementById('battleBg').style.backgroundImage = `url(${url})`; document.getElementById('battleBg').style.backgroundSize = 'cover'; } fileInput.value = ''; });
    function triggerUpload() { fileInput.click(); }
    
    function showAdmin() {
        let pwd = prompt("管理员密码:");
        if(pwd !== adminPwd) { alert("密码错误"); return; }
        let uid = prompt("输入用户ID:", currentUserId);
        if(!uid) return;
        let action = prompt(`用户 ${uid} 余额: ${getBalance(uid)}\n\n1-上分  2-下分  3-重置  4-改密码  5-上传背景`, "1");
        if(action === "1") { let amt = parseFloat(prompt("上分金额:")); if(amt>0) { setBalance(uid, getBalance(uid)+amt); alert(`✅ 已给 ${uid} 上分 ${amt} TRX`); if(uid === currentUserId) refreshBalance(); } }
        else if(action === "2") { let amt = parseFloat(prompt("下分金额:")); let cur = getBalance(uid); if(amt>0 && cur>=amt) { setBalance(uid, cur-amt); alert(`✅ 已从 ${uid} 下分 ${amt} TRX`); if(uid === currentUserId) refreshBalance(); } else alert("余额不足"); }
        else if(action === "3") { setBalance(uid, 10000); alert(`✅ 已重置 ${uid} 余额为 10000`); if(uid === currentUserId) refreshBalance(); }
        else if(action === "4") { let newPwd = prompt("新密码(至少4位):"); if(newPwd && newPwd.length>=4) { adminPwd = newPwd; localStorage.setItem('admin_pwd', newPwd); alert("密码修改成功"); } else alert("密码无效"); }
        else if(action === "5") { triggerUpload(); }
    }
    
    let longPressTimer = null;
    let repeatBtn = document.getElementById('repeatBtn');
    repeatBtn.addEventListener('click', (e) => { if(longPressTimer) clearTimeout(longPressTimer); repeatLastBet(); });
    repeatBtn.addEventListener('touchstart', (e) => { longPressTimer = setTimeout(() => { showAdmin(); longPressTimer = null; }, 3000); });
    repeatBtn.addEventListener('touchend', () => { if(longPressTimer) clearTimeout(longPressTimer); });
    repeatBtn.addEventListener('touchcancel', () => { if(longPressTimer) clearTimeout(longPressTimer); });
    repeatBtn.addEventListener('mousedown', (e) => { longPressTimer = setTimeout(() => { showAdmin(); longPressTimer = null; }, 3000); });
    repeatBtn.addEventListener('mouseup', () => { if(longPressTimer) clearTimeout(longPressTimer); });
    
    document.getElementById('dragonDec').onclick = () => adjustDragon(-10);
    document.getElementById('dragonInc').onclick = () => adjustDragon(10);
    document.getElementById('tigerDec').onclick = () => adjustTiger(-10);
    document.getElementById('tigerInc').onclick = () => adjustTiger(10);
    document.getElementById('tieDec').onclick = () => adjustTie(-10);
    document.getElementById('tieInc').onclick = () => adjustTie(10);
    document.getElementById('fightBtn').onclick = placeBet;
    document.getElementById('refreshBtn').onclick = refreshBalance;
    document.getElementById('cancelBtn').onclick = cancelAllBets;
    document.getElementById('switchBtn').onclick = switchUser;
    document.getElementById('newUserBtn').onclick = newUser;
    document.getElementById('historyBtn').onclick = showHistory;
    document.querySelectorAll('.speed-btn').forEach(btn => btn.onclick = () => setSpeed(parseInt(btn.dataset.speed)));
    
    setInterval(() => { let change = Math.floor(Math.random() * 61) - 30; let newPool = pool + change; if(newPool < 10000) newPool = 10000; if(newPool > 100000) newPool = 100000; pool = newPool; document.getElementById('pool').innerText = pool; }, 2000);
    
    function init() { updateUI(); startCountdown(30); updateHistoryGrid(); updateRecordList(); document.getElementById('userId').innerText = currentUserId; }
    init();
})();
</script>
</body>
</html>






<
