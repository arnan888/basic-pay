<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA_五兽至尊_旗舰版_V60</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --gold: #ffcc00; --bg: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: #fff; 
            font-family: 'Arial Black', sans-serif; height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        /* 顶部余额显示区 */
        .hud {
            width: 95%; margin-top: 15px; z-index: 100;
            background: rgba(0,0,0,0.85); border: 2px solid var(--neon);
            border-radius: 15px; padding: 12px; text-align: center;
            box-shadow: 0 0 15px rgba(0,242,255,0.2);
        }
        .bal-txt { font-size: 24px; color: var(--neon); margin-bottom: 8px; text-shadow: 0 0 10px var(--neon); }
        .bet-row { display: flex; align-items: center; justify-content: center; gap: 15px; border-top: 1px solid #333; padding-top: 10px; }
        .btn-ctrl { width: 45px; height: 45px; background: #222; border: 1.5px solid var(--gold); color: var(--gold); border-radius: 10px; font-size: 24px; cursor: pointer; transition: 0.1s; }
        .btn-ctrl:active { transform: scale(0.9); background: var(--gold); color: #000; }
        .bet-val { font-size: 22px; color: var(--gold); min-width: 100px; font-weight: 900; }

        /* 转盘主容器 */
        .wheel-box { margin-top: 30px; position: relative; width: 340px; height: 340px; z-index: 50; }
        .wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 10px solid #1a1a1a;
            position: relative; overflow: hidden; transition: transform 4.5s cubic-bezier(0.15, 0, 0.1, 1);
            background: #000; box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        /* 6扇区裁剪 */
        .sector {
            position: absolute; width: 100%; height: 100%;
            clip-path: polygon(50% 50%, 100% 21%, 100% 79%); transform-origin: center;
        }
        .sector img { width: 115%; height: 115%; object-fit: cover; filter: brightness(0.65); }
        .sector .label {
            position: absolute; top: 50%; right: 10px; transform: translateY(-50%) rotate(-90deg);
            background: var(--pink); color: #fff; padding: 1px 6px; border-radius: 5px; font-size: 10px; font-weight: bold; border: 1px solid #fff;
        }

        /* 角度分布 */
        .s0{transform:rotate(-90deg)} .s1{transform:rotate(-30deg)} .s2{transform:rotate(30deg)} 
        .s3{transform:rotate(90deg)} .s4{transform:rotate(150deg)} .s5{transform:rotate(210deg)}

        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; 
            border-top: 32px solid #fff; z-index: 70; filter: drop-shadow(0 0 10px var(--neon));
        }

        .center-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 75px; height: 75px; background: #000; border: 4px solid var(--pink);
            border-radius: 50%; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; z-index: 80;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--pink);
        }
        .center-btn:active { transform: translate(-50%, -50%) scale(0.9); }

        /* 固定结果显示区 (无弹窗) */
        .result-display {
            margin-top: 35px; width: 90%; height: 110px;
            background: rgba(255,255,255,0.05); border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px dashed #444; transition: 0.3s;
        }
        #res-win { font-size: 34px; font-weight: 900; color: #444; margin: 0; }
        #res-info { font-size: 16px; color: #666; margin-top: 8px; letter-spacing: 1px; }

        /* 中奖闪烁动画 */
        .win-animate { animation: blink 0.4s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="hud">
        <div class="bal-txt">BALANCE: <b id="bal">1,000</b></div>
        <div class="bet-row">
            <button class="btn-ctrl" onclick="changeBet(-50)">-</button>
            <div class="bet-val">BET: <span id="bet">50</span></div>
            <button class="btn-ctrl" onclick="changeBet(50)">+</button>
        </div>
    </div>

    <div class="wheel-box">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <div class="sector s0"><img src="all.jpg"><div class="label">MAX x100</div></div>
            <div class="sector s1"><img src="lion.jpg"><div class="label">x10-30</div></div>
            <div class="sector s2"><img src="tiger.jpg"><div class="label">x5-15</div></div>
            <div class="sector s3"><img src="leopard.jpg"><div class="label">x2-10</div></div>
            <div class="sector s4"><img src="wolf.jpg"><div class="label">x0.5-5</div></div>
            <div class="sector s5"><img src="dog.jpg"><div class="label">x0.1-1</div></div>
        </div>
        <div class="center-btn" onclick="spin()">SPIN</div>
    </div>

    <!-- 固定结果区 -->
    <div class="result-display" id="res-box">
        <div id="res-win">READY</div>
        <div id="res-info">WAITING FOR SPIN...</div>
    </div>

    <script>
        // --- 商业核心逻辑 ---
        let b = parseFloat(localStorage.getItem('u_gold') || '1000'); 
        let totalIn = parseFloat(localStorage.getItem('u_in') || '1000'); 
        let totalOut = parseFloat(localStorage.getItem('u_out') || '0'); 
        const TARGET_RTP = 0.92; // 锁定 92% 返还率 (8% 净抽水)

        let currentBet = 50; let r = 0; let spinning = false;

        const config = [
            { id: 0, min: 30, max: 100, w: 1.5 }, // 全家福
            { id: 1, min: 10, max: 30, w: 6.5 },  // 狮子
            { id: 2, min: 5, max: 15, w: 12 },   // 老虎
            { id: 3, min: 2, max: 10, w: 20 },   // 豹子
            { id: 4, min: 0.5, max: 5, w: 25 },  // 狼
            { id: 5, min: 0.1, max: 1, w: 35 }   // 狗
        ];

        function updateUI() {
            document.getElementById('bal').innerText = Math.floor(b).toLocaleString();
            document.getElementById('bet').innerText = currentBet;
            localStorage.setItem('u_gold', b);
            localStorage.setItem('u_in', totalIn);
            localStorage.setItem('u_out', totalOut);
            
            // 后台监控
            let rtp = totalIn > 0 ? (totalOut / totalIn) : 0;
            console.log(`[水位记录] RTP: ${(rtp*100).toFixed(2)}% | 剩余空间: ${(totalIn * 0.92 - totalOut).toFixed(2)}`);
        }

        // --- 92% 动态控杀核心 ---
        function getSmartTarget() {
            let rtp = totalOut / totalIn;
            let n = Math.random() * 100;
            let netLoss = totalIn - totalOut;

            // 1. 补偿：亏损严重时解锁大奖
            if (netLoss > 10000 && n < 15) return 0;

            // 2. 杀分：超过 92% 时强制收割
            if (rtp >= TARGET_RTP) {
                return n < 80 ? 5 : 4; 
            }

            // 3. 正常模式
            let acc = 0;
            for(let i=0; i<config.length; i++){
                acc += config[i].w;
                if(n <= acc) return i;
            }
            return 5;
        }

        window.changeBet = (v) => { if(!spinning) { currentBet = Math.max(50, Math.min(b, currentBet + v)); updateUI(); }};

        function spin() {
            if (spinning || b < currentBet) return;
            spinning = true; b -= currentBet; updateUI();

            // UI 初始化
            const resWin = document.getElementById('res-win');
            const resInfo = document.getElementById('res-info');
            const resBox = document.getElementById('res-box');
            resWin.innerText = "SPINNING...";
            resWin.style.color = "#444";
            resWin.classList.remove('win-animate');
            resInfo.innerText = "GOOD LUCK!";
            resBox.style.borderColor = "#444";

            const idx = getSmartTarget();
            r += (2160 + idx * 60); 
            document.getElementById('wheel').style.transform = `rotate(-${r}deg)`;

            setTimeout(() => {
                let m = (Math.random() * (config[idx].max - config[idx].min) + config[idx].min);
                let win = Math.floor(currentBet * m);

                // 强制控杀防御线 (96%)
                if ((totalOut + win) / totalIn > 0.96) { win = Math.floor(currentBet * 0.5); m = 0.5; }

                b += win; totalOut += win; updateUI();

                // 结果渲染
                if (win > 0) {
                    resWin.innerText = "WIN: " + win;
                    resWin.style.color = m >= 5 ? varColor(m) : "#00f2ff";
                    resInfo.innerText = "MULTIPLIER: x" + m.toFixed(1);
                    if(m >= 5) {
                        resWin.classList.add('win-animate');
                        resBox.style.borderColor = varColor(m);
                    }
                } else {
                    resWin.innerText = "TRY AGAIN";
                    resWin.style.color = "#ff0055";
                    resInfo.innerText = "BETTER LUCK NEXT TIME!";
                }
                spinning = false;
            }, 4500);
        }

        function varColor(m) {
            if (m >= 30) return "#ffcc00"; // 金色 (大奖)
            if (m >= 5) return "#00f2ff";  // 青色 (中奖)
            return "#ff0055";
        }

        // 运营充值入口 (含3%活动空间)
        window.syncGold = (n) => { b += n; totalIn += n; updateUI(); };
        
        updateUI();
    </script>
</body>
</html>
