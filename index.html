<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_JADE_PRO_V3</title>
    <style>
        /* 核心玉石立体感配色与阴影基准 */
        :root {
            --jade-main: #4a7c64;      /* 玉石主色 */
            --jade-light: #6b9a85;     /* 立体高光色 */
            --jade-dark: #2c4a3b;      /* 立体深色边 */
            --stone-grey: #6b737e;     /* 灰色背景主色 */
            --inner-shadow: inset 10px 10px 20px rgba(0,0,0,0.5), inset -5px -5px 10px rgba(255,255,255,0.1); /* 深内陷阴影 */
            --outer-bevel: 5px 5px 10px rgba(0,0,0,0.6), -2px -2px 5px rgba(255,255,255,0.1); /* 外立体斜面阴影 */
            --gold: #f1c40f;
            --red-num: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #1a1a1a; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }

        /* 1. 包边极宽的玉石立体外框 */
        .phone-container {
            width: 100vw;
            height: 100vh;
            max-width: 480px; /* 模拟手机宽度，稍微加宽以容纳更宽的边框 */
            background: var(--jade-main);
            /* 制造极宽、厚实的立体边框感 */
            border: 15px solid var(--jade-main); 
            border-image: linear-gradient(135deg, var(--jade-light), var(--jade-dark)) 15;
            box-shadow: var(--outer-bevel);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 2. 增强隔离横条的立体感 */
        .divider {
            height: 10px; /* 加厚隔離條 */
            background: var(--jade-dark);
            border-top: 2px solid var(--jade-light);
            border-bottom: 2px solid #000;
            width: 100%;
            box-shadow: 0 3px 5px rgba(0,0,0,0.5);
        }

        /* 上方 1/8 OK部分：内陷功能键 */
        .header-section {
            height: 12%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 15px;
        }
        .inset-box {
            background: var(--stone-grey);
            border: 3px solid var(--jade-dark);
            box-shadow: var(--inner-shadow); /* 应用深内陷阴影 */
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .label { font-size: 11px; color: #ccc; letter-spacing: 1px; }
        .val { font-size: 18px; font-weight: bold; }

        /* 中间 4/8：转盘（大幅上移，强化下陷感） */
        .wheel-section {
            height: 45%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: var(--stone-grey);
            /* 整体区域内陷 */
            box-shadow: var(--inner-shadow);
            border: 5px solid var(--jade-dark);
            border-radius: 15px;
            margin: 0 10px; /* 侧边留距增强立体感 */
        }
        .pointer { 
            position: absolute; top: 8%; z-index: 10; 
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; 
            border-top: 25px solid var(--red-num); filter: drop-shadow(0 0 8px red);
        }
        #wheel { 
            width: 270px; height: 270px; border-radius: 50%; 
            /* 转盘本身也要有厚度感 */
            border: 10px solid var(--jade-main);
            background: #2a2a2a; position: relative; 
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1.1);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.8);
        }
        .slot { position: absolute; width: 100%; height: 100%; text-align: center; padding-top: 22px; font-size: 28px; }
        .hub { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 70px; height: 70px; background: var(--jade-dark); border-radius: 50%; 
            border: 3px solid var(--jade-light); z-index: 5; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--gold); font-weight: bold; font-size: 14px;
        }

        /* 3. 底部操作区OK部分：强化内陷感 */
        .footer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px 20px;
            justify-content: space-around;
            background: var(--stone-grey);
            /* 整体区域内陷 */
            box-shadow: var(--inner-shadow);
            border: 5px solid var(--jade-dark);
            border-radius: 15px;
            margin: 10px 10px 15px 10px; /* 周边留距 */
        }
        
        /* 4. 大红按键稍大点 */
        .main-action {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .side-btn { 
            width: 55px; height: 55px; background: var(--jade-main); 
            border: 3px solid var(--jade-dark); border-radius: 12px; 
            color: white; font-size: 28px; font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        .execute-btn { 
            flex: 1; height: 70px; /* 增加高度 */
            background: linear-gradient(180deg, #e53935, #b71c1c);
            border: none; border-radius: 35px; color: white; font-size: 22px; font-weight: bold;
            box-shadow: 0 8px 0 #7f0000, 3px 3px 10px rgba(0,0,0,0.5); /* 增加厚度阴影 */
            text-transform: uppercase; letter-spacing: 1px;
        }
        .execute-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #7f0000; }

        .sub-action {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        .func-btn { 
            background: rgba(0,0,0,0.3); border: 2px solid var(--jade-dark); 
            height: 45px; border-radius: 10px; color: #eee; font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); /* 自身内陷 */
        }
        .func-btn.active { border-color: var(--gold); background: var(--jade-dark); color: #fff; }

        .blur { filter: blur(4px); }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header-section">
        <div class="inset-box">
            <span class="label">BALANCE</span>
            <span class="val" id="ui-bal" style="color:var(--red-num)">146.80</span>
        </div>
        <div class="inset-box">
            <span class="label">NETWORK POOL</span>
            <span class="val" id="ui-pool" style="color:var(--gold)">84291.50</span>
        </div>
    </div>

    <div class="divider"></div>

    <div class="wheel-section">
        <div class="pointer"></div>
        <div id="wheel"></div>
        <div class="hub" id="ui-hub">READY</div>
    </div>

    <div class="divider"></div>

    <div class="footer-section">
        <div style="text-align: center; color: #fff; font-size: 15px; font-weight: bold;">
            STAKE: <span id="ui-bet" style="color:var(--gold)">5.5</span> USDT
        </div>

        <div class="main-action">
            <button class="side-btn" onclick="App.adjBet(-1)">−</button>
            <button class="execute-btn" onclick="App.roll()" id="btn-go">EXECUTE</button>
            <button class="side-btn" onclick="App.adjBet(1)">+</button>
        </div>

        <div class="sub-action">
            <div class="func-btn" id="opt-auto" onclick="App.toggleAuto()">🤖 AUTO: <b>OFF</b></div>
            <div class="func-btn" id="opt-speed" onclick="App.toggleSpeed()">⚡ SPEED: <b>1X</b></div>
        </div>
    </div>
</div>

<script>
    // 此处保持原有的核心逻辑，仅调整UI数值
const App = {
    bets: [5.5, 10.0, 20.0, 50.0, 100.0],
    icons: ['💎','💊','⚡','🔥','💰','🦁','🏆','🎲'],
    state: { bal: 146.80, betIdx: 0, deg: 0, isRolling: false, auto: false, speed: 1 },

    init() {
        const wheel = document.getElementById('wheel');
        this.icons.forEach((s, i) => {
            const el = document.createElement('div');
            el.className = 'slot';
            el.style.transform = `rotate(${i * 45}deg)`;
            el.innerText = s;
            wheel.appendChild(el);
        });
        this.updateUI();
    },

    adjBet(dir) {
        if(this.state.isRolling) return;
        this.state.betIdx = Math.max(0, Math.min(this.bets.length-1, this.state.betIdx + dir));
        this.updateUI();
    },

    toggleSpeed() {
        this.state.speed = (this.state.speed % 3) + 1;
        const dur = {1: '4s', 2: '2s', 3: '0.8s'}[this.state.speed];
        document.getElementById('wheel').style.transitionDuration = dur;
        this.updateUI();
    },

    toggleAuto() {
        this.state.auto = !this.state.auto;
        if(this.state.auto && !this.state.isRolling) this.roll();
        this.updateUI();
    },

    async roll() {
        const cost = this.bets[this.state.betIdx];
        if(this.state.isRolling || this.state.bal < cost) {
            this.state.auto = false; this.updateUI(); return;
        }

        this.state.isRolling = true;
        this.state.bal -= cost;
        document.getElementById('ui-hub').innerText = "SPINNING";
        document.getElementById('wheel').classList.add('blur');
        this.updateUI();

        const winIdx = Math.floor(Math.random() * 8);
        const rounds = this.state.speed === 1 ? 8 : (this.state.speed === 2 ? 5 : 3);
        const targetDeg = (360 - (this.state.deg % 360)) + (rounds * 360) - (winIdx * 45);
        this.state.deg += targetDeg;
        
        document.getElementById('wheel').style.transform = `rotate(${this.state.deg}deg)`;

        const times = {1: 4000, 2: 2000, 3: 800};
        setTimeout(() => {
            document.getElementById('wheel').classList.remove('blur');
            this.state.isRolling = false;
            const isWin = Math.random() > 0.7;
            if(isWin) {
                this.state.bal += cost * 3;
                document.getElementById('ui-hub').innerText = "WIN!";
            } else {
                document.getElementById('ui-hub').innerText = "LOSE";
            }
            this.updateUI();
            if(this.state.auto) setTimeout(() => this.roll(), 800);
        }, times[this.state.speed]);
    },

    updateUI() {
        document.getElementById('ui-bal').innerText = this.state.bal.toFixed(2);
        document.getElementById('ui-bet').innerText = this.bets[this.state.betIdx].toFixed(1);
        document.getElementById('opt-auto').className = this.state.auto ? "func-btn active" : "func-btn";
        document.getElementById('opt-auto').querySelector('b').innerText = this.state.auto ? "ON" : "OFF";
        document.getElementById('opt-speed').querySelector('b').innerText = this.state.speed + "X";
        document.getElementById('btn-go').disabled = this.state.isRolling;
    }
};

App.init();
</script>
</body>
</html>
