<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA · 旗舰量化终端</title>
    <style>
        /* 1. 还原 27444 墨绿拉丝背景质感 */
        body { 
            background: #0d120f; color: #fff; font-family: sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            background-image: linear-gradient(rgba(45, 62, 52, 0.3) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(45, 62, 52, 0.3) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        /* 2. 内陷式高级面板 */
        .panel { 
            background: #1a231e; margin: 10px 15px; padding: 25px; border-radius: 25px; 
            border: 1px solid #2d3e34; box-shadow: inset 0 0 25px rgba(0,0,0,0.9); text-align: center;
        }
        .bal-val { font-size: 60px; color: #ff5a5a; font-weight: bold; }

        /* 3. 核心雷达转盘：8神兽图标激活 */
        .wheel-box { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #wheel { 
            width: 320px; height: 320px; border-radius: 50%; border: 15px solid #233129;
            background: #1a231e;
            background-image: radial-gradient(#2d3e34 1px, transparent 1px), 
                              linear-gradient(#2d3e34 1px, transparent 1px), 
                              linear-gradient(90deg, #2d3e34 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
            position: relative; transition: transform 4s cubic-bezier(0.1, 0.9, 0.3, 1);
        }
        #wheel::after { 
            content: "准备"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 85px; height: 85px; background: #1a231e; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: #ff5a5a; font-weight: bold; font-size: 22px; border: 5px solid #233129; 
        }
        
        .node { position: absolute; width: 100%; height: 100%; text-align: center; display: flex; flex-direction: column; align-items: center; padding-top: 30px; box-sizing: border-box; }
        .node .icon { font-size: 28px; }
        .node .txt { font-size: 11px; color: #8aa095; font-weight: bold; }

        /* 4. 底部红色操作区：1:1 按键手感 */
        .footer { background: #3d0e0e; padding: 25px; border-radius: 35px 35px 0 0; border-top: 2px solid #631b1b; }
        .btn-row { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .side-btn { 
            width: 60px; height: 60px; background: #261111; border-radius: 18px; 
            color: #ff5a5a; font-size: 32px; display: flex; align-items: center; justify-content: center; 
            border: 1px solid #631b1b; cursor: pointer;
        }
        .main-btn { 
            background: #cc2929; color: #fff; padding: 20px 80px; border-radius: 45px; 
            font-size: 26px; font-weight: bold; border: none; box-shadow: 0 7px 0 #801a1a; cursor: pointer;
        }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 3px 0 #801a1a; }
        
        .nav { display: flex; justify-content: space-around; padding: 15px 0; background: #000; font-size: 11px; color: #8aa095; }
    </style>
</head>
<body>
    <div class="panel">
        <div style="color:#8aa095;">💰 可用余额 (USDT)</div>
        <div class="bal-val" id="balance">1000.00</div> <div style="color:#f1c40f; margin-top:8px;">🔥 单注额度: <span id="bet">10.0</span></div>
    </div>
    <div class="wheel-box">
        <div style="position:absolute; top:8%; left:50%; transform:translateX(-50%); width:0; height:0; border-left:20px solid transparent; border-right:20px solid transparent; border-top:30px solid #ff0000; z-index:10;"></div>
        <div id="wheel">
            <div class="node" style="transform:rotate(0deg)"><span class="icon">🐺</span><span class="txt">孤狼</span></div>
            <div class="node" style="transform:rotate(45deg)"><span class="icon">🦢</span><span class="txt">仙鹤</span></div>
            <div class="node" style="transform:rotate(90deg)"><span class="icon">🐢</span><span class="txt">玄武</span></div>
            <div class="node" style="transform:rotate(135deg)"><span class="icon">🦅</span><span class="txt">大鹏</span></div>
            <div class="node" style="transform:rotate(180deg)"><span class="icon">🐯</span><span class="txt">猛虎</span></div>
            <div class="node" style="transform:rotate(225deg)"><span class="icon">🦄</span><span class="txt">麒麟</span></div>
            <div class="node" style="transform:rotate(270deg)"><span class="icon">🐲</span><span class="txt">神龙</span></div>
            <div class="node" style="transform:rotate(315deg)"><span class="icon">🔥</span><span class="txt">凤凰</span></div>
        </div>
    </div>
    <div class="footer">
        <div class="btn-row">
            <div class="side-btn" onclick="changeBet(-1)">−</div>
            <button class="main-btn" onclick="startSpin()">▶ 执行抽取</button>
            <div class="side-btn" onclick="changeBet(1)">+</div>
        </div>
    </div>
    <div class="nav"><span>📈 行情</span><span>💹 资产</span><span>📜 记录</span><span style="color:#fff">🎚️ 终端</span></div>
    <script>
        let balance = 1000.00;
        let bet = 10.0;
        let isSpinning = false;
        function changeBet(val) { bet = Math.max(1, bet + val); document.getElementById('bet').innerText = bet.toFixed(1); }
        function startSpin() {
            if(isSpinning) return;
            if(balance < bet) { alert("余额不足！"); return; }
            isSpinning = true; balance -= bet;
            document.getElementById('balance').innerText = balance.toFixed(2);
            const deg = Math.floor(Math.random() * 360) + 1440;
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;
            setTimeout(() => { isSpinning = false; alert("量化同步成功！"); }, 4000);
        }
    </script>
</body>
</html>
