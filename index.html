<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V45_ROBOT_ACTIVE</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: monospace; }
        /* 经典机器人样式 */
        .robot { width: 140px; height: 180px; position: relative; animation: v45-dance 0.15s infinite alternate; filter: drop-shadow(0 0 15px #0f0); cursor: pointer; }
        .head { width: 90px; height: 70px; background: #222; border: 3px solid #0f0; border-radius: 12px; margin: 0 auto; position: relative; }
        .eyes { display: flex; justify-content: space-around; padding-top: 20px; }
        .eye { width: 18px; height: 18px; background: #0f0; border-radius: 50%; box-shadow: 0 0 15px #0f0; animation: blink 0.1s infinite; }
        .body-box { width: 110px; height: 60px; background: #222; border: 3px solid #0f0; border-radius: 8px; margin: 8px auto; display: flex; align-items: center; justify-content: center; color: #0f0; font-weight: bold; font-size: 24px; box-shadow: inset 0 0 10px #0f0; }
        /* 45级过载动作 */
        @keyframes v45-dance { from { transform: translateY(0) rotate(-3deg); filter: hue-rotate(0deg); } to { transform: translateY(-15px) rotate(3deg); filter: hue-rotate(90deg); } }
        @keyframes blink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
        /* 数字过载 */
        .num { font-size: 80px; font-weight: 900; color: #fff; text-shadow: 2px 2px #f00, -2px -2px #00f; margin-top: 20px; animation: shake 0.05s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(1px, -1px); } }
        /* 按钮与转转乐 */
        button { background: transparent; border: 2px solid #fff; color: #fff; padding: 15px 40px; margin-top: 30px; cursor: pointer; font-size: 20px; font-weight: bold; letter-spacing: 3px; }
        .spin-v45 { animation: spin 0.2s infinite linear !important; }
        @keyframes spin { from { transform: rotate(0deg) scale(1.6); } to { transform: rotate(360deg) scale(1.6); } }
    </style>
</head>
<body onclick="A()">
    <div class="robot" id="r"><div class="head"><div class="eyes"><div class="eye"></div><div class="eye"></div></div></div><div class="body-box">V45</div></div>
    <div class="num" id="n">1000</div>
    <button onclick="S()">幸运转转乐</button>
    <script>
        let ac=null; function S(){document.getElementById('r').classList.toggle('spin-v45');if(ac)P();}
        setInterval(()=>{document.getElementById('n').innerText=Math.floor(Math.random()*150)+850;},50);
        function A(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();}
        function P(){let o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.setValueAtTime(600,ac.currentTime);g.gain.setValueAtTime(0.1,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.1);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.1);}
    </script>
</body>
</html>
