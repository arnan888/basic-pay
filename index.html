<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>3D 牌九桌</title>
<style>
html,body{margin:0;overflow:hidden;background:#05070c}
canvas{display:block}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>
/* 场景 */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05070c);

/* 相机 */
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 8, 14);

/* 渲染 */
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

/* 控制 */
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0,0,0);

/* 灯光 */
scene.add(new THREE.AmbientLight(0x406080, 0.6));

const keyLight = new THREE.PointLight(0x66ccff, 1.2, 50);
keyLight.position.set(0,10,6);
scene.add(keyLight);

const rimLight = new THREE.PointLight(0x2244ff, 0.8, 50);
rimLight.position.set(-8,6,-6);
scene.add(rimLight);

/* 桌子 */
const tableGeo = new THREE.BoxGeometry(14,1.2,10);
const tableMat = new THREE.MeshStandardMaterial({
    color:0x0e3b2b,
    roughness:0.6,
    metalness:0.1
});
const table = new THREE.Mesh(tableGeo, tableMat);
table.position.y = -0.6;
scene.add(table);

/* 桌边 */
const edgeGeo = new THREE.BoxGeometry(14.4,1.4,10.4);
const edgeMat = new THREE.MeshStandardMaterial({
    color:0x1b0f08,
    roughness:0.4,
    metalness:0.2
});
const edge = new THREE.Mesh(edgeGeo, edgeMat);
edge.position.y = -0.7;
scene.add(edge);

/* 庄位圆盘 */
const dealerGeo = new THREE.CylinderGeometry(1.4,1.4,0.3,64);
const dealerMat = new THREE.MeshStandardMaterial({
    color:0x2b4f6a,
    metalness:0.6,
    roughness:0.25,
    emissive:0x113355
});
const dealer = new THREE.Mesh(dealerGeo, dealerMat);
dealer.position.y = 0.05;
scene.add(dealer);

/* 牌（立体块） */
function makeTile(x,z){
    const geo = new THREE.BoxGeometry(0.9,0.2,1.4);
    const mat = new THREE.MeshStandardMaterial({
        color:0xf2f2f2,
        roughness:0.3,
        metalness:0.05
    });
    const m = new THREE.Mesh(geo,mat);
    m.position.set(x,0.15,z);
    scene.add(m);
}

[-3,-1.8].forEach(x=>makeTile(x,2.8));
[1.8,3].forEach(x=>makeTile(x,2.8));
[-3,-1.8].forEach(x=>makeTile(x,-2.8));
[1.8,3].forEach(x=>makeTile(x,-2.8));

/* 筹码 */
function chip(x,z,color){
    const geo = new THREE.CylinderGeometry(0.35,0.35,0.18,48);
    const mat = new THREE.MeshStandardMaterial({
        color,
        metalness:0.7,
        roughness:0.25,
        emissive:color
    });
    const c = new THREE.Mesh(geo,mat);
    c.position.set(x,0.2,z);
    scene.add(c);
}

chip(-4,0,0x1ecad3);
chip(-4.5,0.1,0x3a7bff);
chip(4,0,0x8f3bff);
chip(4.5,0.1,0x20d08a);

/* 渲染循环 */
function animate(){
    requestAnimationFrame(animate);
    dealer.rotation.y += 0.002;
    controls.update();
    renderer.render(scene,camera);
}
animate();

/* 自适应 */
addEventListener('resize',()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
