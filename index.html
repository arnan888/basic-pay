<style>
    :root { --dark-bg: #0d120f; --accent: #ff5a5a; --grid: #1d2621; }
    body { background: var(--dark-bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    
    /* 1. 还原网格与内凹质感 */
    .panel { width: 90%; background: #161d18; border: 1px solid #2d3e34; border-radius: 20px; 
             background-image: radial-gradient(var(--grid) 1px, transparent 0); background-size: 20px 20px; 
             box-shadow: inset 0 0 15px #000; text-align: center; padding: 20px; margin-top: 20px;}
    
    /* 2. 转盘物理感：使用 cubic-bezier 模拟真实阻尼 */
    #wheel { width: 300px; height: 300px; border-radius: 50%; border: 10px solid #222c26;
             position: relative; transition: transform 5s cubic-bezier(0.15, 0, 0, 1); background: #1a251f; }
    .hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
           width: 80px; height: 80px; background: #161d18; border-radius: 50%; border: 3px solid #222c26;
           display: flex; align-items: center; justify-content: center; color: var(--accent); font-weight: bold; }
    
    /* 3. 底部控制布局 */
    .controls { width: 100%; display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; padding: 20px; background: #000; position: fixed; bottom: 0; }
    .btn-side { background: #1a1a1a; border: 1px solid #333; color: var(--accent); border-radius: 12px; font-size: 24px; height: 60px; }
    .btn-main { background: linear-gradient(180deg, #c0392b, #8e2121); border-radius: 30px; border: none; color: #fff; font-size: 20px; font-weight: bold; box-shadow: 0 4px 0 #5e1616; }
    .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #5e1616; }
</style>

<div class="panel">
    <div style="color: #8aa095; font-size: 12px;">可用余额 (USDT)</div>
    <div id="ui-bal" style="font-size: 50px; color: var(--accent); font-weight: 900;">146.8</div>
    <div style="color: #f1c40f; font-size: 14px;">🔥 单注额度: <span id="ui-bet">5.5</span></div>
</div>

<div style="flex: 1; display: flex; align-items: center; justify-content: center; position: relative;">
    <div style="position: absolute; top: 20%; width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 20px solid red; z-index: 10;"></div>
    <div id="wheel">
        <div class="hub" id="ui-hub">准备</div>
        </div>
</div>

<div class="controls">
    <button class="btn-side" onclick="act.change(-1)">−</button>
    <button class="btn-main" onclick="act.go()">▶ 执行抽取</button>
    <button class="btn-side" onclick="act.change(1)">+</button>
</div>

<script>
const act = {
    bets: [5.5, 7.5, 10.0, 20.0, 50.0],
    idx: 0, bal: 146.8, deg: 0, busy: false,
    
    // 档位切换（死滑关键：直接映射数组）
    change(d) {
        if(this.busy) return;
        this.idx = Math.max(0, Math.min(this.bets.length-1, this.idx + d));
        document.getElementById('ui-bet').innerText = this.bets[this.idx].toFixed(1);
    },
    
    // 执行抽取（挂外网关键：状态锁 + 物理步进）
    go() {
        if(this.busy || this.bal < this.bets[this.idx]) return;
        this.busy = true;
        this.bal -= this.bets[this.idx];
        this.update();
        
        const wheel = document.getElementById('wheel');
        const hub = document.getElementById('ui-hub');
        hub.innerText = "X0";
        
        // 核心旋转逻辑：保证每次停在格子正中
        const target = Math.floor(Math.random() * 8);
        this.deg += (360 * 10) + (target * 45); 
        wheel.style.transform = `rotate(${this.deg}deg)`;
        
        setTimeout(() => {
            this.busy = false;
            if(Math.random() > 0.7) this.bal += this.bets[this.idx] * 2.5; // 模拟返奖
            hub.innerText = "准备";
            this.update();
        }, 5000);
    },
    
    update() { document.getElementById('ui-bal').innerText = this.bal.toFixed(1); }
};

// 初始化8个图标位置
const icons = ['🦢','🐺','🐯','🐢','🦌','🐲','🔥','🦅'];
icons.forEach((s, i) => {
    const el = document.createElement('div');
    el.style.position = 'absolute'; el.style.width = '100%'; el.style.textAlign = 'center';
    el.style.top = '20px'; el.style.fontSize = '24px';
    el.style.transformOrigin = '50% 130px'; // 围绕中心点偏移
    el.style.transform = `rotate(${i * 45}deg)`;
    el.innerText = s;
    document.getElementById('wheel').appendChild(el);
});
</script>
