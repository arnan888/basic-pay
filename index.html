<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>TERMINAL_V21000_DIRECTION_FIX</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --gold: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { background: #000; color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }

        /* 终端背景：横向扫描 */
        .bg { position: fixed; inset: 0; background: linear-gradient(90deg, rgba(0,242,255,0.01) 1px, transparent 1px); background-size: 40px 100%; z-index: 1; pointer-events: none; }

        .app-root { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 0; }

        /* 1. 余额区 (最上方) */
        .top-bar {
            border: 2px solid var(--neon); padding: 10px 50px; border-radius: 15px;
            box-shadow: 0 0 20px var(--neon); background: rgba(0,0,0,0.8);
        }
        .bal-val { font-size: 52px; font-weight: 900; text-shadow: 0 0 10px var(--neon); }

        /* 2. 核心转盘 (中间，方向校准) */
        .stage { position: relative; width: 340px; height: 340px; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        
        /* 截图同款：白色正上方指针 */
        .needle { position: absolute; top: -15px; width: 4px; height: 65px; background: #fff; box-shadow: 0 0 20px #fff; z-index: 100; border-radius: 2px; }

        .vortex {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #222, #000);
            border: 2px solid #333; position: relative;
            overflow: hidden; /* 物理禁锢 */
            transition: transform 6s cubic-bezier(0.1, 0, 0, 1);
        }

        /* 3. 图标位置校准：让第一个图标正对指针 */
        .slot { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transform-origin: center; }
        .slot b { 
            position: absolute; top: 15%; font-size: 70px; 
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); 
            transition: 0.3s;
        }

        /* 核心 RUN */
        .run-trigger {
            position: absolute; width: 105px; height: 105px; border-radius: 50%;
            background: #000; border: 4px solid var(--pink); color: var(--pink);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 900; cursor: pointer; z-index: 200;
            box-shadow: 0 0 30px var(--pink);
        }
        .run-trigger:active { transform: scale(0.85); }

        /* 4. 控制台 (最下方) */
        .footer { text-align: center; }
        #status { font-size: 26px; color: var(--gold); margin-bottom: 20px; font-weight: 900; height: 30px; letter-spacing: 2px; }
        .bet-box { display: flex; align-items: center; gap: 50px; background: rgba(255,255,255,0.05); padding: 5px 30px; border-radius: 40px; }
        .btn { font-size: 50px; color: #444; cursor: pointer; width: 50px; }
        .btn:active { color: #fff; }
        .bet-num { font-size: 70px; font-weight: 900; min-width: 120px; }

        /* 震耳欲聋：3D 缩放震动 */
        .bass-act { animation: seismic 0.08s infinite; }
        @keyframes seismic { 
            0% { transform: scale(1.03) translate(2px, 2px); } 
            50% { transform: scale(0.97) translate(-2px, -2px); } 
            100% { transform: scale(1) translate(0,0); } 
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="app-root" id="ui">
        <!-- 余额 -->
        <div class="top-bar">
            <div class="bal-val" id="bal">1,000</div>
        </div>

        <!-- 核心区 -->
        <div class="stage" id="stage">
            <div class="needle"></div>
            <div id="vortex" class="vortex">
                <!-- 初始角度校准，确保 0 度在正上方 -->
                <div class="slot" style="transform:rotate(0deg)"><b>👑</b></div>
                <div class="slot" style="transform:rotate(60deg)"><b>🦁</b></div>
                <div class="slot" style="transform:rotate(120deg)"><b>🐯</b></div>
                <div class="slot" style="transform:rotate(180deg)"><b>🦅</b></div>
                <div class="slot" style="transform:rotate(240deg)"><b>🐺</b></div>
                <div class="slot" style="transform:rotate(300deg)"><b>🐕</b></div>
            </div>
            <div class="run-trigger" onclick="launch()">RUN</div>
        </div>

        <!-- 控制台 -->
        <div class="footer">
            <div id="status">TERMINAL_READY</div>
            <div class="bet-box">
                <div class="btn" onclick="adjBet(-10)">-</div>
                <div class="bet-num" id="bet">1</div>
                <div class="btn" onclick="adjBet(10)">+</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let balance = 1000, betVal = 1, rotation = 0, isSpinning = false;

        function adjBet(v) {
            if(isSpinning) return;
            betVal = Math.max(1, Math.min(balance, betVal + v));
            document.getElementById('bet').innerText = betVal;
            tg.HapticFeedback.selectionChanged();
        }

        function launch() {
            if(isSpinning || balance < betVal) return;
            isSpinning = true;
            balance -= betVal;
            document.getElementById('bal').innerText = balance.toLocaleString();
            document.getElementById('status').innerText = "VORTEX_INIT...";
            document.getElementById('stage').classList.add('bass-act');
            tg.HapticFeedback.impactOccurred('heavy');

            // 目标校准：让随机到的索引对应图标转到 0 度（正上方）
            let targetIdx = Math.floor(Math.random() * 6);
            // 这里是关键：转动角度 = 圈数 + (360 - 目标索引的角度)
            rotation += (3600 + (360 - (targetIdx * 60)));
            
            document.getElementById('vortex').style.transform = `rotate(${rotation}deg)`;

            // 为了让图标保持正立不晕，给图标一个反向补偿动画（可选，增加探索欲望）
            // 这里我们保持图标随盘转，更有“禁锢感”

            setTimeout(() => {
                document.getElementById('stage').classList.remove('bass-act');
                const payouts = [88, 15, 10, 5, 2, 0];
                let win = Math.floor(betVal * payouts[targetIdx]);
                balance += win;
                document.getElementById('bal').innerText = balance.toLocaleString();
                document.getElementById('status').innerText = win > 0 ? "WIN: +" + win : "CORE_LOST";
                tg.HapticFeedback.notificationOccurred(win > 0 ? 'success' : 'error');
                isSpinning = false;
            }, 6000);
        }
    </script>
</body>
</html>
