<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>龙虎斗 · 立体直角版</title>
    <style>
        /* 彻底重置，所有边角为0 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            padding: 20px;
        }
        /* 最外层：立体凸起（无圆边） */
        .game-container {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            background: #3a3a4a;
            /* 外凸立体感：右下深色阴影 + 左上浅色高光 */
            box-shadow: 
                8px 8px 12px rgba(0,0,0,0.6),
                -4px -4px 8px rgba(255,255,255,0.2),
                inset 0 0 0 1px rgba(255,255,255,0.15);
            padding: 8px;
        }
        /* 内层：明显下陷（无圆边） */
        .game-content {
            background: #1e1e2a;
            /* 内陷效果：深色内阴影 + 顶部强压暗 */
            box-shadow: 
                inset 0 0 0 2px #0a0a0f,
                inset 4px 4px 12px rgba(0,0,0,0.8),
                inset -2px -2px 6px rgba(255,255,255,0.1);
            padding: 4px;
        }
        /* 战斗场景区：直角方形 */
        .battle-scene {
            position: relative;
            margin: 12px;
            background: #000;
            aspect-ratio: 16 / 9;
            cursor: pointer;
            box-shadow: inset 0 0 0 2px #2a2a3a;
            overflow: hidden;
        }
        .scene-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2a2a2a, #111);
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        .scene-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .dragon-word, .tiger-word {
            position: absolute;
            bottom: 12px;
            font-size: 48px;
            font-weight: 900;
            text-shadow: 3px 3px 0 #000;
            z-index: 10;
            opacity: 0.95;
        }
        .dragon-word { left: 12px; color: #ff4444; }
        .tiger-word { right: 12px; color: #4488ff; }
        .highlight-win {
            transform: scale(1.2);
            text-shadow: 0 0 15px currentColor;
        }
        .battle-result {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            padding: 6px 20px;
            color: #ffcc66;
            font-weight: bold;
            font-size: 16px;
            z-index: 20;
            white-space: nowrap;
            border: 1px solid #ffaa44;
            box-shadow: inset 0 0 0 1px #ffaa44, 0 0 8px #ffaa44;
            pointer-events: none;
        }
        /* 下注区域 - 直角设计 */
        .bet-section {
            padding: 16px 12px;
        }
        /* 账户栏 - 立体凸起小方块 */
        .account-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2d2d3a;
            padding: 10px 16px;
            margin-bottom: 16px;
            box-shadow: 4px 4px 6px rgba(0,0,0,0.5), -2px -2px 4px rgba(255,255,255,0.1), inset 0 0 0 1px rgba(255,255,255,0.1);
        }
        .account-info {
            font-size: 14px;
            color: #ddd;
        }
        .account-info span {
            color: #ffaa44;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn-sm {
            background: #3a3a4a;
            border: none;
            padding: 6px 16px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 3px 3px 5px rgba(0,0,0,0.5), -1px -1px 2px rgba(255,255,255,0.1);
        }
        .btn-sm:active {
            transform: translate(1px, 1px);
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5);
        }
        /* 三列押注卡片 - 凸起方块 */
        .multi-bet-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .multi-bet-item {
            flex: 1;
            min-width: 100px;
            background: #2d2d3a;
            padding: 16px 8px;
            text-align: center;
            box-shadow: 6px 6px 10px rgba(0,0,0,0.5), -3px -3px 6px rgba(255,255,255,0.1), inset 0 0 0 1px rgba(255,255,255,0.08);
        }
        .multi-bet-item.selected {
            background: #ffaa44;
            transform: translateY(-2px);
            box-shadow: 8px 8px 12px rgba(0,0,0,0.6), -2px -2px 4px rgba(255,255,255,0.2);
        }
        .multi-bet-name {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .multi-bet-name.dragon { color: #ff7777; }
        .multi-bet-name.tiger { color: #77aaff; }
        .multi-bet-name.tie { color: #cc77ff; }
        .multi-bet-item.selected .multi-bet-name { color: #1a1a2a; }
        
        .bet-amount-wrapper {
            background: #1a1a24;
            margin: 10px 0;
            padding: 8px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.6), inset -1px -1px 2px rgba(255,255,255,0.1);
        }
        .multi-bet-amount {
            font-size: 28px;
            font-weight: 900;
            color: #ffcc44;
        }
        .multi-bet-item.selected .multi-bet-amount {
            color: #1e1e2e;
        }
        .multi-bet-control {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 12px 0;
        }
        .multi-bet-control button, .quick-bet {
            background: #1e1e2e;
            border: none;
            padding: 6px 14px;
            color: #ffaa44;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 5px rgba(0,0,0,0.5), -1px -1px 2px rgba(255,255,255,0.1);
        }
        .multi-bet-control button:active, .quick-bet:active {
            transform: translate(1px, 1px);
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5);
        }
        .quick-bet-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        /* 数据卡片 */
        .data-stack {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 20px 0;
        }
        .data-item {
            background: #2d2d3a;
            padding: 12px;
            text-align: center;
            box-shadow: 5px 5px 8px rgba(0,0,0,0.5), -2px -2px 4px rgba(255,255,255,0.1), inset 0 0 0 1px rgba(255,255,255,0.08);
        }
        .data-item label {
            font-size: 13px;
            color: #aaa;
        }
        .data-item value {
            font-size: 28px;
            font-weight: bold;
            color: #ffaa44;
            display: block;
        }
        /* 计时和速度 */
        .timer-text {
            text-align: center;
            font-size: 22px;
            color: #ffaa44;
            margin: 16px 0;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }
        .speed-select {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 16px 0;
        }
        .speed-btn {
            background: #2d2d3a;
            border: none;
            padding: 6px 28px;
            color: #aaa;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 6px rgba(0,0,0,0.5), -2px -2px 4px rgba(255,255,255,0.1);
        }
        .speed-btn.active {
            background: #ffaa44;
            color: #1a1a2a;
        }
        /* 历史区域 - 内陷明显 */
        .history-area {
            background: #1a1a24;
            padding: 16px;
            margin: 20px 0;
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.6), inset -2px -2px 5px rgba(255,255,255,0.1);
        }
        .history-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .history-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            background: #2a2a34;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5), inset -1px -1px 2px rgba(255,255,255,0.1);
        }
        .history-cell.dragon { background: #ff5555; color: white; }
        .history-cell.tiger { background: #55aaff; color: white; }
        .history-cell.tie { background: #bb77ff; color: white; }
        .record-list {
            max-height: 120px;
            overflow-y: auto;
            font-size: 12px;
        }
        .record-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #2a2a34;
        }
        /* 底部按钮 */
        .exec-row {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .exec-btn {
            flex: 1;
            padding: 14px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            background: #2d2d3a;
            color: white;
            border: none;
            box-shadow: 5px 5px 8px rgba(0,0,0,0.5), -2px -2px 4px rgba(255,255,255,0.1);
        }
        .exec-btn:active {
            transform: translate(1px, 1px);
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.5);
        }
        .main-go {
            background: #b71c1c;
            box-shadow: 5px 5px 8px rgba(0,0,0,0.6), -1px -1px 2px rgba(255,255,255,0.2);
        }
        .bottom-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
        }
        .stat-card {
            background: #2d2d3a;
            padding: 12px;
            text-align: center;
            box-shadow: 5px 5px 8px rgba(0,0,0,0.5), -2px -2px 4px rgba(255,255,255,0.1);
        }
        .stat-card span:first-child {
            display: block;
            font-size: 12px;
            color: #ccc;
        }
        .stat-card span:last-child {
            font-size: 26px;
            font-weight: bold;
            color: #ffcc44;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2a2a3a;
            width: 85%;
            max-width: 340px;
            padding: 24px;
            text-align: center;
            color: white;
            box-shadow: 8px 8px 16px rgba(0,0,0,0.6), -4px -4px 8px rgba(255,255,255,0.1);
        }
        .modal-content button {
            background: #ffaa44;
            border: none;
            padding: 10px 24px;
            margin-top: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 5px rgba(0,0,0,0.5);
        }
        button, .btn-sm, .exec-btn, .speed-btn, .quick-bet {
            pointer-events: auto !important;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-content">
        <div class="battle-scene" id="battleScene">
            <div class="scene-bg" id="sceneBg"></div>
            <div class="dragon-word" id="dragonWord">龍</div>
            <div class="tiger-word" id="tigerWord">虎</div>
            <div class="battle-result" id="battleResult"></div>
        </div>

        <div class="bet-section">
            <div class="account-bar">
                <div class="account-info">👤 <span id="currentUserId">登录中</span></div>
                <div class="btn-group">
                    <button id="myHistoryBtn" class="btn-sm">📜 记录</button>
                    <button id="newUserBtn" class="btn-sm">✨ 新用户</button>
                </div>
            </div>
            <div class="account-bar" style="margin-bottom: 20px;">
                <div style="display: flex; gap: 8px; width:100%;">
                    <input type="text" id="switchUserIdInput" placeholder="切换用户ID" style="flex:2; background:#1a1a24; border:1px solid #ffaa44; padding: 8px 16px; color:white; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5);">
                    <button id="switchUserBtn" class="btn-sm">切换</button>
                </div>
            </div>

            <div class="multi-bet-item" data-type="DRAGON">
                <div class="multi-bet-name dragon">🐉 龙</div>
                <div class="bet-amount-wrapper">
                    <div class="multi-bet-amount" id="betDragonAmount">0 rmb</div>
                </div>
                <div class="multi-bet-control">
                    <button class="clear-bet" data-type="DRAGON">清空</button>
                </div>
                <div class="quick-bet-row">
                    <button class="quick-bet" data-type="DRAGON" data-amount="10">+10</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="20">+20</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="50">+50</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="100">+100</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="500">+500</button>
                </div>
            </div>

            <div class="multi-bet-item" data-type="TIE">
                <div class="multi-bet-name tie">⚖️ 和</div>
                <div class="bet-amount-wrapper">
                    <div class="multi-bet-amount" id="betTieAmount">0 rmb</div>
                </div>
                <div class="multi-bet-control">
                    <button class="clear-bet" data-type="TIE">清空</button>
                </div>
                <div class="quick-bet-row">
                    <button class="quick-bet" data-type="TIE" data-amount="10">+10</button>
                    <button class="quick-bet" data-type="TIE" data-amount="20">+20</button>
                    <button class="quick-bet" data-type="TIE" data-amount="50">+50</button>
                    <button class="quick-bet" data-type="TIE" data-amount="100">+100</button>
                    <button class="quick-bet" data-type="TIE" data-amount="500">+500</button>
                </div>
            </div>

            <div class="multi-bet-item" data-type="TIGER">
                <div class="multi-bet-name tiger">🐯 虎</div>
                <div class="bet-amount-wrapper">
                    <div class="multi-bet-amount" id="betTigerAmount">0 rmb</div>
                </div>
                <div class="multi-bet-control">
                    <button class="clear-bet" data-type="TIGER">清空</button>
                </div>
                <div class="quick-bet-row">
                    <button class="quick-bet" data-type="TIGER" data-amount="10">+10</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="20">+20</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="50">+50</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="100">+100</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="500">+500</button>
                </div>
            </div>

            <div class="data-stack">
                <div class="data-item"><label>总押注</label><value id="totalBetAmount">0.00</value></div>
                <div class="data-item"><label>预计奖金</label><value id="valWin">0.00</value></div>
            </div>

            <div class="timer-text">⏱️ 下一局: <span id="countdownNum">30</span> 秒</div>
            <div class="speed-select">
                <span class="speed-btn active" data-speed="1">1X</span>
                <span class="speed-btn" data-speed="2">2X</span>
                <span class="speed-btn" data-speed="3">3X</span>
            </div>

            <div class="history-area">
                <div class="history-grid" id="historyGrid"></div>
                <div class="record-list" id="recordList"></div>
            </div>

            <div class="exec-row">
                <button class="exec-btn" id="refreshBtn">🔄 刷新</button>
                <button class="exec-btn" id="repeatBtn">🔁 续押</button>
                <button class="exec-btn" id="cancelBtn">❌ 取消</button>
                <button class="exec-btn main-go" id="fightBtn">🎲 确认</button>
            </div>

            <div class="bottom-stats">
                <div class="stat-card"><span>💰 余额</span><span id="balanceDisplay">100.00</span></div>
                <div class="stat-card"><span>🎰 彩金池</span><span id="poolDisplay">50000.00</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        let speechEnabled = false;
        document.body.addEventListener('click', () => { if (!speechEnabled && window.speechSynthesis) speechEnabled = true; }, { once: true });
        function speak(t) { if (speechEnabled && window.speechSynthesis) { let u = new SpeechSynthesisUtterance(t); u.lang = 'zh-CN'; u.rate = 1.2; speechSynthesis.cancel(); speechSynthesis.speak(u); } }

        let users = JSON.parse(localStorage.getItem('dragon_tiger_users')) || {};
        let CURRENT_USER_ID = "6685731895";
        if (!users[CURRENT_USER_ID]) users[CURRENT_USER_ID] = { balance: 100, records: [], resultHistory: [] };
        let ADMIN_PASSWORD = localStorage.getItem('dragon_tiger_password') || "dragon888";
        function saveUsers() { localStorage.setItem('dragon_tiger_users', JSON.stringify(users)); }
        function getBalance(uid) { if (!users[uid]) users[uid] = { balance: 100, records: [], resultHistory: [] }; return users[uid].balance; }
        function setBalance(uid, amt) { if (!users[uid]) users[uid] = { balance: 100, records: [], resultHistory: [] }; users[uid].balance = amt; saveUsers(); }
        function addBalance(uid, delta) { setBalance(uid, getBalance(uid) + delta); }
        function getUserList() { return Object.keys(users); }
        function generateRandomId() { return "user_" + Math.floor(Math.random() * 1000000); }

        function showModal(msg, btnText) {
            let m = document.createElement('div'); m.className = 'modal';
            m.innerHTML = `<div class="modal-content"><h3>📢 提示</h3><p>${msg}</p><button id="modalCloseBtn">${btnText}</button></div>`;
            document.body.appendChild(m);
            document.getElementById('modalCloseBtn').onclick = () => m.remove();
        }

        function showMyHistory() {
            let recs = users[CURRENT_USER_ID]?.records || [];
            let html = `<div style="max-height:300px; overflow-y:auto; text-align:left;">`;
            if (recs.length === 0) html += "<p>暂无记录</p>";
            else recs.slice(0, 30).forEach(r => { html += `<div style="padding:8px; border-bottom:1px solid #555;"><span>${r.time}</span> 押 ${r.bet} → ${r.result} <span style="color:${r.win>0?'#4caf50':'#f44336'}">${r.win>0?`+${r.win}`:`-${r.amount}`}</span></div>`; });
            html += `</div><button id="closeHistoryBtn" style="margin-top:12px;">关闭</button>`;
            let modal = document.createElement('div'); modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><h3>📜 我的记录</h3>${html}</div>`;
            document.body.appendChild(modal);
            document.getElementById('closeHistoryBtn').onclick = () => modal.remove();
        }
        document.getElementById('myHistoryBtn').onclick = showMyHistory;
        document.getElementById('newUserBtn').onclick = () => {
            let newId = generateRandomId();
            document.getElementById('switchUserIdInput').value = newId;
            switchUser();
            showModal(`新账户：${newId}，初始余额 0 rmb`, "开始");
        };

        function getResultHistory(uid) { return users[uid]?.resultHistory || []; }
        function pushResult(uid, res) {
            if (!users[uid]) users[uid] = { balance: 100, records: [], resultHistory: [] };
            let arr = users[uid].resultHistory || [];
            arr.unshift(res);
            if (arr.length > 10) arr.pop();
            users[uid].resultHistory = arr;
            saveUsers();
            if (uid === CURRENT_USER_ID) updateHistoryGrid();
        }

        function updateHistoryGrid() {
            const grid = document.getElementById('historyGrid');
            if (!grid) return;
            const hist = getResultHistory(CURRENT_USER_ID);
            grid.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const cell = document.createElement('div');
                cell.className = 'history-cell';
                if (i < hist.length) {
                    const r = hist[i];
                    cell.classList.add(r === '龙' ? 'dragon' : (r === '虎' ? 'tiger' : 'tie'));
                    cell.textContent = r === '龙' ? '🐉' : (r === '虎' ? '🐯' : '⚖️');
                } else { cell.textContent = '?'; }
                grid.appendChild(cell);
            }
        }

        function addRecord(uid, betType, result, win, betAmt) {
            if (!users[uid]) users[uid] = { balance: 100, records: [], resultHistory: [] };
            let recs = users[uid].records || [];
            recs.unshift({ time: new Date().toLocaleTimeString(), bet: betType, result: result, win: win, amount: betAmt });
            if (recs.length > 50) recs.pop();
            users[uid].records = recs;
            saveUsers();
            if (uid === CURRENT_USER_ID) refreshRecordDisplay();
        }

        function refreshRecordDisplay() {
            const container = document.getElementById('recordList');
            if (!container) return;
            const recs = users[CURRENT_USER_ID]?.records || [];
            container.innerHTML = '';
            if (recs.length === 0) { container.innerHTML = '<div style="text-align:center; color:#aaa;">暂无记录</div>'; return; }
            recs.slice(0, 10).forEach(r => {
                const div = document.createElement('div');
                div.className = 'record-item';
                const isWin = r.win > 0;
                div.innerHTML = `<span>${r.time}</span><span>押 ${r.bet} → ${r.result}</span><span style="color:${isWin?'#4caf50':'#f44336'}">${isWin ? `+${r.win}` : `-${r.amount}`}</span>`;
                container.appendChild(div);
            });
        }

        let isAnimating = false;
        function showResultAnimation(result, winAmount, betAmount, callback) {
            if (isAnimating) return;
            isAnimating = true;
            const btns = document.querySelectorAll('.quick-bet, .clear-bet, #fightBtn, #repeatBtn, #cancelBtn, .speed-btn, #switchUserBtn, #newUserBtn, #refreshBtn');
            btns.forEach(btn => btn.disabled = true);
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:10000;';
            const box = document.createElement('div');
            box.style.cssText = 'background:#2a2a3a;padding:40px 60px;text-align:center;box-shadow:0 0 30px gold;';
            const icon = document.createElement('div');
            icon.style.fontSize = '80px';
            icon.style.marginBottom = '20px';
            if (result === '龙') icon.textContent = '🐉';
            else if (result === '虎') icon.textContent = '🐯';
            else icon.textContent = '⚖️';
            const resultText = document.createElement('div');
            resultText.style.fontSize = '40px';
            resultText.style.fontWeight = 'bold';
            resultText.style.color = '#ffaa44';
            resultText.textContent = result;
            const info = document.createElement('div');
            info.style.marginTop = '16px';
            info.style.fontSize = '24px';
            info.style.color = winAmount > 0 ? '#ffaa44' : '#ff8888';
            info.textContent = winAmount > 0 ? `🎉 中奖 +${winAmount} rmb` : '😞 未中奖';
            box.appendChild(icon); box.appendChild(resultText); box.appendChild(info);
            overlay.appendChild(box);
            document.body.appendChild(overlay);
            speak(result);
            setTimeout(() => { overlay.remove(); btns.forEach(btn => btn.disabled = false); isAnimating = false; if (callback) callback(); }, 1800);
        }

        function flashAndPop(result) {
            const el = document.getElementById('battleResult');
            if (el) { el.classList.add('pop'); setTimeout(() => el.classList.remove('pop'), 300); }
            const word = result === '龙' ? document.getElementById('dragonWord') : (result === '虎' ? document.getElementById('tigerWord') : null);
            if (word) { word.classList.add('highlight-win'); setTimeout(() => word.classList.remove('highlight-win'), 600); }
        }

        let state = {
            balance: getBalance(CURRENT_USER_ID),
            bets: { DRAGON: 0, TIGER: 0, TIE: 0 },
            betRolling: false,
            autoMode: true,
            speed: 1,
            pool: 50000,
            countdown: 30,
            countdownInterval: null
        };
        let lastBet = null;

        function getCountdownSec() { return state.speed===1?30:(state.speed===2?20:10); }
        function syncBalance() { state.balance = getBalance(CURRENT_USER_ID); updateUI(); }

        function placeBet(type, amount) {
            if (state.betRolling || isAnimating) return false;
            if (amount <= 0) return false;
            if (amount > state.balance) { showModal("余额不足！当前余额：" + state.balance.toFixed(2) + " rmb", "知道了"); return false; }
            state.betRolling = true;
            const outcomes = ['龙', '虎', '和'];
            const result = outcomes[Math.floor(Math.random() * 3)];
            let win = 0;
            let betTypeName = "";
            if (type === "DRAGON") betTypeName = "龙";
            else if (type === "TIGER") betTypeName = "虎";
            else if (type === "TIE") betTypeName = "和";
            if (betTypeName === result) { if (result === '和') win = amount * 8; else win = amount * 2; }
            const newBalance = state.balance - amount + win;
            setBalance(CURRENT_USER_ID, newBalance);
            state.balance = newBalance;
            updateUI();
            addRecord(CURRENT_USER_ID, betTypeName, result, win, amount);
            pushResult(CURRENT_USER_ID, result);
            flashAndPop(result);
            document.getElementById('battleResult').innerText = win > 0 ? `🎲 开奖: ${result}  ✅ 中奖 +${win.toFixed(2)} rmb` : `🎲 开奖: ${result}  ❌ 未中奖`;
            showResultAnimation(result, win, amount, () => { if (state.autoMode) { clearCountdown(); startCountdown(getCountdownSec()); } });
            state.betRolling = false;
            return true;
        }

        function executeBet() {
            if (state.betRolling || isAnimating) return;
            let selectedType = null, selectedAmount = 0;
            if (state.bets.DRAGON > selectedAmount) { selectedType = "DRAGON"; selectedAmount = state.bets.DRAGON; }
            if (state.bets.TIGER > selectedAmount) { selectedType = "TIGER"; selectedAmount = state.bets.TIGER; }
            if (state.bets.TIE > selectedAmount) { selectedType = "TIE"; selectedAmount = state.bets.TIE; }
            if (!selectedType) return;
            const betType = { DRAGON:"龙", TIGER:"虎", TIE:"和" }[selectedType];
            lastBet = { type: betType, amount: selectedAmount };
            clearCountdown();
            placeBet(selectedType, selectedAmount);
            state.bets = { DRAGON: 0, TIGER: 0, TIE: 0 };
            updateUI();
        }

        function repeatLastBet() { if(lastBet && !state.betRolling && !isAnimating) placeBet(lastBet.type === "龙" ? "DRAGON" : (lastBet.type === "虎" ? "TIGER" : "TIE"), lastBet.amount); }
        function cancelAllBets() { if(!state.betRolling && !isAnimating){ state.bets = { DRAGON:0, TIGER:0, TIE:0 }; updateUI(); } }

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
            document.getElementById('poolDisplay').innerText = state.pool.toFixed(2);
            document.getElementById('betDragonAmount').innerHTML = state.bets.DRAGON + " rmb";
            document.getElementById('betTigerAmount').innerHTML = state.bets.TIGER + " rmb";
            document.getElementById('betTieAmount').innerHTML = state.bets.TIE + " rmb";
            const total = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
            document.getElementById('totalBetAmount').innerText = total.toFixed(2);
            let maxWin = 0;
            if (state.bets.DRAGON > 0) maxWin = Math.max(maxWin, state.bets.DRAGON * 2);
            if (state.bets.TIGER > 0) maxWin = Math.max(maxWin, state.bets.TIGER * 2);
            if (state.bets.TIE > 0) maxWin = Math.max(maxWin, state.bets.TIE * 8);
            document.getElementById('valWin').innerText = maxWin.toFixed(2);
            document.querySelectorAll('.multi-bet-item').forEach(el => { const type = el.dataset.type; if (state.bets[type] > 0) el.classList.add('selected'); else el.classList.remove('selected'); });
        }
