<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙虎斗 · 暗涌终端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0c0c0c;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        /* 外发光边框 */
        .container-outer {
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%;
            animation: outerNeonRotate 15s linear infinite;
            padding: 6px;
            border-radius: 28px;
            box-shadow: 0 0 40px rgba(255,255,255,0.5);
        }

        @keyframes outerNeonRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 主容器 内凹质感 */
        .container {
            width: 100%;
            height: 100%;
            background: #4a7c64;
            border-radius: 22px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 16px 16px 24px rgba(0,0,0,0.8), inset -8px -8px 12px rgba(255,255,255,0.06);
            overflow: hidden;
        }

        /* 头部余额区域 */
        .header {
            height: 9%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 8px 12px;
        }

        .box {
            background: #6b737e;
            border: 2px solid #2c4a3b;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            box-shadow: inset 16px 16px 24px rgba(0,0,0,0.8), inset -8px -8px 12px rgba(255,255,255,0.06);
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        .box span:first-child {
            font-size: 12px;
            color: #ccc;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .box span:last-child {
            font-size: 22px;
            font-weight: bold;
            color: #ff4d4d;
            text-shadow: 0 0 6px #f1c40f;
        }

        /* 战场区域 */
        .battle-scene {
            height: 46%;
            position: relative;
            margin: 4px 10px;
            border: 3px solid #2c4a3b;
            border-radius: 24px;
            overflow: hidden;
            background: #0a0a0a;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
        }

        .scene-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 1;
            background-size: cover;
            background-position: center;
        }

        .scene-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .dragon, .tiger {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 90px;
            height: 90px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.25);
            border-radius: 20px;
            backdrop-filter: blur(3px);
            transition: all 0.2s;
        }

        .dragon {
            left: 15px;
        }

        .tiger {
            right: 15px;
        }

        .dragon img, .tiger img,
        .dragon video, .tiger video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }

        /* 柔和浮动，无夸张动图效果 */
        @keyframes gentleFloat {
            0% { transform: translateY(-50%) translateY(0); }
            100% { transform: translateY(-50%) translateY(-6px); }
        }
        .dragon, .tiger {
            animation: gentleFloat 2.2s ease-in-out infinite alternate;
        }

        /* 开奖结果专用栏 - 只显示中奖/未中，美观且不干扰 */
        .battle-result {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 15px;
            font-weight: bold;
            color: #ffecb3;
            text-shadow: 0 0 8px #ff8c00;
            background: rgba(0,0,0,0.65);
            padding: 4px 18px;
            border-radius: 40px;
            z-index: 20;
            backdrop-filter: blur(6px);
            pointer-events: none;
            white-space: nowrap;
            font-family: monospace;
            transition: opacity 0.2s;
        }

        /* 下注面板 */
        .play-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #6b737e;
            margin: 6px 10px 10px 10px;
            border: 3px solid #2c4a3b;
            border-radius: 20px;
            padding: 12px;
            box-shadow: inset 16px 16px 24px rgba(0,0,0,0.8), inset -8px -8px 12px rgba(255,255,255,0.06);
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        .account-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.45);
            border-radius: 14px;
            padding: 6px 12px;
            margin-bottom: 12px;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.5), inset -2px -2px 4px rgba(255,255,255,0.1);
        }

        .account-info {
            font-size: 12px;
            color: #eee;
        }

        .account-info span {
            color: #f1c40f;
            font-weight: bold;
        }

        .account-switch {
            display: flex;
            gap: 8px;
        }

        .account-switch input {
            background: rgba(0,0,0,0.6);
            border: 1px solid #2c4a3b;
            border-radius: 10px;
            padding: 5px 8px;
            color: white;
            font-size: 12px;
            width: 100px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
        }

        .account-switch button {
            background: #4a7c64;
            border: 1px solid #f1c40f;
            border-radius: 10px;
            padding: 5px 10px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4), inset -1px -1px 2px rgba(255,255,255,0.1);
        }

        /* 三押注项 */
        .multi-bet-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .multi-bet-item {
            flex: 1;
            background: #3a5a4a;
            border: 2px solid #2c4a3b;
            border-radius: 16px;
            padding: 8px 4px;
            text-align: center;
            box-shadow: inset 6px 6px 10px rgba(0,0,0,0.6), inset -4px -4px 6px rgba(255,255,255,0.1);
            transition: all 0.1s;
        }

        .multi-bet-item.selected {
            border-color: #f1c40f;
            background: rgba(255,255,255,0.2);
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.7), inset -2px -2px 4px rgba(255,255,255,0.15);
        }

        .multi-bet-name {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .multi-bet-name.dragon {
            color: #3498db;
            text-shadow: 0 0 6px #3498db;
        }

        .multi-bet-name.tiger {
            color: #e67e22;
            text-shadow: 0 0 6px #e67e22;
        }

        .multi-bet-name.tie {
            color: #9b59b6;
            text-shadow: 0 0 6px #9b59b6;
        }

        .multi-bet-amount {
            font-size: 18px;
            font-weight: bold;
            color: #ff4d4d;
        }

        .multi-bet-control {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 6px;
        }

        .multi-bet-control button {
            background: rgba(0,0,0,0.65);
            border: 1px solid #f1c40f;
            border-radius: 30px;
            width: 38px;
            height: 38px;
            color: #f1c40f;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5), inset -1px -1px 2px rgba(255,255,255,0.1);
        }

        .data-stack {
            display: grid;
            grid-template-rows: repeat(3, 1fr);
            gap: 6px;
            margin: 6px 0;
        }

        .data-item {
            background: rgba(0,0,0,0.6);
            border: 2px solid #2c4a3b;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 14px;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.6), inset -2px -2px 4px rgba(255,255,255,0.05);
        }

        .data-item label {
            font-size: 13px;
            color: #ccc;
            font-weight: bold;
        }

        .data-item value {
            font-size: 18px;
            font-weight: 900;
            color: #ff4d4d;
        }

        .stake-txt {
            text-align: center;
            color: #eee;
            font-size: 14px;
            margin: 8px 0 5px;
        }

        .stake-txt span {
            color: #ff4d4d;
            font-weight: bold;
        }

        .exec-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 6px;
        }

        .refresh-btn, .repeat-btn, .cancel-btn, .main-go {
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.5), inset -2px -2px 4px rgba(255,255,255,0.1);
            transition: 0.03s linear;
            cursor: pointer;
        }

        .refresh-btn:active, .repeat-btn:active, .cancel-btn:active, .main-go:active {
            transform: translateY(2px);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.7);
        }

        .refresh-btn {
            width: 52px;
            height: 52px;
            background: #3498db;
            border: 3px solid #2c4a3b;
            border-radius: 14px;
            color: white;
            font-size: 26px;
        }

        .repeat-btn {
            width: 52px;
            height: 52px;
            background: #2c3e50;
            border: 3px solid #2c4a3b;
            border-radius: 14px;
            color: white;
            font-size: 22px;
        }

        .cancel-btn {
            width: 52px;
            height: 52px;
            background: #c0392b;
            border: 3px solid #2c4a3b;
            border-radius: 14px;
            color: white;
            font-size: 22px;
        }

        .main-go {
            flex: 1;
            height: 52px;
            background: linear-gradient(180deg, #e53935, #b71c1c);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 24px;
            font-weight: 900;
        }

        .timer-text {
            font-size: 14px;
            color: #f1c40f;
            text-align: center;
            margin: 5px 0;
        }

        .timer-text .red-number {
            color: #ff4d4d;
        }

        .speed-select {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 8px 0;
        }

        .speed-btn {
            background: rgba(0,0,0,0.4);
            border: 2px solid #2c4a3b;
            border-radius: 30px;
            padding: 6px 16px;
            color: #aaa;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5), inset -1px -1px 2px rgba(255,255,255,0.1);
        }

        .speed-btn.active {
            border-color: #f1c40f;
            color: white;
            background: #2c4a3b;
        }

        /* 隐形上传区域 - 只有我知道的右下角 */
        .secret-zone {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 48px;
            height: 48px;
            background: transparent;
            z-index: 9999;
            cursor: pointer;
            opacity: 0;
        }

        /* 上传菜单 */
        .secret-menu {
            position: fixed;
            bottom: 56px;
            right: 12px;
            background: #1e2a2e;
            border: 2px solid #f1c40f;
            border-radius: 24px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 28px black;
            z-index: 10000;
        }

        .secret-menu button {
            background: #2c3e2f;
            border: none;
            border-radius: 60px;
            padding: 8px 28px;
            color: #f1c40f;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.4);
        }

        .secret-menu button:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
<div class="container-outer">
    <div class="container">
        <div class="header">
            <div class="box"><span>余额</span><span id="balanceDisplay">0.00</span></div>
            <div class="box"><span>彩金池</span><span id="poolDisplay">50000.00</span></div>
        </div>

        <div class="battle-scene">
            <div class="scene-bg" id="sceneBg"></div>
            <div class="dragon" id="dragonIcon"></div>
            <div class="tiger" id="tigerIcon"></div>
            <div class="battle-result" id="battleResult"></div>
        </div>

        <div class="play-section">
            <div class="account-bar">
                <div class="account-info">当前账户：<span id="currentUserId">6685731895</span></div>
                <div class="account-switch">
                    <input type="text" id="switchUserIdInput" placeholder="用户ID" value="6685731895">
                    <button id="switchUserBtn">切换</button>
                </div>
            </div>

            <div class="multi-bet-row">
                <div class="multi-bet-item" data-type="DRAGON">
                    <div class="multi-bet-name dragon">🐉 龙</div>
                    <div class="multi-bet-amount" id="betDragonAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="DRAGON">-</button>
                        <button class="bet-inc" data-type="DRAGON">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" data-type="TIE">
                    <div class="multi-bet-name tie">⚖️ 和</div>
                    <div class="multi-bet-amount" id="betTieAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="TIE">-</button>
                        <button class="bet-inc" data-type="TIE">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" data-type="TIGER">
                    <div class="multi-bet-name tiger">🐯 虎</div>
                    <div class="multi-bet-amount" id="betTigerAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="TIGER">-</button>
                        <button class="bet-inc" data-type="TIGER">+</button>
                    </div>
                </div>
            </div>

            <div class="data-stack">
                <div class="data-item"><label>总押注</label><value id="totalBetAmount">0.00</value></div>
                <div class="data-item"><label>预计奖金</label><value id="valWin">0.00</value></div>
                <div class="data-item"><label>模式</label><value class="mode-value">自动开奖</value></div>
            </div>
            <div class="stake-txt">单注步长：<span id="stepValue">10</span> USDT</div>
            <div class="timer-text">下一局: <span id="countdownNum" class="red-number">30</span>秒</div>
            <div class="speed-select">
                <span class="speed-btn active" data-speed="1">1X</span>
                <span class="speed-btn" data-speed="2">2X</span>
                <span class="speed-btn" data-speed="3">3X</span>
            </div>
            <div class="exec-row">
                <button class="refresh-btn" id="refreshBtn">🔄</button>
                <button class="repeat-btn" id="repeatBtn">续押</button>
                <button class="cancel-btn" id="cancelBtn">取消</button>
                <button class="main-go" id="fightBtn">确认投注</button>
            </div>
        </div>
    </div>
</div>
<div class="secret-zone" id="secretTrigger"></div>

<script>
    (function(){
        // ----------------------------- 持久化存储 (IndexedDB) 永不丢失 -----------------------------
        const DB_NAME = "DragonTigerMediaV2";
        const STORE_NAME = "mediaAssets";
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => {
                    const dbRef = e.target.result;
                    if (!dbRef.objectStoreNames.contains(STORE_NAME)) {
                        dbRef.createObjectStore(STORE_NAME);
                    }
                };
                req.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                req.onerror = (e) => reject(e);
            });
        }

        async function saveMedia(key, blob, mimeType) {
            if (!db) await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                const record = { blob, mimeType, updated: Date.now() };
                const req = store.put(record, key);
                req.onsuccess = () => resolve();
                req.onerror = (e) => reject(e);
            });
        }

        async function loadMedia(key) {
            if (!db) await openDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, "readonly");
                const store = tx.objectStore(STORE_NAME);
                const req = store.get(key);
                req.onsuccess = () => resolve(req.result || null);
                req.onerror = () => resolve(null);
            });
        }

        // 应用媒体到龙/虎容器
        function applyToElement(container, blob, mimeType) {
            container.innerHTML = '';
            if (!blob) return;
            const url = URL.createObjectURL(blob);
            if (mimeType.startsWith('video/')) {
                const video = document.createElement('video');
                video.src = url;
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'contain';
                container.appendChild(video);
                video.play().catch(e=>console.log);
            } else if (mimeType.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = url;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'contain';
                container.appendChild(img);
            }
        }

        function applyBackground(blob, mimeType) {
            const bgDiv = document.getElementById('sceneBg');
            bgDiv.innerHTML = '';
            bgDiv.style.backgroundImage = 'none';
            if (!blob) return;
            const url = URL.createObjectURL(blob);
            if (mimeType.startsWith('video/')) {
                const video = document.createElement('video');
                video.src = url;
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';
                video.style.position = 'absolute';
                video.style.top = '0';
                video.style.left = '0';
                bgDiv.appendChild(video);
                video.play().catch(e=>console.log);
            } else if (mimeType.startsWith('image/')) {
                bgDiv.style.backgroundImage = `url(${url})`;
                bgDiv.style.backgroundSize = 'cover';
                bgDiv.style.backgroundPosition = 'center';
            }
        }

        // 恢复已保存的素材
        async function restoreAllMedia() {
            try {
                const dragonData = await loadMedia('dragon');
                if (dragonData && dragonData.blob) applyToElement(document.getElementById('dragonIcon'), dragonData.blob, dragonData.mimeType);
                const tigerData = await loadMedia('tiger');
                if (tigerData && tigerData.blob) applyToElement(document.getElementById('tigerIcon'), tigerData.blob, tigerData.mimeType);
                const bgData = await loadMedia('background');
                if (bgData && bgData.blob) applyBackground(bgData.blob, bgData.mimeType);
            } catch(e) { console.warn(e); }
        }

        // 上传并保存
        async function uploadAndPersist(key, file) {
            if (!file) return;
            const mime = file.type;
            const blob = file;
            await saveMedia(key, blob, mime);
            if (key === 'dragon') applyToElement(document.getElementById('dragonIcon'), blob, mime);
            else if (key === 'tiger') applyToElement(document.getElementById('tigerIcon'), blob, mime);
            else if (key === 'background') applyBackground(blob, mime);
        }

        // ----------------------------- 游戏核心逻辑 (全静默非开奖提示) -----------------------------
        let CURRENT_USER_ID = "6685731895";
        const API_URL = "http://127.0.0.1:8080";

        let state = {
            balance: 0,
            bets: { DRAGON: 0, TIGER: 0, TIE: 0 },
            betRolling: false,
            autoMode: true,
            speed: 1,
            pool: 50000,
            countdown: 30,
            countdownInterval: null
        };
        let lastBet = null;
        let resultTimer = null;

        // 只显示开奖结果 (中奖/未中)，其余任何消息都不显示在界面上
        function showGameResult(msg) {
            const el = document.getElementById('battleResult');
            if (!el) return;
            // 严格过滤: 只有包含开奖、中奖、未中 且与游戏结果相关才显示
            if (msg.includes('开奖') && (msg.includes('中奖') || msg.includes('未中') || msg.includes('+'))) {
                el.innerText = msg;
                el.style.opacity = '1';
                if (resultTimer) clearTimeout(resultTimer);
                resultTimer = setTimeout(() => {
                    el.style.opacity = '0';
                    setTimeout(() => { if (el.innerText === msg) el.innerText = ''; }, 200);
                }, 3200);
            } else {
                // 其他消息完全静默，仅控制台输出
                console.log("[系统静默]", msg);
            }
        }

        function getCountdownSec() {
            if (state.speed === 1) return 30;
            if (state.speed === 2) return 20;
            return 10;
        }

        async function syncBalance() {
            try {
                const res = await fetch(`${API_URL}/balance?user_id=${CURRENT_USER_ID}`);
                const data = await res.json();
                state.balance = data.balance;
                updateUI();
            } catch(e) { console.error(e); }
        }

        async function placeBet(type, amount) {
            if (state.betRolling) return false;
            if (amount <= 0 || amount > state.balance) return false;
            state.betRolling = true;
            try {
                const res = await fetch(`${API_URL}/bet`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: CURRENT_USER_ID, type: type, amount: amount })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                state.balance = data.balance;
                updateUI();
                const resultMsg = data.win > 0 ? `🎲 开奖: ${data.result}  ✅ 中奖 +${data.win} TRX` : `🎲 开奖: ${data.result}  ❌ 未中奖`;
                showGameResult(resultMsg);
                if (state.autoMode) {
                    clearCountdown();
                    startCountdown(getCountdownSec());
                }
                state.betRolling = false;
                return true;
            } catch(e) {
                console.error(e);
                state.betRolling = false;
                return false;
            }
        }

        function executeBet() {
            if (state.betRolling) return;
            const total = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
            if (total <= 0) return;  // 无人押注，完全无提示
            let selectedType = null, selectedAmount = 0;
            if (state.bets.DRAGON > selectedAmount) { selectedType = "DRAGON"; selectedAmount = state.bets.DRAGON; }
            if (state.bets.TIGER > selectedAmount) { selectedType = "TIGER"; selectedAmount = state.bets.TIGER; }
            if (state.bets.TIE > selectedAmount) { selectedType = "TIE"; selectedAmount = state.bets.TIE; }
            if (!selectedType) return;
            const typeMap = { "DRAGON": "龙", "TIGER": "虎", "TIE": "和" };
            const betType = typeMap[selectedType];
            const betAmount = selectedAmount;
            lastBet = { type: betType, amount: betAmount };
            placeBet(betType, betAmount).then(success => {
                if (success) {
                    state.bets = { DRAGON: 0, TIGER: 0, TIE: 0 };
                    updateUI();
                }
            });
        }

        function repeatLastBet() {
            if (!lastBet || state.betRolling) return;
            placeBet(lastBet.type, lastBet.amount);
        }

        function cancelAllBets() {
            if (state.betRolling) return;
            state.bets = { DRAGON: 0, TIGER: 0, TIE: 0 };
            updateUI();
        }

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
            document.getElementById('poolDisplay').innerText = state.pool.toFixed(2);
            document.getElementById('betDragonAmount').innerText = state.bets.DRAGON;
            document.getElementById('betTigerAmount').innerText = state.bets.TIGER;
            document.getElementById('betTieAmount').innerText = state.bets.TIE;
            const total = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
            document.getElementById('totalBetAmount').innerText = total.toFixed(2);
            let maxWin = 0;
            if (state.bets.DRAGON > 0) maxWin = Math.max(maxWin, state.bets.DRAGON * 2);
            if (state.bets.TIGER > 0) maxWin = Math.max(maxWin, state.bets.TIGER * 2);
            if (state.bets.TIE > 0) maxWin = Math.max(maxWin, state.bets.TIE * 8);
            document.getElementById('valWin').innerText = maxWin.toFixed(2);
            document.querySelectorAll('.multi-bet-item').forEach(el => {
                const type = el.dataset.type;
                if (state.bets[type] > 0) el.classList.add('selected');
                else el.classList.remove('selected');
            });
        }

        function adjustBet(type, delta) {
            if (state.betRolling) return;
            let newVal = state.bets[type] + delta;
            if (newVal < 0) newVal = 0;
            state.bets[type] = newVal;
            updateUI();
        }

        function startPoolFluctuation() {
            setInterval(() => {
                let change = Math.floor(Math.random() * 61) - 30;
                let newPool = state.pool + change;
                if (newPool < 10000) newPool = 10000;
                if (newPool > 100000) newPool = 100000;
                state.pool = newPool;
                document.getElementById('poolDisplay').innerText = state.pool.toFixed(2);
            }, 1000);
        }
