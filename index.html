<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA 旗舰量化终端</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* 🔒 登录框：极致工业质感 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        
        .login-box { 
            background: #0d100d; 
            padding: 50px 30px; 
            border-radius: 20px; 
            /* 🌲 外凸绿色包边 (宽度 1.8mm = 约 7px) */
            border: 7px solid #004d00; 
            box-shadow: 0 0 25px rgba(0,255,136,0.3); 
            text-align: center; 
            width: 85%; 
            max-width: 360px; 
            box-sizing: border-box; 
        }
        
        .login-box h2 { color: #fff; font-weight: bold; margin-bottom: 30px; letter-spacing: 2px; text-shadow: 0 0 5px #ff4d4d; }
        
        /* 🏮 输入框：红框白字 */
        #user-id-input { 
            width: 100%; 
            padding: 18px; 
            border: 2px solid #ff4d4d; 
            border-radius: 12px; 
            background: #000; 
            color: #ffffff; 
            outline: none; 
            margin-bottom: 30px; 
            text-align: center; 
            font-size: 22px; 
            box-sizing: border-box; 
            box-shadow: inset 0 0 10px rgba(255,77,77,0.3); 
        }
        
        /* 🔴 红色按键：一定要内陷 */
        .btn-login { 
            width: 100%; 
            padding: 18px; 
            border: 1px solid #4d0000; 
            border-radius: 12px; 
            /* 內陷效果：深红色背景 + 黑色内阴影 */
            background: #2a0000; 
            color: #fff; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer; 
            box-shadow: inset 5px 5px 15px #000, inset -5px -5px 10px #4a0000; 
            transition: 0.1s; 
        }
        
        /* 按下时的效果 */
        .btn-login:active { 
            background: #1a0000; 
            box-shadow: inset 8px 8px 20px #000, inset -8px -8px 15px #3a0000; 
            transform: scale(0.98); 
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>终端激活</h2>
            <input type="text" id="user-id-input" readonly>
            <button class="btn-login" onclick="handleLogin()">立即进入</button>
            <p style="color:#666; font-size:12px; margin-top:15px; letter-spacing:1px;">系统已为您自动分配临时激活码</p>
        </div>
    </div>

    <div id="game-content" style="display:none; text-align:center;">
        <div style="background:#161a18; margin:20px; padding:40px; border-radius:15px; border:1px solid #222;">
            <div style="color:#888;">可用余额 (USDT)</div>
            <div style="font-size:50px; color:#ff4d4d; font-weight:bold;">0.00</div>
        </div>
        <button class="btn-login" style="width:80%; background:#00ff88; color:#000; box-shadow:none;">开始量化</button>
    </div>

    <script>
        // 全自动分配 ID
        window.onload = function() {
            const randomId = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('user-id-input').value = "ID: " + randomId;
        }

        function handleLogin() {
            const fullId = document.getElementById('user-id-input').value;
            const idOnly = fullId.replace("ID: ", "");
            window.location.href = window.location.origin + window.location.pathname + "?user_id=" + idOnly;
        }
    </script>
</body>
</html>
