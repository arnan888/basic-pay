<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_BROWN_RED_STABLE</title>
    <style>
        * { 
            margin:0; 
            padding:0; 
            box-sizing:border-box; 
            -webkit-tap-highlight-color:transparent;
        }
        
        body { 
            background: #450a0a; 
            background-image: radial-gradient(circle at 50% 50%, #7f1d1d 0%, #450a0a 100%);
            color:#FFF; 
            font-family: sans-serif; 
            height:100vh; 
            overflow:hidden; 
            display:flex; 
            flex-direction:column;
            width:100%;
            position:fixed;
        }

        .status-bar { 
            background: rgba(0,0,0,0.5); 
            height:24px; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            font-size:10px; 
            z-index:10; 
            padding:0 8px;
        }
        
        .core { 
            flex:1; 
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            padding:15px; 
            gap:12px; 
            z-index:5;
        }

        .panel {
            width:100%; 
            background: #2d0606; 
            border-radius:18px;
            box-shadow: inset 5px 5px 15px #000, 0 0 0 1px #5e1111;
            border:1px solid #7f1d1d; 
            position:relative;
        }

        .bal-card { 
            padding:20px; 
            text-align:center; 
            min-height:120px;
            display:flex; 
            flex-direction:column; 
            justify-content:center;
        }
        
        .bal-val { 
            font-size:55px; 
            font-weight:900; 
            color:#f87171; 
            text-shadow:0 0 15px rgba(248,113,113,0.4);
        }

        .wheel-well { 
            width:100%; 
            max-width:320px; 
            aspect-ratio:1; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            position:relative;
        }
        
        .wheel-outer {
            width:86%; 
            height:86%; 
            border-radius:50%; 
            border:6px solid #1a0303; 
            background:#1a0303; 
            position:relative; 
            overflow:hidden;
            transition:transform 0.4s cubic-bezier(0.18,0.89,0.32,1.28); 
            transform-origin:center center;
        }
        
        .pointer { 
            position:absolute; 
            top:2px; 
            left:50%; 
            transform:translateX(-50%); 
            width:6px; 
            height:45px; 
            background:#f87171; 
            z-index:100; 
            border-radius:0 0 4px 4px; 
            box-shadow:0 0 10px #f87171;
        }
        
        .center-val { 
            position:absolute; 
            z-index:10; 
            width:70px; 
            height:70px; 
            background:#2d0606; 
            border-radius:50%; 
            border:2px solid #450a0a; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            color:#f87171; 
            font-size:22px; 
            font-weight:900;
            padding:0 5px;
        }
        
        .slot { 
            position:absolute; 
            width:100%; 
            height:100%; 
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            padding-top:10px; 
            font-size:10px; 
            transform-origin:center center;
        }
        
        .slot.active { 
            background:rgba(248,113,113,0.2); 
            transform:scale(0.9); 
            transition:0.1s ease-out;
        }

        .console { 
            width:100%; 
            background:#1a0303; 
            padding:15px 15px 80px; 
            border-radius:20px 20px 0 0; 
            border-top:2px solid #450a0a; 
            z-index:100; 
            margin-bottom:70px;
        }
        
        .row { 
            display:flex; 
            gap:10px; 
            margin-bottom:12px;
        }
        
        .btn-adj { 
            width:60px; 
            height:55px; 
            background:#2d0606; 
            border:1px solid #450a0a; 
            color:#fff; 
            font-size:28px; 
            border-radius:10px; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            cursor:pointer;
            touch-action:manipulation;
        }
        
        .btn-adj:active {
            background:#450a0a;
            transform:scale(0.95);
        }
        
        .btn-go { 
            flex:1; 
            height:55px; 
            background:#991b1b; 
            color:#fff; 
            font-size:20px; 
            font-weight:900; 
            border-radius:10px; 
            cursor:pointer; 
            border:none;
            touch-action:manipulation;
        }
        
        .btn-go:active { 
            opacity:0.7; 
            transform:scale(0.98);
        }
        
        .btn-go:disabled {
            background:#5e1111;
            opacity:0.5;
            cursor:not-allowed;
        }
        
        .btn-mode { 
            flex:1; 
            padding:12px; 
            background:#2d0606; 
            color:#fff; 
            font-size:12px; 
            border-radius:8px; 
            text-align:center; 
            border:1px solid #450a0a;
            cursor:pointer;
            touch-action:manipulation;
        }
        
        .btn-mode.on { 
            color:#f87171; 
            border-color:#991b1b; 
            background:#3a0808;
        }

        .nav { 
            position:fixed; 
            bottom:0; 
            width:100%; 
            height:70px; 
            background:#000; 
            display:grid; 
            grid-template-columns:repeat(4,1fr); 
            z-index:200;
        }
        
        .nav-n { 
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            justify-content:center; 
            color:#fff; 
            font-size:10px; 
            opacity:0.5;
        }
        
        .nav-n.act { 
            color:#f87171; 
            opacity:1;
        }
    </style>
</head>
<body>
    <div class="status-bar">● OPERATIONAL_READY_BROWN_V1 ●</div>

    <div class="core">
        <div class="panel bal-card">
            <div style="font-size:10px; opacity:0.6; margin-bottom:5px">AVAILABLE BALANCE (USDT)</div>
            <div class="bal-val" id="ui_bal">100.00</div>
            <div style="font-size:11px; margin-top:8px">UNIT_BET: <span id="ui_bet" style="color:#f87171; font-weight:bold">1.00</span></div>
        </div>

        <div class="panel wheel-well">
            <div class="pointer"></div>
            <div class="center-val" id="center_val">X?</div>
            <div id="ui_wheel" class="wheel-outer">
                <div class="slot" style="transform:rotate(0deg)"><span>🐲</span><small>X500</small></div>
                <div class="slot" style="transform:rotate(45deg)"><span>🐯</span><small>X88</small></div>
                <div class="slot" style="transform:rotate(90deg)"><span>🦅</span><small>X50</small></div>
                <div class="slot" style="transform:rotate(135deg)"><span>🦄</span><small>X200</small></div>
                <div class="slot" style="transform:rotate(180deg)"><span>🔥</span><small>X150</small></div>
                <div class="slot" style="transform:rotate(225deg)"><span>🐺</span><small>X10</small></div>
                <div class="slot" style="transform:rotate(270deg)"><span>🐢</span><small>X0</small></div>
                <div class="slot" style="transform:rotate(315deg)"><span>🦁</span><small>X30</small></div>
            </div>
        </div>
    </div>

    <div class="console">
        <div class="row">
            <div class="btn-adj" onclick="changeBet(-1)">－</div>
            <button class="btn-go" id="btn_go" onclick="go()">开始执行</button>
            <div class="btn-adj" onclick="changeBet(1)">＋</div>
        </div>
        <div class="row">
            <div id="speed_btn" class="btn-mode" onclick="cycleSpeed()">⚡ 速度: 1X</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-n">行情</div><div class="nav-n">资产</div><div class="nav-n">记录</div><div class="nav-n act">量化</div>
    </div>

    <script>
        // 核心常量定义
        const MIN_BET = 1.00;
        const MAX_BET = 100.00;
        const SPEED_LEVELS = [200, 100, 50];
        const RESULT_CONFIG = [
            { prob: 65, idx: 6 },
            { prob: 85, idx: 5 },
            { prob: 95, idx: 7 },
            { prob: 100, idx: 1 }
        ];

        // 核心状态变量
        let balance = 100.00, 
            bet = 1.00, 
            rot = 0, 
            busy = false, 
            spd = 1;
        const multis = [500, 88, 50, 200, 150, 10, 0, 30], 
              names = ["X500", "X88", "X50", "X200", "X150", "X10", "X0", "X30"],
              btnGo = document.getElementById('btn_go');

        // DOM更新工具函数
        function updateText(id, text) {
            const elem = document.getElementById(id);
            if (elem) elem.innerText = text;
        }

        // 投注调整（仅保留核心逻辑）
        function changeBet(v) { 
            if(busy) return; 
            const newBet = Math.max(MIN_BET, Math.min(MAX_BET, bet + v));
            if (newBet !== bet) {
                bet = newBet;
                updateText('ui_bet', bet.toFixed(2));
            }
        }

        // 速度档位切换（仅保留核心逻辑）
        function cycleSpeed() { 
            spd = (spd % 3) + 1; 
            updateText('speed_btn', `⚡ 速度: ${spd}X`); 
        }

        // 核心执行功能（加固后）
        function go() {
            // 安全校验
            if (busy) return;
            if (balance < bet || bet < MIN_BET || bet > MAX_BET) {
                if(bet < MIN_BET || bet > MAX_BET) bet = MIN_BET;
                updateText('ui_bet', bet.toFixed(2));
                return;
            }

            busy = true;
            btnGo.disabled = true;

            // 清除之前的选中状态
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));

            // 计算结果
            const r = Math.random() * 100;
            let idx = 0;
            for (const item of RESULT_CONFIG) {
                if (r < item.prob) {
                    idx = item.idx;
                    break;
                }
            }

            // 转盘旋转
            rot += 720 + (360 - idx * 45 - (rot % 360));
            document.getElementById('ui_wheel').style.transform = `rotate(${rot}deg)`;

            // 结果结算
            setTimeout(() => {
                document.querySelectorAll('.slot')[idx].classList.add('active');
                // 精确计算
                const win = Math.round((multis[idx] * bet) * 100) / 100;
                const cost = Math.round(bet * 100) / 100;
                balance = Math.round((balance - cost + win) * 100) / 100;
                
                updateText('ui_bal', balance.toFixed(2));
                updateText('center_val', names[idx]);
                
                // 恢复可用状态
                setTimeout(() => {
                    busy = false;
                    btnGo.disabled = false;
                }, SPEED_LEVELS[spd - 1]); 
            }, 400); 
        }

        // 错误捕获与恢复
        window.addEventListener('error', () => {
            busy = false;
            btnGo.disabled = false;
        });
    </script>
</body>
</html>
