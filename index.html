<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA 旗舰量化终端</title>
    <style>
        body { background: #0a0d0b; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        /* 🏮 登录框：红框白字 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #1a1f1c; padding: 40px 30px; border-radius: 20px; border: 2px solid #ff4d4d; box-shadow: 0 0 20px rgba(255,77,77,0.3); text-align: center; width: 85%; max-width: 360px; }
        .login-box h2 { color: #fff; font-weight: bold; margin-bottom: 25px; letter-spacing: 2px; }
        #user-id-input { width: 100%; padding: 15px; border: 1px solid #444; border-radius: 10px; background: #000; color: #ffffff; outline: none; margin-bottom: 25px; text-align: center; font-size: 20px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 16px; border: none; border-radius: 10px; background: #ff4d4d; color: #fff; font-weight: bold; font-size: 18px; cursor: pointer; }
        /* 游戏界面 */
        #game-content { display: none; text-align: center; width: 100%; }
        .balance-card { background: #161a18; margin: 20px; padding: 40px; border-radius: 15px; box-shadow: inset 0 0 15px #000; border: 1px solid #222; }
        .balance-num { font-size: 50px; color: #ff4d4d; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>终端激活</h2>
            <input type="text" id="user-id-input" readonly>
            <button class="btn-login" onclick="handleLogin()">立即激活</button>
            <p style="color:#666; font-size:12px; margin-top:15px;">系统已为您自动分配临时 ID</p>
        </div>
    </div>

    <div id="game-content">
        <div class="balance-card">
            <div style="color:#888;">可用余额 (USDT)</div>
            <div class="balance-num" id="display-balance">0.00</div>
        </div>
        <button class="btn-login" style="width:80%; background:#00ff88; color:#000;">开始量化</button>
        <p style="color:#444; margin-top:30px;">终端序列: <span id="display-id"></span></p>
    </div>

    <script>
        // 1. 自动生成 6 位随机 ID
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const existingId = urlParams.get('user_id');
            
            if (existingId) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('game-content').style.display = 'block';
                document.getElementById('display-id').innerText = existingId;
                // 此处对接后台逻辑...
            } else {
                const randomId = Math.floor(100000 + Math.random() * 900000);
                document.getElementById('user-id-input').value = "ID: " + randomId;
            }
        }

        function handleLogin() {
            const fullId = document.getElementById('user-id-input').value;
            const idOnly = fullId.replace("ID: ", "");
            window.location.href = window.location.origin + window.location.pathname + "?user_id=" + idOnly;
        }
    </script>
</body>
</html>
