<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>龙虎开奖 · 3000级</title>
<style>
html,body{margin:0;padding:0;background:#000;overflow:hidden;font-family:"Microsoft YaHei",sans-serif}
#stage{position:relative;width:100vw;height:100vh;filter:contrast(1.25)}

.blackout{position:absolute;inset:0;background:#000;animation:blackout .25s forwards}
@keyframes blackout{to{opacity:0}}

.flash{position:absolute;inset:0;background:#fff;opacity:0;animation:flash .08s linear .25s}
@keyframes flash{to{opacity:1}}

.dragon,.tiger{
  position:absolute;top:50%;
  width:460px;height:460px;border-radius:50%;
  transform:translateY(-50%);
  mix-blend-mode:screen;
}
.dragon{
  left:-70%;
  background:radial-gradient(circle,#00ffff,#001b22);
  box-shadow:0 0 120px #00ffff;
  animation:dragonIn .8s cubic-bezier(.1,.9,.2,1) forwards;
}
.tiger{
  right:-70%;
  background:radial-gradient(circle,#ffcc00,#2a1a00);
  box-shadow:0 0 120px #ffcc00;
  animation:tigerIn .8s cubic-bezier(.1,.9,.2,1) forwards;
}
@keyframes dragonIn{to{left:24%}}
@keyframes tigerIn{to{right:24%}}

.collapse{
  position:absolute;left:50%;top:50%;
  width:12px;height:12px;border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  background:#fff;
  animation:collapse .9s ease-out .8s forwards;
}
@keyframes collapse{
  40%{transform:translate(-50%,-50%) scale(18);box-shadow:0 0 260px 160px rgba(255,255,255,.95)}
  100%{transform:translate(-50%,-50%) scale(45);opacity:0}
}

#stage.shake{animation:shake .14s 7 .8s}
@keyframes shake{
  0%{transform:translate(0,0)}
  25%{transform:translate(18px,-18px)}
  50%{transform:translate(-18px,18px)}
  75%{transform:translate(12px,12px)}
}

.winPush{
  animation:winPush .35s ease-out 1.15s forwards;
}
@keyframes winPush{
  to{transform:translateY(-50%) scale(1.18)}
}

.loseFade{
  animation:loseFade .35s ease-out 1.15s forwards;
}
@keyframes loseFade{
  to{opacity:.15;filter:blur(6px)}
}

.result{
  position:absolute;top:40%;width:100%;
  text-align:center;font-size:150px;font-weight:900;
  letter-spacing:22px;opacity:0;
  animation:judge .25s ease-out 1.35s forwards;
}
.dragonWin{color:#00ffff;text-shadow:0 0 90px #00ffff}
@keyframes judge{
  to{opacity:1;transform:scale(1.22)}
}

.seal{
  position:absolute;top:55%;width:100%;
  text-align:center;font-size:42px;
  letter-spacing:8px;color:rgba(255,255,255,.85);
  opacity:0;animation:seal .25s linear 1.55s forwards;
}
@keyframes seal{to{opacity:1}}

canvas{position:absolute;inset:0}
</style>
</head>
<body>
<div id="stage" class="shake">
  <div class="blackout"></div>
  <div class="flash"></div>
  <canvas id="fx"></canvas>

  <!-- 胜负角色：下面两行就是“裁定” -->
  <div class="dragon winPush"></div>
  <div class="tiger loseFade"></div>

  <div class="collapse"></div>

  <div class="result dragonWin">龙 胜</div>
  <div class="seal">胜负已定 · 不可更改</div>
</div>

<script>
const c=document.getElementById('fx'),ctx=c.getContext('2d');
function R(){c.width=innerWidth;c.height=innerHeight}R();onresize=R;

let pts=[];
function blast(){
  const cx=c.width/2,cy=c.height/2;
  for(let i=0;i<520;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*12+6;
    pts.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:70});
  }
}
setTimeout(blast,800);

(function loop(){
  ctx.clearRect(0,0,c.width,c.height);
  pts=pts.filter(p=>p.l-->0);
  for(const p of pts){
    p.x+=p.vx;p.y+=p.vy;p.vx*=.97;p.vy*=.97;
    ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.fillRect(p.x,p.y,2,2);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
