<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_SILENT_PRO</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        
        body { 
            background: #05070a; 
            color:#FFF; font-family: "PingFang SC", sans-serif; 
            height:100vh; overflow:hidden; display:flex; flex-direction:column;
        }

        /* 顶部看板：【墨绿+淡绿】—— 代表资金流入 */
        .header-dash { 
            display:grid; grid-template-columns: 1fr 1fr; 
            background: #061a12; height: 75px; border-bottom: 1px solid #004d40; 
        }
        .dash-node { display:flex; flex-direction:column; justify-content:center; align-items:center; border-right:1px solid #0a2f20; }
        .node-label { font-size:10px; color:#4db6ac; margin-bottom:2px; font-weight:bold; }
        .node-val { color:#00e676; font-size:22px; font-weight:900; font-family:monospace; }

        /* 状态条：移除锁定率，仅显示系统就绪 */
        .status-bar { 
            background:#000; height:24px; display:flex; align-items:center; 
            padding:0 12px; font-size:10px; color:#0f0; justify-content:center; 
            border-bottom:1px solid #222; font-weight:bold; letter-spacing:1px;
        }

        .core-section { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:5px 15px; }

        /* 资产看板：【深墨绿渐变】 */
        .balance-card { 
            width:100%; background: linear-gradient(135deg, #0a2f20 0%, #05070a 100%); 
            border:1px solid #004d40; border-radius:12px; padding:15px; text-align:center; margin-bottom:12px;
            box-shadow: 0 5px 20px rgba(0,230,118,0.1);
        }
        .bal-val { font-size:60px; font-weight:900; color:#00e676; text-shadow:0 0 20px rgba(0,230,118,0.3); letter-spacing:-1px; }
        .bal-label { font-size:11px; color:#4db6ac; margin-bottom:2px; }

        /* 转盘模块：【深蓝+浅蓝】 */
        .wheel-module { 
            position:relative; width:230px; height:230px; 
            background:#001529; border-radius:12px; border:1px solid #0d47a1;
            display:flex; align-items:center; justify-content:center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .wheel-outer {
            width: 200px; height: 200px; border-radius: 50%;
            border: 3px solid #0d47a1; position: relative;
            background: #020810; overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .wheel-inner-bg {
            position: absolute; width: 100%; height: 100%;
            background: conic-gradient(
                #001529 0deg 45deg, #0d47a1 45deg 90deg, 
                #002171 90deg 135deg, #01579b 135deg 180deg, 
                #002171 180deg 225deg, #0d47a1 225deg 270deg,
                #001529 270deg 315deg, #001529 315deg 360deg
            );
            opacity: 0.6;
        }
        .pointer-line { 
            position:absolute; top:8px; left:50%; transform:translateX(-50%); 
            width:3px; height:35px; background:#F00; z-index:100; box-shadow:0 0 10px #F00;
        }
        .slot-val { 
            position:absolute; width:100%; height:100%; text-align:center; 
            padding-top:15px; font-weight:900; font-size:14px; color:#4fc3f7;
        }
        .high-m { color: #fff !important; text-shadow: 0 0 8px #fff; }

        /* 控制台：【红黑高反差】 */
        .console { width:100%; background:#000; border-top:1px solid #222; padding:15px 15px 85px 15px; }
        .main-row { display:flex; gap:10px; margin-bottom:12px; }
        .adj { 
            width:50px; height:50px; background:#1a1a1a; border:1px solid #333; color:#FFF; 
            font-size:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; 
        }
        .exec { 
            flex:1; background:#F00; border:none; color:#FFF; 
            font-size:22px; font-weight:900; border-radius:8px; letter-spacing:4px;
        }
        
        .tech-row { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
        .mode-b { 
            padding:12px; background:#0a0a0a; border:1px solid #333; 
            color:#888; font-size:12px; font-weight:bold; text-align:center; border-radius:6px; 
        }
        .mode-b.on { border-color:#F00; color:#F00; }

        /* 底部导航 */
        .nav { position:fixed; bottom:0; width:100%; height:70px; background:#000; border-top:1px solid #222; display:grid; grid-template-columns: repeat(4, 1fr); }
        .nav-n { display:flex; flex-direction:column; align-items:center; justify-content:center; color:#444; font-size:12px; font-weight:bold; }
        .nav-n.act { color:#F00; }
    </style>
</head>
<body>

    <!-- 收益看板 (绿色) -->
    <div class="header-dash">
        <div class="dash-node">
            <div class="node-label">累计注入流水</div>
            <div id="st_in" class="node-val">1.5</div>
        </div>
        <div class="dash-node">
            <div class="node-label">实时产出收益</div>
            <div id="st_out" class="node-val">1.6</div>
        </div>
    </div>

    <div class="status-bar">
        <span>● 系统已连接 SYSTEM_CONNECTED ● 高速量化通道已建立</span>
    </div>

    <div class="core-section">
        <!-- 资产主屏 (绿色) -->
        <div class="balance-card">
            <div class="bal-label">可用余额 (USDT)</div>
            <div class="bal-val" id="ui_bal">100.0</div>
            <div style="font-size:12px; color:#4db6ac; margin-top:2px;">执行额度: <span id="ui_bet" style="color:#FFF">0.5</span></div>
        </div>

        <!-- 转盘核心 (蓝色) -->
        <div class="wheel-module">
            <div class="pointer-line"></div>
            <div id="ui_wheel" class="wheel-outer">
                <div class="wheel-inner-bg"></div>
                <div class="slot-val" style="transform:rotate(0deg)">1.5X</div>
                <div class="slot-val" style="transform:rotate(45deg); opacity:0.3;">0X</div>
                <div class="slot-val" style="transform:rotate(90deg)">120X</div>
                <div class="slot-val high-m" style="transform:rotate(135deg)">500X</div>
                <div class="slot-val high-m" style="transform:rotate(180deg)">X88</div>
                <div class="slot-val" style="transform:rotate(225deg)">50X</div>
                <div class="slot-val" style="transform:rotate(270deg)">20X</div>
                <div class="slot-val" style="transform:rotate(315deg); opacity:0.3;">0X</div>
            </div>
        </div>
    </div>

    <!-- 操作台 (红黑) -->
    <div class="console">
        <div class="main-row">
            <div class="adj" onclick="changeBet(-0.5)">－</div>
            <button id="go_btn" class="exec" onclick="go()">开始执行</button>
            <div class="adj" onclick="changeBet(0.5)">＋</div>
        </div>
        <div class="tech-row">
            <div id="auto_btn" class="mode-b" onclick="toggleAuto()">🤖 自动挂机: 关</div>
            <div id="speed_btn" class="mode-b" onclick="toggleSpeed()">⚡ 极速模式: 1X</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-n">行情</div>
        <div class="nav-n">资产中心</div>
        <div class="nav-n">历史记录</div>
        <div class="nav-n act">量化终端</div>
    </div>

    <script>
        let balance = 100.0, bet = 0.5, totalIn = 1.5, totalOut = 1.6, rot = 0, busy = false;
        let isAuto = false, speedMode = 1;

        function toggleAuto() {
            isAuto = !isAuto;
            const btn = document.getElementById('auto_btn');
            btn.innerText = `🤖 自动挂机: ${isAuto ? '开' : '关'}`;
            btn.className = isAuto ? 'mode-b on' : 'mode-b';
            if(isAuto && !busy) go();
        }

        function toggleSpeed() {
            speedMode = (speedMode === 1) ? 2 : 1;
            const btn = document.getElementById('speed_btn');
            btn.innerText = `⚡ 极速模式: ${speedMode === 1 ? '1X' : '2X'}`;
            btn.className = speedMode === 2 ? 'mode-b on' : 'mode-b';
            document.getElementById('ui_wheel').style.transitionDuration = speedMode === 1 ? '5s' : '1.2s';
        }

        function changeBet(val) {
            if (busy) return;
            let n = bet + val;
            if (n >= 0.5) { bet = n; document.getElementById('ui_bet').innerText = bet.toFixed(1); }
        }

        function animateWin(prize) {
            const balEl = document.getElementById('ui_bal');
            let currentWin = 0.1;
            const duration = 1200;
            const increment = prize / (duration / 30);
            const timer = setInterval(() => {
                currentWin += increment;
                if (currentWin >= prize) {
                    currentWin = prize;
                    clearInterval(timer);
                    if(isAuto) setTimeout(go, 800);
                }
                const tempBal = (balance - prize) + currentWin;
                balEl.innerText = tempBal.toFixed(1);
            }, 30);
        }

        function go() {
            if (busy || balance < bet) {
                isAuto = false;
                document.getElementById('auto_btn').className = 'mode-b';
                document.getElementById('auto_btn').innerText = '🤖 自动挂机: 关';
                return;
            }
            busy = true;
            document.getElementById('go_btn').style.background = "#500";

            const r = Math.floor(Math.random() * 1000);
            let idx = (r < 480) ? 1 : (r < 950 ? 0 : (r < 995 ? 7 : (r < 998 ? 5 : (r < 2 ? 3 : 2))));

            const targetAngle = idx * 45;
            rot += (Math.floor(Math.random() * 5) + 12) * 360 + (360 - targetAngle - (rot % 360)) + 360;
            document.getElementById('ui_wheel').style.transform = `rotate(${rot}deg)`;

            const waitTime = speedMode === 1 ? 5000 : 1200;

            setTimeout(() => {
                const multis = [1.5, 0, 120, 500, 88, 50, 20, 0];
                const prize = multis[idx] * bet;
                balance = (balance - bet) + prize;
                totalIn += bet; totalOut += prize;
                document.getElementById('st_in').innerText = totalIn.toFixed(1);
                document.getElementById('st_out').innerText = totalOut.toFixed(1);

                if (prize > 0) animateWin(prize);
                else {
                    document.getElementById('ui_bal').innerText = balance.toFixed(1);
                    if(isAuto) setTimeout(go, 1000);
                }
                setTimeout(() => { busy = false; document.getElementById('go_btn').style.background = "#F00"; }, 1500);
            }, waitTime);
        }
    </script>
</body>
</html>
