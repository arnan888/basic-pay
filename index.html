<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA 旗舰量化终端</title>
    <style>
        body { background: #0b0f0d; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* 🔒 激活页面 - 序列号固定 179245 (复刻 27447) */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #1c221e; padding: 40px 25px; border-radius: 20px; border: 11px solid #00ff88; text-align: center; width: 85%; max-width: 350px; }
        .id-display { width: 100%; padding: 15px; background: #fff; color: #000; font-size: 32px; font-weight: bold; border-radius: 10px; border: 4px solid #ff3333; margin: 20px 0; box-sizing: border-box; }
        .btn-red { width: 100%; padding: 18px; background: #ff0000; color: #fff; border: none; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; }

        /* 🎮 业务页面 - 余额强制 0.00 (复刻 27451) */
        #game-page { display: none; width: 100%; height: 100vh; flex-direction: column; background: #121a16; }
        .card { background: #1a251f; margin: 15px; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #2d3e34; }
        .bal-val { font-size: 60px; color: #ff6b6b; font-weight: bold; }
        
        /* 🎡 纯代码绘制转盘 - 彻底解决黑屏 (复刻 27452) */
        .wheel-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #wheel { 
            width: 310px; height: 310px; border-radius: 50%; border: 12px solid #233129;
            background: conic-gradient(#ff4d4d 0 90deg, #f1c40f 90deg 180deg, #3498db 180deg 270deg, #2ecc71 270deg 360deg);
            transition: transform 4s cubic-bezier(0.1, 0.9, 0.3, 1);
        }
        .pointer { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #fff; z-index: 10; }

        .footer { background: #4a1414; padding: 30px; text-align: center; }
        .btn-spin { background: #ff4d4d; color: #fff; padding: 18px 80px; border-radius: 40px; font-size: 24px; font-weight: bold; border: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin:0;">终端激活</h2>
            <div class="id-display">179245</div>
            <button class="btn-red" onclick="go()">确认进入</button>
            <p style="color:#00ff88; font-size:12px; margin-top:15px;">● 系统已自动分配激活序列号</p>
        </div>
    </div>

    <div id="game-page">
        <div style="text-align:center; padding:10px; color:#f1c40f; font-size:12px;">⚡ 量化终端 · 公平游戏 ⚡</div>
        <div class="card">
            <div style="color:#8aa095;">💰 可用余额 (USDT)</div>
            <div class="bal-val" id="money">0.00</div>
            <div style="color:#f1c40f; font-size:14px;">🔥 单注额度: 10.0</div>
        </div>

        <div class="wheel-wrap">
            <div class="pointer"></div>
            <div id="wheel"></div>
        </div>

        <div class="footer">
            <button class="btn-spin" onclick="play()">▶ 执行抽取</button>
        </div>
    </div>

    <script>
        if (window.location.search.includes('user_id')) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('game-page').style.display = 'flex';
        }

        function go() {
            window.location.href = window.location.origin + window.location.pathname + "?user_id=179245";
        }

        // 核心：强制余额为 0，客户点击必弹窗
        let bal = 0.00; 

        function play() {
            if (bal < 10) {
                alert("余额不足，请联系客服充值后再试！");
                return;
            }
            // 正常逻辑 (如有充值后)
            bal -= 10;
            document.getElementById('money').innerText = bal.toFixed(2);
            document.getElementById('wheel').style.transform = `rotate(${Math.floor(3600 + Math.random() * 3600)}deg)`;
        }
    </script>
</body>
</html>
