<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>双游戏大厅 · 至尊骰宝 + 葫芦鱼抢庄</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0f0e0c;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 12px;
            color: #ffe6c7;
        }
        #app {
            max-width: 560px;
            margin: 0 auto;
            background: #1e1b16;
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .auth-panel, .user-section, .game-nav { padding: 12px 16px; }
        .game-nav {
            display: flex;
            gap: 8px;
            background: #2a241e;
            border-radius: 60px;
            margin: 8px 12px;
        }
        .game-tab {
            flex: 1;
            text-align: center;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #dbbc8c;
            cursor: pointer;
            transition: 0.2s;
        }
        .game-tab.active {
            background: #d49c3f;
            color: #1f1a12;
            box-shadow: inset 0 1px 3px #ffeaac, 0 2px 6px black;
        }
        .user-section {
            background: #1f1711;
            border-radius: 32px;
            margin: 12px;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        #userBalanceDisplay {
            font-size: 1.4rem;
            font-weight: 900;
            color: #ffcc44;
            background: #0a0705;
            padding: 0 12px;
            border-radius: 50px;
        }
        .charge-btn, .withdraw-btn {
            background: #3f2a1a;
            border-radius: 40px;
            padding: 6px 14px;
            border: none;
            color: #ffda99;
            font-weight: bold;
            cursor: pointer;
        }
        .logout-btn, .service-btn {
            background: #2a1f16;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            border: none;
            color: #ffdd99;
            cursor: pointer;
        }
        .charge-withdraw-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        /* 至尊骰宝盒子布局 */
        .dice-wrapper .points-grid,
        .dice-wrapper .trio-grid,
        .dice-wrapper .special-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 8px;
            margin: 10px 0;
        }
        .dice-wrapper .bet-card {
            background: linear-gradient(145deg, #2c241c, #1f1a14);
            border-radius: 20px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 163, 115, 0.4);
        }
        .dice-wrapper .bet-card:active { transform: scale(0.96); background: #3a2f24; }
        .dice-wrapper .bet-name { font-weight: bold; font-size: 0.85rem; color: #ffdfb3; }
        .dice-wrapper .bet-odds { font-size: 0.7rem; color: #ffb347; background: rgba(0,0,0,0.4); display: inline-block; padding: 0px 6px; border-radius: 40px; margin-top: 2px; }
        .dice-wrapper .bet-amount { font-size: 1rem; font-weight: 800; background: #00000066; border-radius: 40px; margin-top: 5px; padding: 2px 0; color: #f7d44a; }

        .chips, .fish-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 12px 0;
        }
        .chip {
            background: radial-gradient(circle at 30% 20%, #f5b042, #c46f1a);
            width: 65px;
            padding: 8px 0;
            text-align: center;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #2c1a0a;
            box-shadow: 0 5px 0 #7a3e0e;
            cursor: pointer;
            transition: 0.05s linear;
            border: 1px solid #ffcd94;
        }
        .chip.selected {
            background: radial-gradient(circle at 30% 20%, #ffe484, #ffa01e);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #b45f1a;
        }
        .chip:active { transform: translateY(2px); box-shadow: 0 2px 0 #7a3e0e; }

        .countdown-warning { color: #ff7777; text-shadow: 0 0 4px red; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } }

        .dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .dice-cube {
            width: 70px;
            height: 70px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s linear;
            cursor: default;
        }
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #faf0cf;
            border-radius: 14px;
            border: 2px solid #b97f2e;
            box-shadow: inset 0 0 8px #ffcf8a;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .pip {
            width: 12px;
            height: 12px;
            background: #2d1f0c;
            border-radius: 50%;
            margin: 3px;
            box-shadow: inset 0 1px 2px #aa7744;
        }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 8px; left: 8px; }
        .pip-tr { position: absolute; top: 8px; right: 8px; }
        .pip-bl { position: absolute; bottom: 8px; left: 8px; }
        .pip-br { position: absolute; bottom: 8px; right: 8px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1, .pip-l2, .pip-l3 { position: absolute; left: 6px; }
        .pip-l1 { top: 6px; }
        .pip-l2 { top: 50%; transform: translateY(-50%); }
        .pip-l3 { bottom: 6px; }
        .pip-r1, .pip-r2, .pip-r3 { position: absolute; right: 6px; }
        .pip-r1 { top: 6px; }
        .pip-r2 { top: 50%; transform: translateY(-50%); }
        .pip-r3 { bottom: 6px; }

        .front { transform: translateZ(35px); }
        .back { transform: rotateY(180deg) translateZ(35px); }
        .right { transform: rotateY(90deg) translateZ(35px); }
        .left { transform: rotateY(-90deg) translateZ(35px); }
        .top { transform: rotateX(90deg) translateZ(35px); }
        .bottom { transform: rotateX(-90deg) translateZ(35px); }

        @media (max-width: 480px) {
            .dice-cube { width: 55px; height: 55px; }
            .front, .back, .right, .left, .top, .bottom { transform: translateZ(27px); }
            .back { transform: rotateY(180deg) translateZ(27px); }
            .right { transform: rotateY(90deg) translateZ(27px); }
            .left { transform: rotateY(-90deg) translateZ(27px); }
            .top { transform: rotateX(90deg) translateZ(27px); }
            .bottom { transform: rotateX(-90deg) translateZ(27px); }
            .pip { width: 9px; height: 9px; }
            .chip { width: 55px; font-size: 1rem; }
        }

        .fish-wrapper .fish-pattern-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin: 4px auto;
            display: block;
            background: #2a1f16;
            border-radius: 12px;
            padding: 4px;
        }
        .fish-wrapper .bet-card {
            background: #2c1e12;
            border-radius: 20px;
            padding: 8px;
            text-align: center;
            border: 1px solid #d49c3f;
        }
        .fish-wrapper .bet-amount {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }
        .btn-chip {
            background: #ffaa44;
            border: none;
            border-radius: 30px;
            width: 28px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .online-count-box {
            background: #2a1f16;
            margin: 10px;
            padding: 8px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
        }
        .result-popup {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: #1e2a1c;
            padding: 14px 28px;
            border-radius: 80px;
            font-weight: bold;
            font-size: 1.4rem;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            box-shadow: 0 0 25px gold;
            border-left: 6px solid gold;
            color: #ffeaac;
            white-space: nowrap;
        }
        .result-popup.win { background: #1f3d1a; border-left-color: #6eff00; }
        .result-popup.show { opacity: 1; transform: translateX(-50%) scale(1); }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: #2b241e;
            border-radius: 36px;
            width: 90%;
            max-width: 480px;
            padding: 20px;
            border: 1px solid #d4a373;
            color: #ffe1b3;
            max-height: 85vh;
            overflow-y: auto;
        }
        .toast-message {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            color: #ffcc44;
            padding: 8px 16px;
            border-radius: 60px;
            z-index: 3000;
            font-weight: bold;
            white-space: nowrap;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        .qr-img {
            width: 140px;
            height: 140px;
            margin: 8px auto;
            display: block;
            background: white;
            border-radius: 20px;
            padding: 8px;
            object-fit: contain;
        }
        .admin-table {
            width: 100%;
            font-size: 0.7rem;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 6px 4px;
            border-bottom: 1px solid #d4a373;
            text-align: left;
        }
        .withdraw-input, .withdraw-select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 40px;
            background: #1a1a1a;
            border: 1px solid #d49c3f;
            color: #ffdd99;
        }
        .confirm-btn {
            background: #d49c3f;
            border: none;
            border-radius: 40px;
            padding: 8px;
            width: 100%;
            margin-top: 12px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ======================== 全局数据 ========================
    let systemBankerBalance = localStorage.getItem('system_banker_balance') ? parseFloat(localStorage.getItem('system_banker_balance')) : 50000;
    let adjustFactor = localStorage.getItem('adjustFactor') ? parseFloat(localStorage.getItem('adjustFactor')) : 1.0;
    let validReferralCodes = ["VIP666", "888VIP", "GOLD2025", "LUCKY8", "DICE100"];
    let usersData = JSON.parse(localStorage.getItem('dice_users')) || {};
    let currentUser = null;

    // 提现记录存储
    let withdrawRecords = JSON.parse(localStorage.getItem('withdraw_records')) || [];

    function saveUsers() { localStorage.setItem('dice_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 0) : 0; }
    function setUserBalance(amount) {
        if (!currentUser) return;
        usersData[currentUser.phone].balance = Math.max(0, amount);
        saveUsers();
        let balSpan = document.getElementById("userBalanceDisplay");
        if (balSpan) balSpan.innerText = getUserBalance().toFixed(2);
    }
    function modifyBanker(delta) {
        systemBankerBalance = Math.max(0, systemBankerBalance + delta);
        localStorage.setItem('system_banker_balance', systemBankerBalance);
        let bankerEl = document.getElementById('diceBankerDisplay');
        if (bankerEl) bankerEl.innerText = systemBankerBalance.toFixed(2);
    }
    function showToast(msg) {
        let t = document.createElement('div'); t.className = 'toast-message'; t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    function updateAllBalance() {
        let balSpan = document.getElementById("userBalanceDisplay");
        if (balSpan) balSpan.innerText = getUserBalance().toFixed(2);
        let bankerSpan = document.getElementById('diceBankerDisplay');
        if (bankerSpan) bankerSpan.innerText = systemBankerBalance.toFixed(2);
    }
    
    // 充值弹窗（微信+支付宝收款码）
    function showRechargeModal() {
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">💎 充值</h3>
                <p style="margin:10px 0; text-align:center;"><strong>1元 = 1000文</strong>，扫码支付后联系客服上分</p>
                <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;">
                    <div style="text-align:center;">
                        <img class="qr-img" alt="微信收款码" src="mmexport1776247819360.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%BE%AE%E4%BF%A1%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'">
                        <p>📱 微信收款码</p>
                    </div>
                    <div style="text-align:center;">
                        <img class="qr-img" alt="支付宝收款码" src="mmexport1776247823872.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E6%94%AF%E4%BB%98%E5%AE%9D%E6%94%B6%E6%AC%BE%E7%A0%81%3C/text%3E%3C/svg%3E'">
                        <p>📱 支付宝收款码</p>
                    </div>
                </div>
                <p style="margin-top:10px; text-align:center;">📞 客服微信: <strong>game_kf_888</strong> (支付后截图联系)</p>
                <button id="closeRecharge" style="background:#c47c3a; margin-top:15px; padding:8px; border-radius:40px; width:100%;">关闭</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#closeRecharge').onclick = () => modalDiv.remove();
    }
    // 客服弹窗（预留二维码）
    function showServiceModal() {
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">📞 客服微信</h3>
                <img class="qr-img" alt="客服微信二维码" src="kefu_qr.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E%E5%AE%A2%E6%9C%8D%E5%BE%AE%E4%BF%A1%E4%BA%8C%E7%BB%B4%E7%A0%81%3C/text%3E%3C/svg%3E'">
                <p style="margin-top:10px; text-align:center;">微信号: game_kf_888</p>
                <button id="closeSvc" style="background:#c47c3a; margin-top:15px; padding:8px; border-radius:40px; width:100%;">关闭</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#closeSvc').onclick = () => modalDiv.remove();
    }
    function recharge() { showRechargeModal(); }

    // ======================== 提现功能（完整版：金额限制 + 绑定收款方式） ========================
    function withdraw() {
        let currentBalance = getUserBalance();
        if (currentBalance <= 0) {
            showToast("余额为0，无法提现");
            return;
        }
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">💰 提现申请</h3>
                <div style="margin:12px 0;">
                    <label>当前余额: <strong style="color:#ffcc44;">${currentBalance.toFixed(2)} 文</strong></label>
                </div>
                <div style="margin:12px 0;">
                    <label>提现金额 (1文 = 0.001元)</label>
                    <input type="number" id="withdrawAmount" class="withdraw-input" placeholder="请输入提现金额" min="1" max="${currentBalance}" step="1">
                </div>
                <div style="margin:12px 0;">
                    <label>收款方式</label>
                    <select id="withdrawType" class="withdraw-select">
                        <option value="微信">微信</option>
                        <option value="支付宝">支付宝</option>
                    </select>
                </div>
                <div style="margin:12px 0;">
                    <label>收款账号</label>
                    <input type="text" id="withdrawAccount" class="withdraw-input" placeholder="请输入微信/支付宝账号" required>
                </div>
                <button id="confirmWithdraw" class="confirm-btn">确认提现</button>
                <button id="cancelWithdraw" style="background:#734c2e; margin-top:8px; padding:8px; border-radius:40px; width:100%;">取消</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const amountInput = modalDiv.querySelector('#withdrawAmount');
        const typeSelect = modalDiv.querySelector('#withdrawType');
        const accountInput = modalDiv.querySelector('#withdrawAccount');
        const confirmBtn = modalDiv.querySelector('#confirmWithdraw');
        const cancelBtn = modalDiv.querySelector('#cancelWithdraw');
        confirmBtn.onclick = () => {
            let amount = parseFloat(amountInput.value);
            let account = accountInput.value.trim();
            let payType = typeSelect.value;
            if (isNaN(amount) || amount <= 0) {
                showToast("请输入有效的提现金额");
                return;
            }
            if (amount > currentBalance) {
                showToast("提现金额不能超过余额");
                return;
            }
            if (!account) {
                showToast("请填写收款账号");
                return;
            }
            // 扣减余额
            setUserBalance(currentBalance - amount);
            // 记录提现申请
            let record = {
                phone: currentUser.phone,
                amount: amount,
                type: payType,
                account: account,
                time: new Date().toLocaleString(),
                status: "待处理"
            };
            withdrawRecords.push(record);
            localStorage.setItem('withdraw_records', JSON.stringify(withdrawRecords));
            showToast(`提现申请已提交！${amount}文将处理到您的${payType}账号 ${account}`);
            modalDiv.remove();
            updateAllBalance();
        };
        cancelBtn.onclick = () => modalDiv.remove();
    }

    // 管理员后台（含提现记录查看）
    let adminClickCount = 0, adminClickTimer = null;
    let adminPassword = "admin888";
    function openAdminModal() {
        let pwd = prompt("管理员后台密码:");
        if (pwd !== adminPassword) { showToast("密码错误"); return; }
        let allUsers = Object.keys(usersData).map(phone => ({ phone, balance: usersData[phone].balance, code: usersData[phone].referralCode || '无', regTime: usersData[phone].registerTime || '未知' }));
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">🎛️ 管理员后台</h3>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <input type="text" id="adminSearchInput" placeholder="搜索手机号" style="flex:2; background:#1a1a1a; border:1px solid #d49c3f; border-radius:40px; padding:6px; color:#ffdd99;">
                    <button id="adminSearchBtn" style="background:#2980b9; border-radius:40px; padding:6px 12px;">🔍 搜索</button>
                    <button id="adminResetSearch" style="background:#555; border-radius:40px; padding:6px 12px;">重置</button>
                </div>
                <div style="max-height:200px; overflow-y:auto; margin-bottom:12px;">
                    <table class="admin-table">
                        <thead><tr><th>手机号</th><th>余额</th><th>推荐码</th><th>注册时间</th></tr></thead>
                        <tbody id="adminUserTableBody"></tbody>
                    </table>
                </div>
                <select id="adminTargetUser" style="width:100%; margin:8px 0; padding:6px; border-radius:40px; background:#1a1a1a; color:#ffdd99;">
                    ${allUsers.map(u => `<option value="${u.phone}">${u.phone} (${u.balance.toFixed(2)})</option>`).join('')}
                </select>
                <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                    <input type="number" id="adminAmount" placeholder="金额" value="0" style="flex:1; border-radius:40px; padding:6px;">
                    <button id="adminAddBalance" style="background:#2e7d32; border-radius:40px; padding:6px 12px;">➕ 上分</button>
                    <button id="adminSubBalance" style="background:#c0392b; border-radius:40px; padding:6px 12px;">➖ 下分</button>
                    <button id="adminResetBalance" style="background:#f39c12; border-radius:40px; padding:6px 12px;">🔄 重置1000</button>
                </div>
                <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                    <button id="adminQueryBalance" style="background:#2980b9; border-radius:40px; padding:6px 12px;">🔍 查询余额</button>
                    <button id="adminExportUsers" style="background:#27ae60; border-radius:40px; padding:6px 12px;">📋 导出用户</button>

        document.body.appendChild(modalDiv);
        function renderUserTable(searchKeyword = '') {
            let filtered = searchKeyword ? allUsers.filter(u => u.phone.includes(searchKeyword)) : allUsers;
            let tbody = modalDiv.querySelector('#adminUserTableBody');
            if (tbody) tbody.innerHTML = filtered.map(u => `<tr><td>${u.phone}</td><td>💰 ${u.balance.toFixed(2)}</td><td>${u.code}</td><td>${u.regTime}</td></tr>`).join('') || '<tr><td colspan="4">暂无数据</td></tr>';
        }
        renderUserTable();
        modalDiv.querySelector('#adminSearchBtn').onclick = () => {
            let kw = modalDiv.querySelector('#adminSearchInput').value.trim();
            renderUserTable(kw);
        };
        modalDiv.querySelector('#adminResetSearch').onclick = () => {
            modalDiv.querySelector('#adminSearchInput').value = '';
            renderUserTable('');
        };
        const getTarget = () => modalDiv.querySelector('#adminTargetUser').value;
        const getAmt = () => parseInt(modalDiv.querySelector('#adminAmount').value) || 0;
        modalDiv.querySelector('#adminAddBalance').onclick = () => {
            let t = getTarget(), a = getAmt();
            if (a <= 0) { showToast("金额>0"); return; }
            usersData[t].balance += a;
            saveUsers();
            showToast(`${t} +${a}`);
            if (currentUser?.phone === t) setUserBalance(usersData[t].balance);
            modalDiv.remove(); openAdminModal();
        };
        modalDiv.querySelector('#adminSubBalance').onclick = () => {
            let t = getTarget(), a = getAmt();
            if (a <= 0 || usersData[t].balance < a) { showToast("金额无效或余额不足"); return; }
            usersData[t].balance -= a;
            saveUsers();
            showToast(`${t} -${a}`);
            if (currentUser?.phone === t) setUserBalance(usersData[t].balance);
            modalDiv.remove(); openAdminModal();
        };
        modalDiv.querySelector('#adminResetBalance').onclick = () => {
            let t = getTarget();
            if (confirm(`重置 ${t} 余额为1000？`)) {
                usersData[t].balance = 1000;
                saveUsers();
                showToast(`${t} 已重置为1000`);
                if (currentUser?.phone === t) setUserBalance(1000);
                modalDiv.remove(); openAdminModal();
            }
        };
        modalDiv.querySelector('#adminQueryBalance').onclick = () => {
            let t = getTarget();
            showToast(`${t} 余额: ${usersData[t].balance.toFixed(2)}`);
        };
        modalDiv.querySelector('#adminExportUsers').onclick = () => {
            let data = allUsers.map(u => `${u.phone},${u.balance},${u.code},${u.regTime}`).join('\n');
            navigator.clipboard.writeText("手机号,余额,推荐码,注册时间\n" + data).then(() => showToast(`已复制 ${allUsers.length} 条用户数据`)).catch(() => showToast("复制失败"));
        };
        modalDiv.querySelector('#adminAddCode').onclick = () => {
            let newCode = prompt("请输入新的推荐码（大写字母+数字）:").trim().toUpperCase();
            if (newCode && !validReferralCodes.includes(newCode)) {
                validReferralCodes.push(newCode);
                localStorage.setItem('valid_referral_codes', JSON.stringify(validReferralCodes));
                showToast(`推荐码 ${newCode} 已添加`);
            } else showToast("无效或已存在");
        };
        modalDiv.querySelector('#adminListCodes').onclick = () => {
            alert(`当前有效推荐码：\n${validReferralCodes.join(', ')}`);
        };
        modalDiv.querySelector('#adminSetBanker').onclick = () => {
            let newAmt = parseFloat(prompt("骰宝系统庄家新余额:", systemBankerBalance));
            if (!isNaN(newAmt) && newAmt >= 0) {
                systemBankerBalance = newAmt;
                localStorage.setItem('system_banker_balance', systemBankerBalance);
                showToast(`骰宝庄家余额已设为 ${newAmt.toFixed(2)}`);
                let b2 = document.getElementById('diceBankerDisplay');
                if (b2) b2.innerText = newAmt.toFixed(2);
            } else showToast("无效");
        };
        modalDiv.querySelector('#adminChangePwd').onclick = () => {
            let old = prompt("当前密码:");
            if (old !== adminPassword) { showToast("密码错误"); return; }
            let newPwd = prompt("新密码(≥4位):");
            if (newPwd && newPwd.length >= 4) { adminPassword = newPwd; localStorage.setItem('admin_pwd', newPwd); showToast("修改成功"); }
            else if (newPwd) showToast("至少4位");
        };
        modalDiv.querySelector('#adminSaveFactor').onclick = () => {
            let newFac = parseFloat(modalDiv.querySelector('#adminAdjustFactor').value);
            if (!isNaN(newFac) && newFac >= 0.2 && newFac <= 3.0) {
                adjustFactor = newFac;
                localStorage.setItem('adjustFactor', adjustFactor);
                showToast(`全局赔付系数已设为 ${adjustFactor}`);
            } else showToast("系数范围0.2~3.0");
        };
