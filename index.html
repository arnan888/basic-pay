<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虎争霸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* 主容器 */
        .game-box {
            width: 100%; max-width: 480px; height: 100vh;
            background: #4a7c64; border-radius: 15px;
            display: flex; flex-direction: column;
            padding: 6px;
        }

        /* 顶部状态栏 */
        .status-bar {
            height: 8%; display: flex; gap: 10px; padding: 0 10px;
        }
        .status-card {
            flex: 1; background: #6b737e; border: 2px solid #2c4a3b; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center; padding: 0 10px;
        }
        .status-card label { font-size: 12px; color: #ccc; }
        .status-card span { font-size: 20px; color: #f1c40f; font-weight: bold; }

        /* ================== 龙虎对决区 ================== */
        .battle-box {
            height: 38%; margin: 5px 10px;
            background: url("https://picsum.photos/id/1015/800/400") center/cover no-repeat;
            border: 3px solid #2c4a3b; border-radius: 12px;
            position: relative;
        }
        .dragon {
            position: absolute; left: 30px; top: 50%; transform: translateY(-50%);
            font-size: 80px; color: #3498db;
            text-shadow: 0 0 10px #3498db;
        }
        .tiger {
            position: absolute; right: 30px; top: 50%; transform: translateY(-50%);
            font-size: 80px; color: #e67e22;
            text-shadow: 0 0 10px #e67e22;
        }
        .result-txt {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            font-size: 18px; color: #fff; font-weight: bold;
            background: rgba(0,0,0,0.7); padding: 2px 10px; border-radius: 8px;
        }
        /* ================================================= */

        /* 操作区 */
        .control-box {
            flex: 1; margin: 0 10px 5px 10px;
            background: #6b737e; border: 3px solid #2c4a3b; border-radius: 12px;
            padding: 10px;
        }
        /* 龙虎和选择 */
        .choice-row {
            display: flex; gap: 8px; margin-bottom: 10px;
        }
        .choice-btn {
            flex: 1; height: 70px; background: #333; border: 3px solid #2c4a3b; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: bold; cursor: pointer;
        }
        .choice-btn.dragon { color: #3498db; }
        .choice-btn.tiger { color: #e67e22; }
        .choice-btn.tie { color: #9b59b6; }
        .choice-btn.active { border-color: #f1c40f; background: #222; }

        /* 数据显示 */
        .data-row {
            display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px;
        }
        .data-item {
            background: #333; border: 2px solid #2c4a3b; border-radius: 8px;
            padding: 0 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .data-item label { font-size: 12px; color: #ccc; }
        .data-item span { font-size: 18px; color: #f1c40f; font-weight: bold; }

        /* 押注金额 */
        .bet-txt {
            text-align: center; color: #fff; font-size: 16px; margin-bottom: 10px;
        }
        .bet-txt span { color: #f1c40f; font-weight: bold; }

        /* 功能按键 */
        .btn-row {
            display: flex; gap: 10px; margin-bottom: 10px;
        }
        .btn {
            width: 50px; height: 50px; background: #4a7c64; border: 2px solid #2c4a3b; border-radius: 8px;
            color: #fff; font-size: 24px; cursor: pointer;
        }
        .go-btn {
            flex: 1; background: #e53935; border: none; border-radius: 25px;
            font-size: 20px; font-weight: bold;
        }

        /* 模式选择 */
        .mode-row {
            display: flex; gap: 10px;
        }
        .mode-btn {
            flex: 1; height: 40px; background: #333; border: 2px solid #2c4a3b; border-radius: 8px;
            color: #fff; font-size: 16px; cursor: pointer;
        }
        .mode-btn.active { border-color: #f1c40f; }
        .speed-btn {
            display: flex; gap: 5px;
        }
        .speed-btn span {
            flex: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 6px;
        }
        .speed-btn span.active { background: #f1c40f; color: #000; }
    </style>
</head>
<body>
<div class="game-box">
    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="status-card">
            <label>余额</label>
            <span id="balance">857.80</span>
        </div>
        <div class="status-card">
            <label>奖池</label>
            <span>84291.50</span>
        </div>
    </div>

    <!-- 龙虎对决区 -->
    <div class="battle-box">
        <div class="dragon">🐉</div>
        <div class="tiger">🐯</div>
        <div class="result-txt" id="result">龙虎争霸</div>
    </div>

    <!-- 操作区 -->
    <div class="control-box">
        <div class="choice-row">
            <div class="choice-btn dragon" onclick="setChoice('dragon')">龙</div>
            <div class="choice-btn tie" onclick="setChoice('tie')">和</div>
            <div class="choice-btn tiger" onclick="setChoice('tiger')">虎</div>
        </div>

        <div class="data-row">
            <div class="data-item">
                <label>当前押注</label>
                <span id="bet">0.00</span>
            </div>
            <div class="data-item">
                <label>预计奖金</label>
                <span id="win">0.00</span>
            </div>
            <div class="data-item">
                <label>已选</label>
                <span id="choice">未选择</span>
            </div>
        </div>

        <div class="bet-txt">押注金额：<span id="bet-val">100</span> USDT</div>

        <div class="btn-row">
            <button class="btn" onclick="changeBet(-1)">-</button>
            <button class="btn go-btn" onclick="startGame()">确认投注</button>
            <button class="btn" onclick="changeBet(1)">+</button>
        </div>

        <div class="mode-row">
            <button class="mode-btn" id="auto-btn" onclick="toggleAuto()">自动投注</button>
            <div class="mode-btn speed-btn" onclick="toggleSpeed()">
                <span class="active" id="s1">1X</span>
                <span id="s2">2X</span>
                <span id="s3">3X</span>
            </div>
        </div>
    </div>
</div>

<script>
let balance = 857.8;
let betLevels = [10,50,100,500,1000];
let currentBet = 2;
let selected = null;
let isRunning = false;
let autoMode = false;
let speed = 1;

// 选择投注项
function setChoice(type) {
    if(isRunning) return;
    selected = type;
    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.choice-btn.${type}`).classList.add('active');
    document.getElementById('choice').textContent = type === 'dragon'?'龙':type==='tiger'?'虎':'和';
}

// 调整押注金额
function changeBet(dir) {
    if(isRunning) return;
    currentBet = Math.max(0, Math.min(4, currentBet + dir));
    document.getElementById('bet-val').textContent = betLevels[currentBet];
}

// 开始游戏
function startGame() {
    if(isRunning) { alert('游戏进行中'); return; }
    if(!selected) { alert('请选择投注项'); return; }
    
    let bet = betLevels[currentBet];
    if(balance < bet) { alert('余额不足'); return; }

    isRunning = true;
    balance -= bet;
    document.getElementById('balance').textContent = balance.toFixed(2);
    document.getElementById('bet').textContent = bet.toFixed(2);
    
    let win = bet * (selected === 'tie' ? 8 : 1);
    document.getElementById('win').textContent = win.toFixed(2);
    document.getElementById('result').textContent = '对决中...';

    // 15秒后出结果
    setTimeout(() => {
        let res = ['dragon','tiger','tie'][Math.floor(Math.random()*3)];
        let resTxt = res==='dragon'?'龙赢':res==='tiger'?'虎赢':'平局';
        
        document.getElementById('result').textContent = resTxt;
        if(res === selected) {
            balance += win;
            document.getElementById('balance').textContent = balance.toFixed(2);
        }
        
        isRunning = false;
        if(autoMode) setTimeout(startGame, speed===3?1500:speed===2?2500:3500);
    }, 15000);
}

// 自动模式
function toggleAuto() {
    autoMode = !autoMode;
    let btn = document.getElementById('auto-btn');
    btn.classList.toggle('active');
    btn.textContent = autoMode?'关闭自动':'自动投注';
}

// 切换速度
function toggleSpeed() {
    speed = (speed%3)+1;
    document.querySelectorAll('.speed-btn span').forEach(s => s.classList.remove('active'));
    document.getElementById(`s${speed}`).classList.add('active');
}
</script>
</body>
</html>
