<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>潮汕葫芦鱼·二十人房 | 抢庄机制 + 骰盅慢启</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1a120c;
            background-image: radial-gradient(circle at 20% 30%, rgba(200, 140, 70, 0.15) 2%, transparent 2.5%);
            background-size: 28px 28px;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app {
            max-width: 550px;
            width: 100%;
            height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            padding: 10px;
            box-sizing: border-box;
        }

        .game-card {
            background: linear-gradient(145deg, #362a1f 0%, #251e16 100%);
            border-radius: 48px;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 210, 120, 0.2);
            overflow: hidden;
        }

        .game-header {
            background: linear-gradient(135deg, #b85a2e, #7a3116);
            padding: 10px 16px;
            text-align: center;
            border-bottom: 3px solid #f7bc6c;
        }
        .game-header h1 {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ffefcf;
            text-shadow: 2px 2px 0 #56200c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .sub {
            font-size: 0.55rem;
            color: #ffdd99;
            background: #4e2613b3;
            display: inline-block;
            padding: 2px 12px;
            border-radius: 40px;
            margin-top: 4px;
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 12px;
            background: #1f1711;
            border-bottom: 1px solid #644a33;
        }
        .stat-card {
            background: #1a130d;
            border-radius: 40px;
            padding: 4px 8px;
            flex: 1;
            text-align: center;
        }
        .stat-label {
            font-size: 0.55rem;
            color: #e2bc89;
        }
        .stat-value {
            font-size: 1.1rem;
            font-weight: 800;
            color: #f9d792;
            line-height: 1.2;
            font-family: monospace;
        }

        .dice-area {
            background: #2a211a;
            margin: 8px 12px;
            border-radius: 50px;
            padding: 10px;
            text-align: center;
            box-shadow: inset 0 0 0 2px #5e4230, 0 6px 12px black;
            position: relative;
        }
        .dice-title {
            font-size: 0.65rem;
            color: #f5c28e;
            margin-bottom: 6px;
        }
        .dice-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            position: relative;
        }
        .dice {
            background: #fff2df;
            width: 55px;
            height: 55px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            box-shadow: 0 5px 0 #926b42;
            border: 1px solid #e5b874;
        }
        .dice-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.85), #2c1e14);
            backdrop-filter: blur(6px);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 15;
            transition: all 0.5s cubic-bezier(0.34, 1.1, 0.55, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,215,150,0.3);
            border: 2px solid #cb9e6b;
        }
        .dice-cover span {
            font-size: 2.5rem;
            filter: drop-shadow(2px 4px 6px black);
        }
        .dice-cover .cover-text {
            font-size: 0.6rem;
            background: #00000099;
            padding: 2px 12px;
            border-radius: 30px;
            margin-top: 6px;
            color: #ffdd99;
        }
        .dice-cover.open-cover {
            transform: translateY(-80px) scale(0.6);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .dice-cover.hidden-cover {
            display: none;
        }

        .bet-sections {
            padding: 0 10px 6px 10px;
        }
        .section-title {
            font-size: 0.7rem;
            color: #ffd49f;
            margin: 6px 0 4px 4px;
            border-left: 4px solid #f7b05e;
            padding-left: 8px;
        }
        .bet-grid, .special-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }
        .bet-card {
            background: #1f1712;
            border-radius: 28px;
            padding: 4px 2px;
            text-align: center;
            box-shadow: 0 3px 0 #0a0705;
            border: 1px solid #6f4f34;
        }
        .bet-icon {
            font-size: 1.5rem;
            background: #2f231c;
            width: 38px;
            height: 38px;
            line-height: 38px;
            margin: 0 auto 3px;
            border-radius: 50%;
        }
        .bet-name {
            font-size: 0.65rem;
            font-weight: bold;
            color: #ffddb0;
        }
        .bet-odds {
            font-size: 0.5rem;
            color: #dba959;
        }
        .bet-amount {
            background: #0c0907;
            border-radius: 40px;
            padding: 2px 3px;
            margin: 4px 3px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2px;
        }
        .bet-amount span {
            color: #ffbc6e;
            font-size: 0.7rem;
            background: #2a1c12;
            padding: 1px 4px;
            border-radius: 30px;
            min-width: 32px;
        }
        .btn-chip {
            background: #523b26;
            border: none;
            color: #fce2b4;
            font-weight: bold;
            width: 24px;
            height: 24px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 1px 2px black;
        }
        .btn-chip:active { transform: scale(0.92); }

        .chip-bar {
            background: #2a1f16;
            margin: 4px 12px 8px;
            padding: 5px 8px;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chip {
            background: #ebbc7e;
            color: #3a240f;
            font-weight: bold;
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 2px 0 #8b5a2e;
        }
        .chip:active { transform: translateY(2px); box-shadow: none; }
        .chip.selected { background: #f7c56e; box-shadow: 0 0 0 1px #ffefb0, 0 2px 0 #7a4b22; }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 4px 12px 12px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #734c2e;
            border: none;
            padding: 5px 14px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 40px;
            color: #ffe3b3;
            box-shadow: 0 3px 0 #3f2a1a;
            cursor: pointer;
        }
        .action-btn.primary { background: #c47c3a; color: #2f1b0a; box-shadow: 0 3px 0 #764e26; }
        .action-btn:active { transform: translateY(2px); box-shadow: none; }

        .message-area {
            background: #1c140e;
            margin: 0 12px 12px;
            border-radius: 40px;
            padding: 6px 10px;
            font-size: 0.65rem;
            color: #dbbc8c;
            text-align: center;
            min-height: 48px;
        }

        .admin-card {
            background: #1e1813;
            border-radius: 48px;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }
        .admin-header {
            background: #4a3322;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .admin-header h3 {
            color: #ffefcf;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toggle-btn {
            background: #7a5a3e;
            border: none;
            color: white;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
        }
        .admin-content {
            padding: 10px;
            transition: 0.2s;
        }
        .admin-content.collapsed {
            display: none;
        }
        .capacity-row {
            background: #1f1712;
            border-radius: 40px;
            padding: 6px 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }
        .capacity-control {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .capacity-control label {
            font-size: 0.65rem;
            color: #f5cf9b;
        }
        #maxSeatsInput {
            width: 50px;
            padding: 3px;
            border-radius: 30px;
            background: #35281d;
            color: #ffdfb3;
            text-align: center;
            border: none;
            font-size: 0.7rem;
        }
        .stat-badge {
            background: #00000066;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.65rem;
            color: #ffd68a;
        }
        .seats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin: 10px 0;
        }
        .seat-card {
            background: #1a130d;
            border-radius: 20px;
            padding: 5px 2px;
            text-align: center;
            border: 1px solid #6f4f34;
        }
        .seat-card.occupied {
            background: #2f4127;
            border-color: #b9a06a;
        }
        .seat-number {
            font-size: 0.55rem;
            color: #dba24b;
            background: #00000055;
            display: inline-block;
            padding: 1px 5px;
            border-radius: 20px;
        }
        .player-name {
            font-weight: bold;
            font-size: 0.65rem;
            margin: 3px 0;
            color: #ffefcf;
            white-space: nowrap;
            overflow-x: hidden;
            text-overflow: ellipsis;
        }
        .seat-action {
            background: #5f3e28;
            border: none;
            color: #ffddb0;
            padding: 2px 6px;
            border-radius: 30px;
            font-size: 0.55rem;
            cursor: pointer;
            margin-top: 2px;
        }
        .empty-seat .seat-action {
            background: #3f2c1d;
        }
        .admin-buttons {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .admin-btn {
            background: #5f462f;
            border: none;
            padding: 4px 10px;
            border-radius: 40px;
            color: #ffe3b3;
            font-size: 0.65rem;
            font-weight: bold;
            flex: 1;
            text-align: center;
            cursor: pointer;
        }
        .admin-btn.charge {
            background: #2e7d32;
            color: #fff;
            box-shadow: 0 2px 0 #1b5e20;
        }
        .admin-btn.banker {
            background: #b85a2e;
        }
        footer {
            font-size: 0.5rem;
            text-align: center;
            padding: 6px;
            color: #aa8259;
        }
        @media (max-width: 480px) {
            .dice { width: 48px; height: 48px; font-size: 1.8rem; }
            .bet-icon { width: 34px; height: 34px; line-height: 34px; font-size: 1.2rem; }
            .btn-chip { width: 22px; height: 22px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="game-card">
        <div class="game-header">
            <h1><span>🎲</span> 潮汕葫芦鱼 · 二十人房 <span>🦐</span></h1>
            <div class="sub">六门 | 大小单双 | 全围24倍 | 骰盅慢启 | 可抢庄</div>
        </div>
        <div class="stats-panel">
            <div class="stat-card"><div class="stat-label">👑 当前庄家</div><div class="stat-value" id="bankerName">系统庄家</div></div>
            <div class="stat-card"><div class="stat-label">💰 庄家余额</div><div class="stat-value" id="balanceValue">10000</div></div>
            <div class="stat-card"><div class="stat-label">🏆 上局净利</div><div class="stat-value" id="lastWin">0</div></div>
        </div>
        <div class="dice-area" id="diceArea">
            <div class="dice-title">⚡ 三骰开彩 · 鱼虾蟹葫芦金钱鸡 ⚡</div>
            <div class="dice-box" id="diceContainer">
                <div class="dice">🎲</div>
                <div class="dice">🎲</div>
                <div class="dice">🎲</div>
            </div>
            <div class="dice-cover" id="diceCover">
                <span>🏺</span>
                <div class="cover-text">骰盅未开</div>
            </div>
        </div>
        <div class="bet-sections">
            <div class="section-title">🐟 六门押注 (按次数赔)</div>
            <div class="bet-grid" id="patternGrid"></div>
            <div class="section-title">🎯 特殊投注</div>
            <div class="special-grid" id="specialGrid"></div>
        </div>
        <div class="chip-bar" id="chipBar">
            <div class="chip" data-chip="20">20</div>
            <div class="chip" data-chip="50">50</div>
            <div class="chip" data-chip="100">100</div>
            <div class="chip" data-chip="500">500</div>
            <div class="chip" data-chip="1000">1k</div>
        </div>
        <div class="action-bar">
            <button class="action-btn primary" id="rollBtn">🎲 开骰！</button>
            <button class="action-btn" id="resetBetBtn">🧹 清空下注</button>
            <button class="action-btn" id="resetGameBtn">💺 重置庄家</button>
        </div>
        <div class="message-area" id="msgArea">庄家坐镇 | 点击玩家座位「抢庄」可成为新庄家</div>
    </div>

    <div class="admin-card">
        <div class="admin-header" id="adminHeader">
            <h3>🎛️ 二十人座席 · 抢庄入口</h3>
            <button class="toggle-btn" id="toggleAdminBtn">▼ 收起</button>
        </div>
        <div class="admin-content" id="adminContent">
            <div class="capacity-row">
                <div class="capacity-control">
                    <label>🏠 最大座位</label>
                    <input type="number" id="maxSeatsInput" min="1" max="20" value="20" step="1">
                    <button class="admin-btn" id="applyCapacityBtn" style="padding: 3px 8px;">设置</button>
                </div>
                <div class="stat-badge" id="roomStats">👥 0 / 20</div>
            </div>
            <div class="seats-grid" id="seatsGrid"></div>
            <div class="admin-buttons">
                <button class="admin-btn" id="addRandomPlayerBtn">➕ 随机加入</button>
                <button class="admin-btn" id="clearAllPlayersBtn">🗑️ 清空</button>
                <button class="admin-btn" id="fillExampleBtn">🎲 示例8人</button>
            </div>
            <footer>点击座位上的「抢庄」按钮 → 互换余额，成为新庄家</footer>
        </div>
    </div>
</div>

<script>
    // ========== 游戏核心 (庄家可变 + 抢庄机制) ==========
    const STORAGE_BANKER = 'chaoshan_banker';
    const STORAGE_BANKER_BAL = 'chaoshan_banker_balance';
    const STORAGE_PLAYERS = 'chaoshan_players_list';
    const STORAGE_PLAYER_BALS = 'chaoshan_player_balances';
    
    // 当前庄家信息
    let currentBanker = localStorage.getItem(STORAGE_BANKER) || "系统庄家";
    let bankerBalance = parseInt(localStorage.getItem(STORAGE_BANKER_BAL)) || 10000;
    
    const PATTERNS = [
        { id: "fish", name: "鱼", icon: "🐟", value: 1 },
        { id: "shrimp", name: "虾", icon: "🦐", value: 2 },
        { id: "crab", name: "蟹", icon: "🦀", value: 3 },
        { id: "calabash", name: "葫芦", icon: "🏺", value: 4 },
        { id: "coin", name: "金钱", icon: "💰", value: 5 },
        { id: "chicken", name: "鸡", icon: "🐔", value: 6 }
    ];
    const patternIdToName = { fish:"鱼", shrimp:"虾", crab:"蟹", calabash:"葫芦", coin:"金钱", chicken:"鸡" };
    const SPECIALS = [
        { id: "big", name: "大", icon: "🔴", odds: 1 },
        { id: "small", name: "小", icon: "🔵", odds: 1 },
        { id: "odd", name: "单", icon: "⚪", odds: 1 },
        { id: "even", name: "双", icon: "⚫", odds: 1 },
        { id: "allTriplets", name: "全围", icon: "🌀", odds: 24 }
    ];

    let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
    let specialBets = { big:0, small:0, odd:0, even:0, allTriplets:0 };
    let currentChip = 100;
    let lastWinAmount = 0;
    let isRolling = false;
    let isCoverAnimating = false;

    const bankerNameSpan = document.getElementById("bankerName");
    const balanceEl = document.getElementById("balanceValue");
    const totalBetEl = document.getElementById("totalBetValue");
    const lastWinEl = document.getElementById("lastWin");
    const msgArea = document.getElementById("msgArea");
    const diceCover = document.getElementById("diceCover");
    const rollBtn = document.getElementById("rollBtn");

    function persistBanker() {
        localStorage.setItem(STORAGE_BANKER, currentBanker);
        localStorage.setItem(STORAGE_BANKER_BAL, bankerBalance);
    }
    function updateBankerUI() {
        bankerNameSpan.innerText = currentBanker;
        balanceEl.innerText = Math.floor(bankerBalance);
        persistBanker();
    }
    function getTotalBet() {
        let p = Object.values(patternBets).reduce((a,b)=>a+b,0);
        let s = Object.values(specialBets).reduce((a,b)=>a+b,0);
        return p+s;
    }
    function updateStatsUI() {
        balanceEl.innerText = Math.floor(bankerBalance);
        totalBetEl.innerText = getTotalBet();
        lastWinEl.innerText = lastWinAmount;
        updateBankerUI();
    }
    function updateAllBetUI() {
        for(let id of Object.keys(patternBets)) {
            let span = document.getElementById(`bet_${id}`);
            if(span) span.innerText = patternBets[id];
        }
        for(let id of Object.keys(specialBets)) {
            let span = document.getElementById(`bet_special_${id}`);
            if(span) span.innerText = specialBets[id];
        }
        updateStatsUI();
    }
    let msgTimeout = null;
    function showMsg(msg, duration=2000) {
        if(msgTimeout) clearTimeout(msgTimeout);
        msgArea.innerText = msg;
        msgTimeout = setTimeout(() => {
            if(msgArea.innerText === msg) msgArea.innerText = "🎲 点击开骰 | 玩家可抢庄";
        }, duration);
    }

    function addBet(type, id, val) {
        let target = (type === 'pattern') ? patternBets : specialBets;
        if(target[id] === undefined) return;
        let totalNow = getTotalBet();
        if(totalNow + val > bankerBalance) { showMsg(`庄家余额不足，无法加注 ${val}`); return; }
        target[id] += val;
        updateAllBetUI();
        let name = (type === 'pattern') ? patternIdToName[id] : SPECIALS.find(s=>s.id===id)?.name || id;
        showMsg(`➕ ${name} +${val}`, 800);
    }
    function subBet(type, id, val) {
        let target = (type === 'pattern') ? patternBets : specialBets;
        if(target[id] === undefined) return;
        let old = target[id];
        let newVal = Math.max(0, old - val);
        if(old !== newVal) {
            target[id] = newVal;
            updateAllBetUI();
            let name = (type === 'pattern') ? patternIdToName[id] : SPECIALS.find(s=>s.id===id)?.name || id;
            showMsg(`➖ ${name} -${val}`, 800);
        }
    }
    function clearAllBets() {
        for(let k of Object.keys(patternBets)) patternBets[k]=0;
        for(let k of Object.keys(specialBets)) specialBets[k]=0;
        updateAllBetUI();
        showMsg("清空所有下注");
    }
    
    function resetDiceCover() {
        if(diceCover) {
            diceCover.classList.remove("open-cover", "hidden-cover");
            diceCover.style.display = "flex";
            diceCover.style.visibility = "visible";
            diceCover.style.opacity = "1";
            diceCover.style.transform = "translateY(0) scale(1)";
        }
    }
    
    function resetGame() {
        bankerBalance = 10000;
        currentBanker = "系统庄家";
        persistBanker();
        clearAllBets();
        lastWinAmount = 0;
        updateStatsUI();
        document.querySelectorAll(".dice").forEach(d => d.innerHTML = "🎲");
        resetDiceCover();
        showMsg("庄家重置为系统庄家，本金 10000 文");
        renderSeats(); // 刷新座位显示（清除所有抢庄标记）
    }

    async function animateRolling(finalPatterns) {
        const diceEls = document.querySelectorAll(".dice");
        const iconMap = { "鱼":"🐟","虾":"🦐","蟹":"🦀","葫芦":"🏺","金钱":"💰","鸡":"🐔" };
        for(let step=0; step<8; step++) {
            await new Promise(r=>setTimeout(r, 70));
            for(let i=0;i<3;i++) {
                let rand = PATTERNS[Math.floor(Math.random()*6)];
                diceEls[i].innerHTML = rand.icon;
            }
        }
        for(let i=0;i<3;i++) {
            diceEls[i].innerHTML = iconMap[finalPatterns[i]] || "🎲";
        }
    }

    function getPointValue(pname) { const m={"鱼":1,"虾":2,"蟹":3,"葫芦":4,"金钱":5,"鸡":6}; return m[pname]||0; }
    
    function settleGame(diceNames) {
        let points = diceNames.map(n=>getPointValue(n));
        let sum = points.reduce((a,b)=>a+b,0);
        let isTriplet = diceNames[0]===diceNames[1] && diceNames[1]===diceNames[2];
        let totalBet = getTotalBet();
        if(totalBet===0) { showMsg("没有下注，无法结算"); return false; }
        if(totalBet > bankerBalance) { showMsg("庄家余额不足，无法开奖"); return false; }
        bankerBalance -= totalBet;
        let winAmount = 0;
        let winDetails = [];
        for(let [pid, betVal] of Object.entries(patternBets)) {
            if(betVal===0) continue;
            let occur = diceNames.filter(n=> n === patternIdToName[pid]).length;
            if(occur>0) {
                let prize = betVal * (occur+1);
                winAmount += prize;
                winDetails.push(`${patternIdToName[pid]} x${occur}`);
            }
        }
        let bigWin=false, smallWin=false, oddWin=false, evenWin=false, allTripletWin=false;
        if(!isTriplet) {
            if(sum>=11 && sum<=17) bigWin=true;
            if(sum>=4 && sum<=10) smallWin=true;
            if(sum%2===1) oddWin=true;
            if(sum%2===0) evenWin=true;
        }
        if(isTriplet) allTripletWin=true;
        if(specialBets.big>0 && bigWin) { winAmount += specialBets.big*2; winDetails.push("大"); }
        if(specialBets.small>0 && smallWin) { winAmount += specialBets.small*2; winDetails.push("小"); }
        if(specialBets.odd>0 && oddWin) { winAmount += specialBets.odd*2; winDetails.push("单"); }
        if(specialBets.even>0 && evenWin) { winAmount += specialBets.even*2; winDetails.push("双"); }
        if(specialBets.allTriplets>0 && allTripletWin) { winAmount += specialBets.allTriplets*25; winDetails.push("全围"); }

        let net = winAmount - totalBet;
        bankerBalance += winAmount;
        lastWinAmount = net;
        updateStatsUI();
        let diceShow = diceNames.join("、");
        if(winAmount>0) showMsg(`🎲 ${diceShow} 净赢+${net}  [${winDetails.join(',')}]`, 4500);
        else showMsg(`😢 ${diceShow} 亏损 ${totalBet}`, 3000);
        clearAllBets();
        return true;
    }

    async function onRollWithCover() {
        if(isRolling || isCoverAnimating) return;
        let total = getTotalBet();
        if(total === 0) { showMsg("请先下注再开骰！"); return; }
        if(total > bankerBalance) { showMsg("庄家余额不足，请减少下注或让其他玩家抢庄"); return; }
        
        if(!diceCover) return;
        if(diceCover.classList.contains("hidden-cover") || diceCover.style.display === "none") {
            resetDiceCover();
        }
        
        isRolling = true;
        isCoverAnimating = true;
        rollBtn.disabled = true;
        
        diceCover.classList.add("open-cover");
        await new Promise(resolve => setTimeout(resolve, 550));
        diceCover.classList.add("hidden-cover");
        diceCover.style.display = "none";
        
        const patternList = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        let finalResult = [
            patternList[Math.floor(Math.random()*6)],
            patternList[Math.floor(Math.random()*6)],
            patternList[Math.floor(Math.random()*6)]
        ];
        await animateRolling(finalResult);
        settleGame(finalResult);
        
        await new Promise(r => setTimeout(r, 1500));
        const diceEls = document.querySelectorAll(".dice");
        diceEls.forEach(d => d.innerHTML = "🎲");
        diceCover.style.display = "flex";
        diceCover.classList.remove("open-cover", "hidden-cover");
        diceCover.style.visibility = "visible";
        diceCover.style.opacity = "1";
        diceCover.style.transform = "translateY(0) scale(1)";
        
        isCoverAnimating = false;
        isRolling = false;
        rollBtn.disabled = false;
        showMsg("骰盅已复位，可继续下注", 1500);
    }
    
    function buildGameUI() {
        const patternContainer = document.getElementById("patternGrid");
        patternContainer.innerHTML="";
        PATTERNS.forEach(p=>{
            let card = document.createElement("div"); card.className="bet-card";
            card.innerHTML = `<div class="bet-icon">${p.icon}</div><div class="bet-name">${p.name}</div><div class="bet-odds">1~3倍</div>
            <div class="bet-amount"><button class="btn-chip sub-pattern" data-id="${p.id}">-</button><span id="bet_${p.id}">0</span><button class="btn-chip add-pattern" data-id="${p.id}">+</button></div>`;
            patternContainer.appendChild(card);
        });
        patternContainer.addEventListener("click",(e)=>{
            if(e.target.classList.contains("add-pattern")) addBet('pattern', e.target.dataset.id, currentChip);
            if(e.target.classList.contains("sub-pattern")) subBet('pattern', e.target.dataset.id, currentChip);
        });
        const specialContainer = document.getElementById("specialGrid");
        specialContainer.innerHTML="";
        SPECIALS.forEach(s=>{
            let card = document.createElement("div"); card.className="bet-card";
            card.innerHTML = `<div class="bet-icon">${s.icon}</div><div class="bet-name">${s.name}</div><div class="bet-odds">${s.odds===1?"1:1":"1:24"}</div>
            <div class="bet-amount"><button class="btn-chip sub-special" data-id="${s.id}">-</button><span id="bet_special_${s.id}">0</span><button class="btn-chip add-special" data-id="${s.id}">+</button></div>`;
            specialContainer.appendChild(card);
        });
        specialContainer.addEventListener("click",(e)=>{
            if(e.target.classList.contains("add-special")) addBet('special', e.target.dataset.id, currentChip);
            if(e.target.classList.contains("sub-special")) subBet('special', e.target.dataset.id, currentChip);
        });
        const chips = document.querySelectorAll(".chip");
        chips.forEach(c=>{
            c.addEventListener("click",()=>{
                let val = parseInt(c.dataset.chip);
                if(!isNaN(val)) { currentChip=val; chips.forEach(cc=>cc.classList.remove("selected")); c.classList.add("selected"); showMsg(`筹码 ${val}`,500); }
            });
        });
        rollBtn.addEventListener("click", onRollWithCover);
        document.getElementById("resetBetBtn").addEventListener("click", clearAllBets);
        document.getElementById("resetGameBtn").addEventListener("click", resetGame);
        let defaultChip = Array.from(chips).find(c=>parseInt(c.dataset.chip)===100);
        if(defaultChip) defaultChip.classList.add("selected");
        currentChip=100;
        updateAllBetUI();
    }

   // ========== 玩家座位管理 + 抢庄 ==========
    let players = [];      // { id, name, seatIndex }
    let nextPlayerId = 100;
    const namePool = ["阿强","老李","虾妹","蟹叔","金钱哥","鸡姐","小陈","骰子手","好运","锦鲤","鱼神","虾兵","蟹将","葫芦仙","铜钱","凤姐","阿珍","闲人","福仔","潮汕仔"];
    let playerBalances = JSON.parse(localStorage.getItem(STORAGE_PLAYER_BALS)) || {};
    function savePlayerBalances() { localStorage.setItem(STORAGE_PLAYER_BALS, JSON.stringify(playerBalances)); }
    function getPlayerBalance(name) { return playerBalances[name] || 1000; }
    function setPlayerBalance(name, amt) { playerBalances[name] = Math.max(0, amt); savePlayerBalances(); }
    function addPlayerBalance(name, delta) { let cur = getPlayerBalance(name); setPlayerBalance(name, cur + delta); }

    let maxSeats = 20;
    function renderSeats() {
        const container = document.getElementById("seatsGrid");
        if(!container) return;
        container.innerHTML = "";
        for(let i=1; i<=maxSeats; i++) {
            const player = players.find(p => p.seatIndex === i);
            const isOccupied = !!player;
            const seatDiv = document.createElement("div");
            seatDiv.className = `seat-card ${isOccupied ? "occupied" : "empty-seat"}`;
            if(isOccupied) {
                let bal = getPlayerBalance(player.name);
                let isCurrentBanker = (currentBanker === player.name);
                seatDiv.innerHTML = `
                    <div class="seat-number">#${i}</div>
                    <div class="player-name" title="${escapeHtml(player.name)}">${escapeHtml(player.name.length>6?player.name.slice(0,5)+"..":player.name)}<br><span style="font-size:0.55rem;">💰${bal}</span>${isCurrentBanker?' 👑':''}</div>
                    <div style="display:flex; gap:4px; justify-content:center;">
                        <button class="seat-action remove-player" data-seat="${i}">移除</button>
                        <button class="seat-action grab-banker" data-seat="${i}" style="background:#b85a2e;">抢庄</button>
                    </div>
                `;
            } else {
                seatDiv.innerHTML = `<div class="seat-number">#${i}</div><div class="player-name">🔲 空闲</div><button class="seat-action add-to-seat" data-seat="${i}">邀请</button>`;
            }
            container.appendChild(seatDiv);
        }
        document.getElementById("roomStats").innerHTML = `👥 ${players.length} / ${maxSeats}`;
        // 绑定事件
        document.querySelectorAll(".remove-player").forEach(btn => {
            btn.addEventListener("click", (e) => { let seat = parseInt(btn.dataset.seat); removePlayerBySeat(seat); });
        });
        document.querySelectorAll(".add-to-seat").forEach(btn => {
            btn.addEventListener("click", (e) => { let seat = parseInt(btn.dataset.seat); addPlayerToSeat(seat); });
        });
        document.querySelectorAll(".grab-banker").forEach(btn => {
            btn.addEventListener("click", (e) => { let seat = parseInt(btn.dataset.seat); grabBanker(seat); });
        });
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // 抢庄核心逻辑
    function grabBanker(seatIndex) {
        const player = players.find(p => p.seatIndex === seatIndex);
        if(!player) { showMsg("该座位没有玩家", 1000); return; }
        if(currentBanker === player.name) { showMsg("已经是当前庄家，无需抢庄", 1000); return; }
        // 检查玩家余额是否足够（至少1000）
        let playerMoney = getPlayerBalance(player.name);
        if(playerMoney < 500) { showMsg(`${player.name} 余额不足500，无法抢庄`, 1500); return; }
        // 交换庄家和玩家的余额
        let oldBankerMoney = bankerBalance;
        let newBankerMoney = playerMoney;
        // 更新余额
        bankerBalance = newBankerMoney;
        setPlayerBalance(player.name, oldBankerMoney);
        // 更新庄家名称
        let oldBankerName = currentBanker;
        currentBanker = player.name;
        persistBanker();
        // 如果原庄家不是系统庄家且不是任何一个玩家（原庄家是玩家）则保留其玩家身份；如果是系统庄家，则不做处理
        if(oldBankerName !== "系统庄家") {
            // 原庄家可能已经是一个玩家（已坐在某个座位），但余额已交换，无需额外操作
            // 如果原庄家不在玩家列表中，则将其添加为一个新玩家（理论上原庄家应该已存在，但安全处理）
            if(!players.some(p => p.name === oldBankerName) && oldBankerName !== "系统庄家") {
                // 找一个空闲座位添加
                let emptySeat = null;
                for(let i=1;i<=maxSeats;i++) if(!players.find(p=>p.seatIndex===i)) { emptySeat=i; break; }
                if(emptySeat) {
                    players.push({ id: nextPlayerId++, name: oldBankerName, seatIndex: emptySeat });
                    if(!playerBalances[oldBankerName]) setPlayerBalance(oldBankerName, oldBankerMoney);
                    showMsg(`原庄家 ${oldBankerName} 已入座 ${emptySeat} 号座位`, 1500);
                } else {
                    showMsg(`原庄家 ${oldBankerName} 无空闲座位，暂未入座`, 1500);
                }
            }
        }
        updateStatsUI();
        renderSeats();
        showMsg(`✨ ${player.name} 抢庄成功！成为新庄家，余额 ${newBankerMoney}`, 2000);
    }
    
    function addPlayerToSeat(seatIndex) {
        if(players.find(p=>p.seatIndex===seatIndex)) { showMsg(`座位 ${seatIndex} 已占用`, 1000); return; }
        if(players.length >= maxSeats) { showMsg(`房间已满 (最大${maxSeats}人)`, 1000); return; }
        let randomName = namePool[Math.floor(Math.random() * namePool.length)] + (Math.floor(Math.random()*90)+10);
        if(!playerBalances[randomName]) setPlayerBalance(randomName, 1000);
        let newPlayer = { id: nextPlayerId++, name: randomName, seatIndex: seatIndex };
        players.push(newPlayer);
        renderSeats();
        showMsg(`✨ ${randomName} 入座 ${seatIndex} 号 (余额: ${getPlayerBalance(randomName)})`, 1200);
    }
    function removePlayerBySeat(seatIndex) {
        let idx = players.findIndex(p=>p.seatIndex===seatIndex);
        if(idx !== -1) {
            let removed = players[idx];
            players.splice(idx,1);
            renderSeats();
            showMsg(`🚪 ${removed.name} 离开 ${seatIndex} 号`, 1200);
        }
    }
    function addRandomPlayer() {
        if(players.length >= maxSeats) { showMsg(`房间已满`, 1000); return; }
        let emptySeats = [];
        for(let i=1;i<=maxSeats;i++) if(!players.find(p=>p.seatIndex===i)) emptySeats.push(i);
        if(emptySeats.length===0) return;
        let randomSeat = emptySeats[Math.floor(Math.random()*emptySeats.length)];
        addPlayerToSeat(randomSeat);
    }
    function clearAllPlayers() { players = []; renderSeats(); showMsg(`清空所有玩家`, 1000); }
    function fillExamplePlayers() {
        clearAllPlayers();
        let count = Math.min(8, maxSeats);
        let usedSeats = new Set();
        for(let i=0;i<count;i++) {
            let seat = 1;
            while(usedSeats.has(seat)) seat = (seat % maxSeats) + 1;
            usedSeats.add(seat);
            let name = namePool[i % namePool.length] + (Math.floor(Math.random()*100));
            if(!playerBalances[name]) setPlayerBalance(name, 1000);
            players.push({ id: nextPlayerId++, name: name, seatIndex: seat });
        }
        renderSeats();
        showMsg(`示例填充 ${players.length} 位玩家`, 1200);
    }
    function applyMaxCapacity() {
        let newMax = parseInt(document.getElementById("maxSeatsInput").value);
        if(isNaN(newMax)) newMax=20;
        newMax = Math.min(20, Math.max(1, newMax));
        maxSeats = newMax;
        players = players.filter(p => p.seatIndex <= maxSeats);
        renderSeats();
        showMsg(`最大座位调整为 ${maxSeats}`, 1000);
    }

    function initAdmin() {
        renderSeats();
        document.getElementById("applyCapacityBtn").addEventListener("click", applyMaxCapacity);
        document.getElementById("addRandomPlayerBtn").addEventListener("click", addRandomPlayer);
        document.getElementById("clearAllPlayersBtn").addEventListener("click", clearAllPlayers);
        document.getElementById("fillExampleBtn").addEventListener("click", fillExamplePlayers);
        let collapsed = false;
        const adminContent = document.getElementById("adminContent");
        const toggleBtn = document.getElementById("toggleAdminBtn");
        toggleBtn.addEventListener("click",()=>{
            collapsed = !collapsed;
            if(collapsed) { adminContent.classList.add("collapsed"); toggleBtn.innerText = "▼ 展开"; }
            else { adminContent.classList.remove("collapsed"); toggleBtn.innerText = "▼ 收起"; }
        });
        fillExamplePlayers();
    }
    
    buildGameUI();
    initAdmin();
    updateStatsUI();
    resetDiceCover();
</script>
