<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>量化终端 · 暗铸转盘</title>
    <style>
        /* 1. 复刻 27416 的深色科技感网格背景 */
        body { 
            background: #111419; color: #fff; font-family: sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            background-image: linear-gradient(rgba(45, 62, 52, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(45, 62, 52, 0.2) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        /* 2. 复刻顶部 0.00 余额卡片 (图 27416) */
        .header-card { 
            background: #1c2229; margin: 15px; padding: 25px; border-radius: 24px; text-align: center; 
            border: 1px solid #2d3e34; box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }
        .bal-val { font-size: 65px; color: #ff5a5a; font-weight: bold; letter-spacing: -2px; }
        .bet-info { color: #f1c40f; font-size: 14px; margin-top: 5px; }

        /* 3. 复刻 8 神兽转盘 (图 27416) */
        .wheel-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #wheel { 
            width: 330px; height: 330px; border-radius: 50%; border: 15px solid #233129;
            background: conic-gradient(#ff4d4d 0 45deg, #f1c40f 45deg 90deg, #3498db 90deg 135deg, #9b59b6 135deg 180deg, #2ecc71 180deg 225deg, #e67e22 225deg 270deg, #1abc9c 270deg 315deg, #444 315deg 360deg);
            transition: transform 5s cubic-bezier(0.1, 0.9, 0.3, 1); position: relative;
        }
        /* 中心 X0 标识 */
        #wheel::after { content: "X0"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: #1c2229; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ff5a5a; font-weight: bold; font-size: 24px; border: 4px solid #233129; }
        .pointer { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 35px solid #ff0000; z-index: 10; }
        .tag { position: absolute; width: 100%; height: 100%; text-align: center; font-size: 12px; font-weight: bold; padding-top: 30px; box-sizing: border-box; color: #fff; text-shadow: 1px 1px 2px #000; }

        /* 4. 复刻底部控制区 (图 27416) */
        .footer { background: #1c2229; padding: 20px; border-top: 1px solid #2d3e34; }
        .btn-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .side-btn { width: 50px; height: 50px; background: #233129; border-radius: 15px; color: #f1c40f; font-size: 24px; display: flex; align-items: center; justify-content: center; border: 1px solid #2d3e34; }
        .main-btn { background: #cc2929; color: #fff; padding: 18px 80px; border-radius: 40px; font-size: 24px; font-weight: bold; border: none; box-shadow: 0 6px 0 #801a1a; }
        .status-row { display: flex; justify-content: space-around; font-size: 12px; color: #8aa095; margin-bottom: 15px; }
        .nav { display: flex; justify-content: space-around; padding: 10px; background: #000; font-size: 11px; color: #8aa095; }
    </style>
</head>
<body>

    <div class="header-card">
        <div style="color:#8aa095; font-size:14px;">💰 可用余额 (USDT)</div>
        <div class="bal-val">0.00</div>
        <div class="bet-info">🔥 单注额度: 5.5</div>
    </div>

    <div class="wheel-wrap">
        <div class="pointer"></div>
        <div id="wheel">
            <div class="tag" style="transform:rotate(22.5deg)">🐺 孤狼</div>
            <div class="tag" style="transform:rotate(67.5deg)">🦢 仙鹤</div>
            <div class="tag" style="transform:rotate(112.5deg)">🐢 玄武</div>
            <div class="tag" style="transform:rotate(157.5deg)">🦅 大鹏</div>
            <div class="tag" style="transform:rotate(202.5deg)">🐯 猛虎</div>
            <div class="tag" style="transform:rotate(247.5deg)">🦄 麒麟</div>
            <div class="tag" style="transform:rotate(292.5deg)">🐲 神龙</div>
            <div class="tag" style="transform:rotate(337.5deg)">🔥 凤凰</div>
        </div>
    </div>

    <div class="footer">
        <div class="btn-row">
            <div class="side-btn">−</div>
            <button class="main-btn" onclick="alert('余额不足，请联系客服')">▶ 执行抽取</button>
            <div class="side-btn">+</div>
        </div>
        <div class="status-row">
            <span>🤖 自动模式：关</span>
            <span>⚡ 变速：1X</span>
        </div>
    </div>

    <div class="nav">
        <span>📈 行情</span><span>💹 资产中心</span><span>📜 历史记录</span><span style="color:#fff">🎚️ 量化终端</span>
    </div>

</body>
</html>
