<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZH_FINAL_STABLE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #FFD700; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; }
        
        /* 顶部监控 */
        .hud { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px; background: #111; font-size: 11px; border-bottom: 2px solid #FFD700; z-index: 1000; }
        .hud b { color: #0f0; }

        /* 余额显示 */
        .bal-v { font-size: 52px; font-weight: 900; margin-bottom: 30px; text-shadow: 0 0 20px #FFD700; }

        /* 转盘外框 */
        .wheel-outer { width: 380px; height: 380px; position: relative; border: 12px solid #FFD700; border-radius: 50%; background: radial-gradient(circle, #300, #000); box-shadow: 0 0 50px rgba(255,215,0,0.4); }
        .pointer { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 45px solid #FF4500; z-index: 100; filter: drop-shadow(0 4px 4px #000); }
        
        /* 旋转的主体：采用简单旋转，不带任何子组件偏移 */
        .wheel-main { width: 100%; height: 100%; position: relative; transition: transform 4.5s cubic-bezier(0.1, 0, 0, 1.05); border-radius: 50%; }

        /* 重点：将图标和文字锁定在一个坐标系内 */
        .item-slot {
            position: absolute; width: 100px; height: 100%;
            left: 50%; margin-left: -50px;
            display: flex; flex-direction: column; align-items: center;
            transform-origin: center center;
        }
        .item-slot img { width: 68px; height: 68px; border-radius: 50%; border: 2px solid #FFD700; background: #111; margin-top: 25px; box-shadow: 0 4px 8px #000; }
        .item-slot span { font-size: 13px; font-weight: bold; color: #FFD700; margin-top: 6px; text-shadow: 2px 2px 4px #000; width: 120px; text-align: center; }

        /* 中心按钮 */
        .btn-start { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95px; height: 95px; border-radius: 50%; background: #008000; border: 4px solid #fff; color: #fff; font-size: 18px; font-weight: bold; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 8px 0 #004d00, 0 15px 30px rgba(0,0,0,0.5); }
        .btn-start:active { transform: translate(-50%, -50%) translateY(8px); box-shadow: 0 2px 0 #003300; }

        /* 赔率表钉死在右下角 */
        .odds-float { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: #FFD700; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; border: 3px solid #fff; z-index: 500; box-shadow: 0 5px 15px #000; }
    </style>
</head>
<body>
    <div class="hud">
        <span>RTP: <b id="r_rtp">0%</b></span>
        <span>投: <b id="r_in">0</b></span>
        <span>付: <b id="r_out">0</b></span>
    </div>

    <div class="bal-v" id="v_bal">89,037.00</div>

    <div class="wheel-outer">
        <div class="pointer"></div>
        <div class="wheel-main" id="wheel">
            <!-- 每一格锁定一个旋转角度，图标+文字绝对同步 -->
            <div class="item-slot" style="transform: rotate(0deg);"><img src="https://img.icons8.com/color/96/tiger.png"><span>情侣路·长久</span></div>
            <div class="item-slot" style="transform: rotate(45deg);"><img src="https://img.icons8.com/color/96/lion.png"><span>渔女灯·点亮</span></div>
            <div class="item-slot" style="transform: rotate(90deg);"><img src="https://img.icons8.com/color/96/wolf.png"><span>日月贝·双喜</span></div>
            <div class="item-slot" style="transform: rotate(135deg);"><img src="https://img.icons8.com/emoji/96/sparkles.png"><span>幸福城·乐中</span></div>
            <div class="item-slot" style="transform: rotate(180deg);"><img src="https://img.icons8.com/color/96/dog.png"><span>航展云·必得</span></div>
            <div class="item-slot" style="transform: rotate(225deg);"><img src="https://img.icons8.com/emoji/96/ocean.png"><span>浪漫海·无边</span></div>
            <div class="item-slot" style="transform: rotate(270deg);"><img src="https://img.icons8.com/color/96/dolphin.png"><span>横琴风·生财</span></div>
            <div class="item-slot" style="transform: rotate(315deg);"><img src="https://img.icons8.com/emoji/96/coffee.png"><span>慢生活·得意</span></div>
        </div>
        <div class="btn-start" onclick="spin()">START<br>珠海</div>
    </div>

    <div class="odds-float" onclick="alert('珠海祝贺·赔率表\n老虎X88 | 狮子X50 | 狼X20\n狗狗X10 | 海豚X120\n祝您浪漫珠海，好运常在！')">赔率表</div>

    <script>
        let b=89037.00, ti=0, to=0, r=0, busy=false;
        const cfg = [{d:0,v:88},{d:45,v:50},{d:90,v:20},{d:135,v:0},{d:180,v:10},{d:225,v:0},{d:270,v:120},{d:315,v:0}];
        
        function spin() {
            if(busy || b<1) return; busy=true; ti++; b--;
            // PB控盘：RTP控制在90%
            let pool = cfg.filter(p => (ti>0 && (to/ti)>0.9) ? p.v<=5 : true);
            let win = pool[Math.floor(Math.random()*pool.length)];
            let target = (360 - win.d) % 360;
            r += (3600 + target - (r % 360));
            document.getElementById('wheel').style.transform = `rotate(${r}deg)`;
            
            setTimeout(() => {
                to += win.v; b += win.v;
                document.getElementById('v_bal').innerText = b.toFixed(2);
                document.getElementById('r_in').innerText = ti;
                document.getElementById('r_out').innerText = to;
                document.getElementById('r_rtp').innerText = (to/ti*100).toFixed(1) + "%";
                busy = false;
            }, 4600);
        }
    </script>
</body>
</html>
