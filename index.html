<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>量化终端 · 暗铸转盘</title>
    <style>
        /* 1. 复刻深色科技感背景 */
        body { background: #0b0f0d; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-page { 
            display: none; width: 100%; height: 100vh; flex-direction: column; 
            background: #121a16; 
            /* 画出网格底纹 */
            background-image: radial-gradient(#2d3e34 1px, transparent 1px); background-size: 20px 20px; 
        }

        /* 2. 激活码页面 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #1c221e; padding: 40px 25px; border-radius: 20px; border: 11px solid #00ff88; text-align: center; width: 85%; max-width: 350px; }
        .id-val { width: 100%; padding: 15px; background: #fff; color: #000; font-size: 32px; font-weight: bold; border-radius: 10px; border: 4px solid #ff3333; margin: 20px 0; box-sizing: border-box; }
        .btn-red { width: 100%; padding: 18px; background: #ff0000; color: #fff; border: none; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; }

        /* 3. 顶部 0.00 余额区 */
        .header { background: #1a251f; margin: 15px; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #2d3e34; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .bal-val { font-size: 55px; color: #ff6b6b; font-weight: bold; letter-spacing: -2px; }
        
        /* 4. 8个动物彩色转盘 */
        .wheel-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #wheel { 
            width: 320px; height: 320px; border-radius: 50%; border: 12px solid #233129;
            /* 纯代码实现 8 色块 */
            background: conic-gradient(
                #ff4d4d 0deg 45deg, #f1c40f 45deg 90deg, #3498db 90deg 135deg, #9b59b6 135deg 180deg, 
                #2ecc71 180deg 225deg, #e67e22 225deg 270deg, #1abc9c 270deg 315deg, #444 315deg 360deg
            );
            transition: transform 5s cubic-bezier(0.1, 0.9, 0.3, 1);
            position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        /* 中间 X0 标识 */
        #wheel::after { content: "X0"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; background: #1a251f; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ff6b6b; font-weight: bold; font-size: 20px; border: 4px solid #233129; }
        .pointer { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 30px solid #ff0000; z-index: 10; }
        .label { position: absolute; width: 100%; height: 100%; text-align: center; font-size: 11px; font-weight: bold; padding-top: 25px; box-sizing: border-box; color: #fff; text-shadow: 1px 1px 2px #000; pointer-events: none; }

        /* 5. 底部按钮与菜单 */
        .footer { background: #4a1414; padding: 20px; text-align: center; border-top: 2px solid #631b1b; }
        .btn-main { background: #ff4d4d; color: #fff; padding: 18px 80px; border-radius: 40px; font-size: 24px; font-weight: bold; border: none; box-shadow: 0 5px 0 #b33636; cursor: pointer; }
        .nav-bar { display: flex; justify-content: space-around; padding: 10px; background: #000; font-size: 10px; color: #8aa095; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin:0;">确认激活</h2>
            <div class="id-val">179245</div>
            <button class="btn-red" onclick="nav()">确认进入</button>
        </div>
    </div>

    <div id="game-page">
        <div style="text-align:center; padding:10px; color:#f1c40f; font-size:12px;">⚡ 量化终端 · 公平游戏 ⚡</div>
        <div class="header">
            <div style="color:#8aa095; font-size:14px;">💰 可用余额 (USDT)</div>
            <div class="bal-val" id="money">0.00</div>
            <div style="color:#f1c40f; font-size:13px; margin-top:5px;">🔥 单注额度: 5.5</div>
        </div>

        <div class="wheel-wrap">
            <div class="pointer"></div>
            <div id="wheel">
                <div class="label" style="transform:rotate(22.5deg)">🐺 孤狼</div>
                <div class="label" style="transform:rotate(67.5deg)">🦢 仙鹤</div>
                <div class="label" style="transform:rotate(112.5deg)">🐢 玄武</div>
                <div class="label" style="transform:rotate(157.5deg)">🦅 大鹏</div>
                <div class="label" style="transform:rotate(202.5deg)">🐯 猛虎</div>
                <div class="label" style="transform:rotate(247.5deg)">🦄 麒麟</div>
                <div class="label" style="transform:rotate(292.5deg)">🐲 神龙</div>
                <div class="label" style="transform:rotate(337.5deg)">🔥 凤凰</div>
            </div>
        </div>

        <div class="footer">
            <button class="btn-main" onclick="act()">▶ 执行抽取</button>
        </div>
        <div class="nav-bar">
            <span>📈 行情</span><span>💹 资产中心</span><span>📜 历史记录</span><span style="color:#fff;">🎚️ 量化终端</span>
        </div>
    </div>

    <script>
        if (window.location.search.includes('user_id')) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('game-page').style.display = 'flex';
        }

        function nav() {
            window.location.href = window.location.origin + window.location.pathname + "?user_id=179245";
        }

        let b = 0.00; 
        function act() {
            if (b < 5.5) {
                alert("余额不足，请联系客服充值后再试！");
                return;
            }
        }
    </script>
</body>
</html>
