<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_BEAST_ULTRA</title>
    <style>
        :root {
            --jade: #4a7c64; --jade-l: #6b9a85; --jade-d: #2c4a3b;
            --stone: #6b737e; --inner: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            --gold: #f1c40f; --red: #ff4d4d; --blue: #3498db; --tiger: #e67e22; --tie: #9b59b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0c0c0c; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* 整体大外框 */
        .container-outer {
            width: 100vw; height: 100vh; max-width: 480px;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%;
            animation: outerNeonRotate 15s linear infinite;
            padding: 6px;
            border-radius: 18px;
            box-shadow: 0 0 50px rgba(255,255,255,0.6);
        }
        @keyframes outerNeonRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 内部容器 */
        .container {
            width: 100%; height: 100%;
            background: var(--jade);
            border-radius: 15px;
            display: flex; flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* 状态栏：原配色 */
        .header { height: 8%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 8px 12px; }
        .box { background: var(--stone); border: 2px solid var(--jade-d); box-shadow: var(--inner); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        .box span:first-child { font-size: 12px; color: #ccc; letter-spacing: 1px; font-weight: bold; }
        .box span:last-child { font-size: 20px; font-weight: bold; color: var(--gold); text-shadow: 0 0 6px var(--gold); }

        /* 电影级龙虎对战场景 */
        .battle-scene { 
            height: 38%; display: flex; justify-content: center; align-items: center; 
            background: #000; border: 3px solid var(--jade-d); 
            border-radius: 12px; margin: 4px 10px; padding: 10px 0;
            position: relative; overflow: hidden;
            /* 星空背景 */
            background-image: 
                radial-gradient(circle at center, #111 0%, #000 100%),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23333' fill-opacity='.5' fill-rule='evenodd'/%3E%3C/svg%3E");
            background-size: 100% 100%, 50px 50px;
        }
        /* 动态云层背景 */
        .scene-clouds {
            position: absolute; width: 200%; height: 200%;
            background: linear-gradient(90deg, rgba(30,30,50,0) 0%, rgba(30,30,50,0.2) 50%, rgba(30,30,50,0) 100%);
            animation: cloudMove 20s linear infinite;
            z-index: 1;
        }
        @keyframes cloudMove {
            0% { transform: translateX(-50%) translateY(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) translateY(-50%) rotate(360deg); }
        }

        /* 对战双方光效 */
        .scene-light {
            position: absolute; width: 300px; height: 300px;
            border-radius: 50%; filter: blur(80px);
            animation: lightPulse 3s ease infinite alternate;
            z-index: 2;
        }
        .light-left { left: -100px; top: 50%; transform: translateY(-50%); background: rgba(52,152,219,0.4); }
        .light-right { right: -100px; top: 50%; transform: translateY(-50%); background: rgba(230,126,34,0.4); }
        @keyframes lightPulse {
            0% { opacity: 0.3; transform: translateY(-50%) scale(1); }
            100% { opacity: 0.7; transform: translateY(-50%) scale(1.2); }
        }

        /* 3D龙角色：带残影+呼吸光效 */
        .dragon {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            width: 120px; height: 120px;
            animation: dragonCharge 8s ease infinite;
            z-index: 10;
        }
        .dragon-icon { font-size: 90px; color: var(--blue); 
            filter: drop-shadow(0 0 15px var(--blue)) drop-shadow(0 0 30px rgba(52,152,219,0.5));
            animation: dragonAttack 8s ease infinite;
        }
        /* 龙残影特效 */
        .dragon:after {
            content: '🐉';
            position: absolute; left: 0; top: 0; font-size: 90px;
            color: rgba(52,152,219,0.3);
            filter: blur(5px);
            animation: dragonAfterimage 8s ease infinite;
            z-index: -1;
        }
        @keyframes dragonCharge {
            0% { left: 20px; transform: translateY(-50%) scale(1); opacity: 1; }
            40% { left: 120px; transform: translateY(-50%) scale(1.2); opacity: 1; }
            45% { left: 130px; transform: translateY(-50%) scale(1.3); opacity: 0.8; }
            50% { left: 120px; transform: translateY(-50%) scale(1.2); opacity: 1; }
            60% { left: 100px; transform: translateY(-50%) scale(1.1); opacity: 1; }
            100% { left: 20px; transform: translateY(-50%) scale(1); opacity: 1; }
        }
        @keyframes dragonAttack {
            0% { transform: rotate(0deg); }
            35% { transform: rotate(10deg); }
            45% { transform: rotate(-20deg); }
            55% { transform: rotate(20deg); }
            65% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }
        @keyframes dragonAfterimage {
            0% { left: 0px; top: 0px; opacity: 0; }
            40% { left: 5px; top: 5px; opacity: 0.2; }
            45% { left: 10px; top: 10px; opacity: 0.4; }
            50% { left: 5px; top: 5px; opacity: 0.2; }
            60% { left: 0px; top: 0px; opacity: 0; }
            100% { left: 0px; top: 0px; opacity: 0; }
        }

        /* 3D虎角色：带残影+呼吸光效 */
        .tiger {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 120px; height: 120px;
            animation: tigerCharge 8s ease infinite;
            z-index: 10;
        }
        .tiger-icon { font-size: 90px; color: var(--tiger); 
            filter: drop-shadow(0 0 15px var(--tiger)) drop-shadow(0 0 30px rgba(230,126,34,0.5));
            animation: tigerAttack 8s ease infinite;
        }
        /* 虎残影特效 */
        .tiger:after {
            content: '🐯';
            position: absolute; right: 0; top: 0; font-size: 90px;
            color: rgba(230,126,34,0.3);
            filter: blur(5px);
            animation: tigerAfterimage 8s ease infinite;
            z-index: -1;
        }
        @keyframes tigerCharge {
            0% { right: 20px; transform: translateY(-50%) scale(1); opacity: 1; }
            40% { right: 120px; transform: translateY(-50%) scale(1.2); opacity: 1; }
            45% { right: 130px; transform: translateY(-50%) scale(1.3); opacity: 0.8; }
            50% { right: 120px; transform: translateY(-50%) scale(1.2); opacity: 1; }
            60% { right: 100px; transform: translateY(-50%) scale(1.1); opacity: 1; }
            100% { right: 20px; transform: translateY(-50%) scale(1); opacity: 1; }
        }
        @keyframes tigerAttack {
            0% { transform: rotate(0deg); }
            35% { transform: rotate(-10deg); }
            45% { transform: rotate(20deg); }
            55% { transform: rotate(-20deg); }
            65% { transform: rotate(5deg); }
            100% { transform: rotate(0deg); }
        }
        @keyframes tigerAfterimage {
            0% { right: 0px; top: 0px; opacity: 0; }
            40% { right: 5px; top: 5px; opacity: 0.2; }
            45% { right: 10px; top: 10px; opacity: 0.4; }
            50% { right: 5px; top: 5px; opacity: 0.2; }
            60% { right: 0px; top: 0px; opacity: 0; }
            100% { right: 0px; top: 0px; opacity: 0; }
        }

        /* 电影级碰撞特效 */
        .fight-effect {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,0,0.9), rgba(255,100,0,0.9), rgba(255,0,0,0.9));
            filter: blur(25px);
            opacity: 0;
            animation: fightClash 8s ease infinite;
            z-index: 8;
        }
        /* 冲击波特效 */
        .fight-shockwave {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 0px; height: 0px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.8);
            opacity: 0;
            animation: shockwave 8s ease infinite;
            z-index: 9;
        }
        /* 火花特效 */
        .fight-sparks {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px;
            opacity: 0;
            animation: sparksBurst 8s ease infinite;
            z-index: 11;
        }
        .fight-sparks span {
            position: absolute; width: 5px; height: 5px;
            background: #fff; border-radius: 50%;
            filter: blur(1px);
        }
        .fight-sparks span:nth-child(1) { left: 20%; top: 20%; }
        .fight-sparks span:nth-child(2) { left: 80%; top: 20%; }
        .fight-sparks span:nth-child(3) { left: 20%; top: 80%; }
        .fight-sparks span:nth-child(4) { left: 80%; top: 80%; }
        .fight-sparks span:nth-child(5) { left: 50%; top: 10%; }
        .fight-sparks span:nth-child(6) { left: 50%; top: 90%; }
        .fight-sparks span:nth-child(7) { left: 10%; top: 50%; }
        .fight-sparks span:nth-child(8) { left: 90%; top: 50%; }

        @keyframes fightClash {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            45% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            55% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
            60% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
            100% { opacity: 0; }
        }
        @keyframes shockwave {
            0% { opacity: 0; width: 0; height: 0; }
            48% { opacity: 0; width: 0; height: 0; }
            50% { opacity: 1; width: 20px; height: 20px; }
            60% { opacity: 0.5; width: 200px; height: 200px; }
            70% { opacity: 0; width: 300px; height: 300px; }
            100% { opacity: 0; }
        }
        @keyframes sparksBurst {
            0% { opacity: 0; }
            48% { opacity: 0; }
            50% { opacity: 1; }
            55% { opacity: 0.8; }
            60% { 
                opacity: 0; 
                transform: translate(-50%, -50%);
            }
            100% { opacity: 0; }
        }

        /* 结果提示：电影字幕风格 */
        .battle-result {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            font-size: 18px; font-weight: bold;
            color: #fff; 
            text-shadow: 0 0 8px var(--gold), 0 0 15px rgba(241,196,15,0.8), 0 0 25px rgba(241,196,15,0.5);
            z-index: 20;
            animation: resultGlow 2s ease infinite alternate;
        }
        @keyframes resultGlow {
            0% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        /* 核心区：原配色 */
        .play-section {
            flex: 1; display: flex; flex-direction: column;
            background: var(--stone); box-shadow: var(--inner); border: 3px solid var(--jade-d); 
            border-radius: 12px; margin: 4px 10px 8px 10px; padding: 12px;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        /* 龙虎和布局：原配色 */
        .battle-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; height: 80px; margin-bottom: 10px; }
        .side-cell { 
            background: rgba(0,0,0,0.35); border: 3px solid var(--jade-d); border-radius: 14px; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.1s; box-shadow: var(--inner);
        }
        .side-cell.active { border-color: var(--gold); background: rgba(255,255,255,0.1); transform: scale(0.97); }
        .side-cell span { font-size: 48px; font-weight: 900; }
        #cell-DRAGON span { color: var(--blue); text-shadow: 0 0 15px var(--blue); }
        #cell-TIGER span { color: var(--tiger); text-shadow: 0 0 15px var(--tiger); }
        #cell-TIE span { color: var(--tie); text-shadow: 0 0 15px var(--tie); }

        /* 数据区：原配色 */
        .data-stack { display: grid; grid-template-rows: repeat(3, 1fr); gap: 6px; margin: 0 6px; }
        .data-item { background: rgba(0,0,0,0.6); border: 2px solid var(--jade-d); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; }
        .data-item label { font-size: 12px; color: #ccc; font-weight: bold; }
        .data-item value { font-size: 18px; color: var(--gold); font-weight: 900; text-shadow: 0 0 6px var(--gold); }

        /* 操作区：原配色 */
        .stake-txt { text-align: center; color: #eee; font-size: 16px; font-weight: bold; margin: 8px 0; }
        .stake-txt span { color: var(--gold); text-shadow: 0 0 6px var(--gold); }
        
        /* 第一排：加减+开始 */
        .exec-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .step-btn { width: 52px; height: 52px; background: var(--jade); border: 3px solid var(--jade-d); border-radius: 10px; color: #fff; font-size: 28px; font-weight: bold; cursor: pointer; }
        .main-go { flex: 1; height: 52px; background: linear-gradient(180deg, #e53935, #b71c1c); border: none; border-radius: 30px; color: #fff; font-size: 22px; font-weight: 900; letter-spacing: 2px; cursor: pointer; box-shadow: 0 5px 0 #7f0000; }
        .main-go:active { transform: translateY(2px); box-shadow: 0 1px 0 #7f0000; }
        
        /* 第二排：自动+三挡加速 */
        .mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mode-btn { height: 42px; background: rgba(0,0,0,0.4); border: 2px solid var(--jade-d); border-radius: 8px; color: #aaa; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .mode-btn.active { border-color: var(--gold); color: #fff; background: var(--jade-d); }
        /* 三挡加速单独样式 */
        .speed-btn { display: flex; gap: 8px; }
        .speed-btn span { width: 33%; height: 100%; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .speed-btn span.active { background: var(--gold); color: #000; font-weight: bold; }
</style>
</head>
<body>

<div class="container-outer">
    <div class="container">
        <!-- 状态栏：原配色 -->
        <div class="header">
            <div class="box"><span>余额</span><span>857.80</span></div>
            <div class="box"><span>奖池</span><span>84291.50</span></div>
        </div>

        <!-- 电影级龙虎对战场景 -->
        <div class="battle-scene">
            <!-- 背景特效 -->
            <div class="scene-clouds"></div>
            <div class="scene-light light-left"></div>
            <div class="scene-light light-right"></div>
            
            <!-- 龙角色 -->
            <div class="dragon">
                <div class="dragon-icon">🐉</div>
            </div>
            
            <!-- 虎角色 -->
            <div class="tiger">
                <div class="tiger-icon">🐯</div>
            </div>
            
            <!-- 碰撞特效组 -->
            <div class="fight-effect"></div>
            <div class="fight-shockwave"></div>
            <div class="fight-sparks">
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
            </div>
            
            <!-- 结果提示 -->
            <div class="battle-result" id="battle-result">龙虎相争·一触即发</div>
        </div>

        <!-- 核心操作区：原配色 -->
        <div class="play-section">
            <!-- 龙虎和：原配色 -->
            <div class="battle-row">
                <div id="cell-DRAGON" class="side-cell" onclick="setPick('DRAGON')"><span>龙</span></div>
                <div id="cell-TIE" class="side-cell" onclick="setPick('TIE')"><span>和</span></div>
                <div id="cell-TIGER" class="side-cell" onclick="setPick('TIGER')"><span>虎</span></div>
            </div>

            <!-- 数据区：原配色 -->
            <div class="data-stack">
                <div class="data-item"><label>当前押注</label><value id="val-bet">0.00</value></div>
                <div class="data-item"><label>预计奖金</label><value id="val-win">0.00</value></div>
                <div class="data-item"><label>已选选项</label><value id="val-pick">未选择</value></div>
            </div>

            <!-- 押
