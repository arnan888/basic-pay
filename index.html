<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_RHYTHM_REALITY</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        
        body { 
            background: #0b0e14; 
            color:#FFF; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; 
            height:100vh; overflow:hidden; display:flex; flex-direction:column;
        }

        /* 顶部状态条 - 极致简约 */
        .status-bar { 
            background:#000; height:30px; display:flex; align-items:center; 
            padding:0 15px; font-size:11px; color:#42ff78; justify-content:center; 
            border-bottom:1px solid #1a1a1a; font-weight:bold; letter-spacing:1px;
        }

        .core-section { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:15px; gap:12px; }

        /* --- 还原：凹陷式深绿资产看板 --- */
        .balance-outer {
            width:100%; background: #010409; border: 1px solid #1a1a1a; border-radius:12px;
            padding:3px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .balance-card { 
            width:100%; background: linear-gradient(145deg, #050a08, #0d1a14); 
            border-radius:10px; padding:25px 20px; text-align:center;
            box-shadow: inset 8px 8px 16px rgba(0,0,0,0.9), inset -2px -2px 10px rgba(66,255,120,0.05);
        }
        .bal-label { font-size:11px; color:#4a4a4a; letter-spacing:1px; margin-bottom:10px; text-transform:uppercase; }
        .bal-val { 
            font-size:62px; font-weight:900; color:#42ff78; 
            text-shadow: 0 0 20px rgba(66,255,120,0.5); 
            font-family: 'Verdana', sans-serif; letter-spacing:-1px;
        }
        .bet-info { font-size:12px; color:#2e7d32; margin-top:8px; font-family: monospace; }

        /* --- 还原：瑞兽转盘模块 --- */
        .wheel-module { 
            position:relative; width:280px; height:280px; background: #12151c; 
            border-radius:20px; border:2px solid #222; display:flex; align-items:center; justify-content:center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        /* 1:1 还原图片转盘外圈 */
        .wheel-outer {
            width: 250px; height: 250px; border-radius: 50%; position: relative; 
            border: 8px solid #1a1a1a; background: #0d0f14; overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }
        /* 转盘中心显示倍率 */
        .wheel-center-val {
            position: absolute; z-index: 10; width: 85px; height: 85px; background: #0d0f14;
            border-radius: 50%; border: 2px solid #1a1a1a; display: flex; align-items:center; justify-content:center;
            color: #42ff78; font-size: 24px; font-weight: 900; text-shadow: 0 0 15px #42ff78;
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }
        
        /* 瑞兽格位布局 - 像素级对位 */
        .slot-content { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; padding-top:15px; }
        .beast-ico { font-size: 26px; margin-bottom:2px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8)); }
        .beast-txt { font-size: 11px; color:#aaa; font-weight:bold; text-shadow: 1px 1px 2px #000; }
        .beast-mul { font-size: 10px; color:#666; margin-top:2px; }

        .pointer-line { position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:4px; height:55px; background:#F00; z-index:100; box-shadow:0 0 15px #F00; border-radius:2px; }

        /* --- 底部控制台还原 --- */
        .console { width:100%; background:#000; border-top:1px solid #1a1a1a; padding:15px 15px 85px 15px; }
        .main-row { display:flex; gap:12px; margin-bottom:15px; }
        .adj { 
            width:65px; height:60px; background: linear-gradient(180deg, #2a2a2a, #1a1a1a); 
            border:1px solid #333; color:#FFF; font-size:35px; border-radius:10px; 
            display:flex; align-items:center; justify-content:center;
            box-shadow: 0 4px 0 #000;
        }
        .adj:active { transform: translateY(2px); box-shadow: none; }
        .exec { 
            flex:1; background:#ce1b1b; border:none; color:#FFF; 
            font-size:24px; font-weight:900; border-radius:10px; letter-spacing:4px;
            box-shadow: 0 4px 0 #800; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .exec:active { transform: translateY(2px); box-shadow: none; }
        
        .tech-row { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
        .mode-b { 
            padding:14px; background:#12151c; border:1px solid #222; 
            color:#888; font-size:13px; font-weight:bold; text-align:center; border-radius:8px; 
            display:flex; align-items:center; justify-content:center; gap:8px;
        }
        .mode-b.on { border-color:#ce1b1b; color:#FFF; }
        
        /* 变速三色 */
        .speed-1 { color: #42ff78; }
        .speed-2 { color: #ffeb3b; }
        .speed-3 { color: #f44336; }

        .nav { position:fixed; bottom:0; width:100%; height:75px; background:#000; border-top:1px solid #1a1a1a; display:grid; grid-template-columns: repeat(4, 1fr); }
        .nav-n { display:flex; flex-direction:column; align-items:center; justify-content:center; color:#333; font-size:12px; font-weight:bold; }
        .nav-n.act { color:#ce1b1b; }
    </style>
</head>
<body>

    <div class="status-bar">● SYSTEM_SYNCHRONIZED ● </div>

    <div class="core-section">
        <!-- 还原：AVAILABLE BALANCE 板块 -->
        <div class="balance-outer">
            <div class="balance-card">
                <div class="bal-label">AVAILABLE BALANCE (USDT)</div>
                <div class="bal-val" id="ui_bal">100.3</div>
                <div class="bet-info">UNIT_BET: <span id="ui_bet" style="color:#42ff78">0.5</span></div>
            </div>
        </div>

        <!-- 还原：瑞兽转盘 -->
        <div class="wheel-module">
            <div class="pointer-line"></div>
            <div class="wheel-center-val" id="center_val">X88</div>
            <div id="ui_wheel" class="wheel-outer">
                <!-- 12点：孤鸿 -->
                <div class="slot-content" style="transform:rotate(0deg)"><span class="beast-ico">🦢</span><span class="beast-txt">孤鸿</span><span class="beast-mul">0X</span></div>
                <!-- 1点半：孤狼 -->
                <div class="slot-content" style="transform:rotate(45deg)"><span class="beast-ico">🐺</span><span class="beast-txt">孤狼</span><span class="beast-mul">0X</span></div>
                <!-- 3点：玄武 -->
                <div class="slot-content" style="transform:rotate(90deg)"><span class="beast-ico">🐢</span><span class="beast-txt">玄武</span><span class="beast-mul">120X</span></div>
                <!-- 4点半：麒麟 -->
                <div class="slot-content" style="transform:rotate(135deg)"><span class="beast-ico">🦌</span><span class="beast-txt">麒麟</span><span class="beast-mul">500X</span></div>
                <!-- 6点：神龙 -->
                <div class="slot-content" style="transform:rotate(180deg)"><span class="beast-ico">🐲</span><span class="beast-txt" style="color:#42ff78">神龙</span><span class="beast-mul">50X</span></div>
                <!-- 7点半：凤凰 -->
                <div class="slot-content" style="transform:rotate(225deg)"><span class="beast-ico">🔥</span><span class="beast-txt">凤凰</span><span class="beast-mul">X88</span></div>
                <!-- 9点：大鹏 -->
                <div class="slot-content" style="transform:rotate(270deg)"><span class="beast-ico">🦅</span><span class="beast-txt">大鹏</span><span class="beast-mul">50X</span></div>
                <!-- 10点半：仙鹤 -->
                <div class="slot-content" style="transform:rotate(315deg)"><span class="beast-ico">🦢</span><span class="beast-txt">仙鹤</span><span class="beast-mul">20X</span></div>
            </div>
        </div>
    </div>

    <div class="console">
        <div class="main-row">
            <div class="adj" onclick="changeBet(-0.5)">－</div>
            <button id="go_btn" class="exec" onclick="go()">开始执行</button>
            <div class="adj" onclick="changeBet(0.5)">＋</div>
        </div>
        <div class="tech-row">
            <div id="auto_btn" class="mode-b" onclick="toggleAuto()">🤖 自动模式: 关</div>
            <div id="speed_btn" class="mode-b" onclick="cycleSpeed()">⚡ 变速模式: <span class="speed-1">1X</span></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-n">行情</div>
        <div class="nav-n">资产中心</div>
        <div class="nav-n">历史记录</div>
        <div class="nav-n act">量化终端</div>
    </div>

    <script>
        let balance = 100.3, bet = 0.5, rot = 0, busy = false, isAuto = false, speedMode = 1;
        const beastNames = ["0X", "0X", "120X", "500X", "50X", "X88", "50X", "20X"];
        const multis = [0, 0, 120, 500, 50, 88, 50, 20];

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById('auto_btn').className = isAuto ? 'mode-b on' : 'mode-b';
            document.getElementById('auto_btn').innerHTML = `🤖 自动模式: ${isAuto ? '开' : '关'}`;
            if(isAuto && !busy) go();
        }

        function cycleSpeed() {
            speedMode = (speedMode % 3) + 1;
            const btn = document.getElementById('speed_btn');
            const colors = ["", "speed-1", "speed-2", "speed-3"];
            btn.innerHTML = `⚡ 变速模式: <span class="${colors[speedMode]}">${speedMode}X</span>`;
            const times = ["", "5s", "1.2s", "0.5s"];
            document.getElementById('ui_wheel').style.transitionDuration = times[speedMode];
        }

        function changeBet(val) {
            if (busy) return;
            let n = bet + val;
            if (n >= 0.5) { bet = n; document.getElementById('ui_bet').innerText = bet.toFixed(1); }
        }

        function go() {
            if (busy || balance < bet) { isAuto = false; return; }
            busy = true;
            document.getElementById('go_btn').style.opacity = "0.7";
            
            const r = Math.floor(Math.random() * 1000);
            let idx = (r < 500) ? 0 : (r < 850 ? 1 : (r < 950 ? 7 : (r < 980 ? 6 : (r < 990 ? 2 : (r < 996 ? 5 : (r < 999 ? 4 : 3))))));
            
            const targetAngle = idx * 45; 
            rot += (Math.floor(Math.random() * 5) + 10) * 360 + (360 - targetAngle - (rot %
