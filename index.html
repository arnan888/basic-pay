 <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA · 旗舰量化终端</title>
    <style>
        :root {
            --deep-bg: #0d120f;
            --panel-bg: #1a231e;
            --accent-red: #ff5a5a;
            --gold-text: #f1c40f;
            --dark-red: #3d0e0e;
            --border-green: #2d3e34;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--deep-bg); color: #fff; font-family: -apple-system, sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            /* 还原：27444 菱形拉丝背景 */
            background-image: 
                linear-gradient(45deg, rgba(45, 62, 52, 0.3) 1px, transparent 1px),
                linear-gradient(-45deg, rgba(45, 62, 52, 0.3) 1px, transparent 1px);
            background-size: 35px 35px;
        }

        /* 顶部资产面板：深度内凹质感 */
        .balance-panel { 
            background: var(--panel-bg); margin: 15px 20px; padding: 25px 15px; border-radius: 25px; 
            border: 1px solid var(--border-green); box-shadow: inset 0 0 30px rgba(0,0,0,1);
            text-align: center; position: relative;
        }
        .bal-title { color: #8aa095; font-size: 13px; margin-bottom: 5px; letter-spacing: 1px; }
        .bal-val { font-size: 65px; color: var(--accent-red); font-weight: 900; font-family: 'DIN Alternate', sans-serif; }
        
        /* 五个档次显示 */
        .tier-indicator { display: flex; justify-content: center; gap: 10px; margin-top: 12px; }
        .tier-dot { width: 35px; height: 6px; background: #233129; border-radius: 3px; transition: 0.3s; }
        .tier-dot.active { background: var(--gold-text); box-shadow: 0 0 8px var(--gold-text); }

        /* 转盘舞台 */
        .stage { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .pointer { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 20;
            width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; 
            border-top: 25px solid #ff0000; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
        }

        #wheel { 
            width: 315px; height: 315px; border-radius: 50%; border: 15px solid #233129;
            background: #1a231e; position: relative;
            /* 丝滑阻尼曲线：前快后慢，带物理摩擦感 */
            transition: transform 6s cubic-bezier(0.15, 0, 0, 1);
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            background-image: radial-gradient(circle, #2d3e34 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .hub-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 88px; height: 88px; background: #1a231e; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent-red); font-weight: bold; font-size: 22px; border: 5px solid #233129;
            z-index: 10; text-align: center; line-height: 1.2;
        }

        .symbol {
            position: absolute; width: 100%; height: 100%; text-align: center;
            padding-top: 25px; font-size: 30px; transform-origin: center center;
        }

        /* 底部操作面板：暗红专业质感 */
        .footer-panel { 
            background: var(--dark-red); padding: 25px 20px 45px; border-radius: 40px 40px 0 0;
            border-top: 2px solid #631b1b; display: flex; align-items: center; justify-content: space-between; gap: 15px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.7);
        }

        .side-btn { 
            width: 65px; height: 60px; background: #261111; border-radius: 18px; 
            color: var(--accent-red); font-size: 32px; display: flex; align-items: center; justify-content: center; 
            border: 1px solid #631b1b; cursor: pointer; transition: 0.1s;
        }
        .side-btn:active { transform: scale(0.9); opacity: 0.7; }

        .main-btn { 
            flex: 1; height: 85px; background: linear-gradient(180deg, #cc2929 0%, #901a1a 100%);
            color: #fff; border-radius: 45px; font-size: 24px; font-weight: bold; border: none;
            box-shadow: 0 8px 0 #801a1a; cursor: pointer; position: relative;
        }
        .main-btn span { display: block; font-size: 11px; opacity: 0.6; font-weight: normal; margin-top: 2px; }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #801a1a; }
        .main-btn:disabled { filter: grayscale(1); opacity: 0.5; }

        /* 状态指示：同步中 */
        .syncing { animation: flash 1s infinite; color: var(--gold-text) !important; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="balance-panel">
        <div class="bal-title">💰 可用余额 (USDT)</div>
        <div class="bal-val" id="ui-balance">1000.00</div>
        <div style="color:var(--gold-text); font-size:14px; margin-top:10px;">
            🔥 单注额度: <span id="ui-bet">10.0</span>
        </div>
        <div class="tier-indicator" id="ui-tiers">
            <div class="tier-dot active"></div>
            <div class="tier-dot"></div>
            <div class="tier-dot"></div>
            <div class="tier-dot"></div>
            <div class="tier-dot"></div>
        </div>
    </div>

    <div class="stage">
        <div class="pointer"></div>
        <div id="wheel">
            <div class="hub-center" id="ui-hub">准备<br>同步</div>
            <div class="symbol" style="transform: rotate(0deg)">🐺</div>
            <div class="symbol" style="transform: rotate(45deg)">🦢</div>
            <div class="symbol" style="transform: rotate(90deg)">🐢</div>
            <div class="symbol" style="transform: rotate(135deg)">🦅</div>
            <div class="symbol" style="transform: rotate(180deg)">🐯</div>
            <div class="symbol" style="transform: rotate(225deg)">🦄</div>
            <div class="symbol" style="transform: rotate(270deg)">🐲</div>
            <div class="symbol" style="transform: rotate(315deg)">🔥</div>
        </div>
    </div>

    <div class="footer-panel">
        <div class="side-btn" onclick="QuantEngine.stepTier(-1)">−</div>
        <button class="main-btn" id="ui-btn-go" onclick="QuantEngine.execute()">
            ▶ 执行抽取
            <span>QUANTUM SYNC TERMINAL v3.2</span>
        </button>
        <div class="side-btn" onclick="QuantEngine.stepTier(1)">+</div>
    </div>

    <script>
        const QuantEngine = {
            // 五个盈利档位设定
            tiers: [10.0, 50.0, 100.0, 500.0, 1000.0],
            currentIdx: 0,
            balance: 1000.00,
            isRunning: false,
            rotation: 0,

            init() {
                this.updateUI();
            },

            // 丝滑档位切换
            stepTier(dir) {
                if(this.isRunning) return;
                this.currentIdx = (this.currentIdx + dir + 5) % 5;
                this.updateUI();
                if(window.navigator.vibrate) window.navigator.vibrate(10);
            },

            // 执行量化抽取
            execute() {
                const bet = this.tiers[this.currentIdx];
                if(this.isRunning || this.balance < bet) return;

                // 锁定状态
                this.isRunning = true;
                this.balance -= bet;
                this.updateUI();

                const hub = document.getElementById('ui-hub');
                const btn = document.getElementById('ui-btn-go');
                
                btn.disabled = true;
                hub.innerHTML = "同步<br>中...";
                hub.classList.add('syncing');

                // 物理仿真旋转逻辑
                // 圈数随机 (8-13圈) + 偏移角度
                const extraDeg = Math.floor(Math.random() * 360);
                this.rotation += (360 * (8 + Math.floor(Math.random() * 5))) + extraDeg;
                
                document.getElementById('wheel').style.transform = `rotate(${this.rotation}deg)`;

                // 结算回调
                setTimeout(() => {
                    this.isRunning = false;
                    btn.disabled = false;
                    hub.innerHTML = "准备<br>同步";
                    hub.classList.remove('syncing');

                    // 盈利概率回填 (按需对接后端)
                    if(Math.random() > 0.6) {
                        const win = bet * 2.5; 
                        this.balance += win;
                        this.updateUI();
                    }
                }, 6000); // 必须与 CSS transition 时间同步
            },

            updateUI() {
                document.getElementById('ui-balance').innerText = this.balance.toFixed(2);
                document.getElementById('ui-bet').innerText = this.tiers[this.currentIdx].toFixed(1);
                
                // 更新档位指示灯
                const dots = document.querySelectorAll('.tier-dot');
                dots.forEach((dot, idx) => {
                    dot.classList.toggle('active', idx === this.currentIdx);
                });
            }
        };

        QuantEngine.init();
    </script>
</body>
</html>
