<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    /* 全局背景 */
    body { 
        background: #3fb950; 
        background-image: radial-gradient(circle at 50% 50%, #4ade80 0%, #166534 100%);
        color:#333; 
        font-family: "PingFang SC", sans-serif; 
        height:100vh; 
        display:flex; 
        flex-direction:column; 
        overflow: hidden;
    }

    .status-bar { background: rgba(0,0,0,0.1); height:28px; display:flex; align-items:center; padding:0 15px; font-size:10px; color:#fff; justify-content:center; flex-shrink: 0; }

    /* 核心显示区：自动填满剩余空间 */
    .core-section { 
        flex: 1; 
        display:flex; 
        flex-direction:column; 
        align-items:center; 
        justify-content: space-evenly; /* 均匀分布板块，防止挤压 */
        padding:10px 15px;
        min-height: 0; 
    }

    /* 灰白色拟物化面板 */
    .panel-grey-emboss {
        width:100%;
        max-width: 400px;
        background: #e0e5ec;
        border-radius: 24px;
        box-shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
        padding: 12px;
    }

    .inset-well {
        background: #e0e5ec;
        border-radius: 18px;
        box-shadow: inset 6px 6px 12px rgba(163,177,198,0.8), inset -6px -6px 12px rgba(255,255,255,0.5);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .bal-val { font-size: 56px; font-weight: 900; color: #ff4d4d; font-family: 'Verdana', sans-serif; margin: 5px 0; }

    /* 转盘 */
    .wheel-outer { 
        width: 240px; height: 240px; border-radius: 50%; position: relative; 
        background: linear-gradient(145deg, #f0f0f0, #cacaca);
        box-shadow: 6px 6px 12px #b8b9be, -6px -6px 12px #ffffff;
        border: 2px solid #d1d5db;
        transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        overflow: hidden;
    }

    .wheel-center-val {
        position: absolute; z-index: 10; width: 65px; height: 65px; background: #e0e5ec;
        border-radius: 50%; display: flex; align-items:center; justify-content:center;
        color: #ff4d4d; font-size: 20px; font-weight: 900;
        box-shadow: 3px 3px 6px #b8b9be, -3px -3px 6px #ffffff; border: 1px solid #d1d5db;
    }

    .slot-content { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; padding-top:12px; }
    .beast-ico { font-size: 24px; }
    .beast-txt { font-size: 10px; color:#666; font-weight:bold; }
    .pointer-line { position:absolute; top:8px; left:50%; transform:translateX(-50%); width:4px; height:40px; background:#ff4d4d; z-index:100; border-radius:3px; }

    /* --- 控制台区域：修复对齐与叠压 --- */
    .console-area { 
        width:100%; 
        background: #e0e5ec; 
        padding: 20px 20px calc(75px + 20px) 20px; /* 增加底部Padding为导航栏留座，防止重叠 */
        border-radius: 30px 30px 0 0;
        box-shadow: 0 -10px 20px rgba(0,0,0,0.1);
        flex-shrink: 0;
    }

    .main-row { 
        display:flex; 
        align-items: center; 
        justify-content: space-between; /* 确保左右按键与中间按钮完美对齐 */
        gap: 15px; 
        margin-bottom: 20px;
        width: 100%;
    }

    .btn-deep-inset { 
        background: #e0e5ec; 
        color:#777; font-size:28px; border-radius:15px;
        display:flex; align-items:center; justify-content:center;
        width: 60px; height: 60px; /* 固定宽高防止变形 */
        flex-shrink: 0; /* 禁止被挤压 */
        box-shadow: inset 4px 4px 8px #b8b9be, inset -4px -4px 8px #ffffff;
        border: none;
        cursor: pointer;
    }

    /* 红色按键：纯色不发光，对齐加厚 */
    .exec-red-btn { 
        flex: 1; /* 自动撑满中间空间 */
        height: 60px; 
        background: #d90000; 
        border: none;
        border-bottom: 5px solid #a00000; 
        color:#fff; font-size:20px; font-weight:900; border-radius:15px;
        letter-spacing:2px;
        cursor: pointer;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        transition: all 0.1s;
    }
    .exec-red-btn:active { transform: translateY(2px); border-bottom-width: 2px; }

    .tech-row { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    .mode-btn { 
        padding:14px; background:#e0e5ec; border-radius:12px;
        color:#666; font-size:12px; text-align:center;
        box-shadow: 3px 3px 6px #b8b9be, -3px -3px 6px #ffffff;
    }
    .mode-btn.on { background: #ff4d4d; color: white; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); }

    /* 底部导航栏：固定在最下方 */
    .nav { 
        position:fixed; bottom:0; width:100%; height:75px; 
        background:#fff; border-top:1px solid #eee; 
        display:grid; grid-template-columns: repeat(4, 1fr); 
        z-index: 1000;
    }
    .nav-n { display:flex; flex-direction:column; align-items:center; justify-content:center; color:#999; font-size:11px; font-weight:bold; }
    .nav-n.act { color:#ff4d4d; }
</style>
</head>
<body>

<div class="status-bar">● QUANT_PULSE_EXTERIOR_V3.1 ●</div>

<div class="core-section">
    <div class="panel-grey-emboss">
        <div class="inset-well" style="padding: 15px;">
            <div style="font-size:11px; color:#888; font-weight:bold;">AVAILABLE BALANCE (USDT)</div>
            <div class="bal-val" id="ui_bal">99.8</div>
            <div style="font-size:12px; color:#999;">BET: <span id="ui_bet" style="color:#ff4d4d; font-weight:bold;">0.5</span></div>
        </div>
    </div>

    <div class="panel-grey-emboss" style="display:flex; justify-content:center; align-items:center;">
        <div class="inset-well" style="width:260px; height:260px; border-radius:50%;">
            <div class="pointer-line"></div>
            <div class="wheel-center-val" id="center_val">X0</div>
            <div id="ui_wheel" class="wheel-outer">
                <div class="slot-content" style="transform:rotate(0deg)"><span class="beast-ico">🦢</span><span class="beast-txt">孤鸿</span></div>
                <div class="slot-content" style="transform:rotate(45deg)"><span class="beast-ico">🐺</span><span class="beast-txt">孤狼</span></div>
                <div class="slot-content" style="transform:rotate(90deg)"><span class="beast-ico">🐢</span><span class="beast-txt">玄武</span></div>
                <div class="slot-content" style="transform:rotate(135deg)"><span class="beast-ico">🦌</span><span class="beast-txt">麒麟</span></div>
                <div class="slot-content" style="transform:rotate(180deg)"><span class="beast-ico">🐲</span><span class="beast-txt" style="color:#ff4d4d">神龙</span></div>
                <div class="slot-content" style="transform:rotate(225deg)"><span class="beast-ico">🔥</span><span class="beast-txt">凤凰</span></div>
                <div class="slot-content" style="transform:rotate(270deg)"><span class="beast-ico">🦅</span><span class="beast-txt">大鹏</span></div>
                <div class="slot-content" style="transform:rotate(315deg)"><span class="beast-ico">🦢</span><span class="beast-txt">仙鹤</span></div>
            </div>
        </div>
    </div>
</div>

<div class="console-area">
    <div class="main-row">
        <button class="btn-deep-inset" onclick="changeBet(-0.5)">－</button>
        <button id="go_btn" class="exec-red-btn" onclick="go()">开始执行</button>
        <button class="btn-deep-inset" onclick="changeBet(0.5)">＋</button>
    </div>
    <div class="tech-row">
        <div id="auto_btn" class="mode-btn" onclick="toggleAuto()">🤖 自动模式: 关</div>
        <div id="speed_btn" class="mode-btn" onclick="cycleSpeed()">⚡ 变速模式: 1X</div>
    </div>
</div>

<div class="nav">
    <div class="nav-n">行情</div><div class="nav-n">资产中心</div><div class="nav-n">历史记录</div><div class="nav-n act">量化终端</div>
</div>

<script>
    // 保持逻辑一致
    let balance = 99.8, bet = 0.5, rot = 0, busy = false, isAuto = false, speedMode = 1;
    const beastNames = ["X0", "X0", "X120", "X500", "X50", "X88", "X50", "X20"];
    const multis = [0, 0, 120, 500, 50, 88, 50, 20];

    function toggleAuto() {
        isAuto = !isAuto;
        document.getElementById('auto_btn').className = isAuto ? 'mode-btn on' : 'mode-btn';
        document.getElementById('auto_btn').innerHTML = `🤖 自动模式: ${isAuto ? '开' : '关'}`;
        if(isAuto && !busy) go();
    }

    function cycleSpeed() {
        speedMode = (speedMode % 3) + 1;
        document.getElementById('speed_btn').innerHTML = `⚡ 变速模式: ${speedMode}X`;
        const times = ["", "5s", "1.2s", "0.5s"];
        document.getElementById('ui_wheel').style.transitionDuration = times[speedMode];
    }

    function changeBet(val) {
        if (busy) return;
        let n = bet + val;
        if (n >= 0.5) { bet = n; document.getElementById('ui_bet').innerText = bet.toFixed(1); }
    }

    function go() {
        if (busy || balance < bet) { isAuto = false; return; }
        busy = true;
        const r = Math.floor(Math.random() * 1000);
        let idx = (r < 500) ? 0 : (r < 850 ? 1 : (r < 950 ? 7 : (r < 980 ? 6 : (r < 990 ? 2 : (r < 996 ? 5 : (r < 999 ? 4 : 3))))));
        const targetAngle = idx * 45;
        rot += (Math.floor(Math.random() * 5) + 10) * 360 + (360 - targetAngle - (rot % 360)) + 360;
        document.getElementById('ui_wheel').style.transform = `rotate(${rot}deg)`;
        
        const waitTimes = [0, 5000, 1200, 500];
        setTimeout(() => {
            const prize = multis[idx] * bet;
            balance = (balance - bet) + prize;
            document.getElementById('ui_bal').innerText = balance.toFixed(1);
            document.getElementById('center_val').innerText = beastNames[idx];
            if(isAuto) setTimeout(go, 800);
            setTimeout(() => { busy = false; }, 500);
        }, waitTimes[speedMode]);
    }
</script>

</body>
</html>
