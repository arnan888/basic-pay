<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>至尊骰宝 · 3D骰子</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'PingFang SC', sans-serif;
            padding: 12px;
        }
        .game-box {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(145deg, #1a4a2a, #0a2a1a);
            border-radius: 40px;
            padding: 16px;
            border: 1px solid #ffaa44;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .inner {
            background: rgba(0,0,0,0.3);
            border-radius: 32px;
            padding: 16px;
        }
        
        /* ========== 3D骰子样式 ========== */
        .dice-area {
            background: rgba(0,0,0,0.4);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
            position: relative;
        }
        .dice-area::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffaa44, #ffdd88, #ffaa44, transparent);
        }
        .dice-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
            perspective: 600px;
        }
        /* 3D骰子容器 */
        .dice-3d {
            width: 85px;
            height: 85px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        /* 骰子各个面 */
        .dice-face {
            position: absolute;
            width: 85px;
            height: 85px;
            background: linear-gradient(145deg, #f8f8f8, #e8e8e8);
            border-radius: 18px;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.8), 0 8px 20px rgba(0,0,0,0.4);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            border: 2px solid #ffaa44;
        }
        /* 6个面的位置 */
        .face-front { transform: translateZ(42.5px); background: radial-gradient(circle at 30% 30%, #fff, #e8e8e8); }
        .face-back { transform: rotateY(180deg) translateZ(42.5px); background: radial-gradient(circle at 30% 30%, #f0f0f0, #ddd); }
        .face-right { transform: rotateY(90deg) translateZ(42.5px); background: radial-gradient(circle at 30% 30%, #fafafa, #e0e0e0); }
        .face-left { transform: rotateY(-90deg) translateZ(42.5px); background: radial-gradient(circle at 30% 30%, #f5f5f5, #dcdcdc); }
        .face-top { transform: rotateX(90deg) translateZ(42.5px); background: radial-gradient(circle at 30% 30%, #ffffff, #ececec); }
        .face-bottom { transform: rotateX(-90deg) translateZ(42.5px); background: radial-gradient(circle at 30% 30%, #f0f0f0, #d5d5d5); }
        
        /* 点数圆点 */
        .pip {
            position: absolute;
            width: 14px;
            height: 14px;
            background: radial-gradient(circle at 35% 35%, #c0392b, #8b1a1a);
            border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.6), 0 2px 3px rgba(0,0,0,0.3);
        }
        /* 1点 */
        .pip-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        /* 2点 */
        .pip-tl { top: 20%; left: 20%; }
        .pip-br { bottom: 20%; right: 20%; }
        /* 3点 */
        .pip-tr { top: 20%; right: 20%; }
        .pip-bl { bottom: 20%; left: 20%; }
        /* 4点 */
        .pip-tl2 { top: 20%; left: 20%; }
        .pip-tr2 { top: 20%; right: 20%; }
        .pip-bl2 { bottom: 20%; left: 20%; }
        .pip-br2 { bottom: 20%; right: 20%; }
        /* 5点 */
        .pip-mid { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        /* 6点 */
        .pip-l1 { left: 20%; top: 15%; }
        .pip-l2 { left: 20%; top: 50%; transform: translateY(-50%); }
        .pip-l3 { left: 20%; bottom: 15%; }
        .pip-r1 { right: 20%; top: 15%; }
        .pip-r2 { right: 20%; top: 50%; transform: translateY(-50%); }
        .pip-r3 { right: 20%; bottom: 15%; }
        
        /* 骰子面上的点默认隐藏 */
        .pip { display: none; }
        /* 各面显示对应的点 */
        .face-1 .pip-center { display: block; }
        .face-2 .pip-tl, .face-2 .pip-br { display: block; }
        .face-3 .pip-tl, .face-3 .pip-center, .face-3 .pip-br { display: block; }
        .face-4 .pip-tl2, .face-4 .pip-tr2, .face-4 .pip-bl2, .face-4 .pip-br2 { display: block; }
        .face-5 .pip-tl2, .face-5 .pip-tr2, .face-5 .pip-mid, .face-5 .pip-bl2, .face-5 .pip-br2 { display: block; }
        .face-6 .pip-l1, .face-6 .pip-l2, .face-6 .pip-l3, .face-6 .pip-r1, .face-6 .pip-r2, .face-6 .pip-r3 { display: block; }
        
        /* 摇骰子动画 */
        .dice-shake {
            animation: diceShake3D 0.08s infinite;
        }
        @keyframes diceShake3D {
            0% { transform: translate(0,0) rotateX(0deg) rotateY(0deg); }
            25% { transform: translate(-6px,-6px) rotateX(45deg) rotateY(45deg); }
            50% { transform: translate(6px,6px) rotateX(90deg) rotateY(90deg); }
            75% { transform: translate(-6px,6px) rotateX(135deg) rotateY(135deg); }
            100% { transform: translate(0,0) rotateX(180deg) rotateY(180deg); }
        }
        /* 落地动画 */
        .dice-land {
            animation: diceLand 0.2s ease-out;
        }
        @keyframes diceLand {
            0% { transform: scale(1.1) rotateX(10deg) rotateY(10deg); }
            100% { transform: scale(1) rotateX(0deg) rotateY(0deg); }
        }
        
        .total {
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            padding: 10px;
            margin-top: 10px;
        }
        .total-label { font-size: 12px; color: #ffaa88; }
        .total-number { font-size: 48px; font-weight: bold; color: #ffcc44; font-family: monospace; text-shadow: 0 0 10px #ff6600; }
        .total-blink { animation: blink 0.05s step-end infinite; }
        @keyframes blink {
            0% { text-shadow: 0 0 5px #ffaa44; }
            50% { text-shadow: 0 0 25px #ff6600; color: #ffdd88; }
        }
        
        .top-buttons {
            display: flex;
            gap: 12px;
            margin: 16px 0;
        }
        .top-btn {
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            color: #ffaa44;
            border: 1px solid #ffaa44;
            font-size: 14px;
        }
        .top-btn-primary {
            background: linear-gradient(135deg, #ff6600, #cc3300);
            color: #fff;
            border: none;
        }
        .top-btn:active { transform: scale(0.97); }
        
        .balance-pool-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }
        .balance-pool-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }
        .balance-pool-label { font-size: 11px; color: #88aa88; }
        .balance-pool-value { font-size: 22px; font-weight: bold; color: #ffcc44; }
        
        .chips {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        .chip {
            width: 60px;
            padding: 10px 0;
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .chip:active { transform: scale(0.94); }
        .chip.selected-chip {
            box-shadow: 0 0 0 3px #ffaa44, 0 4px 8px rgba(0,0,0,0.3);
            transform: scale(1.02);
        }
        .chip-10 { background: radial-gradient(#4a90d9, #1a4a8a); color: #fff; }
        .chip-20 { background: radial-gradient(#50b86a, #2a6a3a); color: #fff; }
        .chip-50 { background: radial-gradient(#e85d3a, #aa2a1a); color: #fff; }
        .chip-100 { background: radial-gradient(#9b59b6, #6c3483); color: #fff; }
        .chip-500 { background: radial-gradient(#f1c40f, #d4a00a); color: #333; }
        .chip-1000 { background: radial-gradient(#e74c3c, #c0392b); color: #fff; }
        
        .selected-chip-display {
            text-align: center;
            margin: 8px 0;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
        }
        .selected-chip-text { color: #ffaa44; font-size: 14px; }
        .selected-chip-value { color: #ffcc44; font-size: 24px; font-weight: bold; }
        
        .special-bets {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 16px 0;
        }
        .special-card {
            background: linear-gradient(145deg, #2a3a2a, #1a2a1a);
            border-radius: 20px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,170,68,0.3);
        }
        .special-card.selected {
            background: linear-gradient(135deg, #ff6600, #cc3300);
            transform: scale(0.98);
        }
        .special-name { font-size: 22px; font-weight: bold; color: #ffcc44; }
        .special-odds { font-size: 12px; color: #88aa88; margin-top: 4px; }
        .special-bet-amount {
            font-size: 14px;
            font-weight: bold;
            color: #ffaa44;
            margin-top: 6px;
            padding: 4px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
        }
        .special-card.selected .special-name,
        .special-card.selected .special-odds,
        .special-card.selected .special-bet-amount { color: #fff; }
        
        .points-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 16px 0;
        }
        .point-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,170,68,0.3);
        }
        .point-card.selected {
            background: linear-gradient(135deg, #ff6600, #cc3300);
            transform: scale(0.97);
        }
        .point-value { font-size: 18px; font-weight: bold; color: #ffcc44; }
        .point-odds { font-size: 10px; color: #88aa88; }
        .point-bet-amount {
            font-size: 12px;
            font-weight: bold;
            color: #ffaa44;
            margin-top: 4px;
        }
        .point-card.selected .point-value,
        .point-card.selected .point-odds,
        .point-card.selected .point-bet-amount { color: #fff; }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }
        .stat-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }
        .stat-label { font-size: 11px; color: #88aa88; }
        .stat-value { font-size: 22px; font-weight: bold; color: #ffcc44; }
        
        .countdown {
            text-align: center;
            margin: 16px 0;
        }
        .countdown-num { font-size: 32px; font-weight: bold; color: #ffaa44; }
        .countdown-warning { animation: warning 0.5s infinite; color: #ff3300 !important; }
        @keyframes warning { 0%,100% { opacity: 1; } 50% { opacity: 0.5; text-shadow: 0 0 10px red; } }
        
        .history {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 12px;
            margin: 16px 0;
            max-height: 120px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 12px;
            color: #ccc;
        }
        .win { color: #4caf50; }
        .lose { color: #f44336; }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a2a1a;
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            border: 1px solid #ffaa44;
            width: 85%;
            max-width: 340px;
            color: #fff;
        }
        .admin-user-list {
            max-height: 150px;
            overflow-y: auto;
            margin: 12px 0;
            background: #0a1a0a;
            border-radius: 12px;
            padding: 8px;
        }
        .admin-user {
            padding: 8px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }
        .admin-user.selected { background: #ffaa44; color: #1a1a2a; }
        .admin-input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            background: #0a1a0a;
            border: 1px solid #ffaa44;
            color: #fff;
        }
        .admin-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 12px 0;
        }
        .admin-btn {
            padding: 8px 16px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .clear-bet-btn {
            background: rgba(255,170,68,0.2);
            border: 1px solid #ffaa44;
            border-radius: 30px;
            padding: 8px 16px;
            color: #ffaa44;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="game-box">
    <div class="inner">
        <!-- 3D骰子区 -->
        <div class="dice-area">
            <div class="dice-row">
                <div class="dice-3d" id="dice1">
                    <div class="dice-face face-front face-1"><div class="pip pip-center"></div></div>
                    <div class="dice-face face-back face-6"><div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div></div>
                    <div class="dice-face face-right face-4"><div class="pip pip-tl2"></div><div class="pip pip-tr2"></div><div class="pip pip-bl2"></div><div class="pip pip-br2"></div></div>
                    <div class="dice-face face-left face-3"><div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div></div>
                    <div class="dice-face face-top face-2"><div class="pip pip-tl"></div><div class="pip pip-br"></div></div>
                    <div class="dice-face face-bottom face-5"><div class="pip pip-tl2"></div><div class="pip pip-tr2"></div><div class="pip pip-mid"></div><div class="pip pip-bl2"></div><div class="pip pip-br2"></div></div>
                </div>
                <div class="dice-3d" id="dice2">
                    <div class="dice-face face-front face-1"><div class="pip pip-center"></div></div>
                    <div class="dice-face face-back face-6"><div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div></div>
                    <div class="dice-face face-right face-4"><div class="pip pip-tl2"></div><div class="pip pip-tr2"></div><div class="pip pip-bl2"></div><div class="pip pip-br2"></div></div>
                    <div class="dice-face face-left face-3"><div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div></div>
                    <div class="dice-face face-top face-2"><div class="pip pip-tl"></div><div class="pip pip-br"></div></div>
                    <div class="dice-face face-bottom face-5"><div class="pip pip-tl2"></div><div class="pip pip-tr2"></div><div class="pip pip-mid"></div><div class="pip pip-bl2"></div><div class="pip pip-br2"></div></div>
                </div>
                <div class="dice-3d" id="dice3">
                    <div class="dice-face face-front face-1"><div class="pip pip-center"></div></div>
                    <div class="dice-face face-back face-6"><div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div></div>
                    <div class="dice-face face-right face-4"><div class="pip pip-tl2"></div><div class="pip pip-tr2"></div><div class="pip pip-bl2"></div><div class="pip pip-br2"></div></div>
                    <div class="dice-face face-left face-3"><div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div></div>
                    <div class="dice-face face-top face-2"><div class="pip pip-tl"></div><div class="pip pip-br"></div></div>
                    <div class="dice-face face-bottom face-5"><div class="pip pip-tl2"></div><div class="pip pip-tr2"></div><div class="pip pip-mid"></div><div class="pip pip-bl2"></div><div class="pip pip-br2"></div></div>
                </div>
            </div>
            <div class="total">
                <div class="total-label">总 点 数</div>
                <div class="total-number" id="totalPoints">3</div>
            </div>
        </div>

        <!-- 用户栏 -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <div><span style="color:#ffaa44">👤</span> <span id="currentUserId" style="color:#ffaa44; font-weight:bold">player888</span></div>
            <div>
                <button id="historyBtn" class="clear-bet-btn">记录</button>
                <button id="newUserBtn" class="clear-bet-btn">新用户</button>
            </div>
        </div>
        
        <!-- 登录切换 -->
        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <input type="text" id="switchId" placeholder="输入ID登录" style="flex:1; background:rgba(0,0,0,0.5); border:1px solid #ffaa44; border-radius:30px; padding:8px 12px; color:#fff">
            <button id="switchBtn" class="clear-bet-btn">登录</button>
        </div>

        <!-- 顶部按钮行 -->
        <div class="top-buttons">
            <button class="top-btn" id="clearAllBtn">全部取消</button>
            <button class="top-btn" id="refreshBtn">刷新余额</button>
            <button class="top-btn top-btn-primary" id="betBtn">确认投注</button>
        </div>

        <!-- 余额和彩金 -->
        <div class="balance-pool-row">
            <div class="balance-pool-card" id="adminEntry">
                <div class="balance-pool-label">💰 账户余额</div>
                <div class="balance-pool-value" id="balanceDisplay">1000.00</div>
            </div>
            <div class="balance-pool-card">
                <div class="balance-pool-label">🎰 奖池累积</div>
                <div class="balance-pool-value" id="poolDisplay">50000.00</div>
            </div>
        </div>

        <!-- 筹码区 -->
        <div class="chips">
            <div class="chip chip-10" data-val="10">10</div>
            <div class="chip chip-20" data-val="20">20</div>
            <div class="chip chip-50" data-val="50">50</div>
            <div class="chip chip-100" data-val="100">100</div>
            <div class="chip chip-500" data-val="500">500</div>
            <div class="chip chip-1000" data-val="1000">1K</div>
        </div>

        <div class="selected-chip-display">
            <div class="selected-chip-text">当前筹码</div>
            <div class="selected-chip-value" id="selectedChip">0</div>
        </div>

        <!-- 大小单双 -->
        <div class="special-bets">
            <div class="special-card" data-type="BIG"><div class="special-name">🎲 大</div><div class="special-odds">赔 2倍</div><div class="special-bet-amount" id="bet_BIG">0</div></div>
            <div class="special-card" data-type="SMALL"><div class="special-name">🎲 小</div><div class="special-odds">赔 2倍</div><div class="special-bet-amount" id="bet_SMALL">0</div></div>
            <div class="special-card" data-type="ODD"><div class="special-name">🎲 单</div><div class="special-odds">赔 2倍</div><div class="special-bet-amount" id="bet_ODD">0</div></div>
            <div class="special-card" data-type="EVEN"><div class="special-name">🎲 双</div><div class="special-odds">赔 2倍</div><div class="special-bet-amount" id="bet_EVEN">0</div></div>
        </div>

        <!-- 点数网格 -->
        <div class="points-grid" id="pointsGrid"></div>

        <!-- 统计 -->
        <div class="stats">
            <div class="stat-card"><div class="stat-label">总押注</div><div class="stat-value" id="totalBet">0</div></div>
            <div class="stat-card"><div class="stat-label">选中点数</div><div class="stat-value" id="selectedPoint">-</div></div>
        </div>

        <!-- 倒计时 -->
        <div class="countdown">
            <div class="countdown-label">下注倒计时</div>
            <div class="countdown-num" id="countdownNum">25</div>
        </div>

        <!-- 历史 -->
        <div class="history" id="historyList"></div>
    </div>
</div>

<script>
const diceMap = {1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅'};
const oddsMap = {4:60,5:30,6:18,7:12,8:8,9:7,10:6,11:6,12:7,13:8,14:12,15:18,16:30,17:60,'BIG':2,'SMALL':2,'ODD':2,'EVEN':2};

let users = JSON.parse(localStorage.getItem('dice_users')) || {};
let currentUser = "player888";
if (!users[currentUser]) users[currentUser] = { balance: 1000, records: [] };
let adminPwd = "wang000000";

function saveUsers() { localStorage.setItem('dice_users', JSON.stringify(users)); }
function getBalance(uid) { return users[uid]?.balance || 1000; }
function setBalance(uid, amt) { if (!users[uid]) users[uid] = { balance: 1000, records: [] }; users[uid].balance = amt; saveUsers(); }

let bets = {'BIG':0,'SMALL':0,'ODD':0,'EVEN':0,4:0,5:0,6:0,7:0,8:0,9:0,10:0,11:0,12:0,13:0,14:0,15:0,16:0,17:0};
let selectedChip = 0;
let currentBalance = getBalance(currentUser);
const diceEl = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
const totalEl = document.getElementById('totalPoints');

// 设置骰子显示的值
function setDiceValue(diceElement, value) {
    // 移除所有面的类
    const faces = diceElement.querySelectorAll('.dice-face');
    faces.forEach(face => {
        face.style.display = 'none';
    });
    // 显示对应的面
    const targetFace = diceElement.querySelector(`.face-${value}`);
    if (targetFace) targetFace.style.display = 'flex';
}

// 初始化骰子
function initDice() {
    setDiceValue(diceEl[0], 1);
    setDiceValue(diceEl[1], 1);
    setDiceValue(diceEl[2], 1);
}

function getResultType(total) {
    let types = [];
    if (total >= 11 && total <= 17) types.push('BIG');
    if (total >= 4 && total <= 10) types.push('SMALL');
    if (total % 2 === 1) types.push('ODD');
    if (total % 2 === 0) types.push('EVEN');
    return types;
}

function updateBetsDisplay() {
    document.getElementById('bet_BIG').innerText = bets['BIG'];
    document.getElementById('bet_SMALL').innerText = bets['SMALL'];
    document.getElementById('bet_ODD').innerText = bets['ODD'];
    document.getElementById('bet_EVEN').innerText = bets['EVEN'];
    for (let i = 4; i <= 17; i++) { let el = document.getElementById(`bet_${i}`); if (el) el.innerText = bets[i]; }
    let total = Object.values(bets).reduce((a,b)=>a+b,0);
    document.getElementById('totalBet').innerText = total;
    document.getElementById('balanceDisplay').innerText = currentBalance.toFixed(2);
    let pool = 50000 + (Math.random() - 0.5) * 3000;
    pool = Math.max(40000, Math.min(60000, pool));
    document.getElementById('poolDisplay').innerText = pool.toFixed(2);
}

function addBet(targetType) {
    if (selectedChip <= 0) { alert("请先选择筹码"); return; }
    if (selectedChip > currentBalance) { alert("余额不足！当前余额：" + currentBalance); return; }
    currentBalance -= selectedChip;
    setBalance(currentUser, currentBalance);
    bets[targetType] += selectedChip;
    updateBetsDisplay();
    document.querySelectorAll('.special-card, .point-card').forEach(el => el.classList.remove('selected'));
    if (typeof targetType === 'string') document.querySelector(`.special-card[data-type="${targetType}"]`)?.classList.add('selected');
    else document.querySelector(`.point-card[data-point="${targetType}"]`)?.classList.add('selected');
    setTimeout(() => document.querySelectorAll('.special-card, .point-card').forEach(el => el.classList.remove('selected')), 800);
}

function clearAllBets() {
    let totalBet = Object.values(bets).reduce((a,b)=>a+b,0);
    currentBalance += totalBet;
    setBalance(currentUser, currentBalance);
    for (let k in bets) bets[k] = 0;
    updateBetsDisplay();
}

let rollTimer = null;
function rollDice(finalVals, finalTotal, winAmounts) {
    if (rollTimer) clearInterval(rollTimer);
    diceEl.forEach(d => d.classList.add('dice-shake'));
    totalEl.classList.add('total-blink');
    let step = 0, maxStep = 20;
    rollTimer = setInterval(() => {
        step++;
        diceEl.forEach(d => { let r = Math.floor(Math.random() * 6) + 1; setDiceValue(d, r); });
        let sum = 0;
        diceEl.forEach(d => {
            for (let i = 1; i <= 6; i++) {
                if (d.querySelector(`.face-${i}`)?.style.display === 'flex') { sum += i; break; }
            }
        });
        totalEl.innerText = sum;
        if (step >= maxStep) {
            clearInterval(rollTimer);
            rollTimer = null;
            diceEl.forEach(d => d.classList.remove('dice-shake'));
            totalEl.classList.remove('total-blink');
            diceEl.forEach((d, i) => { setDiceValue(d, finalVals[i]); d.classList.add('dice-land'); setTimeout(() => d.classList.remove('dice-land'), 200); });
            totalEl.innerText = finalTotal;
            let totalWin = winAmounts.reduce((a,b)=>a+b,0);
            if (totalWin > 0) { totalEl.style.color = '#4caf50'; setTimeout(() => totalEl.style.color = '#ffcc44', 2000); }
            else { totalEl.style.color = '#f44336'; setTimeout(() => totalEl.style.color = '#ffcc44', 2000); }
        }
    }, 60);
}

let isDrawing = false, isBetLocked = false, countdownInterval = null;

function draw() {
    if (isDrawing) return;
    let totalBet = Object.values(bets).reduce((a,b)=>a+b,0);
    if (totalBet === 0) { alert("请先下注"); return; }
    isDrawing = true; isBetLocked = true;
    const d1 = Math.floor(Math.random() * 6) + 1, d2 = Math.floor(Math.random() * 6) + 1, d3 = Math.floor(Math.random() * 6) + 1, total = d1 + d2 + d3;
    const resultTypes = getResultType(total);
    let winAmounts = [];
    if (resultTypes.includes('BIG') && bets['BIG'] > 0) winAmounts.push(bets['BIG'] * 2);
    if (resultTypes.includes('SMALL') && bets['SMALL'] > 0) winAmounts.push(bets['SMALL'] * 2);
    if (resultTypes.includes('ODD') && bets['ODD'] > 0) winAmounts.push(bets['ODD'] * 2);
    if (resultTypes.includes('EVEN') && bets['EVEN'] > 0) winAmounts.push(bets['EVEN'] * 2);
    if (bets[total] > 0) winAmounts.push(bets[total] * oddsMap[total]);
    let totalWin = winAmounts.reduce((a,b)=>a+b,0);
    rollDice([d1, d2, d3], total, winAmounts);
    currentBalance += totalWin;
    setBalance(currentUser, currentBalance);
    let betSummary = [];
    for (let k in bets) if (bets[k] > 0) {
        if (typeof k === 'string') betSummary.push((k==='BIG'?'大':k==='SMALL'?'小':k==='ODD'?'单':'双') + bets[k]);
        else betSummary.push(k + '点' + bets[k]);
    }
    let recs = users[currentUser].records || [];
    recs.unshift({ time: new Date().toLocaleTimeString(), bets: betSummary.join(' '), result: total, resultType: resultTypes.map(t=>t==='BIG'?'大':t==='SMALL'?'小':t==='ODD'?'单':'双').join(','), win: totalWin, isWin: totalWin > 0 });
    if (recs.length > 30) recs.pop();
    users[currentUser].records = recs;
    saveUsers();
    updateHistory();
    for (let k in bets) bets[k] = 0;
    updateBetsDisplay();
    if (navigator.vibrate) navigator.vibrate(totalWin > 0 ? [100,50,100] : 80);
    setTimeout(() => { isDrawing = false; isBetLocked = false; startCountdown(25); }, 5000);
}

function startCountdown(sec) {
    if (countdownInterval) clearInterval(countdownInterval);
    let countdown = sec;
    const cdSpan = document.getElementById('countdownNum');
    cdSpan.innerText = countdown;
    cdSpan.classList.remove('countdown-warning');
    isBetLocked = false;
    countdownInterval = setInterval(() => {
        if (countdown <= 1) { clearInterval(countdownInterval); countdownInterval = null; isBetLocked = true; draw(); }
        else { countdown--; cdSpan.innerText = countdown; if (countdown <= 5) cdSpan.classList.add('countdown-warning'); }
    }, 1000);
}

function updateHistory() {
    const container = document.getElementById('historyList');
    const recs = users[currentUser]?.records || [];
    container.innerHTML = '';
    if (recs.length === 0) { container.innerHTML = '<div style="text-align:center;color:#666">暂无记录</div>'; return; }
    recs.slice(0, 10).forEach(r => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<span>${r.time}</span><span>${r.bets}</span><span>开${r.result}(${r.resultType})</span><span class="${r.isWin ? 'win' : 'lose'}">${r.isWin ? '+' + r.win : ''}</span>`;
        container.appendChild(div);
    });
}

function refreshBalance() { currentBalance = getBalance(currentUser); updateBetsDisplay(); }
function switchUser() {
    const newId = document.getElementById('switchId').value.trim();
    if (!newId) return;
    currentUser = newId;
    if (!users[currentUser]) users[currentUser] = { balance: 1000, records: [] };
    document.getElementById('currentUserId').innerText = currentUser;
    currentBalance = getBalance(currentUser);
    for (let k in bets) bets[k] = 0;
    updateBetsDisplay();
    if (countdownInterval) clearInterval(countdownInterval);
    startCountdown(25);
    updateHistory();
}
function showHistoryModal() {
    const recs = users[currentUser]?.records || [];
    let html = '<div style="max-height:300px;overflow-y:auto">';
    if (recs.length === 0) html += '<p>暂无记录</p>';
    else { recs.forEach(r => { html += `<div style="padding:8px;border-bottom:1px solid #333;display:flex;justify-content:space-between"><span>${r.time}</span><span>${r.bets}</span><span>开${r.result}点</span><span style="color:${r.isWin?'#4caf50':'#f44336'}">${r.isWin ? '+'+r.win : ''}</span></div>`; }); }
    html += '</div><button id="closeModalBtn" style="background:#ff6600;border:none;border-radius:30px;padding:10px 24px;margin-top:16px;color:#fff">关闭</button>';
    const modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = `<div class="modal-content"><h3>📜 投注记录</h3>${html}</div>`;
    document.body.appendChild(modal);
    document.getElementById('closeModalBtn').onclick = () => modal.remove();
}

let adminPanel = null, adminSelectedUser = currentUser;
function showAdminPanel() {
    if (adminPanel) { adminPanel.remove(); adminPanel = null; return; }
    const panel = document.createElement('div'); panel.className = 'modal';
    panel.innerHTML = `<div class="modal-content" style="width:90%;max-width:360px"><h3>🔐 管理员</h3><div id="adminUserList" class="admin-user-list"></div><div>当前：<strong id="adminSelectedUser">${adminSelectedUser}</strong></div><input type="number" id="adminAmount" class="admin-input" placeholder="金额" value="0"><div class="admin-btns"><button id="adminAdd" class="admin-btn" style="background:#4caf50;color:#fff">上分</button><button id="adminSub" class="admin-btn" style="background:#f44336;color:#fff">下分</button><button id="adminQuery" class="admin-btn" style="background:#2196f3;color:#fff">查询</button><button id="adminReset" class="admin-btn" style="background:#ff9800;color:#fff">重置</button><button id="adminPwd" class="admin-btn" style="background:#9c27b0;color:#fff">改密</button></div><button id="adminClose" style="background:#ffaa44;color:#1a1a2a;padding:8px 24px;border-radius:25px;border:none;margin-top:12px">关闭</button></div>`;
    document.body.appendChild(panel); adminPanel = panel;
    function refreshUserList() {
        const listDiv = document.getElementById('adminUserList'); const usersArr = Object.keys(users);
        listDiv.innerHTML = '';
        usersArr.forEach(uid => { const div = document.createElement('div'); div.className = 'admin-user'; if (uid === adminSelectedUser) div.classList.add('selected'); div.textContent = `${uid} (${getBalance(uid).toFixed(2)})`; div.onclick = () => { adminSelectedUser = uid; document.getElementById('adminSelectedUser').innerText = adminSelectedUser; refreshUserList(); }; listDiv.appendChild(div); });
    }
    refreshUserList();
    document.getElementById('adminAdd').onclick = () => { let amt = parseFloat(document.getElementById('adminAmount').value); if (isNaN(amt) || amt <= 0) { alert("请输入正数"); return; } let cur = getBalance(adminSelectedUser); setBalance(adminSelectedUser, cur + amt); refreshUserList(); if (adminSelectedUser === currentUser) { currentBalance = getBalance(currentUser); updateBetsDisplay(); } alert(`给 ${adminSelectedUser} 上分 ${amt}`); };
    document.getElementById('adminSub').onclick = () => { let amt = parseFloat(document.getElementById('adminAmount').value); if (isNaN(amt) || amt <= 0) { alert("请输入正数"); return; } let cur = getBalance(adminSelectedUser); if (cur < amt) { alert("余额不足"); return; } setBalance(adminSelectedUser, cur - amt); refreshUserList(); if (adminSelectedUser === currentUser) { currentBalance = getBalance(currentUser); updateBetsDisplay(); } alert(`从 ${adminSelectedUser} 下分 ${amt}`); };
    document.getElementById('adminQuery').onclick = () => { alert(`${adminSelectedUser} 余额: ${getBalance(adminSelectedUser).toFixed(2)}`); };
    document.getElementById('adminReset').onclick = () => { if (confirm(`重置 ${adminSelectedUser} 余额为1000？`)) { setBalance(adminSelectedUser, 1000); refreshUserList(); if (adminSelectedUser === currentUser) { currentBalance = getBalance(currentUser); updateBetsDisplay(); } alert("重置成功"); } };
    document.getElementById('adminPwd').onclick = () => { let old = prompt("当前密码:"); if (old !== adminPwd) { alert("密码错误"); return; } let newPwd = prompt("新密码(至少6位):"); if (!newPwd || newPwd.length < 6) { alert("密码至少6位"); return; } adminPwd = newPwd; localStorage.setItem('dice_admin_pwd', newPwd); alert("密码修改成功"); };
    document.getElementById('adminClose').onclick = () => { panel.remove(); adminPanel = null; };
}

function createPointsGrid() {
    const grid = document.getElementById('pointsGrid'); grid.innerHTML = '';
    for (let i = 4; i <= 17; i++) {
        const card = document.createElement('div'); card.className = 'point-card'; card.setAttribute('data-point', i);
        card.innerHTML = `<div class="point-value">${i}点</div><div class="point-odds">赔 ${oddsMap[i]}倍</div><div class="point-bet-amount" id="bet_${i}">0</div>`;
        card.onclick = () => addBet(i); grid.appendChild(card);
    }
}

function init() {
    initDice();
    createPointsGrid();
    updateBetsDisplay();
    updateHistory();
    startCountdown(25);
    let saved = localStorage.getItem('dice_admin_pwd'); if (saved) adminPwd = saved;
    document.querySelectorAll('.chip').forEach(chip => { chip.onclick = () => { selectedChip = parseInt(chip.dataset.val); document.getElementById('selectedChip').innerText = selectedChip; document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected-chip')); chip.classList.add('selected-chip'); }; });
    document.querySelectorAll('.special-card').forEach(card => { card.onclick = () => addBet(card.dataset.type); });
    document.getElementById('clearAllBtn').onclick = clearAllBets;
    document.getElementById('refreshBtn').onclick = refreshBalance;
    document.getElementById('betBtn').onclick = draw;
    document.getElementById('switchBtn').onclick = switchUser;
    document.getElementById('historyBtn').onclick = showHistoryModal;
    document.getElementById('adminEntry').onclick = () => { let pwd = prompt("管理员密码:"); if (pwd === adminPwd) showAdminPanel(); else if (pwd !== null) alert("密码错误"); };
    document.getElementById('newUserBtn').onclick = () => { let newId = "player_" + Math.floor(Math.random() * 100000); document.getElementById('switchId').value = newId; switchUser(); alert(`新账户：${newId}\n初始余额：1000`); };
}
init();
</script>
</body>
</html>
