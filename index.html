<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_BROWN_RED_STABLE</title>
    <style>
        * { 
            margin:0; 
            padding:0; 
            box-sizing:border-box; 
            -webkit-tap-highlight-color:transparent; 
            /* 加固：统一字体渲染，避免跨设备显示差异 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* 1. 换色：棕红基调 + 加固背景渲染 */
        body { 
            background: #450a0a; 
            background-image: radial-gradient(circle at 50% 50%, #7f1d1d 0%, #450a0a 100%);
            color:#FFF; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            height:100vh; 
            overflow:hidden; 
            display:flex; 
            flex-direction:column;
            /* 加固：防止页面抖动 */
            position: fixed;
            width: 100%;
        }

        .effects-layer { 
            position:fixed; 
            top:0; 
            left:0; 
            width:100%; 
            height:100%; 
            pointer-events:none; 
            z-index:1; 
        }
        .glow-white { 
            position: absolute; 
            width: 2px; 
            height: 2px; 
            background: #fff; 
            border-radius: 50%; 
            opacity: 0.3; 
            /* 加固：添加动画防静态视觉卡顿 */
            animation: glowPulse 3s infinite alternate;
        }
        @keyframes glowPulse {
            from { opacity: 0.1; transform: scale(1); }
            to { opacity: 0.4; transform: scale(1.5); }
        }

        .status-bar { 
            background: rgba(0,0,0,0.5); 
            height:24px; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            font-size:10px; 
            z-index: 10; 
            /* 加固：文字防溢出 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 8px;
        }
        .core { 
            flex:1; 
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            padding:15px; 
            gap:12px; 
            z-index: 5; 
            /* 加固：防止内容超出可视区域 */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* 2. 上面二个板块：改为内陷深棕红色 + 加固样式兼容性 */
        .panel {
            width:100%; 
            background: #2d0606; 
            border-radius:18px;
            box-shadow: inset 5px 5px 15px #000, 0 0 0 1px #5e1111;
            border: 1px solid #7f1d1d; 
            position: relative;
            /* 加固：修复高DPI设备边框模糊问题 */
            transform: translateZ(0);
            will-change: box-shadow;
        }

        .bal-card { 
            padding:20px; 
            text-align:center; 
            /* 加固：防止内容挤压 */
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .bal-val { 
            font-size:55px; 
            font-weight:900; 
            color: #f87171; 
            text-shadow: 0 0 15px rgba(248, 113, 113, 0.4); 
            /* 加固：数字防溢出 */
            word-break: break-all;
        }

        .wheel-well { 
            width:100%; 
            max-width:320px; 
            aspect-ratio: 1; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            position: relative;
        }
        
        /* 3. 转盘逻辑加固：极短时间死锁 + 样式加固 */
        .wheel-outer {
            width: 86%; 
            height: 86%; 
            border-radius: 50%; 
            border: 6px solid #1a0303; 
            background: #1a0303; 
            position: relative; 
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            will-change: transform;
            /* 加固：防止旋转时内容变形 */
            transform-origin: center center;
        }
        
        .pointer { 
            position:absolute; 
            top:2px; 
            left:50%; 
            transform:translateX(-50%); 
            width:6px; 
            height:45px; 
            background:#f87171; 
            z-index:100; 
            border-radius:0 0 4px 4px; 
            box-shadow: 0 0 10px #f87171;
            /* 加固：添加顶部高光增强辨识度 */
            box-shadow: 0 0 10px #f87171, inset 0 2px 2px rgba(255,255,255,0.3);
        }
        .center-val { 
            position:absolute; 
            z-index:10; 
            width:70px; 
            height:70px; 
            background:#2d0606; 
            border-radius:50%; 
            border:2px solid #450a0a; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            color:#f87171; 
            font-size:22px; 
            font-weight:900;
            /* 加固：防止文字溢出 */
            text-align: center;
            padding: 0 5px;
        }
        
        .slot { 
            position:absolute; 
            width:100%; 
            height:100%; 
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            padding-top:10px; 
            font-size:10px; 
            /* 加固：确保内容定位准确 */
            transform-origin: center center;
        }
        .slot.active { 
            background: rgba(248, 113, 113, 0.2); 
            transform: scale(0.9); 
            transition: 0.1s ease-out; /* 加固：添加缓动防抖动 */
        }

        .console { 
            width:100%; 
            background:#1a0303; 
            padding:15px 15px 80px; 
            border-radius: 20px 20px 0 0; 
            border-top: 2px solid #450a0a; 
            z-index: 100; 
            /* 加固：防止底部导航遮挡 */
            margin-bottom: 70px;
        }
        .row { 
            display:flex; 
            gap:10px; 
            margin-bottom:12px; 
            /* 加固：防止按钮挤压 */
            flex-wrap: nowrap;
        }
        .btn-adj { 
            width:60px; 
            height:55px; 
            background:#2d0606; 
            border: 1px solid #450a0a; 
            color:#fff; 
            font-size:28px; 
            border-radius:10px; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            cursor: pointer;
            /* 加固：添加交互反馈 */
            transition: all 0.15s ease;
            touch-action: manipulation; /* 防止移动端双击缩放 */
        }
        .btn-adj:active {
            background:#450a0a;
            transform: scale(0.95);
        }
        .btn-go { 
            flex:1; 
            height:55px; 
            background:#991b1b; 
            color:#fff; 
            font-size:20px; 
            font-weight:900; 
            border-radius:10px; 
            cursor: pointer; 
            border:none;
            /* 加固：添加交互反馈 */
            transition: all 0.15s ease;
            touch-action: manipulation;
        }
        .btn-go:active { 
            opacity:0.7; 
            transform: scale(0.98);
        }
        .btn-go:disabled {
            background:#5e1111;
            opacity:0.5;
            cursor: not-allowed;
        }
        .btn-mode { 
            flex:1; 
            padding:12px; 
            background:#2d0606; 
            color:#fff; 
            font-size:12px; 
            border-radius:8px; 
            text-align:center; 
            border: 1px solid #450a0a;
            cursor: pointer;
            /* 加固：添加交互反馈 */
            transition: all 0.15s ease;
            touch-action: manipulation;
        }
        .btn-mode.on { 
            color:#f87171; 
            border-color:#991b1b; 
            background:#3a0808;
        }

        .nav { 
            position:fixed; 
            bottom:0; 
            width:100%; 
            height:70px; 
            background:#000; 
            display:grid; 
            grid-template-columns: repeat(4, 1fr); 
            z-index: 200; 
            /* 加固：防止内容溢出 */
            overflow: hidden;
        }
        .nav-n { 
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            justify-content:center; 
            color:#fff; 
            font-size:10px; 
            opacity: 0.5;
            cursor: pointer;
            /* 加固：添加交互反馈 */
            transition: opacity 0.2s ease;
        }
        .nav-n.act { 
            color:#f87171; 
            opacity: 1; 
        }
    </style>
</head>
<body>
    <div class="effects-layer">
        <div class="glow-white" style="top:10%; left:20%"></div>
        <div class="glow-white" style="bottom:30%; right:15%"></div>
    </div>

    <div class="status-bar">● OPERATIONAL_READY_BROWN_V1 ●</div>

    <div class="core">
        <div class="panel bal-card">
            <div style="font-size:10px; opacity:0.6; margin-bottom:5px">AVAILABLE BALANCE (USDT)</div>
            <div class="bal-val" id="ui_bal">100.00</div>
            <div style="font-size:11px; margin-top:8px">UNIT_BET: <span id="ui_bet" style="color:#f87171; font-weight:bold">1.00</span></div>
        </div>

        <div class="panel wheel-well">
            <div class="pointer"></div>
            <div class="center-val" id="center_val">X?</div>
            <div id="ui_wheel" class="wheel-outer">
                <div class="slot" style="transform:rotate(0deg)"><span>🐲</span><small>X500</small></div>
                <div class="slot" style="transform:rotate(45deg)"><span>🐯</span><small>X88</small></div>
                <div class="slot" style="transform:rotate(90deg)"><span>🦅</span><small>X50</small></div>
                <div class="slot" style="transform:rotate(135deg)"><span>🦄</span><small>X200</small></div>
                <div class="slot" style="transform:rotate(180deg)"><span>🔥</span><small>X150</small></div>
                <div class="slot" style="transform:rotate(225deg)"><span>🐺</span><small>X10</small></div>
                <div class="slot" style="transform:rotate(270deg)"><span>🐢</span><small>X0</small></div>
                <div class="slot" style="transform:rotate(315deg)"><span>🦁</span><small>X30</small></div>
            </div>
        </div>
    </div>

    <div class="console">
        <div class="row">
            <div class="btn-adj" onclick="changeBet(-1)">－</div>
            <button class="btn-go" id="btn_go" onclick="go()">开始执行</button>
            <div class="btn-adj" onclick="changeBet(1)">＋</div>
        </div>
        <div class="row">
            <div id="auto_btn" class="btn-mode" onclick="toggleAuto()">🤖 自动: 关</div>
            <div id="speed_btn" class="btn-mode" onclick="cycleSpeed()">⚡ 速度: 1X</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-n">行情</div><div class="nav-n">资产</div><div class="nav-n">记录</div><div class="nav-n act">量化</div>
    </div>

    <script>
        // 加固：使用常量定义关键参数，避免魔法值
        const MIN_BET = 1.00;
        const MAX_BET = 100.00; // 新增：设置投注上限
        const SPEED_LEVELS = [200, 100, 50]; // 对应1X/2X/3X的冷却时间(ms)
        const RESULT_WEIGHTS = [
            { prob: 65, idx: 6 },  // X0
            { prob: 85, idx: 5 },  // X10
            { prob: 95, idx: 7 },  // X30
            { prob: 100, idx: 1 }  // X88
        ]; // 加固：权重配置可视化，便于维护

        let balance = 100.00, 
            bet = 1.00, 
            rot = 0, 
            busy = false, 
            isAuto = false, 
            spd = 1;
        const multis = [500, 88, 50, 200, 150, 10, 0, 30], 
              names = ["X500", "X88", "X50", "X200", "X150", "X10", "X0", "X30"],
              btnGo = document.getElementById('btn_go');

        // 加固：添加DOM更新工具函数，避免重复代码
        function updateDomText(id, text) {
            const elem = document.getElementById(id);
            if (elem) elem.innerText = text;
        }

        function toggleAuto() { 
            isAuto = !isAuto; 
            document.getElementById('auto_btn').classList.toggle('on', isAuto); 
            updateDomText('auto_btn', `🤖 自动: ${isAuto ? '开' : '关'}`); 
            if(isAuto && !busy && balance >= bet) go(); 
        }

        function cycleSpeed() { 
            spd = (spd % 3) + 1; 
            updateDomText('speed_btn', `⚡ 速度: ${spd}X`); 
        }

        function changeBet(v) { 
            if(busy) return; 
            // 加固：添加投注上下限控制，防止数值异常
            const newBet = Math.max(MIN_BET, Math.min(MAX_BET, bet + v));
            if (newBet !== bet) {
                bet = newBet;
                updateDomText('ui_bet', bet.toFixed(2));
            }
        }

        function go() {
            // 加固：多重安全校验，防止非法调用
            if (busy) return;
            if (balance < bet) {
                isAuto = false;
                updateDomText('auto_btn', '🤖 自动: 关');
                document.getElementById('auto_btn').classList.remove('on');
                return;
            }
            if (bet < MIN_BET || bet > MAX_BET) {
                bet = MIN_BET;
                updateDomText('ui_bet', bet.toFixed(2));
                return;
            }

            busy = true;
            btnGo.disabled = true; // 加固：禁用按钮防止重复点击

            const slots = document.querySelectorAll('.slot');
            slots.forEach(s => s.classList.remove('active'));

            // 1. 加固：结果计算逻辑标准化，避免精度丢失
            const r = Math.random() * 100;
            let idx = 0;
            for (const item of RESULT_WEIGHTS) {
                if (r < item.prob) {
                    idx = item.idx;
                    break;
                }
            }

            // 2. 物理死锁：瞬间旋转到位 (0.4s)
            rot += 720 + (360 - idx * 45 - (rot % 360));
            const wheel = document.getElementById('ui_wheel');
            wheel.style.transform = `rotate(${rot}deg)`;

            // 3. 加固：根据速度等级调整冷却时间，避免时序混乱
            const coolDown = SPEED_LEVELS[spd - 1];
            setTimeout(() => {
                slots[idx].classList.add('active');
                // 加固：使用精确计算，避免浮点数精度问题
                const winAmount = Math.round((multis[idx] * bet) * 100) / 100;
                const costAmount = Math.round(bet * 100) / 100;
                balance = Math.round((balance - costAmount + winAmount) * 100) / 100;
                
                updateDomText('ui_bal', balance.toFixed(2));
                updateDomText('center_val', names[idx]);
                
                setTimeout(() => {
                    busy = false;
                    btnGo.disabled = false; // 恢复按钮可用状态
                    if (isAuto) go();
                }, coolDown); 
            }, 400); 
        }

        // 加固：添加页面可见性监听，防止后台自动运行
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isAuto = false;
                updateDomText('auto_btn', '🤖 自动: 关');
                document.getElementById('auto_btn').classList.remove('on');
            }
        });

        // 加固：添加错误捕获，防止程序崩溃
        window.addEventListener('error', (e) => {
            console.error('程序异常:', e.error);
            busy = false;
            btnGo.disabled = false;
            isAuto = false;
            updateDomText('auto_btn', '🤖 自动: 关');
            document.getElementById('auto_btn').classList.remove('on');
        });
    </script>
</body>
</html>
