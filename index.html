<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>DOLA_ULTIMATE_V100_GOLDEN_EDITION</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        /* 1. 动态背景：深红放射星空，解决死黑问题 */
        body {
            background: radial-gradient(circle at center, #3d0a0a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; font-family: 'Arial Black', sans-serif;
        }
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: radial-gradient(white, rgba(255,255,255,0.1) 2px, transparent 40px);
            background-size: 100px 100px; animation: stars 120s linear infinite; opacity: 0.2;
        }
        @keyframes stars { from { transform: translateY(0); } to { transform: translateY(-50%); } }

        /* 2. 旗舰余额 HUD：金属质感 */
        .hud { text-align: center; margin-bottom: 30px; z-index: 100; }
        .hud-label { color: #888; font-size: 14px; letter-spacing: 4px; margin-bottom: 8px; }
        .hud-value { 
            color: #FFD700; font-size: 58px; font-weight: 900;
            text-shadow: 0 0 25px rgba(255,215,0,0.7), 2px 2px 4px #000;
        }

        /* 3. 亮金 3D 转盘外框 */
        .outer-frame {
            width: 480px; height: 480px; border: 15px solid #FFD700;
            box-shadow: 0 0 70px rgba(255,215,0,0.4), inset 0 0 30px #000;
            border-radius: 50%; position: relative; z-index: 10; background: #000;
        }
        .pointer {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-top: 45px solid #FFD700; z-index: 200; filter: drop-shadow(0 5px 10px #000);
        }
        .wheel {
            width: 100%; height: 100%; border-radius: 50%; position: relative;
            overflow: hidden; transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1.25);
            background: #000;
        }
        .sector {
            position: absolute; width: 50%; height: 50%; transform-origin: bottom right;
            display: flex; justify-content: center; align-items: center;
            color: #FFD700; font-size: 18px; font-weight: bold; padding-bottom: 110px;
        }
        .sector:nth-child(odd) { background: radial-gradient(circle at 100% 100%, #c01f1f, #000); }
        .sector:nth-child(even) { background: radial-gradient(circle at 100% 100%, #111, #300); }

        /* 4. 绿色 3D 物理按钮 */
        .spin-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 110px; height: 110px; border-radius: 50%;
            background: radial-gradient(circle, #00ff00, #006400);
            box-shadow: 0 12px 0 #004000, 0 20px 40px rgba(0,0,0,0.8);
            border: 4px solid #fff; cursor: pointer; color: white;
            display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 300;
        }
        .spin-btn:active { transform: translate(-50%, -50%) translateY(10px); box-shadow: 0 2px 0 #004d00; }

        /* 5. 变速排挡 */
        .gears { margin-top: 50px; display: flex; gap: 15px; z-index: 100; }
        .gear {
            padding: 10px 25px; border: 2px solid #FFD700; background: rgba(0,0,0,0.7);
            color: #FFD700; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .gear.active { background: #FFD700; color: #000; box-shadow: 0 0 20px #FFD700; }

        /* 特效：屏幕震动 */
        .shake { animation: shakeEffect 0.15s ease-in-out infinite; }
        @keyframes shakeEffect { 0% { transform: translate(3px,3px); } 50% { transform: translate(-3px,-3px); } 100% { transform: translate(0,0); } }
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-label">庄家金库 (MIN 0.5)</div>
        <div class="hud-value" id="balanceDisplay">88,988.00</div>
    </div>

    <div class="outer-frame" id="stage">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <div class="sector" style="transform: rotate(0deg) skewY(-45deg);">💰 10.0</div>
            <div class="sector" style="transform: rotate(45deg) skewY(-45deg);">❌ 空</div>
            <div class="sector" style="transform: rotate(90deg) skewY(-45deg);">💎 50.0</div>
            <div class="sector" style="transform: rotate(135deg) skewY(-45deg);">❌ 空</div>
            <div class="sector" style="transform: rotate(180deg) skewY(-45deg);">🔥 5.0</div>
            <div class="sector" style="transform: rotate(225deg) skewY(-45deg);">❌ 空</div>
            <div class="sector" style="transform: rotate(270deg) skewY(-45deg);">⭐ 100</div>
            <div class="sector" style="transform: rotate(315deg) skewY(-45deg);">❌ 空</div>
        </div>
        <div class="spin-btn" onclick="triggerSpin()">SPIN</div>
    </div>

    <div class="gears">
        <button class="gear active" id="g1" onclick="changeGear(1)">标准</button>
        <button class="gear" id="g2" onclick="changeGear(2)">快速</button>
        <button class="gear" id="g3" onclick="changeGear(3)">极速</button>
    </div>

    <!-- 音效 -->
    <audio id="snd_roll" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3">
    <audio id="snd_win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3">

    <script>
        let balance = 88988.00;
        let currentRot = 0;
        let gearLevel = 1;
        let isBusy = false;

        function changeGear(v) {
            gearLevel = v;
            document.querySelectorAll('.gear').forEach(b => b.classList.remove('active'));
            document.getElementById('g'+v).classList.add('active');
        }

        function triggerSpin() {
            if (isBusy || balance < 0.5) return;
            isBusy = true;
            balance -= 0.5; // 锁定 0.5 起步
            refreshUI();
            
            const sndR = document.getElementById('snd_roll');
            sndR.currentTime = 0; sndR.play();
            
            let dur = gearLevel == 1 ? 3000 : gearLevel == 2 ? 1500 : 600;
            let randomAdd = 1800 + Math.floor(Math.random() * 360);
            currentRot += randomAdd;
            
            const wheel = document.getElementById('wheel');
            wheel.style.transition = `transform ${dur}ms ${gearLevel == 3 ? 'linear' : 'cubic-bezier(0.15, 0, 0.15, 1.25)'}`;
            wheel.style.transform = `rotate(${currentRot}deg)`;
            if(gearLevel == 3) wheel.style.filter = "blur(6px)";

            setTimeout(() => {
                wheel.style.filter = "none";
                const stage = document.getElementById('stage');
                stage.classList.add('shake');
                sndR.pause(); 
                document.getElementById('snd_win').play();
                
                setTimeout(() => {
                    stage.classList.remove('shake');
                    let rewards = [10, 0, 50, 0, 5, 0, 100, 0];
                    let prize = rewards[Math.floor(Math.random()*8)];
                    animateBalance(prize);
                    isBusy = false;
                }, 300);
            }, dur);
        }

        function refreshUI() {
            document.getElementById('balanceDisplay').innerText = balance.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function animateBalance(win) {
            let startValue = balance;
            balance += win;
            let steps = 20;
            let increment = win / steps;
            let currentStep = 0;
            let interval = setInterval(() => {
                currentStep++;
                let displayVal = startValue + increment * currentStep;
                document.getElementById('balanceDisplay').innerText = displayVal.toLocaleString(undefined, {minimumFractionDigits: 2});
                if(currentStep >= steps) {
                    clearInterval(interval);
                    refreshUI();
                }
            }, 40);
        }
    </script>
</body>
</html>
