  document.querySelectorAll('.game-card-item').forEach(el => el.onclick = () => switchGame(el.dataset.game));
  let clicks = 0; document.getElementById('lobbyTitle').onclick = () => { clicks++; if (clicks >= 5) { clicks = 0; openAdmin(); } setTimeout(() => clicks = 0, 2000); };
  refreshVip();
}

function switchGame(gid) { if (fishDestroy) { fishDestroy(); fishDestroy = null; } document.getElementById('app').innerHTML = '<div style="padding:12px"><div id="singleGameContainer"></div></div>'; const gc = document.getElementById('singleGameContainer'); const inits = { fish: initFish, dice: initDice, dragonTiger: initDragonTiger, game4: initGame4 }; if (inits[gid]) fishDestroy = inits[gid](gc); }

async function login(acc, pwd) { try { const r = await call('POST', '/login', { account: acc, password: pwd, deviceId: DEV }); user = r.user; localStorage.curr_acc = acc; sendHb(); return r; } catch (e) { toast(e.message, true); return { success: false }; } }
async function register(acc, pwd, ref, phone, email, captchaToken, captchaInput) { try { const r = await call('POST', '/register', { account: acc, password: pwd, referralCode: ref, phone: phone || '', email: email || '', captchaToken, captchaInput }); user = r.user; localStorage.curr_acc = acc; sendHb(); return r; } catch (e) { toast(e.message, true); return { success: false }; } }
function sendHb() { if (!user || !apiOk) return; fetch(API + '/heartbeat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ deviceId: DEV, account: user.account }), signal: AbortSignal.timeout(2000) }).then(r => r.json()).then(d => { if (d.kicked) { toast('账号在其他设备登录，您已被踢下线', true); user = null; localStorage.removeItem('curr_acc'); renderAuth(); } }).catch(() => { }); }
setInterval(sendHb, 15000);

function renderAuth() {
  let captchaToken = '', captchaSvg = '';
  async function loadCaptcha() { try { const res = await call('GET', '/captcha'); captchaToken = res.token; captchaSvg = 'data:image/svg+xml;base64,' + res.svg; const img = document.getElementById('captchaImg'); if (img) img.src = captchaSvg; } catch (e) {} }
  document.getElementById('app').innerHTML = `<div class="auth-panel" style="background:linear-gradient(145deg,#1a1a2e,#0d0d1a);border:1px solid #ffaa33;border-radius:24px;padding:30px 24px;margin:30px 16px;"><div style="text-align:center;margin-bottom:20px;"><h2 style="font-size:2rem;background:linear-gradient(135deg,#ffd966,#ff884d);-webkit-background-clip:text;color:transparent;margin:0;">${t('title')}</h2><p style="color:#ffd966;margin-top:4px;">${t('subtitle')}</p></div><div id="authForm"><div style="display:flex;gap:0;margin-bottom:16px;"><button id="loginTab" class="auth-tab active" style="flex:1;background:transparent;border:1px solid #ffaa33;border-bottom:none;color:#ffaa33;padding:10px;border-radius:20px 20px 0 0;font-weight:bold;">${t('login')}</button><button id="regTab" class="auth-tab" style="flex:1;background:transparent;border:1px solid #ffaa33;border-bottom:none;color:#888;padding:10px;border-radius:20px 20px 0 0;">${t('register')}</button></div><div id="loginForm"><input id="loginAccount" class="auth-input" style="margin-bottom:12px;" placeholder="${t('accountPhoneEmail')}"><input id="loginPassword" type="password" class="auth-input" style="margin-bottom:12px;" placeholder="${t('password')}"><div style="display:flex;align-items:center;margin-bottom:16px;color:#ffd966;font-size:0.85rem;"><input type="checkbox" id="rememberMe" style="accent-color:#ffaa33;width:16px;height:16px;margin-right:6px;"><label for="rememberMe" style="cursor:pointer;">${t('remember')}</label></div><button id="loginBtn" class="auth-btn" style="background:linear-gradient(135deg,#ffaa33,#ff884d);width:100%;">${t('login')}</button></div><div id="regForm" style="display:none;"><input id="regAccount" class="auth-input" style="margin-bottom:8px;" placeholder="${t('setAccount')}"><input id="regPhone" class="auth-input" style="margin-bottom:8px;" placeholder="${t('phoneRequired')}"><input id="regEmail" class="auth-input" style="margin-bottom:8px;" placeholder="${t('emailOptional')}"><input id="regPassword" type="password" class="auth-input" style="margin-bottom:8px;" placeholder="${t('setPassword')}"><input id="regReferral" class="auth-input" style="margin-bottom:12px;" placeholder="${t('referralCode')}"><div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;"><input id="captchaInput" class="auth-input" style="width:100px;margin:0;" placeholder="${t('captcha')}" maxlength="4"><img id="captchaImg" src="" alt="Captcha" style="height:42px;border-radius:8px;cursor:pointer;" onclick="event.preventDefault();loadCaptcha();" title="คลิกเพื่อรีเฟรช"></div><button id="registerBtn" class="auth-btn" style="background:linear-gradient(135deg,#ff884d,#cc5500);width:100%;">${t('register')}</button></div></div><div class="auth-note" style="margin-top:16px;font-size:0.7rem;color:#999;">${t('referralNote')}</div></div>`;
  const style = document.createElement('style'); style.textContent = `.auth-tab.active{background:rgba(255,170,51,0.2)!important;color:#ffaa33!important}`; document.head.appendChild(style);
  document.getElementById('loginTab').onclick = () => { document.getElementById('loginForm').style.display = 'block'; document.getElementById('regForm').style.display = 'none'; document.getElementById('loginTab').classList.add('active'); document.getElementById('regTab').classList.remove('active'); };
  document.getElementById('regTab').onclick = () => { document.getElementById('loginForm').style.display = 'none'; document.getElementById('regForm').style.display = 'block'; document.getElementById('regTab').classList.add('active'); document.getElementById('loginTab').classList.remove('active'); loadCaptcha(); };
  document.getElementById('loginBtn').onclick = async () => { const a = document.getElementById('loginAccount').value.trim(); const p = document.getElementById('loginPassword').value; const remember = document.getElementById('rememberMe').checked; if (!a || !p) { toast(t('fillAll'), true); return; } const res = await login(a, p); if (res.success) { if (remember) { localStorage.setItem('saved_account', a); localStorage.setItem('saved_password', p); localStorage.setItem('remember_me', 'true'); } else { localStorage.removeItem('saved_account'); localStorage.removeItem('saved_password'); localStorage.setItem('remember_me', 'false'); } renderLobby(); } else toast(res.msg, true); };
  document.getElementById('registerBtn').onclick = async () => { const account = document.getElementById('regAccount').value.trim(); const phone = document.getElementById('regPhone').value.trim(); const email = document.getElementById('regEmail').value.trim(); const password = document.getElementById('regPassword').value; const referral = document.getElementById('regReferral').value.trim(); const captcha = document.getElementById('captchaInput').value.trim(); if (!account || !password || !referral || !captcha) { toast(t('fillAll'), true); return; } if (!phone && !email) { toast(t('phoneOrEmail'), true); return; } const res = await register(account, password, referral, phone, email, captchaToken, captcha); if (res.success) { toast(t('regSuccess')); renderLobby(); } else { toast(res.msg || t('regSuccess'), true); loadCaptcha(); } };
  const savedAcc = localStorage.getItem('saved_account'); const savedPwd = localStorage.getItem('saved_password'); const rememberMe = localStorage.getItem('remember_me') === 'true';
  if (savedAcc && rememberMe) { setTimeout(() => { const accInput = document.getElementById('loginAccount'); const pwdInput = document.getElementById('loginPassword'); if (accInput) accInput.value = savedAcc; if (pwdInput) pwdInput.value = savedPwd; }, 100); }
  loadCaptcha();
}

async function openAdmin() {
  const pwd = prompt('管理员密码'); if (pwd !== 'guowang2026') return;
  let html = `<div class="modal-content" style="max-width:720px;background:linear-gradient(145deg,#1e1e36,#0a0a14);border:1px solid #ffaa33;"><h3 style="text-align:center;color:#ffaa33;">🔧 管理员面板</h3><hr style="border-color:#ffaa33;"><div style="margin:12px 0;"><strong>🏦 庄家资金池：</strong><span id="adminBanker">加载中...</span></div><div style="margin:12px 0;"><strong>👤 用户管理</strong><div class="row" style="margin-top:6px;"><select id="adminUserSelect" style="flex:1;"><option>加载中...</option></select><input id="adminAmt" type="number" placeholder="金额" style="width:100px;"><button id="adminAddBtn">上分</button><button id="adminSubBtn" class="danger">下分</button></div></div><div style="margin:12px 0;"><strong>📋 游戏记录查询</strong><div class="row"><select id="recordUserSelect" style="flex:1;"><option>加载中...</option></select><button id="showRecordsBtn">查询</button></div><div id="adminGameRecords" style="max-height:200px;overflow:auto;background:rgba(0,0,0,0.3);border-radius:8px;padding:8px;margin-top:8px;display:none;"></div></div><div style="margin:12px 0;"><strong>💎 充值审核 <span id="rechargeCount" style="background:#ffaa33;color:#000;padding:2px 8px;border-radius:10px;">0</span></strong><div id="rechargeList" style="max-height:150px;overflow:auto;background:rgba(0,0,0,0.3);border-radius:8px;padding:8px;margin-top:4px;">加载中...</div></div><div style="margin:12px 0;"><strong>💰 提现审核 <span id="withdrawCount" style="background:#ffaa33;color:#000;padding:2px 8px;border-radius:10px;">0</span></strong><div id="withdrawList" style="max-height:150px;overflow:auto;background:rgba(0,0,0,0.3);border-radius:8px;padding:8px;margin-top:4px;">加载中...</div></div><button id="closeAdminBtn" class="auth-btn" style="margin-top:12px;">关闭</button></div>`;
  const m = document.createElement('div'); m.className = 'modal'; m.innerHTML = html; document.body.appendChild(m);
  m.querySelector('#closeAdminBtn').onclick = () => m.remove(); m.addEventListener('click', e => { if (e.target === m) m.remove(); });
  let users = [], recharges = [], withdraws = [], config = { bankerBalance: 200000 };
  async function refreshPanel() { try { if (apiOk) { const [uRes, rRes, wRes, cRes] = await Promise.all([call('GET', '/users'), call('GET', '/recharges/pending'), call('GET', '/withdraws/pending'), call('GET', '/config')]); users = uRes; recharges = rRes; withdraws = wRes; config = cRes; } else { toast('API未连接', true); return; } } catch (e) { toast('加载失败', true); } document.getElementById('adminBanker').innerText = Number(config.bankerBalance || 200000).toFixed(2) + ' USDT'; const opts = users.map(u => `<option value="${u.account}">${u.account} (${u.balance.toFixed(2)})</option>`).join(''); document.getElementById('adminUserSelect').innerHTML = opts || '<option>暂无用户</option>'; document.getElementById('recordUserSelect').innerHTML = opts || '<option>暂无用户</option>'; const pr = recharges.filter(o => o.status === 'pending'); document.getElementById('rechargeCount').innerText = pr.length; document.getElementById('rechargeList').innerHTML = pr.length === 0 ? '<span style="color:#999;">无待审核</span>' : pr.map(o => `<div class="order-item" style="display:flex;justify-content:space-between;padding:4px 0;"><span>${o.account} 充值 ${o.amount}</span><div><button class="appRech" data-id="${o.id}">✅确认</button><button class="rejRech danger" data-id="${o.id}">❌拒绝</button></div></div>`).join(''); document.querySelectorAll('.appRech').forEach(b => b.onclick = async () => { await call('PUT', '/recharge/' + b.dataset.id, { status: 'approved' }); refreshPanel(); }); document.querySelectorAll('.rejRech').forEach(b => b.onclick = async () => { await call('PUT', '/recharge/' + b.dataset.id, { status: 'rejected' }); refreshPanel(); }); const pw = withdraws.filter(o => o.status === 'pending'); document.getElementById('withdrawCount').innerText = pw.length; document.getElementById('withdrawList').innerHTML = pw.length === 0 ? '<span style="color:#999;">无待审核</span>' : pw.map(o => `<div class="order-item" style="display:flex;justify-content:space-between;padding:4px 0;"><span>${o.account} 提现 ${o.amount}</span><div><button class="appWith" data-id="${o.id}">✅已打款</button><button class="rejWith danger" data-id="${o.id}">❌拒绝</button></div></div>`).join(''); document.querySelectorAll('.appWith').forEach(b => b.onclick = async () => { await call('PUT', '/withdraw/' + b.dataset.id, { status: 'approved' }); refreshPanel(); }); document.querySelectorAll('.rejWith').forEach(b => b.onclick = async () => { await call('PUT', '/withdraw/' + b.dataset.id, { status: 'rejected' }); refreshPanel(); }); }
  document.getElementById('adminAddBtn').onclick = async () => { const acc = document.getElementById('adminUserSelect').value, amt = parseFloat(document.getElementById('adminAmt').value); if (!acc || isNaN(amt) || amt <= 0) return; const u = users.find(u => u.account === acc); if (u) { u.balance += amt; await call('PUT', '/user/' + encodeURIComponent(acc) + '/balance', { balance: u.balance, admin: true }); refreshPanel(); } };
  document.getElementById('adminSubBtn').onclick = async () => { const acc = document.getElementById('adminUserSelect').value, amt = parseFloat(document.getElementById('adminAmt').value); if (!acc || isNaN(amt) || amt <= 0) return; const u = users.find(u => u.account === acc); if (u && u.balance >= amt) { u.balance -= amt; await call('PUT', '/user/' + encodeURIComponent(acc) + '/balance', { balance: u.balance, admin: true }); refreshPanel(); } };
  document.getElementById('showRecordsBtn').onclick = async () => { const acc = document.getElementById('recordUserSelect').value; const area = document.getElementById('adminGameRecords'); try { const res = await call('GET', '/user/' + encodeURIComponent(acc) + '/game-records'); if (!res.records || !res.records.length) { area.innerHTML = '暂无记录'; area.style.display = 'block'; return; } let tbl = '<table border="1" cellpadding="4" style="width:100%;border-collapse:collapse;font-size:0.8rem;"><tr style="background:rgba(255,170,51,0.3)"><th>局号</th><th>时间</th><th>庄家</th><th>骰子</th><th>投注</th><th>返奖</th><th>庄家盈亏</th></tr>'; res.records.forEach(r => { tbl += `<tr><td>${r.round}</td><td>${r.time}</td><td>${r.dealer || '无'}</td><td>${r.dice}</td><td>${(r.bet || 0).toFixed(2)}</td><td>${(r.return || 0).toFixed(2)}</td><td>${(r.dealerProfit || 0).toFixed(2)}</td></tr>`; }); tbl += '</table>'; area.innerHTML = tbl; area.style.display = 'block'; } catch (e) { area.innerHTML = '加载失败'; area.style.display = 'block'; } };
  refreshPanel();
}

(async function init() { await chkApi(); const saved = localStorage.curr_acc; if (saved && apiOk) { try { const d = await call('GET', '/user/' + encodeURIComponent(saved) + '/profile'); user = d.user; sendHb(); renderLobby(); } catch (e) { renderAuth(); } } else if (saved) { renderAuth(); } else renderAuth(); })();
</script>
