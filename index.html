<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>金辉四游戏 · 完整动画版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #fef9e6 0%, #fff5e0 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 16px;
            min-height: 100vh;
            color: #2c2b28;
        }
        #app {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(255, 248, 235, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(255, 215, 140, 0.6);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,200,0.8);
            overflow: hidden;
        }
        /* 登录/注册面板 */
        .auth-panel {
            padding: 32px 24px;
            background: rgba(255, 248, 235, 0.9);
        }
        .auth-panel h2, .auth-panel h3 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #c47c3a, #e09d32);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-input {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            background: white;
            border: 1px solid #ffd9a5;
            border-radius: 32px;
            color: #3a2a1a;
            font-size: 1rem;
            outline: none;
        }
        .auth-input:focus {
            border-color: #e09d32;
            box-shadow: 0 0 0 3px rgba(224, 157, 50, 0.2);
        }
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 12px 0;
        }
        .code-btn {
            background: linear-gradient(135deg, #c47c3a, #e09d32);
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .auth-btn {
            background: linear-gradient(135deg, #e09d32, #c47c3a);
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            font-size: 1rem;
        }
        .auth-btn:active, .code-btn:active { transform: scale(0.98); }
        hr {
            margin: 24px 0;
            border-color: #ffd9a5;
        }
        .auth-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 16px;
            color: #b97f2e;
        }
        /* 用户栏 */
        .user-section {
            background: rgba(255, 245, 225, 0.9);
            padding: 16px;
            border-bottom: 1px solid #ffdfb0;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        #userBalanceDisplay {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c47c3a, #f5b042);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn-sm {
            background: #fff0e0;
            border: 1px solid #ffd9a5;
            padding: 6px 14px;
            border-radius: 40px;
            color: #8b5a2b;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .charge-btn, .withdraw-btn {
            background: linear-gradient(135deg, #f5b042, #e09d32);
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .lang-switch {
            background: #c47c3a;
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            color: white;
            cursor: pointer;
            margin-left: 8px;
        }
        /* 游戏导航 */
        .game-nav {
            display: flex;
            gap: 8px;
            background: #fff0e0;
            padding: 8px 16px;
            margin: 16px 12px;
            border-radius: 60px;
        }
        .game-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #8b5a2b;
            cursor: pointer;
            transition: 0.2s;
        }
        .game-tab.active {
            background: linear-gradient(135deg, #e09d32, #c47c3a);
            color: white;
            box-shadow: 0 4px 12px rgba(192, 124, 58, 0.3);
        }
        .game-container {
            padding: 12px 16px 24px;
        }
        /* 游戏卡片通用 */
        .game-card {
            background: rgba(255, 248, 235, 0.8);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #ffdfb0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .chip {
            background: linear-gradient(145deg, #f5e6d3, #ffe8cc);
            display: inline-block;
            padding: 8px 16px;
            border-radius: 40px;
            margin: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #8b5a2b;
            border: 1px solid #ffd9a5;
        }
        .chip.selected {
            background: linear-gradient(145deg, #e09d32, #c47c3a);
            color: white;
            border-color: #e09d32;
        }
        .quick-bet, .clear-bet {
            background: #fff0e0;
            border: 1px solid #ffd9a5;
            border-radius: 30px;
            padding: 6px 14px;
            margin: 4px;
            cursor: pointer;
            color: #b97f2e;
            font-weight: 500;
        }
        .exec-btn {
            background: linear-gradient(135deg, #c47c3a, #e09d32);
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 4px;
        }
        .main-go {
            background: linear-gradient(135deg, #e94560, #c23b22);
        }
        /* 3D骰子通用 */
        .dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            perspective: 800px;
        }
        .dice-cube {
            width: 80px;
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
        }
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fef0df;
            border-radius: 16px;
            border: 2px solid #c47c3a;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            backface-visibility: visible;
        }
        .pip {
            width: 14px;
            height: 14px;
            background: #c47c3a;
            border-radius: 50%;
            margin: 3px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-tl { position: absolute; top: 12px; left: 12px; }
        .pip-tr { position: absolute; top: 12px; right: 12px; }
        .pip-bl { position: absolute; bottom: 12px; left: 12px; }
        .pip-br { position: absolute; bottom: 12px; right: 12px; }
        .pip-mid { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .pip-l1, .pip-l2, .pip-l3 { position: absolute; left: 12px; }
        .pip-l1 { top: 12px; }
        .pip-l2 { top: 50%; transform: translateY(-50%); }
        .pip-l3 { bottom: 12px; }
        .pip-r1, .pip-r2, .pip-r3 { position: absolute; right: 12px; }
        .pip-r1 { top: 12px; }
        .pip-r2 { top: 50%; transform: translateY(-50%); }
        .pip-r3 { bottom: 12px; }
        .dice-face-text {
            font-size: 2.5rem;
            text-shadow: 0 0 2px #c47c3a;
        }
        .front { transform: translateZ(40px); }
        .back { transform: rotateY(180deg) translateZ(40px); }
        .right { transform: rotateY(90deg) translateZ(40px); }
        .left { transform: rotateY(-90deg) translateZ(40px); }
        .top { transform: rotateX(90deg) translateZ(40px); }
        .bottom { transform: rotateX(-90deg) translateZ(40px); }
        @media (max-width: 480px) {
            .dice-cube { width: 65px; height: 65px; }
            .front, .back, .right, .left, .top, .bottom { transform: translateZ(32px); }
            .back { transform: rotateY(180deg) translateZ(32px); }
            .right { transform: rotateY(90deg) translateZ(32px); }
            .left { transform: rotateY(-90deg) translateZ(32px); }
            .top { transform: rotateX(90deg) translateZ(32px); }
            .bottom { transform: rotateX(-90deg) translateZ(32px); }
            .dice-face-text { font-size: 2rem; }
            .pip { width: 10px; height: 10px; }
        }
        .fish-pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
        }
        .fish-bet-card {
            background: rgba(255, 248, 235, 0.9);
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            border: 1px solid #ffdfb0;
        }
        .bet-card {
            background: rgba(255, 248, 235, 0.9);
            border-radius: 20px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #ffdfb0;
        }
        .bet-card:active { background: #ffe8cc; transform: scale(0.96); }
        .history-cell {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff0e0;
            font-weight: bold;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff8f0;
            border-radius: 32px;
            padding: 24px;
            max-width: 90%;
            max-height: 85%;
            overflow: auto;
            color: #3a2a1a;
            border: 1px solid #ffd9a5;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2b28;
            color: #ffd9a5;
            padding: 8px 20px;
            border-radius: 60px;
            z-index: 2000;
            font-weight: bold;
            white-space: nowrap;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        .result-popup {
            position: fixed;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #e09d32, #c47c3a);
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 1500;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .points-grid, .trio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 8px;
            margin: 12px 0;
        }
        button { cursor: pointer; }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .admin-table th, .admin-table td {
            padding: 8px 4px;
            border-bottom: 1px solid #ffd9a5;
            text-align: left;
        }
        .admin-btn {
            background: #e09d32;
            border: none;
            border-radius: 20px;
            padding: 4px 8px;
            margin: 2px;
            color: white;
            font-weight: bold;
        }
        /* 龙虎斗动画 */
        @keyframes dtShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px) scale(1.1); text-shadow: 0 0 10px gold; }
            50% { transform: translateX(10px) scale(1.2); text-shadow: 0 0 20px orange; }
            75% { transform: translateX(-5px) scale(1.1); }
            100% { transform: translateX(0) scale(1); }
        }
        @keyframes dtFlash {
            0% { opacity: 1; text-shadow: 0 0 5px white; }
            50% { opacity: 0.3; text-shadow: 0 0 30px gold; }
            100% { opacity: 1; text-shadow: 0 0 5px white; }
        }
        .dt-flash { animation: dtFlash 0.3s 3; }
        .dt-animation-box { animation: dtShake 0.5s ease-in-out; }
        /* 牛牛游戏样式 */
        .niuniu-cards {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .card {
            width: 70px;
            height: 100px;
            background: white;
            border-radius: 12px;
            border: 1px solid #c47c3a;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #c47c3a;
            position: relative;
            transition: transform 0.3s;
            opacity: 0;
            transform: scale(0.8);
            animation: cardAppear 0.2s forwards;
        }
        @keyframes cardAppear {
            to { opacity: 1; transform: scale(1); }
        }
        .card span.suit {
            font-size: 2rem;
        }
        .card .rank {
            font-size: 1.3rem;
            margin-top: 5px;
        }
        .niuniu-area {
            text-align: center;
            margin: 16px 0;
        }
        .niuniu-result {
            font-size: 1.4rem;
            font-weight: bold;
            color: #e09d32;
            margin: 8px 0;
        }
        @media (max-width: 480px) {
            .card { width: 55px; height: 80px; }
            .card span.suit { font-size: 1.5rem; }
            .card .rank { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== 中泰双语 ====================
    const lang = {
        zh: {
            recharge: "💎 充值", withdraw: "💰 提现", service: "📞 客服", logout: "退出", balance: "余额",
            phoneOrEmail: "手机号 / 邮箱", password: "密码 (≥4位)", referralCode: "推荐码 (必填)", remember: "记住账号",
            login: "登录", register: "注册", referralNote: "推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "获取验证码", verifyCode: "验证码", registerNow: "注册新账户",
            gameFish: "🐟 葫芦鱼", gameDice: "🎲 至尊骰宝", gameDT: "🐉 龙虎斗", gameNN: "🃏 至尊牛牛",
            fishRoll: "🎲 开骰", fishClear: "清空", fishGrab: "🎲 抢庄", fishDouble: "🎯 双押",
            diceClear: "清空", diceRepeat: "续押", diceRefresh: "刷新", dtFight: "确认投注", dtCancel: "全部取消", dtRepeat: "续押", dtRefresh: "刷新",
            nnBanker: "👑 庄家", nnPlayer: "👤 闲家", nnBet: "🎲 下注金额", nnPlaceBet: "🎲 下注", nnClear: "清空", nnResult: "🎉 开奖结果", nnWin: "赢", nnLose: "输"
        },
        th: {
            recharge: "💎 เติมเงิน", withdraw: "💰 ถอนเงิน", service: "📞 บริการ", logout: "ออก", balance: "ยอดเงิน",
            phoneOrEmail: "เบอร์โทร / อีเมล", password: "รหัสผ่าน (≥4)", referralCode: "รหัสแนะนำ", remember: "จำฉัน",
            login: "เข้าสู่ระบบ", register: "สมัคร", referralNote: "รหัส: VIP666,888VIP,GOLD2025,LUCKY8,DICE100",
            getCode: "รับรหัส", verifyCode: "รหัสยืนยัน", registerNow: "สมัครสมาชิก",
            gameFish: "🐟 ปลาหมึก", gameDice: "🎲 เซียนเต๋า", gameDT: "🐉 มังกรเสือ", gameNN: "🃏 แบล็คแจ็ค",
            fishRoll: "🎲 เปิด", fishClear: "ล้าง", fishGrab: "🎲 รับเจ้ามือ", fishDouble: "🎯 เดิมพันคู่",
            diceClear: "ล้าง", diceRepeat: "เล่นซ้ำ", diceRefresh: "รีเฟรช", dtFight: "ยืนยัน", dtCancel: "ยกเลิก", dtRepeat: "เล่นซ้ำ", dtRefresh: "รีเฟรช",
            nnBanker: "👑 เจ้ามือ", nnPlayer: "👤 ผู้เล่น", nnBet: "🎲 จำนวนเงินเดิมพัน", nnPlaceBet: "🎲 เดิมพัน", nnClear: "ล้าง", nnResult: "🎉 ผลรางวัล", nnWin: "ชนะ", nnLose: "แพ้"
        }
    };
    let currentLang = 'zh';
    function t(key) { return lang[currentLang][key] || lang.zh[key] || key; }

    // ==================== 全局数据 ====================
    let systemBankerBalance = localStorage.getItem('gold_system_banker') ? parseFloat(localStorage.getItem('gold_system_banker')) : 50000;
    let adjustFactor = localStorage.getItem('gold_adjustFactor') ? parseFloat(localStorage.getItem('gold_adjustFactor')) : 1.0;
    let validReferralCodes = ["VIP666", "888VIP", "GOLD2025", "LUCKY8", "DICE100"];
    let usersData = JSON.parse(localStorage.getItem('gold_users')) || {};
    let currentUser = null;
    let verificationCodes = {};

    function saveUsers() { localStorage.setItem('gold_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.account]?.balance || 0) : 0; }
    function setUserBalance(amount) {
        if (!currentUser) return;
        usersData[currentUser.account].balance = Math.max(0, amount);
        saveUsers();
        let span = document.getElementById("userBalanceDisplay");
        if (span) span.innerText = getUserBalance().toFixed(2);
    }
    function showToast(msg) {
        let t = document.createElement('div'); t.className = 'toast-message'; t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    function recharge() {
        let yuan = prompt(t('recharge') + " (1元 = 1余额)", "10");
        if (!yuan) return;
        let num = parseFloat(yuan);
        if (isNaN(num) || num <= 0) { showToast("请输入正数"); return; }
        setUserBalance(getUserBalance() + num);
        showToast(`${t('recharge')} +${num.toFixed(2)} 元`);
    }
    function withdraw() {
        let bal = getUserBalance();
        if (bal <= 0) { showToast("余额不足"); return; }
        let amount = parseFloat(prompt("提现金额 (元)", "10"));
        if (isNaN(amount) || amount <= 0 || amount > bal) { showToast("金额无效"); return; }
        let type = confirm("提现方式：确定=微信，取消=支付宝") ? "微信" : "支付宝";
        let account = prompt("请输入收款账号:");
        if (!account) return;
        setUserBalance(bal - amount);
        let record = { phone: currentUser.account, amount: amount, type, account, time: new Date().toLocaleString() };
        let records = JSON.parse(localStorage.getItem('gold_withdraw')) || [];
        records.push(record);
        localStorage.setItem('gold_withdraw', JSON.stringify(records));
        showToast(`提现申请已提交！${amount}元将处理到${type}账号 ${account}`);
    }
    function showServiceModal() { alert("客服微信: game_kf_888"); }

    // ==================== 管理员后台 ====================
    let adminPassword = "admin888";
    function openAdminModal() {
        let pwd = prompt("管理员密码:");
        if (pwd !== adminPassword) { showToast("密码错误"); return; }
        let allUsers = Object.keys(usersData).map(acc => ({ account: acc, balance: usersData[acc].balance, regTime: usersData[acc].registerTime || '未知' }));
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content" style="max-width:500px;">
                <h3 style="text-align:center; color:#c47c3a;">🎛️ 金辉管理员后台</h3>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <input type="text" id="adminSearchInput" placeholder="🔍 搜索账号" style="flex:2; padding:8px; border-radius:40px; border:1px solid #ffd9a5;">
                    <button id="adminSearchBtn" class="admin-btn">搜索</button>
                    <button id="adminResetSearch" class="admin-btn">重置</button>
                </div>
                <div style="max-height:220px; overflow-y:auto; margin-bottom:12px;">
                    <table class="admin-table">
                        <thead><tr><th>账号</th><th>余额</th><th>注册时间</th><th>操作</th></tr></thead>
                        <tbody id="adminUserTableBody"></tbody>
                    </table>
                </div>
                <select id="adminTargetUser" style="width:100%; margin:8px 0; padding:8px; border-radius:40px; border:1px solid #ffd9a5;">
                    ${allUsers.map(u => `<option value="${u.account}">${u.account} (${u.balance.toFixed(2)} 元)</option>`).join('')}
                </select>
                <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                    <input id="adminAmount" placeholder="金额" value="0" style="flex:1; padding:8px; border-radius:40px; border:1px solid #ffd9a5;">
                    <button id="adminAddBalance" class="admin-btn">➕ 上分</button>
                    <button id="adminSubBalance" class="admin-btn">➖ 下分</button>
                    <button id="adminResetBalance" class="admin-btn">🔄 重置0</button>
                </div>
                <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">

        function renderUserTable(searchKeyword = '') {
            let filtered = searchKeyword ? allUsers.filter(u => u.account.includes(searchKeyword)) : allUsers;
            let tbody = modalDiv.querySelector('#adminUserTableBody');
            tbody.innerHTML = filtered.map(u => `
                <tr>
                    <td>${u.account}</td>
                    <td>💰 ${u.balance.toFixed(2)}</td>
                    <td>${u.regTime}</td>
                    <td><button class="viewRecordBtn" data-account="${u.account}" class="admin-btn" style="background:#e09d32;">📜 记录</button></td>
                </tr>
            `).join('');
            document.querySelectorAll('.viewRecordBtn').forEach(btn => {
                btn.onclick = () => {
                    let acc = btn.dataset.account;
                    let records = usersData[acc]?.records || [];
                    let html = '<div style="max-height:300px; overflow-y:auto;">' + records.map(r => `<div style="padding:6px; border-bottom:1px solid #eee;">${r.time} | ${r.game} | 押 ${r.bet} → ${r.result} | ${r.win>0 ? '<span style="color:green;">赢 '+r.win+'</span>' : '<span style="color:red;">输 '+r.amount+'</span>'}</div>`).join('') + '</div><button id="closeRec" class="auth-btn" style="margin-top:12px;">关闭</button>';
                    let m = document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove();
                };
            });
        }
        renderUserTable();

        };
