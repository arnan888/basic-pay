<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虎争霸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* 主容器 */
        .game-container {
            width: 100%; max-width: 480px; height: 100vh;
            background: #4a7c64; border-radius: 15px;
            display: flex; flex-direction: column;
            padding: 6px;
        }

        /* 顶部状态栏（内陷+网格） */
        .top-bar {
            height: 8%; display: flex; gap: 10px; padding: 8px 12px;
        }
        .info-card {
            flex: 1; background: #6b737e;
            /* 内陷效果 */
            box-shadow: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            /* 黑色网格背景 */
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
            border: 2px solid #2c4a3b; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center; padding: 0 10px;
        }
        .info-card label { font-size: 12px; color: #ccc; }
        .info-card span { font-size: 20px; color: #f1c40f; text-shadow: 0 0 6px #f1c40f; }

        /* ================== 龙虎和对决区（全效果拉满） ================== */
        .battle-section {
            height: 38%; margin: 4px 10px;
            border: 3px solid #2c4a3b; border-radius: 12px;
            position: relative; overflow: hidden;
            /* 黑色网格背景 */
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
            background-color: #0a0a0a;
            /* 内陷效果 */
            box-shadow: inset 10px 10px 20px rgba(0,0,0,0.8), inset -10px -10px 20px rgba(255,255,255,0.05);
        }
        /* 动态龙 */
        .dragon-figure {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            width: 100px; height: 100px;
            font-size: 80px; color: #3498db;
            text-shadow: 0 0 15px #3498db;
            /* 动态效果 */
            animation: dragonDance 10s ease-in-out infinite;
        }
        @keyframes dragonDance {
            0% { left: 20px; transform: translateY(-50%) rotate(-5deg); }
            25% { left: 40px; transform: translateY(-55%) rotate(5deg); }
            50% { left: 20px; transform: translateY(-50%) rotate(-5deg); }
            75% { left: 0px; transform: translateY(-45%) rotate(5deg); }
            100% { left: 20px; transform: translateY(-50%) rotate(-5deg); }
        }
        /* 动态虎 */
        .tiger-figure {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 100px; height: 100px;
            font-size: 80px; color: #e67e22;
            text-shadow: 0 0 15px #e67e22;
            /* 动态效果 */
            animation: tigerRoar 8s ease-in-out infinite;
        }
        @keyframes tigerRoar {
            0% { right: 20px; transform: translateY(-50%) rotate(5deg); }
            25% { right: 40px; transform: translateY(-45%) rotate(-5deg); }
            50% { right: 20px; transform: translateY(-50%) rotate(5deg); }
            75% { right: 0px; transform: translateY(-55%) rotate(-5deg); }
            100% { right: 20px; transform: translateY(-50%) rotate(5deg); }
        }
        /* 和元素 */
        .tie-figure {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            font-size: 60px; color: #9b59b6;
            text-shadow: 0 0 15px #9b59b6;
            /* 呼吸效果 */
            animation: tiePulse 4s ease-in-out infinite;
        }
        @keyframes tiePulse {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
        }
        /* 结果文字 */
        .battle-result {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            font-size: 18px; color: #fff;
            background: rgba(0,0,0,0.7); padding: 2px 15px; border-radius: 10px;
        }
        /* =============================================================== */

        /* 操作区（内陷+网格） */
        .control-section {
            flex: 1; margin: 0 10px 8px 10px;
            background: #6b737e; border: 3px solid #2c4a3b; border-radius: 12px;
            padding: 12px; display: flex; flex-direction: column;
            /* 内陷效果 */
            box-shadow: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            /* 黑色网格背景 */
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        /* 龙虎和选择 */
        .choice-group {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px;
        }
        .choice-btn {
            height: 70px; background: #333;
            /* 内陷效果 */
            box-shadow: inset 5px 5px 10px rgba(0,0,0,0.6), inset -3px -3px 6px rgba(255,255,255,0.1);
            border: 2px solid #2c4a3b; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 45px; font-weight: bold; cursor: pointer;
        }
        .choice-btn.dragon { color: #3498db; text-shadow: 0 0 10px #3498db; }
        .choice-btn.tiger { color: #e67e22; text-shadow: 0 0 10px #e67e22; }
        .choice-btn.tie { color: #9b59b6; text-shadow: 0 0 10px #9b59b6; }
        .choice-btn.active {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.6), inset -2px -2px 5px rgba(255,255,255,0.1);
            border-color: #f1c40f; background: #222;
        }
        /* 数据区（内陷+网格） */
        .data-group {
            display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px;
        }
        .data-item {
            background: #333; border: 2px solid #2c4a3b; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px; height: 40px;
            /* 内陷效果 */
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.6), inset -2px -2px 4px rgba(255,255,255,0.05);
            /* 网格背景 */
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 12px 12px;
        }
        .data-item label { color: #ccc; font-size: 12px; }
        .data-item span { color: #f1c40f; font-size: 18px; }
        /* 押注金额 */
        .bet-txt { text-align: center; color: #fff; font-size: 16px; margin-bottom: 10px; }
        .bet-txt span { color: #f1c40f; text-shadow: 0 0 8px #f1c40f; }
        /* 功能按键 */
        .btn-group {
            display: flex; gap: 10px; margin-bottom: 10px;
        }
        .func-btn {
            width: 50px; height: 50px; background: #4a7c64;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.6), inset -2px -2px 4px rgba(255,255,255,0.05);
            border: 2px solid #2c4a3b; border-radius: 8px;
            color: #fff; font-size: 24px; cursor: pointer;
        }
        .main-btn {
            flex: 1; background: linear-gradient(#e53935, #b71c1c);
            border: none; border-radius: 25px;
            color: #fff; font-size: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 #7f0000;
        }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #7f0000; }
        /* 模式选择 */
        .mode-group {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .mode-btn {
            height: 40px; background: #333;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.6), inset -2px -2px 4px rgba(255,255,255,0.05);
            border: 2px solid #2c4a3b; border-radius: 8px;
            color: #fff; font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .mode-btn.active { background: #222; border-color: #f1c40f; color: #f1c40f; }
        .speed-btn { display: flex; gap: 5px; }
        .speed-btn span { flex: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .speed-btn span.active { background: #f1c40f; color: #000; }
    </style>
</head>
<body>
<div class="game-container">
    <!-- 顶部状态栏（带网格） -->
    <div class="top-bar">
        <div class="info-card">
            <label>账户余额</label>
            <span id="balance">857.80</span>
        </div>
        <div class="info-card">
            <label>奖池累积</label>
            <span>84291.50</span>
        </div>
    </div>

    <!-- 龙虎和对决区（动态+网格） -->
    <div class="battle-section">
        <div class="dragon-figure">🐉</div>
        <div class="tiger-figure">🐯</div>
        <div class="tie-figure">⚔️</div>
        <div class="battle-result">龙虎争霸·和局可求</div>
    </div>

    <!-- 操作区（带网格） -->
    <div class="control-section">
        <div class="choice-group">
            <div class="choice-btn dragon" onclick="setChoice('dragon')">龙</div>
            <div class="choice-btn tie" onclick="setChoice('tie')">和</div>
            <div class="choice-btn tiger" onclick="setChoice('tiger')">虎</div>
        </div>

        <div class="data-group">
            <div class="data-item">
                <label>当前押注</label>
                <span id="current-bet">100.00</span>
            </div>
            <div class="data-item">
                <label>预计奖金</label>
                <span id="expect-win">800.00</span>
            </div>
            <div class="data-item">
                <label>当前选择</label>
                <span id="current-choice">未选择</span>
            </div>
        </div>

        <div class="bet-txt">押注金额：<span id="bet-amount">100</span> USDT</div>

        <div class="btn-group">
            <button class="func-btn" onclick="changeBet(-1)">-</button>
            <button class="main-btn" onclick="startGame()">确认投注</button>
            <button class="func-btn" onclick="changeBet(1)">+</button>
        </div>

        <div class="mode-group">
            <button class="mode-btn" id="auto-btn" onclick="toggleAuto()">自动投注</button>
            <div class="mode-btn speed-btn">
                <span class="active" onclick="setSpeed(1)">1X</span>
                <span onclick="setSpeed(2)">2X</span>
                <span onclick="setSpeed(3)">3X</span>
            </div>
        </div>
    </div>
</div>

<script>
let balance = 857.8;
let betLevels = [10,50,100,500,1000];
let currentBet = 2;
let selected = null;
let isRunning = false;
let autoMode = false;
let speed = 1;

// 选择投注项
function setChoice(type) {
    if(isRunning) return;
    selected = type;
    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.choice-btn.${type}`).classList.add('active');
    document.getElementById('current-choice').textContent = type==='dragon'?'龙':type==='tiger'?'虎':'和';
    let win = betLevels[currentBet] * (type==='tie'?8:1);
    document.getElementById('expect-win').textContent = win.toFixed(2);
}

// 调整押注金额
function changeBet(dir) {
    if(isRunning) return;
    currentBet = Math.max(0, Math.min(4, currentBet + dir));
    document.getElementById('bet-amount').textContent = betLevels[currentBet];
    document.getElementById('current-bet').textContent = betLevels[currentBet].toFixed(2);
    let win = betLevels[currentBet] * (selected==='tie'?8:1);
    document.getElementById('expect-win').textContent = win.toFixed(2);
}

// 开始游戏
function startGame() {
    if(isRunning) { alert('游戏进行中，请稍候'); return; }
    if(!selected) { alert('请先选择投注项'); return; }
    
    let bet = betLevels[currentBet];
    if(balance < bet) { alert('余额不足'); return; }

    isRunning = true;
    balance -= bet;
    document.getElementById('balance').textContent = balance.toFixed(2);
    
    document.querySelector('.battle-result').textContent = '对决开始·风云变幻';
    setTimeout(() => {
        let res = ['dragon','tiger','tie'][Math.floor(Math.random()*3)];
        let txt = '';
        if(res==='dragon'){
            txt = '龙威盖世·大胜而归';
            document.querySelector('.dragon-figure').style.animationDuration = '1s';
            setTimeout(() => document.querySelector('.dragon-figure').style.animationDuration = '10s', 1500);
        }
        else if(res==='tiger'){
            txt = '虎啸山林·力压群雄';
            document.querySelector('.tiger-figure').style.animationDuration = '1s';
            setTimeout(() => document.querySelector('.tiger-figure').style.animationDuration = '8s', 1500);
        }
        else{
            txt = '势均力敌·握手言和';
            document.querySelector('.tie-figure').style.animationDuration = '1s';
            setTimeout(() => document.querySelector('.tie-figure').style.animationDuration = '4s', 1500);
        }
        document.querySelector('.battle-result').textContent = txt;
        
        if(res === selected) {
            balance += bet * (res==='tie'?8:1);
            document.getElementById('balance').textContent = balance.toFixed(2);
        }
        isRunning = false;
        
        if(autoMode) setTimeout(startGame, speed*1000);
    }, 1500);
}

// 自动模式
function toggleAuto() {
    autoMode = !autoMode;
    let btn = document.getElementById('auto-btn');
    btn.classList.toggle('active');
    btn.textContent = autoMode?'关闭自动':'自动投注';
    if(autoMode && !isRunning) startGame();
}

// 设置速度
function setSpeed(s) {
    speed = s;
    document.querySelectorAll('.speed-btn span').forEach(sp => sp.classList.remove('active'));
    document.querySelector(`.speed-btn span:nth-child(${s})`).classList.add('active');
}
</script>
</body>
</html>
