<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA_ANIMAL_PB_FINAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at center, #3d0505 0%, #000 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        .hud { margin-bottom: 20px; text-align: center; }
        .hud-v { color: #FFD700; font-size: 52px; font-weight: 900; text-shadow: 0 0 20px rgba(255,215,0,0.8); }
        
        .outer { width: 420px; height: 420px; border: 15px solid #FFD700; border-radius: 50%; position: relative; background: #000; box-shadow: 0 0 60px rgba(255,215,0,0.5), inset 0 0 30px #000; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1.25); overflow: hidden; }
        
        .sector { position: absolute; width: 100%; height: 100%; clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 50%); transform-origin: 50% 50%; }
        .sector:nth-child(odd) { background: radial-gradient(circle at 100% 100%, #a00 0%, #200 100%); }
        .sector:nth-child(even) { background: radial-gradient(circle at 100% 100%, #222 0%, #000 100%); }

        /* 动物头像容器 */
        .icon-box { position: absolute; width: 100%; text-align: center; top: 35px; transform-origin: center 175px; }
        .animal-head { 
            width: 75px; height: 75px; border-radius: 50%; border: 3px solid #FFD700; 
            object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            background: #eee;
        }
        .name-tag { color: #FFD700; font-size: 14px; font-weight: 900; display: block; margin-top: 2px; text-shadow: 1px 1px 2px #000; }

        .spin { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95px; height: 95px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #5cff5c, #008000 70%, #004d00); border: 4px solid #fff; cursor: pointer; z-index: 200; box-shadow: 0 10px 0 #003300, 0 15px 30px rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 20px; }
        .spin:active { transform: translate(-50%, -50%) translateY(8px); box-shadow: 0 2px 0 #003300; }
        .ptr { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 45px solid #FF7F00; z-index: 100; }

        .gears { margin-top: 35px; display: flex; gap: 12px; }
        .gear { padding: 10px 20px; border: 2px solid #FFD700; background: none; color: #FFD700; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .gear.active { background: #FFD700; color: #000; box-shadow: 0 0 20px #FFD700; }
        .shake { animation: s 0.1s infinite; } @keyframes s { 0%,100%{transform:translate(0,0)} 50%{transform:translate(3px,3px)} }
    </style>
</head>
<body>
    <div class="hud"><div class="hud-v" id="bal">89,037.00</div></div>
    <div class="outer" id="stg">
        <div class="ptr"></div>
        <div class="wheel" id="w">
            <!-- 8种动物头像依次排列 -->
            <div class="sector" style="transform: rotate(0deg);"><div class="icon-box" style="transform: rotate(22.5deg);"><img src="https://img.icons8.com/color/144/tiger.png" class="animal-head"><span class="name-tag">老虎</span></div></div>
            <div class="sector" style="transform: rotate(45deg);"><div class="icon-box" style="transform: rotate(22.5deg);"><img src="https://img.icons8.com/color/144/lion.png" class="animal-head"><span class="name-tag">狮子</span></div></div>
            <div class="sector" style="transform: rotate(90deg);"><div class="icon-box" style="transform: rotate(22.5deg);"><img src="https://img.icons8.com/color/144/wolf.png" class="animal-head"><span class="name-tag">狼</span></div></div>
            <div class="sector" style="transform: rotate(135deg);"><div class="icon-box" style="transform: rotate(22.5deg);"><img src="https://img.icons8.com/color/144/cat.png" class="animal-head"><span class="name-tag">猫</span></div></div>
            <div class="sector" style="transform: rotate(180deg);"><div class="icon-box" style="transform: rotate(22.5deg);"><img src="https://img.icons8.com/color/144/dog.png" class="animal-head"><span class="name-tag">狗</span></div></div>
            <div class="sector" style="transform: rotate(225deg);"><div class="icon-box" style="transform: rotate(22.5deg);"><img src="https://img.icons8.com/color/144/parrot.png" class="animal-head"><span class="name-tag">鹦鹉</span></div></div>
            <div class="sector" style="transform: rotate(270deg);"><div class="icon-box" style="transform: rotate(22.5deg);"><img src="https://img.icons8.com/color/144/dolphin.png" class="animal-head"><span class="name-tag">海豚</span></div></div>
            <div class="sector" style="transform: rotate(315deg);"><div class="icon-box" style="transform: rotate(22.5deg);"><img src="https://img.icons8.com/color/144/koala.png" class="animal-head"><span class="name-tag">考拉</span></div></div>
        </div>
        <div class="spin" onclick="run()">SPIN</div>
    </div>
    <div class="gears">
        <button class="gear active" id="g1" onclick="setG(1)">标准</button>
        <button class="gear" id="g2" onclick="setG(2)">快速</button>
        <button class="gear" id="g3" onclick="setG(3)">极速</button>
    </div>
    <script>
        let b = 89037.00; let r = 0; let g = 1; let s = false;
        function setG(v) { g=v; document.querySelectorAll('.gear').forEach(n=>n.classList.remove('active')); document.getElementById('g'+v).classList.add('active'); }
        function run() {
            if(s || b < 0.5) return; s=true; b-=0.5;
            document.getElementById('bal').innerText = b.toLocaleString(undefined,{minimumFractionDigits:2});
            let d = g==1?3500:g==2?1500:600;
            let a = 2160 + Math.floor(Math.random()*360); r+=a;
            const w = document.getElementById('w');
            w.style.transition = `transform ${d}ms cubic-bezier(0.1, 0, 0.1, 1.25)`;
            w.style.transform = `rotate(${r}deg)`;
            setTimeout(() => {
                document.getElementById('stg').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('stg').classList.remove('shake');
                    b += [10, 20, 5, 50, 2, 100, 15, 0][Math.floor(Math.random()*8)];
                    document.getElementById('bal').innerText = b.toLocaleString(undefined,{minimumFractionDigits:2});
                    s=false;
                }, 400);
            }, d);
        }
    </script>
</body>
</html>
