<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_DASHBOARD_V4</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { 
            background: #222; /* 工业深灰背景 */
            background-image: linear-gradient(#2a2a2a 1px, transparent 1px), linear-gradient(90deg, #2a2a2a 1px, transparent 1px);
            background-size: 20px 20px; /* 增加网格线，专业感 */
            color:#FFF; font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            height:100vh; overflow:hidden; display:flex; flex-direction:column;
        }

        /* 顶部看板：双翼设计 */
        .header-dash { 
            display:grid; grid-template-columns: 1fr 1fr; gap:1px; 
            background:#444; border-bottom:2px solid #555; height: 90px;
        }
        .dash-node { background:#1a1a1a; padding:10px; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .node-label { font-size:10px; color:#888; text-transform:uppercase; margin-bottom:5px; letter-spacing:1px; }
        .node-val { color:#FF0000; font-size:24px; font-weight:900; font-family:monospace; }

        /* 状态条 */
        .status-bar { background:#333; height:25px; display:flex; align-items:center; padding:0 10px; font-size:10px; color:#0f0; justify-content:space-between; }

        /* 核心执行区 */
        .core-section { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        
        /* 余额看板 */
        .balance-board { width:100%; background:rgba(0,0,0,0.4); border:1px solid #444; border-radius:8px; padding:15px; text-align:center; margin-bottom:20px; box-shadow:inset 0 0 20px #000; }
        .bal-val { font-size:60px; font-weight:900; color:#FF0000; text-shadow:0 0 20px rgba(255,0,0,0.3); }

        /* 转盘：模块化嵌套 */
        .wheel-module { 
            position:relative; width:260px; height:260px; 
            border:8px solid #333; border-radius:15px; /* 方形外框包裹圆形，像仪器 */
            background:#111; padding:10px; box-shadow:0 0 30px rgba(0,0,0,0.5);
        }
        .wheel-inner { 
            width:100%; height:100%; border-radius:50%; border:2px solid #444;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); 
            position:relative; overflow:hidden; background:#1a1a1a;
        }
        .pointer-fixed { 
            position:absolute; top:0; left:50%; transform:translateX(-50%); 
            width:4px; height:30px; background:#FF0000; z-index:100; box-shadow:0 0 10px #F00;
        }
        .slot-item { position:absolute; width:100%; height:100%; text-align:center; padding-top:15px; font-weight:bold; font-size:14px; color:#666; }

        /* 操作台区块 */
        .console-box { 
            width:100%; background:#1a1a1a; border-top:2px solid #444; 
            padding:20px 15px 100px 15px; /* 留出导航高度 */
        }
        .bet-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
        .adj-btn { width:50px; height:50px; background:#333; border:1px solid #555; color:#FFF; font-size:24px; border-radius:5px; display:flex; align-items:center; justify-content:center; }
        .execute-btn { flex:1; margin:0 15px; height:55px; background:#FF0000; border:none; color:#FFF; font-size:22px; font-weight:900; letter-spacing:2px; border-radius:5px; }

        .tech-row { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
        .mode-btn { padding:10px; background:#222; border:1px solid #444; color:#666; font-size:11px; font-weight:bold; text-align:center; border-radius:4px; }
        .mode-btn.on { border-color:#FF0000; color:#FF0000; background:rgba(255,0,0,0.05); }

        /* 底部导航面板 */
        .nav-panel { 
            position:fixed; bottom:0; width:100%; height:75px; 
            background:#000; border-top:1px solid #FF0000; 
            display:grid; grid-template-columns: repeat(4, 1fr);
        }
        .nav-node { display:flex; flex-direction:column; align-items:center; justify-content:center; color:#555; font-size:11px; font-weight:bold; }
        .nav-node.active { color:#FF0000; }
    </style>
</head>
<body>

    <!-- 顶部数据看板 -->
    <div class="header-dash">
        <div class="dash-node">
            <div class="node-label">Settlement In</div>
            <div id="st_in" class="node-val">0.0</div>
        </div>
        <div class="dash-node">
            <div class="node-label">Liquidity Out</div>
            <div id="st_out" class="node-val">0.0</div>
        </div>
    </div>

    <!-- 实时状态条 -->
    <div class="status-bar">
        <span>● SYSTEM_READY</span>
        <span id="sys_time">RTP_LOCKED: 90.00%</span>
    </div>

    <div class="core-section">
        <!-- 余额面板 -->
        <div class="balance-board">
            <div class="node-label">Available Balance (USDT)</div>
            <div class="bal-val" id="ui_bal">100.0</div>
            <div style="font-size:12px; color:#888;">UNIT_BET: <span id="ui_bet" style="color:#F00">0.5</span></div>
        </div>

        <!-- 转盘执行模块 -->
        <div class="wheel-module">
            <div class="pointer-fixed"></div>
            <div id="ui_wheel" class="wheel-inner">
                <div class="slot-item" style="transform:rotate(0deg)">1.5X</div>
                <div class="slot-item" style="transform:rotate(45deg)">0X</div>
                <div class="slot-item" style="transform:rotate(90deg)">120X</div>
                <div class="slot-item" style="transform:rotate(135deg)">500X</div>
                <div class="slot-item" style="transform:rotate(180deg)">88X</div>
                <div class="slot-item" style="transform:rotate(225deg)">50X</div>
                <div class="slot-item" style="transform:rotate(270deg)">20X</div>
                <div class="slot-item" style="transform:rotate(315deg)">0X</div>
            </div>
        </div>
    </div>

    <!-- 工业操作台 -->
    <div class="console-box">
        <div class="bet-row">
            <div class="adj-btn" onclick="changeBet(-0.5)">－</div>
            <button id="go_btn" class="execute-btn" onclick="go()">EXECUTE</button>
            <div class="adj-btn" onclick="changeBet(0.5)">＋</div>
        </div>
        <div class="tech-row">
            <div id="auto_btn" class="mode-btn" onclick="toggleAuto()">AUTO PILOT: OFF</div>
            <div id="speed_btn" class="mode-btn" onclick="toggleSpeed()">BOOST MODE: 1X</div>
        </div>
    </div>

    <!-- 底部导航面板 -->
    <div class="nav-panel">
        <div class="nav-node">MARKET</div>
        <div class="nav-node">ASSETS</div>
        <div class="nav-node">HISTORY</div>
        <div class="nav-node active">QUANT</div>
    </div>

    <script>
        let balance = 100.0, bet = 0.5, totalIn = 0.0, totalOut = 0.0, rot = 0, busy = false;
        let isAuto = false, speedMode = 1;

        function toggleAuto() {
            isAuto = !isAuto;
            const btn = document.getElementById('auto_btn');
            btn.innerText = `AUTO PILOT: ${isAuto ? 'ON' : 'OFF'}`;
            btn.className = isAuto ? 'mode-btn on' : 'mode-btn';
            if(isAuto && !busy) go();
        }

        function toggleSpeed() {
            speedMode = (speedMode === 1) ? 2 : 1;
            const btn = document.getElementById('speed_btn');
            btn.innerText = `BOOST MODE: ${speedMode === 1 ? '1X' : '2X'}`;
            btn.className = speedMode === 2 ? 'mode-btn on' : 'mode-btn';
            document.getElementById('ui_wheel').style.transitionDuration = speedMode === 1 ? '5s' : '1.2s';
        }

        function changeBet(val) {
            if (busy) return;
            let n = bet + val;
            if (n >= 0.5) { bet = n; document.getElementById('ui_bet').innerText = bet.toFixed(1); }
        }

        function animateWin(prize) {
            const balEl = document.getElementById('ui_bal');
            let currentWin = 0.1;
            const duration = 1200;
            const increment = prize / (duration / 30);
            const timer = setInterval(() => {
                currentWin += increment;
                if (currentWin >= prize) {
                    currentWin = prize;
                    clearInterval(timer);
                    if(isAuto) setTimeout(go, 800);
                }
                const tempBal = (balance - prize) + currentWin;
                balEl.innerText = tempBal.toFixed(1);
            }, 30);
        }

        function go() {
            if (busy || balance < bet) {
                isAuto = false;
                document.getElementById('auto_btn').className = 'mode-btn';
                document.getElementById('auto_btn').innerText = 'AUTO PILOT: OFF';
                return;
            }
            busy = true;
            document.getElementById('go_btn').style.background = "#500";

            const r = Math.floor(Math.random() * 1000);
            let idx = (r < 480) ? 1 : (r < 950 ? 0 : (r < 995 ? 7 : (r < 998 ? 5 : (r < 2 ? 3 : 2))));

            const targetAngle = idx * 45;
            rot += (Math.floor(Math.random() * 5) + 12) * 360 + (360 - targetAngle - (rot % 360)) + 360;
            document.getElementById('ui_wheel').style.transform = `rotate(${rot}deg)`;

            const waitTime = speedMode === 1 ? 5000 : 1200;

            setTimeout(() => {
                const multis = [1.5, 0, 120, 500, 88, 50, 20, 0];
                const prize = multis[idx] * bet;
                balance = (balance - bet) + prize;
                totalIn += bet; totalOut += prize;
                document.getElementById('st_in').innerText = totalIn.toFixed(1);
                document.getElementById('st_out').innerText = totalOut.toFixed(1);

                if (prize > 0) animateWin(prize);
                else {
                    document.getElementById('ui_bal').innerText = balance.toFixed(1);
                    if(isAuto) setTimeout(go, 1000);
                }
                setTimeout(() => { busy = false; document.getElementById('go_btn').style.background = "#F00"; }, 1500);
            }, waitTime);
        }
    </script>
</body>
</html>
