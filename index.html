<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>五兽至尊_V800_DARK_MATTER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --gold: #ffcc00; --bg: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        
        body { background: var(--bg); color: #fff; font-family: 'Inter', system-ui, sans-serif; height: 100vh; overflow: hidden; position: relative; }

        /* 粒子画布：填满所有边角 */
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* 全屏 UI 容器 */
        .app-layer { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 0; }

        /* 顶部余额：黑金浮雕感 */
        .score-box {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 45px; border-radius: 100px; backdrop-filter: blur(30px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,242,255,0.1);
            transform: perspective(500px) rotateX(10deg);
        }
        .val { font-size: 52px; font-weight: 900; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px var(--neon)); }

        /* 转盘：核心动力源 */
        .wheel-wrap { position: relative; width: 88vw; max-width: 380px; aspect-ratio: 1/1; }
        .wheel-outer {
            width: 100%; height: 100%; border-radius: 50%; padding: 8px;
            background: conic-gradient(from 0deg, #111, #333, #111, #333, #111);
            box-shadow: 0 0 100px rgba(0,0,0,0.9), 0 0 40px rgba(0,242,255,0.2);
            position: relative; transition: 6s cubic-bezier(0.15, 0, 0.05, 1);
        }
        .sector { position: absolute; width: 100%; height: 100%; clip-path: polygon(50% 50%, 100% 18%, 100% 82%); transform-origin: center; display: flex; align-items: center; justify-content: flex-end; padding-right: 8%; }
        .icon { font-size: 78px; transform: rotate(90deg); filter: drop-shadow(0 0 20px rgba(255,255,255,0.4)); transition: 0.3s; }

        /* 指针：激光切割线 */
        .pointer { 
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%); 
            width: 4px; height: 80px; background: var(--neon); box-shadow: 0 0 30px var(--neon); z-index: 50;
        }
        .pointer::after { content: ""; position: absolute; bottom: 0; left: -8px; border: 10px solid transparent; border-bottom-color: var(--neon); }

        /* 启动核：重力感应按钮 */
        .spin-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
            background: radial-gradient(circle at 30% 30%, #444, #000);
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 22px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,0,85,0.3);
            color: var(--pink); text-shadow: 0 0 10px var(--pink); cursor: pointer; z-index: 100;
        }
        .spin-core:active { transform: translate(-50%, -50%) scale(0.92); }

        /* 底部：控制中枢 */
        .control-panel { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .bet-bar { 
            display: flex; align-items: center; gap: 50px; 
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            padding: 10px 60px; border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .step-btn { background: none; border: none; color: #fff; font-size: 40px; font-weight: 100; opacity: 0.5; transition: 0.3s; width: 60px; }
        .step-btn:active { opacity: 1; transform: scale(1.3); color: var(--neon); }
        #msg { height: 30px; font-size: 24px; font-weight: 900; letter-spacing: 4px; color: var(--gold); text-shadow: 0 0 20px rgba(255,204,0,0.4); }
    </style>
</head>
<body onclick="initEngine()">

    <canvas id="particleCanvas"></canvas>

    <div class="app-layer">
        <div class="score-box">
            <div class="val">💎 <span id="bal">1,000</span></div>
        </div>

        <div class="wheel-wrap">
            <div class="pointer"></div>
            <div id="wheel" class="wheel-outer">
                <div class="sector" style="transform:rotate(-90deg)"><b class="icon">👑</b></div>
                <div class="sector" style="transform:rotate(-30deg)"><b class="icon">🦁</b></div>
                <div class="sector" style="transform:rotate(30deg)"><b class="icon">🐯</b></div>
                <div class="sector" style="transform:rotate(90deg)"><b class="icon">🦅</b></div>
                <div class="sector" style="transform:rotate(150deg)"><b class="icon">🐺</b></div>
                <div class="sector" style="transform:rotate(210deg)"><b class="icon">🐕</b></div>
            </div>
            <div class="spin-core" onclick="go()">RUN</div>
        </div>

        <div class="control-panel">
            <div class="bet-bar">
                <button class="step-btn" onclick="alt(-10)">-</button>
                <div style="font-size:48px; font-weight:900; min-width:100px; text-align:center;" id="bet">1</div>
                <button class="step-btn" onclick="alt(10)">+</button>
            </div>
            <div id="msg">INITIALIZING...</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let bal = 1000, bet = 1, rot = 0, isP = false, audioCtx, particles = [];
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        // 粒子物理引擎
        function initEngine() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) particles.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
                size: Math.random()*2, c: Math.random() > 0.5 ? '#00f2ff' : '#ff0055'
            });
            render();
            document.getElementById('msg').innerText = "READY TO SPIN";
        }

        function render() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx *= -1;
                if(p.y<0 || p.y>canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fillStyle = p.c; ctx.fill();
            });
            requestAnimationFrame(render);
        }

        function playSfx(freq, dur, type='sine') {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = type; o.frequency.exponentialRampToValueAtTime(freq, audioCtx.currentTime + dur);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }

        function alt(v) {
            if(isP) return;
            bet = Math.max(1, Math.min(bal, bet+v));
            document.getElementById('bet').innerText = bet;
            tg.HapticFeedback.selectionChanged();
            playSfx(800, 0.1, 'square');
        }

        function go() {
            if(isP || bal < bet) return;
            isP = true; bal -= bet;
            document.getElementById('bal').innerText = bal.toLocaleString();
            tg.HapticFeedback.impactOccurred('heavy');
            
            // 坍缩特效：粒子向中心加速
            particles.forEach(p => { p.vx *= 15; p.vy *= 15; });

            let idx = Math.floor(Math.random()*6);
            rot += (3600 + idx*60);
            document.getElementById('wheel').style.transform = `rotate(-${rot}deg)`;
            document.getElementById('msg').innerText = "SYNCHRONIZING...";

            setTimeout(() => {
                const m = [88, 15, 10, 5, 2, 0];
                let w = Math.floor(bet * m[idx]);
                bal += w;
                document.getElementById('bal').innerText = bal.toLocaleString();
                
                // 爆炸特效
                particles.forEach(p => { p.vx = (Math.random()-0.5)*20; p.vy = (Math.random()-0.5)*20; });

                if(w > 0) {
                    document.getElementById('msg').innerText = "VICTORY: +" + w;
                    tg.HapticFeedback.notificationOccurred('success');
                    for(let i=0; i<15; i++) setTimeout(() => playSfx(400 + i*100, 0.2), i*50);
                } else {
                    document.getElementById('msg').innerText = "FATAL ERROR";
                    playSfx(100, 0.5, 'sawtooth');
                }
                setTimeout(() => { 
                    particles.forEach(p => { p.vx *= 0.1; p.vy *= 0.1; });
                    isP = false; 
                }, 1000);
            }, 6000);
        }
    </script>
</body>
</html>
