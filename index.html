<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_BRIGHT_TITANIUM</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        
        /* --- 核心提亮：背景改为明亮的钛灰色 --- */
        body { 
            background: #e5e7eb; 
            color:#FFF; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; 
            height:100vh; overflow:hidden; display:flex; flex-direction:column;
        }

        /* 状态条保持深色以平衡视觉 */
        .status-bar { background:#111827; height:30px; display:flex; align-items:center; padding:0 15px; font-size:11px; color:#42ff78; justify-content:center; font-weight:bold; }

        .core-section { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:15px; gap:12px; }

        /* 资产板块 - 镶嵌在明亮背景上的深色核心 */
        .balance-card { 
            width:100%; background: linear-gradient(145deg, #1f2937, #111827); 
            border: 1px solid #000; border-radius:15px; padding:25px 20px; text-align:center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .bal-val { font-size:60px; font-weight:900; color:#42ff78; text-shadow: 0 0 20px rgba(66,255,120,0.5); font-family: 'Verdana', sans-serif; }
        .bet-info { font-size:12px; color:#4ade80; margin-top:8px; font-family: monospace; }

        /* 转盘容器 - 保持图示结构，提亮周边 */
        .wheel-module { 
            position:relative; width:100%; max-width:320px; aspect-ratio: 1/1;
            background: #1f2937; border-radius:20px; border: 1px solid #000;
            display:flex; align-items:center; justify-content:center;
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }
        
        .wheel-outer {
            width: 85%; height: 85%; border-radius: 50%; position: relative; 
            border: 8px solid #111827; background: #0f172a; overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }
        
        .wheel-center-val {
            position: absolute; z-index: 10; width: 75px; height: 75px; background: #111827;
            border-radius: 50%; border: 2px solid #374151; display: flex; align-items:center; justify-content:center;
            color: #42ff78; font-size: 22px; font-weight: 900; text-shadow: 0 0 12px #42ff78;
        }
        
        /* 瑞兽格位完全不动 */
        .slot-content { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; padding-top:10px; }
        .beast-ico { font-size: 28px; margin-bottom:2px; }
        .beast-txt { font-size: 11px; color:#9ca3af; font-weight:bold; }

        .pointer-line { position:absolute; top:2px; left:50%; transform:translateX(-50%); width:4px; height:45px; background:#ef4444; z-index:100; box-shadow:0 0 15px #ef4444; border-radius:2px; }

        /* 底部操作台 - 镶嵌在亮色底上的核心区 */
        .console { 
            width:100%; background:#111827; 
            border-radius: 20px 20px 0 0;
            padding:15px 15px 85px 15px; 
            box-shadow: 0 -8px 25px rgba(0,0,0,0.1);
        }
        
        .main-row { display:flex; gap:12px; margin-bottom:15px; }
        .adj { width:65px; height:60px; background: #374151; border:1px solid #4b5563; color:#FFF; font-size:35px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
        .exec { flex:1; background:#dc2626; border:none; color:#FFF; font-size:24px; font-weight:900; border-radius:10px; letter-spacing:4px; box-shadow: 0 4px 0 #991b1b; }
        
        .tech-row { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
        .mode-b { padding:14px; background:#1f2937; border:1px solid #374151; color:#9ca3af; font-size:13px; font-weight:bold; text-align:center; border-radius:8px; }
        .mode-b.on { border-color:#ef4444; color:#FFF; }

        .nav { position:fixed; bottom:0; width:100%; height:75px; background:#000; border-top:1px solid #111827; display:grid; grid-template-columns: repeat(4, 1fr); }
        .nav-n { display:flex; flex-direction:column; align-items:center; justify-content:center; color:#6b7280; font-size:12px; font-weight:bold; }
        .nav-n.act { color:#ef4444; }
    </style>
</head>
<body>

    <div class="status-bar">● SYSTEM_SYNCHRONIZED ● </div>

    <div class="core-section">
        <!-- 资产板块 -->
        <div class="balance-card">
            <div style="font-size:11px; color:#9ca3af; margin-bottom:8px; letter-spacing:1px;">AVAILABLE BALANCE (USDT)</div>
            <div class="bal-val" id="ui_bal">100.3</div>
            <div class="bet-info">UNIT_BET: <span id="ui_bet" style="color:#42ff78">0.5</span></div>
        </div>

        <!-- 转盘容器 -->
        <div class="wheel-module">
            <div class="pointer-line"></div>
            <div class="wheel-center-val" id="center_val">X88</div>
            <div id="ui_wheel" class="wheel-outer">
                <div class="slot-content" style="transform:rotate(0deg)"><span class="beast-ico">🦢</span><span class="beast-txt">孤鸿</span></div>
                <div class="slot-content" style="transform:rotate(45deg)"><span class="beast-ico">🐺</span><span class="beast-txt">孤狼</span></div>
                <div class="slot-content" style="transform:rotate(90deg)"><span class="beast-ico">🐢</span><span class="beast-txt">玄武</span></div>
                <div class="slot-content" style="transform:rotate(135deg)"><span class="beast-ico">🦌</span><span class="beast-txt">麒麟</span></div>
                <div class="slot-content" style="transform:rotate(180deg)"><span class="beast-ico">🐲</span><span class="beast-txt" style="color:#42ff78">神龙</span></div>
                <div class="slot-content" style="transform:rotate(225deg)"><span class="beast-ico">🔥</span><span class="beast-txt">凤凰</span></div>
                <div class="slot-content" style="transform:rotate(270deg)"><span class="beast-ico">🦅</span><span class="beast-txt">大鹏</span></div>
                <div class="slot-content" style="transform:rotate(315deg)"><span class="beast-ico">🦢</span><span class="beast-txt">仙鹤</span></div>
            </div>
        </div>
    </div>

    <!-- 底部控制台 -->
    <div class="console">
        <div class="main-row">
            <div class="adj" onclick="changeBet(-0.5)">－</div>
            <button id="go_btn" class="exec" onclick="go()">开始执行</button>
            <div class="adj" onclick="changeBet(0.5)">＋</div>
        </div>
        <div class="tech-row">
            <div id="auto_btn" class="mode-b" onclick="toggleAuto()">🤖 自动模式: 关</div>
            <div id="speed_btn" class="mode-b" onclick="cycleSpeed()">⚡ 变速模式: 1X</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-n">行情</div><div class="nav-n">资产中心</div><div class="nav-n">历史记录</div><div class="nav-n act">量化终端</div>
    </div>

    <script>
        let balance = 100.3, bet = 0.5, rot = 0, busy = false, isAuto = false, speedMode = 1;
        const beastNames = ["X0", "X0", "X120", "X500", "X50", "X88", "X50", "X20"];
        const multis = [0, 0, 120, 500, 50, 88, 50, 20];

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById('auto_btn').className = isAuto ? 'mode-b on' : 'mode-b';
            document.getElementById('auto_btn').innerHTML = `🤖 自动模式: ${isAuto ? '开' : '关'}`;
            if(isAuto && !busy) go();
        }

        function cycleSpeed() {
            speedMode = (speedMode % 3) + 1;
            const btn = document.getElementById('speed_btn');
            btn.innerHTML = `⚡ 变速模式: ${speedMode}X`;
            const times = ["", "5s", "1.2s", "0.5s"];
            document.getElementById('ui_wheel').style.transitionDuration = times[speedMode];
        }

        function changeBet(val) {
            if (busy) return;
            let n = bet + val;
            if (n >= 0.5) { bet = n; document.getElementById('ui_bet').innerText = bet.toFixed(1); }
        }

        function go() {
            if (busy || balance < bet) { isAuto = false; return; }
            busy = true;
            document.getElementById('go_btn').style.opacity = "0.7";
            
            const r = Math.floor(Math.random() * 1000);
            let idx = (r < 500) ? 0 : (r < 850 ? 1 : (r < 950 ? 7 : (r < 980 ? 6 : (r < 990 ? 2 : (r < 996 ? 5 : (r < 999 ? 4 : 3))))));
            
            const targetAngle = idx * 45; 
            rot += (Math.floor(Math.random() * 5) + 10) * 360 + (360 - targetAngle - (rot % 360)) + 360;
            document.getElementById('ui_wheel').style.transform = `rotate(${rot}deg)`;

            const waitTimes = [0, 5000, 1200, 500];
            setTimeout(() => {
                const prize = multis[idx] * bet;
                balance = (balance - bet) + prize;
                document.getElementById('ui_bal').innerText = balance.toFixed(1);
                document.getElementById('center_val').innerText = beastNames[idx];
                
                if(isAuto) setTimeout(go, 800);
                setTimeout(() => { busy = false; document.getElementById('go_btn').style.opacity = "1"; }, 500);
            }, waitTimes[speedMode]);
        }
    </script>
</body>
</html>
