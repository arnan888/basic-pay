<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_INSET_TECH</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        
        /* 核心底色：淡光墨绿 */
        body { 
            background: #0a1410; 
            background-image: radial-gradient(circle at 50% 50%, #162a20 0%, #0a1410 100%);
            color:#FFF; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; 
            height:100vh; overflow:hidden; display:flex; flex-direction:column;
        }

        .status-bar { background: rgba(0,0,0,0.4); height:28px; display:flex; align-items:center; padding:0 15px; font-size:10px; color:#42ff78; justify-content:center; border-bottom:1px solid rgba(0,0,0,0.5); }

        .core-section { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:15px; gap:15px; }

        /* --- 核心修改：资产板块内陷效果 --- */
        .balance-well {
            width:100%; padding:15px; background: #080d0b;
            border-radius:20px;
            /* 关键：双重内阴影模拟深度内陷 */
            box-shadow: inset 10px 10px 20px rgba(0,0,0,0.8), inset -5px -5px 15px rgba(255,255,255,0.02);
            border: 1px solid #1a2f23;
        }
        .bal-val { font-size:58px; font-weight:900; color:#42ff78; text-shadow: 0 0 15px rgba(66,255,120,0.4); text-align:center; font-family: 'Verdana', sans-serif; }
        .bet-info { font-size:11px; color:#2e7d32; text-align:center; margin-top:5px; font-family: monospace; }

        /* --- 核心修改：转盘区内陷效果 --- */
        .wheel-well { 
            position:relative; width:100%; max-width:320px; aspect-ratio: 1/1;
            background: #0a0f0d; border-radius:25px;
            display:flex; align-items:center; justify-content:center;
            /* 深度内陷阴影 */
            box-shadow: inset 12px 12px 25px rgba(0,0,0,0.9), inset -4px -4px 15px rgba(255,255,255,0.02);
            border: 1px solid #162a20;
        }
        
        .wheel-outer {
            width: 82%; height: 82%; border-radius: 50%; position: relative; 
            border: 6px solid #111; background: #050807; overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .wheel-center-val {
            position: absolute; z-index: 10; width: 70px; height: 70px; background: #0d1110;
            border-radius: 50%; border: 1px solid #222; display: flex; align-items:center; justify-content:center;
            color: #42ff78; font-size: 20px; font-weight: 900; text-shadow: 0 0 10px #42ff78;
        }
        
        .slot-content { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; padding-top:10px; }
        .beast-ico { font-size: 24px; margin-bottom:2px; }
        .beast-txt { font-size: 10px; color:#666; font-weight:bold; }

        .pointer-line { position:absolute; top:5px; left:50%; transform:translateX(-50%); width:3px; height:45px; background:#F00; z-index:100; box-shadow:0 0 10px #F00; border-radius:2px; }

        /* --- 核心修改：控制台内陷效果 --- */
        .console-well { 
            width:100%; background:#0a110e; 
            border-radius: 25px 25px 0 0;
            padding:20px 20px 85px 20px; 
            /* 深度内陷阴影 */
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8);
            border-top: 1px solid #162a20;
        }
        
        .main-row { display:flex; gap:12px; margin-bottom:15px; }
        .adj { 
            width:60px; height:60px; background: linear-gradient(145deg, #1a1a1a, #0d0d0d); 
            border:1px solid #333; color:#FFF; font-size:32px; border-radius:12px; 
            display:flex; align-items:center; justify-content:center;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.5);
        }
        .exec { 
            flex:1; background:#ce1b1b; border:none; color:#FFF; font-size:22px; font-weight:900; 
            border-radius:12px; letter-spacing:3px; box-shadow: 0 4px 0 #800; 
        }
        
        .tech-row { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
        .mode-b { padding:14px; background:#111; border:1px solid #222; color:#555; font-size:12px; font-weight:bold; text-align:center; border-radius:10px; }
        .mode-b.on { border-color:#ce1b1b; color:#FFF; box-shadow: 0 0 10px rgba(206,27,27,0.3); }

        .nav { position:fixed; bottom:0; width:100%; height:75px; background:#000; border-top:1px solid #111; display:grid; grid-template-columns: repeat(4, 1fr); }
        .nav-n { display:flex; flex-direction:column; align-items:center; justify-content:center; color:#333; font-size:11px; font-weight:bold; }
        .nav-n.act { color:#ce1b1b; }
    </style>
</head>
<body>

    <div class="status-bar">● QUANTUM_SYSTEM_ACTIVE ● </div>

    <div class="core-section">
        <!-- 内陷余额板块 -->
        <div class="balance-well">
            <div style="font-size:10px; color:#2e4d3d; text-align:center; margin-bottom:10px; letter-spacing:1px;">AVAILABLE BALANCE (USDT)</div>
            <div class="bal-val" id="ui_bal">100.3</div>
            <div class="bet-info">UNIT_BET: <span id="ui_bet" style="color:#42ff78">0.5</span></div>
        </div>

        <!-- 内陷转盘容器 -->
        <div class="wheel-well">
            <div class="pointer-line"></div>
            <div class="wheel-center-val" id="center_val">X88</div>
            <div id="ui_wheel" class="wheel-outer">
                <div class="slot-content" style="transform:rotate(0deg)"><span class="beast-ico">🦢</span><span class="beast-txt">孤鸿</span></div>
                <div class="slot-content" style="transform:rotate(45deg)"><span class="beast-ico">🐺</span><span class="beast-txt">孤狼</span></div>
                <div class="slot-content" style="transform:rotate(90deg)"><span class="beast-ico">🐢</span><span class="beast-txt">玄武</span></div>
                <div class="slot-content" style="transform:rotate(135deg)"><span class="beast-ico">🦌</span><span class="beast-txt">麒麟</span></div>
                <div class="slot-content" style="transform:rotate(180deg)"><span class="beast-ico">🐲</span><span class="beast-txt" style="color:#42ff78">神龙</span></div>
                <div class="slot-content" style="transform:rotate(225deg)"><span class="beast-ico">🔥</span><span class="beast-txt">凤凰</span></div>
                <div class="slot-content" style="transform:rotate(270deg)"><span class="beast-ico">🦅</span><span class="beast-txt">大鹏</span></div>
                <div class="slot-content" style="transform:rotate(315deg)"><span class="beast-ico">🦢</span><span class="beast-txt">仙鹤</span></div>
            </div>
        </div>
    </div>

    <!-- 内陷操作台容器 -->
    <div class="console-well">
        <div class="main-row">
            <div class="adj" onclick="changeBet(-0.5)">－</div>
            <button id="go_btn" class="exec" onclick="go()">开始执行</button>
            <div class="adj" onclick="changeBet(0.5)">＋</div>
        </div>
        <div class="tech-row">
            <div id="auto_btn" class="mode-b" onclick="toggleAuto()">🤖 自动模式: 关</div>
            <div id="speed_btn" class="mode-b" onclick="cycleSpeed()">⚡ 变速模式: 1X</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-n">行情</div><div class="nav-n">资产中心</div><div class="nav-n">历史记录</div><div class="nav-n act">量化终端</div>
    </div>

    <script>
        let balance = 100.3, bet = 0.5, rot = 0, busy = false, isAuto = false, speedMode = 1;
        const beastNames = ["X0", "X0", "X120", "X500", "X50", "X88", "X50", "X20"];
        const multis = [0, 0, 120, 500, 50, 88, 50, 20];

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById('auto_btn').className = isAuto ? 'mode-b on' : 'mode-b';
            document.getElementById('auto_btn').innerHTML = `🤖 自动模式: ${isAuto ? '开' : '关'}`;
            if(isAuto && !busy) go();
        }

        function cycleSpeed() {
            speedMode = (speedMode % 3) + 1;
            const btn = document.getElementById('speed_btn');
            btn.innerHTML = `⚡ 变速模式: ${speedMode}X`;
            const times = ["", "5s", "1.2s", "0.5s"];
            document.getElementById('ui_wheel').style.transitionDuration = times[speedMode];
        }

        function changeBet(val) {
            if (busy) return;
            let n = bet + val;
            if (n >= 0.5) { bet = n; document.getElementById('ui_bet').innerText = bet.toFixed(1); }
        }

        function go() {
            if (busy || balance < bet) { isAuto = false; return; }
            busy = true;
            document.getElementById('go_btn').style.opacity = "0.7";
            const r = Math.floor(Math.random() * 1000);
            let idx = (r < 500) ? 0 : (r < 850 ? 1 : (r < 950 ? 7 : (r < 980 ? 6 : (r < 990 ? 2 : (r < 996 ? 5 : (r < 999 ? 4 : 3))))));
            const targetAngle = idx * 45; 
            rot += (Math.floor(Math.random() * 5) + 10) * 360 + (360 - targetAngle - (rot % 360)) + 360;
            document.getElementById('ui_wheel').style.transform = `rotate(${rot}deg)`;
            const waitTimes = [0, 5000, 1200, 500];
            setTimeout(() => {
                const prize = multis[idx] * bet;
                balance = (balance - bet) + prize;
                document.getElementById('ui_bal').innerText = balance.toFixed(1);
                document.getElementById('center_val').innerText = beastNames[idx];
                if(isAuto) setTimeout(go, 800);
                setTimeout(() => { busy = false; document.getElementById('go_btn').style.opacity = "1"; }, 500);
            }, waitTimes[speedMode]);
        }
    </script>
</body>
</html>
