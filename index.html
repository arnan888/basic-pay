<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>龙虎斗 · 至尊版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(1a80deg, #ff3300 2%, #ff3300 80%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            padding: 16px;
        }
        .container-outer {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            border-radius: 32px;
            padding: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .container {
            background: linear-gradient(135deg, #0000ff, #0000ff);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .battle-scene {
            position: relative;
            margin: 16px;
            border-radius: 24px;
            overflow: hidden;
            background: #0a0a0a;
            height: 42vh;
            min-height: 380px;
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(255,51,0,0.2), inset 0 0 50px rgba(0,0,0,0.5);
        }
        .scene-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2a2a2a, #111);
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        .premium-wheel-container {
            position: absolute;
            top: 50%;
            left: 52%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            cursor: pointer;
            z-index: 15;
        }
        .premium-wheel-container::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3300, #ffaa44, #ff3300);
            opacity: 0.4;
            filter: blur(20px);
            z-index: -1;
            animation: pulseGlow 2s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        .premium-wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255,51,0,0.5), inset 0 0 15px rgba(0,0,0,0.3);
            transition: box-shadow 0.3s;
        }
        .premium-wheel-pointer {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 40px solid #ffcc44;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
            z-index: 16;
        }
        .premium-wheel-pointer::after {
            content: '⚡';
            position: absolute;
            top: -38px;
            left: -10px;
            font-size: 20px;
            color: #ffaa44;
            text-shadow: 0 0 10px #ff3300;
        }
        .premium-wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #ffcc44, #ff8800);
            border-radius: 50%;
            z-index: 17;
            box-shadow: 0 0 20px rgba(255,204,68,0.8), inset 0 2px 4px rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            animation: centerPulse 1.5s ease-in-out infinite;
        }
        @keyframes centerPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.08); }
        }
        .premium-spin-btn {
            position: absolute;
            bottom: -45px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff3300, #cc2200);
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            z-index: 18;
            box-shadow: 0 8px 20px rgba(255,51,0,0.4);
            transition: all 0.2s;
        }
        .premium-spin-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        .premium-wheel-toast {
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffaa44;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            z-index: 19;
            opacity: 0;
            transition: 0.3s;
            border: 1px solid rgba(255,170,68,0.5);
        }
        .energy-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 2px solid rgba(255,51,0,0.3);
            pointer-events: none;
            z-index: 14;
            animation: rotateRing 10s linear infinite;
        }
        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .dragon-word, .tiger-word {
            position: absolute;
            bottom: 20px;
            font-size: 48px;
            font-weight: 900;
            text-shadow: 0 0 20px currentColor, 4px 4px 0 rgba(0,0,0,0.5);
            z-index: 10;
            transition: all 0.2s ease;
        }
        .dragon-word { left: 20px; color: #ff5555; text-shadow: 0 0 20px #ff0000; }
        .tiger-word { right: 20px; color: #55aaff; text-shadow: 0 0 20px #0088ff; }
        .highlight-win {
            transform: scale(1.2);
            text-shadow: 0 0 40px currentColor, 0 0 20px white;
        }
        .battle-result {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 6px 20px;
            border-radius: 30px;
            color: #ffaa44;
            font-weight: bold;
            font-size: 14px;
            z-index: 20;
            white-space: nowrap;
            border: 1px solid #ff3300;
        }
        .bet-section {
            background: rgba(0,90,50,0.3);
            margin: 16px;
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            max-height: calc(100vh - 280px);
            overflow-y: auto;
        }
        .account-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,90,50,0.5);
            border-radius: 12px;
            padding: 8px 16px;
            margin-bottom: 20px;
        }
        .account-info { font-size: 14px; color: #ffaa44; }
        .account-info span { color: #ffaa44; font-weight: bold; }
        .btn-group { display: flex; gap: 8px; }
        .btn-sm {
            background: #1e1e2e;
            border: none;
            border-radius: 8px;
            padding: 6px 16px;
            color: #ffaa44;
            font-size: 12px;
            cursor: pointer;
        }
        .multi-bet-item {
            background: rgba(0,90,50,0.5);
            border-radius: 16px;
            padding: 20px 16px;
            text-align: center;
            margin-bottom: 16px;
            transition: all 0.05s;
        }
        .multi-bet-item.selected { background: rgba(255,51,0,0.6); transform: scale(0.98); }
        .multi-bet-name { font-size: 26px; font-weight: bold; margin-bottom: 8px; }
        .multi-bet-name.dragon { color: #ff5555; }
        .multi-bet-name.tiger { color: #55aaff; }
        .multi-bet-name.tie { color: #aa66ff; }
        .bet-amount-wrapper {
            background: rgba(0,0,0,0.5);
            margin: 8px 0;
            padding: 10px;
            border-radius: 12px;
        }
        .multi-bet-amount { font-size: 32px; font-weight: 900; color: #ffaa44; }
        .multi-bet-control { display: flex; justify-content: center; gap: 12px; margin: 10px 0; }
        .multi-bet-control button { background: #1e1e2e; border: none; border-radius: 8px; padding: 6px 12px; color: #ffaa44; cursor: pointer; }
        .quick-bet-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .quick-bet { background: #1e1e2e; border: none; border-radius: 8px; padding: 4px 12px; color: #ffaa44; cursor: pointer; transition: all 0.05s; }
        .quick-bet:active { transform: scale(0.95); }
        .quick-bet:disabled, .clear-bet:disabled, #fightBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .data-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0; }
        .data-item { background: rgba(0,90,50,0.5); border-radius: 12px; padding: 12px; text-align: center; }
        .data-item label { font-size: 13px; color: #ffaa44; }
        .data-item value { font-size: 28px; font-weight: bold; color: #ffaa44; display: block; }
        .timer-text { text-align: center; font-size: 20px; color: #ffaa44; margin: 12px 0; font-weight: bold; }
        .timer-text span { display: inline-block; }
        .countdown-warning { animation: warningBlink 0.5s ease-in-out infinite; color: #ff3300 !important; }
        @keyframes warningBlink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
        .speed-select { display: flex; justify-content: center; gap: 16px; margin: 12px 0; }
        .speed-btn { background: #1e1e2e; border: none; border-radius: 20px; padding: 6px 24px; color: #aaa; font-weight: bold; cursor: pointer; transition: all 0.05s; }
        .speed-btn:active { transform: scale(0.95); }
        .speed-btn.active { background: #ff3300; color: #fff; }
        .history-area { background: rgba(0,90,50,0.5); border-radius: 12px; padding: 16px; margin: 16px 0; }
        .history-title { font-size: 13px; color: #ffaa44; text-align: center; margin-bottom: 12px; }
        .history-grid { display: grid; grid-template-columns: repeat(10, 32px); gap: 6px; justify-content: center; margin-bottom: 16px; }
        .history-cell { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: #1e1e2e; }
        .history-cell.dragon { background: #ff3300; }
        .history-cell.tiger { background: #005a32; }
        .history-cell.tie { background: #aa66ff; }
        .record-list { max-height: 120px; overflow-y: auto; font-size: 12px; }
        .record-item { display: flex; justify-content: space-between; padding: 6px 12px; border-bottom: 1px solid rgba(255,255,255,0.1); color: #ddd; }
        .record-win { color: #4caf50; }
        .record-lose { color: #f44336; }
        .exec-row { display: flex; gap: 12px; margin-top: 16px; }
        .exec-btn { flex: 1; padding: 12px; border-radius: 12px; font-weight: bold; text-align: center; cursor: pointer; background: #1e1e2e; color: #ffaa44; border: none; transition: all 0.05s; }
        .exec-btn:active { transform: scale(0.97); }
        .main-go { background: linear-gradient(135deg, #ff3300, #cc2200); color: white; }
        .bottom-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
        .stat-card { background: rgba(0,90,50,0.5); border-radius: 12px; padding: 12px; text-align: center; }
        .stat-card span:first-child { display: block; font-size: 12px; color: #ffaa44; }
        .stat-card span:last-child { font-size: 26px; font-weight: bold; color: #ffaa44; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1e1e2e; width: 85%; max-width: 360px; border-radius: 16px; padding: 24px; text-align: center; color: white; }
        .modal-content button { background: #ffaa44; border: none; border-radius: 8px; padding: 10px 24px; margin-top: 16px; cursor: pointer; }
        .btn-highlight { animation: btnFlash 0.2s ease-out; }
        @keyframes btnFlash { 0% { transform: scale(1); } 50% { transform: scale(0.92); opacity: 0.7; } 100% { transform: scale(1); } }
        .result-flash { animation: resultFlash 0.3s ease-out; }
        @keyframes resultFlash { 0% { opacity: 0.5; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
<div class="container-outer">
    <div class="container">
        <div class="battle-scene" id="battleScene">
            <div class="scene-bg" id="sceneBg"></div>
            <div class="premium-wheel-container" id="premiumWheelContainer">
                <canvas id="premiumWheelCanvas" class="premium-wheel-canvas" width="500" height="500"></canvas>
                <div class="premium-wheel-pointer"></div>
                <div class="premium-wheel-center">⚡</div>
                <button class="premium-spin-btn" id="premiumSpinBtn">🎰 灵龙转盘</button>
                <div class="premium-wheel-toast" id="premiumWheelToast">✨</div>
            </div>
            <div class="energy-ring"></div>
            <div class="energy-ring" style="width: 350px; height: 350px; animation-duration: 15s; opacity: 0.5;"></div>
            <div class="dragon-word" id="dragonWord">龍</div>
            <div class="tiger-word" id="tigerWord">虎</div>
            <div class="battle-result" id="battleResult">⚔️ 龙虎相争 ⚔️</div>
        </div>
        <div class="bet-section">
            <div class="account-bar">
                <div class="account-info">👤 账户：<span id="currentUserId">wang8888</span></div>
                <div class="btn-group">
                    <button id="myHistoryBtn" class="btn-sm">📜 我的记录</button>
                    <button id="newUserBtn" class="btn-sm">✨ 新用户</button>
                </div>
            </div>
            <div class="account-bar" style="margin-top: 8px;">
                <div style="display: flex; gap: 8px; width:100%;">
                    <input type="text" id="switchUserIdInput" placeholder="登录用户ID" style="flex:2; background:#1e1e2e; border:1px solid #ffaa44; border-radius:8px; padding:8px 16px; color:white;">
                    <button id="switchUserBtn" class="btn-sm">登录</button>
                </div>
            </div>
            <div class="multi-bet-item" data-type="DRAGON">
                <div class="multi-bet-name dragon">🐉 龙</div>
                <div class="bet-amount-wrapper"><div class="multi-bet-amount" id="betDragonAmount">0 rmb</div></div>
                <div class="multi-bet-control"><button class="clear-bet" data-type="DRAGON">🧹 清空</button></div>
                <div class="quick-bet-row">
                    <button class="quick-bet" data-type="DRAGON" data-amount="10">+10</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="20">+20</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="50">+50</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="100">+100</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="500">+500</button>
                    <button class="quick-bet" data-type="DRAGON" data-amount="1000">+1000</button>
                </div>
            </div>
            <div class="multi-bet-item" data-type="TIE">
                <div class="multi-bet-name tie">⚖️ 和</div>
                <div class="bet-amount-wrapper"><div class="multi-bet-amount" id="betTieAmount">0 rmb</div></div>
                <div class="multi-bet-control"><button class="clear-bet" data-type="TIE">🧹 清空</button></div>
                <div class="quick-bet-row">
                    <button class="quick-bet" data-type="TIE" data-amount="10">+10</button>
                    <button class="quick-bet" data-type="TIE" data-amount="20">+20</button>
                    <button class="quick-bet" data-type="TIE" data-amount="50">+50</button>
                    <button class="quick-bet" data-type="TIE" data-amount="100">+100</button>
                    <button class="quick-bet" data-type="TIE" data-amount="500">+500</button>
                    <button class="quick-bet" data-type="TIE" data-amount="1000">+1000</button>
                </div>
            </div>
            <div class="multi-bet-item" data-type="TIGER">
                <div class="multi-bet-name tiger">🐯 虎</div>
                <div class="bet-amount-wrapper"><div class="multi-bet-amount" id="betTigerAmount">0 rmb</div></div>
                <div class="multi-bet-control"><button class="clear-bet" data-type="TIGER">🧹 清空</button></div>
                <div class="quick-bet-row">
                    <button class="quick-bet" data-type="TIGER" data-amount="10">+10</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="20">+20</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="50">+50</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="100">+100</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="500">+500</button>
                    <button class="quick-bet" data-type="TIGER" data-amount="1000">+1000</button>
                </div>
            </div>
            <div class="data-stack">
                <div class="data-item"><label>📊 总押注</label><value id="totalBetAmount">0.00</value></div>
                <div class="data-item"><label>🏆 预计奖金</label><value id="valWin">0.00</value></div>
            </div>
            <div class="timer-text">⏱️ 下一局: <span id="countdownNum">30</span> 秒</div>
            <div class="speed-select">
                <span class="speed-btn active" data-speed="1">1X</span>
                <span class="speed-btn" data-speed="2">2X</span>
                <span class="speed-btn" data-speed="3">3X</span>
            </div>
            <div class="history-area">
                <div class="history-title">📈 最近10局开奖</div>
                <div class="history-grid" id="historyGrid"></div>
                <div class="history-title">📋 开奖记录</div>
                <div class="record-list" id="recordList"></div>
            </div>
            <div class="exec-row">
                <button class="exec-btn" id="refreshBtn">🔄 刷新</button>
                <button class="exec-btn" id="repeatBtn">🔁 续押</button>
                <button class="exec-btn" id="cancelBtn">❌ 全部取消</button>
                <button class="exec-btn main-go" id="fightBtn">🎲 确认投注</button>
            </div>
            <div class="bottom-stats">
                <div class="stat-card"><span>💰 余额</span><span id="balanceDisplay">0.00</span></div>
                <div class="stat-card"><span>🎰 彩金池</span><span id="poolDisplay">50000.00</span></div>
            </div>
        </div>
    </div>
</div>

<script>
(function(){
    // 语音
    let speechEnabled = false;
    function enableSpeech() { if (!speechEnabled) speechEnabled = true; }
    document.body.addEventListener('click', enableSpeech, { once: true });
    function speak(text) {
        if (speechEnabled && window.speechSynthesis) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 1.2;
            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }
    }

    // 用户数据 - 初始余额0.00
    let users = JSON.parse(localStorage.getItem('dragon_tiger_users')) || {};
    let CURRENT_USER_ID = "wang8888";
    if (!users[CURRENT_USER_ID]) {
        users[CURRENT_USER_ID] = { balance: 0.00, records: [], resultHistory: [] };
        localStorage.setItem('dragon_tiger_users', JSON.stringify(users));
    }
    let ADMIN_PASSWORD = localStorage.getItem('dragon_tiger_password') || "wang000000";
    
    function saveUsers() { localStorage.setItem('dragon_tiger_users', JSON.stringify(users)); }
    function getBalance(uid) { if (!users[uid]) users[uid] = { balance: 0.00, records: [], resultHistory: [] }; return users[uid].balance; }
    function setBalance(uid, amt) { if (!users[uid]) users[uid] = { balance: 0.00, records: [], resultHistory: [] }; users[uid].balance = amt; saveUsers(); }
    function addBalance(uid, delta) { setBalance(uid, getBalance(uid) + delta); }
    function getUserList() { return Object.keys(users); }
    function generateRandomId() { return "user_" + Math.floor(Math.random() * 1000000); }

    function showModal(msg, btnText) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>📢 提示</h3><p>${msg}</p><button id="modalCloseBtn">${btnText}</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('modalCloseBtn').onclick = () => modal.remove();
    }

    function showMyHistory() {
        const recs = users[CURRENT_USER_ID]?.records || [];
        let html = `<div style="max-height:300px; overflow-y:auto; text-align:left;">`;
        if (recs.length === 0) html += "<p>暂无记录</p>";
        else {
            recs.slice(0, 30).forEach(r => {
                const isWin = r.win > 0;
                html += `<div style="padding:6px; border-bottom:1px solid #555; display:flex; justify-content:space-between;">
                            <span>${r.time}</span>
                            <span>押 ${r.bet} → ${r.result}</span>
                            <span style="color:${isWin?'#4caf50':'#f44336'}">${isWin ? `+${r.win}` : `-${r.amount}`}</span>
                         </div>`;
            });
        }
        html += `</div><button id="closeHistoryBtn" style="margin-top:12px;">关闭</button>`;
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>📜 我的历史记录</h3>${html}</div>`;
        document.body.appendChild(modal);
        document.getElementById('closeHistoryBtn').onclick = () => modal.remove();
    }
    document.getElementById('myHistoryBtn').onclick = showMyHistory;
    document.getElementById('newUserBtn').onclick = () => {
        const newId = generateRandomId();
        document.getElementById('switchUserIdInput').value = newId;
        switchUser();
        showModal(`✅ 新账户：${newId}\n初始余额：0.00 rmb`, "开始游戏");
    };

    function getResultHistory(uid) { return users[uid]?.resultHistory || []; }
    function pushResult(uid, res) {
        if (!users[uid]) users[uid] = { balance: 0.00, records: [], resultHistory: [] };
        let arr = users[uid].resultHistory || [];
        arr.unshift(res);
        if (arr.length > 10) arr.pop();
        users[uid].resultHistory = arr;
        saveUsers();
        if (uid === CURRENT_USER_ID) updateHistoryGrid();
    }
    
    function updateHistoryGrid() {
        const grid = document.getElementById('historyGrid');
        if (!grid) return;
        const hist = getResultHistory(CURRENT_USER_ID);
        grid.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            const cell = document.createElement('div');
            cell.className = 'history-cell';
            if (i < hist.length) {
                const r = hist[i];
                cell.classList.add(r === '龙' ? 'dragon' : (r === '虎' ? 'tiger' : 'tie'));
                cell.textContent = r === '龙' ? '🐉' : (r === '虎' ? '🐯' : '⚖️');
            } else {
                cell.textContent = '?';
            }
            grid.appendChild(cell);
        }
    }

    function addRecord(uid, betType, result, win, betAmt) {
        if (!users[uid]) users[uid] = { balance: 0.00, records: [], resultHistory: [] };
        let recs = users[uid].records || [];
        recs.unshift({ time: new Date().toLocaleTimeString(), bet: betType, result: result, win: win, amount: betAmt });
        if (recs.length > 50) recs.pop();
        users[uid].records = recs;
        saveUsers();
        if (uid === CURRENT_USER_ID) refreshRecordDisplay();
    }
    
    function refreshRecordDisplay() {
        const container = document.getElementById('recordList');
        if (!container) return;
        const recs = users[CURRENT_USER_ID]?.records || [];
        container.innerHTML = '';
        if (recs.length === 0) { container.innerHTML = '<div style="text-align:center; color:#aaa;">暂无记录</div>'; return; }
        recs.slice(0, 10).forEach(r => {
            const div = document.createElement('div');
            div.className = 'record-item';
            const isWin = r.win > 0;
            div.innerHTML = `<span>${r.time}</span><span>押 ${r.bet} → ${r.result}</span><span class="${isWin ? 'record-win' : 'record-lose'}">${isWin ? `+${r.win}` : `-${r.amount}`}</span>`;
            container.appendChild(div);
        });
    }

    // 游戏状态
    let state = {
        balance: getBalance(CURRENT_USER_ID),
        bets: { DRAGON: 0, TIGER: 0, TIE: 0 },
        betRolling: false,
        autoMode: true,
        speed: 1,
        pool: 50000,
        countdown: 30,
        countdownInterval: null
    };
    let lastBet = null;
    let isBetLocked = false;
    let isAnimating = false;

    function syncBalance() { state.balance = getBalance(CURRENT_USER_ID); updateUI(); }

    function enableBetButtons(enabled) {
        const betBtns = document.querySelectorAll('.quick-bet, .clear-bet, #fightBtn');
        betBtns.forEach(btn => {
            if(enabled) { btn.disabled = false; btn.style.opacity = '1'; }

        });

    // 转盘同步函数
    let syncWheelToResultFunc = null;

    // 核心开奖（无卡片动画，只有转盘和闪烁）
    function placeBet(type, amount) {
        if (state.betRolling || isAnimating || amount<=0 || amount>state.balance) return false;
        state.betRolling = true;
        
        const outcomes = ['龙', '虎', '和'];
        const result = outcomes[Math.floor(Math.random() * 3)];
        let win = 0;
        if (type === result) win = amount * (result === '和' ? 8 : 2);
        
        // 同步转盘
        if (syncWheelToResultFunc) {
            syncWheelToResultFunc(result);
        }
        
        const newBalance = state.balance - amount + win;
        setBalance(CURRENT_USER_ID, newBalance);
        state.balance = newBalance;
        updateUI();
        addRecord(CURRENT_USER_ID, type, result, win, amount);
        pushResult(CURRENT_USER_ID, result);
        
        // 龙虎高亮效果
        highlightWord(result);
        flashResult();
        
        // 只显示简短结果文字
        const resultMsg = win > 0 ? `🎲 ${result} +${win}` : `🎲 ${result}`;
        document.getElementById('battleResult').innerHTML = resultMsg;
        
        // 语音
        speak(result);
        
        // 震动
        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(100);
        
        setTimeout(() => {
            if (state.autoMode) {
                clearCountdown();
                startCountdown(30);
            }
            state.betRolling = false;
        }, 500);
        
        return true;
    }

    function executeBet() {
        if (state.betRolling || isAnimating) return;
        flashButton(document.getElementById('fightBtn'));
        
        let selectedType = null, selectedAmount = 0;
        if (state.bets.DRAGON > selectedAmount) { selectedType = "DRAGON"; selectedAmount = state.bets.DRAGON; }
        if (state.bets.TIGER > selectedAmount) { selectedType = "TIGER"; selectedAmount = state.bets.TIGER; }
        if (state.bets.TIE > selectedAmount) { selectedType = "TIE"; selectedAmount = state.bets.TIE; }
        if (!selectedType) return;
        
        const betType = { DRAGON:"龙", TIGER:"虎", TIE:"和" }[selectedType];
        lastBet = { type: betType, amount: selectedAmount };
        clearCountdown();
        placeBet(betType, selectedAmount);
        state.bets = { DRAGON: 0, TIGER: 0, TIE: 0 };
        updateUI();
    }

    function repeatLastBet() { 
        if(lastBet && !state.betRolling && !isAnimating && !isBetLocked) {
            flashButton(document.getElementById('repeatBtn'));
            placeBet(lastBet.type, lastBet.amount);
        } else if(isBetLocked) {
            flashButton(document.getElementById('repeatBtn'));
        }
    }
    
    function cancelAllBets() { 
        if(!state.betRolling && !isAnimating && !isBetLocked){ 
            flashButton(document.getElementById('cancelBtn'));
            state.bets = { DRAGON:0, TIGER:0, TIE:0 }; 
            updateUI(); 
        }
    }

    function updateUI() {
        document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
        document.getElementById('poolDisplay').innerText = state.pool.toFixed(2);
        document.getElementById('betDragonAmount').innerHTML = state.bets.DRAGON + " rmb";
        document.getElementById('betTigerAmount').innerHTML = state.bets.TIGER + " rmb";

        const total = state.bets.DRAGON + state.bets.TIGER + state.bets.TIE;
        document.getElementById('totalBetAmount').innerText = total.toFixed(2);
        let maxWin = 0;
        if (state.bets.DRAGON > 0) maxWin = Math.max(maxWin, state.bets.DRAGON * 2);
        if (state.bets.TIGER > 0) maxWin = Math.max(maxWin, state.bets.TIGER * 2);
        if (state.bets.TIE > 0) maxWin = Math.max(maxWin, state.bets.TIE * 8);

    function addBetAmount(type, amount) {
        if(state.betRolling || isAnimating || isBetLocked) return;
        flashButton(document.querySelector(`.quick-bet[data-type="${type}"][data-amount="${amount}"]`));
        let newVal = state.bets[type] + amount;
        if (newVal > state.balance) {
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(200);
            showModal("❌ 余额不足！当前余额：" + state.balance.toFixed(2) + " rmb", "知道了");
            return;
        }
        if(newVal < 0) newVal = 0;
        state.bets[type] = newVal;
        updateUI();
    }

    function clearBet(type) {
        if(state.betRolling || isAnimating || isBetLocked) return;
        flashButton(document.querySelector(`.clear-bet[data-type="${type}"]`));

        updateUI();
        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50);
    }

    function startPoolFluctuation() { 
        setInterval(() => { 
            let change = Math.floor(Math.random()*61)-30; 
            let newPool = state.pool+change; 
            if(newPool<10000) newPool=10000; 
            if(newPool>100000) newPool=100000; 
            state.pool=newPool; 
            document.getElementById('poolDisplay').innerText=state.pool.toFixed(2); 
        }, 1000); 
    }

    function startCountdown(sec) {
        if(state.countdownInterval) clearInterval(state.countdownInterval);
        state.countdown = sec;
        const countdownSpan = document.getElementById('countdownNum');
        countdownSpan.innerText = state.countdown;
        countdownSpan.classList.remove('countdown-warning');
        
        isBetLocked = false;
        enableBetButtons(true);
        
        state.countdownInterval = setInterval(() => {
            if(state.countdown <= 1){
                clearInterval(state.countdownInterval);
                state.countdownInterval = null;
                isBetLocked = true;
                enableBetButtons(false);
                if(state.bets.DRAGON+state.bets.TIGER+state.bets.TIE > 0) executeBet();
                else startCountdown(30);
            } else {
                state.countdown--;
                countdownSpan.innerText = state.countdown;
                
                if(state.countdown <= 3 && !isBetLocked) {
                    isBetLocked = true;
                    enableBetButtons(false);
                    countdownSpan.classList.add('countdown-warning');
                    // 最后3秒震动提醒
                    if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(200);
                }
            }
        }, 1000);
    }

    // 转盘
    const SEGMENTS = [
        { name: '🐉 龙', color1: '#ff4444', color2: '#cc0000', chn: '龙' },
        { name: '🐯 虎', color1: '#4488ff', color2: '#0066cc', chn: '虎' },
        { name: '⚖️ 和', color1: '#aa66ff', color2: '#8844cc', chn: '和' }
    ];
    
    const wheelCanvas = document.getElementById('premiumWheelCanvas');
    if (wheelCanvas) {
        const size = 500;
        wheelCanvas.width = size;
        wheelCanvas.height = size;
        wheelCanvas.style.width = '100%';
        wheelCanvas.style.height = '100%';
        
        const ctx = wheelCanvas.getContext('2d');
        const centerX = size / 2;
        const centerY = size / 2;
        const radius = size / 2 - 10;
        const TAU = Math.PI * 2;
        let currentRotation = 0;
        let isWheelSpinning = false;
        
        function drawSegment(startAngle, endAngle, color1, color2, label) {
            const gradient = ctx.createLinearGradient(
                centerX + Math.cos(startAngle) * radius * 0.3,
                centerY + Math.sin(startAngle) * radius * 0.3,
                centerX + Math.cos(endAngle) * radius * 0.8,
                centerY + Math.sin(endAngle) * radius * 0.8
            );
            gradient.addColorStop(0, color1);
            gradient.addColorStop(1, color2);
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            const midAngle = startAngle + (endAngle - startAngle) / 2;
            const textRadius = radius * 0.65;
            const x = centerX + Math.cos(midAngle) * textRadius;
            const y = centerY + Math.sin(midAngle) * textRadius;
            
            ctx.font = `bold ${Math.floor(radius * 0.16)}px "PingFang SC"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.fillText(label, x, y);
        }
        
        function drawWheel(rotation = 0) {
            ctx.clearRect(0, 0, size, size);
            const anglePer = TAU / SEGMENTS.length;
            for (let i = 0; i < SEGMENTS.length; i++) {
                const seg = SEGMENTS[i];
                const start = i * anglePer + rotation;
                const end = (i + 1) * anglePer + rotation;
                drawSegment(start, end, seg.color1, seg.color2, seg.name);
            }
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.18, 0, TAU);
            ctx.fillStyle = '#1a1a2e';
            ctx.fill();
            ctx.strokeStyle = '#ffaa44';
            ctx.lineWidth = 3;
            ctx.stroke();
        }
        
        function syncWheelToResult(resultChn) {
            if (isWheelSpinning) return;
            isWheelSpinning = true;
            
            const spinBtn = document.getElementById('premiumSpinBtn');
            if (spinBtn) spinBtn.disabled = true;
            
            let targetIndex = resultChn === '龙' ? 0 : (resultChn === '虎' ? 1 : 2);
            const anglePer = TAU / SEGMENTS.length;
            const pointerAngle = -Math.PI / 2;
            
            let currentHitAngle = (pointerAngle - currentRotation + TAU * 4) % TAU;
            let currentIndex = Math.floor(currentHitAngle / anglePer) % SEGMENTS.length;
            
            let deltaIndex = (targetIndex - currentIndex + SEGMENTS.length) % SEGMENTS.length;
            let targetRotation = currentRotation + deltaIndex * anglePer;
            
            if (Math.abs(targetRotation - currentRotation) > Math.PI) {
                targetRotation = currentRotation - (SEGMENTS.length - deltaIndex) * anglePer;
            }
            
            const spins = 5 + Math.random() * 5;
            const finalRot = currentRotation + (spins * TAU) + (targetRotation - currentRotation) % TAU;
            const startRot = currentRotation;
            const duration = 1500;
            const startTime = performance.now();
            
            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(1, elapsed / duration);
                const ease = 1 - Math.pow(1 - progress, 3);
                currentRotation = startRot + (finalRot - startRot) * ease;
                drawWheel(currentRotation);
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentRotation = finalRot % TAU;
                    drawWheel(currentRotation);
                    isWheelSpinning = false;
                    if (spinBtn) spinBtn.disabled = false;
                }
            }
            requestAnimationFrame(animate);
        }
        
        function spinWheelRandom() {
            if (isWheelSpinning) return;
            isWheelSpinning = true;
            
            const spinBtn = document.getElementById('premiumSpinBtn');
            if (spinBtn) spinBtn.disabled = true;
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(100);
            
            const spins = 8 + Math.random() * 12;
            const randomAngle = Math.random() * TAU;
            const finalRot = currentRotation + (spins * TAU) + randomAngle;
            const startRot = currentRotation;
            const duration = 1500;
            const startTime = performance.now();
            
            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(1, elapsed / duration);
                const ease = 1 - Math.pow(1 - progress, 3);
                currentRotation = startRot + (finalRot - startRot) * ease;
                drawWheel(currentRotation);
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentRotation = finalRot % TAU;
                    drawWheel(currentRotation);
                    
                    const pointerAngle = -Math.PI / 2;
                    const anglePer = TAU / SEGMENTS.length;
                    let hitAngle = (pointerAngle - currentRotation + TAU * 4) % TAU;
                    let idx = Math.floor(hitAngle / anglePer) % SEGMENTS.length;
                    const result = SEGMENTS[idx].chn;
                    
                    const toast = document.getElementById('premiumWheelToast');
                    if (toast) {
                        toast.textContent = `✨ ${result} ✨`;
                        toast.style.opacity = '1';
                        setTimeout(() => toast.style.opacity = '0', 1500);
                    }
                    
                    document.getElementById('battleResult').innerHTML = `🎡 ${result}`;
                    highlightWord(result);
                    flashResult();
                    
                    if (window.speechSynthesis) {
                        const utter = new SpeechSynthesisUtterance(result);
                        utter.lang = 'zh-CN';
                        speechSynthesis.cancel();
                        speechSynthesis.speak(utter);
                    }
                    
                    if (window.navigator && window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
                    isWheelSpinning = false;
                    if (spinBtn) spinBtn.disabled = false;
                }
            }
            requestAnimationFrame(animate);
        }
        
        drawWheel(0);
        syncWheelToResultFunc = syncWheelToResult;
        
        document.getElementById('premiumSpinBtn').onclick = (e) => { 
            e.stopPropagation(); 
            spinWheelRandom(); 
        };
        document.getElementById('premiumWheelContainer').onclick = (e) => {
            if (e.target === document.getElementById('premiumSpinBtn')) return;
            if (!isWheelSpinning) spinWheelRandom();
        };
    }

    function init() {
        bindEvents();
        syncBalance();
        startPoolFluctuation();
        setSpeed(1);
        updateUI();
        startCountdown(30);
        refreshRecordDisplay();
        updateHistoryGrid();
        if (!localStorage.getItem('visited_before')) {
            localStorage.setItem('visited_before', 'true');
            setTimeout(() => {
                showModal("🎉 欢迎来到龙虎斗至尊版！\n• 初始余额：0.00 rmb\n• 每局30秒倒计时\n• 最后3秒禁止下注\n• 下注后转盘同步开奖\n• 长按「续押」3秒进入管理后台", "开始游戏");
            }, 500);
        }
    }
    
    init();
})();
</script>
