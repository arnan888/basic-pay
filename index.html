<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>五兽至尊_V135_PERFECT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --pink: #ff0055; --bg: #05080a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Arial Black', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }

        /* 余额区：增加呼吸灯边框 */
        .header { width: 100%; height: 20%; display: flex; align-items: center; justify-content: center; }
        .bal-card { width: 85%; border-bottom: 2px solid var(--neon); padding: 10px; text-align: center; box-shadow: 0 10px 20px -10px var(--neon); }
        .bal-val { font-size: 44px; font-weight: 900; text-shadow: 0 0 20px var(--neon); }

        /* 转盘区：优化比例 */
        .main-game { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .wheel-box { position: relative; width: 92vw; max-width: 380px; aspect-ratio: 1/1; }
        
        /* 指针：位置修正 */
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 50px solid var(--neon); z-index: 100; filter: drop-shadow(0 0 15px var(--neon)); }
        
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 12px solid #1a1a1a; background: #000; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); position: relative; overflow: hidden; }
        
        /* 扇区：增加金属渐变感 */
        .sector { position: absolute; width: 100%; height: 100%; clip-path: polygon(50% 50%, 100% 17%, 100% 83%); transform-origin: center; display: flex; align-items: center; justify-content: flex-end; padding-right: 8%; }
        
        /* 图案：位置外移，防止被中心按钮遮挡 */
        .item { transform: rotate(90deg) translateY(-20px); display: flex; flex-direction: column; align-items: center; }
        .item b { font-size: 72px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); }

        /* 中心按钮：缩小尺寸，露出更多图案 */
        .spin-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: #000; border: 4px solid var(--pink); border-radius: 50%; z-index: 110; color: var(--pink); font-size: 20px; font-weight: 900; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px var(--pink); text-shadow: 0 0 5px var(--pink); }

        .footer { width: 100%; height: 20%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; background: linear-gradient(0deg, rgba(0,242,255,0.05) 0%, transparent 100%); }
        .bet-box { display: flex; align-items: center; gap: 35px; }
        .btn-adj { width: 50px; height: 50px; border-radius: 12px; border: 2px solid #444; background: #111; color: #fff; font-size: 28px; }
        #msg { color: var(--gold); font-weight: 900; font-size: 22px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-card"><div class="bal-val">🪙 <span id="bal">1,000</span></div></div>
    </div>

    <div class="main-game">
        <div class="wheel-box">
            <div class="pointer"></div>
            <div id="wheel" class="wheel">
                <div class="sector" style="transform:rotate(-90deg); background:radial-gradient(circle at right, rgba(255,215,0,0.3), transparent 70%)"><div class="item"><b>👑</b></div></div>
                <div class="sector" style="transform:rotate(-30deg); background:radial-gradient(circle at right, rgba(255,0,0,0.2), transparent 70%)"><div class="item"><b>🦁</b></div></div>
                <div class="sector" style="transform:rotate(30deg); background:radial-gradient(circle at right, rgba(255,165,0,0.2), transparent 70%)"><div class="item"><b>🐯</b></div></div>
                <div class="sector" style="transform:rotate(90deg); background:radial-gradient(circle at right, rgba(0,255,0,0.2), transparent 70%)"><div class="item"><b>🦅</b></div></div>
                <div class="sector" style="transform:rotate(150deg); background:radial-gradient(circle at right, rgba(147,112,219,0.2), transparent 70%)"><div class="item"><b>🐺</b></div></div>
                <div class="sector" style="transform:rotate(210deg); background:radial-gradient(circle at right, rgba(240,230,140,0.2), transparent 70%)"><div class="item"><b>🐕</b></div></div>
            </div>
            <div class="spin-btn" onclick="spin()">SPIN</div>
        </div>
    </div>

    <div class="footer">
        <div class="bet-box">
            <button class="btn-adj" onclick="setB(-10)">-</button>
            <div style="font-size:32px; font-weight:900; color:var(--gold);"><span id="bet">1</span></div>
            <button class="btn-adj" onclick="setB(10)">+</button>
        </div>
        <div id="msg">READY TO WIN</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let b = parseFloat(localStorage.getItem('g_v135') || '1000');
        let bet = 1, r = 0, isS = false, audioCtx;

        function initAudio() {
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // 启动一个低频背景音乐
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(55, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start();
            }
        }

        function sfx(f, d, t='sine', v=0.1) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function sync() {
            document.getElementById('bal').innerText = Math.floor(b).toLocaleString();
            document.getElementById('bet').innerText = bet;
            localStorage.setItem('g_v135', b);
        }

        window.setB = (v) => { 
            initAudio();
            if(!isS) { 
                bet = Math.max(1, Math.min(b, bet+v)); sync(); 
                tg.HapticFeedback.selectionChanged();
                sfx(600, 0.1, 'square', 0.03);
            } 
        };

        function spin() {
            initAudio();
            if(isS || b < bet) return;
            isS = true; b -= bet; sync();
            tg.HapticFeedback.impactOccurred('heavy');
            
            let tick = setInterval(() => { if(isS) sfx(150, 0.05, 'triangle', 0.05); }, 150);
            
            let idx = Math.floor(Math.random()*6);
            r += (3600 + idx*60);
            document.getElementById('wheel').style.transform = `rotate(-${r}deg)`;
            document.getElementById('msg').innerText = "SPINNING...";

            setTimeout(() => {
                clearInterval(tick);
                const multi = [88, 15, 10, 5, 2, 0];
                let win = Math.floor(bet * multi[idx]);
                b += win; sync();
                
                if(win > 0) {
                    document.getElementById('msg').innerText = "WIN: " + win + "!";
                    sfx(523, 0.4); setTimeout(()=>sfx(659, 0.4), 100);
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    document.getElementById('msg').innerText = "LOSE";
                    sfx(100, 0.4, 'sawtooth', 0.05);
                }
                isS = false;
            }, 5000);
        }
        sync();
    </script>
</body>
</html>
