<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZH_CELEBRATION_FIXED</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #FFD700; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        .header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px; background: #111; font-size: 11px; border-bottom: 1px solid #FFD700; z-index: 999; }
        .bal { font-size: 50px; font-weight: bold; margin-bottom: 25px; text-shadow: 0 0 15px #FFD700; }

        /* 核心转盘容器 */
        .stage-box { width: 380px; height: 380px; position: relative; border: 12px solid #FFD700; border-radius: 50%; background: #200; box-shadow: 0 0 50px rgba(255,215,0,0.3); }
        .ptr { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 40px solid #f40; z-index: 100; }
        
        /* 旋转主体 */
        .w-body { width: 100%; height: 100%; position: relative; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); border-radius: 50%; }

        /* 每一项的独立包装：确保文字跟图标绝对同步 */
        .slot {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        .slot-content {
            margin-top: 25px; /* 距离顶部的距离 */
            display: flex; flex-direction: column; align-items: center;
            width: 100px;
        }
        .slot-content img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid #FFD700; background: #000; margin-bottom: 5px; }
        .slot-content span { font-size: 12px; font-weight: bold; white-space: nowrap; background: rgba(0,0,0,0.6); padding: 2px 5px; border-radius: 4px; }

        /* 中心按钮 */
        .start-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90px; height: 90px; border-radius: 50%; background: #008000; border: 4px solid #fff; color: #fff; font-size: 18px; font-weight: bold; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 8px 0 #004d00; }
        
        /* 赔率表钉在右下角 */
        .odds-btn { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: #FFD700; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; border: 2px solid #fff; z-index: 300; }
    </style>
</head>
<body>
    <div class="header">
        <span>RTP: <b id="r_rtp">0%</b></span>
        <span>投: <b id="r_in">0</b></span>
        <span>付: <b id="r_out">0</b></span>
    </div>

    <div class="bal" id="v_bal">89,037.00</div>

    <div class="stage-box">
        <div class="ptr"></div>
        <div class="w-body" id="wheel">
            <!-- 采用 transform: rotate 直接锁死每一组的位置 -->
            <div class="slot" style="transform: rotate(0deg);"><div class="slot-content"><img src="https://img.icons8.com/color/96/tiger.png"><span>情侣路·长久</span></div></div>
            <div class="slot" style="transform: rotate(45deg);"><div class="slot-content"><img src="https://img.icons8.com/color/96/lion.png"><span>渔女灯·点亮</span></div></div>
            <div class="slot" style="transform: rotate(90deg);"><div class="slot-content"><img src="https://img.icons8.com/color/96/wolf.png"><span>日月贝·双喜</span></div></div>
            <div class="slot" style="transform: rotate(135deg);"><div class="slot-content"><img src="https://img.icons8.com/emoji/96/sparkles.png"><span>幸福城·乐中</span></div></div>
            <div class="slot" style="transform: rotate(180deg);"><div class="slot-content"><img src="https://img.icons8.com/color/96/dog.png"><span>航展云·必得</span></div></div>
            <div class="slot" style="transform: rotate(225deg);"><div class="slot-content"><img src="https://img.icons8.com/emoji/96/ocean.png"><span>浪漫海·无边</span></div></div>
            <div class="slot" style="transform: rotate(270deg);"><div class="slot-content"><img src="https://img.icons8.com/color/96/dolphin.png"><span>横琴风·生财</span></div></div>
            <div class="slot" style="transform: rotate(315deg);"><div class="slot-content"><img src="https://img.icons8.com/emoji/96/coffee.png"><span>慢生活·得意</span></div></div>
        </div>
        <div class="start-btn" onclick="start()">START<br><small>珠海</small></div>
    </div>

    <div class="odds-btn" onclick="alert('后台赔率：老虎X88, 狮子X50, 海豚X100')">赔率表</div>

    <script>
        let b=89037, ti=0, to=0, r=0, busy=false;
        const prizes = [{d:0,v:88},{d:45,v:50},{d:90,v:10},{d:135,v:0},{d:180,v:5},{d:225,v:0},{d:270,v:100},{d:315,v:0}];
        function start() {
            if(busy) return; busy=true; ti++; b--;
            let win = prizes[Math.floor(Math.random()*prizes.length)];
            let target = (360 - win.d) % 360;
            r += (3600 + target - (r % 360));
            document.getElementById('wheel').style.transform = `rotate(${r}deg)`;
            setTimeout(() => {
                to += win.v; b += win.v;
                document.getElementById('v_bal').innerText = b.toFixed(2);
                document.getElementById('r_in').innerText = ti;
                document.getElementById('r_out').innerText = to;
                document.getElementById('r_rtp').innerText = (to/ti*100).toFixed(1) + "%";
                busy = false;
            }, 4100);
        }
    </script>
</body>
</html>
