<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PB_FIX_FINAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #FFD700; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        /* 1. 监控面板 */
        .pb-info { width: 100%; padding: 10px; background: #111; border-bottom: 1px solid #FFD700; display: flex; justify-content: space-around; font-size: 10px; position: fixed; top: 0; }
        .bal-v { font-size: 48px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px #FFD700; }

        /* 2. 转盘容器 - 放弃 clip-path, 改用传统的 transform-origin */
        .wheel-box { width: 340px; height: 340px; position: relative; border: 10px solid #FFD700; border-radius: 50%; background: #200; box-shadow: 0 0 30px rgba(255,215,0,0.3); }
        .main-wheel { width: 100%; height: 100%; position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0, 1); border-radius: 50%; overflow: hidden; }
        
        /* 3. 奖项格 - 强制定位 */
        .slot {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0;
        }
        .slot-inner {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 80px;
        }
        .slot-inner img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #FFD700; background: #000; }
        .slot-inner b { display: block; font-size: 14px; margin-top: 5px; }

        /* 4. 控制组件 */
        .ptr { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 35px solid #f40; z-index: 100; }
        .btn-spin { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border-radius: 50%; background: #008000; border: 4px solid #fff; color: #fff; font-weight: bold; font-size: 18px; z-index: 200; box-shadow: 0 5px 0 #004d00; display: flex; align-items: center; justify-content: center; }
        
        .footer-ctrl { margin-top: 30px; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #FFD700; width: 90%; font-size: 14px; }
        .shake { animation: sk 0.1s infinite; } @keyframes sk { 0%,100%{transform:translate(0,0)} 50%{transform:translate(3px,3px)} }
    </style>
</head>
<body>
    <div class="pb-info">
        <span>RTP: <b id="r_rtp">0%</b></span>
        <span>投: <b id="r_in">0</b></span>
        <span>赔: <b id="r_out">0</b></span>
    </div>

    <div class="bal-v" id="bal_v">89,037.00</div>

    <div class="wheel-box" id="stage">
        <div class="ptr"></div>
        <div class="main-wheel" id="w">
            <!-- 手动分摊 8 个奖项角度 -->
            <div class="slot" style="transform: rotate(0deg);"><div class="slot-inner"><img src="https://img.icons8.com/color/96/tiger.png"><b>老虎 X10</b></div></div>
            <div class="slot" style="transform: rotate(45deg);"><div class="slot-inner"><img src="https://img.icons8.com/color/96/lion.png"><b>狮子 X5</b></div></div>
            <div class="slot" style="transform: rotate(90deg);"><div class="slot-inner"><img src="https://img.icons8.com/color/96/wolf.png"><b>狼 X2</b></div></div>
            <div class="slot" style="transform: rotate(135deg);"><div class="slot-inner"><img src="https://img.icons8.com/emoji/96/cross-mark-emoji.png"><b>空</b></div></div>
            <div class="slot" style="transform: rotate(180deg);"><div class="slot-inner"><img src="https://img.icons8.com/color/96/dog.png"><b>狗 X20</b></div></div>
            <div class="slot" style="transform: rotate(225deg);"><div class="slot-inner"><img src="https://img.icons8.com/emoji/96/cross-mark-emoji.png"><b>空</b></div></div>
            <div class="slot" style="transform: rotate(270deg);"><div class="slot-inner"><img src="https://img.icons8.com/color/96/dolphin.png"><b>海豚 X50</b></div></div>
            <div class="slot" style="transform: rotate(315deg);"><div class="slot-inner"><img src="https://img.icons8.com/color/96/koala.png"><b>空</b></div></div>
        </div>
        <div class="btn-spin" onclick="goPB()">SPIN</div>
    </div>

    <div class="footer-ctrl">
        RTP设定: <input type="number" id="target" value="95" style="width:45px;"> % 
        强制杀分: <input type="checkbox" id="kill">
    </div>

    <script>
        let b = 89037.00; let ti = 0; let to = 0; let curR = 0; let busy = false;
        const prizes = [{d:0,v:10},{d:45,v:5},{d:90,v:2},{d:135,v:0},{d:180,v:20},{d:225,v:0},{d:270,v:50},{d:315,v:0}];

        function goPB() {
            if(busy || b < 0.5) return; busy = true; ti += 0.5; b -= 0.5;
            let trtp = parseFloat(document.getElementById('target').value)/100;
            let km = document.getElementById('kill').checked;
            let crtp = ti > 0 ? to / ti : 0;
            
            let pool = prizes.filter(p => km ? p.v === 0 : (crtp > trtp ? p.v <= 2 : true));
            let res = pool[Math.floor(Math.random()*pool.length)];

            let targetDeg = (360 - res.d) % 360;
            curR += (3600 + targetDeg - (curR % 360));
            document.getElementById('w').style.transform = `rotate(${curR}deg)`;
            
            setTimeout(() => {
                document.getElementById('stage').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('stage').classList.remove('shake');
                    to += res.v; b += res.v;
                    document.getElementById('bal_v').innerText = b.toLocaleString(undefined,{minimumFractionDigits:2});
                    document.getElementById('r_in').innerText = ti.toFixed(2);
                    document.getElementById('r_out').innerText = to.toFixed(2);
                    document.getElementById('r_rtp').innerText = (ti>0?(to/ti*100).toFixed(1):0) + "%";
                    busy = false;
                }, 400);
            }, 4000);
        }
    </script>
</body>
</html>
