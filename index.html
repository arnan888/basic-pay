<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>量化终端 · 旗舰成品</title>
    <style>
        /* 1. 还原 27444 的深墨绿雷达网格背景 */
        body { 
            background: #0d120f; color: #fff; font-family: sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            background-image: linear-gradient(rgba(45, 62, 52, 0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(45, 62, 52, 0.3) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        /* 2. 顶级内陷式面板设计 */
        .panel { 
            background: #1a231e; margin: 10px 15px; padding: 25px; border-radius: 25px; 
            border: 1px solid #2d3e34; box-shadow: inset 0 0 25px rgba(0,0,0,0.9); text-align: center;
        }
        .bal-val { font-size: 60px; color: #ff5a5a; font-weight: bold; letter-spacing: -2px; }

        /* 3. 核心雷达转盘：8神兽图标全部归位 */
        .wheel-box { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #wheel { 
            width: 320px; height: 320px; border-radius: 50%; border: 15px solid #233129;
            background: #1a231e;
            background-image: radial-gradient(#2d3e34 1px, transparent 1px), linear-gradient(#2d3e34 1px, transparent 1px), linear-gradient(90deg, #2d3e34 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
            position: relative; box-shadow: 0 0 60px rgba(0,0,0,1);
        }
        #wheel::after { content: "准备"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85px; height: 85px; background: #1a231e; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ff5a5a; font-weight: bold; font-size: 22px; border: 5px solid #233129; }
        
        .node { position: absolute; width: 100%; height: 100%; text-align: center; display: flex; flex-direction: column; align-items: center; padding-top: 30px; box-sizing: border-box; }
        .node .icon { font-size: 28px; margin-bottom: 2px; }
        .node .name { font-size: 11px; color: #8aa095; font-weight: bold; }

        /* 4. 底部红色操作面板：拒绝摆设，确保点下就有反应 */
        .footer-ctrl { background: #3d0e0e; padding: 25px; border-radius: 35px 35px 0 0; border-top: 2px solid #631b1b; }
        .btn-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .btn-side { width: 60px; height: 60px; background: #261111; border-radius: 18px; color: #ff5a5a; font-size: 32px; display: flex; align-items: center; justify-content: center; border: 1px solid #631b1b; cursor: pointer; }
        .btn-main { background: #cc2929; color: #fff; padding: 20px 80px; border-radius: 45px; font-size: 26px; font-weight: bold; border: none; box-shadow: 0 7px 0 #801a1a; cursor: pointer; }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 3px 0 #801a1a; }
        
        .nav { display: flex; justify-content: space-around; padding: 15px 0; background: #000; font-size: 11px; color: #8aa095; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div style="text-align:center; padding:12px; color:#f1c40f; font-size:13px; font-weight:bold;">⚡ 量化终端 · 旗舰成品 ⚡</div>

    <div class="panel">
        <div style="color:#8aa095; font-size:14px;">💰 可用余额 (USDT)</div>
        <div class="bal-val">1000.00</div> <div style="color:#f1c40f; font-size:15px; margin-top:8px;">🔥 单注额度: 10.0</div>
    </div>

    <div class="wheel-box">
        <div style="position:absolute; top:8%; left:50%; transform:translateX(-50%); width:0; height:0; border-left:20px solid transparent; border-right:20px solid transparent; border-top:30px solid #ff0000; z-index:10;"></div>
        <div id="wheel">
            <div class="node" style="transform:rotate(0deg)"><div class="icon">🐺</div><div class="name">孤狼</div></div>
            <div class="node" style="transform:rotate(45deg)"><div class="icon">🦢</div><div class="name">仙鹤</div></div>
            <div class="node" style="transform:rotate(90deg)"><div class="icon">🐢</div><div class="name">玄武</div></div>
            <div class="node" style="transform:rotate(135deg)"><div class="icon">🦅</div><div class="name">大鹏</div></div>
            <div class="node" style="transform:rotate(180deg)"><div class="icon">🐯</div><div class="name">猛虎</div></div>
            <div class="node" style="transform:rotate(225deg)"><div class="icon">🦄</div><div class="name">麒麟</div></div>
            <div class="node" style="transform:rotate(270deg)"><div class="icon">🐲</div><div class="name">神龙</div></div>
            <div class="node" style="transform:rotate(315deg)"><div class="icon">🔥</div><div class="name">凤凰</div></div>
        </div>
    </div>

    <div class="footer-ctrl">
        <div class="btn-row">
            <div class="btn-side">−</div>
            <button class="btn-main">▶ 执行抽取</button>
            <div class="btn-side">+</div>
        </div>
        <div style="display:flex; justify-content:space-around; color:#8aa095; font-size:13px;">
            <span>🤖 自动模式：关</span>
            <span>⚡ 变速：1X</span>
        </div>
    </div>

    <div class="nav">
        <span>📈 行情</span><span>💹 资产中心</span><span>📜 历史记录</span><span style="color:#fff">🎚️ 量化终端</span>
    </div>

</body>
</html>
