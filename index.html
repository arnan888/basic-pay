<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>五兽至尊_ULTRA_PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --gold: #ffcc00; --bg: #0a0e14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* 1. 极具质感的背景层：蜂窝底纹+动态流光 */
        body { 
            margin: 0; background: var(--bg); color: #fff; font-family: 'Arial Black', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.1) 0%, transparent 80%),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30"><path d="M15 0l15 8.5v17L15 34 0 25.5v-17L15 0z" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/></svg>');
            background-size: cover, 30px 34px;
        }

        .header { width: 100%; height: 18%; display: flex; align-items: center; justify-content: center; position: relative; }
        /* 余额卡片：玻璃拟态质感 */
        .bal-card { 
            width: 85%; padding: 15px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 15px;
            backdrop-filter: blur(10px); text-align: center;
            box-shadow: 0 0 20px rgba(0,242,255,0.2), inset 0 0 15px rgba(0,242,255,0.1);
        }
        .bal-val { font-size: 44px; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--neon); }

        /* 2. 转盘区：多重发光外框 */
        .main-game { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .wheel-outer {
            position: relative; width: 92vw; max-width: 380px; aspect-ratio: 1/1; 
            padding: 12px; border-radius: 50%;
            background: linear-gradient(45deg, #1a1a1a, #333, #1a1a1a);
            box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 15px var(--neon);
        }
        /* 动态霓虹跑马灯 */
        .wheel-outer::before {
            content: ""; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%; background: conic-gradient(from 0deg, var(--neon), var(--pink), var(--neon));
            animation: rotate-neon 2s linear infinite; z-index: -1; opacity: 0.6;
        }
        @keyframes rotate-neon { 100% { transform: rotate(360deg); } }

        .wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid #000;
            background: radial-gradient(circle, #222 0%, #050505 100%);
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); position: relative; overflow: hidden;
        }
        
        .sector { position: absolute; width: 100%; height: 100%; clip-path: polygon(50% 50%, 100% 17%, 100% 83%); transform-origin: center; display: flex; align-items: center; justify-content: flex-end; padding-right: 8%; }
        
        /* 极致大图标 + 辉光效果 */
        .item { transform: rotate(90deg) translateY(-28px); display: flex; flex-direction: column; align-items: center; }
        .item b { font-size: 80px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.5)); animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }

        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 50px solid #fff; 
            z-index: 100; filter: drop-shadow(0 0 10px var(--neon));
        }
        
        .spin-btn { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 85px; height: 85px; background: #000; border: 4px solid var(--pink); border-radius: 50%; 
            z-index: 110; color: var(--pink); font-size: 22px; font-weight: 900; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 30px var(--pink), inset 0 0 15px var(--pink); text-shadow: 0 0 5px var(--pink);
        }

        .footer { width: 100%; height: 20%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .bet-box { 
            display: flex; align-items: center; gap: 40px; background: rgba(0,0,0,0.5); 
            padding: 10px 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); 
        }
        .btn-adj { width: 45px; height: 45px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; font-size: 28px; }
        #msg { color: var(--gold); font-weight: 900; font-size: 24px; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-card"><div class="bal-val">🪙 <span id="bal">1,000</span></div></div>
    </div>

    <div class="main-game">
        <div class="wheel-outer">
            <div class="pointer"></div>
            <div id="wheel" class="wheel">
                <div class="sector" style="background:rgba(255,215,0,0.15); transform:rotate(-90deg)"><div class="item"><b>👑</b></div></div>
                <div class="sector" style="background:rgba(255,0,0,0.1); transform:rotate(-30deg)"><div class="item"><b>🦁</b></div></div>
                <div class="sector" style="background:rgba(255,165,0,0.15); transform:rotate(30deg)"><div class="item"><b>🐯</b></div></div>
                <div class="sector" style="background:rgba(0,255,0,0.1); transform:rotate(90deg)"><div class="item"><b>🦅</b></div></div>
                <div class="sector" style="background:rgba(147,112,219,0.15); transform:rotate(150deg)"><div class="item"><b>🐺</b></div></div>
                <div class="sector" style="background:rgba(240,230,140,0.1); transform:rotate(210deg)"><div class="item"><b>🐕</b></div></div>
            </div>
            <div class="spin-btn" onclick="spin()">SPIN</div>
        </div>
    </div>

    <div class="footer">
        <div class="bet-box">
            <button class="btn-adj" onclick="setB(-10)">-</button>
            <div style="font-size:32px; font-weight:900; color:var(--gold);"><span id="bet">1</span></div>
            <button class="btn-adj" onclick="setB(10)">+</button>
        </div>
        <div id="msg">HIGH STAKES HIGH GAINS</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let b = 1000, bet = 1, r = 0, isS = false, audioCtx;

        // 🎵 提神刺激：高频电子节奏引擎
        function initAudio() {
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const masterGain = audioCtx.createGain();
                masterGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                masterGain.connect(audioCtx.destination);

                const playBeat = () => {
                    const osc = audioCtx.createOscillator();
                    osc.type = 'sawtooth'; // 尖锐的锯齿波，提神
                    osc.frequency.setValueAtTime(50, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
                    const g = audioCtx.createGain();
                    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    osc.connect(g); g.connect(masterGain);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                    setTimeout(playBeat, 400); // 密集的鼓点节奏
                };
                playBeat();
            }
        }

        function sfx(f, d, t='sine', v=0.1) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function sync() {
            document.getElementById('bal').innerText = b.toLocaleString();
            document.getElementById('bet').innerText = bet;
        }

        window.setB = (v) => { 
            initAudio();
            if(!isS) { 
                bet = Math.max(1, Math.min(b, bet+v)); sync(); 
                tg.HapticFeedback.selectionChanged();
                sfx(1200, 0.05, 'square', 0.03); 
            } 
        };

        function spin() {
            initAudio();
            if(isS || b < bet) return;
            isS = true; b -= bet; sync();
            tg.HapticFeedback.impactOccurred('heavy');
            
            let tick = setInterval(() => { if(isS) sfx(200 + Math.random()*800, 0.05, 'sawtooth', 0.02); }, 100);
            
            let idx = Math.floor(Math.random()*6);
            r += (3600 + idx*60);
            document.getElementById('wheel').style.transform = `rotate(-${r}deg)`;
            document.getElementById('msg').innerText = "RACING...";

            setTimeout(() => {
                clearInterval(tick);
                const multi = [88, 15, 10, 5, 2, 0];
                let win = Math.floor(bet * multi[idx]);
                b += win; sync();
                
                if(win > 0) {
                    document.getElementById('msg').innerText = "JACKPOT! +" + win;
                    for(let i=0; i<8; i++) setTimeout(()=>sfx(400+i*150, 0.3, 'sine', 0.1), i*80);
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    document.getElementById('msg').innerText = "PUSH YOUR LUCK!";
                    sfx(80, 0.6, 'sawtooth', 0.1);
                }
                isS = false;
            }, 5000);
        }
    </script>
</body>
</html>
