git pull origin main

# 2. 写入私人定制版代码
cat <<EOF > index.html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA_PRIVATE_CONSOLE_V65</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --gold: #ffcc00; --blue: #1e3a5f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at 50% 50%, var(--blue) 0%, #0d1b2a 100%);
            color: #fff; font-family: 'Arial', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 顶部余额 */
        .hud {
            width: 95%; margin-top: 15px; z-index: 100;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border: 1px solid var(--neon); border-radius: 15px; padding: 12px; text-align: center;
        }
        .bal-txt { font-size: 28px; color: #fff; text-shadow: 0 0 10px var(--neon); }
        
        /* 下注控制 */
        .bet-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .btn-ctrl { padding: 8px 12px; background: #000; border: 1.5px solid var(--gold); color: var(--gold); border-radius: 8px; cursor: pointer; font-weight: bold; }
        .bet-val { font-size: 20px; color: var(--gold); min-width: 60px; font-weight: 900; }

        /* 转盘区 */
        .wheel-box { margin-top: 20px; position: relative; width: 320px; height: 320px; }
        .wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid #2c3e50;
            position: relative; overflow: hidden; transition: transform 4.5s cubic-bezier(0.15, 0, 0.1, 1);
            background: #111; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .sector {
            position: absolute; width: 100%; height: 100%;
            clip-path: polygon(50% 50%, 100% 21%, 100% 79%); transform-origin: center;
        }
        .sector img { width: 115%; height: 115%; object-fit: cover; filter: brightness(0.6); }
        .s0{transform:rotate(-90deg)} .s1{transform:rotate(-30deg)} .s2{transform:rotate(30deg)} 
        .s3{transform:rotate(90deg)} .s4{transform:rotate(150deg)} .s5{transform:rotate(210deg)}

        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--neon); z-index: 70; }
        .center-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 65px; height: 65px; background: #000; border: 3px solid var(--pink); border-radius: 50%; color: #fff; font-weight: bold; cursor: pointer; z-index: 80; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--pink); }

        /* 管理员明面控制台 */
        .admin-panel {
            margin-top: 25px; width: 90%; background: rgba(0,0,0,0.5); border: 1px dashed #555; border-radius: 12px; padding: 10px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .admin-title { font-size: 12px; color: #777; letter-spacing: 2px; }
        .admin-btns { display: flex; gap: 10px; }
        .btn-admin { padding: 6px 15px; background: #222; border: 1px solid #444; color: #aaa; border-radius: 5px; font-size: 12px; cursor: pointer; }
        .btn-admin:active { background: var(--neon); color: #000; border-color: #fff; }

        #res-win { font-size: 28px; font-weight: 900; color: var(--neon); margin-top: 5px; }
    </style>
</head>
<body>

    <div class="hud">
        <div class="bal-txt">💰 <span id="bal">1,000</span></div>
        <div class="bet-row">
            <button class="btn-ctrl" onclick="chgBet(-1)">-1</button>
            <button class="btn-ctrl" onclick="chgBet(-10)">-10</button>
            <div class="bet-val">BET: <span id="bet">1</span></div>
            <button class="btn-ctrl" onclick="chgBet(10)">+10</button>
            <button class="btn-ctrl" onclick="chgBet(1)">+1</button>
        </div>
    </div>

    <div class="wheel-box">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <div class="sector s0"><img src="all.jpg"></div>
            <div class="sector s1"><img src="lion.jpg"></div>
            <div class="sector s2"><img src="tiger.jpg"></div>
            <div class="sector s3"><img src="leopard.jpg"></div>
            <div class="sector s4"><img src="wolf.jpg"></div>
            <div class="sector s5"><img src="dog.jpg"></div>
        </div>
        <div class="center-btn" onclick="spin()">SPIN</div>
    </div>

    <div class="admin-panel">
        <div class="admin-title">PRIVATE CONSOLE</div>
        <div id="res-win">READY</div>
        <div class="admin-btns">
            <button class="btn-admin" onclick="addGold(100)">+100</button>
            <button class="btn-admin" onclick="addGold(1000)">+1000</button>
            <button class="btn-admin" onclick="resetSys()">RESET</button>
        </div>
    </div>

    <script>
        let b = parseFloat(localStorage.getItem('u_gold') || '1000');
        let tIn = parseFloat(localStorage.getItem('u_in') || '1000');
        let tOut = parseFloat(localStorage.getItem('u_out') || '0');
        let curBet = 1; let r = 0; let spinning = false;

        function updateUI() {
            document.getElementById('bal').innerText = Math.floor(b).toLocaleString();
            document.getElementById('bet').innerText = curBet;
            localStorage.setItem('u_gold', b);
            localStorage.setItem('u_in', tIn);
            localStorage.setItem('u_out', tOut);
        }

        // 私人控制函数
        window.addGold = (v) => { b += v; tIn += v; updateUI(); };
        window.resetSys = () => { if(confirm("RESET ALL?")){ b=1000; tIn=1000; tOut=0; updateUI(); } };
        window.chgBet = (v) => { if(!spinning){ curBet = Math.max(1, Math.min(b, curBet + v)); updateUI(); } };

        function spin() {
            if(spinning || b < curBet) return;
            spinning = true; b -= curBet; updateUI();
            document.getElementById('res-win').innerText = "SPINNING...";
            
            // 控杀逻辑 (92% 阈值)
            const idx = (tOut/tIn >= 0.92) ? (Math.random()<0.8?5:4) : Math.floor(Math.random()*6);
            r += (2160 + idx*60);
            document.getElementById('wheel').style.transform = "rotate(-"+r+"deg)";

            setTimeout(() => {
                const conf = [{min:30,max:100},{min:10,max:30},{min:5,max:15},{min:2,max:10},{min:0.5,max:5},{min:0.1,max:1}];
                let m = Math.random()*(conf[idx].max-conf[idx].min)+conf[idx].min;
                let win = Math.floor(curBet * m);
                b += win; tOut += win; updateUI();
                document.getElementById('res-win').innerText = win>0 ? "WIN: " + win : "LOST";
                spinning = false;
            }, 4500);
        }
        updateUI();
    </script>
</body>
</html>
EOF

# 3. 提交并推送
git add index.html
git commit -m "Private console version V65"
git push origin main
