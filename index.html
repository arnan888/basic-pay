<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>金葫娱乐城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: radial-gradient(circle at 30% 10%, #0a0c1a, #020308);
            font-family: 'Segoe UI', 'Poppins', system-ui;
            padding: 12px;
            min-height: 100vh;
            color: #ffecb3;
            transition: background 0.2s;
        }
        #app {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(15, 20, 35, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            border: 1px solid rgba(255, 200, 80, 0.4);
            overflow: hidden;
        }
        .auth-panel {
            padding: 28px 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 40px;
            margin: 20px;
        }
        .auth-panel h2,
        .auth-panel h3 {
            text-align: center;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #ffaa33;
            border-radius: 40px;
            color: #ffd966;
            outline: none;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 10px 0;
        }
        .code-btn,
        .auth-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: bold;
            color: #2a1a0a;
            cursor: pointer;
            width: 100%;
        }
        .code-btn {
            width: auto;
            padding: 10px 18px;
        }
        hr {
            margin: 20px 0;
            border-color: #ffaa33;
        }
        .auth-note {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 12px;
            color: #ffaa33;
        }
        .user-section {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 16px;
            border-bottom: 1px solid #ffaa33;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        #userBalanceDisplay {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 6px;
        }
        .btn-sm {
            background: rgba(255, 170, 51, 0.2);
            border: 1px solid #ffaa33;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
        }
        .charge-btn,
        .withdraw-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            padding: 6px 16px;
            border-radius: 40px;
            color: #2a1a0a;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }
        .lang-switch,
        .theme-switch {
            background: #ffaa33;
            border: none;
            border-radius: 30px;
            padding: 4px 10px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 4px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 20px;
        }
        .game-card-item {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 32px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #ffaa33;
        }
        .game-card-item:hover {
            transform: scale(1.02);
            background: rgba(255, 170, 51, 0.2);
        }
        .game-name {
            font-weight: bold;
        }
        .game-desc {
            font-size: 0.7rem;
            color: #ffd966;
        }
        .game-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 32px;
            padding: 16px;
            border: 1px solid rgba(255, 200, 80, 0.4);
        }
        .chip {
            background: linear-gradient(145deg, #cc8800, #aa6600);
            display: inline-block;
            padding: 6px 12px;
            border-radius: 36px;
            margin: 3px;
            cursor: pointer;
            font-weight: bold;
            border: 1px solid #ffaa33;
        }
        .chip.selected {
            background: #ffaa33;
            color: #2a1a0a;
            box-shadow: 0 0 8px #ffaa33;
        }
        .exec-btn {
            background: linear-gradient(135deg, #ffaa33, #ff884d);
            border: none;
            border-radius: 36px;
            padding: 8px 14px;
            color: #2a1a0a;
            font-weight: bold;
            cursor: pointer;
            margin: 3px;
        }
        .exec-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            pointer-events: none;
        }
        .countdown-area {
            text-align: center;
            margin: 6px 0 12px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 40px;
            padding: 6px 12px;
            font-weight: bold;
            border: 1px solid #ffaa33;
        }
        .fish-dice-cube,
        .dice-cube {
            width: 80px;
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;
        }
        .fish-dice-face,
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #2a1e12;
            border: 2px solid #ffaa33;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: visible;
            font-size: 2rem;
        }
        .fish-dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin: 24px 0;
            perspective: 900px;
            flex-wrap: nowrap;
        }
        .fish-dice-cube {
            margin: 0 8px;
            flex-shrink: 0;
        }
        @media (max-width:520px) {
            .fish-dice-3d-area {
                gap: 34px;
                perspective: 750px;
            }
            .fish-dice-cube {
                margin: 0 5px;
            }
        }
        .dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            perspective: 700px;
        }
        @media (max-width:480px) {
            .fish-dice-cube,
            .dice-cube {
                width: 65px;
                height: 65px;
            }
        }
        .pip {
            width: 10px;
            height: 10px;
            background: #ffaa33;
            border-radius: 50%;
            margin: 2px;
            position: absolute;
        }
        .pip-l1,
        .pip-l2,
        .pip-l3 {
            left: 12px;
        }
        .pip-r1,
        .pip-r2,
        .pip-r3 {
            right: 12px;
        }
        .pip-l1,
        .pip-r1 {
            top: 12px;
        }
        .pip-l2,
        .pip-r2 {
            top: 50%;
            transform: translateY(-50%);
        }
        .pip-l3,
        .pip-r3 {
            bottom: 12px;
        }
        .pip-center {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .pip-tl {
            top: 8px;
            left: 8px;
        }
        .pip-tr {
            top: 8px;
            right: 8px;
        }
        .pip-bl {
            bottom: 8px;
            left: 8px;
        }
        .pip-br {
            bottom: 8px;
            right: 8px;
        }
        .pip-mid {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .fish-pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 10px 0;
        }
        .fish-bet-card,
        .bet-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 8px 4px;
            text-align: center;
            border: 1px solid #ffaa33;
            cursor: pointer;
        }
        .points-grid,
        .trio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
            gap: 6px;
            margin: 10px 0;
        }
        .history-cell {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 170, 51, 0.2);
            margin: 2px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2a1e12;
            border-radius: 36px;
            padding: 20px;
            color: #ffd966;
            border: 1px solid #ffaa33;
            max-width: 90vw;
            max-height: 85vh;
            overflow-y: auto;
        }
        .win-flash {
            animation: redFlash 0.4s 10 !important;
            background-color: #ff3300 !important;
            box-shadow: 0 0 25px #ffaa33 !important;
            color: #ffffff !important;
            font-weight: bold !important;
            border: 2px solid #ffffff !important;
        }
        @keyframes redFlash {
            0% {
                background-color: rgba(255, 50, 50, 0);
                color: #ffffff;
            }
            50% {
                background-color: #ff3300;
                transform: scale(1.04);
                color: #ffffff;
            }
            100% {
                background-color: rgba(255, 50, 50, 0);
                color: #ffffff;
            }
        }
        .balance-bling {
            animation: balanceGlow 0.4s 3;
        }
        @keyframes balanceGlow {
            0% {
                text-shadow: 0 0 0;
            }
            50% {
                text-shadow: 0 0 12px #ff5500;
            }
        }
        .dt-card {
            background: linear-gradient(145deg, #fff8f0, #f0e6d8);
            width: 75px;
            height: 100px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.2);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-style: preserve-3d;
            cursor: pointer;
            margin: 0 auto;
        }
        .dt-card.flipped {
            transform: rotateY(180deg);
        }
        .dt-card[data-suit="♥"],
        .dt-card[data-suit="♦"] {
            color: #c33;
        }
        .dt-card[data-suit="♣"],
        .dt-card[data-suit="♠"] {
            color: #333;
        }
        .simple-card {
            background: linear-gradient(145deg, #fff8f0, #f0e6d8);
            width: 60px;
            height: 85px;
            border-radius: 10px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #333;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            margin: 2px;
        }
        .simple-card[data-suit="♥"],
        .simple-card[data-suit="♦"] {
            color: #c33;
        }
        .simple-card[data-suit="♣"],
        .simple-card[data-suit="♠"] {
            color: #333;
        }
        .niu-hand {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            min-height: 95px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            margin: 8px 0;
        }
        .admin-btn {
            background: #ffaa33;
            border: none;
            border-radius: 20px;
            padding: 4px 8px;
            margin: 2px;
            color: #2a1a0a;
            cursor: pointer;
        }
        #niuResult3D {
            width: 120px;
            height: 50px;
            background: #2a1e12;
            border: 1px solid #ffaa33;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            visibility: hidden;
            margin: 10px auto;
        }
        body.light-mode {
            background: radial-gradient(circle at 30% 10%, #f5f0e6, #e8dfd0);
            color: #3a2a1a;
        }
        body.light-mode #app {
            background: rgba(245, 240, 230, 0.85);
            border-color: rgba(180, 130, 60, 0.5);
        }
        body.light-mode .auth-panel,
        body.light-mode .user-section,
        body.light-mode .game-card,
        body.light-mode .modal-content {
            background: rgba(250, 245, 235, 0.9);
            border-color: #b8860b;
            color: #3a2a1a;
        }
        body.light-mode .auth-input,
        body.light-mode .fish-bet-card,
        body.light-mode .bet-card,
        body.light-mode .chip,
        body.light-mode .exec-btn,
        body.light-mode .countdown-area {
            background: rgba(255, 250, 240, 0.8);
            border-color: #c99a3b;
            color: #4a3a2a;
        }
        body.light-mode .chip.selected {
            background: linear-gradient(145deg, #ffcc77, #e6a822);
            color: #2a1a0a;
        }
        body.light-mode .fish-dice-face,
        body.light-mode .dice-face,
        body.light-mode .simple-card,
        body.light-mode .dt-card {
            background: #fffaf0;
            border-color: #c99a3b;
            color: #4a3a2a;
        }
        body.light-mode .admin-btn {
            background: #e6a822;
            color: #2a1a0a;
        }
        body.light-mode .lang-switch,
        body.light-mode .theme-switch {
            background: #e6a822;
            color: #2a1a0a;
        }
        body.light-mode .charge-btn,
        body.light-mode .withdraw-btn {
            background: linear-gradient(135deg, #e6a822, #c9881c);
            color: #2a1a0a;
        }
        body.light-mode #userBalanceDisplay {
            background: linear-gradient(135deg, #c9881c, #a56b0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .quick-bet {
            background: rgba(255, 170, 51, 0.2);
            border: 1px solid #ffaa33;
            border-radius: 20px;
            padding: 4px 10px;
            cursor: pointer;
            color: #ffd966;
            font-size: 0.75rem;
        }
        .clear-bet {
            background: rgba(255, 100, 50, 0.2);
            border: 1px solid #ff6644;
            border-radius: 20px;
            padding: 4px 10px;
            cursor: pointer;
            color: #ff8866;
            font-size: 0.75rem;
        }
        .game-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 6px;
        }
        .user-vip-card {
            flex: 2;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #ffaa33;
            border-radius: 32px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .vip-badge {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a0a;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.75rem;
            margin-left: auto;
        }
        .back-lobby-btn {
            flex: 1;
            background: rgba(255, 170, 51, 0.25);
            border: 1px solid #ffaa33;
            padding: 8px 6px;
            border-radius: 32px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .vip-progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
        }
        .vip-progress-fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, #ffd966, #ffaa33);
        }
        .online-count {
            display: inline-block;
            background: rgba(0, 255, 100, 0.2);
            border: 1px solid #00ff64;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.75rem;
            color: #00ff64;
            margin-left: 6px;
        }
        .lobby-title {
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        // ==================== API配置 ====================
        const API_BASE = window.location.origin + '/api';
        let apiAvailable = false;

        async function checkApi() {
            try {
                const resp = await fetch(API_BASE + '/ping', { method: 'GET', signal: AbortSignal.timeout(3000) });
                if (resp.ok) { apiAvailable = true;
                    console.log('✅ 后端API已连接'); }
            } catch (e) { apiAvailable = false;
                console.log('⚠️ 后端API不可用，使用localStorage'); }
        }

        async function apiCall(method, path, body = null) {
            if (!apiAvailable) throw new Error('API不可用');
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const resp = await fetch(API_BASE + path, opts);
            if (!resp.ok) { const err = await resp.json().catch(() => ({ msg: '请求失败' })); throw new Error(err.msg ||
                    '请求失败'); }
            return resp.json();
        }

        // ==================== 全局存储 ====================
        const STORAGE = { users: 'jh_final_v2', recharge: 'jh_recharge_v2', withdraw: 'jh_withdraw_v2',
            config: 'jh_config_v2', vipdata: 'jh_vipdata_v2', online: 'jh_online_v2' };
        let systemConfig = { bankerBalance: 200000, adjustFactor: 0.98, probabilityFactor: 50 };

        async function loadConfig() {
            if (apiAvailable) { try { const data = await apiCall('GET', '/config');
                    systemConfig = data; return; } catch (e) {} }
            let s = localStorage.getItem(STORAGE.config);
            if (s) systemConfig = JSON.parse(s);
            else localStorage.setItem(STORAGE.config, JSON.stringify(systemConfig));
        }

        async function saveConfig() {
            if (apiAvailable) { try { await apiCall('PUT', '/config', systemConfig); return; } catch (e) {} }
            localStorage.setItem(STORAGE.config, JSON.stringify(systemConfig));
        }

        async function loadUsers() {
            if (apiAvailable) { try { const data = await apiCall('GET', '/users'); return data; } catch (e) {} }
            let u = localStorage.getItem(STORAGE.users);
            if (!u) { let init = [{ account: "admin", password: "admin888", balance: 5000, vip: { level: 0, totalWager: 0,
                        weeklyClaimed: null, upgradeRewards: [] }, records: [] }];
                localStorage.setItem(STORAGE.users, JSON.stringify(init)); return init; }
            return JSON.parse(u);
        }

        async function saveUsers(users) {
            if (apiAvailable) { try { await apiCall('PUT', '/users/batch', { users }); return; } catch (e) {} }
            localStorage.setItem(STORAGE.users, JSON.stringify(users));
        }

        // ==================== VIP配置（按用户最新表格）====================
        const VIP_CONFIG = [
            { level: 0, wagerRequired: 0, upgradeReward: 0, weeklySalary: 0 },
            { level: 1, wagerRequired: 30000, upgradeReward: 15, weeklySalary: 0 },
            { level: 2, wagerRequired: 100000, upgradeReward: 30, weeklySalary: 3 },
            { level: 3, wagerRequired: 250000, upgradeReward: 55, weeklySalary: 5 },
            { level: 4, wagerRequired: 500000, upgradeReward: 100, weeklySalary: 8 },
            { level: 5, wagerRequired: 1000000, upgradeReward: 200, weeklySalary: 15 },
            { level: 6, wagerRequired: 2000000, upgradeReward: 400, weeklySalary: 30 },
            { level: 7, wagerRequired: 3000000, upgradeReward: 550, weeklySalary: 55 },
            { level: 8, wagerRequired: 4000000, upgradeReward: 700, weeklySalary: 85 },
            { level: 9, wagerRequired: 5000000, upgradeReward: 800, weeklySalary: 110 },
            { level: 10, wagerRequired: 6000000, upgradeReward: 800, weeklySalary: 130 }
        ];
        const VIP_MAX_LEVEL = 10;

        function getVipInfo(totalWager) {
            let lvl = 0;
            for (let i = VIP_CONFIG.length - 1; i >= 0; i--) {
                if (totalWager >= VIP_CONFIG[i].wagerRequired) { lvl = VIP_CONFIG[i].level; break; }
            }
            return VIP_CONFIG.find(v => v.level === lvl) || VIP_CONFIG[0];
        }

        function getNextVipInfo(currentLevel) {
            if (currentLevel >= VIP_MAX_LEVEL) return null;
            return VIP_CONFIG.find(v => v.level === currentLevel + 1) || null;
        }

        // ==================== 在线人数管理 ====================
        let onlineUsers = {};
        let heartbeatInterval = null;

        function startHeartbeat() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            updateOnlinePresence();
            heartbeatInterval = setInterval(updateOnlinePresence, 15000);
        }

        function stopHeartbeat() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            heartbeatInterval = null;
        }

        function updateOnlinePresence() {
            if (!currentUser) return;
            const now = Date.now();
            if (apiAvailable) {
                try {
                    fetch(API_BASE + '/heartbeat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ account: currentUser.account, timestamp: now }),
                        signal: AbortSignal.timeout(2000)
                    }).catch(() => {});
                } catch (e) {}
            }
            let ol = JSON.parse(localStorage.getItem(STORAGE.online) || '{}');
            ol[currentUser.account] = now;
            localStorage.setItem(STORAGE.online, JSON.stringify(ol));
            onlineUsers = ol;
        }

        function getOnlineCount() {
            const now = Date.now();
            let ol = JSON.parse(localStorage.getItem(STORAGE.online) || '{}');
            let count = 0;
            for (let acc in ol) {
                if (now - ol[acc] < 30000) count++;
            }
            if (currentUser && (!ol[currentUser.account] || now - ol[currentUser.account] >= 30000)) {
                count++;
            }
            return Math.max(count, 1);
        }

        function cleanupOnlineUsers() {
            const now = Date.now();
            let ol = JSON.parse(localStorage.getItem(STORAGE.online) || '{}');
            let cleaned = {};
            for (let acc in ol) {
                if (now - ol[acc] < 30000) cleaned[acc] = ol[acc];
            }
            localStorage.setItem(STORAGE.online, JSON.stringify(cleaned));
            onlineUsers = cleaned;
        }

            let newVipInfo = getVipInfo(totalWager);

                for (let l = currentLvl + 1; l <= Math.min(newVipInfo.level, VIP_MAX_LEVEL); l++) {

                        upgradedRewards.push(l);

                currentUser.vip.level = Math.min(newVipInfo.level, VIP_MAX_LEVEL);

        startHeartbeat();

}

        case '蟹': rotX = 0;   rotY = -90;  break;  // 右面
        case '葫芦': rotX = 0;  rotY = 90;   break;  // 左面
        case '金钱': rotX = 90;  rotY = 0;    break;  // 上面

    // 🔧 每次停稳时保持图案正面朝上（不额外旋转）
    diceDiv.style.transition = 'transform 1.2s cubic-bezier(0.25, 0.1, 0.25, 1)';

    async function repeatLastBet() {

        for (let p in lastBetState.patternBets) total += lastBetState.patternBets[p];
        for (let k in lastBetState.doubleBets) total += lastBetState.doubleBets[k];
        if (total > (currentUser ? currentUser.balance : 0)) return;

        let oldTotal = Object.values(patternBets).reduce((a,b)=>a+b,0) +

    async function rollFishDiceWithAnimation(final) {
    const totalAnimDuration = 3000;
    const steps = 12;
    const stepInterval = totalAnimDuration / steps;
    
    for (let step = 0; step < steps; step++) {
        setTimeout(() => {
            for (let i = 0; i < 3; i++) {
                fishDice[i].style.transition = 'transform 0.1s linear';
                let rx = Math.random() * 360;
                let ry = Math.random() * 360;
                fishDice[i].style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
            }
        }, step * stepInterval);
    }
    
    await new Promise(r => setTimeout(r, totalAnimDuration));
    
    for (let i = 0; i < 3; i++) {
        fishDice[i].style.transition = 'transform 1.2s cubic-bezier(0.25, 0.1, 0.25, 1)';
        setFishDiceValue(fishDice[i], final[i]);
    }
    
    await new Promise(r => setTimeout(r, 1200));
}

    async function settleFish() {
        if (isRolling) return;
        let totalBet = Object.values(patternBets).reduce((a,b)=>a+b,0) +
                       Object.values(doubleBets).reduce((a,b)=>a+b,0);

        // 🔧 修复续押：在开奖前立即保存当前下注状态
        saveLastBetState();

        if (countdownTimer) clearInterval(countdownTimer);
        document.getElementById('fishPhaseHint').innerText = '🎰 开奖中...';
        updateFishUI();

        let r1 = patternNames[Math.floor(Math.random() * 6)],
            r2 = patternNames[Math.floor(Math.random() * 6)],
            r3 = patternNames[Math.floor(Math.random() * 6)];
        await rollFishDiceWithAnimation([r1, r2, r3]);

        let occurs = {鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0};
        [r1, r2, r3].forEach(p => occurs[p]++);

        let totalPayout = 0, winDetails = {};
        let effectiveAdj = getEffectiveAdjustFactor();

        for (let p in patternBets) {
            let cnt = occurs[p];
            if (cnt > 0 && patternBets[p] > 0) {
                let profit = patternBets[p] * cnt * effectiveAdj;
                let payout = patternBets[p] + profit;
                totalPayout += payout;
                winDetails[p] = payout;
            }
        }

        for (let combo of doubleCombos) {
            let key = combo.join(',');
            let bet = doubleBets[key];
            if (bet > 0) {
                let a = combo[0], b = combo[1];
                if (occurs[a] > 0 && occurs[b] > 0) {
                    let profit = bet * 5 * effectiveAdj;
                    let payout = bet + profit;
                    // 🔧 修正双押额外2倍条件：三个骰子图案全在组合内即可
                    if ([r1, r2, r3].every(p => combo.includes(p))) {
                        let extraProfit = bet * 2 * effectiveAdj;
                        profit += extraProfit;
                        payout += extraProfit;
                    }
                    totalPayout += payout;
                    winDetails[key] = payout;
                }
            }
        }

        let netProfit = totalPayout - totalBet;
        lastWinAmount = netProfit;

        if (totalPayout > 0) {
            let newBal = currentUser.balance + totalPayout;
            await updateBalance(currentUser.account, newBal);

                    let tid = setTimeout(() => {
                        if (card) card.classList.remove('win-flash');
                        sp.innerText = "0";
                        flashActiveSpans.delete(`fishBet_${p}`);
                    }, 4000);
                    flashTimeoutIds.push(tid);
                } else {
                    sp.innerText = "0";
                }
            }
        }
        for (let combo of doubleCombos) {
            let key = combo.join(',');
            let spanId = `doubleBet_${key.replace(/,/g,'_')}`;
            let sp = document.getElementById(spanId);

                    flashActiveSpans.add(spanId);
                    let card = sp.closest('.bet-card');
                    if (card) card.classList.add('win-flash');
                    let tid = setTimeout(() => {

        updateFishUI();

        gameRecords.unshift({
            round: gameRecords.length + 1,
            time: new Date().toLocaleTimeString(),
            dice: `${r1},${r2},${r3}`,
            result: totalBet > 0 ? (netProfit > 0 ? `赢${netProfit.toFixed(2)}` : `输${(-netProfit).toFixed(2)}`) : `未押注`
        });

            updateFishUI();

        }, 4000);
        flashTimeoutIds.push(settleTid);

                        localStorage.removeItem('neon_saved_password');
                        localStorage.setItem('neon_remember_me', 'false'); }
                    renderGameLobby(); } else { alert(res.msg); } };
            document.getElementById('getCodeBtn').onclick = () => { let a = document.getElementById('regAccount').value
                    .trim(); if (!a) return; let code = Math.floor(100000 + Math.random() * 900000);
                window.tempCode = { acc: a, code: code, expire: Date.now() + 5 * 60 * 1000 };
                alert(`【验证码】您的验证码是：${code}，5分钟内有效。`); };
            document.getElementById('registerBtn').onclick = async () => { let a = document.getElementById('regAccount')
                    .value.trim(),
                    c = document.getElementById('regCode').value.trim(),
                    p = document.getElementById('regPassword').value,
                    ref = document.getElementById('regReferral').value.trim().toUpperCase(); if (!a || !c || !p || !
                    ref) return; if (!['VIP666', '888VIP', 'GOLD2025', 'LUCKY8', 'DICE100'].includes(ref))
                return; if (!window.tempCode || window.tempCode.acc !== a || window.tempCode.code != c || Date
                    .now() > window.tempCode.expire) return; if (p.length < 4) return; let res = await register(
                    a, p, ref); if (res.success) { document.getElementById('regAccount').value = '';
                    document.getElementById('regCode').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regReferral').value = '';
                    alert('注册成功！初始余额为0，请联系客服充值。');
                    renderGameLobby(); } else { alert(res.msg); } };
        }

        // ==================== 初始化 ====================
        async function init() {
            await checkApi();
            await loadConfig();
            cleanupOnlineUsers();
            let su = localStorage.getItem('curr_acc');
            if (su) {
                let u = (await loadUsers()).find(u => u.account === su);
                if (u) {
                    if (!u.vip) u.vip = { level: 0, totalWager: 0, weeklyClaimed: null, upgradeRewards: [] };
                    currentUser = u;
                    startHeartbeat();
                    renderGameLobby();
                } else { renderAuthUI(); }
            } else { renderAuthUI(); }
        }
        init();
    </script>
</body>
</html>
