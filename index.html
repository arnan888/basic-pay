<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_RHYTHM_FINAL</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        
        /* 1:1 还原背景深色调 */
        body { 
            background: #0d1117; 
            background-image: radial-gradient(circle at 50% 50%, #161b22 0%, #0d1117 100%);
            color:#FFF; font-family: "PingFang SC", "Helvetica Neue", sans-serif; 
            height:100vh; overflow:hidden; display:flex; flex-direction:column;
        }

        /* 状态条 - 仅保留系统状态，隐藏锁定率 */
        .status-bar { 
            background: rgba(0,0,0,0.5); height:28px; display:flex; align-items:center; 
            padding:0 15px; font-size:10px; color:#3fb950; justify-content:flex-start; 
            border-bottom:1px solid #21262d; letter-spacing:1px;
        }

        .core-section { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:15px; gap:15px; }

        /* --- 凹陷式资产看板还原 --- */
        .balance-outer {
            width:100%; background: #010409; border: 1px solid #30363d; border-radius:12px;
            padding:4px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .balance-card { 
            width:100%; background: linear-gradient(145deg, #0d1117, #161b22); 
            border-radius:10px; padding:20px; text-align:center;
            /* 深度内阴影模拟凹陷感 */
            box-shadow: inset 5px 5px 15px rgba(0,0,0,0.8), inset -2px -2px 10px rgba(255,255,255,0.02);
        }
        .bal-label { font-size:10px; color:#8b949e; letter-spacing:1px; margin-bottom:8px; text-transform:uppercase; }
        .bal-val { 
            font-size:58px; font-weight:900; color:#3fb950; 
            text-shadow: 0 0 15px rgba(63,185,80,0.5); 
            font-family: 'Consolas', monospace; letter-spacing:-2px;
        }
        .bet-info { font-size:11px; color:#58a6ff; margin-top:8px; opacity:0.8; }

        /* --- 瑞兽转盘还原 --- */
        .wheel-module { 
            position:relative; width:280px; height:280px; 
            background: #161b22; border-radius:18px; border:1px solid #30363d;
            display:flex; align-items:center; justify-content:center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }
        /* 转盘外框 */
        .wheel-outer {
            width: 250px; height: 250px; border-radius: 50%;
            border: 6px solid #0d1117; position: relative;
            background: #010409; overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 0 0 2px #30363d;
        }
        /* 中心倍率圆盘 */
        .wheel-center {
            position: absolute; z-index: 10; width: 75px; height: 75px; 
            background: radial-gradient(circle, #161b22 0%, #0d1117 100%);
            border-radius: 50%; border: 2px solid #30363d;
            display: flex; align-items:center; justify-content:center;
            color: #3fb950; font-size: 22px; font-weight: 900;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        
        /* 瑞兽格位布局 - 对标图片顺序 */
        .slot-content { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; padding-top:12px; pointer-events:none; }
        .beast-ico { font-size: 26px; margin-bottom:2px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8)); }
        .beast-txt { font-size: 11px; font-weight:bold; color:#f0f6fc; text-shadow: 1px 1px 2px #000; }
        .beast-mul { font-size: 9px; color:#8b949e; margin-top:1px; }

        .pointer-line { position:absolute; top:-12px; left:50%; transform:translateX(-50%); width:4px; height:55px; background:#f85149; z-index:100; box-shadow:0 0 15px #f85149; border-radius:2px; }

        /* --- 底部控制台还原 --- */
        .console { width:100%; background:#0d1117; border-top:1px solid #30363d; padding:15px 15px 85px 15px; }
        .main-row { display:flex; gap:12px; margin-bottom:15px; }
        .adj { 
            width:65px; height:60px; background: #21262d; border:1px solid #30363d; color:#f0f6fc; 
            font-size:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; 
            box-shadow: 0 4px 0 #010409;
        }
        .adj:active { transform: translateY(2px); box-shadow: none; }
        .exec { 
            flex:1; background:#da3633; border:none; color:#FFF; 
            font-size:24px; font-weight:900; border-radius:8px; letter-spacing:4px;
            box-shadow: 0 4px 0 #8e1f1c; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .exec:active { transform: translateY(2px); box-shadow: none; }
        
        .tech-row { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
        .mode-b { 
            padding:14px; background:#161b22; border:1px solid #30363d; 
            color:#8b949e; font-size:13px; font-weight:bold; text-align:center; border-radius:8px; 
            display:flex; align-items:center; justify-content:center; gap:8px;
        }
        .mode-b.on { border-color:#da3633; color:#f0f6fc; background:#21262d; }

        /* 底部导航 */
        .nav { position:fixed; bottom:0; width:100%; height:75px; background:#010409; border-top:1px solid #21262d; display:grid; grid-template-columns: repeat(4, 1fr); }
        .nav-n { display:flex; flex-direction:column; align-items:center; justify-content:center; color:#484f58; font-size:12px; font-weight:bold; }
        .nav-n.act { color:#da3633; }
    </style>
</head>
<body>

                <!-- 4点半：麒麟 -->
                <div class="slot-content" style="transform:rotate(135deg)"><span class="beast-ico">🦌</span><span class="beast-txt">麒麟</span><span class="beast-mul">500X</span></div>
                <!-- 6点：神龙 -->
                <div class="slot-content" style="transform:rotate(180deg)"><span class="beast-ico">🐲</span><span class="beast-txt" style="color:#3fb950">神龙</span><span class="beast-mul">50X</span></div>

                <div class="slot-content" style="transform:rotate(225deg)"><span class="beast-ico">🔥</span><span class="beast-txt">凤凰</span><span class="beast-mul">X88</span></div>
                <!-- 9点：大鹏 -->
                <div class="slot-content" style="transform:rotate(270deg)"><span class="beast-ico">🦅</span><span class="beast-txt">大鹏</span><span class="beast-mul">50X</span></div>
                <!-- 10点半：仙鹤 -->
                <div class="slot-content" style="transform:rotate(315deg)"><span class="beast-ico">🦢</span><span class="beast-txt">仙鹤</span><span class="beast-mul">20X</span></div>
            </div>
        </div>
    </div>

    <!-- 控制台还原 -->
    <div class="console">
        <div class="main-row">
            <div class="adj" onclick="changeBet(-0.5)">－</div>
            <button id="go_btn" class="exec" onclick="go()">开始执行</button>
            <div class="adj" onclick="changeBet(0.5)">＋</div>
        </div>
        <div class="tech-row">
            <div id="auto_btn" class="mode-b" onclick="toggleAuto()">🤖 自动模式: 关</div>
            <div id="speed_btn" class="mode-b" onclick="cycleSpeed()">⚡ 变速模式: 1X</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-n">行情</div>
        <div class="nav-n">资产中心</div>
        <div class="nav-n">历史记录</div>
        <div class="nav-n act">量化终端</div>
    </div>

        }

            if (busy) return;
