<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>量化终端 · 暗铸转盘</title>
    <style>
        :root { --mg: #14281d; --pn: #232d36; --rd: #c93434; --gd: #f0a04b; --bg: #071a10; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .app { flex: 1; display: flex; flex-direction: column; padding: 12px; gap: 15px; overflow-y: auto; padding-bottom: 100px; }

        /* 余额面板 - 严谨的小数点对齐 */
        .card { background: var(--pn); border-radius: 35px; padding: 10px; border: 3px solid var(--mg); box-shadow: 0 15px 30px #000; }
        .card-in { background: #232d36; border-radius: 28px; padding: 25px; text-align: center; box-shadow: inset 5px 8px 15px #000; background-image: linear-gradient(rgba(255,255,255,0.03) 1.5px, transparent 1.5px), linear-gradient(90deg, rgba(255,255,255,0.03) 1.5px, transparent 1.5px); background-size: 20px 20px; }
        .num { color: #ff5252; font-size: 72px; font-weight: bold; margin: 5px 0; letter-spacing: -3px; font-variant-numeric: tabular-nums; white-space: nowrap; }
        .sub { font-size: 14px; color: #8a969e; display: flex; align-items: center; justify-content: center; gap: 6px; }

        /* 转盘主模块 */
        .wh-box { background: var(--pn); border-radius: 40px; border: 3px solid var(--mg); padding: 40px 10px; position: relative; box-shadow: 0 20px 40px #000, inset 0 0 20px #000; display: flex; justify-content: center; background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 20px 20px; }
        .ptr { position: absolute; top: 15px; z-index: 100; width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 32px solid #ff3b30; filter: drop-shadow(0 5px 8px #000); }
        .wh-body { width: 270px; height: 270px; border-radius: 50%; background: #2d7053; border: 12px solid #141a1f; outline: 3px solid var(--mg); position: relative; box-shadow: 0 15px 50px #000; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        .x0 { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 88px; height: 88px; background: #141a1f; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ff5252; font-weight: bold; font-size: 30px; border: 4px solid var(--mg); z-index: 10; }
        
        .slt { position: absolute; width: 100%; height: 100%; text-align: center; transform-origin: 50% 50%; padding-top: 15px; }
        .slt i { font-style: normal; font-size: 34px; display: block; }
        .slt b { display: block; font-size: 11px; color: #fff; margin-top: -2px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        /* 操作按钮 */
        .btns { display: flex; gap: 15px; align-items: center; }
        .btn-s { width: 75px; height: 75px; background: var(--pn); border: 2.5px solid var(--mg); border-radius: 22px; color: var(--gd); font-size: 40px; box-shadow: 5px 8px 15px #000; cursor: pointer; }
        .btn-m { flex: 1; background: linear-gradient(180deg, #d33838, #8a1a1a); border: none; border-radius: 50px; height: 75px; color: white; font-size: 26px; font-weight: bold; box-shadow: 0 8px 0 #5e1111, 0 15px 30px rgba(0,0,0,0.5); cursor: pointer; }
        
        /* 切换按钮 */
        .opts { display: flex; gap: 12px; }
        .btn-o { flex: 1; height: 55px; background: var(--pn); border: 2.5px solid var(--mg); border-radius: 25px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; box-shadow: inset 2px 2px 5px #000; }

        /* 底部指示点 */
        .dots { display: flex; justify-content: center; gap: 8px; margin-top: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #2d3842; }
        .dot.active { background: #5c6b76; }

        /* 底部导航栏 - 1:1 严谨还原图中的图标与红色选中态 */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: #0d1210; border-top: 1px solid #1a2e24; display: flex; justify-content: space-around; align-items: center; padding-bottom: 15px; z-index: 1000; }
        .nav-a { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #8a969e; font-size: 12px; text-decoration: none; width: 25%; }
        .nav-a.active { color: #ff5252; }
        .ico { width: 26px; height: 26px; border-radius: 6px; background: #232d36; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-bottom: 2px; }
        .active .ico { background: rgba(255, 82, 82, 0.2); }
    </style>
</head>
<body>

<div class="app">
    <!-- 余额面板 -->
    <div class="card">
        <div class="card-in">
            <div class="sub"><span style="color:var(--gd)">💰</span> 可用余额 (USDT)</div>
            <div id="bal" class="num">146.8</div>
            <div class="sub">🔥 单注额度: <span id="bet-v" style="color:var(--gd); font-weight:bold">5.5</span></div>
        </div>
    </div>

    <!-- 转盘模块 -->
    <div class="wh-box">
        <div class="ptr"></div>
        <div id="plate" class="wh-body">
            <div class="x0">X0</div>
            <div class="slt" style="transform:rotate(0deg)"><i>🦢</i><b>仙鹤</b></div>
            <div class="slt" style="transform:rotate(45deg)"><i>🐺</i><b>孤狼</b></div>
            <div class="slt" style="transform:rotate(90deg)"><i>🐯</i><b>猛虎</b></div>
            <div class="slt" style="transform:rotate(135deg)"><i>🐢</i><b>玄武</b></div>
            <div class="slt" style="transform:rotate(180deg)"><i>🦌</i><b>麒麟</b></div>
            <div class="slt" style="transform:rotate(225deg)"><i>🐲</i><b>神龙</b></div>
            <div class="slt" style="transform:rotate(270deg)"><i>🔥</i><b>凤凰</b></div>
            <div class="slt" style="transform:rotate(315deg)"><i>🦅</i><b>大鹏</b></div>
        </div>
    </div>

    <!-- 底部五点指示器 -->
    <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <!-- 执行按钮 -->
    <div class="btns">
        <button class="btn-s" onclick="adj(-0.5)">−</button>
        <button id="draw-btn" class="btn-m" onclick="run()">▶ 执行抽取</button>
        <button class="btn-s" onclick="adj(0.5)">+</button>
    </div>

    <!-- 功能切换 -->
    <div class="opts">
        <button id="auto-btn" class="btn-o" onclick="auto()">🤖 自动模式: <span id="auto-s">关</span></button>
        <button id="sp-btn" class="btn-o" onclick="sp()">⚡ 变速: <span id="sp-v">1X</span></button>
    </div>
</div>

<!-- 底部固定导航 -->
<nav class="nav">
    <a href="#" class="nav-a"><div class="ico">📈</div>行情</a>
    <a href="#" class="nav-a"><div class="ico">💼</div>资产中心</a>
    <a href="#" class="nav-a"><div class="ico">📜</div>历史记录</a>
    <a href="#" class="nav-a active"><div class="ico">🎯</div>量化终端</a>
</nav>

<script>
    let B = 146.8, A = 5.5, R = 0, isAuto = false, S = 1, busy = false;

    function upd() {
        document.getElementById('bal').innerText = B.toFixed(1);
        document.getElementById('bet-v').innerText = A.toFixed(1);
    }

    function adj(v) { if(!busy) { A = Math.max(0.5, A + v); upd(); } }

    function auto() {
        isAuto = !isAuto;
        document.getElementById('auto-s').innerText = isAuto ? '开' : '关';
        if(isAuto && !busy) run();
    }

    function sp() { S = S === 1 ? 2 : 1; document.getElementById('sp-v').innerText = S + 'X'; }

    async function run() {
        if(busy || B < A) { isAuto = false; document.getElementById('auto-s').innerText = '关'; return; }
        busy = true; B -= A; upd();
        const p = document.getElementById('plate');
        const prize = Math.floor(Math.random() * 8) * 45;
        R += 1800 + (360 - (R % 360)) + (360 - prize);
        const dur = 5 / S;
        p.style.transition = `transform ${dur}s cubic-bezier(0.15, 0, 0.15, 1)`;
        p.style.transform = `rotate(${R}deg)`;
        setTimeout(() => {
            busy = false;
            // 简单中奖逻辑模拟
            if(Math.random() > 0.7) B += A * 2.5; 
            upd();
            if(isAuto) setTimeout(run, 800);
        }, (dur * 1000) + 200);
    }
</script>
</body>
</html>
