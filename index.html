<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_BEAST_ULTRA</title>
    <style>
        :root {
            --jade: #4a7c64; --jade-l: #6b9a85; --jade-d: #2c4a3b;
            --stone: #6b737e; --inner: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            --red: #ff4d4d; --blue: #3498db; --tiger: #e67e22; --tie: #9b59b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0c0c0c; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* 整体大外框 */
        .container-outer {
            width: 100vw; height: 100vh; max-width: 480px;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%;
            animation: outerNeonRotate 15s linear infinite;
            padding: 6px;
            border-radius: 18px;
            box-shadow: 0 0 50px rgba(255,255,255,0.6);
        }
        @keyframes outerNeonRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 内部容器 */
        .container {
            width: 100%; height: 100%;
            background: var(--jade);
            border-radius: 15px;
            display: flex; flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* 状态栏：全红色发光 */
        .header { height: 8%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 8px 12px; }
        .box { background: var(--stone); border: 2px solid var(--jade-d); box-shadow: var(--inner); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        .box span { font-size: 12px; color: var(--red); letter-spacing: 1px; font-weight: bold; 
            text-shadow: 0 0 8px var(--red), 0 0 15px rgba(255,77,77,0.5);
        }
        .box span:last-child { font-size: 20px; }

        /* 转盘区 */
        .wheel-area { 
            height: 38%; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: var(--stone); box-shadow: var(--inner); border: 3px solid var(--jade-d); 
            border-radius: 12px; margin: 4px 10px; padding: 10px 0;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
            position: relative;
        }
        /* 转盘旋转按钮 */
        .wheel-btn {
            width: 110px; height: 32px;
            background: linear-gradient(180deg, #e53935, #b71c1c);
            border: none; border-radius: 16px;
            color: #fff; font-size: 15px; font-weight: bold;
            margin-bottom: 8px;
            box-shadow: 0 3px 0 #7f0000, 0 0 10px var(--red);
            cursor: pointer;
        }
        .wheel-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #7f0000, 0 0 5px var(--red); }
        
        .ptr { position: absolute; top: 10px; z-index: 100; width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 28px solid var(--red); filter: drop-shadow(0 0 10px var(--red)); }
        
        /* 转盘外包圈 */
        .wheel-outer {
            width: 260px; height: 260px; border-radius: 50%;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 800% 800%;
            animation: wheelNeonFlash 6s linear infinite;
            padding: 6px;
            box-shadow: 0 0 40px rgba(255,255,255,0.6), inset 0 0 15px rgba(255,255,255,0.5);
            border: 2px solid #fff;
        }
        @keyframes wheelNeonFlash {
            0% { background-position: 0% 50%; filter: brightness(1); }
            50% { background-position: 100% 50%; filter: brightness(1.5); }
            100% { background-position: 0% 50%; filter: brightness(1); }
        }
        
        #wheel { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: var(--stone); position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1.1); 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8); border: 3px solid var(--jade-d);
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 12px 12px;
        }
        .slot { position: absolute; width: 100%; height: 100%; text-align: center; padding-top: 20px; transform-origin: 50% 50%; }
        .beast-ico { display: block; font-size: 36px; margin-bottom: 3px; filter: drop-shadow(0 0 10px rgba(255,77,77,0.6)); }
        .beast-nm { font-size: 13px; color: var(--red); font-weight: bold; text-shadow: 0 0 8px var(--red); }
        
        /* 转盘结果提示：全红色发光 */
        .wheel-result {
            margin-top: 10px; font-size: 16px; font-weight: bold;
            color: var(--red); text-shadow: 0 0 8px var(--red), 0 0 15px rgba(255,77,77,0.5);
        }

        /* 核心区：龙虎和押注 */
        .play-section {
            flex: 1; display: flex; flex-direction: column;
            background: var(--stone); box-shadow: var(--inner); border: 3px solid var(--jade-d); 
            border-radius: 12px; margin: 4px 10px 8px 10px; padding: 12px;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        /* 龙虎和布局：只保留大字 */
        .battle-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; height: 80px; margin-bottom: 10px; }
        .side-cell { 
            background: rgba(0,0,0,0.35); border: 3px solid var(--jade-d); border-radius: 14px; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.1s; box-shadow: var(--inner);
        }
        .side-cell.active { border-color: var(--red); background: rgba(255,77,77,0.1); transform: scale(0.97); box-shadow: 0 0 15px var(--red); }
        .side-cell span { font-size: 48px; font-weight: 900; }
        #cell-DRAGON span { color: var(--red); text-shadow: 0 0 15px var(--red); }
        #cell-TIGER span { color: var(--red); text-shadow: 0 0 15px var(--red); }
        #cell-TIE span { color: var(--red); text-shadow: 0 0 15px var(--red); }

        /* 数据区：全红色发光 */
        .data-stack { display: grid; grid-template-rows: repeat(3, 1fr); gap: 6px; margin: 0 6px; }
        .data-item { background: rgba(0,0,0,0.6); border: 2px solid var(--jade-d); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; }
        .data-item label, .data-item value { font-size: 12px; color: var(--red); font-weight: bold; 
            text-shadow: 0 0 8px var(--red), 0 0 15px rgba(255,77,77,0.5);
        }
        .data-item value { font-size: 18px; }

        /* 操作区：全红色发光 */
        .stake-txt { text-align: center; font-size: 16px; font-weight: bold; margin: 8px 0;
            color: var(--red); text-shadow: 0 0 8px var(--red), 0 0 15px rgba(255,77,77,0.5);
        }
        
        /* 第一排：加减+开始 */
        .exec-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .step-btn { width: 52px; height: 52px; background: var(--jade); border: 3px solid var(--red); border-radius: 10px; color: var(--red); font-size: 28px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 0 10px var(--red);
        }
        .main-go { flex: 1; height: 52px; background: linear-gradient(180deg, #e53935, #b71c1c); border: none; border-radius: 30px; color: #fff; font-size: 22px; font-weight: 900; letter-spacing: 2px; cursor: pointer; box-shadow: 0 5px 0 #7f0000, 0 0 15px var(--red); }
        .main-go:active { transform: translateY(2px); box-shadow: 0 1px 0 #7f0000, 0 0 8px var(--red); }
        
        /* 第二排：自动+三挡加速 */
        .mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mode-btn { height: 42px; background: rgba(0,0,0,0.4); border: 2px solid var(--red); border-radius: 8px; color: var(--red); font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            text-shadow: 0 0 8px var(--red); box-shadow: 0 0 10px var(--red);
        }
        .mode-btn.active { background: rgba(255,77,77,0.2); box-shadow: 0 0 15px var(--red); }
        /* 三挡加速单独样式 */
        .speed-btn { display: flex; gap: 8px; }
        .speed-btn span { width: 33%; height: 100%; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .speed-btn span.active { background: var(--red); color: #fff; text-shadow: 0 0 8px #fff; box-shadow: 0 0 10px var(--red); }
</style>
</head>
<body>

<div class="container-outer">
    <div class="container">
        <!-- 状态栏：全红色发光 -->
        <div class="header">
            <div class="box"><span>余额</span><span>857.80</span></div>
            <div class="box"><span>奖池</span><span>84291.50</span></div>
        </div>

        <!-- 转盘区 -->
        <div class="wheel-area">
            <button class="wheel-btn" onclick="rotateWheel()">转盘旋转</button>
            <div class="ptr"></div>
            <div class="wheel-outer">
                <div id="wheel"></div>
            </div>
            <!-- 转盘结果：全红色发光 -->
            <div class="wheel-result" id="wheel-result">状态：准备就绪</div>
        </div>

        <!-- 核心操作区 -->
        <div class="play-section">
            <!-- 龙虎和：全红色发光 -->
            <div class="battle-row">
                <div id="cell-DRAGON" class="side-cell" onclick="setPick('DRAGON')"><span>龙</span></div>
                <div id="cell-TIE" class="side-cell" onclick="setPick('TIE')"><span>和</span></div>
                <div id="cell-TIGER" class="side-cell" onclick="setPick('TIGER')"><span>虎</span></div>
            </div>

            <!-- 数据区：全红色发光 -->
            <div class="data-stack">
                <div class="data-item"><label>当前押注</label><value id="val-bet">0.00</value></div>
                <div class="data-item"><label>预计奖金</label><value id="val-win">0.00</value></div>
                <div class="data-item"><label>已选选项</label><value id="val-pick">未选择</value></div>
            </div>

            <!-- 押注金额提示：全红色发光 -->
            <div class="stake-txt">押注金额：<span id="ui-stake">100</span> USDT</div>
            
            <!-- 第一排操作键：全红色发光 -->
            <div class="exec-row">
                <button class="step-btn" onclick="adjustBet(-1)">-</button>
                <button class="main-go" onclick="executeBet()">确认投注</button>
                <button class="step-btn" onclick="adjustBet(1)">+</button>
            </div>

            <!-- 第二排功能键：全红色发光 -->
            <div class="mode-row">
                <div id="btn-auto" class="mode-btn" onclick="toggleAuto()">自动投注</div>
                <div class="mode-btn speed-btn" onclick="toggleSpeed()">
                    <span id="speed-1" class="active">1X</span>
                    <span id="speed-2">2X</span>
                    <span id="speed-3">3X</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const beasts = [
    {icon:'🦁', name:'狮子'}, {icon:'🐯', name:'猛虎'}, {icon:'🐺', name:'恶狼'}, {icon:'🦏', name:'犀牛'},
    {icon:'🐘', name:'巨象'}, {icon:'🐻', name:'黑熊'}, {icon:'🐲', name:'神龙'}, {icon:'🦅', name:'雄鹰'}
];

let state = {
    balance: 857.8,
    betLevels: [10, 50, 100, 500, 1000],
    currentBetIdx: 2,
    selected: null,
    wheelRolling: false,
    betRolling: false,
    autoMode: false,
    speed: 1
};

// 初始化转盘
function initWheel() {
    const wheel = document.getElementById('wheel');
    beasts.forEach((b, i) => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.style.transform = `rotate(${i * 45}deg)`;
        slot.innerHTML = `<div class="beast-ico">${b.icon}</div><div class="beast-nm">${b.name}</div>`;
        wheel.appendChild(slot);
    });
}

// 转盘独立旋转
function rotateWheel() {
    if(state.wheelRolling) { alert('转盘转动中，请稍后'); return; }
    
    state.wheelRolling = true;
    document.querySelector('.wheel-btn').disabled = true;
    document.getElementById('wheel-result').textContent = '状态：转盘转动中...';

    const winIdx = Math.floor(Math.random()*8);
    const spinRounds = state.speed === 3 ? 4 : 8;
    let wheelDeg = 0;
    const targetDeg = spinRounds * 360 - (winIdx * 45);
    
    const wheel = document.getElementById('wheel');
    wheel.style.transitionDuration = state.speed === 3 ? '0.8s' : state.speed === 2 ? '2s' : '4s';
    wheel.style.transform = `rotate(0deg)`;
    setTimeout(() => wheel.style.transform = `rotate(${targetDeg}deg)`, 50);

    setTimeout(() => {
        state.wheelRolling = false;
        document.querySelector('.wheel-btn').disabled = false;
        const winBeast = beasts[winIdx];
        document.getElementById('wheel-result').textContent = `开出：${winBeast.name} ${winBeast.icon}`;
    }, parseFloat(wheel.style.transitionDuration)*1000 + 50);
}

// 设置押注选项
function setPick(type) {
    if(state.betRolling) return;
    state.selected = type;
    document.querySelectorAll('.side-cell').forEach(c => c.classList.remove('active'));
    document.getElementById(`cell-${type}`).classList.add('active');
    document.getElementById('val-pick').textContent = type;
}

// 调整押注金额
function adjustBet(dir) {
    if(state.betRolling) return;
    state.currentBetIdx = Math.max(0, Math.min(state.betLevels.length-1, state.currentBetIdx + dir));
    document.getElementById('ui-stake').textContent = state.betLevels[state.currentBetIdx];
}

// 执行押注
function executeBet() {
    if(state.betRolling) { alert('押注处理中，请稍后'); return; }
    if(!state.selected) { alert('请先选择投注项'); return; }
    
    const betAmt = state.betLevels[state.currentBetIdx];
    if(state.balance < betAmt) { alert('余额不足'); return; }

    state.betRolling = true;
    state.balance -= betAmt;
    document.querySelector('.header .box span:last-child').textContent = state.balance.toFixed(2);
    document.getElementById('val-bet').textContent = betAmt.toFixed(2);
    
    const winAmt = betAmt * (state.selected === 'TIE' ? 8 : 1);
    document.getElementById('val-win').textContent = winAmt.toFixed(2);

    setTimeout(() => {
        state.betRolling = false;
        const winType = ['DRAGON','TIGER','TIE'][Math.floor(Math.random()*3)];
        
        if(winType === state.selected) {
            state.balance += winAmt;
            document.querySelector('.header .box span:last-child').textContent = state.balance.toFixed(2);
            document.getElementById(`cell-${winType}`).classList.add('winner');
            setTimeout(() => document.getElementById(`cell-${winType}`).classList.remove('winner'), 2000);
        }
        
        if(state.autoMode) setTimeout(executeBet, 1500);
    }, 1500);
}

// 切换自动模式
function toggleAuto() {
    state.autoMode = !state.autoMode;
    const btn = document.getElementById('btn-auto');
    btn.classList.toggle('active');
    btn.textContent = state.autoMode ? '关闭自动' : '自动投注';
}

// 切换速度（三挡可见切换）
function toggleSpeed() {
    state.speed = (state.speed % 3) + 1;
    document.querySelectorAll('.speed-btn span').forEach(s => s.classList.remove('active'));
    document.getElementById(`speed-${state.speed}`).classList.add('active');
}

// 初始化
window.onload = function() {
    initWheel();
};
</script>
</body>
</html>
