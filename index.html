<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>ULTIMATE_V30000_JILI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --green: #00ff88; --dark-green: #006633; --pink: #ff0055; --gold: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; }
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; }

        /* 背景：炫彩流光 */
        #bg-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .ui-root { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }

        /* 1. 顶部：钻石发光余额 (突出明显) */
        .header { margin-top: 40px; background: linear-gradient(180deg, #333, #000); border: 3px solid var(--neon); padding: 12px 60px; border-radius: 15px; box-shadow: 0 0 40px var(--neon), inset 0 0 15px var(--neon); display: flex; align-items: center; gap: 15px; }
        .bal-val { font-size: 65px; font-weight: 900; text-shadow: 0 0 20px var(--neon); }

        /* 2. 转盘区：机械精密感 */
        .stage { position: relative; width: 90vw; max-width: 420px; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; }
        .needle { position: absolute; top: -15px; width: 6px; height: 75px; background: #fff; box-shadow: 0 0 30px #fff; z-index: 100; border-radius: 3px; }

        .disk {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #333 0%, #000 75%);
            border: 5px solid #444; position: relative; overflow: hidden;
            box-shadow: 0 15px 60px rgba(0,0,0,0.9), inset 0 0 100px rgba(0,242,255,0.2);
            transition: transform 6.5s cubic-bezier(0.1, 0, 0, 1);
        }
        .item { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transform-origin: center; }
        .item b { position: absolute; top: 10%; font-size: 92px; filter: drop-shadow(0 10px 15px #000); }

        /* 🟢 JILI 风格 3D 绿色大按钮 (解决转盘不突出) */
        .spin-btn {
            position: absolute; width: 130px; height: 130px; border-radius: 50%;
            background: linear-gradient(180deg, var(--green) 0%, var(--dark-green) 100%);
            border: 7px solid #004422; color: #fff; font-size: 28px; font-weight: 900;
            display: flex; align-items: center; justify-content: center; z-index: 200;
            box-shadow: 0 12px 0 #002211, 0 25px 50px rgba(0,0,0,0.9);
            cursor: pointer; transition: 0.1s;
        }
        .spin-btn:active { transform: translateY(10px); box-shadow: 0 2px 0 #002211; }

        /* 3. 底部：重金属中控台 (解决按键不明显) */
        .panel {
            background: linear-gradient(180deg, #222 0%, #000 100%);
            width: 100%; padding: 30px 0 50px; border-top: 5px solid #333;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.8);
        }
        #msg { font-size: 32px; font-weight: 900; color: var(--gold); letter-spacing: 4px; text-shadow: 0 0 20px var(--gold); margin-bottom: 20px; }
        
        .ctrl-row { display: flex; align-items: center; gap: 55px; }
        
        /* 🔘 拟物化实体加减键 (白色高亮，绝对明显) */
        .btn-adj {
            width: 90px; height: 90px; border-radius: 18px;
            background: linear-gradient(180deg, #555, #222);
            border: 3px solid #666; color: #fff; font-size: 65px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 0 #000, 0 15px 25px rgba(0,0,0,0.8);
            cursor: pointer; transition: 0.1s; font-weight: 100;
        }
        .btn-adj:active { transform: translateY(6px); box-shadow: 0 2px 0 #000; color: var(--neon); }
        .bet-val { font-size: 100px; font-weight: 900; min-width: 170px; text-align: center; color: #fff; }

        /* DJ 共振闪烁 */
        .shake { animation: bass 0.05s infinite; filter: brightness(1.5) contrast(1.3); }
        @keyframes bass { 0%{transform:translate(4px,4px)} 50%{transform:translate(-4px,-4px)} }
    </style>
</head>
<body onclick="startCore()">
    <canvas id="bg-canvas"></canvas>
    <div class="ui-root" id="ui-core">
        <div class="header">
            <div style="font-size:50px">💎</div>
            <div class="bal-val" id="bal">1,000</div>
        </div>
        <div class="stage">
            <div class="needle"></div>
            <div id="disk" class="disk">
                <div class="item" style="transform:rotate(0deg)"><b>👑</b></div>
                <div class="item" style="transform:rotate(60deg)"><b>🦁</b></div>
                <div class="item" style="transform:rotate(120deg)"><b>🐯</b></div>
                <div class="item" style="transform:rotate(180deg)"><b>🦅</b></div>
                <div class="item" style="transform:rotate(240deg)"><b>🐺</b></div>
                <div class="item" style="transform:rotate(300deg)"><b>🐕</b></div>
            </div>
            <div class="spin-btn" onclick="go()">SPIN</div>
        </div>
        <div class="panel">
            <div id="msg">SYSTEM_ONLINE</div>
            <div class="ctrl-row">
                <div class="btn-adj" onclick="adj(-10)">-</div>
                <div class="bet-val" id="bet">1</div>
                <div class="btn-adj" onclick="adj(10)">+</div>
            </div>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let balance = 1000, bet = 1, rot = 0, active = false, audio;
        function startCore() {
            if(audio) return;
            audio = new (window.AudioContext || window.webkitAudioContext)();
            const cvs = document.getElementById('bg-canvas');
            const ctx = cvs.getContext('2d');
            cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            let p = [];
            for(let i=0; i<100; i++) p.push({x:Math.random()*cvs.width, y:Math.random()*cvs.height, s:Math.random()*2.5, c:`hsl(${Math.random()*360}, 100%, 75%)`});
            function draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,cvs.width, cvs.height);
                p.forEach(a => {
                    a.y += active ? 40 : 2; if(a.y > cvs.height) a.y = -20;
                    ctx.fillStyle = active ? '#fff' : a.c;
                    ctx.beginPath(); ctx.arc(a.x, a.y, active?a.s*2.5:a.s, 0, Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
        function playDJ(d) {
            if(!audio) return;
            const osc = audio.createOscillator(); const g = audio.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(45, audio.currentTime);
            osc.frequency.exponentialRampToValueAtTime(15, audio.currentTime + d);
            g.gain.setValueAtTime(0.5, audio.currentTime); g.gain.linearRampToValueAtTime(0, audio.currentTime + d);
            osc.connect(g); g.connect(audio.destination); osc.start(); osc.stop(audio.currentTime + d);
        }
        function adj(v) {
            if(active) return;
            bet = Math.max(1, Math.min(balance, bet + v));
            document.getElementById('bet').innerText = bet;
            tg.HapticFeedback.selectionChanged();
        }
        function go() {
            if(active || balance < bet) return;
            active = true; balance -= bet;
            document.getElementById('bal').innerText = balance.toLocaleString();
            document.getElementById('ui-core').classList.add('shake');
            document.getElementById('msg').innerText = "BASS_IGNITION";
            playDJ(6.5); tg.HapticFeedback.impactOccurred('heavy');
            let target = Math.floor(Math.random()*6);
            rot += (3600 + (360 - (target * 60)));
            document.getElementById('disk').style.transform = `rotate(${rot}deg)`;
            setTimeout(() => {
                document.getElementById('ui-core').classList.remove('shake');
                const multi = [88, 15, 10, 5, 2, 0];
                let win = Math.floor(bet * multi[target]);
                balance += win;
                document.getElementById('bal').innerText = balance.toLocaleString();
                document.getElementById('msg').innerText = win > 0 ? "WIN: +" + win : "LOST";
                tg.HapticFeedback.notificationOccurred(win > 0 ? 'success' : 'error');
                active = false;
            }, 6500);
        }
    </script>
</body>
</html>
