<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>金辉娱乐城 - 稳定完整版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: linear-gradient(145deg, #0a0f1e, #0c1222); font-family: system-ui, 'Segoe UI'; padding: 12px; min-height: 100vh; color: #ffecb3; }
        #app { max-width: 560px; margin: 0 auto; background: rgba(18,25,45,0.8); backdrop-filter: blur(12px); border-radius: 48px; border: 1px solid rgba(255,215,0,0.3); overflow: hidden; }
        .auth-panel { padding: 28px 20px; background: rgba(20,12,6,0.8); }
        .auth-panel h2, .auth-panel h3 { text-align: center; margin-bottom: 16px; background: linear-gradient(135deg, #ffd966, #ffaa33); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .auth-input { width: 100%; padding: 12px 16px; margin: 6px 0; background: rgba(0,0,0,0.6); border: 1px solid #ffaa33; border-radius: 40px; color: #ffd966; outline: none; }
        .flex-row { display: flex; gap: 10px; align-items: center; margin: 10px 0; }
        .code-btn, .auth-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; border-radius: 40px; padding: 12px; font-weight: bold; color: #2a1a0a; cursor: pointer; width: 100%; }
        .code-btn { width: auto; padding: 10px 18px; }
        hr { margin: 20px 0; border-color: #ffaa33; }
        .auth-note { font-size: 0.65rem; text-align: center; margin-top: 12px; color: #ffaa33; }
        .user-section { background: rgba(20,12,6,0.7); padding: 12px 16px; border-bottom: 1px solid #ffaa33; }
        .user-info-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        #userBalanceDisplay { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #ffd966, #ffaa33); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
        .btn-group { display: flex; gap: 6px; }
        .btn-sm { background: rgba(255,170,51,0.2); border: 1px solid #ffaa33; padding: 4px 12px; border-radius: 40px; cursor: pointer; font-size: 0.75rem; }
        .charge-btn, .withdraw-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; padding: 6px 16px; border-radius: 40px; color: #2a1a0a; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .lang-switch, .theme-switch { background: #ffaa33; border: none; border-radius: 30px; padding: 4px 10px; cursor: pointer; font-weight: bold; margin-left: 4px; }
        .game-nav { display: flex; flex-direction: column; gap: 12px; padding: 20px; }
        .game-card { background: rgba(20,12,6,0.7); backdrop-filter: blur(8px); border-radius: 32px; padding: 16px; border: 1px solid #ffaa33; }
        .chip { background: linear-gradient(145deg, #cc8800, #aa6600); display: inline-block; padding: 6px 12px; border-radius: 36px; margin: 3px; cursor: pointer; font-weight: bold; border: 1px solid #ffaa33; }
        .chip.selected { background: linear-gradient(135deg, #ffaa33, #ff884d); color: #2a1a0a; }
        .exec-btn { background: linear-gradient(135deg, #ffaa33, #ff884d); border: none; border-radius: 36px; padding: 8px 14px; color: #2a1a0a; font-weight: bold; cursor: pointer; margin: 3px; }
        .countdown-area { text-align: center; margin: 6px 0; background: rgba(0,0,0,0.5); border-radius: 40px; padding: 6px; font-weight: bold; }
        .fish-dice-cube, .dice-cube { width: 70px; height: 70px; background: #2a1e12; border: 2px solid #ffaa33; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 5px; }
        .fish-pattern-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin: 10px 0; }
        .fish-bet-card, .bet-card { background: rgba(0,0,0,0.5); border-radius: 16px; padding: 6px; text-align: center; border: 1px solid #ffaa33; cursor: pointer; }
        .points-grid, .trio-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(58px,1fr)); gap: 6px; margin: 10px 0; }
        .history-cell { width: 32px; height: 32px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; background: rgba(255,170,51,0.2); margin: 2px; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #2a1e12; border-radius: 36px; padding: 20px; max-width: 90%; color: #ffd966; border: 1px solid #ffaa33; text-align: center; }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2a1a0a; padding: 6px 16px; border-radius: 40px; z-index: 2000; white-space: nowrap; border: 1px solid #ffaa33; }
        .result-popup { position: fixed; bottom: 40%; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg,#ffaa33,#ff884d); color: #2a1a0a; padding: 10px 24px; border-radius: 50px; font-weight: bold; z-index: 1500; }
        .floating-number { position: fixed; font-size: 1.4rem; font-weight: bold; color: #ff3300; text-shadow: 0 0 5px #ffaa33; pointer-events: none; z-index: 3000; animation: floatUp 0.8s forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0px) scale(0.8); } 100% { opacity: 0; transform: translateY(-70px) scale(0.9); } }
        .win-flash { animation: redFlash 0.5s 2; }
        @keyframes redFlash { 0% { background-color: rgba(255,50,50,0); } 30% { background-color: rgba(255,30,30,0.9); transform: scale(1.02); } 100% { background-color: rgba(255,50,50,0); } }
        .number-flash { animation: numberBlink 0.4s 3; display: inline-block; }
        @keyframes numberBlink { 0% { color: #ffd966; transform: scale(1); } 50% { color: #ff3300; transform: scale(1.3); } 100% { color: #ffd966; transform: scale(1); } }
        .balance-bling { animation: balanceGlow 0.4s 3; }
        @keyframes balanceGlow { 0% { text-shadow: 0 0 0px; } 50% { text-shadow: 0 0 12px #ff5500; } }
        .niu-hand { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; min-height: 85px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 20px; margin: 8px 0; }
        .simple-card { background: white; width: 55px; height: 75px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; color: #333; box-shadow: 0 2px 6px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .simple-card[data-suit="♥"], .simple-card[data-suit="♦"] { color: #c33; }
        .dt-card { background: white; width: 65px; height: 85px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; transition: transform 0.3s; }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== 全局存储 ====================
    const STORAGE = { users: 'jinhui_users_final', recharge: 'jinhui_recharge_final', withdraw: 'jinhui_withdraw_final', config: 'jinhui_config_final' };
    let systemConfig = { bankerBalance: 200000, adjustFactor: 0.98 };
    function loadConfig() { let s = localStorage.getItem(STORAGE.config); if(s) systemConfig = JSON.parse(s); else localStorage.setItem(STORAGE.config, JSON.stringify(systemConfig)); }
    function saveConfig() { localStorage.setItem(STORAGE.config, JSON.stringify(systemConfig)); }
    function loadUsers() { let u = localStorage.getItem(STORAGE.users); if(!u) { let init = [{ account: "admin", password: "admin888", balance: 0, register_time: new Date().toLocaleString(), records: [], result_history: [] }]; localStorage.setItem(STORAGE.users, JSON.stringify(init)); return init; } return JSON.parse(u); }
    function saveUsers(users) { localStorage.setItem(STORAGE.users, JSON.stringify(users)); }
    let currentUser = null;

    function updateBalance(account, newBal) {
        let users = loadUsers();
        let idx = users.findIndex(u => u.account === account);
        if(idx !== -1) {
            users[idx].balance = newBal;
            saveUsers(users);
            if(currentUser && currentUser.account === account) currentUser.balance = newBal;
            let span = document.getElementById("userBalanceDisplay");
            if(span) span.innerText = newBal.toFixed(2);
        }
    }

    function showToast(msg, isErr=false) {
        let t=document.createElement('div'); t.className='toast-message'; t.innerText=msg;
        t.style.borderLeftColor=isErr?'#ff6b6b':'#ffaa33';
        document.body.appendChild(t);
        setTimeout(()=>t.remove(),3000);
    }

    async function gameSettle(totalBet, winAmount) {
        if(!currentUser) return false;
        if(currentUser.balance < totalBet) { showToast("余额不足", true); return false; }
        let bankerDelta = totalBet - winAmount;
        let newBanker = systemConfig.bankerBalance + bankerDelta;
        if(newBanker < 0) { showToast("平台资金池临时短缺", true); return false; }
        systemConfig.bankerBalance = newBanker; saveConfig();
        let newBal = currentUser.balance - totalBet + winAmount;
        updateBalance(currentUser.account, newBal);
        let balSpan = document.getElementById("userBalanceDisplay");
        if(balSpan) { balSpan.classList.remove('balance-bling'); setTimeout(()=>balSpan.classList.add('balance-bling'), 10); setTimeout(()=>balSpan.classList.remove('balance-bling'), 600); }
        return true;
    }

    function flashWinElement(el, winAmount) {
        if(!el) return;
        el.classList.remove('win-flash');
        void el.offsetWidth;
        el.classList.add('win-flash');
        setTimeout(() => el.classList.remove('win-flash'), 500);
        let amountSpan = el.querySelector('span');
        if(amountSpan) {
            amountSpan.classList.remove('number-flash');
            void amountSpan.offsetWidth;
            amountSpan.classList.add('number-flash');
            setTimeout(() => amountSpan.classList.remove('number-flash'), 500);
        }
        let rect = el.getBoundingClientRect();
        let div = document.createElement('div');
        div.className = 'floating-number';
        div.innerText = `+${winAmount.toFixed(2)}`;
        div.style.left = (rect.left + rect.width/2 - 30) + 'px';
        div.style.top = (rect.top - 10) + 'px';
        document.body.appendChild(div);
        setTimeout(()=> div.remove(), 900);
    }

    function applyRecharge() { let amt = parseFloat(prompt("充值金额（USDT）:", "100")); if(isNaN(amt)||amt<=0) return showToast("金额无效"); let orders = JSON.parse(localStorage.getItem(STORAGE.recharge)||'[]'); orders.push({id:Date.now(), account:currentUser.account, amount:amt, status:'pending', time:new Date().toLocaleString()}); localStorage.setItem(STORAGE.recharge, JSON.stringify(orders)); showToast(`充值申请已提交，等待管理员审核`); }
    function applyWithdraw() { let amt = parseFloat(prompt("提现金额（USDT）:", "10")); if(isNaN(amt)||amt<=0) return showToast("金额无效"); if(currentUser.balance<amt) return showToast("余额不足",true); let addr = prompt("USDT收款地址"); if(!addr) return; let orders = JSON.parse(localStorage.getItem(STORAGE.withdraw)||'[]'); orders.push({id:Date.now(), account:currentUser.account, amount:amt, address:addr, status:'pending', time:new Date().toLocaleString()}); localStorage.setItem(STORAGE.withdraw, JSON.stringify(orders)); showToast(`提现申请已提交`); }
    function showServiceModal() { alert("客服微信: jinhui_cs_888"); }

    function openAdminModal() {
        let pwd = prompt("管理员密码:");
        if(pwd !== "admin888") { showToast("密码错误", true); return; }
        let users = loadUsers();
        let rechargeOrders = JSON.parse(localStorage.getItem(STORAGE.recharge)||'[]');
        let withdrawOrders = JSON.parse(localStorage.getItem(STORAGE.withdraw)||'[]');
        let pendingRecharges = rechargeOrders.filter(o=>o.status==='pending');
        let pendingWithdraws = withdrawOrders.filter(o=>o.status==='pending');
        let modalDiv = document.createElement('div'); modalDiv.className='modal';
        modalDiv.innerHTML = `<div class="modal-content" style="max-width:680px;"><h3>🎛️ 管理员后台</h3><div>🏦 庄家资金池: ${systemConfig.bankerBalance.toFixed(2)} USDT <button id="addBankerBtn" class="exec-btn" style="margin:4px;">➕注入</button> 赔付系数: <input id="factorInput" type="number" step="0.01" value="${systemConfig.adjustFactor}" style="width:80px;"> <button id="saveFactorBtn" class="exec-btn">保存</button></div><hr><div><strong>📥 充值审核</strong><div id="rechargeList" style="max-height:150px; overflow:auto;"></div></div><div><strong>📤 提现审核</strong><div id="withdrawList" style="max-height:150px; overflow:auto;"></div></div><div><strong>👥 用户管理</strong><select id="userSelect">${users.map(u=>`<option value="${u.account}">${u.account} (余额 ${u.balance.toFixed(2)})</option>`).join('')}</select><input id="amountInput" placeholder="金额" type="number" style="width:100px;"> <button id="addBalanceBtn" class="exec-btn">➕上分</button> <button id="subBalanceBtn" class="exec-btn">➖下分</button></div><button id="closeAdminBtn" class="auth-btn" style="margin-top:16px;">关闭</button></div>`;
        document.body.appendChild(modalDiv);
        function refreshRecharge(){
            let container = modalDiv.querySelector('#rechargeList');
            if(pendingRecharges.length===0){ container.innerHTML='<div>无待审核充值</div>'; return; }
            container.innerHTML = pendingRecharges.map(o=>`<div>${o.account} 充值 ${o.amount} USDT <button class="exec-btn approveRecharge" data-id="${o.id}">✅确认</button> <button class="exec-btn rejectRecharge" data-id="${o.id}">❌拒绝</button></div>`).join('');
            document.querySelectorAll('.approveRecharge').forEach(btn=>{
                btn.onclick = () => {
                    let id = parseInt(btn.dataset.id);
                    let order = rechargeOrders.find(o=>o.id===id);
                    if(order && order.status==='pending'){
                        let user = users.find(u=>u.account===order.account);
                        if(user){ user.balance += order.amount; saveUsers(users); order.status='approved'; localStorage.setItem(STORAGE.recharge, JSON.stringify(rechargeOrders)); showToast(`已充值 ${order.amount} USDT`); modalDiv.remove(); openAdminModal(); }
                    }
                };
            });
            document.querySelectorAll('.rejectRecharge').forEach(btn=>{
                btn.onclick = () => {
                    let id = parseInt(btn.dataset.id);
                    let order = rechargeOrders.find(o=>o.id===id);
                    if(order){ order.status='rejected'; localStorage.setItem(STORAGE.recharge, JSON.stringify(rechargeOrders)); showToast(`已拒绝`); modalDiv.remove(); openAdminModal(); }
                };
            });
        }
        function refreshWithdraw(){
            let container = modalDiv.querySelector('#withdrawList');
            if(pendingWithdraws.length===0){ container.innerHTML='<div>无待处理提现</div>'; return; }
            container.innerHTML = pendingWithdraws.map(o=>`<div>${o.account} 提现 ${o.amount} USDT <button class="exec-btn approveWithdraw" data-id="${o.id}">✅已打款</button> <button class="exec-btn rejectWithdraw" data-id="${o.id}">❌拒绝</button></div>`).join('');
            document.querySelectorAll('.approveWithdraw').forEach(btn=>{
                btn.onclick = () => {
                    let id = parseInt(btn.dataset.id);
                    let order = withdrawOrders.find(o=>o.id===id);
                    if(order && order.status==='pending'){
                        let user = users.find(u=>u.account===order.account);
                        if(user && user.balance >= order.amount){ user.balance -= order.amount; saveUsers(users); order.status='approved'; localStorage.setItem(STORAGE.withdraw, JSON.stringify(withdrawOrders)); showToast(`已处理提现 ${order.amount} USDT`); modalDiv.remove(); openAdminModal(); }
                        else showToast("用户余额不足", true);
                    }
                };
            });
            document.querySelectorAll('.rejectWithdraw').forEach(btn=>{
                btn.onclick = () => {
                    let id = parseInt(btn.dataset.id);
                    let order = withdrawOrders.find(o=>o.id===id);
                    if(order){ order.status='rejected'; localStorage.setItem(STORAGE.withdraw, JSON.stringify(withdrawOrders)); showToast(`已拒绝`); modalDiv.remove(); openAdminModal(); }
                };
            });
        }
        refreshRecharge(); refreshWithdraw();
        modalDiv.querySelector('#addBankerBtn').onclick = () => { let amt = parseFloat(prompt("注入金额:")); if(!isNaN(amt) && amt>0){ systemConfig.bankerBalance += amt; saveConfig(); showToast(`庄家池 +${amt}`); modalDiv.remove(); openAdminModal(); } };
        modalDiv.querySelector('#saveFactorBtn').onclick = () => { let val = parseFloat(modalDiv.querySelector('#factorInput').value); if(!isNaN(val) && val>=0.5 && val<=1.5){ systemConfig.adjustFactor = val; saveConfig(); showToast(`系数已设为 ${val}`); modalDiv.remove(); openAdminModal(); } else showToast("系数范围0.5~1.5", true); };
        modalDiv.querySelector('#addBalanceBtn').onclick = () => { let acc = modalDiv.querySelector('#userSelect').value; let amt = parseFloat(modalDiv.querySelector('#amountInput').value); if(isNaN(amt) || amt<=0) return showToast("金额无效"); let user = users.find(u=>u.account===acc); if(user){ user.balance += amt; saveUsers(users); if(currentUser && currentUser.account===acc) currentUser.balance = user.balance; showToast(`给 ${acc} 上分 ${amt}`); modalDiv.remove(); openAdminModal(); } };
        modalDiv.querySelector('#subBalanceBtn').onclick = () => { let acc = modalDiv.querySelector('#userSelect').value; let amt = parseFloat(modalDiv.querySelector('#amountInput').value); if(isNaN(amt) || amt<=0) return showToast("金额无效"); let user = users.find(u=>u.account===acc); if(user && user.balance >= amt){ user.balance -= amt; saveUsers(users); if(currentUser && currentUser.account===acc) currentUser.balance = user.balance; showToast(`给 ${acc} 下分 ${amt}`); modalDiv.remove(); openAdminModal(); } else showToast("余额不足", true); };
        modalDiv.querySelector('#closeAdminBtn').onclick = () => modalDiv.remove();
    }

    function login(account, password) {
        let users=loadUsers();
        let u=users.find(u=>u.account===account);
        if(!u) return {success:false,msg:"账号不存在"};
        if(u.password!==password) return {success:false,msg:"密码错误"};
        currentUser=u;
        localStorage.setItem('curr_acc',account);
        return {success:true,msg:"登录成功"};
    }
    function register(account,password,code) {
        let valid=["VIP666","888VIP","GOLD2025","LUCKY8","DICE100"];
        if(!valid.includes(code)) return {success:false,msg:"推荐码无效"};
        let users=loadUsers();
        if(users.find(u=>u.account===account)) return {success:false,msg:"账号已存在"};
        users.push({account,password,balance:0,register_time:new Date().toLocaleString(),records:[],result_history:[]});
        saveUsers(users);
        return {success:true,msg:"注册成功"};
    }

    // ==================== 鱼虾蟹游戏（稳定版）====================
    let fishDestroy = null;
    function initFishGame(container) {
        if(fishDestroy) fishDestroy();
        container.innerHTML = `<div class="game-card"><div style="display:flex; gap:8px;"><div style="flex:1;">💰 余额<div id="fishMyBalance">0</div></div><div style="flex:1;">🎲 总押注<div id="fishTotalBet">0</div></div><div style="flex:1;">🏆 上局净利<div id="fishLastWin">0</div></div></div><div class="countdown-area" id="fishPhaseHint">🎲 下注阶段 · 25秒</div><div id="fishChips"><span class="chip" data-chip="10">10</span><span class="chip" data-chip="50">50</span><span class="chip selected" data-chip="100">100</span><span class="chip" data-chip="500">500</span><span class="chip" data-chip="1000">1000</span></div><div><button id="fishClearBtn" class="exec-btn">清空</button><button id="fishRepeatBtn" class="exec-btn">续押</button><button id="fishGrabBtn" class="exec-btn">抢庄</button></div><div><div id="fishDice0" class="fish-dice-cube">🐟</div><div id="fishDice1" class="fish-dice-cube">🦐</div><div id="fishDice2" class="fish-dice-cube">🦀</div></div><div><strong>单选押注</strong></div><div id="fishPatternGrid" class="fish-pattern-grid"></div><div><strong>双押组合</strong></div><div id="fishDoubleGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;"></div><button id="fishRecordBtn" class="exec-btn">📜 记录</button></div>`;
        const patternNames = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        const patternEmojis = ["🐟","🦐","🦀","🎃","💰","🐔"];
        const doubleCombos = [["鱼","虾"],["鱼","蟹"],["鱼","葫芦"],["鱼","金钱"],["鱼","鸡"],["虾","蟹"],["虾","葫芦"],["虾","金钱"],["虾","鸡"],["蟹","葫芦"],["蟹","金钱"],["蟹","鸡"],["葫芦","金钱"],["葫芦","鸡"],["金钱","鸡"]];
        let fishDice = [document.getElementById('fishDice0'),document.getElementById('fishDice1'),document.getElementById('fishDice2')];
        let patternBets={鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0};
        let doubleBets={}; doubleCombos.forEach(c=>doubleBets[c.join(',')]=0);
        let currentChip=100, isGrabbed=false, gameRecords=[], isRolling=false, roundActive=true, countdownTimer=null, lastWinAmount=0;
        let lastRoundBets = { patternBets: JSON.parse(JSON.stringify(patternBets)), doubleBets: JSON.parse(JSON.stringify(doubleBets)) };
        function updateFishUI(){
            for(let p in patternBets){ let sp=document.getElementById(`fishBet_${p}`); if(sp) sp.innerText=patternBets[p]; }
            for(let c of doubleCombos){ let key=c.join(','); let sp=document.getElementById(`doubleBet_${key.replace(/,/g,'_')}`); if(sp) sp.innerText=doubleBets[key]; }
            let total=Object.values(patternBets).reduce((a,b)=>a+b,0)+Object.values(doubleBets).reduce((a,b)=>a+b,0);
            document.getElementById('fishTotalBet').innerText=total;
            document.getElementById('fishLastWin').innerText=lastWinAmount;
            document.getElementById('fishMyBalance').innerText=currentUser?currentUser.balance.toFixed(2):'0';
        }
        function saveCurrentBetsAsLastRound() { lastRoundBets = { patternBets: JSON.parse(JSON.stringify(patternBets)), doubleBets: JSON.parse(JSON.stringify(doubleBets)) }; }
        async function repeatLastBet(){ let total=0; for(let p in lastRoundBets.patternBets) total+=lastRoundBets.patternBets[p]; for(let k in lastRoundBets.doubleBets) total+=lastRoundBets.doubleBets[k]; if(total===0){ showToast("上局没有押注记录"); return; } if(total>currentUser.balance){ showToast("余额不足，无法续押"); return; } let currentTotal=0; for(let p in patternBets) currentTotal+=patternBets[p]; for(let k in doubleBets) currentTotal+=doubleBets[k]; if(currentTotal>0) await gameSettle(-currentTotal,0); patternBets=JSON.parse(JSON.stringify(lastRoundBets.patternBets)); doubleBets=JSON.parse(JSON.stringify(lastRoundBets.doubleBets)); await gameSettle(total,0); updateFishUI(); showToast(`续押成功，共 ${total} USDT`); }

            let code = Math.floor(100000 + Math.random() * 900000);
            window.tempCode = { acc, code, expire: Date.now() + 5*60*1000 };
            alert(`【验证码】您的验证码是：${code}，5分钟内有效。`);
            showToast("验证码已发送");
        };
        document.getElementById('registerBtn').onclick = () => {
            let acc = document.getElementById('regAccount').value.trim();
            let code = document.getElementById('regCode').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let ref = document.getElementById('regReferral').value.trim().toUpperCase();
            if (!acc || !code || !pwd || !ref) { showToast("请填写完整信息", true); return; }
            if (!['VIP666','888VIP','GOLD2025','LUCKY8','DICE100'].includes(ref)) { showToast("推荐码无效", true); return; }
            if (!window.tempCode || window.tempCode.acc !== acc || window.tempCode.code != code || Date.now() > window.tempCode.expire) { showToast("验证码错误或已过期", true); return; }
            if (pwd.length < 4) { showToast("密码至少4位", true); return; }
            let res = register(acc, pwd, ref);
            if (res.success) { showToast("注册成功！请登录"); document.getElementById('regAccount').value = ''; document.getElementById('regCode').value = ''; document.getElementById('regPassword').value = ''; document.getElementById('regReferral').value = ''; }
            else showToast(res.msg, true);
        };
    }

    loadConfig();
    let savedUser = localStorage.getItem('curr_acc');
    if (savedUser) {
        let users = loadUsers();
        let u = users.find(u=>u.account===savedUser);
        if (u) { currentUser = u; renderGameLobby(); }
        else renderAuthUI();
    } else renderAuthUI();
</script>
</body>
</html>
