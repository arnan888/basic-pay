<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_ULTIMATE_STABLE</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#22c55e; background-image:radial-gradient(circle at 50% 50%,#4ade80 0%,#15803d 100%); color:#FFF; font-family:sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
        
        /* 优化点缀：改用 opacity 替代模糊滤镜，极大提升性能 */
        .glow-red { position:absolute; width:6px; height:6px; background:#f00; border-radius:50%; z-index:1; opacity:0.6; pointer-events:none; }
        .status-bar { background:rgba(0,0,0,.5); height:24px; display:flex; align-items:center; justify-content:center; font-size:10px; z-index:10; }
        
        .core { flex:1; display:flex; flex-direction:column; align-items:center; padding:15px; gap:12px; z-index:5; }
        .panel { width:100%; background:#080a09; border-radius:18px; box-shadow:inset 0 0 20px #000, 0 0 0 2px #000; border:1px solid #1a2f23; position:relative; }
        
        .bal-card { padding:20px; text-align:center; }
        .bal-val { font-size:55px; font-weight:900; color:#ef4444; }
        
        .wheel-well { width:100%; max-width:320px; aspect-ratio:1; display:flex; align-items:center; justify-content:center; }
        .pointer { position:absolute; top:2px; left:50%; transform:translateX(-50%); width:6px; height:48px; background:#ef4444; z-index:100; border-radius:0 0 4px 4px; box-shadow:0 0 10px #ef4444; }
        
        /* 关键：使用 transform-style 提升硬件加速 */
        .wheel-outer { width:86%; height:86%; border-radius:50%; border:8px solid #000; background:#050807; transition:transform 4s cubic-bezier(0.2, 0, 0, 1.15); transform:translateZ(0); will-change:transform; position:relative; overflow:hidden; }
        
        .center-val { position:absolute; z-index:10; width:70px; height:70px; background:#0d1110; border-radius:50%; border:2px solid #222; display:flex; align-items:center; justify-content:center; color:#ef4444; font-size:22px; font-weight:900; }
        
        .slot { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; padding-top:10px; transition:0.2s; }
        .slot.locked { transform:scale(0.85); background:rgba(255,0,0,0.1); } /* 压住感反馈 */

        .console { width:100%; background:#0d1110; padding:15px 15px 80px; border-radius:20px 20px 0 0; border-top:3px solid #000; z-index:100; }
        .row { display:flex; gap:10px; margin-bottom:10px; }
        .btn-adj { width:60px; height:55px; background:#080a09; border:1px solid #1a1a1a; color:#fff; font-size:30px; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .btn-go { flex:1; height:55px; background:#991b1b; border:1px solid #450a0a; color:#fff; font-size:20px; font-weight:900; border-radius:10px; cursor:pointer; }
        .btn-mode { flex:1; padding:12px; background:#080a09; border:1px solid #1a1a1a; color:#fff; font-size:12px; border-radius:8px; text-align:center; cursor:pointer; }
        .btn-mode.on { color:#ef4444; border-color:#991b1b; }
        
        .nav { position:fixed; bottom:0; width:100%; height:70px; background:#000; display:grid; grid-template-columns:repeat(4,1fr); z-index:200; }
        .nav-n { display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:10px; color:#fff; opacity:.5; }
        .nav-n.act { opacity:1; color:#ef4444; }
    </style>
</head>
<body>
    <div class="glow-red" style="top:5%; left:10%"></div>
    <div class="glow-red" style="bottom:20%; right:10%"></div>
    
    <div class="status-bar">● SYSTEM_STABLE_V4 ●</div>
    
    <div class="core">
        <div class="panel bal-card">
            <div style="font-size:10px; opacity:.8">BALANCE (USDT)</div>
            <div class="bal-val" id="ui_bal">100.3</div>
            <div style="font-size:11px">BET: <span id="ui_bet" style="color:#ef4444">0.5</span></div>
        </div>

        <div class="panel wheel-well">
            <div class="pointer"></div>
            <div class="center-val" id="center_val">X0</div>
            <div id="ui_wheel" class="wheel-outer">
                <!-- 图案 -->
                <div class="slot" style="transform:rotate(0deg)"><span>🐲</span><small>神龙</small></div>
                <div class="slot" style="transform:rotate(45deg)"><span>🐯</span><small>猛虎</small></div>
                <div class="slot" style="transform:rotate(90deg)"><span>🦅</span><small>苍鹰</small></div>
                <div class="slot" style="transform:rotate(135deg)"><span>🦄</span><small>麒麟</small></div>
                <div class="slot" style="transform:rotate(180deg)"><span>🔥</span><small>凤凰</small></div>
                <div class="slot" style="transform:rotate(225deg)"><span>🐺</span><small>贪狼</small></div>
                <div class="slot" style="transform:rotate(270deg)"><span>🐢</span><small>玄武</small></div>
                <div class="slot" style="transform:rotate(315deg)"><span>🦁</span><small>狂狮</small></div>
            </div>
        </div>
    </div>

    <div class="console">
        <div class="row">
            <div class="btn-adj" onclick="changeBet(-0.5)">-</div>
            <button class="btn-go" id="main_go" onclick="go()">开始执行</button>
            <div class="btn-adj" onclick="changeBet(0.5)">+</div>
        </div>
        <div class="row">
            <div id="auto_btn" class="btn-mode" onclick="toggleAuto()">🤖 自动: 关</div>
            <div id="speed_btn" class="btn-mode" onclick="cycleSpeed()">⚡ 1X</div>
        </div>
    </div>

    <div class="nav"><div class="nav-n">行情</div><div class="nav-n">资产</div><div class="nav-n">历史</div><div class="nav-n act">量化</div></div>

    <script>
        let balance=100.3, bet=0.5, rot=0, busy=false, isAuto=false, speed=1;
        const multis=[500,88,50,200,150,10,0,30], names=["X500","X88","X50","X200","X150","X10","X0","X30"];

        function toggleAuto(){ 
            isAuto=!isAuto; 
            document.getElementById('auto_btn').classList.toggle('on',isAuto); 
            document.getElementById('auto_btn').innerText=`🤖 自动: ${isAuto?'开':'关'}`; 
            if(isAuto && !busy) go(); 
        }

        function cycleSpeed(){ 
            speed=(speed%3)+1; 
            document.getElementById('speed_btn').innerText=`⚡ ${speed}X`; 
            document.getElementById('ui_wheel').style.transitionDuration=["","4s","1s","0.3s"][speed]; 
        }

        function changeBet(v){ if(!busy){ bet=Math.max(0.5,bet+v); document.getElementById('ui_bet').innerText=bet.toFixed(1); }}

        function go(){
            if(busy || balance < bet) { isAuto=false; return; }
            busy = true;
            
            // 清除旧锁
            const slots = document.querySelectorAll('.slot');
            slots.forEach(s => s.classList.remove('locked'));

            // 算法锁定 (利益压制)
            const r = Math.random()*100;
            const idx = (r < 65) ? 6 : (r < 85 ? 5 : (r < 95 ? 7 : 1));

            // 转动
            rot += 360 * 5 + (360 - idx * 45 - (rot % 360));
            document.getElementById('ui_wheel').style.transform = `rotate(${rot}deg)`;

            const wait = ["", 4000, 1000, 300][speed];
            setTimeout(() => {
                // 物理死锁效果
                slots[idx].classList.add('locked');
                
                // 数值结算
                balance = balance - bet + multis[idx] * bet;
                document.getElementById('ui_bal').innerText = balance.toFixed(1);
                document.getElementById('center_val').innerText = names[idx];

                setTimeout(() => {
                    busy = false;
                    if(isAuto) go();
                }, 400);
            }, wait);
        }
    </script>
</body>
</html>
