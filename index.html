        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } }
        .pip { width: 12px; height: 12px; background: #2d1f0c; border-radius: 50%; margin: 3px; box-shadow: inset 0 1px 2px #aa7744; }
        .pip-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }

        .pip-bl { position: absolute; bottom: 8px; left: 8px; }

        .pip-r1, .pip-r2, .pip-r3 { position: absolute; right: 6px; }
        .pip-r1 { top: 6px; }
        .pip-r2 { top: 50%; transform: translateY(-50%); }
        .pip-r3 { bottom: 6px; }

        }
    };
    let currentLang = 'zh';
    function t(key) { return lang[currentLang][key] || lang.zh[key] || key; }

    // 全局数据
    let systemBankerBalance = localStorage.getItem('system_banker_balance') ? parseFloat(localStorage.getItem('system_banker_balance')) : 50000;
    let adjustFactor = localStorage.getItem('adjustFactor') ? parseFloat(localStorage.getItem('adjustFactor')) : 1.0;
    let validReferralCodes = ["VIP666", "888VIP", "GOLD2025", "LUCKY8", "DICE100"];
    let usersData = JSON.parse(localStorage.getItem('dice_users')) || {};
    let currentUser = null;
    let withdrawRecords = JSON.parse(localStorage.getItem('withdraw_records')) || [];

    function saveUsers() { localStorage.setItem('dice_users', JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 0) : 0; }
    function setUserBalance(amount) {
        if (!currentUser) return;
        usersData[currentUser.phone].balance = Math.max(0, amount);
        saveUsers();
        let balSpan = document.getElementById("userBalanceDisplay");
        if (balSpan) balSpan.innerText = getUserBalance().toFixed(2);
    }
    function showToast(msg) {
        let tDiv = document.createElement('div'); tDiv.className = 'toast-message'; tDiv.textContent = msg;
        document.body.appendChild(tDiv);
        setTimeout(() => tDiv.remove(), 2000);
    }
    function updateAllBalance() {
        let balSpan = document.getElementById("userBalanceDisplay");
        if (balSpan) balSpan.innerText = getUserBalance().toFixed(2);
    }
    // 充值：1元 = 1000文
    function recharge() {
        let yuan = prompt(t('rechargeTitle') + "\n" + t('rechargeRate'), "10");
        if (!yuan) return;
        let yuanNum = parseFloat(yuan);
        if (isNaN(yuanNum) || yuanNum <= 0) { showToast("请输入正数"); return; }
        let addAmount = yuanNum * 1000;
        setUserBalance(getUserBalance() + addAmount);
        showToast(`${t('recharge')} +${addAmount.toFixed(0)} ${currentLang==='zh'?'文':'บาท'}`);
        updateAllBalance();
    }
    function withdraw() {
        let bal = getUserBalance();
        if (bal <= 0) { showToast(t('balance') + " " + (currentLang==='zh'?'不足':'ไม่เพียงพอ')); return; }
        let wen = prompt(t('withdrawTitle') + "\n" + t('withdrawRate'), "100");
        if (!wen) return;
        let wenNum = parseFloat(wen);
        if (isNaN(wenNum) || wenNum <= 0 || wenNum > bal) { showToast("金额无效"); return; }
        let yuan = wenNum / 1000;
        let type = confirm(t('withdrawType') + "：\n" + (currentLang==='zh'?'确定=微信，取消=支付宝':'OK=วีแชท, Cancel=อาลีเพย์')) ? "微信" : "支付宝";
        let account = prompt(t('withdrawAccount'));
        if (!account) return;
        setUserBalance(bal - wenNum);
        let record = { phone: currentUser.phone, amount: wenNum, yuan: yuan.toFixed(2), type, account, time: new Date().toLocaleString(), status: "待处理" };
        withdrawRecords.push(record);
        localStorage.setItem('withdraw_records', JSON.stringify(withdrawRecords));
        showToast(`${t('withdraw')} ${wenNum}${currentLang==='zh'?'文':'บาท'} (${yuan}元) ${type} ${account}`);
    }

        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';

        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#closeSvc').onclick = () => modalDiv.remove();

        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="text-align:center;">${t('adminTitle')}</h3>

                </div>
                <div style="max-height:240px; overflow-y:auto; margin-bottom:12px;">
                    <table class="admin-table">
                        <thead><tr><th>${t('phone')}</th><th>${t('balance')}</th><th>${t('register')}</th><th>${t('adminRecord')}</th></tr></thead>
                        <tbody id="adminUserTableBody"></tbody>
                    </table>

                    <td>💰 ${u.balance.toFixed(2)}</td>
                    <td>${u.regTime}</td>

                btn.onclick = () => { let phone = btn.dataset.phone; showUserGameRecords(phone); };

        renderUserTable();
        function showUserGameRecords(phone) {
            let user = usersData[phone];
            if (!user) { showToast("用户不存在"); return; }
            let records = user.records || [];
            if (records.length === 0) { showToast(`${phone} 暂无游戏记录`); return; }
            let html = `<div style="max-height:400px; overflow-y:auto;"><h3>📜 ${phone} ${currentLang==='zh'?'的游戏记录':'ประวัติเกม'}</h3>`;
            records.slice(0, 100).forEach(rec => {
                let gameName = rec.game || (rec.bet ? (rec.bet.includes('鱼')||rec.bet.includes('虾')?'葫芦鱼':'龙虎斗') : '骰宝');
                let winColor = rec.win > 0 ? '#4caf50' : '#f44336';
                html += `<div class="record-item-detail">
                            <div>🕒 ${rec.time}</div>
                            <div>🎮 ${gameName}</div>
                            <div>📌 ${currentLang==='zh'?'下注':'เดิมพัน'}: ${rec.bet || rec.betType || '?'} | ${currentLang==='zh'?'开奖':'ผล'}: ${rec.result || '?'}</div>
                            <div>💰 ${currentLang==='zh'?'下注金额':'จำนวนเงิน'}: ${rec.amount || 0} | <span style="color:${winColor}">${currentLang==='zh'?'输赢':'กำไร/ขาดทุน'}: ${rec.win > 0 ? `+${rec.win}` : `-${rec.amount || 0}`}</span></div>
                         </div>`;
            });
            html += `<button id="closeRecordModal" style="margin-top:12px; background:#d49c3f; border-radius:40px; padding:6px; width:100%;">${t('close')}</button></div>`;
            let recModal = document.createElement('div'); recModal.className = 'modal';
            recModal.innerHTML = `<div class="modal-content">${html}</div>`;
            document.body.appendChild(recModal);
            recModal.querySelector('#closeRecordModal').onclick = () => recModal.remove();

        modalDiv.querySelector('#adminSearchBtn').onclick = () => renderUserTable(modalDiv.querySelector('#adminSearchInput').value.trim());
        modalDiv.querySelector('#adminResetSearch').onclick = () => { modalDiv.querySelector('#adminSearchInput').value=''; renderUserTable(''); };
        const getTarget = () => modalDiv.querySelector('#adminTargetUser').value;
        const getAmt = () => parseInt(modalDiv.querySelector('#adminAmount').value) || 0;
        modalDiv.querySelector('#adminAddBalance').onclick = () => { let t=getTarget(), a=getAmt(); if(a>0){ usersData[t].balance+=a; saveUsers(); if(currentUser?.phone===t) setUserBalance(usersData[t].balance); showToast(`${t} +${a}`); modalDiv.remove(); openAdminModal(); } else showToast("金额>0"); };
        modalDiv.querySelector('#adminSubBalance').onclick = () => { let t=getTarget(), a=getAmt(); if(a>0 && usersData[t].balance>=a){ usersData[t].balance-=a; saveUsers(); if(currentUser?.phone===t) setUserBalance(usersData[t].balance); showToast(`${t} -${a}`); modalDiv.remove(); openAdminModal(); } else showToast("无效"); };
        modalDiv.querySelector('#adminResetBalance').onclick = () => { let t=getTarget(); if(confirm(`重置 ${t} 余额为1000？`)){ usersData[t].balance=1000; saveUsers(); if(currentUser?.phone===t) setUserBalance(1000); modalDiv.remove(); openAdminModal(); } };
        modalDiv.querySelector('#adminViewWithdraw').onclick = () => { let records = JSON.parse(localStorage.getItem('withdraw_records'))||[]; if(records.length===0) alert("无记录"); else alert(records.map(r=>`${r.phone} ${r.amount}文 (${r.yuan}元) ${r.type} ${r.account} ${r.time} ${r.status}`).join('\n')); };
        modalDiv.querySelector('#adminSetBanker').onclick = () => { let newAmt = parseFloat(prompt("骰宝庄家新余额:", systemBankerBalance)); if(!isNaN(newAmt) && newAmt>=0){ systemBankerBalance=newAmt; localStorage.setItem('system_banker_balance',systemBankerBalance); showToast(`庄家余额已设为 ${newAmt}`); updateAllBalance(); } };
        modalDiv.querySelector('#adminChangePwd').onclick = () => { let old=prompt("当前密码:"); if(old!==adminPassword){ showToast("密码错误"); return; } let newPwd=prompt("新密码(≥4位):"); if(newPwd && newPwd.length>=4){ adminPassword=newPwd; localStorage.setItem('admin_pwd',newPwd); showToast("修改成功"); } else showToast("至少4位"); };
        modalDiv.querySelector('#adminSaveFactor').onclick = () => { let newFac=parseFloat(modalDiv.querySelector('#adminAdjustFactor').value); if(!isNaN(newFac) && newFac>=0.2 && newFac<=3.0){ adjustFactor=newFac; localStorage.setItem('adjustFactor',adjustFactor); showToast(`全局赔付系数已设为 ${adjustFactor}`); } else showToast("系数范围0.2~3.0"); };
        modalDiv.querySelector('#adminCloseBtn').onclick = () => modalDiv.remove();
    }

    // ==================== 辅助：添加游戏记录 ====================
    function addGameRecord(phone, gameName, betInfo, result, winAmount, betAmount) {
        if (!usersData[phone]) usersData[phone] = { balance: 1000, records: [], resultHistory: [] };
        let rec = usersData[phone].records || [];
        rec.unshift({ time: new Date().toLocaleString(), game: gameName, bet: betInfo, result: result, win: winAmount, amount: betAmount });
        if (rec.length > 100) rec.pop();
        usersData[phone].records = rec;
        saveUsers();
    }

    // ==================== 葫芦鱼（完整版，双语） ====================
    let fishDestroy = null;
    function initFishGame(container) {
        if (fishDestroy) fishDestroy();
        container.innerHTML = `
            <div class="fish-wrapper" style="padding:12px;">
                <div style="background:#1a3a2a; border-radius:32px; padding:12px;">
                    <div style="display:flex; gap:8px; margin-bottom:12px;">
                        <div style="flex:1; background:#0a0a08; border-radius:30px; text-align:center;"><div id="fishBankerLabel">🏦 ${t('fishBanker')}</div><div id="fishBankerDisplay">∞</div></div>
                        <div style="flex:1; background:#0a0a08; border-radius:30px; text-align:center;"><div id="fishTotalBetLabel">🎲 ${t('fishTotalBet')}</div><div id="fishTotalBet">0</div></div>
                        <div style="flex:1; background:#0a0a08; border-radius:30px; text-align:center;"><div id="fishLastWinLabel">🏆 ${t('fishLastWin')}</div><div id="fishLastWin">0</div></div>
                    </div>
                    <div class="fish-chips">
                        <div class="chip" data-chip="2">2</div><div class="chip" data-chip="5">5</div><div class="chip selected" data-chip="10">10</div><div class="chip" data-chip="50">50</div><div class="chip" data-chip="100" id="fishAdminTrigger">100</div>
                    </div>
                    <div style="display:flex; gap:8px; margin-bottom:12px;">
                        <button id="fishRollBtn" style="background:#c47c3a; border-radius:40px; padding:8px;">${t('fishRoll')}</button>
                        <button id="fishClearBtn" style="background:#c23b22; border-radius:40px; padding:8px;">${t('fishClear')}</button>
                        <button id="fishGrabBtn" style="background:#e09d32; border-radius:40px; padding:8px;">${t('fishGrab')}</button>
                        <button id="fishDoubleBtn" style="background:#f39c12; border-radius:40px; padding:8px;">${t('fishDouble')}</button>
                    </div>
                    <div class="dice-3d-area">
                        <div class="dice-cube" id="fishDice0"></div>
                        <div class="dice-cube" id="fishDice1"></div>
                        <div class="dice-cube" id="fishDice2"></div>
                    </div>
                    <div id="fishPatternGrid" class="fish-pattern-grid"></div>
                    <button id="fishRecordBtn" style="width:100%; background:#3a2a1c; border-radius:40px; padding:8px; margin-top:8px;">${t('fishRecord')}</button>
                    <div id="fishPhaseHint" style="text-align:center; margin-top:8px; background:#00000066; border-radius:30px; padding:4px;">${t('fishPhase').replace('{sec}','25')}</div>
                </div>
            </div>
        `;
        const patternNames = ["鱼","虾","蟹","葫芦","金钱","鸡"];
        function buildFishDice(diceDiv, initPattern) {
            if (!diceDiv) return;
            diceDiv.innerHTML = '';
            const faces = ['front','back','right','left','top','bottom'];
            const facePatterns = ["鱼","虾","蟹","葫芦","金钱","鸡"];
            faces.forEach((face, idx) => {
                let fd = document.createElement('div');
                fd.className = `dice-face ${face}`;
                fd.style.background = "#faf0cf";
                fd.style.display = "flex";
                fd.style.alignItems = "center";
                fd.style.justifyContent = "center";
                fd.style.fontSize = "1.8rem";
                fd.style.fontWeight = "bold";
                fd.style.color = "#b97f2e";
                fd.innerText = facePatterns[idx];
                diceDiv.appendChild(fd);
            });
            setFishDiceValue(diceDiv, initPattern);
        }
        function setFishDiceValue(diceDiv, patternName) {
            const rotMap = {
                "鱼": "rotateX(0deg) rotateY(0deg)",
                "虾": "rotateX(0deg) rotateY(-90deg)",
                "蟹": "rotateX(0deg) rotateY(180deg)",
                "葫芦": "rotateX(0deg) rotateY(90deg)",
                "金钱": "rotateX(-90deg) rotateY(0deg)",
                "鸡": "rotateX(90deg) rotateY(0deg)"
            };
            diceDiv.style.transform = rotMap[patternName] || "rotateX(0deg)";
        }
        const fishDice = [document.getElementById('fishDice0'), document.getElementById('fishDice1'), document.getElementById('fishDice2')];
        fishDice.forEach(d => buildFishDice(d, "鱼"));

        let patternBets = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
        let specialDouble = 0;
        let currentChip = 10;
        let hasGrabbed = false;
        let playerBankerBalance = 0;
        let gameRecords = [];
        let isRolling = false, roundActive = true, countdownTimer = null, autoRollTimer = null;
        let lastWinAmount = 0;

        function updateFishUI() {
            for (let p in patternBets) { let span = document.getElementById(`fishBet_${p}`); if(span) span.innerText = patternBets[p]; }
            document.getElementById('fishTotalBet').innerText = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            document.getElementById('fishLastWin').innerText = lastWinAmount;
            let bankerSpan = document.getElementById('fishBankerDisplay');
            if (bankerSpan) bankerSpan.innerText = hasGrabbed ? playerBankerBalance.toFixed(2) : "∞";
        }
        function addFishBet(pattern, val) {
            if (hasGrabbed) { showToast("庄家不能下注"); return; }
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (val > 500) { showToast("单注上限500"); return; }
            if (total+val > 2000) { showToast("总注上限2000"); return; }
            if (val > getUserBalance()) { showToast("余额不足"); return; }
            setUserBalance(getUserBalance() - val);
            patternBets[pattern] += val;
            updateFishUI();
        }
        function subFishBet(pattern, val) {
            let cur = patternBets[pattern];
            if (cur < val) val = cur;
            if (val===0) return;
            patternBets[pattern] -= val;
            setUserBalance(getUserBalance() + val);
            updateFishUI();
        }
        function addDoubleBet() {
            if (hasGrabbed) { showToast("庄家不能下注"); return; }
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (currentChip > 500) { showToast("双押上限500"); return; }
            if (total+currentChip > 2000) { showToast("总注上限2000"); return; }
            if (currentChip > getUserBalance()) { showToast("余额不足"); return; }
            setUserBalance(getUserBalance() - currentChip);
            specialDouble += currentChip;
            updateFishUI();
        }
        function clearFishBets() {
            let total = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (total>0) setUserBalance(getUserBalance() + total);
            patternBets = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
            specialDouble = 0;
            updateFishUI();
        }
        async function rollFishDiceWithAnimation(finalPatterns) {
            for (let i=0;i<3;i++) {
                fishDice[i].style.transition = 'none';
                fishDice[i].style.transform = `rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`;
            }
            await new Promise(r=>setTimeout(r, 50));
            for (let i=0;i<3;i++) fishDice[i].style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
            for (let step=0; step<12; step++) {
                for (let i=0;i<3;i++) {
                    let randX = Math.random()*360, randY = Math.random()*360;
                    fishDice[i].style.transform = `rotateX(${randX}deg) rotateY(${randY}deg)`;
                }
                await new Promise(r=>setTimeout(r, 80));
            }
            for (let i=0;i<3;i++) setFishDiceValue(fishDice[i], finalPatterns[i]);
            await new Promise(r=>setTimeout(r, 400));
        }
        async function settleFish() {
            if (isRolling) return;
            let totalBet = Object.values(patternBets).reduce((a,b)=>a+b,0) + specialDouble;
            if (totalBet === 0) { showToast("请先下注"); return; }
            isRolling = true;
            let r1 = patternNames[Math.floor(Math.random()*6)];
            let r2 = patternNames[Math.floor(Math.random()*6)];
            let r3 = patternNames[Math.floor(Math.random()*6)];
            await rollFishDiceWithAnimation([r1,r2,r3]);
            let winAmount = 0;
            let occurs = { 鱼:0,虾:0,蟹:0,葫芦:0,金钱:0,鸡:0 };
            [r1,r2,r3].forEach(p=>occurs[p]++);
            for (let p in patternBets) {
                let cnt = occurs[p];
                if (cnt>0 && patternBets[p]>0) winAmount += patternBets[p] * (cnt+1);
            }
            if (specialDouble>0 && occurs["鱼"]>0 && occurs["虾"]>0) winAmount += specialDouble * 4.5;
            winAmount = winAmount * adjustFactor;
            if (totalBet>0) {
                setUserBalance(getUserBalance() + winAmount);
                if (hasGrabbed) {
                    let net = (totalBet - winAmount) * adjustFactor;
                    playerBankerBalance += net;
                    if (playerBankerBalance < 0) { hasGrabbed=false; playerBankerBalance=0; localStorage.removeItem('fish_player_banker'); showToast("庄家破产"); }
                    else localStorage.setItem('fish_player_banker', playerBankerBalance);
                    updateFishUI();
                }
                lastWinAmount = winAmount - totalBet;
                let betInfo = `押${Object.entries(patternBets).filter(([k,v])=>v>0).map(([k,v])=>`${k}${v}`).join(',')}${specialDouble>0?` 双押${specialDouble}`:''}`;
                addGameRecord(currentUser.phone, '葫芦鱼', betInfo, `${r1},${r2},${r3}`, winAmount, totalBet);
            } else lastWinAmount = 0;
            gameRecords.unshift({ time:new Date().toLocaleTimeString(), dice:`${r1},${r2},${r3}`, result:winAmount>0?`赢${winAmount}`:`输${totalBet}` });
            if (gameRecords.length>50) gameRecords.pop();
            clearFishBets();
            let pop = document.createElement('div'); pop.className='result-popup '+(winAmount>0?'win':'lose'); pop.textContent=winAmount>0?`🎉 赢 ${winAmount.toFixed(2)} 🎉`:`😭 输 ${totalBet} 😭`; document.body.appendChild(pop); setTimeout(()=>pop.classList.add('show'),10); setTimeout(()=>{pop.classList.remove('show'); setTimeout(()=>pop.remove(),300);},2000);
            isRolling=false;
            if(roundActive) startFishRound();
        }
        function startFishRound() {
            if (countdownTimer) clearInterval(countdownTimer);
            let remaining=25;
            let hintDiv = document.getElementById('fishPhaseHint');
            if(hintDiv) hintDiv.innerText = t('fishPhase').replace('{sec}', remaining);
            countdownTimer = setInterval(()=>{
                remaining--;
                if(hintDiv) hintDiv.innerText = t('fishPhase').replace('{sec}', remaining);
                if(remaining<=0){
                    clearInterval(countdownTimer);
                    if(!isRolling && roundActive) settleFish();
                }
            },1000);
            if(autoRollTimer) clearTimeout(autoRollTimer);
            autoRollTimer = setTimeout(()=>{
                if(countdownTimer) clearInterval(countdownTimer);
                if(!isRolling && roundActive) settleFish();
            },25000);
        }
        let gridDiv = document.getElementById('fishPatternGrid');
        patternNames.forEach(p => {
            let card = document.createElement('div'); card.className = 'fish-bet-card';
            card.innerHTML = `<div class="fish-bet-name">${p}</div><div class="fish-bet-amount"><button class="btn-chip sub-pat" data-pat="${p}">-</button><span id="fishBet_${p}">0</span><button class="btn-chip add-pat" data-pat="${p}">+</button></div>`;
            gridDiv.appendChild(card);
        });
        document.querySelectorAll('.fish-wrapper .chip').forEach(chip=>{
            chip.onclick=function(){ currentChip=parseInt(this.dataset.chip); document.querySelectorAll('.fish-wrapper .chip').forEach(c=>c.classList.remove('selected')); this.classList.add('selected'); };
        });
        document.getElementById('fishGrabBtn').onclick=()=>{
            if(hasGrabbed){ showToast("已是庄家"); return; }
            if(getUserBalance()>=2001){
                setUserBalance(getUserBalance()-2001);
                playerBankerBalance=2001;
                hasGrabbed=true;
                localStorage.setItem('fish_player_banker', playerBankerBalance);
                updateFishUI();
                showToast("抢庄成功，不可下注");
            } else showToast("余额不足2001");
        };
        document.getElementById('fishClearBtn').onclick=clearFishBets;
        document.getElementById('fishDoubleBtn').onclick=addDoubleBet;
        document.getElementById('fishRollBtn').onclick=()=>{ if(!isRolling && roundActive) settleFish(); };
        document.getElementById('fishRecordBtn').onclick=()=>{
            if(gameRecords.length===0){ showToast("暂无记录"); return; }
            let html='<div style="max-height:300px; overflow-y:auto;">'+gameRecords.map(r=>`<div>${r.time} 🎲 ${r.dice} ${r.result}</div>`).join('')+'</div><button id="closeRec">'+t('close')+'</button>';
            let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeRec').onclick=()=>m.remove();
        };
        gridDiv.addEventListener('click',(e)=>{
            let btn=e.target.closest('.btn-chip');
            if(!btn) return;
            let pat=btn.dataset.pat;
            if(btn.classList.contains('add-pat')) addFishBet(pat, currentChip);
            if(btn.classList.contains('sub-pat')) subFishBet(pat, currentChip);
        });
        let savedBankerFish = localStorage.getItem('fish_player_banker');
        if(savedBankerFish && parseInt(savedBankerFish)>0){ hasGrabbed=true; playerBankerBalance=parseInt(savedBankerFish); }
        updateFishUI();
        startFishRound();
        fishDestroy = () => { roundActive=false; if(countdownTimer) clearInterval(countdownTimer); if(autoRollTimer) clearTimeout(autoRollTimer); container.innerHTML=''; };
        return fishDestroy;
    }

    // ==================== 至尊骰宝（完整版） ====================

    function initDiceGame(container) {

        trioHtml += `<div class="bet-card trio-card" data-type="ALL_TRIPLE"><div class="bet-name">🐆 豹子</div><div class="bet-odds">30倍</div><div id="bet_ALL_TRIPLE" class="bet-amount">0</div></div>`;
        container.innerHTML = `
            <div class="dice-wrapper" style="padding:12px;">
                <div style="background:linear-gradient(145deg,#1f482f,#0b2a18); border-radius:48px; padding:14px;">
                    <div style="display:flex; gap:12px; margin-bottom:12px;">
                        <div style="flex:1; background:#0c0b09; border-radius:44px; text-align:center;"><div>🏦 ${t('diceBanker')}</div><div id="diceBankerDisplay">${systemBankerBalance.toFixed(2)}</div></div>
                        <div style="flex:1; background:#0c0b09; border-radius:44px; text-align:center;"><div>🎲 ${t('diceTotalBet')}</div><div id="totalBet">0</div></div>

        function buildDiceCube(diceDiv) {

                fd.className = `dice-face ${face}`;

                if (num===1) pipHtml = '<div class="pip pip-center"></div>';
                else if (num===2) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-br"></div>';
                else if (num===3) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-center"></div><div class="pip pip-br"></div>';
                else if (num===4) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                else if (num===5) pipHtml = '<div class="pip pip-tl"></div><div class="pip pip-tr"></div><div class="pip pip-mid"></div><div class="pip pip-bl"></div><div class="pip pip-br"></div>';
                else pipHtml = '<div class="pip pip-l1"></div><div class="pip pip-l2"></div><div class="pip pip-l3"></div><div class="pip pip-r1"></div><div class="pip pip-r2"></div><div class="pip pip-r3"></div>';

            return new Promise(resolve => {

            });
        }
        function startRollingNumber(finalAmount) {

            for(let k in bets) bets[k]=0;

        async function startAutoDraw(){
            if(isDrawing) return;
            let totalBetVal = Object.values(bets).reduce((a,b)=>a+b,0);
            isDrawing=true; isBetLocked=true;
            let d1=Math.floor(Math.random()*6)+1, d2=Math.floor(Math.random()*6)+1, d3=Math.floor(Math.random()*6)+1;
            let {total, types} = getResultInfo(d1,d2,d3);
            let winAmount=0;
            if(totalBetVal>0){
                if(types.includes('BIG') && bets.BIG) winAmount += bets.BIG*2;
                if(types.includes('SMALL') && bets.SMALL) winAmount += bets.SMALL*2;
                if(types.includes('ODD') && bets.ODD) winAmount += bets.ODD*2;
                if(types.includes('EVEN') && bets.EVEN) winAmount += bets.EVEN*2;
                if(bets[total]) winAmount += bets[total] * oddsMap[total];
                for(let t of types) { if(t.startsWith('TRIPLE_') && bets[t]) winAmount += bets[t]*150; if(t==='ALL_TRIPLE' && bets.ALL_TRIPLE) winAmount += bets.ALL_TRIPLE*30; }
                winAmount = winAmount * adjustFactor;

            startRollingNumber(winAmount);
            await startRollingLong([d1,d2,d3], 5000);

                updateUI();

            addRecord(d1,d2,d3,winAmount,totalBetVal);

            updateUI();
            let pop = document.createElement('div'); pop.className='result-popup '+(winAmount>0?'win':'lose'); pop.textContent=winAmount>0?`🎉 赢 ${winAmount.toFixed(2)} 🎉`:(totalBetVal>0?`😭 输 ${totalBetVal} 😭`:`🎲 点数 ${total} 无人下注`); document.body.appendChild(pop); setTimeout(()=>pop.classList.add('show'),10); setTimeout(()=>{ pop.classList.remove('show'); setTimeout(()=>pop.remove(),300); },2000);
            isDrawing=false; isBetLocked=false;

        }
        function updateRecordDisplay() {
            let recs = usersData[currentUser.phone]?.records || [];
            let listDiv = document.getElementById('recordList');
            if (!listDiv) return;
            listDiv.innerHTML = '';
            recs.slice(0,10).forEach(r => {
                let div = document.createElement('div'); div.style.padding = '4px'; div.style.borderBottom = '1px solid #555';
                let isWin = r.win > 0;
                div.innerHTML = `<span>${r.time}</span> ${t('dtTotalBet')}: ${r.bet}→${r.result} <span style="color:${isWin?'#4caf50':'#f44336'}">${isWin?`+${r.win}`:`-${r.amount}`}</span>`;
                listDiv.appendChild(div);
            });
        }
        function showMyHistory() {
            let recs = usersData[currentUser.phone]?.records || [];
            let html = '<div style="max-height:300px; overflow-y:auto;">' + recs.map(r => `<div>${r.time} ${t('dtTotalBet')}: ${r.bet}→${r.result} ${r.win>0?'赢'+r.win:'输'+r.amount}</div>`).join('') + '</div><button id="closeHist">'+t('close')+'</button>';
            let m = document.createElement('div'); m.className = 'modal'; m.innerHTML = `<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeHist').onclick = () => m.remove();
        }
        function newUser() {
            let newId = 'user_' + Math.floor(Math.random()*1000000);
            if (!usersData[newId]) usersData[newId] = { balance: 1000, records: [], resultHistory: [] };
            document.getElementById('switchUserIdInput').value = newId;
            switchUser();
        }
        function switchUser() {
            let newId = document.getElementById('switchUserIdInput').value.trim();
            if (!newId) return;
            if (!usersData[newId]) usersData[newId] = { balance: 1000, records: [], resultHistory: [] };
            currentUser = { phone: newId, ...usersData[newId] };
            document.getElementById('currentUserId').innerText = newId;
            document.getElementById("userBalanceDisplay").innerText = getUserBalance().toFixed(2);
            updateUI(); updateHistoryDisplay(); updateRecordDisplay();
            clearCountdown(); startCountdown(getCountdownSec());
            showToast(`切换到 ${newId}`);
        }
        function refreshBalance() { updateUI(); showToast(t('diceRefresh')); }
        document.querySelectorAll('.quick-bet').forEach(btn => { btn.onclick = () => { let type = btn.dataset.type, amt = parseInt(btn.dataset.amount); if (type && amt) addBetAmount(type, amt); }; });
        document.querySelectorAll('.clear-bet').forEach(btn => { btn.onclick = () => clearBet(btn.dataset.type); });
        document.getElementById('fightBtn').onclick = executeBet;
        document.getElementById('cancelBtn').onclick = cancelAllBets;
        document.getElementById('repeatBtn').onclick = repeatLastBet;
        document.getElementById('refreshBtn').onclick = refreshBalance;
        document.getElementById('myHistoryBtn').onclick = showMyHistory;
        document.getElementById('newUserBtn').onclick = newUser;
        document.getElementById('switchUserBtn').onclick = switchUser;
        document.querySelectorAll('.speed-btn').forEach(btn => { btn.onclick = () => setSpeed(parseInt(btn.dataset.speed)); });
        updateUI(); updateHistoryDisplay(); updateRecordDisplay(); startCountdown(30);
        dragonTigerDestroy = () => { if (state.countdownInterval) clearInterval(state.countdownInterval); container.innerHTML = ''; };
        return dragonTigerDestroy;
    }

    // 游戏4占位
    let game4Destroy = null;
    function initGame4(container) { if(game4Destroy) game4Destroy(); container.innerHTML = `<div style="padding:60px; text-align:center;">♠️ ${t('game4')}</div>`; game4Destroy = () => container.innerHTML = ''; return game4Destroy; }

    // ==================== 认证大厅 ====================
    function renderAuthUI() {
        const savedPhone = localStorage.getItem('saved_phone') || '';
        const savedPwd = localStorage.getItem('saved_password') || '';
        const rememberChecked = localStorage.getItem('remember_me') === 'true';
        document.getElementById('app').innerHTML = `
            <div class="auth-panel" style="padding:30px 20px;">
                <h2 style="text-align:center;">🎲 ${currentLang==='zh'?'三游戏大厅':'สามเกมส์'}</h2>
                <input type="tel" id="regPhone" placeholder="${t('phone')}" maxlength="11" value="${savedPhone}" style="width:100%; margin:8px 0; padding:12px; border-radius:60px; background:#2a241e;">
                <input type="password" id="regPassword" placeholder="${t('password')}" value="${savedPwd}" style="width:100%; margin:8px 0; padding:12px; border-radius:60px;">
                <input type="text" id="regReferralCode" placeholder="${t('referralCode')}" maxlength="20" style="width:100%; margin:8px 0; padding:12px; border-radius:60px;">
                <div style="display:flex; gap:12px;"><input type="checkbox" id="rememberCheckbox" ${rememberChecked ? 'checked' : ''}> <label>${t('remember')}</label></div>
                <div style="display:flex; gap:12px;"><button id="loginBtn" style="flex:1; background:#d49c3f; border-radius:60px; padding:10px;">${t('login')}</button><button id="registerBtn" style="flex:1; background:#3f6a47; border-radius:60px;">${t('register')}</button></div>
                <div class="auth-note" style="font-size:0.7rem;">${t('referralNote')}</div>
            </div>
        `;
        document.getElementById('registerBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim(), pwd = document.getElementById('regPassword').value, code = document.getElementById('regReferralCode').value.trim().toUpperCase();
            if (!phone || !pwd) return showToast("填写完整");
            if (!/^1[3-9]\d{9}$/.test(phone)) return showToast("手机号无效");
            if (pwd.length < 4) return showToast("密码≥4位");
            if (!code || !validReferralCodes.includes(code)) return showToast("推荐码无效");
            if (usersData[phone]) return showToast("已注册");
            usersData[phone] = { password: pwd, balance: 1000, referralCode: code, registerTime: new Date().toLocaleString(), records: [], resultHistory: [] };
            saveUsers(); showToast("注册成功！请登录");
        };
        document.getElementById('loginBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim(), pwd = document.getElementById('regPassword').value, rem = document.getElementById('rememberCheckbox').checked;
            if (!phone || !pwd) return showToast("填写账号密码");
            let user = usersData[phone];
            if (!user || user.password !== pwd) return showToast("账号或密码错误");
            if (rem) { localStorage.setItem('saved_phone', phone); localStorage.setItem('saved_password', pwd); localStorage.setItem('remember_me', 'true'); }
            else { localStorage.removeItem('saved_phone'); localStorage.removeItem('saved_password'); localStorage.setItem('remember_me', 'false'); }
            currentUser = { phone, ...user };
            showToast(`欢迎 ${phone}`);
            renderGameLobby();
        };
    }
    function renderGameLobby() {
        document.getElementById('app').innerHTML = `
            <div class="user-section"><div class="user-info-row"><span>📱 ${currentUser.phone.substring(0,7)}*** | 💰 ${t('balance')}: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span><div class="btn-group"><button id="serviceBtn" class="service-btn">${t('service')}</button><button id="logoutBtn" class="logout-btn">${t('logout')}</button><button id="langSwitchBtn" class="lang-switch">${currentLang==='zh'?'ภาษาไทย':'中文'}</button></div></div><div class="charge-withdraw-row"><button id="rechargeBtn" class="charge-btn">${t('recharge')}</button><button id="withdrawBtn" class="withdraw-btn">${t('withdraw')}</button></div></div>
            <div class="game-nav"><button class="game-tab active" data-game="fish">${t('gameFish')}</button><button class="game-tab" data-game="dice">${t('gameDice')}</button><button class="game-tab" data-game="dragonTiger">${t('gameDT')}</button><button class="game-tab" data-game="game4">${t('game4')}</button></div>
            <div class="game-container"><div id="gamePanel"></div></div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;
        document.getElementById('langSwitchBtn').onclick = () => {
            currentLang = currentLang === 'zh' ? 'th' : 'zh';
            document.getElementById('langSwitchBtn').innerText = currentLang === 'zh' ? 'ภาษาไทย' : '中文';
            renderGameLobby();
        };
        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const inits = { fish: initFishGame, dice: initDiceGame, dragonTiger: initDragonTigerGame, game4: initGame4 };
        async function switchGame(id) { if (currentDestroy) currentDestroy(); gamePanel.innerHTML = ''; currentDestroy = await inits[id](gamePanel); updateAllBalance(); }
        document.querySelectorAll('.game-tab').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
        switchGame('fish');
        document.addEventListener('click', (e) => { if (e.target && (e.target.id === 'adminTriggerChip' || e.target.id === 'fishAdminTrigger')) { adminClickCount++; if (adminClickTimer) clearTimeout(adminClickTimer); adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 1000); if (adminClickCount >= 3) { adminClickCount = 0; clearTimeout(adminClickTimer); openAdminModal(); } } });
    }
    renderAuthUI();
</script>
</body>
</html>
