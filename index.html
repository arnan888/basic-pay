<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI_QUANT_BEAST_ULTRA</title>
    <style>
        :root {
            --jade: #4a7c64; --jade-l: #6b9a85; --jade-d: #2c4a3b;
            --stone: #6b737e; --inner: inset 8px 8px 16px rgba(0,0,0,0.6), inset -4px -4px 8px rgba(255,255,255,0.05);
            --gold: #f1c40f; --red: #ff4d4d; --blue: #3498db; --tiger: #e67e22; --tie: #9b59b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0c0c0c; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .container-outer {
            width: 100vw; height: 100vh; max-width: 480px;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffff00, #00ff00, #0099ff, #6633ff, #ff00ff);
            background-size: 600% 600%;
            animation: outerNeonRotate 15s linear infinite;
            padding: 6px; border-radius: 18px;
            box-shadow: 0 0 50px rgba(255,255,255,0.6);
        }
        @keyframes outerNeonRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%; height: 100%;
            background: var(--jade);
            border-radius: 15px;
            display: flex; flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .header {
            height: 8%; display: flex; justify-content: space-between;
            align-items: center; padding: 0 12px;
        }
        .header span { color: #fff; font-size: 16px; }
        .header .num { color: var(--gold); font-size: 20px; font-weight: bold; }

        .battle-scene {
            height: 38%; background: #0a0a0a;
            margin: 4px 10px; border-radius: 12px;
            position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .scene-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); z-index: 1;
        }
        .scene-light {
            position: absolute; width: 150px; height: 150px; border-radius: 50%;
            filter: blur(50px); z-index: 2;
        }
        .light-left { left: 30px; top: 50%; transform: translateY(-50%); background: rgba(52,152,219,0.4); }
        .light-right { right: 30px; top: 50%; transform: translateY(-50%); background: rgba(230,126,34,0.4); }
        @keyframes lightPulse {
            0% { opacity: 0.3; transform: translateY(-50%) scale(1); }
            100% { opacity: 0.8; transform: translateY(-50%) scale(1.2); }
        }

        .reel-wrap {
            position: relative; width: 18%; height: 80%;
            transform-style: preserve-3d; z-index: 10;
        }
        .reel {
            position: absolute; width: 100%; height: 100%;
            transform-style: preserve-3d;
            animation: reelSpin 0.8s ease-out forwards;
        }
        @keyframes reelSpin {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(calc(360deg * 5 + random() * 30deg)); }
        }
        .reel-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex;
            justify-content: center; align-items: center;
            background: #fff; border-radius: 8px; font-size: 24px;
            font-weight: bold; color: var(--red);
            box-shadow: 0 0 10px rgba(255,0,0,0.8);
        }
        .reel-face.red { background: var(--red); color: #fff; }
        .reel-face.gold { background: var(--gold); color: var(--red); }
        .reel-face.blue { background: var(--blue); color: #fff; }
        .reel-face.tiger { background: var(--tiger); color: #fff; }
        .reel-face.tie { background: var(--tie); color: #fff; }

        .fight-effect {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,100,0,0.9), rgba(255,0,0,0.9));
            filter: blur(15px); opacity: 0; z-index: 5;
        }
        .fight-effect.flash { animation: flash 0.5s ease-out forwards; }
        @keyframes flash {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }

        .play-section {
            flex: 1; display: flex; flex-direction: column;
            padding: 12px; justify-content: space-around;
        }
        .bet-row {
            display: flex; justify-content: center; align-items: center; gap: 15px;
        }
        .bet-btn {
            width: 40px; height: 40px; border: none; border-radius: 50%;
            background: var(--red); color: #fff; font-size: 20px; cursor: pointer;
        }
        .bet-btn:disabled { background: #666; cursor: not-allowed; }
        .main-btn {
            width: 60%; height: 50px; border: none; border-radius: 25px;
            background: linear-gradient(45deg, var(--red), var(--gold));
            color: #fff; font-size: 22px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 #7f0000; transform: translateY(0);
        }
        .main-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #7f0000; }
        .main-btn:disabled {
            background: #666; color: #ccc; cursor: not-allowed;
            box-shadow: none; transform: none;
        }

        .data-group {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 8px; margin-top: 10px;
        }
        .data-item {
            background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px;
            color: #fff; text-align: center;
        }
        .data-item span { color: var(--gold); font-weight: bold; }

        .mode-row {
            display: flex; justify-content: space-around; margin-top: 10px;
        }
        .mode-btn {
            padding: 8px 12px; border: none; border-radius: 8px;
            background: var(--jade-l); color: #fff; cursor: pointer;
        }
        .mode-btn.active { background: var(--gold); color: var(--red); }
    </style>
</head>
<body>
    <div class="container-outer">
        <div class="container">
            <div class="header">
                <span>余额：<span id="balance" class="num">10000</span> USDT</span>
                <span>奖池：<span id="pool" class="num">84291.5</span> USDT</span>
            </div>

            <div class="battle-scene">
                <div class="scene-bg"></div>
                <div class="scene-light light-left"></div>
                <div class="scene-light light-right"></div>
                
                <div class="reel-wrap">
                    <div class="reel" id="reel1">
                        <div class="reel-face red">🐉</div>
                    </div>
                </div>
                <div class="reel-wrap">
                    <div class="reel" id="reel2">
                        <div class="reel-face blue">🐯</div>
                    </div>
                </div>
                <div class="reel-wrap">
                    <div class="reel" id="reel3">
                        <div class="reel-face gold">⚖️</div>
                    </div>
                </div>
                <div class="reel-wrap">
                    <div class="reel" id="reel4">
                        <div class="reel-face tiger">🐉</div>
                    </div>
                </div>
                <div class="reel-wrap">
                    <div class="reel" id="reel5">
                        <div class="reel-face tie">⚖️</div>
                    </div>
                </div>

                <div class="fight-effect" id="fightEffect"></div>
            </div>

            <div class="play-section">
                <div class="bet-row">
                    <button class="bet-btn" id="betMinus">-</button>
                    <span>押注：<span id="betVal">10</span> USDT</span>
                    <button class="bet-btn" id="betPlus">+</button>
                </div>
                
                <button class="main-btn" id="fightBtn">确认投注</button>
                
                <div class="data-group">
                    <div class="data-item">总押注：<span id="totalBet">0</span> USDT</div>
                    <div class="data-item">预计奖：<span id="expWin">0</span> USDT</div>
                    <div class="data-item">模式：<span id="mode">手动</span></div>
                </div>

                <div class="mode-row">
                    <button class="mode-btn" id="autoMode">自动投注</button>
                    <button class="mode-btn" id="speedMode">1X</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        const state = {
            balance: 10000, pool: 84291.5,
            betStep: 10, bet: 10,
            bets: { dragon: 0, tiger: 0, tie: 0 },
            isRolling: false, autoMode: false, speed: 1
        };

        // DOM元素
        const balanceEl = document.getElementById('balance');
        const poolEl = document.getElementById('pool');
        const betValEl = document.getElementById('betVal');
        const totalBetEl = document.getElementById('totalBet');
        const expWinEl = document.getElementById('expWin');
        const modeEl = document.getElementById('mode');
        const fightBtn = document.getElementById('fightBtn');
        const fightEffectEl = document.getElementById('fightEffect');
        const reels = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3'),
            document.getElementById('reel4'),
            document.getElementById('reel5')
        ];

        // 符号配置（权重控制出现概率）
        const symbols = [
            { icon: '🐉', name: '龙', weight: 0.18, color: '#ff4d4d' },
            { icon: '🐯', name: '虎', weight: 0.15, color: '#e67e22' },
            { icon: '⚖️', name: '和', weight: 0.12, color: '#9b59b6' },
            { icon: '🔴', name: '红', weight: 0.1, color: '#ff0000' },
            { icon: '🟡', name: '金', weight: 0.1, color: '#f1c40f' },
            { icon: '🔵', name: '蓝', weight: 0.17, color: '#3498db' },
            { icon: '🟢', name: '绿', weight: 0.18, color: '#2ecc71' }
        ];

        // 更新UI
        function updateUI() {
            balanceEl.textContent = state.balance;
            poolEl.textContent = state.pool;
            betValEl.textContent = state.bet;
            
            // 计算总押注和预计奖金
            const totalBet = state.bets.dragon + state.bets.tiger + state.bets.tie;
            totalBetEl.textContent = totalBet;
            
            let expWin = 0;
            if (state.bets.dragon > 0) expWin += state.bets.dragon * 2;
            if (state.bets.tiger > 0) expWin += state.bets.tiger * 2;
            if (state.bets.tie > 0) expWin += state.bets.tie * 8;
            expWinEl.textContent = expWin;
        }

        // 调整押注
        document.getElementById('betMinus').onclick = () => {
            if (state.bet > 10) state.bet -= 10;
            updateUI();
        };
        document.getElementById('betPlus').onclick = () => {
            if (state.bet < state.balance) state.bet += 10;
            updateUI();
        };

        // 播放开奖动画
        function playRollAnim() {
            return new Promise(resolve => {
                // 逐个卷轴停止，制造层次感
                let count = 0;
                reels.forEach((reel, idx) => {
                    setTimeout(() => {
                        // 随机切换符号直到停止
                        const randInt = setInterval(() => {
                            const rand = Math.floor(Math.random() * symbols.length);
                            reel.innerHTML = `<div class="reel-face" style="color:${symbols[rand].color}">${symbols[rand].icon}</div>`;
                        }, 80);

                        setTimeout(() => {
                            clearInterval(randInt);
                            const finalSym = symbols[Math.floor(Math.random() * symbols.length)];
                            reel.innerHTML = `<div class="reel-face" style="color:${finalSym.color}">${finalSym.icon}</div>`;
                            count++;
                            if (count === reels.length) resolve();
                        }, 1000 + idx * 300);
                    }, idx * 200);
                });
            });
        }

        // 开奖核心逻辑
        fightBtn.onclick = async () => {
            if (state.isRolling || state.bet > state.balance) return;
            
            state.isRolling = true;
            fightBtn.disabled = true;
            
            // 播放动画
            await playRollAnim();
            
            // 随机生成结果
            const result = reels.map(() => symbols[Math.floor(Math.random() * symbols.length)]);
            
            // 计算结果
            let win = 0;
            const dragonCount = result.filter(s => s.name === '龙').length;
            const tigerCount = result.filter(s => s.name === '虎').length;
            const tieCount = result.filter(s => s.name === '和').length;

            if (dragonCount >= 3) win = state.bet * 10;
            else if (tigerCount >= 3) win = state.bet * 8;
            else if (tieCount >= 2) win = state.bet * 5;
            else if (dragonCount >= 1 || tigerCount >= 1) win = state.bet * 2;

            // 发财翻倍（如果有金色符号）
            if (result.some(s => s.color === '#f1c40f')) win *= 1.5;

            // 更新余额
            state.balance += win - state.bet;
            fightEffectEl.classList.add('flash');
            setTimeout(() => fightEffectEl.classList.remove('flash'), 1500);
            
            state.isRolling = false;
            fightBtn.disabled = false;
            updateUI();
        };

        // 自动模式
        document.getElementById('autoMode').onclick = () => {
            state.autoMode = !state.autoMode;
            modeEl.textContent = state.autoMode ? '自动' : '手动';
            if (state.autoMode) autoRoll();
        };

        function autoRoll() {
            if (!state.autoMode || state.isRolling) return;
            fightBtn.click();
            setTimeout(autoRoll, 2000 * state.speed);
        }

        // 速度切换
        document.getElementById('speedMode').onclick = () => {
            state.speed = state.speed === 1 ? 2 : state.speed === 2 ? 3 : 1;
            document.getElementById('speedMode').textContent = `${state.speed}X`;
        };

        // 初始化
        updateUI();
    </script>
</body>
</html>
