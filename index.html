 <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>高端转盘组件</title>
    <style>
        /* ========== 赛博转盘样式 ========== */
        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
            cursor: pointer;
        }
        
        /* 光晕效果 */
        .wheel-wrapper::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3300, #ffaa44, #ff3300);
            opacity: 0.4;
            filter: blur(25px);
            z-index: -1;
            animation: pulseGlow 2s ease-in-out infinite;
        }
        
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        
        /* 转盘画布 */
        .wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255,51,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
            transition: box-shadow 0.3s;
        }
        
        .wheel-wrapper:hover .wheel-canvas {
            box-shadow: 0 0 45px rgba(255,51,0,0.8);
        }
        
        /* 3D指针 */
        .wheel-pointer {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 45px solid #ffcc44;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
            z-index: 10;
        }
        
        .wheel-pointer::after {
            content: '⚡';
            position: absolute;
            top: -42px;
            left: -12px;
            font-size: 24px;
            color: #ffaa44;
            text-shadow: 0 0 10px #ff3300;
        }
        
        /* 中心钻石 */
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, #ffcc44, #ff8800);
            border-radius: 50%;
            z-index: 11;
            box-shadow: 0 0 20px rgba(255,204,68,0.8), inset 0 2px 4px rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            animation: centerPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes centerPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.08); }
        }
        
        /* 炫酷按钮 */
        .wheel-spin-btn {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff3300, #cc2200);
            border: none;
            border-radius: 40px;
            padding: 10px 28px;
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            z-index: 12;
            box-shadow: 0 8px 20px rgba(255,51,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
            transition: all 0.2s;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        
        .wheel-spin-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        /* 结果提示 */
        .wheel-toast {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            padding: 8px 24px;
            border-radius: 40px;
            color: #ffaa44;
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
            z-index: 13;
            opacity: 0;
            transition: 0.3s;
            border: 1px solid rgba(255,170,68,0.5);
            box-shadow: 0 0 20px rgba(255,170,68,0.3);
        }
        
        /* 能量环 */
        .energy-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 360px;
            height: 360px;
            border-radius: 50%;
            border: 2px solid rgba(255,51,0,0.3);
            pointer-events: none;
            z-index: 8;
            animation: rotateRing 10s linear infinite;
        }
        
        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div style="position: relative; width: 380px; margin: 50px auto;">
        <div class="wheel-wrapper" id="wheelWrapper">
            <canvas id="wheelCanvas" class="wheel-canvas" width="500" height="500"></canvas>
            <div class="wheel-pointer"></div>
            <div class="wheel-center">⚡</div>
            <button class="wheel-spin-btn" id="spinBtn">🎡 灵龙转盘</button>
            <div class="wheel-toast" id="wheelToast">✨</div>
        </div>
        <div class="energy-ring"></div>
        <div class="energy-ring" style="width: 400px; height: 400px; animation-duration: 15s; opacity: 0.5;"></div>
    </div>

    <script>
        (function() {
            // ========== 转盘配置 ==========
            const SEGMENTS = [
                { name: '🐉 龙', color1: '#ff4444', color2: '#cc0000', value: 'dragon' },
                { name: '🐯 虎', color1: '#4488ff', color2: '#0066cc', value: 'tiger' },
                { name: '⚖️ 和', color1: '#aa66ff', color2: '#8844cc', value: 'tie' }
            ];
            
            const canvas = document.getElementById('wheelCanvas');
            const size = 500;
            canvas.width = size;
            canvas.height = size;
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            
            const ctx = canvas.getContext('2d');
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 10;
            const PI = Math.PI;
            const TAU = PI * 2;
            
            let currentRotation = 0;
            let isSpinning = false;
            
            // 绘制扇形
            function drawSegment(startAngle, endAngle, color1, color2, label) {
                const gradient = ctx.createLinearGradient(
                    centerX + Math.cos(startAngle) * radius * 0.3,
                    centerY + Math.sin(startAngle) * radius * 0.3,
                    centerX + Math.cos(endAngle) * radius * 0.8,
                    centerY + Math.sin(endAngle) * radius * 0.8
                );
                gradient.addColorStop(0, color1);
                gradient.addColorStop(1, color2);
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 描边
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 绘制文字
                const midAngle = startAngle + (endAngle - startAngle) / 2;
                const textRadius = radius * 0.65;
                const x = centerX + Math.cos(midAngle) * textRadius;
                const y = centerY + Math.sin(midAngle) * textRadius;
                
                ctx.font = `bold ${Math.floor(radius * 0.16)}px "PingFang SC"`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 4;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.fillText(label, x, y);
            }
            
            // 绘制转盘
            function drawWheel(rotation = 0) {
                ctx.clearRect(0, 0, size, size);
                const anglePer = TAU / SEGMENTS.length;
                
                for (let i = 0; i < SEGMENTS.length; i++) {
                    const seg = SEGMENTS[i];
                    const start = i * anglePer + rotation;
                    const end = (i + 1) * anglePer + rotation;
                    drawSegment(start, end, seg.color1, seg.color2, seg.name);
                }
                
                // 内圈装饰
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius * 0.18, 0, TAU);
                ctx.fillStyle = '#1a1a2e';
                ctx.fill();
                ctx.strokeStyle = '#ffaa44';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            
            // 获取结果
            function getResult() {
                const pointerAngle = -PI / 2;
                const anglePer = TAU / SEGMENTS.length;
                let hitAngle = (pointerAngle - currentRotation + TAU * 4) % TAU;
                let idx = Math.floor(hitAngle / anglePer) % SEGMENTS.length;
                return SEGMENTS[idx];
            }
            
            // 开奖动画
            function spin() {
                if (isSpinning) return;
                isSpinning = true;
                
                const btn = document.getElementById('spinBtn');
                if (btn) btn.disabled = true;
                
                // 振动反馈
                if (navigator.vibrate) navigator.vibrate(100);
                
                const spins = 8 + Math.random() * 12;
                const randomAngle = Math.random() * TAU;
                const finalRot = currentRotation + (spins * TAU) + randomAngle;
                const startRot = currentRotation;
                const duration = 2000;
                const startTime = performance.now();
                
                function animate(now) {
                    const elapsed = now - startTime;
                    const progress = Math.min(1, elapsed / duration);
                    const ease = 1 - Math.pow(1 - progress, 3);
                    currentRotation = startRot + (finalRot - startRot) * ease;
                    drawWheel(currentRotation);
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        currentRotation = finalRot % TAU;
                        drawWheel(currentRotation);
                        
                        const result = getResult();
                        const resultText = result.name;
                        
                        // 显示结果
                        const toast = document.getElementById('wheelToast');
                        if (toast) {
                            toast.textContent = `✨ ${resultText} 开奖 ✨`;
                            toast.style.opacity = '1';
                            setTimeout(() => toast.style.opacity = '0', 2500);
                        }
                        
                        // 回调结果
                        if (window.onWheelResult) {
                            window.onWheelResult(result.value, resultText);
                        }
                        
                        // 语音
                        if (window.speechSynthesis) {
                            const utter = new SpeechSynthesisUtterance(resultText);
                            utter.lang = 'zh-CN';
                            speechSynthesis.cancel();
                            speechSynthesis.speak(utter);
                        }
                        
                        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                        
                        isSpinning = false;
                        if (btn) btn.disabled = false;
                    }
                }
                
                requestAnimationFrame(animate);
            }
            
            // 绑定事件
            document.getElementById('spinBtn').onclick = (e) => {
                e.stopPropagation();
                spin();
            };
            
            document.getElementById('wheelWrapper').onclick = (e) => {
                if (e.target === document.getElementById('spinBtn')) return;
                if (!isSpinning) spin();
            };
            
            // 初始化
            drawWheel(0);
            
            // 导出API
            window.wheel = { spin, getResult };
        })();
    </script>
</body>
</html>
