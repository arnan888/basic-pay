<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA_旗舰终端_V45</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background: #000; color: #fff; 
            font-family: 'Arial Black', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden;
            /* 背景图：确保它在最底层 */
            background: url('https://img.freepik.com/free-vector/abstract-technology-particle-background_23-2148426649.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
        }
        
        /* 电视屏幕暗角滤镜 */
        body::after {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.7) 100%);
            pointer-events: none; z-index: 1; 
        }

        /* 顶部余额 HUD：强制置顶 */
        .hud { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            width: 80%; background: rgba(0,0,0,0.6); 
            border: 1px solid var(--neon); border-radius: 10px; 
            padding: 10px; text-align: center; z-index: 100;
            backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(0,242,255,0.3);
        }
        .hud b { font-size: 22px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        /* 转盘容器：绝对定位，确保在背景之上 */
        .wheel-box { 
            position: absolute; top: 110px; left: 50%; 
            transform: translateX(-50%); 
            z-index: 50; /* 确保高于背景 */
        }
        
        .wheel { 
            width: 280px; height: 280px; border-radius: 50%; 
            border: 6px solid #111;
            background: conic-gradient(from 0deg, #ff0055 0 60deg, #1a1a1a 60deg 120deg, #00f2ff 120deg 180deg, #1a1a1a 180deg 240deg, #ffcc00 240deg 300deg, #1a1a1a 300deg 360deg);
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px var(--neon);
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        
        .item { position: absolute; font-size: 28px; }
        .i1 { transform: rotate(30deg) translateY(-105px); } 
        .i2 { transform: rotate(90deg) translateY(-105px); } 
        .i3 { transform: rotate(150deg) translateY(-105px); } 
        .i4 { transform: rotate(210deg) translateY(-105px); } 
        .i5 { transform: rotate(270deg) translateY(-105px); } 
        .i6 { transform: rotate(330deg) translateY(-105px); }
        
        .btn { 
            position: absolute; width: 60px; height: 60px; background: #000; 
            border: 3px solid var(--pink); border-radius: 50%; 
            color: #fff; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 60; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 20px var(--pink); 
        }
        
        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; 
            border-top: 25px solid #fff; z-index: 70; filter: drop-shadow(0 0 10px var(--neon));
        }

        .ovl { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
    </style>
</head>
<body>
    <div class="hud">BALANCE: <b id="bal">1,000</b></div>
    <div class="wheel-box">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <div class="item i1">💎</div><div class="item i2">💀</div><div class="item i3">💰</div><div class="item i4">💀</div><div class="item i5">🎁</div><div class="item i6">💀</div>
            <div class="btn" onclick="spin()">SPIN</div>
        </div>
    </div>
    <div class="ovl" id="ovl"><div id="res-txt" style="font-size:40px; font-weight:900;"></div><button style="margin-top:30px; padding:12px 30px; background:var(--neon); border:none; border-radius:5px; font-weight:bold;" onclick="location.reload()">AGAIN</button></div>

    <script>
        let b=1000, r=0;
        function spin(){ 
            if(b<50)return alert('余额不足'); b-=50; document.getElementById('bal').innerText=b; 
            let add=1800+Math.floor(Math.random()*360); r+=add; 
            document.getElementById('wheel').style.transform="rotate("+r+"deg)";
            setTimeout(()=>{ 
                let win=[0,100,0,200,0,500][Math.floor(Math.random()*6)]; b+=win; 
                document.getElementById('bal').innerText=b; document.getElementById('ovl').style.display='flex'; 
                document.getElementById('res-txt').innerText=win>0?"WIN: "+win:"LOSE"; document.getElementById('res-txt').style.color=win>0?'#00f2ff':'#ff0055'; 
            },4000); 
        }
    </script>
</body>
</html>
