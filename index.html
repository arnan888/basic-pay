<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙虎对决 · 线上正式版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0f12; font-family: -apple-system, sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .game-wrapper { width: 100%; max-width: 480px; background: #1a2a22; display: flex; flex-direction: column; border: 1px solid #2c4a3b; }
        
        /* 顶部余额 */
        .top-stat { display: flex; gap: 10px; padding: 12px; background: rgba(0,0,0,0.4); }
        .stat-card { flex: 1; background: #24342d; padding: 8px; border-radius: 8px; border: 1px solid #3d5a4d; }
        .stat-card div { font-size: 11px; color: #889a91; }
        .stat-card span { font-size: 18px; color: #f1c40f; font-weight: bold; }

        /* 视频对决区 - 增加背景图防止黑屏 */
        .video-box { 
            height: 260px; background: #000 url('https://img.zcool.cn/community/01d8e1554483e50000019ae978430b.jpg') center/cover; 
            position: relative; overflow: hidden; border-y: 2px solid #f1c40f;
        }
        #mainVideo { width: 100%; height: 100%; object-fit: cover; }
        .video-overlay { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #fff; padding: 4px 16px; border-radius: 20px; font-size: 13px; border: 1px solid #f1c40f; z-index: 5; }

        /* 操作区 */
        .control-panel { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .bet-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .bet-item { height: 85px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: #fff; cursor: pointer; border: 4px solid #000; transition: 0.1s; }
        .dragon { background: #2980b9; box-shadow: 0 5px #1a5276; }
        .tie { background: #8e44ad; box-shadow: 0 5px #5b2c6f; }
        .tiger { background: #d35400; box-shadow: 0 5px #873600; }
        .bet-item.active { transform: translateY(4px); box-shadow: none; border-color: #f1c40f; }

        .info-list { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: #bdc3c7; font-size: 14px; }
        .info-row b { color: #f1c40f; font-family: monospace; }

        .play-btn { background: linear-gradient(#e74c3c, #c0392b); color: #fff; height: 55px; border-radius: 28px; border: none; font-size: 20px; font-weight: bold; box-shadow: 0 4px #7b241c; cursor: pointer; }
        .play-btn:active { transform: translateY(2px); box-shadow: 0 2px #7b241c; }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="top-stat">
        <div class="stat-card"><div>余额 (USDT)</div><span id="bal">857.80</span></div>
        <div class="stat-card"><div>当前奖池</div><span>84291.50</span></div>
    </div>

    <div class="video-box">
        <div class="video-overlay" id="hint">龙虎争霸 · 15秒决胜负</div>
        <video id="mainVideo" muted playsinline poster="https://img.zcool.cn/community/01d8e1554483e50000019ae978430b.jpg">
            <source src="1.mp4" type="video/mp4">
        </video>
    </div>

    <div class="control-panel">
        <div class="bet-row">
            <div class="bet-item dragon" onclick="sel('龙', this)">龙</div>
            <div class="bet-item tie" onclick="sel('和', this)">和</div>
            <div class="bet-item tiger" onclick="sel('虎', this)">虎</div>
        </div>

        <div class="info-list">
            <div class="info-row">当前选择：<b id="sel-t">未选择</b></div>
            <div class="info-row">下注金额：<b>100.00</b></div>
            <div class="info-row">预计奖金：<b id="win-t">0.00</b></div>
        </div>

        <button class="play-btn" onclick="go()">确认投注</button>
    </div>
</div>

<script>
    let bal = 857.80;
    let choice = null;
    let active = false;
    const v = document.getElementById('mainVideo');

    function sel(t, el) {
        if(active) return;
        choice = t;
        document.querySelectorAll('.bet-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('sel-t').textContent = t;
        document.getElementById('win-t').textContent = (t === '和' ? 800 : 200).toFixed(2);
    }

    function go() {
        if(active) return;
        if(!choice) return alert("请选择投注项");
        
        active = true;
        bal -= 100;
        document.getElementById('bal').textContent = bal.toFixed(2);
        document.getElementById('hint').textContent = "对决开始...";

        // 尝试播放视频
        v.currentTime = 0;
        v.play().catch(e => console.log("等待交互播放"));

        setTimeout(() => {
            const res = ['龙', '虎', '和'][Math.floor(Math.random()*3)];
            document.getElementById('hint').textContent = `结果：${res}`;
            
            if(choice === res) {
                let win = (res === '和' ? 800 : 200);
                bal += win;
                document.getElementById('bal').textContent = bal.toFixed(2);
                alert(`🎉 恭喜！${res} 胜出，赢取 ${win} USDT`);
            }
            active = false;
            document.getElementById('hint').textContent = "等待开局...";
        }, 15000);
    }
</script>
</body>
</html>
