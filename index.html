<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>龙虎开奖 · 实战验证版</title>
<style>
html,body{
  margin:0;
  padding:0;
  background:#000;
  overflow:hidden;
  font-family:"Microsoft YaHei",sans-serif;
}

.arena{
  position:relative;
  width:100vw;
  height:100vh;
}

/* 背景能量 */
.bg{
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center,#111,#000 70%);
  animation:bgPulse 6s ease-in-out infinite;
}
@keyframes bgPulse{
  50%{filter:brightness(1.2)}
}

/* 龙虎主体 */
.dragon,.tiger{
  position:absolute;
  top:50%;
  width:320px;
  height:320px;
  border-radius:50%;
  transform:translateY(-50%);
}

.dragon{
  left:-40%;
  background:radial-gradient(circle,#00ffff,#003344);
  box-shadow:0 0 40px #00ffff;
  animation:dragonMove 6s ease-in-out forwards;
}

.tiger{
  right:-40%;
  background:radial-gradient(circle,#ffcc00,#442200);
  box-shadow:0 0 40px #ffcc00;
  animation:tigerMove 6s ease-in-out forwards;
}

@keyframes dragonMove{
  0%{left:-40%}
  60%{left:22%}
  80%{left:18%}
  100%{left:25%}
}

@keyframes tigerMove{
  0%{right:-40%}
  60%{right:22%}
  80%{right:18%}
  100%{right:25%}
}

/* 中央能量核 */
.core{
  position:absolute;
  top:50%;
  left:50%;
  width:30px;
  height:30px;
  border-radius:50%;
  background:#fff;
  transform:translate(-50%,-50%) scale(0);
  box-shadow:0 0 0 rgba(255,255,255,0);
  animation:coreBlast 2s ease-out 5s forwards;
}

@keyframes coreBlast{
  0%{transform:translate(-50%,-50%) scale(0)}
  30%{
    transform:translate(-50%,-50%) scale(8);
    box-shadow:0 0 120px rgba(255,255,255,.9);
  }
  100%{
    transform:translate(-50%,-50%) scale(25);
    opacity:0;
  }
}

/* 屏幕震动（只在爆点） */
.shake{
  animation:shake .4s 5 5s;
}
@keyframes shake{
  0%{transform:translate(0,0)}
  25%{transform:translate(8px,-8px)}
  50%{transform:translate(-8px,8px)}
  75%{transform:translate(6px,6px)}
}

/* 结果 */
.result{
  position:absolute;
  bottom:14%;
  width:100%;
  text-align:center;
  font-size:110px;
  font-weight:900;
  letter-spacing:12px;
  opacity:0;
  animation:resultIn 1s ease-out 6.2s forwards;
}

.dragonWin{
  color:#00ffff;
  text-shadow:0 0 40px #00ffff;
}

@keyframes resultIn{
  from{opacity:0;transform:scale(.6)}
  to{opacity:1;transform:scale(1.1)}
}
</style>
</head>

<body>
<div class="arena shake">
  <div class="bg"></div>
  <div class="dragon"></div>
  <div class="tiger"></div>
  <div class="core"></div>

  <!-- 开奖结果 -->
  <div class="result dragonWin">龙 胜</div>
</div>
</body>
</html>
