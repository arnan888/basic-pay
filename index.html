<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>TITAN_TURBO_V30008</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --win: #00ff88; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: space-around; }
        
        /* 🏆 黄金余额框 */
        .header { background: rgba(0,0,0,0.8); border: 3px solid var(--gold); padding: 10px 50px; border-radius: 50px; box-shadow: 0 0 30px rgba(255,204,0,0.5); }
        #balance { font-size: 45px; color: var(--gold); text-shadow: 0 0 15px gold; }

        /* 🎡 极速旋转容器 */
        .slot-window {
            width: 280px; height: 280px; background: radial-gradient(circle, #222, #000);
            border: 12px solid #333; border-radius: 50%; position: relative;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,255,136,0.3);
        }
        
        /* 核心转盘：通过不断改变内容来实现视觉旋转 */
        #reel { font-size: 130px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); transition: 0.1s; }
        
        /* 旋转时的模糊残影类 */
        .blur-effect { filter: blur(15px) !important; transform: scale(0.8); opacity: 0.7; }

        .spin-btn {
            position: absolute; width: 110px; height: 110px; border-radius: 50%;
            background: radial-gradient(circle, #00ff88, #006633); border: 5px solid #004422;
            color: #fff; font-size: 24px; font-weight: 900; z-index: 100;
            box-shadow: 0 10px 0 #003311, 0 15px 30px rgba(0,255,136,0.6); cursor: pointer;
        }
        .spin-btn:active { transform: translateY(6px); box-shadow: 0 4px 0 #003311; }
        .spin-btn:disabled { filter: grayscale(1); opacity: 0.5; }

        .footer { width: 95%; background: #111; padding: 25px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        #win-amt { color: var(--win); font-size: 30px; font-weight: bold; }
    </style>
</head>
<body>
    <audio id="bgm" src="https://www.soundjay.com/free-music/iron-man-1.mp3" loop>
    <audio id="spin-sound" src="https://www.soundjay.com/mechanical/mechanical-clanking-1.mp3">
    <audio id="win-sound" src="https://www.soundjay.com/misc/coins-spilled-1.mp3">

    <div class="header">
        <div id="balance">0</div>
    </div>

    <div class="slot-window">
        <button class="spin-btn" id="btn" onclick="startRolling()">SPIN</button>
        <div id="reel">🦁</div>
    </div>

    <div class="footer">
        <div style="font-size:28px;">BET: <span id="bet-val" style="color:var(--gold)">100</span></div>
        <div id="win-amt">WIN: 0</div>
    </div>

    <script>
        const symbols = ['🦁', '🐯', '🐻', '🦅', '💎', '7️⃣', '💰', '👑'];
        const urlParams = new URLSearchParams(window.location.search);
        let balance = parseInt(urlParams.get('balance')) || 8888;
        let isFirst = true;
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('balance').innerText = balance.toLocaleString();

        function startRolling() {
            if(balance < 100) { tg.showAlert("余额不足！"); return; }
            
            // 激活音频
            if(isFirst) { document.getElementById('bgm').play(); isFirst = false; }
            
            balance -= 100;
            document.getElementById('balance').innerText = balance.toLocaleString();
            document.getElementById('win-amt').innerText = "WIN: 0";
            
            const reel = document.getElementById('reel');
            const btn = document.getElementById('btn');
            const spinSnd = document.getElementById('spin-sound');
            
            btn.disabled = true;
            spinSnd.play();
            tg.HapticFeedback.impactOccurred('heavy');

            // --- 核心旋转动画：快速切换图标并加模糊 ---
            let counter = 0;
            let rollInterval = setInterval(() => {
                reel.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                reel.classList.add('blur-effect'); // 加上模糊残影
                counter++;
                
                if (counter > 20) { // 旋转20次后停止
                    clearInterval(rollInterval);
                    stopRolling(reel, btn);
                }
            }, 60); // 60毫秒闪烁一次，极其迅速
        }

        function stopRolling(reel, btn) {
            reel.classList.remove('blur-effect'); // 移除模糊
            const result = symbols[Math.floor(Math.random() * symbols.length)];
            reel.innerText = result;
            
            let win = 0;
            if(result === '💎' || result === '7️⃣') win = 1000;
            else if(Math.random() > 0.7) win = 200;

            if(win > 0) {
                balance += win;
                document.getElementById('win-amt').innerText = "WIN: " + win;
                document.getElementById('win-sound').play();
                tg.HapticFeedback.notificationOccurred('success');
            }
            
            document.getElementById('balance').innerText = balance.toLocaleString();
            btn.disabled = false;
        }
    </script>
</body>
</html>
