        let balance = 89123.0, 
            totalIn = 0,       
            totalOut = 0,      
            wheelRotation = 0, 
            isBusy = false,
            storageKey = 'PB_DATA_COLLECTION'; // 后台字段集合存储键

        // 1. 初始化：从本地恢复后台字段，防止刷新归零
        function loadBackendFields() {
            const saved = localStorage.getItem(storageKey);
            if (saved) {
                const data = JSON.parse(saved);
                balance = data.balance || 89123.0;
                totalIn = data.totalIn || 0;
                totalOut = data.totalOut || 0;
                syncUI();
            }
        }

        // 2. 核心执行：对接“祝贺”按钮
        function exec() {
            if (isBusy || balance < 1) return;
            isBusy = true;

            // UI状态锁定
            const btn = document.getElementById('mainBtn');
            btn.classList.add('busy');
            
            // 后台字段实时入账
            totalIn += 1;
            balance -= 1;
            syncUI();

            // PB 控盘算法：水位检测
            const matrix = [
                {a:0,v:88,n:'旗开得胜'}, {a:45,v:50,n:'无惧浪潮'}, 
                {a:90,v:20,n:'乘风破浪'}, {a:135,v:0,n:'首战告捷'},
                {a:180,v:15,n:'屹立不倒'}, {a:225,v:0,n:'站得稳'}, 
                {a:270,v:120,n:'马到成功'}, {a:315,v:0,n:'万事如意'}
            ];

            let res;
            let rtp = totalIn > 0 ? (totalOut / totalIn) : 0;
            // 杀数逻辑：RTP超过95%强制进入“小奖/空奖”区
            if (totalIn > 5 && rtp > 0.95) {
                const killSet = matrix.filter(i => i.v <= 15);
                res = killSet[Math.floor(Math.random() * killSet.length)];
            } else {
                res = matrix[Math.floor(Math.random() * matrix.length)];
            }

            // 物理旋转：计算目标角度
            const spins = (Math.floor(Math.random() * 5) + 12) * 360; 
            const target = (360 - res.angle);
            wheelRotation += spins + (target - (wheelRotation % 360)) + 360;
            
            document.getElementById('ui_wheel').style.transform = `rotate(${wheelRotation}deg)`;

            // 结算回调
            setTimeout(() => {
                totalOut += res.v;
                balance += res.v;
                
                // 数据持久化存档
                localStorage.setItem(storageKey, JSON.stringify({balance, totalIn, totalOut}));
                
                syncUI();
                if(res.v > 0) showWinEffect(res); // 弹出祝贺效果

                isBusy = false;
                btn.classList.remove('busy');
            }, 5500);
        }

        function syncUI() {
            document.getElementById('ui_bal').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
            document.getElementById('op_in').innerText = totalIn;
            document.getElementById('op_out').innerText = totalOut;
            let rtpStr = totalIn > 0 ? (totalOut / totalIn * 100).toFixed(1) : "0.0";
            document.getElementById('op_rtp').innerText = rtpStr + "%";
        }

        function showWinEffect(res) {
            // 简单的中奖反馈提示
            const modal = document.getElementById('winModal');
            if(modal) {
                document.getElementById('winTitle').innerText = "祝贺：" + res.n;
                document.getElementById('winDesc').innerText = "获得荣誉积分 +" + res.v;
                modal.classList.add('active');
            }
        }

        // 页面加载启动
        window.onload = loadBackendFields;
