<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>至尊骰宝 · 摇骰子</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 16px;
        }
        
        .casino-table {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a4a2a, #0a2a1a);
            border-radius: 40px;
            padding: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        .gold-border {
            background: linear-gradient(135deg, #1e3a2e, #0a2a1a);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .dice-stage {
            background: linear-gradient(135deg, #0a1a0a, #051005);
            margin: 16px;
            border-radius: 28px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 10px 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,215,0,0.2);
            position: relative;
        }
        .dice-stage::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffaa44, #ffdd88, #ffaa44, transparent);
        }
        .dice-title {
            font-size: 12px;
            color: #ffaa44;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 300;
        }
        
        /* 骰子容器 */
        .three-dice {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
        }
        .dice-box {
            width: 80px;
            height: 80px;
            perspective: 500px;
        }
        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }
        /* 摇骰子动画 */
        .dice-shake {
            animation: shakeDice 0.08s infinite;
        }
        @keyframes shakeDice {
            0% { transform: translateX(0px) translateY(0px) rotateX(0deg) rotateY(0deg); }
            25% { transform: translateX(-5px) translateY(-5px) rotateX(45deg) rotateY(45deg); }
            50% { transform: translateX(5px) translateY(5px) rotateX(90deg) rotateY(90deg); }
            75% { transform: translateX(-5px) translateY(5px) rotateX(135deg) rotateY(135deg); }
            100% { transform: translateX(0px) translateY(0px) rotateX(180deg) rotateY(180deg); }
        }
        /* 翻转动画 */
        .dice-flip {
            animation: flipDice 0.6s ease-out;
        }
        @keyframes flipDice {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            50% { transform: rotateX(540deg) rotateY(360deg); }
            100% { transform: rotateX(720deg) rotateY(720deg); }
        }
        
        .dice-face {
            position: absolute;
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #f8f8f8, #e8e8e8);
            border-radius: 16px;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.8), 0 5px 12px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffaa44;
            backface-visibility: visible;
        }
        .face-front { transform: translateZ(40px); background: radial-gradient(circle at 30% 30%, #fff, #e0e0e0); }
        .face-back { transform: rotateY(180deg) translateZ(40px); background: radial-gradient(circle at 30% 30%, #fafafa, #ddd); }
        .face-right { transform: rotateY(90deg) translateZ(40px); background: radial-gradient(circle at 30% 30%, #fefefe, #e5e5e5); }
        .face-left { transform: rotateY(-90deg) translateZ(40px); background: radial-gradient(circle at 30% 30%, #f5f5f5, #dcdcdc); }
        .face-top { transform: rotateX(90deg) translateZ(40px); background: radial-gradient(circle at 30% 30%, #ffffff, #e8e8e8); }
        .face-bottom { transform: rotateX(-90deg) translateZ(40px); background: radial-gradient(circle at 30% 30%, #f0f0f0, #d5d5d5); }
        
        /* 点数圆点 */
        .dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #c0392b, #8b1a1a);
            border-radius: 50%;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), 0 1px 2px rgba(0,0,0,0.3);
        }
        .dot-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .dot-tl { top: 20%; left: 20%; }
        .dot-tr { top: 20%; right: 20%; }
        .dot-bl { bottom: 20%; left: 20%; }
        .dot-br { bottom: 20%; right: 20%; }
        .dot-mid { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .dot-l1 { left: 20%; top: 20%; }
        .dot-l2 { left: 20%; top: 50%; transform: translateY(-50%); }
        .dot-l3 { left: 20%; bottom: 20%; }
        .dot-r1 { right: 20%; top: 20%; }
        .dot-r2 { right: 20%; top: 50%; transform: translateY(-50%); }
        .dot-r3 { right: 20%; bottom: 20%; }
        
        /* 骰子面上的点数布局 */
        .face-1 .dot-center { display: flex; }
        .face-2 .dot-tl, .face-2 .dot-br { display: flex; }
        .face-3 .dot-tl, .face-3 .dot-center, .face-3 .dot-br { display: flex; }
        .face-4 .dot-tl, .face-4 .dot-tr, .face-4 .dot-bl, .face-4 .dot-br { display: flex; }
        .face-5 .dot-tl, .face-5 .dot-tr, .face-5 .dot-center, .face-5 .dot-bl, .face-5 .dot-br { display: flex; }
        .face-6 .dot-l1, .face-6 .dot-l2, .face-6 .dot-l3, .face-6 .dot-r1, .face-6 .dot-r2, .face-6 .dot-r3 { display: flex; }
        
        .total-area {
            text-align: center;
            margin-top: 10px;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            border: 1px solid rgba(255,170,68,0.3);
            cursor: pointer;
        }
        .total-label {
            font-size: 12px;
            color: #ffaa88;
            letter-spacing: 2px;
        }
        .total-number {
            font-size: 56px;
            font-weight: 900;
            color: #ffcc44;
            text-shadow: 0 0 15px #ff6600;
            font-family: monospace;
        }
        .rolling-animation {
            animation: totalGlow 0.05s step-end infinite;
        }
        @keyframes totalGlow {
            0% { text-shadow: 0 0 5px #ffaa44; transform: scale(1); }
            50% { text-shadow: 0 0 25px #ff6600; color: #ffdd88; transform: scale(1.05); }
            100% { text-shadow: 0 0 5px #ffaa44; transform: scale(1); }
        }
        
        .bet-panel {
            background: rgba(0,0,0,0.4);
            margin: 16px;
            border-radius: 24px;
            padding: 16px;
            backdrop-filter: blur(8px);
        }
        
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,170,68,0.3);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #ffaa44, #ff6600);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .user-name {
            font-size: 14px;
            color: #ffaa44;
            font-weight: bold;
        }
        .btn-icon {
            background: rgba(255,170,68,0.2);
            border: 1px solid rgba(255,170,68,0.5);
            border-radius: 30px;
            padding: 6px 16px;
            color: #ffaa44;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.1s;
        }
        .btn-icon:active { transform: scale(0.95); }
        
        .points-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .point-card {
            background: linear-gradient(145deg, #1a2a1a, #0a1a0a);
            border-radius: 20px;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.08s linear;
            border: 1px solid rgba(255,170,68,0.3);
        }
        .point-card.selected {
            background: linear-gradient(145deg, #ff6600, #cc3300);
            transform: scale(0.97);
            border-color: #ffdd88;
            box-shadow: 0 0 15px rgba(255,102,0,0.5);
        }
        .point-value {
            font-size: 22px;
            font-weight: 900;
            color: #ffcc44;
        }
        .point-card.selected .point-value { color: #fff; }
        .point-odds {
            font-size: 11px;
            color: #88aa88;
            margin-top: 5px;
        }
        .point-card.selected .point-odds { color: #ffdd99; }
        
        .chips-area {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .chip {
            width: 65px;
            padding: 10px 0;
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            color: #fff;
            cursor: pointer;
            transition: all 0.08s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5);
            border: 1px solid #ffdd88;
        }
        .chip:active { transform: scale(0.94); }
        .chip-10 { background: radial-gradient(circle at 30% 30%, #4a90d9, #1a4a8a); }
        .chip-20 { background: radial-gradient(circle at 30% 30%, #50b86a, #2a6a3a); }
        .chip-50 { background: radial-gradient(circle at 30% 30%, #e85d3a, #aa2a1a); }
        .chip-100 { background: radial-gradient(circle at 30% 30%, #9b59b6, #6c3483); }
        .chip-500 { background: radial-gradient(circle at 30% 30%, #f1c40f, #d4a00a); color: #333; }
        .chip-1000 { background: radial-gradient(circle at 30% 30%, #e74c3c, #c0392b); }
        
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }
        .stat-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255,170,68,0.2);
        }
        .stat-label {
            font-size: 11px;
            color: #88aa88;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffcc44;
            font-family: monospace;
        }
        
        .countdown-area {
            text-align: center;
            margin: 16px 0;
        }
        .countdown-label {
            font-size: 11px;
            color: #88aa88;
            letter-spacing: 2px;
        }
        .countdown-number {
            font-size: 32px;
            font-weight: bold;
            color: #ffaa44;
            font-family: monospace;
        }
        .countdown-warning {
            animation: countdownFlash 0.5s ease-in-out infinite;
            color: #ff3300 !important;
        }
        @keyframes countdownFlash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; text-shadow: 0 0 10px #ff3300; }
        }
        
        .history-area {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 12px;
            margin: 16px 0;
        }
        .history-header {
            font-size: 11px;
            color: #ffaa44;
            text-align: center;
            margin-bottom: 10px;
        }
        .history-list {
            max-height: 100px;
            overflow-y: auto;
            font-size: 11px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            color: #ccc;
        }
        .history-win { color: #4caf50; font-weight: bold; }
        .history-lose { color: #f44336; }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .action-btn {
            flex: 1;
            padding: 14px;
            border-radius: 50px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            color: #ffaa44;
            border: 1px solid rgba(255,170,68,0.3);
            font-size: 14px;
        }
        .action-btn:active { transform: scale(0.97); }
        .action-btn-primary {
            background: linear-gradient(135deg, #ff6600, #cc3300);
            color: white;
            border: none;
        }
        
        .balance-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        .balance-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255,170,68,0.2);
            cursor: pointer;
        }
        .balance-label {
            font-size: 10px;
            color: #88aa88;
        }
        .balance-value {
            font-size: 22px;
            font-weight: bold;
            color: #ffcc44;
            font-family: monospace;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: linear-gradient(145deg, #1a2a1a, #0a1a0a);
            width: 85%;
            max-width: 340px;
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            color: white;
            border: 1px solid #ffaa44;
        }
        .modal-content button {
            background: linear-gradient(135deg, #ff6600, #cc3300);
            border: none;
            border-radius: 50px;
            padding: 10px 24px;
            margin-top: 16px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        .btn-highlight {
            animation: btnFlash 0.1s ease-out;
        }
        @keyframes btnFlash {
            0% { transform: scale(1); }
            50% { transform: scale(0.92); }
            100% { transform: scale(1); }
        }
        
        .history-list::-webkit-scrollbar {
            width: 3px;
        }
        .history-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #ffaa44;
            border-radius: 3px;
        }
    </style>
</head>

<script>
(function(){
    // 赔率表
    const oddsMap = {
        4: 60, 5: 30, 6: 18, 7: 12, 8: 8, 9: 7, 10: 6,
        11: 6, 12: 7, 13: 8, 14: 12, 15: 18, 16: 30, 17: 60
    };
    
    // 用户数据
    let users = JSON.parse(localStorage.getItem('sicbo_users')) || {};
    let CURRENT_USER_ID = "player888";
    if (!users[CURRENT_USER_ID]) {
        users[CURRENT_USER_ID] = { balance: 1000.00, records: [] };
        localStorage.setItem('sicbo_users', JSON.stringify(users));
    }
    let ADMIN_PASSWORD = "wang000000";
    
    function saveUsers() { localStorage.setItem('sicbo_users', JSON.stringify(users)); }
    function getBalance(uid) { if (!users[uid]) users[uid] = { balance: 1000.00, records: [] }; return users[uid].balance; }
    function setBalance(uid, amt) { if (!users[uid]) users[uid] = { balance: 1000.00, records: [] }; users[uid].balance = amt; saveUsers(); }
    function getUserList() { return Object.keys(users); }
    function generateRandomId() { return "player_" + Math.floor(Math.random() * 1000000); }

    // 游戏状态
    let state = {
        balance: getBalance(CURRENT_USER_ID),
        selectedPoint: null,
        betAmount: 0,
        countdown: 25,
        countdownInterval: null,
        isDrawing: false
    };
    let isBetLocked = false;
    
    const diceElements = [
        document.getElementById('dice1'),
        document.getElementById('dice2'),
        document.getElementById('dice3')
    ];
    
    // 设置骰子显示
    function setDiceDisplay(diceEl, value) {
        // 移除所有面类
        const faces = diceEl.querySelectorAll('.dice-face');
        faces.forEach(face => {
            face.style.display = 'none';
        });
        // 显示对应的面
        const targetFace = diceEl.querySelector(`.face-${value}`);
        if (targetFace) targetFace.style.display = 'flex';
    }
    
    // 摇骰子动画
    let rollingInterval = null;
    function startDiceRolling(final1, final2, final3, finalTotal, winAmount) {
        const totalEl = document.getElementById('totalPoints');
        
        if (rollingInterval) clearInterval(rollingInterval);
        
        // 添加摇动动画
        diceElements.forEach(el => el.classList.add('dice-shake'));
        totalEl.classList.add('rolling-animation');
        
        let step = 0;
        const steps = 20;
        
        rollingInterval = setInterval(() => {
            step++;
            // 随机显示
            const r1 = Math.floor(Math.random() * 6) + 1;
            const r2 = Math.floor(Math.random() * 6) + 1;
            const r3 = Math.floor(Math.random() * 6) + 1;
            setDiceDisplay(diceElements[0], r1);
            setDiceDisplay(diceElements[1], r2);
            setDiceDisplay(diceElements[2], r3);
            totalEl.innerText = r1 + r2 + r3;
            
            if (step >= steps) {
                clearInterval(rollingInterval);
                rollingInterval = null;
                diceElements.forEach(el => el.classList.remove('dice-shake'));
                totalEl.classList.remove('rolling-animation');
                
                // 添加翻转效果
                diceElements.forEach(el => el.classList.add('dice-flip'));
                setTimeout(() => {
                    diceElements.forEach(el => el.classList.remove('dice-flip'));
                }, 600);
                
                // 显示最终结果
                setDiceDisplay(diceElements[0], final1);
                setDiceDisplay(diceElements[1], final2);
                setDiceDisplay(diceElements[2], final3);
                totalEl.innerText = finalTotal;
                
                if (winAmount > 0) {
                    totalEl.style.color = '#4caf50';
                    totalEl.style.textShadow = '0 0 20px #4caf50';
                    setTimeout(() => {
                        totalEl.style.color = '#ffcc44';
                        totalEl.style.textShadow = '0 0 15px #ff6600';
                    }, 2000);
                } else {
                    totalEl.style.color = '#f44336';
                    setTimeout(() => {
                        totalEl.style.color = '#ffcc44';
                    }, 2000);
                }
            }
        }, 60);
    }

    // 开奖
    function executeDraw() {
        if (state.isDrawing) return;
        state.isDrawing = true;
        isBetLocked = true;
        
        const d1 = Math.floor(Math.random() * 6) + 1;
        const d2 = Math.floor(Math.random() * 6) + 1;
        const d3 = Math.floor(Math.random() * 6) + 1;
        const total = d1 + d2 + d3;
        
        let win = 0;
        let isWin = false;
        if (state.selectedPoint !== null && state.selectedPoint === total) {
            const odds = oddsMap[total];
            win = state.betAmount * odds;
            isWin = true;
        }
        
        startDiceRolling(d1, d2, d3, total, win);
        
        const newBalance = state.balance - state.betAmount + win;
        setBalance(CURRENT_USER_ID, newBalance);
        state.balance = newBalance;
        
        let recs = users[CURRENT_USER_ID].records || [];
        recs.unshift({
            time: new Date().toLocaleTimeString(),
            point: state.selectedPoint,
            bet: state.betAmount,
            result: total,
            win: win,
            isWin: isWin
        });
        if (recs.length > 30) recs.pop();
        users[CURRENT_USER_ID].records = recs;
        saveUsers();
        refreshHistory();
        updateUI();
        
        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(isWin ? [100, 50, 100] : 80);
        
        setTimeout(() => {
            state.selectedPoint = null;
            state.betAmount = 0;
            state.isDrawing = false;
            updateUI();
            document.querySelectorAll('.point-card').forEach(c => c.classList.remove('selected'));
            startCountdown(25);
        }, 5000);
    }

    function placeBet() {
        if (state.isDrawing || isBetLocked) {
            showModal("开奖进行中，请稍候...", "好的");
            return;
        }
        if (state.selectedPoint === null) {
            showModal("请先选择一个点数下注", "好的");
            return;
        }
        if (state.betAmount <= 0) {
            showModal("请先选择筹码金额", "好的");
            return;
        }
        if (state.betAmount > state.balance) {
            showModal("余额不足！当前余额：" + state.balance.toFixed(2), "知道了");
            return;
        }
        
        clearCountdown();
        executeDraw();
    }

    function addBet(amount) {
        if (state.isDrawing || isBetLocked) return;
        state.betAmount += amount;
        if (state.betAmount < 0) state.betAmount = 0;
        updateUI();
        flashButton(document.querySelector(`.chip[data-amount="${amount}"]`));
    }

    function selectPoint(point) {
        if (state.isDrawing || isBetLocked) return;
        state.selectedPoint = point;
        updateUI();
        document.querySelectorAll('.point-card').forEach(card => {
            if (parseInt(card.dataset.point) === point) {
                card.classList.add('selected');
            } else {
                card.classList.remove('selected');
            }
        });
        flashButton(document.querySelector(`.point-card[data-point="${point}"]`));
    }

    function cancelBet() {
        if (state.isDrawing || isBetLocked) return;
        state.selectedPoint = null;
        state.betAmount = 0;
        updateUI();
        document.querySelectorAll('.point-card').forEach(c => c.classList.remove('selected'));
        flashButton(document.getElementById('cancelBtn'));
    }

    function refreshBalance() {
        state.balance = getBalance(CURRENT_USER_ID);
        updateUI();
        flashButton(document.getElementById('refreshBtn'));
    }

    function updateUI() {
        document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2);
        document.getElementById('currentBetAmount').innerText = state.betAmount;
        document.getElementById('selectedPoint').innerText = state.selectedPoint !== null ? state.selectedPoint : '-';
        let pool = 50000 + (Math.random() - 0.5) * 3000;
        pool = Math.max(40000, Math.min(60000, pool));
        document.getElementById('poolDisplay').innerText = pool.toFixed(2);
    }

    function refreshHistory() {
        const container = document.getElementById('historyList');
        if (!container) return;
        const recs = users[CURRENT_USER_ID]?.records || [];
        container.innerHTML = '';
        if (recs.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#666; padding:10px;">暂无记录</div>';
            return;
        }
        recs.slice(0, 12).forEach(r => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${r.time}</span>
                            <span>押${r.point}点 ${r.bet}</span>
                            <span>开${r.result}点</span>
                            <span class="${r.isWin ? 'history-win' : 'history-lose'}">${r.isWin ? `+${r.win}` : `-${r.bet}`}</span>`;
            container.appendChild(div);
        });
    }

    function startCountdown(sec) {
        if(state.countdownInterval) clearInterval(state.countdownInterval);
        state.countdown = sec;
        const cdSpan = document.getElementById('countdownNum');
        cdSpan.innerText = state.countdown;
        cdSpan.classList.remove('countdown-warning');
        
        isBetLocked = false;
        
        state.countdownInterval = setInterval(() => {
            if(state.countdown <= 1){
                clearInterval(state.countdownInterval);
                state.countdownInterval = null;
                isBetLocked = true;
                if (state.selectedPoint !== null && state.betAmount > 0 && state.betAmount <= state.balance) {
                    placeBet();
                } else {
                    startCountdown(25);
                }
            } else {
                state.countdown--;
                cdSpan.innerText = state.countdown;
                if(state.countdown <= 5) {
                    cdSpan.classList.add('countdown-warning');
                }
            }
        }, 1000);
    }

    function clearCountdown() { if(state.countdownInterval){ clearInterval(state.countdownInterval); state.countdownInterval=null; } }

    function switchUser() {
        if(state.isDrawing) return;
        const newId = document.getElementById('switchUserIdInput').value.trim();
        if(!newId) return;
        CURRENT_USER_ID = newId;
        if (!users[CURRENT_USER_ID]) { users[CURRENT_USER_ID] = { balance: 1000.00, records: [] }; saveUsers(); }
        document.getElementById('currentUserId').innerText = CURRENT_USER_ID;
        state.balance = getBalance(CURRENT_USER_ID);
        state.selectedPoint = null;
        state.betAmount = 0;
        state.isDrawing = false;
        isBetLocked = false;
        updateUI();
        clearCountdown();
        startCountdown(25);
        refreshHistory();
        document.querySelectorAll('.point-card').forEach(c => c.classList.remove('selected'));
    }

    function showModal(msg, btnText) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>🎲 至尊骰宝</h3><p style="margin:15px 0;">${msg}</p><button id="modalCloseBtn">${btnText}</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('modalCloseBtn').onclick = () => modal.remove();
    }

    function flashButton(btn) {
        if(!btn) return;
        btn.classList.add('btn-highlight');
        setTimeout(() => btn.classList.remove('btn-highlight'), 150);
        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(15);
    }

    function showHistory() {
        const recs = users[CURRENT_USER_ID]?.records || [];
        let html = `<div style="max-height:350px; overflow-y:auto; text-align:left;">`;
        if (recs.length === 0) html += "<p style='text-align:center;'>暂无记录</p>";
        else {
            recs.slice(0, 40).forEach(r => {
                html += `<div style="padding:8px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
                            <span>${r.time}</span>
                            <span>押${r.point}点 ${r.bet}</span>
                            <span>开${r.result}点</span>
                            <span style="color:${r.isWin?'#4caf50':'#f44336'}">${r.isWin ? `+${r.win}` : `-${r.bet}`}</span>
                         </div>`;
            });
        }
        html += `</div><button id="closeHistoryBtn" style="margin-top:16px;">关闭</button>`;
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>📜 投注记录</h3>${html}</div>`;
        document.body.appendChild(modal);
        document.getElementById('closeHistoryBtn').onclick = () => modal.remove();
    }

    function createPointsGrid() {
        const grid = document.getElementById('pointsGrid');
        grid.innerHTML = '';
        for (let i = 4; i <= 17; i++) {
            const odds = oddsMap[i];
            const card = document.createElement('div');
            card.className = 'point-card';
            card.dataset.point = i;
            card.innerHTML = `<div class="point-value">${i}</div>
                             <div class="point-odds">赔 ${odds}倍</div>`;
            card.onclick = () => selectPoint(i);
            grid.appendChild(card);
        }
    }

    // ========== 管理员面板 ==========
    let adminPanel = null;
    let selectedAdminUserId = CURRENT_USER_ID;
    
    function showAdminPanel() {
        if (adminPanel) { adminPanel.remove(); adminPanel = null; return; }
        const panel = document.createElement('div');
        panel.className = 'modal';
        panel.innerHTML = `<div class="modal-content" style="width:90%; max-width:360px;">
            <h3>🔐 管理员面板</h3>
            <div id="adminUserList" style="max-height:150px; overflow-y:auto; margin:12px 0; background:#1a2a1a; border-radius:12px; padding:8px;"></div>
            <div>当前选中：<strong id="selectedUserDisplay">${selectedAdminUserId}</strong></div>
            <input type="number" id="adminAmount" placeholder="金额" value="0" style="margin:8px 0; width:100%; padding:8px; border-radius:8px; background:#1a2a1a; border:1px solid #ffaa44; color:white;">
            <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:12px 0;">
                <button id="adminAddBtn" style="background:#4caf50; border:none; border-radius:8px; padding:8px 16px; color:white;">上分</button>
                <button id="adminSubBtn" style="background:#f44336; border:none; border-radius:8px; padding:8px 16px; color:white;">下分</button>
                <button id="adminQueryBtn" style="background:#2196f3; border:none; border-radius:8px; padding:8px 16px; color:white;">查询</button>
                <button id="adminResetBtn" style="background:#ff9800; border:none; border-radius:8px; padding:8px 16px; color:white;">重置</button>
                <button id="adminChangePwdBtn" style="background:#9c27b0; border:none; border-radius:8px; padding:8px 16px; color:white;">改密</button>
            </div>
            <button id="adminCloseBtn" style="background:#ffaa44; border:none; border-radius:8px; padding:8px 20px; margin-top:8px;">关闭</button>
        </div>`;
        document.body.appendChild(panel);
        adminPanel = panel;
        
        function refreshUserList() {
            const userListDiv = document.getElementById('adminUserList');
            if (!userListDiv) return;
            const usersArr = getUserList();
            userListDiv.innerHTML = '';
            usersArr.forEach(uid => {
                const div = document.createElement('div');
                div.style.padding = '6px';
                div.style.borderBottom = '1px solid #555';
                div.style.cursor = 'pointer';
                div.style.background = uid === selectedAdminUserId ? '#ffaa44' : 'transparent';
                div.style.color = uid === selectedAdminUserId ? '#1a1a2a' : 'white';
                div.textContent = uid + ' (' + getBalance(uid).toFixed(2) + ')';
                div.onclick = () => { selectedAdminUserId = uid; document.getElementById('selectedUserDisplay').innerText = selectedAdminUserId; refreshUserList(); };
                userListDiv.appendChild(div);
            });
        }
        refreshUserList();
        
        document.getElementById('adminAddBtn').onclick = () => {
            let amount = parseFloat(document.getElementById('adminAmount').value);
            if (isNaN(amount) || amount <= 0) { alert("请输入正数"); return; }
            let cur = getBalance(selectedAdminUserId);
            setBalance(selectedAdminUserId, cur + amount);
            refreshUserList();
            if (selectedAdminUserId === CURRENT_USER_ID) { state.balance = getBalance(CURRENT_USER_ID); updateUI(); }
            alert(`✅ 已给 ${selectedAdminUserId} 上分 ${amount}`);
        };
        document.getElementById('adminSubBtn').onclick = () => {
            let amount = parseFloat(document.getElementById('adminAmount').value);
            if (isNaN(amount) || amount <= 0) { alert("请输入正数"); return; }
            let cur = getBalance(selectedAdminUserId);
            if (cur < amount) { alert("余额不足"); return; }
            setBalance(selectedAdminUserId, cur - amount);
            refreshUserList();
            if (selectedAdminUserId === CURRENT_USER_ID) { state.balance = getBalance(CURRENT_USER_ID); updateUI(); }
            alert(`✅ 已从 ${selectedAdminUserId} 下分 ${amount}`);
        };
        document.getElementById('adminQueryBtn').onclick = () => {
            alert(`${selectedAdminUserId} 余额: ${getBalance(selectedAdminUserId).toFixed(2)}`);
        };
        document.getElementById('adminResetBtn').onclick = () => {
            if (confirm(`重置 ${selectedAdminUserId} 余额为1000？`)) {
                setBalance(selectedAdminUserId, 1000);
                refreshUserList();
                if (selectedAdminUserId === CURRENT_USER_ID) { state.balance = getBalance(CURRENT_USER_ID); updateUI(); }
                alert("重置成功");
            }
        };
        document.getElementById('adminChangePwdBtn').onclick = () => {
            let old = prompt("当前密码:");
            if (old !== ADMIN_PASSWORD) { alert("密码错误"); return; }
            let newPwd = prompt("新密码(至少6位):");
            if (!newPwd || newPwd.length < 6) { alert("密码至少6位"); return; }
            ADMIN_PASSWORD = newPwd;
            localStorage.setItem('sicbo_admin_pwd', newPwd);
            alert("密码修改成功");
        };
        document.getElementById('adminCloseBtn').onclick = () => { panel.remove(); adminPanel = null; };
    }
    
    // 管理员入口 - 点击余额区域
    let adminClickTimer = null;
    function onAdminEntry() {
        if (adminClickTimer) clearTimeout(adminClickTimer);
        adminClickTimer = setTimeout(() => {
            const pwd = prompt("🔐 管理员验证\n请输入密码:");
            if (pwd === ADMIN_PASSWORD) {
                showAdminPanel();
            } else if (pwd !== null) {
                alert("密码错误");
            }
            adminClickTimer = null;
        }, 200);
    }

    function bindEvents() {
        document.getElementById('refreshBtn').onclick = refreshBalance;
        document.getElementById('cancelBtn').onclick = cancelBet;
        document.getElementById('fightBtn').onclick = placeBet;
        document.getElementById('switchUserBtn').onclick = switchUser;
        document.getElementById('myHistoryBtn').onclick = showHistory;
        document.getElementById('newUserBtn').onclick = () => {
            const newId = generateRandomId();
            document.getElementById('switchUserIdInput').value = newId;
            switchUser();
            showModal(`新账户创建成功！<br>ID: ${newId}<br>初始余额: 1000.00`, "开始游戏");
        };
        // 管理员入口 - 点击余额卡片
        document.getElementById('adminBalanceEntry').onclick = onAdminEntry;
        
        document.querySelectorAll('.chip').forEach(chip => {
            chip.onclick = () => {
                const amount = parseInt(chip.dataset.amount);
                addBet(amount);
            };
        });
    }

    // 初始化骰子
    function initDice() {
        setDiceDisplay(diceElements[0], 1);
        setDiceDisplay(diceElements[1], 1);
        setDiceDisplay(diceElements[2], 1);
    }

    function init() {
        initDice();
        createPointsGrid();
        bindEvents();
        updateUI();
        refreshHistory();
        startCountdown(25);
        
        // 读取保存的密码
        let savedPwd = localStorage.getItem('sicbo_admin_pwd');
        if (savedPwd) ADMIN_PASSWORD = savedPwd;
        
        if (!localStorage.getItem('sicbo_first')) {
            localStorage.setItem('sicbo_first', 'true');
            setTimeout(() => {
                showModal("🎲 3D至尊骰宝\n\n• 4-17点可选，不同点数赔率不同\n• 4点和17点赔率最高60倍\n• 25秒下注时间\n• 开奖有摇骰子动画\n• 点击「余额」进入管理员后台\n\n祝您好运！", "进入游戏");
            }, 500);
        }
    }
    
    init();
})();
</script>
</body>
</html>
