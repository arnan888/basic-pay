<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA 旗舰量化终端</title>
    <style>
        body { background: #0b0f0d; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* 🔒 激活页面 - 强制固定初始码 179245 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #1c221e; padding: 40px 25px; border-radius: 20px; border: 11px solid #00ff88; text-align: center; width: 85%; max-width: 350px; }
        .id-input { width: 100%; padding: 15px; background: #fff; color: #000; font-size: 32px; font-weight: bold; border-radius: 10px; border: 4px solid #ff3333; margin: 20px 0; box-sizing: border-box; }
        .btn-red { width: 100%; padding: 18px; background: #ff0000; color: #fff; border: none; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; }

        /* 🎮 游戏页面 - 深度复刻 27454.jpg 布局 */
        #game-page { display: none; width: 100%; height: 100vh; flex-direction: column; background: #121a16; }
        .header { background: #1a251f; margin: 15px; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #2d3e34; }
        .bal-val { font-size: 60px; color: #ff6b6b; font-weight: bold; margin: 5px 0; }
        
        /* 🎡 纯代码彩色转盘 - 彻底解决 27449/27451 报错 */
        .wheel-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background-image: radial-gradient(#2d3e34 1px, transparent 1px); background-size: 20px 20px; }
        #wheel { 
            width: 320px; height: 320px; border-radius: 50%; border: 12px solid #233129;
            background: conic-gradient(#333 0 45deg, #ff4d4d 45deg 90deg, #f1c40f 90deg 135deg, #3498db 135deg 180deg, #9b59b6 180deg 225deg, #2ecc71 225deg 270deg, #e67e22 225deg 315deg, #1abc9c 315deg 360deg);
            transition: transform 4s cubic-bezier(0.1, 0.9, 0.3, 1);
            position: relative;
        }
        .pointer { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 30px solid #fff; z-index: 10; }
        .label { position: absolute; width: 100%; height: 100%; text-align: center; font-size: 12px; font-weight: bold; padding-top: 25px; box-sizing: border-box; pointer-events: none; }

        .footer { background: #4a1414; padding: 30px; text-align: center; }
        .btn-spin { background: #ff4d4d; color: #fff; padding: 18px 80px; border-radius: 40px; font-size: 24px; font-weight: bold; border: none; box-shadow: 0 5px 0 #b33636; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin:0;">终端激活</h2>
            <div class="id-input">179245</div>
            <button class="btn-red" onclick="go()">确认进入</button>
            <p style="color:#00ff88; font-size:12px; margin-top:15px;">● 系统已自动分配激活序列号</p>
        </div>
    </div>

    <div id="game-page">
        <div style="text-align:center; padding:10px; color:#f1c40f; font-size:12px;">⚡ 量化终端 · 公平游戏 ⚡</div>
        <div class="header">
            <div style="color:#8aa095;">💰 可用余额 (USDT)</div>
            <div class="bal-val" id="money">1000.00</div>
            <div style="color:#f1c40f; font-size:14px;">🔥 单注额度: 10.0</div>
        </div>

        <div class="wheel-wrap">
            <div class="pointer"></div>
            <div id="wheel">
                <div class="label" style="transform:rotate(0deg)">🐺 孤狼</div>
                <div class="label" style="transform:rotate(90deg)">🐢 玄武</div>
                <div class="label" style="transform:rotate(180deg)">🐯 猛虎</div>
                <div class="label" style="transform:rotate(270deg)">🐲 神龙</div>
            </div>
        </div>

        <div class="footer">
            <button class="btn-spin" onclick="run()">▶ 执行抽取</button>
        </div>
    </div>

    <script>
        // 跳转并锁定 ID 逻辑
        if (window.location.search.includes('user_id')) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('game-page').style.display = 'flex';
        }

        function go() {
            window.location.href = window.location.origin + window.location.pathname + "?user_id=179245";
        }

        let bal = 1000.00;
        function run() {
            if (bal < 10) return alert("请充值");
            bal -= 10;
            document.getElementById('money').innerText = bal.toFixed(2);
            const deg = Math.floor(3600 + Math.random() * 3600);
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;
        }
    </script>
</body>
</html>
