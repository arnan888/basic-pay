<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOLA 旗舰量化终端</title>
    <style>
        body { background: #0b0f0d; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .box { background: #1c221e; padding: 40px 25px; border-radius: 20px; border: 11px solid #00ff88; text-align: center; width: 85%; max-width: 350px; }
        .id-num { width: 100%; padding: 15px; background: #fff; color: #000; font-size: 32px; font-weight: bold; border-radius: 10px; border: 4px solid #ff3333; margin: 20px 0; box-sizing: border-box; }
        .btn-go { width: 100%; padding: 18px; background: #ff0000; color: #fff; border: none; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; }
        #main { display: none; width: 100%; height: 100vh; flex-direction: column; background: #121a16; }
        .card { background: #1a251f; margin: 15px; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #2d3e34; }
        .red-text { font-size: 60px; color: #ff6b6b; font-weight: bold; }
        .wheel-box { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #wheel { width: 310px; height: 310px; border-radius: 50%; border: 10px solid #233129; background: conic-gradient(#ff4d4d 0 90deg, #f1c40f 90deg 180deg, #3498db 180deg 270deg, #2ecc71 270deg 360deg); transition: transform 4s cubic-bezier(0.1, 0.9, 0.3, 1); }
        .footer { background: #4a1414; padding: 30px; text-align: center; }
        .btn-play { background: #ff4d4d; color: #fff; padding: 18px 80px; border-radius: 40px; font-size: 24px; font-weight: bold; border: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="box">
            <h2>终端激活</h2>
            <div class="id-num">179245</div>
            <button class="btn-go" onclick="active()">确认进入</button>
        </div>
    </div>

    <div id="main">
        <div class="card">
            <div style="color:#8aa095;">💰 可用余额 (USDT)</div>
            <div class="red-text" id="money">1000.00</div>
            <div style="color:#f1c40f; font-size:14px;">🔥 单注额度: 10.0</div>
        </div>
        <div class="wheel-box"><div id="wheel"></div></div>
        <div class="footer"><button class="btn-play" onclick="play()">▶ 执行抽取</button></div>
    </div>

    <script>
        // 跳转并锁定 ID，确保页面重新加载时执行逻辑
        if (window.location.search.includes('user_id')) {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
        }

        function active() {
            window.location.href = window.location.origin + window.location.pathname + "?user_id=179245";
        }

        // 【核心：JavaScript 变量也强制初始化为 1000】
        let currentMoney = 1000.00; 

        function play() {
            if (currentMoney < 10) return alert("请充值");
            currentMoney -= 10;
            document.getElementById('money').innerText = currentMoney.toFixed(2);
            document.getElementById('wheel').style.transform = `rotate(${Math.floor(3600 + Math.random() * 3600)}deg)`;
        }
    </script>
</body>
</html>
