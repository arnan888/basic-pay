<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>双游戏大厅 | 葫芦鱼+骰宝 | 全自动循环 | 抢庄+服务费 | 50条记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #1a120c;
            background-image: radial-gradient(circle at 20% 30%, rgba(200,140,70,0.15) 2%, transparent 2.5%);
            background-size: 28px 28px;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            padding: 12px;
        }
        .app {
            max-width: 550px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .game-nav {
            background: linear-gradient(145deg, #2a241e 0%, #1f1a15 100%);
            border-radius: 60px;
            padding: 6px;
            display: flex;
            gap: 8px;
            border: 1px solid #ffaa44;
        }
        .game-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #ccaa77;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .game-tab.active {
            background: #c47c3a;
            color: #2f1b0a;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .user-section {
            background: #1f1711;
            border-radius: 40px;
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 8px;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .user-info-row span {
            color: #ffdd99;
            font-size: 0.75rem;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .logout-btn, .service-btn {
            background: #734c2e;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            color: #ffe3b3;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .service-btn {
            background: #2e7d32;
        }
        .charge-withdraw-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .charge-btn, .withdraw-btn {
            background: #c47c3a;
            border: none;
            padding: 5px 20px;
            border-radius: 30px;
            color: #2f1b0a;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            flex: 1;
            text-align: center;
            box-shadow: 0 2px 0 #764e26;
        }
        .withdraw-btn {
            background: #734c2e;
            color: #ffe3b3;
            box-shadow: 0 2px 0 #3f2a1a;
        }
        .game-container {
            background: linear-gradient(145deg, #362a1f 0%, #251e16 100%);
            border-radius: 48px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.5);
            overflow: hidden;
            min-height: 550px;
        }
        .auth-panel {
            background: linear-gradient(145deg, #362a1f 0%, #251e16 100%);
            border-radius: 48px;
            padding: 30px 20px;
            text-align: center;
            border: 2px solid #ffaa44;
        }
        .auth-panel h2 {
            color: #ffdd99;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a241e;
            border: 1px solid #ffaa44;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            text-align: center;
        }
        .auth-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .auth-btn {
            flex: 1;
            background: #c47c3a;
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: #2f1b0a;
            font-weight: bold;
            cursor: pointer;
        }
        .auth-note {
            color: #aa8855;
            font-size: 0.65rem;
        }
        .chip {
            background: #ebbc7e;
            color: #3a240f;
            font-weight: bold;
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 2px 0 #8b5a2e;
            display: inline-block;
            text-align: center;
            transition: 0.05s linear;
        }
        .chip.selected {
            background: #f7c56e;
            box-shadow: 0 0 0 1px #ffefb0, 0 2px 0 #7a4b22;
        }
        .bet-card {
            background: #1f1712;
            border-radius: 28px;
            padding: 4px 2px;
            text-align: center;
            box-shadow: 0 6px 0 #0a0705;
            border: 1px solid #6f4f34;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .bet-card:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #0a0705;
        }
        .bet-name {
            font-size: 0.65rem;
            font-weight: bold;
            color: #ffddb0;
        }
        .bet-odds {
            font-size: 0.55rem;
            color: #dba959;
        }
        .bet-amount {
            background: #0c0907;
            border-radius: 30px;
            padding: 2px 4px;
            margin: 4px 3px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2px;
        }
        .btn-chip {
            background: #523b26;
            border: none;
            color: #fce2b4;
            font-weight: bold;
            width: 24px;
            height: 24px;
            border-radius: 25px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .grab-btn {
            background: #ffaa44;
            color: #2f1b0a;
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .grab-btn:disabled {
            background: #888;
            cursor: not-allowed;
        }
        .dice {
            width: 60px;
            height: 60px;
            position: relative;
            transform-style: preserve-3d;
        }
        .dice-face {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #fffff0, #f5f5dc);
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(200,180,120,0.5);
        }
        .front { transform: translateZ(30px); }
        .back { transform: rotateY(180deg) translateZ(30px); }
        .right { transform: rotateY(90deg) translateZ(30px); }
        .left { transform: rotateY(-90deg) translateZ(30px); }
        .top { transform: rotateX(90deg) translateZ(30px); }
        .bottom { transform: rotateX(-90deg) translateZ(30px); }
        .pip {
            position: absolute;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #e74c3c, #c0392b);
        }
        .face-1 .pip-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .face-2 .pip-tl { top: 20%; left: 20%; }
        .face-2 .pip-br { bottom: 20%; right: 20%; }
        .face-3 .pip-tl { top: 20%; left: 20%; }
        .face-3 .pip-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .face-3 .pip-br { bottom: 20%; right: 20%; }
        .face-4 .pip-tl { top: 20%; left: 20%; }
        .face-4 .pip-tr { top: 20%; right: 20%; }
        .face-4 .pip-bl { bottom: 20%; left: 20%; }
        .face-4 .pip-br { bottom: 20%; right: 20%; }
        .face-5 .pip-tl { top: 20%; left: 20%; }
        .face-5 .pip-tr { top: 20%; right: 20%; }
        .face-5 .pip-mid { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .face-5 .pip-bl { bottom: 20%; left: 20%; }
        .face-5 .pip-br { bottom: 20%; right: 20%; }
        .face-6 .pip-l1 { left: 20%; top: 15%; }
        .face-6 .pip-l2 { left: 20%; top: 50%; transform: translateY(-50%); }
        .face-6 .pip-l3 { left: 20%; bottom: 15%; }
        .face-6 .pip-r1 { right: 20%; top: 15%; }
        .face-6 .pip-r2 { right: 20%; top: 50%; transform: translateY(-50%); }
        .face-6 .pip-r3 { right: 20%; bottom: 15%; }
        .result-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.6);
            background: linear-gradient(145deg, #ffcc44, #ff9933);
            color: #1a1a2a;
            padding: 24px 40px;
            border-radius: 80px;
            font-size: 2rem;
            font-weight: 900;
            z-index: 2000;
            opacity: 0;
            transition: 0.25s;
            pointer-events: none;
        }
        .result-popup.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .result-popup.win { background: linear-gradient(145deg, #ffcc44, #ffaa22); }
        .result-popup.lose { background: linear-gradient(145deg, #555, #333); color: #ffaa66; }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            color: #ffaa44;
            padding: 8px 16px;
            border-radius: 40px;
            z-index: 2001;
            animation: fadeInOut 2s forwards;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        @keyframes fadeInOut {
            0% { opacity:0; transform: translateX(-50%) translateY(20px); }
            15% { opacity:1; transform: translateX(-50%) translateY(0); }
            85% { opacity:1; }
            100% { opacity:0; transform: translateX(-50%) translateY(-20px); }
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-content {
            background: #1a2a1a;
            border-radius: 48px;
            padding: 24px;
            border: 2px solid #ffaa44;
            width: 85%;
            max-width: 500px;
            text-align: center;
            color: #ffdd99;
        }
        .countdown-warning {
            animation: warning 0.5s infinite;
            color: #ff3300 !important;
        }
        @keyframes warning {
            0%,100% { opacity:1; }
            50% { opacity:0.6; }
        }
        .fish-pattern-img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            margin: 0 auto 3px;
            display: block;
            border-radius: 8px;
            background: #2a1f16;
            padding: 2px;
        }
        .points-grid, .trio-grid, .special-grid {
            display: grid;
            gap: 8px;
            margin-bottom: 12px;
        }
        .points-grid { grid-template-columns: repeat(4,1fr); }
        .trio-grid { grid-template-columns: repeat(4,1fr); }
        .special-grid { grid-template-columns: repeat(4,1fr); }
        @media (max-width: 480px) {
            .dice { width: 50px; height: 50px; }
            .dice-face { width: 50px; height: 50px; }
            .front { transform: translateZ(25px); }
            .back { transform: rotateY(180deg) translateZ(25px); }
            .right { transform: rotateY(90deg) translateZ(25px); }
            .left { transform: rotateY(-90deg) translateZ(25px); }
            .top { transform: rotateX(90deg) translateZ(25px); }
            .bottom { transform: rotateX(-90deg) translateZ(25px); }
            .fish-pattern-img { width: 30px; height: 30px; }
        }
        #patternGrid {
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important;
            gap: 12px !important;
            margin: 12px 0 !important;
        }
        .fish-wrapper .bet-card {
            background: #1f1712;
            border-radius: 16px;
            padding: 8px 4px !important;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid #6f4f34;
            transition: all 0.1s ease;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            min-height: 100px;
        }
        .fish-pattern-img {
            width: 48px !important;
            height: 48px !important;
            object-fit: contain !important;
            margin: 4px auto !important;
            display: block !important;
            background: #2a1f16;
            border-radius: 12px;
            padding: 4px;
        }
        .fish-wrapper .bet-name {
            font-size: 0.85rem !important;
            font-weight: bold;
            color: #ffddb0;
            margin: 4px 0 2px;
        }
        .fish-wrapper .bet-amount {
            background: #0c0907;
            border-radius: 40px;
            padding: 4px 8px !important;
            margin: 6px 8px 0 !important;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }
        .btn-chip {
            background: #523b26;
            border: none;
            color: #fce2b4;
            font-weight: bold;
            width: 28px !important;
            height: 28px !important;
            border-radius: 30px;
            font-size: 1rem !important;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .fish-wrapper .bet-amount span {
            font-size: 1.1rem !important;
            font-weight: bold;
            color: #ffdd88;
            min-width: 32px;
            text-align: center;
        }
        .fish-wrapper .bet-grid {
            width: 100% !important;
        }
    </style>
</head>
<body>
<div class="app" id="app"></div>
<script>
    // ==================== 全局用户系统 ====================
    const USERS_KEY = 'double_games_final_v8';
    let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
    let currentUser = null;

    // 预设有效推荐码列表
    const validReferralCodes = ['VIP888', 'ABC123', 'GAME2024', 'TEST001'];

    function saveUsers() {
        localStorage.setItem(USERS_KEY, JSON.stringify(usersData));
    }

    function getUserBalance() {
        return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0;
    }

    function setUserBalance(amt) {
        if(currentUser) {
            usersData[currentUser.phone].balance = Math.max(0, amt);
            saveUsers();
        }
    }

    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast-message';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    function showRechargeModal() {
        let m = document.createElement('div');
        m.className = 'modal';
        m.innerHTML = `<div class="modal-content">
            <h3>💎 充值</h3>
            <p>充值比例 1元 = 1000文</p>
            <p>请联系客服微信: game_kf_888</p>
            <button id="closeRecharge" style="background:#734c2e; padding:8px; border-radius:40px; margin-top:12px;">关闭</button>
        </div>`;
        document.body.appendChild(m);
        m.querySelector('#closeRecharge').onclick = () => m.remove();
    }

    function showServiceModal() {
        let m = document.createElement('div');
        m.className = 'modal';
        m.innerHTML = `<div class="modal-content">
            <h3>📞 客服</h3>
            <p>微信: game_kf_888</p>
            <p>电话: 400-888-XXXX</p>
            <button id="closeSvc" style="background:#734c2e; padding:8px; border-radius:40px; margin-top:12px;">关闭</button>
        </div>`;
        document.body.appendChild(m);
        m.querySelector('#closeSvc').onclick = () => m.remove();
    }

    function recharge() { showRechargeModal(); }
    function withdraw() { showToast("提现请联系客服"); }

    // ==================== 在线人数（对接真实后端8090）====================
    (function() {
        let onlineSpan = null;
        let intervalId = null;
        function getOnlineSpan() {
            if (!onlineSpan || !document.body.contains(onlineSpan)) {
                onlineSpan = document.getElementById('onlineCount');
            }
            return onlineSpan;
        }
        function updateOnlineCount() {
            const span = getOnlineSpan();
            if (!span) return;
            fetch('http://127.0.0.1:8090/getOnlineCount')
                .then(res => res.json())
                .then(data => {
                    const count = data?.count ?? data?.online;
                    if (typeof count === 'number') {
                        span.innerText = count;
                    } else {
                        span.innerText = '--';
                    }
                })
                .catch(err => {
                    console.error('在线人数接口失败:', err);
                    span.innerText = '--';
                });
        }
        if (!intervalId) {
            updateOnlineCount();
            intervalId = setInterval(updateOnlineCount, 5000);
        }
        window.addEventListener('beforeunload', () => {
            if (intervalId) clearInterval(intervalId);
        });
    })();

    // ==================== 游戏1：潮汕葫芦鱼（全自动循环30秒下注+10秒动画）====================
    let fishDestroy = null;

    function initFishGame(container) {
        if (fishDestroy) {
            fishDestroy();
            fishDestroy = null;
        }
        container.innerHTML = '';

        const patternImages = [

        const fishHTML = `

                    </div>
                    <div style="flex:1; background:#1a130d; border-radius:30px; padding:4px; text-align:center;">
                        <div style="font-size:0.7rem;">🎲 总押注</div>
                        <div id="totalBetValue">0</div>
                    </div>
                    <div style="flex:1; background:#1a130d; border-radius:30px; padding:4px; text-align:center;">

                    </div>
                </div>
                <div style="display:flex; justify-content:center; margin:8px;">
                    <button id="grabBtn" class="grab-btn">🎲 抢庄 (需2001文)</button>
                </div>
                <div style="margin:8px;">
                    <select id="roomSelect" style="background:#2a1f16; color:#ffdd99; border-radius:20px; padding:4px;">
                        <option value="room1">初级房</option>
                        <option value="room2">中级房</option>
                        <option value="room3">高级房</option>
                    </select>
                </div>
                <div class="dice-area" style="background:#2a211a; margin:12px; border-radius:50px; padding:12px; position:relative;">
                    <div style="display:flex; justify-content:center; gap:12px;">
                        <div class="dice" style="background:#fff2df; width:70px;height:70px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;">🎲</div>
                        <div class="dice" style="background:#fff2df; width:70px;height:70px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;">🎲</div>
                        <div class="dice" style="background:#fff2df; width:70px;height:70px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;">🎲</div>

                </div>
                <div class="chip-bar" style="display:flex; justify-content:center; gap:8px; margin:8px;">
                    <div class="chip" data-chip="20">20</div>
                    <div class="chip" data-chip="50">50</div>
                    <div class="chip selected" data-chip="100">100</div>
                    <div class="chip" data-chip="500">500</div>
                    <div class="chip" data-chip="1000" id="adminTriggerChip">1k</div>
                </div>
                <div style="display:flex; justify-content:center; gap:8px; margin:8px;">
                    <button id="fishResetBetBtn" style="background:#734c2e; padding:5px 14px; border-radius:35px;">清空下注</button>
                    <button id="fishResetGameBtn" style="background:#734c2e; padding:5px 14px; border-radius:35px;">重置庄家</button>
                </div>
                <div style="padding:0 12px;">
                    <div style="font-size:0.8rem; color:#ffd49f;">🐟 六门押注</div>
                    <div id="patternGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;"></div>
                    <div style="font-size:0.8rem; color:#ffd49f; margin-top:8px;">🎯 特殊投注</div>
                    <div id="specialGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;"></div>
                </div>
                <div style="margin:12px;">
                    <button id="showRecordBtn" style="width:100%; background:#2a1f16; border:1px solid #ffaa44; border-radius:40px; padding:8px;">📜 开奖记录查询</button>
                </div>
                <div style="display:flex; justify-content:space-between; margin:8px;">
                    <div>🎮 在线人数 <span id="onlineCount">128</span></div>
                    <button id="showRulesBtn" style="background:#ffaa44; border-radius:30px; padding:4px 12px;">赔付规则</button>
                </div>
                <div id="fishPhaseHint" style="text-align:center; background:#00000088; margin:8px; border-radius:30px; padding:4px; font-size:0.7rem;">⏳ 等待开局...</div>
            </div>
        `;
        container.innerHTML = fishHTML;

        let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
        let specialBets = { big:0, small:0, odd:0, even:0, allTriplets:0, doubleBet:0 };
        let currentChip = 100;

        function getPlayerBankerKey() { return `fish_player_banker_${currentRoom}`; }

        let savedPlayer = parseInt(localStorage.getItem(getPlayerBankerKey())) || 0;
        if (savedPlayer > 0) {
            hasGrabbed = true;
            playerBankerBalance = savedPlayer;
        }

        const MAX_SINGLE = 500;
        const MAX_TOTAL = 2000;

        function getTotalBet() {
            return Object.values(patternBets).reduce((a,b)=>a+b,0) + Object.values(specialBets).reduce((a,b)=>a+b,0);
        }

        function updateUI() {
            let balEl = document.getElementById('fishBalanceValue');
            if (balEl) balEl.innerText = hasGrabbed ? playerBankerBalance.toFixed(2) : "∞";
            let totalEl = document.getElementById('totalBetValue');
            if (totalEl) totalEl.innerText = getTotalBet();
            let lastEl = document.getElementById('lastWinValue');
            if (lastEl) lastEl.innerText = lastWinAmount;
            for (let k in patternBets) {
                let s = document.getElementById(`bet_${k}`);
                if (s) s.innerText = patternBets[k];
            }
            for (let k in specialBets) {
                let s = document.getElementById(`bet_special_${k}`);
                if (s) s.innerText = specialBets[k];
            }
        }

        function addBet(type, id, val) {
            let target = type === 'pattern' ? patternBets : specialBets;
            if (target[id] === undefined) return;
            let total = getTotalBet();
            if (val > MAX_SINGLE) { showToast(`单注上限${MAX_SINGLE}`); return; }
            if (total + val > MAX_TOTAL) { showToast(`总注上限${MAX_TOTAL}`); return; }
            if (total + val > getUserBalance()) { showToast("余额不足"); return; }
            target[id] += val;
            updateUI();
        }

        function subBet(type, id, val) {
            let target = type === 'pattern' ? patternBets : specialBets;
            target[id] = Math.max(0, target[id] - val);
            updateUI();
        }

        function clearBets() {
            for (let k in patternBets) patternBets[k] = 0;
            for (let k in specialBets) specialBets[k] = 0;

        let gameRecords = [];
        function addRecord(dice, winAmount, totalBet) {
            gameRecords.unshift({
                time: new Date().toLocaleTimeString(),
                dice: dice.join(','),
                result: winAmount > 0 ? `赢${winAmount}` : `输${totalBet}`,
                win: winAmount
            });
            if (gameRecords.length > 50) gameRecords.pop();

        // 10秒动画开奖函数
        async function settleAndAnimate(final) {
            const diceEls = document.querySelectorAll('.fish-wrapper .dice');
            const cover = document.getElementById('fishDiceCover');
            if (cover) {
                cover.style.transform = "translateY(-70px) scale(0.6)";
                cover.style.opacity = "0";
                await new Promise(r => setTimeout(r, 400));
                cover.style.display = "none";
            }
            const iconMap = {"鱼":"🐟","虾":"🦐","蟹":"🦀","葫芦":"🏺","金钱":"💰","鸡":"🐔"};
            // 10秒滚动动画（60步，每步约166ms）
            for (let i = 0; i < 60; i++) {
                await new Promise(r => setTimeout(r, 166));
                for (let d = 0; d < 3; d++) {
                    let rand = ["鱼","虾","蟹","葫芦","金钱","鸡"][Math.floor(Math.random()*6)];
                    diceEls[d].innerHTML = iconMap[rand];
                }
            }
            for (let i = 0; i < 3; i++) diceEls[i].innerHTML = iconMap[final[i]];

            let points = final.map(n => {
                let m = {"鱼":1,"虾":2,"蟹":3,"葫芦":4,"金钱":5,"鸡":6};
                return m[n];
            });
            let sum = points.reduce((a,b)=>a+b,0);
            let isTriplet = (final[0] === final[1] && final[1] === final[2]);
            let totalBet = getTotalBet();
            let winAmount = 0;

            if (totalBet > 0) {
                let userBal = getUserBalance();
                if (totalBet <= userBal) setUserBalance(userBal - totalBet);
                const pidMap = { fish:"鱼", shrimp:"虾", crab:"蟹", calabash:"葫芦", coin:"金钱", chicken:"鸡" };
                for (let [pid, val] of Object.entries(patternBets)) {
                    if (val === 0) continue;
                    let occur = final.filter(n => n === pidMap[pid]).length;
                    if (occur > 0) winAmount += val * (occur + 1);
                }
                if (!isTriplet) {
                    if (sum >= 11 && sum <= 17 && specialBets.big) winAmount += specialBets.big * 2;
                    if (sum >= 4 && sum <= 10 && specialBets.small) winAmount += specialBets.small * 2;
                    if (sum % 2 === 1 && specialBets.odd) winAmount += specialBets.odd * 2;
                    if (sum % 2 === 0 && specialBets.even) winAmount += specialBets.even * 2;
                }
                if (isTriplet && specialBets.allTriplets) winAmount += specialBets.allTriplets * 24;
                if (final.includes("鱼") && final.includes("虾") && specialBets.doubleBet) winAmount += specialBets.doubleBet * 4.5;

                setUserBalance(getUserBalance() + winAmount);
                if (hasGrabbed) {
                    playerBankerBalance -= winAmount;
                    if (playerBankerBalance < 0) {
                        hasGrabbed = false;
                        playerBankerBalance = 0;
                        localStorage.setItem(getPlayerBankerKey(), 0);
                        updateGrabBtn();
                        showToast("庄家破产，权限回收");
                    } else {
                        localStorage.setItem(getPlayerBankerKey(), playerBankerBalance);
                    }
                }
                lastWinAmount = winAmount - totalBet;
                let balSpan = document.getElementById("userBalanceDisplay");
                if (balSpan) balSpan.innerText = getUserBalance().toFixed(2);
            } else {
                lastWinAmount = 0;
            }

            addRecord(final, winAmount, totalBet);
            clearBets();
            updateUI();

            if (cover) {
                cover.style.display = "flex";
                cover.style.transform = "translateY(0) scale(1)";
                cover.style.opacity = "1";
            }
        }

        const patternContainer = document.getElementById('patternGrid');

        // ========== 自动循环：30秒一局（25秒下注 + 5秒动画？改为30秒下注+10秒动画） ==========
        let phaseDiv = document.getElementById('fishPhaseHint');
        let roundActive = true;
        let bettingTimer = null;
        let rollTimer = null;

        function stopRound() {
            if (bettingTimer) clearTimeout(bettingTimer);
            if (rollTimer) clearTimeout(rollTimer);
        }

        async function startRound() {
            stopRound();
            if (!roundActive) return;
            phaseDiv.innerHTML = "🎲 下注阶段 · 倒计时 30 秒";
            let remaining = 30;
            let interval = setInterval(() => {
                if (!roundActive) { clearInterval(interval); return; }
                remaining--;
                phaseDiv.innerHTML = `🎲 下注阶段 · 倒计时 ${remaining} 秒`;
                if (remaining <= 0) clearInterval(interval);
            }, 1000);

            bettingTimer = setTimeout(async () => {
                clearInterval(interval);
                if (!roundActive) return;
                phaseDiv.innerHTML = "🎲 开奖阶段 · 动画10秒";
                let r1 = ["鱼","虾","蟹","葫芦","金钱","鸡"][Math.floor(Math.random()*6)];
                let r2 = ["鱼","虾","蟹","葫芦","金钱","鸡"][Math.floor(Math.random()*6)];
                let r3 = ["鱼","虾","蟹","葫芦","金钱","鸡"][Math.floor(Math.random()*6)];
                await settleAndAnimate([r1, r2, r3]);
                if (roundActive) {
                    rollTimer = setTimeout(() => {
                        if (roundActive) startRound();
                    }, 500);
                }
            }, 30000);
        }

        startRound();

        fishDestroy = () => {
            roundActive = false;
            stopRound();
            container.innerHTML = '';
        };

        return fishDestroy;
    }

        let bets = {
            'BIG':0, 'SMALL':0, 'ODD':0, 'EVEN':0,
            4:0,5:0,6:0,7:0,8:0,9:0,10:0,11:0,12:0,13:0,14:0,15:0,16:0,17:0,

                4: 'rotateY(-90deg)',

            dice.style.transform = rot[val];

        async function startRollingLong(finalVals, duration = 5000) {
            return new Promise(resolve => {
                let steps = 30;
                let step = 0;
                let interval = duration / steps;
                let iv = setInterval(() => {
                    diceEl.forEach(d => setDiceValue(d, Math.floor(Math.random() * 6) + 1));
                    step++;
                    if (step >= steps) {
                        clearInterval(iv);
                        diceEl.forEach((d, i) => setDiceValue(d, finalVals[i]));
                        resolve();
                    }
                }, interval);
            });
        }

        function startRollingNumber(finalAmount) {
            if (rollingAnimation) cancelAnimationFrame(rollingAnimation);
            let start = performance.now();
            let startVal = parseFloat(rollingWinEl.innerText) || 0;
            function update(now) {
                let p = Math.min(1, (now - start) / 5000);
                let ease = 1 - Math.pow(1 - p, 2);
                let cur = startVal + (finalAmount - startVal) * ease;
                rollingWinEl.innerText = cur.toFixed(2);
                if (p < 1) {
                    rollingAnimation = requestAnimationFrame(update);
                } else {
                    rollingWinEl.innerText = finalAmount.toFixed(2);
                    rollingAnimation = null;
                }
            }
            rollingAnimation = requestAnimationFrame(update);
        }

        function getResultInfo(d1, d2, d3) {
            let total = d1 + d2 + d3;
            let types = [];
            if (total >= 11 && total <= 17) types.push('BIG');
            if (total >= 4 && total <= 10) types.push('SMALL');
            if (total % 2 === 1) types.push('ODD');
            if (total % 2 === 0) types.push('EVEN');
            if (d1 === d2 && d2 === d3) {
                types.push(`TRIPLE_${d1}`);
                types.push('ALL_TRIPLE');
            }
            return { total, types };
        }

        function updateUI() {
            for (let k in bets) {
                let el = document.getElementById(`bet_${k}`);
                if (el) el.innerText = bets[k];
            }
            totalBetEl.innerText = Object.values(bets).reduce((a, b) => a + b, 0);
        }

        function addBet(type) {
            if (hasGrabbed) { showToast("庄家不能下注"); return; }
            if (selectedChip <= 0) { showToast("请先选择筹码"); return; }
            if (selectedChip > currentBalance) { showToast("余额不足"); return; }
            currentBalance -= selectedChip;
            setUserBalance(currentBalance);
            bets[type] += selectedChip;
            updateUI();
        }

        function clearAllBets() {
            let total = Object.values(bets).reduce((a, b) => a + b, 0);
            currentBalance += total;
            setUserBalance(currentBalance);
            for (let k in bets) bets[k] = 0;
            updateUI();
            showToast("已清空所有下注");
        }

        function repeatLastBet() {
            if (!lastBet) { showToast("无续押记录"); return; }
            let need = Object.values(lastBet).reduce((a, b) => a + b, 0);
            if (need > currentBalance) { showToast("余额不足，无法续押"); return; }
            for (let k in bets) bets[k] = 0;
            for (let k in lastBet) bets[k] = lastBet[k];
            currentBalance -= need;
            setUserBalance(currentBalance);
            updateUI();
            if (!isDrawing && !isBetLocked) startAutoDraw();
        }

        let gameRecords = [];
        function addRecord(d1, d2, d3, winAmount, totalBet) {
            gameRecords.unshift({
                time: new Date().toLocaleTimeString(),
                dice: `${d1},${d2},${d3}`,
                result: winAmount > 0 ? `赢${winAmount}` : `输${totalBet}`,
                win: winAmount
            });
            if (gameRecords.length > 50) gameRecords.pop();
        }

        async function startAutoDraw() {
            if (isDrawing) return;
            let totalBetVal = Object.values(bets).reduce((a, b) => a + b, 0);
            isDrawing = true;
            isBetLocked = true;

            let d1 = Math.floor(Math.random() * 6) + 1;
            let d2 = Math.floor(Math.random() * 6) + 1;
            let d3 = Math.floor(Math.random() * 6) + 1;
            let { total, types } = getResultInfo(d1, d2, d3);
            let winAmount = 0;

            if (totalBetVal > 0) {
                if (types.includes('BIG') && bets['BIG']) winAmount += bets['BIG'] * 2;
                if (types.includes('SMALL') && bets['SMALL']) winAmount += bets['SMALL'] * 2;
                if (types.includes('ODD') && bets['ODD']) winAmount += bets['ODD'] * 2;
                if (types.includes('EVEN') && bets['EVEN']) winAmount += bets['EVEN'] * 2;
                if (bets[total]) winAmount += bets[total] * oddsMap[total];
                for (let t of types) {
                    if (t.startsWith('TRIPLE_') && bets[t]) winAmount += bets[t] * 150;
                    if (t === 'ALL_TRIPLE' && bets['ALL_TRIPLE']) winAmount += bets['ALL_TRIPLE'] * 30;
                }
            }

            startRollingNumber(winAmount);
            await startRollingLong([d1, d2, d3], 5000);
            totalEl.innerText = total;

            if (totalBetVal > 0) {
                if (winAmount > 0) currentBalance += winAmount;
                setUserBalance(currentBalance);
                if (hasGrabbed) {
                    playerBankerBalance -= winAmount;
                    if (playerBankerBalance < 0) {
                        hasGrabbed = false;
                        playerBankerBalance = 0;
                        localStorage.setItem('dice_player_banker', 0);
                        updateGrabBtn();
                        showToast("庄家破产，权限回收");
                    } else {
                        localStorage.setItem('dice_player_banker', playerBankerBalance);
                    }
                }
            }

            addRecord(d1, d2, d3, winAmount, totalBetVal);
            for (let k in bets) bets[k] = 0;
            lastBet = JSON.parse(JSON.stringify(bets));
            updateUI();

            let pop = document.createElement('div');
            pop.className = 'result-popup ' + (winAmount > 0 ? 'win' : 'lose');
            pop.textContent = winAmount > 0 ? `🎉 赢 ${winAmount} 🎉` : (totalBetVal > 0 ? `😭 输 ${totalBetVal} 😭` : `🎲 点数 ${total} 无人下注`);
            document.body.appendChild(pop);
            setTimeout(() => pop.classList.add('show'), 10);
            setTimeout(() => {
                pop.classList.remove('show');
                setTimeout(() => pop.remove(), 300);
            }, 2000);

            isDrawing = false;
            isBetLocked = false;
            startCountdown(25);
        }

        function startCountdown(sec) {
            if (countdownInterval) clearInterval(countdownInterval);
            let c = sec;
            let cdSpan = document.getElementById('countdownNum');
            cdSpan.innerText = c;
            isBetLocked = false;
            countdownInterval = setInterval(() => {
                if (c <= 1) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    isBetLocked = true;
                    startAutoDraw();
                } else {
                    c--;
                    cdSpan.innerText = c;
                    if (c <= 5) cdSpan.classList.add('countdown-warning');
                    else cdSpan.classList.remove('countdown-warning');
                }
            }, 1000);
        }

        function refreshBalance() {
            currentBalance = getUserBalance();
            updateUI();
            showToast("余额已刷新");
        }

        function updateGrabBtn() {
            let btn = document.getElementById('diceGrabBtn');
            let bal = getUserBalance();
            if (hasGrabbed) {
                btn.disabled = true;
                btn.textContent = '🏆 已抢庄';
            } else if (bal >= 2001) {
                btn.disabled = false;
                btn.textContent = '🎲 抢庄 (需2001文)';
            } else {
                btn.disabled = true;
                btn.textContent = '🎲 抢庄 (余额不足)';
            }
        }

        document.getElementById('diceGrabBtn').onclick = () => {
            if (hasGrabbed) return;
            if (getUserBalance() >= 2001) {
                setUserBalance(getUserBalance() - 2001);
                playerBankerBalance = 2001;
                hasGrabbed = true;
                localStorage.setItem('dice_player_banker', playerBankerBalance);
                currentBalance = getUserBalance();
                updateUI();
                updateGrabBtn();
                showToast("抢庄成功，不可下注");
                document.querySelectorAll('.dice-wrapper .chip').forEach(c => c.style.pointerEvents = 'none');
            } else {
                showToast("余额不足2001");
            }
        };

        let savedBanker = localStorage.getItem('dice_player_banker');
        if (savedBanker && parseInt(savedBanker) > 0) {
            hasGrabbed = true;
            playerBankerBalance = parseInt(savedBanker);
            updateGrabBtn();
            document.querySelectorAll('.dice-wrapper .chip').forEach(c => c.style.pointerEvents = 'none');
        }

        document.querySelectorAll('.dice-wrapper .chip').forEach(chip => {
            chip.onclick = function() {
                if (hasGrabbed) { showToast("庄家不能下注"); return; }
                selectedChip = parseInt(this.dataset.val);
                document.getElementById('selectedChip').innerText = selectedChip;
                document.querySelectorAll('.dice-wrapper .chip').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
            };
        });

        document.querySelectorAll('.special-card').forEach(c => {
            c.onclick = () => { if (!hasGrabbed) addBet(c.dataset.type); };
        });
        document.querySelectorAll('.point-card').forEach(c => {
            c.onclick = () => { if (!hasGrabbed) addBet(parseInt(c.dataset.point)); };
        });
        document.querySelectorAll('.trio-card').forEach(c => {
            c.onclick = () => { if (!hasGrabbed) addBet(c.dataset.type); };
        });

        document.getElementById('clearAllBtn').onclick = clearAllBets;
        document.getElementById('repeatBtn').onclick = repeatLastBet;
        document.getElementById('refreshBtn').onclick = refreshBalance;

        document.getElementById('showDiceHistoryBtn').onclick = () => {
            if (gameRecords.length === 0) {
                showToast("暂无记录");
                return;
            }
            let html = '<div style="max-height:400px; overflow-y:auto;">';
            gameRecords.forEach(r => {
                html += `<div style="background:#2a241e; margin:8px; padding:8px; border-left:3px solid #ffaa44;">
                            <div>${r.time}</div>
                            <div>🎲 ${r.dice}</div>
                            <div style="color:${r.win > 0 ? '#4caf50' : '#f44336'}">${r.result}</div>
                         </div>`;
            });
            html += '</div><button id="closeRec" style="background:#ffaa44; margin-top:12px; padding:8px; border-radius:40px;">关闭</button>';
            let m = document.createElement('div');
            m.className = 'modal';
            m.innerHTML = `<div class="modal-content">${html}</div>`;
            document.body.appendChild(m);
            m.querySelector('#closeRec').onclick = () => m.remove();
        };

        diceEl.forEach(d => setDiceValue(d, 1));
        totalEl.innerText = 3;
        updateUI();
        startCountdown(25);

        diceDestroy = () => {
            if (countdownInterval) clearInterval(countdownInterval);
            if (rollingAnimation) cancelAnimationFrame(rollingAnimation);
            container.innerHTML = '';
        };

        return diceDestroy;
    }

    // ==================== 游戏3、游戏4预留位 ====================
    let game3Destroy = null;
    let game4Destroy = null;

    function initGame3(container) {
        if (game3Destroy) game3Destroy();
        container.innerHTML = `
            <div style="padding:40px; text-align:center; color:#ffdd99;">
                <h3>🎮 游戏3预留位</h3>
                <p>即将开放，敬请期待</p>
                <p style="font-size:0.7rem; margin-top:20px;">更多精彩游戏正在开发中...</p>

        `;

    function initGame4(container) {
        if (game4Destroy) game4Destroy();
        container.innerHTML = `
            <div style="padding:40px; text-align:center; color:#ffdd99;">
                <h3>♠️ 游戏4预留位</h3>

                <p style="font-size:0.7rem; margin-top:20px;">更多精彩游戏正在开发中...</p>
            </div>
        `;
        game4Destroy = () => { container.innerHTML = ''; };
        return game4Destroy;
    }

    // ==================== 管理员后台 ====================
    let adminClickCount = 0;
    let adminClickTimer = null;
    let adminPassword = localStorage.getItem('admin_pwd') || 'admin123';

    function openAdminModal() {
        const pwdModal = document.createElement('div');
        pwdModal.className = 'modal';
        pwdModal.innerHTML = `
            <div class="modal-content">
                <h2>🔐 管理员验证</h2>
                <input type="password" id="adminPwdInput" class="auth-input" placeholder="请输入管理密码" autocomplete="off">
                <div style="display:flex; gap:12px; margin-top:16px;">
                    <button id="submitPwdBtn" style="background:#c47c3a; padding:8px; border-radius:40px;">确认</button>
                    <button id="cancelPwdBtn" style="background:#734c2e; padding:8px; border-radius:40px;">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(pwdModal);
        const input = pwdModal.querySelector('#adminPwdInput');
        const submit = () => {
            if (input.value === adminPassword) {
                pwdModal.remove();
                showAdminPanel();
            } else {
                showToast("密码错误");
                input.value = '';
                input.focus();
            }
        };
        pwdModal.querySelector('#submitPwdBtn').onclick = submit;
        pwdModal.querySelector('#cancelPwdBtn').onclick = () => pwdModal.remove();
        input.onkeypress = (e) => { if (e.key === 'Enter') submit(); };
        input.focus();
    }

    function showAdminPanel() {
        const allUsers = Object.keys(usersData).map(phone => ({ phone, balance: usersData[phone].balance }));
        let userListHtml = '<div style="max-height:200px; overflow-y:auto; margin-bottom:12px;">';
        userListHtml += `<div style="background:#3a2a1a; padding:8px; margin-bottom:8px; border-radius:12px;">
                            <div>👤 当前用户: ${currentUser.phone}</div>
                            <div>💰 ${currentUser.balance.toFixed(2)}</div>
                         </div>`;
        userListHtml += `<div>
                            <label>选择玩家：</label>
                            <select id="adminTargetUser" style="background:#1a1a1a; color:#ffdd99; border:1px solid #ffaa44; border-radius:20px; padding:4px; width:100%;">
                                ${allUsers.map(u => `<option value="${u.phone}" ${u.phone === currentUser.phone ? 'selected' : ''}>${u.phone} (${u.balance.toFixed(2)})</option>`).join('')}
                            </select>
                         </div>`;
        userListHtml += '</div>';
        userListHtml += `<input type="number" id="adminAmount" class="auth-input" placeholder="输入金额" value="0" step="1">`;
        userListHtml += `<div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                            <button id="adminAdd" style="background:#2e7d32; padding:6px 12px; border-radius:30px;">➕ 上分</button>
                            <button id="adminSub" style="background:#c0392b; padding:6px 12px; border-radius:30px;">➖ 下分</button>
                            <button id="adminQuery" style="background:#2980b9; padding:6px 12px; border-radius:30px;">🔍 查询</button>
                            <button id="adminReset" style="background:#f39c12; padding:6px 12px; border-radius:30px;">🔄 重置1000</button>
                            <button id="adminChangePwd" style="background:#9b59b6; padding:6px 12px; border-radius:30px;">🔑 改密</button>
                         </div>`;
        userListHtml += `<button id="adminClose" style="background:#734c2e; padding:8px; border-radius:40px; width:100%;">关闭后台</button>`;

        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h2>🎛️ 管理员后台</h2>${userListHtml}</div>`;
        document.body.appendChild(modal);

        const getUserSelect = () => modal.querySelector('#adminTargetUser').value;
        const getAmount = () => parseInt(modal.querySelector('#adminAmount').value) || 0;

        modal.querySelector('#adminAdd').onclick = () => {
            let target = getUserSelect();
            let amt = getAmount();
            if (amt <= 0) { showToast("金额必须大于0"); return; }
            usersData[target].balance += amt;
            saveUsers();
            showToast(`${target} +${amt}，新余额 ${usersData[target].balance.toFixed(2)}`);
            if (target === currentUser.phone) {
                currentUser.balance = usersData[target].balance;
                let balSpan = document.getElementById("userBalanceDisplay");
                if (balSpan) balSpan.innerText = currentUser.balance.toFixed(2);
            }
            modal.remove();
            showAdminPanel();
        };

        modal.querySelector('#adminSub').onclick = () => {
            let target = getUserSelect();
            let amt = getAmount();
            if (amt <= 0) { showToast("金额必须大于0"); return; }
            let cur = usersData[target].balance;
            if (cur < amt) { showToast(`${target} 余额不足，无法下分`); return; }
            usersData[target].balance = cur - amt;
            saveUsers();
            showToast(`${target} -${amt}，新余额 ${usersData[target].balance.toFixed(2)}`);
            if (target === currentUser.phone) {
                currentUser.balance = usersData[target].balance;
                let balSpan = document.getElementById("userBalanceDisplay");
                if (balSpan) balSpan.innerText = currentUser.balance.toFixed(2);
            }
            modal.remove();
            showAdminPanel();
        };

        modal.querySelector('#adminQuery').onclick = () => {
            let target = getUserSelect();
            showToast(`${target} 余额: ${usersData[target].balance.toFixed(2)}`);
        };

        modal.querySelector('#adminReset').onclick = () => {
            let target = getUserSelect();
            if (confirm(`重置 ${target} 余额为 1000 文？`)) {
                usersData[target].balance = 1000;
                saveUsers();
                showToast(`${target} 余额已重置为 1000`);
                if (target === currentUser.phone) {
                    currentUser.balance = 1000;
                    let balSpan = document.getElementById("userBalanceDisplay");
                    if (balSpan) balSpan.innerText = "1000.00";
                }
                modal.remove();
                showAdminPanel();
            }
        };

        modal.querySelector('#adminChangePwd').onclick = () => {
            let old = prompt("请输入当前管理密码:");
            if (old !== adminPassword) { showToast("当前密码错误"); return; }
            let newPwd = prompt("请输入新密码（至少4位）:");
            if (newPwd && newPwd.length >= 4) {
                adminPassword = newPwd;
                localStorage.setItem('admin_pwd', newPwd);
                showToast("管理密码修改成功");
            } else if (newPwd) {
                showToast("密码至少4位");
            }
        };

        modal.querySelector('#adminClose').onclick = () => modal.remove();
    }

    document.addEventListener('click', (e) => {
        if (e.target && e.target.id === 'adminTriggerChip') {
            adminClickCount++;
            if (adminClickTimer) clearTimeout(adminClickTimer);
            adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 1000);
            if (adminClickCount >= 3) {
                adminClickCount = 0;
                clearTimeout(adminClickTimer);
                openAdminModal();
            }
        }
    });

    // ==================== 主界面渲染 ====================
    function renderAuthUI() {
        const savedPhone = localStorage.getItem('saved_phone') || '';
        const savedPwd = localStorage.getItem('saved_password') || '';
        const rememberChecked = localStorage.getItem('remember_me') === 'true';
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="auth-panel">
                <h2>🎲 双游戏大厅</h2>
                <input type="tel" id="regPhone" class="auth-input" placeholder="手机号" maxlength="11" value="${savedPhone}">
                <input type="password" id="regPassword" class="auth-input" placeholder="密码 (至少4位)" value="${savedPwd}">
                <input type="text" id="regReferralCode" class="auth-input" placeholder="推荐码 (必填)" maxlength="20">
                <div style="display:flex; align-items:center; gap:8px; margin:8px 0;">
                    <input type="checkbox" id="rememberCheckbox" ${rememberChecked ? 'checked' : ''}>
                    <label style="color:#ffdd99;">记住账号密码</label>
                </div>
                <div class="auth-buttons">
                    <button id="loginBtn" class="auth-btn">登录</button>
                    <button id="registerBtn" class="auth-btn">注册</button>
                </div>
                <div class="auth-note">🎮 需要有效推荐码才能注册 | 初始1000文</div>
            </div>
        `;

        document.getElementById('loginBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let rem = document.getElementById('rememberCheckbox').checked;
            if (!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            let user = usersData[phone];
            if (!user || user.password !== pwd) { showToast("账号或密码错误"); return; }
            if (rem) {
                localStorage.setItem('saved_phone', phone);
                localStorage.setItem('saved_password', pwd);
                localStorage.setItem('remember_me', 'true');
            } else {
                localStorage.removeItem('saved_phone');
                localStorage.removeItem('saved_password');
                localStorage.setItem('remember_me', 'false');
            }
            currentUser = { phone, ...user };
            showToast(`欢迎，${phone}`);
            renderGameLobby();
        };

        document.getElementById('registerBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let referralCode = document.getElementById('regReferralCode').value.trim().toUpperCase();

            if (!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            if (!/^1[3-9]\d{9}$/.test(phone)) { showToast("请输入有效11位手机号"); return; }
            if (pwd.length < 4) { showToast("密码至少4位"); return; }
            if (!referralCode) { showToast("请填写推荐码"); return; }
            if (!validReferralCodes.includes(referralCode)) { showToast("推荐码无效，无法注册"); return; }
            if (usersData[phone]) { showToast("手机号已注册"); return; }

            usersData[phone] = { password: pwd, balance: 1000, referralCode: referralCode, registerTime: new Date().toLocaleString() };
            saveUsers();
            showToast("注册成功！请登录");
        };
    }

    function renderGameLobby() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="user-section">
                <div class="user-info-row">
                    <span>📱 ${currentUser.phone.substring(0,7)}... | 💰 余额: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span>
                    <div class="btn-group">
                        <button id="serviceBtn" class="service-btn">📞 客服</button>
                        <button id="logoutBtn" class="logout-btn">退出</button>
                    </div>
                </div>
                <div class="charge-withdraw-row">
                    <button id="rechargeBtn" class="charge-btn">💎 充值</button>
                    <button id="withdrawBtn" class="withdraw-btn">💰 提现</button>
                </div>
            </div>
            <div class="game-nav">
                <button class="game-tab active" data-game="fish">🎲 葫芦鱼</button>
                <button class="game-tab" data-game="dice">🎲 至尊骰宝</button>
                <button class="game-tab" data-game="game3">🎮 游戏3</button>
                <button class="game-tab" data-game="game4">♠️ 游戏4</button>
            </div>
            <div class="game-container">
                <div id="gamePanel"></div>
            </div>
        `;

        document.getElementById('logoutBtn').onclick = () => {
            currentUser = null;
            renderAuthUI();
        };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;

        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const gameInits = {
            fish: initFishGame,
            dice: initDiceGame,
            game3: initGame3,
            game4: initGame4
        };

        async function switchGame(gameId) {
            if (currentDestroy) {
                currentDestroy();
                currentDestroy = null;
            }
            gamePanel.innerHTML = '';
            const initFn = gameInits[gameId];
            if (initFn) {
                currentDestroy = await initFn(gamePanel);
            }
            let balSpan = document.getElementById("userBalanceDisplay");
            if (balSpan) balSpan.innerText = getUserBalance().toFixed(2);
        }

        document.querySelectorAll('.game-tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchGame(btn.dataset.game);
            };
        });

        switchGame('fish');
    }

    renderAuthUI();
</script>
