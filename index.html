            for (let k in lastBet) bets[k] = lastBet[k];
            currentBalance -= need; setUserBalance(currentBalance); updateUI();
            if (!isDrawing && !isBetLocked) startAutoDraw();
        }
        let gameRecords = [];
        function addRecord(d1, d2, d3, winAmount, totalBet) { gameRecords.unshift({ time: new Date().toLocaleTimeString(), dice: `${d1},${d2},${d3}`, result: winAmount > 0 ? `赢${winAmount}` : `输${totalBet}`, win: winAmount }); if (gameRecords.length > 50) gameRecords.pop(); }
        async function startAutoDraw() {
            if (isDrawing) return;
            let totalBetVal = Object.values(bets).reduce((a, b) => a + b, 0);
            isDrawing = true; isBetLocked = true;
            let d1 = Math.floor(Math.random() * 6) + 1, d2 = Math.floor(Math.random() * 6) + 1, d3 = Math.floor(Math.random() * 6) + 1;
            let { total, types } = getResultInfo(d1, d2, d3);
            let winAmount = 0;
            if (totalBetVal > 0) {
                if (types.includes('BIG') && bets['BIG']) winAmount += bets['BIG'] * 2;
                if (types.includes('SMALL') && bets['SMALL']) winAmount += bets['SMALL'] * 2;
                if (types.includes('ODD') && bets['ODD']) winAmount += bets['ODD'] * 2;
                if (types.includes('EVEN') && bets['EVEN']) winAmount += bets['EVEN'] * 2;
                if (bets[total]) winAmount += bets[total] * oddsMap[total];
                for (let t of types) { if (t.startsWith('TRIPLE_') && bets[t]) winAmount += bets[t] * 150; if (t === 'ALL_TRIPLE' && bets['ALL_TRIPLE']) winAmount += bets['ALL_TRIPLE'] * 30; }
            }
            startRollingNumber(winAmount);
            await startRollingLong([d1, d2, d3], 5000);
            totalEl.innerText = total;
            if (totalBetVal > 0) {
                if (winAmount > 0) currentBalance += winAmount;
                setUserBalance(currentBalance);
                let netToBanker = totalBetVal - winAmount;
                modifyBanker(netToBanker);
            }
            addRecord(d1, d2, d3, winAmount, totalBetVal);
            for (let k in bets) bets[k] = 0;
            lastBet = JSON.parse(JSON.stringify(bets));
            updateUI();
            let pop = document.createElement('div'); pop.className = 'result-popup ' + (winAmount > 0 ? 'win' : 'lose'); pop.textContent = winAmount > 0 ? `🎉 赢 ${winAmount} 🎉` : (totalBetVal > 0 ? `😭 输 ${totalBetVal} 😭` : `🎲 点数 ${total} 无人下注`); document.body.appendChild(pop); setTimeout(() => pop.classList.add('show'), 10); setTimeout(() => { pop.classList.remove('show'); setTimeout(() => pop.remove(), 300); }, 2000);
            isDrawing = false; isBetLocked = false;
            startCountdown(25);
        }
        function startCountdown(sec) {
            if (countdownInterval) clearInterval(countdownInterval);
            let c = sec, cdSpan = document.getElementById('countdownNum');
            cdSpan.innerText = c; isBetLocked = false;
            countdownInterval = setInterval(() => {
                if (c <= 1) { clearInterval(countdownInterval); countdownInterval = null; isBetLocked = true; startAutoDraw(); }
                else { c--; cdSpan.innerText = c; if (c <= 5) cdSpan.classList.add('countdown-warning'); else cdSpan.classList.remove('countdown-warning'); }
            }, 1000);
        }
        function refreshBalance() { currentBalance = getUserBalance(); updateUI(); showToast("余额已刷新"); }
        
        document.querySelectorAll('.dice-wrapper .chip').forEach(chip => {
            chip.onclick = function() { selectedChip = parseInt(this.dataset.val); document.getElementById('selectedChip').innerText = selectedChip; document.querySelectorAll('.dice-wrapper .chip').forEach(c => c.classList.remove('selected')); this.classList.add('selected'); };
        });
        document.querySelectorAll('.special-card').forEach(c => { c.onclick = () => addBet(c.dataset.type); });
        document.querySelectorAll('.point-card').forEach(c => { c.onclick = () => addBet(parseInt(c.dataset.point)); });
        document.querySelectorAll('.trio-card').forEach(c => { c.onclick = () => addBet(c.dataset.type); });
        document.getElementById('clearAllBtn').onclick = clearAllBets;
        document.getElementById('repeatBtn').onclick = repeatLastBet;
        document.getElementById('refreshBtn').onclick = refreshBalance;
        document.getElementById('showDiceHistoryBtn').onclick = () => {
            if (gameRecords.length === 0) { showToast("暂无记录"); return; }
            let html = '<div style="max-height:400px; overflow-y:auto;">';
            gameRecords.forEach(r => { html += `<div style="background:#2a241e; margin:8px; padding:8px; border-left:3px solid #ffaa44;"><div>${r.time}</div><div>🎲 ${r.dice}</div><div style="color:${r.win > 0 ? '#4caf50' : '#f44336'}">${r.result}</div></div>`; });
            html += '</div><button id="closeRec" style="background:#ffaa44; margin-top:12px; padding:8px; border-radius:40px;">关闭</button>';
            let m = document.createElement('div'); m.className = 'modal'; m.innerHTML = `<div class="modal-content">${html}</div>`; document.body.appendChild(m); m.querySelector('#closeRec').onclick = () => m.remove();
        };
        
        diceEl.forEach(d => setDiceValue(d, 1));
        totalEl.innerText = 3;
        updateUI();
        startCountdown(25);
        diceDestroy = () => { if (countdownInterval) clearInterval(countdownInterval); if (rollingAnimation) cancelAnimationFrame(rollingAnimation); container.innerHTML = ''; };
        return diceDestroy;
    }
    
    // ==================== 游戏3、4预留 ====================
    let game3Destroy = null, game4Destroy = null;
    function initGame3(container) { if (game3Destroy) game3Destroy(); container.innerHTML = `<div style="padding:40px; text-align:center; color:#ffdd99;"><h3>🎮 游戏3预留位</h3><p>即将开放</p></div>`; game3Destroy = () => { container.innerHTML = ''; }; return game3Destroy; }
    function initGame4(container) { if (game4Destroy) game4Destroy(); container.innerHTML = `<div style="padding:40px; text-align:center; color:#ffdd99;"><h3>♠️ 游戏4预留位</h3><p>即将开放</p></div>`; game4Destroy = () => { container.innerHTML = ''; }; return game4Destroy; }
    
    // ==================== 管理员后台 ====================
    let adminClickCount = 0, adminClickTimer = null, adminPassword = localStorage.getItem('admin_pwd') || 'admin123';
    function openAdminModal() {
        const pwdModal = document.createElement('div'); pwdModal.className = 'modal';
        pwdModal.innerHTML = `<div class="modal-content"><h2>🔐 管理员验证</h2><input type="password" id="adminPwdInput" class="auth-input" placeholder="管理密码"><div style="display:flex; gap:12px; margin-top:16px;"><button id="submitPwdBtn" style="background:#c47c3a; padding:8px; border-radius:40px;">确认</button><button id="cancelPwdBtn" style="background:#734c2e; padding:8px; border-radius:40px;">取消</button></div></div>`;
        document.body.appendChild(pwdModal);
        const input = pwdModal.querySelector('#adminPwdInput');
        const submit = () => { if (input.value === adminPassword) { pwdModal.remove(); showAdminPanel(); } else { showToast("密码错误"); input.value = ''; input.focus(); } };
        pwdModal.querySelector('#submitPwdBtn').onclick = submit;
        pwdModal.querySelector('#cancelPwdBtn').onclick = () => pwdModal.remove();
        input.onkeypress = (e) => { if (e.key === 'Enter') submit(); };
        input.focus();
    }
    function showAdminPanel() {
        const allUsers = Object.keys(usersData).map(phone => ({ phone, balance: usersData[phone].balance, referralCode: usersData[phone].referralCode || '无', registerTime: usersData[phone].registerTime || '未知' }));
        let searchKeyword = '';
        function renderUserTable() {
            let filtered = searchKeyword ? allUsers.filter(u => u.phone.includes(searchKeyword)) : allUsers;
            let rows = filtered.map(u => `<tr><td style="padding:8px;">${u.phone}</td><td style="padding:8px;">💰 ${u.balance.toFixed(2)}</td><td style="padding:8px;">🎫 ${u.referralCode}</td><td style="padding:8px;">${u.registerTime}</td></tr>`).join('');
            document.querySelector('#adminUserTableBody').innerHTML = rows || '<tr><td colspan="4" style="padding:20px;">暂无数据</td></tr>';
        }
        let html = `<div class="modal-content" style="max-width:650px;"><h2>🎛️ 管理员后台</h2>
            <div style="display:flex; gap:8px; margin:12px 0;">
                <input type="text" id="adminSearchInput" class="auth-input" placeholder="搜索手机号" style="flex:2;">
                <button id="adminSearchBtn" style="background:#2980b9; padding:8px 16px; border-radius:40px;">🔍 搜索</button>
                <button id="adminResetSearchBtn" style="background:#555; padding:8px 16px; border-radius:40px;">重置</button>
            </div>
            <div style="max-height:300px; overflow-y:auto; margin-bottom:12px;">
                <table style="width:100%; border-collapse:collapse;">
                    <thead style="background:#2a1f16;"><tr><th>手机号</th><th>余额</th><th>推荐码</th><th>注册时间</th></tr></thead>
                    <tbody id="adminUserTableBody"></tbody>
                </table>
            </div>
            <div style="display:flex; gap:8px; margin:12px 0;">
                <select id="adminTargetUser" style="background:#1a1a1a; color:#ffdd99; border-radius:20px; padding:6px; flex:1;">
                    ${allUsers.map(u => `<option value="${u.phone}">${u.phone} (${u.balance.toFixed(2)})</option>`).join('')}
                </select>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                <input type="number" id="adminAmount" class="auth-input" placeholder="金额" value="0" style="flex:1;">
                <button id="adminAdd" style="background:#2e7d32; padding:6px 12px; border-radius:30px;">➕ 上分</button>
                <button id="adminSub" style="background:#c0392b; padding:6px 12px; border-radius:30px;">➖ 下分</button>
                <button id="adminReset" style="background:#f39c12; padding:6px 12px; border-radius:30px;">🔄 重置1000</button>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; margin:12px 0;">
                <button id="adminQuery" style="background:#2980b9; padding:6px 12px; border-radius:30px;">🔍 查询余额</button>
                <button id="adminExport" style="background:#27ae60; padding:6px 12px; border-radius:30px;">📋 导出用户</button>
                <button id="adminAddCode" style="background:#8e44ad; padding:6px 12px; border-radius:30px;">➕ 新增推荐码</button>
                <button id="adminListCodes" style="background:#16a085; padding:6px 12px; border-radius:30px;">📜 查看推荐码</button>
                <button id="adminSetBanker" style="background:#e67e22; padding:6px 12px; border-radius:30px;">🏦 设置庄家</button>
                <button id="adminChangePwd" style="background:#9b59b6; padding:6px 12px; border-radius:30px;">🔑 改密</button>
            </div>
            <button id="adminClose" style="background:#734c2e; padding:8px; border-radius:40px; width:100%;">关闭后台</button>
        </div>`;
        const modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = html; document.body.appendChild(modal);
        renderUserTable();
        document.querySelector('#adminSearchBtn').onclick = () => { searchKeyword = document.querySelector('#adminSearchInput').value.trim(); renderUserTable(); };
        document.querySelector('#adminResetSearchBtn').onclick = () => { searchKeyword = ''; document.querySelector('#adminSearchInput').value = ''; renderUserTable(); };
        document.querySelector('#adminExport').onclick = () => { let data = allUsers.map(u => `${u.phone},${u.balance},${u.referralCode},${u.registerTime}`).join('\n'); navigator.clipboard.writeText("手机号,余额,推荐码,注册时间\n" + data).then(() => showToast(`已复制 ${allUsers.length} 条用户数据`)).catch(() => showToast("复制失败")); };
        document.querySelector('#adminAddCode').onclick = () => { let newCode = prompt("请输入新的推荐码（大写字母+数字）:"); if(newCode && newCode.trim()) { let code = newCode.trim().toUpperCase(); if(!validReferralCodes.includes(code)) { validReferralCodes.push(code); localStorage.setItem('valid_referral_codes', JSON.stringify(validReferralCodes)); showToast(`推荐码 ${code} 已添加`); } else showToast("推荐码已存在"); } };
        document.querySelector('#adminListCodes').onclick = () => { alert(`当前有效推荐码：\n${validReferralCodes.join(', ')}`); };
        const getTarget = () => modal.querySelector('#adminTargetUser').value;
        const getAmt = () => parseInt(modal.querySelector('#adminAmount').value) || 0;
        modal.querySelector('#adminAdd').onclick = () => { let t = getTarget(), a = getAmt(); if(a<=0){showToast("金额>0");return;} usersData[t].balance += a; saveUsers(); showToast(`${t} +${a}`); if(t===currentUser.phone){currentUser.balance=usersData[t].balance;let b=document.getElementById("userBalanceDisplay");if(b)b.innerText=currentUser.balance.toFixed(2);} modal.remove(); showAdminPanel(); };
        modal.querySelector('#adminSub').onclick = () => { let t = getTarget(), a = getAmt(); if(a<=0){showToast("金额>0");return;} if(usersData[t].balance < a){showToast("余额不足");return;} usersData[t].balance -= a; saveUsers(); showToast(`${t} -${a}`); if(t===currentUser.phone){currentUser.balance=usersData[t].balance;let b=document.getElementById("userBalanceDisplay");if(b)b.innerText=currentUser.balance.toFixed(2);} modal.remove(); showAdminPanel(); };
        modal.querySelector('#adminQuery').onclick = () => { let t = getTarget(); showToast(`${t} 余额: ${usersData[t].balance.toFixed(2)}`); };
        modal.querySelector('#adminReset').onclick = () => { if(confirm("重置为1000文？")){ let t = getTarget(); usersData[t].balance = 1000; saveUsers(); showToast(`${t} 已重置`); if(t===currentUser.phone){currentUser.balance=1000;let b=document.getElementById("userBalanceDisplay");if(b)b.innerText="1000.00";} modal.remove(); showAdminPanel(); } };
        modal.querySelector('#adminSetBanker').onclick = () => { let newAmt = parseFloat(prompt("庄家新余额:", systemBankerBalance)); if(!isNaN(newAmt) && newAmt>=0){ systemBankerBalance = newAmt; saveSystemBanker(); showToast(`庄家余额已设为 ${newAmt.toFixed(2)}`); let b1=document.getElementById('fishBankerDisplay');let b2=document.getElementById('diceBankerDisplay');if(b1)b1.innerText=newAmt.toFixed(2);if(b2)b2.innerText=newAmt.toFixed(2); } else showToast("无效"); };
        modal.querySelector('#adminChangePwd').onclick = () => { let old = prompt("当前密码:"); if(old !== adminPassword){showToast("密码错误");return;} let newPwd = prompt("新密码(≥4位):"); if(newPwd && newPwd.length>=4){ adminPassword=newPwd; localStorage.setItem('admin_pwd',newPwd); showToast("修改成功"); } else if(newPwd) showToast("至少4位"); };
        modal.querySelector('#adminClose').onclick = () => modal.remove();
    }
    
    document.addEventListener('click', (e) => { if (e.target && e.target.id === 'adminTriggerChip') { adminClickCount++; if (adminClickTimer) clearTimeout(adminClickTimer); adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 1000); if (adminClickCount >= 3) { adminClickCount = 0; clearTimeout(adminClickTimer); openAdminModal(); } } });
    
    // ==================== 推荐码注册 + 登录 ====================
    function renderAuthUI() {
        const savedPhone = localStorage.getItem('saved_phone') || '';
        const savedPwd = localStorage.getItem('saved_password') || '';
        const rememberChecked = localStorage.getItem('remember_me') === 'true';
        document.getElementById('app').innerHTML = `
            <div class="auth-panel">
                <h2>🎲 双游戏大厅</h2>
                <input type="tel" id="regPhone" class="auth-input" placeholder="手机号" maxlength="11" value="${savedPhone}">
                <input type="password" id="regPassword" class="auth-input" placeholder="密码 (至少4位)" value="${savedPwd}">
                <input type="text" id="regReferralCode" class="auth-input" placeholder="推荐码 (必填)" maxlength="20">
                <div style="display:flex; align-items:center; gap:8px; margin:8px 0;">
                    <input type="checkbox" id="rememberCheckbox" ${rememberChecked ? 'checked' : ''}>
                    <label style="color:#ffdd99;">记住账号密码</label>
                </div>
                <div class="auth-buttons">
                    <button id="loginBtn" class="auth-btn">登录</button>
                    <button id="registerBtn" class="auth-btn">注册</button>
                </div>
                <div class="auth-note">🎮 需要有效推荐码才能注册 | 初始1000文</div>
            </div>
        `;
        
        document.getElementById('registerBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let code = document.getElementById('regReferralCode').value.trim().toUpperCase();
            if (!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            if (!/^1[3-9]\d{9}$/.test(phone)) { showToast("请输入有效11位手机号"); return; }
            if (pwd.length < 4) { showToast("密码至少4位"); return; }
            if (!code) { showToast("请填写推荐码"); return; }
            if (!validReferralCodes.includes(code)) { showToast("推荐码无效，无法注册"); return; }
            if (usersData[phone]) { showToast("手机号已注册"); return; }
            usersData[phone] = {
                password: pwd,
                balance: 1000,
                referralCode: code,
                registerTime: new Date().toLocaleString()
            };
            saveUsers();
            showToast("注册成功！请登录");
        };
        
        document.getElementById('loginBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let rem = document.getElementById('rememberCheckbox').checked;
            if (!phone || !pwd) { showToast("请填写手机号和密码"); return; }
            let user = usersData[phone];
            if (!user || user.password !== pwd) { showToast("账号或密码错误"); return; }
            if (rem) {
                localStorage.setItem('saved_phone', phone);
                localStorage.setItem('saved_password', pwd);
                localStorage.setItem('remember_me', 'true');
            } else {
                localStorage.removeItem('saved_phone');
                localStorage.removeItem('saved_password');
                localStorage.setItem('remember_me', 'false');
            }
            currentUser = { phone, ...user };
            showToast(`欢迎，${phone}`);
            renderGameLobby();
        };
    }
    
    function renderGameLobby() {
        document.getElementById('app').innerHTML = `
            <div class="user-section">
                <div class="user-info-row">
                    <span>📱 ${currentUser.phone.substring(0,7)}... | 💰 余额: <span id="userBalanceDisplay">${getUserBalance().toFixed(2)}</span></span>
                    <div class="btn-group">
                        <button id="serviceBtn" class="service-btn">📞 客服</button>
                        <button id="logoutBtn" class="logout-btn">退出</button>
                    </div>
                </div>
                <div class="charge-withdraw-row">
                    <button id="rechargeBtn" class="charge-btn">💎 充值</button>
                    <button id="withdrawBtn" class="withdraw-btn">💰 提现</button>
                </div>
            </div>
            <div class="game-nav">
                <button class="game-tab active" data-game="fish">🎲 葫芦鱼</button>
                <button class="game-tab" data-game="dice">🎲 至尊骰宝</button>
                <button class="game-tab" data-game="game3">🎮 游戏3</button>
                <button class="game-tab" data-game="game4">♠️ 游戏4</button>
            </div>
            <div class="game-container">
                <div id="gamePanel"></div>
            </div>
        `;
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuthUI(); };
        document.getElementById('serviceBtn').onclick = showServiceModal;
        document.getElementById('rechargeBtn').onclick = recharge;
        document.getElementById('withdrawBtn').onclick = withdraw;
        const gamePanel = document.getElementById('gamePanel');
        let currentDestroy = null;
        const inits = { fish: initFishGame, dice: initDiceGame, game3: initGame3, game4: initGame4 };
        async function switchGame(id) { if(currentDestroy) currentDestroy(); gamePanel.innerHTML = ''; currentDestroy = await inits[id](gamePanel); let b = document.getElementById("userBalanceDisplay"); if(b) b.innerText = getUserBalance().toFixed(2); }
        document.querySelectorAll('.game-tab').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); switchGame(btn.dataset.game); }; });
        switchGame('fish');
        startRealOnlineCount();
    }
    
    renderAuthUI();
</script>
