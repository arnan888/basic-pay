<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>龙虎斗 · 明亮版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            padding: 16px;
        }
        .container-outer {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: linear-gradient(145deg, #2a2a3a, #1e1e2e);
            border-radius: 0;
            padding: 12px;
            box-shadow: 12px 12px 24px rgba(0,0,0,0.5), -8px -8px 16px rgba(255,255,255,0.1);
        }
        .container {
            background: #2d2d3d;
            border-radius: 0;
            overflow: hidden;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.5), inset -2px -2px 4px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }
        .battle-scene {
            position: relative;
            margin: 16px;
            border-radius: 0;
            overflow: hidden;
            background: #0a0a0a;
            height: 35vh;
            flex-shrink: 0;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 10px 10px 20px rgba(0,0,0,0.4), -4px -4px 8px rgba(255,255,255,0.05);
        }
        .scene-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2a2a2a, #111);
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        .scene-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .dragon-word, .tiger-word {
            position: absolute;
            bottom: 20px;
            font-size: 56px;
            font-weight: 900;
            text-shadow: 6px 6px 0 rgba(0,0,0,0.6), 0 0 25px currentColor;
            z-index: 10;
            transition: all 0.15s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0.95;
        }
        .dragon-word { left: 20px; color: #ff5555; text-shadow: 0 0 15px red, 4px 4px 0 darkred; }
        .tiger-word { right: 20px; color: #55aaff; text-shadow: 0 0 15px blue, 4px 4px 0 darkblue; }
        .highlight-win {
            transform: scale(1.3);
            text-shadow: 0 0 40px currentColor, 8px 8px 0 rgba(0,0,0,0.5);
            opacity: 1;
        }
        .battle-result {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 0;
            color: #ffdd99;
            font-weight: bold;
            font-size: 18px;
            z-index: 20;
            white-space: nowrap;
            border: 1px solid #ffaa44;
            box-shadow: 0 0 20px rgba(255,170,68,0.8);
            transition: all 0.1s ease;
            pointer-events: none;
        }
        .battle-result.pop {
            transform: translateX(-50%) scale(1.1);
            background: rgba(255,170,68,0.9);
            color: #1a1a2a;
        }
        .flash-gold {
            animation: goldFlash 0.3s ease-out;
        }
        @keyframes goldFlash {
            0% { box-shadow: 0 0 0 0 rgba(255,215,0,0); background-color: transparent; }
            30% { box-shadow: 0 0 0 8px rgba(255,215,0,0.6); background-color: rgba(255,215,0,0.2); }
            100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); background-color: transparent; }
        }
        .bet-section {
            background: #2d2d3d;
            margin: 16px;
            border-radius: 0;
            padding: 20px;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.5), inset -2px -2px 4px rgba(255,255,255,0.05), 8px 8px 16px rgba(0,0,0,0.3);
            max-height: calc(100vh - 280px);
            overflow-y: auto;
            flex-shrink: 1;
        }
        .account-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e2e;
            border-radius: 0;
            padding: 8px 16px;
            margin-bottom: 20px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.05), 4px 4px 8px rgba(0,0,0,0.3);
        }
        .account-info {
            font-size: 14px;
            color: #ddd;
        }
        .account-info span {
            color: #ffaa44;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn-sm {
            background: #3a3a4a;
            border: none;
            border-radius: 0;
            padding: 6px 16px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.4), -1px -1px 2px rgba(255,255,255,0.1);
            transition: 0.05s linear;
        }
        .btn-sm:active {
            transform: translateY(2px);
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5);
        }
        .multi-bet-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        .multi-bet-item {
            flex: 1;
            background: #3a3a4a;
            border-radius: 0;
            padding: 12px 4px;
            text-align: center;
            box-shadow: 8px 8px 16px rgba(0,0,0,0.4), -4px -4px 8px rgba(255,255,255,0.05), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.05s;
            cursor: pointer;
        }
        .multi-bet-item.selected {
            background: #ffaa44;
            color: #1a1a2a;
            transform: scale(0.98);
        }
        .multi-bet-name {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .multi-bet-name.dragon { color: #ff7777; }
        .multi-bet-name.tiger { color: #77aaff; }
        .multi-bet-name.tie { color: #bb77ff; }
        .multi-bet-item.selected .multi-bet-name { color: #1a1a2a; }
        .multi-bet-amount {
            font-size: 22px;
            font-weight: bold;
            color: #ffaa44;
        }
        .multi-bet-control {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
        }
        .multi-bet-control button {
            background: #1e1e2e;
            border: none;
            border-radius: 0;
            width: 44px;
            height: 44px;
            color: #ffaa44;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 8px rgba(0,0,0,0.5), -2px -2px 4px rgba(255,255,255,0.05);
            transition: 0.05s;
        }
        .multi-bet-control button:active {
            transform: translateY(2px);
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5);
        }
        .data-stack {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 16px 0;
        }
        .data-item {
            background: #1e1e2e;
            border-radius: 0;
            padding: 12px;
            text-align: center;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.05), 6px 6px 12px rgba(0,0,0,0.3);
        }
        .data-item label {
            font-size: 13px;
            color: #aaa;
        }
        .data-item value {
            font-size: 24px;
            font-weight: bold;
            color: #ffaa44;
            display: block;
        }
        .history-area {
            background: #1e1e2e;
            border-radius: 0;
            padding: 16px;
            margin: 16px 0;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.05);
        }
        .history-title {
            font-size: 13px;
            color: #ffaa44;
            text-align: center;
            margin-bottom: 12px;
        }
        .history-grid {
            display: grid;
            grid-template-columns: repeat(10, 32px);
            gap: 6px;
            justify-content: center;
            margin-bottom: 16px;
        }
        .history-cell {
            width: 32px;
            height: 32px;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            background: #2a2a3a;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.5), inset -1px -1px 2px rgba(255,255,255,0.05);
        }
        .history-cell.dragon { background: #ff5555; color: white; box-shadow: 0 0 8px red; }
        .history-cell.tiger { background: #55aaff; color: white; box-shadow: 0 0 8px blue; }
        .history-cell.tie { background: #bb77ff; color: white; box-shadow: 0 0 8px purple; }
        .record-list {
            max-height: 120px;
            overflow-y: auto;
            font-size: 12px;
        }
        .record-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .record-win { color: #4caf50; }
        .record-lose { color: #f44336; }
        .timer-text {
            text-align: center;
            font-size: 16px;
            color: #ffaa44;
            margin: 12px 0;
        }
        .speed-select {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 12px 0;
        }
        .speed-btn {
            background: #1e1e2e;
            border: none;
            border-radius: 0;
            padding: 6px 24px;
            color: #aaa;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.4), -1px -1px 2px rgba(255,255,255,0.05);
        }
        .speed-btn.active {
            background: #ffaa44;
            color: #1a1a2a;
        }
        .exec-row {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            margin-bottom: 16px;
        }
        .exec-btn {
            flex: 1;
            padding: 14px;
            border-radius: 0;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            background: #3a3a4a;
            color: white;
            border: none;
            box-shadow: 6px 6px 12px rgba(0,0,0,0.4), -2px -2px 4px rgba(255,255,255,0.05);
            transition: 0.05s;
        }
        .exec-btn:active {
            transform: translateY(3px);
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5);
        }
        .main-go {
            background: linear-gradient(145deg, #e53935, #b71c1c);
            color: white;
        }
        .my-history-btn {
            background: #2c7a4d;
        }
        /* 底部余额区域 */
        .bottom-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
            margin-bottom: 8px;
        }
        .stat-card {
            background: #3a3a4a;
            border-radius: 0;
            padding: 12px 8px;
            text-align: center;
            box-shadow: 6px 6px 12px rgba(0,0,0,0.4), -4px -4px 8px rgba(255,255,255,0.05), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .stat-card span:first-child {
            display: block;
            font-size: 12px;
            color: #ccc;
            letter-spacing: 1px;
        }
        .stat-card span:last-child {
            font-size: 24px;
            font-weight: bold;
            color: #ffaa44;
            text-shadow: 0 0 8px rgba(255,170,68,0.5);
        }
        #hiddenFileInput {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 0;
            height: 0;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2a2a3a;
            width: 85%;
            max-width: 360px;
            border-radius: 0;
            padding: 24px;
            text-align: center;
            color: white;
            box-shadow: 12px 12px 24px rgba(0,0,0,0.6), -6px -6px 12px rgba(255,255,255,0.05);
        }
        .modal-content button {
            background: #ffaa44;
            border: none;
            border-radius: 0;
            padding: 10px 24px;
            margin-top: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button, .btn-sm, .exec-btn, .speed-btn, .multi-bet-control button {
            pointer-events: auto !important;
        }
    </style>
</head>
<body>
<div class="container-outer">
    <div class="container">
        <!-- 战场区域 -->
        <div class="battle-scene" id="battleScene">
            <div class="scene-bg" id="sceneBg"></div>
            <div class="dragon-word" id="dragonWord">龍</div>
            <div class="tiger-word" id="tigerWord">虎</div>
            <div class="battle-result" id="battleResult"></div>
        </div>
        <!-- 押注及操作区域 -->
        <div class="bet-section">
            <div class="account-bar">
                <div class="account-info">👤 账户：<span id="currentUserId">6685731895</span></div>
                <div class="btn-group">
                    <button id="myHistoryBtn" class="btn-sm my-history-btn">📜 我的记录</button>
                    <button id="newUserBtn" class="btn-sm">✨ 新用户</button>
                </div>
            </div>
            <div class="account-bar" style="margin-top: 8px;">
                <div class="account-switch" style="display: flex; gap: 8px; width:100%;">
                    <input type="text" id="switchUserIdInput" placeholder="切换用户ID" style="flex:2; background:#1e1e2e; border:1px solid #ffaa44; border-radius:0; padding:8px 16px; color:white;">
                    <button id="switchUserBtn" class="btn-sm">切换</button>
                </div>
            </div>
            <div class="multi-bet-row">
                <div class="multi-bet-item" data-type="DRAGON">
                    <div class="multi-bet-name dragon">🐉 龙</div>
                    <div class="multi-bet-amount" id="betDragonAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="DRAGON">-</button>
                        <button class="bet-inc" data-type="DRAGON">+</button>
                    </div>
                </div>
                <div class="multi-bet-item" data-type="TIE">
                    <div class="multi-bet-name tie">⚖️ 和</div>
                    <div class="multi-bet-amount" id="betTieAmount">0</div>
                    <div class="multi-bet-control">
                        <button class="bet-dec" data-type="TIE">-</button>
                        <button class="bet-inc" data-type="TIE">+</button>
