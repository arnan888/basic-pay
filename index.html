        let type = confirm("提现方式：确定=微信，取消=支付宝") ? "微信" : "支付宝";
        let account = prompt("请输入收款账号:");
        if (!account) return;
        // 不实际扣款，只记录申请，客服后台处理
        let record = { phone: currentUser.account, amount: amount, type, account, time: new Date().toLocaleString(), status: "待处理" };
        let records = JSON.parse(localStorage.getItem('gold_withdraw')) || [];
        records.push(record);
        localStorage.setItem('gold_withdraw', JSON.stringify(records));
        showToast(`提现申请已提交！${amount}元将处理到${type}账号 ${account}，客服审核后到账`);
    }
