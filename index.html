<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>潮汕葫芦鱼 | 手机版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #1a120c;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', sans-serif;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }
        .app {
            max-width: 500px;
            width: 100%;
            height: 100vh;
            margin: 0 auto;
            overflow-y: auto;
            padding: 8px;
            box-sizing: border-box;
        }
        /* 登录面板 */
        .auth-panel {
            background: linear-gradient(145deg, #362a1f 0%, #251e16 100%);
            border-radius: 40px;
            padding: 30px 20px;
            margin-top: 20%;
            text-align: center;
            border: 2px solid #ffaa44;
        }
        .auth-panel h2 { color: #ffdd99; font-size: 1.5rem; margin-bottom: 20px; }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a241e;
            border: 1px solid #ffaa44;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            text-align: center;
        }
        .auth-buttons { display: flex; gap: 12px; margin: 20px 0; }
        .auth-btn {
            flex: 1;
            background: #c47c3a;
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: #2f1b0a;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .auth-note { color: #aa8855; font-size: 0.65rem; }
        /* 游戏卡片 */
        .user-bar {
            background: #1f1711;
            border-radius: 30px;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .user-bar span { color: #ffdd99; font-size: 0.7rem; }
        .logout-btn { background: #734c2e; border: none; padding: 4px 10px; border-radius: 25px; color: #ffe3b3; font-size: 0.65rem; cursor: pointer; }
        .game-card { background: linear-gradient(145deg, #362a1f 0%, #251e16 100%); border-radius: 35px; overflow: hidden; margin-bottom: 8px; }
        .game-header { background: linear-gradient(135deg, #b85a2e, #7a3116); padding: 8px 12px; text-align: center; }
        .game-header h1 { font-size: 1rem; color: #ffefcf; }
        .stats-panel { display: flex; gap: 6px; padding: 6px 10px; background: #1f1711; flex-wrap: wrap; }
        .stat-card { background: #1a130d; border-radius: 25px; padding: 4px 6px; flex: 1; text-align: center; min-width: 65px; }
        .stat-label { font-size: 0.5rem; color: #e2bc89; }
        .stat-value { font-size: 0.85rem; font-weight: 800; color: #f9d792; }
        .dice-area {
            background: #2a211a; margin: 8px 10px; border-radius: 40px; padding: 8px;
            text-align: center; position: relative;
        }
        .dice-box { display: flex; justify-content: center; gap: 10px; }
        .dice { background: #fff2df; width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 3px 0 #926b42; }
        .dice-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.9), #2c1e14);
            backdrop-filter: blur(6px); border-radius: 40px; display: flex; align-items: center;
            justify-content: center; flex-direction: column; z-index: 15;
            transition: all 0.4s ease; border: 2px solid #cb9e6b;
        }
        .dice-cover span { font-size: 2rem; }
        .dice-cover .cover-text { font-size: 0.6rem; background: #00000099; padding: 2px 10px; border-radius: 25px; margin-top: 5px; color: #ffdd99; }
        .dice-cover.open-cover { transform: translateY(-60px) scale(0.6); opacity: 0; visibility: hidden; }
        .dice-cover.hidden-cover { display: none; }
        .bet-sections { padding: 0 10px 6px; }
        .section-title { font-size: 0.6rem; color: #ffd49f; margin: 5px 0 3px 4px; border-left: 3px solid #f7b05e; padding-left: 6px; }
        .bet-grid, .special-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
        .bet-card { background: #1f1712; border-radius: 22px; padding: 4px 2px; text-align: center; border: 1px solid #6f4f34; }
        .bet-icon { font-size: 1.3rem; background: #2f231c; width: 32px; height: 32px; line-height: 32px; margin: 0 auto 3px; border-radius: 50%; }
        .bet-name { font-size: 0.6rem; font-weight: bold; color: #ffddb0; }
        .bet-amount { background: #0c0907; border-radius: 30px; padding: 1px 4px; margin: 4px 3px 0; display: flex; justify-content: space-between; align-items: center; }
        .bet-amount span { color: #ffbc6e; font-size: 0.65rem; background: #2a1c12; padding: 1px 5px; border-radius: 25px; }
        .btn-chip { background: #523b26; border: none; color: #fce2b4; width: 24px; height: 24px; border-radius: 25px; font-size: 0.9rem; cursor: pointer; }
        .chip-bar { background: #2a1f16; margin: 5px 10px 8px; padding: 6px; border-radius: 40px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .chip { background: #ebbc7e; color: #3a240f; font-weight: bold; font-size: 0.65rem; padding: 4px 10px; border-radius: 30px; cursor: pointer; }
        .chip.selected { background: #f7c56e; box-shadow: 0 0 0 2px #ffefb0; }
        .action-bar { display: flex; justify-content: center; gap: 8px; padding: 5px 12px 10px; }
        .action-btn { background: #734c2e; border: none; padding: 5px 15px; font-size: 0.7rem; font-weight: bold; border-radius: 30px; color: #ffe3b3; cursor: pointer; }
        .action-btn.primary { background: #c47c3a; color: #2f1b0a; }
        .message-area { background: #1c140e; margin: 0 10px 10px; border-radius: 30px; padding: 6px 10px; font-size: 0.6rem; color: #dbbc8c; text-align: center; min-height: 40px; }
        .admin-card { background: #1e1813; border-radius: 35px; overflow: hidden; margin-bottom: 8px; }
        .admin-header { background: #4a3322; padding: 6px 12px; display: flex; justify-content: space-between; cursor: pointer; }
        .admin-header h3 { color: #ffefcf; font-size: 0.75rem; }
        .toggle-btn { background: #7a5a3e; border: none; color: white; padding: 2px 8px; border-radius: 25px; font-size: 0.6rem; cursor: pointer; }
        .admin-content { padding: 8px; }
        .admin-content.collapsed { display: none; }
        .seats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 8px 0; }
        .seat-card { background: #1a130d; border-radius: 16px; padding: 4px 2px; text-align: center; border: 1px solid #6f4f34; }
        .seat-card.occupied { background: #2f4127; }
        .seat-number { font-size: 0.5rem; color: #dba24b; }
        .player-name { font-size: 0.55rem; margin: 2px 0; color: #ffefcf; }
        .seat-action { background: #5f3e28; border: none; color: #ffddb0; padding: 2px 5px; border-radius: 20px; font-size: 0.5rem; cursor: pointer; }
        .admin-buttons { display: flex; gap: 5px; margin-top: 6px; }
        .admin-btn { background: #5f462f; border: none; padding: 4px 8px; border-radius: 30px; color: #ffe3b3; font-size: 0.6rem; cursor: pointer; flex: 1; text-align: center; }
        footer { font-size: 0.45rem; text-align: center; padding: 5px; color: #aa8259; }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ==================== 用户数据 ====================
const STORAGE_USERS = 'fish_users_data';
let users = JSON.parse(localStorage.getItem(STORAGE_USERS)) || {};
let currentUser = null;
let bankerBalance = parseInt(localStorage.getItem('fish_banker')) || 10000;

function saveUsers() { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
function saveBanker() { localStorage.setItem('fish_banker', bankerBalance); }
function getUserBalance() { return currentUser ? (users[currentUser.phone]?.balance || 1000) : 0; }
function setUserBalance(amt) { if(currentUser) { users[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }

function showToast(msg) {
    let t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#000;color:#ffaa44;padding:8px 16px;border-radius:40px;font-size:0.7rem;z-index:2000;border:1px solid #ffaa44;';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}

// ==================== 游戏核心 ====================
const PATTERNS = [
    { id: "fish", name: "鱼", icon: "🐟" },
    { id: "shrimp", name: "虾", icon: "🦐" },
    { id: "crab", name: "蟹", icon: "🦀" },
    { id: "calabash", name: "葫芦", icon: "🏺" },
    { id: "coin", name: "金钱", icon: "💰" },
    { id: "chicken", name: "鸡", icon: "🐔" }
];
const SPECIALS = [
    { id: "big", name: "大", icon: "🔴" },
    { id: "small", name: "小", icon: "🔵" },
    { id: "odd", name: "单", icon: "⚪" },
    { id: "even", name: "双", icon: "⚫" },
    { id: "allTriplets", name: "全围", icon: "🌀" }
];

let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
let specialBets = { big:0, small:0, odd:0, even:0, allTriplets:0 };
let currentChip = 100;
let lastWin = 0;
let isRolling = false;

function getTotalBet() {
    let p = Object.values(patternBets).reduce((a,b)=>a+b,0);
    let s = Object.values(specialBets).reduce((a,b)=>a+b,0);
    return p+s;
}

function updateUI() {
    let balSpan = document.getElementById('userBal');
    if(balSpan) balSpan.innerText = getUserBalance().toFixed(2);
    let bankSpan = document.getElementById('bankerBal');
    if(bankSpan) bankSpan.innerText = Math.floor(bankerBalance);
    let totalSpan = document.getElementById('totalBet');
    if(totalSpan) totalSpan.innerText = getTotalBet();
    let lastSpan = document.getElementById('lastWin');
    if(lastSpan) lastSpan.innerText = lastWin;
    PATTERNS.forEach(p => { let s = document.getElementById(`bet_${p.id}`); if(s) s.innerText = patternBets[p.id]; });
    SPECIALS.forEach(s => { let span = document.getElementById(`bet_${s.id}`); if(span) span.innerText = specialBets[s.id]; });
}

function showMsg(msg) {
    let el = document.getElementById('msgArea');
    if(el) el.innerText = msg;
    setTimeout(() => { if(el && el.innerText === msg) el.innerText = "🎲 点击开骰"; }, 2500);
}

function addBet(type, id) {
    let target = type === 'pattern' ? patternBets : specialBets;
    if(target[id] === undefined) return;
    let total = getTotalBet() + currentChip;
    if(total > getUserBalance()) { showToast("余额不足"); return; }
    target[id] += currentChip;
    updateUI();
}

function subBet(type, id) {
    let target = type === 'pattern' ? patternBets : specialBets;
    if(target[id] === undefined) return;
    if(target[id] >= currentChip) {
        target[id] -= currentChip;
        updateUI();
    }
}

function clearBets() {
    PATTERNS.forEach(p => patternBets[p.id] = 0);
    SPECIALS.forEach(s => specialBets[s.id] = 0);
    updateUI();
    showMsg("已清空下注");
}

async function rollDice() {
    if(isRolling) return;
    let total = getTotalBet();
    if(total === 0) { showMsg("请先下注"); return; }
    if(total > getUserBalance()) { showMsg("余额不足"); return; }
    if(total > bankerBalance) { showMsg("庄家余额不足"); return; }
    
    isRolling = true;
    let rollBtn = document.getElementById('rollBtn');
    if(rollBtn) rollBtn.disabled = true;
    
    let cover = document.getElementById('diceCover');
    if(cover) {
        cover.classList.remove('hidden-cover');
        cover.classList.add('open-cover');
        await new Promise(r => setTimeout(r, 450));
        cover.classList.add('hidden-cover');
    }
    
    let dice = document.querySelectorAll('.dice');
    let icons = ["🐟","🦐","🦀","🏺","💰","🐔"];
    let names = ["鱼","虾","蟹","葫芦","金钱","鸡"];
    for(let step=0; step<6; step++) {
        await new Promise(r => setTimeout(r, 60));
        dice.forEach(d => d.innerHTML = icons[Math.floor(Math.random()*6)]);
    }
    
    let results = [names[Math.floor(Math.random()*6)], names[Math.floor(Math.random()*6)], names[Math.floor(Math.random()*6)]];
    for(let i=0; i<3; i++) dice[i].innerHTML = icons[names.indexOf(results[i])];
    
    let points = results.map(r => { let m={鱼:1,虾:2,蟹:3,葫芦:4,金钱:5,鸡:6}; return m[r]; });
    let sum = points.reduce((a,b)=>a+b,0);
    let isTriplet = results[0]===results[1] && results[1]===results[2];
    
    setUserBalance(getUserBalance() - total);
    bankerBalance -= total;
    let win = 0;
    let wins = [];
    
    for(let p of PATTERNS) {
        let bet = patternBets[p.id];
        if(bet > 0) {
            let occur = results.filter(r => r === p.name).length;
            if(occur > 0) { win += bet * (occur + 1); wins.push(`${p.name}x${occur}`); }
        }
    }
    
    let isBig = (sum>=11 && sum<=17 && !isTriplet);
    let isSmall = (sum>=4 && sum<=10 && !isTriplet);
    let isOdd = (sum%2===1 && !isTriplet);
    let isEven = (sum%2===0 && !isTriplet);
    
    if(specialBets.big>0 && isBig) { win += specialBets.big * 2; wins.push("大"); }
    if(specialBets.small>0 && isSmall) { win += specialBets.small * 2; wins.push("小"); }
    if(specialBets.odd>0 && isOdd) { win += specialBets.odd * 2; wins.push("单"); }
    if(specialBets.even>0 && isEven) { win += specialBets.even * 2; wins.push("双"); }
    if(specialBets.allTriplets>0 && isTriplet) { win += specialBets.allTriplets * 25; wins.push("全围"); }
    
    let net = win - total;
    bankerBalance += win;
    setUserBalance(getUserBalance() + win);
    lastWin = net;
    saveBanker();
    updateUI();
    
    showMsg(`🎲 ${results.join("、")} ${net>=0 ? `净赢+${net}` : `亏损${total}`}`);
    
    if(currentUser) {
        let recs = users[currentUser.phone].records || [];
        recs.unshift({ time: new Date().toLocaleTimeString(), result: results.join(","), win: net });
        if(recs.length > 20) recs.pop();
        users[currentUser.phone].records = recs;
        saveUsers();
    }
    
    clearBets();
    await new Promise(r => setTimeout(r, 1200));
    if(cover) {
        cover.classList.remove('open-cover', 'hidden-cover');
        cover.style.display = "flex";
        cover.style.visibility = "visible";
    }
    dice.forEach(d => d.innerHTML = "🎲");
    isRolling = false;
    if(rollBtn) rollBtn.disabled = false;
}

// ==================== 座位管理 ====================
let players = [];
let nextId = 100;
let playerBals = JSON.parse(localStorage.getItem('fish_player_bals')) || {};
let maxSeats = 20;
const namePool = ["阿强","老李","虾妹","蟹叔","金钱哥","鸡姐","小陈","骰手","好运","锦鲤"];

function savePlayerBals() { localStorage.setItem('fish_player_bals', JSON.stringify(playerBals)); }
function getPlayerBal(name) { return playerBals[name] || 1000; }

function renderSeats() {
    let container = document.getElementById('seatsGrid');
    if(!container) return;
    container.innerHTML = '';
    for(let i=1; i<=maxSeats; i++) {
        let p = players.find(p => p.seat === i);
        let div = document.createElement('div');
        div.className = `seat-card ${p ? 'occupied' : ''}`;
        if(p) {
            div.innerHTML = `<div class="seat-number">#${i}</div><div class="player-name">${p.name.substring(0,6)}</div><button class="seat-action remove-seat" data-seat="${i}">移除</button>`;
        } else {
            div.innerHTML = `<div class="seat-number">#${i}</div><div class="player-name">空闲</div><button class="seat-action add-seat" data-seat="${i}">邀请</button>`;
        }
        container.appendChild(div);
    }
    document.getElementById('roomStats').innerHTML = `👥 ${players.length}/${maxSeats}`;
    
    document.querySelectorAll('.remove-seat').forEach(btn => {
        btn.onclick = () => { let s = parseInt(btn.dataset.seat); players = players.filter(p => p.seat !== s); renderSeats(); };
    });
    document.querySelectorAll('.add-seat').forEach(btn => {
        btn.onclick = () => {
            let s = parseInt(btn.dataset.seat);
            if(players.find(p => p.seat === s)) return;
            if(players.length >= maxSeats) { showToast("房间已满"); return; }
            let name = namePool[Math.floor(Math.random()*namePool.length)] + Math.floor(Math.random()*100);
            players.push({ id: nextId++, name, seat: s });
            renderSeats();
        };
    });
}

function addRandom() {
    if(players.length >= maxSeats) { showToast("房间已满"); return; }
    let empty = [];
    for(let i=1; i<=maxSeats; i++) if(!players.find(p => p.seat === i)) empty.push(i);
    if(empty.length === 0) return;
    let name = namePool[Math.floor(Math.random()*namePool.length)] + Math.floor(Math.random()*100);
    players.push({ id: nextId++, name, seat: empty[Math.floor(Math.random()*empty.length)] });
    renderSeats();
}
function clearAllSeats() { players = []; renderSeats(); }
function fillExample() {
    players = [];
    for(let i=1; i<=Math.min(6, maxSeats); i++) {
        let name = namePool[(i-1)%namePool.length] + Math.floor(Math.random()*100);
        players.push({ id: nextId++, name, seat: i });
    }
    renderSeats();
}

// ==================== 渲染游戏界面 ====================
function renderGame() {
    let patternsHtml = '';
    PATTERNS.forEach(p => {
        patternsHtml += `<div class="bet-card"><div class="bet-icon">${p.icon}</div><div class="bet-name">${p.name}</div><div class="bet-amount">
            <button class="btn-chip sub" data-type="pattern" data-id="${p.id}">-</button>
            <span id="bet_${p.id}">0</span>
            <button class="btn-chip add" data-type="pattern" data-id="${p.id}">+</button>
        </div></div>`;
    });
    let specialsHtml = '';
    SPECIALS.forEach(s => {
        specialsHtml += `<div class="bet-card"><div class="bet-icon">${s.icon}</div><div class="bet-name">${s.name}</div><div class="bet-amount">
            <button class="btn-chip sub" data-type="special" data-id="${s.id}">-</button>
            <span id="bet_${s.id}">0</span>
            <button class="btn-chip add" data-type="special" data-id="${s.id}">+</button>
        </div></div>`;
    });
    
    document.getElementById('app').innerHTML = `
        <div class="user-bar">
            <span>📱 ${currentUser.phone.substring(0,7)}... | 💰 <span id="userBal">${getUserBalance().toFixed(2)}</span></span>
            <button id="logoutBtn" class="logout-btn">退出</button>
        </div>
        <div class="game-card">
            <div class="game-header"><h1>🎲 潮汕葫芦鱼 · 二十人房 🦐</h1></div>
            <div class="stats-panel">
                <div class="stat-card"><div class="stat-label">庄家</div><div class="stat-value">系统</div></div>
                <div class="stat-card"><div class="stat-label">庄家余额</div><div class="stat-value" id="bankerBal">${Math.floor(bankerBalance)}</div></div>
                <div class="stat-card"><div class="stat-label">总押注</div><div class="stat-value" id="totalBet">0</div></div>
                <div class="stat-card"><div class="stat-label">上局净利</div><div class="stat-value" id="lastWin">0</div></div>
            </div>
            <div class="dice-area">
                <div class="dice-box"><div class="dice">🎲</div><div class="dice">🎲</div><div class="dice">🎲</div></div>
                <div class="dice-cover" id="diceCover"><span>🏺</span><div class="cover-text">骰盅未开</div></div>
            </div>
            <div class="bet-sections">
                <div class="section-title">🐟 六门押注</div>
                <div class="bet-grid" id="patternGrid">${patternsHtml}</div>
                <div class="section-title">🎯 特殊投注</div>
                <div class="special-grid" id="specialGrid">${specialsHtml}</div>
            </div>
            <div class="chip-bar">
                <div class="chip" data-chip="20">20</div><div class="chip" data-chip="50">50</div>
                <div class="chip" data-chip="100">100</div><div class="chip" data-chip="500">500</div>
                <div class="chip" data-chip="1000">1k</div>
            </div>
            <div class="action-bar">
                <button id="rollBtn" class="action-btn primary">🎲 开骰！</button>
                <button id="clearBtn" class="action-btn">🧹 清空</button>
            </div>
            <div class="message-area" id="msgArea">点击开骰</div>
        </div>
        <div class="admin-card">
            <div class="admin-header" id="adminHeader"><h3>🎛️ 二十人座席</h3><button id="toggleAdmin" class="toggle-btn">▼</button></div>
            <div class="admin-content" id="adminContent">
                <div class="seats-grid" id="seatsGrid"></div>
                <div class="admin-buttons">
                    <button id="addRandomBtn" class="admin-btn">➕ 随机</button>
                    <button id="clearSeatsBtn" class="admin-btn">🗑️ 清空</button>
                    <button id="exampleBtn" class="admin-btn">🎲 示例</button>
                </div>
                <footer>点击邀请/移除玩家</footer>
            </div>
        </div>
    `;
    
    document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuth(); };
    document.getElementById('rollBtn').onclick = rollDice;
    document.getElementById('clearBtn').onclick = clearBets;
    document.getElementById('addRandomBtn').onclick = addRandom;
    document.getElementById('clearSeatsBtn').onclick = clearAllSeats;
    document.getElementById('exampleBtn').onclick = fillExample;
    
    document.querySelectorAll('.chip').forEach(c => {
        c.onclick = () => {
            currentChip = parseInt(c.dataset.chip);
            document.querySelectorAll('.chip').forEach(cc => cc.classList.remove('selected'));
            c.classList.add('selected');
        };
    });
    document.querySelector('.chip[data-chip="100"]')?.classList.add('selected');
    
    document.querySelector('.bet-grid')?.addEventListener('click', (e) => {
        let btn = e.target.closest('.btn-chip');
        if(!btn) return;
        let type = btn.dataset.type, id = btn.dataset.id;
        if(btn.classList.contains('add')) addBet(type, id);
        if(btn.classList.contains('sub')) subBet(type, id);
    });
    document.querySelector('.special-grid')?.addEventListener('click', (e) => {
        let btn = e.target.closest('.btn-chip');
        if(!btn) return;
        let type = btn.dataset.type, id = btn.dataset.id;
        if(btn.classList.contains('add')) addBet(type, id);
        if(btn.classList.contains('sub')) subBet(type, id);
    });
    
    let collapsed = false;
    document.getElementById('toggleAdmin').onclick = () => {
        collapsed = !collapsed;
        document.getElementById('adminContent').classList.toggle('collapsed', collapsed);
    };
    
    renderSeats();
    updateUI();
}

// ==================== 登录注册 ====================
function renderAuth() {
    document.getElementById('app').innerHTML = `
        <div class="auth-panel">
            <h2>🎲 潮汕葫芦鱼</h2>
            <input type="tel" id="phone" class="auth-input" placeholder="手机号" maxlength="11">
            <input type="password" id="pwd" class="auth-input" placeholder="密码 (≥4位)">
            <div class="auth-buttons">
                <button id="loginBtn" class="auth-btn">登录</button>
                <button id="registerBtn" class="auth-btn">注册</button>
            </div>
            <div class="auth-note">测试：任意11位手机号+4位以上密码注册</div>
        </div>
    `;
    document.getElementById('loginBtn').onclick = () => {
        let phone = document.getElementById('phone').value.trim();
        let pwd = document.getElementById('pwd').value;
        if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
        let user = users[phone];
        if(!user) { showToast("手机号未注册"); return; }
        if(user.password !== pwd) { showToast("密码错误"); return; }
        currentUser = { phone, ...user };
        showToast(`欢迎回来，${phone}`);
        renderGame();
    };
    document.getElementById('registerBtn').onclick = () => {
        let phone = document.getElementById('phone').value.trim();
        let pwd = document.getElementById('pwd').value;
        if(!phone || !pwd) { showToast("请填写手机号和密码"); return; }
        if(!/^1[3-9]\d{9}$/.test(phone)) { showToast("请输入有效11位手机号"); return; }
        if(pwd.length < 4) { showToast("密码至少4位"); return; }
        if(users[phone]) { showToast("手机号已注册"); return; }
        users[phone] = { password: pwd, balance: 1000, records: [] };
        saveUsers();
        showToast("注册成功！请登录");
        document.getElementById('phone').value = '';
        document.getElementById('pwd').value = '';
    };
}

renderAuth();
</script>
