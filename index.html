<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>双游戏大厅 | 葫芦鱼+骰宝 | 完整功能版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #1a120c; background-image: radial-gradient(circle at 20% 30%, rgba(200,140,70,0.15) 2%, transparent 2.5%); background-size: 28px 28px; font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif; padding: 12px; }
        .app { max-width: 550px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .game-nav { background: linear-gradient(145deg, #2a241e 0%, #1f1a15 100%); border-radius: 60px; padding: 6px; display: flex; gap: 8px; border: 1px solid #ffaa44; flex-wrap: wrap; }
        .game-tab { flex: 1; background: transparent; border: none; padding: 8px 0; border-radius: 50px; font-weight: bold; font-size: 0.85rem; color: #ccaa77; cursor: pointer; transition: 0.2s; text-align: center; }
        .game-tab.active { background: #c47c3a; color: #2f1b0a; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .user-section { background: #1f1711; border-radius: 40px; padding: 8px 16px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
        .user-info-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .user-info-row span { color: #ffdd99; font-size: 0.75rem; }
        .btn-group { display: flex; gap: 8px; }
        .logout-btn, .service-btn { background: #734c2e; border: none; padding: 4px 12px; border-radius: 30px; color: #ffe3b3; font-size: 0.7rem; cursor: pointer; }
        .service-btn { background: #2e7d32; }
        .charge-withdraw-row { display: flex; gap: 10px; justify-content: center; }
        .charge-btn, .withdraw-btn { background: #c47c3a; border: none; padding: 5px 20px; border-radius: 30px; color: #2f1b0a; font-weight: bold; font-size: 0.75rem; cursor: pointer; flex: 1; text-align: center; box-shadow: 0 2px 0 #764e26; }
        .withdraw-btn { background: #734c2e; color: #ffe3b3; box-shadow: 0 2px 0 #3f2a1a; }
        .game-container { background: linear-gradient(145deg, #362a1f 0%, #251e16 100%); border-radius: 48px; box-shadow: 0 12px 25px rgba(0,0,0,0.5); overflow: hidden; min-height: 550px; }
        .auth-panel { background: linear-gradient(145deg, #362a1f 0%, #251e16 100%); border-radius: 48px; padding: 30px 20px; text-align: center; border: 2px solid #ffaa44; }
        .auth-panel h2 { color: #ffdd99; font-size: 1.5rem; margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; background: #2a241e; border: 1px solid #ffaa44; border-radius: 40px; color: white; font-size: 0.9rem; text-align: center; }
        .auth-buttons { display: flex; gap: 12px; margin: 20px 0; }
        .auth-btn { flex: 1; background: #c47c3a; border: none; padding: 10px; border-radius: 40px; color: #2f1b0a; font-weight: bold; cursor: pointer; }
        .auth-note { color: #aa8855; font-size: 0.65rem; }
        /* 葫芦鱼样式 */
        .fish-wrapper .chip { background: #ebbc7e; color: #3a240f; font-weight: bold; font-size: 0.7rem; padding: 3px 10px; border-radius: 35px; cursor: pointer; box-shadow: 0 2px 0 #8b5a2e; display: inline-block; text-align: center; }
        .fish-wrapper .chip.selected { background: #f7c56e; box-shadow: 0 0 0 1px #ffefb0, 0 2px 0 #7a4b22; }
        .fish-wrapper .bet-card { background: #1f1712; border-radius: 28px; padding: 4px 2px; text-align: center; box-shadow: 0 2px 0 #0a0705; border: 1px solid #6f4f34; }
        .fish-wrapper .bet-icon { font-size: 1.4rem; background: #2f231c; width: 36px; height: 36px; line-height: 36px; margin: 0 auto 3px; border-radius: 50%; }
        .fish-wrapper .bet-name { font-size: 0.65rem; font-weight: bold; color: #ffddb0; }
        .fish-wrapper .bet-amount { background: #0c0907; border-radius: 30px; padding: 2px 4px; margin: 4px 3px 0; display: flex; justify-content: space-between; align-items: center; gap: 2px; }
        .fish-wrapper .bet-amount span { color: #ffbc6e; font-size: 0.7rem; background: #2a1c12; padding: 1px 5px; border-radius: 25px; min-width: 32px; }
        .fish-wrapper .btn-chip { background: #523b26; border: none; color: #fce2b4; font-weight: bold; width: 24px; height: 24px; border-radius: 25px; font-size: 0.8rem; cursor: pointer; }
        .fish-wrapper .seat-card { background: #1a130d; border-radius: 16px; padding: 4px 2px; text-align: center; border: 1px solid #6f4f34; }
        .fish-wrapper .seat-card.occupied { background: #2f4127; border: 1px solid #ffaa55; }
        .fish-wrapper .action-bar { display: flex; justify-content: center; gap: 8px; margin: 0 12px 12px; }
        .fish-wrapper .grab-bar { display: flex; justify-content: center; margin: 8px 12px; }
        .grab-btn { background: #ffaa44; color: #2f1b0a; border: none; padding: 6px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .grab-btn:disabled { background: #888; cursor: not-allowed; }
        .online-count-box { background: #2a1f16; margin: 12px 12px 8px; padding: 8px 12px; border-radius: 40px; text-align: center; font-size: 0.8rem; color: #ffdd99; border: 1px solid #ffaa44; display: flex; justify-content: space-between; align-items: center; }
        .online-number { font-size: 1.2rem; font-weight: bold; color: #ffaa44; margin-left: 8px; }
        /* 骰宝样式 */
        .dice-wrapper .dice { width: 60px; height: 60px; position: relative; transform-style: preserve-3d; }
        .dice-wrapper .dice-face { position: absolute; width: 60px; height: 60px; background: linear-gradient(145deg, #fffff0, #f5f5dc); border-radius: 12px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; border: 1px solid rgba(200,180,120,0.5); }
        .dice-wrapper .front { transform: translateZ(30px); }
        .dice-wrapper .back { transform: rotateY(180deg) translateZ(30px); }
        .dice-wrapper .right { transform: rotateY(90deg) translateZ(30px); }
        .dice-wrapper .left { transform: rotateY(-90deg) translateZ(30px); }
        .dice-wrapper .top { transform: rotateX(90deg) translateZ(30px); }
        .dice-wrapper .bottom { transform: rotateX(-90deg) translateZ(30px); }
        .dice-wrapper .pip { position: absolute; width: 9px; height: 9px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #e74c3c, #c0392b); }
        .dice-wrapper .chip.selected-chip { box-shadow: 0 0 0 3px #ffaa44; transform: scale(1.02); }
        .dice-wrapper .countdown-warning { animation: warning 0.5s infinite; color: #ff3300 !important; }
        @keyframes warning { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
        .result-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.6); background: linear-gradient(145deg, #ffcc44, #ff9933); color: #1a1a2a; padding: 24px 40px; border-radius: 80px; font-size: 2rem; font-weight: 900; z-index: 2000; opacity: 0; transition: 0.25s; pointer-events: none; }
        .result-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .result-popup.win { background: linear-gradient(145deg, #ffcc44, #ffaa22); }
        .result-popup.lose { background: linear-gradient(145deg, #555, #333); color: #ffaa66; }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #000000cc; color: #ffaa44; padding: 8px 16px; border-radius: 40px; z-index: 2001; animation: fadeInOut 2s forwards; }
        @keyframes fadeInOut { 0% { opacity:0; transform: translateX(-50%) translateY(20px); } 15% { opacity:1; transform: translateX(-50%) translateY(0); } 85% { opacity:1; } 100% { opacity:0; transform: translateX(-50%) translateY(-20px); } }
        /* 充值弹窗样式 */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: #1a2a1a; border-radius: 48px; padding: 24px; border: 2px solid #ffaa44; width: 85%; max-width: 500px; text-align: center; color: #ffdd99; }
        .qr-img { width: 180px; height: 180px; margin: 10px auto; display: block; background: white; border-radius: 20px; padding: 10px; object-fit: contain; }
        .admin-user-list { max-height: 150px; overflow-y: auto; margin: 12px 0; background: #0a1a0a; border-radius: 12px; padding: 8px; }
        .admin-user { padding: 8px; border-bottom: 1px solid #333; cursor: pointer; }
        .admin-user.selected { background: #ffaa44; color: #1a1a2a; }
        .admin-input { width: 100%; padding: 8px; margin: 8px 0; border-radius: 12px; background: #0a1a0a; border: 1px solid #ffaa44; color: #fff; }
        .admin-btns { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 12px 0; }
        .admin-btn { padding: 6px 12px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
        /* 骰宝桌面平铺样式 */
        .dice-wrapper .section-title { font-size: 0.7rem; color: #ffd49f; margin: 12px 0 6px 4px; border-left: 3px solid #f7b05e; padding-left: 8px; }
        .dice-wrapper .special-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
        .dice-wrapper .points-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
        .dice-wrapper .trio-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
        .dice-wrapper .bet-card { background: #1f1712; border-radius: 28px; padding: 6px 2px; text-align: center; box-shadow: 0 6px 0 #0a0705; border: 1px solid #6f4f34; cursor: pointer; transition: 0.05s linear; }
        .dice-wrapper .bet-card:active { transform: translateY(3px); box-shadow: 0 3px 0 #0a0705; }
        .dice-wrapper .bet-card.selected { background: #c47c3a; transform: translateY(3px); box-shadow: 0 3px 0 #0a0705; }
        .dice-wrapper .bet-name { font-size: 0.7rem; font-weight: bold; color: #ffddb0; }
        .dice-wrapper .bet-odds { font-size: 0.55rem; color: #dba959; }
        .dice-wrapper .bet-amount { font-size: 0.65rem; font-weight: bold; color: #ffdd88; margin-top: 4px; background: rgba(0,0,0,0.5); border-radius: 20px; padding: 2px; }
        .dice-wrapper .chip:active { transform: translateY(3px); box-shadow: 0 1px 0 #0a0705 !important; }
        .dice-wrapper .action-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #0a0705 !important; }
        @media (max-width: 480px) {
            .dice-wrapper .dice { width: 50px; height: 50px; }
            .dice-wrapper .dice-face { width: 50px; height: 50px; }
            .dice-wrapper .front { transform: translateZ(25px); }
            .dice-wrapper .back { transform: rotateY(180deg) translateZ(25px); }
            .dice-wrapper .right { transform: rotateY(90deg) translateZ(25px); }
            .dice-wrapper .left { transform: rotateY(-90deg) translateZ(25px); }
            .dice-wrapper .top { transform: rotateX(90deg) translateZ(25px); }
            .dice-wrapper .bottom { transform: rotateX(-90deg) translateZ(25px); }
            .qr-img { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
    // ==================== 全局用户系统 ====================
    const USERS_KEY = 'double_games_final';
    let usersData = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
    let currentUser = null;

    function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersData)); }
    function getUserBalance() { return currentUser ? (usersData[currentUser.phone]?.balance || 1000) : 0; }
    function setUserBalance(amt) { if(currentUser) { usersData[currentUser.phone].balance = Math.max(0, amt); saveUsers(); } }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#000000cc;backdrop-filter:blur(10px);color:#ffaa44;padding:8px 16px;border-radius:40px;font-size:0.7rem;z-index:2001;border:1px solid #ffaa44;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    function showService() { showToast("📞 客服热线: 400-888-XXXX"); }

    // ==================== 充值二维码（两个同时显示） ====================
    const ALIPAY_QR = "alipay.jpg";
    const WECHAT_QR = "wechat.jpg";

    function showRechargeModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3 style="color: #ffdd99; margin-bottom: 15px;">💎 充值</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-bottom: 20px;">
                    <div style="text-align: center; flex: 1; min-width: 150px;">
                        <div style="background: #1677FF; color: white; padding: 5px 10px; border-radius: 30px; display: inline-block; margin-bottom: 10px;">支付宝</div>
                        <img src="${ALIPAY_QR}" class="qr-img" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=请将图片放在同目录下'">
                    </div>
                    <div style="text-align: center; flex: 1; min-width: 150px;">
                        <div style="background: #2DC100; color: white; padding: 5px 10px; border-radius: 30px; display: inline-block; margin-bottom: 10px;">微信支付</div>
                        <img src="${WECHAT_QR}" class="qr-img" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=请将图片放在同目录下'">
                    </div>
                </div>
                <div style="font-size: 0.75rem; color: #ffaa66; margin: 15px 0;">
                    <p>💰 充值比例 1元 = 1000 文</p>
                    <p>📝 扫码支付后，联系客服上分</p>
                    <p>💡 客服微信: game_kf_888</p>
                </div>
                <button id="copyAccountBtn" style="width:100%; background: #c47c3a; border: none; padding: 8px; border-radius: 40px; color: #2f1b0a; font-weight: bold; cursor: pointer; margin-bottom: 10px;">📋 复制客服微信</button>
                <button id="closeRechargeModal" style="width:100%; background: #734c2e; border: none; padding: 8px; border-radius: 40px; color: #ffe3b3; font-weight: bold; cursor: pointer;">关闭</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('#copyAccountBtn').onclick = () => { navigator.clipboard.writeText("game_kf_888").then(() => showToast("✅ 客服微信号已复制")); };
        modal.querySelector('#closeRechargeModal').onclick = () => modal.remove();
    }

    function recharge() { showRechargeModal(); }
    function withdraw() { showToast("💰 提现请联系客服处理"); }   
    
    
    
        // ==================== 游戏一：潮汕葫芦鱼（完整版：抢庄+多房间+亏损保护+50条记录） ====================
    let fishDestroy = null;
    function initFishGame(container) {
        if (fishDestroy) fishDestroy();
        container.innerHTML = '';
        const fishHTML = `
            <div class="fish-wrapper">
                <div class="stats-panel" style="display:flex; justify-content:space-between; gap:6px; padding:8px 12px; background:#1f1711; border-bottom:1px solid #644a33;">
                    <div class="stat-card" style="background:#1a130d; border-radius:30px; padding:4px 8px; flex:1; text-align:center;"><div class="stat-label" style="font-size:0.55rem; color:#e2bc89;">💰 庄家余额</div><div class="stat-value" id="fishBalanceValue" style="font-size:1rem; font-weight:800; color:#f9d792;">∞</div></div>
                    <div class="stat-card" style="background:#1a130d; border-radius:30px; padding:4px 8px; flex:1; text-align:center;"><div class="stat-label" style="font-size:0.55rem; color:#e2bc89;">🎲 总押注</div><div class="stat-value" id="totalBetValue">0</div></div>
                    <div class="stat-card" style="background:#1a130d; border-radius:30px; padding:4px 8px; flex:1; text-align:center;"><div class="stat-label" style="font-size:0.55rem; color:#e2bc89;">🏆 上局净利</div><div class="stat-value" id="lastWinValue">0</div></div>
                </div>
                <div class="grab-bar"><button id="grabBtn" class="grab-btn">🎲 抢庄 (需2001文)</button></div>
                <div class="room-selector" style="display:flex; justify-content:center; margin:8px 12px;"><label style="color:#ffdd99; margin-right:8px;">🏠 房间：</label><select id="roomSelect" style="background:#2a1f16; color:#ffdd99; border:1px solid #ffaa44; border-radius:20px; padding:4px 8px;"><option value="room1">初级房</option><option value="room2">中级房</option><option value="room3">高级房</option></select></div>
                <div class="dice-area" style="background:#2a211a; margin:12px 12px 8px; border-radius:50px; padding:12px; text-align:center; box-shadow:inset 0 0 0 2px #5e4230, 0 6px 12px black; position:relative;">
                    <div class="dice-title" style="font-size:0.65rem; color:#f5c28e; margin-bottom:6px;">⚡ 三骰开彩 · 鱼虾蟹葫芦金钱鸡 ⚡</div>
                    <div class="dice-box" style="display:flex; justify-content:center; gap:12px; position:relative;">
                        <div class="dice" style="background:#fff2df; width:70px; height:70px; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:2.8rem; box-shadow:0 5px 0 #926b42;">🎲</div>
                        <div class="dice" style="background:#fff2df; width:70px; height:70px; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:2.8rem; box-shadow:0 5px 0 #926b42;">🎲</div>
                        <div class="dice" style="background:#fff2df; width:70px; height:70px; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:2.8rem; box-shadow:0 5px 0 #926b42;">🎲</div>
                    </div>
                    <div id="fishDiceCover" style="position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at 30% 30%, rgba(0,0,0,0.9), #2c1e14); backdrop-filter:blur(6px); border-radius:50px; display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:15; transition:all 0.5s; border:2px solid #cb9e6b;">
                        <span style="font-size:3rem;">🏺</span><div class="cover-text" style="font-size:0.65rem; background:#00000099; padding:2px 12px; border-radius:30px; margin-top:6px;">骰盅未开</div>
                    </div>
                </div>
                <div class="chip-bar" style="background:#2a1f16; margin:6px 12px 10px; padding:6px 8px; border-radius:40px; display:flex; justify-content:center; gap:8px; flex-wrap:wrap;">
                    <div class="chip" data-chip="20">20</div><div class="chip" data-chip="50">50</div><div class="chip" data-chip="100" class="selected">100</div>
                    <div class="chip" data-chip="500">500</div><div class="chip" data-chip="1000" id="adminTriggerChip">1k</div>
                </div>
                <div class="action-bar">
                    <button id="fishRollBtn" style="background:#c47c3a; border:none; padding:5px 14px; border-radius:35px; color:#2f1b0a; box-shadow:0 3px 0 #764e26;">🎲 开骰！</button>
                    <button id="fishResetBetBtn" style="background:#734c2e; border:none; padding:5px 14px; border-radius:35px; color:#ffe3b3;">🧹 清空下注</button>
                    <button id="fishResetGameBtn" style="background:#734c2e; border:none; padding:5px 14px; border-radius:35px; color:#ffe3b3;">💺 重置庄家</button>
                </div>
                <div class="bet-sections" style="padding:0 12px 8px;">
                    <div class="section-title" style="font-size:0.7rem; color:#ffd49f; margin:8px 0 6px 4px; border-left:3px solid #f7b05e; padding-left:8px;">🐟 六门押注 (按次数赔)</div>
                    <div class="bet-grid" id="patternGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px;"></div>
                    <div class="section-title" style="font-size:0.7rem; color:#ffd49f; margin:8px 0 6px 4px; border-left:3px solid #f7b05e; padding-left:8px;">🎯 特殊投注</div>
                    <div class="special-grid" id="specialGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px;"></div>
                </div>
                <div class="message-area" id="fishMsgArea" style="background:#1c140e; margin:0 12px 12px; border-radius:35px; padding:6px 10px; font-size:0.65rem; color:#dbbc8c; text-align:center; min-height:48px;">自动开奖倒计时 <span id="countdownFish">25</span> 秒</div>
                <div class="online-count-box"><div>🎮 大厅在线人数 <span id="onlineCount" class="online-number">0</span></div><button id="showRulesBtn" style="background:#ffaa44; border:none; border-radius:30px; padding:4px 12px; color:#2f1b0a;">📋 赔付规则</button></div>
                <div style="margin-top:8px;"><button id="showFishRecordBtn" style="background:#2a1f16; border:1px solid #ffaa44; border-radius:40px; padding:8px; width:100%; color:#ffdd99;">📜 开奖记录查询</button></div>
            </div>
        `;
        container.innerHTML = fishHTML;

        // 游戏逻辑变量
        let patternBets = { fish:0, shrimp:0, crab:0, calabash:0, coin:0, chicken:0 };
        let specialBets = { big:0, small:0, odd:0, even:0, allTriplets:0, doubleBet:0 };
        let currentChip = 100;
        let lastWinAmount = 0;
        let isRolling = false;
        let hasGrabbed = false;
        let playerBankerBalance = 0;
        let currentRoom = "room1";
        let countdownInterval = null;
        let gameRecords = JSON.parse(localStorage.getItem('fish_records')) || [];
        
        function getBankerKey() { return `fish_banker_balance_${currentRoom}`; }
        function getPlayerBankerKey() { return `player_banker_balance_${currentRoom}`; }
        let fishBalance = parseInt(localStorage.getItem(getBankerKey())) || 10000;
        let savedPlayerBalance = parseInt(localStorage.getItem(getPlayerBankerKey())) || 0;
        if (savedPlayerBalance > 0) { hasGrabbed = true; playerBankerBalance = savedPlayerBalance; }

        const MAX_SINGLE_BET = 500;

            let boost = 0;
            if (recentLoss < -200) boost += 0.05;
            if (recentLoss < -500) boost += 0.05;
            if (recentLoss < -1000) boost += 0.10;
            if (recentLoss < -2000) boost += 0.15;
            if (lossStreak >= 5) boost += 0.10;
            if (lossStreak >= 10) boost += 0.20;
            let forcedWin = false;
            if (recentLoss < -3000 && !localStorage.getItem('forcedWinGiven')) { forcedWin = true; localStorage.setItem('forcedWinGiven', 'true'); showFishMsg("幸运女神降临！您获得一次特别好运！"); }

            if (originalWin) { if (hasGrabbed) return true; let finalProb = Math.min(0.95, baseWinProb + boost); return Math.random() < finalProb; }

            let bigWin=false,smallWin=false,oddWin=false,evenWin=false,allTripletWin=false,doubleWin=false;

                if(sum>=4&&sum<=10) smallWin=true;
                if(sum%2===1) oddWin=true;
                if(sum%2===0) evenWin=true;
            }
            if(isTriplet) allTripletWin=true;
            if(diceNames.includes("鱼")&&diceNames.includes("虾")) doubleWin=true;
            if(specialBets.big>0&&bigWin) winAmount+=specialBets.big*2;
            if(specialBets.small>0&&smallWin) winAmount+=specialBets.small*2;
            if(specialBets.odd>0&&oddWin) winAmount+=specialBets.odd*2;

        function getPointValue(pname) { const m={"鱼":1,"虾":2,"蟹":3,"葫芦":4,"金钱":5,"鸡":6}; return m[pname]||0; }
        async function settleGame(diceNames) {
            let points=diceNames.map(n=>getPointValue(n)), sum=points.reduce((a,b)=>a+b,0);
            let isTriplet=diceNames[0]===diceNames[1]&&diceNames[1]===diceNames[2];
            let totalBet=getTotalBet();
            if(totalBet===0) return false;
            let userBal=getUserBalance();

            let winAmount=0, winDetails=[];
            for(let [pid,betVal] of Object.entries(patternBets)){

                let originalWin=occur>0;
                let finalWin=shouldWinPattern(originalWin);
                if(finalWin){ let prize=betVal*(occur+1); winAmount+=prize; winDetails.push(`${patternIdMap[pid]} x${occur}`); }
            }
            let bigWin=false,smallWin=false,oddWin=false,evenWin=false,allTripletWin=false,doubleWin=false;

                if(sum%2===1) oddWin=true;
                if(sum%2===0) evenWin=true;
            }
            if(isTriplet) allTripletWin=true;
            if(diceNames.includes("鱼")&&diceNames.includes("虾")) doubleWin=true;

            if(specialBets.small>0&&smallWin) winAmount+=specialBets.small*2;
            if(specialBets.odd>0&&oddWin) winAmount+=specialBets.odd*2;

        function getResultInfo(d1,d2,d3){ let total=d1+d2+d3,types=[]; if(total>=11&&total<=17) types.push('BIG'); if(total>=4&&total<=10) types.push('SMALL'); if(total%2===1) types.push('ODD'); if(total%2===0) types.push('EVEN'); if(d1===d2&&d2===d3){types.push('TRIPLE_'+d1);types.push('ALL_TRIPLE');} return {total,types}; }

        }

        document.querySelectorAll('.game-tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchGame(btn.dataset.game);
            };
        });
        switchGame('fish');
    }

    renderAuthUI();
</script>
</body>
</html>
