<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>金辉娱乐城 · 旗舰版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none}
        body{background:radial-gradient(circle at 30% 10%,#0a0c1a,#020308);font-family:'Segoe UI','Poppins',system-ui;padding:12px;min-height:100vh;color:#ffecb3;transition:background 0.2s}
        #app{max-width:560px;margin:0 auto;background:rgba(15,20,35,0.65);backdrop-filter:blur(16px);border-radius:48px;border:1px solid rgba(255,200,80,0.4);overflow:hidden}
        .auth-panel{padding:28px 20px;background:rgba(0,0,0,0.6);border-radius:40px;margin:20px}
        .auth-panel h2,.auth-panel h3{text-align:center;margin-bottom:16px;background:linear-gradient(135deg,#ffd966,#ffaa33);-webkit-background-clip:text;background-clip:text;color:transparent}
        .auth-input{width:100%;padding:12px;margin:6px 0;background:rgba(0,0,0,0.6);border:1px solid #ffaa33;border-radius:40px;color:#ffd966;outline:none}
        .flex-row{display:flex;gap:10px;align-items:center;margin:10px 0}
        .code-btn,.auth-btn{background:linear-gradient(135deg,#ffaa33,#ff884d);border:none;border-radius:40px;padding:12px;font-weight:bold;color:#2a1a0a;cursor:pointer;width:100%}
        .code-btn{width:auto;padding:10px 18px}
        hr{margin:20px 0;border-color:#ffaa33}
        .auth-note{font-size:0.65rem;text-align:center;margin-top:12px;color:#ffaa33}
        .user-section{background:rgba(0,0,0,0.5);padding:12px 16px;border-bottom:1px solid #ffaa33}
        .user-info-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
        #userBalanceDisplay{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#ffd966,#ffaa33);-webkit-background-clip:text;background-clip:text;color:transparent;cursor:pointer}
        .btn-group{display:flex;gap:6px}
        .btn-sm{background:rgba(255,170,51,0.2);border:1px solid #ffaa33;padding:4px 12px;border-radius:40px;cursor:pointer}
        .charge-btn,.withdraw-btn{background:linear-gradient(135deg,#ffaa33,#ff884d);padding:6px 16px;border-radius:40px;color:#2a1a0a;font-weight:700;cursor:pointer;border:none}
        .lang-switch,.theme-switch{background:#ffaa33;border:none;border-radius:30px;padding:4px 10px;cursor:pointer;font-weight:bold;margin-left:4px}
        .game-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:20px}
        .game-card-item{background:rgba(0,0,0,0.5);border-radius:32px;padding:16px;text-align:center;cursor:pointer;border:1px solid #ffaa33}
        .game-card-item:hover{transform:scale(1.02);background:rgba(255,170,51,0.2)}
        .game-name{font-weight:bold}
        .game-desc{font-size:0.7rem;color:#ffd966}
        .game-card{background:rgba(0,0,0,0.4);border-radius:32px;padding:16px;border:1px solid rgba(255,200,80,0.4)}
        .chip{background:linear-gradient(145deg,#cc8800,#aa6600);display:inline-block;padding:6px 12px;border-radius:36px;margin:3px;cursor:pointer;font-weight:bold;border:1px solid #ffaa33}
        .chip.selected{background:#ffaa33;color:#2a1a0a;box-shadow:0 0 8px #ffaa33}
        .exec-btn{background:linear-gradient(135deg,#ffaa33,#ff884d);border:none;border-radius:36px;padding:8px 14px;color:#2a1a0a;font-weight:bold;cursor:pointer;margin:3px}
        .countdown-area{text-align:center;margin:6px 0 12px;background:rgba(0,0,0,0.6);border-radius:40px;padding:6px 12px;font-weight:bold;border:1px solid #ffaa33}
        /* 骰子尺寸 70px (手机55px) 精确校准旋转轴心 */
        .fish-dice-cube, .dice-cube {
            width: 70px;
            height: 70px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;
        }
        .fish-dice-face, .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #2a1e12;
            border: 2px solid #ffaa33;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: visible;
            font-size: 2rem;
            transform: translateZ(35px);
        }
        /* ----- 葫芦鱼专用区域：增大间距，提升骰子平稳落地感 ----- */
        .fish-dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 40px;          /* 桌面端加大间距，避免拥挤 */
            margin: 20px 0;
            perspective: 800px;  /* 增强透视，每个骰子更独立 */
        }
        .fish-dice-cube {
            margin: 0 6px;
        }
        .fish-front, .fish-back, .fish-right, .fish-left, .fish-top, .fish-bottom,
        .front, .back, .right, .left, .top, .bottom {
            transform: translateZ(35px);
        }
        @media (max-width:480px){
            .fish-dice-cube, .dice-cube {
                width: 55px;
                height: 55px;
            }
            .fish-dice-face, .dice-face {
                transform: translateZ(27.5px);
            }
            .fish-front, .fish-back, .fish-right, .fish-left, .fish-top, .fish-bottom,
            .front, .back, .right, .left, .top, .bottom {
                transform: translateZ(27.5px);
            }
            .fish-dice-3d-area {
                gap: 28px;          /* 手机端间距足够防止挤压 */
                perspective: 650px;
            }
            .fish-dice-cube {
                margin: 0 4px;
            }
            .dice-3d-area {
                perspective: 550px;
            }
        }
        .dice-3d-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            perspective: 700px;
        }
        .pip{width:10px;height:10px;background:#ffaa33;border-radius:50%;margin:2px;position:absolute}
        .pip-l1,.pip-l2,.pip-l3{left:12px}
        .pip-r1,.pip-r2,.pip-r3{right:12px}
        .pip-l1,.pip-r1{top:12px}
        .pip-l2,.pip-r2{top:50%;transform:translateY(-50%)}
        .pip-l3,.pip-r3{bottom:12px}
        .pip-center{top:50%;left:50%;transform:translate(-50%,-50%)}
        .pip-tl{top:8px;left:8px}.pip-tr{top:8px;right:8px}.pip-bl{bottom:8px;left:8px}.pip-br{bottom:8px;right:8px}
        .fish-pattern-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
        .fish-bet-card,.bet-card{background:rgba(0,0,0,0.5);border-radius:20px;padding:8px 4px;text-align:center;border:1px solid #ffaa33;cursor:pointer}
        .points-grid,.trio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px;margin:10px 0}
        .history-cell{width:32px;height:32px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;background:rgba(255,170,51,0.2);margin:2px}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000}
        .modal-content{background:#2a1e12;border-radius:36px;padding:20px;color:#ffd966;border:1px solid #ffaa33}
        .toast-message{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2a1a0a;padding:6px 16px;border-radius:40px;z-index:2000;white-space:nowrap;border:1px solid #ffaa33}
        .floating-number{position:fixed;font-size:1.4rem;font-weight:bold;color:#ffcc00;text-shadow:0 0 6px red;pointer-events:none;z-index:3000;animation:floatUp 0.9s forwards}
        @keyframes floatUp{0%{opacity:1;transform:translateY(0px) scale(0.8)}70%{opacity:1;transform:translateY(-40px) scale(1.2)}100%{opacity:0;transform:translateY(-80px) scale(0.9)}}
        .win-flash{animation:redFlash 0.6s 3 !important;background-color:#ff3300 !important;box-shadow:0 0 20px #ffaa33 !important}
        @keyframes redFlash{0%{background-color:rgba(255,50,50,0)}50%{background-color:#ff3300;transform:scale(1.02)}100%{background-color:rgba(255,50,50,0)}}
        .number-flash{animation:numberBlink 0.4s 3;display:inline-block}
        @keyframes numberBlink{0%{color:#ffd966;transform:scale(1)}50%{color:#ff3300;transform:scale(1.3)}100%{color:#ffd966;transform:scale(1)}}
        .balance-bling{animation:balanceGlow 0.4s 3}
        @keyframes balanceGlow{0%{text-shadow:0 0 0}50%{text-shadow:0 0 12px #ff5500}}
        .dt-card {
            background: linear-gradient(145deg, #fff8f0, #f0e6d8);
            width: 75px;
            height: 100px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.6);
            border: 1px solid rgba(0,0,0,0.2);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-style: preserve-3d;
            cursor: pointer;
            margin: 0 auto;
        }
        .dt-card.flipped {
            transform: rotateY(180deg);
        }
        .dt-card[data-suit="♥"], .dt-card[data-suit="♦"] {
            color: #c33;
        }
        .dt-card[data-suit="♣"], .dt-card[data-suit="♠"] {
            color: #333;
        }
        .simple-card {
            background: linear-gradient(145deg, #fff8f0, #f0e6d8);
            width: 60px;
            height: 85px;
            border-radius: 10px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #333;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.6);
            margin: 2px;
        }
        .simple-card[data-suit="♥"], .simple-card[data-suit="♦"] {
            color: #c33;
        }
        .simple-card[data-suit="♣"], .simple-card[data-suit="♠"] {
            color: #333;
        }
        .niu-hand {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            min-height: 95px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin: 8px 0;
        }
        .fish-bet-card span,.bet-card span,#fishDoubleGrid .bet-card div,
        .game-card #fishTotalBet,.game-card #fishMyBalance,.game-card #fishLastWin,
        .game-card #totalBetDice,.game-card #diceBankerDisplay,.game-card #diceProfitLoss,.game-card #rollingWinNumber,
        .game-card #niuTotalBet,.game-card #niuBalance,.game-card #niuWinAmount,.game-card #niuProfitLoss {
            color: #ff3300 !important;
            font-weight: bold !important;
        }
        .admin-btn{background:#ffaa33;border:none;border-radius:20px;padding:4px 8px;margin:2px;color:#2a1a0a;cursor:pointer}
        #niuResult3D{width:120px;height:50px;background:#2a1e12;border:1px solid #ffaa33;border-radius:20px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:1.2rem;visibility:hidden;margin:10px auto}
        body.light-mode {
            background: radial-gradient(circle at 30% 10%, #f5f0e6, #e8dfd0);
            color: #3a2a1a;
        }
        body.light-mode #app {
            background: rgba(245,240,230,0.85);
            border-color: rgba(180,130,60,0.5);
        }
        body.light-mode .auth-panel, body.light-mode .user-section,
        body.light-mode .game-card, body.light-mode .modal-content {
            background: rgba(250,245,235,0.9);
            border-color: #b8860b;
            color: #3a2a1a;
        }
        body.light-mode .auth-input, body.light-mode .fish-bet-card,
        body.light-mode .bet-card, body.light-mode .chip,
        body.light-mode .quick-bet, body.light-mode .exec-btn,
        body.light-mode .countdown-area {
            background: rgba(255,250,240,0.8);
            border-color: #c99a3b;
            color: #4a3a2a;
        }
        body.light-mode .chip.selected {
            background: linear-gradient(145deg, #ffcc77, #e6a822);
            color: #2a1a0a;
        }
        body.light-mode .fish-dice-face, body.light-mode .dice-face,
        body.light-mode .simple-card, body.light-mode .dt-card {
            background: #fffaf0;
            border-color: #c99a3b;
            color: #4a3a2a;
        }
        body.light-mode .toast-message {
            background: #fff9ef;
            color: #b8860b;
            border-color: #b8860b;
        }
        body.light-mode .result-popup {
            background: linear-gradient(135deg, #ffcc77, #e6a822);
            color: #2a1a0a;
        }
        body.light-mode .admin-table th, body.light-mode .admin-table td {
            border-bottom-color: #dbb45c;
        }
        body.light-mode .admin-btn {
            background: #e6a822;
            color: #2a1a0a;
        }
        body.light-mode .lang-switch, body.light-mode .theme-switch {
            background: #e6a822;
            color: #2a1a0a;
        }
        body.light-mode .charge-btn, body.light-mode .withdraw-btn {
            background: linear-gradient(135deg, #e6a822, #c9881c);
            color: #2a1a0a;
        }
        body.light-mode #userBalanceDisplay {
            background: linear-gradient(135deg, #c9881c, #a56b0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ==================== 全局存储 ====================
    const STORAGE={users:'jh_final',recharge:'jh_recharge',withdraw:'jh_withdraw',config:'jh_config'};
    let systemConfig={bankerBalance:200000,adjustFactor:0.98};
    function loadConfig(){let s=localStorage.getItem(STORAGE.config);if(s)systemConfig=JSON.parse(s);else localStorage.setItem(STORAGE.config,JSON.stringify(systemConfig));}
    function saveConfig(){localStorage.setItem(STORAGE.config,JSON.stringify(systemConfig));}
    function loadUsers(){let u=localStorage.getItem(STORAGE.users);if(!u){let init=[{account:"admin",password:"admin888",balance:5000,records:[]}];localStorage.setItem(STORAGE.users,JSON.stringify(init));return init;}return JSON.parse(u);}
    function saveUsers(users){localStorage.setItem(STORAGE.users,JSON.stringify(users));}
    let currentUser=null;

    function updateBalance(acc,newBal){let users=loadUsers();let idx=users.findIndex(u=>u.account===acc);if(idx!==-1){users[idx].balance=newBal;saveUsers(users);if(currentUser&&currentUser.account===acc)currentUser.balance=newBal;let span=document.getElementById("userBalanceDisplay");if(span)span.innerText=newBal.toFixed(2);}}
    function showToast(msg,isErr=false){let t=document.createElement('div');t.className='toast-message';t.innerText=msg;t.style.borderLeftColor=isErr?'#ff6b6b':'#ffaa33';document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
    async function gameSettle(totalBet,winAmount){if(!currentUser)return false;if(currentUser.balance<totalBet){showToast("余额不足",true);return false;}let bankerDelta=totalBet-winAmount;let newBanker=systemConfig.bankerBalance+bankerDelta;if(newBanker<0){showToast("平台资金池临时短缺",true);return false;}systemConfig.bankerBalance=newBanker;saveConfig();let newBal=currentUser.balance-totalBet+winAmount;updateBalance(currentUser.account,newBal);let balSpan=document.getElementById("userBalanceDisplay");if(balSpan){balSpan.classList.remove('balance-bling');setTimeout(()=>balSpan.classList.add('balance-bling'),10);setTimeout(()=>balSpan.classList.remove('balance-bling'),600);}return true;}
    function flashWinElement(el,winAmount){if(!el)return;el.classList.remove('win-flash');void el.offsetWidth;el.classList.add('win-flash');setTimeout(()=>el.classList.remove('win-flash'),600);let span=el.querySelector('span');if(span){span.classList.remove('number-flash');void span.offsetWidth;span.classList.add('number-flash');setTimeout(()=>span.classList.remove('number-flash'),500);}let rect=el.getBoundingClientRect();let div=document.createElement('div');div.className='floating-number';div.innerText=`+${winAmount.toFixed(2)}`;div.style.left=(rect.left+rect.width/2-30)+'px';div.style.top=(rect.top-10)+'px';document.body.appendChild(div);setTimeout(()=>div.remove(),900);}
    function applyRecharge(){let amt=parseFloat(prompt("充值金额（USDT）:","100"));if(isNaN(amt)||amt<=0)return showToast("金额无效");let orders=JSON.parse(localStorage.getItem(STORAGE.recharge)||'[]');orders.push({id:Date.now(),account:currentUser.account,amount:amt,status:'pending',time:new Date().toLocaleString()});localStorage.setItem(STORAGE.recharge,JSON.stringify(orders));showToast(`充值申请已提交`);}
    function applyWithdraw(){let amt=parseFloat(prompt("提现金额（USDT）:","10"));if(isNaN(amt)||amt<=0)return showToast("金额无效");if(currentUser.balance<amt)return showToast("余额不足",true);let addr=prompt("USDT收款地址");if(!addr)return;let orders=JSON.parse(localStorage.getItem(STORAGE.withdraw)||'[]');orders.push({id:Date.now(),account:currentUser.account,amount:amt,address:addr,status:'pending',time:new Date().toLocaleString()});localStorage.setItem(STORAGE.withdraw,JSON.stringify(orders));showToast(`提现申请已提交`);}
    function showServiceModal(){alert("客服微信: jinhui_cs_888");}
    function openAdminModal(){let pwd=prompt("管理员密码:");if(pwd!=="admin888"){showToast("密码错误",true);return;}let users=loadUsers();let rechargeOrders=JSON.parse(localStorage.getItem(STORAGE.recharge)||'[]');let withdrawOrders=JSON.parse(localStorage.getItem(STORAGE.withdraw)||'[]');let pendingRecharges=rechargeOrders.filter(o=>o.status==='pending');let pendingWithdraws=withdrawOrders.filter(o=>o.status==='pending');let modalDiv=document.createElement('div');modalDiv.className='modal';modalDiv.innerHTML=`<div class="modal-content" style="max-width:680px;"><h3>管理员后台</h3><div>🏦 庄家资金池: ${systemConfig.bankerBalance.toFixed(2)} USDT <button id="addBankerBtn" class="admin-btn">➕注入</button> 赔付系数: <input id="factorInput" type="number" step="0.01" value="${systemConfig.adjustFactor}" style="width:80px;"> <button id="saveFactorBtn" class="admin-btn">保存</button></div><hr><div><strong>充值审核</strong><div id="rechargeList"></div></div><div><strong>提现审核</strong><div id="withdrawList"></div></div><div><strong>用户管理</strong><select id="userSelect">${users.map(u=>`<option value="${u.account}">${u.account} (余额 ${u.balance.toFixed(2)})</option>`).join('')}</select><input id="amountInput" placeholder="金额" type="number"><button id="addBalanceBtn" class="admin-btn">上分</button><button id="subBalanceBtn" class="admin-btn">下分</button></div><button id="closeAdminBtn" class="auth-btn">关闭</button></div>`;document.body.appendChild(modalDiv);
    function refreshRecharge(){let container=modalDiv.querySelector('#rechargeList');if(pendingRecharges.length===0){container.innerHTML='<div>无待审核充值</div>';return;}container.innerHTML=pendingRecharges.map(o=>`<div>${o.account} 充值 ${o.amount} USDT <button class="admin-btn approveRecharge" data-id="${o.id}">✅确认</button> <button class="admin-btn rejectRecharge" data-id="${o.id}">❌拒绝</button></div>`).join('');document.querySelectorAll('.approveRecharge').forEach(btn=>{btn.onclick=()=>{let id=parseInt(btn.dataset.id);let order=rechargeOrders.find(o=>o.id===id);if(order&&order.status==='pending'){let user=users.find(u=>u.account===order.account);if(user){user.balance+=order.amount;saveUsers(users);order.status='approved';localStorage.setItem(STORAGE.recharge,JSON.stringify(rechargeOrders));showToast(`已充值 ${order.amount} USDT`);modalDiv.remove();openAdminModal();}}}});document.querySelectorAll('.rejectRecharge').forEach(btn=>{btn.onclick=()=>{let id=parseInt(btn.dataset.id);let order=rechargeOrders.find(o=>o.id===id);if(order){order.status='rejected';localStorage.setItem(STORAGE.recharge,JSON.stringify(rechargeOrders));showToast(`已拒绝`);modalDiv.remove();openAdminModal();}}});}
    function refreshWithdraw(){let container=modalDiv.querySelector('#withdrawList');if(pendingWithdraws.length===0){container.innerHTML='<div>无待处理提现</div>';return;}container.innerHTML=pendingWithdraws.map(o=>`<div>${o.account} 提现 ${o.amount} USDT <button class="admin-btn approveWithdraw" data-id="${o.id}">✅已打款</button> <button class="admin-btn rejectWithdraw" data-id="${o.id}">❌拒绝</button></div>`).join('');document.querySelectorAll('.approveWithdraw').forEach(btn=>{btn.onclick=()=>{let id=parseInt(btn.dataset.id);let order=withdrawOrders.find(o=>o.id===id);if(order&&order.status==='pending'){let user=users.find(u=>u.account===order.account);if(user&&user.balance>=order.amount){user.balance-=order.amount;saveUsers(users);order.status='approved';localStorage.setItem(STORAGE.withdraw,JSON.stringify(withdrawOrders));showToast(`已处理提现 ${order.amount} USDT`);modalDiv.remove();openAdminModal();}else showToast("用户余额不足",true);}}});document.querySelectorAll('.rejectWithdraw').forEach(btn=>{btn.onclick=()=>{let id=parseInt(btn.dataset.id);let order=withdrawOrders.find(o=>o.id===id);if(order){order.status='rejected';localStorage.setItem(STORAGE.withdraw,JSON.stringify(withdrawOrders));showToast(`已拒绝`);modalDiv.remove();openAdminModal();}}});}
    refreshRecharge();refreshWithdraw();
    modalDiv.querySelector('#addBankerBtn').onclick=()=>{let amt=parseFloat(prompt("注入金额:"));if(!isNaN(amt)&&amt>0){systemConfig.bankerBalance+=amt;saveConfig();showToast(`庄家池 +${amt}`);modalDiv.remove();openAdminModal();}};
    modalDiv.querySelector('#saveFactorBtn').onclick=()=>{let val=parseFloat(modalDiv.querySelector('#factorInput').value);if(!isNaN(val)&&val>=0.5&&val<=1.5){systemConfig.adjustFactor=val;saveConfig();showToast(`系数已设为 ${val}`);modalDiv.remove();openAdminModal();}else showToast("系数范围0.5~1.5",true);};

            let bScore=bankerType.multiplier===0?0:(bankerType.multiplier===1?1:bankerType.multiplier);
            if(pScore>bScore) result='PLAYER';
            else if(bScore>pScore) result='BANKER';
            else result='TIE';
            let winTypes=[];
            if(result==='PLAYER'&&bets.PLAYER>0){ winAmount+=bets.PLAYER*2; winTypes.push('PLAYER'); }
            if(result==='BANKER'&&bets.BANKER>0){ winAmount+=bets.BANKER*2; winTypes.push('BANKER'); }
            if(result==='TIE'&&bets.TIE>0){ winAmount+=bets.TIE*8; winTypes.push('TIE'); }
            if(playerType.type==='牛牛'&&bets.NIU_NIU>0){ winAmount+=bets.NIU_NIU*(playerType.multiplier+1); winTypes.push('NIU_NIU'); }
            if(playerType.type==='五花牛'&&bets.WU_HUA>0){ winAmount+=bets.WU_HUA*(playerType.multiplier+1); winTypes.push('WU_HUA'); }
            winAmount *= systemConfig.adjustFactor;
            let profit=winAmount-totalBet;
            await gameSettle(totalBet, winAmount);
            document.getElementById('niuWinAmount').innerText=winAmount.toFixed(2);
            document.getElementById('niuProfitLoss').innerText=profit.toFixed(2);
            let resultText = '';
            if(result==='PLAYER') resultText='闲家赢';
            else if(result==='BANKER') resultText='庄家赢';
            else resultText='和局';
            document.getElementById('niuResultMsg').innerHTML=`${playerType.display} vs ${bankerType.display}<br>${resultText} ${profit>0?` 赢得 ${profit.toFixed(2)}`:''}`;
            let resultDiv = document.getElementById('niuResult3D');
            resultDiv.style.visibility = 'visible';
            resultDiv.style.backgroundColor = '#ffaa33';
            resultDiv.style.color = '#2a1a0a';
            resultDiv.style.textShadow = '0 0 5px #fff';
            resultDiv.innerText = resultText;
            setTimeout(() => { resultDiv.style.visibility = 'hidden'; }, 3000);
            for(let wt of winTypes){
                let el = document.querySelector(`.bet-card[data-bet="${wt}"]`);
                if(el) flashWinElement(el, winAmount);
            }
            for(let k in bets) bets[k]=0;
            updateUI(); saveLastBet();
            isRolling=false;
            startCountdown(25);
        }
        function startCountdown(sec){
            if(countdownTimer) clearInterval(countdownTimer);
            remainingSec=sec;
            let cd=document.getElementById('niuCountdownNum');
            cd.innerText=remainingSec;
            countdownTimer=setInterval(()=>{
                if(remainingSec<=1){
                    clearInterval(countdownTimer);
                    countdownTimer=null;
                    if(!isRolling) startGame();
                }else{
                    remainingSec--;
                    cd.innerText=remainingSec;
                }
            },1000);
        }
        async function refreshBalance(){ await updateUI(); showToast("刷新"); }
        document.querySelectorAll('#niuChips .chip').forEach(c=>{
            c.onclick=function(){
                selectedChip=parseInt(this.dataset.chip);
                document.querySelectorAll('#niuChips .chip').forEach(cc=>cc.classList.remove('selected'));
                this.classList.add('selected');
            };
        });
        document.querySelectorAll('.bet-card[data-bet]').forEach(c=>{
            c.onclick=()=>addBet(c.dataset.bet);
        });
        document.getElementById('niuClearBtn').onclick=clearAllBets;
        document.getElementById('niuRepeatBtn').onclick=repeatLastBet;
        document.getElementById('niuRefreshBtn').onclick=refreshBalance;
        document.getElementById('niuDealBtn').onclick=()=>{ if(!isRolling) startGame(); };
        updateUI(); startCountdown(25); saveLastBet();
        niuNiuDestroy=()=>{ if(countdownTimer) clearInterval(countdownTimer); container.innerHTML=''; };
        return niuNiuDestroy;
    }

    // ==================== 游戏大厅 & 路由 ====================
    let currentGameDestroy=null;
    async function renderGameLobby(){if(!currentUser){renderAuthUI();return;}document.getElementById('app').innerHTML=`<div style="text-align:center;padding:16px 12px 8px;background:linear-gradient(135deg,#2a1e12,#1a120b);border-bottom:2px solid #ffaa33;"><h1>金辉娱乐城</h1><p>选择游戏</p></div><div class="user-section"><div class="user-info-row"><span>📱${currentUser.account}</span><span>💰余额:<span id="userBalanceDisplay" style="cursor:pointer;">${currentUser.balance.toFixed(2)}</span></span><div class="btn-group"><button id="serviceBtn" class="btn-sm">📞客服</button><button id="logoutBtn" class="btn-sm">🚪退出</button><button id="langSwitchBtn" class="lang-switch">ภาษาไทย</button><button id="themeToggleBtn" class="theme-switch">🌙夜间</button></div></div><div style="margin-top:8px;"><button id="rechargeBtn" class="charge-btn">💎充值</button><button id="withdrawBtn" class="withdraw-btn">💰提现</button></div></div><div class="game-grid"><div class="game-card-item" data-game="fish"><div class="game-name">潮汕葫芦鱼</div><div class="game-desc">3D骰子·葫芦赔率</div></div><div class="game-card-item" data-game="dice"><div class="game-name">3D骰宝</div><div class="game-desc">自动开奖·大小单双</div></div><div class="game-card-item" data-game="dragonTiger"><div class="game-name">龙虎斗</div><div class="game-desc">1.95倍抽水</div></div><div class="game-card-item" data-game="game4"><div class="game-name">百家乐牛牛</div><div class="game-desc">闲庄和·特殊赔率</div></div></div>`;
    document.getElementById('logoutBtn').onclick=()=>{currentUser=null;localStorage.removeItem('curr_acc');renderAuthUI();};

    document.getElementById('rechargeBtn').onclick=applyRecharge;
    document.getElementById('withdrawBtn').onclick=applyWithdraw;
    document.getElementById('langSwitchBtn').onclick=()=>{currentLang=currentLang==='zh'?'th':'zh';renderGameLobby();};
    const themeBtn=document.getElementById('themeToggleBtn');
    const savedTheme=localStorage.getItem('neon_theme');
    if(savedTheme==='light'){document.body.classList.add('light-mode');themeBtn.innerHTML='☀️日间';}else themeBtn.innerHTML='🌙夜间';
    themeBtn.onclick=()=>{document.body.classList.toggle('light-mode');let isLight=document.body.classList.contains('light-mode');localStorage.setItem('neon_theme',isLight?'light':'dark');themeBtn.innerHTML=isLight?'☀️日间':'🌙夜间';};

    let adminClick=0;
    document.getElementById('userBalanceDisplay').addEventListener('click',()=>{adminClick++;setTimeout(()=>{adminClick=0;},1000);if(adminClick>=3){adminClick=0;openAdminModal();}});}
    async function switchToGame(gid){if(currentGameDestroy)currentGameDestroy();document.getElementById('app').innerHTML=`<div style="padding:12px;"><div style="display:flex;justify-content:space-between;margin-bottom:12px;"><button id="backToLobbyBtn" class="exec-btn">🏠返回大厅</button></div><div id="singleGameContainer"></div></div>`;const gc=document.getElementById('singleGameContainer');const inits={fish:initFishGame,dice:initDiceGame,dragonTiger:initDragonTigerGame,game4:initGame4};if(inits[gid])currentGameDestroy=await inits[gid](gc);document.getElementById('backToLobbyBtn').onclick=()=>{if(currentGameDestroy)currentGameDestroy();renderGameLobby();};}
    const lang={zh:{phoneOrEmail:"账号",password:"密码",referralCode:"推荐码",remember:"记住",login:"登录",register:"注册",getCode:"获取验证码",verifyCode:"验证码",registerNow:"注册",referralNote:"推荐码: VIP666,888VIP,GOLD2025,LUCKY8,DICE100"},th:{phoneOrEmail:"บัญชี",password:"รหัส",referralCode:"รหัสแนะนำ",remember:"จำ",login:"เข้าสู่",register:"สมัคร",getCode:"รับรหัส",verifyCode:"รหัส",registerNow:"สมัคร",referralNote:"VIP666,888VIP,GOLD2025,LUCKY8,DICE100"}};

    function renderAuthUI(){const sa=localStorage.getItem('neon_saved_account')||'',sp=localStorage.getItem('neon_saved_password')||'',rc=localStorage.getItem('neon_remember_me')==='true';document.getElementById('app').innerHTML=`<div class="auth-panel"><h2>🏆金辉娱乐城</h2><div><input type="text" id="loginAccount" class="auth-input" placeholder="${t('phoneOrEmail')}" value="${sa}"><input type="password" id="loginPassword" class="auth-input" placeholder="${t('password')}" value="${sp}"><div class="flex-row"><input type="checkbox" id="rememberCheckbox" ${rc?'checked':''}><label>${t('remember')}</label></div><button id="loginBtn" class="auth-btn">${t('login')}</button></div><hr><h3>${t('registerNow')}</h3><input type="text" id="regAccount" class="auth-input" placeholder="${t('phoneOrEmail')}"><div class="flex-row"><input type="text" id="regCode" class="auth-input" placeholder="${t('verifyCode')}"><button id="getCodeBtn" class="code-btn">${t('getCode')}</button></div><input type="password" id="regPassword" class="auth-input" placeholder="${t('password')}"><input type="text" id="regReferral" class="auth-input" placeholder="${t('referralCode')}"><button id="registerBtn" class="auth-btn">${t('register')}</button><div class="auth-note">${t('referralNote')}</div></div>`;
    document.getElementById('loginBtn').onclick=()=>{let a=document.getElementById('loginAccount').value.trim(),p=document.getElementById('loginPassword').value,rem=document.getElementById('rememberCheckbox').checked;let res=login(a,p);if(res.success){if(rem){localStorage.setItem('neon_saved_account',a);localStorage.setItem('neon_saved_password',p);localStorage.setItem('neon_remember_me','true');}else{localStorage.removeItem('neon_saved_account');localStorage.removeItem('neon_saved_password');localStorage.setItem('neon_remember_me','false');}showToast(`欢迎 ${a}`);renderGameLobby();}else showToast(res.msg,true);};

    loadConfig();
    let su=localStorage.getItem('curr_acc');
    if(su){let u=loadUsers().find(u=>u.account===su);if(u){currentUser=u;renderGameLobby();}else renderAuthUI();}else renderAuthUI();
