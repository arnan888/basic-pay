<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D骰子测试</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
            gap: 30px;
        }
        .dice {
            width: 100px;
            height: 100px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            border-radius: 12px;
            box-shadow: 0 8px 12px rgba(0,0,0,0.3);
        }
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            border: 1px solid #ffaa44;
        }
        .front  { transform: translateZ(50px); }
        .back   { transform: rotateY(180deg) translateZ(50px); }
        .right  { transform: rotateY(90deg) translateZ(50px); }
        .left   { transform: rotateY(-90deg) translateZ(50px); }
        .top    { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }
        /* 骰子容器透视 */
        .container {
            perspective: 800px;
        }
        button {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="dice" id="dice">
        <!-- 六个面，请替换为您的真实图片路径 -->
        <div class="dice-face front" style="background-image: url('1776322917299(2).png');"></div>
        <div class="dice-face back" style="background-image: url('1776322917299(6).png');"></div>
        <div class="dice-face right" style="background-image: url('1776322917299(4).png');"></div>
        <div class="dice-face left" style="background-image: url('1776322917299(3).png');"></div>
        <div class="dice-face top" style="background-image: url('1776322917299(1).png');"></div>
        <div class="dice-face bottom" style="background-image: url('1776322917299(3).png');"></div>
    </div>
</div>
<div>
    <button id="rollBtn">随机旋转</button>
</div>
<script>
    const dice = document.getElementById('dice');
    const rollBtn = document.getElementById('rollBtn');
    rollBtn.addEventListener('click', () => {
        const x = Math.floor(Math.random() * 360);
        const y = Math.floor(Math.random() * 360);
        dice.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
    });
    // 初始随机角度
    dice.style.transform = `rotateX(30deg) rotateY(45deg)`;
</script>
</body>
</html>
