<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>金辉注册登录</title>
    <style>
        body { background: #1a120b; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; }
        .box { background: #2a1e12; padding: 30px; border-radius: 30px; width: 300px; border: 1px solid #ffaa33; color: #ffd966; }
        input, button { width: 100%; padding: 8px; margin: 8px 0; border-radius: 20px; border: none; }
        button { background: #ffaa33; cursor: pointer; font-weight: bold; }
        .error { color: #ff6666; }
    </style>
</head>
<body>
<div class="box">
    <h2>金辉娱乐城</h2>
    <div>
        <h3>注册</h3>
        <input type="text" id="regAcc" placeholder="账号">
        <input type="password" id="regPwd" placeholder="密码">
        <input type="text" id="regRef" placeholder="推荐码 (VIP666)">
        <button id="regBtn">注册</button>
    </div>
    <hr>
    <div>
        <h3>登录</h3>
        <input type="text" id="loginAcc" placeholder="账号">
        <input type="password" id="loginPwd" placeholder="密码">
        <button id="loginBtn">登录</button>
    </div>
    <div id="msg" style="margin-top: 12px;"></div>
</div>

<script>
    const API = 'http://localhost:3000/api';

    function showMsg(msg, isErr) {
        const div = document.getElementById('msg');
        div.innerText = msg;
        div.style.color = isErr ? '#ff6666' : '#ffaa33';
    }

    // 注册
    document.getElementById('regBtn').onclick = async () => {
        const account = document.getElementById('regAcc').value.trim();
        const password = document.getElementById('regPwd').value;
        const ref = document.getElementById('regRef').value.trim().toUpperCase();
        if (!account || !password) return showMsg('账号密码不能为空', true);
        if (!['VIP666','888VIP','GOLD2025','LUCKY8','DICE100'].includes(ref)) return showMsg('推荐码无效', true);
        if (password.length < 4) return showMsg('密码至少4位', true);
        try {
            const res = await fetch(API + '/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ account, password })
            });
            const data = await res.json();
            if (data.success) {
                showMsg('注册成功！现在可以登录', false);
                document.getElementById('regAcc').value = '';
                document.getElementById('regPwd').value = '';
                document.getElementById('regRef').value = '';
            } else {
                showMsg(data.error || '注册失败', true);
            }
        } catch (err) {
            showMsg('网络错误：无法连接后端，请确保 node server.js 已运行', true);
        }
    };

    // 登录
    document.getElementById('loginBtn').onclick = async () => {
        const account = document.getElementById('loginAcc').value.trim();
        const password = document.getElementById('loginPwd').value;
        if (!account || !password) return showMsg('请输入账号密码', true);
        try {
        const API_BASE = 'http://localhost:3000/api';

                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ account, password })
            });
            const data = await res.json();
            if (data.success) {
                showMsg(`登录成功！欢迎 ${account}，余额 ${data.balance}`, false);
                // 可以在此跳转到游戏大厅
            } else {
                showMsg(data.error || '登录失败', true);
            }
        } catch (err) {
            showMsg('网络错误：无法连接后端，请确保 node server.js 已运行', true);
        }
    };
</script>
</body>
</html>
