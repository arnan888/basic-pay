<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>动画测试</title></head>
<body>
<button id="test">测试动画</button>
<script>
function showTestAnimation() {
    const overlay = document.createElement('div');
    overlay.style.position = 'fixed';
    overlay.style.top = 0; overlay.style.left = 0;
    overlay.style.width = '100%'; overlay.style.height = '100%';
    overlay.style.background = 'rgba(0,0,0,0.85)';
    overlay.style.display = 'flex';
    overlay.style.alignItems = 'center';
    overlay.style.justifyContent = 'center';
    overlay.style.zIndex = 10000;
    overlay.innerHTML = '<div style="background:white; padding:40px; font-size:48px;">🎲 开奖动画</div>';
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 3000);
}
document.getElementById('test').onclick = showTestAnimation;
</script>
</body>
</html>
